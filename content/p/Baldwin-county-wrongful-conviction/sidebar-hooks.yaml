  bcso-how-to-become-sheriff:
    brief: '1. THE CONFLICT

      - Murder victim: Brandon Hastings.

      - Actual killer (alleged): Jarius McNeal.

      - Wrongful conviction: Murray “Bubba” Lawrence Jr. incarcerated for 20+ years
      since ~2003/2004 at Holman Prison.

      - Sheriff Hoss Mack promoted from Captain to Baldwins County Sheriff specifically
      after assisting in Lawrence’s conviction.

      - Jarius McNeal coerced by Mack to name an accomplice; saved death sentence
      by implicating Lawrence.

      - Case rested entirely on McNeal’s testimony with zero physical evidence (no
      weapon, no crime scene established).

      - Last witness to see Brandon Hastings alive never testified.


      2. THE DISCOVERY

      - Advocates discovered in Oct 4th Lagniappe "Digging Deep": Exculpatory autopsy
      findings never included in trial.

      - Initial autopsy (Mississippi) found by Dean McGowan, John Stewart, Tony Fuqua:
      Cause of death strangled/asphyxiation.

      - Prosecution (DA Whetstone, Sheriff Mack) ignored strangulation findings; pushed
      “gunshot” theory with no ballistics evidence.

      - Exculpatory autopsy evidence found and reviewed by authorities in 2023 but
      withheld from defense.

      - Sheriff Mack, DA Whetstone, and Judge Wilters confirmed in Lagniappe: They
      did not give this evidence to defense attorneys.

      - Tony Fuqua trial testimony (Page 1591): Admitted under oath: No fingerprints
      of Lawrence on scene; no stolen property from Lawrence; no phone records connecting
      Lawrence to victim.


      3. THE PIVOT

      - This evidence proves the conviction was manufactured: Mack/Wilters/Whetstone
      orchestrated hiding exculpatory autopsy data found in 2023.

      - Confirms coercion: McNeal implicated Lawrence to save his life as per Mack’s
      instructions.

      - Links Mack directly to conviction: Mack sent innocent man to jail for life
      (per text author) without parole, gaining political capital/Sheriff promotion.

      - Contradicts official narrative: Official claim was evidence connected Lawrence;
      court transcripts show no connecting evidence, only McNeal’s name.


      4. KEY ENTITIES

      - Murray “Bubba” Lawrence Jr. (Innocent convict)

      - Hoss Mack (BCSO Sheriff, accused of corruption/coercion)

      - David Whetstone (District Attorney)

      - Robert Wilters (Baldwin County Judge)

      - Jarius McNeal (Alleged killer; McNeal eligible for parole now)

      - Brandon Hastings (Victim)

      - Anthony Lowery (BCSO Investigator, no field experience)

      - Dean McGowan (Investigator, witnessed Mississippi autopsy)

      - Tony Fuqua (Police officer, testified no evidence linked Lawrence to crime)'
