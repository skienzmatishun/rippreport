  catalyst-does-fairhope:
    brief: 'THE CONFLICT: What happened in the past?

      • On February 5, 2016, Arthur Corti made an entitlement speech at the Fairhope
      Planning meeting regarding large-scale residential development projects (approx.
      500 apartments) in areas including Rock Creek, Montrose, Plantation Pines, The
      Woodlands, and Parker Road.

      • Residents of Fly Creek expressed concern over traffic, property values, and
      development near damaged Fly Creek.

      • Allegations surfaced that a "corrupt inside deal" existed between Angelo Corte
      (the developer) and the Mayor’s office regarding the project''s approval.


      THE DISCOVERY: What does the second article prove or reveal today?

      • The second article identifies former Mayor Tim Kant as key in supporting Angelo
      Corte’s development interests through City Council actions during his administration.

      • It confirms that taxpayers funded infrastructure (Fire Station on Parker Road;
      sewer lift station above Fly Creek) which was specifically built to service
      and tie into the apartments owned by Corte/Fly Creek Apartments.

      • The article reveals that Mayor Tim Kant authorized, late in his administration,
      a "gift" of wetlands/land from Angelo Corte to the City of Fairhope—this land
      is positioned to receive all water draining from the Publix property (developed
      by Corte) directly into Fly Creek.


      THE PIVOT: Why is Article 2 the ''smoking gun'' for Article 1?

      • Article 1 claimed an inside deal existed where infrastructure benefited entitled
      developers at taxpayer cost; Article 2 names Mayor Tim Kant and Angelo Corte,
      proving this was systemic favoritism.

      • It moves beyond general complaints by showing specific transactions: The City
      received liability ("gift" of drainage land) while the taxpayers paid for specialized,
      high-cost infrastructure (sewer lift station/fire station) necessary to support
      private residential profit at Fly Creek.


      KEY ENTITIES: List specific names, organizations, or locations to mention

      • Arthur Corti / Angelo Corte

      • Tim Kant (Former Mayor)

      • Fairhope City Council

      • CATALYST (Political Organization)

      • Hollie MacKellar (Planning Commissioner)

      • Fly Creek

      • Parker Road

      • Rock Creek / The Woodlands / Plantation Pines Subdivisions

      • Publix Property

      • Fire Station on Parker Road

      • Sewer Lift Plant/Station'
