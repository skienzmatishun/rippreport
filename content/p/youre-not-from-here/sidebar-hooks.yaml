  fly-creek-a-drainage-ditch:
    brief: '**THE CONFLICT:**

      • Feb. 5, 2016: Arthur Corti presented development plans to the Fairhope Planning
      meeting regarding housing/commercial expansion.

      • Allegation: The project (Fly Creek Apartments) constituted a "corrupt inside
      deal" between land owner and Mayor, including city installation of fire station
      and sewer lift plant costing over $1 million in tax dollars.


      **THE DISCOVERY:**

      • Six day trial occurred in Bay Minette concerning the Fly Creek Apartments
      project.

      • Adam Milam (plaintiff''s attorney) argued City Council and Mayor sold out
      Fairhope by allowing a large apartment complex near the Fly Creek Watershed,
      ignoring public concerns/campaign promises.

      • The current drainage plan utilizes single point discharge at an outfall pipe,
      detouring a 1-acre retention pond expansion to dump storm water directly into
      wetlands draining into Fly Creek (approx. 100-150 feet from outfall).


      **THE PIVOT:**

      • Article 2 substantiates the general allegations of corruption and mismanagement
      raised in Article 1 by detailing specific legal findings, the technical failures
      of the drainage plan, and identifying officials who benefited from the decision:
      Jack Burrell and Kevin Boone "gladly accepted the gift" related to wetland use.


      **KEY ENTITIES:**

      • Arthur Corti / Jimmy Corte (Developer)

      • Adam Milam (Plaintiff''s Attorney, Friends of Fly Creek)

      • Hollie MacKellar (Planning Commissioner; noted as only ''NO'' vote in 2016
      meeting)

      • Jack Burrell

      • Kevin Boone

      • Fairhope City Council/Mayor (the approving governmental body for the project)'
