  gulf-shores-shoot-the-messenger:
    brief: 'THE CONFLICT

      *   **Date:** February 1st, 2016

      *   **Event:** Arthur Corti''s entitlement speech during a Fairhope Planning
      meeting.

      *   **Allegations (Art 1):** Corrupt inside deal between Mayor/Land Owner and
      developer regarding apartment projects including Rock Creek, Montrose, Plantation
      Pines, The Woodlands, and Parker Road developments (totaling approximately 500
      apartments).

      *   **Specific Incident:** City utilized over $1 million in taxpayer dollars
      for the construction of a fire station and sewer lift plant, which benefitted
      the associated apartment project.

      *   **Witness Testimony/Objections (Art 1):** Only Planning Commissioner Hollie
      MacKellar voted "NO." Jennifer Fidler was accused of being the Mayor’s puppet
      and overlooking violations.


      THE DISCOVERY

      *   Article 2 proves that a pattern of prioritizing high-density development
      over community welfare existed in Fairhope under its previous leadership, specifically
      referencing former Fairhope Mayor Tim Kant.

      *   This historical trend is illustrated by the Gulf Shores controversy involving
      The Enclave and Regency Club developments, where high-density apartment complexes
      were approved by City Planning Commissions without prior notice or public input,
      resulting in resident protests (e.g., 750+ signature petition).


      THE PIVOT

      *   Article 2 shifts the focus from a one-time corruption incident to systemic
      governance failure. It argues that the "good ole boy deal" described by residents
      in Article 1 is not an isolated event but symptomatic of a pattern where Fairhope’s
      Planning and Zoning mindset—driven by mayoral appointments and prior administration
      policies (e.g., Tim Kant)—favored developers over citizens, mirroring the Gulf
      Shores controversy.

      *   Article 2 confirms that administrative changes (new Mayor concentrating
      on changing P&Z membership) were necessary to settle pending lawsuits inherited
      from past administrations accused of ignoring public concerns regarding zoning
      violations.


      KEY ENTITIES

      *   Arthur Corti

      *   Hollie MacKellar

      *   Senator Pittman

      *   City Council / City Councilmen

      *   Fairhope Planning and Zoning Commission

      *   Jennifer Fidler (Former Fairhope Staff, City Council Member)

      *   Tim Kant (Former Mayor of Fairhope cited as precedent for developer-favored
      zoning)

      *   Pete Sims (Vocal "messenger" or resident opposition)

      *   The Enclave / The Regency Club (Gulf Shores apartment projects used as historical
      parallel)'
