      \ Article alleged a \"CORRUPT INSIDE DEAL\" where $1 million in tax dollars\
      \ for city infrastructure (fire station, sewer lift plant) benefited an apartment\
      \ project near Publix strip center.\n*   Initial development involved building\
      \ 500 apartments within two miles of each other on Highway \n\n**THE PIVOT**\n\
      *   Article 1 alleged the initial development push was based on corruption and\
      \ an inside deal favoring Arthur Corti.\n*   Article 2 proves this dynamic is\
      \ ongoing: regardless of whether it is the original Publix site or subsequent\
