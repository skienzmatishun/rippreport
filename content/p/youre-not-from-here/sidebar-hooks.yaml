  no-more-silence-we-want-answers:
    brief: 'THE CONFLICT:

      * Arthur Corti made public statements on Feb. 1, 2016, during a Fairhope Planning
      meeting regarding large-scale apartment developments near Fly Creek and Highway
      98 (including Rock Creek and The Woodlands).

      * The Main Article alleged a corrupt "inside deal" between land owner/developer
      Arthur Corti and the Mayor of Fairhope.

      * Allegations included the City incurring $1 million in expenditures for infrastructure
      related to the development, specifically citing the installation of a fire station
      and a sewer lift plant.


      THE DISCOVERY:

      * The Widget Article confirms that Mr. Corte’s second phase of the Fly Creek
      Apartments project involved city spending on a Fire station located on Parker
      Road (costing $500,000).

      * It also notes an additional cost of "three or four hundred thousand dollars"
      for a lift station built to accommodate these apartments.

      * The Widget Article confirms the Fly Creek Apartments are currently in court
      and warns that the project will overload Fairhope’s existing sewer system, despite
      a recent $10 million upgrade being implemented.


      THE PIVOT:

      * The initial allegation (Article 1) of a corrupt deal based on city investment
      is validated by the Widget Article''s specific data regarding current municipal
      expenditures ($500,000 fire station + lift station costs).

      * The Widget Article reinforces the narrative of corruption from Article 1 by
      contextualizing Corti’s development approvals within Mayor Kant''s broader pattern
      of using the Planning and Zoning Board for "good ole boy deals" (e.g., the $12
      million Triangle lawsuit settlement).


      KEY ENTITIES:

      * Arthur Corte (Developer/Land Owner)

      * Fairhope City Council / Planning & Zoning Board

      * Mayor Kant / Former Mayor (Mayor)

      * Hollie MacKellar (Planning Commissioner, 2016-08-19 context)

      * Fly Creek Apartments / Triangle project

      * Parker Road / Rock Creek / Montrose / Plantation Pines

      * Angus Cooper ($35k donation for Senior Bowl)'
