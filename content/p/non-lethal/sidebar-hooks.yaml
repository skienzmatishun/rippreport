      BCSO had no crisis intervention team and officers lacked de-escalation training.

      - Post-shooting, BCSO refused to turn over critical body camera and vehicle
      footage of the incident.

      - Lagniappe Mobile was forced to hire an attorney and file legal action to obtain
      "missing" footage.

      - Bay Minette Police Department utilized ~$212,000 in grant funds to purchase
      lethal gear (AR-15s, Humvee) with no reported purchase of non-lethal de-escalation
      equipment.


      THE DISCOVERY:

      - Article 2 confirms a 2021 State Supreme Court ruling (Lagniappe v. Mack) involving
      withheld bodycam footage where Associate Justice Greg Shaw wrote the majority
      opinion.

      - The ruling declared that law enforcement investigative reports, field notes,
      and audio recordings are "privileged communication" protected from disclosure,
      not public records.

      - Chief Justice Tom Parker dissented from the decision; he was the sole member
      of the court to oppose the blocking of video evidence.

      - Article 2 identifies a September 2023 dispute where District Attorney Robert
      Wilters and Sheriff Mack asked a judge to reverse a ruling ordering the return
      of a seized Camaro.

      - Reports confirm Wilters and Mack share a 30-plus-year working relationship;
      DA has historically followed Sheriff’s directives.


      THE PIVOT:

      - The "Lagniappe v. Mack" case detailed in Article 2 is the legal mechanism
      used to enforce the evidence withholding described in Article 1.

      - Article 2 proves the legal precedent now shields Sheriff Mack’s office (and
      deputies like those shooting Johnathan Victor) from public oversight by classifying
      critical footage as non-public.

      - The relationship between Mack and DA Wilters (Article 2) explains the structural
      protection that prevents accountability for the misconduct referenced in Article
      1.

      - The decision by Justice Shaw validates BCSO’s refusal to turn over bodycam
      videos, turning what Article 1 describes as a scandal into legally enforceable
      policy.


      KEY ENTITIES:

      - Huey “Hoss” Mack (Baldwin County Sheriff, BCSO)

      - Johnathan Victor (Unarmed shooting victim)

      - Robert Wilters (Baldwin County District Attorney)

      - Associate Justice Greg Shaw (Lagniappe v. Mack majority opinion author)

      - Chief Justice Tom Parker (Dissenter in Lagniappe v. Mack)

      - Sen. Trip Pittman (Sponsored SB 312 for Sheriff qualifications; awarded self
      $750k in funding)

      - Deputy Matt Hunady (Officer mentioned regarding bodycam withholding and I-10
      shooting)'
