  JUDGE-VS-SHERIFF:
    brief: 'THE CONFLICT:

      - May 2017: Baldwin County Sheriff’s Office (BCSO) deputies shot unarmed civilian
      Johnathan Victor four times from seven yards away with a Ruger AR-15.

