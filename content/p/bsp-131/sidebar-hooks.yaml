      McCallum but declined the possibility of any criminal investigation into McCallum’s
      behavior.

      - Ethics Commission fined McCallum for various transgressions instead of pursuing
      criminal accountability.

      - Tom Albritton, confirmed as Ethics Commission Executive Director in March
      2015 by the State Senate, is accused of self-dealing using a trust he oversaw.

      - Records indicate scholarships distributed to Albritton’s children totaled
      $105,000 between 2014 and 2018 from the trust Albritton oversees.

      - Article 1 contextualizes this by noting leadership problems across the AG''s
      Office, Ethics Commission, and State Bar, along with regulatory capture involving
      Alabama Power.


      THE DISCOVERY:

      - 990 tax records show specific financial data proving conflict of interest
      involving Albritton: $15,000 scholarships for two children each year between
      2014-2018.

      - Steve Marshall’s decision to limit McCallum’s punishment to an administrative
      resolution represents "punting" on criminal liability for misconduct.

      - The Alabama State Bar and Ethics Commission failed to punish McCallum despite
      multiple transgressions, as highlighted in the linked articles.

      - Confirms that Albritton received a pass from all oversight bodies (Ethics
      Commission, Alabama Bar, Attorney General) despite self-dealing allegations.


      THE PIVOT:

      - Article 2 serves as the smoking gun for the general corruption allegations
      in Article 1.

      - Article 1 establishes that oversight bodies have "leadership problems" and
      "worse."

      - Article 2 provides the specific proof: The AG, Ethics Director, and State
      Bar failed to stop a confirmed financial conflict of interest ($105k scholarships)
      and enforced weak penalties (fines only, no criminal probe) for McCallum.

      - Validates the claim that regulators are complicit in corruption through documented
      self-dealing and lack of enforcement.


      KEY ENTITIES:

      - Steve Marshall (Attorney General, Alabama)

      - Tom Albritton (Ethics Commission Executive Director)

      - McCallum (Subject of Ethics Commission/AG investigation)

      - Alabama State Bar

      - Alabama Ethics Commission

      - Alabama Attorney General’s Office'
