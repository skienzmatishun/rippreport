      - Albritton and colleagues used scholarships for their own children; beneficiary
      list indicates Albritton received ~$120,000 in spared family expenses.

      - Circuit Judge Ben Bowden (former Albritton law partner) received $45,000 for
      children’s scholarships.

      - 2010: Oil discovered on Mabel Amos land (value potential $80 million).

      - August 21, 2022: Francis Paul Ripp sent formal complaint to Office of Special
      Prosecutions (Clark Morris) with 100+ page bound dossier.

      - No reply received from Special Prosecutions, AG’s Office, Alabama Bar, or
      Ethics Commission as of August 21, 2022.

      - Ripp filed a Writ of Mandamus; no hearing granted by court.


      2. THE DISCOVERY:

      - Article 2 (Widget) proves Article 1’s claim that "Ethics Commission, Attorney
      General’s Office, and the Alabama State Bar have leadership problems."

      - Ripp confirmed (Jan 2022) that Cynthia Raulston (Albritton partner/trustee)
      defended Albritton’s financial trust usage to Ripp during a 45-minute call.

      - Article 2 confirms Alabama Bar ignored 100-page evidence packet despite having
      copies of complaint sent July 16, 2021.

      - Ethics Commission held exculpatory evidence regarding Albritton (conflict
      with AG’s Office).

      - Ripp alleges Regions Bank charged over $1 million in fees for managing the
      Mabel Amos Trust.


      3. THE PIVOT:

      - Article 2 is the ''smoking gun'' because it provides specific, documented
      evidence (100+ pages) backing Article 1’s general allegation of corruption within
      specific Alabama institutions.

      - Article 2 names the exact individuals (Albritton, Raulston) and entities (Ethics
      Commission, AG Office, Alabama Bar) that Article 1 identifies as having "leadership
      problems."

      - The lack of response to Ripp’s August 21, 2022 complaint validates Article
      1''s claim of a "black hole" where regulators ignore evidence rather than investigate.


      4. KEY ENTITIES:

      - Francis Paul Ripp (The Ripp Report.com, Backstory Podcast, Founder of Alabama
      Consumers Association).

      - Thomas Albritton (Ethics Executive Director; Mabel Amos Trustee).

      - Cynthia Raulston (Albritton Partner/Trustee; former Ethics Commission partner).

      - Ben Bowden (Circuit Judge; Albritton Law Partner; Scholarship Recipient).

      - Clark Morris (Office of Special Prosecutions, AG Representative).

      - Mabel Amos Trust / Secretary of State.

      - Regions Bank (Trust Manager).

      - Alabama Ethics Commission.

