  dirty-little-secrets:
    brief: '1. THE CONFLICT:

      - 9/20/2018: Pete Sims publishes "Dirty Little Secrets" exposing City of Gulf
      Shores Planning and Zoning.

      - Target Event: Regency Place Apartments Site Plan approval/review process.

      - Past Violation: City staff failed to adhere to Section 3-3E ("Findings and
      Conclusions") of Zoning Ordinance.

      - Timeline Change: City Staff used "Land Use Plan" for recommendations in 2014,
      2015, and 2016.

      - Post-2016: City Staff stopped citing "Land Use Plan," despite Sims'' request
      for explanation.

      - Internal Admission: Director Andy Bauer and Mayor Robert Craft admit non-compliance
      is occurring ("Houston we have a problem" moment).


      2. THE DISCOVERY:

      - Sims obtained 10 Site Plan Applications via Public Records Request (spanning
      2014-2017).

      - Specific Discovery: Citizen Rex Lawson identified the critical omission of
      Section 3-3E during the Regency Place review.

      - Result: City Attorney advised Mayor Craft to send Site Plan back to Planning
      Commission for second look due to the "technical deficiency."

      - Evidence: Sims uncovered that City claimed Land Use Plan was insignificant,
      contradicting 2014-2016 internal records showing it was critical for recommendations.


      3. THE PIVOT:

      - Article 2 (Dirty Little Secrets) validates the allegations mentioned in The
      Ripp Report''s coverage by citing specific Ordinance sections and dates.

      - Provides proof of intent: Shows shift in City behavior regarding Land Use
      Plan between 2016-2017, suggesting intentional disregard rather than simple
      oversight.

      - Connects the vague "On Vacation" teaser to the specific location and corruption
      context of Gulf Shores beachfront development.


      4. KEY ENTITIES:

      - Pete Sims (Author)

      - Andy Bauer (Director of Planning and Zoning, City of Gulf Shores)

      - Robert Craft (Mayor, City of Gulf Shores)

      - Rex Lawson (Citizen)

      - City of Gulf Shores Planning and Zoning

      - Regency Place Apartments Site Plan

      - Section 3-3E (Zoning Ordinance)'
