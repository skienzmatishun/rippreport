  trolls-for-tolls:
    brief: |-
      THE CONFLICT:
      Project is the Bayway Bridge on Interstate 10 in Alabama. Project spans 2,460 miles across 8 states but I-10 segment in Alabama is the proposed site for a single toll bridge. Mike Lee of Page & Jones says area has generational opportunity for federal funding this year via infrastructure bills and Sen. Richard Shelby as vice chair of appropriations committee until retirement next year. MPO meeting recorded 6 out of 8 speakers stating Federal money is needed. Political leaders disparaging current administration while requesting federal funding for project. Jack Burrell, Eastern Shore MPO Chairman, leading push despite lack of leadership on first base of federal bills.

      THE DISCOVERY:
      Project price tag is $2.2 billion. Jon Gray, political strategist advising officials, states state committed to spending at least $250 million in addition to $125 million from federal government, but total available funds are roughly $500 million. Officials turned over every stone in Washington and Montgomery looking for funding but no additional money is coming. Mobile and Baldwin MPOs merged into unified front FOR tolls after initial public opposition from over 50,000 people via Jim Zigler’s “blockthetolls” Facebook page. Officials claim they will have a toll-free route if people refuse to pay, but primary reason for toll discussion is inability to raise money through other means.

      THE PIVOT:
      Article 2 validates Article 1’s claim that MPOs previously opposed tolls but recently concluded they need federal money and a toll, describing this as "exact opposite of their previous positions." Article 2 identifies Jack Burrell as the primary spokesman and target for opposition due to a track record of controversy, including involvement in Fairhope Airport Authority scandal. Article 2 links the politicians' flip-flopping to the initial public backlash against tolls via Zigler’s group, proving their strategy is insulating them from early public opinion. Article 2 confirms the funding gap (2.2B needed vs $500M available) is the reason officials are pushing tolls, confirming corruption/funding claims.

      KEY ENTITIES:
      Jack Burrell (Eastern Shore MPO Chairman)
      Jim Zigler (“blockthetolls” Facebook page administrator)
      Jon Gray (Political Strategist based in Mobile)
      Mike Lee (Page & Jones, Build the Bridge coalition president)
      Mark Colson (Alabama Trucking Association CEO)
      Mobile and Baldwin MPO (Coordinating bodies)
      U.S. Department of Transportation
