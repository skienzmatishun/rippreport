      2. THE DISCOVERY:
      - Widget article identifies funding mechanisms behind the bridge controversy as a multi-layered tax and revenue scheme.
      - "Rebuild Alabama Act" includes indexed 10-cent fuel tax hike (claimed "Goat Hill deal").
      - Fairhope and Spanish Fort Town Councils proposing special tax referendum for schools (target: 3 million tax).
      - Bridge is admitted as a "marine project for the port disguised as an automobile traffic problem."
      - Cost driver identified: Height of the bridge drives price into billions.
      - Proposal mentions charging ocean-going freighters under the bridge (BOAT TOLL) as a way to reduce tolls, currently not adopted.

      3. THE PIVOT:
