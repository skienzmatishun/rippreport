  no-mo-bridge:
    brief: |-
      1. THE CONFLICT
      - Alabama officials proposing toll on I-10 (Federal Highway) to fund infrastructure; 2,460 miles of federal route with only one toll in Alabama.
      - Mark Colson (Alabama Trucking Association) flags plan as unconstitutional; truck-only tolls discriminate against out-of-state companies under Commerce Clause.
      - Federal infrastructure bills whittled down by Republicans; project missed window for inclusion in current bill.
      - Jack Burrell (Eastern Shore MPO Chairman) leading charge while Alabama ranks last in funding for education, prisons, healthcare.

      2. THE DISCOVERY
      - Mo Brooks claims 10th Amendment means funding decisions should not be made in Washington; states should control.
      - Jack Burrell contradicts this stance: admits opposed to federal assistance, but confirms "if it was offered he would take the money."
      - Alabama ignored $3.2 billion in Medicaid funding opportunities; neighbors generate billions via lottery/marijuana, Alabama does not yet.
      - Fairhope Mayor Sherry Sullivan confirmed tolls for passenger vehicles expected despite "legacy routes."

      3. THE PIVOT
      - Brooks/Burrell rhetoric exposes hypocrisy: they call federal government "the worst place" but are begging for its money on a federal highway.
      - Project cannot succeed without federal assistance (I-10 classification), yet they frame it as purely local/constitutional issue to avoid oversight.
      - Colson’s legal warnings (Commerce Clause) provide the framework for Article 2's claim that officials are "stepping all over themselves" to justify a toll-bridge they initially opposed in principle.

      4. KEY ENTITIES
      - Jack Burrell (Eastern Shore MPO Chairman)
      - Mo Brooks
      - Mark Colson (Alabama Trucking Association CEO)
      - Richard Shelby
