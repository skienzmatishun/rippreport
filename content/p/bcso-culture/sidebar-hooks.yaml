  po-po-hoss-mack-ccuo:
    text: While the department claims they value the truth, a 2004 letter proves Wilters,
      Whetstone, and Mack knew they were railroading an innocent man. See how PR spinner
      Jon Grey keeps the lies moving while the FBI looks into the evidence Mack claims
      is missing.
    brief: 'THE CONFLICT

