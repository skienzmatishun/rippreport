  FEDERAL-CIVIL-RIGHTS-LAWSUIT-INVOLVES-BCSO-AND-MAJOR-CRIMES-UNIT:
    text: The Sheriff’s Office claims they investigate themselves fairly, but federal
      judges are starting to see through the charade. New court filings expose how
      Hoss Mack lied about the Jonathan Victor shooting after a judge stripped his
      deputy of immunity for the kill.
    brief: '1. THE CONFLICT

      - Anthony Lowery is the current/appointed Sheriff of Baldwin County, running
      for sheriff or serving in interim role.

      - Hoss Mack ("Huey "Hoss" Mack") is the former Sheriff, leaving Baldwin County.

      - Major Crimes Unit (BCMCU) investigates itself; members include Bay Minette
      Police Chief Al Tolbert, Sheriff Mack, Robertsdale PD Chief Brad Kendrick.

      - Multiple specific incidents cited as evidence of "culture": Jonathan Victor
      (2017 shooting by Deputy Lt. Matthew Hunady), Murray Lawrence Jr. (Wrongful
      conviction, Lowery was lead investigator), O.J. French (Shot by Bay Minette
      Officer Brandon Thompson).

      - Claims of blanket immunity, self-investigation finding innocence 100% of time.


      2. THE DISCOVERY

      - Federal Civil Rights Lawsuit filed against BCSO and Major Crimes Unit (BCMCU).

      - BCMCU Chairman is Bay Minette Police Chief Al Tolbert.

      - Jonathan Victor Case: Federal court filings released; Judge William Cassady
      denied Matthew Hunady qualified immunity in April 2021. Sheriff Mack provided
      facts about the case that were untrue according to filings.

      - O.J. French Case: 10th loss of life investigated by BCMCU; first 8 found no
      police at fault, camera footage withheld from public.

      - County Commission warned of federal lawsuits but did nothing to act.


      3. THE PIVOT

      - Article 2 confirms the "Culture of Lies" alleged in Article 1 by providing
      the Federal Civil Rights suit details.

      - Article 2 proves the self-investigation claim: BCMCU chairs Tolbert and includes
      Mack, validating Lowery''s accusation that the office investigates itself.

      - Article 2 substantiates specific incidents mentioned in Article 1 (Victor,
      French) with court rulings and federal filing evidence.

      - Mack passing liability to Lowery ("wants Anthony Lowery to replace him") connects
      the past cover-ups (Article 2) to current tenure (Article 1).


      4. KEY ENTITIES

      - Anthony Lowery

      - Hoss Mack ("Huey "Hoss" Mack")

      - Jonathan Victor

      - O.J. French

      - Matthew Hunady (Deputy Lt.)

      - Brandon Thompson (Bay Minette Police Officer)

      - Al Tolbert (Bay Minette Police Chief, BCMCU Chair)

      - Robert Correa (Father of Deputy Justin Correa)

      - Steve Nodine

      - Murray Lawrence Jr.

      - Judge William Cassady

      - David Whetstone (Judge)

      - Robert Wilters

      - Matt McKenzie

      - Mayor Wills (Former Bay Minette Mayor)'
