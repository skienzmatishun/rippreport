  bcso-how-to-become-sheriff:
    text: Sheriff Lowery built his career on a conviction that had no physical evidence
      and a witness who was threatened with death. Secret documents found in 2023
      prove that Lowery and Dean McGowan helped hide the truth to keep an innocent
      man in prison for twenty years.
    brief: '1. THE CONFLICT:

      - Sheriff Hoss Mack elected and promoted from Captain to Sheriff based on assistance
      in the wrongful conviction of Murray Lawrence Jr.

      - Anthony Lowery hired by Mack to support cases; described as having no field
      experience but involved in the Lawrence capital murder case.

      - 2017 fatal shooting of Jonathan Victor where Defense attorneys claimed Suicide
      By Cop vs. Sheriff Lowery defending the 4 shots from assault rifle at 7 yards.

      - Anonymous BCSO Deputy claims Lowery is only for "select few" and covers up
      issues causing personnel to leave.

      - Deputy Matthew Hunady cleared by federal jury in 2017 fatal shooting of Jonathan
      Victor.

      - Victim OJ French died after being stopped for broken taillight; ruled "justified
      shooting" by Major Crimes Unit and Mayor Wills.

      - Teen Peyton Little died after seat belt strangulation in moving car; Lagniappe
      articles suggest conflict between BCSO and Bay Minette PD regarding incident.

      - Murray Lawrence Jr. incarcerated in Holman Prison for 20 years without possibility
      of parole.


      2. THE DISCOVERY:

      - Exculpatory evidence discovered in 2023 by Lagniappe cover story "Digging
      Deep" was hidden from the defense during Lawrence trial.

      - Mississippi Autopsy (Brandon Hastings) conducted by Dr. Paul McGarry concluded
      "asphyxiation by strangulation"; witnesses Dean McGowan, John Stewart, Tony
      Fuqua present.

      - Prosecutor David Whetstone and Judge Robert Wilters ordered exhumation for
      second autopsy in Baldwin County, ignoring Mississippi findings which listed
      gunshot cause of death.

      - Jarius McNeal implicated Murray Lawrence Jr. after being threatened by Sheriff
      Mack with the death sentence unless he named an accomplice; McNeal now eligible
      for parole.

      - During trial, Mack contradicted himself regarding a trunk liner; no weapon
      or ballistics produced by prosecution.

      - Tony Fuqua testified he did not have fingerprints, stolen property, or cell
      phone records connecting Lawrence to victim Brandon Hastings.


      3. THE PIVOT:

      - Article 1 establishes the general "Culture of Lies" and names Lowery/Mack
      as architects; Article 2 provides specific evidence that proves this claim.

      - Article 1 cites the Lawrence case as proof of "wrongful incarceration"; Article
      2 details the specific legal failures (ignored autopsy, hidden evidence found
      in 2023) proving innocence.

      - Article 2 links Lowery and Dean McGowan directly to the Lawrence suppression
      of evidence, validating Article 1''s claim they "produced not one shred of evidence."

      - Article 2 reveals the motive for conviction (McNeal''s death sentence threat)
      which contextualizes Lowery/Mack''s "select few" power dynamic mentioned in
      Article 1.


      4. KEY ENTITIES:

      - Hoss Mack (Sheriff)

      - Anthony Lowery (Appointed Sheriff/Investigator)

      - Murray "Bubba" Lawrence Jr. (Incarcerated Defendant)

      - Jarius McNeal (Accomplice/Actual Killer Suspect)

      - Brandon Hastings (Victim in Lawrence Case)

      - Robert Wilters (Judge)

      - David Whetstone (Prosecutor/DA)

      - Dean McGowan (Investigator/Autopsy Witness)

      - Tony Fuqua (Officer/Defense Witness)

      - Paul McGarry (Forensic Pathologist)

      - Holman Prison

      - Baldwin County Sheriff''s Office (BCSO)'
