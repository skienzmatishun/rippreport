      - Johnathan Victor (Victim 2017)

      - Steve Nodine (Defendant in Murder Trial)

      - OJ French (Victim)

      - Bob Correa & Justin Correa (Deputies/SWAT)

      - May 17, 2004 (Letter Date)'
