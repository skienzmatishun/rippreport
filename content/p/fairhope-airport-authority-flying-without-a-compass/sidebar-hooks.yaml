  fairhope-town-hall-meeting:
    brief: 'THE CONFLICT

      *   Fairhope City Council covered back major players during an illegal meeting
      (Date: Prior to 2015).

      *   Fairhope City Council received additional training in Alabama Ethics and
      failed the course.


      THE DISCOVERY

      *   The Airport Authority is demanding control and ownership of airport land
      while the city pays the mortgage.

      *   Airport land represents 21% of the city debt.

      *   Fairhope has spent more on the Airport than on schools.

      *   Repeal of ordinance 1572 and the Fly Creek Apartments are ongoing issues
      affecting the city.


      THE PIVOT

      *   The corruption/unethical behavior documented in Article 1 (illegal meeting,
      ethics failure) directly leads to the current financial instability and land-use
      conflicts detailed in Article 2 (Airport Authority demanding control of critical
      municipal assets).


      KEY ENTITIES

      *   Fairhope City Council

      *   Mayor

      *   Airport Authority

      *   Fly Creek Apartments

      *   Ordinance 1572

      *   Fairhope High School

      *   Fly Creek basin'
