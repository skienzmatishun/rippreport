  captain-jack-at-the-controls:
    brief: 'THE CONFLICT

      *   Past event: Illegal meeting at the Fairhope Airport Authority.

      *   Past event: Fairhope City Council received additional training in Alabama
      Ethics but failed the course.


      THE DISCOVERY

      *   Documents were presented regarding hangar leases at the Airport following
      the defeat of former Mayor Can''t in 2016.

      *   Captain Jack Burrell was receiving free air miles and golf vacations from
      a board member while overseeing the hangar lease bid process for that same board
      member.

      *   The Authority receives 7 cents on the dollar from lease holders, and there
      is no record of what fuel is being used.


      THE PIVOT

      *   Article 2 proves specific instances of inside trading and corruption concerning
      airport leases by detailing Captain Jack''s direct relationship with a board
      member during the bidding process.

      *   This moves the general accusation of political corruption (Article 1) to
      actionable proof regarding financial malfeasance at the Airport Authority.


      KEY ENTITIES

      *   Captain Jack Burrell

      *   Fairhope City Council

      *   Joe McEnerney (Authority Board President)

      *   Former Mayor Can''t

      *   Fairhope Airport Authority'
    generated_at: '2026-07-11T12:40:30.480254Z'
  captain-jack:
    brief: 'THE CONFLICT

