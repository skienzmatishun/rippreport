      \ transparency and corruption in this issue ($5000 mentioned as a fee for documentation)."
    generated_at: '2026-07-18T02:53:52.879166Z'
  captain-jack:
    brief: 'THE CONFLICT

      * Fairhope Airport Authority allegedly held an illegal meeting in October 2015.

      * The Fairhope City Council underwent ethics training following this alleged
      incident and subsequently failed the required course in November 2015.

      * Earlier reports from Ripp reported on issues regarding leases/bidding processes
      at the airport starting late 2016.


      THE DISCOVERY

      * A special meeting of the Fairhope Airport Authority was held on January 8th
      to address a "notice of availability."

      * The discussion revealed ongoing failures in process, specifically concerning
      leases, bidding procedures, and fuel farms, mirroring issues from 2016.

      * Chairman Joe McEnerney was alleged to be guaranteeing specific "chosen ones"
      hangar locations before any formal bid process took place.

      * Council President Burrell (City liaison) attended the January 8th meeting
      unprepared.

      * Captain Jack is currently asserting sole control over hangar location approvals
      at the Airport Authority, stating no one gets a spot without his approval.


      THE PIVOT

      * The current allegations regarding Chairman Joe McEnerney guaranteeing spots
      directly validate the warnings of systemic failure and ethical breaches detailed
      in the 2015 "illegal meeting" and subsequent ethics failures.

      * The continued existence of these questionable practices demonstrates that
      despite past official oversight (ethics training) and public scrutiny, the underlying
      corruption at the Fairhope Airport Authority has worsened.


      KEY ENTITIES

      * Burrell (Council President/City liaison on the board)

      * Joe McEnerney (Airport Authority Chairman)

      * Captain Jack (Influential figure with asserted control over hangar approvals)

      * Fairhope City Council

      * City Attorney and Municipal Judge'
    generated_at: '2026-07-18T02:53:52.879170Z'
