  fairhopes-triangle-mega-site:
    brief: 'THE CONFLICT

      Baldwin County spent $32 million on the South Alabama Mega-Site over seven years;
      the site remains vacant. Baldwin County Economic Development Alliance under
      Mr. Lee Lawson plans to transfer title of the $50 million mega-site to BCEDA.
      Fairhope Councilman Burrell and Boone are accused of lying regarding the "Triangle"
      property, claiming it was a voluntary purchase for a City Park, when evidence
      suggests otherwise.


      THE DISCOVERY

      Fairhope’s Triangle property, valued between $16 and $20 million, was purchased
      by the City of Fairhope to settle a lawsuit, costing the City $11.25 million
      and $3 million in attorney fees. Councilman Burrell and Boone sought to declare
      the land as a conservation easement, preventing development.


      THE PIVOT

      The Widget Article reveals a precedent where municipal officials (Burrell and
      Boone) engaged in non-public deals involving large amounts of public property
      and legal maneuvering concerning land use, which mirrors the alleged secretive
      transfer plans proposed by Baldwin County Commissioners regarding the Mega-Mistake
      site.


      KEY ENTITIES

      Mr. Lee Lawson

      Baldwin County Economic Development Alliance (BCEDA)

      Baldwin County Commission

      Fairhope Councilman Burrell

      Fairhope Councilman Boone

      Mayor Kant

      Jack Burrell International (Fairhope Airport)'
