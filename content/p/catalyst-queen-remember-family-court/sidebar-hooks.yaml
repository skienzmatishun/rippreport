      the backing of Catalyst Queen Michelle Thomason.

      *   Scully used his connection with Catalyst to secure a District Court appointment.

      *   Scully ignored state law regarding DUI ignition interlock devices, despite
      legislation passed in 2011.

      *   Catalyst works to protect judges and promote them for political control
      within Baldwin and Mobile Counties.


      THE PIVOT:

      *   Article 2 proves that Judge Thomason''s influence through Catalyst directly
      resulted in the appointment of Judge Scully, who subsequently abused his judicial
      authority (issuing an illegal ejectment order against Robert Yates, Jr.) and
      ignored mandatory state laws.

      *   Catalyst provides the mechanism for judges to bypass legal accountability
      and political scrutiny.


