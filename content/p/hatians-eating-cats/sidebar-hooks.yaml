      accessing $7 million in American Rescue Plan Act funds.

      - Main Article confirms Davis is being removed from the ADVA Commissioner position
      due to this whistleblower ethics complaint.

      - Main Article identifies Alabama politics as a profit motive environment ignoring
      facts (e.g., Haitians eating cats issue).


      THE DISCOVERY:

      - Widget article proves Davis’s removal is tied to retaliation for the ethics
      complaint against Boswell.

      - Legislation restructuring Alabama State Board of Veterans Affairs passed State
      Senate 21-9 earlier in the month.

      - Opponents claim this legislation is retaliation for Davis''s ethics complaint
      filed at direction of the State Board.

      - Ethics Commission dismissed the complaint; allegations suggest commission
      ran across street to provide Governor Ivey with a copy.

      - Tom Albritton, Ethics Director, is under scrutiny for using Mabel Amos Trust
      resources to award himself scholarships; Attorney General attempting to bury
      investigation.

      - Governor Kay Ivey framed as "Biden syndrome" actively dismantling ADVA due
      to Davis’s allegations.


      THE PIVOT:

      - Article 2 is the smoking gun because it validates Article 1’s vague claim
      of "contacts to be had" and corruption.

      - Article 2 confirms the specific allegation: $7 million funds dispute between
      Boswell and ADVA.

      - Article 2 links Kent Davis’s removal directly to political retaliation by
      the Ivey administration, giving context to Article 1''s comment about "State
      of Alabama is showing the door."

      - Article 2 identifies the specific legislators (Andrew Jones, Ed Oliver) being
      rewarded ("RED LIPS") for siding with this removal against veterans.


      KEY ENTITIES:

      - Kent Davis (ADVA Commissioner / Former Admiral)

      - Kimberly Boswell (Dept of Mental Health Director)

      - Kay Ivey (Alabama Governor)

      - Tom Albritton (Ethics Commission Director)

      - Greg Albritton (State Senator)

      - Andrew Jones (State Senator, RED LIPS Award winner)

      - Ed Oliver (State Representative, RED LIPS Award winner)

      - Mabel Amos Trust'
