  tale-of-two-cities:
    brief: 'THE CONFLICT:

      *   City of Gulf Shores Planning and Zoning failed to adhere to Section 3-3E
      of the Zoning Ordinance regarding the Regency Place Apartments Site Plan.

      *   Citizen Rex Lawson pointed out the omission of Section 3-3E, causing the
      City Attorney to advise Mayor Craft.

      *   Gulf Shores City Staff allegedly stopped using the "Land Use Plan" criteria
      when making recommendations to the Planning Commission in 2014, 2015, and 2016.


      THE DISCOVERY:

      *   The Daphne Planning and Zoning Board rejected a request to change the zoning
      on a parcel at the entrance to Daphmont Subdivision.

      *   The developer claimed doubt about developing the balance of property due
      to grade issues (built in a gully/sand pit).

      *   The Daphne Planning and Zoning Board rejected the request and recommended
      the Daphne City Council do the same.

      *   Fairhope and Daphne Planning and Zoning boards operate independently without
      communicating on decisions that impact each other municipalities.


      THE PIVOT:

      *   Article 2 demonstrates a parallel pattern of local planning bodies (Daphne)
      rejecting community concerns regarding development plans, mirroring the alleged
      intentional disregard for ordinance requirements found in Article 1 (Gulf Shores).

      *   The conflict shifts from regulatory non-compliance by Gulf Shores staff
      to the independent, uncommunicating actions of Daphne and Fairhope planning
      boards impacting neighboring communities.


