  people-power-wake-up-gulf-shores:
    brief: 'THE CONFLICT

      *   City of Gulf Shores Planning and Zoning failed to adhere to Section 3-3E
      ("Findings and Conclusions" of the Zoning Ordinance).

      *   Mayor Robert Craft cited this failure as reason for revisiting the Regency
      Place Apartments Site Plan.

      *   The City Staff allegedly ignored the "Land Use Plan" (LUP) criteria when
      making recommendations to the Planning Commission in 2014, 2015, and 2016.


      THE DISCOVERY

      *   The Gulf Shores City Council is hearing an appeal of the Planning Commission''s
      decision to approve the Regency Place Apartments Site Plan Application on October
      29, 2018.

      *   Opponents cite a 13.8% decrease in property values and potential losses
      exceeding $3,000,000 for properties near the development.

      *   The appeal argues that the Planning Commission''s decision violates Zoning
      Ordinance Article 1 General Provision 1-3 regarding neighborhood character (DUPA
      change from 8.1 to 20.6).


      THE PIVOT

      *   Article 2 provides the specific legal violations and quantified negative
      impacts (property value loss, zoning consistency) that directly prove the systemic
      procedural failures of the City/Planning Commission detailed in Article 1.

      *   The appeal highlights how failing to consider the LUP criteria (as mentioned
      in Article 1''s "Secret #2") led to an approval that violates zoning law and
      harms residents.


      KEY ENTITIES

      *   Andy Bauer (Director of Planning and Zoning)

      *   Mayor Robert Craft

      *   Rex Lawson

      *   City Attorney

      *   Planning Commission

      *   Regency Place Apartments Site Plan Application

