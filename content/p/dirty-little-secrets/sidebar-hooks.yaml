  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT:

      *   City of Gulf Shores Planning and Zoning failed to adhere to Section 3-3E
      "Findings and Conclusions" of the Zoning Ordinance regarding the Regency Place
      Apartments Site Plan.

      *   Mayor Robert Craft cited this failure as a "technical deficiency."

      *   City Staff ceased using the "Land Use Plan" criteria in recommendations
      to the Planning Commission during 2014, 2015, and 2016.

      *   The City Council endorsed the Fly Creek Apartments project in October 2016.


      THE DISCOVERY:

      *   The trial over the Fly Creek Apartments development revealed that the proposed
      drainage plan calls for a single point discharge from the outfall pipe, detouring
      the current 1 acre retention pond and omitting expansion to a 5 acre pond.

      *   This new plan will dump excess stormwater directly into wetlands, draining
      into Fly Creek approximately 100 to 150 feet from the outfall pipe combined
      with Publix construction drainage.


      THE PIVOT:

      *   Article 2 provides the physical environmental consequence (the flawed drainage
      plan and resulting wetland discharge) that stems directly from the planning
      and zoning failures detailed in Article 1 regarding adherence to ordinances
      and Land Use Plan criteria.


