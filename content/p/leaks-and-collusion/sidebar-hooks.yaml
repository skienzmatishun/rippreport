  investigations:
    brief: 'THE CONFLICT:

      * GOB establishment in Fairhope has controlled local government for over 40
      years.

      * Specific financial issues include a sewer contract increasing from $10 million
      to $13 million without addressing infrastructure and the Triangle lawsuit ($11.25
      million, $3 million in attorney fees) settled by a past council including Jack
      Burrell and LLC bee (unnamed).

      * Council members are maneuvering politically to replace Mayor Wilson with Jack
      Burrell.


      THE DISCOVERY:

      * City Council members Burrell, Boone, and Brown met secretly at Bone and Barrel
      restaurant immediately following a council meeting Monday night, violating open
      meetings rules.

      * The Widget Article explicitly lists "investigate GCN and the Courier" as one
      of six demands for an investigation into who is leaking city documents to the
      press.


      THE PIVOT:

      * Main Article 1 alleges confidential City Hall information/HR leaks are being
      sent to Gulf Coast News (GCN).

      * Widget Article 2 reveals that the specific council members mentioned in relation
      to the political push against Mayor Wilson (Burrell, Boone, Brown) were caught
      meeting secretly and actively demanding an investigation into GCN''s leaking
      activities.


      KEY ENTITIES:

      * Jack Burrell

      * Mayor Wilson

      * Boone

      * Brown

      * Fairhope City Council

      * Gulf Coast News (GCN)

      * The Courier / Gulf Coast Courier

      * Catalyst

      * Bone and Barrel restaurant'
