hooks:
  pandoras-box:
    brief: 'THE CONFLICT:

      * Fairhope City Council has been controlled by "GOB’s" for over 40 years.

      * Historical corruption includes past mayors leaving office under a cloud of
      scandal (specifically noted twice in 2018 and 2023).

      * A former administrator, Gregg Mims, reportedly formed the "BOB club," a secret
      group aimed at overthrowing the previous administration.

      * The current conflict centers on legal action initiated by an HR director who
      filed a $100,000 lawsuit against the city for alleged assault, and the wrongful
      termination of Sherry Sullivan.


      THE DISCOVERY:

      * Article 2 details that the negative consequences ("opening Pandora’s box")
      are specifically tied to the HR director''s $100,000 lawsuit and the firings
      of Sherry Sullivan and Jennifer Fidler.

      * The second article reveals specific corruption involving Jack Burrell and
      Joe McEnermy (Chairman, Airport Authority) regarding an "airport scandal" where
      board members remained silent on facts.

      * It highlights a council dynamic where new members Conyers, Brown, and Robertson
      support the HR director/Sullivan while opposing Mayor Wilson.


      THE PIVOT:

      * Article 1 states confidential city information is being leaked via spyware
      from employees'' computers to Gulf Coast News.

      * Article 2 provides the specific names (HR Director, Sherry Sullivan, Jennifer
      Fidler) and legal events ($100k suit, firings) that constitute the source of
      the "dirt" and publicly available information described as escaping the city—the
      very content leaked in Article 1.


      KEY ENTITIES:

      * Fairhope City Council / Mayor Wilson

      * Jack Burrell (Council President/Mayor candidate)

      * Joe McEnermy (Chairman, Airport Authority)

      * HR Director (Plaintiff in $100k suit)

      * Sherry Sullivan (Wrongful termination claimant)

      * Jennifer Fidler (Witness for HR director; former Fairhope Staff)

      * Diana Brewer (Former Councilwoman; supported Corte Apartments/destruction
      of wetlands)

      * Gregg Mims (Former administrator who formed BOB club)

      * Conyers, Brown, Robertson (Junior councilmen)'
