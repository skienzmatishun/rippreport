      Lawyers, LLC.

      *   The purpose of this engagement was professional legal services regarding
      the case *Charles K/ Breland, Jr. V. The City of Fairhope, Alabama*, CV-2013-901096.

      *   This lawsuit had been ongoing for approximately 11 years prior to the resolution
      being passed by the council in 2018.


      THE DISCOVERY

      *   Confidential city and Human Resources (HR) information is currently leaking
      from Fairhope City Hall employees to Gulf Coast News via internal networks/city
      computers.

      *   The HR director—who was seeking $100,000 for alleged assault—has been observed
      playing games on her computer during city meetings.


      THE PIVOT

      *   The 2018 resolution confirms that City Hall resources (legal funds and representation
      via Comer Lawyers) were used extensively to pursue a prolonged, non-standard
      legal dispute involving Charles K/ Breland, Jr., demonstrating prior patterns
      of using official government infrastructure for personal or protracted conflicts.
