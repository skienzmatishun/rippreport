  secret-society:
    brief: "THE CONFLICT: \n* Established political control in Fairhope by a \"GOB\"\
      \ status for over 40 years.\n* Operation of CATALYST, described as a political\
      \ cabal involving politicians, developers, judges, and lawyers operating in\
      \ Baldwin County/Fairhope.\n* Transition of the organization from CATALYST to\
      \ Scott Boone Consulting (SBC) during the 2020 election cycle.\n* January 25,\
      \ 2021: Fairhope City Council agenda included an ordinance for annexation of\
      \ Parker Road (from U.S. Highway 98) by Baldwin County Commission, linked to\
      \ the completion of the Publix project and benefits to SBC developers.\n\nTHE\
      \ DISCOVERY: \n* Scott Boone Consulting (SBC), founded by Kevin Boone's son,\
      \ functions as the central headquarters of a political secret society that holds\
      \ control over Fairhope City Council.\n* SBC used its influence to appoint loyalists\
      \ to key positions in Fairhope governance, including a Municipal Judge and City\
      \ Attorney.\n* The cabal successfully manipulated city assets and personnel,\
      \ specifically by firing the Utilities Director (a certified engineer) and installing\
      \ an inexperienced Mayor.\n\nTHE PIVOT: \n* Article 2 reveals that the \"collusion\"\
      \ described in Article 1 is not random employee malfeasance but a systemic function\
      \ of the political organization SBC.\n* SBC controls city appointments, legal\
      \ counsel (Hand Anderall Sale), infrastructure projects (Waterfront Project\
      \ alteration, Parker Road annexation), and influences local narratives via figures\
      \ like Jack Burrell, demonstrating how the established status quo operates through\
      \ a powerful, concealed network.\n\nKEY ENTITIES: \n* Fairhope City Council\
      \ / City Hall\n* Gulf Coast News\n* CATALYST / Scott Boone Consulting (SBC)\n\
      * Kevin Boone (Councilman)\n* Mayor Cant\n* Jack Burrell\n* Hand Anderall Sale\
      \ (Law Firm)\n* Baldwin County Commission\n* Parker Road / U. S. Highway 98\n\
      * Utilities Director\n* Publix"
