      authority and drive her out of office through bullying and obstruction tactics.

      *   Past employees, such as Sherry Sullivan, sued the city, which was used by
      Burrell to orchestrate events (e.g., Police Chief Pettis''s retirement) for
      political purposes.

      *   Burrell supported the City Council in maintaining control over the Fairhope
      Airport and its title via the Airport Authority.

      *   Burrell engaged in sweetheart deals, including accepting free jet transportation
      and supporting developers of Fly Creek Apartments by accepting gifts (wetlands/drainage).


      THE DISCOVERY

      *   The Fairhope City Council was sued in Federal court for denying public speech;
      the city lost and paid thousands in attorney fees.

      *   Jack Burrell has consistently denied public accountability regarding actions
      related to the Fairhope Airport Authority, refusing to hold meetings public
      or provide records ("No Radar").

      *   Burrell has a history of making poor decisions that cost Fairhope millions
      due to his lack of oversight.


      THE PIVOT

      *   Article 1 details Burrell''s methods of using legal challenges and internal
      conflicts (fired employees, lawsuits) to maintain power and suppress information.

      *   Article 2 reveals the specific mechanism—the systematic denial of public
      participation and transparency ("No Radar") regarding the Airport Authority
      meetings—which demonstrates how Burrell executes his pattern of suppressing
      information described in Article 1.


