      through bullying and harassment immediately after being sworn in.

      *   Past employees sued the city, and cases were sealed to hide the truth behind
      firings.

      *   Police Chief Sherry Sullivan was fired/retired after 36 years of service.

      *   Burrell secured sweetheart deals related to Fairhope Airport and accepted
      gifts/free jet transportation while serving on the Airport Board.


      THE DISCOVERY

      *   Chucky Cheeze and Jack Burrell are actively promoting support for lawsuits
      seeking $100,000 from the city of Fairhope.

      *   Councilmen Boone Burrell and Brown explicitly supported Sherry Sullivan
      and encouraged current employee Pandora Heathcoat to file a lawsuit.

      *   The council is taking responsibility for making firings "much more than
      what they were" by supporting these legal actions.


      THE PIVOT

      *   Article 2 reveals that the primary method of Burrell''s obstruction (mentioned
      in Article 1) is not just general harassment, but a coordinated effort through
      Councilmen to support specific employee lawsuits and financial claims against
      the city.

      *   The explicit connection between Burrell’s political power and his backing
      of legal actions against the city constitutes the "smoking gun" proving he used
      the council structure to silence critics.


