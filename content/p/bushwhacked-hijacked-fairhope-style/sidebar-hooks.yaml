      *   Employees Fiddler and Sullivan were fired, and the Council imposed a hiring
      freeze.

      *   Allegations against the HR Director regarding an alleged assault by the
      Mayor were allegedly kept secret for months.

      *   Judge Snedeker was scheduled to be sworn in immediately without public comment.


      THE PIVOT:

