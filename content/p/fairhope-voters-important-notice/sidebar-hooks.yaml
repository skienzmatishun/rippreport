  back-stabber:
    brief: 'THE CONFLICT

      *   Political tension existed between Mayor Karin Wilson and members of the
      City Council who allegedly sought to undermine her administration (Article 1).

      *   Councilmen Boone and Burrell were identified as slowing down city business
      and opposing the mayor''s agenda, supported by a political group called Catalyst
      (Aug. 11, 2014 – present) (Article 1).

      *   The City Council was accused of allowing "personal friendships" to take
      precedence over city issues (Article 1).


      THE DISCOVERY

      *   A Special Called City Council meeting was scheduled for September 4, 2018,
      at 4:00 p.m., prior to a regular budget work session at 4:30 p.m. (September
      4, 2018) (Article 2).

      *   The purpose of the meeting was "Resolution to Authorize the Council President
      [Jack Burrell] to execute a Real Estate Purchase Agreement for properties owned
      by the Baldwin County Board of Education" (BCBE) (September 4, 2018) (Article
      2).

      *   Mayor Karin Wilson criticized this process as inappropriate and rushed because
      it occurred after hours on a Friday before Labor Day, without public participation
      or a feasibility study (August 31, 2018) (Article 2).


      THE PIVOT

      *   Article 2 serves as concrete proof of Article 1’s claim that Council President
      Jack Burrell and the City Council were engaging in anti-democratic actions.

      *   The approval of a $XX million real estate deal for BCBE properties (K-1
      Center, Nix Center land, etc.) was attempted through a rushed, non-publicly
      participated resolution executed under the leadership of Council President Jack
      Burrell in 2018.


      KEY ENTITIES

      *   Fairhope City Council

      *   Mayor Karin Wilson

      *   Councilman Michael Scott Boone (Boone)

      *   Councilman Jack Burrell (Burrell)

      *   Catalyst Associates / Catalyst

      *   Baldwin County Board of Education (BCBE)

      *   Lisa A. Hanks (MMC)'
    generated_at: '2026-07-18T06:10:24.470950Z'
  fairhope-voters-guide:
    brief: "THE CONFLICT\n*   In 2016, incumbent Mayor Timothy Kant was defeated by\
      \ Karin Wilson in a historic election for Fairhope, overseen by the Alabama\
      \ Secretary of State's Office due to prior complaints regarding voting tampering\
      \ (2008, 2012).\n*   Following the 2016 mayoral defeat, the City Council was\
      \ populated primarily by individuals selected by the previous administration\
      \ and described as having loyalty to \"the building and development industry.\"\
      \n*   Catalyst Associates—a political group/network founded around 2017/2018\
      \ (Formed Aug. 11, 2014)—has historically served as a machine for electing candidates\
      \ (claiming 100% success until the election of Mayor Wilson).\n\nTHE DISCOVERY\n\
      *   Article 2 confirms specific corruption and misuse of office by Councilmen\
      \ linked to Catalyst:\n    *   Jack Burrell: Served eight years as Council President;\
      \ faces allegations of bid rigging, lying about the Triangle lawsuit, purchasing\
      \ $2.65 million in recreational farmland, and failing to disclose a police record\
      \ prior to election. He has actively attempted to undermine Mayor Wilson’s authority\
      \ (\"was going to drive the Mayor nuts\").\n    *   Robert Brown: Landed public\
      \ contracts for close to one million dollars (concession building at soccer\
      \ fields; Fairhope Art Center contract) while serving four years on City Council.\
      \ An ethics complaint regarding personal gain was filed with the Alabama Attorney\
      \ General.\n    *   Kevin Boone: Is connected through his son, Scott Boone (head\
      \ of Scott Boone Consulting), who is linked to \"Strawman fraud\" and numerous\
      \ LLC schemes related to development that Kevin Boone voted upon.\n\nTHE PIVOT\n\
      *   Article 1 identifies Catalyst Associates as a shadowy entity hiding the\
      \ efforts of Councilmen Boone and Burrell to grind Mayor Wilson to a halt using\
      \ anonymous tactics like the \"Baldwin Insider\" blog and manufactured recall\
      \ petitions (<300 signatures).\n*   Article 2 validates these accusations by\
      \ naming the specific mechanisms of control: detailed instances of financial\
      \ corruption (Robert Brown's $1M contracts), systemic political manipulation\
      \ (Jack Burrell’s eight-year grip on power/attempt to replace the mayor), and\
      \ documented conflicts of interest involving related LLC schemes (Kevin Boone).\n\
      \nKEY ENTITIES\n*   Karin Wilson (Mayor)\n*   Kevin Boone / Michael Scott Boone\
      \ / Coley M. Boone (Councilman, Manager, Registered Agent for Catalyst Associates)\n\
      *   Jack Burrell (Council President/Member)\n*   Robert Brown (Councilman)\n\
      *   CATALYST Associates (Political organization; linked to Elliott, Haygood,\
      \ and Stacy)\n*   Scott Boone Consulting (Associated with Scott Boone)\n*  \
      \ Paul Ripp (Lawsuit filer; vindicated by federal court against the City \"\
      CATALYST\" council regarding free speech violations)\n*   Joshua Gammon / Deb\
      \ Hopkins / Howell Gibbens (Challenger candidates)\n*   Timothy Kant (Previous\
      \ Mayor, defeated in 2016)"
    generated_at: '2026-07-18T06:10:24.470956Z'
  fairhope-council-shows-its-colors:
    brief: '**THE CONFLICT**

      - Dispute between Fairhope City Council and Mayor Karin Wilson regarding city
      governance.

      - Councilmen Coley M. Boone and Michael Scott Boone were associated with Catalyst
      Associates since 2014, an organization linked by Article 1 to influencing council
      decisions.

      - Council members have allegedly obstructed the mayor’s hiring choices for boards
      (e.g., Airport Authority) and delayed budget approvals.


      **THE DISCOVERY**

      - More than 800 Fairhope citizens successfully submitted a petition that was
      accepted as valid by the probate judge, based on Alabama Constitution requirements
      (ten percent threshold).

      - This legal acceptance triggered a mandatory period requiring an election for
      the item proposed in the petition (a change in government form from Council
      to Manager).

      - The scheduled special election date of October 2nd for the Council-Manager
      form was delayed until November 6th by the Judge of Probate’s office.


      **THE PIVOT**

      - Article 1 focuses on political maneuvering, accusations of undue influence
      via Catalyst, and attempts by a small council faction to grind the mayor to
      a halt using minor recall/petition tactics.

      - Article 2 provides the legal reality that an overwhelming grassroots citizen
      movement bypassed the city council’s procedural control through established
      Alabama Constitutional petition laws, forcing a change in electoral timelines
      regardless of the Council''s opposition.


      **KEY ENTITIES**

      - Fairhope City Council (Boone, Burrell)

      - Catalyst Associates

      - Coley M. Boone

      - Michael Scott Boone

      - Mayor Karin Wilson

      - Judge of Probate'
    generated_at: '2026-07-18T06:10:24.470962Z'
