      *   A hiring freeze was imposed to punish the mayor.

      *   Catalyst is accused of discrediting the Mayor through efforts like the "Baldwin
      Insider" blog.


      THE DISCOVERY

      *   Municipal elections were postponed in 2024 by the Alabama legislature.

      *   Council members and officials now receive a "free year" in office without
      a vote.

      *   Infrastructure projects (sewer plant, sewer projects approved in 2020) have
      been uncompleted for three years, leading to water shortages.

      *   Public participation rights are reduced: non-elected officials only receive
      3 minutes to address the council regarding agenda items or non-agenda issues.


      THE PIVOT

      *   Article 2 proves that the political maneuvering and power struggles described
      in Article 1 occur within a system where elections are deliberately delayed
      (postponed in 2024) and public accountability is curtailed (free year, reduced
      free speech). This shows how systemic structural changes enable the established
