  fairhope-council-shows-its-colors:
    brief: 'THE CONFLICT:

      *   Councilmen Boone and Burrell are slowing down city business.

      *   Catalyst Associates was formed Aug. 11, 2014, with Michael Scott Boone,
      Lynn Stacey, and Coley M. Boone involved.

      *   The City Council is attempting to undermine Mayor Wilson through hiring
      freezes and rejecting her choices for the Airport Authority board.

      *   A petition to recall the Mayor had fewer than 300 signatures.


      THE DISCOVERY:

      *   The City Attorney is acting on instructions from the Catalyst Council, representing
      the City Council instead of citizens or the Mayor.

      *   More than 800 Fairhope citizens signed a petition accepted by the probate
      judge under Alabama Constitution 800-plus.

      *   This action triggered a 90-day period requiring an election for the item
      stated on the petition.

      *   The threshold for citizen petitioning is "ten percent of those who voted
      in the most recent local election."

      *   Mayor Karin Wilson’s special election for Council-Manager form of government
      (scheduled 10/2) has been delayed until the general election on 11/6 by the
      Judge of Probate.


      THE PIVOT:

      *   Article 2 reveals that the City Council''s actions are being countered by
      a constitutional process allowing citizens to bypass the council and force an
      election through petitioning, which directly impacts the Council''s ability
      to control the outcome mentioned in Article 1.


