  good-ole-boys-alive-and-well:
    brief: 'THE CONFLICT

      *   Councilmen Boone and Burrell are slowing city business.

      *   Catalyst Associates was formed on August 11, 2014 (Managers: Michael Scott
      Boone, Lynn Stacey; Registered Agent: Coley M. Boone).

      *   The council rejected the Mayor''s choices for the Airport Authority board
      appointments.

      *   A hiring freeze was imposed to punish the mayor after firings of two employees.


      THE DISCOVERY

      *   Resolution 2606-16, regarding the city accepting the deed of property for
      the sewer lift station from Angelo A. Corte, was recorded.

      *   Councilman Burrell presided over the meeting and reviewed details of Resolution
      2606-16 before October 24th.

      *   Burrell failed to notice that no map was included with Exhibit A of the
      resolution, although a courthouse copy contains two maps showing the "gift."

      *   The city received three plus acres of wetlands located at the Publix site,
      which is the location for the outfall pipe from the retention pond.


      THE PIVOT

      *   Article 2 provides specific evidence (the detail regarding Resolution 2606-16
      and the property deed/map oversight) that details how Councilmen Burrell and
      Boone participated in a key decision affecting city assets, linking them directly
      to the activities mentioned in Article 1.


