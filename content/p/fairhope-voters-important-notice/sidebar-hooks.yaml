  FAIRHOPE-FREE-YEAR:
    brief: 'THE CONFLICT:

      * Councilmen Coley M. Boone and Jack Burrell are accused of undermining Mayor
      Wilson’s authority and obstructing city business in Fairhope.

      * Catalyst Associates, formed Aug 11, 2014 (managed by Michael Scott Boone and
      Lynn Stacey), is identified as the shadow group supporting these actions.

      * This effort allegedly involves Elliott Haygood, who was a member of the political
      machine Catalyst.


      THE DISCOVERY:

      * The City Council and Mayor Wilson have experienced "free years" in office
      without being elected or appointed (due to postponement of 2024 municipal elections).

      * Fairhope City Council is amending its Rules of Procedure by removing public
      participation for non-agenda items, limiting citizen input strictly to agenda
      topics.

      * Francis Paul Ripp successfully sued Jack Burrell (Council President) in U.S.
      District Court for the Southern District of Alabama; settlement funds were used
      specifically to support The Ripp Report’s ongoing efforts.


      THE PIVOT:

      * Article 1 alleges self-serving politicians and "dirty tricks"; Article 2 proves
      this pattern through a formal legal battle (Ripp v. Burrell) confirming active
      opposition by Council President Jack Burrell against the reporter.

      * Article 2 reveals that the council is actively restricting democratic participation
      rights while enjoying un-elected terms, providing concrete evidence of the systemic
      obstruction mentioned in Article 1.


      KEY ENTITIES:

      * Coley M. Boone (Councilman/Registered Agent for Catalyst Associates)

      * Jack Burrell (Council President / Subject of lawsuit Ripp v. Burrell)

      * Michael Scott Boone (Manager of Catalyst Associates; son of Coley M. Boone)

      * Mayor Wilson (Target of obstruction efforts)

      * Catalyst Associates (Political organization formed Aug 11, 2014)

      * Elliott Haygood (Linked to political machine/Catalyst origins)

      * Francis Paul Ripp (Lawsuit filer / Author of The Ripp Report)

      * Fairhope City Council'
