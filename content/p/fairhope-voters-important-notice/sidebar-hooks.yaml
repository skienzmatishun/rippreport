hooks:
  recuse-yourself:
    brief: 'THE CONFLICT

      *   The City Council was influenced by the minority to ignore the majority and
      pursue falsehoods regarding the airport scandal.

      *   Councilmen Boone and Burrell were slowing down city business against the
      mayor.

      *   Catalyst Associates was formed on Aug. 11, 2014, involving Michael Scott
      Boone and Lynn Stacey as managers and Coley M. Boone as registered agent (son
      of Councilman Boone).


      THE DISCOVERY

      *   Councilman Boone has numerous LLCs creating conflicts of interest requiring
      investigation.

      *   Mr. Boone is directly related to Catalyst, which represents a political
      group linked to previous election outcomes.

      *   Mr. Boone had business interests with Angelo Corte and Preble-Rish that
      he failed to disclose prior to being elected.

      *   Council members ignored conflicts of interest when voting on the extension
      of the sunset clause related to Fly Creek Apartments.


      THE PIVOT

      *   Article 2 provides specific evidence (Boone''s documented conflicts and
      undisclosed interests) that explains *how* Councilmen Boone and Burrell are
      undermining the mayor mentioned in Article 1, linking their political actions
      to proven ethical violations.


