  catalyst-central:
    brief: 'THE CONFLICT:

      - Lynn Stacy, a deceased political power broker in Fairhope, partnered with
      Chris Elliott and Dane Haygood forming "Stacy, Haygood and Elliott."

      - Partner Chris Elliott became Baldwin County Commissioner; Dane Haygood became
      Mayor of Daphne.

      - Partnership dissolved after Stacy’s death but political machinery continued
      as "CATALYST" managed by Scott Boone.

      - 2018 Baldwin County midterm: Catalyst-backed candidates invaded the race to
      maintain "good ole boys" control.

      - During a pandemic and hurricane season, Robin LeJeune ran for Mayor of Daphne
      runoff against the Catalyst-backed candidate from "Scott Boone Consulting."

      - LeJeune won by over 1,000 votes.


      THE DISCOVERY:

      - Scott Boone is confirmed as Catalyst’s new manager and son of Fairhope Councilman
      Kevin Boone.

      - Baldwin County Commissioners Joe Davis (Catalyst aligned) and Jeb Ball run
      under the Catalyst banner.

      - Commissioned Davis votes in favor of Savannah Estates project (392 houses)
      despite two disapprovals by city and county engineers.

      - Savannah Estates project is located near a new school on 54 E; residents are
      unnotified and engineers opposed it.

      - Fairhope City Council, Municipal Judge, and City Attorney are appointed by
      Catalyst-aligned figures to support developer interests.


      THE PIVOT:

      - Article 1 identifies "Scott Boone Consulting candidate" as the defeated enemy
      of LeJeune in Daphne; Article 2 reveals Scott Boone is Catalyst’s manager and
      developer conduit.

      - Article 1 highlights LeJeune choosing infrastructure; Article 2 confirms Catalyst
      (Boone) pushes growth on Savannah Estates without infrastructure (no sewer regs
      in Baldwin County).

      - Article 2 proves Joe Davis and Jeb Ball are actively voting for developments
      that contradict public will, validating the "Catalyst" machine running Baldwin
      County development.

      - Article 1 notes LeJeune defeated "developers'' favorite candidate"; Article
      2 identifies CATALYST as the organization supported by those same developers.


      KEY ENTITIES:

      - Robin LeJeune (Mayor of Daphne)

      - Scott Boone (Catalyst Manager/2018 Candidate in Daphne)

      - Kevin Boone (Fairhope Councilman, Father of Scott)

      - Dane Haygood (Daphne Mayor/Former Partner)

      - Chris Elliott (Baldwin County Commissioner, Former Partner)

      - Joe Davis (County Commissioner, Catalyst aligned)

      - Jeb Ball (County Commissioner, Catalyst aligned)

      - Savannah Estates (Contested Development Site)

      - Stacy, Haygood and Elliott (Former political firm)'
