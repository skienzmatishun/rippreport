hooks:
  ALABAMA ETHICS COMMISSION HIDE THE LIST:
    brief: 'THE CONFLICT:

      Tom Albritton serves as Executive Director of the Alabama Ethics Commission
      AND is a trustee of the Mabel Amos Scholarship Trust.

      Mabel Amos Trust grew from $500,000 to $4.1 million by 2011 after oil discovered
      on trust land in 2010.

      Oil well yielded approx $100 million total, expected to yield millions more.

      Between 2013 and 2021, approx $3.2 million awarded to recipients who remain
      anonymous.

      Trustees (including Albritton and Rick Clifton) awarded themselves approx $135,000
      to send children to University of Texas.

      Regions Bank trustee took approx $1 million for inflated services.

      The Ripp Report filed >100 page complaints to the Alabama Bar and Ethics Commission;
      both dismissed all allegations.

      Lawsuit over Albritton’s conduct resulted in Allen Dodd being appointed Deputy
      Alabama Attorney General.


      THE DISCOVERY:

      Second article confirms plaintiffs'' demand for public release of names of those
      receiving >$3.2 million scholarships between 2013 and 2021.

      Second article cites *Lawrence v. State* (Cr-04-1864-0) where AG Marshall’s
      office admitted a deal between the AG and Regions Bank was reached to make the
      trust whole.

      Second article reveals specific direct contacts to pressure the AG: Amanda Priest
      and Cameron Mixon (AG Communications), 334-322-5694.

      Second article highlights that State Rep Matt Simpson (Ethics and Finance committee
      chair) and Governor Kay Ivey have remained silent regarding the list of beneficiaries.


      THE PIVOT:

      Article 2 functions as a legal pressure tool using *Lawrence v. State* to connect
      Article 1’s fraud claims to statutory Attorney General oversight duties.

      The reference to the case proves that since AG Marshall oversaw a deal to "make
      the trust whole," they must justify releasing the names of recipients, directly
      challenging their silence.

      It converts internal complaints into a specific action item: Use the phone numbers
      to demand transparency on the 3.2M dollar list citing AG Marshall’s past acknowledgment
      in *Lawrence v. State*.


      KEY ENTITIES:

      Tom Albritton, Francis Paul Ripp, Mabel Amos Scholarship Trust, Attorney General
      Steve Marshall, Allen Dodd, Megan Carmack, Regions Bank, Rick Clifton, Matt
      Simpson, Kay Ivey.'
