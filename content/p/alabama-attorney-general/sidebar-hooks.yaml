  TOP-TO-BOTTOM-CORRUPTION:
    brief: '1. THE CONFLICT

      - Tom Albritton and Rick Clifton were attorneys at the Albritton Law Firm in
      Andalusia when Mabel Amos established a trust via her will.

      - Original trust value was approximately $500,000 with few small scholarships
      awarded early on.

      - In 2010–2011, oil discovered on trust land (Conecuh County).

      - Trust value ballooned to $4.1 million by 2011 and expected to produce millions
      more from oil revenues.

      - Shortly after 2013, Albritton’s two children received $120,000–$135,000 in
      tuition for University of Texas.

      - Regions Bank took over $1 million in fees managing the trust.

      - Albritton became Executive Director of Alabama Ethics Commission concurrent
      with these payouts.

      - Francis Paul Ripp (The Ripp Report) filed 100-page complaints with the Alabama
      Bar and Ethics Commission alleging fraud/self-dealing.

      - All Ripp complaints dismissed; two mandamus motions never received a hearing.


      2. THE DISCOVERY

      - Lagniappe Mobile (Jul 15, 2023) confirms Albritton law firm attorneys became
      board members immediately after Amos died.

      - Lagniappe confirms Albritton kids received $120,000 in UT tuition; labels
      this "self-dealing," which is forbidden by trust language.

      - Confirms Regions Bank officer John Bell served as trustee alongside Albritton
      and Clifton.

      - Tyra Lindsey (10th grade, Hillcrest High School) petitioned to join the lawsuit
      representing scholarship students.

      - Lindsey’s attorney, Byron Mathews Jr., requested forced disclosure of recipient
      names (stopped being listed in IRS filings since 2014).

      - Allen Dodd appointed Deputy AG of Alabama following the lawsuit that Marshall
      initiated.


      3. THE PIVOT

      - Article 2 proves AG Steve Marshall officially accused Albritton of fraud and
      self-dealing in a motion to join the case.

      - Article 2 reveals Marshall’s hypocrisy: AG accused him of crime but refused
      to criminally investigate or prosecute.

      - Article 2 proves political maneuvering: Marshall’s office moved to dismiss
      Lindsey from the case (Ripp claims Marshall receives campaign cash from Regions,
      and Mathews filed motions exposing Marshall’s conflicts).

      - Article 2 confirms AG Marshall has standing to jail trustees for fraud, but
      chooses procedural delays and alliances with Regions lawyers over enforcement.


      4. KEY ENTITIES

      - Francis Paul Ripp (The Ripp Report)

      - Steve Marshall (Alabama Attorney General)

      - Tom Albritton (Ethics Director / Trustee / Defense for himself and Clifton)

      - Rick Clifton (Trustee)

      - Tyra Lindsey (High School Student / Representative of Eligible Applicants)

      - Allen Dodd (Deputy Alabama Attorney General)

      - Regions Bank (Trustee / Managed the $1M in fees)

      - Mabel Amos Memorial Fund / Trust (Central financial asset)

      - Byron Mathews Jr. (Attorney for Tyra Lindsey / Megan Carmack family member
      attorney in separate context)

      - John Bell (Regions Bank Officer/Trustee)'
