      *   BP Restore Act Funds: Funding mechanism being utilized for controversial
      restoration projects/lawsuit settlements in Baldwin County.

      *   Thompson Engineering: Developer of the Flawed "Fly Creek Watershed Restoration
      Project" study; noted for past large project failures (Perdido Pass).

      *   City of Fairhope/Fairhope City Council: Government entity accused of violating
      open meeting rules and settling lawsuits without public input.

      *   The Ripp Report / Francis Paul Ripp: Investigative body documenting alleged
      political and judicial corruption in Baldwin County, focusing on Fly Creek.'
