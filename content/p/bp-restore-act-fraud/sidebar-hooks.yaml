      *   It identifies Mayor Tim Kant as central to a broader "plan" involving Arthur
      Corte (his sidekick/partner).

      *   It names Thompson Engineering as another developer favored by Kant, responsible
      for the non-publicly approved "Triangle Nature Trail Park."


      THE PIVOT:

      *   Article 1 alleges that the city suffered massive financial loss ($3 million
      attorney fees; $5.75 million loan) due to lack of public input regarding a lawsuit
      settlement (The Triangle).

      *   Article 2 is the ''smoking gun'' because it provides the specific total
      cost ($11.25M), details where those funds came from (utility reserves, debt,
