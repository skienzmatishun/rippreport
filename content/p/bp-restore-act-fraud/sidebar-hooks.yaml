hooks:
  what-triangle-lawsuit-details:
    brief: '**THE CONFLICT:**

      *   A legal dispute regarding the Triangle Lawsuit against the City of Fairhope.

      *   The city entered into a conditional settlement involving the Triangle Property
      and the Dyas Family’s land.

      *   Authorization for this $12.5 million expenditure was requested on April
      8, 2013, by Councilman Ford, via an addendum to the agenda that lacked public
      notice or participation.

      *   No public hearing occurred prior to a settlement agreement reached in December
      (year unspecified but referenced alongside April 2013 events).


      **THE DISCOVERY:**

      *   The Fly Creek Watershed Restoration Project is being used as a vehicle for
      fraudulent BP Restore Act funds ($22,000,000 total).

      *   Article 2 reveals that $3 million was spent on attorney fees (Hand-Arendall/Cain
      O''Rear) to resolve the Triangle Lawsuit.

      *   The settlement involves conditional use clauses; Article 2 claims the final
      agreement allows for commercial/industrial use, contradicting public claims
      and council assertions.

      *   The Fly Creek Watershed Restoration Plan was developed by Thompson Engineering
      but is a "cut-and-paste" document that omits critical facts: it fails to identify
      specific watershed problems and conveniently hides damage caused by Arthur Corte’s
      development of the Publix supermarket (red clay contamination).


      **THE PIVOT:**

      *   Article 1 alleges deception regarding BP Restore Act funds, focusing on
      Thompson Engineering''s study omissions. Article 2 provides the FOIA evidence
      confirming a hidden $12.5 million settlement related to the Triangle Property/Dyas
      Lawsuit was deliberately kept from the public to fund this deceptive "Fly Creek"
      application.

      *   Article 2 proves that the environmental restoration project is not an independent
      civic need but a coordinated ruse utilizing lawsuit funds and misrepresentation
      of Arthur Corte''s private land damage to secure BP Restore Act money for the
      city/Mayor Tim Kant.


      **KEY ENTITIES:**

      *   Arthur Corte (Developer, Land Owner)

      *   Thompson Engineering (Study developer, implicated in past failures)

      *   Hand-Arendall (Attorney firm)

      *   Cain O''Rear (Attorney at Hand-Arendall, involved in the settlement and
      lawsuit)

      *   City of Fairhope (Municipality)

      *   Mayor Tim Kant

      *   Councilman Ford

      *   Trip Pittman

      *   Dyas Family (Lawsuit Plaintiffs)

      *   BP Restore Act'
    generated_at: '2026-07-18T20:36:36.361614Z'
  triangle-lawsuit-settlement-2013:
    brief: 'THE CONFLICT: What happened in the past?

      *   In late 2016/early 2017, Arthur Corte developed a Publix supermarket adjacent
      to Fly Creek.

      *   The development and surrounding private land ownership led to significant
      environmental damage, including "creek full of red clay" and documented watershed
      degradation.

      *   A long-standing lawsuit (Triangle Lawsuit) was filed against the City of
      Fairhope related to this property and contamination.

      *   The City sought BP Restore Act funds through a Fly Creek Watershed Restoration
      Project to settle the Triangle Lawsuit, allegedly utilizing Thompson Engineering''s
      "Study."


      THE DISCOVERY: What does the second article prove or reveal today?

      *   Article 2 confirms Mayor Timothy Kant agreed to purchase the Triangle property
      for $8.7 million, but reveals this price was not the final cost; cumulative
      expense reached at least $11 million (including over $2 million in attorney
      fees).

      *   The deal involves Mayor Kant guaranteeing BP will pay for environmental
      clean-up related specifically to damage caused by Arthur Corte’s Publix Project.

      *   Article 2 reveals that this arrangement lacks accountability, potentially
      forcing taxpayers to cover the costs if BP does not fund it, despite Mayor Kant
      having been summoned to a federal grand jury in Mobile regarding alleged grant
      fraud in the BP boom scandal.


      THE PIVOT: Why is Article 2 the ''smoking gun'' for Article 1?

      *   Article 1 alleges conspiracy and omission of public input regarding a $5.75
      million debt tied to the settlement/project; Article 2 provides the context
      that this financial arrangement was directly linked to shielding Mayor Kant
      from liability while leveraging BP funds for environmental remediation caused
      by Arthur Corte’s private development (the source of the lawsuit).

      *   Article 1 claims the City is using political influence and deceptive documentation;
      Article 2 confirms Mayor Kant was already under federal investigation, providing
      a clear motive for the alleged fraud and deceit detailed in Article 1.


      KEY ENTITIES:

      *   Arthur Corte

      *   Mayor Timothy Kant (Tim Kant)

      *   City of Fairhope / City Council

      *   BP

      *   Thompson Engineering

      *   Triangle Lawsuit / Triangle Property

      *   Dyas Family

      *   Trip Pittman (Senator)

      *   Jeff Sessions (Senator/U.S. Attorney General)

      *   Bradley Byrne (Congressman)'
    generated_at: '2026-07-18T20:36:36.361622Z'
  fly-creek-erosion-and-hidden-development-threats:
    brief: '**BRIDGE BRIEF: BP RESTORE ACT FRAUD**


      **1. THE CONFLICT:**

      *   City of Fairhope applied for BP Restore Act funds using a "nebulous Fly
      Creek Watershed Restoration Project" study developed by Thompson Engineering
      (Main Article).

      *   The city settlement regarding the lawsuit against Fairhope resulted in $5.75
      million debt/down payment to be paid via utility fund and bank loan, lacking
      public notice or input on April 2013 and October 2013 Council meetings (Main
      Article).

      *   Arthur Corte was a landowner and developer whose Publix supermarket caused
      significant red clay damage to the creek watershed. The city allegedly omitted
      this documented damage in its official report (Main Article/Widget Article).

      *   Mayor Tim Kant, Senator Trip Pittman, and Mayor Jeff Sessions were subjects
      of BP fraud investigations related to grant funds for both Titi Swamp and Fly
      Creek (Main Article).

      *   The City settled the Triangle lawsuit after 40 years of denial of projects.
      The secret settlement cost $12 million, involving a city purchase of property
      owned by Corte (Widget Article).


      **2. THE DISCOVERY:**

      *   Article 2 confirms that severe erosion exists behind Publix due to construction.
      Banks have collapsed over 20 feet into the creek, causing log jams and water
      backup (Widget Article).

      *   Arthur Corte is identified as a developer who swayed zoning from "Triangle"
      property to his personal land, despite him not residing in Fairhope. Mayor Kant
      allegedly helped execute this deal (Widget Article).

      *   The city’s proposed $14,700,000 project ("Mobile Bay Preservation and Restoration;
      Lower Fly Creek Reach (?) Project") directly includes the development of 275
      apartments plus 15 townhomes on 40 acres within the fly creek watershed. This
      proposal shares a detention pond with the original Publix shopping center (Widget
      Article).

      *   A complaint was filed in March 2013 for grant fraud against Mayor Kant and
      Senator Pittman involving BP funds, which required grand jury testimony from
      city employees (Widget Article).


      **3. THE PIVOT:**

      *   Article 1 alleges the City of Fairhope’s application for Restore Act funds
      is a "cut-and-paste document" designed to settle old lawsuits while lying about
      environmental damage and violating public participation rules.

      *   Article 2 provides specific, undeniable physical evidence (collapsed banks,
      red clay from Publix) that contradicts the official "Study''s" claims of a flawed
      or incomplete report. It links Mayor Kant directly to facilitating Corte’s zoning
      changes and confirms the city is now leveraging BP funds for new housing developments
      (the "dirty deal") within the damaged watershed, confirming the alleged deception
      regarding project purpose.


      **4. KEY ENTITIES:**

      *   Arthur Corte (Land Owner/Developer)

      *   Thompson Engineering (Study Developer/Failed Project at Perdido Pass)

      *   City of Fairhope Council / Mayor Kant (Tim Kant)

      *   Senator Trip Pittman (Grant Fraud Investigation subject)

      *   BP Restore Act / BP Fraud Investigators

      *   Regency Center

      *   Triangle Property (Former owners denied projects for 40 years, settlement
      $12M).'
    generated_at: '2026-07-18T20:36:36.361628Z'
  fairhope-railroad:
    brief: 'THE CONFLICT

      *   A long-standing lawsuit was pending against Fairhope over Fly Creek land
      issues involving Arthur Corte’s development project (Fly Creek PUD).

      *   The City of Fairhope sought and received funds via the BP Restore Act for
      a "Study" by Thompson Engineering, designed to settle this legal dispute.

      *   Article 1 alleges that the city and Mayor violated open meeting rules during
      the settlement process in April 2013 and October 2013, omitting public input.

      *   The project was initiated under circumstances linked to an $11.5 million
      "triangle lawsuit" mentioned in Article 2.


      THE DISCOVERY

      *   The Fly Creek PUD—which includes the Publix location—has been transformed
      from a planned high-end village concept into a strip center, never fully occupied
      (Article 2).

      *   Development led to severe environmental damage: the project stripped living
      things and removed 1 million worth of trees without collecting any fines/fees.

      *   Red fill and "red mud" were poured into Fly Creek during heavy rains, resulting
      in severely damaged creek navigation and exposed sewer lines. The cost to clean
      this up is estimated at approximately $10 million (Article 2).

      *   The project involved multiple procedural violations: alteration of plans
      without public knowledge, removal of county right-of-way on Parker Road/designated
      buffer areas, and installation of a city-funded sewer lift station specifically
      benefiting the private developer (Arthur Corte) during his land sale.


      THE PIVOT

      *   Article 1 alleges that Arthur Corte’s development caused red clay damage
      but claims the City omitted this fact in the BP Restore Act application''s "Study."

      *   Article 2 confirms that the project was indeed conducted by Arthur Corte,
      resulted in massive amounts of "red fill and mud" being poured directly into
      Fly Creek due to construction/rain, and involved deliberate zoning violations
      (altering plans without public knowledge) that benefit the developer.

      *   Therefore, Article 2 provides the physical evidence—the environmental ruin
      ($10M cleanup required)—that substantiates the claim in Article 1 that the city
      deliberately concealed documented creek damage caused by private development
      to secure BP Restore Act funds and settle legal fees.


      KEY ENTITIES

      *   Arthur Corte (Developer / Land Owner)

      *   Fly Creek PUD (Planned Unit Development)

      *   Publix (Grocery Store/Site location)

      *   Thompson Engineering (Study Developer / Past Boom Project Failure, 2010
      failure)

      *   City of Fairhope City Council

      *   Mayor and Mr. Tim Kant

      *   George Robards (Planning and Zoning involvement)

      *   Parker Road (Location of right-of-way removal/traffic issues)

      *   Titi Swamp (Second threatened lawsuit site)'
