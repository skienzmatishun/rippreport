  dear-congressman-bradley-byrne:
    brief: 'THE CONFLICT:

      *   City of Fairhope applied for BP Restore Act funds using the "Fly Creek Watershed
      Restoration Project" study developed by Thompson Engineering.

      *   This application was allegedly used as a vehicle to settle a long-standing
      law suit against the City and Mayor.

      *   The settlement process involved the Mayor and Council conspiring to omit
      public input, violating open meeting rules (documented occurrences: April 2013
      and October 2013).

      *   Costs associated with this opaque settlement allegedly included $3 million
      in attorney fees and a $5.75 million bank loan/debt withdrawal from utility
      funds.


      THE DISCOVERY:

      *   The Ripp Report alleges the damage to Fly Creek was specifically caused
      by Arthur Corte’s development of a Publix supermarket, contradicting official
      claims of "historic flooding."

      *   Evidence includes CORTÉ refusing access for a sediment analysis (as reported
      by Mr. Herder), followed by testing confirming the creek sediment originated
      from the Publix site.

      *   The Ripp Report alleges collusion between Arthur Corte and Mayor Tim Kant
      regarding Fly Creek Apartments, noting they bypassed public concerns to push
      through rezoning despite 95% local opposition.


      THE PIVOT:

      *   Article 1 claims a settlement process was used deceptively by city leadership;
      Article 2 proves the specific nature of that deception by identifying Arthur
      Corte and Mayor Kant as mutually responsible for both environmental degradation
      (Creek damage) and financial abuse ($11.25 million Triangle Lawsuit).

      *   Both articles tie the alleged misconduct to lack of public notice/participation
      in high-cost settlements (Main Article mentions $3M fees; Widget Article confirms
      the Triangle Lawsuit cost taxpayers $11.25 million, settled by the Mayor who
      omitted notification).


      KEY ENTITIES:

      *   Arthur Corte: Land owner and developer responsible for Publix supermarket
      development at Fly Creek; involved in Triangle Lawsuit settlement with Mayor
      Kant.

      *   Mayor Tim Kant: Municipal leader of Fairhope implicated by The Ripp Report
