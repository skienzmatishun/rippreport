  catalyst-held-back:
    brief: 'THE CONFLICT

      *   Chris Elliott (Catalyst Choice) raised over $500,000 for a Senate Seat salary
      of $42,000.

      *   Elliott claims support from Realtors, Contractors, Road Builders, Nurse
      Anesthetists, and Certified Public Accountants in Baldwin County.

      *   Jeff "Judas" Boyd (People''s Choice) was sold out and is now campaigning
      for Chris Elliott/Catalyst.


      THE DISCOVERY

      *   In the relevant election, Catalyst secured only one race by a significant
      margin.

      *   Catalyst had over $500,000 in funding but only won three races.

      *   People’s Choice had less than $10,000.

      *   Only 24% of registered voters (36,073 out of 150,104) voted in the election
      analyzed by the widget article.


      THE PIVOT

      *   Article 1 presents Elliott''s funding and coalition as a strength; Article
      2 proves that Catalyst''s large funding did not translate into widespread electoral
      success, showing money is not the main factor.

      *   Article 2 demonstrates the limited power of the Catalyst group, proving
      their claims of broad support are undermined by the low voter turnout and narrow
      victories against People''s Choice candidates.


