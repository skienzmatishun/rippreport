      ole boys" to protect the Faux-Hope status quo against progressive leadership
      (Mayor Wilson''s outreach to minority communities), thereby framing political
      action as racially biased self-preservation.


      KEY ENTITIES:

      • Mayor Karin Wilson

      • Mr. Burrell (Council President)

