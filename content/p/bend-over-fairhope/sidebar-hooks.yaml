hooks:
  big-heads:
    brief: 'THE CONFLICT:

      - In February 2018, the City Council of Fairhope held a meeting on Thursday,
      Feb 15, 2018, to approve an ordinance directing the transfer of one acre of
      land to the Fairhope Single Tax Corporation.

      - This property was designated for the Tatumville Subdivision. The proposal
      was introduced at the January 22, 2018 City Council Meeting.

      - On Feb 12, 2018, a public health warning was issued due to an estimated 100,000
      to 200,000 gallons of sewage being discharged into Big Head Gully, Tatumville
      Gully, and Mobile Bay from the Valley Street Lift Station.

      - Public opposition was significant at the time, evidenced by a petition receiving
      over 2,200 signatures objecting to the project.


      THE DISCOVERY:

      - The second article identifies specific conflicts of interest involving multiple
      council members concerning the Single Tax project in 2018 and present involvement.

      - Kevin Boone has ties to Catalyst (which supports obstruction) and recused
      himself from voting on the issue.

      - Robert Brown''s business partner, Cliff Pittman, is a member of the Single
      Tax Board; both are partners in a building company, and Brown served on the
      Art Board where he secured contracts for the Art Museum.

      - Jay Robinson has a professional connection to Michel Upchurch, who serves
      as the treasurer of the Single Tax Corporation.

      - Lee Turner held multiple roles: President of Fairhope Planning and Zoning,
      President of Single Tax, and was described as the "driving salesman" of the
      project.


      THE PIVOT:

      - The second article provides the foundational historical data (2018 dates,
      100,000+ gallon spill, specific legal agenda) that substantiates the accusations
      of corruption and mismanagement raised in the main article (Single Tax interference,
      gully issues).

      - It moves beyond general claims ("council ignored citizens") to name the specific
      individuals responsible for the conflicts described (Boone/Pittman/Brown; Robinson/Upchurch;
      Turner''s multiple roles).


      KEY ENTITIES:

      - Single Tax Corporation / Fairhope Single Tax Plan

      - Big Head Gully / Tatumville Gully

      - Kevin Boone

      - Robert Brown

      - Cliff Pittman

      - Jay Robinson

      - Michel Upchurch

      - Lee Turner

      - Catalyst

      - Valley Street Lift Station

      - Tatumville Subdivision'
    generated_at: '2026-07-18T18:11:37.858038Z'
  fairhopes-triangle-mega-site:
    brief: 'THE CONFLICT

      *   Fairhope City Council allegedly engaged in a prolonged political struggle
      against the Mayor''s office.

      *   Councilman Burrell was accused of leading a plan to "drive the Mayor out
      of office."

      *   The city settled a lawsuit (implied Dyas Lawsuit) involving the Triangle
      property.

      *   Council members Boone and Burrell allegedly handled this settlement without
      public participation, potentially concealing details with former Mayor Kant.


      THE DISCOVERY

      *   Article 2 reveals that the purchase of the Triangle property was to "setle"
      a lawsuit rather than being a voluntary purchase for a city park/conservation
      easement.

      *   The cost of the settlement totaled $11.25 million, plus $3 million in legal
      fees incurred by the City.

      *   Article 2 alleges that Councilman Burrell and Boone used lies regarding
      this purchase to prevent development, while Article 1 mentions they interfered
      with city duties and Staff.


      THE PIVOT

      *   Article 1 makes a general assertion that the Council settled the triangle
      lawsuit without public interference.

      *   Article 2 serves as the ''smoking gun'' by providing concrete evidence of
      the settlement cost ($11.25M + $3M fees), detailing the legal nature of the
      transaction (settling Dyas-related claims/insurer disputes), and proving that
      the Council’s actions were a costly political maneuver rather than an act in
      favor of community park development.


      KEY ENTITIES

      *   Boone

      *   Burrell

      *   Brown

      *   Kant

      *   Wilson

      *   Dyas

      *   Fairhope City Council

      *   Triangle (Mega-Site property)

      *   BP (Restore funds)'
    generated_at: '2026-07-18T18:11:37.858050Z'
  big-head-gully-and-the-fruit-nuts:
    brief: '**THE CONFLICT:**

      *   Historically: The Fairhope City Council has repeatedly been accused of prioritizing
      developer interests over citizen concerns, citing past disputes such as "Fly
      Creek" where the Mayor was perceived as siding with citizens against council/developer
      influence.

      *   Present: Current focus is on a development plan in the Fruit and Nut section
      involving 12 proposed homes near Big Head Gully/Tatumville Gulley. This project
      requires special permits for grinder pumps due to known sewer backup issues.

      *   Political Dynamics: Council members Boone and Brown are accused of having
      direct ties to the Single Tax, which is pushing this development forward. The
      Council has been characterized as obstructing Mayor Karin Wilson.


      **THE DISCOVERY:**

      *   The land development threatening Big Head Gully is linked to a specific,
      major conflict of interest involving Lee Turner.

      *   Lee Turner holds dual power: he serves as the head/president of the Single
      Tax Corporation and simultaneously acts as the chair/head of Fairhope Planning
      and Zoning (the regulatory body).


      **THE PIVOT:**

      *   Article 1 makes generalized accusations that Council members like Boone
      and Brown are tied to a problematic "Single Tax plan." Article 2 proves this
      is not merely an internal council squabble but a systemic, institutional conflict
      of interest.

      *   Lee Turner, through his dual control over the Planning/Zoning regulations
      (approving the development) and the Single Tax vehicle (funding or driving the
      initiative), provides the concrete evidence that the "insider deal" Article
      1 suspects exists in the council''s machinations.


      **KEY ENTITIES:**

      *   Big Head Gully / Tatumville Gulley

      *   Lee Turner (Single Tax President / Planning and Zoning Chair)

      *   Single Tax Corporation

      *   Fairhope Planning and Zoning

      *   Council Members Boone, Brown, Burrell

      *   Mayor Karin Wilson'
    generated_at: '2026-07-18T18:11:37.858056Z'
  the-face-of-no:
    brief: 'THE CONFLICT:

      *   Mayor Karin Wilson faced obstruction from Fairhope City Council for over
      a year by members like Mr Burrell (Council President), Boone, and Brown.

      *   The council allegedly waged "war" against the Mayor through funding cuts
      ($15k to $2,500 discretionary funds) and using employees to spread rumors/demoralize
      staff.

      *   A key conflict involved the proposed Fairhope Single Tax plan for developers
      on the Big-head gully, where Council members Boone and Brown had direct ties
      to the project despite a petition rejecting it (925+ signatures).

      *   The council has been accused of hiding agenda items in past meetings to
      conduct "dirty work" without public interference, referencing how they settled
      the triangle lawsuit.


      THE DISCOVERY:

      *   Article 2 reveals that political resistance against current Fairhope governance
      is linked to figures like Colby Cooper (identified as "The Face of No").

      *   Colby Cooper has strong ties to special interests, specifically working
      for a company owned by Fairhope Municipal Judge and Board member Ray Hix.

      *   Corruption allegations involve the Airport Authority hanger bid, where Jack
      Burrell (Airport Authority board member) was involved in securing land/hangars
      allegedly needed by Hix/Snederker (Municipal Judge).


      THE PIVOT:

      *   Article 1 asserts that City Council members are acting against public interest
      and obstructing the Mayor. Article 2 proves *who* is driving this obstruction—a
      network of special interests, including Judges (Snederker), influential residents
      (Ray Hix), and connected council figures (Jack Burrell) who influence Council
      decisions like those on land deals (Single Tax/Airport).


      KEY ENTITIES:

      *   Mayor Karin Wilson

      *   Mr Burrell (Council President / City Council Member)

      *   Boone (City Council Member)

      *   Brown (City Council Member, linked to Single Tax business partner)

      *   Colby Cooper ("The Face of No," former Chief of Staff for Mayor of Mobile)

      *   Ray Hix (Municipal Judge, Board member; involved in Airport/land dealings
      with Colby)

      *   Snederker (Fairhope Municipal Judge; linked to $1M jet hangar requirement)

      *   Jack Burrell (Airport Authority board member; linked to the airport bid
      and private jets)

      *   Catalyst (Political organization representing current City Council candidates)

      *   Big-head gully / Single Tax plan'
