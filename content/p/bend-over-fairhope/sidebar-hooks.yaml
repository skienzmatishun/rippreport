      • Mr. Burrell (Council President) allegedly leads the effort to "drive the Mayor
      out of office."


      THE DISCOVERY:

      • The widget article proves that the council''s obstruction is driven by systemic
      bias, defined as maintaining a status quo favoring affluent residents ("Fairhope")
