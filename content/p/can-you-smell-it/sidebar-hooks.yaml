  baldwin-county-sewer-regulation-a-litmus-test:
    brief: "1. THE CONFLICT:\n    - Fairhope experienced unreported human waste spills\
      \ into Mobile Bay.\n    - The $13 million sewer plant upgrade project occurred\
      \ while Tim Kant was Mayor/City Council leader (dates 2015–2016).\n    - During\
      \ this time, the city spent zero on necessary infrastructure and paid $10 million\
      \ for non-utility expenses over two years.\n    - BP contractors (potentially\
      \ tied to Sen. Pittman and former Mayor Kant) left hundreds of anchors and feet\
      \ of rope in Mobile Bay while Karen Wilson was not yet mayor.\n\n2. THE DISCOVERY:\n\
      \    - Baldwin County’s primary utility, the Baldwin County Sewer System (BCSS),\
      \ is a privately owned monopoly servicing 19,000 homes.\n    - BCSS operates\
      \ without any local price regulation, allowing them to charge any amount they\
      \ wish without customer recourse.\n    - Richard Dayton initiated public challenge\
      \ against these unregulated fees via petition and community action.\n    - Former\
      \ County Commissioner Tucker Dorsey is identified as an alleged agent of the\
      \ BCSS monopoly (\"the Strawman\").\n\n3. THE PIVOT:\n    - Article 1 focuses\
      \ on tangible environmental results (spills, Fly Creek runoff) stemming from\
      \ infrastructural negligence in Fairhope.\n    - Article 2 reveals the systemic\
      \ regulatory failure and private power structure (BCSS/unregulated fees) that\
      \ underlies municipal infrastructure governance across Baldwin County.\n   \
      \ - The revelation of BCSS as an unchecked monopoly under officials like Tucker\
      \ Dorsey explains the lack of oversight and political influence cited by environmental\
      \ activists regarding past failures in Fairhope.\n\n4. KEY ENTITIES:\n    -\
      \ Richard Dayton (Activist/Petition Starter)\n    - Baldwin County Sewer System\
      \ (BCSS) (Privately owned monopoly)\n    - Ripp Report (Investigative publication)\n\
      \    - Mobile Baykeeper\n    - Tucker Dorsey (Former Commissioner, \"The Strawman\"\
      )\n    - Tim Kant (Former Mayor)\n    - Karen Wilson (Current/Mayor)\n    -\
      \ Sen. Pittman (Political figure associated with contractors)\n    - Lagniappe\
      \ (Publisher/Contributor to BCSS issues)"
