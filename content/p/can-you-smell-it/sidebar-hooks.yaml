      on the bay instead of relocating it inland.

      *   Mobile Baykeeper (MB) was contacted repeatedly regarding these issues but
      failed to intervene or raise awareness.

      *   BP contractors (Sen. Pittman and Mayor Kant) left hundreds of anchors and
      feet of rope in the bay.


      THE DISCOVERY

      *   The Director of Baykeeper, Casi Callaway, is engaging in damage control
