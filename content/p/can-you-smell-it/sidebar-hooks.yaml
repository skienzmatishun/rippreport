      fundamentally unregulated and privately owned.

      - The systemic nature of the problem is defined by BCSS''s status as an unregulated
      private entity using public resources (county right-of-ways), which explains
      how major environmental failures occurred without government oversight or accountability,
      despite local spending on $13 million sewer upgrades that proved inadequate.


      KEY ENTITIES: List specific names, organizations, or locations to mention

