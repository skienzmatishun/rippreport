  fairhope-sewer-backstory:
    brief: 'THE CONFLICT

      *   Previous Mayor and Council spent $13 million on upgrading the sewer plant
      instead of moving it inland.

      *   Fairhope utilities paid the city $10 million for NON-UTILITY expenses during
      2015 and 2016, ignoring necessary infrastructure work.

      *   Multiple lawsuits occurred regarding watershed impact and sewer spills into
      Mobile Bay/Fly Creek.


      THE DISCOVERY

      *   The previous administration (Mayor Can’t, Councilman Boone, Councilman Burrell)
      used the utility fund as a slush fund to balance the general fund and pay for
      lawsuits.

      *   This misuse drained the utility fund, resulting in Fairhope losing its best
      senior utility supervisor to Daphne and $3 million to attorneys.

      *   The current Mayor (Karen Wilson) has actively addressed sewer and infrastructure
      problems, fulfilling a campaign promise made by a previous candidate.


      THE PIVOT

      *   Article 2 provides documented proof of political corruption and financial
      mismanagement (slush fund usage) that directly caused the neglect in infrastructure
      and environmental issues described generally in Article 1.

      *   It links specific individuals (Mayor Can’t, Councilman Boone, Councilman
      Burrell) to the failure to invest $13 million in sewer upgrades, proving intent
      behind the inaction criticized in Article 1.


