  baldwin-county-sewer-regulation-a-litmus-test:
    brief: 'THE CONFLICT

      *   Fairhope development projects (Publix) caused Fly Creek runoff into wetlands.

      *   Fairhope was discharging human waste into Mobile Bay via unreported spills.

      *   Previous Fairhope Mayor and Council spent $13 million on a sewer plant upgrade
      instead of moving it inland.

      *   Fairhope utilities paid the city $10 million for NON-UTILITY expenses during
      2015 and 2016, ignoring necessary infrastructure.


      THE DISCOVERY

      *   Baldwin County Sewer System (BCSS) is a monopoly servicing 19,000 homes.

      *   BCSS fees are unregulated, allowing them to charge any amount; refusal to
      pay results in sewage shutoff regardless of health impact.

      *   The issue is framed as an unregulated consumer crisis rather than solely
      an environmental one.


      THE PIVOT

      *   Article 2 establishes that systemic regulatory failure and monopoly control
      over sewage (BCSS) are the underlying mechanisms enabling infrastructure neglect
      and pollution issues detailed in Article 1.

      *   BCSS''s ability to charge unregulated fees demonstrates a structural power
      structure that permits local entities to ignore environmental impact (e.g.,
      Baykeepers’ lack of presence).


      KEY ENTITIES

      *   Fairhope

      *   Mobile Bay

