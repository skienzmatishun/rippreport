      - In 2017, Councilman Tim Kant was Mayor; Karen Wilson became Fairhope''s new
      mayor shortly before ordering an engineering study of municipal infrastructure.


      THE DISCOVERY: What does the second article prove or reveal today?

      - Baldwin County Sewer Service (BCSS) is a privately operated and completely
      unregulated entity within Alabama.

      - BCSS operates using county right-of-ways at no charge, bypassing normal governmental
      constraints.

      - There is a lack of direct control between the BCSS and the Baldwin County
      Commission/government.

      - Clarence Burke serves as President of BCSS and resides in Costa Rica; he has
      been linked to high-profile lawsuits (Bass vs. Burke) alleging fraud with developer
