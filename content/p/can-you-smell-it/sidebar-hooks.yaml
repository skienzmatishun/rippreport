  fly-creek-mud:
    brief: 'THE CONFLICT:

      *   Mobile Baykeeper was absent from meetings regarding Fly Creek watershed
      impact.

      *   The Publix project construction caused Fly Creek to be filled with runoff
      mud.

      *   Previous Mayor and Council spent $13 million on upgrading the sewer plant
      on the bay instead of moving it inland.

      *   Fairhope utilities paid $10 million for NON-UTILITY expenses in 2015 and
      2016, ignoring infrastructure.

      *   The city discharged human waste into Mobile Bay via unreported spills in
      the past.


      THE DISCOVERY:

      *   The Publix project dumped tons of mud into Fly Creek.

      *   Apartments built on Fly Creek experienced flooding damaging units.

      *   Developer Angelo Corte sold the apartments after a sales pitch, leading
      to citizen repair costs after flooding occurred.

      *   Infrastructure failures (electric, freshwater, sewer) have been constant
      throughout Fairhope.


      THE PIVOT:

      *   Article 2 proves that infrastructure failure and development (Publix, apartments)
      are directly causing physical damage (mud, erosion, culvert damage), which validates
      the main article''s claims about ignored environmental issues in the area.

      *   The widget details the specific mechanisms of damage—runoff mud and structural
      failure—that were previously generalized in the main article regarding overall
      watershed neglect.


