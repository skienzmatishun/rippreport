      *   **THE CONFLICT:**
              *   Who: Murray "Bubba" Lawrence Jr.
              *   What: Convicted of capital murder in Baldwin County, Alabama.
              *   When: Conviction May 13, 2005.
              *   Charge: Capital murder of Brandon Hastings (murdered May 6, 2003).
              *   Key Accusation: Prosecution (David Whetstone) and Sheriff Investigator (Hoss Mack) allegedly secured conviction based on uncorroborated accomplice testimony without physical evidence or established timeline.
              *   Quote: Whetstone claimed, “I have made a deal, a deal with the devil so that evidence could be heard...”

          *   **THE DISCOVERY:**
              *   Widget Article confirms transcript volume: 2,200+ page trial transcript.
              *   Specific testimony detail: Jarius McNeil implicated Lawrence after 4 months in jail (implicated July 31, 2003).
              *   Timeline contradiction: Transcript proves Lawrence has 5 separate witness alibis placing him at his home during the crime time window.
              *   Physical Evidence Gap: No fingerprints, weapon, ballistics, blood, fiber, DNA, or witnesses to the actual crime recorded against Lawrence.
              *   Incarceration: 11 months 10 days arrested before conviction; currently (per widget) cited as 18 years incarcerated in total.
              *   New Legal Action: Attorney Rebecca Chambliss engaged pro bono to present case to the Innocence Project.

          *   **THE PIVOT:**
              *   Widget Article moves from general criticism (Main) to granular transcript proof.
              *   Widget proves logistical impossibility: Transcript timeline shows distance between alleged murder/disposal and Lawrence's known location makes the crime impossible within time constraints without contradicting the 5 alibis.
              *   Widget documents Whetstone's quote directly regarding “deal with the devil” using transcript pagination (Vol. 4 Page 605).
              *   Widget identifies McNeil as the source pressure (Death Penalty threat if accomplice not given up).

          *   **KEY ENTITIES:**
              *   Murray "Bubba" Lawrence Jr. (Convicted Defendant)
              *   David Whetstone (District Attorney, retired)
              *   Hoss Mack (Baldwin County Sheriff, Chief Investigating Officer at time)
