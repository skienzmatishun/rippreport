      - Defense Attorney: Willy Huntley.
      - Presiding Judge: Robert Wilters (currently Baldwin County District Attorney).
      - Accusation: David Whetstone admitted making a “deal with the devil” regarding evidence handling.
      - Evidence base: Conviction relied primarily on testimony of accomplice Jarius McNeil.

      THE DISCOVERY:
      - 2,200+ page trial transcript confirms no physical evidence linked Lawrence to crime (no fingerprints, DNA, blood, weapon, ballistics).
      - Accomplice Jarius McNeil implicated Lawrence on July 31, 2003, after being in jail for approximately four months.
      - Prosecution and defense failed to construct a written documented timeline during trial.
      - Transcript timeline establishes Lawrence had five separate witnesses placing him at his home during the time of the crime.
      - Trial transcript proves distance and logistics make it impossible for Lawrence to drive from his location to murder site/disposal site within the alleged timeframe.
      - McNeil was threatened with death penalty if he did not identify an accomplice.
      - Current incarceration cited as approximately 18 years in Widget article vs 10+ years referenced in Main Article.

