  backstory-podcast:
    brief: 'THE CONFLICT

      *   Focus on political corruption in Baldwin County.

      *   Fairhope City Council lacks leadership, transparency, and accountability.

      *   Council plans to vote themselves a free health insurance coverage.

      *   Council plans to set the Mayor’s salary, ignoring an Auburn Study.


      THE DISCOVERY

      *   The Ripp Report is launching a Podcast series dedicated to exposing political
      corruption in Baldwin County.

      *   The podcast aims to expose the "good ole boy system" entrenched in Baldwin
      County since the first pecan tree was planted.


      THE PIVOT

