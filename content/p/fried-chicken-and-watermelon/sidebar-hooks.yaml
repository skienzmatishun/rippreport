      - Mayor Tim Can’t (Tant/Kant) abandoned Young Street Rotary Youth Club for 4-year cycles after promising "fried chicken and watermelon."
      - Council lost Federal Lawsuit for refusing public participation/community engagement.

      2. THE DISCOVERY
      - Widget Article confirms Jack Burrell has held Council President >7 years, rare retention of power.
      - Burrell led override of Mayor’s veto on Fly Creek extension zoning (developer friendly) without proper disclosure.
      - Burrell orchestrated deal regarding 106 acres of city property worth $20 million: claimed he "forgot" who proposed disposal; Ripp Report alleges this is a lie.
      - Burrell arranged Fly Creek wetlands deal to favor developer apartment project, shifting liability to city.
      - Burrell hid a Police Report prior to the last election; uncovered and linked via The Ripp Report socialpreview.
      - Conservation Easement dispute: Council ignored better bay-side location (Breland property) while fighting over 106 acres.
      - Twin Beech land: Council abandoned purchase recommendation despite staff support, citing "too much cost."

      3. THE PIVOT
      - Widget Article serves as a procedural "smoking gun": It connects the abstract accusations of corruption in Article 1 to specific governance failures.
      - Confirms Burrell’s lie regarding Triangle Property: Widget explicitly admits Council President settled it and deceived citizens (matches Main Article claim of bare-faced lies).
      - Confirms pattern of document concealment: Burrell hiding Police Report (Widget) validates the Main Article's assertion that Council violates rules and operates behind closed doors.
      - 106-acre "Disposal" (Widget) is the modern example of the negligence Main Article flags regarding airport land and K-1 center purchases.
      - Burrell’s >7-year tenure (Widget) explains the structural control over land deals, zoning overrides, and infrastructure neglect listed in Main Article.

      4. KEY ENTITIES
      - Jack Burrell (Council President)
      - Mayor Wilson (Current)
      - Tim Can’t / Kant (Former Mayor, sidekick to Current administration)
      - Councilman Boone
      - Ex-Councilman Brown
