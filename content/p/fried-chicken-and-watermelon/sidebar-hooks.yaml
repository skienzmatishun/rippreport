      - Current administration accused of "Embrace Development" motto while struggling to complete sewer projects worth millions awarded by former Mayor Wilson’s administration.
      - K-1 Center purchased for over $5 million; Waterfront Park project awarded $6.2 million grant but allegedly wasted by current council.
      - 11.25 million paid for "triangle property" legal settlement with no visible improvements.
      - Electric substations built without fencing/landscaping, alleged to violate Comprehensive Plan rules.

      THE DISCOVERY:
      - Confirms Mayor Sherry Sullivan took close to one year just to understand the ADA compliance required for the $6.2M Waterfront grant money.
      - Confirms Council President Burrell personally eliminated the swim area and rock jetties from Waterfront project because "HE does not like the look."
      - Confirms Mayor and Burrell were caught lying to press about "optional locations" regarding the electric substation purchase.
      - Confirms Stewart “The Liar” Speed (Leaf River Group) lied on record to 250-300 citizens about luxury apartments and environmental safety of Fly Creek.
      - Confirms K-1 Center purchased in 2019 from Baldwin County Board of Education for $2.5 million; Main article claims 5 million+.
      - Confirms Alabama legislature legislation moved municipal elections a year forward (e.g., voters served extra term without vote).
      - Confirms Arthur Corti linked to Burrell's "liability land gifts" like the airport farmland issue.
      - Confirms sewer lawsuit settlement requires quarterly progress reports and health warnings, noting "they omitted in the past."

      THE PIVOT:
      - Article 2 transforms complaints from "political neglect" (Article 1) into documented administrative failure: the ADA delay and Burrell's design changes are specific, actionable proof of incompetence.
      - Article 2 validates the "Developer vs. Public" claim by exposing recorded lies from Leaf River Group leaders and Burrell's dishonesty regarding land options.
      - Article 2 links the "Comprehensive Plan" failure to specific individuals: Burrell (K-1 center decision-making) and Sullivan (ADA delay).

