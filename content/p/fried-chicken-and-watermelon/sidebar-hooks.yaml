      - Mayor Wilson criticized for rushing city into real estate deals (K-1 Center) without public input.
      - Specific allegation: Substation in Hawthorn Glenn residential area bought for political payback linked to petition against Karin Wilson.

      2. THE DISCOVERY:
      - Airport Authority meetings have had no recorded/online public access since February (no notices given).
      - K-1 center leased to FEEF for 25 years at $1/year, approved May 24.
      - FEEF to maintain buildings; lease signed before grant approval or development plan secured (3.5 million dollar grant sought).
      - Substation property sold to city for $40,000; list price $290,000 in April.
      - Seller of substation property, Kathy Hoffren, netted $19,000 while leaving $40,000 on table; had a mortgage of $200,000.
      - Paul Ripp (consumer advocate) alleges city purchase was "political payback" for Kathy Hoffren after she circulated a petition to ask Karin Wilson to resign.
      - Resolution passed allowing Airport board members from feeder pattern of Fairhope instead of corporate limits (Resolution 11).

      3. THE PIVOT:
