      - Provides specific dates (May 24 lease, February last meeting) and exact pricing discrepancies ($1/year lease vs millions spent; $40k purchase vs $290k value).
      - Links Jack Burrell directly to the secrecy of Airport meetings and specific property deals previously alleged in Article 1.
      - Proves Article 1's claim of "no plan" by documenting secret leases (FEEF) and unexplained rapid purchasing.

      4. KEY ENTITIES:
      - Jack Burrell (Council President, Airport Authority connection).
      - Karin Wilson (Former Mayor).
      - Kathy Hoffren (Substation property seller, named in petition allegations).
      - FEEF (Entity leasing K-1 center).
