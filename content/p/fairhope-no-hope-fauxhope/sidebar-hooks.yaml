      2. THE DISCOVERY: Article 2 confirms that the $2.65 million recreation land
      decision by Councilmen Boone and Brown was based on race to avoid proximity
      to the Black neighborhood. It reveals a pattern of corruption including: delayed
      sewer infrastructure; $11.25 million Triangle property giveaway; K1 center roof
      repair costs of "tens of thousands"; and Council members voting themselves full
      family insurance. Article 2 notes the $6.2 million waterfront project was threatened
      by critics who never attended transparency meetings.


      3. THE PIVOT: Article 2 serves as the smoking gun by explicitly linking the
      Council''s racially-motivated land purchase (highlighted in Article 1) to specific
      names: Kevin Boone and Robert Brown. It validates the claims of corruption by
      exposing that critics or "carpetbaggers" ignored these exact actions until politically
      convenient, specifically asking where they were during the sewer and Triangle
      property scandals.


      4. KEY ENTITIES: Kelly Wilson, Lynn Oldshue, Councilman Kevin Boone, Robert
      Brown, Burrell, Catalyst, New York Times (via executive editor Raines), Fly
      Creek Basin.'
