  development-chaos:
    brief: 'THE CONFLICT:

      *   Baldwin County Commission meeting on July 25th authorized the Baldwin County
      Economic Development Alliance to proceed with $7 million for infrastructure
      needed for the Mega-Site.

      *   Development in Fairhope and Daphne is under building moratoriums due to
      infrastructure strain.

      *   Schools are stretched, using portable classrooms, and experiencing full
      occupancy of new construction.

      *   Baldwin County has an unregulated sewer system.


      THE DISCOVERY:

      *   The development chaos stems from poor planning and failure of politicians
      who ignored infrastructure for decades.

      *   Construction company D.R. Horton is facing class action lawsuits due to
      inferior construction.

      *   County spending $65 million on a jail with 951 inmates without social programs
      is cited as shortsighted.

      *   Zoning disputes are ongoing, including the RSA lawsuit over Planning District
      19.

      *   Environmental threats include the Berry Steam Plant''s toxic coal ash and
      the Alabama Port Authority proposing to cover up 1200 acres of bay for dredging
      spoils.


      THE PIVOT:

      *   Article 2 establishes that the proposed $7 million infrastructure spend
      on the Mega-Site (Article 1) is occurring amidst severe, widespread county planning
      failures, infrastructural strain (sewer, schools), and unresolved zoning/legal
      conflicts.

      *   The chaos described in Article 2 proves that the push for the Mega-Site
      development is not happening in an organized environment but rather as part
      of a larger, uncontrolled municipal sprawl lacking cohesive planning.


