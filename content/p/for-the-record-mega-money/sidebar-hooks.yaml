      penny tax."


      THE DISCOVERY

      *   The Mega-Site remains vacant five years after promotion.

      *   Estimated lost opportunity interest on the $32 million project exceeds $50
      million.

      *   The County is waiting for a buyer with $350 Million.

      *   Fairhope Airport Authority uses 21% of the city’s debt to cover mortgage
      payments and pays attorneys to defend board members against legitimate complaints.


      THE PIVOT

