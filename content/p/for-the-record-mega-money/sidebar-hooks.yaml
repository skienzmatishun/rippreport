  mega-mistake:
    brief: 'THE CONFLICT

      *   Baldwin County Economic Development Alliance (BCEDA) promoted the South
      Alabama Mega-Site as "shovel ready."

      *   A special meeting of the County Commission took place on July 25th to authorize
      BCEDA to spend $7 million on needed infrastructure.

      *   The site is currently vacant after seven years of effort.

      *   Total cost associated with the Mega-Mistake reached approximately $50 million.


      THE DISCOVERY

      *   The Mega-Site remains vacant despite $32 million spent and $2 million a
      year in payments over seven years.

      *   Mr. Lee Lawson, leader of BCEDA, has failed to find a tenant.

      *   Lawson’s track record is described as dismal and results-oriented efforts
      are lacking (e.g., failures at Fairhope K-1 center and Jack Burrell International
      Airport).


      THE PIVOT

      *   Article 2 reveals that the proposed solution for the Mega-Mistake—transferring
      title to BCEDA/Lawson''s control—is based on a history of failure, making Lawson’s
      proposal highly suspect.

      *   Article 2 proves that Lawson is "all smoke and mirrors," undermining the
      validity of continuing to grant him exclusive control of the property.


      KEY ENTITIES

      *   Baldwin County Commission

      *   Baldwin County Economic Development Alliance (BCEDA)

      *   Mr. Lee Lawson

      *   South Alabama Mega-Site

      *   Fairhope

      *   K-1 center

