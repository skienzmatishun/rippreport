      *   Baldwin County has voted out two corrupt politicians, including Tim Kant
      and his partner in a BP scam involving Trip Pittman.

      *   Jack Burrell (Pittman’s Bible study partner) is implicated in the Fairhope
      Airport Authority “bidding” scandal.


