  backstory-153:
    brief: 'THE CONFLICT: Sheriff Mack of Baldwin County announced mid-July 2024 his
      resignation effective mid-August, creating an immediate vacancy for the Sheriff''s
      position. On July 31, 2024, OJ French Jr’s family and legal counsel filed a
      Federal Court lawsuit against the City of Bay Minette and Officer Brandon Thompson.
      The suit alleges Thompson shot OJ French Jr without probable cause following
      a stop and struggle over a taser. Former Mayor Robert Bob Wills is implicated
      in the controversy for falsely claiming he spoke on behalf of French’s family
      during a rally. County Commissioner Matt McKenzie is running for Sheriff against
      Chief Deputy Anthony Lowery, whom Mack recommended for appointment.


      THE DISCOVERY: The second article confirms the Governor’s authority is central
      to filling high-level county vacancies. It reveals Alabama Legislature is in
      session actively drafting bills regarding "succession of power if a Sheriff
      dies or is removed from office." It further notes Governor Kay Ivey has sufficient
      political power to "oust naysayers" and currently holds the appointment authority
      referenced in the first article for filling Sheriff Mack’s remaining term.


      THE PIVOT: Article 2 validates the leverage available to opponents of Deputy
      Anthony Lowery. While Article 1 highlights the public pressure on Governor Ivey
      regarding the Baldwin County appointment, Article 2 proves she is legally empowered
      to override objections and potentially manipulate Sheriff succession via new
      legislation ("enough lead in the pencil"), solidifying her role as the central
      target for all action regarding this vacancy.


      KEY ENTITIES:

      Governor Kay Ivey (Alabama)

      Sheriff Mack

      Chief Deputy Anthony Lowery

      Mayor Robert Bob Wills

      OJ French Jr.

      Officer Brandon Thompson

      County Commissioner Matt McKenzie

      Pras Michel (Criminal Context)

      Jefferson Beauregard Sessions III'
