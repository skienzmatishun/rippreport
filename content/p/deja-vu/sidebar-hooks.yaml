      \ \nConnects 3 million dollar Triangle lawsuit failure (Article 1) to CATALYST's legal counsel (Hand Anderall Sale), validating the claim of controlled bad deals. \nShows continuity: From 2017 firings to 2021 annexation moves, SBC/CATALYST retains control of Fairhope City Council and utilities.\n\nKEY ENTITIES\nSherry Sullivan (Fairhope Mayor, Utilities Director)\nJennifer Fidler\nScott Boone (SBC figurehead)\nKevin Boone (Fairhope Councilman, Scott's father)\nKaren Wilson (Former Mayor)\nJack Burrell\nHand Anderall Sale (Law Firm)\nFairhope City Council\nScott Boone Consulting / CATALYST\nParker Road (Annexation target)"
