      *   Elliott spent in excess of $600,000 thousand dollars in his campaign.

      *   The Main Article criticizes Elliott’s strategy as "insanity" and compares
      him to Kay Ivy.

      *   Local figures mentioned as having a piece of Elliott include Sheriff Eddie
      Tyler, Baldwin County School Superintendent, Mayor Craft, and Mayor Kennon,
      and Gumbo.


      THE DISCOVERY:

      *   Elliott has raised over half a million dollars for his campaign, aiming
      for $600,000 for a $42,000 Senate Seat salary.

      *   Elliott claims support from contractors, road builders, realtors, nurse
      anesthetists, and certified public accountants in Baldwin County.

      *   Jeff "Judas" Boyd lost the primary to Elliott and subsequently became Mayor
      Kennon’s yard boy.

      *   The Widget Article promotes David Northcutt as the People’s Choice candidate
      against Catalyst Candidate Chris Elliott.


      THE PIVOT:

      *   Article 2 proves that Elliott’s campaign funding and coalition of support
      (the "Catalyst Choice") are built on specific economic sectors and political
      backroom deals, which validates the Main Article''s criticism of his "hypocritical"
      approach.

      *   The details regarding Elliott''s donors and political maneuvering provide
      the substance behind the critique of his spending and strategy mentioned in
      Article 1.


      KEY ENTITIES:

      *   Chris Elliott (Candidate/Catalyst Choice)

      *   Eddie Tyler (Sheriff’s office)

      *   Mayor Craft

      *   Mayor Kennon

      *   Gumbo

      *   Jeff "Judas" Boyd

      *   David Northcutt (People''s Choice Candidate)

      *   Baldwin County'
