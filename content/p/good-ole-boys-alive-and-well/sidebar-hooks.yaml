      map detailing the "gift" of land (wetlands/outfall pipe location).

      *   The Council overrode the Mayor’s veto regarding an ordinance amending Ordinance
      no.1572 (Fly Creek PUD).


      THE DISCOVERY

      *   Ordinance 1572 (Fly Creek Apartments) is a central issue facing citizens
      and schools.

      *   The City Council president refuses to place the repeal of Ordinance 1572
