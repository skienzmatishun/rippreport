  fairhope-voters-important-notice:
    brief: '**THE CONFLICT:**

      *   2017: Fairhope City Council, led by then Mayor Kant and including councilmen
      like Burrell and Boone, approved Resolution 2606-16 to accept property from
      Angelo A. Corte.

      *   The resolution was originally recorded October 21st but presented to the
      Council in April (Main Article dates are inconsistent relative to timeline context
      but reference a historical incident).

      *   Investigation revealed the "gift" was not just a lift station pad, but three
      acres of wetland and stormwater runoff territory from the Publix site.

      *   The Council subsequently rejected Mayor Wilson’s appointments for the Airport
      Authority and imposed a hiring freeze after she fired two employees.

      *   Michael Scott Boone failed to recuse himself from voting on Fly Creek PUD
      or Angelo Corte issues despite apparent conflicts (Main Article).


      **THE DISCOVERY:**

      *   "Catalyst" is revealed as the shadow political group behind Councilmen Burrell
      and Boone''s opposition.

      *   Catalyst Associates was formed in 2014, with Coley M. Boone (Boone''s son)
      listed as registered agent and Michael Scott Boone listed as manager.

      *   The article claims Catalyst is a "brain child" of Elliott, Haygood, and
      Stacy—politicians who claim 100% election win rates.

      *   The group is now allegedly using anonymous blogs (Baldwin Insider) to discredit
      Mayor Wilson/supporters.


      **THE PIVOT:**

      *   Article 2 proves the Councilman opposition isn''t just incompetence or individual
      political differences; it is a coordinated effort by Catalyst, whose structure
      involves Coley M. Boone and Michael Scott Boone (direct ties to current city
      officials like Boone).

      *   Catalyst''s history links Councilmen Burrell/Boone directly to the "good
      ole boys" narrative used in Article 1 to undermine Mayor Wilson’s job functions
      (veto veto, hiring freezes, appointment rejection).


      **KEY ENTITIES:**

      *   Angelo A. Corte: Property donor / developer involved in wetland/sewer resolution.

      *   Councilmen Burrell and Boone: Figures central to the opposing vote on city
      business.

      *   Catalyst Associates: Political organization managing campaigns (associated
      with Coley M. Boone).

      *   Michael Scott Boone: Manager of Catalyst Associates and family member of
      Councilman Boone.

      *   Cooley M. Boone: Registered Agent for Catalyst Associates; son of Councilor/Politician
      Boone.

      *   Mayor Wilson: Target of the council’s opposition, including hiring freezes
      and rejected appointments.

      *   Elliott (Chris Elliott): Named as a figure associated with catalyst''s political
      origins.'
