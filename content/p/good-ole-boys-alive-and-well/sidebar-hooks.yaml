  fairhope-town-hall-meeting:
    brief: 'THE CONFLICT:

      *   Fairhope citizens were aware of critical issues including the need to repeal
      Ordinance 1572 (Fly Creek Apartments) and concerns over Airport Authority land
      ownership versus city debt prior to February 16, 2017 (Widget Article).

      *   Mayor Kant attempted to address these issues but faced resistance from the
      City Council.

      *   On April [Date Not Specified] 2017, during a meeting chaired by Mr. Burrell
      and Mayor Kant absent, Resolution 2606-16 was added to the agenda for consideration.

      *   This resolution granted Fairhope three plus acres of wetlands (which receive
      storm water runoff from the Publix site) as a "gift" from Angelo A. Corte under
      Exhibit A, intended to cover land for a sewer lift station.


      THE DISCOVERY:

      *   The Widget Article revealed that Mayor Kant had been actively fighting to
      bring up the repeal of Ordinance 1572 because it was a primary issue during
      elections and affected schools/citizens.

      *   The Widget Article stated the Council President was refusing to put Fly
      Creek on the City Council agenda, indicating active political obstruction prior
      to April 2017.


      THE PIVOT:

      *   Article 2 establishes that before Mayor Kant officially introduced the controversial
      "gift" resolution in Article 1, the core issues (Ordinance 1572, Airport Authority
      control) were known and public concerns had been voiced at Town Halls on February
      16, 2017.

      *   This context suggests that the council''s subsequent actions in April 2017—including
      adding resolutions seemingly without transparency or properly vetting the "gift"—were
      a response to pre-existing political maneuvering rather than simply addressing
      new information.


      KEY ENTITIES:

      *   Angelo A. Corte

      *   Mayor Kant (or Tim Kant)

      *   Mr. Burrell (Jack Burrell)

      *   Boone

      *   Marion Wynne (City Attorney)

      *   Fairhope City Council

