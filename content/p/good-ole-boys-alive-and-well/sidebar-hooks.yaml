      - Diana Brewer (Councilwoman)\n- Boone (Fairhope City Council Member)\n- Brown\
      \ (City Councilman)\n- Fly Creek PUD/Apartments\n- Triangle Lawsuit ($11.25\
      \ million settlement)\n- Sandy Ford / Rock Creek (Political challengers/recruiting)"
