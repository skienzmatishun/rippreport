  fairhope-voters-important-notice:
    brief: 'THE CONFLICT

      *   Fairhope City Council engaged in a passive aggressive approach toward the
      Mayor to prevent her from achieving goals.

      *   Council actions included overriding the mayor’s veto of an ordinance amending
      ordinance no.1572 Fly Creek PUD.

      *   The council approved Resolution 2606-16 accepting property for the city''s
      sewer lift station from Angelo A. Corte.

      *   Mr. Burrell failed to notice that Exhibit A lacked a map, despite records
      showing two maps existed.

      *   Council rejected Mayor’s appointments to the Airport Authority board.

      *   The council imposed a hiring freeze following the firing of two employees.


      THE DISCOVERY

      *   The council is allegedly influenced by the minority and prioritizing personal
      friendships over city issues.

      *   The political group Catalyst Associates, formed August 11, 2014, represents
      "good ole boys."

      *   Catalyst Associates actively works to undermine the Mayor and discredit
      her through actions like imposing hiring freezes and rejecting board appointments.


      THE PIVOT

      *   Article 2 proves that the council''s actions (rejecting appointments, using
      a hiring freeze) are part of a coordinated effort by Catalyst ("good ole boys")
      to halt the Mayor''s progress and regain political power in Fairhope, which
      directly relates to the internal conflicts and decisions detailed in Article
      1.


      KEY ENTITIES

      *   Tim Kant

      *   Angelo A. Corte

      *   Mr. Burrell

      *   Mayor [Name not specified in widget article but referenced throughout]

      *   Sherry-Lea Bloodworth-Botop

