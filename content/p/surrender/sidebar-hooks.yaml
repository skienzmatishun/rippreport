  mcsharry-madness:
    brief: |-
      The CONFLICT:
      - Ronan McSharry assaulted Paula DiNardi at Little Whiskey Christmas Club (LWCC).
      - Police testimony: McSharry had a “strong odor of alcohol,” slurred speech, and was intoxicated to the point he "couldn’t hardly walk."
      - Fairhope Municipal Court Judge Haymes Snedeker found McSharry guilty; initial sentence was 180 days.
      - Baldwin County Circuit Court Judge Clark Stankoski later handled charges; after a one-day trial, rendered 1 year unsupervised probation.
      - A settlement was reached between McSharry and DiNardi; DiNardi's attorney David McDonald waived attorney fees, charging only court costs.

      The DISCOVERY:
      - McSharry filed a third-party complaint lawsuit against LWCC, alleging the establishment caused him to be drunk and he “suffered damages.”
      - LWCC notes in court filing that McSharry alleges a settlement with DiNardi occurred just weeks before this lawsuit, but DiNardi claims she refused to abide by the settlement terms.
      - City Attorney Marcus McDowell represented DiNardi in related proceedings but failed to file assault charges, leaving only an intoxication charge for a previous case.
      - Judicial record shows Judge Stankoski requested to hear the serious assault case where he later dismissed that charge despite McSharry pleading guilty in municipal court.

      The PIVOT:
      - Article 2 confirms the Main Article’s assertion that McSharry “continues to pay his way out” through repeated litigation against bars (LWCC) and individuals.
      - Article 2 validates the claim that McSharry never apologizes; his third-party complaint against LWCC is filed while continuing to blame the establishment for his intoxication.
      - Article 2 provides specific procedural proof of judicial/city attorney conflict: McDowell’s failure to file assault charges and Stankoski dismissing the serious charge, reinforcing the Main Article's claim that "The Fairhope city attorney failed and lied to the citizens."

      Key ENTITIES:
      - Ronan McSharry (Suspect/Plaintiff)
      - Paula DiNardi (Victim)
      - Little Whiskey Christmas Club / LWCC
      - Judge Haymes Snedeker (Fairhope Municipal)
      - Judge Clark Stankoski (Baldwin County Circuit)
      - Marcus McDowell (Fairhope City Attorney)
      - David McDonald (Attorney for DiNardi)
      - Jack Burrell (Fairhope Councilman/McSharry "best bud")
      - Mayor Wilson
