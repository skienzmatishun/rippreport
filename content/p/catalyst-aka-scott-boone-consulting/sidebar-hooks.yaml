      - Commissioners Joe Davis and Jeb Ball voted to approve project despite engineer objections (392 planned houses).
      - Davis gave contractors "thumbs up" on Savannah Estates despite constituent letters.
      - Fairhope City Council and Joe Davis/Jeb Ball align voting on developer-friendly resolutions.

