  alabama-black-hole:
    brief: |-
      THE CONFLICT:
      - Francis Paul Ripp has been investigating political corruption in Alabama for over 18 years.
      - Ripp and his team filed a complaint against Ethics Executive Director Tom Albritton and other officials on July 16, 2021.
      - The State Ethics Commission unanimously approved an administrative resolution regarding Bob McCallum but forwarded it to the Attorney General.
      - AG Steve Marshall approved this resolution; no criminal investigation was pursued for McCallum.
      - The Ethics Commission meted out fines to McCallum instead of criminal charges.
      - AG’s Office and State Bar failed to criminally investigate McCallum’s behavior despite 17 ethics violations on record.
      - Ripp alleges Albritton (Ethics Commission Executive Director since March 2015) and trustees of the Mabel Amos Trust engaged in self-dealing.
      - Specific allegation: Albritton’s children received $105,000 in scholarships from the Mabel Amos Trust between 2014 and 2018.
      - Specific allegation: Regions Bank manages the Mabel Amos Trust and has charged over $1 million in fees.
      - Specific allegation: In 2014, Albritton and other trustees altered trust handling to list schools instead of student names for scholarships.
      - Specific allegation: Circuit Judge Ben Bowden (former law partner) received $45,000 in scholarships for his children via this altered process.
      - Specific allegation: Cynthia Raulston (associate of Albritton) allegedly defended his actions to Ripp in Jan 2022, claiming a statute of limitations expired regarding trust records.
      - Ripp alleges the Alabama Bar canceled attorney Harry Still’s license (reinstated later) under false "Continued Education" claims.
      - Ripp alleges Ethics Commission Executive Director Albritton and Cynthia Raulston withheld exculpatory evidence regarding Montgomery police officers from the Attorney General’s office.

      THE DISCOVERY:
      - On August 21, 2022, Francis Paul Ripp formally filed a second complaint (Writ of Mandamus failed previously) with AG Steve Marshall and Special Prosecutions Officer Clark Morris.
      - The letter (Ref: Complaint against Executive Director of Ethics, Thomas Albritton) claims to be accompanied by a 100+ page bound copy of information and evidence.
      - Ripp documents that AG Marshall, Clark Morris, Governor Kay Ivey, Alabama Bar, and the Ethics Commission were notified of this correspondence on July 16, 2021, with no reply.
      - Ripp identifies specific IRS violations: Potential violation of section 4941(d) "Self Dealing" regarding the Mabel Amos Trust.
      - Ripp notes Albritton filled out an economic statement but failed to disclose he was a trustee of the multi-million dollar trust and had used it for "120,000 dollars of spared family expense."
      - Ripp claims Cynthia Raulston admitted to the telephone call in Jan 2022 that Albritton was not required to fill out an economic statement (contradicting Ripp's knowledge).

      THE PIVOT:
      - The August 21, 2022 letter is the primary source document proving Ripp’s general "Top Shelf Corruption" claims are based on direct evidence, not just opinion.
      - The letter confirms Francis Ripp (The Ripp Report) is a real stakeholder filing legal complaints against the same officials criticized in the Main Article (Marshall, Albritton).
      - Specific data points from the letter ($105k scholarships, $45k to Judge Bowden's kids, $80M oil reserve in Mabel Amos trust) give substance to the Main Article’s accusations of self-dealing.
      - The letter provides a timeline (July 2021 contact, Jan 2022 phone call with Raulston, Aug 2022 formal letter) proving a pattern of ignored complaints rather than just one instance.
      - The "smoking gun" is the discrepancy in Cynthia Raulston’s statements to Ripp (claiming Albritton didn't need an economic statement vs. reality) and the specific IRS/Trust violations named, which aligns with the Main Article’s call for federal/civil suits.

      KEY ENTITIES:
      - Francis Paul Ripp (Investigator, The Ripp Report owner)
      - Tom Albritton (Ethics Commission Executive Director, Trustee of Mabel Amos Trust)
      - Steve Marshall (Attorney General of Alabama)
      - Clark Morris (Special Prosecutions, Office of Special Prosecutions)
      - Bob McCallum (Former Ethics Commission Executive Director/State Bar official, cited for transgressions)
      - Cynthia Raulston (Albritton’s "dubious partner," Alabama Bar)
      - Regions Bank (Trustee/Manager of Mabel Amos Trust)
      - Ben Bowden (Circuit Judge, former law partner of Albritton)
      - Mabel Amos Trust (Multi-million dollar trust at center of self-dealing allegations)
      - Harry Still (Attorney whose license was disrupted by Alabama Bar)
