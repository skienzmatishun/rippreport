  court-public-opinion-now-session:
    brief: 'THE CONFLICT:

      *   Initial allegations of improper bidding by the Fairhope Airport Authority
      were formally submitted to the Attorney General/Ethics Commission on January
      25, 2017.

      *   The conflict involved Council President Jack Burrell (Fairhope City Council
      and Board member) and Mr. Hix/Snedeker aircraft, operating as Mid-Bay Air LLC.

      *   Allegations claimed that Burrell aided and abetted a flawed Request for
      Proposal (RFP) process, resulting in the lease of a hangar on December 17, 2015.

      *   The complaint alleged undisclosed conflicts of interest involving Burrell’s
      wife making flights on Hix/Snedeker aircraft while he was an elected official
      and Board member.


      THE DISCOVERY:

      *   Current proceedings show Council President Jack Burrell is publicly defending
      the Fairhope Airport Authority during a recent city council meeting, arguing
      that no RFP was necessary for the hangar lease.

      *   The Main Article reveals current political tension where council members
      (Burrell, Boone, and Brown) blocked Mayor Kant’s nominations to the Airport
      Authority, while others supported them.

      *   Recent actions include an ethics complaint filed by the mayor against Councilman
      Jack Burrell, leading to a city council-mandated hiring/firing freeze affecting
      43 personnel.


      THE PIVOT:

      *   The Widget Article provides the specific documented history (Jan 2017 supplementary
      complaint) that substantiates and details the corruption alleged in the Main
      Article.

      *   It names Jack Burrell as both Council President and a key member of the
      Airport Authority ad hoc committee who reviewed/recommended the flawed RFP process
      for Mid-Bay Air LLC.

      *   The Widget article provides the technical timeline (Lease Dec 17, 2015;
      Advisory Opinion Feb 3, 2016) that grounds Burrell’s current defenses in documented
      wrongdoing.


      KEY ENTITIES:

      *   Jack Burrell

      *   Mr. Hix / Snedeker Aircraft

      *   Mid-Bay Air LLC

      *   Fairhope Airport Authority (FAA/Authority)

      *   Ethics Commission of [Alabama]

      *   Office of the Attorney General Special Prosecutions Division

      *   City Council of Fairhope

      *   Mayor Kant

      *   Karin Wilson

      *   Mr. Boone

      *   Mr. Brown

      *   Rick Kingrea

      *   Paul Ripp / The Ripp Report'
