  in-your-face:
    brief: 'THE CONFLICT:

      *   Council President Burrell dismissed an ethics complaint against himself
      and Councilman Hix regarding a hangar lease for the Fairhope Airport Authority.

      *   Burrell misled the public about the necessity of a Request for Proposal
      (RFP) for leasing hanger property.

      *   The Ethics Commission mandated that public officials must use bid processes
      when doing business with entities they serve.

      *   Councilman Rick Kingrea filed a request to the Attorney General regarding
      potential ethical violations and possible criminal activity based on documents.


      THE DISCOVERY:

      *   An Ethics Complaint was filed against Councilman Robert Brown (Feb 26, 2018)
      by the State of Alabama Ethics Commission.

      *   The complaint alleged that Brown used the Ethics Commission to justify securing
      a contract with the Eastern Shore Art Center without obtaining a formal opinion,
      despite receiving warnings.

      *   Robert Brown and Cliff Pittman allegedly had advanced knowledge of the contract
      and failed to follow ethics advice.


      THE PIVOT:

      *   Article 2 provides specific evidence (the Ethics Complaint against Robert
      Brown) demonstrating a pattern of using the Ethics Commission to justify contracts
      for personal gain, which serves as the core mechanism behind Burrell''s general
      political maneuvering and the broader failure of accountability detailed in
