      Fairhope for $372,165.90 for “COMPLETED” boom work via Pittman Tractor. This
      occurred without contractor licensing, marine insurance, county approval, or
      Ethics committee review.

      *   August 2014: Main Article cites the Dyas "triangle lawsuit" as a case where
      Mayor Kant used attorneys to orchestrate a public perception of the city being
      in good hands while secretly fighting the legal battle over the Triangle property
      settlement.

