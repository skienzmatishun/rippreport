      claiming it was for a "park."

      *   Two BP fraud charges are pending from grant funds secured by Mayor Kant
      and Senator Pittman.

      *   Lawsuits regarding Publix and Fly Creek Apartments resulted in hundreds
      of thousands of dollars in legal fees paid by the city to Hand-Arendall.


      THE DISCOVERY

      *   The Fairhope City Council decided to pay fired employees instead of going
      to court, concealing the truth about the firing process.

      *   The Council voted in executive session to pay up for the fired employees
      (labeled as insurance money).

      *   The Council is overriding the Mayor and rewarding those who were fired.

      *   Four lawsuits are being considered due to council actions, and a fifth lawsuit
      related to Fly Creek Apartments is pending.


      THE PIVOT

