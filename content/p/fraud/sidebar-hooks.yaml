      property, misuse of funds) to handle major legal settlements.

      *   Article 2 shows the City Council actively undermining the Mayor''s authority
      by interfering with personnel decisions (paying fired employees) and overriding
      planning/zoning decisions, confirming a pattern of obstruction and self-dealing
      that supports the claims of systemic fraud in Article 1.


