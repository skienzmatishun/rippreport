  catalyst-council-lawsuits:
    brief: 'THE CONFLICT

      *   Triangle Lawsuit began, involving Mayor Kant and City of Fairhope for over
      two decades (approx. since c. 2011 based on reference date).

      *   Mayor Kant orchestrated a "dog and pony show" regarding the Dyas "triangle
      lawsuit" in January 2011 to convince the public the city was financially stable.

      *   Fairhope spent $3 million on legal fees for Hand-Arendall in the Triangle
      Lawsuit, which ultimately resulted in Fairhope paying $8.25 million as a property
      settlement to Dyas family (per Widget Article).

      *   City of Fairhope insurer dropped coverage and sued the city after the lawsuit;
      Mayor Burrell later denied these facts, claiming purchase was voluntary for
      a park, calling it an "outright lie."


      THE DISCOVERY

      *   The Triangle Lawsuit involved $3 million in legal fees paid to Hand-Arendall.

      *   In 2015, during Kant’s deposition regarding the lawsuit (Oct. 30), he was
      asked about a loan from Bobby Faust and responded that there was a promissory
      note related to it, although no written communication existed.

      *   Cain O''Rear acted as attorney for the City of Fairhope on the Triangle
      Lawsuit; at a council meeting, he promised the city would pay zero in attorney
      fees (per Widget Article).

      *   Breland case is another 12+ year old dispute where Council/Mayor Cant initially
      refused negotiation, which has now cost taxpayers potentially millions because
      the insurance company deems it "arbitrary and co precious."


      THE PIVOT

      *   The Main Article alleges Mayor Kant misled citizens regarding his conduct
      in the Triangle Lawsuit, specifically claiming the purchase was for a park when
      it was to settle a lawsuit (FRAUD).

      *   The Widget Article corroborates this by providing specific financial figures
      ($8.25M settlement vs $3M fees) and naming Cain O''Rear as city counsel who
      promised zero legal expense but actually delivered $3 million in costs, proving
      the deception detailed in the Main Article was a factual lie perpetuated by
      city leadership (Burrell).

      *   Both articles establish patterns of financial malfeasance involving public
      funds, specifically noting the Triangle case cost taxpayers millions despite
      Mayor Burrell''s claims to the contrary.


      KEY ENTITIES

      *   Mayor Tim F. Kant: Involved in 2011 Triangle Lawsuit deception; questioned
      by Bobby Faust regarding a loan (Oct. 30, 2015).

      *   Jack Burrell/Councilman Burrell: Denied legal facts of the Triangle settlement
      for years and claimed it was a voluntary park purchase ("outright lie"); accused
      of mishandling Breland case costing millions.

      *   Cain O''Rear: Attorney for the city on the Triangle Lawsuit; promised no
      attorney fees but City paid $3 million in costs to his firm.

      *   City of Fairhope: Pays over $8.25 million and $3 million legal fees (Triangle/Hand-Arendall).

      *   Hand-Arendall: Law firm that received payment of $3 million for Triangle
      Lawsuit legal fees.

      *   Bobby Faust: Provided a loan to Mayor Kant; referenced in 2015 deposition
      regarding the promissory note.

      *   Breland: Involved in a separate dispute costing Fairhope millions due to
      council''s refusal to negotiate with Mr. Breland.'
