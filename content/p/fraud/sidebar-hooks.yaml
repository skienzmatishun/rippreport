  pay-off-and-election-fraud:
    brief: 'THE CONFLICT

      *   Mayor Tim F. Kant was involved in fraud related to the "Triangle lawsuit."

      *   Fairhope paid $3 million in combined legal fees to Hand-Arendall for the
      Triangle lawsuit.

      *   Kant allegedly lied to citizens and attorneys regarding the handling of
      the lawsuit.

      *   Kant was planning to use city tax dollars to pay for Sherry Sullivan’s travel
      as a "travel companion."

      *   Pending BP fraud charges involved Mayor Kant and Senator Pittman.


      THE DISCOVERY

      *   A sealed court case involving a land dispute related to Mayor Kant''s supporters
      was kept from the public.

      *   The article suggests that the reason for sealing the case might be related
      to Kant accepting money from Bobby Faust.

      *   Evidence exists regarding loan documents that Kant allegedly had concerning
      a loan from Bobby Faust.

      *   Election observation notes reveal procedural failures, specifically Election
      Supervisor Mrs. Culver lacking control of voting machines and Election Official
      Tom Odom opening an absentee voting machine and obtaining tapes without proper
      certification signing.


      THE PIVOT

      *   Article 2 provides concrete evidence regarding specific financial connections
      (loan documentation related to Bobby Faust) that were only mentioned vaguely
      in Article 1''s deposition.

      *   Article 2 exposes potential corruption within the electoral process, linking
      Mayor Kant’s sphere of influence with observed irregularities concerning voting
      machine procedures and election official access.


      KEY ENTITIES

      *   Tim F. Kant (Mayor)

      *   Triangle lawsuit

      *   Bobby Faust

      *   Hand-Arendall

      *   Senator Pittman

      *   Sherry Sullivan

      *   Lonnie Mixon (Mayoral Candidate)

      *   Mrs. Culver (Election Supervisor)

      *   Tom Odom (Election Official/Fire Marshall)'
