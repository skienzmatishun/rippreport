  a-decade-of-corruption:
    brief: 'THE CONFLICT:

      *   State Senate Seat for District 32 race involving candidates like David Northcutt,
      Jeff Boyd, Chris Elliott, Bill Roberts, and Jason Fisher.

      *   Boom Boom Pittman held the State Senate seat, focused on personal gain and
      covering for the Sheriff.

      *   Baldwin County delegation and Commissioners failed to secure BP funds, resulting
      in $100 million affected by the BP spill out of a billion dollars total.


      THE DISCOVERY:

      *   State Senator Tripp “Boom Boom” Pittman used Fairhope Mayor Tim Kant and
      Fairhope staff (Greg Mims, Sherry Sullivan, Jennifer Fidler) to secure a $636,000
      bid from Fairhope for BP work.

      *   Pittman received a check of $372,165.90 from Fairhope City Council for "COMPLETED"
      boom work in June 2010.

      *   Pittman worked on the contract without necessary licenses, insurance, county
      approval, or Ethics approval.

      *   Pittman maintained a debris contract with Fairhope for over 8 years.

      *   Pittman legislatively passed qualifications for Sheriff in Baldwin County,
      which enabled the Sheriff to be re-elected twice unopposed.


      THE PIVOT:

      *   Article 2 reveals the specific mechanics and history of Pittman''s corruption
      scheme (contract rigging, misuse of funds through Fairhope) that directly explains
      why he was positioned as a corrupt candidate in Article 1.

      *   The details in Article 2 provide concrete proof of how local political figures
      utilized state office (Pittman) to benefit from disaster funds (BP money) and
      establish corrupt local power structures.


      KEY ENTITIES:

      *   Tripp “Boom Boom” Pittman

      *   Tim Kant (Fairhope Mayor)

      *   Greg Mims

      *   Sherry Sullivan

      *   Jennifer Fidler

      *   Fairhope City Council

      *   BP money ($750,000 skimmed; $636,000 bid secured)

      *   Baldwin County Sheriff

      *   David Northcutt

