      Ethics Commission and the FBI.

      *   Former State Senator Tripp Pittman was appointed "trustee" of BP funds and
      self-awarded $750,000 in contracts from Fairhope with mayoral assistance.

      *   Baldwin County officials engaged in self-dealing (e.g., Councilman Burrell
      flying a private jet, Councilman Brown receiving a contract).


      THE PIVOT:

