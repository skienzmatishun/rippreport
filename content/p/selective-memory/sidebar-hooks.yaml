      election" threshold under the Alabama Constitution to trigger an election for
      new government initiatives.

      • This citizen-led action was designed to bypass the City Council entirely;
      it established a 90-day mandatory period leading up to that election.

      • Mayor Karin Wilson has officially announced via the Judge of Probate’s office
