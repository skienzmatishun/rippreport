      executive actions regarding personnel.

      - In 2017, Jennifer Fidler (Fairhope Staff) was fired; Sherry Sullivan (City
      Council Member/Department Head) was also terminated under similar circumstances.

      - Allegations of institutional misconduct have been raised in the past regarding
      the Airport timeline and documentation reviewed by Dean Mosher.


      **THE DISCOVERY:**

      - The ongoing internal conflict and "good ole boy culture" within the Fairhope
      City Council and Mayor''s office has triggered a major electoral shift.

      - Challengers are running on an organized slate of candidates to replace current
      municipal leadership in the August 26th election.

      - The challenge is specifically aimed at eliminating entrenched council power
      rather than simply replacing individual members.


      **THE PIVOT:**

      - Article 1 details specific instances of political friction (hiring disputes,
      firing accusations) and alleged corruption, demonstrating institutional instability
      and a lack of accountability among incumbents.

      - Article 2 confirms that this internal dysfunction has escalated beyond policy
      debates, moving into a direct electoral threat where organized external opposition
      is attempting to completely dismantle the existing leadership structure by replacing
      the entire Council and Mayor on August 26th.


      **KEY ENTITIES:**

      - Mayor Wilson (and Sherry Sullivan)

      - Kevin Boone

      - Mr Burrell

      - Jennifer Fidler

      - Fairhope City Council

      - Dean Mosher

      - Municipal Election Date: August 26'
