      accept change" regarding the new administration, implying they played political
      games.

      *   The city council (led by Kevin Boone) held a special meeting following these
      firings on an unspecified Monday night.

      *   Council demanded a 60-day hiring freeze immediately after the terminations.


      **THE DISCOVERY:**


      *   The City Council is led by Burrell for the last eight years and maintains
      control over key appointments (Municipal Judge, Municipal Attorney).

      *   The council, along with Scott Boone Consulting (Catalyst), intends to install
      a "new" Mayor: Sherry Sullivan.

      *   This group views Sullivan as their choice because she belongs to the CATALYST/Scott
      Boone Consulting CABAL and is subject to it, despite her lack of professional
      qualifications (only high school education, 4 jobs in 4 years).

      *   The council appointed Marcus McDowell as City Attorney and reinstated Judge
      Snedeker despite Mayor Wilson’s pleas for new appointees.


      **THE PIVOT:**


      *   Article 2 reveals that the current push to re-elect Sherry Sullivan is not
      a matter of merit but an attempt by entrenched power brokers (the CABAL) led
      by Burrell, Boone, and Brown to overthrow Mayor Wilson.

      *   The alleged firing of Sullivan in Article 1 was likely part of the conflict
      between the incumbent administration and this powerful cabal that seeks control
      over appointments and mayoral office via CATALYST/Scott Boone Consulting.


      **KEY ENTITIES:**


      *   Mayor Karin Wilson

      *   Sherry Sullivan (Candidate / Fired Employee)

      *   Kevin Boone (Council Member, chaired special meeting)

      *   Burrell (City Council Leader for 8 years)

      *   Robert Brown (City Councilman)

      *   Marcus McDowell (Municipal Attorney)

      *   Snedeker (Municipal Judge)

      *   Jennifer Fidler (Fired Employee)

      *   CATALYST / Scott Boone Consulting

      *   Jack (Former figure referenced by council members/Sullivan)'
