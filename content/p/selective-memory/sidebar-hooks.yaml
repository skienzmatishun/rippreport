      *   The Catalyst group represents a political entity seeking to discredit Mayor
      Wilson by undermining her choices for the Airport Authority board.


      THE PIVOT:

      *   Article 1 describes specific punitive actions taken by the City Council
      (firings, hiring freeze).

      *   Article 2 reveals that these actions are orchestrated and supported by an
      organized political group, Catalyst Associates, which is actively working to
      discredit Mayor Wilson following election results.


