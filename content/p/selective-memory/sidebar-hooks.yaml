      and a developer with a rich history supporting "back room good ole boy politics."

      - Mayor Sherry Sullivan, during a discussion of historic preservation ordinances,
      stated she would advise against passing such legislation due to the workload
      and additional government bodies it could create.


      THE PIVOT:

