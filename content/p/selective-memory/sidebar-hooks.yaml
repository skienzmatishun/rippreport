  fairhope-going-backwards:
    brief: "1. THE CONFLICT\n    * Fairhope City Council members Burrell, Boone, and\
      \ Brown are alleged by a citizen in 2020 to have used their elected office for\
      \ personal gain and betrayed Fairhope.\n    * Mayor Wilson is credited with\
      \ successfully stopping \"wasteful contractors\" who represented CATALYST and\
      \ the three councilmen (Burrell, Boone, Brown).\n    * In March (Main Article),\
      \ the City Council reacted strongly to Mayor Wilson's exercises of hiring/firing\
      \ rights by calling a special meeting chaired by Kevin Boone, resulting in an\
      \ immediate 60-day hiring freeze.\n    * The firing of Sherry Sullivan and Jennifer\
      \ Fidler occurred as they were resisting change under the new administration\
      \ led by Mayor Wilson (who had been mayor for four years).\n\n2. THE DISCOVERY\n\
      \    * Article 2 (Widget) establishes a narrative that Mayor Wilson reversed\
      \ a $6 million debt to fiscal health, increased city/utility cash funds by 59.18%\
      \ ($17M), paid off long-term utility debt by 33%, and secured $23 million in\
      \ grants.\n    * Article 2 explicitly links the council members Burrell, Boone,\
      \ and Brown (the \"three B's\") to CATALYST and systemic corruption within city\
      \ hall.\n    * Article 2 alleges that Sherry Sullivan has a pattern of job instability\
      \ (resigning from four jobs over four years) and represents CATALYST.\n\n3.\
      \ THE PIVOT\n    * Article 2 provides the alleged financial and ethical context\
      \ for the political power struggle described in Article 1; it defines Mayor\
      \ Wilson’s actions as necessary efforts to eradicate corruption allegedly fostered\
      \ by CATALYST and the council trio (Burrell, Boone, Brown).\n    * The Council's\
      \ reaction mentioned in Article 1 (\"listening out of one ear... the good ole\
      \ boys\") is explained by Article 2's framing that this faction (the three B's/CATALYST)\
      \ wants control and seeks to install Sullivan.\n\n4. KEY ENTITIES\n    * Mayor\
      \ Wilson\n    * Kevin Boone / Councilman Boone\n    * Burrell (Council President\
      \ / Council Member)\n    * Robert Brown\n    * Sherry Sullivan\n    * Jennifer\
      \ Fidler\n    * CATALYST\n    * Dean Mosher\n    * Fairhope City Council"
