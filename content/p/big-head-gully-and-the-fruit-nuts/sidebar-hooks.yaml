hooks:
  bend-over-fairhope:
    brief: '**THE CONFLICT**

      * Big Head Gulley / Tatumville Gulley in Fairhope, AL, was threatened by land
      development in the Fruit and Nut section.

      * Mr. Lee Turner held dual roles as Head of Single Tax Corporation and Head
      of Fairhope Planning and Zoning (a declared conflict of interest).

      * The project involved a "Fairhope Single Tax plan" aimed at developers on the
      gulley banks.

      * Council members Boone and Brown possess direct ties to the Single Tax, suggesting
      conflicts of interest regarding the development.


      **THE DISCOVERY**

      * Widget Article reveals specific details about the threatened site: a proposed
      development of 12 homes in the Fruit and Nut section.

      * The proposal is linked to known infrastructure failures in the area (sewer
      backup into homes due to grinder pumps/pressure).

      * A public petition rejecting the Fairhope Single Tax plan on Big Head Gulley
      has amassed over 925 signatures.

      * Council President Mr. Burrell allegedly orchestrated efforts "to drive the
      Mayor out of office."


      **THE PIVOT**

      * Article 2 moves beyond identifying a general conflict (Main Article) to pinpoint
      specific individuals within the governing body: Boone and Brown''s direct business
      ties to Single Tax.

      * Article 2 links Mr. Burrell''s actions and political maneuvering to the obstruction
      of Mayor Karin Wilson’s office, providing context for the council''s involvement
      in this development issue.

      * It provides a counter-narrative detailing infrastructure risks (sewer/grinder
      pumps) that were not present in the initial warnings.


      **KEY ENTITIES**

      * Lee Turner

      * Big Head Gulley / Tatumville Gulley

      * Fairhope City Council (Collective Body)

      * Single Tax Corporation

      * Boone (Council Member)

      * Brown (Councilman)

      * Mr. Burrell (Council President)

      * Mayor Karin Wilson

      * Triangle (Land/Property Entity)

      * Fruit and Nut section'
    generated_at: '2026-07-18T17:53:26.265372Z'
  big-heads:
    brief: '**THE CONFLICT**

      *   Big Head Gully / Tatumville Gulley in Fairhope, Alabama, was threatened
      by land development plans.

      *   The issue centered around a potential "inside deal" involving Lee Turner,
      who held dual roles (Head of Single Tax and President of Fairhope Planning and
      Zoning).

      *   A petition (2,200+ people) voiced public objections to the project in February
      2018.

      *   City Council discussions were ongoing regarding the land transfer from Single
      Tax Corporation to Tatumville Subdivision.


      **THE DISCOVERY**

      *   Fairhope City Council agenda for Thursday, February 15, 2018, included a
      vote on Ordinance Directing the Transfer of an Acre of Land to Fairhope Single
      Tax Corporation (for Tatumville Subdivision).

      *   A major sewage spill affecting Big Head Gully/Tatumville Gully occurred
      around February 12, 2018 (estimated discharge: 100,000–200,000 gallons), leading
      to a public health warning.

      *   Several council members were cited for potential conflicts of interest related
      to the project and Single Tax Board involvement.


      **THE PIVOT**

      *   Article 2 provides specific evidence (Council Agenda/Ordinance) of the land
      transfer that Article 1 alleges is an "inside deal."

      *   Article 2 links this development directly to environmental damage and public
      health crises in Big Head Gully, providing concrete stakes for the allegations
      of corruption made against Lee Turner and other council members.

      *   The Widget article details specific potential conflicts for Kevin Boone
      (LLCs/Catalyst), Robert Brown (Pittman partnership/Art Board), Jay Robinson
      (Upchurch law partnership), and Michel Upchurch (Single Tax Treasurer).


      **KEY ENTITIES**

      *   Lee Turner: President of Fairhope Planning and Zoning; President of Single
      Tax Corporation.

      *   Kevin Boone: Council Member, incumbent developer (2021-12-20).

      *   Robert Brown: Councilman/Property Owner (2021-03-12); partner with Cliff
      Pittman.

      *   Cliff Pittman: Director of Single Tax / Construction business partner; Single
      Tax Board Member.

      *   Jay Robinson: Councilman/Attorney.

      *   Michel Upchurch: Attorney; Treasurer for Fairhope Single Tax (since 2018-02-14).

      *   Jimmy Conyers: Former Mayor (2020-04-10); Councilman.

      *   Fairhope City Council.

      *   Tatumville Subdivision / Big Head Gully.

      *   Fairhope Planning and Zoning Commission.

      *   Single Tax Corporation.'
