  fairhope-jester-and-fly-creek:
    brief: 'THE CONFLICT

      *   Mr. Lee Turner is alleged to be the head of Single Tax and Fairhope Planning
      and Zoning, involved in an "inside deal" regarding Big Head Gulley development.

      *   Robert Brown, a Fairhope City councilman and Eastern Shore Art Center Board
      member, was subject to an Ethics Complaint (Case No. 2018-42).


      THE DISCOVERY

      *   The Fairhope Jester is spinning an Ethics Complaint against himself.

      *   The Jester claims he had permission from the Ethics Commission to secure
      a contract with the Eastern Shore Art Center, which has been disputed.

      *   Developers are utilizing low pressure sewer systems instead of the mandated
      gravity fed system because they do not pay the total system costs (e.g., grinder
      pump replacement costs).


      THE PIVOT

      *   Article 2 introduces specific ethics violations and potential conflicts
      of interest regarding city officials (Brown) and developers, which connects
      to the broader conflict of interest alleged against Lee Turner in Article 1.

      *   The existence of an Ethics Complaint and developer involvement suggests
      the land development decisions mentioned in Article 1 may be tied to official
      misconduct or illegal contracts involving entities like the Eastern Shore Art
      Center.


      KEY ENTITIES

      *   Lee Turner

