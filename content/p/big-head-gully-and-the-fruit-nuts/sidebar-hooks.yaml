      Tax and Fairhope Planning and Zoning.

      * Past developments include controversial projects like the soccer fields requiring
      $1.5 million for grading and complex property purchases lacking audits or scrutiny.


      THE DISCOVERY:

      * City Council is currently involved in problematic development, specifically
      digging "holes" to place Fly Creek apartments over damaged areas.

      * A political strategy ("GOB strategy") supported by Burrell and Boone aims
      to remove Mayor Wilson from office and reinstate fired employees.

      * Councilman Brown publicly opposed the soccer fields but has not investigated
      contractors or sub-contractors.


      THE PIVOT:

      * Article 2 reveals a systemic pattern of institutional corruption and obstruction
      within the Fairhope City Council, exemplified by ongoing development mismanagement
      (Fly Creek, $1.5M grading). This current political dysfunction mirrors the past
      conflict of interest regarding land use in Big Head Gully/Tatumville Gulley
      alleged under Lee Turner.

      * The discovery demonstrates that compromised decision-making is not isolated
      to historical deals but is currently being perpetuated by Council members like
      Burrell and Boone who are actively obstructing effective municipal leadership
      (Mayor Wilson).


