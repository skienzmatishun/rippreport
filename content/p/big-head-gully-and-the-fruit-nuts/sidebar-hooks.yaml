hooks:
  bend-over-fairhope:
    brief: 'THE CONFLICT:

      *   Mr. Lee Turner is the head of Single Tax and Fairhope Planning and Zoning,
      creating a conflict of interest regarding Big Head Gulley land development.

      *   The Fairhope City Council has historically favored developers over citizens.


      THE DISCOVERY:

      *   A petition with 925 signatures rejected the plan for developers on the banks
      of Big Head Gulley.

      *   Specific proposed homes in the Fruit and Nut section require grinder pumps
      to push sewage into the city’s main sewer line, leading to future buyer expenses.


      THE PIVOT:

      *   The Widget Article reveals that Council members Boone and Brown have direct
      ties to the Single Tax plan.

      *   Boone has a business partner who is a member of the Single Tax pushing the
      development project, connecting the local zoning conflict (Turner) to specific
      council member interests.


      KEY ENTITIES:

      *   Lee Turner

      *   Big Head Gulley / Tatumville Gulley

      *   Fairhope City Council

      *   Mr. Burrell (Council President)

      *   Boone (Council Member)

      *   Brown (Council Member)

      *   Single Tax

      *   Fruit and Nut section'
    generated_at: '2026-07-11T06:43:22.266180Z'
  big-heads:
    brief: 'THE CONFLICT:

      *   Land transfer ordinance for Tatumville Subdivision adopted by the Fairhope
      City Council on February 15, 2018.

      *   Lee Turner was identified as having a conflict of interest due to holding
      dual roles: President of Fairhope Planning and Zoning and President of Single
      Tax, simultaneously driving the project.


      THE DISCOVERY:

      *   The land transfer occurred despite public health warnings regarding sewage
      spills into Big Head Gully (Feb 12, 2018).

      *   Conflicts of interest were identified involving board members and councilmen
      related to the Single Tax Corporation and development projects.


      THE PIVOT:

      *   Article 2 details specific financial and professional links between Council
      members (e.g., Robert Brown and Cliff Pittman being partners in a building company/Single
      Tax board) that establish tangible conflicts of interest supporting the land
      transfer mentioned in Article 1.


      KEY ENTITIES:

      *   Lee Turner

      *   Fairhope City Council

      *   Tatumville Subdivision

      *   Fairhope Single Tax Corporation

      *   Kevin Boone

      *   Robert Brown

      *   Cliff Pittman

      *   Jay Robinson

      *   Michel Upchurch'
    generated_at: '2026-07-11T06:43:22.266189Z'
  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT:

      *   Big Head Gully watershed in Fairhope, AL is threatened by land development.

      *   Conflict of interest identified involving Mr. Lee Turner, Head of Single
      Tax and Fairhope Planning and Zoning.


      THE DISCOVERY:

      *   The Fly Creek Apartments development faced a six-day trial in Bay Minette.

      *   City Council endorsed the project in October 2016.

      *   The drainage plan for the apartments calls for a single point discharge
      at the outfall pipe.

      *   This plan involves detouring the current 1 acre retention pond and omitting
      expansion to a 5 acre pond.

      *   Excess stormwater will be dumped directly into wetlands, which drain into
      Fly Creek 100-150 feet from the outfall pipe combined with Publix drainage.


      THE PIVOT:

      *   Article 2 reveals the specific environmental mechanism (the flawed drainage
      plan) that allows for pollution impacting Fly Creek, which directly ties into
      the planning and zoning decisions criticized in Article 1 concerning Big Head
      Gully.


      KEY ENTITIES:

      *   Lee Turner (Head of Single Tax and Fairhope Planning and Zoning)

      *   Fairhope City Council

      *   Fly Creek Apartments development

      *   Bay Minette

      *   Jack Burrell and Kevin Boone (owners/parties involved in wetlands)'
    generated_at: '2026-07-11T06:43:22.266195Z'
  fairhopes-triangle-mega-site:
    brief: 'THE CONFLICT

