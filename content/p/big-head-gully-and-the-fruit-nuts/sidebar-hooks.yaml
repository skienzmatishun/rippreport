      lawsuit.

      *   The lawsuit settlement cost the City $11.25 million.

      *   Attorneys charged $3 million in fees despite promises that the City would
      pay none.

      *   Councilman Burrell and Boone attempted to conceal the purchase from public
      participation.


      THE PIVOT

      *   Article 2 reveals a specific instance of political corruption (Triangle
      property settlement) involving Councilman Burrell and Boone, demonstrating how
      local officials use legal maneuvers and financial incentives to control land
      decisions for private benefit.

      *   This parallels Turner’s alleged "inside deal" mentioned in Article 1 regarding
      development conflicts.


