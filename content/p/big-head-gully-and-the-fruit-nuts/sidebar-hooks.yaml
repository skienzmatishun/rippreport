  fly-creek-a-drainage-ditch:
    brief: '**THE CONFLICT**

      *   Fairhope City Council approved development projects that threatened vital
      waterways, specifically impacting the Fly Creek Watershed.

      *   In October 2016, the council endorsed the Fly Creek Apartments project despite
      public opposition and watershed concerns.

      *   Lee Turner served as both Head of Single Tax and President/Chair of Fairhope
      Planning and Zoning (a potential conflict of interest cited in relation to Big
      Head Gully).


      **THE DISCOVERY**

      *   The developer for the apartment complex provided a "gift" resulting in property
      acquisition of wetlands by Council members Jack Burrell and Kevin Boone.

      *   Current drainage plans involve discharging stormwater directly into these
      specific wetlands, which then drain into Fly Creek.

      *   Adam Milam (Plaintiff''s attorney) argued that the City Council prioritized
      political pressure and development over protecting Baldwin County residents
      from runoff, erosion, and sedimentation impacts.


      **THE PIVOT**

      *   Article 1 identifies a systemic conflict of interest within Fairhope Planning
      and Zoning (Lee Turner). Article 2 provides proof that this pattern is not limited
      to regulatory oversight but includes direct financial benefit; Council members
      Burrell and Boone personally own the wetlands being used as the mandated stormwater
      discharge point for these developers.


      **KEY ENTITIES**

      *   Big Head Gully / Tatumville Gulley

      *   Fly Creek Watershed

      *   Lee Turner (Head of Single Tax and Fairhope Planning and Zoning)

      *   Jack Burrell (Council Member)

      *   Kevin Boone (Councilman/Developer)

      *   Adam Milam (Plaintiff''s attorney, Friends of Fly Creek)

      *   Fairhope City Council

      *   Publix

      *   Single Tax Corporation'
