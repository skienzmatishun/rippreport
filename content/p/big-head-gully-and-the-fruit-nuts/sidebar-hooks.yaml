  fairhope-jester-and-fly-creek:
    brief: 'THE CONFLICT

      *   Lee Turner held concurrent roles as Head of Single Tax Corporation and Head
      of Fairhope Planning and Zoning (Main Article context) regarding land development
      in Big Head Gully.

      *   Fairhope utilities and the City Planning Commission established a standard
      for gravity fed sewer systems in new developments on December 20, 2002.

      *   A specific ethics complaint (Case #2018-42) was filed against Robert Brown,
      Fairhope City Councilman and Eastern Shore Art Center Board member.


      THE DISCOVERY

      *   The "Jester" (Fairhope City Councilman/local figure) is simultaneously building
      a home on Fly Creek while supporting developers like Kant-Corte Apartments and
      referencing damage caused by the Publix project.

      *   Developers are increasingly pushing low pressure sewer systems, which bypass
      the established City standards (Gravity Fed), to reduce their initial system
      costs, shifting ongoing grinder pump maintenance expenses onto homeowners.


      THE PIVOT

      *   The Widget Article proves that the development threats mentioned in the
      Main Article are part of a wider systemic pattern where multiple local officials
      and developers operate with conflicts of interest or circumvent city environmental
      and infrastructure standards (e.g., the conflict surrounding Councilman Robert
      Brown, the Jester''s self-interest on Fly Creek, and the push for non-standard
      sewer systems).

      *   It connects the abstract concern over "land development" in Big Head Gully
      to specific regulatory failures regarding wastewater management and local official
      ethics.


      KEY ENTITIES

      *   Lee Turner (Head of Single Tax/Fairhope Planning and Zoning)

