  captain-jack:
    brief: 'THE CONFLICT

      *   2016: Documents were presented regarding suspicious handling of hanger leases
      at the Airport. Captain Jack received free air miles and golf vacations from
      a board member while overseeing the bid process for that same board member.

      *   The Authority receives 7 cents on the dollar as fuel income, with no record
      of usage, and the Fixed Based Operator does not share consumption data.


      THE DISCOVERY

      *   Fairhope Airport Authority held a special meeting on January 8th to discuss
      a "notice of availability," revisiting issues from the failed 2016 lease process.

      *   Captain Jack confronted Board Chairman Joe McEnerney, who was guaranteeing
      hanger locations prior to any bid process.

      *   Captain Jack asserted that no one receives a hanger location without his
      approval.

      *   Captain Jack criticized Council President Burrell for his role as City liaison
      and criticized Joe McEnerney for guaranteeing certain "chosen ones" hanger locations.


      THE PIVOT

      *   Article 2 shows that the past issues (2016 lease bidding fraud) are being
      actively revisited in a current meeting, proving that Captain Jack maintains
      ultimate control over hanger location decisions, which was previously undermined
      by his controlling status ("at the controls").


      KEY ENTITIES

      *   Fairhope Airport Authority

      *   Captain Jack

      *   Jack Burrell (Council President/City liaison)

      *   Joe McEnerney (Board President/Chairman of the Board)

      *   2016 lease bids'
    generated_at: '2026-07-10T22:48:17.664453Z'
  fairhope-citizens-citizens-citizens:
    brief: 'THE CONFLICT:

      *   Fairhope Airport Authority is controlled by Jack Burrell, who serves as
      Fairhope Council President and liaison to the Authority.

      *   There are suspicions regarding leases of hangers handled by Captain Jack
      for personal benefits (free air miles, golf vacations).

      *   The Authority receives 7 cents on the dollar from lease holders with no
      record of fuel usage.


      THE DISCOVERY:

      *   The Airport Authority debt represents 21 percent of Fairhope''s overall
      borrowing.

      *   Fairhope Mayor Wilson urged the council to take ownership of 258 acres purchased
      by the Authority in 2007 for $8.85 million to pay down debt and market the land.

      *   Jack Burrell actively resists efforts to transfer property ownership from
      the Airport Authority to the City.


      THE PIVOT:

      *   Article 2 proves that the internal control issues highlighted in Article
      1 (leases, lack of transparency) are tied directly to a major financial dispute
      over municipal assets (land ownership and debt).

      *   Burrell''s refusal to recuse himself from alleged bid involvement confirms
      his role in protecting the Authority''s status quo against public/political
      interests.


      KEY ENTITIES:

      *   Jack Burrell (Fairhope Council President, Airport Authority Board member,
      liaison)

      *   Captain Jack (Airport Authority pilot)

      *   Mayor Karin Wilson

      *   Joe McEnerney (Authority Board President)

      *   Fairhope Airport Authority

      *   258 acres purchased in 2007 for $8.85 million'
