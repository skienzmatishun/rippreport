      *   Burrell resigned from the Fairhope Council Presidency abruptly after nine
      years.


      THE PIVOT

      *   Article 2 establishes Burrell’s long-term pattern of corrupt influence (puppet
      for developers) and specific actions within the Airport Authority (canceling
      meetings, bid rigging), confirming the suspicion raised in Article 1 regarding
      his control over the Authority.

      *   This proves that Burrell''s actions were not isolated incidents but systemic
