      - Leaking proves Burrell violates attorney-client confidentiality norms, validating
      corruption/ethics allegations in Main Article.

      - Self-incrimination: Burrell’s attempt to spin the leak deepens obstruction
      charges while attacking the Mayor.


      4. KEY ENTITIES:

      - Karin Sullivan / Karin Wilson (Mayor)

      - Jack Burrell (Council President)

      - Gulf Coast News

      - $6.2 Million Waterfront Project Fund

      - City of Fairhope Council'
    generated_at: '2026-03-17T18:24:53.255480Z'
    text: Jack Burrell’s history of airport bid rigging and FEMA fraud has finally
      hit a new, desperate low. He allegedly leaked confidential legal letters to
      the press just to cover his own tracks and attack the Mayor. This is the smoking
      gun that proves Burrell will violate any law to keep his grip on Fairhope’s
