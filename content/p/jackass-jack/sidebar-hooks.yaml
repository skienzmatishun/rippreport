      2. THE DISCOVERY:

      - Gulf Coast News published portions of the confidential letter on June 12.

      - Publication revealed Mayor’s threat not to pay taxpayer money for frivolous
      legal claims against her during her tenure.

      - Disclosure showed Executive Session requested for litigation and marina lease
