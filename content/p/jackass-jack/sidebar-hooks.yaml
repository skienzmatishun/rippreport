  dollars-and-lives:
    brief: 'THE CONFLICT

      Fairhope Mayor Sullivan and Council President Jack Burrell proceeded with a
      large public tree lighting gathering during the COVID-19 pandemic despite warnings
      from medical professionals and first responders.

      Baldwin County doctors, nurses, teachers, and school administrations advised
      the public against gatherings larger than 8 to 10 people.

      Mayor Sullivan addressed a crowd without wearing a mask; many attendees appeared
      mask-less despite her previous provision of masks at the event.

      Jack Burrell is currently Council President (8 years tenure) with past controversies
      including alleged FEMA fraud, airport bid rigging, K-1 center fiasco, and Fly
      Creek Apartments issues.


      THE DISCOVERY

      Ripp Report filed a FOIA request for the official documents regarding Fairhope''s
      $6.2 million waterfront project grant.

      Charrette data from the Wilson administration shows 164 participants plus a
      total of 570 people provided feedback over several months.

      The new administration only accepted written comments for a two-week period,
      which Ripp Report flagged as insufficient transparency.

      The City of Fairhope is revealed to have built the original pier/coffer dam
      fill using dirt from the current road entrance over 100 years ago.


      THE PIVOT

      Article 2 confirms the "smoking gun" regarding Article 1''s Waterfront Project
      warning by showing Ripp Report is actively documenting how Mayor Sullivan and
      Jack Burrell handle that $6.2 million budget using FOIA requests.

      Article 2 validates the public pressure mentioned in Article 1 by confirming
      the decision to cancel the Christmas Parade due to health concerns.

      The financial data requested (charrette/FOIA) links the leadership''s handling
      of safety crises directly to their control over development funds.


      KEY ENTITIES

      Fairhope, Alabama (City Council/City Administration)

      Mayor Sullivan

      Jack Burrell (Council President)

      Former Mayor Wilson

      The Ripp Report

      Waterfront Project ($6.2 million grant funding)

      K-1 Center / Fly Creek Apartments (Burrell past controversies)'
    generated_at: '2026-03-17T18:24:53.255457Z'
    text: Sullivan and Burrell ignored doctors' warnings to push their political agenda
      during the COVID crisis. Now, our FOIA request reveals they are doing the exact
      same thing with a $6.2 million waterfront grant. They are burying citizen feedback
      to force through a plan that serves their interests, not the people’s safety.
