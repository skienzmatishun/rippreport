hooks:
  slap-in-the-face:
    brief: '1. THE CONFLICT

      - September 15, 2020: Chris E. Warner publishes “READING IN THE RAIN” reviewing
      Thomas Gallion’s book “Shadow Government: Southern Style.”

      - Book claims Alabama Gov. Bob Riley orchestrated rigged ruling in Exxon-Mobil
      tax case (originally $3.1B owed).

      - Claims Riley sent son Rob Jr. to provide legal services for Exxon-Mobil while
      influencing Alabama Supreme Court.

      - Winner: Reduced award from $3.1 billion to $51 million using judicial influence.

      - Book claims Baldwin County, Fairhope and political machines operate a “Cabal.”

      - October 17, 2020: The Ripp Report publishes “SLAP IN THE FACE” citing new
      judicial misconduct in Baldwin County.

      - Spanish Fort Mayor Mike McMillian acquitted of harassment charge despite video
      footage; charged with slapping woman.

      - Fairhope Municipal Attorney Marcus McDowell claimed he would file charges
      in McSherry/assault case but failed to do so.


      2. THE DISCOVERY

      - Mike McMillian joined “Sean Connery Club” of acquitted politicians despite
      witness video evidence.

      - Baldwin County judiciary and prosecutors protecting figures with power/money
      regardless of video proof.

      - Fairhope Municipal Attorney Marcus McDowell ignored legal obligations to file
      charges in ongoing assault case involving Paula DiNiardi.

      - Specific allegations against elected officials match corruption pattern (BP
      fraud, FEMA fraud) previously identified by Gallion.


      3. THE PIVOT

      - Article 1 establishes theoretical corruption; Article 2 proves it is active
      and ongoing using specific 2020 events.

      - McMillian’s acquittal validates the claim that Baldwin County judicial system
      allows corruption to “WALK.”

      - McDowell’s inaction validates Gallion’s claim of a local Cabal using judicial
      office for protection.

      - Confirms Article 1 warning that Alabama makes Washington look like a puddle
      of corruption.


      4. KEY ENTITIES

      - Chris E. Warner (Author)

      - Thomas Gallion (Book Author)

      - Bob Riley (Former Alabama Governor)

      - Rob Riley Jr. (Riley son)

      - Marcus McDowell (Fairhope Municipal Attorney)

      - Mike McMillian (Spanish Fort Mayor “Slappin Mike”)

      - Tripp Pittman (Senate member, BP fraud accused)

      - Chris Elliott (Alabama Senator, DUI involved)

      - Albert Patterson (Former AG, assassinated 1950s)

      - Richard Scrushy (HealthSouth CEO)'
