      - New administration offering only 14 days notice on proposal and no public meetings to vet plans prior to council approval.

      THE DISCOVERY:
      - Article 2 confirms the $6.2 million waterfront project is tied to a federal grant with stipulations: Bank Stabilization, ADA compliance, erosion controls.
      - Article 2 specifies GMC engineer Scott Hutchinson proposed new sand beach north of pier, fill dirt for pedestrian ramps.
      - Article 2 states Mayor Sullivan and Council President Burrell are "adamantly opposed" to Hutchinson’s new beach proposal.
      - Article 2 links part-time resident Howling Raines as an active participant enlisting by Sullivan/Burrell to attack Hutchinson's plans and public input.
      - Article 2 claims Catalyst Scott/Boone ("CSB") controls the Fairhope council, municipal judge, city attorney, and Mayor (current).

      THE PIVOT:
      - Article 2 serves as proof that the "political distortions" mentioned in Article 1 are driven by a specific group (CSB) using Raines as a weapon against previous transparency efforts.
      - Article 2 validates Article 1’s claim that the new plan isn't vetted by citizens: Wilson had surveys, Sullivan/Burrell now offering only "two weeks to submit further comments in writing."
      - Article 2 exposes Raines’ role: While Article 1 says Raines got "fleas," Article 2 proves he is being used to justify changing plans (eliminating beach/ramp elements) despite grant stipulations.
      - Article 2 links Raines directly to the shift in project direction: "Sullivan and Jack Burrell... are now enlisting part time resident and infamous journalist, Howling Rains."

      KEY ENTITIES:
      - Mayor Sherry Sullivan
      - Jack Burrell (City Council President)
      - Mayor Wilson (Previous Administration)
      - Howling Raines
      - Scott Hutchinson (GMC Engineer)
      - CSB (Catalyst Scott/Boone group)
      - RESTORE Act (Resources and Ecosystem Sustainability, Tourist Opportunities and Revived Economy)
