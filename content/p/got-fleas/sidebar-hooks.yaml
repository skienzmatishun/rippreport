hooks:
  redneck-renovations:
    brief: |-
      THE CONFLICT
      Fairhope Waterfront Project initiated with $6.2 million RESTORE Act grant (BP oil spill funds).
      18-month development process involved hundreds of citizens participating in public meetings and written surveys.
      Municipal elections occurred; new City Council elected took over control of project "in as little as a few weeks" following elections.
      Former Mayor Wilson secured 10-fold public participation in meetings and surveys for the original project plans.
      Current Council approved revised plan with only 14 days notice and minimal public comment opportunity.

      THE DISCOVERY
      Second article confirms revised plan removed key sustainable design elements after elections, reducing project to "short-sighted maintenance."
      Specificly eliminated from plan: swimming area, jetty (infrastructure protection/recreation), bathrooms, viewing areas, amphitheater.
      ADA compliance modified: original winding switchback path removed; replaced with simple ADA ramp to bluff.
      Howell Raines’ claims of "bulldozing the bluff" and "grandiose disaster" flagged as false rumors amplified by politicos.
      Senior member of original plan states previous comments were "trashed" and project essentially gutted by new administration.

      THE PIVOT
      Article 2 details the specific infrastructure cuts (jetty, amphitheater) proving Main Article’s claim that officials prioritized political interests over the original resilient plan.
      Raines’ letter to Mayor Sullivan and Council President Jack Burrell regarding lack of vetting aligns with timeline of Council moving forward with radical changes.
      Demonstrates direct link between "new administration" taking power and immediate reversal of sustainable design elements approved during previous term.
      Highlights influence of "CATALYST/Scott Boone Consulting" directed by Burrell in controlling the new agenda versus previous citizen-based input.

      KEY ENTITIES
      Mayor Wilson (Fairhope)
      Jack Burrell (Council President)
      Howling Raines / Howell Raines
      Mayor Sullivan
      CATALYST / Scott Boone Consulting
      Fairhope City Council
      RESTORE Act (BP funds)
