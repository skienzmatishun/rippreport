      \ Senator misled the public regarding Ethics Commission opinions concerning\
      \ these multi-million dollar contracts.\n*   Ripp claimed Pittman used his position\
      \ and private business to secure lucrative municipal contracts predominantly\
      \ paid for by federal/state funds.\n\n**THE DISCOVERY:**\n*   Robert Brown,\
      \ a Fairhope City Councilman and General Partner in 'Pittman and Brown Development\
