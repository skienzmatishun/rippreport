  investigative-reporting:
    brief: 'THE CONFLICT:

      *   July 7, 2016: Complaint filed with the State of Alabama Ethics Commission
      regarding Senator Pittman and the Mayor of Fairhope.

      *   Senator Pittman maintained debris removal contracts with the city of Fairhope
      since 2004.

      *   The Mayor and Senator were subject to an FBI investigation concerning BP
      fraud.

      *   The Mayor claimed the Ethics Commission letter gave permission for Pittman
      to proceed with contracts.

      *   Both the Mayor and Senator claimed the Ethics Commission exonerated them
      from BP Fraud claims.


      THE DISCOVERY:

      *   Connie “the Hachette” Baggett broke a story in November 2010 detailing senators''
      company receiving contract awards ($63,900).

      *   This reporting led to retaliation by newly elected commissioners Dorsey
      and James (Pittman’s business partner).

      *   Retaliation included the demotion of the EMA director and firings of whistleblowers.

      *   Matt Hart, special council for the Alabama Attorney General''s office, CONVICTED
      the Speaker of the House Mike Hubbard in a white collar crime case related to
      the BP Fraud Division complaint.

      *   Senator Trip Pittman received a subpoena in a federal investigation concerning
      a BP oil spill contract.


      THE PIVOT:

      *   Article 2 provides concrete evidence (Baggett''s reporting and Hart’s conviction)
      that links past actions (contract awards/fraud investigations) to current official
      behavior, proving the allegations of conflict of interest and fraud raised by
      Article 1 are substantiated by legal outcomes.


      KEY ENTITIES:

      *   Senator Pittman

      *   Mayor of Fairhope

      *   State of Alabama Ethics Commission

      *   FBI investigation

      *   Special Prosecutor Matt Hart (Alabama Attorney General''s office)

      *   Bob James

      *   Connie “the Hachette” Baggett

      *   Dorsey and James (Commissioners)

      *   Mike Hubbard

      *   Fairhope City Council'
