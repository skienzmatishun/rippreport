  you-show-me-yours-and-i-will-show-you-mine-letter-that-is:
    brief: 'THE CONFLICT:

      *   Senator Pittman maintained debris removal contracts with the city of Fairhope
      since 2004, except when his business partner Bob James held the contract.

      *   Senator Pittman and Mayor Kant were subject to an FBI investigation regarding
      BP fraud.

      *   The Main Article stated that Senator Pittman admitted poor judgment but
      broke a promise not to seek contracts from his district.


      THE DISCOVERY:

      *   The Widget Article directly refutes the claim made by the Mayor/Senator
      that they possess a letter from the Ethics Commission exonerating them from
      any wrongdoing involving the Fairhope BP Boom Grant.

      *   The Widget Article asserts that the Ethics Commission "closed the file"
      instead of investigating, and the FBI conducted the investigation which resulted
      in a Grand Jury.


      THE PIVOT:

      *   Article 2 serves as the smoking gun by stating definitively: "They do not
      have such a letter." This directly contradicts the Main Article''s implication
      that the Mayor and Senator are using an exoneration to legitimize their contracts
      with federal funds, proving their claims regarding Ethics Commission approval
      are false.


      KEY ENTITIES:

      *   Senator Pittman

      *   Mayor Kant

      *   Fairhope City Council

      *   State of Alabama Ethics Commission

      *   FBI

      *   Special Prosecutor Matt Hart

      *   BP Fraud

      *   Federal Emergency Management Agency (FEMA)'
