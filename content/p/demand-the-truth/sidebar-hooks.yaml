  theyre-screwing-us-alabama-and-telling-us-to-like-it-john-archibald:
    brief: 'THE CONFLICT:

      *   July 7, 2016: Francis Paul Ripp submitted a complaint to the Alabama State
      Ethics Commission regarding conflicts of interest in Fairhope municipal contracts.

      *   Allegation against Senator Pittman: He maintained debris removal contracts
      with the City of Fairhope since 2004 (with one exception where business partner
      Bob James held the contract).

      *   Associated Investigation: The Mayor of Fairhope and Senator Pittman were
      subject to a BP fraud investigation handled by Special Prosecutor Matt Hart.

      *   Allegation regarding ethics ruling: Ripp claims the Mayor used an Ethics
      Commission letter—which was merely an opinion based on rules—as "permission"
      for contracts, asserting that both the Mayor and Senator falsely claimed the
      Ethics Commission exonerated them from BP Fraud claims.

      *   Continuation of Alleged Misconduct: Pittman allegedly broke a promise not
      to bid on district contracts and continued to do so despite prior warnings/investigations.


      THE DISCOVERY:

      *   Current Issue: The Alabama Ethics Commission is reportedly seeking to expand
      its role by changing existing state ethics laws.

      *   Allegation against the change: Ripp claims these proposed changes would
      allow practices currently considered illegal for elected officials (like engaging
      in municipal contracts that benefit them directly) to become legal.

      *   Political Catalyst: These legislative changes are being pushed, in part,
      due to the Mike Hubbard conviction.


      THE PIVOT:

      *   Article 1 establishes a historical pattern of alleged conflicts of interest
      and corruption enabled by an Ethics Commission letter/opinion concerning Senator
      Pittman (2016).

      *   Article 2 reveals that the Ethics Commission is now seeking legislative
      changes that would potentially legalize the exact type of behavior previously
      flagged as illegal conflict-of-interest activity in Article 1, suggesting systemic
      institutional failure.


      KEY ENTITIES:

      *   Francis Paul Ripp

      *   Senator Pittman

      *   Bob James

      *   Mayor of Fairhope (unnamed individual)

      *   Matt Hart (Special Prosecutor, Alabama Attorney General''s office)

      *   Alabama State Ethics Commission

      *   Fairhope City Council

      *   Mike Hubbard'
