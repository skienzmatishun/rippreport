  ethics-comedians:
    brief: 'THE CONFLICT:

      *   **Date:** July 7, 2016.

      *   **Subject:** Allegations against State Senator Trip Pittman and the Mayor
      of Fairhope regarding conflicts of interest and BP Fraud investigations.

      *   **Event:** The Senator maintained debris removal contracts with the City
      of Fairhope since 2004 (except for a period where Bob James held the contract).

      *   **Investigation Status:** Both Pittman and the Mayor were subject to an
      FBI/special prosecutor investigation regarding "BP fraud."

      *   **Ethics Commission Involvement:** Ripp claims the Ethics Commission issued
      an opinion letter; however, he asserts that both the Mayor and Senator claimed
      this letter was "permission," which Ripp disputes.


      THE DISCOVERY:

      *   The 2017 article reveals a pattern of institutional bias within the Alabama
      Ethics Commission (AEC).

      *   It states the AEC dismisses investigations with simple one-page statements,
      finding "no probable cause" to accuse officials like Burrell and Hix of violating
      the Ethics Act.

      *   Regarding Senator Trip Pittman''s involvement in the BP Boom scandal: The
      AEC allegedly found no violations concerning his $750,000 in municipal contracts
      where he was appointed trustee for BP funds (contradicting Ripp’s earlier claims).


      THE PIVOT:

      *   Article 1 raises questions about whether the Ethics Commission''s opinion
      truly exonerated Pittman and the Mayor regarding fraud.

      *   Article 2 proves that the AEC often uses standardized dismissal procedures
      ("no probable cause") to shield elected officials, regardless of evidence (as
      seen in Burrell/Hix case).

      *   This establishes that the initial defense used by Pittman and the Mayor
      (that they were "exonerated" or received "permission") was based on a potentially
      biased institutional procedure designed to avoid accountability.


      KEY ENTITIES:

      *   **People:** Trip Pittman, Bob James, Burrell, Hix, Matt Hart (Special Prosecutor),
      Francis Paul Ripp.

      *   **Organizations:** Alabama Ethics Commission, Fairhope City Council, FBI,
      The Ripp Report, BP (BP Boom scandal).

      *   **Locations/Bodies:** State of Alabama, Baldwin County, Fairhope (City/Municipality).'
