  fairhope-airport-un_authorized:
    brief: 'THE CONFLICT:

      *   The City Council settled a Sherry Sullivan claim using taxpayer money in
      executive session.

      *   Jack Burrell led the charge to reward bad behavior leading to Sullivan’s
      firing and proposed checks for Jenniffer Fidler.

      *   The Ethics Commission concluded there was no probable cause to believe Jack
      Burrell or Hix committed a violation of the Alabama Ethics Act.


      THE DISCOVERY:

      *   An advisory ethics opinion (no. 2016-04) established that an Airport Authority
      member cannot use confidential information gained from their position to benefit
      their company/bid.

      *   The lease agreement for Mid-Bay Air LLC was signed on December 23, 2015.

      *   Board member Ray Hix was privy to confidential information regarding airport
      leases and bids.

      *   Jack Burrell set up an ad hoc committee chaired by himself, reviewed bids,
      and determined his associate board member was the winner despite conflicts of
      interest.

      *   The Ethics Commission stated that no lease was ever submitted for review
      regarding the Mid-Bay Air Lease in 2016.


      THE PIVOT:

      *   Article 2 provides specific documentation (the ethics opinion and lease
      details) proving Jack Burrell failed to oversee an obvious conflict of interest
      during a major airport lease award.

      *   This evidence directly undermines the claims made in Article 1 regarding
      Burrell’s "leadership" and failure to address ethical issues within the Airport
      Authority structure.


      KEY ENTITIES:

      *   Jack Burrell

      *   Hix (Ray Hix)

      *   Sherry Sullivan

      *   Jenniffer Fidler

      *   Fairhope Mayor Karin Wilson

      *   Alabama Ethics Commission

