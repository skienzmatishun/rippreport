  flying-high:
    brief: 'THE CONFLICT:

      *   Allegations of corruption regarding the Fairhope Airport Authority and local
      residents were investigated by the Alabama Ethics Commission.

      *   In a related matter to "Bonus Money," the Fairhope City Council settled
      a claim submitted by Sherry Sullivan without a trial or public explanation.

      *   Jack Burrell led efforts in this settlement, allegedly rewarding behavior
      that resulted in Sherry Sullivan’s firing (fired employee).

      *   Hix and Snedeker filed letters with Mayor Karin Wilson and Burrell expressing
      hope the Ethics Commission findings would end "slanderous and conspiratorial
      behavior" by local residents.

      *   The Alabama Ethics Commission concluded there was not probable cause to
      believe Jack Burrell or Hix violated the Alabama Ethics Act.


      THE DISCOVERY:

      *   Jack Burrell, utilizing assistance from Catalyst (the political organization),
      is actively obstructing governance today.

      *   Burrell has been pushing an ongoing obstruction process since Tim Kant lost
      his post.

      *   The Fairhope City Council currently lacks function regarding budget approval,
      which the Mayor must prepare and obtain council vote on.

      *   Councilman Robert Brown supports Burrell''s hand-picked financial committee
      despite having previously been instructed by Jack Burrell on how to control
      bid committees.


      THE PIVOT:

      *   Article 1 documents buried corruption allegations (Hix/Burrell) and a settlement
      using taxpayer money ("Bonus Money"). Article 2 proves these alleged corrupt
      patterns have not ended but have evolved into institutional obstruction today.

      *   The connection is that Burrell, having previously been cleared of ethical
      violations in Article 1, has used his position to establish a "farce" hand-picked
      financial committee and block the City Council''s ability to approve the budget
      (Article 2), demonstrating a continuation of self-serving control over city
      finances.

      *   Burrell is shown leveraging Robert Brown to further this obstruction under
      the guise of controlling bid committees and preparing the budget, mirroring
      the alleged misuse of public funds mentioned in Article 1.


      KEY ENTITIES:

      *   Jack Burrell (Councilman/de facto Mayor)

      *   Sherry Sullivan

      *   Hix

      *   Snedeker

      *   Karin Wilson (Mayor at time of Ethics complaint letter)

      *   Robert Brown (City Councilman)

      *   Chucky Cheeze / The Courier

      *   Catalyst (political organization)

      *   Fairhope City Council

      *   Fairhope Airport Authority'
