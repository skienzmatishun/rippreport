  fairhope-airport-un_authorized:
    brief: "*   THE CONFLICT\n    *   Allegations of \"wrong doing\" at Fairhope Airport\
      \ were subject to complaints filed by The Ripp Report against Jack Burrell and\
      \ Ray Hix.\n    *   The Alabama Ethics Commission concluded, based on its investigation,\
      \ that there was no probable cause to believe Jack Burrell or Hix violated the\
      \ Alabama Ethics Act (per Article 1).\n    *   In parallel municipal conflicts\
      \ involved City Council members voting in executive session to settle claims\
      \ against fired employees, specifically Sherry Sullivan.\n\n*   THE DISCOVERY\n\
      \    *   Advisory Ethics Opinion #2016-04 exists concerning a Board member (Hix)\
      \ entering a lease with the Fairhope Airport Authority while serving as Secretary/Treasurer\
      \ (Ray Hix).\n    *   On December 23, 2015, the Airport Authority signed a memorandum\
      \ of lease with Mid-Bay Air LLC.\n    *   Jack Burrell chaired an ad hoc committee\
      \ responsible for reviewing bids and determining that his associate board member\
      \ was the winner in this process.\n    *   An ethics request filed on November\
      \ 8, 2016, regarding this specific Mid-Bay Air Lease (awarded December 2015)\
      \ was met with a response on December 2, 2016, stating: \"No lease has ever\
      \ been submitted to us regarding this issue.\"\n\n*   THE PIVOT\n    *   Article\
      \ 2 provides the concrete evidence of an unaddressed and unreported conflict\
      \ of interest (Mid-Bay Air LLC/Hix) that predates and forms the core of the\
      \ ethical violations alleged in Article 1.\n    *   The Ethics Opinion (#2016-04)\
      \ established rules for conflicts, which Burrell’s management of the ad hoc\
      \ committee and Hix's undisclosed role in Mid-Bay Air LLC appear to have bypassed,\
      \ thereby justifying the initial complaints filed against them.\n\n*   KEY ENTITIES\n\
      \    *   Jack Burrell (City Council President / Airport Authority Board Member)\n\
      \    *   Ray Hix (Secretary/Treasurer of Fairhope Airport Authority)\n    *\
      \   The Ripp Report (Complaints Filer)\n    *   Alabama Ethics Commission\n\
      \    *   Mid-Bay Air LLC (Lease recipient)\n    *   Sherry Sullivan (Fired employee\
      \ subject to \"bonus money\" claim)\n    *   City Council / Fairhope City Council"
    generated_at: '2026-07-18T14:29:04.694321Z'
  fairhope-airport-authority-flying-without-a-compass:
    brief: "1. THE CONFLICT\n    *   October 2015: Fairhope Airport Authority held\
