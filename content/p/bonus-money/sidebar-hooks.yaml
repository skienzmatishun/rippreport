      \ use of taxpayer money for \"Bonus Money,\" are part of a deeper history of\
      \ institutional disregard for ethics at Fairhope.\n\n4. KEY ENTITIES\n    *\
      \   Fairhope City Council\n    *   Fairhope Airport Authority\n    *   Jack\
      \ Burrell\n    *   Hix (and his involvement with the Ethics Commission)\n  \
      \  *   Snedeker\n    *   Sherry Sullivan\n    *   Chris\n    *   Chucky Cheeze"
    generated_at: '2026-07-18T14:29:04.694327Z'
