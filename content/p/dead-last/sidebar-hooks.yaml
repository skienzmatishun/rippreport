  mega-lost-opportunity:
    brief: 'THE CONFLICT:

      *   Mid-2011: $32 million invested in the Baldwin County Mega site project.

      *   County Commission and economic development efforts promised a car manufacturing
      plant.

      *   The Mega site lacks a sign, identity, infrastructure (rail, water, power),
      or constructive sales package since 2015.

      *   Treasurer Kimberly Creech approved payments to Crosby Trust ($25,976,500)
      and Catawba Land Company LLC ($6,312,500) for the property in 2012.

      *   Total investment is estimated around $48 million including interest.


      THE DISCOVERY:

      *   Lee Lawson of the Baldwin County Economic Development Alliance (BCEDA) claims
      the site is "shovel ready."

      *   Lawson reported courting 55 to 60 "real inquiries" over eight years but
      has failed to secure any sales or contracts for the site.

      *   The BCEDA''s claims regarding potential development are misleading, based
      on exaggerated inquiries and no proof of sale/lease activity.


      THE PIVOT:

      *   Article 1 accuses county officials and BCEDA of spin and bad deals.

      *   Article 2 proves that Lee Lawson is exaggerating the site''s readiness (55-60
      inquiries) despite the physical lack of infrastructure or signage, proving his
      sales pitch is false.


      KEY ENTITIES:

      *   Baldwin County Mega site

      *   $32 million investment

