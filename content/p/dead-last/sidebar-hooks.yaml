      *   The Commission authorized the Baldwin County Economic Development Alliance
      to proceed with $7 million for needed infrastructure.

      *   There is currently no contract or letter of intent for the mega-site.


      THE PIVOT

      *   Article 1 states that the site is stalled and promises are fading. Article
      2 proves that despite the lack of a formal contract, official bodies (County
      Commission/Alliance) have authorized $7 million in infrastructure spending,
      suggesting movement past the initial impasse.


