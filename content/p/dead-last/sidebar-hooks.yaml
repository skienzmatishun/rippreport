  economic-development-baldwin-county-style:
    brief: 'THE CONFLICT:

      *   Baldwin County invested $32 million in 2012 for 2300 usable acres designated
      as the Mega site.

      *   The county commission sold the project to "sleeping citizens."

      *   County employees helped pay the $32 million price tag.

      *   Lee Lawson of the Baldwin County Economic Development Alliance claims the
      Mega site is the only certified mega site in Alabama remaining.


      THE DISCOVERY:

      *   The Mega site property remains vacant as of the article date.

      *   The value of the $32 million investment is estimated to be worth $50 million
      today, factoring in lost opportunity.

      *   Current county commissioners claim greater oversight and stated the Mega-site
      would not be approved by the commission in 2017.

      *   County commissioners skimmed $5 million off infrastructure projects via
      a penny school tax without voter approval.


      THE PIVOT:

      *   Article 2 provides the specific financial details ($32 million investment,
      who paid, current status) that validate the claims of lost opportunity and failure
      stated in Article 1 regarding the Mega site''s status.

      *   Article 2 confirms the mechanics of the deal (county employees paying) and
      the current lack of progress, making it the evidence behind the narrative of
      dead-end economic development presented in Article 1.


      KEY ENTITIES:

      *   Baldwin County Commission

      *   Lee Lawson

      *   South Alabama Mega Site

      *   Jack Burrell (Council President)

      *   Fairhope Airport

      *   County employees'
