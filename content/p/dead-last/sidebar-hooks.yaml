  elliotttuckercatalyst-selling-your-soul:
    brief: 'THE CONFLICT:

      *   Mid-2011: Baldwin County committed a $32 million investment toward the South
      Alabama Mega Site (3000-acre industrial park).

      *   The county and political figures continuously promoted the mega site as
      the primary remaining economic opportunity in Alabama.

      *   Despite initial sales pitches regarding attracting manufacturing plants,
      the project failed to secure major businesses/plants.

      *   Lee Lawson of the Baldwin County Economic Development Alliance (BCEDA) claimed
      the Mega Site was the only certified mega-site left in the state during a bid
      for automotive investment.


      THE DISCOVERY:

      *   Article 2 exposes that current politicians Elliott and Tucker Dorsey are
      driven by significant campaign contributions from developers and CATALYST.

      *   It reveals the Mega Site project was a "$35 million for a cow pasture with
      a gate to no where," characterizing it as a "good ole boy deal" favored by CATALYST.

      *   The article asserts that Elliott and Dorsey prioritized using county reserves
      for this politically motivated deal over repairing existing county infrastructure
      (e.g., BP money usage).


      THE PIVOT:

      *   Article 1 describes the economic failure of the mega site; Article 2 reveals
      the political mechanism behind that failure, proving the investment was a donor-favored,
      politically driven project ("good ole boy deal") orchestrated by figures benefiting
      from CATALYST donations rather than genuine economic development.


      KEY ENTITIES:

      *   South Alabama Mega Site (3000 acres)

      *   Baldwin County Economic Development Alliance (BCEDA)

      *   Lee Lawson

      *   Elliott (State Senator/County Commissioner)

      *   Tucker Dorsey (Commissioner/Catalyst Endorsee)

      *   CATALYST (Political organization)

      *   Clarence Burke (President of BCSS)

      *   $32 Million / $35 Million (Project investment figures)'
