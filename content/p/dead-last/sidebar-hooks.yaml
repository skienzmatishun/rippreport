hooks:
  cattle-gate-mega-site:
    brief: 'THE CONFLICT

      *   $32 million investment made in the Baldwin County Mega site since mid-2011.

      *   The county commission and Baldwin County Economic Development Alliance failed
      to generate interest or secure a tenant for the mega-site.

      *   Commissioners are being held responsible due to failure to develop the site.


      THE DISCOVERY

      *   All mega-sites in the southeast have been sold.

      *   This confirms Baldwin County is "dead last" but suggests improved potential
      for future development compared to the past situation.


      THE PIVOT

      *   Article 2 reveals that the regional market (other Southeast mega-sites)
      is exhausted, meaning the failure of the Baldwin County site is due to local
      mismanagement/lack of a plan, not simply lack of regional opportunity.

      *   The lack of a sign at the Baldwin County site contrasts sharply with the
      sales pitches made by the Alliance.


      KEY ENTITIES

      *   Baldwin County Mega site

      *   32 million dollar investment

      *   Mid-2011 purchase date

      *   Lee Lawson (Baldwin County Economic Development Alliance)

      *   County commission

      *   Fairhope Airport

      *   South Alabama Mega Site'
    generated_at: '2026-07-11T06:59:55.343741Z'
  economic-development-baldwin-county-style:
    brief: 'THE CONFLICT:

      *   Baldwin County invested $32 million in 2012 for 2300 usable acres designated
      as the Mega site.

      *   The county commission sold the project to "sleeping citizens."

      *   County employees helped pay the $32 million price tag.

      *   Lee Lawson of the Baldwin County Economic Development Alliance claims the
      Mega site is the only certified mega site in Alabama remaining.


      THE DISCOVERY:

      *   The Mega site property remains vacant as of the article date.

      *   The value of the $32 million investment is estimated to be worth $50 million
      today, factoring in lost opportunity.

      *   Current county commissioners claim greater oversight and stated the Mega-site
      would not be approved by the commission in 2017.

      *   County commissioners skimmed $5 million off infrastructure projects via
      a penny school tax without voter approval.


      THE PIVOT:

      *   Article 2 provides the specific financial details ($32 million investment,
      who paid, current status) that validate the claims of lost opportunity and failure
      stated in Article 1 regarding the Mega site''s status.

      *   Article 2 confirms the mechanics of the deal (county employees paying) and
      the current lack of progress, making it the evidence behind the narrative of
      dead-end economic development presented in Article 1.


      KEY ENTITIES:

      *   Baldwin County Commission

      *   Lee Lawson

      *   South Alabama Mega Site

      *   Jack Burrell (Council President)

      *   Fairhope Airport

      *   County employees'
    generated_at: '2026-07-11T06:59:55.343751Z'
  all-smoke-and-mirrors:
    brief: 'THE CONFLICT:

      *   Baldwin County Mega-Site purchase in mid-2011.

      *   Investment amount for the Mega-Site: $32 million.

      *   County commission skimmed $5 million from schools using penny tax.

