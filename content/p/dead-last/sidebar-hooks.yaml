      THE DISCOVERY:

      *   Both the Mega-Site and the Fairhope Airport Authority are classified as
      "smoke and mirrors."

      *   The Mega-Site remains vacant five years later despite $32 million investment
      and projected lost opportunity exceeding $50 million (including interest).

      *   The County Commission and Economic Development Alliance are waiting for
      a buyer for the Mega-Site, specifically seeking a buyer for $350 Million.

      *   The Fairhope Airport Authority uses legal defense funds (paid by tax dollars)
      to intimidate private citizens filing complaints against board members.


      THE PIVOT:

      *   Article 2 confirms that the political promises regarding the Mega-Site in
