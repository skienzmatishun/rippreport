      \ as the \"only certified mega site left in Alabama.\"\n*   Despite promotional\
      \ efforts and investments, the site has failed to attract major manufacturing\
      \ plants (reported as being \"dead last\" in bid results).\n*   Baldwin County\
      \ Commissioner Frank Burt (District 1) has held office since \n\n**THE PIVOT:**\n\
      *   The Main Article criticizes the county commission and Baldwin County Economic\
      \ Development Alliance (BCEDA) for continuing to promote the failed Mega Site\
      \ while pushing for re-election of incumbents.\n*   Article 2 serves as a 'smoking\
