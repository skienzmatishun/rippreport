      a "Truckers toll bridge" plan after public outcry.

      - Burrell replaced Robert Brown with Jay Robinson on the council; Article 1
      states this was done while lying to the community about Brown’s "family property"
      sale on July 21, 2020.

      - Burrell allegedly has a police record he forgot to disclose during previous
      elections (Article 1).

      - Burrell and Mayor Sherry Sullivan are accused of returning to "Tim Kant days"
      practices regarding utilities and transparency (Article 2).

      - Utility Director appointed has a high school education with "absolutely no
      experience" (Article 2).

      - City Council uses the $6.2 million Waterfront project as a political weapon
      in previous elections (Article 1).


      2. THE DISCOVERY:

      - Specific financial mismanagement of utility funds confirmed; City raided Utility
      Fund for $3 million to pay off "Triangle lawsuit" it had lost (Article 2).

      - Hawthorn Glen Subdivision deal confirmed: City purchased $250,000 lot to save
      roughly $750,000 in dirt fill costs; Burrell claims this was "good stewards
      of the people’s money" (Article 2).

      - Airport/Recreation deal details: Burrell purchased 114 acres near airport
      for $2.65 million when no funds existed, leasing to farmer at $9,000/year (Article
      2).

      - K-1 School deteriorated condition confirmed: Center purchased Sept 2018; now
      requires $100,000 temporary roof despite "5 million plus" budget (Article 2).

      - Clock Corner lot confirmed: Purchased for $525,000 (City pays half); Fairhope
      Single Tax Colony paid $262,500; City claims full ownership (Article 2).

      - Dual Salary issue confirmed: Sherry Sullivan receives $25,000 utility salary
      plus a second check as Mayor (Article 2).

      - Waterfront project design changes confirmed: Tens of thousands wasted on design/changes
      used as political weapon (Article 2).


      3. THE PIVOT:

      - Article 1 alleges corruption and mismanagement (Pied Piper, poor decisions,
      tolls); Article 2 provides the specific fiscal mechanisms to validate those
      allegations.

      - The Airport deal serves as the bridge: Article 1 mentions "bid rigging" and
      "$330,000 appropriation"; Article 2 confirms the asset swap ($2.65M purchase
