      - Personnel Misconduct: Article 2 proves the "No Experience" accusation with
      utility director appointment; Article 1 confirms this pattern as typical leadership
      behavior.

      - Property Deals: Article 2''s confirmation of the Hawthorn Glen purchase ties
      directly to Article 1’s criticism of the Council''s lack of transparency ("no
      application to change zoning").


      4. KEY ENTITIES:

      - Jack Burrell (Council President, MPO Chairman)

      - Sherry Sullivan (Mayor/Utility Director)

      - Jay Robinson (Council member replacement)

      - Robert Brown (Resigning council member)

      - Susan Wilson (Previous Mayor referenced in text)

      - Tim Kant (Past administrator, cited as influence)

      - Scott Boone / Catalyst Consulting

      - Eastern Shore MPO (Metropolitan Planning Organization)

      - Hawthorn Glen Subdivision

      - K-1 Center School'
