      \ planning and zoning, alleging a \"good ole boy network.\"\n*   **Specific\
      \ Issues (2015):** Mayor allegedly granted Arthur Corte, a land owner/contributor,\
      \ passes regarding environmental fines. The Publix shopping center location\
      \ caused damage to Fly Creek wetlands; the Tree Committee assessed $95,000 in\
      \ damages that the city ignored due to mayoral influence.\n*   **Fire Station:**\
      \ A fire station was built on a dead end street specifically benefiting developer\
      \ Arthur Corte and City Council members Mike Ford (who led the purchase) and\
      \ John Mixon. The city paid $875,000 for 38 acres of unsuitable land ($23,000/acre).\n\
      *   **Soccer Complex:** A soccer field was purchased in Oct 2009 by City Council\
      \ members Mike Ford and John Mixon for $875,000. Current estimated cost to complete\
      \ the \"World Class\" complex is projected near $6 million—or more than double\
      \ the purchase price due to site issues (22-foot drop).\n\nTHE DISCOVERY\n*\
      \   **Mayor Kant’s Role:** The Widget Article identifies Mayor Kant as using\
      \ the Planning and Zoning Board (\"a vehicle for good ole boy deals\") during\
      \ his tenure.\n*   **Current/Recent Corruption:** The Triangle lawsuit cost\
      \ $12 million to settle, requiring the city to purchase \"The Triangle\" property—which\
      \ the Mayor falsely claimed was a park—and draining $3 million from the utility\
      \ fund for legal fees.\n*   **Fly Creek Apartments:** Under Mayor Kant’s support,\
      \ Arthur Corte successfully received approval for Fly Creek Apartments and a\
      \ lift station on Parker Road (a dead end), costing the city approximately $500,000.\
      \ This project was concealed from the public despite earlier council promises\
      \ not to build there.\n*   **Sewer System/Environment:** The Widget Article\
      \ accuses Mayor Kant of mismanaging environmental concerns, noting that existing\
      \ sewage plant discharges into the Bay during overflows and that recent upgrades\
      \ are insufficient for new subdivisions like Fly Creek Apartments.\n\nTHE PIVOT\n\
      *   The Main Article establishes a historical precedent (2015) detailing a pattern\
      \ of city planning failures, disregard for Environmental Committees/Commissions,\
      \ and cronyism benefiting developers like Arthur Corte under the authority of\
      \ past mayoral administrations.\n*   The Widget Article proves this is not an\
      \ isolated incident but an ongoing crisis under Mayor Kant’s current leadership,\
      \ providing contemporary evidence that he personally:\n    1.  Drove through\
      \ developer-favored projects (Corte/Fly Creek Apartments).\n    2.  Abused city\
      \ funds to settle $12M lawsuits while violating ordinances and comprehensive\
      \ plans.\n    3.  Maintains the \"good ole boy\" system via appointed P&Z boards,\
      \ mirroring the 2015 claims of a compromised local government.\n\nKEY ENTITIES\n\
      *   Fairhope City Council (2019-07-10)\n*   Arthur Corte (Developer/Contributor/Land\
      \ Owner)\n*   Mayor Kant (Former and Current Mayor)\n*   Angus Cooper (Board\
      \ member, Football event organizer)\n*   Mike Ford / Mike Ford (Councilman /\
      \ Real Estate Developer)\n*   Fly Creek Apartments\n*   Parker Road\n*   Triangle\
      \ lawsuit ($12 million settlement)\n*   Publix shopping center (Location dispute\
      \ near Fly Creek)\n*   P&Z Board (Planning & Zoning Board)"
