hooks:
  quid-pro-quo:
    brief: 'THE CONFLICT

      - Fairhope City has ignored its Comprehensive and Master Plans, violated city
      ordinances, recorded wrong plat maps, omitted public participation, and made
      poor location decisions for major venues (2015).

      - Mayor (unnamed in Main Article) is accused of allowing "good ole boy network"
      deals that benefit Arthur Corte.

      - Publix shopping Center construction required trucking red clay to elevate
      property; The Environmental Committee found it damaged wetlands/Fly Creek, and
      the Tree Committee estimated $95,000 in tree damage ($1 million+ cleanout cost
      for Fly Creek). Mayor allegedly let the landowner off paying fines (2015).

      - City secured a loan from Community Bank for $500,000 to build a Fire Station
      on a dead end street; this was purportedly decided solely by the Mayor and benefited
      developer Arthur Corte without public input or research into alternate locations
      (2015).

      - The city purchased 38 acres of land (Manley road) in October 2009 for $875,000
      ($23,000/acre) for a soccer field despite it having a 22 foot elevation drop.
      City Councilman Kingrea voted no; Councilman Mixon approved the purchase using
      three specific fund types (2015).

      - Mike Ford was involved in purchasing land for the soccer field, insisting
      his council position was not a conflict of interest, and claimed similar practices
      when selling county property for the satellite courthouse.


      THE DISCOVERY

      - Mayor Tim Kant eliminated Fairhope’s Finance, Environmental, and Tree Committees
      (current/recent action mentioned by Ripp in Article 2).

      - Current issues involving The same owner responsible for the Publix site (the
      landowner) involve a new Quid Pro Quo project with criminal intent.

      - That landowner is now involved in a proposal to build a 300 unit development
      above the damaged Fly Creek area, utilizing Professional Equity Management from
      Scottsdale Arizona as developer.

      - This owner/Mayor combination is allegedly proposing a brand new fire station
      on the same site (above damaged Fly Creek), linking it directly to the new development''s
      connectivity plans for Rock Creek Subdivision.

      - Aldot and county officials were not notified of the proposed fire station
      location until alerted by citizens, revealing that the proposal was located
      on a county road and dead end street in violation of city plan.


      THE PIVOT

      - Article 1 documents historical corruption (2015) involving Mayor favoritism
      toward Arthur Corte regarding land use, zoning violations (Publix), and questionable
      public investments (Soccer fields, Fire station location).

      - Article 2 proves the pattern of behavior is ongoing under Mayor Tim Kant ("Quid
      Pro Quo"), linking current, large-scale development plans (300 unit build) directly
      back to the same owner who caused the original Fly Creek damage at Publix.

      - The discovery that a new fire station is being proposed *on the exact site*
      of the developer''s future 300-unit project confirms the alleged quid pro quo:
      using city resources (fire station location/approval) to facilitate private
      real estate development by the same entity connected to past corruption.


      KEY ENTITIES

      - Arthur Corte / Corte (Developer, Land Owner, Contributor 2016-07-27; 2017-04-14).

      - Mike Ford / Councilman Ford (involved in Soccer field purchase 2009/2015).

      - Publix.

      - Fly Creek and Rock Creek Subdivision.

      - Mayor Tim Kant (linked to eliminating committees and current Quid Pro Quo
      allegations).

      - Francis Paul Ripp (Author of The Ripp Report, Advocate).

      - Aldot (County official notified about proposed fire station location).'
