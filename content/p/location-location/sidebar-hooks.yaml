      seeking to locate apartments over Fly Creek despite citizen objections.

      *   Fairhope soccer fields require an estimated $1.5 million just to fill one
      end of the property and a total project cost projected between $5 and $6 million.

      *   Current Fairhope City Council is actively pursuing a "GOB strategy," allegedly
