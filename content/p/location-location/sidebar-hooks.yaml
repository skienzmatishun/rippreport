  fairhope-a-city-owned-by-outside-interests-and-good-ole-boys:
    brief: '1. THE CONFLICT

      *   Systemic corruption in Fairhope led to decisions that ignored Comprehensive
      Plans and ordinances, favoring a "Good Ole Boy" network, specifically Arthur
      Corte, over public interest.

      *   Mayors during the period made deals without public participation or adequate
      accountability.

      *   The city paid $875,000 (2009) for 38 acres on Manley Road to build soccer
      fields despite a detrimental property feature of a 22-foot drop in elevation
      and no immediate need. City Councilman Kingrea voted ''no'' while City Councilman
      Mixon approved the purchase using existing recreation funds.

      *   The city waived $95,000 in assessed tree damage fines for Publix location
      (Fly Creek area), with Mayor approving the land owner to avoid payment despite
      environmental concerns about Fly Creek. The Corp of Engineers estimated over
      $2 million needed to clean out Fly Creek.


      2. THE DISCOVERY

      *   Mayor Kant’s leadership was tied to a deliberate plan benefiting Arthur
      Corte and his associates, excluding public input (Fly Creek Apartments).

      *   The Triangle lawsuit settlement cost the city $11.25 million ($5.25M borrowed;
      ~$3M attorneys; $3M from utility reserve fund). The lawyers suggested purchasing
      the land as part of this process.

      *   New developments, like the proposed Thompson Engineering "Triangle Nature
      Trail Park," were being authorized by Kant without public approval or council
      oversight.


      3. THE PIVOT

      *   Article 2 (Widget) confirms that the historical deals detailed in Article
      1 (Main) are not isolated incidents but part of a coordinated pattern orchestrated
      by Mayor Kant and his associates, particularly Arthur Corte, to enrich select
      individuals while bypassing public participation ("Good Ole Boy" network). The
      Triangle lawsuit provides a massive financial example ($11.25 million settlement)
      demonstrating the depth of the systemic exclusion used in Fairhope''s planning
      process.


      4. KEY ENTITIES

      *   Arthur Corte (Developer/Land Owner)

      *   Mayor Kant (Former Mayor)

      *   Francis Paul Ripp / The Ripp Report (Author/Reporter)

      *   Fairhope City Council (Body involved in approvals)

      *   Mike Ford (Councilman, developer involvement)

      *   Kingrea and Mixon (City Council members involved in the soccer field purchase)

      *   Diana Brewer (Former Councilwoman; criticized for siding with Mayor)

      *   Jack Burrell (Council member cited as an opposing voice to Kant/Corte network)

      *   Fly Creek Apartments & Triangle Nature Trail Park (Specific controversial
      developments)

      *   Thompson Engineering / Community Bank / Publix (Involved third parties)'
