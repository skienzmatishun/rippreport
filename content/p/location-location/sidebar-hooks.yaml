  victory:
    brief: 'THE CONFLICT:

      *   February 8, 2015: Francis Paul Ripp published "LOCATION LOCATION TOTALLY
      LOCO LOCATIONS" alleging Fairhope City Council ignored its Comprehensive Plan
      and ordinances for over ten years, resulting in millions of dollars wasted due
      to the Mayor''s "good ole boy network."

      *   Historical allegations include a Publix shopping center location that damaged
      wetlands/Fly Creek (estimated cleanup costs $>2 million), a Fire Station built
      on a dead-end street benefiting developer Arthur Corte, and the city purchasing
      poor soccer field land for $875,000 in October 2009.

      *   Ripp accused City Councilman Mike Ford of conflict of interest regarding
      property purchases and noted Councilman Kingrea voted no to certain land acquisitions.


      THE DISCOVERY:

      *   The second article confirms legal intervention has been successful against
      these alleged planning failures, specifically concerning the Publix project/Fly
      Creek Apartments.

      *   Attorney Adam Milam successfully led 4 separate lawsuits (including one
      published with Ripp) asserting that "The Fairhope Planning Commission... acted
      inconsistent with Ordinance 1572 and therefore, acted arbitrary, capriciously,
      and not in compliance with applicable law."


      THE PIVOT:

      *   Article 2 provides concrete legal proof of institutional failure and non-compliance
      (violating Ordinance 1572) regarding the Publix/Fly Creek projects.

      *   This validates Article 1’s broad allegations that Fairhope leadership was
      making "horrible decisions" without accountability or following established
      ordinances, directly supporting Ripp''s claim that the planning and zoning structure
      allowed for these abuses in favor of developers.


      KEY ENTITIES:

      *   Francis Paul Ripp (Author/Reporter)

      *   Adam Milam (Plaintiff''s Attorney / 4-time lawsuit participant)

      *   Arthur Corte (Developer / Entity benefiting from city projects)

      *   Fairhope City Council (Alleged perpetrators of mismanagement)

      *   Mayor (Historical figure responsible for alleged deals)

      *   Mike Ford (Past councilman involved in land purchase controversy)

      *   The Fly Creek Watershed Preservation Association Inc. (Organization led
      by Ripp/Consumer Advocate)

      *   Ordinance 1572 (Specific planning regulation cited as violated)'
