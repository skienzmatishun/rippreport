      relocated for a position with Mobile Bay National Estuary Program (MBNEP).

      *   Council President Burrell failed to retain planning director Wayne Dyess,
      despite his input on projects and ordinances.


      THE DISCOVERY

      *   Between 2012 and 2016, Mayor Can’t, Councilman Boone, and Councilman Burrell
      used the utility fund as a slush fund to pay lawsuits.

      *   This misuse of funds resulted in Fairhope losing its best senior utility
      supervisor to Daphne and $3 million to attorneys.

      *   No sewer infrastructure work was performed during this period, and the electric
      department was underfunded.


      THE PIVOT

      *   Article 2 reveals that the political maneuvering and staff obstruction mentioned
      in Article 1 are directly linked to a decade-long failure in addressing critical
      sewer and infrastructure problems, proving the Catalyst Council''s long-term
      agenda is tied to past corruption.


