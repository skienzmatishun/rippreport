hooks:
  catalyst-bullies:
    brief: 'THE CONFLICT

      *   Elliott supports a lottery system for state debt dating back to 2013.

      *   The Fairhope Catalyst Council opposed Mayor Karin Wilson’s choices and attempted
      to obstruct them.

      *   The Council targeted Sherry-Lea Bloodworth Botop by de-funding her position
      after she relocated.

      *   Council President Burrell supported planning director Wayne Dyess, implying
      the Council did not try to retain him.


      THE DISCOVERY

      *   The Catalyst group (Burrell Boone and Brown) and Scott Boone Consulting
      are funded by special interests including Baldwin County Sewer, politicians,
      attorneys, judges, and developers.

      *   Marcus McDowell (City Attorney) acted as a bully and aided Ronan McSharry
      by allowing the statute of limitations to expire on an assault charge against
      him.

      *   Scott Boone is privileged with confidential Fairhope executive committee
      details.

      *   The Catalyst group is actively trying to return corruption rubber stamp
      through placing an ex-employee in the Mayor’s choice role.


      THE PIVOT

      *   Article 2 exposes the financial and legal structure of the opposition (Catalyst/3
      B''s) that was alluded to generally in Article 1’s description of "dirty hands."

      *   Article 1 focuses on personnel conflicts; Article 2 reveals the underlying
      special interest money and specific legal maneuvering (McDowell/McSharry), which
      provides the specific mechanism for how the Catalyst Council maintains power
      and influence.


      KEY ENTITIES

      *   Elliott (State Senator)

      *   Karin Wilson (Mayor of Fairhope)

      *   Sherry-Lea Bloodworth Botop (Economic and Community Development Director)

      *   Wayne Dyess (Planning Director)

