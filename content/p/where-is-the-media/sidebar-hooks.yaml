      - Manning confirmed she only spoke to trustee John Bell regarding the children’s education from 1999 forward; Bell worked in Regions Bank’s trust division.
      - Rick Clifton is identified as a trustee alongside Albritton; all three are now the subject of serious legal scrutiny.

      THE PIVOT:
      - The IRS filings in Article 2 prove the financial mechanics of the mismanagement claimed in Article 1: minimal administrative labor vs. massive fees ($1M+).
      - Manning’s hiring of Thomas Gallion (who specializes in Southern government corruption) moves the story from allegation to active legal defense.
      - Article 2 confirms Albritton is a co-beneficiary of the trust he oversees via the $105,000 in scholarships awarded to his daughters.
      - Article 2 confirms Albritton and Regions Bank treated the coneuh County oil revenues as a "private well" they saw no need to disclose, validating the corruption narrative.

      KEY ENTITIES:
      - Tom Albritton (Alabama Ethics Commission Director / Trustee)
      - Regions Bank
      - Mabel Amos Memorial Fund
      - Leigh Manning (Grandniece of Fund Beneficiary / Former Sec. of State)
      - Thomas Gallion (Attorney for Manning)
