  alabama-ethics-self-dealing-immunity:
    brief: |-
      THE CONFLICT
      - Tom Albritton serves as Director of the Alabama Ethics Commission.
      - Lagniappe Mobile (Rob Holbert) broke story alleging Ripp Report evidence of Albritton misusing the Mabel Amos Memorial Fund.
      - 2010: Oil discovered in Conecuh County; 60 to 80 million dollars of oil pumped from beneath county.
      - Article questions Regions Bank as fiduciary for the trust, citing expectation fees and lack of transparency on tax payments.
      - Core Accusation: Albritton has used the trust to finance his children’s education, ignoring intent of funds.

      THE DISCOVERY
      - Richard Fording (Marilyn Williams Elmore and John Durr Elmore Endowed Professor, Dept of Political Science) investigated the Mabel Amos Scholarship Fund.
      - Fording discovered Tom Albritton, as a board member/Trustee, had two children receive total of $105,000 through 2018 for University of Texas tuition.
      - Comparison: Fund donated $500 to Tuskegee University (HBCU) during same period.
      - Regions Bank received over $1 million since inception for managing the fund.
      - IRS Section 4941(d) cited: Prohibits private foundation from paying tuition for trustee’s children (defined as "self-dealing").
      - History: Ethics Commission has previously dismissed complaints involving former State Senator Pittman ($750k skim) and Fairhope Airport bid-rigging involving Jack Burrell.

      THE PIVOT
      - Article 2 converts the "question" in Article 1 into documented fact: IRS code explicitly bans the behavior Albritton is accused of.
      - Article 2 provides specific financial quantification ($105k vs $500) proving Albritton benefits directly from the trust he oversees.
      - Article 2 confirms Fording’s discovery validates the Lagniappe Mobile report and The Ripp Report earlier allegations regarding self-dealing.

      KEY ENTITIES
      - Tom Albritton (Director, Alabama Ethics Commission)
      - Mabel Amos Memorial Fund
      - Regions Bank
      - Richard Fording (Political Science Professor)
      - The Ripp Report / Francis Paul Ripp
      - Lagniappe Mobile (Rob Holbert)
