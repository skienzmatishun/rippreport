      - Confirmed: Cynthia Raulston contacted Francis Paul Ripp in Jan 2022; attempted to dissuade formal complaints claiming statutes of limitations expired (Ripp disputes this).
      - Confirmed: Circuit Judge Ben Bowden’s children received scholarships totaling 45,000.
      - Writ of Mandamus: Previously filed regarding Albritton but failed to secure a hearing.
      - Discovery in ongoing civil lawsuits against the trust and Regions Bank expected to reveal further IRS violations (IRS 4941 {d}).

