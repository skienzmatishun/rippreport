      - Article cites failure of Alabama Ethics Commission to discipline Albritton despite allegations.

      THE DISCOVERY
      - Widget article confirms the trust governing language prohibits "self-dealing" by trustees.
      - Specific sections cited as violated: Section 4941(d) and Section 5489.
      - Concrete amount substantiated: Albritton used $120,000 so far from the trust for family.
      - Alabama Bar filed a complaint against Albritton based on these actions.
      - Albritton’s response to the Bar included admissions of certain facts but omitted others (according to Ripp Report).
      - Alabama Ethics Commission General Council provided no substantive action on the self-dealing claims; dismissed it as "no concern" per internal PDF.

      THE PIVOT
      - Widget article transforms the accusation from a general claim to specific legal evidence.
      - Links Albritton’s personal conduct directly to statutory language regarding self-dealing (Section 4941(d)).
      - Connects Regions Bank trustees (John Bell, Rick Clifton) to the same potential misuse of funds.
      - Demonstrates that despite public outcry and Ripp Report coverage, Albritton remains in power due to Commission silence.

      KEY ENTITIES
      - Tom Albritton (Executive Director, Alabama Ethics Commission)
      - Francis Paul Ripp (General Council for The Court of Public Opinion/The Ripp Report)
      - Regions Bank
      - Mabel Amos Memorial Fund (The Trust)
      - John Bell (Co-trustee, Regions Bank)
      - Rick Clifton (Co-trustee)
