      - Oil discovered in Conecuh County around 2010; approximately $60 to $80 million dollars pumped from beneath county.
      - Neither Tom Albritton nor Regions Bank allegedly informed citizens of tax implications or beneficiaries for this oil revenue.
      - Articles published between July and August 2021 (Tweet dates cited: July 2, 2021 and August 7, 2021).

      2. THE DISCOVERY
      - Widget article confirms Albritton’s children received more scholarship money from the trust than relatives of Mabel Amos (trust namesake).
      - Provides direct contact numbers confirming active financial and legal jurisdictions:
        - Ethics Commission: (334) 242-2997
        - Regions Bank: (251) 210-3640
      - Links to Lagniappe Mobile article (Rob Holbert) as primary source of original data on Albritton’s self-benefit.
      - Includes call for citizens to contact Attorney General regarding Regions Bank and Albritton misconduct.

      3. THE PIVOT
      - Widget article serves as the evidentiary confirmation to Main Article’s claims of "self-benefit."
      - Main Article asks why media is silent regarding the conduct.
      - Widget article answers by explicitly labeling the scholarship usage as "Self Dealing-Self Stealing" based on the financial comparison.
      - Widget article ties Regions Bank directly to Albritton’s misuse by providing bank complaint information rather than just general ethics commission numbers.

      4. KEY ENTITIES
      - Tom Albritton (Director, Ethics Commission) / Greg Albritton (referenced in one tweet within article)
      - Regions Bank
      - Mabel Amos Memorial Fund
      - Conecuh County, Alabama
      - Ripp Report (Francis Paul Ripp)
      - Lagniappe Mobile / Rob Holbert
