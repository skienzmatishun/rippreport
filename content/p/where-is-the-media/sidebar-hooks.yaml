      - Article 2 exposes the exact mechanism of the "self-serving": hiding trustee status on economic statements and altering trust documentation.
      - Article 2 proves Article 1’s claim that state agencies (Alabama Bar, Ethics Commission) are ignoring complaints ("black hole of political and white collar crime").
      - Raulston’s defense call (Jan 2022) validates Article 1’s assertion that the Commission is in conflict with its own integrity.

