  court-of-public-opinion-2:
    brief: |-
      THE CONFLICT
      - Alabama Ethics Commission Executive Director Tom Albritton accused of self-dealing.
      - Albritton utilized the Mabel Amos Memorial Fund trust to finance his children’s education.
      - Accusation dates from at least August 7, 2021 (per Francis Paul Ripp tweet).
