      THE DISCOVERY:
      - IRS 990 filings from the Mabel Amos Memorial Fund show Regions Bank brought in more than $1 million for managing the trust.
      - Filings indicate Regions Bank staff averaged five hours of work per week on the fund between 2002-2018.
      - Regions Bank paid itself fees close to half as much as the trust distributed in scholarships during that time.
