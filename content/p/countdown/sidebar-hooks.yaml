  state-senate-seat-district-32-bombs-away:
    brief: 'THE CONFLICT

      *   Past tenure of former State Senator Boom Boom Pittman in Alabama’s State
      Senate District 32.

      *   Allegation that Pittman skimmed $750,000 from BP money intended for his
      personal tractor company.

      *   Pittman failed to secure full BP funds (out of a billion dollars available)
      for Baldwin County following the oil spill disaster.

      *   The Main Article identifies high-profile political conflicts in 2017 involving
      candidates Luther Strange and Judge Roy Moore regarding US Senate seats.


      THE DISCOVERY

      *   As analyzed by The Ripp Report in mid-2018, State Senate Seat District 32
      is currently being contested among five candidates: David Northcutt (leading),
      Jeff Boyd, Bill Roberts, Chris Elliott (Catalyst Candidate), and Jason Fisher
      (Democrat).

      *   The investigation reveals that the current focus on reform for this seat
      is a direct result of "Boom Boom Pittman" having placed qualifications limiting
      the Sheriff''s power in Baldwin County.


      THE PIVOT

      *   Article 1 provides general, broad accusations regarding Alabama career politicians
      and use of office for personal gain ("swamp rats").

      *   Article 2 serves as the ''smoking gun'' because it converts those general
      allegations into specific financial evidence: detailing the $750,000 skimming
      incident by Pittman, linking political corruption directly to a measurable loss
      of public funds (BP disaster recovery) in Baldwin County.


      KEY ENTITIES

      *   Boom Boom Pittman (Former State Senator/District 32 occupant)

      *   Bill Roberts (State Senate Candidate/District 32)

      *   David Northcutt (State Senate Candidate/District 32)

      *   Jason Fisher (Democrat/State Senate Candidate)

      *   Chris Elliott (Catalyst Candidate/Political Organization affiliation)

      *   Baldwin County

      *   BP (Source of funds/Oil Spill Disaster context)

      *   The Ripp Report (Investigative source)'
