  look-in-the-mirror:
    brief: 'THE CONFLICT

      *   2017 US Senate primary race in Alabama involved 19 candidates, including
      Luther Strange, Judge Roy Moore, Mo Brooks, Sen Trip Pittman, and Randy Brinson.

      *   Mo Brooks stated his willingness to withdraw from candidacy if President
      Trump fired U.S. Attorney General Jeff Sessions.

      *   Sen Trip Pittman faced criticism for being described as "the worst elected
      official in Baldwin County."

      *   Luther Strange (then AG) and Judge Roy Moore were central figures facing
      intense scrutiny regarding ethics and conduct.


      THE DISCOVERY

      *   Luther Strange, while serving as AG/leading law enforcement officer, allegedly
      allowed the Governor to walk away from Jeff Sessions'' seat for a benefit related
      to Strange’s appointment.

      *   Strange was accused of allowing Sen. Pittman to accept $750,000 in BP money
      without addressing environmental damage anchors left in the Bay while other
      crimes were prosecuted.

      *   Judge Roy Moore is cited as having been thrown off the bench twice for breaking
      the law, according to Article 2.

      *   The articles confirm Baldwin County provides nearly 35% of Alabama’s income
      and is its fastest-growing county.


      THE PIVOT

      *   Article 1 established candidates like Strange and Pittman were subject to
      generalized accusations of using office for personal gain; Article 2 validates
      this by providing specific claims, including a $750,000 BP payment connection
      and the alleged quid pro quo involving Jeff Sessions'' seat.

      *   Article 1 mentioned Mo Brooks’ conditional withdrawal over Jeff Sessions;
      Article 2 alleges Strange leveraged that very seat for Governor''s benefit.

      *   Article 1 criticized Pittman generally; Article 2 provides a specific dollar
      amount ($750,000) linked to his alleged corruption involving BP money.


      KEY ENTITIES

      *   Luther Strange (Former AG/Senator Candidate)

      *   Jeff Sessions (U.S. Attorney General / Senate Seat holder)

      *   Mo Brooks (Congressman R-AL / Senate Candidate)

      *   Sen Trip Pittman (State Senator / Former State Senator / Politician)

      *   Judge Roy Moore (Alabama Supreme Court Justice / Twice Disbarred Candidate)

      *   Randy Brinson (Senate Candidate Republican)

      *   Baldwin County

      *   BP (Source of $750,000 alleged payment)

      *   Governor (Recipient of the purported Jeff Sessions seat deal)'
