hooks:
  little-choice:
    brief: 'THE CONFLICT:

      *   2017 US Senate Special Election in Alabama involved candidates including
      Luther Strange, Judge Roy Moore, Sen Trip Pittman, and Mo Brooks.

      *   Judge Roy Moore was suspended as chief justice on Sept 30, 2016, by the
      Alabama Court of the Judiciary after six charges regarding violation of judicial
      ethics canons.

      *   Sen Trip Pittman was a State Senator in Baldwin County facing scrutiny over
      his tenure and influence.

      *   Fairhope City Council had maintained an arrangement/contract with Sen Trip
      Pittman’s associated company since 2012.


      THE DISCOVERY:

      *   The Widget Article reveals specific financial misconduct allegations against
      Sen Trip Pittman, who allegedly walked away with $750,000 in his pocket while
      acting as "appointed Trustee" of BP Funds.

      *   The Fairhope City Council officially voted to end a contract arrangement
      with D&J Enterprises Inc., which was tied to the company associated with State
      Sen. Trip Pittman.

      *   Luther Strange is cited for facing multiple ethics complaints, specifically
      related to turning a blind eye to Sen Trip Pittman’s actions and allowing a
      "Luv Gov" pass.


      THE PIVOT:

      *   Article 1 makes generalized accusations of corruption against career politicians
      in Baldwin County (e.g., calling Pittman the "WORST elected official"). Article
      2 provides specific, documented evidence that elevates this general accusation
      into concrete allegations: financial graft ($750,000), municipal contract termination
      by Fairhope City Council, and alleged political cover-ups involving Luther Strange.


      KEY ENTITIES:

      *   Sen Trip Pittman (State Senator)

      *   Luther Strange

      *   Judge Roy Moore

      *   Fairhope City Council

      *   D&J Enterprises Inc. (Contract vendor)

      *   BP Funds (Trustee role)'
