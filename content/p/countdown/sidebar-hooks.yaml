      Mo Brooks, Sen Trip Pittman (criticized as corrupt/worst official in Baldwin
      County), and Dr. Randy Brinson.

      *   Article 1 frames the contest between career politicians versus alternative
      candidates.


      **THE DISCOVERY**

      *   Widget Article reveals a counter-movement labeled "The Catalyst Choice."

      *   Chris Elliott (Catalyst candidate) has raised over half a million dollars
      ($600,000 for the Senate seat salary of $42,000).

      *   Elliott claims his support base is primarily Realtors, general contractors,
      road builders, accountants, and nurses in Baldwin County.

      *   The article highlights Jeff "Judas" Boyd losing the primary to Elliott and
      subsequently becoming a member of Catalyst, knocking on doors for Elliott.


      **THE PIVOT**

      *   While Article 1 focuses on established Republican contenders (Strange, Pittman)
      battling political establishment corruption, Article 2 shows how an alternative
      faction (Catalyst/Elliott) has mobilized substantial funds ($600k) and actively
      infiltrated the opposition network (boycotting Boyd) within Baldwin County during
      the primary lead-up.

      *   Article 1 establishes the field of candidates; Article 2 identifies a specific,
      heavily funded third/alternative player that is mobilizing local support against
      the traditional power structures referenced in Article'
