      and Mr. Boone at the last Fairhope City Council meeting.

      *   Boone and Burrell accepted a "Gift" from developers and refused to legally
      defend citizens against developer threats/lawsuits.

      *   Tim Kant did not attend the last council meeting, leaving Boone and Burrell
      responsible for him.


      THE DISCOVERY:

      *   The Fairhope “Triangle” Mega-Site property was purchased by the City of
      Fairhope to settle a lawsuit.

      *   The lawsuit settlement cost the City $11.25 million and $3 million in attorney
      fees.

      *   The estimated value of the Triangle property is between $16 and $20 million.

      *   Burrell and Boone settled the lawsuit without public participation, using
      Mayor Kant to keep the public informed.


      THE PIVOT:

      *   Article 2 provides the specific financial details ($11.25 million settlement
      cost, $3 million in fees) and legal transaction (purchase of the Triangle property)
      that explain the nature of the "Gift" or deal mentioned as corrupt in Article
      1.

      *   Article 2 proves that Burrell and Boone actively manipulated the city government
      process to secure financial benefit through the handling of the Triangle land,
      linking their actions directly to systemic corruption referenced in Article
      1.


