      and regulatory violations related to past conflicts described in Article 1 (Barkley''s
      violence; commission misconduct).

      *   Article 2 provides specific names and dates for the criminal penalties (Barkley
      sentencing/cost) and regulatory failures (Medical Cannabis Commission), solidifying
