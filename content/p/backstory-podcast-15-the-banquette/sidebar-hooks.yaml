  the-mug-shot:
    brief: 'THE CONFLICT

      *   Walker Cole Barkley was legally barred from gun possession.

      *   July 2021 incident: Barkley took a pistol from his wife, Nicole, and threatened
      her and the children.

      *   Barkley pointed a gun at an officer during a 911 call; the officer shot
      him in the abdomen.

      *   Barkley returned fire, missing five shots.

      *   Jury found Barkley guilty of attempted murder of an officer, sentenced to
      35 years (costing over $500,000 annually).

      *   Alabama Medical Cannabis Commission allegedly violated the Open Meeting
      Act regarding license awards.


      THE DISCOVERY

      *   The Alabama Ethics Commission flagged a minor police violation involving
      a Huntsville city councilman, which was dismissed as a misdemeanor with no consequences.

      *   Five integrated facility licenses exist for medical cannabis, despite alleged
      improper conduct by the Medical Cannabis Commission meeting.

      *   A new Omicron variant, B.A.2.86, emerged as the most mutated strain.


      THE PIVOT

