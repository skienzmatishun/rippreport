      representing developers.

      *   Scott Boone Consulting replaced the Catalyst name following a bitter defeat
      in a congressional race.

      *   Scott Boone is the son of Fairhope councilman Kevin Boone.

      *   Scott and Kevin Boone are implicated in land fraud known as “Strawman.”

      *   Over $1 million has been funneled through Scott Boone Consulting for CATALYST
      candidates from developers (e.g., Prebble DR Horton, Columbia Southern Truland
