      money-making scheme linked directly to land fraud and developer funding, which
      explains why specific individuals like Johnathan Armstrong were recruited for
      political positions (Article 1).

      *   Scott Boone Consulting is identified as the financial distributor/bank for
      CATALYST candidates, proving the underlying corrupt structure behind the political
      placements mentioned in Article 1.


