hooks:
  fairness:
    brief: 'THE CONFLICT:

      *   Municipal Judge was the developer of the Fly Creek Apartments project.

      *   The Municipal Judge was appointed by members of the City Council.

      *   Mr. Brown stated he had a long-term relationship with Mr. Corte and advocated
      for his recusal from votes concerning the project.

      *   Mr. Boone has business relationships with Mr. Corte and the engineering
      company, which in turn has a business relationship with Mr. Corte.

      *   Mr. Corte and the former Mayor cost $11.25 million in a triangle lawsuit
      that was settled without public participation.


      THE DISCOVERY:

      *   Four councilmen voted for a 120-day extension of the sunset clause allowing
      the developer another time to secure a multiple occupancy site plan.

      *   The widget article identifies specific relationships (Brown/Corte, Boone/Corte)
      as evidence of conflict of interest regarding the development vote.

      *   The council is accused of ignoring environmental violations (red mud, graded
      right-of-ways).


      THE PIVOT:

      *   Article 2 provides direct quotes and accusations about specific relationships
      between Council members (Brown, Boone) and the developer (Corte), directly linking
      the abstract "Conflict of Interest" in Article 1 to concrete personnel conflicts.

      *   Article 2 uses these relationships as the ''smoking gun'' by questioning
      if Mr. Brown and Mr. Boone should have recused themselves based on their business
      ties to Mr. Corte, proving the stated conflict exists.


      KEY ENTITIES:

      *   angelo-corte

      *   burrell

      *   fly-creek

      *   pittman

      *   robert-brown

      *   wilson

      *   boone

      *   beavis

      *   butthead'
    generated_at: '2026-07-10T18:44:56.584420Z'
    text: Fairhope's City Council acts like a private club where judges build apartments
      and councilmen pull the strings. Robert Brown and Kevin Boone ignored clear
      conflicts with developer Angelo Corte to hand him a 120-day extension on the
      Fly Creek project and bury an $11.25 million lawsuit.
  community-or-developer:
    brief: 'THE CONFLICT:

      *   Municipal Judge is the developer for a large development in Fairhope.

      *   Conflict exists because the Municipal Judge was appointed by the same city
      council that is considering approving the development.


      THE DISCOVERY:

      *   The City Council agenda included a vote on Final Adoption of an Ordinance
      Amending Ordinance No. 1572 regarding the Fly Creek PUD Sunset Provision on
      Monday, April 10, 2017.

      *   Some city council members have conflicts of interest related to the developer,
      engineers, contractors, and landowners concerning the Fly Creek project.


      THE PIVOT:

      *   The Widget Article provides the specific context (the Fly Creek PUD decision
      date and agenda) and explicitly points out that multiple council members have
      known conflicts of interest regarding the development parties.


      KEY ENTITIES:

      *   Fairhope City Council

      *   Municipal Judge (developer)

      *   Fly Creek PUD

      *   Ordinance No. 1572

      *   Baldwin Insider

      *   Catalyst fraternity (includes county commissioners, attorneys, judges, and
      developers)'
    generated_at: '2026-07-10T18:44:56.584439Z'
    text: The line between city government and private profit disappears when the
      Municipal Judge is also the town’s biggest developer. We exposed how the Council
      fast-tracked the Fly Creek PUD while members of the Catalyst fraternity protected
      their own interests over the Fairhope community.
  catalyst-colors:
    brief: 'THE CONFLICT:

      *   Municipal Judge is the developer of the largest housing development in Fairhope.

      *   The City Council appointed the Municipal Judge and City Attorney.


      THE DISCOVERY:

      *   Three Councilmen (Burrell, Brown, Boone) approved and purchased $2.65 million
      in recreation land without National Park Service approval or public participation.

      *   The council used city accounts for the $2.65 million purchase.

      *   Council members received a family insurance package valued at $17,000 a
      year.


      THE PIVOT:

      *   The actions of the Council (purchasing questionable land and financial irregularities)
      demonstrate a pattern of self-interest and corruption ("CATALYST COLORS").

      *   This proves that the council lacks integrity to approve a development project
      for the Municipal Judge they appointed, confirming the conflict of interest.


      KEY ENTITIES:

      *   Fairhope City Council

      *   Municipal Judge (Developer)

      *   Burrell

      *   Brown

      *   Boone

      *   $2.65 million land purchase

      *   National Park Service'
    generated_at: '2026-07-10T18:44:56.584445Z'
    text: Burrell, Brown, and Boone treat the city treasury like a personal ATM for
      their developer friends. Their illegal $2.65 million land deal proves these
      men care more about Catalyst favors than following federal law or protecting
      the taxpayers who pay their $17,000 insurance bills.
  fairhope-musical-chairs:
    brief: 'THE CONFLICT:

      *   Municipal Judge Haymes Snedeker is a developer and major contributor to
      the Mayor of Fairhope.

      *   The City Council appointed Judge Haymes Snedeker.

      *   The council approves development plans for the judge''s projects.


      THE DISCOVERY:

      *   Council members (including Kevin Boone) are linked to developers and special
      interests.

      *   Kevin Boone, Mayor Sullivan, and Scott Boone (instigator of Catalyst) attempted
      to overthrow Mayor Wilson and sabotaged her moves.

      *   Judge Snedeker''s actions violate Judicial Canons and benefit him personally
      through his position.


      THE PIVOT:

      *   Article 2 reveals that the council members who rubber-stamp development
      projects (as described in Article 1) are part of a corrupt political structure
      involving developers, linking the appointed judge directly to the political
      maneuvering and corruption detailed by the widget article.


      KEY ENTITIES:

      *   Jack Burrell (former Council President)

      *   Haymes Snedeker (Municipal Judge/Developer)

      *   Jimmy Conyers (potential new council member)

      *   Jay Robinson (Council member appointed by Burrell)

      *   Cory Martin (Council member)

      *   Kevin Boone

      *   Scott Boone

      *   Mayor Sullivan

      *   Mayor Wilson'
    generated_at: '2026-07-10T18:44:56.584450Z'
    text: Appointing your own campaign donor as Municipal Judge is a classic Fairhope
      power move. Kevin Boone and the Catalyst crew didn't just rubber-stamp Snedeker’s
      projects; they actively sabotaged Mayor Wilson to keep their crooked political
      machine running without any interference.
  fairhope-infrastructure:
    brief: 'THE CONFLICT:

      *   Municipal Judge Hix Snedeker is involved in a development project ("Park
      City").

      *   The same City Council appointed Judge Snedeker who is also the developer
      of the largest project.


      THE DISCOVERY:

      *   68 Ventures bought the land from Hix/Snedeker.

      *   Hix Snedeker is the Fairhope Municipal Judge.

      *   68 Ventures obtained an approved Planned Unit Development (PUD) for the
      property.

      *   U.S. Senator Katie Britt purchased $33,000 stock in 68V 181-Fairhope Avenue
      2023, LLC on Dec. 14, 2023.


      THE PIVOT:

      *   Article 2 reveals that the Municipal Judge (Snedeker) sold land and an approved
      development plan to 68 Ventures while simultaneously engaging in a legal dispute
      with the city over infrastructure/lawsuits. This confirms the vested interest
      mentioned in Article 1 regarding the Judge''s role as both adjudicator and developer.


      KEY ENTITIES:

      *   Hix Snedeker (Fairhope Municipal Judge)

      *   City Council

      *   68 Ventures

      *   Park City development

      *   Jonathan Gray

      *   Katie Britt (U.S. Senator)

      *   Fairhope'
    generated_at: '2026-07-10T18:44:56.584456Z'
    text: Most judges interpret the law, but Hix Snedeker uses his bench to facilitate
      multi-million dollar land deals. Snedeker sold the Park City site to 68 Ventures
      while Senator Katie Britt bought in, proving the Municipal Judge is a developer
      in robes using his power for profit.
  quarterback-sneak:
    brief: 'THE CONFLICT

      *   Municipal Judge Haymes Snedeker was appointed by the city council.

      *   Judge Snedeker is also a large landowner and developer in Fairhope.

      *   The Municipal Judge requires City Council authorization for his developments.


      THE DISCOVERY

      *   Sneaky Jack Burrell spent $2.65 million on recreation land.

      *   Jack Burrell paid back by fixing the bid for the Judge''s jet hanger at
      the airport.

      *   Jack Burrell used the City Council meeting to swear in Municipal Judge Haymes
      Snedeker (the "quarterback sneak").

      *   The development deals involved a town clock costing $600,000 and a K-1 that
      is leaking/rotting.


      THE PIVOT

      *   Article 2 reveals that the judge''s appointments and development interests
      are tied to political maneuvering and large financial payoffs (Jack Burrell''s
      spending).

      *   Article 2 shows that Judge Snedeker''s position as a developer is not independent
      but is intertwined with corrupt deals orchestrated by figures like Jack Burrell
      and Ronan McSharry.


      KEY ENTITIES

      *   Haymes Snedeker (Municipal Judge)

      *   Sneaky Jack Burrell

      *   Ronan McSharry

      *   Marcus McDowell (Municipal Attorney)

      *   Paula DiNardi

      *   Catalyst

      *   Fairhope City Council'
    generated_at: '2026-07-10T18:44:56.584461Z'
    text: Jack Burrell mastered the "quarterback sneak" to swear in his favorite developer
      as the town's judge. From fixed bids on jet hangers to rotted buildings, the
      Burrell-Snedeker alliance shows exactly how Fairhope’s elite trade public cash
      for private favors and backroom deals.
  eagles-eye-catalyst-kant-corte:
    brief: 'THE CONFLICT:

      *   Municipal Judge was the developer of a project.

      *   The same City Council appointed the Municipal Judge.

      *   Conflict of interest existed regarding the approval of the largest development
      in Fairhope.


      THE DISCOVERY:

      *   Mr. Burrell and Mr. Boone facilitated a deal involving the Kant-Corte Apartments.

      *   Boone and Burrell''s actions were approved by the last Fairhope City Council
