  elephant-in-a-volkswagen:
    brief: 'THE CONFLICT

      *   Municipal Judge is the developer of the largest development in Fairhope.

      *   The same City Council appointed the Municipal Judge.

      *   Council members have vested personal interests in the project.


      THE DISCOVERY

      *   Ordinance approved transferring land for the Tatumville Subdivision to the
      Fairhope Single Tax Corporation.

      *   Mr. Lee Turner (President of Single Tax, Chair of Fairhope Planning and
      Zoning) is pushing the project and acting as the salesman.

      *   Mr. Cliff Pittman (Single Tax board member and business partner of Councilman
      Robert Brown) is involved with the project.

      *   Mr. Turner holds a director role in Single Tax without a membership vote.


      THE PIVOT

      *   Article 2 reveals that the conflict of interest stems from specific individuals
      within the City Council/Single Tax structure actively pushing an ordinance that
      benefits the developer (Turner/Single Tax), providing the mechanism behind the
      Judge''s potential vested interest.


      KEY ENTITIES

      *   Fairhope City Council

      *   Municipal Judge

      *   Mr. Lee Turner

      *   Single Tax Corporation

      *   Mr. Cliff Pittman

      *   Councilman Robert Brown

      *   Tatumville Subdivision

      *   Fly Creek project

      *   Airport Authority'
    generated_at: '2026-07-10T18:44:56.584472Z'
    text: The Fairhope Single Tax Corporation has become a front for developer Lee
      Turner and his cronies on the council. Turner and Robert Brown’s business partner,
      Cliff Pittman, are aggressively pushing the Tatumville project to ensure their
      inner circle gets paid before anyone else.
  I-SEE-YOU:
    brief: 'THE CONFLICT

      *   Municipal Judge Haymes Snedeker is the developer of the largest project
      in Fairhope and was appointed by the same City Council.

      *   The conflict arises because the Council is responsible for approving his
      infrastructure needs and development projects.

      *   Council actions included Resolution 5: Appointment of Municipal Judge Haymes
      Snedeker.

      *   Council actions included Resolution 11: Awarding Fairhope Clock Plaza to
      RH Deas Building Co., LLC for $282,211.00.

      *   Council approved procurement for Intelligence-Led Policing Sensor Kits from
      ProTecVideo, LLC for $20,000.00 without public notice or discussion.

      *   The infrastructure for the Aldi store and East Fairhope development is being
      paid by taxpayers.


      THE DISCOVERY

      *   The City Council agenda shows a pattern of ignoring public discussion and
      participation regarding development projects.

      *   The council approved procurement (tag reader/video) without any public notice
      or discussion.

      *   Council members are perceived as deaf to public participation when approving
      infrastructure needs.

      *   Infrastructure for the East Fairhope development is already being prepared,
      implying payment by taxpayers before construction begins.


      THE PIVOT

      *   The Widget Article proves that the City Council’s process is fundamentally
      flawed (deaf to public input) and lacks transparency.

      *   Article 2 serves as the smoking gun by revealing that the approval of key
      decisions (Snedeker''s appointment, infrastructure spending) occurred without
      proper public scrutiny, confirming the conflict of interest alleged in Article
      1.


      KEY ENTITIES

      *   Haymes Snedeker (Municipal Judge/Developer)

      *   Fairhope City Council

      *   RH Deas Building Co., LLC

      *   ProTecVideo, LLC

      *   Aldi store development

      *   Martin (Councilman)

      *   Fairhope Clock Plaza'
    generated_at: '2026-07-10T18:44:56.584477Z'
    text: Fairhope’s council treats public participation like a nuisance while they
      spend taxpayer money on private infrastructure. By hiding the Aldi deals and
      Snedeker’s appointment behind closed doors, these officials prove they serve
      developers instead of the people who pay their salaries.
  follow-bouncing-ball:
    brief: 'THE CONFLICT

      *   Municipal Judge was the developer of a large Fairhope project.

      *   The Municipal Judge was also appointed by the same City Council that approved
