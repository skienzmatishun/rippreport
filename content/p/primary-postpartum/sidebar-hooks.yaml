hooks:
  not-guilty-innocent:
    brief: 'THE CONFLICT:

      * Harry Still was arrested in Bay Minette on September 3, 2025, on assault charges
      against City Councilman Matt Franklin.

      * An arrest report noted aggressive behavior from Still toward officials and
      previous city building lockdowns related to him.


      THE DISCOVERY:

      * A Circuit Court jury presided over by Judge Clark Stankowski found Harry Still
      "INNOCENT" in the Bay Minette incident, contradicting earlier rulings.

      * Judge Marcus McDowell initially found him guilty in municipal court; this
      judge also serves as municipal attorney for Fairhope.

      * The initial charges against Still were framed to disrupt his independent investigation
      into Danny Williams'' death (May 2022) and alleged misconduct involving Orange
      Beach Mayor Tony Kennon.


      THE PIVOT:

      * Article 1 establishes the arrest/allegation context; Article 2 provides the
      definitive legal outcome (Not Guilty by jury verdict), which invalidates the
      basis of the initial claims against Still, supporting his assertion that the
      charges were a "setup."


      KEY ENTITIES:

      * Harry Still

      * Bay Minette City Councilman Matt Franklin

      * Tony Kennon (Orange Beach Mayor)

      * Danny Williams (Deceased/Investigation subject)

      * Marcus McDowell (Municipal Judge/Attorney for Fairhope)

      * Clark Stankowski (Circuit Court Judge in acquittal)

      * Al Tolbert (Former Bay Minette Police Chief, now with BCSO)

      * Joshua Brown (New Bay Minette Mayor Elect)

      * Lowery (Baldwin County Sheriff)'
    generated_at: '2026-06-20T16:23:43.253898Z'
    text: Local goons used a bogus assault charge to bury Harry Still’s probe into
      Danny Williams’ death. A jury just blew their cover by finding Still innocent,
      exposing how Judge Marcus McDowell rigged the game to protect Orange Beach Mayor
      Tony Kennon.
