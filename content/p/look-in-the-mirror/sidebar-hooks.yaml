hooks:
  little-choice:
    brief: 'THE CONFLICT

      *   During the 2017 US Senate primary election cycle in Alabama, significant
      allegations of corruption surfaced among Republican and Democratic candidates.

      *   Luther Strange served as Attorney General/leading law enforcement officer
      during this period and was accused of facilitating deals regarding the Jeff
      Sessions Senate seat for "Luv Gov."

      *   Strange faced accusations that he overlooked or allowed Sen. Trip Pittman
      to receive $750,000 in BP funds while others facing BP-related crimes received
      lesser prosecution.

      *   Judge Roy Moore was suspended by the Alabama Court of the Judiciary on September
      30, 2016, for violating judicial canons (the second time being mentioned).


      THE DISCOVERY

      *   The Widget Article provides specific context and evidence regarding candidates
      in the 2017 US Senate race.

      *   It names Sen. Trip Pittman as the "worst elected official" in Baldwin County.

      *   The Fairhope City Council specifically voted to end its contract arrangement
      with State Sen. Trip Pittman''s company (D&J Enterprises Inc.) since 2012.

      *   Mo Brooks declared he would relinquish his Senate candidacy if President
      Trump dismissed Jeff Sessions as US Attorney General.


      THE PIVOT

      *   The Main Article generally alleges Strange allowed "Sen. Pittman to walk
      with $750,000 of BP money" without mentioning specific outcomes or local consequences.

      *   The Widget Article proves this allegation by providing the direct link between
      Pittman''s financial relationship with BP funds and his failure in office, specifically
      naming the Fairhope City Council’s contract termination as a consequence for
      his actions.


      KEY ENTITIES

      *   Luther Strange (Former AG/Republican Senate Candidate)

      *   Sen. Trip Pittman (State Senator/Trustee of BP Funds)

      *   Jeff Sessions (US Attorney General/Senator Seat Holder)

      *   Roy Moore (Chief Justice suspended in 2016; Alabama Court of the Judiciary)

      *   Mo Brooks (Congressman R-AL)

      *   Baldwin County (Region where political figures operate)

      *   Fairhope City Council (Local government body that ended Pittman''s contract)

      *   BP (The corporation involved in fund transfers/crimes mentioned)'
