  catalyst-candidates:
    brief: 'THE CONFLICT

      *   Luther Strange (former AG) allegedly allowed Sen. Pittman to receive $750,000
      in BP money while ignoring other BP crime anchors at the Bay.

      *   The state faced ethical concerns regarding Roy Moore, who was thrown off
      the bench twice as a Supreme Court Justice.

      *   General corruption surrounding Alabama Senate primary candidates was noted
      by The Ripp Report as securing Alabama''s reputation for political corruption.


      THE DISCOVERY

      *   The Widget Article reveals the existence of "Catalyst Candidates" vying
      for local and state office, specifically referencing the June 9, 2018, Baldwin
      County primary election.

      *   Michelle Thomason is identified within this context as "The Catalyst Queen,"
      listed under the Court of Civil Appeals candidates.

      *   The Ripp Report confirmed the addition of Catalyst Candidates to the official
      candidate list provided by the Baldwin County Probate Office.


      THE PIVOT

      *   Article 1 critiques broad political corruption and demands new faces for
      Baldwin County, specifically mentioning Sen. Pittman''s seat needs filling by
      a candidate not representing "his personal business."

      *   Article 2 provides the specific structural mechanism behind that political
      maneuvering by highlighting "Catalyst Candidates" as an organized group seeking
      control of county government during key elections (e.g., the 2018 primaries).

      *   The Catalyst structure links the general corruption allegations in Article
      1 to a defined, politically coordinated attempt at local and state office acquisition.


      KEY ENTITIES

      *   Catalyst / CATALYST (political organization)

      *   Michelle Thomason ("The Catalyst Queen")

      *   Sen. Pittman

      *   Luther Strange (Former AG/Senator)

      *   Roy Moore (Supreme Court Justice)

      *   Jeff Sessions (former U.S. Attorney General)

      *   Baldwin County

      *   Ripp Report / Ripp

      *   Chuckee (Journalist; Editor of The Fairhope Courier)'
