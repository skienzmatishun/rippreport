  qualification:
    brief: 'THE CONFLICT

      *   Historical corruption allegations involving former Attorney General Luther
      Strange (allowing "Luv Gov." to walk in exchange for Jeff Sessions'' seat).

      *   Allegation that State Senator Pittman accepted $750,000 from BP money and
      avoided accountability for anchors left in the Bay.

      *   Former Alabama Supreme Court Justice Roy Moore was thrown off the bench
      twice for breaking the law (as noted by Article 1 context).

      *   The Alabama Ethics Commission faced scrutiny for its role in political corruption
      cases.


      THE DISCOVERY

      *   Baldwin County is preparing for mid-term elections and a primary on June
      5, 2018, offering voters an opportunity to change the "good ole boy network."

      *   Karen Wilson was elected Mayor of Fairhope (implied by context) as part
      of this political shift.

      *   The *Ripp Report* identifies Catalyst as a group scrutinizing candidates
      in Baldwin County elections.

      *   Specific targets for scrutiny include former Mayor Kant and Senator Pittman,
      who were accused of keeping "the wheels greased" in Bay Minette.

      *   Judge Michelle Thomason is running for Court of Civil Appeals but has a
      negative reputation from her time as Circuit Judge in Family Court and was the
      first client of Catalyst.


      THE PIVOT

      *   Article 2 provides the specific contemporary political context (Baldwin
      County elections, June 2018) where the corruption described generally in Article
      1 is currently being contested or judged.

      *   The scrutiny applied to Senator Pittman for accepting BP money and its ties
      to the "good ole boy network" (Article 1 theme) directly links him as a target
      of investigation/challenge within Baldwin County elections (Article 2).


      KEY ENTITIES

      *   Luther Strange: Former Attorney General, Senate candidate.

      *   Sen. Pittman / Boom Boom Pittman: Former State Senator, accused of taking
      BP money.

      *   Jeff Sessions: U.S. Attorney General.

      *   Roy Moore: Former Alabama Supreme Court Justice/Senator-elect.

      *   Karen Wilson: Mayor (Mayor of Fairhope).

      *   Kant: Former Mayor (of Fairhope).

      *   Michelle Thomason / Judge Michelle Thomason: Judge, candidate for Court
      of Civil Appeals, client of Catalyst.

      *   Catalyst: Political organization conducting scrutiny of candidates in Baldwin
      County.

      *   Baldwin County: Jurisdiction for upcoming elections; high income producer.'
