      in the local Baldwin County School Board District 2 race (March election).

      *   Candidate Andrea Lindsey allegedly received a $1000 campaign donation from
      Superintendent Eddie Tyler’s wife on January 17th.

      *   On January 18th, Ms. Lindsey then voted to give Mrs. Tyler a promotion at
