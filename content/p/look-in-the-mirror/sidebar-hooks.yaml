  poison-water-alabama-senate-special-election:
    brief: '1. THE CONFLICT:

      - Jeff Sessions served as a Senator in Alabama until he became US Attorney General,
      necessitating a special election to fill his seat on December 12, 2017.

      - Luther Strange served as Alabama’s leading law enforcement officer/Attorney
      General during this period.

      - Roy Moore was twice removed from the Alabama Supreme Court for breaking the
      law.

      - Tripp Pittman held a position of trust related to BP funds (BP trustee) while
      allegedly accepting $750,000 from BP money.


      2. THE DISCOVERY:

      - Article 2 specifies that Luther Strange secured Jeff Sessions’ seat by "turning
      a blind eye" to investigations led by Bentley.

      - The article proves that strange was aware of evidence against Tripp Pittman''s
      use of $750,000 in BP funds while he himself acted as the "trustee."


      3. THE PIVOT:

      - Article 1 alleges general corruption and a failure of oversight; Article 2
      provides specific mechanisms of this alleged corruption by tying Strange’s political
      benefit (holding Sessions'' seat) directly to his perceived dereliction of duty
      concerning Bentley’s investigation.


      4. KEY ENTITIES:

      - Jeff Sessions

      - Luther Strange ("Big Luther")

      - Roy Moore

      - Tripp Pittman

      - Del Marsh

      - BP (British Petroleum)

      - Bentley

      - Alabama Senate'
