  countdown:
    brief: 'THE CONFLICT

      *   Luther Strange served as Alabama Attorney General (AG) in 2017.

      *   Strange is accused of allowing Senator Trip Pittman to accept $750,000 from
      BP despite a lenient prosecution compared to other BP cases.

      *   Roy Moore was Chief Justice and Supreme Court Judge but was suspended/thrown
      off the bench twice for breaking laws.

      *   The political climate involved intense scrutiny ahead of the US Senate primary
      elections in 2017.


      THE DISCOVERY

      *   Article 2 documents the specific roster of candidates (including Luther
      Strange, Roy Moore, Mo Brooks, Trip Pittman, and Randy Brinson) running in the
      highly contentious Republican wing of the 2017 US Senate race.

      *   Mo Brooks (R-AL), a candidate, publicly stated he would give up his seat
      candidacy if then U.S. Attorney General Jeff Sessions was fired by President
      Trump.


      THE PIVOT

      *   Article 2 serves as the factual evidence proving Article 1''s warnings because
      it lists the exact individuals—Luther Strange (AG/corrupt deal), Roy Moore (twice
      disbarred justice), and Trip Pittman (BP money allegations)—who were participating
      in the primary race being criticized.


      KEY ENTITIES

      *   Luther Strange (Former AG, Senate Candidate)

      *   Jeff Sessions (U.S. Attorney General)

      *   Roy Moore (Supreme Court Justice/Candidate)

      *   Mo Brooks (R-AL Congressman/Candidate)

      *   Sen Trip Pittman (State Senator/Candidate)

      *   Randy Brinson (Senate Candidate)

      *   BP (Corporation involved in financial dealings and alleged crime)

      *   Alabama Ethics Commission'
