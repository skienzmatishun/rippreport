      THE PIVOT:

      *   Article 1 identifies a large, systemic problem of corruption in Alabama
      ("Look In The Mirror").

      *   Article 2 provides concrete, granular evidence that this same culture of
      conflict of interest and quid pro quo politics exists at the local level (Baldwin
      County School Board District 2).

      *   The local scandal involving Superintendent Eddie Tyler''s wife donating
      to Andrea Lindsey demonstrates how powerful figures leverage campaign finance
