  fairhope-jester:
    brief: 'THE CONFLICT:

      *   Fairhope Jester is spinning an Ethics Complaint against himself.

      *   The conflict involves the Jester claiming he had permission from the Ethics
      Commission to secure a contract with the Eastern Shore Art Center.

      *   An existing Ethics Complaint exists (Case number 2018-42) against Fairhope
      City Councilman Robert Brown and Eastern Shore Art Center Board member.


      THE DISCOVERY:

      *   Robert Brown, as City Councilman, ESAC Board member, and general partner
      of Pittman-Brown Development Co., had advanced knowledge of the Eastern Shore
      Art Center construction contract.

      *   Robert Brown claimed he had "permission" to proceed with the Pittman-Brown
      contract, despite having no such permission.

      *   Robert Brown never applied for an Ethics Advisory Opinion regarding the
      contract process.


      THE PIVOT:

      *   Article 2 provides the specific connection between Robert Brown and the
      development/contracting entity (Pittman-Brown) that is central to the ethics
      complaint mentioned in Article 1.

      *   Article 2 proves that Brown leveraged his position to secure a contract,
      directly contradicting any claims made by the Jester regarding his purported
      "permission."


      KEY ENTITIES:

      *   Fairhope Jester

      *   Kant-Corte Apartments

      *   Fly Creek

      *   Robert Brown (City Councilman, ESAC Board member)

      *   Eastern Shore Art Center (ESAC)

      *   Pittman-Brown Development Co.

      *   Alabama Ethics Commission'
