      and ESAC Board member Robert Brown.

      *   Disagreement over sewer system standards: Gravity fed vs. low pressure sewer
      system established by Fairhope Utilities/City Planning Commission in December
      2002.


      THE DISCOVERY

      *   The Ethics Complaint against Councilman Robert Brown involving the Eastern
