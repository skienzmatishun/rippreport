      using his office for personal gain, directly undermining the Fairhope Jester’s
      claim that he secured a contract with ESAC through official permission.

      *   The second article proves that the Ethics Commission has been inactive ("limbo
      status since May 2 2018") and dismissing complaints encourages elected officials
      to use their office for personal gain.


