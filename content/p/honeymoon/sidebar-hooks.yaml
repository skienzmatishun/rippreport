  catalyst-colors:
    brief: '1. THE CONFLICT

      - Robert Brown resigns Fairhope City Council Monday night; provides no notice
      or reason.

      - Jack Burrell states to City Clerk Lisa Hanks that zero candidates have been
      forwarded for the vacant seat.

