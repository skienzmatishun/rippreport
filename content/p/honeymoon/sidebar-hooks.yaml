hooks:
  selected-not-elected:
    brief: 'THE CONFLICT:

      Robert Brown resigned from Fairhope City Council Place 4 effective Monday night
      without notice. Acting Mayor Jack Burrell and Mayor Sherry Sullivan are accused
      of coordinating with CSB/Catalyst to fill the seat. The core accusation is a
      pre-arranged plan to replace Brown with Jay Robinson, who had previously chosen
      not to seek re-election.


      THE DISCOVERY:

      Article 2 highlights the March 8, 2021 City Council meeting where "Appointment
      of Council member Place 4" is the first official agenda item. It confirms Robert
      Brown purchased family property in July 2020 during the election cycle and listed
      his Fairhope home on MLS in January. It records Council member Gammon’s objection
      that the "metric" for replacing Brown was not transparent and contradicts candidates
      who campaigned for full terms.


      THE PIVOT:

      Article 2 validates the mechanics of the alleged conspiracy in Article 1. The
      upcoming March 8 meeting is the execution point for the "appointment" described
      in Article 1. Article 2 confirms Robinson did not run for office yet, supporting
      the "selection over election" narrative. The timeline (Brown buying property
      in July 2020 while campaigning) connects the resignation to the election cycle,
      proving pre-meditation.


      KEY ENTITIES:

      Robert Brown (Resigning Council Member)

      Jack Burrell (Acting Mayor, CSB Associate)

      Sherry Sullivan (Mayor)

      Jay Robinson (Intended Replacement, Attorney)

      Catalyst/Scott Boone Consulting (CSB - Primary Alleged Driver)

      Lisa Hanks (City Clerk)

      Gammon (Council Member Opposing Backroom Deal)

      Corey Martin (City Council member mentioned in context of outreach)'
