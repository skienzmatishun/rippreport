  tiny-steps:
    brief: '1. THE CONFLICT

      - 2021 Alabama Legislature session (referenced in Widget): Failed to accomplish
      prisons, healthcare/Medicaid bills.

      - Gambling Bill: Killed ("wound up in trash can"); lawmakers promised it would
      fund healthcare, broadband expansion, and cut taxes.

      - Yoga Ban: 1993 state law banned yoga in public schools due to religious ties;
      remains embarrassing to state 30 years later.

      - Strengthen Alabama Homes (SAH): State Rep. Chip Brown''s bill passed House
      96-1 to increase funding for home fortification program; State Sen. Chris Elliott
      stalled the bill citing transparency concerns.

      - Chris Elliott’s Conflict: Elliott (former contractor for SAH) halted funding
      for SAH after being removed from the program in 2016; Elliott had previously
      wanted personal data for bidding.


      2. THE DISCOVERY

      - Medical Marijuana: Article 2 confirms the legislature made a "baby-step start"
      for medical marijuana, allowing it as a tool for doctors to help sick children
      and dying people.

      - Legislative Traction: Despite rejecting gambling/Medicaid, the legislature
      allowed "medical marijuana gained some traction."

      - Evidence of Commission: Article 1 lists John McMillan as Executive Director
      of the Alabama Medical Cannabis Commission, validating the government oversight
      implied by Article 2’s legislative "traction."


      3. THE PIVOT

      - The Widget Article''s admission of medical marijuana legislation "traction"
      is the legislative requirement for Main Article 1’s Oct 2023 Conference.

      - Article 2 proves the political groundwork (and resistance) required for ACIA
      and the Commission to operate.

      - Article 2 confirms that despite legislative corruption elsewhere (SAH, Gambling),
      medical cannabis was one of the few "plus" items, justifying Article 1’s celebration.


      4. KEY ENTITIES

      - Chey Garrigan (CEO, Alabama Cannabis Industry Association)

      - John McMillan (Executive Director, Alabama Medical Cannabis Commission)

      - Chris Elliott (State Senator R-Fairhope; SAH contractor dispute involved)

      - Chip Brown (State Rep, Mobile County)

      - Brian Powell (SAH Strengthen Alabama Homes Director)'
    generated_at: '2026-03-12T13:33:58.597498Z'
