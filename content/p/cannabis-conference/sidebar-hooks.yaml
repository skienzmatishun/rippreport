  backstory-podcast-special-legislative-alert-alabama-medical-cannabis:
    brief: |-
      THE CONFLICT:
      - Oct 13-14, 2023: Inaugural Alabama Medical Cannabis Conference scheduled at Sheraton Hotel, Birmingham.
      - Organized by ACIA (Alabama Cannabis Industry Association).
      - Confirmed speaker: John McMillan, Executive Director of Alabama Medical Cannabis Commission.

      THE DISCOVERY:
      - SB 46 passed in Alabama House of Representatives to establish statewide medical marijuana program.
      - Pending final Senate approval and signature by Gov. Ivey.
      - SB 46 legalizes medical cannabis via pills, patches, and creams (no smoking/vaping) for qualifying conditions.

      THE PIVOT:
      - Chey Garrigan (ACIA CEO) is the common link driving both conference promotion and legislative advocacy for SB 46.
      - Conference validates the industry presence implied in SB 46's successful passage; legislative success justifies conference attendance/investment focus.

      KEY ENTITIES:
      - Chey Garrigan (ACIA CEO)
      - ACIA / Alabama Cannabis Industry Association
      - John McMillan
      - Gov. Kay Ivey
      - Alabama Medical Cannabis Commission
