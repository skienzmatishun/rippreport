    text: Chey Garrigan is drumming up big business for her Birmingham cannabis conference while the state finishes the paperwork on SB 46. This discovery proves Garrigan isn't just a promoter; she is the primary architect using legislative wins to bankroll her private industry events.
  alabama-off-the-rails:
    brief: |-
      THE CONFLICT
      - May 17, 2021: Alabama passed "Compassion Act" medical cannabis bill allowing doctor-recommended access.
      - State awarded dozens of grower licenses to candidates after lengthy application process.
      - Implementation stalled; 4 years later (Feb 2025), system mired in litigation and legal confusion.
      - Alabama Board of Medical Examiners has not issued first patient license by 2025.
      - State spending millions on legal defense for Alabama Medical Cannabis Commission instead of launching program.

      THE DISCOVERY
      - Chey Garrigan (ACIA Founder) published opinion "Alabama Off The Rails" on Feb 3, 2025.
      - Confirms program is "off the rails" and stuck in a legal morass similar to 36 other states.
      - Reveals Senate budget committee chairman suggested repealing bill due to millions spent in litigation defense.
      - Plaintiffs using lawsuits to keep program in court delays while growers already invested millions.
      - Unregulated Delta 8/10 products selling on shelves are not covered by bill as legal dispensary sales.

      THE PIVOT
      - Chey Garrigan is the primary executive officer (CEO) of ACIA hosting the conference in Article 1.
      - Chey Garrigan is the specific author of the "Off The Rails" analysis in Article 2.
      - She simultaneously promotes the industry as a success ("Inaugural Conference to Make History") and admits personal knowledge of systemic failure.
      - Article 2 validates Article 1's context: The legitimacy she is marketing for ACIA is dependent on a legislative fix that admits to failing 4 years prior.

      KEY ENTITIES
      - Chey Garrigan (ACIA CEO, Lobbyist)
      - Alabama Cannabis Industry Association (ACIA)
      - Alabama Medical Cannabis Commission
      - John McMillan (Exec Director, AMC)
      - Senate Budget Committee Chairman
    generated_at: '2026-03-12T13:33:58.596651Z'
    text: While Chey Garrigan sells tickets to a historic cannabis event, she privately admits the state’s medical program is a total train wreck. Her own analysis reveals a system mired in million-dollar lawsuits and incompetence that leaves dying patients with nothing but empty promises.
