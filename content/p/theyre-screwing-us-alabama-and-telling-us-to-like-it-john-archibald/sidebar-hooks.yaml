      Fairhope municipal contracts while violating ethics rules with impunity, assisted
      by former Mayor Tim Kant.

      *   Pittman''s complaint was abandoned by the Attorney General''s office and
      ignored an FBI investigation/grand jury.


      THE PIVOT

      *   Article 2 provides specific, localized evidence (Fairhope officials and
      Senator Pittman''s actions) proving that the Ethics Commission is ineffective
      and manipulated to shield elected officials from accountability.

      *   This proves Article 1’s claim that the commission facilitates corruption
      by showing how politicians manipulate ethics guidelines rather than following
      them.


