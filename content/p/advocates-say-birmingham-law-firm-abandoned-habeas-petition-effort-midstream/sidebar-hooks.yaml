  justice-denied-a-wrongful-conviction-buried-by-power-and-politics:
    brief: "THE CONFLICT: \n- Murray Lawrence Jr. imprisoned for capital murder of\
      \ Brandon Hastings since mid-2000s (approx. 19-20 years total).\n- Conviction\
      \ relied on testimony of Jarius McNeil, a confessed killer who allegedly changed\
      \ story under threat of death penalty.\n- 2005 Prosecuting Attorney David Whetstone\
      \ made plea deal with McNeil to secure testimony despite knowing unreliability.\n\
      - Victim’s body exhumed in Coroner's report; all seven cervical vertebrae removed\
      \ (new discovery by Ripp/Koerner team).\n- Prosecution claimed victim shot in\
      \ Alabama; autopsy later proved strangulation in Mississippi.\n\nTHE DISCOVERY:\
      \ \n- Maxwell-Tillman Law Firm (Birmingham) agreed to represent Murray Lawrence\
      \ Jr.’s habeas petition.\n- Firm collected nearly half of stated fee as down-payment\
      \ through formal invoice and verbal agreement with three advocates.\n- Two-year\
      \ engagement lasted from July 2023 to July/August 2025.\n- July 15, 2025: Alabama\
      \ Gazette reports Maxwell-Tillman abandoned case midstream.\n- August 12, 2025:\
      \ Alabama Gazette (opinion piece) confirms firm abandoned effort without notifying\
      \ family properly; sent \"Non-Engagement Letter.\"\n- Firm claims no attorney-client\
      \ relationship formed.\n- Advocates Francis Paul Ripp and Nancy R. Koerner returned\
      \ with research on suppressed evidence; firm reportedly refused to utilize them\
      \ in court.\n- Gabby Humber, assigned attorney at Maxwell-Tillman, left June\
      \ 2025; no visits made to Lawrence by firm partners during engagement.\n- Advocates\
      \ uncovered prison wall-phone failures and medical neglect issues ignored by\
      \ legal team while investigating other Holman inmates.\n\nTHE PIVOT: \n- Widget\
      \ article confirms four 2005 officials now hold power to block appeals (Sheriff\
      \ Lowery, DA Wilters), ensuring current legal abandonment isn't corrected.\n\
      - Main article shows private counsel (Maxwell-Tillman) abandoned case after\
      \ discovering suppressed evidence; Widget article proves State itself had similar\
      \ pattern of suppression (Jarius McNeil deal, victim death details).\n- Main\
      \ article’s discovery of vertebral removal by Coroner matches Widget article’s\
      \ claim of State tampering to ignore forensic evidence (no physical/forensic\
      \ tie to Lawrence).\n- Widget article proves the people responsible for 2005\
      \ case are still high-ranking; Main article shows they indirectly permit obstruction\
      \ (Maxwell-Tillman’s non-engagement may be tied to pressure of these officials).\n\
      - This creates direct bridge: Past misconduct (Widget) is now enforced by current\
      \ power players protecting the wrongfully convicted system (Main).\n\nKEY ENTITIES:\
      \ \n- Murray \"Bubba\" Lawrence Jr.\n- Brandon Hastings (Victim)\n- Jarius McNeil\
      \ (Coerced Killer/Witness)\n- Maxwell-Tillman Law Firm (Birmingham Legal Defense\
      \ Team)\n- Leroy Maxwell (Firm Partner, Maxwell-Tillman)\n- Francis Paul Ripp\
      \ (Advocate/Lead)\n- Nancy R. Koerner (Research Lead)\n- Robert Wilters (2005\
      \ Circuit Court Judge, Current Baldwin County DA)\n- Anthony Lowery (2005 Chief\
      \ Investigator, Current Baldwin County Sheriff)\n- Huey \"Hoss\" Mack (2005\
      \ Lead Investigator, Current State-level position)\n- David Whetstone (2005\
      \ DA, Retired; orchestrated plea deal)\n- Sheriff Hoss Mack\n- David Whetstone\n\
      - Gabby Humber (Maxwell-Tillman Attorney, departed June)"
