      Mayor Kant.

      - Specific connection of Councilman Burrell and Boone voting to accept drainage
      liability proves the financial burden shift claimed in Article 1.


      KEY ENTITIES

      - Tim Kant (Former Mayor of Fairhope)

      - Angelo Corte (Developer/Builder)

      - Councilmen Burrell and Boone (Fairhope City Council)

      - Mayor Sullivan / Mayor Wilson (Current Administration)

      - Publix Project (Developer/Parker Road)

      - Fly Creek Apartments (230 units proposed)

      - Fairhope Marina (Dredging by M & N of Alabama LLC)

      - Fairhope City Council'
