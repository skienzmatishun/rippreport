hooks:
  fly-creek-mud:
    brief: 'THE CONFLICT

      - Former Mayor Tim Kant first-proposed re-establishing creek biological and
      hydraulic connectivity in 2014

      - Publix project on Parker Road constructed causing culvert, sewer, wetlands,
      drainage issues with Fly Creek

      - Multiple lawsuits filed against the city over the Publix project (4 or 5 total
      reported)

      - Angelo Corte developed and sold apartments, predicted by critics to leave
      citizens with repair costs after flooding damaged several units

      - Developers received green flags for expansion behind apartments despite "same
      issues same no action" previously noted

      - 2023 culvert failure necessitated emergency repairs to failed box-culverts
      under US 98

      - Mayor Wilson obtained in excess of $10 million in infrastructure grants while
      addressing issues previous council ignored

      - City Council applied for $20 million federal BUILD grant in 2023; applications
      submitted in 2024 and 2025 were not successful

      - City Council ignored public outcry against projects supported by Kant and
      Corte; Citizens elected new council in last election


      THE DISCOVERY

      - Current photos show Highway 98 shoulder on the south side caved in, dumping
      tons of dirt into Fly Creek

      - Red dirt dumped on steep slope overhanging Fly Creek cannot be compacted

      - Culvert foundation damaged in several areas; current work identified as temporary
      "band aid" repair

      - Mud found in Fairhope Marina matches DNA profile of Publix construction sediment

      - Jack Burrell insists mud comes from bay going up the creek, linked to development
      on Fly Creek

      - Baykeeper reports highest bacteria count on Hwy 98 at Publix and Fly Creek
      locations (Scenic 98)

      - Mayor Sullivan and current City Council predicted to not complete granted
      funds before term ends compared to Wilson''s administration


      THE PIVOT

      - Widget Article photos confirm Main Article claims regarding ongoing infrastructure
      failure from Publix/Apartments development

      - DNA match of dredging mud to Publix construction soil proves infrastructure
      damage links directly to specific development projects

      - Widget visual evidence of Highway 98 collapse validates Main Article assertion
      that Culvert damage goes back to Publix construction and apartments expansion

      - Confirmation of Angelo Corte selling units and moving on validates Main Article
      claim that developer profited while citizens pay for repairs

      - Continuity of City Council members identified in both articles (Kant supporters
      vs. Wilson supporters) explains persistence of issues despite Mayor Wilson''s
      grant successes


      KEY ENTITIES

      - Tim Kant (Former Mayor)

      - Angelo Corte (Developer)

      - Jack Burrell (Fairhope)

      - Mr. Boone (Catalyst Partner/City Council)

      - Corry Martin (City Council Member - noted as exception to council issues)

      - Mayor Wilson (Former Mayor/Grant Success)

      - Mayor Sullivan (Current Mayor/Grant Failure Risk)

      - M & N of Alabama LLC (Dredging Company for Fairhope Marina)

      - Catalyst (Organization supporting developer)

      - Publix (Developer on Parker Road)

      - Fairhope City Council

      - Baykeeper (Organization reporting bacteria counts)'
