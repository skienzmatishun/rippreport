      - Fire station and lift station added near proposed apartments at estimated
      $1 million taxpayer expense without notification.

      - Mayor Tim Kant and Developer Angelo (Arthur) Corte blamed for approving development
      against overwhelming public outcry.

      - 95% opposition at planning/zoning meetings versus less than 5% support for
      rezoning to build apartments.

      - M & N of Alabama LLC selected for Fly Creek Marina dredging ($6-$8 million
      estimated cost).

      - Baykeeper reported highest bacteria count on Hwy 98 at Publix and Fly Creek
      Scenic 98.

      - Former Mayor Wilson secured in excess of $10 million in infrastructure grants;
      current Mayor Sullivan term criticized for failing to complete grants.


      2. THE DISCOVERY

      - Francis Paul Ripp (The Ripp Report) sent letter to Congressman Bradley Byrne
      citing specific corruption claims against Mayor Kant.

      - Lagniappe article cites property owner Arthur Corte refused sediment analysis;
      prior documentation links sediment to Publix site.

      - Mayor Kant commissioned a Fly Creek Watershed Management Plan described as
      "bogus" to deflect responsibility; study never identified Publix site facts.

      - Mayor Kant and Sen. Pittman siphoned $636,000 of BP funds for a contract involving
      boom anchors in bay.

      - FBI investigation initiated and referral made to Alabama Attorney General
      White Collar Crime Division regarding BP fraud.

      - Developer Corte informed Mayor Kant outcome of first planning board meeting
      was unacceptable and instructed him to "FIX" the problem; Mayor did so on subsequent
      meetings.

      - Criminal investigation requested specifically targeting Mr. Timothy Kant regarding
      Fly Creek damage and collusion.


      3. THE PIVOT

      - Article 2 provides financial verification of Article 1''s corruption claims:
      $11.25 million lawsuit settlement and $636,000 BP fund theft confirm high-level
      involvement of Kant.

      - Article 2 substantiates the sediment DNA claim from Article 1 by citing Corte''s
      specific refusal of analysis which previously linked mud to Publix construction.

      - Article 2 confirms the "Fix" narrative (Kant overriding planning board vote)
      alleged in Article 1, explaining why the developer was able to expand "behind
      apartments" despite 95% opposition.

      - Connects the failed $20 million BUILD grant application to Article 1''s claim
      that City Council aids developer at public expense.

      - Identifies Kant as primary focus for criminal investigation, validating Article
      1''s accusation of collusion between Mayor and developer.


      4. KEY ENTITIES

      - **Names:** Tim Kant (Former Mayor), Arthur Corte (Angelo Corte), Francis Paul
      Ripp, Bradley Byrne (Congressman), Sen. Pittman, Mayor Sullivan (Current Mayor),
      Mayor Wilson (Former/Incoming), Jack Burrell.

      - **Organizations:** The Ripp Report, Baldwin County Legal Eagle (BCLE), Catalyst,
      Fairhope Marina, Fly Creek Watershed Management Plan, FBI, Alabama Attorney
      General White Collar Crime Division.

      - **Locations:** Parker Road, Fly Creek, US 98, Scenic 98, Triangle lawsuit
      settlement location, Main Fly Creek boat channel.

      - **Financials:** $20 million BUILD Grant, $11.25 million Triangle Lawsuit Settlement,
      $636,000 BP Fund Corruption, $1 million Fire Station/Lift Station cost.

      - **Reports:** Baykeeper Bacteria Report, Lagniappe Mobile Article.'
    generated_at: '2026-03-07T23:19:37.110659Z'
    text: Former Mayor Kant didn't just ignore the public; he actively "fixed" planning
