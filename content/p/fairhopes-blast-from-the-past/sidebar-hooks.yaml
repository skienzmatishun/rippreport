  fairhope-catalyst-a-dirty-little-secret:
    brief: 'THE CONFLICT:

      *   Past political factions included former City Council persons, Catalyst Council
      persons, three bees, fired employees, W.A.C.O am radio, and Chucky Cheeze aiming
      to reshape Fairhope’s government.

      *   Councilman Jack Burrell was involved in an Airport Scandal, a police report
      involving his son, and allegations concerning drinking at McSherry’s bar.

      *   Robert Brown (The Jester) used insider knowledge on the Single Tax Contribution
      to award a contract to himself and Cliff Pittman for the Art Center work.


      THE DISCOVERY:

      *   The current Fairhope City Council, hand-picked by former Mayor Tim Kant
      and a slate of Catalyst candidates, voted to file an injunction against the
      October 2 referendum seeking a new form of government (Council-Manager system).

      *   The council is actively attempting to stop the vote by filing for a Temporary
      Restraining Order, using misinformation and delays as a cover.

      *   Catalyst Council members are intentionally obstructing the public process
      and refusing to inform citizens about changes to the government structure.


      THE PIVOT:

      *   Article 2 proves that the current City Council''s opposition to the Council-Manager
      system (a proposed change mentioned in Article 1) is not genuine concern for
      governance but a deliberate effort by the Catalyst faction to prevent the public
      vote on the structural change.


      KEY ENTITIES:

      *   Jack Burrell

      *   Kevin Boone

      *   Scott Boone

      *   Robert Brown (The Jester)

      *   Catalyst Council

      *   Tim Kant (Former Mayor)

      *   Jay Robinson (Councilman)

      *   Cliff Pittman

      *   Fresh Start Fairhope'
