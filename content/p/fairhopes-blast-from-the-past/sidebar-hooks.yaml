      Airport.

      *   Burrell led the charge to buy 2.65 million dollars in recreation land, shifting
      the city from a $1.2 million surplus to a $1.5 million deficit.

      *   Boone filtered knowledge and profited from connections dating back 30 years.

      *   Robert Brown (The Jester) awarded a sweetheart deal for the Art Center contract
      to himself and Cliff Pittman by bypassing bids.


      THE DISCOVERY

      *   CATALYST is recruiting candidates including Jack Burrell, Sherry Sullivan-Cant,
      and Tim Cant to gain power.

      *   Sherry Sullivan-Cant acted as Tim Cant''s puppet and travel companion, covering
      tracks related to the BP scandal, Fly Creek Publix project, Airport dealings,
      and soccer fields.

      *   Burrell''s baggage includes a hidden police report and bid rigging allegations.

      *   CATALYST is running Bill “lowtower” Hightower for Congress to deepen the
      political influence in Washington.


      THE PIVOT

      *   Article 2 connects the specific past failures (burrell’s cost, cant/cant’s
      schemes) mentioned in Article 1 to a current strategic political movement (CATALYST).

      *   Article 2 reveals that Burrell''s actions and Cant''s involvement are now
      being weaponized by CATALYST to secure future elections and obstruct the current
