      *   The factions ("three bees," Catalyst, Zunk the Skunk, Chucky Cheeze) are
      united in resisting change and maintaining power/status quo.


      THE DISCOVERY

      *   Mayor Queen Bee Sullivan is receiving a $112,000 salary boost per year above
      former Mayor Wilson’s salary, totaling $640,000.00 gross salary and benefits
