      control of the County Commission, and State Senate Seat 32.

      *   Past actions included manipulating political figures (e.g., Mayor Wilson
      defeating Fairhope Mayor Tim Can’t) and using funds from entities like BP (Senator
      Pittman taking $750,000).


      THE DISCOVERY

      *   Elliott Stacy is collecting over half a million dollars for his campaign
      and seeks the Senate Seat 32 for a salary of $42,000 per year.

      *   Elliott and Tucker Dorsey are using tens of thousands of dollars donated
      by developers and Catalyst to fund their elections.

      *   A "good ole boy deal" involved Elliott and Dorsey using BP money to pay
      $35 million for a cow pasture mega-site, diverting county reserves for infrastructure
      repair.


      THE PIVOT

      *   Article 2 proves that the political control exerted by CATALYST (Article
      1) is achieved through financial corruption and quid pro quo deals rather than
      pure political maneuvering.

      *   The specific details of campaign funding derived from developers and massive
      taxpayer-funded "good ole boy" deals expose the economic foundation supporting
      Catalyst''s alleged political power structure.


