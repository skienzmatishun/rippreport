hooks:
  catalyst-candidate-elliott-panic-mode:
    brief: 'THE CONFLICT

      *   Elliott Stacy and Dane Haygood formed a political group called CATALYST.

      *   CATALYST aimed for total control by maintaining three positions: Mayor of
      Fairhope, control of the County Commission, and State Senate Seat 32.

      *   The group operated as a "criminal enterprise" behind closed doors for over
      30 years.

      *   Elliott Stacy was appointed to the County Commission; Haygood was elected
      Mayor of Daphne.


      THE DISCOVERY

      *   Chris Elliott is running in a State Senate runoff election against David
      Northcutt in District 32.

      *   Elliott ran advertisements accusing Northcutt of dispensing narcotics without
      a license and fraudulent advertising (changing "results may vary" to "state
      of the art").

      *   Elliott attempted to use his position as County Commissioner to evade consequences
      for a DUI arrest, resulting in only a 45-day suspension instead of the mandated
      90 days.

      *   Elliott skimmed $4 million from the school 1% tax in one year ($40 million
      every 10 years into the county general fund).


      THE PIVOT

      *   Article 2 reveals the specific legal and financial misconduct (DUI evasion,
      fraudulent advertising, tax skimming) that underlies the overall structure and
      corruption of the CATALYST group described in Article 1.

      *   The maneuvers Elliott used to secure a lesser DUI punishment demonstrate
      the type of special treatment and dishonest dealings perpetuated by the CATALYST
      network.


      KEY ENTITIES

      *   Elliott Stacy

      *   Dane Haygood

      *   CATALYST

      *   Chris Elliott

      *   David Northcutt

      *   Michelle Thomasson

      *   Tucker Dorsey

      *   Tim Can’t

