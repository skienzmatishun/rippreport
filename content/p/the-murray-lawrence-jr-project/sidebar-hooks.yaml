  justice-denied-a-wrongful-conviction-buried-by-power-and-politics-repost:
    brief: '1. THE CONFLICT: Brandon Hastings disappeared Spring Break 2003 from Foley,
      Alabama; body found near Guitier/Vancleave, Mississippi. Murray Lawrence Jr
      convicted 2005 of murder based on testimony from Jarius McNeil; no DNA, fingerprints,
      or weapon linked Lawrence to crime. State claimed shooting occurred in Alabama
      while autopsy later proved Hastings was strangled in Mississippi. David Whetstone,
      Baldwin County DA circa 2003, offered plea deal to McNeil who shifted blame
      onto Lawrence. Maxwell-Tillman Law Firm currently handling new trial petition
      based on Brady Evidence.


      2. THE DISCOVERY: Article 2 identifies four officials from original case now
      holding office to influence outcomes. Robert Wilters, presiding judge for Lawrence’s
      2005 trial, is now Baldwin County District Attorney (since ~2015) and rejected
      a Rule 32 motion in 2023. Anthony Lowery, Chief Investigator for DA’s office
      during trial, is now Baldwin County Sheriff appointed by Governor Kay Ivey.
      Huey ''Hoss'' Mack, Lead Investigator/Captain 2005, is now in state-level position
      after serving as Sheriff. David Whetstone admitted on record to making a "deal
      with the devil" for McNeil’s testimony.


      3. THE PIVOT: Article 2 proves the individuals accused of corruption in Article
      1 are not retired bystanders but current power-holders. Wilters'' position allows
      him to reject post-conviction relief (Rule 32); Lowery controls local law enforcement
      investigation and accountability; Whetstone’s testimony confirmed deliberate
      misconduct in 2005.


      4. KEY ENTITIES: Murray Lawrence Jr; Brandon Hastings; Jarius McNeil; Robert
      Wilters (Judge then DA); Huey ''Hoss'' Mack (Detective then Sheriff); Anthony
      Lowery (Investigator then Sheriff); David Whetstone (DA 2003, Retired); Maxwell-Tillman
      Law Firm; Baldwin County District Attorney’s Office.'
