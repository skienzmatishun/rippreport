hooks:
  no-justice:
    brief: 'CONFLICT:

      - Murray “Bubba” Lawrence Jr. convicted of murder of Brandon Hastings in 2003.

      - Victim disappeared from Foley, Alabama during Spring Break of 2003; body found
      a week later near Guitier/Vancleave, Mississippi.

      - State secured conviction based on co-conspirator testimony ("Deal With The
      Devil").

      - Then-Lt. Huey Mack served as Lead Detective.

      - Then-District Attorney David Whetstone prosecuted the case.

      - Then-Judge Robert Wilters presided over the case.

      - Lawrence sentenced to life without parole.


      DISCOVERY:

      - Criminal rights advocates unearthed a second autopsy of victim Brandon Hastings
      over 18 years after sentencing.

      - Autopsy report ordered by the district attorney and signed by Judge Robert
      Wilters regarding exhumed body.

      - Report never disclosed to defense during original trial; suppression described
      as "willful and deliberate."

      - New autopsy indicates cause of death was suffocation, contradicting prosecution’s
      gunshot narrative.

      - Rule 32 petition filed by Assistant District Attorney Haygood Kristi Deason
      challenges conviction.

      - DA Robert Wilters'' office (via Haygood) admitted violation of discovery order
      regarding the report.

      - State previously attempted to argue "harmless error" despite 20 years incarceration.


      PIVOT:

      - Article 1 mentions "newly discovered Brady Evidence" but does not specify
      the physical document.

      - Article 2 identifies the withheld autopsy report as that specific Brady evidence.

      - Article 2 proves Robert Wilters (Judge/DA in current filing; Judge in original
      case) directly participated in the suppression.

      - Article 2 confirms Hoss Mack (Sheriff/Lead Investigator) and Wilters had roles
      in handling the evidence/coroner reports.

      - Report validates co-conspirator’s false narrative (gunshot vs suffocation)
      by revealing prosecution knowingly hid death cause info.


      KEY ENTITIES:

      - Murray “Bubba” Lawrence Jr.

      - Brandon Hastings (Victim)

      - Robert Wilters (Judge, District Attorney)

      - Hoss Mack (Sheriff, Lead Investigator/Lt., Coroner Sr.)

      - David Whetstone (Prosecutor)

      - Haygood Kristi Deason (Assistant District Attorney, Rule 32 Filer)

      - Maxwell-Tillman Law Firm (Current Defense Counsel)

      - Lagniappe Mobile Newspaper (Source)'
    generated_at: '2026-03-12T03:26:17.179421Z'
  bcso-how-to-become-sheriff:
    brief: 'THE CONFLICT

      - Brandon Hastings disappeared from Foley, Alabama during Spring Break 2003.
      Body found one week later near Guitier/Vancleave, Mississippi.

      - Murray Lawrence Jr. convicted in 2003 of Hastings'' murder on word of a co-conspirator
      ("Deal With The Devil").

      - Lead Detective Huey Mack was then-Lieutenant; convicted Lawrence based on
      co-conspirator testimony.

      - Judge Robert Wilters presided over the case; now 2nd term District Attorney
      after 22 years on bench.

      - Conviction resulted in Lawrence incarceration at Holman Prison (no parole).


      THE DISCOVERY

      - Article 2 alleges Sheriff Mack, DA Whetstone, and Judge Wilters withheld exculpatory
      autopsy evidence from defense.

      - Mississippi autopsy (witnessed by Dean McGowan, John Stewart, Tony Fuqua)
      determined cause of death was asphyxiation by strangulation.

      - Prosecution ignored Mississippi autopsy findings and claimed gunshot theory
      without producing weapon or ballistics.

      - Body was exhumed for autopsy in Baldwin County; prosecution held this exculpatory
      evidence from the defense.

      - 2023 discovery (Lagniappe Mobile "Digging Deep"): Evidence found, Mack/Whetstone/Wilters
      acknowledge they did not give it to defense.

      - Transcript (Page 1591): Officer Fuqua testified no fingerprints, stolen property,
      weapon, or cell phone records connected Lawrence to Hastings.


      THE PIVOT

      - Article 2 provides specific "Brady Evidence" details (withheld autopsy) that
      form the legal foundation of Article 1''s petition for new trial.

      - Article 2 identifies Huey Mack''s career advancement (Captain to Sheriff)
      as directly incentivized by the wrongful conviction.

      - Article 2 clarifies Jarius McNeal is alleged actual killer; McNeal implicated
      Lawrence to avoid death penalty.

      - Article 2 proves the prosecution offered no physical evidence, resting entirely
      on coerced testimony and withheld autopsy reports.


      KEY ENTITIES

      - Murray "Bubba" Lawrence Jr.

      - Brandon Hastings

      - Huey Mack / Hoss Mack (Baldwin County Sheriff)

      - David Whetstone (District Attorney, 2003)

      - Robert Wilters (Judge/DA)

      - Anthony Lowery (BCSO Deputy, "McGowan''s second")

      - Dean McGowan

      - Tony Fuqua (Police Officer)

      - Jarius McNeal

      - Harry Still (Former Attorney)'
