      - Whetstone''s quote and admission of the plea deal in Article 2 substantiate
      Article 1’s accusation of a "Verbal Lynching."


      KEY ENTITIES:

      - Murray “Bubba” Lawrence Jr.

      - Brandon Hastings

      - Jarius McNeil

      - David Whetstone (Retired DA)

      - Huey Mack / Lt. Hoss Mack

      - Robert Wilters (Judge/DA)

