  obituary:
    brief: 'THE CONFLICT:

      - Subject: Frances "Fran" J. Neumann (Artist, Sculptor).

      - Event 1: Death occurred Monday, June 28, 2021.

      - Cause of Death: Natural causes at age 93 going on 94.

      - Event 2: Celebration of Life scheduled October 16, 2022.

      - Event 2 Location: Eastern Shore Art Center (401 Oak Street, Fairhope, AL).

      - Event 2 Time: 4 – 6 p.m.


      THE DISCOVERY:

      - Article 1 establishes the memorial date/location; Article 2 provides verified
      biographical and death data.

      - Article 2 confirms Fran was a prominent Daphne artist with national commercial
      advertising contributions.

      - Article 2 specifies major public works: "Daphne" sculpture/fountain (City
      Hall), Marietta Johnson sculpture (Utopia Park, Fairhope), Marie Howland sculpture
      (Fairhope Library).

      - Article 2 notes teaching history: Taught sculpture at Eastern Shore Art Center
      up to her 90th birthday; continued commissioned work in home studio until last
      day.

      - Article 2 notes personal details: Home designed for profession; cover story
      in Lagniappe Magazine Dec. 23, 2019 under title "Renaissance Woman."

      - Survivors: Sister Julia Miller; brother Jim Neumann; nieces Hollis Campbell,
      Wendy Miller; nephew Todd Miller.


      THE PIVOT:

      - Article 2 is the "smoking gun" verifying the deceased is the same person announced
      in Article 1.

      - Article 2 confirms Eastern Shore Art Center as appropriate venue (she taught
      there).

      - Article 2 validates dates: Death (June 28, 2021) precedes Celebration of Life
      (October 16, 2022).

      - Article 2 confirms legacy status justifying the "Celebration of Life" scope
      (sculpture, music, teaching).


      KEY ENTITIES:

      - Frances "Fran" J. Neumann

      - Julia Miller

      - Jim Neumann

      - Hollis Campbell

      - Wendy Miller

      - Todd Miller

      - Eastern Shore Art Center

      - Daphne, Alabama

