      - Links Mayor Wilson''s previous funding (secured sewer/ADA money) to the current
      council''s inability to finish projects by her term.


      KEY ENTITIES:


      - Hollie MacKellar

      - Jack Burrell (Council President)

      - Sherry Sullivan (Current Mayor)

      - Nathan Cox

      - Katherine "Katie" Britt

      - Hix/Snedeker (Municipal Judge)

