      - 68 Ventures purchased property with approved Planned Unit Development (PUD)
      from Hix Snedeker; Snedeker is Fairhope Municipal Judge.

      - City of Fairhop denies 68V constitutional claims; alleges standard land-use
      dispute but city admits favoring selected developers.

      - Boone Brown (Councilman) and Hix Snedeker executed deal for Jack Burrell Airport
      recreation land.

      - Fairhope Council approved Publix and apartments on Parker Road with "green
      light" despite tree removal and lack of oversight.


      THE DISCOVERY

      - Snedeker involved in two separate opaque land deals (68V Park City project
      and Airport recreation land).

      - Airport Recreation deal described as "under the table" purchase; subsequently
      abandoned and leased back to farmers at $9,000/year.

      - City Council hired consultant only after the fact to determine "best use"
      of Airport land.

      - Hermit Hut relocation suspected real estate deal; Hut funded with $369,000
      ($184.5k single donor + anonymous sources); suspected link to Parker Rd/98 corner
      development.

      - 68 Ventures Park City proposal includes ~700 dwelling units; investor record
      shows Senator Katie Britt purchased $33,000 stock (68V 181-Fairhope Avenue LLC)
      Dec 14, 2023.


      THE PIVOT

      - Snedeker acts as the linking entity connecting two different corruption vectors.

      - Article 1 details Snedeker selling land to 68V while holding judicial office
      over the City.

      - Article 2 confirms Snedeker (with Brown) is involved in another under-the-table
      airport deal.

      - Pattern: City Council and officials (Snedeker, Brown) protect developers who
      bypass rules; infrastructure neglected while land deals proceed.

      - Snedeker’s dual role (Judge/Land Owner/Developer Connection) validates the
      "good ole boy" corruption narrative initiated in Article 1.


      KEY ENTITIES

      - Hix Snedeker (Municipal Judge; Land Seller)

      - Boone Brown (Councilman)

      - 68 Ventures

      - Hollie MacKellar (Commissioner/Agent)

      - Fairhope City Council / Mayor'
