      to deny development applications.

      - 68 Ventures is reported by Main Article to have purchased land with an approved
      Planned Unit Development (PUD) from Hix Snedeker.

      - Hix Snedeker is identified as the Fairhope Municipal Judge.


      2. THE DISCOVERY:

      - Widget Article proves Stewart "The Liar" Speed (Leaf River Group) used false
      promises to get the Fly Creek Apartments project approved.

      - Speed lied to 250-300 citizens that apartments would be luxury, environmentally
