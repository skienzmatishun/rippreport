      - Confirms Baldwin County Sewer Service is required by ADEM to hold a public hearing on an expansion of their treatment plant on Fort Morgan Road.
      - Confirms Baldwin County Sewer Service is unregulated by the Alabama Public Service Commission due to a Constitutional Amendment.

