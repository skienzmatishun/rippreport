    text: The Baldwin County Major Crimes Unit loves to spin a good story, but the growing list of bodies tells a much darker tale of law enforcement failure. From Peyton Little to Jonathan Victor, Sheriff Mack’s record of contested deaths proves the "Black Eyes" of this county are real and they are lethal.
