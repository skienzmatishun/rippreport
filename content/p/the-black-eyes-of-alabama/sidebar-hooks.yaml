      - Robert Wilters (current Baldwin County District Attorney) served as the Judge on Murray Lawrence Jr.'s 2003 case.
      - Huey Mack (current Baldwin County Sheriff) was the lead investigator on Murray Lawrence Jr.'s 2003 case.

      THE DISCOVERY:
      - Article 2 identifies specific individuals currently up for or holding power over the cases and departments linked to them.
      - Confirms MPO officials must defend Mobile Bay Bridge project ($2.1B) position to voters.
      - Confirms Baldwin County Commission is spending $65M to build a new jail in Bay Minette.
      - Confirms current Sheriff (Huey Mack) and DA (Robert Wilters) are in re-election/qualification cycles with potential conflicts of interest regarding the Lawrence conviction.

      THE PIVOT:
