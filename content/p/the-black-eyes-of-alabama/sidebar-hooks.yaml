    text: We warned you to keep an eye on the "Black Eyes" of Baldwin County, but the latest audit shows the rot goes even deeper than we imagined. Evidence confirms the Brookside police mess and a multi-million dollar jail scheme that proves these politicians value new cages over your actual safety and fiscal sanity.
  your-rights-your-money:
    brief: |-
      THE CONFLICT:
      * Baldwin County Sheriff Huey Hoss Mack drafted standards included in Senate Bill 312 alongside then-State Senator Tripp Pittman.
      * Sheriff Mack and his standards helped structure a system where he can select his replacement when elected out.
      * Alabama Supreme Court and Ethics Commission rulings are cited as allowing officials to hide evidence and bypass accountability.
      * 2017 traffic stop and fatal shooting incident: Sheriff BCSO investigation details requested by Lagniappe in Mobile were rejected.
      * Alabama Supreme Court decision allowed BCSO to hide materials related to particular investigations and substantive evidence existing before the investigation.

      THE DISCOVERY:
      * Sheriff Huey Hoss Mack is described as an "excellent politician" with a "dismal record" as a criminal investigator.
      * Sheriff Mack has cost taxpayers millions on camera equipment that provides no accountability because he can now legally refuse release.
      * County Commission approved $662,597 expenditure for 129 body cameras under intention of "transparency."
      * Executive Director Tom Albritton (Ethics Commission) awarded his former law partners and Judge, including regions bank associates, scholarship money from a trust where they were trustees.
      * Covington County Circuit Court Judge Ben Bowden confirmed his child received scholarship from Mabel Amos Memorial Fund drafted by Albritton’s firm.
      * Former State Senator Tripp Pittman stole $750,000 of BP money.
      * Sheriff Mack is connected to a network of "good ole boys" and corrupt officials, including Don Sigleman, Judge Thomasson.

      THE PIVOT:
      * Article 2 reveals the legal mechanism (Alabama Supreme Court) that enables Sheriff Mack to break promises of transparency made when approving $662,597 in body cameras.
      * Article 2 confirms the "Black Eyes" warning from Article 1 by exposing direct conflict between Chief Justice Tom Parker’s ruling (hiding evidence) and public records requests against BCSO.
      * Article 2 exposes Tom Albritton’s conflict of interest in managing scholarship funds to judges (Bowden) and banks connected to Sheriff Mack’s circle, reinforcing the link between political corruption in Baldwin County and state agencies.

      KEY ENTITIES:
      * Huey Hoss Mack (Sheriff)
      * Tom Albritton (Ethics Commission Executive Director)
      * Chief Justice Tom Parker (Alabama Supreme Court)
      * Tripp Pittman (Former State Senator)
      * Don Sigleman
      * Judge Thomasson
      * Ben Bowden (Covington County Circuit Court Judge)
      * Baldwin County Sheriff’s Office (BCSO)
      * Mabel Amos Memorial Fund / Regions Bank
    generated_at: '2026-03-15T02:01:25.406076Z'
    text: Sheriff Hoss Mack took over six hundred thousand dollars of your money for body cameras only to hide behind a court ruling so you can never see the footage. This investigation exposes how Tom Albritton and his judge buddies use scholarship funds to reward the same circle that keeps the public in the dark.
