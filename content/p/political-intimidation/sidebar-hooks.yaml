  skunked:
    brief: 'THE CONFLICT

      Mayor Kant is suspected of rigging last two elections and using intimidation
      against critics. Jim Nix handed the government to Kant. Senator Pittman was
      paid $636,000 of BP funds with Mayor Kant''s help. Development plans involving
      Fly Creek Apartments were promoted by Kant/developer.


      THE DISCOVERY

      A political movement ("Fresh Start for Fairhope") is attempting to change the
      city government structure from "at Large" to Districts. This effort is being
      organized by a PAC and groups like Skunk and Catalyst, who aim to gain control
      over the City Council to improve accountability.


      THE PIVOT

      Article 2 reveals that actors like the Skunk and Catalyst are actively seeking
      structural changes (Districts vs. At Large) because the current "at large" system
      provides cover for the Council to obstruct accountability. This links directly
      to Mayor Kant''s alleged use of manipulation and control over elected officials
