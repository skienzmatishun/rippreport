      *   Pittman James and Tim Kant are linked to BP fraud and dual complaints/lies
      concerning municipal contracts.

      *   Fairhope has infrastructure problems, including sewer system issues.

      *   The soccer complex purchase involved a high price tag ($6M-$7M) and questionable
      spending (e.g., $35,000 for Senior Bowl practice).


      THE DISCOVERY:

      *   Mayor Kant and Arthur Corte orchestrated decisions that excluded the public
      regarding development plans (Fly Creek Apartments).

      *   The Triangle lawsuit was settled for $11.25 million without public participation.

      *   A new "Triangle Nature Trail Park" deal involves Thompson Engineering, an
      entity connected to Kant''s associates, proposing a $1 million development on
      property paid $11.25 million.


      THE PIVOT:

      *   Article 2 provides concrete financial evidence (settlement costs, municipal
      borrowing) and specific details (specific dollar amounts for the Triangle deal)
      that substantiate the claims in Article 1 regarding corruption and outside influence.

      *   Article 2 explicitly details how Kant and his allies manipulated development
      deals (Fly Creek Apartments, Triangle Park), proving the underlying theory of
      "outside interests" mentioned generally in Article 1.


