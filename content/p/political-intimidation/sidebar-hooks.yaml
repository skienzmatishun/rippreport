  observations-of-a-poll-watcher:
    brief: 'THE CONFLICT:

      *   Mayor Kant is suspected of rigging elections and using intimidation to maintain
      control in Fairhope.

      *   Senator Pittman was paid $636,000 of BP funds with Mayor Kant''s help.

      *   The city was involved in a dispute over the Fly Creek Apartments development
      plan involving connectivity infrastructure.


      THE DISCOVERY:

      *   Dr. Warner filed a formal complaint regarding election fraud in Fairhope,
      Alabama (July 24, 2014).

      *   The complaint details witness observations of election tampering, absentee
      ballots, and lack of control over voting boxes.

      *   The letter alleges that candidates hired by political consultant Lynn Stacey
      always win elections, linking this pattern to Mayor Kant''s administration.

      *   Dr. Warner''s letter is supported by an actual poll watcher witness.


      THE PIVOT:

      *   Article 2 provides specific, documented evidence (the formal complaint and
      witness testimony) regarding election fraud methods and campaign manipulation
      that substantiate the general claims of corruption and rigging made against
      Mayor Kant in Article 1.

      *   The discovery confirms that the political dirty tricks described in Article
      1 are not just rumors but involve actionable election tampering related to candidate
      selection and voting processes.


      KEY ENTITIES:

      *   Mayor Kant

      *   Jim Nix

