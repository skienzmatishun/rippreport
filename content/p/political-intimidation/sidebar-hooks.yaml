  the-eagle-has-landed-and-the-court-of-public-opinion-has-voted:
    brief: 'THE CONFLICT

      Mayor Kant suspected of rigging last two elections. Mayor Kant raised $50,000
      for a mayor’s election with 50% from outside donors/PACs. Senator Pittman was
      paid $636,000 from BP funds with Mayor Kant’s help. Developer plans involving
      Fly Creek Apartments aiming to change traffic patterns on Highway 98.


      THE DISCOVERY

      Karin Wilson successfully unseated Mayor Kant in the mayoral election after
      a 10-year effort. Fairhope cast over 2000 votes more than Daphne in the election.
      The Alabama Sec. of State Elections Division monitored the election.


      THE PIVOT

      Article 2 proves that Karin Wilson won the election, directly overturning the
      incumbent power structure described as corrupt and manipulative in Article 1
      (Mayor Kant''s intimidation and rigging).


      KEY ENTITIES

      Fairhope, Mayor Kant, Jim Nix, Sherry Sullivan, Lee Turner, Jay Robinson, Mike
      Hubbard, Senator Pittman, Fly Creek Apartments, Highway 98, Karin Wilson, Daphne.'
