  gob-coup:
    brief: 'THE CONFLICT

      *   Mayor Tim Kant was central to a perceived Fairhope “good ole boy” system.

      *   Kant is accused of rigging elections and using political intimidation, including
      having metal detectors installed at City Hall due to complaints/rants.

      *   Nix allegedly handed power to Kant, who then chose successors (e.g., rumors
      implicated Sherry Sullivan and Lee Turner as choices).

      *   Allegations exist regarding BP fraud involving Tim Kant and Senator Pittman,
      specifically that Pittman was paid $636,000 from BP funds with Kant’s assistance.


      THE DISCOVERY

      *   A political "coup mentality" is underway in Fairhope aimed at ousting Mayor
      Karin Wilson.

      *   Jack Burrell (supported by Catalyst) and the "old guard," including Tim
      Kant followers, plotted to sideline Wilson through backbiting and employee insubordination.

      *   Key personnel changes included the firing of Fiddler and Sullivan, an imposed
      hiring freeze, and Jack ensuring Judge Snedeker was immediately sworn in as
      Municipal Judge.

      *   Judge Snedeker is linked to Ray Hix; they operate companies involved in
      the controversial airport bid process that contributed heavily to nearly all
      City Council members.


      THE PIVOT

      *   The transition of power from Mayor Kant’s centralized control structure
      (Main Article) mirrors a current shift where Jack Burrell and Catalyst are attempting
      to hijack the municipal government and oust Mayor Wilson (Widget Article).

      *   Both articles identify specific methods of political manipulation: Main
      Article detailing Kant’s use of legal intimidation, while Widget Article details
      the current use of insubordination, personnel firings, and strategic judicial
      appointments (Snedeker/Hix) to facilitate this control.


      KEY ENTITIES

      *   Fairhope City Council

      *   Mayor Tim Kant / Mayor Karin Wilson / Jack Burrell / Sherry Sullivan

      *   Jim Nix

      *   Senator Pittman

      *   BP

      *   Ray Hix / Snedeker (Judge)

      *   Catalyst / Scott Boone (and his consulting firm SBC)

      *   Kevin Boone

      *   Aurthor Corte (Developer)

      *   Fiddler and Sullivan (former city employees/HR director)

      *   Fly Creek Apartments

      *   Lee Turner

      *   The Courier / WABF AM'
