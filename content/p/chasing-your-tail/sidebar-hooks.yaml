  russian-roulette-fairhope-style:
    brief: 'THE CONFLICT:

      *   Charles K. Breland initiated a development suit against Fairhope in 2013,
      with roots stretching back to 2001.

      *   The City Council president handled the Dyas lawsuit, which resulted in a
      loss of $11.25 million and required the city to purchase property.

      *   Tim Kant used lawsuits (Dyas, Triangle) and inflated costs, driving the
      Dyas price to $8.25 million plus a $3 million legal bill from attorney O’Rear.


      THE DISCOVERY:

      *   The current Fairhope City Council is guilty of dereliction of duty by failing
      to deliver an approved budget and ignoring pending litigation.

      *   The council has failed to advise citizens or attempt to resolve the Breland
      case over the past 11 years.

      *   Tim Kant’s legacy involves bogus lawsuits that cost the city millions, despite
      the possibility of settling the Dyas lawsuit for under $1 million.


      THE PIVOT:

      *   Article 2 frames the situation as "Russian Roulette," proving that the Council
      is gambling with the city''s future based on unresolved legal risks.

      *   The widget identifies Tim Kant’s past bad deeds and positions the current
      council as being asleep at the wheel, making Article 1''s claims of unproductive
      action specific evidence of leadership failure.


      KEY ENTITIES:

      *   Charles K. Breland

      *   Tim Kant (Former Mayor)

      *   Mr. Burrell (Negotiator)

      *   Attorney O’Rear

      *   Fairhope City Council

      *   Dyas lawsuit

      *   Triangle lawsuit

      *   Breland case

      *   $11.25 million loss

      *   $8.25 million price

      *   $3 million legal bill

      *   Insurance company (dropped the city as a carrier)'
