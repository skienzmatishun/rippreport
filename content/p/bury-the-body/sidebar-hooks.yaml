      *   City Attorney

      *   City Clerk

      *   Mayor

      *   Catalyst

      *   Fresh Start Fairhope

      *   Forever Fairhope

      *   Mr. Gary Thorson

      *   Bill Pennington'
    generated_at: '2026-07-11T01:46:01.735821Z'
    text: The machine used every delay tactic in the book to derail the government
      reform referendum. Puppet masters pulled Gary Thorson and Bill Pennington into
