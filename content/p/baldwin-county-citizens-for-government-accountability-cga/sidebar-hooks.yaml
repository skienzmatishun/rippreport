hooks:
  snakes-in-the-schools:
    brief: 'THE CONFLICT:

      *   In January 2017, the Baldwin County Commission approved a deal to exchange
      percentages of the 1984 Penny Sales Tax for levying the tax.

      *   This agreement cost the BCBOE approximately $4 million dollars a year in
      funding, which now goes to the County Commission.

      *   David Peterson stated that Mr. Tyler agreed to the swap "out of fear the
      Voters would not approve the extension or to make permanent the tax."


      THE DISCOVERY:

      *   Chris Elliott has used Baldwin County Superintendent Eddie Tyler as a political
      tool ("pulled him into the Barrel").

      *   Jonathan Gray works for both Chris Elliott and the Baldwin County School
      System.

      *   Jonathan Gray is allegedly drawing a paycheck from the school system while
      simultaneously collecting money from the Elliott Campaign.


      THE PIVOT:

      *   Article 2 establishes that Jonathan Gray is leveraging his position within
      the school system (working for the School Board/Superintendent Tyler) to facilitate
      Chris Elliott''s political agenda, which connects directly back to the questionable
      financial dealings involving the Penny Sales Tax and the County Commission mentioned
      in Article 1.


      KEY ENTITIES:

      *   David Peterson

      *   Eddie Tyler (Baldwin County Superintendent)

      *   Chris Elliott

      *   Jonathan Gray

      *   BCBOE

      *   County Commission

      *   Business Council of Alabama (BCA)

      *   Penny Sales Tax'
    generated_at: '2026-07-11T03:31:29.974539Z'
    text: While $4 million in annual school funds vanished into the County Commission’s
      pockets, the real betrayal was happening behind closed doors. Lobbyist Jonathan
      Gray is drawing a school paycheck while running Chris Elliott’s campaign, proving
      our education budget is just a slush fund for political power.
