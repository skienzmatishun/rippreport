      monitor counting due to complaints regarding tampering in 2008 and 2012 cycles.

      - Current Council (at time of report): Composed of five individuals selected
      by previous mayor Kant and his minions.

      - Incumbent Conflict (2017-2020): Council "good ole boys" thwarted Mayor Wilson’s
      efforts on planning, growth management, and wastewater/storm water infrastructure.

      - Corruption Allegations (Jack Burrell): Served as Council President for 8 years.
      Refused free speech rights to local blogger Paul Ripp; Ripp sued City and won
      settlement. Burrell purchased 2.65 million dollars worth of farmland as recreational
      property and leased it back to farmers for 9000 dollars/year due to lack of
      development funds. Alleged undisclosed police record and bid rigging at Airport.

      - Corruption Allegations (Robert Brown): Filed ethics complaint with Alabama
      Attorney General. Secured public contracts for concession building at soccer
      fields and Fairhope Art Center totaling close to 1 million dollars in four years.

      - Mayor Wilson vs Sherry Sullivan: "CATALYST" (Scott Boone/Keving Boone) supporting
      Sherry Sullivan for Mayor. Sullivan previously fired by city, sued the city,
      has a high school education, and 4 jobs in 4 years.


