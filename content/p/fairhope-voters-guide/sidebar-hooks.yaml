      - Voting Date: Election scheduled for August 25th.

      - Appointment Mechanism: Municipal Judge and Municipal Attorney are appointed
      by City Council.

      - Current Appointees: Council led by Burrell immediately appointed Marcus McDowell
      as Attorney and reinstated Judge Snedeker.

      - Cabal Confirmation: Marcus McDowell (Attorney) has a "Sullivan sign" at his
      office. Burrell, Boone, and Brown support Sherry Sullivan.

      - Land Control: Sherry Sullivan is the largest land owner and developer in Fairhope;
      supports Burrell/Boone group.

      - Public Perception: Article notes Council ignored citizens seeking change in
      these appointments, calling the current setup "Cabal/Scott Boone Consulting."


      THE PIVOT

      - Article 2 proves Article 1’s "Cabal" allegations have an official administrative
      backend.

      - While Article 1 alleges corruption, Article 2 exposes the structural control:
      The Council (Burrell/Boone/Brown) controls appointments for Judge and Attorney
      who support the same political machine.

      - This explains how "insider deals" occur: Council members nominate officials
