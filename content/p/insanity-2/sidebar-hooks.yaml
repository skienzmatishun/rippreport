      - Lack of funds cited as a cause for rural hospital closures in Alabama, attributed
      to political decisions regarding Medicaid.

      - Gov. Bentley is described as a doctor focused on political title ("Luv Gov")
      rather than healthcare outcomes (2015).


      2. THE DISCOVERY:

      - Article 2 reveals Gov. Ivey announced a special session to pass a gas tax
      increase (referenced in metadata as 2019/2021 context).

      - Proposed tax legislation includes authorization for a bond issue to dredge
      the Alabama State Docks and Mobile Bay ship channel.

      - Specific funding for ship channel dredging is estimated between $400,000 and
      $600,000.

      - Jim Page is identified as Chairman of the Alliance for Alabama’s Infrastructure
