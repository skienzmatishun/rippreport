hooks:
  tiny-steps:
    brief: '1. THE CONFLICT:

      - 2015: Gov. Robert Bentley refused Medicaid expansion, leaving $3 billion in
      federal funding on the table; health care pushed "under the table".

      - 2021: Gov. Kay Ivey refuses Medicaid expansion despite UAD poll data showing
      majority of citizens support it; claims she married Alabama to a "profit" prison
      plan.

      - 2015–Present: Total estimated revenue and health opportunity loss from refusal
      to expand Medicaid ranges between $15 billion and $20 billion.

      - 2021: Alabama Legislature allowed "real serious issues" (Prisons, Health Care,
      Medicaid) to fall into the trash can; passed "tiny steps" (alcohol delivery,
      yoga legalization).


      2. THE DISCOVERY:

      - Feb 2021: House passed bill (96-1 vote) to increase funding for Strengthen
      Alabama Homes (SAH), a program providing home fortification after storms.

      - Blocked by: State Sen. Chris Elliott (R-Fairhope).

      - Official reason cited by Elliott: Concerns of "transparency and equitability."

      - Motive revealed in Article 2: Elliott settled a personal vendetta; he was
      dismissed from SAH in 2016 after accusations of "cherry-picking" applicants.

      - Direct impact: Elliott’s stall cost at least 200 residents SAH benefits and
      millions in program funding.


      3. THE PIVOT:

      - Article 2 provides the mechanism behind Article 1’s claims of corruption.
      The obstructionist behavior described as "political motives" regarding Medicaid
      (Article 1) is proven active in the SAH program (Article 2).

      - Elliott’s use of a personal past conflict to block public funding mirrors
      the state-level political obstructionism Article 1 alleges Gov. Ivey and predecessors
      use regarding Medicaid expansion.

      - Confirms the "2021 Legislative Session" Article 1 criticizes actually failed
      to pass critical healthcare revenue/funding bills ("wound up in the trash can")
      despite talk of paying for healthcare via gaming/lottery.


      4. KEY ENTITIES:

      - Kay Ivey (Alabama Governor)

      - Robert Bentley / “Love Gov.” Bentley

      - Chris Elliott (State Senator, R-Fairhope)

      - Chip Brown (State Rep., Mobile County)

      - Brian Powell (SAH Director)

      - Alabama Legislature / Board of Education

      - Medline/Medicaid Program (Program name context)'
