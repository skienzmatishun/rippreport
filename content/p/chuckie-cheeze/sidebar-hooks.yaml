      and lawsuits seeking $100,000 from the city of Fairhope.

      *   Councilmen Boone Burrell and Brown supported Sherry Sullivan and encouraged
      fired employees to sue the city to push an anti-Mayor campaign.

      *   Boone Burrell and Brown are supporting Pandora Heathcoat to file a lawsuit
      pending Sherry Sullivan’s payment.

      *   Jack Burrell is hiding behind the Alabama Unethical Commission and activities
      at the Fairhope Airport, obstructing the Mayor.


      THE PIVOT:

      *   Article 2 reveals that Cheeze''s failure to cover the Fairhope Airport scandal
      (mentioned in Article 1) was linked to Burrell''s obstruction of the Mayor through
      his role as Council President and involvement with the Airport Authority.

      *   The lawsuit support detailed in Article 2 provides concrete evidence of
      the specific unethical behavior and political alliances Cheeze allegedly ignored
      or failed to report in Article 1.


