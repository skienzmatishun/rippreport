      *   Sheriff Mack lacks competition due to intervention by Sen Trip Pittman.

      *   Sheriff Mack cooked for Catalyst candidate Judge Scully.


      THE DISCOVERY:

      *   Catalyst is a political structure/cancer that hand-picks candidates, originating
      from Stacy Elliott and Haygood.

      *   The organization''s leadership includes Scott Boone (Fairhope Councilman
      Kevin Boone’s son).

      *   Catalyst candidates are financed through Prebble-Rish via multiple LLCs
      to spread the "cancer."

      *   Information regarding Catalyst members is fed to Chuckee Cheeze of the Gulf
      Coast News.

      *   Jack Burrell used taxpayer money from the Airport Board to defend unconstitutional
      actions and was involved in an Ethics complaint concerning his representation.


      THE PIVOT:

      *   Article 2 reveals that Catalyst is not simply a faction but a systemic,
      funded network (LLCs, corporate financing) that actively manipulates political
      appointments and uses investigative media influence (Chuckee Cheeze) to ensure
      control over positions listed in Article 1.

      *   The structure described in Article 2 explains *how* Catalyst achieved the
      uncontested positions (e.g., DA office secured by intervention; Sheriff protection
      via prior political fixes).


      KEY ENTITIES:

      *   Brian Dasinger

      *   Judge Scully

      *   Sheriff Mack

      *   Stacy Elliott

      *   Haygood

      *   Chris Elliott

      *   Scott Boone

      *   Kevin Boone

      *   Chuckee Cheeze

      *   Jack Burrell

      *   Ray Hix

      *   Prebble-Rish

