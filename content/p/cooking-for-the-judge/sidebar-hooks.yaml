hooks:
  catalyst-intimidation-a-pig-pen:
    brief: 'THE CONFLICT

      *   Catalyst seeks total control over Baldwin County Government positions (County
      Commission, Probate Judge, Circuit Judge, Sheriff, District Attorney, State
      Senate seat).

      *   The District Attorney position was secured by Catalyst after Judge Wilters
      announced his retirement.

      *   Sheriff Mack is involved with Catalyst and supports their candidates.


      THE DISCOVERY

      *   Catalyst operates as a Fairhope-based operation aiming to destabilize local
      government.

      *   Catalyst uses the Gulf Coast Courier editor Chuckee Cheeze to spread rumors
      using leaked documents that were not obtained via Freedom of Information requests.

      *   "Baby" Boone is the strategist ("brains") behind Catalyst and attempts to
      hide his father''s connection to the organization.


      THE PIVOT

      *   Article 2 reveals the specific methods (media manipulation, intimidation,
      use of leaks) Catalyst employs, which explains how they achieved the political
      control detailed in Article 1.

      *   The method of spreading misinformation (Cheeze/leaks) and targeted political
      intimidation described in Article 2 is the mechanism used to secure positions
      and gain dominance described in Article 1.


      KEY ENTITIES

      *   Brian Dasinger

      *   Catalyst

      *   Judge Scully

      *   Sheriff Mack

      *   Elliott Haygood

      *   Stacy

      *   Trip Pittman

      *   Kevin Boone

      *   Chuckee Cheeze

      *   Wilters'
    generated_at: '2026-07-11T05:07:59.733940Z'
    text: Catalyst wants to own every seat from the Sheriff to the District Attorney
      to secure total dominance. This investigation exposes how 'Baby' Boone and a
      local tabloid hack use illegal leaks and raw intimidation to fix elections after
      former judge Wilters stepped down.
  catalyst-the-three-bs-and-chuckee-cheeze:
    brief: 'THE CONFLICT:

