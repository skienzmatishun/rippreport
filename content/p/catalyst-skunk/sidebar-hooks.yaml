      department heads, lawyers, county manager, and the EMA director.

      *   Dorsey''s tenure involved ties to Baldwin County Sewer Service (BCSS) as
      an official/businessman and a massive Mega-site purchase for "dump" purposes.


      THE DISCOVERY: What does the second article prove or reveal today?

      *   Tucker Dorsey has allegedly benefited financially from his position, acquiring
      personal wealth ("big truck, custom glasses and a few million dollars") while
      holding office.

      *   Dorsey is suspected of using multiple LLC’s and connections to Baldwin County
      Sewer Service for illicit financial gain rather than county business.

      *   The Mega-site project resulted in an alleged loss of $35 million in undeveloped
      scrub land/lost opportunity cost.

      *   Allegedly, Dorsey collaborated with Chris Elliott on a scheme where they
      manipulated the passage of a 1% tax increase for schools without public vote.

      *   They reportedly skimmed approximately $4 million annually off infrastructure
      funds to cover costs for "good ole boy deal[s]."


      THE PIVOT: Why is Article 2 the ''smoking gun'' for Article 1?

      *   Article 1 identifies Tucker Dorsey as a morally corrupt figure ("Skunk")
