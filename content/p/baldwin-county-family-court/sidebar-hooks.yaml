  failing-our-children-in-baldwin-county:
    brief: '**THE CONFLICT:**

      *   Judge Thomason faced intense scrutiny regarding her conduct as a Judge in
      Baldwin County Family Court since at least 2017, with concerns escalating around
      Nov. 2018 when she announced a run for Court of Appeals amidst allegations of
      incompetence and "dirty politics."

      *   Specific historical complaints included instances where Thomason allegedly
      allowed attorneys to illegally obtain medical records while others waited for
      court orders (Main Article).

      *   Thomason was accused of turning child custody/divorce cases into a profit-generating
      "cottage industry" that benefited attorneys at the expense of children''s welfare.

      *   A key example noted in past reports is her failure to adhere to expert psychological
      recommendations when issuing joint custody rulings (Main Article).


      **THE DISCOVERY:**

      *   The Widget Article provides a contemporary, severe example of systemic failure
      within Baldwin County family law and child protection systems (May 2024 timeline).

      *   It details how the court system failed to protect two minor children from
      exposure to sexual intercourse and explicit materials while under the care of
      two mothers.

      *   A specific case number, DR-2017-900956.03, was cited where the father''s
      legal case was dismissed without recourse after terminating his attorney due
      to communication issues—a procedural failure mirroring themes of judicial oversight
      and competence found in Main Article complaints.

      *   The discovery proves a pattern: Despite documented red flags (mother’s Domestic
      Family Violence arrest on January 10, 2024; mother of the boy''s attempted suicide),
      multiple agencies failed to take necessary intervention steps.


      **THE PIVOT:**

      *   The Widget Article acts as the ''smoking gun'' by demonstrating that Judge
      Thomason''s specific judicial failures (mismanagement, lack of oversight) are
      not isolated incidents but part of a broader "systemic failure" across all local
      institutions.

      *   It highlights how general court procedural issues—like denying a continuance
      or mishandling evidence presentation—lead directly to severe consequences for
      children and family rights, thereby validating the Main Article''s claims about
      judicial incompetence resulting in child suffering.


      **KEY ENTITIES:**

      *   Judge Thomason (Baldwin County Family Court)

      *   Craig Pittman (Vacated seat on Court of Appeals; Former State Senator /
      BP Trustee)

      *   Baldwin County Department of Human Resources (DHR)

      *   Detective Trey Kraynak (Daphne Police Department, Case #230 700 147)

      *   GAL (Guardian Ad Litem) (May 9, 2024 meeting, required $500 deposit)

      *   Attorney for McSharry / Pittman (Brother of Boom Boom Pittman; State Senator)

      *   Baldwin County Sheriff Department / Daphne Police Department

      *   Case #DR-2017-900956.03'
