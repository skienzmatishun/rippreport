      the misconduct was not isolated but a pervasive pattern within BCFC.


      KEY ENTITIES

      - Judge Michelle Thomason / Catalyst Queen

      - Craig Pittman (Retiring judge)

      - Baldwin County Family Court (BCFC)

      - The Ripp Report (Lawsuit Filer/Reporter since 2018)'
