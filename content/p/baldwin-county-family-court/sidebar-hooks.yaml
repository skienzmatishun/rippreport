hooks:
  catalyst-queen-remember-family-court:
    brief: 'THE CONFLICT

      *   Allegations of incompetence, dirty politics, and favoritism are levied against
      Judge Michelle Thomason regarding her management of Baldwin County Family Court.

      *   Specific grievances include: turning child custody cases into a "cottage
      industry," disregarding expert psychological evaluations, allowing unethical
      attorneys to illegally obtain medical records, failing to enforce the law (e.g.,
      perjury), and providing no accountability for judicial misconduct.

      *   The conflict escalated as Judge Thomason announced her run for Alabama Court
      of Civil Appeals in November 2018.


      THE DISCOVERY

      *   The second article identifies Catalyst as a "ghost organization" directed
      by Scott “baby” Boone, serving as a political entity under which the complaints
      and practices surrounding Judge Thomason are organized.

      *   It reveals that Judge Michelle Thomason was one of the first clients signed
      up by the Catalyst organization.


      THE PIVOT

      *   The Widget Article establishes the financial and political mechanism (Catalyst/Scott
      Boone) supporting the systematic misconduct alleged in Article 1, transforming
      the individual complaints about "poor decisions" into evidence of an organized
      network influencing her court''s operation.


      KEY ENTITIES

      *   Judge Michelle Thomason

      *   Baldwin County Family Court

      *   Catalyst (Political organization founded around 2017-2020)

      *   Scott “baby” Boone

      *   Craig Pittman (vacating the Al Court position vacated by Judge Thomason’s
      potential run)

      *   Judge Buddy Brackin (Orange Beach competitor mentioned for alleged corruption/complicity)'
