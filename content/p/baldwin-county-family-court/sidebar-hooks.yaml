      child which she denied.

      - Allegations of misconduct included: verbally chastising parties for potential
      perjury during testimony but granting them primary custody regardless, with
      no consequences enforced by court staff/judiciary.


      THE DISCOVERY

      - The Ripp Report confirms it has fielded "at least another 100 to 150 complaints"
      against Baldwin County Family Court (BCFC) since Article 2''s publication in
      late 2018.

      - BCFC is described as inflicting emotional and financial damage, including
      instances of family destruction and a documented case involving child suicide
