  baldwin-county-family-court-a-cottage-industry:
    brief: 'THE CONFLICT:

      *   Judge Michelle Thomason faced allegations of incompetence and misconduct
      within Baldwin County Family Court.

      *   Allegations included transforming divorce and child custody cases into a
      "cottage industry" that benefits bottom-feeding attorneys.

      *   Specific incidents cited: Failure to hold attorneys accountable for illegally
      obtaining medical records from children; granting joint custody against expert
      psychological recommendations despite the child being deemed "more fit"; refusal
      to allow evidence presentation due to judicial ignorance of law; and failing
      to take consequences after verbally chastising a party for perjury.


      THE DISCOVERY:

      *   Despite 6 complaints filed in the last 18 months being dismissed by the
      Judiciary, systemic changes have been implemented within Baldwin County Family
      Court.

      *   Judge Floyd initiated reforms specifically targeting Judge Thomason''s caseload.

      *   These changes include assigning all pendente lite/temporary motions previously
      heard by Judge Thomason to rotating general jurisdiction circuit judges (specifically
      mentioning Judge Bishop, Judge Norton, and Judge Taylor).

      *   Thomason’s domestic violence dockets were reassigned in 2017 to prevent
      her "bad judgment" from influencing status quo orders.


      THE PIVOT:

      *   The discovery of institutional reforms proves that the allegations against
      Thomason (e.g., poor ruling quality, inconsistent decision-making) were so severe
      they required a structural, judicial intervention by Judge Floyd.

      *   The reassignment of her motions and dockets confirms the court recognized
      her temporary orders and judgment had become a "malfunction junction" requiring
      separation from critical phases of litigation.


      KEY ENTITIES:

      *   Judge Michelle Thomason

      *   Baldwin County Family Court

      *   Judge Floyd (Presiding Judge)

      *   Craig Pittman (Retiring judge/Court of Appeals vacancy)

      *   Steven Johnson (Attorney associated with the "cottage industry")

      *   Eastern Shore Republican Women

      *   Board of Baldwin Substance Abuse Services'
