  shackled-chained-handcuffed-bc-un-family-court:
    brief: '**THE CONFLICT:**

      *   Judge Michelle Thomason presided over Baldwin County Family Court cases,
      allegedly creating a "cottage industry" for divorce and child custody proceedings.

      *   In 2018 (and subsequent years), Judge Thomason was criticized for incompetence
      regarding rulings on medical records, ignoring psychological evaluations, and
      failing to hold parties accountable for perceived perjury or illegal actions.

      *   During one case involving Chey Garrigan, Judge Thomason''s court allegedly
      denied her visitation and primary custody for eight years.

      *   In the course of Garrigan’s 8-year legal battle, she was represented by
      attorneys including Steven Johnson and Buddy Brackin.


      **THE DISCOVERY:**

      *   The second article proves that individual criticisms of Judge Thomason are
      symptomatic of a pervasive corruption across all levels of Baldwin County (judiciary,
      bar, elected officials).

      *   It reveals systemic institutional failure: the State Judiciary, Alabama
      Bar Association, and Ethics Commission are viewed as toothless bodies protecting
      "the good ole boys" or corrupt individuals.

      *   The second article details Chey Garrigan''s specific ordeal, noting she
      was arrested by Fairhope Police after a domestic dispute with her ex-husband
      while under representation in the county court system.


      **THE PIVOT:**

      *   Article 1 presents isolated examples of judicial error and poor ethics (e.g.,
      denial of evidence; questionable rulings on medical records). Article 2 transforms
      these specific errors into proof that Judge Thomason''s conduct is not an anomaly
      but a manifestation of a "deep corruption" that ensures no one—not judges, lawyers,
      nor the Ethics Commission headed by Tom Albritton—is held accountable for abuse.

      *   Article 1’s critique of judicial incompetence is validated by Article 2,
      which details how Thomason leveraged her position to maintain control over cases
      (e.g., forcing a two-year drug test monitoring process after Garrigan was already
      cleared) and obstruct justice despite external legal attempts to challenge her
      role or rulings.


      **KEY ENTITIES:**

      *   Judge Michelle Thomason / Judge Thomason

      *   Baldwin County Family Court

      *   Craig Pittman (Retiring from the bench)

      *   Tom Albritton (Executive Director of the Ethics Commission)

      *   Chey Garrigan (Subject in the custody/misconduct dispute)

      *   Steven Johnson (Attorney involved in the Garrigan case)

      *   Buddy Brackin (Attorney involved in the Garrigan case)

      *   Jody Bishop / Judge Jody Bishop

      *   John Merrill (Secretary of State, defendant in a lawsuit contesting Thomason’s
      appointment)

      *   Harry Still (Former attorney who resigned from the matter)

      *   Fairhope Police Department

      *   Baldwin Substance Abuse Services'
