  citizens-fighting-back:
    brief: 'THE CONFLICT

      *   Residential growth in Alabama’s affluent coastal communities (Daphne/Fairhope
      and Gulf Shores/Orange Beach) is outpacing adequate infrastructure development.

      *   Citizens are experiencing diminished quality of life due to traffic, congestion,
      crowded schools, and overdevelopment.

      *   Local municipal governments in Baldwin County have historically run roughshod
      over citizens regarding controversial projects and growth.


      THE DISCOVERY

      *   Citizens in Gulf Shores and Fairhope are actively questioning municipal
      government decisions regarding development.

      *   Specific negative impacts of density include: 13.8% negative impact from
      apartments, 14.7% negative impact from a "Strip Club," and 12.7% negative impact
      from a "Homeless Shelter" on property values.

      *   Over 625 citizens have signed petitions against the placement of high-density
      apartment complexes among single-family homes.

      *   Local council members (e.g., the “Catalyst” Council President) have mocked
      and restricted citizens’ ability to speak at public forums.


      THE PIVOT

      *   Article 2 provides concrete evidence that local political decisions regarding
      growth are directly harming residents'' financial well-being and quality of
      life, proving the systemic failure in planning identified in Article 1.

      *   The citizen resistance demonstrates that current municipal management is
      ignoring infrastructure limits and carrying capacity, validating the call for
      a regional approach to solve infrastructure problems across Baldwin County.


      KEY ENTITIES

      *   Myrtle Beach, South Carolina

      *   Destin, Florida

      *   Daphne/Fairhope

      *   Gulf Shores/Orange Beach

      *   Baldwin County

      *   Enclave (Apartment complex)

