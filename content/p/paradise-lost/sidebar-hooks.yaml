      the apartment development.


      THE DISCOVERY:

      *   A high-density, four-story apartment complex was approved by the Gulf Shores
      Planning Commission without prior notice to local citizens.

      *   This approval resulted in job losses/retirements for over a dozen employees
      in Fairhope due to the controversy.

      *   Current condo associations (The Enclave and The Regency Club) are actively
      ignoring citizen complaints, demonstrating poor communication and decision-making
