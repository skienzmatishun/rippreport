  paradise-lost-ii:
    brief: 'THE CONFLICT:

      *   Coastal communities (Myrtle Beach, Destin, Daphne/Fairhope, Gulf Shores/Orange
      Beach) are experiencing growth rates that outpace adequate infrastructure development.

      *   The problem is characterized by residential growth increasing costs and
      diminishing quality of life due to traffic, congestion, and crowded services.


      THE DISCOVERY:

      *   Baldwin County cities (Fairhope, Orange Beach) are facing specific planning
      failures; Fairhope was sued by the State of Alabama for failing to properly
      manage its sewerage system resulting in costly spills.

      *   Orange Beach is approaching physical limits regarding new development due
      to an encumbered road system and limited developable property.

      *   Developers and investors benefit from a lack of professional growth management,
      land use planning, and zoning oversight by local governments.


      THE PIVOT:

      *   Article 2 provides specific legal and operational evidence (sewerage lawsuits,
      physical limits) confirming the general assertion in Article 1 that uncontrolled
      development is creating an unsustainable quality of life gap in coastal communities
      like Baldwin County.

      *   Article 2 proves that poor local planning and a laissez-faire approach allow
      developers to exploit booming housing markets while neglecting the long-term
      sustainability discussed generally in Article 1.


