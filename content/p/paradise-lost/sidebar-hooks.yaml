hooks:
  gulf-shores-and-orange-beach-closed-to-residents-of-baldwin-county:
    brief: 'THE CONFLICT:

      *   Residential growth costs are outpacing infrastructure development in Myrtle
      Beach, Destin, Daphne/Fairhope, Gulf Shores, and Orange Beach areas.

      *   Residents are facing diminished quality of life due to traffic and congestion
      caused by real estate boom.


      THE DISCOVERY:

      *   Chris Elliott and Tucker Dorsey support maximum development without regard
      for infrastructure.

      *   Mayor’s Craft and Kennon have agreed to allow the Baldwin Bridge project,
      which includes a proposed 12% gas tax for the bridges.

      *   Brett Robinson Real Estate Development Co. is seeking rezoning for a condo
      project called "Phoenix Gulf Towers" (two 26-story buildings with 96 units each)
      on 5.8 acres of property on Perdido Beach Boulevard in Orange Beach.


      THE PIVOT:

      *   Article 2 reveals that political maneuvering and approval (e.g., Mayor’s
      agreement for the bridge tax, Elliott''s involvement) are actively facilitating
      development that directly threatens the residents of Baldwin County, leading
      to the closure of the Gulf to local residents.

      *   The specific rezoning application for "Phoenix Gulf Towers" is the concrete
      action that proves Article 1''s warning about unchecked development and loss
      of carrying capacity.


      KEY ENTITIES:

      *   Chris Warner (Main Article Author)

      *   Chris Elliott

      *   Tucker Dorsey

      *   Mayor’s Craft

      *   Kennon

      *   Jeff Boyd

      *   Brett Robinson Real Estate Development Co.

      *   Phoenix Gulf Towers'
