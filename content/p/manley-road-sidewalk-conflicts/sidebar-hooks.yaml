  community-or-developer:
    brief: 'THE CONFLICT:

      *   **Date:** March 14, 2016 (or earlier)

      *   **Event:** City of Fairhope authorized a partnership with the Single Tax
      Corporation for Manley Road sidewalk construction project via Resolution.

      *   **Issue:** Alleged conflict of interest regarding contract awarding to George
      Robards because he is both on the Planning and Zoning Board and receives contracts
      previously awarded there.

      *   **Personnel Connection:** Mayor Kant appointed George Robards to the Planning
      and Zoning Board; Robards contributed significantly to Kant’s re-election.


      THE DISCOVERY:

      *   **Date:** April 2017 (Agenda date)

      *   **Event:** City Council debates Ordinance No. 1572 regarding the Fly Creek
      PUD Sunset Provision, marking its 10th discussion.

      *   **Revelation:** The debate reveals ongoing "good ole boy" practices and
      conflicts of interest among council members related to developers, engineers,
      contractors, and landowners (Fly Creek project).

      *   **The Network:** Identifies "Catalyst" as a political network involving
      county commissioners, attorneys, judges, and developers (including the Baldwin
      Insider) working for self-interest.


      THE PIVOT:

      *   Article 1 established specific instances of conflict regarding public contracts
      (Manley Road/Single Tax).

      *   Article 2 proves that this pattern of cronyism is systemic and extends to
      major land use decisions, specifically the Fly Creek Apartments project.

      *   It connects localized contract conflicts to a broader organized political
      machine ("Catalyst") that influences both municipal projects and county power
      structures.


      KEY ENTITIES:

      *   City of Fairhope / City Council

      *   Single Tax Corporation (President Lee Turner)

      *   George Robards (Planning and Zoning Board, Mayor nominee/appointee)

      *   Mayor Kant

      *   Catalyst (Political organization network)

      *   Fly Creek Apartments

      *   Baldwin Insider (associated with Catalyst)

      *   Parker Road'
    generated_at: '2026-07-17T20:50:20.574623Z'
