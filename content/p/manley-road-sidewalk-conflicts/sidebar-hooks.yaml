      \ the presidency of both Planning and Zoning and Single Tax Corporation, creating\
      \ a direct institutional conflict of interest (a \"good ole boy deal\").\n\n\
      2. THE DISCOVERY: \n    *   The new administration (Mayor Sullivan and City\
      \ Council President Jack Burrell) is attempting to manage infrastructure plans\
      \ following $40 million in grants secured by previous Mayor Wilson.\n    * \
