  cover-up:
    brief: 'THE CONFLICT

      *   O.J. French was killed by Bay Minette police on August 20, 2021.

      *   Mayor Bob Wills sent a letter to Tamara French regarding the killing and
      dismissed allegations of a "cover up" as without merit.

      *   Mayor Wills has outstanding ethics complaints and an Alabama Bar complaint
      pending against him.


      THE DISCOVERY

      *   The Executive Director of the Ethics Commission, Albritton, is facing three
      lawsuits despite having had complaints dismissed by both the Ethics Commission
      and the Alabama Bar.

      *   Mayor Wills is alleged to have used his office for personal gain through
      renting/sharing office space with the Baldwin County Legislative Delegation.

      *   Specific rental figures are cited: initial 5-year lease rent was $245,000.00;
      total potential cost mentioned is $867,000.00 held in Mayor Wills'' family bank
      account.


      THE PIVOT

      *   Article 2 proves the existence of a systemic "cover up" by demonstrating
      that both the Ethics Commission/Alabama Bar dismissed complaints against Albritton
      and Mayor Wills, which aligns with the narrative that these bodies are corrupt.

      *   The financial data links Mayor Wills'' potential gain from political dealings
      directly to his personal finances.


