  wonderful-wednesday-4:
    brief: 'THE CONFLICT:

      *   Past administration included Mr. Burrell and Mr. Boone.

      *   They brought baggage regarding major infrastructure projects (airport, soccer
      fields, triangle lawsuit) totaling around $50 million dollars.

      *   The current city council is focusing on compensating fired/litigating parties:
      Jennifer Fidler, Sherry Sullivan, and Pandora Heathcoat.

      *   Council members allegedly encouraged the "wishful three" to file suits,
      promising settlement and concealing tax money use.

      *   The city council launched an investigation using subpoenas targeting Elias
      Technologies.


      THE DISCOVERY:

      *   84% of Fairhope eligible voters decided NOT to participate or vote in the
      US Senate primary.

      *   Journalistic conflict of interest was exposed regarding the council''s investigation
      materials.

      *   The editor (Chuckee) used an unofficial version of the council agenda for
      his story.

      *   Councilman Jay Robinson was omitted from both the official and unofficial
      versions of the resolution, despite the Ripp Report pointing out conflicts of
      interest (Robinson’s wife is friends with Sherry Sullivan).


      THE PIVOT:

      *   Article 2 exposes that the city council''s handling of its own investigation/agenda
      (mentioned in Article 1) was compromised by journalistic choices and conflicts
      of interest.

      *   The omission of Jay Robinson and the use of an unofficial agenda proves
      the council’s attempts to obscure information are flawed, validating the criticism
      against the council’s obstructionist behavior attributed to Jack Burrell.


      KEY ENTITIES:

      *   Mr. Burrell

      *   Mr. Boone

      *   Jennifer Fidler

      *   Sherry Sullivan

      *   Pandora Heathcoat

      *   Elias Technologies

      *   Jay Robinson

      *   Jack Burrell

      *   Fairhope city council'
