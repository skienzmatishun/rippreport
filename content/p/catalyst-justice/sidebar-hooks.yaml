hooks:
  american-citizen:
    brief: 'THE CONFLICT:

      - "CATALYST" group accused of orchestrating systemic corruption across Baldwin
      County, Fairhope City Council, and federal offices.

      - Alleged history includes Sen Tripp Pittman ($750,000 BP funds theft), Chris
      Elliott (DUI charge), Mayor Cant (FEMA fund misuse), Robert Brown (Fairhope
      Art Center deal), and Jack Burrell (bid rigging).

      - Paula DiNardi assaulted physically in November 2018 at a Fairhope restaurant/bar
      by Ronan McSharry.

      - DiNardi lost her managerial position at American Legion Tiki Bar (Mobile Bay)
      in January 2019 shortly before/after incident.

      - Ronan McSharry arrested but charged dropped; alleged repeat offender/bully
      described as "public nuisance."

      - Fairhope City Council appointed Marcus McDowell (City Attorney) and Municipal
      Judge, allegedly to protect their interests.


      THE DISCOVERY:

      - Article 2 reveals a procedural "defect" in the McSharry assault case caused
      by City Attorney and Judge knowledge.

      - Charging document failed to include statutory wording "Did cause physical
      injury to another."

      - Deadline for amendment was one year; missed despite medical evidence provided
      to officials supporting injury claim.

      - Appeals Court dropped assault charge due to this technicality, leaving DiNardi
      with $10,000+ medical bills and no criminal penalty for attacker.

      - McSharry remains free; business at McSharry’s continues to operate, allegedly
      benefiting from profits since assault.

      - DiNardi forced to save her home; suspects American Legion used political influence
      to cancel agreement with DiNardi.

      - McSharry is a Green Card holder from Ireland, DiNardi is an American Citizen.


      THE PIVOT:

      - Article 2 confirms "CATALYST Justice" accusations by detailing how local officials
      (attorneys and judges) used legal technicalities to free McSharry.

      - Links abstract corruption claims directly to specific appointments: Council-appointed
      attorney (McDowell) and judge.

      - Highlights bias in treatment of American Citizen victim vs. Green Card holder
      suspect with alleged Council support (Burrell).

      - Provides "smoking gun" evidence of City Attorney inaction/incompetence aligning
      with CATALYST interests over victim justice.


      KEY ENTITIES:

      - Paula DiNardi (Victim/Bar Manager)

      - Ronan McSharry (Suspect/Green Card Holder from Ireland)

      - Marcus McDowell (Fairhope City Prosecutor/Attorney)

      - Jack Burrell (Council President/Member linked to McSharry’s bar)

      - "CATALYST" Political Group

      - Fairhope City Council

