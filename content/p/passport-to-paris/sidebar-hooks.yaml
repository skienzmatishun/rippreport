  peoples-choice:
    brief: 'THE CONFLICT

      *   State Senator Chris Elliott co-sponsored a bill awarding him $7,500 per
      year in travel expenses and reallocating funding from the Baldwin County legislative
      delegation.

      *   Elliott allegedly used this spending bill to strong arm other legislators.

      *   Elliott was criticized for prioritizing personal travel ("pet project")
      over economic development duties.


      THE DISCOVERY

      *   Chris Elliott raised over half a million dollars for Catalyst, seeking $600,000
      for a Senate Seat salary of $42,000.

      *   Elliott claims support from specific groups including Realtors, Contractors,
      Road Builders, Nurse Anesthetists, and Certified Public Accountants.


      THE PIVOT

      *   Article 2 reveals that the political infrastructure and financial backing
      (the Catalyst campaign funding) are what enable Elliott to push through legislative
      maneuvers and secure personal benefits (like travel expenses) detailed in Article
      1.


      KEY ENTITIES

      *   Chris Elliott (TAX MAN, Catalyst Candidate)

      *   Senate Bill 367

      *   Baldwin County legislative delegation

      *   Jeff "Judas" Boyd

      *   Catalyst

      *   Realtors, Contractors, Road Builders, Nurse Anesthetists, CPAs'
