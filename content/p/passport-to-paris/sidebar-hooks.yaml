  sunday-sermon:
    brief: 'THE CONFLICT

      *   State Senator Chris Elliott co-sponsored a bill for travel expenses ($7,500
      per year) and reallocation of funding for the Baldwin County legislative delegation.

      *   Elliott defended this bill while also reallocating funds traditionally awarded
      to the Baldwin County delegation.

      *   Elliott is accused of using his political position to strong arm other legislators
      and grab media attention.

      *   Elliott was part of a group (Stacy, Elliott, Haygood) that later became
      Catalyst/Scott Boone Consulting, which played a role in electing Mayor Wills.


      THE DISCOVERY

      *   The Baldwin County legislative delegation is renting office space in Bay
      Minette Mayor Bob Wills’ law office using taxpayer money ($4,090 per month for
      five years).

      *   Chris Elliott is identified as a major architect of this corrupt lease agreement
      and defended it to Mayor Wills on radio.

      *   Elliott has a history involving tax increases (1% tax), threats of DUI charges,
      selling his business, and settling lawsuits under the radar.


      THE PIVOT

      *   Article 2 reveals that Elliott’s actions concerning funding reallocation
      (Article 1) were directly linked to securing Mayor Bob Wills'' office space
      lease, proving that the travel bill was part of a larger scheme involving political
      corruption and illegal rent payments.


      KEY ENTITIES

      *   Chris Elliott (State Senator, TAX MAN)

      *   Bob Wills (Mayor of Bay Minette)

      *   Baldwin County legislative delegation

      *   Catalyst / Scott Boone Consulting

      *   Stacy, Elliott, Haygood group

      *   Bay Minette

      *   Alabama Ethics Commission

