      Treasurer and Finance Director roles in Oct 2018.

      *   The Mayor’s team achieved a financial turnaround, projecting the city could
      be debt-free by June 2019.

      *   The Catalyst Council opposed the Fly Creek Apartments project.

      *   The Council opposed the Mayor''s tax-free education plan, advocating for
      a $3 million tax.

      *   The Council overrode the Mayor''s veto regarding an ordinance amending ordinance
      no.1572 Fly Creek PUD.


      THE DISCOVERY:

      *   The previous city council, under Tim Kant, added an item on Resolution 2606-16
      (deed of property for sewer lift station from Angelo A. Corte) at the last council
      meeting.

      *   Jack Burrell and Boone were present when Resolution 2606-16 details were
      reviewed by Burrell before October 24th.

      *   Resolution 2606-16 approved the deed of property for the city''s sewer lift
      station from Angelo A. Corte.

      *   The "gift" involved three plus acres of wetlands that are the recipient
      of storm water runoff from the Publix site and the location of the outfall pipe
      from the retention pond.


      THE PIVOT:

      *   Article 2 provides specific documentation (Resolution 2606-16) and names
      key council members (Burrell, Boone) directly involved in handling the property
      transfer mentioned in Article 1.

      *   Article 2 reveals that Burrell failed to notice a lack of map with Exhibit
      A for the resolution, suggesting incompetence or complicity regarding the "gift."


