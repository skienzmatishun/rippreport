      of the Oath of Office twice.

      *   The conflict involved claims that he had been disbarred and that voters
      were dismissing these facts to elect him (the "Moore Factor").


      THE DISCOVERY

      *   Ronan McSharry, owner of McSharry’s Irish Pub in Fairhope, was found guilty
      by Fairhope Municipal Judge Haymes Snedeker on assault charges following an
      incident involving Paula DiNardi.

      *   Baldwin County Circuit Judge Clark Stankoski subsequently dismissed the
      more serious charge of assault in a later proceeding despite McSharry having
      already pleaded guilty to that same offense in municipal court.


      THE PIVOT

      *   Article 2 demonstrates systemic institutional failure and perceived corruption
      within local governance (Fairhope/Baldwin County). It parallels Article 1''s
      theme by showing how powerful political figures and associated judicial actors
      can evade or dilute accountability for criminal behavior, suggesting a common
      pattern of unchecked power across different tiers of Alabama leadership.


