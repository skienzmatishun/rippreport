      *   Allegations of political corruption exist within Baldwin County, involving
      the Attorney General using PAC funds illegitimately.

      *   Tom Albritton (Ethics Executive Director) has allegedly been self-serving/skimming
      trust funds he oversees.

      *   Fairhope City Council is accused of wasting millions on stalled or unnecessary
      pet projects funded by developers.

      *   Sheriff Hoss Mack utilized legislation from State Senator Tripp Pittman
      to eliminate competition for Sheriff, allowing him to run unopposed multiple
      times (e.g., 2018-2024).


