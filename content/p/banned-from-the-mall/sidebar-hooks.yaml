      \ to prevent Moore from becoming a U.S. Senator while holding power.\n\n**THE\
      \ DISCOVERY:**\n*   The 2017 Alabama Senate race featured Big Luther Strange\
      \ (Alabama Attorney General since 2017-08-18) and Roy Moore as the two primary\
      \ candidates.\n*   The Widget Article reveals that the same political environment\
