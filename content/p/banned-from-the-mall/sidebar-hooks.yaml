  protester-pride:
    brief: 'THE CONFLICT

      • 2017-11 to late 2017: Roy Moore, while serving as Judge and running for Alabama
      State Senate, faced public scrutiny over alleged predatory behavior involving
      teenage girls in Gadsden, Alabama.

      • Roy Moore was reported to have been thrown off the Supreme Court twice for
      failure to uphold the Constitution/ethical standards.


      THE DISCOVERY

      • Late 2017: Female and male protesters organized demonstrations against Roy
      Moore’s candidacy in Fairhope, Baldwin County, Alabama.

      • Protesters (including Ginger Broadway Poynter, Michele Walker Harmon, Kim
      Mc Cuiston) exercised their constitutional right to peaceful protest.

      • These protests occurred without payment by political parties or state/out-of-state
      funding.


      THE PIVOT

      • Article 1 asserts that the reputation of Roy Moore as an ethical failure (chasing
      teenage girls) was "common knowledge" among his community.

      • Article 2 provides direct evidence of this common knowledge manifesting in
      action, showing that citizens in Fairhope and Baldwin County actively resisted
      his political campaign via peaceful protest against his candidacy.


      KEY ENTITIES

      • Roy Moore (Senator-elect / Political Candidate / Judge)

      • Gadsden Alabama

      • Fairhope (City/Municipality)

      • Baldwin County

      • Ginger Broadway Poynter

      • Michele Walker Harmon

      • Kim Mc Cuiston'
