  liar-liar-pants-on-fire:
    brief: 'THE CONFLICT

      *   2017: Alabama political leadership faced intense criticism regarding ethics
      and the moral character of candidates like Roy Moore, who was described as having
      a reputation for chasing teenage girls.

      *   The Main Article claims that Republican "leaders" in Alabama prioritized
      holding onto power over maintaining morals or ethics standards.


      THE DISCOVERY

      *   Article 2 reveals contemporary (recent) corruption within Baldwin County
      government under Governor Ivy ("Poison Ivy").

      *   Local officials are reportedly using legislative tactics to legalize corruption
      and provide cover for illicit financial incentives from "Economic Development
      lobbyist[s]."

      *   A key piece of legislation aims to reclassify economic developers, thereby
      eliminating a paper trail and allowing lawmakers to hide the identities of their
      benefactors.


      THE PIVOT

      *   Article 1 established that ethical failure is endemic in Alabama high politics
      (exemplified by Moore''s campaign).

      *   Article 2 provides current evidence that this failure has become institutionalized;
      local Baldwin County officials are systematically creating mechanisms—such as
      the lobbyist reclassification bill and reliance on a "toothless tiger" Ethics
      Commission—to ensure political corruption persists under the guise of legal
      governance.


      KEY ENTITIES

      *   Roy Moore: (Alabama Senator, Candidate 2017)

      *   Poison Ivy / Ivy: (Governor of Alabama)

      *   State Senator Elliott (The TAX MAN): (Baldwin County/Legislature member)

      *   Sheriff Hoss Mack / Boss Mack: (Law Enforcement official in Baldwin County)

      *   Lagniappe: (Publisher associated with reporting)

      *   Baldwin County: (Governing entity under investigation for corruption)'
