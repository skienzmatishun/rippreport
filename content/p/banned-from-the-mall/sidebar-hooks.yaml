  dirty-underwear:
    brief: 'THE CONFLICT

      *   Roy Moore faced widespread controversy and allegations, including a reputation
      in Gadsden, Alabama, for chasing teenage girls during his political campaigns
      and while serving as Judge/Senator-elect in 2017.

      *   The public critique suggests that state leaders and institutions ignored
      or "turned a blind eye" to these serious ethical failings.


      THE DISCOVERY

      *   Tom Albritton, the Ethics Commission Executive Director, received over $120,000
      (specifically cited as $105,000 between 2014 and 2018) for his children’s education
      from a trust where he served as trustee. This constitutes potential "self-dealing."

      *   The Alabama Bar Association paid McCallum $37,437 in August 2021 after his
      resignation; he was fined $100,000 by the Ethics Commission but faced no criminal
      prosecution from the Attorney General’s Office.

      *   The Widget article alleges a systemic protection mechanism where the Attorney
      General, Ethics Commission, and Alabama Bar cooperate to whitewash political
      culpability, citing examples of PAC contributions given a "pass."


      THE PIVOT

      *   The institutional corruption exposed in Article 2 (Albritton''s self-dealing
      and the failure of AG/Bar to prosecute) serves as concrete proof that the perceived
      moral failings of powerful politicians cited in Article 1 (Roy Moore) are enabled
      by a compromised state apparatus.

      *   The Ethics Commission—the entity supposed to police political ethics, which
      failed to adequately address Roy Moore’s controversies—is itself guilty of severe
      ethical violations and institutional self-interest via Tom Albritton.


      KEY ENTITIES

      *   Tom Albritton (Executive Director of Alabama Ethics Commission)

      *   Roy Moore (Senator/Judge candidate 2017; former Senator)

      *   Alabama Ethics Commission

      *   Attorney General''s Office

      *   McCallum (Former Bar Association member)

      *   Alabama Bar Association'
