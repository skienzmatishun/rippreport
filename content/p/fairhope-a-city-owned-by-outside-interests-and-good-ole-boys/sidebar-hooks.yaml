hooks:
  a-legal-win-for-fairhope-citizens-who-oppose-fly-creek-apartments:
    brief: 'THE CONFLICT:

      *   Mayor Kant and Arthur Corte are accused of corrupt dealings regarding the
      approval of the Fly Creek Apartments.

      *   The Triangle lawsuit was settled for $11.25 million.

      *   The city borrowed $5.25 million, paid attorneys $3 million, and took $3
      million from the utility reserve fund to settle the lawsuit.

      *   A new deal, the Triangle Nature Trail Park (arbortorium/archery range on
      34 acres), was proposed, costing approximately $1 million for development.


      THE DISCOVERY:

      *   Friends of Fly Creek filed a lawsuit against the City of Fairhope, Fairhope
      Planning and Zoning, Fairhope City Council, and Leaf River group LLC regarding
      development decisions.

      *   The Court denied the Planning and Zoning Board''s motion to dismiss the
      lawsuit.

      *   This denial allows the lawsuit to proceed into a discovery phase requiring
      production of documents, phone calls, and testimony regarding intimidation used
      by the Mayor against city employees.


      THE PIVOT:

      *   Article 2 proves that the legal challenge against the Fly Creek Apartments
      development (mentioned in Article 1) is viable and moving forward.

      *   The lawsuit validates claims in Article 1 that citizens opposed the decisions
      and provides a mechanism to uncover evidence of corruption, specifically citing
      potential testimony about intimidation by the Mayor.


      KEY ENTITIES:

      *   Mayor Kant

      *   Arthur Corte

      *   Councilwoman Diana Brewer

      *   Councilmen Mueller and Boone

      *   Jack Burrell

      *   Mr. George Robards

      *   Leaf River group LLC

      *   Friends of Fly Creek

      *   Fairhope Planning and Zoning Board'
