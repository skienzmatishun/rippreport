      *   **Systemic Failure:** The Widget Article confirms that Kant micromanaged
      the city into a "good ole boy club," controlling or eliminating committees,
      including Planning and Zoning. It states that many council members were replaced
      or planning to obstruct the new administration''s ability to appoint trustworthy
      board members (Widget Article).


      THE PIVOT

      *   Article 1 lays out specific allegations of corruption by Mayor Kant and
      his associate Arthur Corte regarding Fly Creek Apartments and Triangle property
      deals (Main Article). Article 2 serves as the "smoking gun" because it proves
      these actions were part of a calculated, systemic campaign ("good ole boy club")
