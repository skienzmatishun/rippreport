      *   Boone voted for Preble Rish projects (e.g., Firefly) for four and a half
      years before serving on the council.

      *   During September 2016, Councilman Boone attended and voted on the Fly Creek
      Apartments issue while John Avent represented Preble-Rish at the podium without
      citizen knowledge of the relationship.

      *   Boone voted in favor of the Fly Creek Apartments project despite discussions
      to repeal Ordinance 1572 based on citizen mandates.


      THE PIVOT

