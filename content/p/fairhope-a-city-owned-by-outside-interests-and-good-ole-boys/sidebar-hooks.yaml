      *   Council President Burrell and Councilman Boone are cited for misleading
      voters into believing the purchase was for a park when the city ultimately lost
      the lawsuit over the matter.

      *   The council is currently pushing proposals, such as a bike trail on the
      property, despite not having the funds (a $10,000 feasibility study proposed
