      - Political organization “Catalyst” operated in Baldwin County for an extended period under various names to maintain control over the Status Quo.
      - Rebranded entity “Scott Boone Consulting” (CSB) identified as successor to Catalyst; brand name abandoned due to becoming “politically toxic.”
      - Attempted 2018 mid-term coup: Group ran candidates for almost every Baldwin County race to gain total governmental control.
      - Attempted 2016 Fairhope Municipal Election takeover: Ran full slate of Catalyst candidates.
      - Following 2016 wins, Council members initially lied about independence; affiliation exposed in following years.
      - Former Mayor Cant identified as previous head of the Council faction; removed from leadership but faction retained power.

      THE DISCOVERY:
      - Physical evidence of current activity confirms CSB identity via PVC campaign signs in Fairhope, Daphne, Spanish Fort, and Bay Minette.
      - Specific clustering of candidate signs found in Fairhope yards (Sherry Snedecker, Boone Brown, Burrell) represents a coordinated 100% CSB slate.
      - Fairhope Municipal Judge’s property features Club for Growth candidate “Lowtower” signs; signs provided by CSB.
      - Judge receives preferential treatment via City Council (voted in favor multiple times).
      - Burrell served on a bid committee that awarded the Judge a prime location for jet hanger.
      - Group actively recruiting/positioning candidates for Congress and local Council seats to regain power lost in 2016.

      THE PIVOT:
      - CSB/Scott Boone Consulting and Catalyst are confirmed as the same organization (Main); Widget details the conspiracy to control the government that the CSB/Catalyst signs physically support.
      - 2018/2016 coup details in Widget explain the motive behind the unified slate of PVC signs seen in Article 1.
      - Specific individuals (Snedecker, Burrell, Judge) link the local election machinery to the group described.
      - Jerry Carl’s victory (July 14th reference in Main) directly contradicts the Catalyst/Scott Boone congressional candidate strategy mentioned in Widget.

      KEY ENTITIES:
      - People: Scott Boone, Sherry Snedecker (BBB), Burrell, Boone Brown, Jerry Carl, Chris Elliott.
      - Officials: Fairhope Municipal Judge (appointed by Council), Mayor Cant, Mayor Wilson, City Council Members.
      - Organizations: CATALYST, Scott Boone Consulting (CSB), Club for Growth, Lagniappe.
      - Locations: Baldwin County, Fairhope Municipal Government, Daphne (Baldwin County), Spanish Fort, Bay Minette.
