    text: The same political vultures who tried to hijack Baldwin County in 2018 are back with a fresh coat of paint and new yard signs. We expose how Councilman Burrell and a local judge trade official favors for jet hangars while Scott Boone pulls the strings from the shadows to regain his lost power.
  catalyst-central:
    brief: |-
      THE CONFLICT
      - Political consulting firm "CATALYST" is alleged to operate as a political machine controlling Baldwin County and Fairhope officials.
      - Firm previously known or structured as "Stacy, Haygood and Elliott" led by power broker Lynn Stacy (deceased).
      - Current iteration rebranded to "Scott Boone Consulting" after CATALYST became politically toxic.
      - Operation targets 2020 elections (Aug 25th), aiming to reinstall influence in Fairhope City Council and Baldwin County Commission.
      - Machine uses PVC framed signs across Daphne, Spanish Fort, Bay Minette, and Fairhope to signal alliances between candidates.
      - Scott Boone (firm manager) is son of Kevin Boone, a Fairhope City Councilman serving as "deep throat" conduit for firm.
      - Specific incidents allege bid committee manipulation awarding Municipal Judge a jet hangar location; signs provided by CSB for "lowtower" on judge’s property.
      - CATALYST/Boone machine failed to drive Mayor out of office before 2020 but maintained control via Council (mostly aligned).
      - Alleged corruption includes County Commissioners Joe Davis and Jeb Ball voting against constituents on Savannah Estates development project while supporting developers.

      THE DISCOVERY
      - Second article confirms CATALYST lineage replacing Stacy, Haygood, Elliott partnership.
      - Confirms Scott Boone is new CATALYST manager with direct family ties to current Fairhope Council (Kevin Boone).
      - Proves "Scott Boone Consulting" is the same entity as the CATALYST signs and political machine.
      - Confirms "good ole boys" network spans Daphne (Mayor Dane Haygood), County Commissioners, and Judicial offices.
      - Reveals CATALYST is opposed to City Manager governance; supported developer-friendly zoning (e.g., no sewer regulations).
      - Reveals Jerry Carl defeated a CATALYST/Scott Boone candidate in previous race.

      THE PIVOT
      - Second article validates Article 1 claim that CATALYST is a continuing operation, not just signage.
      - Second article provides the historical link (Stacy/Haygood/Elliott -> Boone) proving long-term continuity and intent.
      - Second article identifies Kevin Boone's formal role (Councilman) directly facilitating CATALYST operations, confirming "one in the same" allegation.
      - Second article links County Commissioners (Davis/Ball) to the CATALYST machine via voting records on Savannah Estates, confirming "self serving deals" claim.

      KEY ENTITIES
      - Scott Boone
      - Kevin Boone
      - Lynn Stacy
      - Chris Elliott
      - Dane Haygood (Mayor of Daphne)
      - Jack Burell (Fairhope City Council)
      - Sherry Sneeder (BBB sign owner)
