  catalyst-stacking-the-deck:
    brief: |-
      THE CONFLICT:
      - Political consulting firm "Catalyst" (operating under CSB / Scott Boone Consulting) deployed identical PVC campaign signs across Baldwin County (Fairhope, Daphne, Spanish Fort, Bay Minette) to coordinate campaign support.
      - The firm rebranded from "Catalyst" to "Scott Boone Consulting" after the name became politically toxic; officials elected under Catalyst were disassociating from the brand.
      - Operation modeled after Club for Growth PAC: candidates are supported for election but contractually "owned" by the firm thereafter.
      - Historical election interference alleged: In 2016 Fairhope election, a man was caught with a pickup truck full of signs for those opposing the status quo.
      - Jerry Carl defeated "lowtower" candidate in last month's race; signs for lowtower were provided by Catalyst/Scott Boone.
      - Municipal Judge is identified as a devout supporter who received a prime location for a jet airplane hangar via a bid committee arrangement involving Burrell.

      THE DISCOVERY:
      - Widget confirms Catalyst/Scott Boone Consulting rebranding is a deliberate concealment tactic using an "intricate web of multiple concentric layers of companies" to hide interrelationships and liability.
      - Widget cites FBI definition: matches structure used to insulate from liability, classifying it as a criminal enterprise.
      - Upcoming election schedule confirmed: Fairhope City Council qualifications July 7th to 21st; Election Vote August 25th.
      - Specific challenger identified: Joshua Gammon running for Place 5 on Fairhope City Council to replace Kevin Boone.
      - Article claims Kevin Boone is Scott Boone's father, linking Challenger seat directly to the firm’s leadership.
      - Joshua Gammon previously linked via sign placement in Fairhope (Boone, Brown, Burrell cocktail).

      THE PIVOT:
      - Widget Article validates Main Article's claim of "stacking the deck" and sign saturation by identifying Joshua Gammon as part of the Boone family network contesting for a Council seat.
      - Explicitly names "Strawman" fraud involving Kevin Boone; Article 1 implied corruption but Widget confirms specific financial schemes and undisclosed LLC conflicts.
      - Weaponizes FBI definition of criminal enterprise to substantiate Article 1’s claim that Catalyst isn't just consulting, but an operational hierarchy.

      KEY ENTITIES:
      - Scott Boone (CSB)
      - Kevin Boone (Councilman, Scott Boone's father per text)
      - Joshua Gammon (Challenger for Place 5)
      - Jerry Carl (Defeated "lowtower")
      - "Lowtower" (Candidate, now in shadows)
      - Sherry Snedeker BBB (Sign user)
      - Tim Cant (Former Mayor, CATALYST tool)
      - Baldwin County / Fairhope City Council
      - Municipal Judge (unnamed, linked to Burrell/Boone)
    generated_at: '2026-03-18T18:27:39.494299Z'
    text: Scott Boone rebranded his toxic Catalyst firm to hide a coordinated scheme to seize the Fairhope City Council through identical PVC signs. This investigation proves candidate Joshua Gammon is just another Boone family puppet installed to protect their Strawman land fraud from any real public scrutiny.
