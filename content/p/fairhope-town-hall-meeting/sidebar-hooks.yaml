  flying-high:
    brief: '**THE CONFLICT:**


      *   2/16/2017, Fairhope town hall meeting was proposed by Ripp Report regarding
      the repeal of ordinance 1572 (Fly Creek Apartments).

      *   The Mayor advocated for the repeal; the Council President refused to place
      the issue on the City Council agenda.

      *   Conflict existed over Airport Authority control: The City wanted land ownership,
      while opponents insisted the private authority maintain control even if the
      city paid the mortgage (Airport debt was equivalent to 21% of city debt).


      **THE DISCOVERY:**


      *   Current Fairhope City Council is characterized as "most corrupt in recent
      memory" and an "obstruction process" orchestrated by Jack Burrell.

      *   For three months, a major obstruction occurred regarding the City budget,
      with council members being absent and offering only mundane questions rather
      than resolution.

      *   Jack Burrell, utilizing assistance from the council, established a hand-picked
      financial committee to assume budget preparation duties traditionally held by
      the Mayor.

      *   Robert Brown allegedly supports Mr. Burrell’s financial committee and has
      learned how to control bid committees/secure contracts from Jack.

      *   Chuck Zunk, formerly of the Airport Board, was recruited to "head" this
      hand-picked committee.


      **THE PIVOT:**


      *   The historical 2017 conflict between the Mayor and Council President over
      controlling airport land (public vs private ownership) has shifted into a current
      political struggle over control of city financial authority.

      *   The modern revelation shows the mechanism for obstruction: Instead of debating
      policy, the council is creating internal, hand-picked entities (the Burrell
      committee with Zunk/Brown involvement) to deliberately bypass and usurp mayoral
      budgetary powers, mirroring past "deals" that allegedly favored a few within
      the Airport Authority.


      **KEY ENTITIES:**


      *   The Mayor

      *   Council President

      *   Robert Brown

      *   Jack Burrell

      *   Chuck Zunk

      *   Ordinance 1572 (Fly Creek Apartments)

      *   Fairhope City Council'
