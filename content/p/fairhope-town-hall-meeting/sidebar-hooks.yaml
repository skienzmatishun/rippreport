  fairhope-airport-un_authorized:
    brief: 'THE CONFLICT

      *   Fairhope residents protested the retention of airport land by the Airport
      Authority, which represents 21% of the city debt.

      *   The Main Article referenced ongoing issues regarding ordinance 1572 and
      concerns about prioritizing Airport spending over schools.


      THE DISCOVERY

      *   An Ethics Commission opinion (no. 2016-04) determined that a lease agreement
      awarded in December 2015 was null and void due to conflicts of interest and
      failure to follow Ethics rules.

      *   The Board member, Ray Hix (Secretary/Treasurer), was privileged with confidential
      information regarding leases and bids.

      *   City Council President Jack Burrell reviewed the Mid-Bay Air LLC lease bid
      despite having a conflict of interest.


      THE PIVOT

      *   Article 2 provides specific legal and ethical evidence that the Airport
      Authority secured a lease (Mid-Bay Air LLC, Dec. 2015) through unethical conduct,
      directly validating the Main Article''s claims that deals benefit a few on the
      Airport Authority and lead to financial loss.

      *   The voided lease proves the mismanagement and lack of due diligence criticized
      in the Main Article regarding the control and ownership of airport land.


