      *   This "gift" included three plus acres of wetlands, including the location
      of storm water runoff and an outfall pipe from the retention pond.

      *   Council members (Burrell, Marion Wynne) showed incompetence or complicity
      regarding the details of this property transfer.


      THE PIVOT

