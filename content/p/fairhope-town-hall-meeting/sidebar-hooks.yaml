  good-ole-boys-alive-and-well:
    brief: '**THE CONFLICT:**

      *   2017-04-16: Town hall meeting at Fairhope public library addressed issues
      regarding Ordinance 1572 (Fly Creek Apartments) and airport land control/ownership
      by Airport Authority.

      *   During these discussions, citizens pressured the City Council to repeal
      ordinance 1572 and prevent loss of city revenue on airport land that represents
      21% of city debt but less than 1% of Fairhope citizens.


      **THE DISCOVERY:**

      *   The second article reveals actions by the previous City Council (under Mayor
      Kant) in April 2017, including the acceptance of a deed from Angelo A. Corte
      for the city''s sewer lift station property via Resolution 2606-16 on October
      17th.

      *   This "gift" was later revealed to include three plus acres of wetlands and
      storm water runoff land near the Publix site, exceeding the stated size of a
      standard lift station footprint.


      **THE PIVOT:**

      *   Article 1 identifies Fly Creek Apartments (Ordinance 1572) as a major concern/issue
      voters care about, leading citizens to demand answers from the Council on that
      date.

      *   Article 2 reveals concrete actions by council members (Burrell and Boone),
      including procedural failures regarding land deeds involving Angelo A. Corte,
