  fairhope-citizens-citizens-citizens:
    brief: 'THE CONFLICT

      *   Fairhope Town Hall Meeting occurred on 2/16/2017.

      *   Issues discussed included repealing ordinance 1572, the Fly Creek Apartments,
      and Airport Authority control of land versus city mortgage payment.

      *   The Mayor sought to repeal ordinance 1572 and urged the council to take
      ownership of Airport Authority property.


      THE DISCOVERY

      *   The Airport Authority debt represents 21% of Fairhope''s overall borrowing.

      *   The Airport Authority purchased 258 acres in 2007 for $8.85 million.

      *   Council President Jack Burrell allegedly persuaded councilmen to ignore
      citizens and turn their backs on Mayor Wilson''s requests regarding the property
      ownership.


      THE PIVOT

      *   Article 2 provides direct evidence of the political mechanism (Burrell’s
      alleged manipulation) used by those in power to undermine the citizen-led efforts
      highlighted as failing in Article 1.


      KEY ENTITIES

      *   Mayor Karin Wilson

      *   Jack Burrell (Council President, Airport Authority Board member, liaison)

      *   Fairhope Airport Authority

      *   Fly Creek Apartments

      *   Ordinance 1572

      *   258 acres purchased in 2007 for $8.85 million'
