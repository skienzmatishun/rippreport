  whos-on-first:
    brief: 'THE CONFLICT

      *   Fairhope Town Hall Meeting held 2/16/2017 regarding ordinance repeal (1572),
      Fly Creek Apartments, and Airport Authority control over airport land.

      *   The city pays the mortgage on airport land, which constitutes 21% of the
      city debt.


      THE DISCOVERY

      *   Legal documents show inconsistencies in the Fairhope Airport Authority’s
      Ground Lease and Operating Agreement compared to the Request for Bids (RFP)
      terms.

      *   The executed lease dated December 17th, 2015, and the unsigned version dated
      December 21st, 2015 (Exhibit C), are inconsistent with the Ethics Commission
      Advisory Opinion and the RFP requirements.

      *   The legal conclusion is that the ground lease in question is null and void
      because it did not follow its own RFP and Ethics Advisory Opinion adherence.


      THE PIVOT

      *   Article 2 proves that the foundation of the Airport Authority’s claim to
      maintain control and ownership of airport land (Article 1) is legally flawed
      due to contradictory and non-compliant documentation regarding the ground lease
      agreement.


      KEY ENTITIES

      *   Fairhope Airport Authority

      *   Dennis R. Bailey (Attorney)

      *   Ray Hix

      *   Joe McEnerney (Chairman)

      *   Jack Burrell (City Council)

