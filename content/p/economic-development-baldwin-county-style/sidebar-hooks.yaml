  Baldwin-County-seeks-public-input-on-land-use-plan:
    brief: 'THE CONFLICT:

      *   Baldwin County spent $32 million in 2012 on the 2300-acre "Mega site."

      *   County commissioners sold the project to citizens and county employees helped
      pay the price.

      *   Commissioners skimmed $5 million from a penny school tax for county infrastructure
      projects.


      THE DISCOVERY:

      *   The Baldwin County Commission’s Planning and Zoning Department will initiate
      a countywide long-range land use planning process.

      *   The process aims to update the existing land use plan focusing on quality
      of life, economic development, environmental protection, and visioning.

      *   Public meetings are scheduled across multiple locations (Central Annex Auditorium,
      Fairhope Satellite Courthouse Commission Chambers, Foley Civic Center).


      THE PIVOT:

      *   The current public input process for long-range land use planning provides
      a platform to re-evaluate or legitimize the historical decisions made regarding
      major land development projects like the Mega site.


