hooks:
  all-smoke-and-mirrors:
    brief: 'THE CONFLICT

      *   In 2012, Baldwin County Commission spent $32 Million on 2300 usable acres
      for the Mega site.

      *   County commissioners sold the project to "sleeping citizens."

      *   The commission skimmed $5 Million from schools via a penny tax for county
      infrastructure projects.


      THE DISCOVERY

      *   The Mega-site remains vacant, with an estimated current value of $50 Million
      due to lost opportunity and interest.

      *   The County Commission/Economic Development Alliance are waiting for a buyer
      of $350 Million for the Mega-site.

      *   Fairhope Airport Authority uses "smoke and mirrors" regarding land ownership.

      *   The Airport Authority structure allows them to control land under the Authority,
      funded by taxpayer debt (21% of city''s debt).

      *   The Authority intimidates complaints by hiring attorneys paid with tax dollars
      to investigate whistleblowers.


      THE PIVOT

      *   Article 2 proves that both the Mega-Site development claims and the Fairhope
      Airport Authority are instances of "smoke and mirrors" designed to mislead citizens.

      *   Article 2 exposes financial mismanagement (lost opportunity, skimmed taxes)
      linked directly to the projects discussed in Article 1.


      KEY ENTITIES

      *   Baldwin County Commission

      *   Mega-site (3000 acres)

      *   Fairhope Airport Authority

      *   Jack Burrell (Council President/Mayor)

      *   Baldwin County Economic Development Alliance

      *   Fairhope taxpayers'
    generated_at: '2026-07-11T10:32:47.473146Z'
  cattle-gate-mega-site:
    brief: 'THE CONFLICT:

      *   Baldwin County Commission planned to spend $32 Million on 2300 acres of
      the Mega site in 2012.

      *   County employees helped pay the $32 million cost.

      *   Commissioners now claim greater oversight and stated the project would not
      be approved in 2017.

      *   The county skimmed $5 million off a penny school tax for infrastructure
      projects without a vote.


      THE DISCOVERY:

      *   The Economic Development Alliance announced failure to find a tenant for
      the Mega-site in January.

      *   All other Mega-sites in the southeast have been sold, indicating a poor
      performance on the part of this specific site.

      *   There is currently NO SIGN at the mega site; only a cattle gate and palm
      trees are present.


      THE PIVOT:

      *   Article 2 proves that despite the initial $32 million investment commitment
      (Article 1), the Mega-site has stalled, failed to generate interest, and lacks
      any public presence (no sign).

      *   This lack of progress justifies the criticism aimed at the Commissioners
      for mismanagement and lost opportunity.


      KEY ENTITIES:

      *   Baldwin County Commission

      *   Jack Burrell (Council President)

      *   Fairhope Economic Development

      *   Fairhope Airport

      *   Economic Development Alliance'
