  mega-mistake:
    brief: 'THE CONFLICT:

      *   In 2012, the Baldwin County Commission spent $32 million to purchase a Mega
      Site (estimated at 2300–3000 usable acres).

      *   The property remains vacant.


      THE DISCOVERY:

      *   Seven years later (referencing 7 years since initial payment), the South
      Alabama Mega-Site is still vacant, with $2 million paid annually in payments.

      *   Due to lost opportunity and interest, the expense of the "Mega-Mistake"
      is estimated at approximately $50 million.

      *   Baldwin County Economic Development Alliance (BCEDA) intends to transfer
      title of this $50M property back to BCEDA''s exclusive control.


      THE PIVOT:

      *   Article 1 established that Baldwin County spent $32 million on the Mega
      Site in 2012 and failed to find serious buyers; Article 2 reveals the current,
      inflated cost ($50M) and identifies the proposed political solution—transferring
      title of this failing land back into BCEDA''s own hands.


      KEY ENTITIES:

      *   Baldwin County Commission

      *   Baldwin County Economic Development Alliance (BCEDA)

      *   Lee Lawson (CEO/leader of BCEDA)

