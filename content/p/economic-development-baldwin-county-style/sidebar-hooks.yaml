  mega-lost-opportunity:
    brief: 'THE CONFLICT:

      *   Baldwin County spent $32 Million in 2012 on the Mega site (2300 acres).

      *   County commissioners/employees helped pay the initial price tag.

      *   Recent action involved skimming a $5 Million penny school tax for infrastructure
      projects without public vote.

      *   Fairhope Economic Development involved an old invoice with no supporting
      paperwork or purchase order.


      THE DISCOVERY:

      *   The Baldwin County Economic Development Alliance (BCEDA) falsely claimed
      the Mega-site was "shovel ready" for years, despite the site lacking any sign,
      gate, infrastructure, rail, water, or power in 2015.

      *   BCEDA President/CEO Lee Lawson reported 55 to 60 inquiries but failed to
      secure sales or contracts.

      *   Taxpayers have invested an additional $150,000 for improvements.

      *   $15 Million of debt remains outstanding, including $8 Million owed to the
      county’s oil and gas trust fund and $7 Million in general obligation warrants.


      THE PIVOT:

      *   Article 2 proves that BCEDA utilized false and misleading information to
      promote the Mega-site, directly contrasting with the optimistic narrative used
      by county officials in Article 1 concerning the project''s viability.

      *   The financial structure revealed in Article 2 shows continued taxpayer investment
      despite a lack of tangible development, indicating mismanagement surrounding
      the original $32 Million expenditure.


