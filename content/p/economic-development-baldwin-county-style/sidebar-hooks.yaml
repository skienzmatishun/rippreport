      *   Commissioners are now claiming greater oversight regarding the Mega site,
      which they would not have approved in 2017.

      *   County commissioners skimmed $5 million from the penny school tax for infrastructure
      projects.


      THE DISCOVERY

      *   Development in Fairhope and Daphne is under a building moratorium due to
      strained infrastructure.

      *   Spanish Fort faces panic over potential apartment development near a new
      school with a potential of 300 new students.

      *   Schools are stretched, using portable classrooms, and municipalities are
      forming separate school districts.

      *   Baldwin County has an unregulated sewer system.

      *   D.R. Horton is facing class-action lawsuits due to inferior construction
      quality on homes built in the county.


      THE PIVOT

      *   The mismanagement of the $32 million Mega site in 2012 represents a lost
      opportunity cost ($50 million today).

      *   Past poor planning and lack of oversight regarding major projects (Mega
      site, jail spending) directly contribute to the current development chaos, infrastructure
      failure, and regulatory conflicts (zoning).


