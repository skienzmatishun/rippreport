      her case was a political witch hunt against Mayor Wilson in 2020.


      THE PIVOT

      Article 2 proves that City Attorney Marcus McDowell''s inaction—dismissing charges
      through neglect and refusing to hold the assailant accountable—is the core failure
      underpinning the systemic victimization of Paula DiNardi described in Article
      1, linking prosecutorial negligence directly to the political failures of the
      Fairhope City Council.


