      Burrell, the City Attorney, and the Municipal Judge, establishing that these
      positions are interconnected ("it is all connected folks").

      *   Article 2 solidifies that the defense attorney''s politicization was a deliberate
      attempt to frame the assault case as part of a broader political narrative against
      the Mayor.


