      Municipal Court.

      *   McSharry was sentenced to 180 days in jail (time served during re-hab).

      *   Defense attorney John Beck represented McSharry and politicized the assault
      case.

      *   Paula DiNardi incurred medical damages exceeding $6,000.00.


      THE DISCOVERY:

      *   The defense attorney (Beck) engaged in irrelevant questioning regarding
      Paula DiNardi''s involvement with The Ripp Report and Mayor Wilson.

      *   The Municipal Judge allowed the defense attorney to go unchallenged despite
      the lack of relevance.

      *   The City Attorney (Marcus McDowell) failed to mention DiNardi’s medical
      damages or McSharry’s immigration status (green card).

      *   DiNardi realized her case was being used in an ongoing political witch hunt
      against Mayor Wilson in 2020.


      THE PIVOT:

