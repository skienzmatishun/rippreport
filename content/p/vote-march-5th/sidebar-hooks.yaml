      security for compliance.

      - Claims lack of transparency in Circuit Clerk position; calls for Kim Earl
      to break corrupt cycle.

      - March 5, 2024 election identified as critical battleground for breaking this
      stranglehold.

      - Allegation that candidates like Jerry Carl are endorsed by the cabal (Sheriff
      Mack) and local mayors who ignore toll bridge issues.


      2. THE DISCOVERY

      - Baldwin County Sheriff’s Department approved by County Commission for $662,567.00
      to purchase 129 body cameras and technology.

      - Sheriff Mack told the commission videos are often stored for several years
      but BCSO rarely releases footage to public.

      - In July (previous year), attorneys for newspaper and BCSO met at Alabama Supreme
      Court to argue whether body-cam footage from Jonathan Victor 2017 shooting is
      public records.

      - 2017 Incident: BCSO Sgt. Matt Hunady shot victim Jonathan Victor with service
      rifle during single-vehicle accident; BCSO Sgt. was called after told victim
      acting combatively; item found in hands was a fanny pack, no weapon.

      - Fairhope City Attorney failed to properly file assault charge against Ronan
      McSharry three times in connection with "Little Whiskey Christmas Club" incident.

      - Ronan McSharry is represented by James Pittman (Tripp Pittman’s brother);
      Tripp Pittman previously involved with McSharry legal defense.

      - Article 2 published one week post-election notes Sherry Sullivan won with
      only 17% of registered voters.


      3. THE PIVOT

      - Article 2 validates Article 1’s claim that Sheriff Hoss Mack controls oversight
      of justice in Baldwin County.

      - Proof: Despite investing $662,567 for cameras to increase transparency (addressing
      "accountability/transparency" claims in Article 1), Mack refuses to release
      video footage of deaths or incidents.

      - Proof: Sheriff Mack already operates a special investigative team that investigates
      himself and his department while withholding video evidence.

      - Proof: Article 2 confirms the Mayors/City Council cabal described in Article
      1 is actively protecting connected figures (McSharry/Pittman) and avoiding regulation/growth
      restrictions, proving they remain the "rubber stamp" authority.


      4. KEY ENTITIES

      - Sheriff Hoss Mack / Baldwin County Sheriff’s Office (BCSO)

      - Ronan McSharry (Fairhope Mayor Candidate/Current)

      - Tripp Pittman / James Pittman (Attorneys for McSharry, Lagniappe co-owner)

      - Gerald "Jerry" Carl (Candidate accused of campaign misinformation)

      - Carrie Hosier vs. Andrea Lindsey (Board of Education District 2 candidates)

      - Kim Earl (Circuit Clerk candidate)

      - Sherry Sullivan / Jack Burrell (Fairhope Mayor/Council candidates, linked
      as power brokers)

      - Jonathan Victor (2017 victim of police shooting by Sgt. Matt Hunady)

      - Eddie Tyler / Gray (School system officials cited as protected by GOB)

      - Fairhope City Attorney'
