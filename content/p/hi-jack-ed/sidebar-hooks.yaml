  captain-jack-at-the-controls:
    brief: 'THE CONFLICT

      *   2016 events concerning the Fairhope Airport Authority.

      *   Mayor Wilson''s option regarding the original loan to the Airport Authority
      (city taking back land for $10 if principal wasn''t paid by 2012).

      *   Mr. Burrell holding dual roles as Fairhope City Council President and liaison
      for the Airport Authority, conflicting with his stated interest in citizen representation.


      THE DISCOVERY

      *   Documents presented in 2016 related to hangar leases at the Airport showed
      suspicious handling of bids.

      *   Captain Jack received free air miles and golf vacations from a board member
      while overseeing the bid process for that same board member.

      *   The Authority receives 7 cents on the dollar as fuel income, with no record
      of usage shared by the Fixed Based Operator.


      THE PIVOT

      *   Article 2 reveals specific operational conflicts of interest (Captain Jack
      and board members) within the Airport Authority structure, which directly supports
      the Main Article''s claim that Mr. Burrell maintained control and isolated the
      City from the Airport Authority.

      *   The evidence of suspicious lease handling proves that Burrell’s control
      extended to manipulating airport operations rather than merely political liaison.


