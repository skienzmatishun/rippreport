  whos-on-first:
    brief: |-
      THE CONFLICT:
      * In 2015, Dennis R. Bailey requested an Advisory Opinion from the Alabama Ethics Commission regarding a Ground Lease for the Fairhope Airport Authority involving Ray Hix.
      * The executed Ground Lease and Operating Agreement was dated Dec 17, 2015.
      * Mayor Wilson previously attempted to exercise an option on an original loan (dated before 2012) allowing the city to reclaim 258 acres of airport land for $10.00 if debt remained unpaid.
      * Mr. Burrell, Council President and City Liaison for the Airport Authority, has since publicly opposed Mayor Wilson's actions while supporting the Authority's interests.

      THE DISCOVERY:
      * The Ground Lease and Operating Agreement executed on Dec 17, 2015, may be null and void due to procedural violations of state ethics laws.
      * The Alabama Ethics Commission Advisory Opinion (No. 2016-04) was issued March 3, 2016—after the lease execution date—violating a requirement that the executed contract must be filed within ten days of entry (Dec 27, 2015).
      * The Authority produced multiple inconsistent versions of the lease: EXHIBIT B, EXHIBIT C (Dec 21/2015), and the Dec 17/15 executed copy.
      * There is a discrepancy between the Airport's RFP terms (15 months for hanger construction) and the language in the various executed leases regarding project timelines (some stating "not longer than [6] months").

      THE PIVOT:
      * The Main Article alleges a conflict of interest involving Mr. Burrell’s appointment to an ad hoc committee of two for airplane hangar bid selection, which he used to support the Authority over citizen interests.
      * The Widget Article provides specific evidence that the foundational legal documents (Ground Lease) are procedurally flawed and potentially invalid because the Fairhope Airport Authority failed to follow mandated Ethics Commission procedures and violated its own Request for Bids terms.

      KEY ENTITIES:
      * Mr. Burrell (City Council President / City Liaison for Fairhope Airport Authority)
      * Mayor Wilson
      * Dennis R. Bailey (Attorney representing Ray Hix)
      * Ray Hix
      * Joe McEnerney
      * Alabama Ethics Commission
      * Fairhope Airport Authority
      * Baldwin County
      * Josh Myrick
      * John Sharp
