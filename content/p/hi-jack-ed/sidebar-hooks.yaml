  court-public-opinion-now-session:
    brief: |-
      **THE CONFLICT:**
      *   Ongoing tension between Mayor Wilson’s administration and "the previous FAILED administration" led by Mr. Burrell in Fairhope politics.
      *   The Fairhope Airport Authority (FAA) operates as a financial "black hole," receiving $500,000 annually from the City without transparency or clear citizen benefit.
      *   Mr. Burrell holds multiple conflicting positions: Fairhope City Council President and FAA liaison/ad hoc committee member responsible for selecting airplane hanger bids.
      *   Mr. Burrell is accused of maintaining this opacity and actively mocking Mayor Wilson's efforts to expose the Authority’s issues, including exercising options in original loans (2012).

      **THE DISCOVERY:**
      *   A formal supplement/complaint was filed with the Office of the Attorney General Special Prosecutions Division on Jan 25, 2017.
      *   The complaint alleges improper bidding and bid rigging by the FAA involving Mr. Jack Burrell.
      *   Evidence shows that Hix/Snedeker aircraft (Mid-Bay Air LLC) won a Request for Proposal (RFP).
      *   A specific legal violation: The lease was signed Dec 17, 2015, prior to the Ethics Commission Advisory Opinion being rendered on Feb 3, 2016.
      *   Mr. Hix had privileged access to all financial information of the FAA from April to July 2015 as Secretary/Board Member.

      **THE PIVOT:**
      *   The allegations in Article 1 regarding Mr. Burrell’s "conflict of interest" and his control over selection processes are substantiated by Article 2's claim that Mr. Burrell was a member of the ad hoc committee that reviewed and recommended the flawed RFP bid process.
      *   Article 1 asserts Mr. Burrell is integral to a "conspiracy," while Article 2 provides concrete evidence (the timing of the lease/Ethics Advisory Opinion violation, Hix’s prior access) demonstrating procedural fraud in the selection of the winning bidder.

      **KEY ENTITIES:**
      *   Mr. Jack Burrell / Council President
      *   Mayor Wilson / Former Mayor
      *   Fairhope Airport Authority (FAA)
      *   Hix / Snedeker Aircraft / Mid-Bay Air LLC
      *   Executive Aviation (Competitor/Qualified Bidder)
      *   Francis Paul Ripp / The Ripp Report
      *   Office of the Attorney General Special Prosecutions Division
