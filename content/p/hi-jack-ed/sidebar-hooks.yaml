  jack-box-airport:
    brief: |-
      **THE CONFLICT:**
      *   Fairhope City Council discussed Airport Authority land deal options, including Mayor Wilson exercising a loan option allowing city recovery of 258 acres for $10.00 if principal wasn't paid by 2012 (Article 1).
      *   The Fairhope Budget annually includes a half-million dollar appropriation to the Fairhope Airport Authority, which Mr. Burrell describes as a "black hole" with linked board members (Article 1).
      *   Mr. Burrell’s position as City Council President and liaison for the Airport Authority creates a potential conflict of interest regarding oversight committees (Article 1).
      *   Past ethics allegations involved Mayor Kant refusing two salaries, which allegedly cost Wilson $90,000 in fees (Article 2).

      **THE DISCOVERY:**
      *   The Fairhope Airport Authority is planning to hire the "top ethics attorney in Alabama" to defend board members Jack Burrell and Ray Hix against complaints from The Ripp Report/investigative bodies (Article 2).
      *   This defense attorney is linked directly to a legal action: Mr. Hix’s own attorney prepared a request for an Advisory Opinion submitted to the Ethics Commission Chief Council, Hugh Evens (Article 2).
      *   The Authority's investigation into Board members Burrell and Hix appears intended as an "end run around" regulatory accountability via judicial/legal means (Article 2).

      **THE PIVOT:**
      *   Article 1 accuses Mr. Burrell of being integral to a hidden conspiracy supporting the Airport Authority against citizen interests while using his official positions for deflection (Council President and liaison).
      *   Article 2 proves that the legal defense strategy employed by the Board—which includes Jack Burrell—directly involves Mr. Hix's attorney filing an ethics inquiry with Chief Council Hugh Evens, demonstrating a conflict between the Authority’s board members and their chosen counsel/legal maneuvering (Jack in the Box).

      **KEY ENTITIES:**
      *   Fairhope City Council / Fairhope Airport Authority
      *   Mr. Burrell / Jack Burrell (Council Member/President; Board Member)
      *   Mayor Wilson
      *   Ray Hix (Board Member, Secretary Treasurer)
      *   Hugh Evens (Ethics Commission Chief Council)
      *   Mr. Bailey (Hix's attorney; blind copied on inquiry)
      *   The Ripp Report
