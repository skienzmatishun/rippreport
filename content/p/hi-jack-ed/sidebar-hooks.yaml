  bushwhacked-hijacked-fairhope-style:
    brief: 'THE CONFLICT:

      *   Fairhope Airport Authority budget includes $500,000 annually.

      *   Conflict of interest exists on the Airport Authority board due to personal/financial
      connections.

      *   Mayor Wilson sought an option in a loan allowing the city to reclaim land
      for $10,000 if principal was not paid by 2012.

      *   Mr. Burrell (City Council President and Airport Authority liaison) supported
      the Airport over citizen interests.

      *   Burrell was appointed to an ad hoc committee overseeing Airplane hanger
      bids, conflicting with his official roles.


      THE DISCOVERY:

      *   Former employees sued the city; cases were sealed to conceal firings.

      *   Jack Burrell began a crusade against Mayor Karin Wilson through bullying
      and obstruction.

      *   The Police Chief retired after being told he was "bullied and intimidated"
      by the Mayor, an action supported by fired employees.

      *   The City Council supported Burrell in maintaining control over the Fairhope
      Airport and securing its title for the Airport Authority instead of the city.

      *   Burrell had a record involving sweetheart deals (Fly Creek Apartments developers)
      and accepting free jet transportation while serving on the Airport Board.


      THE PIVOT:

      *   Article 2 provides specific, documented evidence (lawsuits, recorded video)
      detailing how Jack Burrell used his position as City Council President to hijack
      municipal business and secure the Fairhope Airport Authority''s control, validating
      Burrell''s alleged role in the "conspiracy" mentioned in Article 1.


