  whos-on-first:
    brief: 'THE CONFLICT

      *   Mr. Burrell was City Council President and Fairhope Airport Authority liaison.

      *   Mayor Wilson sought an option in a loan to reclaim city land at $10.00 if
      principal wasn''t paid by 2012.

      *   The Airport Authority sought debt and appropriation from the city to retain
      control of 258 acres.

      *   Mr. Burrell supported the Airport over citizens'' interests.


      THE DISCOVERY

      *   The Ground Lease and Operating Agreement documents show inconsistencies,
      including different lease versions (Exhibit B vs. Exhibit C vs. Dec 17th lease).

      *   The executed lease date (Dec 17, 2015) conflicted with the timeline for
      receiving the Alabama Ethics Commission Advisory Opinion (March 3, 2016).

      *   Lease language contradicted the Fairhope Airport Authority''s Request for
      Bids (RFP) terms regarding construction completion timelines.


      THE PIVOT

      *   The detailed legal inconsistencies in the ground lease documents prove that
      the Airport Authority did not follow its own RFP and violated Ethics Advisory
      Opinion requirements.

      *   This documentation proves the conflict of interest and mismanagement claims
      made against Mr. Burrell and the Authority''s actions.


      KEY ENTITIES

      *   John Sharp

      *   Lagniappe Jane Nicholes

      *   Lagniappi Ron Sivak

      *   Fairhope Airport Authority

      *   Mayor Wilson

      *   Mr. Burrell

