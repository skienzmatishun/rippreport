  fairhope-airport-un_authorized:
    brief: |-
      THE CONFLICT:
      *   Fairhope Airport Authority has been flying under public scrutiny regarding its budget of half a million dollars per year, which exceeds educational contributions by nearly $200,000 (MA).
      *   Mayor Wilson sought to exercise an option in 1970's original loan terms to allow the city to take back land for $10.00 if the principal wasn't paid off by 2012 (MA).
      *   Council Member/President Burrell was criticized for supporting the Authority over citizen interests and mocking Mayor Wilson (MA).
      *   In 2015, three board members resigned following internal conflict or related events (WA).

      THE DISCOVERY:
      *   An Ethics Commission advisory opinion (no. 2016-04) warned that an Airport Authority member cannot use confidential information from the Authority to benefit their company's bid (WA).
      *   Joe McEnerey was appointed Chairman in Aug 2015, followed by Pam Caudill as Vice Chair and Ray Hix as Secretary/Treasurer. Board member Ray Hix subsequently received privileged info regarding leases and bids (WA).
      *   Mr. Burrell presided over an ad hoc committee that reviewed bids for airplane hangers and determined his associate board member won the lease bid (WA, MA).
      *   A memorandum of lease was signed between Mid-Bay Air LLC and Fairhope Airport Authority on December 23, 2015, before any Ethics Opinion or due diligence could be completed (WA).
      *   The Alabama Ethics Commission confirmed on December 2, 2016, that no such lease had ever been submitted to them (WA).

      THE PIVOT:
      *   MA established the general conflict of interest regarding Burrell's dual roles and support for the Airport Authority over citizens.
      *   WA proves this is not merely a disagreement but a direct violation of ethics rules involving self-dealing by Board members, specifically Ray Hix leasing Mid-Bay Air LLC from an authority he served as Secretary/Treasurer (who had access to confidential bids).
      *   MA’s "conspiracy" allegations regarding the Authority are substantiated by WA's documentation showing the lack of compliance with ethics laws and failure of due diligence surrounding that same Authority.

      KEY ENTITIES:
      *   Mr. Burrell (Council Member, Council President, Airport Liaison)
      *   Mayor Wilson
      *   Fairhope Airport Authority
      *   Ray Hix (Secretary/Treasurer, Board Member)
      *   Joe McEnerey (Chairman)
      *   Pam Caudill (Vice Chair)
      *   Mid-Bay Air LLC
      *   Alabama Ethics Commission
      *   John Sharp
