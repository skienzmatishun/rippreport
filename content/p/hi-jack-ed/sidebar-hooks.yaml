      *   Ray Hix

      *   Cedar Creek Leasing LLC

      *   Alabama Ethics Commission'
    generated_at: '2026-07-11T12:28:00.178073Z'
  stirring-the-pot:
    brief: 'THE CONFLICT:

      *   Mr. Burrell''s role as Fairhope City Council President and Airport Authority
      liaison created a conflict of interest.

      *   Mayor Wilson exercised an option in the original loan allowing the city
      to take back land for $10.00 if principal was not paid off by 2012.

      *   The Fairhope Airport Authority received $500,000 annually from the city
      budget, despite serving less than 1% of the budget.


      THE DISCOVERY:

      *   Mr. Burrell has no answers regarding questions about the Airport Authority''s
      dealings ("Who’s telling the truth?").

      *   The Airport has allegedly cost the community millions while local schools
      receive little investment.


      THE PIVOT:

      *   Article 2 uses Mr. Burrell''s evasiveness and his failure to answer direct
      questions as evidence that supports the claims made in Article 1 regarding the
      conflict of interest and misuse of funds by the Authority.


      KEY ENTITIES:

