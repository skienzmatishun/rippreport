hooks:
  marble-mouth:
    brief: 'THE CONFLICT:

      *   Developer Matt Bowers proposed a boutique hotel concept at the K-1 location,
      requiring city parking and variances.

      *   The City Council rejected the boutique Hotel concept at the K-1 location.

      *   City Councilman Conyers advocated for a 35-foot height restriction, while
      it went to 40 feet due to the Publix project.

      *   Council President Burrell caused problems that cost the city tax dollars
      or led to lawsuits.


      THE DISCOVERY:

      *   The City Council screwed up the Boutique Hotel purchase, paying $525,000
      for less than 1000 sq feet of property ($5,250 per square foot).

      *   The owner of the property (Mr. Bowers) accused the Council of blackmail.

      *   Council President Burrell declared a property "surplus and not needed for
      public or municipal use."

      *   Taxpayers paid $8.75 million for the "Dyas Triangle" property, which was
      later designated surplus.


      THE PIVOT:

      *   Article 2 reveals that the Council''s obstructionist behavior (over 3 years)
      and financial mismanagement (costing taxpayers millions) directly led to the
      disastrous handling and disposal of the boutique hotel property discussed in
      Article 1.


