      *   Matt Bowers

      *   City Councilman Conyers

      *   Council President Burrell

      *   Mr. Bowers (Property Owner)

      *   Fairhope City Council

      *   K-1 Center

      *   Fly Creek Apartments

      *   The Triangle'
