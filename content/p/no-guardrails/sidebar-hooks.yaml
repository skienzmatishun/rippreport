hooks:
  pandemic-corruption:
    brief: 'THE CONFLICT

      *   Attorney General Matt Hart resigned/was removed from the Attorney General’s
      Office in November 2018.

      *   The Ethics Commission rules were written in part by Mike Hubbard, a former
      convicted Speaker of the House.

      *   City Councils deflect consumer complaints to the Attorney General’s office
      or Ethics Commission.


      THE DISCOVERY

      *   The Ethics Commission lacks credibility and is seen as an obstacle rather
      than a goal by members (Dr. Stewart Hill Tankersley, Jerry Fielding, Frank "Butch"
      Ellis, Jr., Charles Price).

      *   City Councils in areas like Fairhope obstruct the Mayor and support disgruntled
      employees to cover corruption.

      *   State lawmakers: Four have been convicted since 2014.

      *   The Governor''s office and regulatory bodies are implicated in corruption
      across the state.


      THE PIVOT

      *   Article 2 proves that the removal of officials (like Matt Hart) and the
      structure of the Ethics Commission are inadequate because corruption is systemic,
      involving local government, state legislators, and powerful figures operating
      without accountability.

      *   Article 1 focuses on a single guardrail failure; Article 2 shows why that
      failure persists—the entire system is designed to cover up illegal activity
      by elected officials and agencies.


      KEY ENTITIES

      *   Matt Hart (Public corruption prosecutor)

      *   Mike Hubbard (Former convicted Speaker of the House)

      *   Dr. Stewart Hill Tankersley (Outgoing Ethics Commission member)

      *   Jerry Fielding, Frank "Butch" Ellis, Jr., Charles Price (Ethics Commission
      members)

      *   Luther (Attorney General)

      *   Luv Gov (Governor)

      *   Speaker of the House Hubbard

      *   BP ($750,000 skimmed)

      *   City Council in Fairhope'
