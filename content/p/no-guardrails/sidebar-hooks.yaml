  alabama-corruption-insurance:
    brief: 'THE CONFLICT:

      *   Attorney General Matt Hart resigned from the Attorney General’s Office in
      November 2018.

      *   Ethics rules were written in part by Mike Hubbard, a former, convicted Speaker
      of the House.

      *   Hubbard’s allies were involved in Matt Hart’s removal.


      THE DISCOVERY:

      *   Alabama has "Alabama Corruption Insurance," a free system available to all
      elected officials (Sheriff Dept., City Council, Judges, Mayors, Circuit/District
      Courts).

      *   The Alabama Ethics Commission aids and abets political corruption by providing
      this insurance mechanism.

      *   An official receiving a favorable advisory opinion from the Ethics Commission
      gains "protection from prosecution," even if they lie on the request.


      THE PIVOT:

      *   Article 2 proves that the guardrails mentioned in Article 1 (the AG''s office
      and Ethics Commission) are functionally compromised, as the Ethics Commission
      provides a "get out of jail card" via the Corruption Insurance.

      *   This mechanism allows officials (e.g., Mayor and Police Chief in Columbia)
      to escape accountability despite alleged corruption and uninvestigated complaints.


      KEY ENTITIES:

      *   Matt Hart

      *   Mike Hubbard

      *   Alabama Attorney General''s Office

      *   Alabama Ethics Commission

      *   Columbia, Alabama

      *   Ben Freeman (municipal prosecutor/lawyer)

      *   Lori Mock (Columbia Police Officer’s wife)'
