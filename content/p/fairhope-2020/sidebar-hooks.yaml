      for under $1 million.

      *   Catalyst Council members (Boone and Burrell) refused to settle the Triangle
      lawsuit.


      THE DISCOVERY:

      *   The Catalyst Council''s refusal to settle the Triangle lawsuit resulted
      in millions of potential damages for Fairhope if developer Buddy Breland wins
      an appeal.

      *   The Catalyst Council''s actions demonstrated obstruction rather than community
      benefit, contrasting with the accomplishments of Mayor Wilson and staff.

      *   The City Attorney (Marcus McDowell) failed to adequately protect the community
      regarding Ronan McSharry''s ongoing issues.


      THE PIVOT:

      *   Article 2 provides specific financial figures ($11.25 million cost, settlement
