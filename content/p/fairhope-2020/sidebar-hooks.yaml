      *   The Catalyst Council is accused of protecting McSharry and using "CATALYST
      connections."


      THE DISCOVERY

      *   Fairhope City Council canceled public participation while justice for the
      McSharry case slipped through the cracks.

      *   The McSharry case exemplifies a failure of the Baldwin County Judicial System
      and points to judicial manipulation.

      *   There is suspicion that the City Attorney and Municipal Judge made "elementary
      mistakes" in handling the McSharry case.


      THE PIVOT

