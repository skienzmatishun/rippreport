      - Donna Black Givens sponsored HB51; deleted Facebook post revealed behind-the-scenes coordination on who was allowed to attend, speak, or be excluded from events ("having friends in the right places").
      - Hoss Mack allegedly wants Harry Still silenced; investigation into current Steelwood/pipeline connections required.
      - Bob Wills (Bay Minette Mayor) alleged to have investigated Steelwood and pipeline companies during tenure.

