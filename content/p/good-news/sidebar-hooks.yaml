  bcso-culture-2:
    brief: |-
      THE CONFLICT:
      - Hoss Mack (Former Sheriff) developed a 18-year culture of "Absolute Immunity" within Baldwin County Sheriff’s Office (BCSO).
      - BCSO investigates itself using internal officers via the Baldwin County Major Crimes Division with no transparency.
      - Anthony Lowery (Current Appointed Sheriff) continues the culture Mack built; record shows 18 years of deaths "justified" by officers, unsolved cases, and ignored complaints.
      - Anthony Lowery was the lead investigator for District Attorney in the wrongful conviction of Murray Lawrence Jr.
      - GOB network accuses Bay Minette Mayor Bob Wills of attempting to silence Harry Still regarding Steelwood and pipeline investigations.
      - Jerry Carl (Sheriff) previously lost office but retained influence within the GOB; accused of self-promotion using taxpayer funds.

      THE DISCOVERY:
      - Article 2 confirms the "GOB" corruption is systemic, not individual, by proving the structure allowing immunity (BCSO Major Crimes Division) exists.
      - Current Sheriff Lowery is named explicitly as the successor to Hoss Mack regarding this immunity culture.
      - Article 2 proves Scott Boone Consulting (Catalyst) operates as the political manipulator for GOB candidates within the system.

      THE PIVOT:
      - Article 2 links Lowery’s past role (Lead Investigator in Murray Lawrence wrongful conviction) to his current power (Head of self-policing office), making him the central node.
      - Article 2 validates Article 1’s claim that "EYES" can see the obvious: BCSO lacks independence, which matches Article 1’s accusations of rigged outcomes for loyalists (Elliott/Carl).
      - Article 2 identifies Hoss Mack and Anthony Lowery as the architects of a system that protects officials over citizens, directly supporting Article 1’s claim of panic within the "GOB."

      KEY ENTITIES:
      - Anthony Lowery (Appointed Sheriff, Lead Investigator for Lawrence case)
      - Hoss Mack (Former Sheriff, Culture architect)
      - Murray Lawrence Jr. (Wrongfully convicted victim)
      - Bob Wills (Bay Minette Mayor, Pipeline/Still controversy)
      - Chris Elliott (GOB Politician with Sheriff communications)
      - Jerry Carl (Sheriff/Former GOB official)
      - Scott Boone Consulting / Catalyst (Political arm for GOB)
      - Harry Still (Alleged victim of silencing)
    generated_at: '2026-03-12T22:09:55.745745Z'
    text: Hoss Mack spent 18 years building a sheriff’s office that answers to nobody but itself. Now Anthony Lowery runs this "immunity" machine after leading the investigation that wrongfully convicted Murray Lawrence Jr. This proves the Good Ole Boy network is a systemic shield designed to keep the bosses in power.
  summerdale-sunshine:
    brief: |-
