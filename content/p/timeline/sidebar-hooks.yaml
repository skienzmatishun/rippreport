  bend-over-fairhope:
    brief: 'THE CONFLICT:

      *   Director Peterson and Director Johnson requested streamlining funding processes
      for infrastructure projects.

      *   Council President Burrell dismissed these requests regarding project funding
      procedures.

      *   Citizens are calling the City Council regarding unresolved sewer issues.

      *   Council members used employees (firing/using them) to spread rumors and
      obstruct Mayor’s efforts.


      THE DISCOVERY:

      *   Council President Burrell claims credit for plans intended to drive the
      Mayor out of office.

      *   The council engaged in a policy of interfering with city employees'' duties.

      *   A proposed development plan involves 12 homes using grinder pumps to push
      sewage into the main sewer line in the Fruit and Nut section, creating future
      expenses for buyers.

      *   Council members Boone and Brown have direct ties related to the Fairhope
      Single Tax plan.


      THE PIVOT:

      *   Article 2 reveals that the council''s obstruction (as seen in Article 1
      regarding funding/process) is intertwined with specific financial interests
      (Single Tax) and localized infrastructure conflicts (sewer pumps).

      *   The conflict of interest regarding the Single Tax and development ties provides
      a concrete mechanism for understanding why the Council obstructs necessary infrastructure
      decisions.


      KEY ENTITIES:

      *   Director Peterson

      *   Robert Brown

      *   Council President Burrell

      *   Director Johnson

      *   Boone

      *   Brown

      *   Fairhope City Council

      *   Mayor

      *   Single Tax plan

      *   Fruit and Nut section'
