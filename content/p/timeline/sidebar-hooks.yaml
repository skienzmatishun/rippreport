  catalyst-liar:
    brief: 'THE CONFLICT

      *   Director Peterson, Robert Brown, and Director Johnson requested the Council
      streamline the process for funding infrastructure projects.

      *   Council President Jack Burrell dismissed these requests and maintained a
      process that required too many steps and limited Director discretion.

      *   The Fairhope City Council consistently failed to support sewer projects.


      THE DISCOVERY

      *   Jack Burrell approved sewer repairs to the main sewer plant but explicitly
      allowed no money for transmission lines, contradicting his public stance on
      infrastructure.

      *   Burrell took credit for accomplishments (sewer improvements) that he voted
      against.

      *   Burrell was involved in bid rigging at the airport and a land deal involving
      $2.65 million farmland.


      THE PIVOT

      *   Article 2 provides specific, documented examples of Burrell''s obstruction
      regarding sewer projects and infrastructure spending, proving that his general
      claims of dismissing funding requests (Article 1) are based on intentional neglect
      and false credit-taking rather than simple procedural disagreement.


