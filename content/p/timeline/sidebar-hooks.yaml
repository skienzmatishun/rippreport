  people-power-2:
    brief: 'THE CONFLICT

      *   Director Peterson, Robert Brown, and Director Johnson requested streamlining
      processes for infrastructure project funding.

      *   City Council President Burrell dismissed these requests, creating a process
      that requires too many steps and limits director discretion.

      *   The City Council obstructed the Mayor''s duties regarding infrastructure
      projects.


      THE DISCOVERY

      *   Citizens gathered 2276 signatures on a petition that successfully convinced
      the Fairhope Single Tax to back off the Tuberville subdivision.

      *   A new $13 million sewer plant failed to process 500,000 gallons of raw sewage,
      causing an overflow into Big Head gully and the Fly Creek watershed.


      THE PIVOT

      *   Article 2 reveals that citizen action (the petition) is successful in influencing
      local governance (Single Tax decision), while simultaneously exposing a critical
      failure in infrastructure management (the failed sewer plant).

      *   This proves that the political obstruction detailed in Article 1 is directly
      linked to tangible, environmental disaster caused by inadequate funding/oversight.


