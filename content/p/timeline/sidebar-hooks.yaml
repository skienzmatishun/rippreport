  bull:
    brief: 'THE CONFLICT

      *   Director Peterson and Director Johnson requested the City Council streamline
      infrastructure funding processes.

      *   Council President Burrell dismissed the proposed process for funding projects.

      *   Citizens are demanding a timeline regarding the sewer issue.


      THE DISCOVERY

      *   Since November 2016, the administration aggressively pushed for upgrading
      and rehabilitating utility infrastructure, specifically the Sewer System.

      *   Funds for sewer upgrades were included in the 2017 and 2018 budgets but
      subsequently cut by Council/administration.

      *   Assistant Superintendent positions in Utility Departments were de-funded
      following the retirement of Superintendents (Electric mid-2017, Gas late-2017,
      Water & Sewer Feb 2018).


      THE PIVOT

      *   Article 2 reveals a history of Council/administration undermining infrastructure
      projects and cutting necessary technical funding, which supports the claim in
      Article 1 that the Council obstructs proper project funding.

      *   The pattern of cutting budget items (technical help, positions) directly
      contrasts with Director Johnson''s request for streamlined, functional funding
      processes mentioned in Article 1.


