  fauxhope-2:
    brief: 'THE CONFLICT

      *   Director Peterson and Director Johnson requested the City Council to streamline
      the process for funding infrastructure projects.

      *   Council President Burrell obstructed the proposed streamlining process.

      *   Citizens are demanding a timeline regarding sewer issues and infrastructure
      repairs.

      *   The bridge cost escalated from a claimed $600 million to an estimated $3
      billion.


      THE DISCOVERY

      *   Infrastructure problems are the result of neglect during the Tim Kant administration
      (2000 to 2016).

      *   Previous council actions during the Wilson administration (2016/2020) were
      politically motivated slowdowns or denials of infrastructure projects and well
      digging.

      *   The current council structure benefits from ties to developers and "Catalyst."


      THE PIVOT

      *   Article 2 proves that the obstruction by Council President Burrell in Article
      1 is not isolated but part of a pattern established by past administrations
      (Kant, Wilson) who prioritized political motivations over infrastructure needs.

      *   The current council''s inaction stems from this historical precedent rather
      than purely local mismanagement.


