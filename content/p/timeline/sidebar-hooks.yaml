  off-the-rails:
    brief: 'THE CONFLICT:

      *   Director Peterson and Director Johnson requested streamlining the process
      for funding infrastructure projects.

      *   Council President Burrell dismissed these requests, creating complex processes
      that lack director discretion for emergency situations.

      *   The City Council ignored sewer infrastructure issues for years.


      THE DISCOVERY:

      *   Three councilmen (Boone Brown and Burrell) used $2.75 million to purchase
      land for recreation/farming instead of funding necessary infrastructure repair
      or development.

      *   Sewer infrastructure was only addressed due to city staff and the Mayor
      obtaining BP funds, not due to Council action.


      THE PIVOT:

      *   Article 2 provides specific evidence (the $2.75 million land purchase) demonstrating
      how the Council''s prioritization decisions directly obstructed necessary sewer
      infrastructure funding, proving the claim that the council members are conducting
      a "criminal enterprise."


