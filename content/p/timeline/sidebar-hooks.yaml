  fairhope-sewer-backstory:
    brief: 'THE CONFLICT

      - Director Peterson and Director Johnson requested streamlining infrastructure
      funding processes.

      - Council President Burrell dismissed the Directors'' requests regarding project
      funding.

      - Citizens are demanding timelines for sewer infrastructure repairs.


      THE DISCOVERY

      - Between 2012 and 2016, Mayor Can’t, Councilman Boone, and Councilman Burrell
      used the utility fund as a slush fund to pay lawsuits.

      - This misuse drained the utility fund by $3 million paid to attorneys.

      - During this period (2012–2016), no sewer infrastructure work was performed.


      THE PIVOT

      - Article 2 proves that the current obstruction and lack of infrastructure funding
      mentioned in Article 1 are rooted in a documented history of financial corruption
      involving key Council members.

      - The actions described in Article 1 (Council obstructing processes) are a continuation
      of the scheme detailed in Article 2 (misuse of funds).


      KEY ENTITIES

      - Director Peterson

      - Robert Brown

      - Director Johnson

      - Council President Burrell

      - Mayor Can’t

      - Councilman Boone

      - Mayor Karin Wilson

      - Casi Callaway'
