      to abide by the terms.

      *   Police found McSharry at the Little Whiskey Christmas Club exhibiting signs
      of intoxication (strong odor of alcohol, slurred speech, inability to walk).

      *   Fairhope Municipal Judge Haymes Snedeker found McSharry guilty of both counts
      and sentenced him 180 days.


      THE DISCOVERY

      *   Fauxhope city attorney Marcus McDowell represented Paula DiNardi in the
      assault/intoxication case against Ronan McSharry.

      *   The city attorney failed to file the assault charge, leaving McSharry facing
      only an intoxication charge in circuit court.

      *   Baldwin County Circuit Judge Clark Stankoski dismissed the most serious
      charge (the assault charge) despite it being on video and a charge for which
      McSharry was already convicted in municipal court.

      *   Judge Stankoski sentenced McSharry one year of unsupervised probation without
      addressing the assault charge or his prior jail time.


      THE PIVOT

      *   Article 2 proves that the handling of the case—specifically by the city
      attorney and the circuit judge—was flawed or biased, suggesting institutional
      failure in protecting McSharry or prosecuting the alleged assault.


      KEY ENTITIES

