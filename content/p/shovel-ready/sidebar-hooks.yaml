  mega-lost-opportunity:
    brief: 'THE CONFLICT:

      *   Baldwin County Economic Development Alliance (BCEDA), led by CEO Lee Lawson,
      promoted the Mega Site as "shovel ready."

      *   The Mega Site was a finalist for the Toyota-Mazda complex.

      *   The county spent $32 million on the initial purchase of the 3,009 acre Mega
      Site in 2012.

      *   The Baldwin County Commission passed a 1% tax without a public vote to fund
      infrastructure, taking money from schools.


      THE DISCOVERY:

      *   Total investment in the Mega Site is approximately $48 million, including
      interest.

      *   In 2012, the County Commission approved payments of $25,976,500 to the Crosby
      Trust and $6,312,500 to Catawba Land Company LLC for the property.

      *   The county currently owes $23,775,798 (divided into $10,350,000 tied to
      the 2014 General Obligation Warrant and $13,425,798.99 remaining on a $15 million
      loan from its oil and gas trust fund).

      *   Improvements made using the Growing Alabama Tax Credit Program amounted
      to $12.5 million, which should have been done at the time of purchase.


      THE PIVOT:

      *   Article 2 provides specific financial transaction details (payments to trusts/companies,
      outstanding debt structure) that substantiate the allegations in Article 1 regarding
      mismanagement and lack of accountability related to the Mega Site funds.

      *   It connects Lawson’s claims of "shovel ready" status with documented evidence
      of ongoing, unaudited spending and debt accrued over a decade.


      KEY ENTITIES:

      *   Lee Lawson (CEO, BCEDA)

      *   Baldwin County Economic Development Alliance (BCEDA)

      *   Fairhope City Council

      *   Baldwin County Commission

      *   School Board

      *   Chris Elliott (Tax man)

      *   Ron Cink (Budget Director)

      *   Crosby Trust

      *   Catawba Land Company LLC

      *   Growing Alabama Tax Credit Program'
    generated_at: '2026-07-10T23:51:00.884911Z'
