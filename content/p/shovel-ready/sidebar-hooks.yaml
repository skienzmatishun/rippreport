      of Commerce.


      THE DISCOVERY:

      *   In January, commissioners and BCEDA announced failure to find a tenant.

      *   All mega-sites in the southeast have been sold.

      *   There is NO SIGN at the Mega Site; only a cattle gate and palm trees are
      present.

      *   The land is deemed unsuitable for development (700 hundred acres are not
      suitable).


