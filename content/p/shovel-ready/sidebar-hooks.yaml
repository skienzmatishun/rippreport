  all-smoke-and-mirrors:
    brief: 'THE CONFLICT:

      *   Baldwin County Economic Development Alliance (BCEDA) promotes the Mega Site
      as "shovel ready."

      *   Lee Lawson spoke to the Fairhope City Council regarding support for the
      Fairhope Airport and K-1 School.

      *   County Commission and School Board passed a 1% tax without a public vote,
      taking money from schools for county infrastructure.


      THE DISCOVERY:

      *   The Mega Site (Baldwins 3000 acres, cost $32 million) remains vacant after
      five years; lost opportunity is estimated at $50 million.

      *   The County Commission and Economic Development Alliance are awaiting a buyer
      for the site, potentially worth $350 Million.

      *   The Fairhope Airport Authority uses debt (21% of city debt) and legal means
      to control ownership and discredit citizens filing complaints against the Authority
      board members.


      THE PIVOT:

      *   Article 2 proves that claims made by BCEDA regarding the Mega Site are based
      on promises, not facts, by detailing the lack of sales and the financial manipulation
      within related bodies (Airport Authority).


      KEY ENTITIES:

      *   Lee Lawson

      *   Baldwin County Economic Development Alliance (BCEDA)

      *   Fairhope City Council

      *   Mega Site (Baldwins 3000 acres)

      *   Fairhope Airport Authority

      *   County Commission

      *   School Board

      *   Limestone County

      *   Chris Elliott'
