  captain-jack-at-the-controls:
    brief: 'THE CONFLICT:

      - Jack Burrell held Fairhope City Council Presidency for 9 years.

      - March: Burrell canceled video broadcasts of Fairhope Airport Authority meetings
      to the public without explanation.

      - November: Burrell resigned Presidency abruptly, returning to single Council
