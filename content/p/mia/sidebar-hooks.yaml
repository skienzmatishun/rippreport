  baldwin-county-un-family-court:
    brief: "*   Wait, the instruction asks for \"The Conflict\" (What happened in\
      \ the past?) based on the text provided.\n        *   Article 2 (Widget) defines\
      \ the historical conflict: Ripp reporting on Judge Thomasson/BCFC since 2018.\n\
      \        *   Article 1 (Main) defines the recent event: Meta lockout + Author\
