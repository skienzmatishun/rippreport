  fairhope-voters-guide:
    brief: 'THE CONFLICT

      *   Article 1 proposes changing Fairhope government to a Council-Manager form
      of government to fight corruption, unethical activity, and political games.

      *   The current system has reportedly failed for the last 12 years (Article
      1).

      *   Past events include election tampering complaints filed with the Alabama
      Secretary of State Office regarding voting cycles in 2008 and 2012.

      *   In 2016, incumbent Mayor Timothy Kant was defeated by Mayor Wilson.


      THE DISCOVERY

      *   The current Council is populated by individuals selected by the previous
      mayor and his "compromised minions" who favor the building/development industry.

      *   Council members (e.g., Jack Burrell) have a history of corruption, including
      bid rigging, lying about the Triangle lawsuit, and using public office for personal
      gain (e.g., securing contracts worth close to a million dollars).

      *   Kevin Boone and Scott Boone (CATALYST) are linked to land fraud and recruiting
      candidates to control city affairs through LLCs.


      THE PIVOT

      *   Article 2 provides specific evidence of how the current Council structure—dominated
      by self-serving politicians ("CATALYST") who engage in corruption and land deals—is
      precisely what the proposed Council-Manager system is designed to prevent (removing
      special interests from controlling votes).

      *   The actions of figures like Jack Burrell (corruption/bid rigging) and Kevin
      Boone (land fraud/recruitment) demonstrate why a non-political, professional
      management structure is necessary.


      KEY ENTITIES

      *   Council-Manager Form of Government

      *   November 06, 2018 (Election date mentioned in context)

      *   Timothy Kant (Incumbent Mayor)

      *   Karin Wilson (First woman Mayor)

