  catalyst-held-back:
    brief: 'THE CONFLICT:

      *   Baldwin County election voter turnout was 24% (36,073 votes out of 150,104
      registered voters).

      *   Catalyst sponsored 8 candidates but won only three positions; two were losses
      and three were in runoff elections.

      *   The Probate Judge race was a loss for Catalyst.


      THE DISCOVERY:

      *   Catalyst had over $500,000 thousand dollars behind their candidates, while
      the People’s Choice had less than $10,000.

      *   Catalyst secured one County Commission win (District No. 1, Jeb Ball beat
      Frank Burt by 1000 votes) and one Place 2 win (Joe Davis beat John Lake by 1%).

      *   The People’s Choice won Commissioner District 3 with Billie Joe Underwood
      against Tucker Dorsey (who trailed by 10%).

      *   People’s Choice advanced in multiple races Catalyst lost, including State
      Senate Seat 32 (David Northcutt vs. People’s Choice).


      THE PIVOT:

      *   Article 2 proves that Catalyst''s financial superiority ($500,000 thousand
      dollars) did not translate into electoral success, highlighting the disparity
      between funding and outcomes.

      *   Article 2 shows that the People’s Choice was effective across multiple races
      (District 3, State Senate Seat 32), suggesting that money is not the main factor
      in these elections.


