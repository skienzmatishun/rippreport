      THE DISCOVERY:

      *   Resolution 28 authorized the Council President to execute a Conservation
      Easement Agreement between the City of Fairhope and Weeks Bay Foundation, Inc.
      for two conservation easements on the Dyas/Triangle property.

      *   The total cost for this easement transaction was $39,025.00.


      THE PIVOT:

      *   Article 2 reveals that the land robbery detailed in Article 1 was executed
      through a specific official action (the Conservation Easement Agreement) approved
      by the Council, linking the alleged political corruption directly to the land
      seizure.


