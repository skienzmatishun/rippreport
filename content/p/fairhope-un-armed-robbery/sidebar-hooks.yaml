      *   The council used city accounts to obtain the $2.65 million purchase, leading
      to budget delays.

      *   All five city council members appointed the Municipal Judge and City Attorney,
      creating a conflict of interest regarding future development projects.

      *   Council members received hidden family insurance packages valued at $17,000
      a year, which were only exposed by the Mayor.


      THE PIVOT

      *   Article 2 provides specific evidence of systemic corruption (land theft/misappropriation
      of funds and conflict of interest via appointments) that proves the allegations
      in Article 1 regarding the Council''s actions and involvement in robbing Fairhope
