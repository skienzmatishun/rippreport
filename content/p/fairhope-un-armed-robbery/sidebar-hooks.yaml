    generated_at: '2026-07-10T21:17:37.362177Z'
    text: Fairhope’s latest $20 million land heist didn't happen by accident; the
      City Council signed the papers in broad daylight. Resolution 28 reveals the
      exact moment Council President Burrell and Diana Brewer finalized the deal that
      handed our property to the Weeks Bay Foundation.
  catalyst-colors:
    brief: 'THE CONFLICT

      *   The Weeks Bay Foundation and Fairhope City Council are accused of robbing
      Fairhope of $20 million and 106 acres of land.

      *   Diana Brewer (Weeks Bay) and Burrell (Council President) are cited as driving
