  baldwin-county-family-court:
    brief: 'THE CONFLICT

      *   District Judge Michelle Thomason issued 50/50 custody decisions causing
      family hardship.

      *   Thomason was accused of turning divorce and child custody cases into a "cottage
      industry" supplying attorneys with cases that take years to resolve.

      *   Thomason had as many as six complaints filed against her in the last 18
      months, all dismissed by the Judiciary.

      *   Thomason was criticized for allowing attorneys to illegally obtain medical
      records from opposing parties.


      THE DISCOVERY

      *   Article 2 reveals specific instances of judicial misconduct: Thomason ordered
      medical records sent to the clerk''s office while simultaneously allowing opposing
      attorneys to illegally pull certified copies without proper notification or
      consequence.

      *   Thomason mandated psychological evaluations that contradicted expert testimony,
      ignoring recommendations regarding custody.

      *   Thomason allowed attorneys to obtain evidence and witness testimony by breaking
      the law (e.g., allowing parties on the stand to be accused of perjury without
      consequence).


      THE PIVOT

      *   Article 2 provides concrete examples of how Thomason''s rulings create the
      "cottage industry" effect described in Article 1, specifically demonstrating
      methods used to violate legal procedures (medical records, expert testimony)
      and enabling unethical attorney behavior.

      *   The specific actions detailed in Article 2 serve as the evidence supporting
      the general criticism of her bad judgment and failure to uphold judicial ethics
      mentioned in Article 1.


