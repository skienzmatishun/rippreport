  baldwin-county-family-court:
    brief: 'THE CONFLICT

      - District Judge Michelle Thomason faced repeated complaints regarding her rulings
      and conduct within Baldwin County Family Court for years.

      - Complaints (up to six in the last 18 months) alleged systemic issues including
      "50/50 decisions on custody" leading to family hardships, unfavorable treatment
      of pro se litigants, refusal to allow admissible evidence, and failure to penalize
      perjury.

      - Judge Thomason was criticized for issuing status quo orders at case beginnings
      that immediately forced joint physical custody even when parental relationships
      did not support a 50/50 arrangement.


      THE DISCOVERY

      - Judge Thomason announced she is running for the Court of Appeals position
      vacated by Craig Pittman’s retirement in Baldwin County.

      - The second article characterizes her as having "dirty politics" and possessing
      a track record of using the Republican party to eliminate or retaliate against
      opponents.

      - She is identified as a charter member of the Board of Baldwin Substance Abuse
      Services, a non-profit criticized for lacking transparency regarding how collected
      fees from DUI/drug cases are used.


      THE PIVOT

      - Article 1 detailed specific legal and judicial failings within her courtroom
      (the "cottage industry" problem).

      - Article 2 provides context by showing Judge Thomason’s willingness to use
      a political platform—running for Court of Appeals—to maintain influence or move
      beyond the scrutiny of the Family Court, thus confirming her reputation as politically
      motivated.


      KEY ENTITIES

      - Michelle Thomason (District Judge)

      - Baldwin County Family Court / DR/Family Court

      - Craig Pittman (Retiring CA Judge)

      - Roy Moore (Mentioned regarding Judiciary workload in Article 1)

      - Steven Johnson (Attorney mentioned to avoid)

      - Floyd, Bishop, Norton, and Taylor (Circuit Judges involved in procedural changes)

      - Baldwin Substance Abuse Services Board'
