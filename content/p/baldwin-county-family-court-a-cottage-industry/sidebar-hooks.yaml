      - Presiding Judge Floyd implemented changes to prevent Judge Thomason from controlling
      temporary custody/support hearings.


      THE DISCOVERY

      - Bill Scully, appointed after serving on Veterans Court as Catalyst Queen Michelle
      Thomason''s associate, is now facing public scrutiny for judicial misconduct
      in his role as District Judge Place 2.

      - On February 26th [Year implied], Judge Scully signed an illegal order of Ejectment
      requiring the Baldwin County Sheriff’s Department to remove Mr. Robert Yates,
      Jr. from his Mobile home in Barnwell.

      - This erroneous ejectment order triggered a shootout resulting in the death
      of Robert Yates, Jr., putting law enforcement at risk.


      THE PIVOT

      - Article 1 establishes Michelle Thomason''s role as the "Catalyst Queen" associated
      with Family Court controversies and judicial malpractice complaints; Article
      2 reveals her specific political influence by detailing how she facilitated
      Bill Scully''s appointment (Veterans Court to District Court).

      - This shows that while Thomason is criticized for biased family court decisions,
      she also used her power within the Catalyst structure to promote "chosen ones"
      like Judge Scully, who subsequently exceeded his judicial authority and committed
      an illegal act leading directly to a death.


      KEY ENTITIES

      - Michelle Thomason (District Judge / "Catalyst Queen")

      - Bill Scully (Veterans Court Judge / District Judge Place 2)

      - Catalyst (Political organization founded around 2018/2020, promoting judicial
