  baldwin-county-un-family-court:
    brief: 'THE CONFLICT

      *   Judge Michelle Thomason issued 50/50 custody decisions causing hardship
      in Baldwin County Family Court.

      *   Thomason’s status quo orders forced joint physical custody when 50/50 relationships
      did not exist.

      *   Changes were made by Judge Floyd and others regarding the assignment of
      answer/waiver divorces and temporary motions for Judge Thomason/Judge Bosch
      cases.

      *   Thomason was removed from control of the domestic violence docket.


      THE DISCOVERY

      *   The Baldwin County Family Court (BCFC) received well over one hundred complaints
      against Judge Michelle Thomasson since 2018.

      *   Complaints cited poor decisions, favoritism for "bottom feeding attorneys,"
      and arbitrary child visitation schedules.

      *   One complaint specifically claimed a child suicide was credited to Thomason''s
      decision to split children from the mother.


      THE PIVOT

      *   Article 2 proves that Article 1''s current critique of Thomason’s judgment
      is part of a sustained, documented pattern of complaints against her court system
      dating back to at least 2018.

      *   Article 2 establishes the volume and severity (including claims of physical/emotional
      damage) of judicial misconduct referenced generally in Article 1.


