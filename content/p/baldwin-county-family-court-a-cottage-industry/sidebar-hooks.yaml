  shackled-chained-handcuffed-bc-un-family-court:
    brief: '**THE CONFLICT:**

      *   District Judge Michelle Thomason faced consistent complaints regarding her
      rulings in Baldwin County Family Court, specifically concerning mandated 50/50
      custody decisions and potential violations of judicial ethics Canons.

      *   The local legal system is described as a "cottage industry," where divorce
      cases routinely span up to 12 years due to prolonged litigation by attorneys.

      *   Initial changes implemented (by Judge Floyd) were intended to prevent Thomason
      from setting initial temporary custody or status quo orders, which she had often
      forced joint physical custody upon without evidence of a shared relationship.


      **THE DISCOVERY:**

      *   A specific case involving Chey Garrigan provides documentation of systemic
      failure and judicial misconduct under Judge Michelle Thomason’s purview.

      *   The case reveals that Attorney Steven Johnson (and his associate Buddy Brackin)
      successfully leveraged legal maneuvers, rubber-stamped by Judge Thomason, to
      deny custody/visitation to Ms. Garrigan despite expert testimonies suggesting
      she was fit for visitation.

      *   Ms. Garrigan experienced a severe miscarriage of justice culminating in
      her being arrested and later held "shackled, chained and handcuffed" under a
      different judicial process following years of legal attempts that failed due
      to the alleged influence and competence issues within Thomason’s court.


      **THE PIVOT:**

      *   Article 1 identifies broad systemic problems—judge bias, cottage industry
      abuse, lack of accountability.

      *   Article 2 acts as the ''smoking gun'' by providing a specific, named case
      (Garrigan) that demonstrates how these general failings manifest: demonstrating
      the direct collusion or inaction between Judge Thomason and "roach" attorneys
      like Steven Johnson to strip a mother of her parental rights despite positive
      legal input.


      **KEY ENTITIES:**

      *   Michelle Thomason (District Judge)

      *   Chey Garrigan (Plaintiff/Victim in cited case)

      *   Steven Johnson (Attorney of record/alleged ''roach attorney'')

      *   Buddy Brackin (Attorney)

      *   Judge Floyd (Presiding Judge who instituted procedural changes)

      *   John Merrill (Alabama Secretary of State, defendant in related federal suit
      by Burdick)

      *   Austin Burdick (Plaintiff in lawsuit contesting judicial appointment)

      *   Tom Albritton (Executive Director of the Ethics Commission/target of corruption
      allegations)

      *   Jody Bishop (Judge involved in later stages of Garrigan’s case)

      *   Larry Fison (Director, Strickland youth center, reported fit for visitation
      in Thomason''s court)

      *   Fairhope Police (Department involved in initial arrest of Chey Garrigan)'
