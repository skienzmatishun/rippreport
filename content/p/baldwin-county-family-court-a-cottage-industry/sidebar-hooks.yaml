  catalyst-judges:
    brief: 'THE CONFLICT:

      *   District Judge Michelle Thomason issued 50/50 custody decisions causing
      family hardship; she allegedly favored *pro se* litigants and asked questions
      on their behalf.

      *   Thomason was removed from the domestic violence docket in 2017.

      *   Judge Bill Scully was appointed partly due to the backing of Catalyst Queen
      Michelle Thomason.

      *   Scully used his Veterans Court position to secure a District Court appointment
      through connections established by Thomason.


      THE DISCOVERY:

      *   Judge Bill Scully made an erroneous order of Ejectment on February 26th,
      ordering the Baldwin County Sheriff’s Department to remove Robert Yates, Jr.,
      which led to a shootout and Yates'' death.

      *   Judge Scully ignored the 2011 DUI interlock law requirements for defendants
      (BAC over .15 or refusal to test), putting public safety at risk.

      *   Catalyst works to protect judges through political control.


      THE PIVOT:

      *   Article 2 reveals that Michelle Thomason was instrumental in securing Judge
      Bill Scully''s judicial appointment, linking the systemic issues and judicial
      appointments mentioned in Article 1.

      *   This connection suggests a pattern of patronage or undue influence influencing
      judicial decisions and career progression within Baldwin County.


      KEY ENTITIES:

