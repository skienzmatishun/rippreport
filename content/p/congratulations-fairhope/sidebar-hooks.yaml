hooks:
  fauxhope:
    brief: 'THE CONFLICT

      *   Mayor Kant proposed buying the Triangle property, costing the city $11.25
      million, and proposing to buy land involved in the Breland case without mentioning
      sewer infrastructure.

      *   The city''s previous Comprehensive Plans were failures that favored developers
      over infrastructure.


      THE DISCOVERY

      *   $20 million in BP funds were allocated for projects (including $6.2 million
      for a waterfront project and $10 million for sewer projects) which were later
      subject to significant delays, political changes, and flaws (e.g., failing to
      meet ADA compliance).

      *   The city acquired the K-1 Center property from the Baldwin County Board
      of Education in 2019 for $2.5 million, demonstrating questionable land use decisions.

      *   Specific requirements stemming from a sewer lawsuit mandate that the city
      develop an SSO response plan and public notification plan, which they failed
      to do previously.


      THE PIVOT

      *   Article 1 celebrates the approval of $20 million in BP funds; Article 2
      reveals that the execution of these projects was plagued by political distortion,
      planning failures, and a focus on development over necessary infrastructure
      (e.g., ignoring ADA compliance or placing electric substations in residential
      areas).

      *   Article 2 proves that even with massive funding, the municipal leadership
      failed to properly manage the project scope and ignored community needs for
      long-term sustainability.


      KEY ENTITIES

      *   Mayor Wilson

      *   Sherry Botop (Economic Director)

      *   Wayne Dyess (Fairhope Planning Director)

      *   Former Mayor Kant

      *   Senator Trip Pittman

      *   Council President Burrell

      *   Jay Robinson

      *   Speed of the Leaf River Group (developers)

      *   Jack Burrell

      *   Baldwin County Board of Education'
