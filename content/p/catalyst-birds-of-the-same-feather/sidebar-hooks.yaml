  catalyst-players:
    brief: 'THE CONFLICT

      *   Catalyst was formally founded by Stacy Elliott and Haygood.

      *   Catalyst morphed when Chris Elliott became a County Commissioner and Haygood
      became Mayor of Daphne.

      *   Catalyst seeks to control numerous positions: Probate Judge, State Senate,
      and all four Baldwin County commission races.

      *   Catalyst uses intimidation tactics to discourage non-aligned candidates.

      *   Tim Kant supported the Fly Creek Apartments development despite public opposition.


      THE DISCOVERY

      *   In 2018, Catalyst almost achieved a political coup by running candidates
      in almost every Baldwin County race.

      *   The Fairhope Municipal Council in 2016 was composed of CATALYST members.

      *   The city attorney and municipal Judge were appointed by the council and
      are affiliated with CATALYST.


      THE PIVOT

      *   Article 2 proves that Catalyst''s influence extends beyond candidate selection
      (Article 1) to institutional control, specifically showing that the city attorney
      and municipal judge positions were directly controlled by the Catalyst-affiliated
      council members.

      *   This confirms the claim in Article 1 that Catalyst uses legal staff to protect
      its interests.


