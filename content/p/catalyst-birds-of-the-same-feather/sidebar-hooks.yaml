  catalyst-meets-social-media:
    brief: 'THE CONFLICT

      *   Catalyst was founded by Stacy Elliott and Haygood when Chris Elliott became
      County Commissioner and Haygood became Mayor of Daphne.

      *   Catalyst seeks to control positions including County Commission, Probate
      Judge, State Senate, and District Judge.

      *   Catalyst uses intimidation and bully tactics to discourage non-aligned candidates.

      *   Catalyst supported Joe Davis for District Two and Tim Kant, who was linked
      to the Fly Creek Apartments development against public opposition.


      THE DISCOVERY

      *   Social media has exposed Catalyst’s goals and players, causing them to reel.

      *   Catalyst lost members Thomasson and Dorsey.

      *   Stacy Elliott''s performance garnered only a 700 vote margin against David
      Northcutt.

      *   Rumors suggest Chris Elliott may face indictments regarding real estate
      deals.

      *   Mayor Haygood instructed city workers to destroy fiber optic cable feeds
      due to anger over social media activity.


      THE PIVOT

      *   Article 2 proves that Catalyst''s influence, previously operating in the
      shadows, has been exposed by social media, forcing the Baldwin County Republican
      Party to acknowledge they have been "hijacked."

      *   The exposure of internal failures (Elliott’s vote margins and loss of members)
      demonstrates the fragility of the established structure described in Article
      1.


