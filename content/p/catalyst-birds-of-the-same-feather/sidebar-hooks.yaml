hooks:
  catalyst-candidates:
    brief: 'THE CONFLICT

      *   Catalyst originated with Stacy Elliott and Haygood.

      *   Catalyst evolved when Chris Elliott became a county commissioner and Haygood
      became the Mayor of Daphne.

      *   Catalyst seeks to place candidates in numerous positions (County Commission,
      Probate Judge, State Senate, District Judge).


      THE DISCOVERY

      *   The official list of 2018 Local and State Candidates was altered by the
      inclusion of "Catalyst Candidates" and Michelle Thomason, referred to as "The
      Catalyst Queen," for the Court of Civil Appeals office.


      THE PIVOT

      *   Article 2 proves that Catalyst is actively influencing or manipulating the
      official candidate list for mid-term elections leading up to the June 9, 2018
      primary.


      KEY ENTITIES

      *   Catalyst

      *   Stacy Elliott

      *   Haygood

      *   Chris Elliott

      *   Joe Davis

      *   Tim Kant

      *   John Lake

      *   Baldwin County Commission

      *   Probate Judge

      *   State Senate

      *   District Judge

      *   Michelle Thomason (The Catalyst Queen)

      *   June 9, 2018'
    generated_at: '2026-07-11T05:38:12.982317Z'
  catalyst-top-dogs:
    brief: 'THE CONFLICT

      *   Catalyst is a political group in Baldwin County that hand-picks candidates
      for positions including County Commissioner, Probate Judge, State Senate, and
      District Judge.

      *   Catalyst originated with Stacy Elliott and Haygood and morphed when Chris
      Elliott became County Commissioner and Haygood became Mayor of Daphne.

      *   Catalyst uses intimidation tactics to discourage non-aligned candidates.

      *   Tim Kant supported Joe Davis for District Two and supported the Fly Creek
      Apartments development, potentially prioritizing developers over community/environmental
      interests.


      THE DISCOVERY

      *   Catalyst is currently supporting Tucker Dorsey for Baldwin County Commission
      and Chris Elliott for the State Senate race.

      *   Tucker Dorsey''s vote is linked to Clarence Burke and Baldwin County Sewer
      and various LLCs he is affiliated with.

      *   Chris Elliott is allegedly covering for Tucker Dorsey regarding the Mega
      "Dump" site, which cost taxpayers over $32 million.

      *   Elliott and Dorsey are accused of self-serving behavior and limiting public
      access to the Bay.


      THE PIVOT

      *   Article 2 reveals that the political maneuverings described in Article 1
      (Catalyst control over offices) are actively being executed through specific
      endorsements (Dorsey/Elliott) tied directly to controversial financial dealings
      (Mega Site costs, sewer LLCs).

      *   Article 2 connects the individuals cited as ''Catalyst dogs'' (Dorsey and
      Elliott) directly to the financial interests and infrastructure issues (sewer
      system, Mega Site funding) that fueled Catalyst''s power structure described
      in Article 1.


      KEY ENTITIES

      *   Catalyst

      *   Chris Elliott

      *   Stacy Elliott

      *   Haygood

      *   Joe Davis

      *   Tim Kant

      *   John Lake

      *   Tucker Dorsey

      *   Clarence Burke

      *   Mega-Site

      *   Fly Creek Apartments

      *   Baldwin County Commission

      *   State Senate

      *   Baldwin County Sewer LLCs

      *   Summerdale 13040 Underwood Rd.'
    generated_at: '2026-07-11T05:38:12.982326Z'
  catalyst-does-baldwin-county:
    brief: 'THE CONFLICT:

      *   Catalyst is a political structure in Baldwin County involving Stacy Elliott
      and Haygood (who became Mayor of Daphne).

      *   Catalyst seeks control over positions including County Commission, Probate
      Judge, State Senate, and District Judge.

      *   Catalyst uses intimidation and bully tactics to select candidates who support
      "good ole boys."

      *   Tim Kant supported the Fly Creek Apartments despite public opposition.


      THE DISCOVERY:

      *   Chris Elliott is an architect of Catalyst and is currently running for the
      State Senate Seat 32.

      *   Elliott sold his business and gave up his County commission seat for what
      he considered a political opportunity.

      *   Elliott is described as being "bought and paid for."

      *   Catalyst lost Fairhope, and they are now facing losing the State Senate
      seat due to conflict with Mayor Karin Wilson.


      THE PIVOT:

      *   Article 2 identifies Chris Elliott as an architect of Catalyst, proving
      his direct involvement in the political equation described in Article 1.

      *   Article 2 details how Elliott’s career moves (selling his business, seeking
      the State Senate Seat 32) serve as a manifestation of Catalyst''s goal to secure
      control over key offices.


      KEY ENTITIES:

      *   Chris Elliott

      *   Stacy Elliott

      *   Haygood

      *   Chris Elliott (as Catalyst Candidate)

      *   Tim Kant

      *   John Lake

      *   Sheriff Hoss Mack

      *   School Superintendent Eddie Tyler

      *   Karin Wilson (Mayor)

      *   David Northcutt'
    generated_at: '2026-07-11T05:38:12.982335Z'
  catalyst-intimidation-a-pig-pen:
    brief: 'THE CONFLICT

      Catalyst originated with Stacy Elliott and Haygood, evolving when Chris Elliott
      became county commissioner and Haygood became Mayor of Daphne. Catalyst aims
      to control positions including County Commission, Probate Judge, State Senate,
      and District Judge in Baldwin County. Scott Boone is at the helm.


      THE DISCOVERY

      Catalyst operates as a Fairhope-based operation using media (Gulf Coast Courier/Chuckee
      Cheeze) to spread rumors and destabilize local government. Catalyst uses intimidation
      tactics, such as having non-Catalyst candidates'' signs disappear, to discourage
      opposition.


      THE PIVOT

      Article 2 proves that the political control described in Article 1 is maintained
      through specific operational methods: using media manipulation (Chuckee Cheeze)
      and internal bullying strategies centered around "Baby" Boone''s leadership
      structure.


      KEY ENTITIES

      Catalyst, Stacy Elliott, Haygood, Chris Elliott, Scott Boone, Kevin Boone, Baby
      Boone, Joe Davis, Tim Kant, John Lake, Chuckee Cheeze, Fairhope Councilman Kevin
      Boone, Baldwin County, Fly Creek Apartments, The Ripp Report.'
    generated_at: '2026-07-11T05:38:12.982340Z'
  catalyst-held-back:
    brief: 'THE CONFLICT:

      *   Catalyst originated with Stacy Elliott and Haygood, morphing when Chris
      Elliott became County Commissioner and Haygood became Mayor of Daphne.

      *   Catalyst functions by hand-picking candidates for maximum placement in races
      (County Commission, Probate Judge, State Senate).

      *   Catalyst uses intimidation and bully tactics to discourage non-aligned candidates.

      *   Catalyst had over $500,000 thousand dollars behind its candidates but only
      secured three wins.


      THE DISCOVERY:

      *   Only 24% of registered voters voted in the election.

      *   The People’s Choice successfully countered Catalyst''s funding advantage.

      *   Specific election results showed People''s Choice winning races against
      Catalyst candidates (e.g., Joe Davis beat John Lake; Billie Joe Underwood beat
      Tucker Dorsey; Jody Wise Campbell beat Mark Stejskal).


      THE PIVOT:

      *   Article 2 provides the specific electoral data demonstrating that despite
      Catalyst’s substantial funding and political strategy, they failed to secure
      key positions and lost races against People’s Choice candidates.

      *   The election results prove the practical failure of Catalyst''s method of
      control versus the voters'' preference.


