  catalyst-aka-scott-boone-consulting:
    brief: 'THE CONFLICT:

      *   Catalyst originated from Stacy Elliott and Haygood.

      *   It evolved when Chris Elliott became County Commissioner and Haygood became
      Mayor of Daphne.

      *   Catalyst sought control over positions including County Commission, Probate
      Judge, State Senate, and District Judge.

      *   Catalyst used intimidation tactics to discourage opposition candidates in
      Fairhope.

      *   Joe Davis district two was supported by Catalyst and Tim Kant, who pushed
      for the Fly Creek Apartments despite public opposition.


      THE DISCOVERY:

      *   Catalyst rebranded as Scott Boone Consulting.

      *   Scott Boone is the individual running Catalyst and is hiding behind the
      consulting name.

      *   Catalyst/Scott Boone Consulting is financed by developers and landowners
      seeking profit from unbridled development.

      *   The group operates under a code called "Good ole Boys," characterized by
      ignoring conflicts of interest and using inside information for public contracts.

      *   Catalyst operations are structured like a criminal enterprise, using complex
      layers of LLCs to conceal actors and insulate liability.


      THE PIVOT:

      *   Article 2 proves that Catalyst is not merely a political group but an entity
      driven by financial interests (developers/landowners).

      *   Article 2 reveals the underlying structure (Scott Boone Consulting) and
      motivation (profit from development) behind the political maneuvering described
