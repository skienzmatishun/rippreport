  catalyst-eat-their-own:
    brief: 'THE CONFLICT:

      *   Catalyst was formalized by Stacy Elliott and Haygood.

      *   The organization became Catalyst when Chris Elliott became a county commissioner
      and Haygood became the Mayor of Daphne.

      *   Catalyst operates by hand-picking candidates for positions including Probate
      Judge, State Senate, and all four Baldwin County commission races.

      *   Scott Boone (son of Fairhope Councilman Kevin Boone) leads Catalyst.


      THE DISCOVERY:

      *   Jennifer Fidler and Sherry Sullivan are identified as "CATALYST true bloods."

      *   Fidler and Sullivan were fired from city posts by then-Mayor Karen Wilson
      in 2017.

      *   Fidler and Sullivan later became top policy makers, with Councilman Kevin
      Boone acting as chief informer for Catalyst.

      *   Sullivan was rewarded with a raise and a second check as head of utilities
      after being elected.


      THE PIVOT:

      *   Article 2 proves that key figures within the local government (Fidler and
