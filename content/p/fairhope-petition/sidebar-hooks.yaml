      of city property until a scheduled land use plan was completed.

      *   The Council and Weeks Bay attempted to transfer control and management of
      106 acres, valued at $20 million, without public input.

      *   The Council is allegedly using a false narrative that the land was purchased
      for a park, when it resulted from a legal settlement where the city lost and
      had to buy the property.


      THE DISCOVERY

      *   The existence of political maneuvering by the City Council (and Weeks Bay)
      regarding the $20 million property transfer is linked to attempts to circumvent
      public participation.

      *   There is an active call for citizens to vote "YES" in a move called "Move
      Fairhope Forward."


      THE PIVOT

      *   The Widget Article provides a specific electoral date (November 6th, 2018)
      and a political movement ("Move Fairhope Forward"), suggesting that the outcome
      of this election is connected to the issues surrounding city property control
      and land use decisions detailed in the Main Article.


      KEY ENTITIES

      *   Fairhope City Council

