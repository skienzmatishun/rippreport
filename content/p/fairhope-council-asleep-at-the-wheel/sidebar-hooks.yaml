      - Resolution 7: Council voted to postpone all public hearings (Council, Planning Commission, Board of Adjustments) citing limitations on gatherings and Governor's orders.
      - Council President Jack Burrell confirmed cancellation of public participation during the COVID-19 "stay at home order."
      - Resolution 8: Council President Jack Burrell authorized to negotiate Environmental Site Assessment on Clock Corner property for up to $10,000.
      - Resolution 12: Mayor Karin Wilson authorized debris removal contract extension with Crowder Gulf, LLC for one year.
      - Resolution 16: Purchase approved for E-ONE Custom Rescue Pumper Fire Truck; City pays $331,000 impact fees.
      - Mayor Karin Wilson rejected Tripp Pittman's vendor contract despite Council President Burrell advocating for the relationship.
      - Mr. Brown suggested a "party" with bands and closed streets celebrating return to work; Burrell approved concept.
      - Brown linked party idea to Sherry Sullivan, previously cited as a former city employee with short tenure.

      THE PIVOT:
      - Article 2 validates "Asleep at the wheel" accusation via Resolution 7: Sudden removal of public oversight on health matters aligns with Article 1’s criticism of unsafe decision-making.
      - Discussion of parties and bands (Brown/Burrell) during pandemic lockdown directly correlates to Article 1’s warnings regarding unsafe large gatherings for the Festival.
      - Mayor Wilson's rejection of Pittman contract confirms her control over contracts as claimed in Article 1, contradicting Burrell’s attempts to renew legacy vendor deals.
      - Short meeting duration and closed public hearings prove lack of transparency and accountability detailed in Article 1.

