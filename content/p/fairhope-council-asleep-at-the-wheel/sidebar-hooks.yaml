hooks:
  fairhope-sold-to-the-highest-bidder:
    brief: |-
      1. THE CONFLICT:
         - Fairhope City Council (CATALYST) accused of negligence regarding COVID-19 prep, HB203 annexation risks, and Fly Creek Apartments traffic.
         - Mayor Karin Wilson (Main Article) complains Council is too quiet ("asleep at the wheel") while she handles public crisis response.
         - Widget Article accuses Council of financial corruption and reckless spending on recreational land while ignoring urgent infrastructure/traffic.
         - HB 203 passed House last week; threatens to allow annexation of property without consent under "Barnwell Landmark District."
         - Fly Creek (Retreat at Fairhope Village) project causing Parker Road congestion; Mayor says Council sided with developer despite opposition.

      2. THE DISCOVERY:
         - Widget Article proves financial mismanagement behind the "inaction" claims in Article 1:
           - Council proposed purchasing 113 acres for recreation land at $2.65 million via questionable appraisal during budget process.
           - Purchase drains 5 capital improvement funds needed for urgent facility needs and new ballparks.
           - Council ignores Mayor Wilson’s budget warnings about capital funding shortages.
         - Widget reveals specific corruption allegations:
           - Council voted themselves full family insurance.
           - Past deal regarding 105 acres ("Triangle") cost taxpayers $13 million in lawsuit losses.
           - Bought K-1 Center but has no funds to complete project due to budget choices.
         - Fly Creek Apartments confirmed: 240 units behind Publix; scheduled to rent buildings as completed to avoid immediate traffic monitoring.

      3. THE PIVOT:
         - Widget Article is the "smoking gun" explaining *why* the Council in Article 1 appears asleep.
         - Widget links HB203 fears (Article 1) to density concerns: 566 apartments + commercial development draining downtown vs. Council spending millions on idle parkland (Boone Burrell/Brown deal).
         - Widget proves Council prioritized the "Three Bs" land purchase over traffic mitigation and facility upgrades that Mayor Wilson publicly warned were needed.
         - Widget confirms Mayor Wilson is isolated: Council ignores her warnings on Fly Creek traffic and budget impacts, supporting the claim that she cannot govern effectively.

      4. KEY ENTITIES:
         - Karin Wilson (Mayor of Fairhope)
         - CATALYST Council
         - HB 203 (State Bill by Baldwin County delegation)
         - Boone Burrell and Brown (Council members pushing $2.65M land deal)
         - Cory Martin (Council member/City staff ignored by Council)
         - Retreat at Fairhope Village / Fly Creek Apartments (240 units, behind Publix)
         - Barnwell Landmark District
         - K-1 Center (Underfunded facility)
    generated_at: '2026-03-20T11:49:32.116363Z'
    text: Mayor Wilson claims the Catalyst Council is asleep at the wheel while Fairhope drowns in traffic and annexation threats. This discovery proves Burrell and Brown aren't sleeping; they're busy blowing $2.65 million on useless land while the K-1 Center sits empty and Fly Creek developers run the show.
  the-fairhope-jester:
    brief: |-
      THE CONFLICT:
      Fairhope CATALYST City Council accused of inaction during COVID-19 pandemic and prior municipal mismanagement.
      Mayor Karin Wilson warned about potential virus exposure at Fairhope Arts & Crafts Festival eight days before scheduled start; Council remained quiet.
      Council sided with developers regarding Fly Creek Apartments (240-unit Retreat at Fairhope Village) while Mayor Wilson opposed project.
      Traffic study for apartments relies on 2016 data despite growing congestion at Parker Road and U.S. 98 intersection.
      Fly Creek project continues construction and traffic mitigation was not completed before Certificate of Occupancy was granted.

      THE DISCOVERY:
      Councilman Robert Brown publicly opposed restrictions during pandemic; posted on Facebook (April Fool post) that he is "against any further restrictions."
      Brown explicitly stated he was against the shelter in place order.
      Robert Brown and Councilman Boone, along with Burrell, spent $2.65 million on recreation land no one wanted; leased for farming at $9,000/year.
      Councilman Robert Brown involved in decision to give away triangle property costing taxpayers $13 million.
      Robert Brown claimed Ethics Commission approved his bid for Art Center; investigation claims he was the ONLY bidder.
      Complaint filed with Attorney General, Mobile FBI, and Alabama Ethics Commission regarding Robert Brown using office for personal gain.

      THE PIVOT:
      Article 1 identifies the Council (CATALYST) as ignoring safety/traffic concerns; Article 2 names Robert Brown and Burrell as the specific members driving that agenda.
      Article 1 cites Council’s alignment with developers despite traffic/health fallout; Article 2 proves this via Brown backing Fly Creek apartments resuming work regardless of worker safety.
      Article 1 highlights Mayor Wilson prioritizing health/traffic studies; Article 2 shows Councilman Brown dismissing those concerns by prioritizing "personal freedoms" and reopenings.
      Article 2 exposes financial corruption (land deals) that justifies Article 1’s claim the Council is "self-serving" rather than acting in constituent interest.

      KEY ENTITIES:
      Karin Wilson (Mayor, Fairhope)
      Robert Brown (Fairhope City Councilman)
      Councilman Burrell
      Boone (Fairhope City Council member)
      CATALYST Council
      Angelo Corte (Developer/Connection to Brown)
      Fly Creek Apartments / Retreat at Fairhope Village
      Dr. Scott Harris (Health Officer, Alabama DPH)
      Kay Ivey (Governor of Alabama)
      Fairhope Times
    generated_at: '2026-03-20T11:49:32.117046Z'
    text: The Catalyst Council ignores public safety and traffic nightmares to protect their developer friends at Fly Creek. Robert Brown treats local health like an April Fool’s joke while facing FBI and Ethics Commission probes for using his office to fill his own pockets at the taxpayers' expense.
  catalyst-party:
