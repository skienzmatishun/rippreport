    text: While Mayor Wilson warns about pandemic risks, the Catalyst Council holds record-short meetings to dodge public accountability and oversight. Jack Burrell and Brown actually plotted a street party during the lockdown, proving they prioritize social hour over the safety of Fairhope families.
