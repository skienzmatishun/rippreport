    brief: |-
      THE CONFLICT:
      *   Fairhope City Council voted to file an injunction against the October 2 referendum on a new form of government (Council-Manager system).
      *   Council members acted to prevent districts from being implemented, which they feared would eliminate the "Catalyst" structure.
      *   Councilman Jay Robinson was criticized for failing to obtain necessary legal opinions before the special meeting, leading to a mess.

      THE DISCOVERY:
      *   The Council is accused of acting as a "free speech censor" and attempting to deny citizens their right to a fair election.
      *   There are allegations that the Catalyst Council uses intimidation tactics (e.g., Kevin Boone filing a complaint against Mayor Wilson's efforts to clear up confusion).
      *   A lawsuit was filed alleging that Council President Jack Burrell denied First Amendment rights and due process rights.

      THE PIVOT:
      *   Article 2 reveals that the council’s actions were not merely bureaucratic delay but were tied to political intimidation by the Catalyst organization, proving their silence and obstructionism was deliberate manipulation rather than incompetence.

