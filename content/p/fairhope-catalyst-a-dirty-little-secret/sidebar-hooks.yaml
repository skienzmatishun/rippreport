      *   Council members were perceived as being controlled by "Catalyst" and failed to seek necessary legal advice from Alabama Attorney General Steve Marshall.
      *   The Fresh Start for Fairhope group believed the Council was secretly plotting to deny citizens the vote.

      THE DISCOVERY:
      *   Mayor Karin Wilson announced that the special election for the Council-Manager form of government scheduled for October 2 will be delayed until the general election on November 6.
      *   Wilson stated this decision would be announced by the Judge of Probate’s office and ensured voters were informed.

      THE PIVOT:
