      *   Fairhope City Council members, deeply connected to the "Catalyst" machine (including former Mayor Tim Kant), voted to file an injunction against an October 2 referendum proposing a change in government form.
      *   The Council attempted to prevent the move to districts by using legal maneuvers and silence.

      THE DISCOVERY
      *   The City Council instructed the City Attorney to find loopholes to delay the election.
      *   The initial October 2nd vote is now scheduled to join the general election ballot on November 6th, 2018.
      *   The Council is accepting no blame for interfering with the process and is blaming the Mayor and City Clerk.

      THE PIVOT
      *   Article 2 reveals that the Council's action (instructing legal maneuvers) was not genuine concern for election integrity but a calculated attempt to delay the referendum, effectively killing the reform effort.
      *   The instruction to the City Attorney to find loopholes serves as proof of their intent to obstruct the change in government structure mentioned in Article 1.

