      of documents with a statement that "there was not probable cause to believe"
      regarding a violation of the Alabama Ethics Act.

      *   Senator Trip Pittman was appointed trustee of BP funds and entrusted with
      $750,000 in municipal contracts, and the Ethics Commission ignored this violation.


      THE DISCOVERY

      *   Fairhope officials Jack Burrell and Ray Hix faced ethics complaints against
      them.

      *   City council members issued false statements regarding ethics commission
      complaints against airport board members.

      *   Senator Trip Pittman used his elected office for personal gain and served
      on the ethics committee to head off complaints, demonstrating manipulation of
      ethical guidelines.


      THE PIVOT

      *   Article 2 details how Senator Pittman manipulated the ethics system (using
      his office and serving on the committee) to avoid accountability, which explains
      why the Ethics Commission dismissed his BP-related investigation in Article
      1.


