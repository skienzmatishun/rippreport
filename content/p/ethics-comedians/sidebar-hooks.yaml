  pandemic-corruption:
    brief: '**BRIDGE BRIEF**


      **1. THE CONFLICT:**

      *   **Date 2019-03-13 – Present (ongoing):** Trip Pittman, while serving as
      Senator/BP Trustee (appointed by the Governor), was entrusted with $750,000
      in municipal contracts related to BP funds. The Ethics Commission investigated
      these financial dealings but ultimately issued a dismissal after approximately
      10 months of review.

      *   **Date 2019-11-03 / Late 2024:** Burrell and Hix faced an investigation
      by the Alabama Ethics Commission into alleged violations of the Alabama Ethics
      Act, which was similarly dismissed through standard procedure without explanation
      ("No probable cause").


      **2. THE DISCOVERY:**

      *   The Widget Article asserts that the Alabama Ethics Commission (AEMC) lacks
      credibility and is structurally compromised, arguing that members prioritize
      political cover for powerful elites over ethical enforcement.

      *   An outgoing member, Dr. Stewart Hill Tankersley (a fellow former Ethics
      Commission member), alleged that three specific colleagues—Jerry Fielding, Frank
      "Butch" Ellis, Jr., and Charles Price—view ethics as an obstacle rather than
      a goal, bending to the needs of the wealthy and politically connected.


      **3. THE PIVOT:**

      *   Article 1 reports specific cases (Pittman''s $750k contracts; Burrell/Hix)
      where the Ethics Commission failed or dismissed investigations regarding high-profile
      financial impropriety, effectively granting legal cover to powerful politicians.
      Article 2 provides the institutional explanation for these failures by alleging
      that the commission itself is "a part of" and corruptible by the political machine
      it serves, thereby proving systemic impunity rather than isolated oversight
      errors.


      **4. KEY ENTITIES:**

      *   Trip Pittman (formerly Senator; BP Trustee)

      *   Burrell (Council Member/President)

      *   Hix

      *   Alabama Ethics Commission (AEMC)

      *   Dr. Stewart Hill Tankersley (Outgoing AEMC member)

      *   Jerry Fielding (Former AEMC member, 2017-10-04)

      *   Frank "Butch" Ellis, Jr. (Former AEMC member, 2017-10-04)

      *   Charles Price (Former AEMC Member, 2017-10-04)

      *   Fairhope City Council vs. Mayor/Local Government officials'
