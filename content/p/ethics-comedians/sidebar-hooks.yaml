  alabama-ethics-self-dealing-immunity:
    brief: '**THE CONFLICT**

      *   Alabama Ethics Commission has a pattern of dismissing investigations into
      elected officials using simple statements like “not probable cause to believe
      [violation]” or standard one-page dismissal letters despite hundreds of pages
      of documentation.

      *   Ethics Commission dismissed an investigation citing lack of probable cause
      against Council Members Burrell and Hix for violations of the Alabama Ethics
      Act (Main Article).

      *   The Ethics Commission investigated "BP Boom Scandal" involving State Senator
      Trip Pittman, who was a trustee entrusted with $750,000 in municipal contracts
      but skimmed funds through his personal company. The Commission turned a blind
      eye to this allegation (Main Article/Widget Article).

      *   Ethics Commission failed to find wrongdoing when former Councilman Robert
      Brown awarded himself a contract of over $300,000 related to the Fairhope Art
      Center while also serving on its board (Widget Article).


      **THE DISCOVERY**

      *   Tom Albritton, Executive Director of the Alabama Ethics Commission and trustee
      of the Mabel Amos Scholarship/Trust, engaged in documented self-dealing.

      *   Investigation by Richard Fording revealed that two children of a board member—identified
      as Tom Albritton—received $105,000 through 2018 via scholarship funds from the
      trust he oversees (Widget Article).

      *   This payment directly violates IRS Section 4941(d), which prohibits private
      foundations from paying expenses or compensation to a trustee’s "disqualified
      person" (i.e., children) who benefits from the foundation''s income/assets (Widget
      Article).

      *   The Mabel Amos Trust, overseen by Albritton and Regions Bank, has only donated
      $500 to a Historically Black College or University but awarded $1 million+ to
      Regions Bank for managing the fund since its inception (Widget Article).


      **THE PIVOT**

      *   Article 1 critiques the systemic failure of the Ethics Commission to prosecute
      corruption among politicians by issuing immunity through standard dismissals.

      *   Article 2 provides a specific "smoking gun" example that this regulatory
      capture is not limited to external officials; it proves the highest levels *within*
      the enforcement body—Executive Director Tom Albritton himself—are committing
      self-dealing and misuse of charitable trust funds.


      **KEY ENTITIES**

      *   Tom Albritton (Executive Director, Alabama Ethics Commission / Trustee)

      *   Trip Pittman (State Senator / BP trustee)

      *   Jack Burrell (Council Member / Airport project involvement)

      *   Robert Brown (Former Councilman / Fairhope Art Center contract recipient)

      *   Burrell and Hix (Ethics Act violations investigated/dismissed)

      *   Richard Fording (Professor, Department of Political Science / Investigator)

      *   Mabel Amos Trust / Scholarship (Fund mismanaged by Albritton)

      *   Regions Bank ($1 million+ managing fee for trust)

      *   Fairhope (Municipality site of alleged bid-rigging)

      *   Alabama Ethics Commission (Body under systemic critique)

      *   Boom Boom Pittman (Previous senator/trustee, referenced in past complaints)'
