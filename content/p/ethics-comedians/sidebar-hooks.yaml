      pages of documents citing "not probable cause to believe" regarding violations
      of the Alabama Ethics Act by Burrell and Hix.

      *   The Ethics Commission found similar findings in the BP Boom scandal involving
      Senator Trip Pittman.

      *   Senator Trip Pittman was appointed by the Governor as the "trustee" of BP
      funds.

      *   Pittman entrusted himself with $750,000 dollars of municipal contracts.


      THE DISCOVERY:

      *   The Ethics Commission lacks credibility and other authorities are asleep
      at the wheel regarding corruption in Alabama.

      *   Ethics Commission members are interested in providing legal cover for powerful
      politicians rather than enforcing ethics.

      *   Corruption is systemic across government levels (Governor''s office, regulatory
      bodies, city councils, county commissions).

      *   Local officials obstruct mayors and ignore allegations against friends/councilmen
      to provide cover for guilty parties.


      THE PIVOT:

      *   Article 2 reveals that Senator Pittman’s specific violation and the Ethics
      Commission''s inaction are not isolated incidents but part of a widespread,
      accepted "way of life" of corruption in Alabama.

      *   The second article shows how state-wide political figures (like Luther as
      Attorney General) actively turned a blind eye to high-level skimming, proving
      institutional complicity rather than simple error or oversight.


