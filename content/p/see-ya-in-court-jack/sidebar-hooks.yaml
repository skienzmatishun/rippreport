  women-stand-together:
    brief: 'THE CONFLICT

      *   Francis P. Ripp filed a federal lawsuit against Jack Burrell on December
      29, 2017.

      *   Ripp alleged that Jack Burrell, as City Council President, denied his right
      to free speech during a city council meeting held on August 28, 2017.

      *   City Attorneys, council members, and the city clerk remained silent during
      Burrell’s actions.


      THE DISCOVERY

      *   Paula DiNardi was assaulted on Thanksgiving night 2018 by a local businessman.

      *   The city judge found the assailant guilty of assault and public intoxication.

      *   City prosecutor Marcus McDowell allowed the assault charge to be dismissed
      due to an omission in filing wording during the appeal process.

      *   McDowell allegedly failed to subpoena witnesses and neglected to update
      DiNardi on hearings, allowing the charges to be dismissed.


      THE PIVOT

      *   Article 2 reveals systemic negligence and failure of accountability by city
      officials (prosecutor Marcus McDowell and the City Council) regarding legal
      matters, providing context for Ripp’s claims of municipal inaction against Burrell.

