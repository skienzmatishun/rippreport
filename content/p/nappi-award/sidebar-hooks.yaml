  all-mouth:
    brief: 'THE CONFLICT:

      - May 2023 (per Widget text): City Council and Mayor face scrutiny over sewer
      system failures.

      - Past Term: Sewer upgrades initiated 2013 with Burrell leading charge.

      - Cost Discrepancy: Widget states upgrade cost ballooned from $10M (approved)
      to $13M (completed).

      - Performance: Widget states 2015 "comprehensive upgrade" cost $12M but plant
      is "still failing to keep up with demand."

      - Deficit History: Article 1 states City ran $6M annual deficit four years ago
      (2016).

      - Administrative Friction: Article 1 claims Council fought Mayor Wilson "tooth
      and nail" for four years.


      THE DISCOVERY:

      - 2016 Campaign: Mayor Wilson made promises to restore fiscal health and fund
      sewer upgrades.

      - Recent Sewer Crisis (2023): Widget cites a proposal to replace head works
      at wastewater treatment plant at north end of Church Street estimated at $5M.

      - Budget Delays (2023): Non-budgeted $2.65M land purchase at airport causing
      difficulty in approving budget; past due for three consecutive years.

      - Infrastructure Funding: Article 1 states Wilson’s administration obtained
      $18M in RESTORE funds for sewer upgrades and SSO prevention.

      - Personnel/Comp: Article 2 claims previous Mayor (Sullivan) got Utilities Superintendent
      role to boost salary over $100K; Council approved full family insurance valued
      at $17,000/year.


      THE PIVOT:

      - Article 2 confirms the severity of sewer issues Widget highlights ($5M head
      works proposal vs. failing plant) validates Article 1’s claim of Wilson obtaining
      $18M RESTORE funds for these exact repairs.

      - Article 2 exposes budget mismanagement claims ($2.65M land purchase, unpaid
      salaries) justifying Article 1’s claim of ending $6M deficit and eliminating
      debt.

      - Councilman Burrell (cited in Widget) is the specific opponent; Article 1 highlights
      "Council awarded nothing" during Wilson’s 4-year award streak.


      KEY ENTITIES:

      - Karin Wilson (Mayor, Fairhope)

      - Jack Burrell (City Councilman)

      - Mayor Sullivan (Previous Mayor, cited for double salary/Utilities Superintendent
      role)

      - RESTORE Funds ($18M total obtained by Wilson’s admin)

      - Utility Dept (Faucet/Utility upgrades cited: $14M invested this term)

      - Fauxhope (Location alias used in Widget)'
