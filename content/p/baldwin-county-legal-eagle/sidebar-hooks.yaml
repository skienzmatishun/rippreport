      published warnings about widespread political corruption concerning education
      funding in Baldwin County and Alabama.

      *   Concerns cited included Governor exploiting a lucrative contract from the
      Alabama Accountability Act; failure of local leaders (e.g., Fairhope Mayor/Council,
      Baldwin County Commissioners) to avoid property tax increases despite promises
      of "no new taxes."

      *   The author criticized the current education funding disparity between Baldwin
      County (12 mills) and Mobile County (29.5 mills).


      THE DISCOVERY

      *   The state is subject to corruption driven by lobby groups, specifically
      PCI Tribe and the Business Council of Alabama.

      *   The politician''s focus has shifted away from education toward prison construction
      and paying off state debt dating back to 2013 using state lottery funds.

      *   TAXMAN Senator Elliott was reported to have received $27,000 in contributions
      from PCI Tribe to secure his election.


      THE PIVOT

      *   Article 1 raised concerns about politicians pushing tax hikes and mismanaging
      education funds due to lack of checks and balances (e.g., Fairhope). Article
      2 demonstrates how this corruption is systemic: special interests like PCI have
      effectively bought legislators (Elliott, Marsh, Albritton), causing them to
      betray campaign promises and redirect state funding away from the needed educational
      improvements into prison expansion and debt servicing.


      KEY ENTITIES

