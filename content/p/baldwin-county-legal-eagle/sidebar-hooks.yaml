      office.

      *   Historical Allegations: Former Governor Bentley used BP funds to build a
      beach mansion.

      *   Historical Allegations: Former State Senator BP Pittman skimmed $750,000
      of BP money for his company.


      THE DISCOVERY

      *   Chris Elliott currently serves as County Commissioner in Baldwin County
      and is accused of taxing citizens without the vote of his constituents (described
      as "The Tax Man").

      *   Baldwin County provides approximately 35% of the general state budget, positioning
      it as a financial resource ("piggy-bank") for political entities ("Goat Hill"
      or Puppet Governor).

      *   Elliott is noted for supporting the gas tax—despite over 80% public opposition—without
      voter approval.


      THE PIVOT

      *   Article 1 raises the issue of necessary property tax increases and general
      corruption in local governance (Fairhope/Baldwin County Commissioners).

      *   Article 2 connects this localized political maneuvering to state-level exploitation,
      identifying current Commissioner Chris Elliott as implementing taxes unilaterally
      while simultaneously proving Baldwin County functions as the primary fiscal
      support base for statewide political power.


