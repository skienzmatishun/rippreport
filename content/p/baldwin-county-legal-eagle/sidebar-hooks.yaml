      accused of pushing tax increases despite waste and corruption.


      THE DISCOVERY:

      - While local bodies have failed to act on complaints related to corruption
      in Baldwin County, the Alabama Secretary of State has taken action.

      - The Judiciary took no action regarding complaints against Judges Michelle
      Thomason and Buddy Bracken.

      - The Alabama Ethics Commission found no probable cause regarding officials
      like Sen. Trip Pittman (who received $750,000 from BP).

      - John Merrill (Alabama Sec. of State) acted on election tampering complaints
      submitted by the Ripp Report concerning Fairhope’s elections.


      THE PIVOT:

      - Article 1 alleged systemic political corruption and failure in local governance;
      Article 2 proves this failure is entrenched through institutional inaction—namely,
      that county judicial and ethics bodies have repeatedly ignored documented claims
      against local figures (e.g., Steven Johnson, Trip Pittman).

      - The discovery reveals John Merrill''s office as the sole effective authority
      capable of addressing local election irregularities in Baldwin County.


      KEY ENTITIES:

      - Ripp Report (Non-profit Association)

