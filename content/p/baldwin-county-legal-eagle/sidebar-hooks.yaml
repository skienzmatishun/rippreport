  tax-tax-and-re-tax:
    brief: '1. THE CONFLICT

      * In 2015 (March 30), the Baldwin County Legal Eagle/Ripp Report alleged that
      conservative elected officials in Baldwin County and Fairhope were pushing property
      tax increases to fund schools despite previous pledges of "no new taxes."

      * The report claimed corruption was evident through developer favorism, crony
      contracts, and mismanagement, noting Baldwin County received only 12 mills for
      education compared to Mobile County''s 29.5 mills.


      2. THE DISCOVERY

      * Current analysis indicates developers are paying little or no impact fees
      for projects in Baldwin County, shifting the financial burden of Schools, Streets/Transportation,
      and Education onto taxpayers.

      * Governor Ivy is currently promoting a bill aimed at ending the election process
      for State School Board Members, seeking greater control over the system via
      appointments.


      3. THE PIVOT

      * The persistence of fiscal strain (developer fee evasion) confirms the ongoing
      financial instability alleged in 2015.

      * Article 2 reveals the evolution of political strategy: instead of solely pushing
      taxpayers to accept higher property tax burdens, current actions involve removing
      electoral accountability from school boards (via Governor Ivy''s bill), concentrating
      power outside of local democratic oversight.


      4. KEY ENTITIES

      * Baldwin County

      * Baldwin County Commission

      * Baldwin County School System

      * Ripp Report

      * Fairhope City Council

      * Mayor (Fairhope)

      * Governor Ivy

      * State School Board Members'
