  a-decade-of-corruption:
    brief: 'THE CONFLICT

      1989–2015: Baldwin County and Fairhope officials faced criticism from the Baldwin
      County Legal Eagle regarding poor management, lack of checks and balances, developer
      favoritism, and allegations of crony contracts costing taxpayers millions.

      The 2015 article alleged that the Mayor and Council in Fairhope were responsible
      for this corruption while pushing property tax increases to fund schools.


      THE DISCOVERY

      The Widget Article reveals documented cases of high-level public corruption
      spanning a decade (starting at least circa 2010). Specifically, it confirms
      State Senator Tripp "Boom Boom" Pittman and then-Fairhope Mayor Tim Kant secured
      a BP contract worth $636,000 for boom work using Fairhope staff.

      The discovery states this contract was awarded on June 4th, 2010, after the
      County Commission (May 8th, 2010) advised against proceeding, and Pittman failed
      to meet required licenses or insurance standards.


      THE PIVOT

      Article 1 makes a general claim of "crony contracts" and "developer favoritism";
      Article 2 provides the specific evidence: naming State Senator Tripp Pittman
      and Mayor Tim Kant as the individuals who executed the $636,000 BP contract
      in violation of county warnings. Article 2 expands the corruption scope from
      generalized criticism to a decade-long pattern involving political figures (Pittman/Kant)
      and organized groups (CATALYST).


      KEY ENTITIES

      *   Tripp "Boom Boom" Pittman

      *   Tim Kant (Fairhope Mayor / Former Mayor)

      *   Jennifer Fidler (Fairhope Staff / Witness)

      *   Greg Mims (Fairhope Staff)

      *   Fairhope City Council

      *   CATALYST (Organization/Political Group)

      *   BP (Company)

      *   Baldwin County Commission

      *   Mega-Site

      *   Council President Burrell

      *   McSharry Case'
