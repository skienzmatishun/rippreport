hooks:
  legal-corruption:
    brief: '**THE CONFLICT:**

      *   March 30, 2015: Baldwin County Legal Eagle published a report alleging corruption
      in Baldwin County Commissioners and Fairhope municipal government.

      *   The 2015 article claimed commissioners were pushing property tax increases
      despite claims of waste and mismanagement.

      *   It accused Fairhope Mayor/Council of poor management, lack of checks and
      balances, developer favoritism, and crony contracts costing taxpayers millions.

      *   The report noted Baldwin County received 12 mills of education property
      tax versus Mobile County''s 29.5 mills in the same year.


      **THE DISCOVERY:**

      *   Today (Widget Article), specific current and former officials are accused
      of ongoing corruption.

      *   Former State Senator Tripp Pittman is accused of awarding himself $750,000.00
      in contracts from Fairhope with the assistance of the Mayor.

      *   Baldwin County Commission reportedly purchased a mega-site that benefits
      only sellers (CATALYST).

      *   Councilman Burrell was noted for flying in a private jet belonging to a
      municipal judge and overseeing bids involving the Judge/Airport Board partners.

      *   Councilman Brown allegedly awarded himself a several hundred thousand dollar
      contract using his elected position as councilman and board member for the Art
      Center.

      *   Current officials—including Conyers, Robinson, and Conyers—are accused of
      being complicit in ongoing corruption.


      **THE PIVOT:**

      *   The 2015 article made general claims about "crony contracts," "developer
      favorism," and systemic mismanagement; the Widget Article provides modern names
      (Pittman, Burrell, Brown), specific dollar amounts ($750,000), and current governmental
      failures to hold officials accountable.

      *   Both articles link major financial misconduct and questionable political
      deals back to Baldwin County and Fairhope leadership.


      **KEY ENTITIES:**

      *   Baldwin County Legal Eagle

      *   Ripp Report

      *   Baldwin County Commission

      *   Fairhope City Council

      *   Tripp Pittman (Former State Senator/Trustee of BP funds)

      *   Mayor (Fairhope)

      *   Councilman Burrell

      *   Councilman Brown

      *   Councilman Boone

      *   Conyers

      *   Robinson

      *   CATALYST

      *   BP'
