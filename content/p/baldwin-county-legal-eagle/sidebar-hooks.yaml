      contracts costing taxpayers millions, developer favoritism, and use of intimidation
      by local politicians regarding property tax increases for schools.

      *   Claims also extended to the then-Governor (implied during 2015) making money
      off the Alabama Accountability Act while claiming financial savings.


      **THE DISCOVERY:**

      *   September 15, 2020: Thomas Gallion published *Shadow Government Southern
      Style*, which asserts that systemic corruption in Alabama is linked to political
      greed and thwarted educational development (specifically, the rejection of an
      education lottery).

      *   Gallion provides specific historical examples of theft by the Republican
      party.

      *   Specific financial allegations include a $3 billion tax liability owed by
      Exxon-Mobil to the state being reduced to $51 million due to influence exerted
      during Governor Bob Riley''s term (2016-2019).


      **THE PIVOT:**

      *   The general claims of local "poor management, lack of checks and balances"
      in Fairhope and Baldwin County (Article 1) are contextualized as a symptom of
      widespread systemic corruption and financial exploitation detailed by Thomas
      Gallion in Article 2.

      *   Gallion’s book moves beyond local property tax issues to link the refusal
