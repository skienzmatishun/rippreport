      KEY ENTITIES:

      - Huey "Hoss" Mack (Baldwin County Sheriff)

      - Eddie Tyler (School Board Member)

      - Tripp Pittman (State Senator)

      - Tom Albritton (Alabama Ethics Commission Executive Director)

      - Don Sigleman

      - Judge Thomasson (Fairhope)

