      cases worldwide (Widget); Alabama officials in crisis as Gulf Coastal Hospitals
      fill with Delta variant.

      - File for Writ of Mandamus against Alabama Ethics Commission filed in Montgomery
      County Circuit Court (Main).

      - Limestone County Sheriff Mike Blakley convicted of corruption this week; trial
      stalled over state’s witness "sweetheart deal" (Widget).

      - Baldwin County Court system corruption allegations: Divorce filings yield
      2 in 3 chance of receiving District Court Judge Thomas or District Court Judge
      Sculley; Judge Bosch is only regular Circuit Judge for Domestic Relations (Widget).

      - Lance LaCour served as Baldwin County Economic Development Alliance Director
      during "Megasite" development and property purchase by county for $32M while
      holding director position at Alliance; currently denied access to the property
      (Widget).

      - Trust of Mabel Amos is administered by Alabama Ethics Commission Director
      Thomas Albritton (Widget).


      THE DISCOVERY:

      - Widget confirms Mr. Ripp of The Ripp Report has filed/advocated for a Federal
      Lawsuit regarding the Mabel Amos Trust, alleging State Officials violated Civil
      Rights by allowing a District Judge to sit as Circuit Judge in Family Court
      cases.

      - Thomas Albritton is explicitly named as the Ethics Commission Director administering
      the Mabel Amos Trust, linking directly to Mr. Ripp’s Writ of Mandamus against
      the Commission.

      - Confirms Justice Judge Pam Baschab (ret Baldwin County) is presiding over
      Limestone Sheriff’s corruption trial despite the state''s witness controversy.

      - Confirms Lance LaCour (Lance LaFlour/Director of Alabama Dept of Environmental
      Management noted separately) had access to the disputed property before current
      EDA Director Lee Lawson denied entry.


      THE PIVOT:

      - Article 2 transforms Article 1’s vague "nebulous response" regarding the Ethics
      Commission into a specific conflict: Mr. Ripp actively litigating against Thomas
      Albritton, the very official managing a Trust (Amos) that is now central to
      his Writ.

      - Article 2 validates Article 1’s corruption claims by naming the specific judges
      (Thomas, Sculley) and the specific Sheriff trial judge (Baschab), confirming
      "Ethical Decay" allegations with procedural details.

      - Article 2 exposes the conflict of interest: Ethics Commission Director Thomas
      Albritton administering a trust while Mr. Ripp is filing a Writ of Mandamus
      and civil rights suit against the Commission/Trust administration.

      - Article 2 clarifies financial corruption: Lance LaCour’s role as "godfather
      of the Megasite" followed by county purchasing property for $32M and sitting
      on it a decade under new leadership (Lee Lawson).


      KEY ENTITIES:

      - Thomas Albritton

      - Alabama Ethics Commission

      - Mike Blakley

      - The Ripp Report / Mr. Ripps Writ of Mandamus

      - Lance LaCour

      - Lee Lawson

      - Montgomery County Circuit Court

      - Limestone County Sheriff (Department)

      - Judge Thomas / Judge Sculley / Judge Bosch / Judge Pam Baschab

      - Mabel Amos Trust'
