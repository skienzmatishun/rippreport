  fauxhope:
    brief: |-
      1. THE CONFLICT: Fairhope City Council delayed a federally funded waterfront project for nearly one year while attempting to circumvent ADA compliance requirements. Originally approved 18 months ago with a $6.2 million federal grant, the project is behind schedule due to design changes by Council President Jack Burrell who eliminated rock jetties and swim areas because they did not look like what he wanted. The council has delayed finalizing ADA walkways, now proposing open rail cars for handicap access despite liability and maintenance concerns.

      2. THE DISCOVERY: Internal documents show Mayor Sherry Sullivan took close to a year to understand the mandatory ADA provisions of the federal grant. Leaf River Group developer Stewart Speed admitted during recorded public appearances that previous promises regarding luxury apartments and environmental safety were lies. Mayor Wilson confirmed earlier she was concerned about the city acquiring certain property (substation/K-1), but the Sullivan administration is currently responsible for finishing Mayor Wilson’s projects.

      3. THE PIVOT: The Widget Article confirms the Main Article's claim of "deaf ears" and decision-making without participation by citing specific instances where Burrell removed public infrastructure for personal preference. It turns vague allegations of "wasted money" into specific financial data: a 1-year ADA delay on the $6.2 million grant and the confirmed dishonesty of Developer Speed regarding apartment sales (Main: "Where did the 6 million go?").

      4. KEY ENTITIES: Sherry Sullivan (Mayor), Jack Burrell (Council President), Jay Robinson (Councilman), Stewart Speed (Leaf River Group), Arthur Corti, K-1 Center Property, Baldwin County Board of Education, Mayor Wilson (Former Mayor).
