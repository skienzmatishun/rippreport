  what-education-lottery:
    brief: "THE CONFLICT:\n- Alabama has debated establishing a state lottery for\
      \ over 20 years.\n- Dec 2020 report projected gaming could boost state revenue\
      \ by ~$710 million/year.\n- Legislative Services Agency estimated 272-358 million\
      \ annual revenue possible.\n- Public debate frames the lottery as an \"Education\
      \ Lottery.\"\n\nTHE DISCOVERY:\n- Specific 2019/Current legislative proposal\
      \ favors Albritton (Poarch Creek) monopoly.\n- Bill allocates lottery funds\
      \ to repay state transfers 2013-2015; excludes Education Fund allocation per\
      \ Article 2.\n- Five Republicans involved received >$100,000 from the tribe:\n\
      \    - Del Marsh (Chair): $30,000.\n    - Randy Price (Vice Chair): $12,500.\n\
      \    - Chris Elliot: $27,500.\n    - Garlan Gudger: $25,000.\n    - Andrew Jones:\
      \ $10,000.\n\nTHE PIVOT:\n- Article 2 proves the specific lottery mechanism\
      \ is being influenced by campaign cash from Poarch Creek Indians.\n- Chris Elliot\
      \ received $27,500 to support a bill that prioritizes tribal monopoly and debt\
      \ repayment over the education allocation promised in Article 1.\n\nKEY ENTITIES:\n\
      - Chris Elliot (Tax Man/Senator)\n- Del Marsh\n- Randy Price\n- Garlan Gudger\n\
      - Andrew Jones\n- Poarch Creek Indians / Albritton"
