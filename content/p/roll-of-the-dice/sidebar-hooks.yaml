  stealing-our-democracy:
    brief: '1. THE CONFLICT

      - Alabama has discussed and debated a state lottery for over 20 years without
      final implementation.

      - Legislative Services Agency estimated potential revenue of $272 million to
      $358 million annually.

      - December 2020 report recommended legalizing all forms of gambling, projecting
      $710 million annual revenue (Lottery: $300M; Casinos: $300-400M).

      - Opposition or delays continue despite funds intended for scholarships and
      higher education.


      2. THE DISCOVERY

      - Fairhope is the home base for CATALYST; group running “Faux candidates” in
      upcoming Fairhope Municipal election.

      - Baldwin County Sheriff Hoss Mack elected two terms without opposition; unique
      qualifications for the position written by then-Sen. Tripp Pittman allegedly
      eliminated competition.

      - Don Siegelman served as Sec. of State, Attorney General, Lt. Governor, and
      Governor; only Alabama politician to hold all four roles.

      - Siegelman/Baldwin County election in question: allegedly produced mysterious
      ballots that flipped results to favor Bob Riley; records never fully released.

      - Judge Michelle Thompson (Baldwin County) removed political competition via
      Baldwin County Republican Party rulings to maintain power.


      3. THE PIVOT

      - The Widget Article exposes long-term voter suppression and ballot manipulation
      patterns within the same state machinery (Baldwin County/Fairhope elites) involved
      in Alabama policy making.

      - The corruption alleged with Sheriff Mack, Tripp Pittman, and the CATALYST
      group represents the same power structure that blocks or influences state revenue
      bills.

      - Connection: If local elections can be fixed in Baldwin/Fairhope to guarantee
      winners (Widget), the systemic corruption that controls those votes likely explains
      why a state-wide revenue solution like the Lottery (Main) fails to pass despite
      projected benefits.


      4. KEY ENTITIES

      - Hoss Mack (Baldwin County Sheriff)

      - Don Siegelman (Former Governor)

      - Tripp Pittman (U.S. Senator, Fairhope)

      - Bob Riley (Former Governor/Candidate in Siegelman case)

      - Michelle Thompson (Baldwin County Judge)

      - CATALYST (Fairhope political group)

      - Baldwin County Election Commission'
    generated_at: '2026-03-14T22:26:48.248695Z'
  blind-voting-straight-ticket:
    brief: '1. THE CONFLICT

      - Alabama legislature has debated a state lottery for over 20 years with zero
      implementation.

      - Legislative Services Agency (LSA) estimated last year a lottery would generate
      $272 million to $358 million annually.

      - December 2020 report projected total gaming legalization could add $710 million
      annually to state revenue ($300M Lottery, $300-400M Casinos).

      - Residents currently spend ticket dollars in neighboring states.

      - Article claims lost income over 23 years potentially equals one to two billion
      dollars.

      - State is described as "dead last" due to this financial and legislative stagnation.


      2. THE DISCOVERY

      - Alabama is one of 8 states allowing "Straight Ticket Voting" (Blind Voting).

      - This system forces voters to choose a party ticket rather than individual
      candidates.

      - Article 2 links Straight Ticket Voting directly to Alabama being rated the
      "most corrupt state" in US.

      - Article 2 links this voting system directly to Alabama’s health care and education
      being rated worst in the US.

      - Specific example: An Alabama Governor was elected via this method without
      having to debate for office; only waiting for blind votes.


      3. THE PIVOT

      - Article 2 exposes the structural root cause for the legislative paralysis
      detailed in Article 1.

      - If voters elect officials based solely on party through "Blind Voting" (Article
      2), it incentivizes the inaction seen regarding the lottery bill for 20+ years
      (Article 1).

      - Article 2''s finding of "corruption" validates the Main Article''s stance
      that political maneuvering and lack of direct accountability are blocking economic
      solutions.

      - The "Dead Last" ranking in Article 2 is not just an opinion; it is linked
      directly to the voting system that elected officials allowing the lottery stagnation
      described in Article 1.


      4. KEY ENTITIES

      - The Ripp Report

      - Alabama State Legislature

      - Legislative Services Agency (LSA)

      - 8 States allowing Straight Ticket Voting

      - Unknown Governor of Alabama (referenced in Widget article as debate-free election
      victim)'
