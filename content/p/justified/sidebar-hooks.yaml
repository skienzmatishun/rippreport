  FEDERAL-CIVIL-RIGHTS-LAWSUIT-INVOLVES-BCSO-AND-MAJOR-CRIMES-UNIT:
    brief: |-
      THE CONFLICT:
      - O.J. French killed by Bay Minette police officer Brandon Thompson during a traffic stop investigation ruled "JUSTIFIED" by Baldwin County Major Crimes Unit (BCMCU).
      - BCMCU is composed of officers from member agencies, including Bay Minette Police Chief Al Tolbert and Sheriff Huey "Hoss" Mack.
      - Article 1 alleges BCMCU members investigated their own cases; Al Tolbert is Chief of Bay Minette while Officer Thompson killed French.
      - Huey "Hoss" Mack was on the Major Crimes Unit at time of O.J. French killing and during 10 prior cases.
      - Article 1 details wrongful conviction of Murray Lawrence, jailed nearly 20 years, involving hidden evidence and coroner's reports.
      - Article 1 claims District Attorney Robert Wilters, Sheriff Huey Mack, and former DA David Whetstone colluded to convict Murray Lawrence.
      - Anthony Lowery was lead investigator for DA at time of Lawrence conviction, knew of hidden evidence (coroner's report).
      - Sheriff Mack allegedly involved in incident resulting in five deaths on I-10 chase.

      THE DISCOVERY:
      - Article 2 confirms federal Civil Rights lawsuit filed in U.S. District Court, Southern District of Alabama (Southern Division) against Baldwin County Sheriff's Office and BCMCU.
      - Article 2 identifies BCMCU members explicitly: Al Tolbert (Chairman), Brad Kendrick, Huey “Hoss” Mack, Edward Delmore, David Carpenter, Thurston Bullock.
      - O.J. French is confirmed as 10th loss of life investigated by BCMCU where they ruled no police at fault and withheld camera footage.
      - Article 2 details Jonathan Victor case: April 2021, victim unarmed and shot four times from 7 yards away by Sheriff's deputy Hunady.
      - Judge William Cassady denied qualified immunity to Deputy Hunady and Sheriff Mack in Jonathan Victor case.
      - Article 2 reveals Hale/Hunady/Mack involved in appeal filed against Cassady's ruling by Baldwin County Sheriff Office.
      - Article 2 confirms Huey “Hoss” Mack is exiting Baldwin County and attempting to appoint Anthony Lowery as replacement.

      THE PIVOT:
      - Article 2 is the smoking gun because it legally validates BCMCU self-investigation bias by listing Tolbert and Mack as members while serving in positions of power (Chief/Sheriff).
      - Federal court filing citation in Article 2 confirms the lawsuit referenced in Article 1 is active and specific regarding Civil Rights violations.
      - Specific details of Jonathan Victor case in Article 2 (7 yards, unarmed) confirm the pattern of lethal force alleged for O.J. French, making Lowery’s previous knowledge of wrongful convictions (Article 1) part of an established pattern.
      - Article 2 proves Sheriff Mack's attempt to transfer liability/departmental chaos ("hauling ass out") by dumping the federal lawsuit history on Lowery.

