  fact-hardest-working-elected-city-official-eastern-shore-fairhope-mayor-karin-wilson:
    brief: 'THE CONFLICT

      *   August 7, 2019: Mayor Karin Wilson wrote to Casi Calloway criticizing Mobile
      Baykeeper for sensationalized news releases regarding a video of a "mysterious"
      substance and failing to share facts.

      *   Wilson argued that her administration was taking responsibility for upgrading
      the sewer system and addressing long-term neglect of utilities.


      THE DISCOVERY

      *   July 23, 2019: The City of Fairhope has identified and started an aggressive
      rehabilitation plan for wastewater collection, transmission, and treatment systems.

      *   The plan includes $11M in RESTORE funding for a top to bottom 5-year sewer
      system upgrade.

      *   Councilman Boone and Burrell spent $13 million on a sewer plant but $22
      million could have been used to relocate it inland.

      *   Mobile Bay is affected by failing septic systems and illicit discharges
      from the Mobile Bay Watershed (which includes nearly 2/3 of Alabama).


      THE PIVOT

      *   Article 2 provides specific financial data ($11M, $13M, $22M) and municipal
      inaction regarding sewer infrastructure that substantiate Mayor Wilson''s claim
      in Article 1 that there was "no plan in place" before she took office.

      *   The concrete details of the city’s infrastructural failures prove the necessity
      of her stated mission to fix the system, countering the Baykeeper criticism.


      KEY ENTITIES

      *   Mayor Karin Wilson

      *   Casi Calloway

      *   Mobile Baykeeper Board of Directors

      *   City of Fairhope

      *   Councilman Boone

      *   Councilman Burrell

      *   Mobile Bay Watershed

      *   Fairhope Public Beach'
