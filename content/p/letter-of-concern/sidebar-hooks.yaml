  fairhope-sewer-backstory:
    brief: 'THE CONFLICT

      - Mayor Karin Wilson sent a letter to Casi Calloway on August 7, 2019, criticizing
      Mobile Baykeeper for sharing misleading news releases about the lack of an SSO
      from Fairhope or Daphne sewer systems.

      - Mayor Wilson stated that she initiated infrastructure upgrades and secured
      funding for utility improvements in less than three years despite no plan being
      in place previously.


      THE DISCOVERY

      - The Ripp Report details corruption under the previous Mayor Can’t, who held
      a double paycheck as Mayor and Utility Director.

      - Between 2012 and 2016, Mayor Can''t, Councilman Boone, and Councilman Burrell
      used the utility fund as a slush fund to pay lawsuits, resulting in Fairhope
      losing its senior utility supervisor to Daphne and $3 million to attorneys.

      - This period saw no infrastructure work done on the sewer system while other
      departments were neglected.


      THE PIVOT

      - Article 2 proves that the failure of the sewer system mentioned implicitly
      in Article 1 was a result of past municipal corruption (using the utility fund),
      justifying Mayor Wilson’s urgent intervention and subsequent successful infrastructure
      work.

      - Article 2 shows that Mobile Baykeeper''s efforts have been ineffective, contradicting
      the expectations set by the relationship described in Article 1.


