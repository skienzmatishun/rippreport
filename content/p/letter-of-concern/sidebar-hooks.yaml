      control over the city government (council, judge, attorney, Mayor).

      *   Wilson left $23 million in grants/restoration funds and implemented a funded
      $40 million plan to upgrade sewer, gas, and water infrastructure, plus a $6.2
      million Waterfront Grant.

      *   The new administration is now being criticized by Howling Rains for ignoring
      public input gathered on the waterfront project, which Wilson had previously
      managed community-based.


      THE PIVOT:

