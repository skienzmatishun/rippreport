hooks:
  fairhope-catalyst-a-dirty-little-secret:
    brief: 'THE CONFLICT

      *   Fairhope Special Election was canceled on October 3.

      *   Marcus McDowell (Fairhope City Council Attorney) is working overtime to
      assist the Council, backed by Catalyst.

      *   Former Baldwin District Attorney David Whetstone called off a city manager
      referendum.

      *   David Whetstone was involved in a similar private attorney battle in 2011
      regarding a city administrator position.

      *   District Attorney Robert Wilters supported Catalyst and agreed the election
      should be delayed.


      THE DISCOVERY

      *   The Fairhope City Council used an injunction to attempt to delay or nullify
      the October 2 referendum on a change of government (Council-Manager form).

      *   Council members, who are Catalyst slate candidates hand-picked by former
      Mayor Tim Kant, voted to block the change of government.

      *   The Council and City Attorney failed to seek necessary legal advice before
      the election to ensure validity.

      *   The Council used delays and claims of misinformation/transparency as an
      excuse to stop public votes.


      THE PIVOT

      *   Article 2 proves that the alleged interference in Article 1 was a deliberate
      political maneuver by the Catalyst-aligned City Council, who actively sought
      to undermine public voting rights through legal means (injunctions) rather than
      relying solely on external figures like Whetstone or Wilters.


      KEY ENTITIES

      *   Marcus McDowell

      *   Catalyst

      *   David Whetstone

      *   Robert Wilters

      *   Tim Kant (Former Mayor)

      *   Jack Burrell (Council President)

      *   Chuck Zunk

      *   Fresh Start Fairhope'
