  above-the-law:
    brief: 'THE CONFLICT:

      *   Mr. Arthur Corte and Mayor Kant are an alliance continuing to damage Fly
      Creek.

      *   A triangle lawsuit in Fairhope cost taxpayers $11.25 million.

      *   Mayor Kant settled the lawsuit by omitting public participation or notification.

      *   Mayor Kant placed a fire station and lift station on dead-end roads for
      an estimated $1 million at taxpayer expense near proposed apartments.

      *   Sen. Pittman and Mayor Kant siphoned $636,000 of BP money for a contract.


      THE DISCOVERY:

      *   The Ripp Report filed a complaint against Steven Patrick Johnson to the
      Alabama State Bar (CSP NO. 2016-296).

      *   Johnson admitted to purchasing, transporting, and selling marijuana under
      oath during his divorce proceedings.

      *   The Alabama State Bar took no further disciplinary action after reviewing
      the complaint.


      THE PIVOT:

      *   Article 2 reveals a pattern of unethical behavior (attorney admitting to
      criminal activity) within the legal sphere that is parallel to the systemic
      corruption and misuse of public funds alleged in Article 1, suggesting that
      individuals involved in the political/judicial schemes may be using or protected
      by questionable legal practices.


