      \ Mayor Kant for a contract that failed to remove boom anchors from the bay.\n\
      \    *   Main Article criticizes Baldwin County family court under Judge Thomason,\
      \ alleging the court negatively impacts families and favors \"bottom feeding\
      \ attorneys.\"\n    *   Widget Article details an allegation against Attorney\
      \ Steven Patrick Johnson regarding his conduct in divorce cases (Family Court).\n\
      \n2. THE DISCOVERY\n    *   Francis Paul Ripp filed a complaint against Steven\
      \ Patrick Johnson with the Alabama State Bar (CSP NO. 2016-296) alleging that\
      \ Johnson admitted under oath to purchasing, transporting, and selling marijuana\
      \ during a divorce proceeding to another attorney.\n    *   The Widget Article\
      \ proves that despite this specific misconduct allegation, the Alabama State\
      \ Bar initially dismissed the complaint as \"no further action\" was necessary,\
      \ and subsequently refused full transparency regarding disciplinary actions\
      \ taken by the Disciplinary Commission on July 20, 2016.\n\n3. THE PIVOT\n \
      \   *   The Widget Article serves as a concrete example of the systemic legal\
      \ failure described generally in the Main Article (i.e., that the judicial/legal\
      \ establishment is designed to protect unethical attorneys).\n    *   Johnson’s\
      \ alleged misconduct provides specific evidence supporting the claim made in\
      \ the Main Article regarding Judge Thomason’s court and the presence of \"bottom\
      \ feeding attorneys\" who evade professional discipline despite clear allegations\
      \ of ethical breaches.\n\n4. KEY ENTITIES\n    *   Arthur Corte\n    *   Mayor\
      \ Kant (Timothy Kant)\n    *   Steven Patrick Johnson / Brackin McGriff and\
      \ Johnson\n    *   Judge Thomason\n    *   Francis Paul Ripp\n    *   Baldwin\
      \ County Legal Eagle\n    *   Alabama State Bar\n    *   Sen. Pittman"
