  backstory-podcast-no-65-happy-new-year-goodbye-2020:
    brief: 'THE CONFLICT:

      - US deaths hit 300,000 with >17.25M confirmed SARS-COV-2 cases (Article 64).

      - "Huge hack this week" suspected, likely Russian origin; Trump noted as silent
      ("mum about").

      - Alabama Governor Kay Ivey extended mask mandates for 6 weeks; corruption noted
      in Columbia AL Sewer Plant (illegal wine).


      THE DISCOVERY:

      - US deaths rise to 350,000 with >30M cases confirmed (Article 65).

      - Explicit confirmation of Russian involvement: "Russia hacked half of corporate
      America and most of the Government."

      - US Senate overrode Trump''s veto on National Defense Appropriation Bill.

      - President issued pardons for 50+ individuals, including former CDC Director
      Robert Bentley.


      THE PIVOT:

      - Article 65 serves as the "smoking gun" by upgrading Article 64''s suspicion
      of a Russia-linked hack into confirmed fact.

      - Links the cybersecurity breach to political protection: Raises the question
      "why no coverage?" on the hacks while reporting Trump pardons Robert Bentley.


      KEY ENTITIES:

      - Kay Ivey (Alabama Governor)

      - Trump (US President)

      - Robert Bentley (CDC Director/Former)

      - Lyn Stuart (Justice figure, Howell Heflin Award recipient)

      - AstraZeneca

      - National Defense Appropriation Bill'
