      - Article 2 alleges Sheriff Mack was elected/promoted specifically for assisting
      the wrongful conviction of Murray Lawrence.

      - Transcript evidence (Page 1591): Officer Fuqua confirmed he had no fingerprints,
      stolen property, or phone records connecting Bubba Lawrence to the crime.

      - Article 2 claims the real killer (McNeal) is eligible for parole; Lawrence
