hooks:
  no-justice:
    brief: '1. THE CONFLICT:

      - Murray Lawrence Jr., convicted of capital murder for the April 5, 2003 killing
      of Brandon Hastings in Baldwin County.

      - State case relied on testimony from co-conspirator Jarius McNeil; no physical
      evidence (gun, bullets, ballistics, DNA) linked Lawrence to the crime.

      - Prosecution narrative claimed victim was shot; defense and Mississippi ME
      indicated strangulation/suffocation.

      - Article alleges an autopsy report was withheld from defense during trial,
      leading to wrongful conviction based on manipulated cause of death evidence.


      2. THE DISCOVERY:

      - Article 2 confirms a second autopsy of Brandon Hastings exists (ordered by
      District Attorney’s office at time of trial).

      - Report was signed by Judge Robert Wilters, who presided over Lawrence’s murder
      trial.

      - Document was never disclosed to defense during original trial; violation confirmed
      in response to Rule 32 petition.

      - Haygood Kristi Deason (current ADA) admitted report was "certainly a violation
      of the discovery order" when questioned during Rule 32 response.

      - New autopsy allegedly supported suffocation, contradicting prosecution’s gunshot
      theory.


      3. THE PIVOT:

      - Robert Wilters is now Baldwin County District Attorney while he previously
      served as judge in the Lawrence murder trial and signed the withheld autopsy
      report.

      - Hoss Mack was lead investigator at time of crime; now Baldwin County Sheriff
      (Father served as Coroner in 2003).

      - Confirmation by Haygood Kristi Deason (ADA) of the withheld evidence connects
      back to the specific corruption allegations in Article 1 regarding suppression
      and "Rule 32" filings.


      4. KEY ENTITIES:

      - Murray Lawrence Jr. (Defendant)

      - Brandon Hastings (Victim, 2003)

      - Jarius McNeil (Co-conspirator Witness)

      - Robert Wilters (Current DA, Original Judge at Trial)

      - Hoss Mack / Huey Hoss Mack (Current Sheriff, Lead Investigator)

      - David Whetstone (Former DA, Prosecutor at Trial)

      - Haygood Kristi Deason (Assistant District Attorney)

      - Judge Scott P. Taylor (Circuit Court Judge, Rule 32 Petition)'
