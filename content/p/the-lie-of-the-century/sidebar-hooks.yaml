  FEDERAL-CIVIL-RIGHTS-LAWSUIT-INVOLVES-BCSO-AND-MAJOR-CRIMES-UNIT:
    brief: 'THE CONFLICT: 2003 Capital Murder involving Eric Hastings. Lead Investigator
      Lt Huey Hoss Mack (now Baldwin County Sheriff). Prosecutor DA David Whetstone.
      Trial Judge Robert Wilters (current District Attorney). Defense had Autopsy
      Report withheld from them via Motion for Relief under Rule 32 of Alabama Rules.
      Prosecution rested on co-conspirator testimony; no physical evidence for gun
      murder. Medical Examiner Dr. Paul McGarry testified victim was strangled (C-2
      vertebrae shot through), but case convicted Murray "Bubba" Lawrence for shooting.
      Parallel reference: George Floyd death medical report claims no asphyxiation/contusions;
      toxicology shows fatal fentanyl dose.


      THE DISCOVERY: Federal Civil Rights Lawsuit filed against Baldwin County Sheriff’s
      Office (BCSO) and Major Crimes Unit. Second federal lawsuit active; previous
      one pending. Involves murder of O.J. French by Bay Minette Police Officer Brandon
      Thompson. Jonathan Victor (April 2021): Sheriff Deputy Hunady shot unarmed victim
      four times from 7 yards. April 2021: Judge William Cassady denied qualified
      immunity to Hunady and Sheriff Mack. BCSO appealing; Sheriff provided untrue
      facts in court file. Sheriff Mack seeking replacement Anthony Lowery to take
      office due to lawsuits and investigations surfacing. Major Crimes Unit (BCMCU)
      lacks credibility; self-investigating agency with Chief Al Tolbert as Chairman.
      First 8 of 10 internal investigations found no police at fault but footage withheld;
      Jonathan Victor case is the 9th loss of life involving BCMCU self-investigation.


      THE PIVOT: Article 2 confirms the law enforcement environment and integrity
      issues described in Article 1 are current and federally acknowledged. Huey Hoss
      Mack was Lt Investigator in the suppressed-evidence Hastings case (Article 1);
      now faces federal lawsuits for O.J. French cover-up (Article 2). Article 1''s
      claim of Baldwin County law enforcement withholding evidence ("Where we do things
      different") is substantiated by Art 2''s admission of withheld camera footage
      from previous cases and the self-investigating nature of BCMCU.


      KEY ENTITIES: Huey "Hoss" Mack; Brandon Thompson; Eric Hastings; Murray "Bubba"
      Lawrence; Dr. Paul McGarry; DA David Whetstone; Robert Wilters; George Floyd;
      Derek Chauvin; Jonathan Victor; Deputy Hunady; O.J. French; Al Tolbert; Mayor
      Wills; Judge William Cassady; Anthony Lowery.'
