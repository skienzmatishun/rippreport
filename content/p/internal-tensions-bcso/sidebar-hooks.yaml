      candidate Matt McKenzie. Cooperation on 287(g) operations was suspended or paused
      due to the breakdown in communication and trust between BCSO leadership and
      Mobile ERO.


      THE DISCOVERY:

      Sheriff Hoss Mack and District Attorney Robert Wilters share a long-standing
      relationship where Wilters will comply with Mack''s wishes. Political influence
      existed, including Senator Trip Pittman sponsoring legislation that secured
      Sheriff Mack’s position and awarding himself $750,000.00 in B/P money. A legal
      precedent (*Lagniappe v. Mack*, 2021) established that law enforcement investigative
      reports are privileged communication protected from disclosure, limiting transparency.


      THE PIVOT:

      The Widget Article proves that the environment of BCSO power dynamics and political
      corruption (Sheriff Mack’s control over the DA, influence via legislation) provided
