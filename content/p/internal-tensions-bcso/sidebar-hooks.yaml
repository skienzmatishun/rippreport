hooks:
  lowery-puts-campaign-first-immigration-enforcement:
    brief: 'THE CONFLICT:

      Chief Deputy David White expressed concern regarding BCSO deputies assisting
      Mobile Enforcement and Removal Operations (ERO) during the sheriff’s election
      cycle, alleging ERO agents were "just out stopping brown people." Internal tensions
      arose when White instructed deputies to stop involvement and subsequently criticized
      the Mobile ERO supervisor for communication. This dispute resulted in the temporary
      suspension or pause of 287(g)-related cooperation between BCSO and federal immigration
      enforcement agencies due to broken trust.


      THE DISCOVERY:

      Concerned citizens publicly questioned Sheriff Anthony Lowery regarding whether
      immigration enforcement cooperation had been reduced or suspended, suggesting
      the decision may be tied to his political campaign strategy rather than law
      enforcement reasons.


      THE PIVOT:

      Article 2 functions as the ''smoking gun'' by framing the internal operational
      tensions and subsequent suspension of cooperation described in Article 1 not
      merely as an internal disagreement between agencies, but as a deliberate political
      maneuver by BCSO leadership to manage their public image during the election
      cycle.


      KEY ENTITIES:

      David White

      Anthony Lowery (Sheriff)

      Matt McKenzie (Candidate)

      Mobile ERO

      BCSO

      Federal immigration enforcement personnel

      Baldwin County'
    generated_at: '2026-05-12T15:42:42.672046Z'
    text: Anthony Lowery halted federal immigration raids just to save his own skin
      during the election cycle. This proof shows how the Baldwin County Sheriff’s
      Office treats public safety like a campaign ad rather than a duty to the law.
      Lowery puts his image before your safety every single time.
  anonymous-bb:
    brief: 'THE CONFLICT:

