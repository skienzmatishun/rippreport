      THE DISCOVERY:

      The broader context of the BCSO is defined by a corrosive "CULTURE" established
      by Hoss Mack and Anthony Lowery, which allegedly supports GOB interests and
      involves cover-ups regarding wrongful convictions (Murray Lawrence Jr.), fatal
      incidents (Johnathan Victor), and judicial collusion involving figures like
      Judge Robert Wilters.


      THE PIVOT:

      Article 2 provides the evidence that the political conflict described in Article
      1 is rooted in established systemic corruption, historical cover-ups, and a
      toxic leadership culture within the BCSO structure, making the tension between
      Lowery/Mack and McKenzie more than just an administrative disagreement.


      KEY ENTITIES:

      David White, Anthony Lowery, Matt McKenzie, Hoss Mack, Mobile ERO, BCSO deputies,
      Robert Wilters, Murray Lawrence Jr., Johnathan Victor, Justin Correa, Robert
