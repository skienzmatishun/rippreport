  in-the-dark:
    brief: '**THE CONFLICT:**

      *   In 2016 (specifically September 3 through August 1), Kevin Boone acted with
      a clear conflict of interest regarding Fairhope Planning and Zoning Commission
      approvals.

      *   Boone was partnered with John Avent, who was a business partner with the
      engineering company Dewberry/Preble-Rish, LLC.

      *   Boone consistently voted on projects (e.g., Fly Creek Apartments/Retreat
      at Fairhope Village, Old Battles Place) presented by Preble-Rich or its affiliates
      (HMR, LLC), despite these approvals conflicting with staff recommendations or
      his interests.

      *   The firm Dewberry/Preble-Rish donated $2500.00 to Boone’s re-election campaign
      while he voted on their projects without recusal.


      **THE DISCOVERY:**

      *   By 2018, the Fairhope City Council was engaging in systemic political dysfunction,
      prioritizing appeasing a specific voting bloc (non-drinking Baptists) over municipal
      governance.

      *   The council authorized legal fees for Charles K/ Breland, Jr.’ve Third-Party
      Complaint against Charter Oak Fire Insurance Company, despite having failed
      to settle previous major lawsuits like the Triangle lawsuit ($11.25 million
      cost).

      *   Council president led efforts to secure Mayor Karin Wilson’s approval of
      Judge Snedecker for a second term and ignored potential public safety issues
      (e.g., Ron McSharry operating as an alleged public nuisance/rouge bar owner).


      **THE PIVOT:**

      *   Article 1 establishes Kevin Boone''s actions as specific, transactional
      corruption tied to development interests and campaign donations within the Planning
      and Zoning context in 2016.

      *   Article 2 proves that this is not isolated behavior; it reveals a much broader
      pattern of institutionalized political self-interest by the entire City Council
      into 2018—a refusal to settle significant legal risks (Breland/Triangle lawsuits)
      and prioritizing political appeasement over fiduciary duty, thus connecting
      specific developer influence (Article 1) to wider municipal negligence.


      **KEY ENTITIES:**

      *   Kevin Boone / Mr. Boone: Fairhope Councilman involved in voting conflicts
      of interest.

      *   John Avent: Business partner connected to Dewberry/Preble-Rish, LLC and
      project presentation.

      *   Dewberry/Preble-Rish, LLC: Engineering firm tied to development projects
      and campaign contributions ($2500.00).

      *   Fairhope City Council / Mayor Karin Wilson: Governing body shown prioritizing
      political groups over legal responsibility (2018).

      *   Charles K/ Breland, Jr.: Litigant involved in a long-term complaint against
      the City of Fairhope.

      *   The Triangle lawsuit: Major municipal liability ($11.25 million cost) ignored
      by council.

      *   Ron McSharry / Snedecker: Connected entities highlighting alleged disregard
      for law despite attempts to restrict alcohol.'
