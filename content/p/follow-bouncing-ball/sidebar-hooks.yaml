  newsletter-the-ripp-report:
    brief: '**THE CONFLICT:**

      - Kevin Boone was a Fairhope City Council member in 2016.

      - He voted on several planning projects involving Dewberry/Preble-Rish and HMR,
      LLC (e.g., Retreat at Fairhope Village/Fly Creek Apartments; Old Battles Place;
      Azalea at the Colony).

      - In August 2016, Preble-Rish donated $2500 to Kevin Boone''s re-election campaign.

      - Kevin Boone was in an unrelated business LLC with John Avent (a representative
      for Dewberry/Preble-Rish) and failed to recuse himself from votes involving
      the firm.

      - The Mayoral request to change engineers, which Mr. Boone opposed in favor
      of Preble-Rish or HMR, occurred during this period.


      **THE DISCOVERY:**

      - The Ripp Report identifies broader political corruption within Baldwin County’s
      14 municipalities.

      - It specifically targets BP Pittman regarding his role in the District 32 State
      Senate seat.

      - The report alleges Pittman is a "poster child for corruption" and claims he
      skimmed $750,000 from BP during his tenure.


      **THE PIVOT:**

      - Article 1 provides documented evidence of specific, localized ethical violations
      (Boone’s votes/campaign donations) concerning a single developer (Preble-Rish).

      - Article 2 frames these isolated incidents as part of a systemic pattern of
      high-level political corruption ("no identity on goat hill," "high level of
      corruption") that The Ripp Report is actively exposing across all county government
      levels, including the allegations against Pittman.


      **KEY ENTITIES:**

      - Kevin Boone (Councilman)

      - Preble-Rish/Dewberry/Preble-Rich LLC

      - HMR, LLC

      - John Avent (Business partner of Mr. Boone; Representative for Preble-Rish)

      - Hollie MacKellar (Planning Commissioner)

      - Jay Robinson (City Council member)

      - Bob Clark (Mayor/Council member in 2016)

      - George Robards (Fairhope Planning and Zoning Commission Member)

      - Steve Pumphrey (Presenter for HMR, LLC projects)

      - BP Pittman (State Senator / Alleged corrupt figure)

      - The Ripp Report (Non-profit organization exposing corruption)'
