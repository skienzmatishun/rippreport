  tale-of-two-cities:
    brief: 'THE CONFLICT

      *   Councilman Boone of Fairhope voted on projects involving engineering firms
      Preble-Rish and HMR, despite having a conflict of interest/campaign contributions
      ($2500.00 donation to his re-election campaign).

      *   Specific votes cited: Sept. 3, 2016 SD 16.14; Oct. 3, 2016 SD 16.16; etc.,
      where Boone supported projects represented by Preble-Rish or HMR.


      THE DISCOVERY

      *   The Fairhope Planning and Zoning Board rejected a zoning request regarding
      Fly Creek Apartments (a 240-unit project) and recommended that the Daphne City
      Council perform the same action, demonstrating a lack of cooperation between
      the municipalities.

      *   The Daphne Planning and Zoning Board discussed a request to change the zoning
      on a parcel at the entrance to Daphmont Subdivision due to a proposed 24-hour
      service station near Colonaid Apartments.


      THE PIVOT

      *   Article 2 demonstrates how planning decisions in Fairhope (Fly Creek Apartments)
      and Daphne operate independently, which is highlighted as a mechanism for permitting
      incompatible development ("apartments on apartments").

      *   This establishes the context of jurisdictional fragmentation, suggesting
      that similar patterns of non-cooperation or undue influence may exist across
      both municipalities.


      KEY ENTITIES

      *   Councilman Boone

      *   Preble-Rish, LLC

      *   HMR, LLC

      *   Fly Creek Apartments

      *   Daphne Subdivision

      *   Fairhope Planning and Zoning Commission

      *   Daphne City Council

      *   Colonaid Apartments'
    generated_at: '2026-07-11T12:10:25.437865Z'
  balls:
    brief: 'THE CONFLICT

      *   Councilman Boone voted on projects supported by engineering firms Dewberry/Preble-Rish,
      LLC and HMR, LLC.

      *   Specific votes cited include Sept. 3, 2016 SD 16.14 (Fly Creek Apartments)
      and Oct. 3, 2016 SD 16.16 (Old Battles Place).

      *   The firm Preble-Rish donated $2500.00 to Councilman Boone’s re-election
      campaign.


      THE DISCOVERY

      *   Defendants Leaf River and Corte made material representations to the Fairhope
      Planning Commission, City Council, Plaintiffs, and residents between January
      2016 and April 2016 concerning the Fly Creek PUD Amendment.

      *   The representations falsely claimed an environmentally friendly non-point
      discharge system would be used when a point discharge system was planned.

      *   The representations misrepresented compliance with the Red Soil Ordinance
      #1423, claiming no red soil would be used in critical areas, while planning
      to move red soil into 100'' of wetlands/Fly Creek.

      *   These misrepresentations led to the approval of the Fly Creek PUD Amendment.


      THE PIVOT

      *   Article 2 proves that the projects Boone voted for (Article 1) were approved
      based on material misrepresentation and non-disclosure regarding environmental
      facts, establishing a mechanism for unethical decision-making tied to those
      specific entities (Preble-Rish/HMR).


      KEY ENTITIES

      *   Councilman Boone

      *   Fly Creek Apartments

      *   Preble-Rish, LLC

      *   HMR, LLC

      *   Dewberry

      *   John Avent

      *   Leaf River

      *   Corte

      *   Fairhope Planning Commission

      *   Red Soil Ordinance #1423'
    generated_at: '2026-07-11T12:10:25.437868Z'
