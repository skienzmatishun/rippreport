  balls:
    brief: '**THE CONFLICT:**

      *   Between September and October 2016, Kevin Boone voted on multiple Fairhope
      Planning and Zoning projects involving Dewberry/Preble-Rich, LLC, a firm partnered
      with Mr. Boone through John Avent (business partner).

      *   Specific votes include: Sept. 3, 2016 (Fly Creek Apartments); Oct. 3, 2016
      (Old Battles Place), where Kevin Boone made the motion for approval; and Aug.
      1, 2016, favoring Dewberry/Preble-Rich requests despite conflict of interest.

      *   The firm donated $2500 to Mr. Boone’s re-election campaign while he did
      not recuse himself from votes involving their projects, which violates Ethics
      rules.


      **THE DISCOVERY:**

      *   Developers Leaf River and Corte made material misrepresentations to the
      Fairhope Planning Commission and City Council (January–April 2016) regarding
      the Fly Creek PUD Amendment approval process.

      *   They claimed a non-point discharge system would be used, but actually planned
      a point discharge system which required at least 50 Tons of Class 2 rip rap
      near wetlands.

      *   The developers violated Red Soil Ordinance #1423 by planning to move red
      soil (clay/silt) from within the PUD into critical areas within 100'' of Fly
      Creek, a blatant misrepresentation that led to project approval.


      **THE PIVOT:**

      *   Article 1 established Kevin Boone’s conflicts of interest in approving projects
      linked to Preble-Rish; Article 2 reveals *why* the most contentious project—Fly
      Creek Apartments—was approved: it was based on environmental deception by developers
      Leaf River and Corte, allowing the questionable PUD Amendment (and thus the
      subsequent votes) to pass despite severe risks to Fly Creek.


      **KEY ENTITIES:**

      *   Kevin Boone (City Council Member/Candidate)

      *   John Avent (Business Partner of Mr. Boone / Presenter for Dewberry/Preble-Rich
      projects)

      *   Dewberry/Preble-Rich, LLC

      *   Leaf River and Corte (Developers)

      *   Fly Creek Apartments (240-unit project subject to debate)

      *   Red Soil Ordinance #1423

      *   Bob Clark (Fairhope City Council/Planning Commission Member)

      *   Hollie MacKellar (Fairhope Planning and Zoning Commission Member)

      *   Jay Robinson (City Council Member / Motion Maker on Fly Creek)'
