  showing-your-true-colors:
    brief: 'THE CONFLICT:

      - Fall 2016 Planning & Zoning (P&Z) Commission meetings saw Councilman Kevin
      Boone vote on projects involving Dewberry/Preble-Rich LLC, a firm he was partnered
      with through John Avent’s business.

      - Specific dates: Sept 3, 2016 (Retreat at Fairhope Village, Fly Creek Apartments);
      Oct 3, 2016; Aug 1, 2016 (Old Battles Village).

      - Conflict involved Boone voting to approve or support projects despite conflicts
      of interest and receiving $2500 in campaign donations from Preble-Rich.


      THE DISCOVERY:

      - Mayor Tim Kant utilized his final administrative days before losing re-election
      (Nov 7, 2016 transition) to push through "good ole boy building projects" via
      the P&Z commission’s last meetings.

      - These projects included SD 16.14 (Fly Creek Apartments by Dev/Preble-Rich
      LLC) and SD 16.16 (Old Battles Place by HMR, LLC).


      THE PIVOT:

      - Article 2 confirms that the specific project requests detailed in Article
      1 (The Retreat at Fairhope Village / Fly Creek Apartments; Old Battles Place)
      were actively being "shoved through" by Mayor Kant as part of his final, self-serving
      transition strategy to secure political legacies and fulfill promises to campaign
      contributors.


      KEY ENTITIES:

      - Kevin Boone / Councilman Kevin Boone

      - John Avent

      - Dewberry/Preble-Rich LLC (or Preble-Rish)

      - HMR, LLC (Hutchinson, Moore, & Rauch, LLC)

      - Mayor Tim Kant

      - Bob Clark (Mayor at time of P&Z votes documented in Article 1)

      - Fly Creek Apartments / Retreat at Fairhope Village

      - Old Battles Place

      - September 6, 2016 (Date mentioned as key "transition" and P&Z meeting date
      in both sources).'
    generated_at: '2026-07-18T04:10:44.234466Z'
  tale-of-two-cities:
    brief: '**THE CONFLICT:**

      *   Kevin Boone, Fairhope City Councilman (2019-07-24), voted on multiple projects
      tied to Dewberry/Preble-Rich, LLC (John Avent, Steve Pumphrey).

      *   Conflict arose regarding Fly Creek Apartments (Retreat at Fairhope Village)
      in Sept. 3, 2016 (SD 16.14); Kevin Boone voted ''NAY'' while supporting interests
      linked to John Avent, a business partner.

      *   Further votes included HMR, LLC projects on Oct. 3, 2016 and Aug. 1, 2016;
      Mr. Boone pushed for these firms despite the Mayor’s request for fresh eyes.

      *   Dewberry/Preble-Rich donated $2500.00 to Kevin Boone''s re-election campaign
      while he allegedly voted on their projects without recusing himself.


      **THE DISCOVERY:**

      *   Daphne Planning and Zoning Board rejected a zoning change request for the
      Daphmont Subdivision entrance (intersection of Johnson Road and Highway 98/Colonaid
      Apartments).

      *   This rejection followed strong community opposition from "over 100 other
      people" who voiced concerns regarding congestion and negative neighborhood effects.

      *   The Daphne Planning and Zoning Board recommended that the Daphne City Council
      also reject the zoning change based on public input, demonstrating a willingness
      to heed citizen concerns.


      **THE PIVOT:**

      *   Article 2 establishes an alternative municipal process where community input
      led to project rejection (Daphne).

      *   This contrasts with Article 1''s evidence that in Fairhope, despite over
      9 meetings and 99% opposition, the planning board failed to reject controversial
      projects like Fly Creek Apartments.

      *   Article 2 serves as proof of concept—showing what a responsive, citizen-focused
      P&Z Board looks like—highlighting the alleged lack of transparency, accountability,
      and responsiveness in Fairhope''s process for approving politically favored
      development (Fly Creek/Preble-Rich).


      **KEY ENTITIES:**

      *   Kevin Boone (City Councilman)

      *   Daphne Planning and Zoning Board

      *   Fairhope Planning and Zoning Commission

      *   Dewberry/Preble-Rich, LLC (John Avent, Steve Pumphrey)

      *   HMR, LLC

      *   Fly Creek Apartments (Retreat at Fairhope Village)

      *   Colonaid Apartments / Daphmont Subdivision entrance

      *   Bob Clark

      *   Jay Robinson

      *   Jennifer Fidler'
