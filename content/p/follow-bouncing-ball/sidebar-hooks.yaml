  boone-doggle:
    brief: 'THE CONFLICT

      *   Councilman Boone voted on and supported projects represented by engineering
      firms (Dewberry/Preble-Rich, LLC; HMR, LLC).

      *   Specific votes cited: Sept. 3, 2016 (SD 16.14) for Fly Creek Apartments;
      Oct. 3, 2016 (SD 16.16) for Old Battles Place; Oct. 3, 2016 (SD 16.20) for Azalea
      at the Colony.

      *   The engineering firm (Dewberry/Preble-Rich) donated $2500.00 to Boone''s
      re-election campaign.


      THE DISCOVERY

      *   Councilman Boone has multiple conflicts of interest beyond the specific
      projects cited.

      *   Boone is involved in numerous LLCs and side deals that he failed to disclose.

      *   He voted on resolutions involving hundreds of thousands of dollars for engineering
      companies through his connections via LLCs.


      THE PIVOT

      *   Article 1 details specific instances where Boone supported projects involving
      firms he had connections with (Preble-Rish/HMR).

      *   Article 2 establishes that these specific votes are part of a larger pattern
      of behavior, proving Boone has numerous undisclosed conflicts and is entitled
      to side deals.


      KEY ENTITIES

      *   Councilman Boone

      *   Preble-Rish, LLC

      *   Dewberry/Preble-Rich, LLC

      *   HMR, LLC

      *   Fly Creek Apartments

      *   Old Battles Place

      *   Azalea at the Colony

      *   John Avent (Business partner of Boone)'
