hooks:
  boone-doggle:
    brief: 'THE CONFLICT

      * Councilman Kevin Boone had business connections through LLC''s, including
      a partnership with John Avent, representative of Dewberry/Preble-Rish, LLC.

      * In 2016, Mr. Boone served on the Fairhope Planning and Zoning Commission,
      voting on multiple projects involving firms connected to his business interests
      (e.g., Fly Creek Apartments, Old Battles Place).

      * Specific documented votes include Sept. 3, 2016 SD 16.14 regarding Dewberry/Preble-Rich
      approval of Fly Creek Apartments where Mr. Boone voted NAY.

      * In related matters, the same firm donated $2500.00 to his re-election campaign.


      THE DISCOVERY

      * Article 2 asserts that Councilman Boone has numerous undisclosed conflicts
      of interest spanning both Planning and Zoning and City Council duties.

      * It highlights that he voted in favor of engineering companies connected to
      his LLC interests on council resolutions valued at hundreds of thousands of
      dollars.

      * The article frames this pattern as a consistent character flaw, comparing
      his obstructionist behavior to past councilman Ford.


      THE PIVOT

      * Article 1 provides the granular legal evidence (specific Planning and Zoning
      minutes from 2016) demonstrating Mr. Boone''s failure to recuse himself when
      voting on projects involving business partners/connected firms.

      * Article 2 takes this specific historical pattern of proven conflict (Article
      1) and generalizes it into a comprehensive claim about the scope of his entire
      tenure, characterizing him as a persistent source of municipal financial risk
      for Fairhope.


      KEY ENTITIES

      * Councilman Kevin Boone / Mr. Boone

      * John Avent (Business partner/Representative of Dewberry/Preble-Rish, LLC)

      * Dewberry/Preble-Rich, LLC / Preble-Rish

      * HMR, LLC (Project representative Scott Hutchinson)

      * Fairhope Planning and Zoning Commission

      * Bob Clark

      * Hollie MacKellar

      * Jay Robinson

      * George Robards'
