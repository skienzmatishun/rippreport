  police-report:
    brief: |-
      THE CONFLICT
      - The Ripp Report and BCLE issued a $5,000 cash reward offer to anyone proving the formal complaint against Fairhope Councilman Jack Burrell is false.
      - Ripp Report alleges they are the origin of the formal complaint but claims Burrell and his allies attempted to suppress them.
      - Specific allegation in Ripp Report: Burrell (Council President/Airport Authority member) accepted free airplane transportation from the winning bidder he helped select.
      - Burrell has avoided answering questions regarding this complaint and accused the Mayor of being responsible instead.

      THE DISCOVERY
      - Ripp Report obtained a police report for Jack Burrell in Fairhope through an attorney.
      - Document dated: Doc-May-23-2018-13_40-1.pdf.
      - Police report shows Burrell has a criminal/charges record he never disclosed to the public.
      - Fairhope City Council was made aware of this police report weeks ago and refused to answer or address it.
      - Ripp Report reveals tax dollars paid for Jack Burrell’s legal defense against a previous ethics complaint they filed regarding the Airport Authority (which was scrubbed).
      - Report specifically calls out connections to Municipal Judge and questions ties between Burrell, the Airport Authority, and potential connection to Judge Michelle Thomason.

      THE PIVOT
      - Article 2’s police report serves as proof that Ripp Report is obtaining official records to counter Burrell’s silence.
      - The police report (Article 2) validates the Reward challenge in Article 1 by showing Burrell hides information, mirroring the Ripp Report’s claim that his "formal complaint" documents are also being handled with secrecy.
      - Confirms Burrell used his position (Council President/Airport Authority) to block accountability for the ethics complaint, now confirmed by public police records he ignores.
      - Proves Ripp Report is not fabricating information; they hold physical police reports connecting Burrell to legal issues he refuses to disclose.

      KEY ENTITIES
      - Jack Burrell
      - Fairhope City Council (specifically Robert Brown)
      - Judge Michelle Thomason
      - Airport Authority Board
      - The Ripp Report / BCLE (Boise City Legal Entity or internal group)
      - Fairhope Municipal Judge
