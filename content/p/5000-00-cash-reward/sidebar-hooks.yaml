      THE DISCOVERY:
      - Widget Article proves Burrell publicly admitted during city council meeting that Authority does not "need" to issue an RFP for the hangar lease, which was a deliberate misrepresentation.
      - Ethics Commission rule cited: Public officials must use bid processes when doing business with entities they serve.
      - Hangar lease process was "compelled" to be bid because Mr. Hix sits on the Airport Authority Board (creating conflict of interest).
      - Hangar cost was $750,000; houses a $1 million airplane with fuel farm and 30-year lease.
      - Burrell and council members Boone/Brown voted down Mayor Kant’s nominations for Airport Authority (breaks 15-year trend of approval).
      - Burrell actively blocks Mayor Kant’s appointments to the Airport Authority.

      THE PIVOT:
      - Widget Article links Burrell’s defense of the hangar lease directly to Ripp Report’s complaint: He knows bidding laws apply (Hix connection) but publicly claims they do not.
      - Burrell’s claim that lease "does not profit anyone" conflicts with reality: Authority has revenue center (fuel farm/lease) where Ripp Report claims Burrell took free flights.
      - Widget reveals political motive: Mayor Kant and social media election led to Mayor Wilson, causing Burrell/Kant rift.
      - Ripp Report reward ($5k) is leveraged specifically to prove or disprove the lease/flight allegations that Widget exposes Burrell is defending in public.

      KEY ENTITIES:
      - Jack Burrell (Fairhope Council President)
      - Mayor Kant
