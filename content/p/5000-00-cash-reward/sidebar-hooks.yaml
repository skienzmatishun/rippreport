  listening-not-reading:
    brief: |-
      THE CONFLICT:
      - Ripp Report filed formal ethics complaint against Jack Burrell (Fairhope Council President/Airport Authority Board Member).
      - Complaint alleges Burrell and family received free airplane transportation from the winning bidder of a hangar lease he helped select.
      - Burrell threatened legal action against The Ripp Report and the Mayor while blocking comments in his position as Council President.
