      - Letter states Ethics Commission Advisory Opinion was issued Feb 3, 2016 (after
      the lease).

      - Letter details Hix/Snedeker (Mid-Bay Air LLC) had prior business relationship
      with Executive Aviation via Mr. Hix''s appointment to the Authority.

      - Letter states Mr. Hix had access to all financial information of the Authority
      as Sec Treasurer prior to RFP process.


      THE PIVOT

      - Widget Article proves the "conflict of interest" alleged in Main Article:
      Hix/Snedeker had prior access to Authority data and financial info before the
      bid, which Burrell helped oversee.

      - Widget Article confirms improper process: Lease executed Dec 17, 2015 predates
      Ethics Commission opinion Feb 3, 2016.

      - Widget Article directly supports Main Article''s claim that Burrell was "directly
      involved with the selection of the bid."

      - Widget Article substantiates Main Article''s allegation that Burrell was a
      "voting Board member" and "liaison to the city."


      KEY ENTITIES

      - Jack Burrell (Fairhope City Council President, Airport Authority Board member)

      - Francis Paul Ripp / The Ripp Report

      - Hix/Snedeker Companies (Mid-Bay Air LLC)

      - Terry Chapman (Executive Aviation)

      - Kel Jones (Executive Aviation)

      - Office of Attorney General Special Prosecutions Division

      - Fairhope Airport Authority'
