  now-you-know-jack:
    brief: 'THE CONFLICT:

      *   Councilman Jack Burrell of Fairhope faced a formal complaint regarding his
      alleged involvement in the selection of a bid that provided free airplane transportation
      to him and family members while he served as an elected official.

      *   A citizen filed a Verified Notice Of Claim against The City Of Fairhope
      in August 2017, related to these conflicts.

      *   The Mayor was required by law to file an Ethics complaint against Burrell.


      THE DISCOVERY:

      *   The Widget Article reveals that Jack Burrell orchestrated a campaign of
      obstruction against the office of the Mayor from day one.

      *   His aggressive behavior and retaliation stem specifically from the Ethics
      complaint filed by the Mayor.

      *   Burrell demonstrated selective use of power: he approved Airport funds to
      hire an attorney to investigate The Ripp Report, while simultaneously leading
      the charge to deny the Mayor legal counsel.


      THE PIVOT:

      *   Article 1 attempts to defend Burrell against external allegations (the formal
      complaint/reward) by questioning their source and legitimacy.

      *   Article 2 provides internal evidence that Burrell''s defensive posture,
      public attacks, and efforts to control narratives are retaliatory actions taken
      against the Mayor after she legally filed an Ethics complaint, suggesting his
      current disputes lack merit relative to internal misconduct.


      KEY ENTITIES:

      *   Jack Burrell (Councilman / Council President)

      *   Fairhope City Council

      *   The Ripp Report (Reporter/Organizer)

      *   The Mayor (Kant)

      *   Fairhope Airport Authority

      *   BCLE'
