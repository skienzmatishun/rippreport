      THE PIVOT:

      *   Article 2 shows Burrell''s role as Council President, Airport Authority
      Board member, and liaison to the city, directly linking him to the specific
      property ownership dispute ($8.85 million land deal) and institutional responsibilities
      that underpin the allegations in Article 1.


      KEY ENTITIES:

      *   Jack Burrell (Council President, Airport Authority Board member, liaison)

      *   Mayor Karin Wilson

      *   Fairhope-Airport

      *   Airport Authority debt (21 percent of Fairhope''s overall borrowing)

      *   258 acres purchased in 2007 for $8.85 million'
