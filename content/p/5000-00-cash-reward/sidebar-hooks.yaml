  court-public-opinion-now-session:
    brief: |-
      THE CONFLICT
      - The Ripp Report and BCLE offered a $5,000 cash reward to prove the formal complaint against Councilman Jack Burrell is false or malicious.
      - Main Article states Burrell refuses to address facts regarding the complaint and attempts to limit public comment via his positions.
      - Main Article alleges Burrell is using "threats of suing" against the Mayor and bidders to deflect from allegations that he received free flights via the winning bidder.
      - Main Article asserts the complaint originated from The Ripp Report's investigative efforts into Airport Authority bidding.
      - Main Article claims Burrell and family members received free air transportation from the winning bidder, Hix/Snedeker Companies.

      THE DISCOVERY
      - Widget Article is a Jan 25, 2017 letter from Francis Paul Ripp to the Office of Attorney General Special Prosecutions Division.
      - Letter explicitly states: "We have received reliable information that Mr Burrell [sometimes accompanied by his wife] has made numerous flights on aircraft provided by Hix/Snedeker... While an elected official."
      - Letter details the Fairhope Airport Authority lease was signed and notarized Dec 17, 2015.
      - Letter states Ethics Commission Advisory Opinion was issued Feb 3, 2016 (after the lease).
      - Letter details Hix/Snedeker (Mid-Bay Air LLC) had prior business relationship with Executive Aviation via Mr. Hix's appointment to the Authority.
      - Letter states Mr. Hix had access to all financial information of the Authority as Sec Treasurer prior to RFP process.

      THE PIVOT
      - Widget Article proves the "conflict of interest" alleged in Main Article: Hix/Snedeker had prior access to Authority data and financial info before the bid, which Burrell helped oversee.
      - Widget Article confirms improper process: Lease executed Dec 17, 2015 predates Ethics Commission opinion Feb 3, 2016.
      - Widget Article directly supports Main Article's claim that Burrell was "directly involved with the selection of the bid."
      - Widget Article substantiates Main Article's allegation that Burrell was a "voting Board member" and "liaison to the city."

      KEY ENTITIES
      - Jack Burrell (Fairhope City Council President, Airport Authority Board member)
      - Francis Paul Ripp / The Ripp Report
      - Hix/Snedeker Companies (Mid-Bay Air LLC)
      - Terry Chapman (Executive Aviation)
      - Kel Jones (Executive Aviation)
