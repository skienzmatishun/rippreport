      *   The Mayor urged the council to take ownership of 258 acres purchased by
      the Airport Authority in 2007 for $8.85 million.

      *   Jack Burrell responded mockingly that his loyalty was to the "less than
      1%" and refused to recuse himself from comments regarding the Airport Authority
