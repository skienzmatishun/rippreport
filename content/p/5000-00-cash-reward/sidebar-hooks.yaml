  court-public-opinion-now-session:
    brief: 'THE CONFLICT

      - The Ripp Report and BCLE offered a $5,000 cash reward to prove the formal
      complaint against Councilman Jack Burrell is false or malicious.

      - Main Article states Burrell refuses to address facts regarding the complaint
