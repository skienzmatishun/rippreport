      efforts into Airport Authority bidding.

      - Main Article claims Burrell and family members received free air transportation
      from the winning bidder, Hix/Snedeker Companies.


      THE DISCOVERY

      - Widget Article is a Jan 25, 2017 letter from Francis Paul Ripp to the Office
      of Attorney General Special Prosecutions Division.

      - Letter explicitly states: "We have received reliable information that Mr Burrell
      [sometimes accompanied by his wife] has made numerous flights on aircraft provided
      by Hix/Snedeker... While an elected official."

      - Letter details the Fairhope Airport Authority lease was signed and notarized
