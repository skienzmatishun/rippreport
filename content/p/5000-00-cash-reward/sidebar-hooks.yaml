  fairhope-voters-important-notice:
    brief: 'THE CONFLICT

      *   Councilman Jack Burrell is accused of receiving free airplane transportation
      by a winning bidder while serving as an elected official related to an airport
      bid.

      *   Burrell was involved in the selection of the bid.

      *   Burrell is threatening legal action against the Mayor.


      THE DISCOVERY

      *   Councilmen Boone and Burrell are actively working to slow city business
      and undermine Mayor Wilson.

      *   Catalyst Associates, formed Aug. 11, 2014, is being used by Councilmen Boone
      and Burrell to discredit the Mayor through falsehoods regarding the airport
      scandal.


      THE PIVOT

      *   Article 2 reveals that the alleged misconduct in Article 1 is part of a
      broader, organized political effort led by Catalyst Associates, showing premeditated
      actions by Councilmen Boone and Burrell rather than isolated events.

      *   Catalyst represents an established group intent on discrediting the Mayor
      and challenging the current administration, providing context for Burrell''s
      defensive behavior mentioned in Article 1.


      KEY ENTITIES

      *   Jack Burrell (Councilman)

      *   Mayor Wilson

      *   Councilmen Boone and Burrell

      *   Catalyst Associates

      *   Michael Scott Boone

      *   Lynn Stacey

      *   Coley M. Boone

      *   Fairhope Airport'
