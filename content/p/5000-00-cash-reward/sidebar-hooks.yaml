      THE PIVOT:

      *   Article 2 reveals that Burrell''s behavior (including fighting over Airport
      land title) is directly linked to his role as Council President and his actions
      in obstructing the Mayor, providing context for why the initial complaint was
      made and confirming malicious intent.


