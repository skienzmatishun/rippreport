  cooking-for-the-judge:
    brief: 'THE CONFLICT

      *   Judge Bill Scully was appointed due to backing by Catalyst Queen Michelle
      Thomason.

      *   Scully used his position as Veterans Court Judge to secure a District Court
      appointment.

      *   Scully signed an erroneous Ejectment order against Robert Yates, Jr., leading
      to a shootout and Yates'' death.

      *   Judge Scully ignored state DUI interlock laws passed in 2011 by failing
      to require ignition interlock devices for offenders.


      THE DISCOVERY

      *   Catalyst seeks total control over numerous Baldwin County government positions
      including the County Commission, Probate Judge, Circuit Judge, Sheriff, District
      Attorney, and State Senate seat.

      *   The District Attorney position was guaranteed following Judge Wilters''
      retirement by Catalyst.

      *   Sheriff Mack has no competition due to Sen Trip Pittman securing his office
      previously.


      THE PIVOT

      *   Article 1 focuses on the specific misconduct of one judge (Scully) and how
      he gained his position through political backing (Thomason/Catalyst).

      *   Article 2 proves that Catalyst is a systemic political entity aiming for
      comprehensive control across multiple county offices, making Scully''s appointment
      merely one component of a larger power grab.


      KEY ENTITIES

      *   Judge Bill Scully

      *   Michelle Thomason (Catalyst Queen)

      *   Robert Yates, Jr.

      *   Brian Dasinger

      *   Judge Wilters

      *   Elliott Haygood

      *   Stacy (who morphed into Catalyst)

      *   Sheriff Mack

      *   Trip Pittman'
