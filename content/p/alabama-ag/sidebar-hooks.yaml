  license-to-steal:
    brief: |-
      THE CONFLICT:
      - Francis Paul Ripp (The Ripp Report) sent letter to AG Steve Marshall detailing two complaints.
      - Sept 2022: Ripp filed complaint with AG office (Attn: Clark Morris) against Alabama Ethics Commission Executive Director Tom Albrittion regarding failure to pursue ethics complaints by Ripp.
      - $120,000: Tom Albrittion admitted skimming this amount from the Mabel Amos Trust.
      - AG Lawsuit: State filed lawsuit against Albrittion, but he remained Executive Director with paycheck.
      - Murray “Bubba” Lawrence Wrongful Conviction: Case dates back to 2005.
      - 18 Years Incarceration: Murray Lawrence incarcerated for approximately 6,570 days.
      - Withheld Evidence: Sheriff Hoss Mack and District Attorney Robert Wilters withheld Coroner’s Report from defense.
      - Willy Huntley Affidavit: Defense attorney signed Sept 18, 2023, stating he never received exculpatory evidence.
      - No Response: Ripp reports zero responses from AG office, Ethics Commission, Bar, or Writ of Mandamus attempts.
      - Baldwin County Corruption: Allegations involve Sheriff Hoss Mack, DA Robert Wilters (current), retired prosecutor David Whetstone.
      - Jarius Ireland Testimony: Affidavit highlights inconsistencies in testimony regarding "Bubba" Lawrence and gunshot theory.
      - 30-Year Ties: Judge Wilters, Sheriff Mack, and Prosecutor Whetstone described as "joined at the hip" for over 30 years.

      THE DISCOVERY:
      - Article 2 confirms AG Steve Marshall has not responded to The Ripp Report’s complaints.
      - Tom Albrittion (Allbritton): Ethics Commission Director linked to private charitable trust overseeing college tuition expenses exceeding $100,000.
      - John Plunk: Vice-Chair of Ethics Commission; linked to Sheriff Mike Blakely corruption trial in July 2021.
      - AG Marshall Campaign Promise: March 27, 2018 Tweet declared "It is my highest priority to ensure that those who serve the people of AL do so with the utmost integrity."
      - AG Marshall Campaign Promise: March 15, 2018 Tweet declared "Corruption will not be tolerated in this state... As your Attorney General, I have taken a stand to cut corruption."
      - Blakely Trial (2021): 31 witnesses, prosecution dropped 1 of 11 charges; Plunk linked to money flowing from Democrats (Sheriff) to Republican consultants.

      THE PIVOT:
      - Article 2 exposes Marshall’s "License to Steal" narrative contradicted by silence on Albrittion/Plunk scandals.
      - Confirms AG office failed to act on specific complaints regarding Albrittion (skimmed $120k) and Ethics Commission immunity.
      - Links AG’s promised integrity (Widget Article 1) directly to the inaction on Murray Lawrence corruption and Baldwin County law enforcement ties (Main Article).
      - Widget proves systemic conflict of interest: AG office ignores Ethics Commission while that commission is implicated (Albrittion/Plunk) in the same corruption network (Blakely/Mack/Wilters).

      KEY ENTITIES:
      - Francis Paul Ripp / The Ripp Report
      - Steve Marshall (Alabama Attorney General)
      - Tom Albrittion / Allbritton (Ethics Commission Executive Director)
      - John Plunk (Vice Chair, Ethics Commission)
