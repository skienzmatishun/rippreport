  cover-up:
    brief: |-
      THE CONFLICT
      - Francis Paul Ripp (The Ripp Report) submitted formal complaints to Alabama Attorney General Steve Marshall.
      - Complaint #1: Against Tom Albritton, Executive Director of Alabama Ethics Commission. Alleged Albritton skimmed $120,000 from the Mabel Amos Trust.
      - Legal Status: AG Marshall filed civil suit accusing Albritton of fraud, yet Albritton remains Executive Director with salary.
      - Complaint #2: Wrongful conviction of Murray "Bubba" Lawrence (murder of Brandon Hastings, 2005).
      - Specifics: Ripp alleges Sheriff Hoss Mack and retired Prosecutor David Whetstone withheld a Coroner's Report from defense attorney Willy Huntley.
      - Evidence: Defense affidavit signed by Willy Huntley (Sept 18, 2023) confirms he never received the withheld report.
      - Systemic Claim: Ripp states Alabama Bar Association dismissed complaints against Albritton; he claims Ethics Commission is a political tool.

      THE DISCOVERY
      - The Ripp Report published follow-up analysis confirming ethics complaints against Mayor Bob Wills (Bay Minette, AL) were also dismissed.
      - Facts on Mayor Wills:
        - Received ethics and Bar complaints regarding self-dealing rentals (building leased to county legislators for approx $867,000 over 15 years).
        - Ethics Commission and Alabama Bar did not penalize Wills.
      - Connection to Victims: Ripp Report published a letter from Mayor Bob Wills addressed to Tamara French regarding death of O.J. French Jr., killed Aug 20, 2021 by Bay Minette police.
      - Investigation: Baldwin County Major Crimes Unit (BCMCU) is investigating officers in the same jurisdiction. BCMCU is chaired by Bay Minette Police Chief Al Tolbert, who investigates his own members' departments.

      THE PIVOT
      - Article 1 (Complaint Letter) establishes that Ripp is formally tracking officials like Albritton and Wills with the AG office.
      - Article 2 (Widget) is the 'smoking gun' because it documents that the same agencies dismissing complaints against Albritton (Ethics Commission/Bar) also dismissed Wills.
      - This confirms the "cover up" claim in Article 1 is not isolated to Albritton; it applies to the Baldwin County power structure (Wills, Mack, Wilters).
      - Article 2 shows the pattern: Complaint filed -> Agencies dismiss -> Official (Wills/Albritton) continues power.

      KEY ENTITIES
      - Francis Paul Ripp (The Ripp Report - Author/Investigator)
      - Steve Marshall (Alabama Attorney General)
      - Tom Albritton (Ethics Commission Executive Director)
      - Bob Wills (Mayor, Bay Minette)
      - Hoss Mack (Sheriff Baldwin County)
      - Robert Wilters (Judge / Current Baldwin County District Attorney)
      - David Whetstone (Retired Prosecutor)
      - Willy Huntley (Defense Attorney for Murray Lawrence)
      - Al Tolbert (Bay Minette Police Chief / BCMCU Chairman)
    generated_at: '2026-03-12T01:15:07.550391Z'
    text: The same crooked agencies that cleared Tom Albritton are now protecting Mayor Bob Wills and his lucrative self-dealing rental schemes. This pattern of dismissal proves that Sheriff Mack and the Baldwin County power structure operate a protection ring that answers to nobody.
