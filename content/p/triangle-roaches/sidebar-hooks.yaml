      refunds that did not materialize.

      *   The City Council authorized Mayor Can''t to enter into settlement talks
      on February 2014.

      *   In September 2014, the Mayor announced a legal settlement, covering the
      loss of the lawsuit and legal fees.


      THE DISCOVERY

      *   Fairhope taxpayers are now facing a $10 million lawsuit in federal court.

      *   The current lawsuit concerns two developments: Gables on Lawrence (20 acres)
      and Skyline Village (16.5 acres).

      *   Taxpayers paid approximately $3 million in legal fees.

      *   The judgment included the city buying the Triangle for $8.25 million.

      *   Total taxpayer money spent was $11.25 Million ($3M in fees + $8.25M purchase).

      *   The City gave the Triangle property to the Single Tax Corporation.


      THE PIVOT

      *   Article 1 details the political maneuvering (Can''t''s role, Council authorization)
