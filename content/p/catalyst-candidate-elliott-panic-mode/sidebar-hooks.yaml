      2016 DUI arrest.

      *   Elliott attempted to mitigate his DUI punishment, resulting in only a 29-day
      license surrender instead of the potential 90 days.


      THE DISCOVERY

      *   Chris Elliott skimmed $4 million from the school 1% tax over one year.

      *   Elliott allegedly colluded with Superintendent Eddie Tyler regarding the
      funds skimming, claiming it was "for the schools."

      *   Elliott used Catalyst and subsequently double-dipped Stragtegy for campaign
      funds ($8640.00 to $140,951.80 collected).


      THE PIVOT

      *   Article 2 reveals that Elliott’s political success and perceived special
      treatment are tied to financial corruption (skimming school funds) and illegal
      campaign finance practices involving Catalyst and Stragtegy. This suggests his
      political maneuvers mentioned in Article 1 are predicated on illicit activity.


