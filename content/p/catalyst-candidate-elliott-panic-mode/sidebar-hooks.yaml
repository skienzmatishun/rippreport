      *   Chris Elliott

      *   David Northcutt

      *   Eddie Tyler (Superintendent of Education)

      *   Jon Gray (Elliott Campaign Manager/Lobbyist for Baldwin County School System)

      *   Hoss Mack (Sheriff’s Department)

      *   Catalyst

      *   Stragtegy

      *   Doug Jones

      *   Pittman

      *   Mayor Kennon

      *   Mayor Craft'
