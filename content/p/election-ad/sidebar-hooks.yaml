  court-of-public-opinion-2:
    brief: "THE CONFLICT: \n- Tom Albritton, Executive Director of the Alabama Ethics Commission.\n- Albritton serves as a trustee for the Mabel Amos Trust alongside John Bell (Regions Bank) and Rick Clifton.\n- The Trust includes strict language against self-dealing: \"The trustee shall not engage in any act of self-dealing as defined in section 4941(d)\" and \"shall not make any taxable expenditures as defined in section 5489.\"\n- Albritton is accused of using the Trust to pay $120,000 in tuition and expenses for his family.\n- Ripp Report identified this initial case but notes lack of public awareness regarding Conecuh County oil royalties; links this corruption pattern to broader ethical failures.\n\nTHE DISCOVERY: \n- Francis Paul Ripp (General Council for Court of Public Opinion) publicly accuses Albritton of self-dealing and demands resignation.\n- Ripp filed an Alabama Bar complaint against Albritton regarding his actions as a lawyer and trustee.\n- Albritton responded to the Bar\
      \ complaint via PDF letter (Ripp notes his response is deceptive/omitted facts).\n- Albritton responded to the Ethics Commission General Council complaint; document posted at rippreport.com/668ea96d-ethics-com-min.pdf.\n- Trust is allegedly being misused without accountability from the Ethics Commission.\n\nTHE PIVOT: \n- Widget Article serves as \"Court of Public Opinion\" verification, demanding formal consequences because the Alabama Ethics Commission failed to act despite admitting knowledge.\n- Connects legal/ethical violations (Trust law, Ethics standards) to political corruption and public trust erosion.\n- Positions Ripp Report as the entity forcing transparency: threatening to print corrected facts against Albritton's Bar response.\n- Demands a forensic audit of the Mabel Amos Trust involving all three trustees.\n\nKEY ENTITIES:\n- Tom Albritton (Executive Director, Alabama Ethics Commission; Trustee).\n- Francis Paul Ripp (General Council for Court of Public Opinion; Complaintant).\n\
      - John Bell (Trustee, Regions Bank).\n- Rick Clifton (Trustee).\n- Mabel Amos Trust.\n- Alabama Ethics Commission.\n- Regions Bank (Concemed due to trustee relationship).\n- The Ripp Report / Court of Public Opinion."
    generated_at: '2026-03-20T15:48:14.424579Z'
    text: Ethics chief Tom Albritton acts like the law doesn't apply to the man who writes the rules. We caught him allegedly draining $120,000 from the Mabel Amos Trust to pay for his family’s lifestyle, proving the very man supposed to catch crooks is busy running his own self-dealing scheme.
