  faux-tax-gas-tax:
    brief: 'THE CONFLICT

      - Governor Kay Ivey announced a special legislative session to consider a gas
      tax increase.

      - Ivey stated she wants "crystal clear" scrutiny on funds and strong accountability
      for transportation infrastructure.

      - Public record shows the session will authorize a bond issue to improve Alabama
      State Docks and enlarge the Mobile Bay ship channel.

      - Main Article flags ALDOT bridge construction over Pleasure Island as a focal
      point of "Bad Faith" government and corruption.


      THE DISCOVERY

      - Hidden Legislation: Dredging bill for the Mobile Bay ship channel slipped
      into a gas tax session billed as purely for roads and bridges.

      - Political Cover: Business Council of Alabama and Jim Page (Chairman, Alliance
      for Alabama’s Infrastructure) lobbied to position the tax as necessary for economic
      competitiveness.

      - Politician Precedent: Baldwin County Senator Chris Elliott ("The Tax Man")
      supported the tax; history links him to a prior "penny school tax" controversy
      where $200,000/year was lost from Baldwin County Schools ($1 million over 5
      years) while infrastructure was promised.

      - Governor Narrative: Ivey claims "every single penny" will be watched, despite
      the inclusion of undisclosed dredging projects.


      THE PIVOT

      - Article 2 proves Article 1’s corruption allegations via the funding mechanism:
      it confirms money is being raised via tax with vague "accountability" language
      to funnel cash into specific projects (Mobile Bay dredging) while bypassing
      direct scrutiny.

      - Links the "Bad Faith" narrative of ALDOT/Infrastructure (Article 1) directly
      to Governor Ivey and the Business Council (Article 2).

      - The Special Session is the smoking gun event that monetizes the infrastructure
      projects (including the ALDOT context) while concealing dredging costs behind
      "tax for roads" marketing.


      KEY ENTITIES

      - Governor Kay Ivey

      - ALDOT (Alabama Department of Transportation)

      - Business Council of Alabama

      - Jim Page (Chairman, Alliance for Alabama’s Infrastructure)

      - Senator Chris Elliott

      - Mobile Bay ship channel

      - Baldwin County Schools'
