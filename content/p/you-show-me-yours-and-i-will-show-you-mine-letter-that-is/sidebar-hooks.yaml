  alabama-ethics-a-political-tool:
    brief: '**THE CONFLICT:**

      *   Senator Pittman sought municipal contracts with the City of Fairhope (Main
      Article).

      *   Pittman was allegedly required to have cooperation from Mayor Kant and Council
      approval for bids (Main Article).

      *   Complaints centered on a "Fairhope BP Boom Grant" and emergency debris removal/contracts,
      alleging conflict of interest, lack of general contractor’s license by Pittman,
      and unauthorized cutting of anchors and rope in the bay (Main Article).

      *   The Ethics Commission claimed they closed the file without investigation,
      but reports allege an FBI Grand Jury was involved and the case was forwarded
      to Special Prosecutor Matt Hart (Main Article).


      **THE DISCOVERY:**

      *   Jack Burrell is also facing ethics complaints concerning his actions as
      a Fairhope City Council member (Widget Article).

      *   The Widget article proves that political figures, specifically Senator Pittman,
      previously used their elected office for personal gain while serving on the
      Ethics Committee to block or end investigations (Widget Article).

      *   Pittman secured municipal contracts while allegedly violating ethics rules
      and using advisory opinions as a defense, suggesting a pattern of ethical manipulation
      (Widget Article).


      **THE PIVOT:**

      *   Article 1 focuses solely on Pittman''s specific contract dispute with Mayor
      Kant.

      *   Article 2 acts as the ''smoking gun'' by providing historical context: it
      proves that the ethics commission in Baldwin County is structurally a "political
      tool" used to manipulate guidelines, and that Senator Pittman has a proven history
      of exploiting or manipulating these same systems for personal enrichment (Widget
      Article).


      **KEY ENTITIES:**

      *   Senator Tripp Pittman / Sen. Pittman (State Senator/Politician)

      *   Mayor Kant / Tim Kant (Former Mayor of Fairhope)

      *   Ethics Commission (Alabama Ethics Commission)

      *   Matt Hart (Special Prosecutor, White Collar Division of the Attorney General''s
      Office)

      *   Fairhope City Council

      *   Jack Burrell (Council Member/de facto Mayor)

      *   Ray Hix (Airport Authority Board Member / Municipal Judge)'
