  demand-the-truth:
    brief: 'THE CONFLICT

      *   Senator Pittman and Mayor Kant claimed they possessed a letter from the
      Ethics Commission exonerating them from wrongdoing related to the Fairhope BP
      Boom Grant.

      *   The Main Article alleges that the Ethics Commission "closed the file" without
      investigation, despite an FBI Grand Jury resulting from a separate investigation
      involving Special Prosecutor Matt Hart (white collar division of the Attorney
      General’s office).

      *   Allegations include Senator Pittman lacking a mandatory general contractor’s
      license and authorizing illegal anchors/ropes left in the bay.


      THE DISCOVERY

      *   The Widget Article provides a formal complaint statement dated July 7, 2016,
      explicitly stating that the Mayor and Senator misled the public by claiming
      the Ethics Commission had signed off on their contracts and exonerated them
      from BP Fraud claims.

      *   The Widget Article demands confirmation or denial regarding the existence
      of an Ethics letter that specifically exonerates them from BP Fraud claims.

      *   The Widget Article establishes that the Mayor and Senator work in tandem
      to convince the public that the Ethics Commission approved the conflict of interest.


      THE PIVOT

      *   Article 2 is the smoking gun because it formalizes the specific legal challenge
      regarding the ethics letter, demanding a direct confirmation about whether an
      exonerating document exists, which directly contradicts the Main Article’s assertion
      that they have such a letter.


      KEY ENTITIES

      *   Senator Pittman

      *   Mayor Kant

      *   Ethics Commission

      *   Fairhope

      *   BP Fraud Division

      *   FBI

      *   Special Prosecutor Matt Hart

      *   Alabama Attorney General''s office'
