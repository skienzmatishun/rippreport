  demand-the-truth:
    brief: 'THE CONFLICT

      *   Senator Pittman has maintained debris removal contracts with Fairhope since
      at least 2004; Bob James also held a contract during one specific period in
      this timeframe.

      *   Pittman and the Mayor of Fairhope were subject to a BP fraud investigation.

      *   The Federal Bureau of Investigation (FBI) conducted an inquiry into these
      matters, which is currently with Special Prosecutor Matt Hart, White Collar
      Division of the Alabama Attorney General''s Office.


      THE DISCOVERY

      *   Article 2 confirms Senator Pittman’s history of securing municipal debris
      removal contracts with Fairhope and details his past admission during the FBI
      investigation that he would not secure future contracts from his district/constituents
      in good judgment.

      *   It reveals a pattern of behavior where the Mayor and Senator used an alleged
      "Ethics Commission opinion" as explicit permission for Pittman to proceed, misleading
      the public and the Fairhope City Council.


      THE PIVOT

      *   While Article 1 raises a new complaint concerning emergency debris removal
      contracts and questions if the Ethics Commission investigated the previous BP
      Fraud claim, Article 2 provides the historical context that proves Senator Pittman
      has repeatedly breached promises regarding district contracting (dating back
      to his admissions during the FBI investigation), establishing a clear pattern
      of using public office for personal gain.


      KEY ENTITIES

      *   Senator Pittman / Sen. Pittman

      *   Mayor Kant / Mayor of Fairhope

      *   Matt Hart (Special Prosecutor, Alabama Attorney General’s Office)

      *   Fairhope City Council

      *   Bob James (Pittman''s business partner)

      *   The Ethics Commission

      *   BP Fraud Investigation'
