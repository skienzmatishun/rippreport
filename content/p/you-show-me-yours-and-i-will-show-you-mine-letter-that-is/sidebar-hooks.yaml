      - Sen. Trip Pittman (State Senator/Trustee for BP Funds)

      - Mayor Kant

      - City Council of Fairhope

      - Ethics Commission

      - Matt Hart (Special Prosecutor, White Collar Division)

      - Burrell (Council Member)

      - Hix (Council Member/Board Member)

      - BP (BP Fraud Division / Boom Grant)'
