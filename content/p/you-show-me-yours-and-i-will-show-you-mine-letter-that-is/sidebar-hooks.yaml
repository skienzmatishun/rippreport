      and City Council members.

      - Both individuals claim to possess a letter from the Ethics Commission that
      exonerates them from wrongdoing involving Fairhope BP Boom Grant/contracts.


      THE DISCOVERY:

      - The Ripp Report alleges that the Ethics Commission routinely issues one-page
      form letters to dismiss investigations, often stating "That there was not probable
      cause" without thorough investigation.

      - In the BP Boom scandal, Trip Pittman (Governor-appointed trustee) allegedly
      entrusted himself with $750,000 of municipal contracts, which the Ethics Commission
      found to be in no violation.


      THE PIVOT:

      - Article 1 presents the claim that Senator Pittman has a supposedly exonerating
      letter from the Ethics Commission regarding his private business dealings with
      Fairhope post-hurricane debris removal.

      - Article 2 serves as the ''smoking gun'' by demonstrating a pattern of institutional
      dismissal, showing the Ethics Commission cleared Trip Pittman of violations
      in the BP Boom scandal ($750,000 self-contract) and similarly cleared Council
