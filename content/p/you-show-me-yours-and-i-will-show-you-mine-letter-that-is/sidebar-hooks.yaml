      them regarding the Fairhope BP Boom Grant.

      - The Main Article suggests Pittman and Kant authorized leaving anchors and
      rope in the bay by cutting them free from the boom, violating contract terms.

      - Two identical complaints were filed: one with the BP Fraud Division and one
      forwarded to Special Prosecutor Matt Hart (white collar division).


      THE DISCOVERY

      - The Ethics Commission closed the file on the BP grant investigation without
      investigating it.

      - Senator Pittman’s complaint regarding a lack of general contractor''s license
      was abandoned by the Attorney General''s office, ignoring a Grand Jury and FBI
      investigation.

      - The Alabama Ethics Commission is described as a failure where politicians
      manipulate ethical guidelines for personal gain.


      THE PIVOT

      - Article 2 confirms that Senator Pittman has a history of using his elected
      office for personal gain and avoiding accountability by serving on ethics committees.

      - Article 2 demonstrates the systemic failure of the Ethics Commission, validating
      the Main Article''s critique of how officials use commissions as a defense mechanism
      to commit ethical violations.


