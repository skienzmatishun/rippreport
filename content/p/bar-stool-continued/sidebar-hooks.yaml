      - Motive Alleged: McSherry allegedly jealous of DiNardi''s success operating
      the Tiki Bar at American Legion; retaliatory assault.

      - New Information: Letter confirms Harry Still is attorney for DiNardi and McSherry’s
      legal team attempting to subpoena communications between Still, DiNardi, and
