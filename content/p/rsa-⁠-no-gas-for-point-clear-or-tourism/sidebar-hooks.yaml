  people-power-wake-up-gulf-shores:
    brief: 'THE CONFLICT

      *   Point Clear Properties Association versus RSA (Retirement Systems of Alabama)
      over a 12 unit condo project.

      *   RSA removed gas tanks and stopped pumping fuel for the general public in
      50 years.

      *   Homeowners Association, local residents, Baldwin County Planning Commission,
      and Fairhope planning Board opposed the zoning change.


      THE DISCOVERY

      *   Gulf Shores City Council is hearing an appeal against the Planning Commission’s
      approval of the Regency Place Apartments Site Plan Application.

      *   Residents are challenging the Planning Commission decision, citing negative
      property value impacts (13.8% decrease) and changes in neighborhood "character"
      (low-density residential to high-density rental).

      *   The Planning Commission failed to consider the Land Use Plan (LUP) criteria
      when evaluating the Site Plan Application.


      THE PIVOT

      *   Article 2 exposes a failure of regulatory oversight by the Planning Commission,
      which mirrors RSA''s actions in Article 1—an unelected body overriding local
      concerns for external interests.

      *   The fight against the Regency Place Apartments development highlights how
      elected officials must intervene against an unrepresented planning process,
      analogous to residents fighting RSA’s punitive decisions against the Eastern
