  battle-of-weeks-family:
    brief: 'THE CONFLICT: Dispute between Point Clear Properties Association and RSA
      (Retirement Systems of Alabama) over a 12-unit condo project adjacent to the
      Grand Hotel/Marina. RSA removed gas tanks, forcing the hotel to close the Marina.
      Residents oppose the zoning change to TRD Tourism Resort District status. Baldwin
      County Planning and Zoning meeting scheduled for Sept 5.


      THE DISCOVERY: The Weeks family has a business proposal ("small business venture
      on family land") facing opposition from the Zoning Commission, which previously
      recommended the venture but reversed course. Applicants must go before the County
      Commission on Dec. 15, 2020, in Bay Minette. Commissioners are asked to request
      a traffic light at County Road 49 and 26.


      THE PIVOT: Article 2 exposes political corruption by showing how county commissioners
      manipulate zoning decisions regarding business proposals (Weeks family venture).
      This demonstrates the pattern of power exerted by local officials that mirrors
      RSA''s attempts to control tourism zoning and development in Article 1.


      KEY ENTITIES: Point Clear Properties Association, RSA (Retirement Systems of
      Alabama), Grand Hotel, Baldwin County Planning Commission, Fairhope planning
