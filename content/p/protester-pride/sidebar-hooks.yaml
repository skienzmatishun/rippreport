hooks:
  ayatollah-of-alabama:
    brief: 'THE CONFLICT:

      * Roy Moore was running for political office in Baldwin County (Fairhope) during
      late 2017, facing public opposition.

      * Prior to his candidacy, Moore served as a Judge on the Alabama Supreme Court
      and was removed from his judicial position twice due to violating his oath of
      office.


      THE DISCOVERY:

      * The second article asserts that Moore''s repeated violations of the Oath of
      Office (as detailed in legal documents) make him an unviable candidate for the
      U.S. Senate.

      * It confirms that the US Senate has announced plans to kick Moore out if he
      manages to win a seat.

      * The campaign featured specific planned appearances, such as Oak Hollow, Fairhope,
      on Dec 5th.


      THE PIVOT:

      * Article 1 focuses primarily on public protest (the "Protester Pride" movement)
      against his candidacy in Baldwin County.

      * Article 2 provides the institutional and constitutional weight for this opposition
      by proving that Moore has a documented history of violating oath-taking requirements
      as a sitting Judge, making him institutionally unfit for higher office beyond
      mere political dislike.


      KEY ENTITIES:

      * Roy Moore

      * Bannon

      * Ginger Broadway Poynter

      * Michele Walker Harmon

      * Kim Mc Cuiston

      * Baldwin County (Alabama)

      * Fairhope (City/Town, Alabama)

      * Alabama Supreme Court

      * US Senate

      * Oak Hollow'
