  above-the-law:
    brief: 'THE CONFLICT:

      - Late 2017: Public protests occurred in Baldwin County, Alabama, opposing the
      candidacy of Roy Moore.

      - 2017: Protesters cited Moore for violating his oath of office during his tenure
      as a Judge and Senator-elect.


      THE DISCOVERY:

      - March 17, 2016: The Ripp Report filed complaint CSP NO. 2016-296 against Steven
      Patrick Johnson with the Alabama State Bar regarding ethical violations by attorney
      Brackin McGriff and Johnson.

      - Complaint allegation: Mr. Johnson admitted to purchasing, transporting, and
      selling marijuana under oath during his own divorce proceedings in 2016 (selling
      the product to another attorney).

      - Response from State Bar/Disciplinary Commission: Both initial review and later
      commission requests confirmed "no action has been recorded" or that no further
      action would be taken.


      THE PIVOT:

      - Article 2 reveals a pattern of systemic failure in Alabama’s professional
      oversight, where admitted ethical misconduct (Johnson admitting to drug dealing
      under oath) resulted in procedural immunity from disciplinary action by the
      State Bar.

      - This mirrors the public scrutiny surrounding Roy Moore, whose legal and political
      standing was rejected not through successful prosecution but via persistent
      public protest over perceived moral/professional failures.


      KEY ENTITIES:

      - Roy Moore

      - Steven Patrick Johnson

      - Brackin McGriff and Johnson (Law Firm)

      - Baldwin County

      - Fairhope

      - The Ripp Report

      - Alabama State Bar / Disciplinary Commission'
