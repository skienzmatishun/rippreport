    to oppose Roy Moore’s candidacy.
  - The silhouette of a unified crowd symbolizes the transition from individual silence
    to collective resistance; it visually echoes the article's point that residents
    refused to be silenced by political influence or fear.
  - There is a thematic contrast between the 'anonymous' power of the masses in the
