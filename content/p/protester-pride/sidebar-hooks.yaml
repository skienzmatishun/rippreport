      THE DISCOVERY:

      *   Article 2 claims it is common knowledge in Gadsden, Alabama, that Roy Moore
      had a reputation for chasing teenage girls.

      *   The article characterizes him as "a pedophile" unfit for the United States
      Senate.

      *   It asserts that Republican leaders in Alabama prioritize maintaining power
      over ethical standards despite his alleged conduct.


      THE PIVOT:

