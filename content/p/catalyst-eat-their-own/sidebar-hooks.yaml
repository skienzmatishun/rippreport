  moratorium-party:
    brief: |-
      THE CONFLICT
      2017: Mayor Karen Wilson fires Fairhope city officials Jennifer Fidler and Sherry Sullivan.
      2017: Five-term State Rep Joe Faust supports Karen Wilson during petition to remove her.
      2017-2018: Fairhope City Council supports Fidler/Sullivan in public, aiding a campaign to oppose Mayor Wilson.
      2017: CATALYST political group (later Scott Boone Consulting) identified as the developer coalition influencing city decisions.
      2018: Sherry Sullivan is re-elected or advanced to Fairhope Mayor; immediately rewarded with a second position as Utilities Director.
      2017-2022: Mayor Karen Wilson attempts to separate utility finances from general city funds; Council and CATALYST members allegedly obstruct.
      2017: Mayor Wilson secures 6.2 million grant for waterfront project and infrastructure; current Council allegedly delayed progress risking funding loss.
      Allegation: Jennifer Fidler (campaigning for House District 94) and Sherry Sullivan are positioned to become top city policy makers under CATALYST control.
      Allegation: CATALYST/Scott Boone Consulting prioritizes developer interests over city maintenance; rebranded from "CATALYST" name to avoid toxicity but retained same personnel/control.

      THE DISCOVERY
      Current Fairhope City Council is confirmed controlled by Scott Boone Consulting (formerly CATALYST).
      Mayor Sherry Sullivan confirmed receiving dual compensation as Mayor and Utilities Director, validating the "double dipping" accusation from Article 1.
      City Council announces a 12-month subdivision moratorium to "manage" explosive growth.
      Council President Jimmy Conyers admits: Town has had a moratorium for the second time in five years; Council controlled by developers including Boone and Snedeker.
      Moratorium confirmed to exempt completed applications, protecting developer LLCs associated with Council members.
      Municipal Judge Daniel Snedeker identified as one of largest developers in town; appointed/approved by Council he controls.
      Union/Infrastructure projects: Wilson’s infrastructure wins stalled; waterfront grant at risk due to Council procrastination.
      Fairhope shifted from retirement community (16 years of neglect under Mayor Cant) to bedroom community with overloaded schools and taxes.

      THE PIVOT
      Article 2 proves the corruption framework from Article 1 is actively operating today.
      The Moratorium confirms the "Cabal" claim: only insider developers are exempted from new development limits.
      Sherry Sullivan holding Utilities Director confirms the "second paycheck" corruption allegation as fact, not opinion.
      Article 1 names CATALYST/Scott Boone Consulting; Article 2 shows them managing municipal permits, utility finances, and zoning via the Judge (Snedeker) and Council President (Conyers).
      The "eat their own" theory confirmed: Even if Joe Faust is a candidate, the group ensures Sullivan/Fidler/Boone have positions of power (Council/Judge/Mayor) to protect their development interests.

      KEY ENTITIES
      Jennifer Fidler (State Rep Candidate, CATALYST loyalist)
      Sherry Sullivan (Mayor, Utilities Director)
      Karen Wilson (Former Mayor)
      Joe Faust (State Representative, CATALYST favorite)
      Scott Boone Consulting (CATALYST rebrand, "Kevin Boone")
      Kevin Boone Jr. (Councilman, Scott Boone Consulting head)
      Jack Burrell (Councilman)
      Jimmy Conyers (Council President, banker friend of Scott Boone)
      Daniel Snedeker (Municipal Judge, developer)
      Tim Kant (Former Mayor criticized for utility financial manipulation)
