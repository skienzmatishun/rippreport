      *   Council members Burrell and Boone supported the lost lawsuit.

      *   The council passed a resolution in September to purchase the 2.6 million
      property despite a questionable appraisal and denial of public comment.

      *   The Council has been found guilty in Federal Court for violating constitutional
      rights (free speech).


      THE DISCOVERY:

      *   The City Council voted 3 to 2 (Burrell, Boone, Brown) to purchase $2.6 million
      in recreation property.

      *   Councilman Burrell stated the appraisal was not a purchase and public comment
      would occur if they decided to purchase.

      *   This action is explicitly defined as a "Favor for a Favor" Quid quo pro
      relationship.


      THE PIVOT:

      *   Article 2 labels the council’s actions as "Quid Quo Pro" and "something
      for something," providing the structural motivation behind the questionable
      land decisions detailed in Article 1.

      *   Article 2 confirms that CATALYST and Quid quo pro are synonymous, linking
      the personal gain (honey) to the official decisions.


