  down-home-fairhope-jester:
    brief: 'THE CONFLICT:

      *   Fairhope Council members Burrell, Boone, and Brown used their elected office
      for personal gain ("for the honey").

      *   May 29th meeting involved a conservation easement (102 acres worth $20 million)
      versus buying $2.6 million property on hwy. 13.

      *   Fairhope paid $8.25 million in a lawsuit plus $3 million in attorney fees
      for the easement settlement.

      *   Council passed a resolution to purchase the property in September despite
      a questionable appraisal and lack of public participation.

      *   The Council was found guilty in Federal Court for violating the right of
      free speech.


      THE DISCOVERY:

      *   The Catalyst Council is benefiting from an insurance package for part-time
      councilmen, while other part-time employees are exempt.

      *   Councilman Brown received a contract over $750,000 for a soccer field clubhouse/bathroom.

      *   Councilman Brown awarded a bid to the Eastern Shore Art Center (ESAC) despite
      municipal bid law violations and holds an EASC board position.

      *   An Ethics Complaint against Mr. Brown regarding the Eastern Shore Art Center
      is pending with the Attorney General.


      THE PIVOT:

      *   Article 2 proves that the Council members'' actions (purchasing property,
      awarding contracts) were driven by personal gain and violated Ethical standards
      and Transparency principles.

      *   The specific details of how Councilman Brown benefited from contracts and
      his unethical conduct expose the corruption underlying the questionable property
      purchases mentioned in Article 1.


      KEY ENTITIES:

      *   Burrell

      *   Boone

      *   Brown

      *   Fairhope City Council

      *   Hwy. 13

      *   $2.6 million property purchase

      *   ESAC (Eastern Shore Art Center)

      *   Ethics Commission

      *   Attorney General'
