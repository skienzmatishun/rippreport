  quid-quo-pro:
    brief: 'THE CONFLICT:

      *   May 29th council meeting involved two issues: a conservation easement (102
      acres worth $20 million) and an appraisal for recreation land on Hwy 13.

      *   Fairhope paid $8.25 million in a lawsuit plus $3 million in attorney fees
