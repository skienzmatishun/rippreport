  where-is-justice:
    brief: |-
      THE CONFLICT:
      Ronan McSharry assaulted Paula DiNardi on November 23, 2018 at the Little Whiskey Christmas Club in Fairhope. McSharry originally pled guilty to assault on March 26 at Fairhope Municipal Court. Judge J. Clark Stankoski later voided the conviction via appeal due to claims Fairhope City Prosecutor Marcus McDowell failed to include in a charging document the fact McSharry "did cause physical harm." In the last six months prior to reporting, McSharry racked up his ninth arrest in Fairhope. All arrests involved alcohol-related incidents. Earlier, March 19, 2017, McSharry was placed on probation for breach of peace and harassment against artist Nall Hollis (12 months probation, order prohibiting distilled liquors).

      THE DISCOVERY:
      Paul Ripp submitted a letter to Baldwin County District Attorney Hon. Robert Wilters dated April 24 regarding the McSharry conviction dismissal. Ripp asserts Judge Stankoski’s Order dismisses the appeal "denovo" because the City was outside its 365-day time limit to amend the document. Ripp alleges this dismissal was not an error but a "carefully orchestrated operation." The Widget confirms McSharry’s legal team attempted to subpoena communications between DiNardi’s attorney Harry Still and Lagniappe newspaper under Judge Stankoski's order, violating Alabama Source Shield Law protections. Video surveillance of the November 23 incident exists and is public.

      THE PIVOT:
      Article 2 serves as the legal filing formalizing Article 1's accusations of judicial corruption. It proves McSharry’s defense team utilized subpoena threats against Ripp and Harry Still to access media records, validating Article 1’s claims regarding the misuse of legal process by McSharry's lawyers. It directly names District Attorney Robert Wilters, requiring external oversight into Judge Stankoski, Prosecutor McDowell, and Municipal Judge Snedeker regarding the "carefully orchestrated operation" to protect McSharry.

      KEY ENTITIES:
      Ronan McSharry (McSharry’s Irish Pub owner, green card holder)
      Paula DiNardi (Victim of assault case)
      Marcus McDowell (Fairhope City Prosecutor/Municipal Attorney)
      J. Clark Stankoski (Baldwin County Circuit Court Judge, author of appeal order)
      Robert Wilters (Baldwin County District Attorney)
      Francis "Paul" Ripp (Investigator, The Ripp Report)
      Harry Still (DiNardi's Attorney, Owner The Ripp Report/Backstory Podcast)
      Jack Burrell (Fairhope City Councilman, described as best friends with McSharry)
      Nall Hollis (Artist victim of 2017 harassment/McSharry probation case)
