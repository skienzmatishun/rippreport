  mcsharry-madness:
    brief: 'THE CONFLICT

      * Ronan McSharry was arrested on November 22nd for an assault charge.

      * McSharry has a history of domestic incidents and assault charges, including
      assaulting his wife during divorce settlement procedures in 2010.

      * McSharry’s behavior includes knocking a woman off a bar stool resulting in
      a concussion.


      THE DISCOVERY

      * Fairhope Municipal Judge Haymes Snedeker found Ronan McSharry guilty of both
      counts (assault and intoxication) and sentenced him to 180 days.

      * Surveillance video captured the assault incident at the Little Whiskey Christmas
      Club.

      * A lawsuit filed by McSharry against the establishment (DiNardi/LWCC) was dismissed
      without prejudice because a settlement agreement existed, and the court found
      McSharry intoxicated and slurring his speech.


      THE PIVOT

      * Article 1 suggests McSharry is using legal maneuvering and painting himself
      as a poor soul to escape consequences.

      * Article 2 proves that despite McSharry’s claims of injury, the court found
      him guilty of assault and intoxication based on police testimony and video evidence.

      * The judicial system''s failure is highlighted by the City Attorney and Municipal
      Judge failing to properly file charges or handle the case correctly.


      KEY ENTITIES

      * Ronan McSharry

      * Fairhope Police

      * Fairhope Municipal Judge Haymes Snedeker

      * Baldwin County Circuit Judge Clark Stankoski

      * Nall (artist)

      * Jack Burrell (Councilman)

      * Mayor Kant

      * Paula DiNardi

      * Little Whiskey Christmas Club

      * LWCC'
