hooks:
  rumors:
    brief: |-
      THE CONFLICT
      - OJ French, 32 years old, shot and killed by Bay Minette Police on August 20th (this year) following a traffic stop for vehicle equipment violation.
      - Joshua Brown, BMJL organizer, claims French was well-read, devoted to faith and a musician publishing albums as "The Juice."
      - Article claims this is the 8th life lost due to police action in Baldwin County in recent escalation (7 lives cost previously), though Widget Article lists 9 total loss-of-life cases investigated by BCMCU.

      THE DISCOVERY
      - Alabama Supreme Court ruled against Lagniappe Mobile regarding law enforcement files from Jonathan Victor fatal shooting, stating dash/body cam footage is exempt under "investigative" nature.
      - Article 2 states Sheriff Hoss Mack requested $600,000 in taxpayer money for body/dash cameras promising transparency but refuses to share footage since.
      - Article 2 identifies BCMCU investigated previous fatalities (prior to French) with no police at fault found; video was withheld in those cases.

      THE PIVOT
      - Article 2 links OJ French's case to Jonathan Victor precedent: both had diagnosed mental health issues known to police; both resulted in BCMCU withholding footage.
      - Jonathan Victor case (April 2021): Deputy Hunady shot victim four times from 7 yards while unarmed; Sheriff Mack’s office denied immunity but Judge William Cassady eventually ruled in their favor (case on appeal).
      - Alabama Supreme Court ruling creates legal shield allowing BCMCU/BCSO to withhold video evidence for incidents like French's under "investigative" exemption.
      - Rumored details from Article 2 (French shot in back, officer Brandon Thompson previously fired, footage never released) validate the Core conflict of excessive force and lack of accountability raised in Article 1.

      KEY ENTITIES
      - OJ French
      - Huey “Hoss” Mack (Sheriff, BCSO)
      - Al Tolbert (Bay Minette Police Chief, BCMCU Chairman)
      - Joshua Brown (BMJL organizer)
      - Rev. Sam White (French family speaker)
      - Jonathan Victor (Previous victim, April 2021)
      - Deputy Hunady (Shot Victor 4 times)
      - Brandon Thompson (Rumored French shooter, previously fired by City of Bay Minette and other forces)
      - BCMCU (Baldwin County Major Crimes Unit)
