      - Reporter Scott Johnson contacted Bay Minette officials and Mayor Bob Wills;
      most hung up or refused to answer.

      - Alabama Supreme Court ruling cited (last summer) strips public right to sue
      for police body cam footage.

      - Allegation Officer involved has been reinstated and is currently working while
      investigation ongoing.


