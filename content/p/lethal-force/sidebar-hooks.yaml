    text: Baldwin County leaders love to talk about transparency while they hide the bodies of their victims. Sheriff Hoss Mack took $600,000 for cameras only to use a court-ordered legal shield to bury the video of OJ French being shot in the back by a previously fired officer.
  biased-investigation:
    brief: |-
      CONFLICT:
      - OJ French killed by police in Bay Minette/Baldwin County.
      - 8th individual in a string of fatal incidents spanning over 5 years by Baldwin County entities.
      - Alleged excessive force: Police reportedly fired 114 rounds into French’s home; single-shot gun found on scene.
      - Alleged circumstances involved eviction/civil dispute, not major criminal felony (no bank robbers or drug dealers).

      DISCOVERY:
      - MCU Lt. Andre Reid stated body camera footage unavailable for investigation to “respect privacy.”
      - Officer who shot French has not been named by City, Police Dept, or MCU.
      - Reporter Scott Johnson contacted Bay Minette officials and Mayor Bob Wills; most hung up or refused to answer.
      - Alabama Supreme Court ruling cited (last summer) strips public right to sue for police body cam footage.
      - Allegation Officer involved has been reinstated and is currently working while investigation ongoing.

      PIVOT:
      - Article 2 confirms Article 1’s claims of “smoke and mirrors” operations by the Baldwin County Major Crimes Unit (MCU).
      - Lt. Reid’s official statement on withholding footage provides the evidence supporting Article 1’s accusation that MCU will not release video unless federal authorities get involved.
      - Information regarding the officer being reinstated while investigated validates Article 1’s broader critique of internal bias and lack of accountability within Baldwin County law enforcement.

      KEY ENTITIES:
      - OJ French
      - Huey “Hoss” Mack (Sheriff, Baldwin County Sheriff’s Office)
      - Bay Minette Justice League
      - Joshua Brown (Bay Minette Justice League Organizer)
      - MCU Lt. Andre Reid (Baldwin County Major Crimes Unit Lieutenant)
      - Scott Johnson (Lagniappe Reporter)
      - Bay Minette Police Chief Al Tolbert (MCU Chairman)
