hooks:
  BALDWIN-COUNTY-SHERIFF-APPOINTMENT:
    brief: 'THE CONFLICT:

      - Huey "Hoss" Mack (BCSO Sheriff) facing federal civil rights lawsuits alleging
      systemic misconduct by BCSO and Major Crimes Unit (BCMCU).

      - O.J. French murdered Bay Minette police officer Brandon Thompson; BCMCU cleared
      killing despite withheld camera footage and The Ripp Report coverage.

      - Jonathan Victor shot 4 times unarmed by Deputy Mark Hunady; Judge William
      Cassady denied qualified immunity after BCSO provided allegedly untrue facts.

      - Robert Yates died 2018 during eviction enforcement; BCMCU/SWAT used excessive
      firepower (114+ shells, tear gas) without exigent emergency.

      - Peyton Little ruled suicide by BCSO; found strangled with seat belt in moving
      car, no bruises. Anthony Lowery told family "Peyton wanted to die."

      - Five people died (including Joseph & Kevin Andrews) in I-10 wrong-way BCSO
      pursuit; speeds 110mph, officers broke all major policy rules, Mack covers up
      details.

      - Wrongful conviction case: Sheriff Mack, Prosecutor David Whetstone, and Judge
      Robert Wilters withheld exculpatory evidence; innocent man jailed 20 years.


      THE DISCOVERY:

      - Sheriff Mack exiting office, position filling via Governor’s Appointment Office
      rather than election.

      - Anthony Lowery is Mack''s "suggested" replacement candidate to the appointment
      process.

      - Appointment Director Mason Bass (600 Dexter Ave, Montgomery) collecting testimonials
      supporting or not supportive of Mr. Lowery for the Governor''s review.

      - Communication with Mason Bass’s office is stated as confidential but open
      to victims and citizens weighing in on complaints.

      - Victim families are explicitly instructed: "This is your opportunity to tell
      their story" and contact the board regarding ignored complaints.


      THE PIVOT:

      - Widget article converts Main Article allegations into actionable official
      leverage against Mack/Lowery via the Appointment Office.

      - Specific wrongful conviction knowledge: Main Article states Lowery was an
      investigator in the 20-year innocent man case; Widget article allows this fact
      to be submitted directly to Mason Bass as a "not supportive" testimonial.

      - BCMCU credibility issue: Main Article notes Chairman Al Tolbert investigates
      members themselves (e.g., O.J. French); Widget article provides the channel
      to flag this self-investigation bias directly to the Governor’s office before
      they appoint Lowery.

      - Victims can use the O.J. French, Robert Yates, and Jonathan Victor case details
      from Article 1 to formally reject Lowery or oppose Mack''s transition through
      Article 2’s process.


      KEY ENTITIES:

      - Huey "Hoss" Mack (BCSO Sheriff)

      - Anthony Lowery (Sheriff Candidate/Ex-Investigator)

      - Mason Bass (Governor’s Appointment Office Director)

      - Al Tolbert (Bay Minette Police Chief/BCMCU Chairman)

      - Brandon Thompson (Bay Minette Officer/O.J. French Shooting)

      - Mark Hunady (Deputy/Jonathan Victor Victim)

      - Robert Yates (Victim/2018 Eviction)

      - Peyton Little (Victim/Strangled/Suicide Ruled)

      - Joseph & Kevin Andrews (I-10 Pursuit Victims)

      - Dominic Scotti Garcia Jr. (I-10 Pursuit Driver)

      - David Whetstone (Prosecutor/Wrongful Conviction Case)

      - Judge Robert Wilters (Wrongful Conviction Case)'
