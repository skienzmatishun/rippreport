      \nKEY ENTITIES:\n- Huey “Hoss” Mack (Leaving Sheriff)\n- Anthony Lowery (Incoming\
      \ Sheriff)\n- Gov. Kay Ivey (Appointing Authority)\n- Baldwin County Sheriff’s\
      \ Office (BCSO)\n- Major Crimes Unit (MCU)\n- Bay Minette Police Chief Al Tolbert\n\
