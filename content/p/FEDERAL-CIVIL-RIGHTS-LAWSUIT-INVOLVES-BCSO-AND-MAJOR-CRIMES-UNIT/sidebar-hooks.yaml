  po-po-hoss-mack-ccuo:
    brief: '1. THE CONFLICT

      * Federal Civil Rights lawsuit filed in U.S. District Court, Southern District
      of Alabama against BCSO and Major Crimes Unit.

      * Focus on federal investigation into O J French murder by Bay Minette police
      officer Brandon Thompson.

      * Sheriff Huey "Hoss" Mack leaving Baldwin County.

      * Mack seeking Anthony Lowery to replace him as Sheriff.

      * Bay Minette Mayor Wills, City Council, and Police Chief Al Tolbert accused
      of covering up French murder details.

      * BCMCU (Baldwin County Major Crimes Unit) members include Bay Minette Chief
      Tolbert, Robertsdale Chief Kendrick, Sheriff Mack, Gulf Shores Chief Delmore,
      Daphne Chief Carpenter, Foley Chief Bullock.

      * BCMCU tasks: review actions of officers; currently lacks credibility as it
      investigates itself.

      * BCMCU investigated 10 deaths in Baldwin County; first 8 found no police at
      fault.

      * Official camera footage withheld from public in previous BCMCU cases.

      - April 2021: Jonathan Victor shot four times by Sheriff Deputy Hunady.

      - Judge William Cassady denied Hunady and Mack qualified immunity in Victor
      case; ruling on appeal by BCSO.

      - Sheriff provided facts to Judge Cassady that the report claims were untrue;
      Victor was unarmed, shot from 7 yards.

      - Sheriff Mack requests Anthony Lowery to succeed him in office.


      2. THE DISCOVERY

      * Article 2 identifies long-standing history of evidence suppression involving
      current leadership.

      - Murray Lawrence Jr. wrongful conviction case linked to Sheriff Mack (2004).

      - Second autopsy report performed May 17, 2004 (forensic biology and toxicology).

      - Mack was copied on May 17, 2004 letter from Alabama Dept of Forensic Sciences
      regarding autopsy.

      - Wilters wrote and signed the order allowing the 2004 autopsy on Lawrence.

      - Claim: Mack, Whetstone, and Wilters allegedly hid evidence that would prove
      Lawrence innocent.

      - Mack claims now he had little to do with Lawrence case; Lowery was also an
      investigator on the case.

      - Recent: Two BCSO narcotics investigators ordered to look into cases impacted
      by missing evidence.

      - Mack told 1819 News: "not aware of any cases that have been impacted or any
      missing evidence."

      - Article 2 claims this statement is a lie/standard first step in cover-up.


      3. THE PIVOT

      * Article 2 provides historical proof of the allegations in Article 1 that Mack
      runs a "cover up" culture.

      * Connects Sheriff Mack to a specific 2004 evidence suppression case (Lawrence
      Jr.) where he was informed and involved.

      * Confirms continuity: Lowery is named in both cases (French/Thompson suit and
      Lawrence Jr. investigation) as a loyal deputy/investigator under Mack''s supervision.

      * Proves BCMCU lack of integrity: Article 2 confirms internal bias and "good
      ole boy" protection; Article 1 claims self-policing has no credibility.

      - Article 2 connects Mack to Jon Grey (PR figure for School Board/Ventures 68),
      described as a "secret weapon" to manage narratives.

      * Widget claims Mack uses immunity, the DA, and judges he has influenced to
      facilitate cover-ups.


      4. KEY ENTITIES

      * Huey “Hoss” Mack (Sheriff, BCSO)

      * Anthony Lowery (Suspected replacement/investigator)

      * O J French

      * Brandon Thompson

      * Al Tolbert (Police Chief Bay Minette / BCMCU Chairman)

      * Judge William Cassady

      * Jonathan Victor (2021 victim)

      * Brandon Hunady (Sheriff Deputy)

      * Murray Lawrence Jr.

      * Whetstone

      * Wilters

      * Jon Grey (PR figure)

      * Andre Reid'
