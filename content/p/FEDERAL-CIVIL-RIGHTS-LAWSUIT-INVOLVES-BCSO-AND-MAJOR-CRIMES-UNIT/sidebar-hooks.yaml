      \ regarding 10 known innocent lives lost over the last 15 years.\n- MCU investigation\
      \ scope included:\n    - Murder of O. J. French by Bay Minette Police Officer\
      \ Brandon Thompson.\n    - April 2021 shooting of Jonathan Victor by sheriff\
      \ deputy Hunady (unarmed victim, shot from 7 yards).\n- Federal civil rights\
      \ lawsuit filed in U.S. District Court for the Southern District of Alabama,\
      \ Southern Division against BCSO/MCU.\n- Baldwin County Commission ignored warnings\
      \ of potential federal lawsuits regarding internal misconduct and evidence withholding.\n\
      \nTHE DISCOVERY:\n- Governor Kay Ivey appointed Anthony Lowery as new Baldwin\
      \ County Sheriff.\n- Appointment date confirmed: August 27, 2024 (Montgomery\
      \ Advertiser source).\n- Ivey ignored letters to the appointment board prior\
      \ to Lowery’s selection.\n- Ivey ignored two pending federal lawsuits involving\
