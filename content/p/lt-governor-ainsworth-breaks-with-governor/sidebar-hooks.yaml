      - Connects the "power grab" bill to the Mabel Amos Trust/Albritton corruption scandal, suggesting SB67 consolidates control to avoid similar oversight on veterans' funds.
      - Confirms Andrew Jones and Ed Oliver are the legislative conduits for Ivey’s intent to centralize control over veterans' affairs.

      KEY ENTITIES:
      - Kay Ivey (Governor)
      - Will Ainsworth (Lt. Governor)
      - Kent Davis (Veterans Commissioner, ADVA)
      - Kimberly Boswell (Ethics Commissioner / Mental Health Director)
      - Andrew Jones (State Senator, SB67 Sponsor)
