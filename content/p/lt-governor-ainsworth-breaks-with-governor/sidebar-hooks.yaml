hooks:
  war:
    brief: |-
      CONFLICT
      - February 11, 2025 – Alabama Lt. Gov. Will Ainsworth publicly opposed Senate Bill 67 (SB67) sponsored by State Senator Andrew Jones.
      - SB67 is being carried out at the request of Governor Kay Ivey to take control of the Department of Veterans Affairs.
      - Prior to this, Kent Davis filed an ethics complaint with Alabama Ethics Commissioner Kim Boswell regarding the Governor.
      - In retaliation to complaints, Governor Ivey fired Veterans Commissioner Kent Davis (also referred to as ADVA Director).
      - The current state Veterans Board refused Governor Ivey’s proposed firing of Davis.
      - SB67 would dissolve the current Veterans Board, making it an advisory body instead of governing/setting policy.
      - SB67 shifts power to allow Governor Ivey (via her appointed Commissioner) to single-handedly select the new Veterans Board and Commissioner.
      - Rep. Ed Oliver (R-Dadeville) is sponsoring the bill in the House; Sen. Andrew Jones (R-Centre) carries it in Senate.
      - Senator April Weaver and Senator Chris Elliott are publicly opposing the bill.

      DISCOVERY
      - Second article confirms SB67 is a direct retaliation move against the Kent Davis firing and the veteran board’s resistance.
      - Reveals Ivey specifically demands a Commissioner she describes as "a team player," meaning one subservient to her instead of selected via bipartisan process.
      - Confirms intent: Under Ivey’s system, veterans groups providing name lists of candidates is rejected; Governor appoints without Board oversight.
      - Reveals specific mobilization: Planned Veterans Rally in Montgomery on February 25th @ 11:30.

      PIVOT
      - Article 2 serves as the 'smoking gun' by explicitly linking SB67 to Governor Ivey’s "War" narrative against those who opposed her removal of Admiral Kent Davis.
      - Article 2 clarifies that the bill strips "veterans representation," confirming what Lt. Gov Ainsworth’s opposition implies but doesn't explicitly frame as "power grab" retaliation.
      - Article 2 exposes the internal mechanics: Board currently has power (selecting policies/Commissioner); Bill makes them "advisory" and Governor appoints the Commissioner unilaterally.
      - Article 2 identifies Kent Davis explicitly as ADVA Director and targets him for removal, connecting the ethics complaint context to the legislative bill.

      KEY ENTITIES
      - Will Ainsworth (Lt. Governor)
      - Kay Ivey (Governor)
      - Kent Davis / Admiral Kent Davis (Veterans Commissioner/Director of ADVA)
      - Kim Boswell (Alabama Ethics Commissioner)
      - Andrew Jones (State Senator, R-Centre)
      - April Weaver (Senator, R-Briarfield)
      - Chris Elliott (Senator, R-Josephine)
      - Ed Oliver (Rep., R-Dadeville)
      - Alabama Department of Veterans Affairs
    generated_at: '2026-03-10T15:14:36.383083Z'
    text: 'Governor Ivey wants total control over veterans by crushing the board that stood in her way. This "war" on our heroes hides the real motive: pure revenge against Admiral Kent Davis for filing a massive ethics complaint against her administration''s inner circle.'
