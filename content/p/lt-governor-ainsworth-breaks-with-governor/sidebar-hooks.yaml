      - Co-sponsors: Rep Ed Oliver (House), Sen Greg Albritton.

      THE DISCOVERY:
      - Widget article asserts SB67 is retaliation for ethics complaint filed by Kent Davis against Kimberly Boswell.
      - Complaint alleged Boswell colluded with officials to deny ADVA $7 million in American Rescue Plan Act funds.
      - Widget alleges Alabama Ethics Commission illegally dismissed Davis’s complaint; suggests Ethics Director Tom Albritton delivered copy of complaint to absent Gov Ivey.
      - Links corruption: Tom Albritton accused of improperly awarding $120,000 in scholarships from Mabel Amos Trust for his children.
