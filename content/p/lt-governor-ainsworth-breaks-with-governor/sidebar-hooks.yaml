  fire-albritton:
    brief: |-
      THE CONFLICT:
      - Late October/November 2024: Alabama Governor Kay Ivey fired Kent Davis, Executive Director of the Department of Veterans Affairs.
      - Prior to firing: Davis filed an ethics complaint with Alabama Ethics Commissioner Kim Boswell.
      - February 7, 2025: Alabamagazette reports Lt. Governor Will Ainsworth opposes Senate Bill 67 (SB67).
      - SB67 is sponsored by State Senator Andrew Jones (R-Centre) at the request of Governor Ivey.
      - SB67 proposes removing oversight by the Veterans Board and giving Governor Ivey sole authority to appoint the new board and Veterans Commissioner.
      - Ainsworth, along with Reps April Weaver and Chris Elliott, opposes the move, arguing veterans who served should retain influence.

      THE DISCOVERY:
      - Ripp Report Widget claims Governor Ivey used "extreme Executive Power" to force Kent Davis' removal.
      - Widget identifies Tom Albritton, Alabama Ethics Commission Executive Director, as the "poster boy of corruption."
      - Specific Allegation regarding Albritton: Millions unaccounted for in the Mabel Amos Trust.
      - Specific Allegation regarding Albritton: $100,000+ salary retained despite unethical conduct related to the Mabel Amos Trust.
      - Widget claims Albritton used scholarship/donation lists as "blackmail" to maintain his position while politicians ignored it.
      - Widget asserts Alabama AG, state legislators, and Judiciary are aware of Albritton’s potential crimes but have allowed him to remain in office.

      THE PIVOT:
      - The firing of Kent Davis (2024) is the direct catalyst for SB67 (2025), which centralizes control in Governor Ivey’s office.
      - Article 2 provides the allegation that the Ethics Commission (Albritton) was manipulated or relied upon to remove Davis.
      - If Albritton is corrupt (as per Article 2), the legitimacy of Governor Ivey’s use of "Executive Power" to fire Davis is compromised, validating Lt. Gov Ainsworth's stance in Article 1 against Ivey’s new power grab.
      - Albritton is identified in the Widget as a "pawn" for Ivey; Article 1 shows that "pawn's" victims (veterans group reps/oversight board) are now rallying (Ainsworth/Oliver/Jones) against Ivey's subsequent legislation to codify that power.

      KEY ENTITIES:
      - Kay Ivey (Governor of Alabama)
      - Will Ainsworth (Lt. Governor of Alabama)
      - Kent Davis (Former VA Commissioner/Executive Director)
      - Tom Albritton (Alabama Ethics Commission Executive Director)
      - Kim Boswell (Ethics Commissioner, referenced in Main Article, oversees complaint that started conflict)
      - Andrew Jones (State Senator, R-Centre, SB67 Sponsor)
      - Mabel Amos Trust (Financial entity linked to Albritton allegations)
