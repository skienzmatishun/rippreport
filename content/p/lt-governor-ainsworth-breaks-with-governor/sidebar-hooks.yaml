      THE DISCOVERY:
      - House voted SB67 into final passage 56 to 39.
      - Vote occurred without debate in lower chamber.
      - Specific mobile-area representatives who voted AGAINST bill: Napoleon Bracy, Chip Brown, Barbara Drummond, Brett Easterbrook, Jennifer Fidler, Donna Givens, Frances Holk-Jones, Chris Pringle, Mark Shirely, Matt Simpson, Shane Stringer, Margie Wilcox.
      - Rep Alan Baker was the only local member of House to vote for bill.

      THE PIVOT:
      - Article 2 proves legislative action is "retaliation" by Ivey against Kent Davis for ethics complaint.
      - Article 2 links Gov Ivey, Sen Jones, and Rep Oliver to the move explicitly targeting the veterans administration structure.
      - Article 2 confirms underlying motive: ethics probe regarding $7 million American Rescue Plan Act funds diverted from ADVA.

