      - Sherry Sullivan identified as CATALYST-backed candidate running for Mayor; previously fired city employee who sued the city.
      - Accusations that CATALYST/Council members use signs to solicit a "block vote" for allied candidates.

      THE DISCOVERY:
      - Article 2 confirms specific financial achievements of Mayor Wilson under her term.
      - Specific stats: Reversed $6 million debt, increased cash funds 59.18% to $17 million, paid off long-term debt and utility debt 33%, secured $23 million in grants.
      - Confirms Aug 26 election date (implied 2020 cycle).
      - Sullivan biographical details: Fired in 2017, three jobs since (city, internet company, Foley Main Street, Riviera Utilities), resigned from last position.
      - Confirms CATALYST candidates running together on signs with unified "block vote" messaging.
      - Confirms challengers for incumbent positions next week: Jack Burrell, Robert Brown, and Kevin Boone face Deb Hopkins, Howell Gibbens, and Joshua Gammon.

      THE PIVOT:
      - Article 2 provides financial data supporting Article 1's claim that CATALYST is "corrupt" and Wilson eliminated their "wasteful contractors."
      - Article 2 uses the "CATALYST" name in headline context ("CATALYST aka Scott Boone Consulting"), validating it is a central organizing theme for both reports.
      - Article 2 confirms the "block vote" sign strategy described in Article 1 with specific mentions of candidates running together to guarantee a "Catalyst Mayor" and "Catalyst Council."
      - Article 2 validates Wilson as the anti-CATALYST leadership figure by contrasting her degree and employment stability against Sullivan's background, reinforcing Article 1’s narrative of Wilson as the victim of bullying from this inner circle.

