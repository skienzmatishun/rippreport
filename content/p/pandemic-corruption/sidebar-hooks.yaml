  self-dealing-self-stealing:
    brief: 'THE CONFLICT

      *   **2017:** Dr. Stewart Hill Tankersley (outgoing Ethics Commission member)
      alleged that Charles Price, Frank "Butch" Ellis, Jr., and Jerry Fielding sought
      to weaken the Alabama Ethics Commission (AEMC).

      *   **2017-present:** Main article cites examples of widespread political corruption
      in Alabama, including state lawmakers convicted since 2014, actions by the Fairhope
      City Council obstructing the Mayor, and Senator Pittman''s skimming of $750,000
      from BP.

      *   **Context:** The main article frames the AEMC as lacking credibility and
      failing to stop powerful politicians from using their offices for personal gain.


      THE DISCOVERY

      *   The Widget Article alleges "Self-Dealing/Self-Stealing" by Greg Albritton
      (then Executive Director of the Ethics Commission).

      *   The allegation states that Mr. Albritton’s children received scholarship
      money exceeding those of relatives of Mabel Amos, sourced from a trust he oversees.

      *   This is presented as an ethical failure by the leader of the very body responsible
      for enforcing ethics in Alabama.


      THE PIVOT

      *   Article 1 provides the historical foundation that the Ethics Commission
      has historically been compromised and ineffective (e.g., Charles Price, Frank
      "Butch" Ellis, Jr.).

      *   Article 2 shifts the focus from systemic institutional failure to specific
      personal misconduct by a current ethics official, Greg Albritton, suggesting
      he is engaging in the exact type of self-dealing that AEMC was supposed to prevent
      or investigate.


      KEY ENTITIES

      *   Greg Albritton (Executive Director/Head of Alabama Ethics Commission)

      *   Mabel Amos (Trustor/Namesake of Mabel Amos Trust)

      *   Charles Price (Former Ethics Commission Member)

      *   Frank "Butch" Ellis, Jr. (Former Ethics Commission Member)

      *   Jerry Fielding (Former Ethics Commission Member)

      *   Senator Pittman

      *   Fairhope City Council'
