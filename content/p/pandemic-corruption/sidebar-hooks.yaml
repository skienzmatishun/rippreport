  alabama-first-in-political-corruption:
    brief: 'THE CONFLICT

      *   Alabama is widely claimed to be the most corrupt state in the U.S. (Main
      Article).

      *   The Ethics Commission lacks credibility; outgoing member Dr. Stewart Hill
      Tankersley stated three members—Jerry Fielding, Frank "Butch" Ellis, Jr., and
      Charles Price—view ethics as an obstacle rather than a goal (2017-08/10).

      *   Allegations of widespread corruption exist involving lawyers, government
      agencies, mayors, City Councils, and elected officials (Birmingham trial referenced
      2017-10).

      *   A specific past scandal involves Senator Pittman allegedly skimming $750,000
      from BP with the assistance/oversight of Attorney General Luther (Main Article).

      *   Mike Hubbard was previously Speaker of the House and faced scrutiny for
      his conduct.


      THE DISCOVERY

      *   The Widget Article confirms Mike Hubbard was convicted of 12 felonies three
      years prior to the article''s publication date.

      *   Hubbard has not served jail time and is currently appealing the conviction
      to the Alabama Supreme Court (Widget Article).

      *   The state maintains its status as "Most Political Corrupt State," with education
      sharing the title due to unresolved issues like Hubbard’s appeal failure.


      THE PIVOT

      *   Article 1 makes a broad assertion that politicians use their office for
      personal gain, citing past failings and weak oversight (Ethics Commission/City
      Council).

      *   Article 2 provides a specific, high-profile example—Mike Hubbard''s conviction
      and subsequent failure to serve time despite his status as Speaker of the House—which
      serves as current proof that legal immunity or flawed processes allow powerful
      figures to evade accountability, validating Article 1''s claim about endemic
      corruption.


      KEY ENTITIES

      *   Alabama (State)

      *   Ethics Commission (Alabama Ethics Commission/AEMC)

      *   Dr. Stewart Hill Tankersley (Outgoing member of the Ethics Commission)

      *   Jerry Fielding (Ethics Commission Member)

      *   Frank "Butch" Ellis, Jr. (Ethics Commission Member)

      *   Charles Price (Ethics Commission Member)

      *   Senator Pittman / Sen. Pittman (State Senator/former State Senator)

      *   BP (Company involved in financial skimming allegation)

      *   Attorney General Luther

      *   Mike Hubbard (Former Speaker of the House/Convicted individual)

      *   Alabama Supreme Court

      *   Fairhope City Council / Mayor (Local example of obstruction)'
