  corruption-is-legal-in-america:
    brief: 'THE CONFLICT:

      *   Alabama is cited as the most corrupt state in the United States.

      *   An ongoing corruption trial involves lawyers, government agencies, Mayors,
      City Councils, and elected officials in Birmingham.

      *   Four state lawmakers have been convicted since 2014.

      *   The Attorney General (Luther) gave the Governor his walking papers.

      *   The Attorney General skimmed $750,000 from BP.

      *   The City Council of Fairhope obstructed the Mayor and supported disgruntled/fired
      employees suing the City.


      THE DISCOVERY:

      *   Political corruption is indicated by low voter turnout; specifically, 17%
      of voters exercising their right to vote suggests flourishing political corruption.

      *   Adopting municipal anti-corruption acts at the county and state level (e.g.,
      targeting 14 municipalities in Baldwin County) can help eliminate corruption.

      *   Incidents such as the Fairhope Airport Authority scandal, soccer fields,
      lawsuits, fly creek apartments, and the sewer plant contract would increase
      transparency.


      THE PIVOT:

      *   Article 1 details specific instances of local and state officials using
      office for personal gain (Fairhope City Council example).

      *   Article 2 suggests that institutional failure is perpetuated by low citizen
      participation (17% voter turnout) and proposes concrete, ground-level legislative
      actions as the solution, linking institutional corruption to civic neglect.


      KEY ENTITIES:

      *   Dr. Stewart Hill Tankersley

      *   Jerry Fielding

      *   Frank "Butch" Ellis, Jr.

      *   Charles Price

      *   Birmingham City Council

      *   Fairhope City Council

      *   Fairhope Airport Authority

      *   BP

      *   Baldwin County (14 municipalities)'
