  alabama-corruption-insurance:
    brief: 'BRIDGE BRIEF


      THE CONFLICT:

      * In 2017/post-2014, Alabama state lawmakers were convicted of corruption; Attorney
      General previously turned a blind eye to Sen. Pittman regarding $750,000 skimmed
      from BP.

      * The City Council of Fairhope was documented for obstructing the Mayor and
      ignoring allegations against friends or councilmen (circa 2019/2017).

      * Columbia, Alabama is facing alleged corruption complaints filed with the Attorney
      General and Ethics Commission concerning the Mayor and Chief of Police.


      THE DISCOVERY:

      * The article reveals "Alabama Corruption Insurance," a mechanism available
      to all elected officials (including Mayors, City Council, Judges, and Police
      Chiefs).

      * This insurance provides a legal pathway for politicians to receive "protection
      from prosecution" by requesting formal advisory opinions from the Alabama Ethics
      Commission.

      * Even if an official lies on the request but receives an opinion, they remain
      immune from prosecution.


      THE PIVOT:

      * The Main Article alleges that the ethics commission is part of the corrupt
      machine and acts as an obstacle to be circumvented by politicians (specifically
      mentioning Charles Price, Jerry Fielding, Frank "Butch" Ellis, Jr.).

      * The Widget Article proves this systemic failure by revealing the precise legal
      loophole—the Alabama Corruption Insurance—which functions as a guaranteed ''get
      out of jail card'' facilitated by the Ethics Commission itself.


      KEY ENTITIES:

      * Dr. Stewart Hill Tankersley (Outgoing Ethics Commission member)

      * Charles Price (Ethics Commission member)

      * Jerry Fielding (Ethics Commission member)

      * Frank "Butch" Ellis, Jr. (Ethics Commission member)

      * Sen. Pittman / Senator Pittman

      * Governor (Luv Guv mentioned)

