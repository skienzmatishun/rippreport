  alabama-ethics-self-dealing-immunity:
    brief: 'THE CONFLICT

      *   Ethics Commission criticism dated 2017 by outgoing member Dr. Stewart Hill
      Tankersley cited colleagues Jerry Fielding, Frank "Butch" Ellis, Jr., and Charles
      Price for treating ethics as an obstacle to political power rather than a goal.

      *   Corruption in Alabama leadership is systemic; four state lawmakers were
      convicted since 2014.

      *   In the context of BP funds (circa 2019), State Senator Pittman was alleged
      by then-AG Luther to have skimmed $750,000 from BP while serving as a trustee
      of the funds.

      *   Fairhope City Council faced criticism for obstructing the Mayor and ignoring
      allegations against friends/fellow councilmen.

      *   Former Councilman Robert Brown was accused of awarding himself a contract
      exceeding $300,000 while serving on the Fairhope Art Center board.


      THE DISCOVERY

      *   The Director of the Alabama Ethics Commission, Tom Albritton, is alleged
      to have engaged in self-dealing by utilizing the Mabel Amos Scholarship Trust
      for personal gain between 2018 and 2021.

      *   Tom Albritton''s two children allegedly received $105,000 in tuition payments
      through this trust.

      *   The scholarship (Mabel Amos Memorial Fund) has been managed by Regions Bank,
      which reportedly received over $1 million for managing the fund since its inception.


      THE PIVOT

      *   Article 1 establishes a widespread institutional critique that the Ethics
      Commission lacks credibility and acts as a shield for powerful politicians.
      Article 2 provides definitive proof of this failure at the highest level; Director
      Tom Albritton is personally accused of using his position within the regulatory
      body to commit illegal self-dealing via a trust he oversees, proving the "machine"
      mentioned in Article 1 operates internally.


      KEY ENTITIES

      *   Tom Albritton (Executive Director of Alabama Ethics Commission)

      *   Dr. Stewart Hill Tankersley

      *   Jerry Fielding

      *   Frank "Butch" Ellis, Jr.

      *   Charles Price

      *   Mabel Amos Scholarship Trust / Mabel Amos Memorial Fund

      *   Regions Bank

      *   Tom Albritton’s two children (recipients)

      *   Alabama Ethics Commission

      *   Senator Pittman

      *   Robert Brown

      *   Fairhope City Council'
