      and a failing Ethics Commission in Alabama.

      *   Main Article notes that officials bend over backward for the rich and powerful,
      using their positions for personal gain.

      *   Main Article mentions State Senator Pittman skimmed $750,000 from BP and
      was ignored by Attorney General Luther Strange.


      THE DISCOVERY

      *   The Widget Article details specific local ethics failures in Fairhope, Alabama.

      *   The City Council in Fairhope obstructed investigations into ethics complaints
      against the Fairhope Airport Authority board members.

      *   City Council members issued false statements claiming ethics complaints
      were "baseless."

      *   Senator Tripp Pittman used his elected office for personal gain and headed
      off complaints by serving on the ethics committee.

      *   Pittman secured Fairhope municipal contracts, violating ethics rules with
      assistance from former Mayor Tim Kant.


      THE PIVOT

      *   Article 2 provides a specific, localized example (Fairhope) of the systemic
      corruption described generally in Article 1 (Alabama political machine).

      *   The Widget Article shows *how* elected officials manipulate the Ethics Commission
      and use advisory opinions as defenses for violations, proving the general claim
      that members are "a part of it."


