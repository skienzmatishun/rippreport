      local residents will be stuck paying for through the nose.
  poison-ivy-bridge:
    brief: 'THE CONFLICT:

      *   The Mobile River Bridge project is incurring billions in cost.

      *   Baldwin County residents face rising costs due to tolls and proposed taxes.

      *   Fairhope and Spanish Fort are seeking a special tax district referendum
      for schools ($3 million proposed tax).

      *   Governor Poison Ivy and Junior Senator Elliott are involved in the decision-making
      regarding the bridge funding and taxes.


      THE DISCOVERY:

      *   Mayor Karin Wilson (Fairhope) explicitly opposes the toll on the new bridge.

      *   Wilson argues that the State should have invested the billion+ dollar BP
      settlement into the affected counties instead of allowing residents to pay for
      the shortfall.

      *   The proposed toll is framed as punishment for poor planning and budgeting.


      THE PIVOT:

      *   Article 2 shifts the focus from the expense of the bridge (Article 1) to
      the misuse of BP settlement funds.

      *   It positions Governor Poison Ivy''s plan to burden residents with tolls
      as an inappropriate use of money already stolen/misused by the State.


      KEY ENTITIES:

      *   Governor Poison Ivy

      *   Junior Senator Elliott

