      not solely about roads/bridges but are linked to state dock dredging funding,
      connecting the local school taxation problem (Article 1) to a larger system
      of corrupt infrastructure spending.

      *   The actions taken by Governor Ivey and Senator Elliott regarding the gas
      tax appear connected to the misuse of funds demonstrated in Article 1.


