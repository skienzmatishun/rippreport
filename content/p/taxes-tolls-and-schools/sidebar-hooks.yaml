      THE DISCOVERY

      *   Jack Burrell is actively promoting tolls and increasing population growth
      to benefit Baldwin County business.

      *   Infrastructure failures in Fairhope are directly linked to Jack Burrell
      and his associates.

      *   Burrell has allegedly lied about promises regarding no tolls, suggesting
      he is a political mouthpiece for development.


      THE PIVOT

      *   Article 2 reveals that Jack Burrell is a liar who supports the exact infrastructure
      and toll policies being pushed in Article 1 (bridge project support, population
      growth arguments).

      *   Burrell’s documented history of slowing down projects proves his current
      public stance on infrastructure is deceptive.


