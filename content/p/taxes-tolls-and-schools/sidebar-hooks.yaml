hooks:
  faux-tax-gas-tax:
    brief: 'THE CONFLICT

      *   Baldwin County is facing rising costs due to the I-10 mobile river bridge
      project and proposed school tax districts in Fairhope and Spanish Fort.

      *   The Baldwin County Schools are struggling for funding.

      *   Senator Chris Elliott ("THE TAX MAN") skimmed $200,000 from the penny school
      tax for county infrastructure needs.


      THE DISCOVERY

      *   Governor Kay Ivey announced a special session to consider a gas tax increase
      and infrastructure spending.

      *   The gas tax bill includes authorization for a bond issue to improve Alabama
      State Docks and the Mobile Bay ship channel.

      *   State docks will receive $400,000 to $600,000 for dredging the ship channel.

      *   Senator Elliott was directed by the Business Council of Alabama to support
      the gas tax initiative.


      THE PIVOT

      *   Article 2 reveals that the proposed gas tax and infrastructure funding are
      not solely about roads/bridges but are linked to state dock dredging funding,
      connecting the local school taxation problem (Article 1) to a larger system
      of corrupt infrastructure spending.

      *   The actions taken by Governor Ivey and Senator Elliott regarding the gas
      tax appear connected to the misuse of funds demonstrated in Article 1.


      KEY ENTITIES

      *   Governor Kay Ivey

      *   Junior Senator Elliott ("THE TAX MAN")

      *   Poison Ivy (referenced)

      *   Spanish Fort Town Council

      *   Fairhope

      *   Business Council of Alabama

      *   Mobile Bay ship channel

      *   Baldwin County Schools'
    generated_at: '2026-07-10T20:56:07.548713Z'
    text: While Baldwin County schools beg for crumbs, Junior Senator Elliott "The
      Tax Man" skims public funds for industrial pet projects. This gas tax hike isn't
      for your commute; it is a payoff to the Business Council of Alabama to dredge
      the ship channel and keep the political donors happy.
  stepping-up:
    brief: 'THE CONFLICT:

