      State Senate for District 32 and stated he will vote for the gas tax.

      *   Widget Article details how state revenue (BP money) was distributed, noting
      a State Senator collected $750,000 of BP money for a personal company.

      *   The Ripp Report agrees with Mayor Haygood that cities need a fair share
      of the gas tax.

      *   Fairhope is financially on track and may be debt-free by 2020.


      THE PIVOT:

      *   Article 2 provides context on how specific legislative figures (Elliott)
      and regional financial struggles (BP money, gas tax fairness) relate directly
      to the taxation and infrastructure crisis detailed in Article 1.

      *   Article 2 shows that local/state politicians are actively engaged in securing
