      *   Baldwin County School Board'
    generated_at: '2026-07-10T20:56:07.548759Z'
    text: Governor Poison Ivy wants to punish you with tolls for her own budgeting
      failures. While she squeezes Baldwin County residents for every cent, Mayor
      Karin Wilson reveals the state already blew through a billion dollars in BP
      settlement money that should have fixed this mess years ago.
  fingerprint:
