      and infrastructure spending.

      *   The gas tax bill includes authorization for a bond issue to improve Alabama
      State Docks and the Mobile Bay ship channel.

      *   State docks will receive $400,000 to $600,000 for dredging the ship channel.

      *   Senator Elliott was directed by the Business Council of Alabama to support
      the gas tax initiative.


      THE PIVOT

