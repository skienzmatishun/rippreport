      *   State Senator Chris Elliott

      *   Baldwin County'
    generated_at: '2026-07-10T20:56:07.548740Z'
    text: Junior Senator Elliott loves making pre-election promises he magically forgets
      once the ballots are counted. This fuel tax push is just another way for local
      power players to secure cash while the same faces pocketed hundreds of thousands
      in BP settlement money for their own private companies.
  mouthpiece:
    brief: 'THE CONFLICT

