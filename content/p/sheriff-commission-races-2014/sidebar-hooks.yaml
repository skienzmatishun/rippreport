  primary-election-endorsements-2014:
    brief: 'THE CONFLICT

      *   Citing 2010, Bob James (Business Partner of Lee Pittman) and allies Frank
      Burt and Tucker Dorsey alleged that Pitman Tractor secured the Fairhope BP Oil
      Boom contract unethically.

      *   This controversy led to the firing of Emergency Management Director Leigh
      Ann Ryals, county administrator Michael Thompson, and legal representative Scott
      Barnett by James, Burt, and Dorsey in an attempt to cover up the scandal (2014).

      *   Senator Lee "Slippery Trip" Pittman leveraged his position to limit Sheriff
      opposition to 400 law enforcement officers (2014), creating control for Huey
      Mack ("Hoss").


      THE DISCOVERY

      *   Article #15 proves that Senator Pittman knowingly maneuvered legislation
      regarding the 400-person Sheriff candidate limit, claiming he knew the measure
      was unconstitutional.

      *   The report confirms a formal complaint has been submitted to the Alabama
      Ethics Commission against Pittman (2014).

      *   Pittman is noted as maintaining lucrative public contracts for Fairhope
      debris removal despite previously promising not to engage in such deals following
      the BP Boom Scandal and Mayor Tim Kant''s involvement.


      THE PIVOT

      *   The second article elevates general claims of corruption into specific evidence
