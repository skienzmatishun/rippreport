      *   Allegations involved corruption regarding the BP Boom contract (dated 2010),
      which led to administrative firings over unethical behavior.


      THE DISCOVERY

      *   The contemporary reporting confirms the enduring presence of this political
      network through figures like Joe Davis and Sen. Tripp Pittman.

      *   New allegations are detailed, showing that Joe Davis allegedly did not deliver
      BP money to intended parties while Sen. Tripp Pittman is accused of stuffing
      his pockets with $750,000.00 from the same funds.

      *   The corruption extends into public education; Joe Davis and associated figures
      (Chris Elliott, Eddie Tyler) led the decision that approved a penny tax costing
      Baldwin County Schools $2 million annually.


      THE PIVOT

