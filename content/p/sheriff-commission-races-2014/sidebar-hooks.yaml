hooks:
  sheriff-huey-boss-mack-secret-police:
    brief: 'THE CONFLICT:

      - May 16, 2014: Paul Ripp published a Ripp Report alleging corruption in Baldwin
      County''s political landscape regarding Sheriff and County Commission races.

      - Corruption focused on an alliance ("The Six Sickos") designed to maintain
      control over county government.

      - Key figures identified as part of the machine included Lynn Stacey (political
      power broker/manager of Catalyst), "Slippery Trip" Pittman, Huey Mack ("Boss
      Hoss"), Bob James, Chris Elliott, Tucker Dorsey, Frank Burt, and Charles Gruber.


      THE DISCOVERY:

      - The Widget Article details specific abuses resulting from Sheriff Hoss Mack’s
      sustained tenure (secured by figures like State Senator Trip Pittman).

      - Documented incidents include the death of Jonathan Victor (May 2017) shot
      by BCSO; death of Robert Yates (March 5, 2018) in an excessive force eviction.

      - Sheriff Mack utilized over $65 million in funding for body/vehicle cameras
      with claims of accountability that were contradicted by subsequent lawsuits
      and fatal incidents.

      - The office faced allegations regarding the selective investigation into Peyton
      Little''s death (a confidential informant).


      THE PIVOT:

      - Article 1 identified the political mechanism (the "machine," the alliance,
      the election maneuvering) used to establish control over Baldwin County government
      around 2014.

      - Article 2 proves the success of that political machine by detailing tangible
      results: a lack of police accountability leading directly to multiple high-profile
      deaths and conflicts of interest (e.g., Mack''s funeral home contract with the
      county).


      KEY ENTITIES:

      - Huey "Boss" Mack / Sheriff Mack

      - Lynn Stacey

      - State Senator Trip Pittman ("Slippery Trip")

      - Jonathan Victor (Victim, 2017)

      - Robert Yates (Victim, March 5, 2018)

      - Peyton Little (Confidential Informant)

      - Justin Correa (BCSO Deputy/Son of Robert Correa)

      - Judge William Cassady

      - Baldwin County Commission

      - BCSO (Baldwin County Sheriff''s Office)

      - Catalyst'
    generated_at: '2026-07-18T20:55:48.777634Z'
  vote-2026:
    brief: 'THE CONFLICT

      *   2014 Baldwin County elections were contested against a political machine
      led by Lynn Stacey (the "fixit man").

      *   The alleged corruption involved Sheriff Huey Mack ("Hoss"), whom Ripp accused
      of being tied to the machine and engaging in backroom deals with Pittman.

      *   A core group identified as the "Sick Six" was alleged to include: Pittman,
      Hoss Mack, Tucker Dorsey, Chris Elliott, Bob James, and Charles Gruber.

      *   These six were accused of a solid pact designed to control Baldwin County
      government and cover up the BP Boom Scandal involving Pittman Tractor, which
      led to the firing of county administrators like Leigh Ann Ryals and Michael
      Thompson.


      THE DISCOVERY

      *   The modern election cycle (Widget Article) maintains the focus on systemic
      corruption and change from "career politicians."

      *   Matt McKenzie is identified as a current Sheriff candidate who addresses
      the need to "clean up" a department "riddled with internal issues," echoing
      the 2014 critiques of Huey Mack.

      *   Voters are encouraged to vote out multiple long-term incumbents, reflecting
      a continued desire for structural change since the 2014 revelations about entrenched
      power and lack of constituent participation.


      THE PIVOT

      *   The Widget Article confirms that despite eight years passing since Paul
      Ripp''s exposé (May 2014), the core issues of centralized political machine
      control and alleged administrative mismanagement in Baldwin County persist,
      merely changing candidates while maintaining the same systemic pressures identified
      back then.


      KEY ENTITIES

      *   **Individuals:** Huey Mack ("Hoss"), Lynn Stacey, "Slippery Trip" Pittman
      (or just Pittman), Tucker Dorsey, Bob James, Chris Elliott, Charles Gruber,
      Matt McKenzie, Richard Cox, Angelo Fermo, Kevin Brock, Tracey Gambill, Jeremiah
      Giles, Grant Blackburn, Whitney Scapecchi, Terry Waters, Mike Van.

      *   **Locations/Groups:** Baldwin County (County Commission, Sheriff''s Office),
      GOB (God Own Business).'
