  newsletter-the-ripp-report:
    brief: 'THE CONFLICT:

      *   May 16, 2014: Paul Ripp''s "Ripp Report #14" published concerning Sheriff
      and County Commission races in Baldwin County.

      *   The report identifies a powerful local political machine led by Lynn Stacey.

      *   A core faction, dubbed the "Sick Six," included Senator Lee "Slippery Trip"
      Pittman, Huey Mack ("Boss Hoss"), Jasper Tucker Dorsey, Chris Elliott, Bob James,
      and Charles Gruber.

      *   This alliance is alleged to control government/City of Fairhope and seek
      further dominance (2014).


      THE DISCOVERY:

      *   The Ripp Report functions as a "consumer group" dedicated to exposing political
      corruption in Baldwin County today (Current Mission).

      *   Lee Pittman (BP Pittman) has been confirmed to vacate the State Senate seat
      in District 32.

      *   Specific allegation of financial malfeasance against Lee Pittman is detailed:
      He allegedly skimmed $750,000 from BP (Today''s revelation).


      THE PIVOT:

      *   Article 1 established a pattern of corruption and influence surrounding
      the "Sick Six" alliance led by Lynn Stacey.

      *   Article 2 confirms that Lee Pittman, a key member of the Article 1 alliance
      ("Slippery Trip"), is not only leaving office but has been specifically accused
      of massive financial theft ($750,000) from BP, validating the character concerns
      raised against him in 2014.


