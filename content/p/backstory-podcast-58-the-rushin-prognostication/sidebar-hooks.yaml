      Superintendent.

      - Incumbent Mayor Karen Wilson previously declined the Professional Engineer
      role and hired a PE instead.

      - ADEM/Alabama Power Public Hearings: Wastewater discharge permit for Barry
      Steam Plant not yet approved despite wastewater dewatering plans.

      - 90,000 new US SARS-COV-2 cases reported (6:00pm Central Time).

      - Hurricane Zeta hit Alabama coast with 100 mph winds inland faster than typical.


      THE PIVOT

      - Ep 58 is the smoking gun because it connects prior Baldwin County suspicious
      deaths (Ep 55) to specific financial corruption: Mayor Sullivan’s Utilities
      Superintendent pay raise.

      - Ep 58 proves the "incompetence" theme from Ep 55 (environmental/health risks)
      is backed by concrete violations: unapproved coal ash dewatering and utility
      contract conflicts.

      - Ep 58 links the same geographic area (Mobile Bay/Baldwin County) across episodes,
      confirming a pattern of unsupervised risk.


      KEY ENTITIES

      - Sherry Sullivan (Mayor, Fairhope).

      - Karen Wilson (Current Mayor, Fairhope).

      - Baldwin County Major Crimes Unit.

      - Alabama Power Company.

      - ADEM (Alabama Department of Environmental Management).

