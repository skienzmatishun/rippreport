      promote beliefs over factual evidence.

      *   It asserts that Roy Moore violated his oath of office in the judiciary twice,
      was found guilty of Ethics charges, and was subsequently thrown off the bench
      for breaking the law.

      *   The article frames this pattern as indicative of systemic failure within
      Alabama politics and political parties covering up crimes.


      THE PIVOT

