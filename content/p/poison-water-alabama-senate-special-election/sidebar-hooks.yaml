      *   BP (Board of Trustees): Corporation linked to the alleged funds misuse

      *   Roy Moore: Senator-elect/Judge figure described as having "The Moore Factor"
      and violating judicial oaths twice

      *   Mo Brooks: Candidate noted for his popularity in the 2017 Senate race

      *   Del Marsh: Speaker pro tem of Alabama Senate, who announced he would not
      run'
