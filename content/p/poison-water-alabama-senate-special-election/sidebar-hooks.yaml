  look-in-the-mirror:
    brief: 'THE CONFLICT

      *   2017 US Senate Special Election was held to replace Jeff Sessions, who became
      U.S. Attorney General.

      *   Luther Strange served as Alabama''s leading law enforcement officer and
      AG during the period of campaign scrutiny.

      *   Allegations arose that Luther Strange allowed Bentley to secure the seat
