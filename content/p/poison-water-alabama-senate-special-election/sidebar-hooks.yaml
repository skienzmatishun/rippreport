      political office.


      KEY ENTITIES

      *   Jeff Sessions: Former Senator/US Attorney General

      *   Luther Strange ("Big Luther"): Republican politician accused of ignoring
      investigations

      *   Bentley: Party involved in an investigation referenced by Article 1

      *   Tripp Pittman: BP Trustee/Candidate accused of $750,000 money grab from
