      - Widget Author was discharged from Marine Corps in El Toro, California, after
      13 months in Vietnam.

      - MP escort ordered author not to discuss “current events” upon arrival at Los
      Angeles Airport bound for Birmingham, Alabama.

      - Widget Article claims politicians from both sides have been lying to Americans
      “for years, it is in their DNA.”

      - Widget Article suggests pandemic statistics were questioned as a “lie” or
      “hoax” by some.


      THE PIVOT:

      - Widget Article links historical lies about Vietnam to current belief that
      2021 election was stolen.

      - Key Quote: “The President said so, just like Vietnam.” (Referencing the 2021
      President).

      - Article frames the Jan 6 Capitol attack as "Insurrection" resulting from following
      political leaders ("Incited to attack the Capitol").

      - Connects Vietnam veterans being lied to (cost 55,000 American lives) with
      Americans lied about the election today.

      - Argues that "history will record the truth" in both instances (Vietnam and
      2021).


      KEY ENTITIES:

      - Jan 6, 2021 (US Capitol Building storming)

      - Backstory Podcast No 66

      - Vietnam War

      - Martin Luther King (Assassinated 1968)

      - Robert Kennedy (Assassinated 1968)

