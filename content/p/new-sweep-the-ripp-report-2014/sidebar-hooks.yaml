      were costly ($80,000 update to an existing plan).

      *   Allegations focused on Mayors and developers engaging in "sweetheart deal[s]"
      despite the city failing to adhere to its comprehensive plans.

      *   The city suffered a legal loss of $11.5 million (property value: $8.75M;
      legal fees: $3.25M) related to the Dyas lawsuit.

      *   Paul Ripp alleged that Mayor Tim Kant planned a "back door deal" to place
      a fire station on Parker Road, a dead end street and dangerous intersection.

      *   This project involved Triangle land (previously held by Dyas), allegedly
      secured via backroom dealings involving developer contributors.


      THE DISCOVERY

      *   The second article confirms Fairhope faces systemic governance issues ("FAUXHOPE
      is living up to it’s name").

      *   It reveals the City Council spent nearly a year navigating ADA compliance
      for a $6.2 million waterfront grant, with then Mayor Wilson acknowledging its
      requirement.

