      driven by non-public factors and political distortion.


      KEY ENTITIES

      *   Tim Kant / Mayor Kant

      *   Paul Ripp (Author/Reporter)

      *   Dyas Lawsuit (Taxpayer loss: $11.5M)

      *   Parker Road, Triangle Property, Publix Project

      *   Council President Burrell

      *   Mayor Sherry Sullivan

