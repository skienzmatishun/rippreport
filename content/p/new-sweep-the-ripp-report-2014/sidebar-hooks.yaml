      **THE DISCOVERY:**

      - Current corruption/scam: Boone Burrell and Brown (associated with CATALYST)
      proposed a $2.65 million purchase for recreation land based on "a questionable
      appraisal," which the Widget article labels an absolute scam (Widget Article).

      - Financial revelation regarding Dyas property: The acquisition of the Triangle
      property was not a simple "purchase" but rather an $8.25 million legal settlement,
