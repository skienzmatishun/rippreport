      \ straying from its comprehensive plan through preferential deals benefiting\
      \ contributors (Main Article/Widget Article).\n\n2. THE DISCOVERY\n\tArticle\
      \ 2 identifies specific financial mechanisms behind non-public decisions, including:\n\
      \t\ta) The Triangle lawsuit settlement cost: $11.25 million.\n\t\tb) City financing\
      \ for the settlement: Borrowed $5.25M, paid attorneys ~$3M, took $3M from utility\
      \ reserve fund.\n\t\tc) Specific corruption links: Mayor Kant is connected to\
      \ Thompson Engineering and Arthur Corte (\"sidekick\"), receiving favored projects\
      \ without council approval.\n\n3. THE PIVOT\n\tArticle 1 alleges that the city\
      \ intends to use a \"back door deal\" to place a fire station on Parker Road,\
      \ ignoring public input despite owning the better Triangle property (previously\
      \ Dyas) from the $11.5 million lawsuit loss. Article 2 provides the 'smoking\
      \ gun' by revealing the *financial details* of the acquisition ($11.25M settlement,\
      \ depletion of utility reserve) and naming Arthur Corte as a primary participant\
      \ in this network of \"good ole boys\" that bypasses public participation for\
      \ favorable land deals like the Triangle Nature Trail Park.\n\n4. KEY ENTITIES\n\
      \t*   Fairhope City Council / Mayor Tim Kant\n\t*   Arthur Corte (Contributor/Sidekick\
      \ to Kant)\n\t*   Francis Paul Ripp (Author/Lead Advocate of The Ripp Report)\n\
      \t*   Triangle / Dyas Land\n\t*   Thompson Engineering\n\t*   Diana Brewer (Councilwoman\
      \ siding with the Mayor on Fly Creek Apartments)\n\t*   Boone and Mueller (Councilmen\
      \ accused of being aligned with Kant despite term pledge issues)\n\t*   Parker\
      \ Road"
