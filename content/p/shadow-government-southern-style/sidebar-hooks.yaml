      - Specific meeting between Gallion and Scrushy noted on 10/28/18.

      - Claims agencies (FBI, Ethics Commission) are corrupt and unresponsive to complaints
      regarding Baldwin County.

      - Sherry Sullivan elected Mayor of Fairhope with only 17% of registered voters
      (58% of actual turnout).

      - Jack Burrell named as retaining Council Presidency ("King B") despite Wilson
      administration changes.


      THE DISCOVERY:

      - Widget article confirms "3 Bs" (Three B’s) and Scott Boone Consulting ("Catalyst")
      continue to dominate Fairhope politics.

      - New Mayor Sullivan faces immediate oversight issues; City Attorney noted as
      "used to getting their way."

      - "McSherry case" identified as unresolved legal issue council is ignoring.

      - Election described as popularity contest with 17% registered voter participation
      facilitating control by special interests.


      THE PIVOT:

      - Main Article establishes that the pattern of "power corrupts" (via attorneys
      and consultants) seen in Siegelman/Scrushy case is now confirmed "through and
      through" in Baldwin County.

      - Widget Article provides the specific local application: The same consultant-style
      interference (Catalyst) and legal entanglement that Main Article warns about
      is now running Fairhope’s operations under Sullivan/Burrell.

      - Main text: "Baldwin County is worse" than Gallion’s examples; Widget names
      the specific local operators proving that claim.


      KEY ENTITIES:

      - Thomas Gallion (Author/Subject of book review)

      - Don Siegelman (Former Gov, referenced)

      - Richard Scrushy (HealthSouth CEO)

      - Sherry Sullivan (New Mayor of Fairhope)

