  shadow-government:
    brief: '1. THE CONFLICT

      - Gallion’s book “Shadow Government, Southern Style” (2020) alleges Alabama
      political corruption from D.C. to Dixie involving attorneys, judges, and mayors.

      - Accountability agencies (Ethics Commission, Bar Assoc, Judiciary, AG, FBI)
      are deemed corrupt; complaints ignored.

      - Specific case analysis: Prosecution of former Gov. Don Siegelman and HealthSouth
      CEO Richard Scrushy (2018 timeframe).

      - Claim: Prosecution designed to control Scrushy’s financial clout for Rob Riley,
      Doug Jones, and Campbell Law Firm rather than political removal.

      - Gallion met Scrushy on 10/28/18; confirmed legal firms represented plaintiffs
      in a lawsuit against Scrushy and looked to seize documents from his barn.


      2. THE DISCOVERY

      - Local sources confirm a "Shadow Government" in Baldwin County/Fairhope labeled
      “Catalyst” or “Gumbo.”

      - Chief Pettis (Fairhope Police) testified to Lorie DeBias he did not report
      directly to Mayor Wilson; reported only to Tim and Council members.

      - A “Catalyst media outlet” exists, publishing slanted information to remove
      Mayor Wilson.

      - Specific harassment campaign led by “Tim’s Little gang of misfits” against
      the Chief to support their agenda.

      - Source states Chris Elliott is corrupted by a machine running Montgomery,
      same network accused in Gallion’s broader thesis.


      3. THE PIVOT

      - Widget details the local execution of the "Shadow Government" Gallion describes
      in his book.

      - Chief Pettis’ refusal to recognize Mayor Wilson’s authority proves the existence
      of a parallel power structure ("Catalyst") Gallion claims controls Baldwin County.

      - The specific manipulation of a police chief by the Mayor and Council ("misfits")
      matches Gallion’s description of officials using office for personal/organizational
      gain.

      - Widget confirms the "limited media coverage" and "citizens disconnect" Gallion
      cited as exasperating corruption.


      4. KEY ENTITIES

      - Thomas T. Gallion III (Author)

      - Don Siegelman (Former Gov)

      - Richard Scrushy (HealthSouth CEO)

      - Rob Riley (Lawyer/Brother-in-law to Scrushy)

      - Doug Jones (Lawyer/Plaintiff in lawsuit vs. Scrushy)

