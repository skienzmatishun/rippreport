  stealing-our-democracy:
    brief: 'THE CONFLICT

      - Don Siegelman and Richard Scrushy prosecution (early 2000s) allegedly driven
      by financial control motives, not partisan politics.

      - Rob Riley, Doug Jones, and Campbell Law firm allegedly orchestrated prosecution
      to seize HealthSouth legal business and Scrushy assets.

      - Baldwin County election officials manipulated 2005 gubernatorial election;
      "mysterious ballots" flipped Don Siegelman’s win to Bob Riley.

      - Baldwin County Judge Michelle Thompsson eliminated Republican opposition by
      having party declare opponents "not Republican enough."

      - Sheriff Hoss Mack secured two consecutive wins using exclusive qualifications
      written by Sen. Tripp Pittman to eliminate opposition.

      - CATALYST organization allegedly uses Faux candidates and dirty tricks in Fairhope
      Municipal elections; 2008/2012 results defied statistics.


      THE DISCOVERY

      - Gallion’s book "Shadow Government, Southern Style" details specific legal/financial
      plots involving Scrushy and Campbell law firm uncovered via meetings.

      - Contact with Richard Scrushy confirmed on Oct 28, 2018; Gallion explained
      to Scrushy that Riley/Jones viewed the barn search as an opportunity to steal
      documents.

      - Widget article confirms Baldwin County infrastructure used for election fraud,
      specifically the 2005 "mysterious ballots" that never surfaced.

      - Identifies CATALYST as the local entity pulling election tricks in Fairhope,
      linking to broader Don Siegelman corruption web.


      THE PIVOT

      - Don Siegelman serves as the connecting node: Main Article proves prosecution
      was a financial conspiracy; Widget reveals Baldwin County manipulated that election
      outcome.

      - Baldwin County serves as the connecting node: Gallion book validates systemic
      corruption; Widget reveals specific local officials (Mack, Thompsson) executing
      election fraud.

      - Gallion’s independent investigation provides the evidentiary bridge linking
      high-level Siegelman case allegations to local election tampering.


      KEY ENTITIES

      - Thomas Gallion III (Author/Journalist)

      - Don Siegelman (Former Governor, Sec of State, AG, Lt. Gov)

      - Richard Scrushy (Former HealthSouth CEO)

      - Rob Riley

      - Doug Jones

      - Bob Riley (Former Governor)

      - Hoss Mack (Baldwin County Sheriff)

      - Michelle Thompsson (Judge)

      - Tripp Pittman (Senator)

      - CATALYST (Fairhope-based Organization)'
