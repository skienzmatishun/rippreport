  a-decade-of-corruption:
    brief: 'THE CONFLICT:

      - Accusations of systemic political and judicial corruption within Baldwin County,
      Alabama persist for over 10 years.

      - Officials including attorneys, judges, mayors, and council members are accused
      of using their office for personal gain.

      - Primary authorities (Ethics Commission, Bar Association, Judiciary, Attorney
      General) dismiss evidence without accountability.

      - Main Article cites Thomas T. Gallion III’s book "Shadow Government, Southern
      Style" to frame this corruption as part of a broader Deep-South political money
      network.

      - Widget Article identifies specific financial misconduct dating back to 2010
      involving State Senator Tripp Pittman and Fairhope Mayor Tim Kant.


      THE DISCOVERY:

      - May 8, 2010: Baldwin County Commission tells Pittman and Kant not to proceed
      with a BP Boom bid.

      - June 4, 2010: Fairhope City Council awards contract to Pittman Tractor for
      BP Boom work (submitted under name "Oil Recovery").

      - Within 6 days: Pittman receives $372,165.90 check for "COMPLETED" work before
      verification of actual services or licensing.

      - Work commenced May 2010 without general contractors license, marine insurance,
      or county approval.

      - Over a 10-year period: Pittman secures close to $750,000 in BP funds via debris
      contracts despite no opposition for re-election in many instances.

      - Gallion’s investigation (2018) into Scrushy reveals similar political money
      maneuvering involving Rob Riley and Doug Jones.


      THE PIVOT:

      - Widget Article provides the specific financial and procedural timeline (2010
      Pittman-Kant scheme) that validates Main Article’s claim regarding Baldwin County
      corruption.

      - Both articles confirm zero arrests or indictments for the named individuals
      involved in these schemes despite documented evidence.

      - Both articles allege complicity from local Judges, District Attorneys, and
      the Sheriff to protect these actors.

      - Gallion’s mention that Baldwin County is "worse" than Siegelman/Scrushy cases
      links the national scandal in Main Article to the local Pittman/Kant scandal
      in Widget.


      KEY ENTITIES:

      - Thomas T. Gallion III (Author, "Shadow Government")

      - Don Siegelman (Former Democratic Gov.)

      - Richard Scrushy (HealthSouth CEO)

      - Rob Riley, Doug Jones (Linked in Gallion investigation)

      - Tripp Pittman (State Senator)

      - Tim Kant (Fairhope Mayor)

      - Jack Burrell (Fairhope Council President/Official)

      - Karin Wilson (Fairhope Official who ended Pittman contracts)

      - Chris Elliott, Art Center, Spanish Fort Mayor (Local corruption targets)'
