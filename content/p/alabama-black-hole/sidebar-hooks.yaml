  line-in-the-sand:
    brief: |-
      THE CONFLICT
      - Tom Albritton serves as Executive Director of the Alabama Ethics Commission and is a trustee of the Mabel Amos Charitable Trust.
      - July 16, 2021: Francis Paul Ripp contacts Clark Morris, Special Prosecutions, and the Ethics Commission regarding corruption; Ripp notes Writ of Mandamus filed but hearing failed.
      - August 21, 2022: Ripp sends direct complaint letter to Office of Special Prosecutions Attorney Steve Marshall.
      - Complaint alleges Albritton hid his role as Mabel Amos Trust trustee on his economic statement.
      - Complaint alleges Albritton and Regions Bank altered trust handling in 2014 to list schools receiving scholarships instead of student names.
      - Complaint alleges Albritton’s children received $120,000 in scholarships from the trust; Albritton allegedly abstained to avoid conflict but Ripp claims this was false.
      - Cynthia Raulston (former law partner/trustee) allegedly tried to dissuade Ripp via phone call Jan 2022 and claimed statute of limitations expired.
      - Albritton allegedly sent trust beneficiaries to out-of-state universities despite Mabel Amos's will intent.
      - Ripp alleges Regions Bank charged over $1 million in fees for managing the trust.

      THE DISCOVERY
      - Lagniappe Mobile reports on civil lawsuit filed in Montgomery County Circuit Court by relatives of Mabel Amos.
      - Lawsuit alleges scheme between Regions Bank, John Bell (Regions rep), Tom Albritton, and Rick Clifton.
      - Lagniappe verifies: Regions Bank took $1.2 million in fees between 2002 and 2020 for managing the Mabel Amos Trust.
      - Lagniappe verifies: Tom Albritton’s son and daughter received at least $120,000 in scholarship money from the trust.
      - Lagniappe verifies: Circuit Court Judge Ben Bowden’s child awarded scholarships to SMU totaling $45,000 between 2014 and 2017.
      - Lagniappe confirms Albritton’s denial that he voted on his children's scholarships while noting scholarship records were listed by "Board Member Daughter" notation.

      THE PIVOT
      - Article 2 (Lagniappe) validates the core financial allegations made privately in Article 1 as public fact.
      - Lagniappe confirms Ripp's claim that scholarship records hid student names after initial years (verified by "Board Member Daughter" notation).
      - Lagniappe confirms Ripp's claim that Albritton’s children received $120,000 in scholarships from the trust he manages.
      - Lagniappe confirms Ripp's claim that Albritton and partner trustees used the trust to educate privileged students out of state (U Texas) rather than needy local students.
      - Lagniappe identifies the specific financial partners and legal allies (Bowden, Regions Bank) mentioned in Ripp's warning.
      - Ripp claims AG and Ethics Commission are covering up (Article 1); Lagniappe shows public record evidence supports Ripp's accusations of misconduct, contradicting agencies’ silence.

      KEY ENTITIES
      - Francis Paul Ripp (Owner/Reporter, The Ripp Report).
      - Tom Albritton (Ethics Commission Executive Director; Trustee, Mabel Amos Trust).
      - Cynthia Raulston (Trustee/Partner of Albritton; former Ethics Commission official).
      - Ben Bowden (Covington County Circuit Court Judge; former Albritton law partner).
      - Rick Clifton (Former law partner of Albritton; Trustee, Mabel Amos Trust).
      - Regions Bank (Trustee/Management of the Mabel Amos Charitable Trust; Attorney John Bell).
      - Clark Morris (Alabama AG).
      - Steve Marshall (Office of Special Prosecutions, Alabama AG).
      - Mabel Amos (Former Secretary of State; Estate Founder of Trust).
