      money while citing "infrastructure is there to develop" rhetoric.

      *   Contradicts standard public process: Police revenue program (tag readers)
      and expensive municipal plaza awarded without recorded public discussion.


      KEY ENTITIES:

      *   Cory Martin (Councilman, self-titled "Crier")

      *   Haymes Snedeker (Proposed Municipal Judge, Developer)

      *   Jody W. Bishop (28th Judicial Circuit State of Alabama Judge)

      *   RH Deas Building Co., LLC (Clock Plaza contractor)

      *   ProTecVideo, LLC (Police Sensor Kit provider)

      *   ALDI (East Side development anchor)

      *   Fairhope City Council / Mayor (Mayor Cantrell referenced in context of Publix
      selection)'
