  catalyst-alabama-values:
    brief: 'THE CONFLICT:

      *   Chris Elliott gave up his County commission seat and sold his business for
      a perceived opportunity.

      *   Catalyst sought to gain control of the Baldwin County Commission and Mayor
      seats in 14 municipalities.

      *   Catalyst engaged in an attack on Mayor Karin Wilson after losing Tim Kant
      in Fairhope.


      THE DISCOVERY:

      *   Chris Elliott was appointed to the Baldwin County Commission by Governor
      Robert Bentley.

      *   Chris Elliott is now running for the State Senate seat vacated by former
      Senator Tripp Pittman.

      *   Sen. Pittman took $750,000 of BP money and maintained municipal contracts
      with Fairhope while representing Fairhope.

      *   Catalyst was created through a plan involving Elliott and Stacy Haygood
      to secure political wins.


      THE PIVOT:

      *   Article 2 proves that Elliott''s appointment was an "orchestration" (not
      genuine Alabama values) and details the corrupt mechanisms behind Catalyst,
      confirming the political structure described in Article 1.

      *   Article 2 reveals the specific financial/contractual ties (Pittman/$750k
      BP money, municipal contracts) that were foundational to Elliott''s position
      and Catalyst''s goal for control.


      KEY ENTITIES:

      *   Chris Elliott

      *   Catalyst

      *   Goat Hill

      *   Governor Robert Bentley

      *   Tripp Pittman

      *   Karin Wilson (Mayor)

      *   Stacy Haygood

      *   Baldwin County Commission

      *   Fairhope

      *   David Northcutt

      *   Tucker Dorsey'
