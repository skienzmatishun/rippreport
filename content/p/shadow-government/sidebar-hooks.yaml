      obstruction, rumor, and slanted information in Fairhope.

      *   Fairhope Police Chief Pettis retired.

      *   Pettis revealed he was used and undermined because he failed to inform Lorie
      DeBias of his retirement.

      *   A group (GCN reporter, radio lady, Council, department heads) were involved
      in harassing the Mayor and manipulating Tim.


      THE DISCOVERY:

      *   The Catalyst group is actively running scared and attempting to gain votes
      for the June 5th primary.

      *   Hoss Mack is supporting several Catalyst candidates.

      *   Catalyst seeks total control over Baldwin County Government positions (County
      Commission, Probate Judge, Circuit Judge, Sheriff, District Attorney).

      *   Chris Elliott was appointed to the Baldwin County Commission by Governor
      Robert Bentley, which contradicts "Alabama values."


      THE PIVOT:

      *   Article 2 demonstrates that the political power structure identified in
      Article 1 (Catalyst’s control over key judicial and executive positions) is
      still active and influencing current elections.

      *   The retirement of Chief Pettis and the FBI visit suggest Catalyst''s influence
      has resulted in high-level personnel changes and external scrutiny.


