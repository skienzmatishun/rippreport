hooks:
  a-decade-of-corruption:
    brief: '1. THE CONFLICT

      - Systemic corruption identified across 14 Baldwin County municipalities with
      officials using legal systems to shield misconduct.

      - Spanish Fort: Mayor found not guilty in trial; federal court dismisses case
      via confidential settlement. City Attorney David Conner claims "no city funds,"
      but city insurance policy covers the liability.

      - Summerdale: Mayor David Wilson admits rumors of using town as a speed trap
      are accurate (10 officers, 1,468 residents). Department wrote nearly 4,000 traffic
      citations (2019) on tourist corridors; jurisdiction tripled area size.

      - Fairhope: Airport corruption involving Council President Jack Burrell and
      Municipal Judge who excluded citizen address.

      - Common Pattern: City Attorneys (Conner) use insurance companies to pay settlements
      instead of city funds to avoid liability. Judges and Attorneys accused of "washing
      dirty laundry" via the legal system.


      2. THE DISCOVERY

      - Over 10-year period, State Senator Tripp "Boom Boom" Pittman and Fairhope
      Mayor Tim Kant secured a $636,000 BP Boom work bid (2010).

      - May 8th, 2010: County Commission told Pittman and Kant NOT to proceed with
      bid.

      - They circumvented this using a second proposal under the name "Oil Recovery."

      - June 4th, 2010: Fairhope City Council awarded contract to Pittman Tractor.

      - Six days later: Check of $372,165.90 issued for "COMPLETED" work done without
      contract, general contractor license, or insurance.

      - Pittman/Kant/Burrell secured nearly $750,000 in BP money total.

      - Pittman changed Baldwin County Sheriff qualifications legislatively (different
      from any other county), enabling Sheriff to be re-elected twice with no opposition.

      - Alleged involvement of "CATALYST" in Mega-Site theft, Strawman case, and Chris
      Elliott DUI coverage.


      3. THE PIVOT

      - Article 2 validates the specific mechanism described in Article 1 ("Judge,
      Municipal Attorney and Mayors are all involved").

      - Shows Jack Burrell is the same Council President referenced in Article 1''s
      airport corruption section.

      - Reveals Tripp Pittman and Tim Kant (political allies) created the legislative
      framework allowing judges/officials to operate without opposition, proving why
      Article 1 claims no one is held accountable.

      - Connects specific financial corruption (BP contracts/insurance) to the broader
      "CATALYST" political machine Article 1 identifies as insulating corrupt officials.


      4. KEY ENTITIES

      - Tripp "Boom Boom" Pittman (State Senator)

      - Tim Kant (Fairhope Mayor)

      - Jack Burrell (Council President / Municipal Judge)

      - Karin Wilson (Fairhope Mayor, ended Pittman/Burrell deals)

      - David Conner (Spanish Fort City Attorney)

      - David Wilson (Summerdale Mayor)

      - CATALYST

      - BP Boom work / Mega-Site

      - Baldwin County Sheriff (via Pittman legislation)'
    generated_at: '2026-03-14T23:03:36.112968Z'
    text: Baldwin County officials use the legal system to hide their dirty laundry
      while insurance companies pay for their crimes. Tripp 'Boom Boom' Pittman and
      Tim Kant bypassed the Commission to grab $636,000 in BP money through a shadow
      company they called 'Oil Recovery.'
