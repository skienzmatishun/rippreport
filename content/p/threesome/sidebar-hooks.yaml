  slap-in-the-face:
    brief: 'THE CONFLICT:

      - Spanish Fort Mayor Mike McMillian faced trial regarding allegations he allegedly
      slapped city employee Lyndsey Cooper.

      - Trial concluded in "not guilty" verdict, reported as a "sham trial" conducted
      locally.

      - Settlement reached in federal court between Spanish Fort and Lyndsey Cooper,
      terms remaining confidential per City Attorney David Conner.

      - Resolution stipulates no city funds used directly; payment covered via municipal
      insurance policy while insurance company absolves officials of public accountability
      (e.g., apology).

      - Parallel corruption in Summerdale: Mayor David Wilson, Municipal Judge Robert
      Stankowski, and Attorney Spencer Davis implicated in aggressive revenue traffic
      stopping on highways despite low population (1,468 residents vs ~4,000 citations
      in 2019).

      - Parallel corruption in Fairhope: Municipal Attorney Marcus McDowell failed
      to file charges against McSherry (accused of assaulting woman Paula DiNiardi)
      despite claiming intent to do so for nearly two years.


      THE DISCOVERY:

      - Widget article confirms identity of Spanish Fort Mayor as Mike McMillian ("Slappin
      Mike") in the Lyndsey Cooper incident.

      - Widget article validates acquittal details, referring to him walking "NOT
      GUILTY."

      - Widget article connects Spanish Fort/McMillian case to broader Alabama judicial
      corruption, citing Sen. Tripp Pittman (BP fraud) and Sen. Chris Elliott (DUI).

      - Widget article exposes McDowell’s failure to file charges on DiNiardi case
      as evidence of a wider "cabal of political criminals."

      - Widget article references book by Thomas Gallion III regarding Alabama corruption
      and historical patterns in the state judiciary.


      THE PIVOT:

      - Article 2 acts as verification for Article 1 by providing the specific name
      (Mike McMillian) associated with the "slam dunk" liability/assault case that
      Article 1 describes generically as a sham trial.

      - Article 2 links the insurance settlement loophole described in Article 1 directly
      to a broader pattern of elected officials (Pittman, Elliott) using the system
      to avoid consequences.

      - Article 2 confirms that McDowell’s inaction (Fairhope) is not an isolated
      legal failure but part of the same "slap in the face" culture Article 1 documents.


      KEY ENTITIES:

      - Mike McMillian

      - Lyndsey Cooper

      - David Conner

      - Marcus McDowell

      - Paula DiNiardi

      - McSherry / McSharry

      - Robert Stankowski

      - Spencer Davis

      - David Wilson

      - Sen. Tripp Pittman

      - Sen. Chris Elliott

      - Thomas Gallion III (Author)'
    generated_at: '2026-03-14T23:03:36.113013Z'
    text: Spanish Fort and Fairhope treat assault allegations like minor inconveniences
