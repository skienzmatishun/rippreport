      \ Judge)\n   - Spencer Davis (Summerdale/Municipal Attorney)\n   - Tucker Dorsey\
      \ (Baldwin County Commissioner)\n   - Elliot (Baldwin County Commissioner, name\
      \ truncated but linked to Dorsey and flag refusal scandal)\n   - Jack Burrell\
      \ (Fairhope Airport investigator/city council member)"
