      \ jurisdiction controls key corridors to Gulf Shores/Bay area tourist traffic.\n\
      \   - Fairhope: Airport council meetings exclude citizens (e.g., 2022 incident\
      \ with only one citizen reporter present); Jack Burrell involved in airport\
      \ corruption cases; municipal attorney asserts no city funds used for lawsuit\
      \ settlements despite ongoing lawsuits.\n   - Pattern: Baldwin County officials\
      \ consistently use insurance settlements instead of direct tax money to mask\
      \ corruption or lawsuits.\n\n2. THE DISCOVERY\n   - Fairhope Mayor Kant is confirmed\
