      - Jonathan Victor: April incident where Deputy Hunady shot unarmed victim four
      times from seven yards; Sheriff Mack and Hunady denied immunity by Judge William
      Cassady in April 2021 despite evidence suggesting false facts were provided.


      THE DISCOVERY:

      - Second federal civil rights lawsuit filed against Sheriff Mack and the Baldwin
      County Major Crimes Unit (BCMCU).

      - BCMCU Chairman is Bay Minette Police Chief Al Tolbert, creating a conflict
      of interest where the unit investigates its own members.

      - In first 8 prior BCMCU cases, investigations found no police at fault; camera
      footage was withheld from the public.

      - Judge William Cassady ruled Sheriff Mack and Hunady provided “facts... that
      were untrue” in the Jonathan Victor case public filings.

      - Bay Minette County Commission was warned regarding federal lawsuits involving
      the French murder but took no action.


      THE PIVOT:

      - Article 2 confirms Article 1’s claim that Baldwin County officials protect
      themselves from consequences using the legal system.

      - While Article 1 highlights municipal immunity and insurance settlements, Article
      2 reveals the same shielding is active at the Sheriff level via qualified immunity
      and self-policing units.

      - The filing against Mack shows he is attempting to leave office (replacing
      himself with Anthony Lowery) while federal litigation alleges systemic cover-ups
      of officer-involved deaths (French, Victor, 10 total).

      - The failure to act on federal lawsuit warnings matches the pattern of Article
      1: elected officials ignoring compliance or accountability threats.


      KEY ENTITIES:

      - Huey “Hoss” Mack (Sheriff)

      - Al Tolbert (Bay Minette Police Chief / BCMCU Chairman)

      - Brandon Thompson (Bay Minette Officer)

      - OJ French (Victim of murder)

      - Mayor Wills (Bay Minette)

      - David Conner (Spanish Fort City Attorney)

      - Jack Burrell (Fairhope figure)

      - Anthony Lowery (Sheriff Replacement Candidate)

      - Jonathan Victor (Victim of shooting)'
