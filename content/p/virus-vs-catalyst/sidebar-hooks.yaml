  catalyst-central:
    brief: |-
      THE CONFLICT
      March 31 primary runoff elections in Alabama delayed to July 14, 2020 due to COVID-19.
      Jerry Carl won the primary in First Congressional District over Hightower.
      Hightower identified as CATALYST candidate.
      Chris Pringle and Wes Lambert (former opponents) switched support to Jerry Carl, totaling approx 22% of vote.
      CATALYST candidates (Joe Davis and Jeb Ball) elected to Baldwin County Commission; voting in favor of developer interests over constituents on projects like Savannah Estates.
      Hightower campaign utilized "swamp" political action committees, specifically Club for Growth Action, with negative ads.

      THE DISCOVERY
      CATALYST is a political machine headquartered in Fairhope, Alabama, controlled by Scott Boone and his father Kevin Boone (Fairhope City Councilman).
      CATALYST evolved from the dissolved partnership of Stacy, Haygood and Elliott following Lynn Stacy's death.
      Fairhope City Council has sworn allegiance to CATALYST; serves as conduit for inside information between Kevin Boone and son Scott Boone.
      CATALYST maintains control in Baldwin County judiciary, Sheriff’s office, District Attorney's office.
      The goal of CATALYST's national run (Hightower) is to secure "a congressman in their pocket."
      CATALYST opposes city manager government, districts, and measures that challenge control; backed developers for the "rape" of Baldwin County.

      THE PIVOT
      Article 2 ("CATALYST CENTRAL") is the 'smoking gun' because it defines "Hightower, CATALYST candidate" not as a political opponent, but as the mouthpiece for an organized Fairhope development/political machine.
      Without Article 2, Hightower is just a candidate; with it, the loss of the primary confirms CATALYST's inability to control the ballot box this cycle ("face an election where they cannot tamper with the ballot box").
      Article 2 links Scott Boone and Fairhope developers to the campaign financing strategy used in Article 1's race, exposing the "good ole boy" structure behind the congressional seat bid.

      KEY ENTITIES
      Jerry Carl: President of Mobile County Commission; on Mobile Health Board.
      Hightower: CATALYST candidate for First Congressional District.
      Scott Boone: Manager of CATALYST; son of Kevin Boone.
      Kevin Boone: Fairhope City Councilman (CATALYST deep throat).
      Chris Elliott: Baldwin County Commissioner; "Tax Man" in Orange Beach.
      Dane Haygood: Mayor of Daphne; former partner in Stacy/Haygood/Elliott group.
      Lynn Stacy: Deceased political power broker (100% success rate in past elections).
      Joe Davis: Baldwin County Commissioner; votes for developers (Savannah Estates project).
      Jeb Ball: Baldwin County Commissioner; votes for developers.
      Club for Growth Action: PAC referenced in Hightower's negative campaign.
