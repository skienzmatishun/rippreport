      - Howling Raines sent formal letter to Mayor Sullivan and Council President Jack Burrell complaining project lacks public vetting.
      - New council approved current proposal with 14 days notice; Widget compares this to Mayor Wilson's previous "10 fold" public participation.
      - Raines is now publicly criticizing the current administration he was previously accused of working alongside or misleading.

      3. THE PIVOT:
      - Widget Article proves public outcry is legitimized by a named stakeholder (Raines) formally objecting to the vetting process outlined in Main Article.
      - Raines is central "smoking gun" of confusion: Accused in Main Article of spreading lies ("bulldozing bluff"), yet Widget shows he is the one complaining about lack of input in current administration.
      - Article 2 demands an audit on RESTORE Act standards; validates Main's claim that the $6.2 million grant is being misused or "spoiled."

      4. KEY ENTITIES:
      - Fairhope City Council (Current)
      - Jack Burrell (Council President)
      - Scott Boone / CATALYST Consulting
      - Howell/Howling Raines
      - Mayor Wilson (Former)
