      THE DISCOVERY:

      - New documentary (video posted on Rumble) claims George Floyd medical examiner
      report indicated 3x fatal dose of fentanyl; no neck damage consistent with death
      by strangulation.

      - Claim: This data was suppressed to facilitate BLM riots across county.

      - Parallels to Hastings case: State withheld autopsy report from defense in
      2003.

      - Trial testimony conflict: Dr. Paul McGarry testified at trial on strangulation
      method; Mississippi ME concluded homicide by strangled, but Lawrence convicted
      based on shooting (gunshot destroyed C-2 vertebrae).

      - Current legal posture: Motion for Relief filed regarding Hastings case citing
      newly discovered evidence.


      THE PIVOT:

      - Article 1 (Main) warns readers to "Expect the worst" from Sheriff Mack as
      he leaves office; frames Baldwin County power structure as corrupt or dangerous.

      - Article 2 (Widget) acts as the ''smoking gun'' by linking Sheriff Huey Hoss
