      - Article 2 validates the "expect the worst" warning from Article 1 by revealing
      a precedent of concealed evidence (Rule 32 motion), judicial connections, and
      family influence in local law enforcement/coroner records.


      KEY ENTITIES:

      - Huey Hoss Mack (Sheriff, Bald County; former Lt.)

      - Eric Hastings (Victim)

      - Murray "Bubba" Lawrence (Defendant)

      - David Whetstone (District Attorney at time of Hastings case)

