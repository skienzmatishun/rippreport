    text: The Mabel Amos Trust exists to help poor students, but Albritton treated it like a personal piggy bank for his own kids. Ripp handed investigators a 100-page smoking gun proving these insiders ignored the law while pocketing millions in trust assets.
  dirty-underwear:
    brief: "THE CONFLICT: \n- Mabel Amos Charitable Trust was established to fund college for children without money, managed by appointed trustees.\n- Since Mabel Amos’ death in 1999, former law firm partners Tom Albritton and Rick Clifton served as two of three board members.\n- Tom Albritton, Executive Director of the Alabama Ethics Commission since March 2015, is a trustee on the very trust he oversees.\n- Financial records show Albritton’s son and daughter received scholarships totaling at least $120,000 (specifically confirmed as $105,000 between 2014 and 2018 in IRS 990s).\n- A specific trust record noted “Scholarship for Board Member Daughter.”\n- Regions Bank, acting as financial rep (John Bell), received $1.2 million in fees from 2002 to 2020; lawsuit alleges they increased fees massively.\n- A civil lawsuit was filed in Montgomery County Circuit Court by Amos’ relatives alleging a scheme between Regions Bank, Albritton, and Clifton.\n- Albritton claims he abstained from voting\
      \ on scholarships for his children but admitted involvement in the trust.\n\nTHE DISCOVERY:\n- Widget article confirms Tom Albritton kept his Executive Director role and “pass” from the Ethics Commission despite violating IRS Section 4941(d) regarding self-dealing.\n- Reveals Alabama’s “dirty underwear” trio (Attorney General, Ethics Commission, Bar Association) systematically protects each other from accountability.\n- Confirms McCallum was fined $100,000 by Ethics Commission but the AG’s Office filed no criminal charges despite Bar Association paying McCallum $37,437 after his resignation.\n- Validates Main Article’s claim that AG and Ethics Commission are ignoring obvious white-collar crime and self-dealing.\n- Proves the Ripp Report’s investigation is based on documented financial flows (trust scholarships), not opinion.\n\nTHE PIVOT:\n- Article 2 is the smoking gun because it generalizes Article 1’s specific financial violations into a documented pattern of institutional immunity.\n\
      - It connects Albritton’s misuse of trust funds directly to the state agencies responsible for ethics oversight, proving they are not neutral regulators.\n- Article 2 establishes that the $120k+ in improper scholarships by Albritton (Article 1) is consistent with his pattern of avoiding accountability via the same “dirty underwear” protections Article 2 highlights.\n\nKEY ENTITIES:\n- Tom Albritton (Ethics Commission Executive Director, Trustee)\n- Rick Clifton (Former law partner/Trustee)\n- Regions Bank\n- John Bell (Regions Bank rep on Mabel Amos Trust)\n- Ben Bowden (Covington County Circuit Court Judge, Albritton partner)\n- Mabel Amos Charitable Trust\n- Montgomery County Circuit Court (Lawsuit venue)\n- Alabama Attorney General’s Office\n- Alabama Bar Association\n- McCallum (Bar official)"
