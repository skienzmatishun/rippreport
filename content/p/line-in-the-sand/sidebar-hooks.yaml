hooks:
  alabama-black-hole:
    brief: |-
      THE CONFLICT
      - Mabel Amos Charitable Trust established to provide college aid for Alabama students with academic merit but no funds.
      - Civil lawsuit filed by relatives of former Secretary of State Mabel Amos against Regions Bank, trust representative John Bell, and Ethics Commission Executive Director Tom Albritton.
      - Allegations against Albritton and former law partner Rick Clifton of using charitable funds for personal “self-dealing.”
      - Records show Albritton’s son and daughter received at least $120,000 in scholarship money from the trust.
      - Albritton’s former law partner and current Covington County Circuit Court Judge Ben Bowden had a child awarded scholarships totaling $45,000 (2014–2017).
      - Regions Bank charged over $1.2 million in fees for managing the trust (2002–2020).
      - Trust records allegedly altered in 2014 to list universities instead of students’ names, obscuring scholarship recipients.
      - Ethics Commission and Alabama Attorney General accused of inaction regarding these criminal and white collar allegations.

      THE DISCOVERY
      - Francis Paul Ripp (founder of The Ripp Report) submitted a 100+ page evidence package and complaint to the Special Prosecution Office on August 21, 2022.
      - Ripp documents prior attempts to report this on July 16, 2021; those complaints were ignored with a Writ of Mandamus failing to secure a hearing.
      - Ripp provides confirmation Albritton failed to disclose his role as trustee of the multi-million dollar trust on official economic statements.
      - Ripp exposes a protective alliance between Albritton and Cynthia Raulston (Ethics Commission Executive) regarding the trust funds.
      - Ripp confirms oil was discovered on Mabel Amos land in 2010, generating $80 million in production ($20M potential remaining), increasing suspicion of mismanagement.
      - Ripp asserts Albritton’s children were sent to out-of-state schools rather than the intended in-state institutions for needy students.
      - The letter specifically flags that withholding this information is considered criminal/ethical misconduct by Ripp’s metrics.

      THE PIVOT
      - Article 1 provides the allegations and media coverage; Article 2 is the formal record of those allegations being legally submitted to investigators.
      - Article 2 validates Article 1's claims by showing Ripp has already contacted the Attorney General’s office with hard data, moving from opinion to documented accusation.
      - Article 2 identifies specific individuals (Raulston) actively defending Albritton, proving the conflict of interest claimed in Article 1.
      - Article 2 confirms discovery is pending via federal/civil litigation that will expose the extent of Regions Bank and Albritton’s involvement.
      - Article 2 shows official silence: No response from Special Prosecution, Ethics Commission, or Alabama Bar as of the date of submission (Aug 21, 2022).

      KEY ENTITIES
      - Francis Paul Ripp (Founder of The Ripp Report / Alabama Consumers Association)
      - Tom Albritton (Alabama Ethics Commission Executive Director, Trust Board Member)
      - Cynthia Raulston (Former/Current Ethics Commission Exec, Albritton Legal Partner/Ex-wife)
      - Rick Clifton (Former law partner of Albritton, Trust Board Member)
      - Ben Bowden (Covington County Circuit Court Judge, former Albritton law partner)
      - John Bell (Regions Bank representative on Trust)
      - Regions Bank
      - Mabel Amos Charitable Trust
      - Clark Morris (Alabama Attorney General, Director of Special Prosecutions)
      - Lagniappe Mobile
      - The Ripp Report
