    text: When the police investigate themselves, the verdict is always 'justified' regardless of how many bodies pile up in the morgue. From O.J. French to Murray Lawrence, the Wilters-Mack-Lowery alliance runs a protection racket that turns internal investigations into a shredding machine.
  railroaded-by-the-law:
    brief: |-
      THE CONFLICT:
      - Cole Barkley Case (Lee County/Auburn, AL):
          - Nicole Barkley calls 911 regarding intoxicated husband Cole with a gun.
          - Auburn Police officer responds without sirens, fires weapon through partially open door into Barkley home after being told children were present.
          - Cole Barkley shot multiple times, hospitalized, charged with attempted murder despite no intent to kill.
          - Sentenced by Judge Tickle (ex-prosecutor) to 45 years in Lee County Justice Center.
          - Article alleges officer concealed identity and police were aware of civil liability risks; Barkley’s conviction treated as protection for "police fraternity."
      - Lawrence Case (Baldwin County, AL):
          - Lawrence convicted of capital murder for stabbing Hastings.
          - Convicted in 2005 trial with no physical evidence directly identifying Lawrence as killer.
          - Main article states he has been in jail for 20 years; Widget article notes over 18 years.
          - Alleged collusion by Prosecutor, Sheriff Investigator, and Judge to secure conviction without full transparency.

      THE DISCOVERY:
      - Second autopsy report in Lawrence/Hastings murder case was never disclosed to defense.
          - Exhumation of Hastings body occurred roughly one month after murder.
          - Second autopsy sent to Alabama Department of Forensic Sciences on May 14, 2003.
          - Final report and findings delivered to Whetstone (Prosecutor) via letter May 17, 2004.
          - Report CC’d to Hoss Mack (Sheriff/Lead Investigator) and Wilters.
      - Whetstone admitted at trial/transcript: "I didn’t order it and I don’t remember ever receiving such an autopsy."
      - Article reveals documents confirm Whetstone, Hoss Mack Sr., and Wilters were aware of autopsy existence prior to trial.
      - Defense attorney Willie Huntley requested new trial based on Brady Information violation due to withheld autopsy report.

      THE PIVOT:
      - Article 1 (Lee County/No Justice Center) uses Barkley case to expose the "Justice Fraternity" in Lee/Auburn; claims Baldwin County officials are part of same corruption ("The Police Fraternity").
      - Article 2 (Railroaded by the Law) provides specific proof of Baldwin County corruption described in Article 1.
      - By proving prosecutors (Whetstone) and officials (Hoss Mack) colluded to withhold evidence in the Lawrence case, Article 2 validates Article 1’s central thesis: that prosecutors, sheriffs, and judges are willing to violate procedure to protect their "fraternity" or achieve convictions.

      KEY ENTITIES:
      - Cole Barkley / Nicole Barkley (Lee County Victims/Witnesses)
      - Judge Tickle (Auburn/Lee County, Ex-Prosecutor, sentenced Barkley)
      - Whetstone (Baldwin County Prosecutor, prosecuted Lawrence)
      - Hoss Mack / Hoss Mack Sr. (Sheriff, Lead Investigator; Baldwin County officials)
      - Wilters (Official associated with autopsy authorization/chain of custody in Baldwin case)
      - Willie Huntley (Lawrence’s attorney exposing withheld autopsy)
      - Lawrence (Capital murder defendant in Baldwin County; Main article states innocent man convicted of 20 years)
      - Judge Tickle mentioned in both contexts (Barkley sentencing; implied Baldwin connection through "fraternity" narrative)
    generated_at: '2026-03-11T14:19:53.025677Z'
    text: A fair trial is impossible when the men in charge treat the Constitution like a suggestion rather than the law. Prosecutors David Whetstone and Robert Wilters knowingly hid a second autopsy report for years just to keep Murray Lawrence behind bars and protect their perfect records.
  deal-with-the-devil:
