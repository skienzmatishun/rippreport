      - Confirms Jimmy Conyers (Council President) and Sherry Sullivan are aligned with "good ole boys" developers led by Scott Boone Consulting.
      - City imposed a 12-month subdivision moratorium (cited in Feb 15, 2022 zoning vote context); stated by Council President Conyers: "for the second time in five years, we’ve had to contemplate a moratorium."
      - Moratorium applies brakes for community but specifically protects included LLCs; Council President admits "completed applications will not be affected."
      - Current Mayor Sullivan pledged to “Embrace Development,” facilitating developer projects like storage buildings on unzoned property and First Baptist Church converted to parking lots.
      - Infrastructure grants secured by Wilson now in danger of losing funding due to current Council’s "procrastination and bickering."

      THE PIVOT:
      - Main Article establishes Sherry Sullivan as part of the original Kant corruption machine that Wilson removed.
      - Widget Article proves (via "MORATORIUM PARTY") Sullivan is now the central figure in the 2020 "Catalyst" regime, directly applying the corruption tactics (developer control/financial manipulation) she was accused of during Kant’s era.
      - Widget article confirms the "Embrace Development" slogan and Council control (Conyers, Boone) is the modern iteration of the "Kant regime" Main Article condemned.
      - Specific financial link: Sullivan previously kept a second paycheck in Kant’s regime; under her new leadership, she allows Catalyst/Boone to regain the "strangle hold" on utilities and development.

