    text: The "good ole boys" in Fairhope treat the utility budget like a private ATM for their cronies. This audit proves the Kant regime’s corruption wasn't just a rumor; it shows how Karin Wilson alone stopped the $90,000 double-dipping scam that Jack Burrell and his pals fought to keep.
