      - Wilson balanced the budget and secured grants including 6.2 million for waterfront project, but Council opposed infrastructure efforts (except Cory Martin).
      - In 2020, last municipal election resulted in control transfer from Wilson to a "cabal" labeled Catalyst/Scott Boone Consulting.
      - Sherry Sullivan is elected as Mayor under this new regime ("Fauxhope" control).

      THE DISCOVERY:
