  invitation:
    brief: 'THE CONFLICT:

      *   100 people attended the April 3rd round table discussion regarding the K-1
      Center.

      *   Fairhope City Council makes decisions requiring only three votes without
      hearing constituents.

      *   Citizens were denied public participation regarding the $2.6 million recreation
      property purchase.


      THE DISCOVERY:

      *   Mayor Wilson invited citizens to participate in the Waterfront project engagement
      process.

      *   The council approved $500,000 for engineering design for the Waterfront
      project but pushed back only for political capital before municipal elections.

      *   The purchase of the recreation property by three councilmen ("the three
      B''s") caused the city''s bottom line to shift from a $1.7 million surplus to
      a $1.2 million deficit.

      *   The Council voted themselves a raise and FULL family insurance, while other
      employees lack FULL family insurance.


      THE PIVOT:

      *   Article 2 proves that the City Council systematically excluded public participation
      regarding major projects (like the Waterfront) despite claiming authority. This
      links directly to Article 1''s criticism of the Council not listening to constituents
      on issues like the K-1 Center.


      KEY ENTITIES:

      *   Fairhope City Council

      *   Mayor Wilson

      *   K-1 Center

      *   Waterfront project

      *   Three councilmen ("the three B''s")'
    generated_at: '2026-07-10T22:36:46.892180Z'
