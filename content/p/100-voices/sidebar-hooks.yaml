      her administration for an entire year.

      *   Councilman Brown was vocal about Greeno Road rezoning but was absent when
      the vote occurred.

      *   The Entertainment District proposal failed its vote (2/2 split).


      THE DISCOVERY

      *   The City Council has wasted a year trying to obstruct the Mayor''s administration.

      *   The City Council President is being sued for preventing free speech.

      *   The council adopted a motion that failed items cannot be brought before
      the council for 60 days.

      *   The Council failed to hold necessary public participation before voting
      on the Entertainment District issue.


      THE PIVOT

      *   Article 2 proves the Council''s lack of leadership and poor decision-making,
