  fairhope-catalyst-a-dirty-little-secret:
    brief: 'THE CONFLICT:

      *   Fairhope City Council makes decisions based on three votes without listening
      to constituents.

      *   100 people attended an April 3rd round table discussion regarding the K-1
      Center.


      THE DISCOVERY:

      *   Four Fairhope City Councilors filed an injunction against an October 2 referendum
      to change the form of government.

      *   The Catalyst Council members actively concealed details about a proposed
      change in government (districts vs. at large).

      *   Council members failed to obtain necessary legal advice from the Alabama
      Attorney General prior to the election date.


      THE PIVOT:

      *   Article 2 shows that the Council used legal maneuvers and silence to actively
      undermine citizen input regarding changes to government structure, directly
      contradicting the premise of Article 1 about listening to constituents.


