  back-stabber:
    brief: 'THE CONFLICT

      - Fairhope City Council makes decisions using only three votes without hearing
      constituents.

      - Citizens are not allowed to participate in key decisions regarding city property
      development.


      THE DISCOVERY

      - A Special Called City Council meeting was scheduled for September 4, 2018,
      at 4:00 p.m., to approve a Real Estate Purchase Agreement for properties owned
      by the Baldwin County Board of Education (BCBE).

      - This real estate purchase agreement was planned without any public participation
      or input from stakeholders regarding the K-1 Center property.


      THE PIVOT

      - Article 2 provides specific evidence that supports the general accusation
      in Article 1 that the Council ignores constituent voices by executing a major
      property deal (K-1 Center) without public forum.


