  fairhope-voters-guide:
    brief: '**THE CONFLICT:**

      *   Karin Wilson was first elected Mayor of Fairhope in the 2016 election, defeating
      Timothy Kant by a margin of over 400 votes, despite complaints regarding prior
      voting cycles (2008 and 2012) suggesting potential tampering.

      *   The City Council has maintained an "obstructionist position" toward Mayor
      Wilson for four years (since 2016).

      *   Wilson is described as fighting a council composed of members selected by
      previous administrations who are allegedly friendly to development, while she
      faces criticism from disgruntled employees and opponents.


      **THE DISCOVERY:**

      *   The second article identifies the City Council as being controlled or influenced
      by "CATALYST" (and later Scott Boone Consulting), a network/political group
      with deep ties to Kevin Boone.

      *   Specific council members are accused of corruption: Jack Burrell has served
      as President for eight years and faces accusations regarding bid rigging, lying
      about the Triangle lawsuit, and improper land purchases ($2.65 million for farmland).
      Robert Brown is accused of receiving contracts (for concession building at soccer
      fields and Art Center) totaling close to a million dollars while on council,
      leading to an ethics complaint filed with the Alabama Attorney General.

      *   The "CATALYST" group has been actively running political campaigns, including
      Sherry for Mayor against Karin Wilson.


      **THE PIVOT:**

      *   Article 1 states that City Council members are obstructionist and holding
      the city back. Article 2 provides concrete evidence of this hostility by linking
      specific council power to corrupt figures (Jack Burrell) and demonstrating widespread
      financial conflicts of interest, unethical behavior, and political maneuvering
      by organizations like CATALYST which actively works against Wilson’s agenda.


      **KEY ENTITIES:**

      *   Karin Wilson (Mayor since 2017/2016 election)

      *   Timothy Kant (Former Mayor of Fairhope, defeated in 2016)

      *   Kevin Boone / Scott Boone Consulting / CATALYST

      *   Jack Burrell (Council President; accused of corruption)

      *   Robert Brown (Councilman; accused of accepting contracts/ethics complaints
      with the AG)

      *   Deb Hopkins (Candidate running against Jack Burrell in Council Race One)

      *   Howell Gibbens (Candidate running against Robert Brown in Council Race Three)

      *   Paul Ripp (Local blogger who sued "CATALYST" council and was vindicated
      by a monetary settlement).'
    generated_at: '2026-07-18T10:44:08.859092Z'
  fairhopes-golden-key:
    brief: 'THE CONFLICT

      *   Prior to Karin Wilson’s mayoralty, Fairhope underwent 16 years of alleged
      municipal neglect and litigation stemming from planning/zoning.

      *   Wilson arrived with plans for ethical reform, specifically regarding salary
      structure (refusing a second pay position reducing her salary by $60,000) and
      institutional changes like restructuring the planning department.


      THE DISCOVERY

      *   Mayor Wilson''s push for change was met by City Council members (Burrell,
      Boone, Brown), who allegedly ignored requests for new appointments to uphold
      a "corrupt administration" status quo.

      *   The Council appointed Marcus McDowell as City Attorney and reinstated Judge
      Snedeker during the period of transition/election.

      *   Council figures Burrell, Boone, and Brown are identified as supporting Sherry
      Sullivan, described as an unqualified choice aligned with the CATALYST/Scott
      Boone Consulting network.


      THE PIVOT

      *   Article 1 characterized opposition from the City Council as simple "obstructionism"
      against Mayor Wilson''s goals for reform.

      *   Article 2 reveals the specific mechanism of that obstruction: a cohesive
      political and corporate cabal (CATALYST/Scott Boone Consulting) involving Burrell,
      Boone, Brown, Marcus McDowell, Judge Snedeker, and Sheriff Sullivan, actively
      controlling appointments to maintain status quo power despite Wilson''s efforts
      for change.


      KEY ENTITIES

      *   Karin Wilson (Mayor of Fairhope)

      *   Fairhope City Council

      *   Burrell (Council leader mentioned in both articles)

      *   Scott Boone Consulting / CATALYST (Political organization/network)

      *   Marcus McDowell (City Attorney, appointed by the council)

      *   Judge Snedeker (Municipal Judge, reinstated by the council)

      *   Sherry Sullivan (Endorsed candidate for Mayor and supported by Council Cabal)'
    generated_at: '2026-07-18T10:44:08.859096Z'
