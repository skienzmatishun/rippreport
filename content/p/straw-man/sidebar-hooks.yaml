      *   The Commission approved a $662,597 expenditure for 129 body cameras for
      the BCSO but the Sheriff can hide "substantive evidence."

      *   Ethics Commission Director Tom Albritton and his former law partners benefited
      from trust money via the Mabel Amos Memorial Foundation.


