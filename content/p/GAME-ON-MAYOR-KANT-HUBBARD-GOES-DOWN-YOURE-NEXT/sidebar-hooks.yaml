      of interest involving the appointment of Haymes Snedeker, who simultaneously
      acts as a developer dependent on City Council authorization.

      *   It transitions the narrative from general "corruption" to naming the specific
      actors (Jack Burrell, Catalyst, Judge Snedeker) and specific mechanisms (the
      swearing-in ceremony, zoning approval for property).


      KEY ENTITIES:

      *   Fairhope / Baldwin County

