  quarterback-sneak:
    brief: 'THE CONFLICT:

      *   Ripp Report established over 10 years ago due to perceived lack of honesty
      and transparency from Fairhope City Hall, specifically citing Mayor Kant as
      a corrupt public official.

      *   Main Article alleges general suspicion among citizens that local Fairhope
      election results have been tampered with in the past.

