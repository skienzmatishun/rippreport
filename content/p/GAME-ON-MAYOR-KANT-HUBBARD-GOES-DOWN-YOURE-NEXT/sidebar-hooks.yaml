      *   The HR Director is seeking $100,000 in damages.


      THE DISCOVERY

      *   Jack Burrell is attempting to hijack the first honest election in Fairhope.

      *   Employees and ex-employees assisted by Mr. Burrell have colluded to support
      a municipal government coup against Mayor Wilson.

      *   Catalyst (led by Scott Boone, son of Councilman Kevin Boone) has privileged
      confidential city business supplied by his father and employees following Jack
      Burrell.

      *   Hix/Snedeker companies are involved in the airport bid process and contributed
      to almost all city council members.


      THE PIVOT

