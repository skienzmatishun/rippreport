      for assaulting Paula DiNardi; Municipal Attorney Marcus McDowell failed or lied
      about his responsibilities regarding this assault case.


      THE DISCOVERY:

      *   The Widget Article reveals an impending "Quarterback Sneak" political maneuver
      where Jack Burrell intends to use a City Council meeting (one usually not attended)
      to swear in Haymes Snedeker as the Municipal Judge.

      *   It proves that Judge Snedeker is one of Fairhope''s largest land owners
      and developers, creating a conflict of interest because his developments require
      authorization from the City Council he is currently being sworn into.

      *   The article reveals political influence beyond Burrell via Catalyst and
