  gob-coup:
    brief: '**THE CONFLICT:**

      *   The Ripp Report has self-funded $15,000 over 10 years to expose perceived
      political and judicial corruption in Fairhope city hall.

      *   In the past (specifically referenced regarding Mayor Kant), The Ripp Report
      expressed suspicion that last two election results were tampered with and targeted
      Mayor Kant as a primary corrupt official.

      *   A major HR incident involving an allegation of assault by then-Mayor Wilson
      on a City HR Director occurred on December 29, 2017; the director filed an incident
      report January 25, 2018, but filed her formal claim May 19, 2017 (Note: Dates
      in article suggest chronological confusion).

      *   City employee Fiddler was fired following this HR event.


      **THE DISCOVERY:**

      *   Article 2 reveals a "coup mentality" within Fairhope City Council aimed
      at ousting Mayor Wilson immediately following her election win, spearheaded
      by figures like Jack Burrell and Kevin Boone (whose son is associated with Catalyst).

      *   A specific link was discovered between Judge Snedeker (Municipal Judge)
      and Ray Hix/Hix-Snedeker companies. This company has involvement in the airport
      bid process.

      *   The Council imposed a hiring freeze and fired key employees Fiddler and
      Sullivan to disrupt city operations and support Jack Burrell''s "GOB" objectives.


      **THE PIVOT:**

      *   Article 1 established The Ripp Report’s general premise that corruption
      is pervasive in Fairhope politics over many years. Article 2 provides the specific,
      contemporary evidence of how this alleged corruption functions: through internal
      council maneuvering (the coup) and leveraging private business interests (Hix/Snedeker)
      to control public office appointments (Judge Snedeker).

      *   It moves beyond general accusation into documented political strategy involving
      "back biting," insubordination by employees encouraged by Mr. Burrell, and the
      immediate appointment of a Judge with direct financial ties to local controversial
      businesses.


      **KEY ENTITIES:**

      *   The Ripp Report / Ripp

      *   Mayor Kant / Tim Kant

      *   Kevin Boone (Councilman/Developer)

      *   Jack Burrell (Council Member/Presidential candidate)

      *   Karin Wilson (Mayor)

      *   Ray Hix (Organizer of Gayfer Village Partners, Llc; former Airport Authority
      Board Member)

      *   Judge Snedeker (Municipal Judge)

      *   Fiddler (City Employee - fired 2017)

      *   Sullivan (City employee - hired/fired during coup period)

      *   Catalyst / Scott Boone Consulting

      *   Fairhope City Council'
