      *   Developers prioritize interests over citizens (e.g., Fly Creek Apartments).

      *   Mayor Kant uses the planning and zoning board to push personal agendas and
      favor "connected" individuals.


      THE DISCOVERY

      *   The Mayor is paid as both Utility Director and Mayor (double dipping).

      *   A political group involving Haygood, Stacy, Haygood, and Elliot used "good
      ole boy" tactics to advance Haygood to Mayor and Elliot to County Commission.

      *   John Lake has 25 years in public service without a scandal.

      *   Harry Still III is recommended for City Council due to his willingness to
      ensure transparency.


      THE PIVOT

