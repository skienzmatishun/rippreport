hooks:
  political-intimidation:
    brief: 'THE CONFLICT:

      *   Mayor Kant is suspected of rigging the last two elections in Fairhope.

      *   Mayor Kant has raised over $50,000 for a mayor’s election, with over 50%
      of donations coming from outside donors and unidentified PACs.

      *   Mayor Kant uses intimidation tactics, including hiring attorneys against
      critics and installing metal detectors at City Hall due to complaints (rants).


      THE DISCOVERY:

      *   Senator Pittman was the trustee of BP funds for Baldwin County.

      *   Senator Pittman personally received $636,000 of BP funds with Mayor Kant''s
      help.

      *   Pittman has maintained municipal contracts and lied about his activities.

      *   A development plan involving Fly Creek Apartments/connectivity is being
      promoted by Kant and developers to redefine neighborhoods near the Publix.


      THE PIVOT:

      *   Article 2 provides specific financial evidence ($636,000 in BP funds) linking
      Mayor Kant and Senator Pittman''s actions, which supports Article 1’s broader
      claims of corruption against Kant and Pittman.

      *   The discovery of the link between Kant, Pittman, and BP fraud serves as
      concrete proof that Kant''s alleged political dirty tricks extend into documented
      financial crime.


      KEY ENTITIES:

      *   Mayor Kant

      *   Jim Nix

      *   Sherry Sullivan

      *   Lee Turner

      *   Jay Robinson

      *   Mr. Pittman (Senator Pittman)

      *   Mike Hubbard

      *   BP fraud division

      *   Fly Creek Apartments

      *   City Council

      *   Planning Board'
