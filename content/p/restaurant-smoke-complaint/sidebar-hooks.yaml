      Patio) was the source of the smoke complaint.

      *   Neighbors appealed to the Mayor and City Council multiple times; both bodies
      ignored the issue.

      *   Councilman Burrell was contacted by the author/neighbors multiple times
      regarding the dispute with no resolution.


      THE DISCOVERY:

      *   The current Fairhope City Council is facing allegations of political obstruction
      against the Mayor’s office, reducing discretionary funds from $15k (previous
      administration) to $2500.

      *   Councilman Burrell (currently listed as Council President) is accused of
      leading a plan to "drive the Mayor out of office."

      *   Council members Boone and Brown have direct ties to current Single Tax development
      projects, necessitating recusals due to conflict of interest.


      THE PIVOT:

      *   The historical failure of the City Council (2015) to enforce code against
      Tamara''s restaurant demonstrates a pattern of institutional neglect regarding
      regulatory compliance.

      *   Today’s findings show that this same governing body is actively engaging
      in organized political obstruction and financial mismanagement concerning city
      resources, indicating persistent governmental dysfunction rather than isolated
      incidents.


      KEY ENTITIES:

      *   Councilman Burrell (Former Council President/Current focus of criticism)

      *   Councilman Boone (Current council member with development ties)

      *   Councilman Brown (Current council member whose business partner is involved
      in Single Tax project)

      *   Tamara (Restaurant owner from the 2015 smoke dispute)

      *   Fairhope City Council

      *   Nichols Street

      *   Triangle/Fruit and Nut (Development area tied to current political conflict)'
