      corruption, and political manipulation, proving that both Dorsey and Elliott
      are aligned with this corrupt structure ("Catalyst was born").

      *   The evidence shows that Elliott''s appointment to the Commission was convenient
      orchestration, directly linking his career path to the Catalyst movement.


