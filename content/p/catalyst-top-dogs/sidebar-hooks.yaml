      Mayor seats in 14 municipalities.

      *   Catalyst attacked Mayor Karin Wilson using intimidation and bullying, aided
      by Fairhope City Council for County Control.


      THE DISCOVERY:

      *   Chris Elliott is running for the State Senate seat vacated by Sen. Tripp
      Pittman.

      *   Tripp Pittman took $750,000 of BP money and maintained municipal contracts
      with Fairhope during his tenure.

      *   Chris Elliott has a history of taking credit for passing taxes (e.g., 2012
      penny tax renewal).

      *   Elliott was involved in political maneuvering through partners like Elliott
      Haygood and Stacy.


      THE PIVOT:

