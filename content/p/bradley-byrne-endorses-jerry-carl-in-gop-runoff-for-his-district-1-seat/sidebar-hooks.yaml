    text: I personally warned Bradley Byrne that Baldwin County is drowning in a good ole boy swamp of secret deals and FBI probes. His endorsement of Jerry Carl proves he knows exactly who is pulling the strings behind the Fly Creek scandal and the BP fund fraud.
