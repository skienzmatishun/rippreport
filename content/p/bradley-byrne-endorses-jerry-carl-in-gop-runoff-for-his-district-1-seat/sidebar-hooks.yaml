      - Jerry Carl edges out Hightower overall primary by 1,226 votes to force runoff.
      - Runoff date set for March 31 per election data provided in Widget text.
      - Bradley Byrne issues public endorsement statement on behalf of Jerry Carl.

      2. THE DISCOVERY
      - Bill Hightower is explicitly identified as the “CATALYST candidate” running for Congress.
      - CATALYST organization predicted 10,000 votes in Baldwin County but received fewer.
      - CATALYST predicted vote count was off by more than 66% below expectation in Baldwin County.
      - CATALYST home base is identified as Fairhope, targeting total political power in Baldwin County.
      - CATALYST candidates alleged to use position for personal gain rather than constituents.

      3. THE PIVOT
      - Bradley Byrne’s endorsement specifically names “CATALYST” as the opponent instead of Jerry Carl or Bill Hightower.
      - Widget Article provides factual confirmation: Hightower IS the CATALYST candidate Byrne targets in his speech.
      - Vote shortfall of 66% for CATALYST validates Byrne’s warning to "vote out all CATALYST Players" by exposing organizational vulnerability.
      - Main article calls for votes "JULY 14th," whereas Widget Article specifies runoff is March 31.

