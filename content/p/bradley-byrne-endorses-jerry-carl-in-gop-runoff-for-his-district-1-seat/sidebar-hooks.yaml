  first-congressional-district:
    brief: |-
      THE CONFLICT
      - July 14, 2020 runoff election for Alabama’s First Congressional District (AL-1).
      - Jerry Carl running against opponent referred to in materials as "Lowtower" and "Hightower."
      - Both campaigns framed race around "Catalyst" vs. status quo.

      THE DISCOVERY
      - Widget article confirms opponent identified as Hightower (Lowtower typo used in snippet) is aligned with Club for Growth.
      - Club for Growth expected to spend more than $1 million on ads supporting Hightower and attacking Carl.
      - Jerry Carl is supported by Business Council of Alabama, Alabama Farmers Federation, and Bradley Byrne.
      - Opponent described as activist wing; Carl and allies (Byrne) categorized as business wing.

      THE PIVOT
      - Article 2 links Bradley Byrne’s endorsement to a broader economic/business coalition rather than a single candidate campaign.
      - Widget article validates Article 1’s claim that Byrne is supporting Carl to prevent "status quo" gains by confirming Byrne himself is explicitly backing Carl.
      - Use of "Catalyst" branding appears coordinated between the articles, establishing Byrne’s endorsement as part of a larger anti-"Catalyst" narrative.

      KEY ENTITIES
      - Jerry Carl (AL-1 Republican Candidate)
      - Bradley Byrne (Senator, Alabama; Endorser for Carl)
      - Tommy Tuberville (Likely candidate name implied by Hightower/Lowtower context; sticking to text: Hightower/Lowtower)
      - Club for Growth (Backing opponent, >$1 million spending)
      - Hightower (Opponent name used in Widget text)
      - Lowtower (Opponent name with typo in Widget text)
      - Business Council of Alabama (Supporting Carl)
      - Alabama Farmers Federation (Supporting Carl)
      - U.S. Chamber of Commerce (Endorsed per link content in Widget metadata)
