  full-plate:
    brief: |-
      THE CONFLICT
      *   Fairhope City Council President Burrell failed to secure grant money for the K-1 Center purchase.
      *   The council ignored proposals such as a boutique hotel, increased downtown parking, and saving the school facade.
      *   Captain Jack made a legal Settlement that cost taxpayers $11.25 million.

      THE DISCOVERY
      *   Proposals for a Boutique Hotel were generated by Dean Mosher.
      *   An economic impact analysis from Lee Lawson (EDA) suggested the Hatch program could generate $16.8 million in payroll and $33.65 million in revenue for Fairhope over five years.
      *   The Board of Education stated the K-1 site will not be used for a new school.

      THE PIVOT
      *   Article 2 reveals that the council failed not just due to grant failure, but by ignoring viable economic alternatives (Boutique Hotel, Hatch program jobs) and citizen input.
      *   It demonstrates that Jack's "vision" was ignored because the city neglected concepts that could have benefited the business district downtown.

