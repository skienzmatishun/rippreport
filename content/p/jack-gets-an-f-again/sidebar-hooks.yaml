      THE DISCOVERY:
      *   A public meeting notice dated August 31, 2018, called for a Special Called City Council meeting on September 4, 2018.
      *   The purpose of this meeting was to authorize the Council President to execute a Real Estate Purchase Agreement for properties owned by the Baldwin County Board of Education (K-1 Center).
      *   This authorization notice occurred before public input and feasibility studies were conducted.

      THE PIVOT:
      *   Article 2 proves that the K-1 center real estate purchase was initiated via an unpublicized, rushed resolution authorized directly to the Council President, directly contradicting Article 1's assertion that decisions should include public participation.
      *   The notice demonstrates the exact procedural failure (executing a real estate agreement without public participation) that led to the criticized outcome described in Article 1.

