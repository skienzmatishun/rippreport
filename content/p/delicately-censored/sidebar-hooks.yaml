  JUDGE-VS-SHERIFF:
    brief: 'THE CONFLICT:

      * In Baldwin County, Alabama, Sheriff Huey “Hoss” Mack illegally seized a Camaro
      belonging to the father of a Bay Minette attorney.

      * Baldwin County Judge Clark Stankoski ruled the seizure illegal and ordered
      the return of the vehicle.

      * Sheriff Mack was granted 43 days to comply with this ruling by Judge Stankoski.

      * Meanwhile, Mobile PD killed a 16-year-old during a no-knock pre-dawn raid
      related to marijuana sales.

      * Following the killing, Mayor Stinson banned no-knock raids; warrants for such
      raids are now scrutinized.

      * Separately, AG Steve Marshall and Ethic Director Tom Albritton settled the
      Mabel Amos Memorial Scholarship Trust lawsuit with Regions Bank to avoid damaging
      discovery.


      THE DISCOVERY:

      * Baldwin County District Attorney Robert Wilters and Sheriff Hoss Mack have
      formally asked Judge Stankoski to reverse his ruling requiring the Camaro’s
      return.

      * DA Wilters and Sheriff Mack share a 30-plus year, “joined at the hip” relationship.

      * Historical corruption established by Senator Trip Pittman: Pittman sponsored
      Senate Bill 312 (10 years ago) to create specific Sheriff qualifications for
      Baldwin County, eliminating Mack’s political competition and securing his terms.

      * Pittman previously awarded himself $750,000 in B/P money, three years prior
      to Senate Bill 312.

      * Sheriff’s Office Major Crimes Division investigates its own officers; no external
      accountability exists for incidents like Deputy Matt Hunady shooting an unarmed
      motorist on I-10.

      * In 2021 (Lagniappe v. Mack), the court ruled law enforcement records are not
      public under Majority opinion by Associate Justice Greg Shaw; Chief Justice
      Tom Parker dissented.


      THE PIVOT:

      * Article 1 flags the Camaro case as a notable legal reversal by Judge Stankoski
      where power was abused.

      * Article 2 confirms the ruling is a target for pressure due to Mack’s entrenched
      political control (BCSO Major Crimes exemption, Pittman’s legislative influence).

      * Article 2 exposes the underlying mechanism (Pittman/BCSO immunity rules) proving
      why Judge Stankoski’s decision threatens Sheriff Mack, linking the Camaro incident
      to systemic corruption rather than isolated error.


      KEY ENTITIES:

      * Huey “Hoss” Mack (Sheriff, Baldwin County)

      * Clark Stankoski (Baldwin County Judge)

      * Robert Wilters (District Attorney, Baldwin County)

      * Trip Pittman (Former State Senator)

      * Deputy Matt Hunady (BCSO Officer involved in 2021 shooting)

      * Steve Marshall (Attorney General of Alabama)

      * Tom Albritton (Ethics Director, Alabama)

      * Greg Shaw (Alabama Associate Justice - Majority opinion Lagniappe v. Mack)'
