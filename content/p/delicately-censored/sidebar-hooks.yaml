      - Widget Article reveals federal lawsuit confirms Mack’s unit (BCMCU) is under
      formal legal attack over French and Victor deaths.

      - The federal suit validates the Ripp Report''s previous claims that Mack’s
      office dismissed complaints and withheld evidence.

      - Confirms Mack is fleeing pressure in Baldwin County, seeking replacement (Anthony
