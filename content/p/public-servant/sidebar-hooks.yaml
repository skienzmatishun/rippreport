    text: Bill Hightower and his CATALYST handlers thought they could buy Baldwin County with big promises and special interest cash. This data proves the Fairhope-based machine is falling apart after their vote predictions fell a pathetic 66 percent short.
  first-congressional-district:
    brief: |-
      THE CONFLICT
      - Doug Snow posts to Baldwin County Citizens for Accountability group supporting Jerry Carl against Bill Hightower in the AL-1 race.
      - Snow highlights a statement from Bill Hightower regarding Jerry Carl’s negative attack ads.
      - Hightower claims they are friends but accuses Carl of using "distortions" and negative TV ads due to desperation.
      - Hightower’s statement explicitly claims Jerry Carl’s campaign is over half-million dollars in debt, with over $200,000 owed to a local bank.
      - Snow interprets Hightower’s admission of Carl’s debt as proof Hightower is using "out of state special interest money" (Catalyst) versus Carl borrowing from a bank.

      THE DISCOVERY
      - The Widget article identifies the funding behind Hightower’s claim of being "more conservative" and backed by national groups.
      - Washington-based Club for Growth is backing Hightower and expected to spend more than $1 million on ads.
      - Carl is identified as backed by Business Council of Alabama, Alabama Farmers Federation, and U.S. Chamber (via endorsement link).
      - Article labels Hightower as "Catalyst" representing the status quo and special interest politics.

      THE PIVOT
      - Article 2 serves as the "smoking gun" by validating Snow's claim that Hightower is funded by special interest money, while Carl must rely on loans and local backing.
      - Confirms Snow's specific allegation that Hightower's war chest comes from "out of state special interest groups" (Club for Growth/Washington-based).
      - The financial data in Article 2 proves the disparity Snow describes: Hightower has corporate/outsider funding; Carl is constrained by his own "bank debt."

      KEY ENTITIES
      - Jerry Carl
      - Bill Hightower
      - Doug Snow
      - Baldwin County Citizens for Accountability
      - Club for Growth
      - U.S. Chamber of Commerce
      - Business Council of Alabama
      - Alabama Farmers Federation
