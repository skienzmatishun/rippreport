      THE CONFLICT:
      - 2020 Alabama First Congressional District Special Runoff Election.
      - Candidates: Jerry Carl vs. Bill Hightower.
      - Doug Snow posts statement by Bill Hightower in Facebook group [Baldwin County Citizens for Accountability].
      - Hightower accuses Jerry Carl of using "negative attack ads."
      - Hightower admits in statement: “His campaign is over a half-million dollars in debt, over $200,000 of which is owed to a local bank.”
      - Hightower claims Jerry Carl borrowed money for campaign instead of soliciting special interest cash.

      THE DISCOVERY:
      - Article 2 confirms election results for March 31 runoff date.
      - Jerry Carl won the First Congressional District overall by exactly 1,226 votes.
      - Bill Hightower (CATALYST candidate) won Baldwin County specifically by 3,126 votes.
      - CATALYST predicted support of 10,000 votes in Baldwin County.
      - Actual vote count fell short by more than 66%.

      THE PIVOT:
      - Article 2 proves Hightower’s special interest funding claims were overstated by verifying Carl won against him (despite Hightower's "warchest").
      - Article 2 exposes CATALYST’s actual voting reach in Baldwin County (66% short of prediction), validating Article 1's claim that the organization is disintegrating and over-promising.
      - Article 2 provides hard data confirming the political connection between Hightower, CATALYST (Fairhope home), and the runoff race.

      KEY ENTITIES:
      - Jerry Carl
      - Bill Hightower (R-Mobile)
      - CATALYST (Fairhope-based organization)
      - Baldwin County Citizens for Accountability
      - Yellowhammer News
      - Backwoods Media LLC
