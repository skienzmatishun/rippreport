    text: 'For twenty years, the Baldwin County Sheriff’s Office used their own internal units to wash away every sin and mistake. We finally have the smoking gun: Hoss Mack put his own signature on the evidence that Robert Wilters buried to keep Murray Lawrence in a cage.'
