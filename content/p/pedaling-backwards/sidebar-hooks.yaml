hooks:
  honey-bees:
    brief: 'THE CONFLICT

      *   Fairhope City Council was trying to secure re-election for 2020.

      *   The council tried to promote a bike trail on a $11.25 million property,
      falsely claiming it was for a park.

      *   Council President Burrell and Councilman Boone were credited with misleading
      voters regarding the Triangle settlement.

      *   The council attempted to obstruct the Mayor using the city attorney.

      *   Fairhope paid $8.25 million plus $3 million in attorney fees as a SETTLEMENT
      for the property.


      THE DISCOVERY

      *   Council members Burrell, Boone, and Brown are acting for personal gain ("for
      the honey").

      *   The council was found guilty in Federal Court for violating the Constitution
      (right of free speech).

      *   The council passed a resolution to purchase $2.6 million of property on
      Hwy. 13 despite a questionable appraisal and without public comment.


      THE PIVOT

      *   Article 2 reveals the specific motivations (personal gain) behind Article
      1’s actions.

      *   Article 2 confirms that Burrell and Boone supported the lawsuit resulting
      in them losing, directly linking their actions to the illegal property transactions
      described in Article 1.

      *   Article 2 proves the council''s constitutional violation (free speech) stemming
      from their attempt to manipulate the Triangle and Hwy 13 properties outlined
      in Article 1.


      KEY ENTITIES

      *   Fairhope City Council

      *   Burrell (Council President)

      *   Boone (Councilman)

      *   Brown (Council Member)

      *   Mayor of Fairhope

      *   City Attorney

      *   Triangle Property ($11.25 million)

      *   Conservation Easement (102 acres, $20 million)

      *   Hwy. 13 property

      *   Federal Court'
