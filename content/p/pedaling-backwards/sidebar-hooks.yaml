      the Triangle settlement.

      *   The council and city attorney worked together to obstruct the Mayor.


      THE DISCOVERY:

      *   Council President Burrell claimed credit for plans designed to "drive the
      Mayor out of office."

      *   Council members Boone and Brown have direct ties to the Single Tax plan.

      *   Boone has ties to the Single Tax project, and Brown''s business partner
      is pushing the project.

      *   The proposed 12 homes associated with the Single Tax involve potential sewage
      backup issues from grinder pumps in the Fruit and Nut section.


      THE PIVOT:

