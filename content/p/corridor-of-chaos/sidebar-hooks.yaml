      planned unit development (76 acres) on Fairhope Avenue and Hwy 181, Fairhope,
      Alabama.

      *   Project Scope: Proposed units include 232 multi-family apartment units (R-5),
      77 single-family residential lots (R-3), and 16 commercial lots (B-2).

      *   Developer: Tom Mitchell.

      *   Ownership: Gayfer Village Partners, Llc., is comprised of Municipal Judge
      Haymes Snedeker (sole member) and Ray Hix (organizer).


      THE DISCOVERY:

      *   The Gulf Shores City Council was hearing an appeal against the Planning
      Commission''s decision to approve the Regency Place Apartments Site Plan Application
      on October 29, 2018.

      *   Opponents argued the Planning Commission''s decision was legally flawed
      because "City Staff" failed to consider the mandatory "Land Use Plan" criteria
      in evaluating the Site Plan Application.

      *   The failure to consider the Land Use Plan violated Zoning Ordinance Article
      1 General Provision 1-3 and rendered the plan inconsistent with the Comprehensive
      Plan/Land Use Plan.


      THE PIVOT:

      *   Article 2 reveals that the approval process for a similar development (Regency
      Place Apartments) was procedurally invalid due to the Planning Commission overlooking
      the Land Use Plan, which is the "smoking gun" proving the regulatory failure
      inherent in the type of project described in Article 1.


