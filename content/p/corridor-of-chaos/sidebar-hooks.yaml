hooks:
  I-SEE-YOU:
    brief: 'THE CONFLICT:

      *   Gayfer Village Partners, LLC is developing a three-part planned unit development
      on 76 acres near Fairhope Avenue and Hwy 181.

      *   The developer is Tom Mitchell.

      *   Municipal Judge Haymes Snedeker is the sole member of Gayfer Village Partners
      and the owner.


      THE DISCOVERY:

      *   Municipal Judge Haymes Snedeker was appointed by the City Council, creating
      a conflict of interest as he owns the development that requires his projects
      to be approved.

      *   The City Council approved procurement for Intelligence-Led Policing Sensor
      Kits from ProTecVideo, LLC without public notice or discussion.

      *   Infrastructure needs related to the development are being paid for by taxpayers.


      THE PIVOT:

      *   Article 2 reveals that Judge Snedeker''s role as an appointed judge and
      developer creates a conflict of interest regarding project approval (the "Conflict
      of Interest").

      *   Article 2 provides evidence showing the Council rubber-stamped specific
      expenditures (Clock Plaza award, sensor kit procurement) without public participation,
      which validates the systemic failure criticized in Article 1.


      KEY ENTITIES:

      *   Haymes Snedeker (Municipal Judge)

      *   Gayfer Village Partners, LLC

      *   Ray Hix

      *   Tom Mitchell (Developer)

      *   Fairhope City Council

      *   ProTecVideo, LLC

      *   RH Deas Building Co., LLC'
    generated_at: '2026-07-10T19:19:08.069529Z'
    text: Municipal Judge Haymes Snedeker wants his massive 76-acre project approved
      by the same Council that gave him his job. This investigation reveals how the
      Council rubber-stamps taxpayer-funded infrastructure and shady tech deals for
      their hand-picked judge while the public sits in the dark.
  eagles-eye-catalyst-kant-corte:
    brief: 'THE CONFLICT

      *   Gayfer Village Partners submitted an application for a three-part planned
      unit development on 76 acres near Fairhope Avenue and Hwy 181.

      *   The project includes 232 multi-family apartment units, 77 single-family
      residential lots, and 16 commercial lots.

      *   Developers Tom Mitchell and Ray Hix were involved in the project structure.


      THE DISCOVERY

      *   Boone and Burrell facilitated a deal during the last Fairhope City Council
      meeting concerning the Kant-Corte Apartments.

      *   The council approved the developer''s "Gift" by failing to legally defend
      citizens and succumbing to developer threats.

      *   Tim Kant did not attend the last meeting, leaving Boone and Burrell responsible
      for the approval.


      THE PIVOT

      *   Article 2 reveals that the development described in Article 1 was illegally
      or corruptly approved by political influence (Boone and Burrell''s "Gift").
      This proves the development is tied to government corruption rather than standard
      zoning procedure.


      KEY ENTITIES

      *   Tom Mitchell (Developer)

      *   Municipal Judge Haymes Snedeker

      *   Ray Hix

      *   Kant-Corte Apartments

      *   Boone

      *   Burrell

      *   Tim Kant

      *   Angelo Corte

      *   Mayor Wilson'
    generated_at: '2026-07-10T19:19:08.069545Z'
    text: Tom Mitchell and Ray Hix are pushing a massive development through a system
      rigged by political favors. Council members Boone and Burrell handed out a gift
      to these developers, proving that backroom deals drive this project rather than
      standard zoning laws or public interest.
  catalyst-does-fairhope:
    brief: 'THE CONFLICT

      *   Gayfer Village Partners, Llc (owned by Municipal Judge Haymes Snedeker and
      Ray Hix) submitted a planned unit development application for 76 acres near
      Fairhope Avenue and Hwy 181.

      *   The project includes Unit 1 (16 commercial lots), Unit 2 (232 multi-family
      units R-5), and Unit 3 (77 single family residential lots R-3).

      *   The property was previously owned by the Klump family, who operated an unpaved
      airfield.


      THE DISCOVERY

      *   Catalyst supported the developer and Mayor Tim Kant, rather than the community.

      *   Mayor Kant bent over for the developer''s requests.

      *   Taxpayers paid for infrastructure that benefited the developer: a Fire Station
      on Parker Road (constructed on Corte property), a sewer lift station located
      by Kant authorization, and accepting a "Gift" of land/wetlands from Angelo Corte
      to the City of Fairhope.

      *   Councilmen Burrell and Boone voted to accept the land gift, making taxpayers
      responsible for the developer’s drainage infrastructure.


      THE PIVOT

      *   Article 2 proves that Catalyst''s support was aligned with political corruption
      and developer interests (Kant/Corte), demonstrating that the development benefited
      specific individuals and entities through corrupt city approvals and infrastructure
      deals detailed in Article 1''s context.


      KEY ENTITIES

      *   Tom Mitchell (Developer)

      *   Municipal Judge Haymes Snedeker

      *   Ray Hix

      *   Hix Snedeker Companies

      *   Tim Kant (Former Mayor)

      *   Angelo Corte (Developer/Giver of Land)

      *   Burrell and Boone (Councilmen)

      *   Fly Creek Apartments

      *   Fairhope City Council'
    generated_at: '2026-07-10T19:19:08.069551Z'
    text: Former Mayor Tim Kant and Councilmen Burrell and Boone used your tax dollars
      to build infrastructure that only serves private developers. This report exposes
      how the Catalyst group turned city hall into a personal ATM for Judge Haymes
      Snedeker and developer Angelo Corte.
  fried-chicken-and-watermelon:
    brief: 'THE CONFLICT:

      *   Gayfer Village Partners, led by Municipal Judge Haymes Snedeker and organizer
      Ray Hix, is seeking approval for a three-part planned unit development on 76
      acres of land near Fairhope Avenue and Hwy 181.

      *   The project includes 232 multi-family apartment units (R-5), 77 single-family
      residential lots (R-3), and 16 commercial lots (B-2).

      *   This development is scheduled for a public hearing on October 28th.


      THE DISCOVERY:

      *   The City Council, specifically Council President Jack Burrell, Councilman
      Boone, and Councilman Brown, were responsible for a $2.65 million purchase of
      farmland near the airport.

      *   The city has failed to adhere to any Comprehensive Plan regarding infrastructure
      (electric substations, zoning), Airport funding ($350,000 per year), legal settlements
      ($11.25 million triangle property), and development costs ($5 million+ for K-1
      center).

      *   Developers build without regard for community needs, resulting in the neglect
      of areas like Young Street, the heart of the African American Community.


      THE PIVOT:

      *   Article 2 reveals that the city government''s decision-making structure
      (led by officials responsible for specific land purchases) prioritized development
      and special interests over community infrastructure and equitable development
      for the African American community, providing context for why projects like
      "Corridor of Chaos" are being approved.


      KEY ENTITIES:

      *   Gayfer Village Partners

      *   Tom Mitchell (Developer)

      *   Municipal Judge Haymes Snedeker

      *   Ray Hix

      *   Jack Burrell (Council President)

      *   Boone (Councilman)

      *   Brown (Councilman)

      *   Tim Can’t

      *   Fairhope Airport Authority

      *   African American Community'
    generated_at: '2026-07-10T19:19:08.069554Z'
    text: While Council President Jack Burrell burns millions on airport farmland,
      the heart of the African American community gets left in the dust. This discovery
      shows how the city’s decision-makers ignore their own master plan to fast-track
      the Corridor of Chaos for their developer buddies.
  fairhope-infrastructure:
    brief: 'THE CONFLICT:

      *   Gayfer Village Partners (owned by Municipal Judge Haymes Snedeker and organizer
      Ray Hix) submitted an application for a three-part planned unit development
      on 76 acres (16 commercial lots, 232 multi-family units, 77 single-family lots).

      *   Fairhope has faced a three-year water shortage due to uncompleted infrastructure
      projects approved in 2020.

      *   68 Ventures was involved in a legal dispute with the City of Fairhope regarding
      denied developments and accusations of secretly recording commissioners and
      staff.


      THE DISCOVERY:

      *   68 Ventures purchased the land and an approved Planned Unit Development
      (PUD) from Hix/Snedeker.

      *   68 Ventures is proposing a new project called "Park City" near Fairhope
      Avenue and Highway 181, involving approximately 700 dwelling units (94 townhouse
      lots, 62 cottage lots, 272 multifamily rentals).

      *   U.S. Senator Katie Britt purchased $33,000 stock in 68V 181-Fairhope Avenue
      2023, LLC.


      THE PIVOT:

      *   Article 2 reveals that the entity (68 Ventures) which was fighting the city
      over development denials has now acquired the underlying assets (land and approved
      PUD) from the developer/judge partnership (Hix/Snedeker) mentioned in Article
      1.

      *   This demonstrates a direct transfer of control or leverage, connecting the
      past development proposal to the current corporate entity driving the new project.


      KEY ENTITIES:

      *   Tom Mitchell (Developer)

      *   Haymes Snedeker (Municipal Judge)

      *   Ray Hix (Organizer)

      *   68 Ventures

      *   Jonathan Gray (68 Ventures Public Relations representative/Baldwin County
      Schools representative)

      *   U.S. Senator Katie Britt

      *   Fairhope Avenue and Highway 181

      *   Gayfer Village Partners, Llc'
    generated_at: '2026-07-10T19:19:08.069559Z'
    text: Municipal Judge Haymes Snedeker and Ray Hix just flipped their project to
      68 Ventures, an outfit already suing the city. With Senator Katie Britt buying
      into the deal, this smoking gun proves how political power and corporate leverage
      are squeezing Fairhope’s dry water supply.
  people-power-wake-up-gulf-shores:
    brief: 'THE CONFLICT:

      *   Past Event: Gayfer Village Partners submitted an application for a three-part
      planned unit development (76 acres) on Fairhope Avenue and Hwy 181, Fairhope,
      Alabama.

      *   Project Scope: Proposed units include 232 multi-family apartment units (R-5),
      77 single-family residential lots (R-3), and 16 commercial lots (B-2).

      *   Developer: Tom Mitchell.

      *   Ownership: Gayfer Village Partners, Llc., is comprised of Municipal Judge
      Haymes Snedeker (sole member) and Ray Hix (organizer).


      THE DISCOVERY:

      *   The Gulf Shores City Council was hearing an appeal against the Planning
      Commission''s decision to approve the Regency Place Apartments Site Plan Application
      on October 29, 2018.

      *   Opponents argued the Planning Commission''s decision was legally flawed
      because "City Staff" failed to consider the mandatory "Land Use Plan" criteria
      in evaluating the Site Plan Application.

      *   The failure to consider the Land Use Plan violated Zoning Ordinance Article
      1 General Provision 1-3 and rendered the plan inconsistent with the Comprehensive
      Plan/Land Use Plan.


      THE PIVOT:

      *   Article 2 reveals that the approval process for a similar development (Regency
      Place Apartments) was procedurally invalid due to the Planning Commission overlooking
      the Land Use Plan, which is the "smoking gun" proving the regulatory failure
      inherent in the type of project described in Article 1.


      KEY ENTITIES:

      *   Tom Mitchell (Developer)

      *   Gayfer Village Partners, Llc.

      *   Municipal Judge Haymes Snedeker

      *   Ray Hix

      *   Regency Place Apartments

      *   Gulf Shores City Council

      *   Planning Commission

      *   Land Use Plan'
    generated_at: '2026-07-10T19:19:08.069562Z'
    text: Developers like Tom Mitchell and Judge Haymes Snedeker rely on city staff
      to ignore the rules so their projects can slide through. We found the evidence
      that Gulf Shores officials already blew the same process, proving these high-density
      plans are legally dead on arrival.
  elephant-in-a-volkswagen:
    brief: 'THE CONFLICT:

      *   Gayfer Village Partners, led by Municipal Judge Haymes Snedeker and partner
      Ray Hix, submitted an application for a three-part planned unit development
      on 76 acres near Fairhope Avenue and Hwy 181.

      *   The property was formerly owned by the Klump family, who operated an unpaved
      airfield named "Klump Pud."


      THE DISCOVERY:

      *   Fairhope City Council actions regarding land transfer (Ordinance 5) for
      the Tatumville Subdivision are suspect, involving a Single Tax Corporation as
      the developer.

      *   Mr. Lee Turner, President of Single Tax and Chair of Fairhope Planning and
      Zoning, is actively pushing this project and acting as the salesman.

      *   There is a direct conflict of interest because Mr. Turner holds multiple
      positions (President of Single Tax and Director of Single Tax) while simultaneously
      pushing a development that benefits his organization.


      THE PIVOT:

      *   Article 2 reveals that the proposed development in Article 1 is being aggressively
      pushed by political figures with conflicts of interest, specifically highlighting
      how key officials are leveraging land ordinances (Tatumville/Fly Creek issues)
      to benefit affiliated groups (Single Tax). This suggests the project approval
      process is not impartial.


      KEY ENTITIES:

      *   Gayfer Village Partners

      *   Tom Mitchell (Developer)

      *   Municipal Judge Haymes Snedeker

      *   Ray Hix

      *   Klump family

      *   Lee Turner (President of Single Tax, Chair of Fairhope Planning and Zoning)

      *   Cliff Pittman (Single Tax Board member)

      *   Councilman Robert Brown

      *   Airport Authority'
    generated_at: '2026-07-10T19:19:08.069565Z'
    text: Lee Turner wears two hats as the Single Tax President and the Planning Chair,
      using both to push through the Klump PUD. This report exposes the blatant conflict
