  I-SEE-YOU:
    brief: 'THE CONFLICT:

      *   Gayfer Village Partners, LLC is developing a three-part planned unit development
      on 76 acres near Fairhope Avenue and Hwy 181.

      *   The developer is Tom Mitchell.

      *   Municipal Judge Haymes Snedeker is the sole member of Gayfer Village Partners
      and the owner.


      THE DISCOVERY:

      *   Municipal Judge Haymes Snedeker was appointed by the City Council, creating
      a conflict of interest as he owns the development that requires his projects
      to be approved.

      *   The City Council approved procurement for Intelligence-Led Policing Sensor
      Kits from ProTecVideo, LLC without public notice or discussion.

      *   Infrastructure needs related to the development are being paid for by taxpayers.


      THE PIVOT:

      *   Article 2 reveals that Judge Snedeker''s role as an appointed judge and
      developer creates a conflict of interest regarding project approval (the "Conflict
      of Interest").

      *   Article 2 provides evidence showing the Council rubber-stamped specific
      expenditures (Clock Plaza award, sensor kit procurement) without public participation,
      which validates the systemic failure criticized in Article 1.


      KEY ENTITIES:

      *   Haymes Snedeker (Municipal Judge)

      *   Gayfer Village Partners, LLC

      *   Ray Hix

      *   Tom Mitchell (Developer)

      *   Fairhope City Council

      *   ProTecVideo, LLC

