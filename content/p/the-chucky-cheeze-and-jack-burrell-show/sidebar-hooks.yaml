  moore-of-the-chucky-cheeze-and-jack-burrell-show:
    brief: 'THE CONFLICT:

      *   Chucky Cheeze and Jack Burrell supported employees suing the city of Fairhope
      for $100,000.

      *   Councilmen Boone Burrell and Brown supported Sherry Sullivan and encouraged
      fired employees to file lawsuits against the city to advance an anti-Mayor campaign.

      *   Jack Burrell was hiding activities at the Fairhope Airport and trying to
      obstruct the Mayor.


      THE DISCOVERY:

      *   Jack Burrell and Sen Tripp Pittman are linked as "Bible buddies."

      *   Sen Tripp Pittman served on the Alabama Ethics Commission.

      *   Tripp Pittman stole $750,000 from BP.

      *   The Ripp Report offered $5000 to prove allegations against Sen Tripp Pittman
      regarding the BP scandal were false (no one responded).

      *   Burrell''s involvement in the Airport scandal was an area where the Ripp
      Report previously offered compensation for proof of false allegations.


      THE PIVOT:

      *   Article 2 proves that Burrell''s political obstruction and actions at the
      Fairhope Airport are tied to major political corruption figures (Pittman) involved
      in financial theft ($750,000 from BP).

      *   Article 2 shows that Chuckee and Jack are using smear campaigns regarding
      Pittman and the Mayor, leveraging known political ties (the "Moore factor").


      KEY ENTITIES:

      *   Jack Burrell

      *   Chucky Cheeze

      *   Sherry Sullivan

      *   Boone Burrell

      *   Brown

      *   Tripp Pittman

      *   BP scandal

      *   Alabama Unethical Commission

      *   Fairhope Airport'
