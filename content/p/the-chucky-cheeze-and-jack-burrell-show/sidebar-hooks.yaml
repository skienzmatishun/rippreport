      meetings) which serves as the mechanism for his obstruction referenced in Article
      1 regarding lawsuits and firings.

      *   Burrell’s power structure (as detailed in Article 2) is what allows him
      to obstruct accountability concerning the council''s actions on settlements
      and employee lawsuits discussed in Article 1.


