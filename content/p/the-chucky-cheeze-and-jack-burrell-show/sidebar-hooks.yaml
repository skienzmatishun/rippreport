      *   The group supported Pandora Heathcoat filing a lawsuit, waiting for Sullivan
      to be paid first.

      *   Jack Burrell is accused of hiding behind the Alabama Unethical Commission
      and obstructing the Mayor.


      THE DISCOVERY

      *   Jack Burrell called a special city council meeting scheduled for Friday,
      December 29th at 8:00 am.

      *   Burrell is using a hand-picked attorney to manage city affairs instead of
      providing a full-time city attorney.


      THE PIVOT

