      - Data attributed via source link to USA Today and CDC regarding virus spread
      and safety measures.

      - Alabama identified as one of three states with Covid cases up 50%.

      - Article asserts Masks and Social Distancing are proven effective methods.


      THE PIVOT

      - Widget data validates Handwerger’s claim that community negligence is causing
      a surge ("numbers spiking").

      - The 100,000 death toll quantifies the consequence of the "partying" and lack
      of safety measures Handwerger describes.

      - Alabama’s 50% increase connects the broader crisis to the specific region
