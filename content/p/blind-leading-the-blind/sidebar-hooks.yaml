      *   Councilman Brown and business partner Cliff Pitman are accused of poor ethical
      conduct while using elected position for personal gain.


      THE DISCOVERY

      *   An Ethics Complaint was officially filed on February 26, 2018, against Robert
      Brown by the State Of Alabama Ethics Commission regarding his use of the commission
      to justify actions.

      *   The complaint specifically detailed that Brown secured a contract with the
      Eastern Shore Art Center without obtaining necessary approval from the Ethics
      Commission.

      *   Jack Burrell is demanding accountability for city school funds ($350,000
      a year) but ignored accountability concerning airport funding ($500,000), where
      the Airport held the mortgage instead of the city.


      THE PIVOT

