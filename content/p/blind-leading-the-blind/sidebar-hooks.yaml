hooks:
  quid-quo-pro:
    brief: 'THE CONFLICT:

      *   Jester, Boone, and Burrell lacked community engagement when voting on full
      family insurance and the 2.6 million dollar recreation land (voting NO to the
      black community).

      *   Councilman Robert Brown and his business partner Cliff Pitman are accused
      of mocking Ethical Conduct and using their elected positions for personal gain.

      *   A complaint was delivered against Councilman Robert Brown to the Alabama
      Attorney General, White Collar Crime Division, Special Prosecutors on Monday,
      September 16, 2019.


      THE DISCOVERY:

      *   The Fairhope City Council voted 3 to 2 (Burrell Boone and Brown) to purchase
      2.6 million in recreation property.

      *   Councilman Burrell stated the appraisal was questionable or a plan for payment
      existed ("something for something").

      *   "Quid quo pro" and "CATALYST Council" are synonymous, indicating a system
      of favor-for-a-favor corruption.


      THE PIVOT:

      *   Article 2 provides specific evidence (the 3 to 2 vote on the $2.6 million
      property) that substantiates Article 1’s general claims regarding unethical
      conduct and misuse of elected office by proving the existence of a "Quid Quo
      Pro" arrangement within the Council.


