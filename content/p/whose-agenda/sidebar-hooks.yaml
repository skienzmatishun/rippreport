      split with the Fairhope Yacht Club.

      *   Council President Jack Burrell sought to "get out of the school business"
      via a request for a Special 3 Mill Ad Valorem School District Tax Election.

      *   The Council approved a Change Order (No. 2) for Library Envelope Repairs
      (Bid No. 005-18), extending the contract time, despite construction issues plaguing
      the library since its inception.


      THE DISCOVERY

      *   $32,510.97 was paid to Walcott, Adams, Verneuille Architects for exterior
      repairs and maintenance on the Fairhope Public Library.

      *   This payment occurred during the administration of former Mayor Tim Kant.

      *   City staffers could not find evidence of a contract or agreement between
      Mayor Kant, the city, and the architects, suggesting a "handshake deal."

      *   Council President Burrell acknowledged the library work seemed performed
      despite lack of paperwork regarding authorization.

      *   Former Council members Boone and Burrell ignored the handshake deal involving
      former Mayor Kant and the architects.


      THE PIVOT

      *   The Main Article lists resolutions authorizing actions (purchases, contracts)
      while omitting necessary public discussion or accountability (Executive Session
      discussions on real property).

      *   The Widget Article provides specific evidence—a documented payment for library
      repairs tied to a former administration (Kant) that lacked proper contractual
      evidence—proving that the Council and officials engaged in opaque deals, directly
      contradicting the implied transparency of the resolutions listed in the Main
