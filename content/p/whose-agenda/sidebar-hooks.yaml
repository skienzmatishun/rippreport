  jack-gets-an-f-again:
    brief: 'THE CONFLICT

      *   City Council agenda March 8th contained resolutions authorizing the purchase
      of properties owned by the Baldwin County Board of Education (K-1 Center, Fairhopers
      Community Park, James P. Nix Center).

      *   Resolution 10 authorized Mayor Karin Wilson or Council President Jack Burrell
      to execute documents to complete the acquisition of K-1 Center property.

      *   Resolution 11 authorized the Mayor to execute an MOU for dredging Main Channel
      of Fly Creek, involving a half million dollar contract split between the City
      and the Fairhope Yacht Club.

      *   Resolution 12 authorized filing for a Special 3 Mill Ad Valorem School District
      Tax Election.

      *   Resolution 27 authorized Change Order No. 2 to Bid No. 005-18 (Library Envelope
      Repairs 2019), extending contract time from 210 days to 222 days, awarded to
      MW Rogers Construction Co., LLC.


      THE DISCOVERY

      *   The City Council rushed a deal for grant money to purchase the K-1 center.

      *   Council President Jack Burrell ignored alternative options (lead/asbestos
      issues, renovation vs. new construction, boutique hotel proposal, parking spaces).

      *   The grant application was delayed. The purchase of the K-1 property remains
      set for the March 31 deadline regardless of grant failure or Council President
      Burrell''s performance.


      THE PIVOT

      *   Article 2 proves that the City Council ignored crucial considerations and
      alternatives (like renovation costs, boutique hotels) when handling the K-1
      Center purchase, despite having formal resolutions (Article 1) authorizing the
      acquisition.

      *   Article 2 frames the council''s actions as a failure ("Jack gets an F")
      to utilize options, directly challenging the authority exercised by Mayor Wilson
      and Council President Burrell in Article 1.


      KEY ENTITIES

      *   Jack Burrell (Council President)

      *   K-1 Center

      *   Fairhope City Council

      *   Karin Wilson (Mayor)

      *   Baldwin County Board of Education

      *   Fairhopers Community Park

      *   James P. Nix Center

      *   M&N of Alabama, LLC

      *   The Fairhope Yacht Club

      *   MW Rogers Construction Co., LLC

      *   Jennifer Fidler

      *   Councilman Boone'
