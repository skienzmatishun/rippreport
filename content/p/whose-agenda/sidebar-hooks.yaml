  fairhope-state-of-the-city:
    brief: 'THE CONFLICT

      *   Fairhope City Council agenda March 8th contained resolutions regarding property
      purchases and contracts.

      *   Resolution 10 sought authorization for Mayor Karin Wilson or Council President
      Jack Burrell to purchase properties owned by the Baldwin County Board of Education
      (K-1 Center, Fairhopers Community Park, James P. Nix Center).

      *   Resolution 11 authorized Mayor Karin Wilson to execute a half million dollar
      contract with M&N of Alabama, LLC for dredging the Main Channel of Fly Creek.

      *   Resolution 27 addressed library envelope repairs (Bid No. 005-18) and awarded
      the Change Order to MW Rogers Construction Co., LLC.

      *   Council President Jack Burrell wanted out of school business (Resolution
      12).


      THE DISCOVERY

      *   A piece of land rejected by the council was the first choice of the State
      Park Board, citizens, city staff, and the Mayor.

      *   The Council ordered an appraisal before citizens were informed (dated June
      28, 2019).

      *   The council sold the property without public input.

      *   The City paid $2.65 million in December for the farmland (K-1 center and
      Nix building), which was not allocated or budgeted for recreation land.

      *   An Ordinance in January 2020 declared certain real property (105 Farmable
      Acres) surplus and leased it for $9000.00 a year with four options.


      THE PIVOT

      *   Article 2 provides specific evidence of how city funds were used to acquire
      property (K-1 center/Nix building) that was initially rejected by the public,
      exposing potential misuse of funds referenced in Article 1''s discussions of
      property acquisition and budgetary constraints.


      KEY ENTITIES

      *   Mayor Karin Wilson

      *   Council President Jack Burrell

      *   Councilman Brown

