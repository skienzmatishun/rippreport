  newsletter:
    brief: 'THE CONFLICT:

      *   The Ripp Report previously filed legitimate complaints with the Alabama
      Ethics Commission and the Alabama Attorney General.

      *   These formal complaints were ignored ("fell on deaf ears").

      *   City Councils in Baldwin County protect elected officials.

      *   An organization named Catalyst protects and promotes local officials.


      THE DISCOVERY:

