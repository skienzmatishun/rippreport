  alabama-sec-of-state-the-only-one:
    brief: 'THE CONFLICT

      *   The Ripp Report previously filed complaints with the Alabama Ethics Commission
      and Alabama Attorney General, which were ignored.

      *   Complaints were filed with the Alabama Judiciary regarding Judges Michelle
      Thomason and Buddy Bracken, resulting in no action.

      *   Numerous complaints were filed with the Alabama Bar Association regarding
      attorneys, including Steven Johnson, with no resolution.

      *   Multiple complaints were filed with the Alabama Ethics Commission involving
      elected officials in Baldwin County, finding no probable cause for ethics violations.


      THE DISCOVERY

      *   The Alabama Secretary of State (John Merrill) received and acted on complaints
      from constituents regarding possible election tampering.

      *   John Merrill monitored the 2016 Fairhope election.

      *   The Ripp Report submitted complaints to the Secretary of State for two elections,
      which added credibility to other complaints filed in 2016.

      *   Karin Wilson won against an incumbent Mayor by approximately 600 votes;
      citizens believe monitoring affected this outcome.


      THE PIVOT

      *   Article 1 argues that exposure is the only effective way to challenge corruption
      because formal complaints fall on deaf ears.

      *   Article 2 provides a concrete example of successful intervention: the Secretary
      of State took an unprecedented action by monitoring an election, suggesting
      official channels can yield results where ethics complaints failed.


      KEY ENTITIES

      *   John Merrill (Sec. of State)

      *   Karin Wilson (Mayor/Winner)

      *   Michelle Thomason (Judge)

      *   Buddy Bracken (Judge)

      *   Steven Johnson (Attorney)

      *   Alabama Ethics Commission

      *   Alabama Judiciary

      *   Baldwin County

      *   Fairhope

      *   The Ripp Report'
