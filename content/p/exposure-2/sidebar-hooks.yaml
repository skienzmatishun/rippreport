hooks:
  no-guardrails:
    brief: 'THE CONFLICT

      *   Baldwin County City Councils ignore complaints regarding elected officials.

      *   The Ripp Report has filed complaints with the Alabama Ethics Commission
      and Alabama Attorney General, but these complaints were ignored.

      *   Corruption in Alabama costs Baldwin County millions of tax dollars.


      THE DISCOVERY

      *   The gap in anti-corruption efforts is exposed by the removal of Public Corruption
      Prosecutor Matt Hart from the Attorney General’s Office (November 2018).

      *   Ethics rules were written by Mike Hubbard, a former convicted Speaker of
      the House, whose allies are working to keep him out of jail.

      *   Alabama currently has no effective guardrails against political corruption.


      THE PIVOT

      *   Article 2 proves that the failure of complaints (Article 1) is systemic
      because key officials and institutional safeguards (like the Attorney General’s
      office and Ethics Commission) have been dismantled or compromised by political
      actors, confirming the main article''s assertion that existing methods are worthless.


      KEY ENTITIES

      *   Alabama Ethics Commission

      *   Alabama Attorney General

      *   Baldwin County City Councils

      *   Catalyst organization

      *   Steve Marshall (newly elected Attorney General)

      *   Matt Hart (Public corruption prosecutor)

      *   Mike Hubbard (former convicted Speaker of the House)'
    generated_at: '2026-07-11T00:05:51.111736Z'
  catalyst-open-letter-to-baldwin-county-district-attorney:
    brief: 'THE CONFLICT

      *   Baldwin County City Councils ignore complaints against elected officials.

      *   The Ripp Report has attempted to file complaints with the Alabama Ethics
      Commission and Attorney General which were ineffective.


      THE DISCOVERY

      *   City Councilman Kevin Boone publicly submitted a complaint regarding Fairhope
      Mayor Wilson, published in the Courier and broadcast on WABF 1480 AM (WACO radio).

      *   The District Attorney, Robert Wilters, has a history with "Catalyst" and
      allegedly aided Catalyst through support for Lynn Perry for Probate Judge and
      discouraging Harry D’Olive from running for Probate Judge.


      THE PIVOT

      *   Article 2 identifies "Catalyst" as the mechanism behind the public complaints
      (like Boone''s) and subsequent media coverage, providing a specific political
      organization that Article 1 claims is protecting corrupt officials.

      *   Article 2 links the District Attorney to Catalyst, suggesting institutional
      complicity in obstructing justice for alleged corrupt elected officials in Baldwin
      County.


      KEY ENTITIES

      *   The Ripp Report

      *   Alabama Ethics Commission

      *   Baldwin County City Councils

      *   District Attorney Robert Wilters

      *   City Councilman Kevin Boone

      *   Fairhope Mayor Wilson

      *   Catalyst

      *   Lynn Perry

      *   Harry D’Olive

      *   John Avant

      *   Jack Burrell

      *   Robert Brown'
    generated_at: '2026-07-11T00:05:51.111750Z'
  letter-to-the-alabama-attorney-general:
    brief: 'THE CONFLICT

      *   The Ripp Report has attempted to file legitimate complaints with the Alabama
      Ethics Commission and the Alabama Attorney General, but these complaints were
      ignored or not investigated.

      *   Corruption in Baldwin County persists due to City Councils protecting each
      other and organizations like Catalyst.


      THE DISCOVERY

      *   The widget article provides specific documentation (Lagniappe article, Ethics
      Complaint, Writ of Mandamus) sent to the Alabama Attorney General regarding
      Director Tom Albritton.

      *   These documents allege that Director Albritton engaged in self-dealing and
      IRS code violations.

      *   Albritton is linked to the Mabel Amos Memorial Fund, which awarded $105,000
      in scholarships to his daughters.


      THE PIVOT

      *   Article 2 moves from general accusations of ignored complaints (Article
      1) to specific, documented evidence (the complaint materials) proving that the
      Ethics Commission failed to act on a case involving Director Albritton''s self-dealing
      and financial impropriety.


      KEY ENTITIES

      *   Alabama Attorney General Steve Marshall

      *   Tom Albritton (Director of Alabama Ethics)

      *   Baldwin County City Councils

      *   Catalyst

      *   The Ripp Report

      *   Mabel Amos Memorial Fund'
    generated_at: '2026-07-11T00:05:51.111756Z'
  GAME-ON-MAYOR-KANT-HUBBARD-GOES-DOWN-YOURE-NEXT:
    brief: 'THE CONFLICT

      *   Corruption exists in Baldwin County, Alabama.

      *   City Councils in Baldwin County ignore complaints against elected officials.

      *   An organization named Catalyst protects and promotes local political figures
      ("good ole boys").

      *   There is a history of lack of honest information from Fairhope city hall/mayor.


      THE DISCOVERY

      *   The Ripp Report was established as a consumer group focusing on political
      and judicial corruption.

      *   The effort was self-funded by the author to the tune of approximately $15,000
      over 10 years.

      *   The organization now accepts donations which fund social media advertising
      and other media sources.

      *   The author is acting as a private citizen with no political or business
      interest.

      *   Mayor Kant is identified as the worst public official in Baldwin County.


      THE PIVOT

      *   Article 2 proves that The Ripp Report exists, has been operating for ten
      years, and was self-funded to combat corruption, validating Article 1''s strategy
      of exposure.

      *   The historical context (lack of honest information from Fairhope city hall)
      provides the origin story for the current reporting effort focused on Mayor
      Kant and Catalyst.


      KEY ENTITIES

      *   The Ripp Report

      *   Baldwin County City Councils

      *   Alabama Ethics Commission

      *   Alabama Attorney General

      *   Catalyst

      *   Fairhope city hall/mayor

      *   Mayor Kant'
    generated_at: '2026-07-11T00:05:51.111761Z'
  alabama-corruption-insurance:
    brief: 'THE CONFLICT:

      *   The Ripp Report filed complaints with the Alabama Ethics Commission and
      Attorney General over the last 12 years.

      *   Officials in Baldwin County City Councils protect each other; Catalyst promotes
      officials.

      *   Specific allegations against Columbia Mayor and Chief of Police concerning
      conflict of interest, including Ben Freeman (municipal prosecutor/lawyer for
      Lori Mock''s wife) having documented loans with the mayor and mother-in-law.


      THE DISCOVERY:

      *   Alabama has "Alabama Corruption Insurance," which is free and available
      to all elected officials (Sheriff Dept., City Council, Judges, Mayors, Circuit
      and District Courts).

      *   The Alabama Ethics Commission aids and abets corruption by providing the
      mechanism of "protection from prosecution" via formal advisory opinions.

      *   If an official lies on a request for an ethics opinion, they remain immune
      from prosecution.


      THE PIVOT:

      *   Article 1 states that complaints fall on deaf ears because officials use
      the Alabama Corruption Insurance to avoid accountability.

      *   Article 2 details precisely how the Alabama Ethics Commission uses this
      insurance (the "get out of jail card") to maintain Alabama''s status as a corrupt
      state, confirming Article 1’s assertion that mechanisms exist specifically designed
      to block prosecution based on citizen complaints.


      KEY ENTITIES:

      *   The Ripp Report

      *   Alabama Ethics Commission

      *   Alabama Attorney General

      *   Baldwin County City Councils

      *   Catalyst organization

      *   Columbia Mayor

      *   Chief of Police (Columbia)

      *   Ben Freeman (municipal prosecutor/lawyer)

      *   Lori Mock (Jim Mock''s wife)

      *   Alabama Corruption Insurance'
    generated_at: '2026-07-11T00:05:51.111766Z'
  perfect-puzzle:
    brief: 'THE CONFLICT

      *   Citizens filed legitimate complaints with the Alabama Ethics Commission
      and the Alabama Attorney General, but these complaints were ignored.

      *   Baldwin County City Councils protect each other, allowing elected officials
      to evade accountability.

      *   The Ripp Report seeks to use exposure (paper trails) to challenge corruption
      because traditional methods failed.


      THE DISCOVERY

      *   Millions in wasted payments to "retired" administrators were discovered.

      *   An attempt was made to use RSA payments to settle a harassment suit.

      *   Members of the UA Board of Trustees received outlandish perks, including
      St. John’s office spending $4.3 million on a party house.

      *   The Director of the Alabama Ethics Commission has children''s college tuition
      paid from a charitable trust upon which he serves on the board.


      THE PIVOT

      *   Article 2 provides specific evidence (wasted payments, personal financial
      conflicts) that proves the system referenced in Article 1—the Ethics Commission
