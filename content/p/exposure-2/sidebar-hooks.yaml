      *   Low voter participation (30% vote, 20% straight ticket) leads to high levels
      of corruption in Baldwin County.

      *   Citizens must get involved and use the Ripp Report''s platform for facts
      on candidates.


      THE PIVOT:

      *   Article 1 details the failure of formal complaint channels.

