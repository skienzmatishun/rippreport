      purchase of $2.6 million in recreation property based on questionable appraisals
      or payment plans.

      *   There is a public dispute over the transfer/disposal of 106 acres of City
      of Fairhope Property to Weeks Bay, allegedly without actual title or lease.


      THE DISCOVERY

      *   The transaction described in Article 1 is explicitly linked to "Quid Quo
      Pro" and "Something for Something" arrangements (CATALYST Council).

      *   Councilman Robert Brown is pushing past the Eastern Shore Art Center contract
      without providing necessary documentation despite claiming permission from the
      Ethics Commission.

      *   Councilman Robert Brown is connected to Cliff Pittman, who is identified
      as a business partner and inside contact for FSTC.


      THE PIVOT

      *   Article 2 establishes that the property purchase (Article 1) is part of
