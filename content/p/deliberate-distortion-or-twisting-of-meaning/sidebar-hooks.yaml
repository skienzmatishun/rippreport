      *   The Council passed a resolution in September to purchase property despite
      a questionable appraisal for recreation land on Hwy. 13.


      THE DISCOVERY:

      *   The Fairhope Council was found guilty in Federal Court for violating the
      Constitution of the United States (right of free speech).

      *   Council members Burrell and Boone claim the property purchase decision was
      discussed internally between council members and the Recreation Board, ignoring
      public input.

      *   The Council plans to approve closing costs of $9,000 thousand dollars for
      a $2.6 million property purchase on Hwy. 13.


      THE PIVOT:

      *   Article 2 provides the history of failed legal battles (lost lawsuit) and
      questionable planning (questionable appraisal/internal discussion) that contextualizes
      the current attempt by the Council to "dispose" of city property in Article
