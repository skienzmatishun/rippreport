    brief: 'THE CONFLICT:

      *   Fairhope City Council attempted to dispose of 106 acres of City of Fairhope
      Property via a Conservation Easement transfer to Weeks Bay.

      *   This disposal was framed as transferring management and control for perpetuity.


      THE DISCOVERY:

