  three-strikes:
    brief: 'THE CONFLICT

      *   Fairhope City Council considered disposing of 106 acres of City of Fairhope
      Property.

      *   The proposed action was signing over management and control for perpetuity
      to Weeks Bay via a Conservation Easement Agreement.

      *   A specific meeting occurred on May 29th.

      *   Council members were perceived as overriding citizen opposition and acting
      like a dictatorship.


      THE DISCOVERY

      *   Resolution 28 authorized the execution of a Conservation Easement Agreement
      between the City of Fairhope and Weeks Bay Foundation, Inc.

      *   The total cost for the conservation easement, due diligence, and closing
      fees was $39,025.00.

      *   Council President Burrell could not recall who proposed giving up 109 acres
      of property worth $18 million plus.

      *   Weeks Bay Director stated that Weeks Bay did not seek out Fairhope for the
      Conservation Easement.


      THE PIVOT

      *   Article 2 provides the specific resolution and financial details ($39,025.00)
      confirming that the City Council actively authorized the disposal of property
      (as alleged in Article 1).

      *   The evidence suggests the transaction was pushed by political interests
      (Diana Brewer/Weeks Bay agenda) rather than being a genuine decision by the
      City or Weeks Bay.


      KEY ENTITIES

      *   Fairhope City Council

      *   Weeks Bay Foundation, Inc.

