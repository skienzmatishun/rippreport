  going-down:
    brief: 'THE CONFLICT

      *   Citizens are fighting local municipal governments over public participation
      and development control in Baldwin County, Orange Beach, Gulf Shores, and Fairhope.

      *   In Fairhope, the "Catalyst" Council President mocked citizens and the Mayor.

      *   The Catalyst Council prevented citizens from speaking at a public forum.

      *   Property values are negatively impacted by proposed high-density apartment
      complexes (e.g., Enclave property value expected to decline by over $3,000,000).


      THE DISCOVERY

      *   Baldwin County lacks sewer regulations and experiences regular sewer spills
      into the Bay.

      *   Developers and a "Catalyst Council" are pushing for unbridled development
      despite infrastructure deficiencies.

      *   Over 566 apartments are under construction or proposed in Fairhope alone.

      *   Development is projected to cause traffic nightmares at intersections (e.g.,
      Corridor of Chaos at 181/Fairhope at Wal-Mart).

      *   Citizens will be taxed to correct issues created by developers who make
      millions.


      THE PIVOT

      *   Article 2 reveals that the push for development (unbridled growth) is directly
