hooks:
  tax-tax-and-re-tax:
    brief: |-
      1. THE CONFLICT:
      - August 2022, Jeanne Carney for Baldwin County Citizens For Government Accountability (CGA) released financial data showing $14,528,106.21 in Sales/Use Tax paid to Baldwin County Board of Education (BCBOE) for August alone.
      - First 11 months of Fiscal Year 2022 (Oct 2021–Sept 2022), total local revenue paid to BCBOE and Gulf Shores Board of Education (GSBOE) equals $140,269,185.76; a $12M increase from 2021.
      - Carney claims these figures prove no new property tax is needed for education, countering claims from "Chris Elliott" (referred to as "The Tax Man") who advocates for more funding.
      - CGA argues high revenue justifies hiring supervisors (HR/Special Services) at $91,000-$103,000 while teachers allegedly lack funding.
      - Article 2 claims Baldwin County School System is "negatively impacted" due to lack of long-term planning and developers paying little/no impact fees, shifting cost to taxpayers.
      - Article 2 connects local school funding issues to State-level politics involving Governor "Ivy" (Robert E. Ivey).

      2. THE DISCOVERY:
      - Article 2 confirms Governor Robert E. "Ivy" is pushing for Alabama to appoint State School Board Members instead of electing them via a specific bill.
      - Article 2 reveals Alabama politicians are supporting a "lottery" bill intended to reimburse the State General Fund from as far back as 2013.
      - Article 2 confirms local political friction in Fairhope where City Council favored a special school tax over the Mayor’s proposal for equitable impact fees.
      - Article 2 validates the CGA (Art 1) skepticism by labeling current administration as "micromanaging Christian conservatives" willing to tax constituents even when funds are available.

      3. THE PIVOT:
      - Article 1 proves the existence of significant financial leverage ($140M+ in local revenue) available to the Baldwin County School Boards.
      - Article 2 serves as the "smoking gun" by explaining why opponents are fighting for this leverage: to justify State Board appointments (Governor Ivy) and alternative funding (lottery/reimbursements).
      - Article 2 exposes that the "excess" funding mentioned in Article 1 is a political battleground between developers avoiding impact fees, tax collectors like Elliott asking for more, and politicians using the revenue as justification for governance changes.

      4. KEY ENTITIES:
      - Jeanne Carney (Baldwin County Citizens For Government Accountability)
      - Chris Elliott ("The Tax Man")
      - Baldwin County Board of Education (BCBOE)
      - Gulf Shores Board of Education (GSBOE)
      - Baldwin County Commission
      - Governor Robert E. "Ivy"
      - Fairhope City Council
