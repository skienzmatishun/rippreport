      - Article 1 claim: Chris Elliott (Junior Senator/"Tax Man") is publicly asking for more taxes despite these numbers.
      - Article 2 (Widget) claims schools are "starving" and a Spanish Fort/Fairhope special tax district referendum is in development to add $3M, despite the high revenue figures cited in Article 1.
      - Article 2 claims Elliott made a pre-election pledge of "no more taxes" but the Rebuild Alabama Act (gas tax hike) passed anyway via a "Goat Hill deal."

      THE DISCOVERY:
      - Article 2 embeds Lagniappe Mobile (dated May 15, 2019 vs cited updates in text) reporting Spanish Fort Town Council sent a resolution to the School Board for a special election (referendum).
      - Article 2 connects Chris Elliott to traffic congestion, the I-10 Mobile River Bridge project (I-10 bridge), and the Rebuild Alabama Act 10-cent fuel tax hike.
      - Article 2 identifies a contradiction in Elliott's political positioning: claiming "no more taxes" while overseeing tax hikes via the Bridge project and School Tax referendums.

      THE PIVOT:
      - Article 2 is the "smoking gun" for Elliott’s alleged breach of promise (per CGA).
      - While Article 1 uses numbers to defend current funding against Elliott’s demands, Article 2 reveals the School Board (BCBOE) is still moving toward new taxation via Spanish Fort/Fairhope tax districts.
      - Link between the two: Elliott is the common antagonist; the "tax surplus" narrative (Article 1) contradicts the continued push for school tax districts and new toll/fuel taxes documented in Article 2.

      KEY ENTITIES:
      - Chris Elliott (Junior Senator/"Tax Man")
      - Jeanne Carney (CGA Admin)
      - Baldwin County Board of Education (BCBOE) / Gulf Shores Board of Education
      - Spanish Fort Town Council / Fairhope (Municipalities)
      - Lagniappe Mobile (Reporting source for tax district info)
      - I-10 Bridge Project
      - CGA (Baldwin County Citizens For Government Accountability)
