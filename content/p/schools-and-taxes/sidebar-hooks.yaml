  baldwin-county-citizens-for-government-accountability-cga:
    brief: |-
      THE CONFLICT:
      - January 2017: BCBOE requested Alabama Legislature make Penny Sales Tax permanent; legislature declined.
      - Legislature extended tax only 6 months (due May 30, 2018); required Voter decision.
      - BCBOE unhappy with Legislature’s condition; approached Baldwin County Commission instead.
      - Deal brokered: County Commission exchanged 1984 Penny Sales Tax percentages for authority to levy the tax.
      - Cost to BCBOE: Approx $4 million/year, roughly $40 million over 10 years.
      - Chris Elliott and Eddie Tyler were in attendance at Robertsdale town hall with Senator Albritton.
      - Julie Tyler told Albritton’s supporters they agreed to the funding swap "out of fear Voters would not approve" tax extension.
      - Article 1 (CGA, Aug 2022): Chris Elliott is repeatedly asking for property tax increases ("Tax Man") even though schools received $140,269,185.76 in local revenue for FY 2022 (Oct 1, 2021 - Sep 30, 2022).

      THE DISCOVERY:
      - Article 2 details Chris Elliott’s fundraising timeline July 2018.
      - Total Campaign Raised: $483,700.00.
      - PAC Contributions (July 2-5, 2018): $352,250.00 (67 donations)
      - Alabama Realtors PAC Donated: $10,000.00 (July 2).
      - Road PAC Donated: $5,000.00 (July 3).
      - EDPAC Donated: $5,000.00 (July 3).
      - Elliott’s Salary listed at time: ~$42,000/year.
      - Article 2 explicitly links Chris Elliott to the tax deal mentioned in Article 1 by name ("Mr. Tyler" and "Elliott") making him directly accountable for the $40M cost deal.

      THE PIVOT:
      - Article 1 accuses Chris Elliott of using "Tax Man" rhetoric to demand more taxes despite schools having $140M+ in revenue.
      - Article 2 proves Elliott’s authority over those taxes was manipulated into existence via fear tactics and backdoor deals (per the Penny Sales Tax deal).
      - Article 2 proves Elliott took $352k in PAC money to fund his political career while earning a low salary, suggesting his "Tax Man" warnings may be for profit/influence.
      - Article 2 validates the CGA (Article 1) claim: Elliott’s position is not innocent; he was personally involved in a financial scheme that redirected school funding.

      KEY ENTITIES:
      - Chris Elliott (County Commissioner/Official "Tax Man")
      - Eddie Tyler
