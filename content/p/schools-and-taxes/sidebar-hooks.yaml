    text: Baldwin County schools are swimming in $140 million of your tax dollars while teachers still beg for supplies. This investigation reveals how Governor Ivey and her cronies use that massive surplus to justify stripping away your right to elect school board members and taking control for themselves.
  taxes-tolls-and-schools:
