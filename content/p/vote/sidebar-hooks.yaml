      a grossly flawed and gerrymandered Request for Proposal (RFP) bid process by
      the Fairhope Airport Authority.

      *   Evidence suggests bid rigging and collusion among members of the Airport
      Authority Board occurred during the bidding process.


      THE PIVOT

      *   Article 2 proves that Jack Burrell used his position on the Board to manipulate
      the lease selection process, which undermines the legitimacy of the Authority''s
      decision regarding property ownership described in Article 1.


