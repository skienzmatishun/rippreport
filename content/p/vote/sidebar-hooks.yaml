  court-public-opinion-now-session:
    brief: 'THE CONFLICT

      *   Fairhope City Council President Jack Burrell wanted the Airport property
      in the name of the City of Fairhope.

      *   The Fairhope Airport Authority sought to appropriate $310,000 per year from
      city tax dollars to pay down an $8 million debt and retain the property in the
      Authority''s ownership.


      THE DISCOVERY

