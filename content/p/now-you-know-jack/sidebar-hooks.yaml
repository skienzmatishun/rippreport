  all-mouth:
    brief: 'BRIDGE BRIEF


      THE CONFLICT:

      *   Council President Jack Burrell initiated a campaign of obstruction against
      the Mayor following an Ethics complaint filed by the Mayor.

      *   In 2017, Mr. Burrell approved Airport funds to hire an attorney to investigate
      The Ripp Report while simultaneously leading efforts to deny the Mayor legal
      counsel.

      *   A "Verified Notice Of Claim" was filed against the City of Fairhope in August
      2017 regarding city denial of free speech/participation rights.

      *   Conflict over title ownership: Mr. Burrell fought to keep control of Fairhope
      Airport land under the Authority’s name, opposing a citizen-led view that the
      City should hold the title.


      THE DISCOVERY:

      *   Article 2 reveals Councilman Burrell''s public comments on city finances
      are disingenuous ("professional B.S. artist") and serve self-interest rather
      than the citizens''.

      *   Burrell led the push for an upgrade of the failing Fairhope sewer plant
      in the early 2010s (starting before 2013) instead of building a new, necessary
      sewer plant.

      *   The approved budget for the sewer upgrades ballooned from $10 million to
      $13 million by completion.

      *   Burrell publicly questioned the cost of replacing headworks at North Church
      Street ($5 million estimate), claiming it was too high when compared to a 2015
      upgrade that cost only $12 million.


      THE PIVOT:

      *   Article 1 alleges Burrell’s actions are driven by political spite (retribution
      against the Mayor). Article 2 provides factual evidence of administrative mismanagement
      and fiscal disregard for critical public infrastructure (sewer system), demonstrating
      his lack of concern for "citizens best interest" in operational areas.

      *   The pattern shown in Article 2—prioritizing minimal cost solutions/upgrades
      over necessary, costly infrastructure replacement (sewers)—supports the initial
      claim in Article 1 that Burrell is not acting in the public''s interest but
      rather pursuing a specific agenda regarding city funds and development land
      ($2.65 million unbudgeted purchase at airport).


      KEY ENTITIES:

      *   Council President Jack Burrell

      *   The Mayor (implied)

      *   Fairhope City Council

      *   City of Fairhope

      *   Fairhope Airport Authority

      *   The Ripp Report

      *   North Church Street wastewater treatment plant'
