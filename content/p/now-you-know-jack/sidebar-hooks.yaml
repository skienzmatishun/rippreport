  you-dont-know-jack:
    brief: 'THE CONFLICT

      *   Jack Burrell orchestrated a campaign to obstruct the Mayor''s office and
      fueled her legal assault stemming from an Ethics complaint filed by the Mayor.

      *   Burrell fought against holding city title for the Fairhope Airport, favoring
      keeping control of the title with the Airport Authority.


      THE DISCOVERY

      *   The Fairhope Airport Authority sent out a Request for Proposal (RFP) on
      September 21, 2015, for a ground lease for a commercial hanger on plat 2, with
      a submittal date of October 13, 2015.

      *   Minutes from the November 17th Airport Authority meeting show Jack Burrell
      and Vince Boothe reviewing bids.

      *   Burrell made a motion to award the bid to Hix/Snedecker Companies DBA Mid-Bay
      Air,llc subject to State Ethics Commission approval.

      *   Hix was an Airport Authority Board member and an associate of Burrell.


      THE PIVOT

      *   The details of the specific bid award (Burrell recommending the deal involving
      Hix and Snedecker) prove that Burrell used his position on the Airport Authority
      to secure a "sweetheart deal" for a 30-year lease, directly linking his institutional
      power struggles to potential corruption.


      KEY ENTITIES

      *   Jack Burrell

      *   Mayor Kant

      *   Fairhope City Council

      *   Fairhope Airport Authority

      *   Vince Boothe

      *   Ray Hix

      *   Snedecker Companies DBA Mid-Bay Air,llc

      *   State Ethics Commission'
    generated_at: '2026-07-11T08:56:40.686834Z'
