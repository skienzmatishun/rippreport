  fairhope-sewer-backstory:
    brief: 'THE CONFLICT

      - Former Mayor (referred to as "Mayor Can’t"), Councilman Boone, and Councilman
      Burrell used utility funds as a slush fund to balance general city budgets between
      2012 and 2016.

      - Misappropriated funds totaled $3 million in attorney fees for lawsuits involving
      Fairhope; no infrastructure work was done on sewer systems.

      - Mayor Karen Wilson defeated this council in 2016 with a platform promise to
      fix sewer/infrastructure issues ignored for a decade.

      - Current "Catalyst" Council elected in subsequent term aligned with previous
      "good ole boy" connections and obstructed the Mayor from day one.

      - Budgets 2017–2019: Council cut funds for technical experience and infrastructure
      upgrades despite Operations Director recommendations; defunded Assistant Superintendents
      when they retired (Gas late 2017, Water/Sewer Feb 2018).

      - Population increased 32% last term; Utility full-time employees decreased
      while elected officials received $374k in free family insurance.

      - Current administration hides City operating expenses in Utility budget to
      falsely report massive surpluses (reversing the 2016–2020 structure under Mayor
      Wilson).


      THE DISCOVERY

      - Article 2 confirms the specific financial fraud (utility fund as slush fund)
      that caused the sewer crisis described in Article 1.

      - Confirms Mayor Wilson refused dual positions/salaries during her tenure, contrasting
      with prior practice of double paychecks.

      - Wilson’s campaign timeline is documented (55 dates) proving specific infrastructure/water
      initiatives were tracked since election.

      - Mobile Baykeeper (Exec Director Casi Callaway) reported sewer spills and Fly
      Creek damage complaints in Fairhope for over 10 years.

      - Widget Article reveals Catalyst Council''s plan to resurrect under a new name
      in 2020 election with "same dark soul."


      THE PIVOT

      - Article 2 is the smoking gun that proves the "utility fund as slush fund"
      allegation linking to current sewer failures (Article 1).

      - Article 2 explicitly names the perpetrators of prior corruption (Mayor Can’t,
      Boone, Burrell) that created the crisis Wilson inherited.

      - Article 2 validates Wilson''s assertion that she was obstructed by current
      Council members, not just a failure of her own.


      KEY ENTITIES

      - Karen Wilson (Mayor)

      - Mayor Can’t (Former Mayor)

      - Councilman Boone

      - Councilman Burrell

      - Casi Callaway (Mobile Baykeeper Executive Director)

      - Catalyst (Political group)

      - Daphne (City supervisor left Fairhope for)'
