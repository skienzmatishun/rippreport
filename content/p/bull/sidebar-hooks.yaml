  two-questions-decide-fairhopes-future:
    brief: 'THE CONFLICT:

      - Karen Wolff Wilson served as Mayor for 4 years cited by Ripp Report as having
      “proper management” and neutering "good ole boy" connections.

      - Ripp Report alleges current administration (Mayor Sherry Sullivan, City Council)
      reversed Wilson’s gains by co-mingling utility revenue with city operating expenses.

      - Ripp Report alleges Council slashed infrastructure funds for technical expertise
      while approving infrastructure plans in 2017, 2018, and 2019.

      - Ripp Report documents defunding of Assistant Superintendent positions when
      Superintendents retired: Electric (mid-2017), Gas (late 2017), Water/Sewer (Feb
      2018).

      - Ripp Report alleges Mayor Sherry Sullivan is drawing two salaries: one as
      Mayor and one as Utility Director ($60k portion of $90k historically paid).

      - Ripp Report alleges Utilities currently managed under Sullivan by a "high
      school graduate" (citing Wilson’s words) following the firing of an engineer.


      THE DISCOVERY:

      - Karen Wolff Wilson (via Facebook post) confirms she refused to accept the
      second salary during her tenure to fund a professional engineer for utilities.

      - Wilson confirms she secured $40 million in BP funding specifically for utility
      upgrades after leaving office.

      - Wilson confirms Sullivan reversed her actions: “After I left office, Mayor
      Sherry Sullivan fired the utilities engineer, took the second salary herself.”

      - Wilson states current utility management is now with a “high school graduate”
      following the firing of her hire.

      - Wilson claims she pushed for council districts but it failed due to misinformation
      spread by the Council, whereas 5 at-large seats currently “protect special interests.”

      - Ripp Report links co-mingling money to inflated surpluses and poor utility
      infrastructure.


      THE PIVOT:

      - Article 2 (Wilson’s post) provides direct confirmation of the claims in Article
      1 regarding the shift in power and management.

      - Wilson’s admission that Sullivan “took the second salary herself” validates
      Article 1’s accusation of improper compensation and conflict of interest.

      - Wilson’s statement that she “fired the utilities engineer” (implied by Sullivan)
      explains Article 1’s critique of why utilities lack professional oversight now.

      - Wilson identifies the core issue for voters (salary vs engineer, districts
      vs at-large), confirming Article 1’s conclusion that a change in administration
      is required.


      KEY ENTITIES:

      - Karen Wolff Wilson (Previous Mayor)

      - Sherry Sullivan (Current Mayor)

      - Fairhope City Council

      - Ripp Report

      - BP (Source of $40 million funding)

      - Fairhope Utilities (Electric, Gas, Water & Sewer)

      - Working Waterfront Project'
