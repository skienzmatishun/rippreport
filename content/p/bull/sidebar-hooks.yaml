hooks:
  fauxhope-3:
    brief: 'THE CONFLICT:

      Article 1 states Karen Wilson (Mayor) was the only proper management in 19 years
      of observation during tenure starting 2016. Wilson refused two positions and
      dual salaries (Mayor/Utility Director), forgoing $60k of $90k historically paid.
      Current administration reversed Wilson’s gains immediately after Nov 2016 under
      a “good ole boy” majority (Mayor, Utility Director, Council, City Attorney,
      Municipal Judge). Alleged co-mingling of money hid City operating expenses in
      Utility budget to falsely report surpluses. Since 2016-2019, Council cut infrastructure/technical
      assistance funding despite Operation Director (28 years experience) recommendations.
      Population increased 32% then another 18%, while Utility/City full-time employees
      decreased; Assistant Superintendent positions defunded upon retirements (Electric
      mid-2017, Gas late 2017, Water/Sewer Feb 2018).


      THE DISCOVERY:

      Widget article confirms current Mayor draws full salary for both Mayor and Utility
      Director roles with no utility qualifications. Reveals Alabama legislature postponed
      municipal elections in 2024, allowing Mayor and appointed officials (Council,
      Attorney, Judge) to serve a full year with salary, health insurance, and decision-making
      power without a single vote being cast. Construction company awarded the $10
      million waterfront project is identified as political supporter of current leadership.


      THE PIVOT:

      Widget article proves Article 1’s corruption claims via the election loophole
      where current leadership exercised power without voter mandate. Confirms alignment
      with special interests (developers) who control infrastructure spending priorities
      (parks/tunnels over sewer/water tanks). Validates the "co-mingling" accusation
      by showing leaders made decisions and spent funds without a single vote cast
      to authorize their continued tenure.


      KEY ENTITIES:

      Karen Wilson. Mayor Sullivan. City Council. Municipal Attorney. Municipal Judge.
      Utility Director. Operation Director (28 years experience). Alabama Legislature.
      CITY SKETCHES publication.'
