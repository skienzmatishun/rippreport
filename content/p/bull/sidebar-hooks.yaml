      Utility Director position; "neutered good ole boy connections" on city contracts.

      *   Current Administration (Mayor Sherry Sullivan, Council President Jack Burrell):
      Reversed Wilson’s changes. Re-instituted practice of Mayor taking two salaries
      (historically $90k total).

      *   Governance Shift: Current administration described as "pro development"
      prioritizing development over utility infrastructure and safety.

      *   Fiscal Mismanagement: Utilities (rate fees) being treated as City money
      (tax dollars) allowing operating expenses to hide in Utility budget; falsely
      reporting massive surpluses.


      **THE DISCOVERY**

      *   Waterfront Project: City received 6.2 million in federal grants; required
      ADA compliance from start, though Mayor Sherry Sullivan took "close to a year"
      to understand grant provisions.

      *   Project Modification: Council President Jack Burrell eliminated swim area
      and rock jetties designed for pier protection because he "does not like the
      look."

      *   K-1 Center: City purchased property for $2.5 million in 2019 from Baldwin
      County Board of Education; Burrell cited as controlling future plans, with predicted
      wasted funds.

      *   Sub-station Deception: Mayor Sullivan and Burrell caught lying to press/citizens
      about available electric sub-station locations; filled ABC store retention pond
      despite higher long-term dirt costs.

      *   Sewer Infrastructure: Tim Cant and Jack Burrell cited as doing "absolutely
      nothing" for years on sewer infrastructure work.


      **THE PIVOT**

      *   Article 2 proves Wilson’s claims of administrative reversal: Provides specific
      evidence that Mayor Sullivan was unable to quickly manage grant compliance (confirming
      Article 1’s warning about reversing gains).

      *   Smokes Jack Burrell: Confirms Article 1’s claim of "pro development" negligence
      by detailing how he altered waterfront design ($6.2M grant) and controls the
      K-1 site decisions without community consensus.

      *   Confirms Mismanagement: Validates claims that "good ole boys" prioritize
      aesthetics and developers (e.g., Burrell lying about sub-station locations)
      over municipal necessity.


      **KEY ENTITIES**

      *   Karen Wilson (Mayor 2016–2020)

      *   Sherry Sullivan (Current Mayor)

      *   Jack Burrell (Council President)

      *   Jay Robinson (Councilman)

      *   Tim Cant

      *   Fairhope City Council'
