  investigative-reporting:
    brief: 'THE CONFLICT

      * July 18, 2014: Chris Warner called Will Sutton of the Alabama Elections Division
      regarding alleged election fraud in Fairhope, AL.

      * 2012 Fairhope Mayor Race: Christopher Warner ran against incumbent Mayor Kant;
      reported a 22% approval rating for Kantor’s administration.

      * Allegation (2012): Candidate was denied $4,500 to run machine ballots back
      after challenging the election.

      * Local Political Conflict: Chris Warner alleged that candidates backed by Lynn
      Stacey consistently won elections in Baldwin County.

      * BP Fraud Link (Past): In November 2010, Connie Baggett reported a company
      belonging to senators was awarded $63,900 through public contracts.


      THE DISCOVERY

      * Retaliation for reporting: Newly elected commissioners Dorsey and James subsequently
      demoted the EMA director and fired whistle-blowers after the report on contractors.

      * Legal action timeline: The resulting scandal transitioned into a federal investigation
      handled by Matt Hart (Special Council of the Alabama Attorney General).

      * Specific criminal findings: Matt Hart convicted Mike Hubbard (former Speaker
      of the House) related to these investigations.

      * Subpoena involvement: Trip Pittman received a subpoena in June 2016 regarding
      a federal investigation into a BP oil spill contract, as documented by Mike
      Odom.


      THE PIVOT

      * Article 2 provides concrete evidence (BP Fraud conviction, subpoenas) of the
      "theft" and "bid-rigging lucrative public contracts for friends and donors"
      that Chris Warner alleged in Article 1.

      * The involvement of Trip Pittman in both the BP fraud investigation (Article
      2) and being mentioned as a client of Lynn Stacey involved in corruption allegations
      with Warner (Article 1) connects the dots between election integrity claims
      and major financial/political crimes.

      * It demonstrates that the "totalitarian control" and corrupt regime referenced
      by Warner has led to actual federal legal proceedings against high-level officials
      in Baldwin County.


      KEY ENTITIES

      * Chris Warner, Ph.D. (Author of Poll Watcher Letter)

      * Will Sutton (Alabama Elections Division)

      * Mayor Kant

      * Trip Pittman / Senator Pittman

      * Lynn Stacey

      * Bob James

      * Chris Elliot

      * Connie Baggett

      * Matt Hart (Special Council Attorney General)

      * Mike Hubbard

      * Dorsey

      * Mike Odom'
