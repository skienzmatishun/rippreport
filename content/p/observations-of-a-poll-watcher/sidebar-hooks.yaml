  as-long-as-i-count-the-votes-what-are-you-going-to-do-about-it:
    brief: '**BRIDGE BRIEF**


      **1. THE CONFLICT:**

      *   Chris Warner, Ph.D., ran for Mayor of Fairhope in 2012 but challenged the
      election results due to a reported $4,500 fee required to review ballots.

      *   The primary race involved incumbent Mayor Kant and a challenger (the author).

      *   Allegations also covered Bob James vs. Chris Elliot in the Baldwin County
      Commission seat primary/runoff involving "Lynn Stacey," described as “the fix-it
      guy.”

      *   In 2014, Warner wrote to Will Sutton (Elections Division) concerning systemic
      election tampering and corruption in Fairhope/Baldwin County.


      **2. THE DISCOVERY:**

      *   A poll watcher observed municipal elections on September 11, 2012 (for Mayoral
      Candidate Lonnie Mixon).

      *   The watch report identifies procedural violations including lack of control
      of voting machines by Election Supervisor Mrs. Culver and Tom Odom.

      *   Tom Odom is identified as an election official who opened absentee ballots
      while participating as a poll watcher for Mayor Kant''s campaign.

      *   An inspector was heard instructing clerks to run extra tapes off the machine
      specifically for Tom Odom; these copies were initially withheld from the poll
      watchers.

      *   The poll watcher could not monitor final tape certification due to procedural
      restrictions, questioning the legitimacy of the certification signatures signed
      by observers who were denied access.


      **3. THE PIVOT:**

      *   Chris Warner’s 2014 letter (Main Article) contains general accusations of
      corruption and rigged results often linked to consultants like Lynn Stacey.

      *   The poll watcher''s statement (Widget Article, dated 9/11/2012) provides
      specific, documented proof of procedural irregularities, such as the "lack of
      control" by election officials (Tom Odom/Mrs. Culver) and restricted access
      to machine tapes during a mayoral election involving Mayor Kant’s campaign.


      **4. KEY ENTITIES:**

      *   Chris Warner, Ph.D.

      *   Will Sutton (Elections Division)

      *   Mayor Kant / Tim Kant

      *   Lonnie Mixon (Mayoral Candidate 2012)

      *   Lynn Stacey ("the fix-it guy")

      *   Bob James / Chris Elliot

      *   Tom Odom (Election Official/Fire Marshall)

      *   Mrs. Culver (Election Supervisor)'
