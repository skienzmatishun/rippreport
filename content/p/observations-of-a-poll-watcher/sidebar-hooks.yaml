  as-long-as-i-count-the-votes-what-are-you-going-to-do-about-it:
    brief: 'THE CONFLICT

      *   Dr. Warner wrote a letter regarding election fraud in Fairhope, AL on July
      24, 2014.

      *   Warner alleged systemic election tampering involving absentee ballots and
      lack of control over voting boxes.

      *   Warner linked political success to specific consultants (Lynn Stacey) and
      political figures (Baldwin County Commissioner Chris Elliot).


      THE DISCOVERY

      *   A poll watcher observed multiple violations at Fairhope polling places,
      confirming operational security failures.

      *   Specific violations included: Lack of control over voting machines.

      *   Young children were observed inserting assumed parent ballots into voting
      machines without challenge by clerks.

      *   An election official (Tom Odom) opened an absentee voting machine while
      acting as a poll watcher.

      *   Poll watchers were explicitly prohibited from observing the final machine
      opening and tape certification procedures.


      THE PIVOT

      *   Article 2 provides direct, firsthand witness testimony from a certified
      poll watcher regarding specific physical irregularities (machine access, ballot
      insertion).

      *   Article 1 makes broad claims of fraud; Article 2 provides granular evidence
      of procedural failures that undermine the integrity of the election process
      mentioned in Article 1.


