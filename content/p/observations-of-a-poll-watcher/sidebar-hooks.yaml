  pay-off-and-election-fraud:
    brief: 'THE CONFLICT

      *   Dr. Warner wrote a letter regarding election fraud in Fairhope, AL, dated
      July 24, 2014.

      *   Warner alleged that political consultants like Lynn Stacey ensured candidates
      won by manipulating elections (e.g., Mayor Kant vs. Bob James/Chris Elliot race).

      *   The main article detailed specific election irregularities: lack of control
      over voting machines, absentee ballot issues, and poll watcher observations
      involving Tom Odom at Mayor Tim Kant''s event on 9/11/2012.


      THE DISCOVERY

      *   A sealed court case concerning a land dispute involving major supporters
      of Mayor Tim Kant was kept secret.

      *   The widget article raises the question of whether Mayor Kant accepted money
      from an interested party named Bobby Faust and possessed loan documents to prove
      it.


      THE PIVOT

      *   Article 2 reveals a potential financial motive (money/loan from Bobby Faust)
      related to Mayor Kant''s land dispute, which provides a specific mechanism for
      corruption that underlies the broader systemic election fraud claims detailed
      in Article 1.


