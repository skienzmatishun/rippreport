      Warner alleged Lynn Stacey''s aid led to an outcome where Elliott defeated James
      by only 19% of the votes cast, tied to 3,000 votes received by third candidate
      Cody Phillips.


      THE DISCOVERY:

      *   Francis Paul Ripp (The Ripp Report) alleges systemic corruption in Baldwin
      County involving Mayor Kant and developer Arthur Corte regarding Fly Creek damage
      stemming from a Publix project development.

      *   Ripp claims the Triangle lawsuit between Corte and Kant cost taxpayers $11.25
      million, with the settlement allegedly omitted public notification.

      *   Ripp alleges that Sen. Pittman and Mayor Kant siphoned $636,000 of BP funds
      for a contract to Sen. Pittman, resulting in an FBI investigation and referral
      to the Alabama Attorney General''s White Collar Crime Division due to failure
      to remove boom anchors.


      THE PIVOT:

      *   Both articles detail allegations of deep-seated, systemic corruption ("corrupt
      good ole boy club," "Italian crime family") used by political power to obscure
      illegal financial dealings and manipulate public outcomes (either ballot results
      or land/environmental regulatory processes).

      *   The Widget Article proves that the alleged pattern of misuse of funds and
      powerful figures described in the election fraud allegations is not limited
      to campaign finance but extends to major taxpayer liabilities, environmental
      degradation, and federal fund abuse involving Mayor Kant.


      KEY ENTITIES:

      *   Chris Warner (Author of Main Article/Poll Watcher)

      *   Lynn Stacey ("the fix-it guy," political consultant)

