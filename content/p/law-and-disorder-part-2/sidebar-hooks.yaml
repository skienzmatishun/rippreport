      an estimated 40 to 50 juveniles consuming alcohol at a residence in the 16000
      Block of County Road 13.

      *   The Fairhope Police noted that no adults were present and adult charges
      were unlikely due to Open House Party law (13A-11-10.1).


      THE DISCOVERY:

      *   The Ripp Report requested a police report for Council President Jack Burrell
      through an attorney in Birmingham.

      *   Information was obtained suggesting Jack Burrell has undisclosed arrests
      records or a police record prior to running for elected office.

      *   An ethics complaint filed against Burrell was successfully scrubbed by paid
      attorneys, but new evidence suggests the facts are being re-examined.


      THE PIVOT:

      *   Article 2 provides specific actionable documentation (a requested police
      report) that directly contradicts or substantiates the implication in Article
      1 that Council President Jack Burrell is lying about having a police record
      and hiding legal history.

      *   This pivots the focus from general community disorder (underage drinking)
      to specific official misconduct and lack of transparency by Burrell.


      KEY ENTITIES:

      *   Jack Burrell (City Council President, Airport Authority liaison)

      *   Fairhope Police Department (Sergeant Craig Sawyer)

      *   Fairhope City Council

      *   Airport Authority Board

      *   Birmingham (location for attorney contact)

      *   Judge Michelle Thomason (mentioned as a potential source regarding Burrell''s
      record)'
