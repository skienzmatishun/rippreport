      Block of County Road 13.

      *   Fairhope Police detained approximately 40 to 50 juveniles; no adults were
      charged due to Open House Party law requirements (adult authorization/presence).


      THE DISCOVERY:

      *   The Ripp Report sent an email on August 27, 2018, detailing a house party
      at Mr. Burrell’s home the previous Friday night.

      *   The email confirmed alcohol and marijuana were present at the event.

      *   Minors from Fairhope High School and Bayside were in attendance.

      *   The discovery establishes that Council President Jack Burrell''s residence
      was the location of a party involving minors, contradicting the implied lack
      of adult involvement or property owner identification mentioned by police.


      THE PIVOT:

