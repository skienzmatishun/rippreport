      - Hicks dismissed the need for external review, telling reporter Ripp “I know best” and calling ethics inquiries "go to hell."
      - Reporter (Ripp) filed complaints with the Alabama Ethics Commission regarding Mayor Wills and this lease arrangement.

      THE DISCOVERY:
      - Gulf Coast Media reported on Nov 16 that Baldwin County Commission voted to lease a building on D’Olive Street from the Legislative Delegation.
      - Lagniappe Mobile confirmed the lease is with Robert A. Wills, Sr., owner of 125 D’Olive Street in Bay Minette.
      - Lease terms: $49,080 a year ($245,400 over five years), term from Jan 1, 2023 to Dec 31, 2027.
      - Delegation agreed to pay entire lease cost; Commission initially planned to split cost.
      - Revised lease reportedly lowers rent from $4,090/month to $1,750/month.
      - Alabama AG’s Office and Ethics Commission declined comment when asked about conflict of interest between Mayor Wills as landlord and public official.

      THE PIVOT:
      - Article 2 reveals Mayor Wills is the private property owner of the leased space.
      - This confirms Article 1’s ethics concern: Hicks claims no violation exists while a public official (Delegation/Commission) pays taxpayer money to rent space owned by Mayor Wills who represents the city.
      - This arrangement meets Ala. Code § 36-25-1(8) definition of conflict of interest cited in Article 1: private interests vs. official responsibilities, since Wills controls both the lease offer and the city.

      KEY ENTITIES:
      - Brad Hicks (Baldwin Commission Attorney)
      - Bob Wills (Mayor of Bay Minette / Robert A. Wills, Sr.)
      - Baldwin County Commission (Commissioners: Jeb Ball, Billie Jo Underwood)
      - Baldwin County Legislative Delegation (Cliff McCollum)
      - Alabama Ethics Commission
      - Attorney General’s Office of Alabama
      - 125 D’Olive Street, Bay Minette
