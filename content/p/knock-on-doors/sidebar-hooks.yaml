      THE PIVOT:

      *   Article 2 proves that the economic development efforts by the Commissioners
      and the Economic Development Alliance failed, directly validating the call in
      Article 1 for specific marketing approaches and sales people ("knock on doors").

      *   The lack of a sign demonstrates a fundamental failure in the existing real
      estate/sales strategy.


      KEY ENTITIES:

      *   Baldwin County Commission

