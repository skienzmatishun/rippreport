    brief: 'THE CONFLICT

      *   Author served as a Marine combat engineer in Dong Ha, Vietnam during the
      Tet Offensive in March 1968.

      *   The author sustained a severe body concussion resulting from a blast.

      *   Author refused to fill out Purple Heart paperwork, leading to a Veterans
      Claim pending for 51 years.


      THE DISCOVERY

      *   The author suffered multiple injuries including 14 surgeries, two infections,
      a muscle tear, and a kidney removal due to Agent Orange exposure.

      *   The author is currently dealing with recovery from shoulder issues (Dec
      2017 surgery complicated by infection/slippage).

      *   There are regular complaints regarding Family Court Judge Thomasson and
      Attorney Buddy Brackin concerning legal ethics.


      THE PIVOT

      *   Article 2 connects the author''s past military injury history (concussion,
      Agent Orange) directly to their current platform for exposing political corruption
      in Fairhope and Baldwin County.

      *   The Widget Article reveals specific local targets (Judge Thomasson, Attorney
      Brackin) that align with the Main Article''s broader theme of fighting systemic
      corruption.


