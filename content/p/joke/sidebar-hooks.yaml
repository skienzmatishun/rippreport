      position as liaison to the Fairhope Airport Authority and Board member (JOB
      WITH BENEFITS).

      *   The Fairhope Airport Authority title maintains ownership of land, guaranteeing
      political security for council members.

      *   Burrell is accused of using this structure to secure "good ole boy deal
      on an aircraft hanger."

      *   Financial mechanisms allegedly shield Burrell: the Airport Authority pays
      his attorney fees for ethics complaints and directs complaints there for dismissal.


      THE PIVOT

      *   Article 1 identifies specific suspicious activity (JOKE LLP land purchase)
      that lacked accountability.

      *   Article 2 provides the systemic explanation, showing how political figures
      like Jack Burrell use intertwined positions with bodies like the Airport Authority
      to fund their defense and secure deals while insulating themselves from public
      oversight.


