  audio-of-bay-minette-attorney-councilman-fight-offers-new-details:
    brief: 'THE CONFLICT:

      *   Harry Still was convicted in Bayminette Municipal Court for an altercation
      with Matt Franklin; later found not guilty in a jury trial de novo.

      *   Still alleged the prosecution, involving City Council member Matt Franklin
      (who would vote on Still''s reappointment as city prosecutor), was politically
      motivated.


      THE DISCOVERY:

      *   Audio evidence released by Lagniappe shows an actual fight between Harry
      Still and Councilman Matthew Franklin in downtown Bay Minette on September 3.

      *   The recording contradicts the initial narrative from former Mayor Bob Wills,
      former Police Chief Al Tolbert, and police statements (which claimed Still attacked
      Franklin).

      *   Still claims Franklin attacked him first during a heated conversation about
      local politics.


      THE PIVOT:

      *   Article 2 provides direct audio evidence of the Sept. 3 fight itself, contradicting
      the official versions offered by Mayor Bob Wills and Al Tolbert mentioned in
      Article 1''s context regarding past events.


      KEY ENTITIES:

      *   Harry Still

      *   Matt Franklin (City Council Member)

      *   Bob Wills (Former Mayor)

      *   Al Tolbert (Former Police Chief)

      *   Liam Scully (Prosecutor/son of a judge)

      *   Marcus McDowell (Judge)

      *   Mayor Wills'
