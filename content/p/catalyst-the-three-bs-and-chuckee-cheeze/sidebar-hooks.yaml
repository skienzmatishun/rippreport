      Haygood.

      - Chris Elliott was appointed to the Baldwin County Commission by Governor Robert
      Bentley in May 2018.

      - In early 2018, Catalyst supported Tucker Dorsey for State Senate Seat 32 and
      Baldwin County commission roles.

      - The organization’s historical goal is total control over Baldwin County Government
      (Commission, Probate Judge, Sheriff).


      THE DISCOVERY

      - CATALYST''s leadership today is headed by Scott Boone, the son of Fairhope
      Councilman Kevin Boone.

      - Catalyst candidates are financed through Prebble-Rish and various LLC’s partnered
      with Kevin Boone.

      - Jack Burrell has faced ethics complaints from the Airport Board regarding
      his time in politics (representing him) and now uses city insurance money to
      defend himself against accusations of unconstitutional actions and denying mayoral
      privileges.


      THE PIVOT

