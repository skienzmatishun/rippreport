  catalyst-meets-social-media:
    brief: 'THE CONFLICT

      *   Catalyst began as a political entity rooted in Stacy Elliott and Haygood,
      establishing itself by selecting candidates for various races (Probate Judge,
      State Senate seats, Baldwin County Commission) to advance its interests.

      *   The group expanded its influence when Chris Elliott became a county commissioner
      and Haygood became the Mayor of Daphne.

      *   Catalyst operated as an "old guard" machine that used intimidation tactics
      against opponents.

      *   Funding for Catalyst candidates was linked to Prebble-Rish (engineering
      company) and LLC partners of Kevin Boone.

      *   Jack Burrell faced ethics complaints involving the Airport Board, which
      led to his use of taxpayer funds in a current public participation case.

      *   Goubil investigated Jack Burrell and Ray Hix regarding an "Airport scandal."


      THE DISCOVERY

      *   The political machine is no longer working entirely in the shadows; social
      media has exposed Catalyst''s goals and key players to the Baldwin County population.

      *   Chris Elliott’s weakness was publicly exposed when he lost a race against
      David Northcutt by only a 700 vote margin, forcing him to run for State Senate
      Seat 32 again.

      *   Sheriff Hoss Mack and Superintendent Eddie Tyler are currently facing personal
      scrutiny/divorce related to their marriage to Chris Elliott.

      *   Catalyst orchestrated the vacancy in the Daphne City Council seat and filled
      it with Jonathan Armstrong through political maneuvering, according to a tip
      citing catalyst spies.

      *   Mayor Haygood allegedly demonstrated anti-opposition tactics by ordering
      city workers to destroy fiber optic cable feeds throughout Daphne.


      THE PIVOT

      *   Article 1 establishes Catalyst''s systematic methods of control (candidate
      selection, intimidation). Article 2 proves the systemic failure and decline
      of that machine due to public exposure facilitated by social media, specifically
      highlighting Chris Elliott’s political weakness as a critical vulnerability.


