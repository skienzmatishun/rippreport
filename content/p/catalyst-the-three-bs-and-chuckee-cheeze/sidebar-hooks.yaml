      LLCs.


      THE DISCOVERY

      *   Catalyst changed its name to Scott Boone Consulting, indicating a shift
      but retaining the core structure.

      *   Scott Boone Consulting is now financed by developers and landowners profiting
      from unbridled development.

      *   Catalyst/Scott Boone Consulting utilizes an intricate web of LLCs intended
      to conceal relationships and insulate principal actors from liability (linked
      to land fraud/Strawman series).


      THE PIVOT

