hooks:
  catalyst-birds-of-the-same-feather:
    brief: 'THE CONFLICT

      *   CATALYST formed with Stacy Elliott and Haygood.

      *   The organization expanded when Chris Elliott became county commissioner
      and Haygood served as Mayor of Daphne.

      *   Scott Boone, son of Fairhope Councilman Kevin Boone, is stated as currently
      being at the helm of CATALYST.

      *   Jack Burrell was involved in an ethics complaint regarding the Airport Board;
      Goubil investigated this for the Alabama Ethics Commission (which he had no
      decision-making power over).

      *   Jack Burrell and Ray Hix were linked to corruption/ethics issues involving
      the airport scandal.


      THE DISCOVERY

      *   CATALYST''s objective is total control of key Baldwin County offices, specifically
      naming the County Commission, Probate Judge, State Senate, and District Judge.

      *   Tim Kant is a current figure aligned with this strategy, supporting Joe
      Davis for District Two.

      *   Kant has faced criticism regarding infrastructure neglect in Fairhope (failing
      sewer system) and prioritizing developer interests over public opinion (Fly
      Creek Apartments at Highway 98/Parker Road).


      THE PIVOT

      *   Article 1 establishes CATALYST''s method of operating (influence, intimidation,
      media manipulation via Chuckee Cheeze/Gulf Coast News, candidate selection).

      *   Article 2 proves the current tactical goal and scope of this operation by
      identifying specific campaign candidates (Joe Davis supported by Kant) being
      strategically placed to achieve total governance control across all key County/State
      offices.


      KEY ENTITIES

      *   CATALYST

      *   Scott Boone

      *   Kevin Boone

