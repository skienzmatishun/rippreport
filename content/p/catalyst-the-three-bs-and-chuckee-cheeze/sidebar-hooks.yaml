  catalyst-intimidation-a-pig-pen:
    brief: 'THE CONFLICT:

      *   Catalyst is a political entity in Baldwin County that hand picks candidates
      for various positions (Probate Judge, State Senate seats, four Baldwin County
      commission races).

      *   Catalyst was founded by Stacy Elliott and Haygood.

      *   The organization is led by Mr. Scott Boone, son of Fairhope Councilman Kevin
      Boone.

      *   Catalyst uses intimidation and bully tactics to discourage opponents.

      *   Candidate financing comes from Prebble-Rish engineering company through
      multiple LLCs linked to Kevin Boone.


      THE DISCOVERY:

      *   Catalyst operates as a political operation that aims to destabilize Fairhope’s
      Government by attacking the Mayor.

      *   Catalyst uses media outlets like the Gulf Coast Courier and editor Chuckee
      Cheeze to spread rumors and control information flow.

      *   Catalyst attempts to hide its involvement by claiming to be a Consultant/Public
      Relations firm, though they are the driving force behind candidate slates.

      *   Political intimidation is used against opposing candidates (e.g., removing
      signs for non-Catalyst candidates).


      THE PIVOT:

      *   Article 2 reveals the operational strategy of Catalyst (using media manipulation
      and political bullying) which validates the claims in Article 1 about Catalyst''s
      methods (intimidation, controlling information via Cheeze).

      *   Article 2 shows that Scott Boone is actively working to deny his connection
      to Catalyst, revealing an internal conflict within the organization.


      KEY ENTITIES:

      *   Catalyst

      *   Stacy Elliott

      *   Haygood

      *   Chris Elliott (County Commissioner)

      *   Haygood (Mayor of Daphne)

      *   Scott Boone

      *   Kevin Boone (Fairhope Councilman)

      *   Chuckee Cheeze (Editor of Gulf Coast News/Gulf Coast Courier)

      *   Jack Burrell

      *   Prebble-Rish

      *   Alabama Ethics Commission'
