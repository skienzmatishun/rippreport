  catalyst-stacking-the-deck:
    brief: 'THE CONFLICT: What happened in the past? (Include specific names, dates,
      events)

      * Catalyst originated with members Stacy Elliott and Haygood before it morphed
      into a political organization focused on placing candidates.

      * The original goals of Catalyst included representing interests from probate
      judges to State Senate seats and all four Baldwin County commission races.

      * Former Editor/Councilman Chuckee Cheeze utilized his media outlet for coverage
      regarding hiring practices, allegedly controlled or influenced by Catalyst.

      * Jack Burrell was involved in an Airport Board ethics complaint, which led
      to his representation by the city’s insurance carrier in a case involving public
      participation and unconstitutional actions.


      THE DISCOVERY: What does the second article prove or reveal today?

      * CATALYST is currently operating under the corporate banner of Scott Boone
      Consulting.

      * Catalyst utilizes sophisticated structural tactics described as an "intricate
      web of multiple concentric layers of companies" designed to conceal interrelationships
      and insulate members from liability.

      * The organization actively employs political strategies such as running "faux
      candidates" or using tactics that constitute "stacking the deck."

      * Joshua Gammon is positioned as a challenger running for Place 5 on the Fairhope
      City Council, targeting Kevin Boone’s seat.


      THE PIVOT: Why is Article 2 the ''smoking gun'' for Article 1?

      * Article 2 names Scott Boone Consulting as the current mechanism through which
      Catalyst operates, providing a modern corporate identity to the "political cancer"
      mentioned in Article 1.

      * Article 2 defines Catalyst’s structural methods (concentric layers/insulation),
      offering the operational framework that justifies the allegations of shady deals
      and concealed interests made against figures like Scott Boone in Article 1.

      * Article 2 explicitly identifies a direct electoral challenge to Kevin Boone
      by his own son''s political connections, providing concrete evidence of Catalyst’s
      current attempt at "stacking the deck."


      KEY ENTITIES: List specific names, organizations, or locations to mention

      * Catalyst (Political Organization)

      * Scott Boone Consulting

      * Kevin Boone (Fairhope Councilman)

      * Scott Boone (Councilman/Consultant; son of Kevin Boone)

      * Chuckee Cheeze (Editor of Gulf Coast Courier/Catalyst official print media
      representative)

      * Jack Burrell (Former Fairhope Councilman)

      * The Three B’s

      * Prebble-Rish (Engineering company financing Catalyst candidates)

      * Joshua Gammon (Challenger for Place 5 City Council seat)

      * Stacy Elliott / Haygood (Catalyst founding members)

      * Baldwin County Commission

      * Airport Board'
    generated_at: '2026-07-12T19:28:47.587260Z'
  catalyst-eat-their-own:
