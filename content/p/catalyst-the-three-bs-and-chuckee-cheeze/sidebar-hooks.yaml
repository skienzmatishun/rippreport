      • Investigator Goubil worked for the Alabama Ethics Commission on a separate inquiry involving Jack Burrell, Ray Hix, and an Airport scandal (circa March 2018).
      • Prior to being sworn in as Commissioner, Tucker Dorsey was involved in meetings with Bob James and Frank Burt that formed a political alliance.

      THE DISCOVERY
      • The Widget Article proves that the systemic corruption identified by Catalyst is not isolated; it extends to County Commission Commissioner Tucker Dorsey.
      • It reveals that upon taking office, Dorsey (along with his allies) fired over 10 employees, including department heads and lawyers, citing "reducing liabilities."
      • Dorsey’s involvement in business entities (labyrinth of property associations/liabilities) is revealed as a mechanism for political gain rather than an ethical concern.

      THE PIVOT
      • Article 2 functions as the 'smoking gun' by confirming that the systemic abuses described generally in Article 1—specifically, using strategic alliances to gain control and leveraging government position for personal "bonanza" (Mega-Site)—are currently embodied by Commissioner Tucker Dorsey.
      • The Widget Article explicitly identifies voting for Dorsey as supporting "CATALYST," directly linking a high-profile example of local malfeasance to the organization described in Article 1.

