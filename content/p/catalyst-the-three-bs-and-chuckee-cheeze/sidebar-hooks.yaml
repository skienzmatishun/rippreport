      of Mayor Wilson at City Council meetings.


      THE DISCOVERY

      *   Jennifer Fidler and Sherry Sullivan are identified as "CATALYST true bloods,"
      indicating they were part of the political network despite being fired from
      city posts.

      *   The Widget article confirms CATALYST functions as a "developers political
      party" that maintains control over Fairhope, using financial incentives (raises/second
      paychecks) to reward loyal members like Mayor Sullivan and utility heads.


      THE PIVOT

      *   Article 1 alleges Catalyst uses "intimidation and bully tactics" against
