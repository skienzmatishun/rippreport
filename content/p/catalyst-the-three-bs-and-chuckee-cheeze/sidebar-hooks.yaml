      Government by running candidates in almost every race.

      *   During the 2016 Fairhope Municipal Elections, Catalyst utilized its organization
      to run a full slate of council candidates and held significant power within
      city governance.


      THE DISCOVERY:

      *   The second article confirms Catalyst''s history as a political group that
      attempted "perfect political coups" in both Baldwin County (2018) and the City
      of Fairhope (2016).

      *   It identifies the control mechanisms for CATALYST, noting that the municipal
      attorney and municipal judge are positions appointed by council and remain affiliated
      with Catalyst.


      THE PIVOT:

      *   Article 1 accuses current figures (e.g., Scott Boone, Jack Burrell) of carrying
      the "Catalyst cancer." Article 2 proves this is not a new development but reveals
      that CATALYST has been systematically controlling municipal offices (City Attorney/Municipal
      Judge) and local elections since at least 2016-2018, providing historical proof
      of their entrenched power structure.


      KEY ENTITIES:

