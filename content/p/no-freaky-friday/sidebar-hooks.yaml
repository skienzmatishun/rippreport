      in his house.

      *   Faull’s death was linked to the poisoning of dogs.

      *   Tom Mangar helped McAfee escape Belize, moving him through Guatemala and
      the U.S., resulting in McAfee being jailed in Spain.


      THE DISCOVERY

      *   John McAfee is characterized as a narcissist, sociopath, psychopath, and
      murderer with high intelligence and money.

      *   McAfee used his wealth and influence to hire criminals (bodyguards) for
      scare tactics and control.

      *   McAfee engaged in sexual abuse (paying under-age girls) and abused those
      who abused him.

      *   McAfee displayed cowardice by using guns as a show and fleeing when facing
      local demands or legal consequences.


      THE PIVOT

      *   Article 1 details the sequence of criminal events (murdering a local man,
      killing Gregory Faull).

      *   Article 2 provides the psychological profile of John McAfee (narcissist/sociopath)
      that explains his motivation for committing violence and escaping accountability.

