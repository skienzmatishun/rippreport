      intoxication (180 days sentence).

      City Attorney Marcus McDowell represented Paula DiNardi in an assault/intoxication
      case against McSharry.


      THE DISCOVERY

      McSharry’s legal defense (via attorney James Pittman) attempts to shift blame
      onto others and challenge the state’s Shield Law.

      The judicial system in Fairhope is characterized as a failure influenced by
      special interests, including developers and the City Council.


      THE PIVOT

      Article 2 reveals that McSharry’s bar served as a watering hole for Judges,
      Attorneys, and Council President Jack Burrell, suggesting systemic corruption
      enabled his legal protection and the failure of the judicial system to prosecute
