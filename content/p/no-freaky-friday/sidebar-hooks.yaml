      THE DISCOVERY

      *   Un-zoned properties (like District 8 and District 37) are being targeted
      by developers.

      *   District 8 is a contested area for the African American community, located
      between RSA development and Thomason Hall Road/Fairhope.

      *   District 37 is county land not zoned ("wild west" for developers), but decisions
      regarding it fall under Fairhope City Council jurisdiction due to proximity
      (within 5 miles).


      THE PIVOT

      *   Article 2 reveals that the lack of zoning in Districts 8 and 37 directly
      facilitates unchecked development by special interests, validating the claims
      made in Article 1 about development support.

      *   The proposed zoning changes are the mechanism through which developers circumvent
      community quality-of-life concerns supported by the Mayor and Council.


