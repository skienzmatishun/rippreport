      no state rate regulation.

      Principal of BCSS resides in Costa Rica; allegedly uninterested in local operations.

      BCSS is currently involved in several lawsuits regarding land and business fraud.

      ADEM scheduled a public hearing for May 19 at Eric H. Meyer Civic Center, Gulf
      Shores regarding BCSS permit modification and sludge pond issues.

      BCSS utilizes county rights of ways for free, expanding development sprawl.


      2 THE DISCOVERY

      Richard Dayton (GlenLakes subdivision resident) launched a Change.org petition
      demanding BCSS fee regulation.

      Article confirms 19,000 homes currently serviced by BCSS are subject to no price
      cap.

      Former County Commissioner Tucker Dorsey identified as a "straw man" and agent
      of BCSS during his term.

      Current County Attorney confirmed as a lobbyist for BCSS.

      History cited of citizens defeating the "$6 toll" via petition proves voters
      can force change if mobilized.


      3 THE PIVOT

      Article 2 acts as the smoking gun by linking the regulatory failure of Article
      1 to specific political actors (Dorsey, County Attorney).

      Article 2 transforms the general complaint in Article 1 into a tangible movement
      led by Richard Dayton.

      The confirmed lobbying ties between officials and BCSS explain why the County
      Commission has "refused to tackle" regulation mentioned in Article 1.


      4 KEY ENTITIES

      Baldwin County Sewer Services (BCSS)

      Richard Dayton

      Tucker Dorsey

      ADEM

      Current County Attorney of Baldwin County

      Gulf Shores (Location: Eric H. Meyer Civic Center)'
    generated_at: '2026-03-14T12:33:14.488033Z'
    text: Politicians like Tucker Dorsey served as 'straw men' for the sewer company
      while the County Attorney secretly lobbied for the utility. Richard Dayton’s
