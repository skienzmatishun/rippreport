      speech, and was so intoxicated he "couldn’t hardly walk" when police were called
      regarding the assault claim.

      * The Supreme Court dropped the most serious charge (assault) after the prosecutor
      failed to act.

      * Baldwin County Circuit Judge Clark Stankoski dismissed the most serious charge
