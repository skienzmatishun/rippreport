      - Challengers accuse incumbents of "good ole boy" collusion, controlling economic development and city contracts.
      - Incumbents accuse challengers of being funded by "Mom’s of Liberty" and outside agitators.
      - Challengers claim they must run as a slate to break council-mayor collusion; individual defeats are insufficient.

      THE DISCOVERY:
      - Widget article confirms 5 new candidates running as a unified slate against 4+ election cycles of independent incumbents.
      - Specific corruption allegation: Mayor Sullivan holds two city-paid positions (Mayor and Head of Utilities).
      - Specific past incident: City Council fired a qualified utility engineer to place Mayor Sullivan (non-engineer) in the Utilities role as reward for election win.
      - Specific allegations against Councilman Jack Burrell: "Absolutely worst City Councilman"; cost city millions in controversies.
      - Specific allegations against Burrell: Uses council position for "good ole boys" and developers; involved in Airport/Development controversies.
      - Incumbents are confirmed as a united bloc ("vote for all of us") supported by Catalyst and developers.

      THE PIVOT:
      - Main Article advocates for a "slate vs slate" fight to remove the Council; Widget article proves this tactic is necessary by confirming incumbents are a unified bloc backed by specific interests.
      - Main Article warns of Mayor/Council collusion; Widget article provides the mechanism (double paycheck/utility position) that validates this risk.
      - Main Article calls for removing status quo; Widget article supplies the evidence (Burrell's bullying, Burrell’s contracts, Sullivan's qualifications) that defines the "status quo."

      KEY ENTITIES:
      - Fairhope City Council (Incumbents)
      - Mayor Sullivan
      - Jack Burrell
      - Karen Wilson (Previous Mayor)
      - Troy Vickers
      - Joshua Gammon
      - Tracy Gatewood
