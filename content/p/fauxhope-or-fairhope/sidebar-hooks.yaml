  fairhope-catalyst-a-dirty-little-secret:
    brief: |-
      THE CONFLICT
      - Upcoming municipal election qualification deadline set for Aug 26; entire City Council has challengers running against them.
      - Challengers including Troy Vickers and Joshua Gammon are filing as a unified slate to replace the "status quo" Mayor Sullivan and Council.
      - 2018 Oct 2 Referendum: Over 1,000 residents petitioned for a new form of government (districts) vs the existing system.
      - 2018: Fairhope City Council voted to file an injunction that could delay or nullify the Oct 2 referendum.
      - Council claimed they were seeking legal advice from AG Steve Marshall to ensure election validity, but did not contact him directly.
      - 2018: Council President Jack Burrell cited having Nick Saban on speed dial instead of the AG’s number as part of their lack of due diligence.
      - 2018: Council hired a law firm and City Attorney paid by taxpayers to research the referendum issue only 11 days before the special election.
      - Current: Incumbents accused of colluding to maintain "At Large" system against structural reform.

      THE DISCOVERY
      - The Council’s 2018 injunction attempt was a coordinated legal strategy to block voter-approved government change.
      - The "Catalyst" machine is the internal political engine controlling the Council; members are described as connected to it by blood or loyalty.
      - Former Mayor Tim Kant hand-picked the last Council slate; they pledged loyalty to him as catalyst candidates.
      - Current Council members (including 2018 President Jack Burrell and Attorney Jay Robinson) actively blocked transparency regarding government reform.
      - Mayor Karin Wilson was previously the subject of legal division oversight demands during Kant’s term; she is described as having demanded external election supervision.
      - Reform group Fairhope Fresh Start reported Council plotting behind closed doors to deny citizens a timely vote on the referendum.
      - Widget proves the "At Large" system is actively defended to protect incumbent tenure, specifically against district-based reforms.

      THE PIVOT
      - Article 2 (Widget) confirms the "Collusion" and "Good Ole Boy Culture" claimed in Article 1 (Main).
      - The 2018 injunction vote is the specific mechanism proving Article 1’s claim that incumbents will resist change.
      - The Widget's revelation of "Catalyst" ties identifies the organizational structure behind Article 1’s "Status Quo."
      - The specific failure to contact AG Steve Marshall validates the accusation of non-transparency and insular decision-making.
      - The slate strategy in Article 1 is the direct counter-measure to the district-reform fears proven by the behavior detailed in Article 2.

      KEY ENTITIES
      - Jack Burrell (Council President, 2018)
      - Jay Robinson (Councilman/Attorney)
      - Karin Wilson (Mayor referenced in Widget)
      - Tim Kant (Former Mayor, Catalyst hand-picker)
      - Troy Vickers (Current Challenger)
      - Joshua Gammon (Current Challenger)
      - David Luc (Incumbent Councilor)
      - George Ferniany (Incumbent Councilor)
      - Tracy Gatewood (Councilor reference in Main Article metadata)
      - Mayor Sullivan (Incumbent referenced in Main Article text)
      - Steve Marshall (AL AG, referenced but not consulted by Council)
      - Fairhope Fresh Start (Reform group; Chuck Zunk spokesman)
      - Catalyst
