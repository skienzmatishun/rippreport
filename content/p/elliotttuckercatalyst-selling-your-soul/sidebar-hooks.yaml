      *   The "Black Hole" mega-site consumed nearly $40 million.

      *   Elliott secured the Education 1% tax without a public vote and skimmed money
      off it for county infrastructure.

      *   Elliott’s involvement with Catalyst involved initial payments of $8640.00
      before switching to Stragtegy, which collected $140,951.80.


      THE PIVOT

