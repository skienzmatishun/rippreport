  catalyst-is-drowning:
    brief: 'THE CONFLICT

      *   Chris Elliott and Tucker Dorsey were fundraising heavily using money donated
      by developers and Catalyst to pursue elections.

      *   Elliott and Dorsey spent county reserves on a "good ole boy deal," specifically
      35 million for a cow pasture/mega-site, funded by BP money, to repair county
      infrastructure.

      *   Elliott used the Baldwin County School Board lobbyist and Strategy firm
      for his campaign.


      THE DISCOVERY

      *   Catalyst suffered a ½ win in The People’s Choice election.

      *   Billie Jo Underwood ran over Tucker Dorsey in an election.

      *   Christy Olinger Edwards beat the Catalyst Queen, who lost 34% of the votes
      in Baldwin County.

      *   Elliott had close to $600,000 in campaign coffers but struggled against
      Northcutt.


      THE PIVOT

      *   Article 2 proves that Catalyst was losing significant political power and
      facing defeat (½ win), contradicting the implied strength suggested by Article
      1''s focus on their operations and fundraising.

      *   The election results mentioned in Article 2 provide context for the political
      environment surrounding Elliott and Dorsey''s attempts to gain office mentioned
