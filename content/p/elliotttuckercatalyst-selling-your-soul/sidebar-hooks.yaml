  snakes-in-the-schools:
    brief: 'THE CONFLICT

      *   Chris Elliott and Tucker Dorsey are dumping tens of thousands of dollars
      donated by Catalyst for election purposes.

      *   Elliott and Dorsey secured a mega-site deal valued at 35 million dollars
      for a cow pasture using BP money to repair county infrastructure.

      *   Chris Elliott forced the penny tax down Baldwin County without any voter
      approval.

      *   Chris Elliott used schools and political tools as a highway to office.


      THE DISCOVERY

      *   Jonathan Gray works for both Chris Elliott’s campaign and the Baldwin County
      School System, potentially using school resources while collecting campaign
      money.

      *   The Business Council of Alabama (BCA) contributed $35,000 to Elliott, indicating
      he is indebted to the BCA’s backroom politics.

      *   The county commission permanently extended the penny tax for the School
      System without voter approval, a move opposed by Superintendent Eddie Tyler.


      THE PIVOT

      *   Article 2 provides concrete evidence (BCA contribution, Jonathan Gray''s
      dual role) showing the institutional corruption and political maneuvering that
      underpins Elliott’s campaign funding described in Article 1.

      *   Article 2 proves that Elliott is not just a candidate but a figure who manipulates
      school systems and political bodies using illicit financial ties, validating
      the claim that he is "selling his soul" for Catalyst interests.


      KEY ENTITIES

      *   Chris Elliott

