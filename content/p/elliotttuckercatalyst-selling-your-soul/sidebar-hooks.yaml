  catalyst-candidate-elliott-panic-mode:
    brief: 'THE CONFLICT

      *   Chris Elliott and Tucker Dorsey are running for office in Baldwin County
      State Senate District 32.

      *   Elliott and Dorsey were involved in a "good ole boy deal" involving Catalyst
      and BP money to repair county infrastructure (specifically, a $35 million cow
      pasture mega-site).

      *   Elliott is accused of skimming $4 million from the school 1% tax annually,
      resulting in $40 million going into the county general fund every 10 years.


      THE DISCOVERY

      *   Chris Elliott used his position to obtain a reduced suspension for a DUI
      arrest (45 days instead of the standard 90 days).

      *   Elliott''s political handler, Jon Gray, confirmed Elliott used his position
      to avoid consequences for the DUI.

      *   Elliott used fraudulent advertising in a campaign by replacing "results
      may vary" with "state of the art."


      THE PIVOT

      *   Article 2 reveals that Elliott’s history includes questionable behavior
      (narcotics dispensing allegations and manipulation of legal proceedings) which
      connects to the broader theme in Article 1 of selling influence ("selling your
      soul") through public works deals funded by Catalyst.

      *   The legal maneuvering documented in Article 2 proves Elliott is willing
      to use illicit means to secure political positions, validating the premise that
