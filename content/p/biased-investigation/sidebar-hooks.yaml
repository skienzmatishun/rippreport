  cover-up:
    brief: |-
      THE CONFLICT
      Otis "O.J." French Jr. was shot and killed by Bay Minette police officers on August 20, 2021.
      Baldwin County Major Crimes Unit (MCU) Lt. Andre Reid stated body camera footage of the incident will not be available during investigation; officer’s identity withheld “to respect privacy.”
      Family, friends, and community demanded answers from Bay Minette Police Department and MCU.
      MCU consists of member chiefs including Bay Minette Chief Al Tolbert, Robertsdale Chief Brad Kendrick, Sheriff Huey “Hoss” Mack, Gulf Shores Chief Edward Delmore, Daphne Chief David Carpenter, and Foley Chief Thurston Bullock.
      Bay Minette Police Chief Al Tolbert is identified as the current chairman of BCMCU, investigating fellow members.
      Mayor Bob Wills refused to confirm officer’s name or provide transparency when contacted by Lagniappe reporter Scott Johnson.

      THE DISCOVERY
      Mayor Bob Wills sent a letter to Tamara French (O.J.’s sister) stating allegations of cover up are “without merit.”
      The Ripp Report obtained the letter, citing Wills’ history of ethics complaints and Alabama Bar complaints regarding self-dealing.
      Baldwin County Commission Attorney Brad Hicks stated he sees no ethics violation with Mayor Wills renting his building to Baldwin County Legislative Delegation.
      Mayor Wills is accused of self-dealing via a lease deal where rent for initial 5 years set at $245,000; lease extensions total approximately $867,000 in projected rent to Wills’ entities.
      Alabama Attorney General Steve Marshall accused Ethics Commission Executive Director Mr. Albritton of fraud and self-dealing in his oversight of Mabel Amos Memorial Fund; complaints dismissed.
      Albritton is still paid as Executive Director despite three lawsuits and dismissed ethics complaints by the same commission that would address Wills’ conduct.
      After shooting, officers scheduled for AltaPoine Health training in mental health de-escalation and firearms conflict resolution.

      THE PIVOT
      Article 1 highlights the MCU’s refusal to release footage or officer identity, framing it as “no transparency” and biased self-investigation.
      Article 2 links Mayor Wills to financial conflicts of interest (building leases) and a compromised regulatory environment (Albritton/Bar dismissing similar self-investigations).
      The refusal to name the officer (Article 1) aligns with Article 2’s claim that Mayor Wills and officials are engaging in a cover up.
      BCMCU leadership (Chief Tolbert) investigating itself supports Article 1’s claim that accountability is impossible.
      Article 2 validates the narrative in Article 1 that Baldwin County officials prioritize protecting each other over public justice.

      KEY ENTITIES
      Otis "O.J." French Jr. (Victim)
      Tamara French (Victim’s Sister)
      Mayor Bob Wills (Bay Minette Mayor)
      Lt. Andre Reid (Baldwin County MCU Lieutenant)
      Bay Minette Police Chief Al Tolbert (BCMCU Chairman)
      Sheriff Huey “Hoss” Mack (Baldwin County Sheriff)
      Mr. Albritton (Executive Director, Ethics Commission)
      Scott Johnson (Lagniappe Reporter)
      Brad Hicks (Baldwin County Commission Attorney)
      Mr. Mabel Amos Memorial Fund
