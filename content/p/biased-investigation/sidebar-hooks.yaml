  JUDGE-VS-SHERIFF:
    brief: |-
      THE CONFLICT:
      - Otis French Jr., Bay Minette resident, shot and killed.
      - Baldwin County MCU Lt. Andre Reid stated body camera footage of incident will not be available during investigation to "respect privacy."
      - Bay Minette Police and city officials refuse to release the name of officer involved in shooting French.
      - Reporters (Scott Johnson) contacted Mayor Bob Wills and City Council members; most hung up or refused to answer.
      - Community claims officer involved with French's death has been reinstated despite ongoing investigation.
      - Community formed Bay Minette Justice League due to lack of answers and prior police brutality complaints in area.

      THE DISCOVERY:
      - 2021 Alabama Supreme Court ruling (Lagniappe v. Mack): Associate Justice Greg Shaw wrote majority decision.
      - Ruling declared law enforcement investigative reports, field notes, witness statements, and recordings are "privileged communication protected from disclosure."
      - Chief Justice Tom Parker was the only judge to dissent.
      - Baldwin County Sheriff Hoss Mack maintains a separate Major Crimes Division that investigates officers (Article notes BCSO "NEVER been held responsible").
      - District Attorney Robert Wilters and Sheriff Hoss Mack joined forces to ask judge to reverse a ruling ordering return of seized Camaro.
      - Then-Senator Trip Pittman sponsored Senate Bill 312 setting qualifications for Baldwin County Sheriff; Article notes this allowed Hoss Mack to eliminate political competition.
      - Trip Pittman was reported to have awarded himself $750,000 in B/P money three years prior to Bill 312.

      THE PIVOT:
      - Widget identifies the specific legal mechanism (Lagniappe v. Mack/2021 ruling) that Main Article claims "stripped the media and public of any right to sue" for footage.
      - Widget confirms Sheriff Mack's alleged political influence ("influenced which judges got elected") over BCSO operations.
      - Widget confirms the 30+ year relationship between Sheriff Hoss Mack and DA Robert Wilters as a key vector for bypassing accountability in cases like Otis French Jr.

