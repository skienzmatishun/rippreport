        - Bay Minette Police Chief Al Tolbert (MCU Chairman)
        - Robertsdale Chief Brad Kendrick
        - Gulf Shores Chief Edward Delmore
        - Daphne Chief David Carpenter
        - Foley Chief Thurston Bullock
