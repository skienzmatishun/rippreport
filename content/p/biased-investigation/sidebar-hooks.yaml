      - Internal composition of BCMCU validates Main Article’s claim that investigation will be biased/no accountability (Sheriff Mack and Chief Tolbert overseeing French killing).
      - Widget details the refusal to release independent info aligns with Main Article’s claim of "no transparency" despite community pressure and reporter Scott Johnson's attempts to get answers.

