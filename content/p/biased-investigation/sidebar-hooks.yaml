  wrongful-conviction:
    brief: |-
      THE CONFLICT:
      - Bay Minette Police/Major Crimes Unit investigate death of Otis French Jr. without releasing officer name.
      - MCU Lt. Andre Reid withholds body camera footage citing privacy and claims Alabama Supreme Court strips public right to sue for footage.
      - Allegation: 8 individuals killed by BCSO; Otis French Jr. was unarmed during an eviction dispute-style incident where police fired 114 rounds.
      - Baldwin County Sheriff’s Office cited in history of withholding info in cases like Murray Lawrence Jr.

      THE DISCOVERY:
      - Current investigation leads reveal exact personnel who handled the Murray Lawrence Jr. wrongful conviction case.
      - Lt. Hoss Mack served as lead investigator in Murray Lawrence Jr. murder trial where he “never produced one shred of evidence” despite 2005 conviction; Mack is now Baldwin County Sheriff.
      - Judge Robert Wilters was in Murray Lawrence Jr. case; Wilters is currently District Attorney of Baldwin County.
      - Retired DA David Whetstone was prosecutor in Murray Lawrence Jr. case; Whetstone remains linked to BCSO corruption narrative.
      - Baldwin County Major Crimes Unit (BCSU) investigated the initial O.J./Otis French Jr. killings where no officers were found responsible despite nine deaths.

      THE PIVOT:
      - Article 2 exposes that the Hoss Mack/Robert Wilters/David Whetstone circle is currently in power for the French Jr. investigation.
      - The behavior (withholding evidence, non-release of footage) in the French Jr. case mirrors the outcome where Mack never produced forensic evidence against Lawrence Jr.
      - The same "Major Crimes Division" that allegedly buried evidence in Murray Lawrence case is now using identical tactics on Otis French Jr.

      KEY ENTITIES:
      - Hoss Mack (Current Baldwin County Sheriff; former MCU Lt./Investigator)
      - Robert Wilters (Current District Attorney of Baldwin County; former Judge)
      - David Whetstone (Retired DA; Prosecutor for Murray Lawrence Jr.)
      - Willy Huntley (Defense Attorney for Murray Lawrence Jr.)
      - Lt. Andre Reid (MCU Lieutenant with Bay Minette Police)
      - Otis French Jr. (Victim of police shooting, Bay Minette)
      - Murray Lawrence Jr. (Wrongful conviction prisoner since 2005)
      - Bob Wills (Mayor of Bay Minette; accused indifference to French Jr. case)
