      - Community formed Bay Minette Justice League (BMJL) demanding transparency; police account labeled "doesn’t make sense" by local community.
      - Main Article Mayor Bob Wills identified as indifferent; BMJL cites prior complaints ignored by city council.

      PIVOT:
