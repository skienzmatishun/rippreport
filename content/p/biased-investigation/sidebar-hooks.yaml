  rumors:
    brief: |-
      THE CONFLICT
      - O.J. French, 32, shot and killed by Bay Minette police officer on August 20 during a vehicle equipment violation stop.
      - Baldwin County MCU (Lt. Andre Reid) refused to release body camera footage or name the officer; cites privacy and Alabama Supreme Court rulings.
      - Public demand: Bay Minette Justice League formed by community to protest lack of answers and indifference from Mayor Bob Wills/City Council.
      - Pattern: 8 previous deaths investigated by BCMCU (Baldwin County Sheriff’s Office). In all prior cases, investigation found no police at fault; footage withheld.
      - Jonathan Victor Incident: Unarmed victim shot 4 times by Sheriff’s Deputy Hunady at 7 yards; case resulted in immunity denial rulings.

      THE DISCOVERY
      - Alabama Supreme Court Ruling: Stripped media/public right to sue for police body camera footage; declared "investigative" records exempt from open records law, even if investigation closed.
      - BCMCU Credibility Flaw: Bay Minette Police Chief Al Tolbert serves as chairman of the Major Crimes Unit investigating his own department's officers.
      - Immunity History: Judge William Cassady denied Deputy Hunady and Sheriff Huey "Hoss" Mack qualified immunity in the Victor case because Mack provided untrue facts.
      - Specific Allegation: Rumors identify Brandon Thompson as the alleged shooter; Thompson reportedly previously fired by Bay Minette and other forces.
      - Budget Discrepancy: Sheriff Mack requested $600,000 taxpayer funds for cameras promising transparency but has refused to release footage of incidents.

      THE PIVOT
      - Article 2 explains the legal mechanism (Supreme Court ruling) for Article 1’s claim that footage is being legally withheld.
      - Article 2 connects O.J. French case to the Jonathan Victor case, revealing Sheriff Mack and BCMCU bias as a recurring pattern rather than isolated incident.
      - Article 2 validates structural corruption claims: confirms rumors of officers being fired and rehired across municipalities.

      KEY ENTITIES
      - O.J. French (Victim)
      - Jonathan Victor (Victim/Precedent Case)
      - Huey "Hoss" Mack (Sheriff, Baldwin County)
      - Andre Reid (Lieutenant, Baldwin County MCU)
      - Al Tolbert (Chief Bay Minette Police/BCMCU Chairman)
      - Brandon Thompson (Alleged Shooter)
