  chuckee-cheeze:
    brief: 'THE CONFLICT

      Chuckee Cheeze received an award from the Alabama Press Association for Freedom
      of Information requests and First Amendment Rights based on a story that turned
      out to be bogus. Cheeze used his position at The Courier (Catalyst media outlet)
      to obtain non-public information concerning corruption in Fairhope via back
      doors, not through FOIA requests.


      THE DISCOVERY

      The Fairhope Courier, managed by Chuckee Cheeze, was used to promote Catalyst
      candidates and special interests. The newspaper received an award for a bogus
      story that cost the city thousands of dollars. Furthermore, Chuckee failed to
      report that the Catalyst Fairhope City Council assisted former employees in
      suing the City to humiliate the Mayor.


      THE PIVOT

      Article 2 proves that Cheeze’s reporting is not independent journalism but is
      controlled by Catalyst and special interests. This shows that his award was
      for a fraudulent story, directly undermining his credibility as a journalist
      pursuing the truth (as he claimed) and confirming he is operating as a mouthpiece
      for political hacks.


      KEY ENTITIES

      Chuckee Cheeze

      The Courier (The Fairhope Courier)

      Catalyst

      Fairhope City Hall

      Alabama Press Association

      Sherry Sullivian

      Jenniffer Fiddler

      Pandora Heathcoat

      Jack Burrell

      Fairhope Airport

      Robert Brown

      Fairhope Art Center

      Fairhope Catalyst Council'
