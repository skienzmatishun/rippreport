  catalyst-held-back:
    brief: 'THE CONFLICT:

      *   Chris Elliott won a race against David Northcutt by only 742 votes.

      *   Elliott was a Catalyst candidate.


      THE DISCOVERY:

      *   Catalyst secured only one race by a significant margin despite having over
      $500,000 thousand dollars behind candidates.

      *   Catalyst failed to secure an outright victory in three races (Thomason,
      Elliott, and Dorsey).

      *   Catalyst had significantly more funding than the People’s Choice ($500,000
      thousand dollars vs. less than $10,000).


      THE PIVOT:

      *   Article 2 proves that Catalyst''s limited success in elections is due to
      structural weaknesses and inadequate resource distribution, directly undermining
      Elliott’s perceived credibility mentioned in Article 1.

      *   The financial disparity shown in Article 2 highlights why Elliott’s narrow
      victory in Article 1 was an anomaly, not a sign of overall party strength.


      KEY ENTITIES:

