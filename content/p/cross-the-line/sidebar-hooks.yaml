  catalyst-birds-of-the-same-feather:
    brief: 'THE CONFLICT:

      *   Chris Elliott won a race by only 742 votes against the better Republican
      candidate, David Northcutt.

      *   The Main Article links a vote for Chris Elliott directly to a vote for CATALYST.


      THE DISCOVERY:

      *   Catalyst is defined as a political cancer that hand-picks candidates.

      *   Catalyst was founded by Stacy Elliott and Haygood.

      *   Catalyst operates by placing candidates in numerous positions (County Commission,
      Probate Judge, State Senate, four County Commission races).

      *   Catalyst uses intimidation and bully tactics to suppress non-aligned candidates.


      THE PIVOT:

      *   Article 2 reveals that the slim victory of Chris Elliott was facilitated
      by Catalyst''s mechanism of controlling candidate placement ("Place as many
      candidates in as many positions as possible"), which explains his narrow win
      margin described in Article 1.


