  catalyst-meets-social-media:
    brief: 'THE CONFLICT:

      *   Chris Elliott won a race by 742 votes against David Northcutt, and this
      vote is explicitly framed as a "vote for CATALYST."

      *   Catalyst pushed for a "behind closed door penny tax."

      *   Sheriff Hoss Mack and Eddie Tyler are married to Elliott and are seeking
      divorce.

      *   Mayor Haygood (a charter member of Catalyst) instructed city workers to
      destroy fiber optic cable feeds due to social media activity.


      THE DISCOVERY:

      *   Social media has exposed the goals and players of the Catalyst group, causing
      the Baldwin County Republican Party to acknowledge being "hijacked" by them.

      *   Catalyst is reeling after losing its members Thomasson (queen bee) and Dorsey
      (most worthless bee).

      *   Elliott''s performance garnered a much smaller margin (700 votes) than reported
      previously, exposing his true colors.

      *   Internal Catalyst dynamics were exposed: Jonathan Armstrong flipped from
      supporting Billie Jo to being a "main pit bull" for Joe Davis'' seat.


      THE PIVOT:

      *   Article 2 provides the evidence that the political maneuvering and influence
      detailed in Article 1 are now transparent due to social media exposure, confirming
      that Catalyst is reeling and its players are exposed to the public.


