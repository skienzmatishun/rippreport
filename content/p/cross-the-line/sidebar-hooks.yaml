  catalyst-alabama-values:
    brief: 'THE CONFLICT

      *   Chris Elliott was appointed to the Baldwin County Commission by Governor
      Robert Bentley.

      *   Elliott is running for State Senate Seat 32, vacated by former Senator Tripp
      Pittman.

      *   Tripp Pittman took $750,000 of BP money and maintained municipal contracts
      with Fairhope while serving as a Senator representing Fairhope.


      THE DISCOVERY

      *   Chris Elliott was appointed to the Commission through an orchestrated process
      (implied manipulation).

      *   Elliott was a partner of Elliott Haygood and Stacy, who used a consultant
      company to "guarantee" election wins for candidates ("Catalyst").

      *   Catalyst aimed to take control of the Baldwin County Commission and Mayor
      seats across 14 municipalities.

      *   The plan to control the system failed after Tim Kant''s defeat in Fairhope.


      THE PIVOT

      *   Article 2 proves that Chris Elliott’s current political positioning (as
      a Catalyst candidate) is not legitimate but was engineered by power brokers
      (Stacy/Haygood).

      *   This historical context explains the implication in Article 1 that Elliott
      is "bought and paid for" and his success is based on manipulation rather than
      merit.


      KEY ENTITIES

      *   Chris Elliott

      *   Robert Bentley

      *   Tripp Pittman

      *   Fairhope

      *   Catalyst

      *   Elliott Haygood

      *   Stacy

      *   David Northcutt'
