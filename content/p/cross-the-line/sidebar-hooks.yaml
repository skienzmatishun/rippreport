  catalyst-trifecta:
    brief: 'THE CONFLICT:

      *   Chris Elliott won by 742 votes over David Northcutt in a recent election.

      *   Elliott used "dirty tricks" to secure his victory.

      *   Catalyst is characterized as a group of corrupt politicians and business
      owners obstructing Fairhope Government.


      THE DISCOVERY:

      *   The Catalyst Trifecta includes Billie Joe Underwood (County Commission,
      District three), David Northcutt (State Senate Seat 32), and Christy Olinger
      Edwards (Court of Civil Appeals Judge, Place 1).

      *   Chris Elliott has raised $500,000 in his campaign and could raise up to
      $700,000 for a job paying $42,000.

      *   Millionaire Tucker Dorsey is listed as another Catalyst candidate on the
      County Commission.


      THE PIVOT:

      *   The Widget Article provides context that Elliott’s narrow victory in the
      Main Article was part of a larger "Catalyst Trifecta" organized by groups like
      Catalyst and involving specific officials, revealing the structure behind his
      political maneuvering.


      KEY ENTITIES:

      *   Chris Elliott

      *   David Northcutt

