      *   The municipal attorney and Municipal Judge positions are appointed by the
      city council and are affiliates of CATALYST.

      *   The city attorney allegedly botched the McSherry case on purpose, indicating
      CATALYST involvement in legal manipulation.


      THE PIVOT:

      *   Article 2 provides the structural evidence showing that Elliott''s narrow
      victory (Article 1) was enabled by or inseparable from the established, entrenched
      power structure and institutional control exerted by CATALYST (Article 2).

      *   CATALYST controls key appointments (Judge/Attorney) and local governance
