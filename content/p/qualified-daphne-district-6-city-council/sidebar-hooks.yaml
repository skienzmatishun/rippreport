      park property conversion.

      - Article 2 (Widget): Documents May 29th Fairhope City Council meeting; Accuses
      Council of acting like a "Dictatorship" by overruling Mayor, staff, and citizens.

      - Article 2: Specific council decisions on May 29th overruled Mayor''s staff
      recommendations (Twin Beech Road, Dyas/Triangle property).

      - Article 2: Council President Burrell unable to recall origin of Dyas/Triangle
      easement proposal.

      - Article 2: City Council overruled citizens/Mayor on Fly Creek Apartments project.


      2. THE DISCOVERY:

