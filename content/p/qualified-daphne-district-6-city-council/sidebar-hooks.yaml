      "stone deaf" Mayor/Council with a qualified candidate for Lake Forest (Second
      largest subdivision in Alabama). Issue areas: Flooding, converting park property
      to commercial. Main Article characterizes Daphne officials as "good ole boys".
      Widget details corruption in Fairhope/Baldwin County under Mayor Kant (Fairhope)
      and Commissioners Dorsey/Elliot (Baldwin).


      THE DISCOVERY: Widget Article (dated 2016/06) identifies specific financial
      corruption and conflicts of interest for Fairhope/Baldwin County leadership.
      Mayor Kant (Fairhope) holds dual salary as Utilities Director; took >$50,000
      from out-of-town donors (50%+). Refused moving sewer system inland ($10m "band
      aid" upgrade, missed opportunity for BP grant). Commission Dorsey/Elliot (Baldwin
      County) refuse to fly flag at half mast, fired Pittman Kant BP fraud whistleblowers.


      THE PIVOT: Article 2 (Widget) provides the specific evidence ("smoking gun")
