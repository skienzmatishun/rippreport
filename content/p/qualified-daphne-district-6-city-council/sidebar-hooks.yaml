      in adjacent municipalities.


      KEY ENTITIES: Dr. Byrian Ramsey, Lake Forest, Daphne District 6 City Council,
      Howell Gibbens, Fairhope City Council, Robert Brown, Angelo Corte, Catalyst
      / Scott Boone, The Ripp Report, Baldwin County.'
