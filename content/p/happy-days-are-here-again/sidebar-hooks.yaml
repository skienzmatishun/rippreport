    brief: 'THE CONFLICT

      *   Past administration baggage was inherited by the new Fairhope City Council.

      *   The City Council refused to take action on behalf of citizens regarding
      the Fly Creek Apartments project.


      THE DISCOVERY

      *   The City Council sided with the developer and rejected pleas related to
      the Fly Creek Apartments and the approved MOP Site Plan.

      *   The Fairhope Planning Commission acted inconsistent with Ordinance 1572,
      acting arbitrarily and capriciously.


      THE PIVOT

      *   Article 2 provides a specific example of how the current City Council failed
      its duty to citizens (by ignoring development disputes), which is the "baggage"
      mentioned in Article 1 that needs transparency.


