  fairhope-no-hope-fauxhope:
    brief: 'THE CONFLICT

      *   The new city council inherited "baggage" from the previous administration
      regarding issues and citizen complaints.

      *   Mayor Wilson made efforts to reach out to the African American community
      prior to her election.

      *   Mayor Wilson''s efforts were blocked by the City Council, which operates
      like a "criminal enterprise."


      THE DISCOVERY

      *   The municipal government has consistently represented the status quo, maintaining
      a wealth gap between affluent residents and the working poor/African American
      community ("No-Hope").

      *   The City Council engaged in a political and racist action by purchasing
      $2.65 million in land near the Airport, avoiding poorer neighborhoods.

      *   "FAUX-HOPE" (the status quo) is the vehicle for corruption and cover for
      accountability.


      THE PIVOT

      *   Article 2 reveals that the underlying cause of the political baggage and
      ongoing issues mentioned in Article 1 is the systemic inequality and corruption
      perpetuated by the City Council''s actions regarding land use and community
      representation.

      *   The council''s perceived failure to support the African American community
      directly explains why Mayor Wilson’s efforts were blocked, justifying the need
      for internal reviews discussed in Article 1.


      KEY ENTITIES

      *   Mayor Wilson

      *   City Council

      *   Kelly Wilson (twin)

      *   Lynn Oldshue (Investigative Reporter/Administrator)

      *   Pastor Chris Bell (3 Circle Church)

      *   $2.65 million (land purchase cost)

      *   African American Community'
