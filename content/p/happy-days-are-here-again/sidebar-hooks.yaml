  FAUXHOPE HISTORY:
    brief: 'THE CONFLICT

      Past administration left baggage in Fairhope city government regarding historic
      preservation and development policies. Specific issues include the demolition
      of historic buildings and conflicting priorities between preservation and commercial
      projects.


      THE DISCOVERY

      The current Mayor and Council are 100% pro-development, prioritizing infrastructure
      for commercial projects (like the Municipal Judges east side project) and providing
      city services to developers first, despite historical conservation concerns.
      A draft historic preservation ordinance was introduced months after building
      demolitions occurred.


      THE PIVOT

      Article 2 reveals that the systemic issue of development control over preservation
      is the core "baggage" inherited by the new council discussed in Article 1. This
      proves the council''s current stance is financially motivated and politically
      aligned with developers, undermining transparency.


