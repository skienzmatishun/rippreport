      review needs discussed in Article 1) are rooted in larger, unresolved financial
      and political disputes concerning state revenue (gas tax/BP money) across Baldwin
      County.

      *   The fight for fair gas tax distribution is the systemic issue causing the
      "baggage" mentioned in the Main Article.


