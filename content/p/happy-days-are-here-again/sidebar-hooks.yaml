      other part-time employees.

      *   Council members (Burrell, Boone, Brown) engaged in a property purchase of
      2.6 million dollars without public hearing.

      *   Councilman Brown secured the soccer field clubhouse/bathroom contract for
      over $750,000, which was linked to an ESAC contract award.

      *   The Council almost succeeded in giving away 102 acres of municipal property.

      *   The Council President (Jack Burrell) led a "dog and pony show" for over
      seven years.


      THE PIVOT

