      Arthur Corte proposed the project.

      *   Arthur Corte instructed Mayor Kant to get the project approved.

      *   A vote for Mayor Kant guarantees the 250 Apartments at Fly Creek and a gas
      station.

      *   A vote for Mayor Wilson will kill the deal and save taxpayers and protect
      the creek.


      THE PIVOT

