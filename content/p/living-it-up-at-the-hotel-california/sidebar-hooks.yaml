  dirty-little-secrets:
    brief: 'THE CONFLICT

      - Mayor Kant and Public Works Director Jennifer Fidler skipped a planning and
      zoning meeting on Monday night to attend an "America in Bloom" vanity award
      event in Southern California.

      - The Fairhope Planning Commission voted 4-2, including votes from Mayor Kant
      and Jennifer Fidler, to approve the controversial Fly Creek Apartment deal.

      - Mayor Kant is leaving office; Karin Wilson will be the next mayor.


      THE DISCOVERY

      - The City of Gulf Shores Planning and Zoning is not following its own Ordinance
      (Section 3-3E).

      - A citizen named Rex Lawson uncovered an omission in the "Findings" section
      of the Zoning Ordinance regarding the Regency Place Apartments Site Plan, forcing
      the City Attorney to advise the Mayor to resubmit the plan.

      - The City intentionally stopped using the "Land Use Plan" criteria when making
      recommendations to the Planning Commission, despite it being a critical consideration
      for City Staff in 2014, 2015, and 2016.


      THE PIVOT

      - Article 2 proves that the planning commission/city staff are deliberately
      disregarding established zoning ordinances and land use plans (as seen with
      the Regency Place Apartments issue).

      - This systemic failure justifies why Mayor Kant and Director Fidler were absent
      from critical meetings and ignored regulations, indicating corruption or intentional
      disregard for legal requirements.


