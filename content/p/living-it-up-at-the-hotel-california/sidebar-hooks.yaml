      THE DISCOVERY:

      *   The Daphne Planning and Zoning Board rejected a zoning change request for
      a parcel at the entrance to Daphmont Subdivision.

      *   Fairhope and Daphne Planning and Zoning boards operate independently and
      do not communicate regarding municipal decisions.

      *   Residents in Daphmont opposed re-zoning due to negative effects (e.g., school
      bus issues, crime, congestion).


      THE PIVOT:

      *   Article 2 demonstrates a pattern of independent, non-communicating zoning
      decisions between Fairhope and Daphne, suggesting systemic failures or differences
      in handling development projects compared to the contentious Fly Creek situation
      described in Article 1.

      *   The rejection of the Daphmont re-zoning request by the Daphne board mirrors
      community opposition seen regarding the Fly Creek Apartments project in Fairhope
      (9 meetings held with 99% opposition).


