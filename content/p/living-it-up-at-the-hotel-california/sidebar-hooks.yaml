  dirty-little-secrets:
    brief: 'THE CONFLICT:

      *   In Gulf Shores, city officials failed to adhere to Section 3-3E ("Findings
      and Conclusions") of the Zoning Ordinance.

      *   Citizen Rex Lawson identified this "technical deficiency" in planning Site
      Plan documents.

      *   City Attorney advised Mayor Robert Craft to return the Regency Place Apartments
      Site Plan for review by the Planning Commission on August 17, 2018.


      THE DISCOVERY:

      *   The Widget Article reveals a systemic pattern where municipal bodies (Gulf
      Shores City Staff) have historically followed and later abandoned required planning
      criteria (specifically referencing the "Land Use Plan" used in recommendations
      from 2014 to 2016).

      *   It demonstrates an established precedent for officials dismissing public/citizen-identified
      regulatory flaws as mere administrative oversights ("technical deficiencies")
      rather than substantive failures.


      THE PIVOT:

      *   The Gulf Shores case provides a historical blueprint for the actions taken
      by Mayor Kant and Jennifer Fidler in Fairhope’s recent Fly Creek Apartment deal
      approval, suggesting the absence and failure to address planning oversight are
      not isolated incidents but reflect broader institutional disregard for zoning
      adherence when high-density projects are involved.


      KEY ENTITIES:

      *   Andy Bauer (Director of Planning and Zoning)

