      for "no legitimate reason."

      *   The Fairhope Planning Commission voted 4-2 on the controversial Fly Creek
      Apartment deal.

      *   Mayor Kant was preparing for his transition out of office (30 days remaining).


      THE DISCOVERY

      *   Mayor Kant used the last two planning and zoning board meetings to push
      through development projects for campaign contributors.

      *   Kant announced a Performing Arts Center consulting search with a potential
      cost of $35,000.

      *   Kant supported Angelo Corte''s attempt to go back to court on September
      6, 2016, regarding the Fly Creek Apartments decision.


      THE PIVOT

      *   Article 2 reveals that Mayor Kant’s absence and the subsequent zoning decisions
      (mentioned in Article 1) were not random but deliberate "transition moves" designed
      to benefit specific developers and law firms, proving intent behind the controversial
      votes.


