hooks:
  ki-yay-mother-yippee:
    brief: |-
      THE CONFLICT:
      - Mo Brooks is running for U.S. Senate seat (May 24, 2022 primary).
      - Brooks advocates strict 10th Amendment interpretation.
      - Alabama left $3.2 billion on the table by opting out of Medicaid expansion.
      - Alabama currently cannot fund I-10 Bayway “Truck Bridge” due to lack of money and refusal/reluctance of federal funds.
      - Fairhope City Council released a sketch for a handicapped-accessible pier tram project while rejecting broader state infrastructure aid.

      THE DISCOVERY:
      - A speech from Mo Brooks dating to 2011 has resurfaced; Article states this is "sure to derail Mr. Durant’s [Brooks] purchasing of a Senate seat with money and celebrity."
      - Mo Brooks lost the Trump endorsement.
      - Alabama Legislature allocates 3 percent of General Fund Budget to Court System ethics, but spend it on secret no-bid contracts.
      - Article alleges Presiding Judge Mary Edna Windom is married to Steve Windom, who is one-third owner of the software firm that runs the court system computer infrastructure.

      THE PIVOT:
      - Article 2 provides a specific political scandal (the 2011 speech) attached to Mo Brooks in Article 1.
      - While Article 1 claims Brooks' 10th Amendment stance is hurting Alabama's bridge funding, Article 2 proves his Senate seat viability is tied to past ethical controversies.
      - Both articles highlight Alabama leadership prioritizing political ideology and insider deals over functional infrastructure (bridge vs. pier) and transparency (court budget).

      KEY ENTITIES:
      - Mo Brooks
      - I-10 Bayway “Truck Bridge”
      - Fairhope City Council
      - Steve Windom
      - Mary Edna Windom
      - Alabama Court System
    generated_at: '2026-03-16T11:42:11.552191Z'
    text: Mo Brooks screams about the 10th Amendment to block bridge funding while Alabama infrastructure rot sets in. While he plays the patriot, the Windom family quietly runs a no-bid software monopoly over the state court system to line their own pockets with your tax dollars.
  fingerprint:
    brief: |-
      1 THE CONFLICT
      - Alabama I-10 Mobile River/Truck Bridge project proposed to secure federal funding.
      - Mo Brooks: Supports bridge but argues against federal money; cites 10th Amendment.
      - Jack Burrell: Opposed federal assistance initially but stated he "would take the money" if offered.
      - State unable to fund bridge; lacks funds for education, prisons, healthcare.
      - Alabama left $3.2 billion on table by not participating in Medicaid expansion/programs compared to neighbors.
      - Alabama Trucking Association (Mark Colson, CEO) called federal plan unconstitutional under Commerce Clause.
      - Political officials claim bridge is local issue but cannot execute without Washington funds.

      2 THE DISCOVERY
      - Eastern Shore Metropolitan Planning Organization held a 4.5-hour meeting regarding the bridge/toll project.
      - All Baldwin County elected officials unanimously voted against "Poison Ivy" (bridge/toll initiative).
      - Citizen "Stop the toll petition" gathered 50,000 signatures.
      - Officials began flipping positions on the project after petition reached 50,000 signatures one month prior.
      - Former State Senator Pittman appeared; declared opposition despite having $750,000 BP contracts.
      - "Poison Ivy" withdrew support/plan within 38 minutes of the meeting conclusion.
      - Not one person in a standing room only chamber supported the toll bridge project.

      3 THE PIVOT
      - Article 2 proves officials (who rely on public support) fear being voted out if associated with the toll bridge.
      - Reveals a 100% turnout of Baldwin County officials against their own infrastructure project.
      - Demonstrates the bridge plan failed politically within 38 minutes of a vote, contradicting claims that it will be funded locally.
      - Unanimous opposition by politicians who should be the enforcers of the plan proves Article 1’s claim that they are "falling off the bridge" is accurate.

      4 KEY ENTITIES
      - Mo Brooks (U.S. Senate candidate/Representative)
      - Jack Burrell (Governor of Alabama)
      - Mark Colson (President/CEO, Alabama Trucking Association)
      - Former State Senator Pittman
      - Baldwin County elected officials
      - Eastern Shore Metropolitan Planning Organization (ESMPO)
    generated_at: '2026-03-16T11:42:11.552212Z'
    text: Mo Brooks and Jack Burrell swear they hate federal money until the bill for the I-10 bridge actually comes due. These cowards folded in just thirty-eight minutes once they saw fifty thousand angry citizens signing a petition against their toxic toll plan.
  faux-tax-gas-tax:
    brief: |-
      THE CONFLICT:
      Alabama officials block federal aid for I-10 Bayway Truck Bridge on 10th Amendment grounds. Mo Brooks states funding decisions shouldn't be in Washington but Alabama is broke and can't fund Medicaid, education, or prisons. State government left $3.2 billion on the table by not participating in Medicaid expansion. Alabama neighbors are generating billions via lottery, gambling, and marijuana legalization while Alabama studies whether it is feasible.

      THE DISCOVERY:
      Governor Kay Ivey calls a special session (March 2019) to consider a gas tax increase. The proposed package includes a bond issue for Alabama State Docks and Mobile Bay ship channel dredging, marketed as "infrastructure." Business Council of Alabama (BCA) and Jim Page lobby for the tax to make Alabama "competitive." Senator Chris Elliott publicly supports the plan.

      THE PIVOT:
      Article 2 exposes the funding mechanism for the bridge crisis mentioned in Article 1. It identifies Chris Elliott as a primary supporter and links him to previous corruption regarding the "penny tax" which skimmed 200,000/year from Baldwin County Schools under Frank Burt. This proves the bridge funding plan is backed by politicians known for prioritizing tax collection over fiscal ethics, validating Article 1's claim that Alabama leadership fails constituents.

      KEY ENTITIES:
      Mo Brooks, Jack Burrell, Kay Ivey, Chris Elliott, Frank Burt, Jim Page, Business Council of Alabama (BCA), Mark Colson
    generated_at: '2026-03-16T11:42:11.552227Z'
    text: Mo Brooks blocks federal bridge aid to prove he is a conservative hero while the state budget bleeds out. Now Senator Chris Elliott wants to hike your gas tax after years of skimming money from Baldwin County schools under the infamous penny tax scheme.
  trolls-for-tolls:
    brief: |-
      THE CONFLICT
      - Alabama Bayway I-10 "Truck Bridge" project stalled due to funding. Mo Brooks (U.S. Senate candidate) supports bridge but argues 10th Amendment opposes federal funding control.
      - Jack Burrell backs project but earlier claimed opposition to federal assistance. Sherry Sullivan (Fairhope Mayor) admits tolls are inevitable: “Obviously, there’s going to be a toll.”
      - Federal lawsuit in Rhode Island argues truck-only tolls discriminate against out-of-state companies, violating Commerce Clause; Mark Colson (Alabama Trucking Association) reiterates plan unconstitutional.
      - Alabama refuses Medicaid expansion, ignoring $3.2 billion in federal table funds while neighbors use lottery/marijuana revenue for infrastructure.

      THE DISCOVERY
      - Price tag is $2.2 billion; ALDOT and local leaders have available roughly $375 million ($250M state + $125M federal at risk).
      - Jon Gray (political strategist) admits ALDOT/leaders “turned over every stone in Washington and Montgomery looking for additional funding” to no avail.
      - Jim Zigler’s Facebook group “blockthetolls” gained 50,000 likes; forced politicians to flip from ignoring tolls to a unified front FOR tolls.
      - Jack Burrell explicitly states: “We don’t see money coming from the federal infrastructure bill to pay for the bridge. We don’t see (additional) state money coming.”

      THE PIVOT
      - Article 2 is the “smoking gun” because it confirms politicians rely on toll revenue to bypass their own "anti-federal" funding stance (Brooks/Burrell rhetoric).
      - Jon Gray admits they risk losing $125 million federal allocation due to delays, proving bridge requires federal dollars despite public claims against them.
      - Article 2 exposes Burrell’s hypocrisy: opposing federal money while managing a project that needs it, justified only by tolls for "conservative" reasons.

      KEY ENTITIES
      - Jack Burrell (Councilman, Bridge Spokesperson)
      - Mo Brooks ("Ole Mo", U.S. Senate Candidate)
      - Jon Gray (Political Strategist, Mobile-based)
      - Jim Zigler ("blockthetolls" Facebook Page Admin)
      - Dean Young (Activist, "YoungforAL")
      - Sherry Sullivan (Fairhope Mayor)
      - Mark Colson (Alabama Trucking Association CEO)
    generated_at: '2026-03-16T11:42:11.552233Z'
    text: 'Jack Burrell and Mo Brooks pretend they can build a two-billion-dollar bridge without any help from the federal government. Political fixer Jon Gray finally admitted the truth: these leaders are begging for Washington cash behind closed doors while planning to toll you anyway.'
  poison-ivy-bridge:
    brief: |-
      *   *Self-Correction on "Labels":* The prompt says "No preamble or labels - start directly with the brief." Then it lists the sections 1, 2, 3, 4. Usually, this means "Don't write 'Here is the brief:' but use the section headers to categorize." I will use the exact section titles from the prompt instructions.

          *   *Self-Correction on Content:* Make sure I don't hallucinate dates. The text says "Mo Brooks," "2020 elections." I will stick strictly to what is in the text provided.

          *   *Refining "The Pivot":* Article 1 (Main) says politicians are failing and the state is broke. Article 2 (Widget) provides the specific *why* regarding corruption (BP money) that validates the "failure" claim and explains local pushback against the toll.

          *   Let's assemble.

      THE CONFLICT:
      - I-10 Mobile River Truck Bridge (Bayway) project lacks funding; politicians rely on federal money despite claiming strict adherence to 10th Amendment.
      - Mo Brooks claims funding decisions should not be in Washington but acknowledges bridge depends on federal highway dollars.
      - Jack Burrell opposes federal assistance yet stated if offered, he would take money for the bridge.
      - Alabama Trucking Association (Mark Colson) argues toll plan is unconstitutional and violates Commerce Clause.
      - State cannot fund education, prisons, healthcare; left $3.2 billion on table via Medicaid exclusion.

      THE DISCOVERY:
      - Locals/Mobile and Baldwin County residents oppose the toll, citing state mismanagement.
      - Fairhope Mayor Karin Wilson (R) says "100% against a toll to build this bridge whatever the fee."
      - Governor Kay Ivey ("Poison Ivy") and State are accused of stealing/misusing BP Oil Spill settlement money.
      - State Senator Chris Elliott (R - Daphne) claims meeting should be moved, but faces scrutiny on lack of follow-through.
      - Fairhope Mayor Sherry Sullivan acknowledges toll is inevitable but notes reliance on legacy routes.

      THE PIVOT:
      - Article 2 proves Governor Kay Ivey (“Poison Ivy”) and State Senator Pittman misused BP settlement funds, directly fueling the local resistance required to sink Article 1’s bridge.
      - State spent BP money on operating budgets, hotel construction, and Governor’s Beach House refurbishment instead of infrastructure.
      - State Senator Pittman secured $750,000 in BP money for his "tractor" company while the bridge now targets citizens who paid tourism taxes.
      - Widget Article reveals why locals reject the toll: it compensates for "poor planning and budgeting" while using BP settlement proceeds appropriated by the state.
      - Article 1 claims "politicians listed on this page ensure failure"; Article 2 lists those politicians: Ivey, Elliott, Pittman.

      KEY ENTITIES:
      - Mo Brooks (U.S. Senate Candidate)
      - Jack Burrell (Politician/Conservative Supporter)
      - Kay Ivey (Governor of Alabama, referred to as "Poison Ivy")
      - Mark Colson (Alabama Trucking Association CEO)
      - Chris Elliott (State Senator R - Daphne)
      - Karin Wilson (Mayor of Fairhope, Alabama)
      - Pittman (State Senator/Trustee involved in BP money allocation)
      - I-10 Federal Highway / Bayway Truck Bridge
    generated_at: '2026-03-16T11:42:11.552239Z'
    text: Governor Kay Ivey and her cronies claim Alabama is too broke to fix the I-10 bridge without hitting you with a toll. We found the missing money in Senator Pittman’s pockets and a new state beach house built with BP oil spill cash that belonged to the people.
  liars-bridge:
    brief: |-
      THE CONFLICT:
      - Project: I-10 Mobile River Truck Bridge (Bayway project).
      - Core Conflict: State needs federal highway funding to build bridge, but Mo Brooks (U.S. Senate candidate) advocates strict 10th Amendment interpretation to limit federal highway dollars and decisions in Washington.
      - Specific Issue: Alabama state budget cannot fund bridge; relies on lottery/medical funds which are already strained (Medicaid opt-out left $3.2 billion unused).
      - Legal Context: Mark Colson (Alabama Trucking Association CEO) cites a Rhode Island federal lawsuit arguing truck-only tolls violate the Commerce Clause.

      THE DISCOVERY:
      - Evidence of Hypocrisy: Widget article reveals Jack Burrell (Fairhope City Councilman/ESMPO Chairman) is now explicitly seeking the federal funding he previously claimed was unnecessary.
      - Petition Trigger: A "No Tolls" petition reached 50,000 signatures; this triggered politician panic and policy reversal.
      - Direct Admission: Burrell states the project will “secure the federal funding that we already have received” and allows them to “continue to seek additional federal funding.”
      - Political Maneuvering: Politicians united behind development goals over promises, using the 50k petition as leverage to justify seeking federal involvement.

      THE PIVOT:
      - Article 2 is the 'smoking gun' because it contains direct quotes from Burrell contradicting Article 1’s report of his earlier stance.
      - Article 1 notes Burrell claimed opposition to federal assistance; Article 2 confirms he is now actively leveraging the project to secure that same assistance.
      - Confirms Article 1’s claim that ideology is failing: Burrell acknowledges they cannot “move forward” and secure funding without exactly the federal leverage Brooks opposes.

      KEY ENTITIES:
      - Mo Brooks (U.S. Senate Candidate)
      - Jack Burrell (Fairhope City Councilman, ESMPO Chairman)
      - Tommy Tuberville (Former Alabama Governor/Player referenced)
      - Jerry Carl (Representative)
      - Sherry Sullivan (Fairhope Mayor)
      - Mark Colson (Alabama Trucking Association CEO)
      - Eastern Shore Municipal Planning Organization (ESMPO)
    generated_at: '2026-03-16T11:42:11.552244Z'
    text: Mo Brooks claims federal highway dollars are a violation of the Constitution that Alabama must reject. His partner Jack Burrell got caught in a total lie, now begging for the same Washington money he spent years telling us we didn't need to build the bridge.
  trump-n-bama:
