      Fairhope municipal contracts while violating ethics rules.


      THE DISCOVERY:

      *   The Alabama Ethics Commission has proven fruitless and ineffective in holding
      officials accountable.

      *   Politicians manipulate ethical guidelines to commit violations.

      *   A specific politician (Tripp Pittman) was able to evade accountability through
      his role on the ethics committee and use advisory opinions as a defense.

      *   Senator Tripp Pittman''s complaints were abandoned by the Attorney General''s
      office of Luther Strange, ignoring a grand jury and FBI investigation.


      THE PIVOT:

      *   Article 2 provides specific, localized evidence (Fairhope, Baldwin County)
      proving the systemic failure and manipulation described in Article 1 regarding
      ethics commissions and elected officials on the ground level.

      *   The failure of the commission allows corrupt behavior to continue unchecked,
      validating Article 1''s argument that citizens must take action at the municipal
      level rather than relying on established bodies.


