      *   Anti-corruption efforts at the county and state levels are necessary due
      to the failure of local institutions.

      *   The Alabama Ethics Commission has proven fruitless in eliminating corruption.


      THE DISCOVERY

      *   Corruption is systemic, involving politicians and elected officials across
      state and municipal levels.

      *   Ethics commissions lack credibility and are actively being weakened by insiders
      (e.g., Dr. Stewart Hill Tankersley).

      *   Local City Councils obstruct mayors and ignore allegations against their
      friends to provide cover for guilty parties.


      THE PIVOT

      *   Article 2 provides specific, localized examples of how ethical bodies fail
      and political corruption is institutionalized, proving the broad systemic failure
      implied in Article 1.

      *   It shows that corruption is not just an isolated incident (like the Fairhope
      Airport Authority) but a method used by politicians at all levels, from state
      law enforcement to city councils.


      KEY ENTITIES

      *   Alabama Ethics Commission

      *   Dr. Stewart Hill Tankersley (Outgoing Ethics Commission member)

      *   Jerry Fielding, Frank "Butch" Ellis, Jr., Charles Price (Ethics Commission
      members seeking to weaken ethics)

      *   Birmingham corruption trial participants (lawyers, government agencies,
      Mayors, City Councils)

      *   Luv Gov (resigned)

      *   Speaker of the House Hubbard (packing bags for jail)

      *   Luther (Attorney General)

      *   Sen. Pittman ($750,000 skimmed from BP)

      *   Fairhope City Council

      *   Fairhope Airport Authority'
