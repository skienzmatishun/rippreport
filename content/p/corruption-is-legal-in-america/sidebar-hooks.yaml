      Insurance" provided by the Ethics Commission, proving the Commission actively
      maintains political corruption.

      *   The insurance mechanism acts as the "smoking gun" because it allows elected
      officials to face "protection from prosecution" even if they lie on a request,
      thereby ensuring impunity for those involved in graft.


