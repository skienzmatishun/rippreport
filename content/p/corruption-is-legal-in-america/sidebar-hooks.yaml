  alabama-corruption-insurance:
    brief: 'THE CONFLICT

      *   Political corruption flourishes in Alabama due to a lack of accountability
      at municipal and state levels.

      *   Specific incidents mentioned include the Fairhope Airport Authority scandal,
      soccer fields lawsuits, fly creek apartments, and the sewer plant contract.


      THE DISCOVERY

      *   Alabama utilizes "Alabama Corruption Insurance," which is free and provided
      by entities meant to protect constituents (Governor, Attorney General, Judiciary,
      Bar Association, Alabama Ethics Commission).

      *   The Alabama Ethics Commission aids and abets political corruption by providing
      this insurance ("get out of jail card").

      *   In Columbia, allegations were filed against the Mayor and Chief of Police
      regarding conflict of interest (e.g., Ben Freeman being the personal lawyer
      for Lori Mock, loans involving the Mayor and his mother-in-law).

      *   Complaints filed across all state agencies over 12 years have resulted in
      no action or prosecution.


      THE PIVOT

      *   Article 1 identifies a general failure of accountability. Article 2 demonstrates
