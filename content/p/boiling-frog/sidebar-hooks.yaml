      on Fly Creek near Parker Road and Hwy. 98.

      *   Conflict regarding the approval of a zoning change for a parcel at the entrance
      to Daphmont Subdivision.


      THE DISCOVERY

      *   The Fairhope Planning and Zoning Board rejected the zoning request for the
      parcel and recommended that the Daphne City Council make the same decision.

      *   Community opposition to the Fly Creek Apartments project was overwhelming:
      9 meetings were held, with over 1000 attendees, and 99% opposed the project.

      *   The city council failed to listen to citizens regarding the apartment development.


      THE PIVOT

      *   Article 2 proves that despite massive public opposition (99% rejection),
      local government bodies are failing to heed citizen concerns regarding development
      projects (like Fly Creek Apartments).

      *   This bureaucratic failure mirrors the "boiling frog" premise in Article
