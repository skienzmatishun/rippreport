  alabama-off-the-rails:
    brief: 'THE CONFLICT:

      - May 17, 2021: Alabama approved medical cannabis bill (Compassion Act).

      - Recent Session: House passed SB 46 establishing medical marijuana program;
      bill sent to Senate and Governor Ivey.

      - SB 46 Requirements: Doctor recommendations for qualifying conditions; forms
      allowed include pills/patches/creams (no smoking/vaping).

      - February 3, 2025: Industry claims program is in legal morass; litigation halts
      implementation.

      - February 3, 2025: Senate Budget Committee Chairman suggested repealing cannabis
      bill due to costs of litigation; noted breach-of-contract risk for licensed
      growers.


      THE DISCOVERY:

      - February 3, 2025: Article confirms Board of Medical Examiners has not issued
      first patient license despite 4-year timeline.

      - February 3, 2025: 12 groups awarded marijuana grower licenses in 2021; millions
      of dollars invested but products cannot be legally sold.

      - February 3, 2025: State spending millions defending Alabama Medical Cannabis
      Commission in court.

      - February 3, 2025: Mediation and rounds of litigation since 2021 failed to
      resolve legal issues under original 2021 legislation.


      THE PIVOT:

      - Article 2 exposes that the original Compassion Act (2021) contains “poison
      pill” compromises and legal flaws preventing actual operation.

      - Article 2 validates that SB 46 (Article 1) is the necessary legislative intervention
      to fix documented implementation failures.

      - Article 2 identifies Senator Tim Melson (R-Florence) as the original sponsor
      of the stalled 2021 framework.


      KEY ENTITIES:

      - Gov. Ivey

      - Chey Garrigan (Alabama Cannabis Industry Association President)

      - SB 46

      - Alabama Medical Cannabis Commission

      - Board of Medical Examiners

      - Senate Budget Committee Chairman

      - Senator Tim Melson (R-Florence)'
