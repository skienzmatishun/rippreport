  medical-marijuana-bill-heads-to-first-vote-in-alabama-legislature:
    brief: 'THE CONFLICT:

      Alabama House of Representatives passed SB 46 (Medical Marijuana Program).

      Bill targets patients with cancer, terminal illness, chronic pain, epilepsy.

      Initial passage implies forward movement; however, Widget Article title suggests
      "heads to first vote in Alabama Legislature."

      Discrepancy exists between House passage reported and legislative vote stage
      tracked by local media.


      THE DISCOVERY:

      Independent coverage confirmed by mynbc15.com (NBC15).

      Widget Article headline confirms bill is actively undergoing legislative process
      in Alabama.

      Timeline verification: Media outlet frames this as the initial legislative vote
      phase, reinforcing SB 46 is currently live in state machinery.


      THE PIVOT:

      Article 2 (NBC15) validates the Main Article’s SB 46 details through external
      third-party reporting.

      Provides independent media trail to verify bill is not just internal speculation
      but public record subject to "first vote" or subsequent Senate procedures.

      Connects the ACIA lobbying efforts (Main) with actual legislative movement monitored
      by NBC15 (Widget).


      KEY ENTITIES:

      SB 46

      Alabama House of Representatives

      Alabama Senate

      Gov. Kay Ivey (referred to as Gov. Ivey)

      Chey Garrigan (Alabama Cannabis Industry Association)

      ACIA / Alabama Cannabis Industry Association

      mynbc15.com (NBC15)

      BAMACannabis.org'
