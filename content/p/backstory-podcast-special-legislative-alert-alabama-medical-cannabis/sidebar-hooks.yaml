  backwoods-media-ad:
    brief: 'THE CONFLICT:

      Alabama House of Representatives passed SB 46 (medical marijuana program).

      Bill returns to Senate for final approval.

      Governor Kay Ivey signature required for law enactment.

      Legislation permits cannabis pills, patches, and creams (no smoking/vaping).

      Eligible conditions include cancer, epilepsy, chronic pain.


      THE DISCOVERY:

      Previous Backstory Podcast (The Ripp Report/Backwoods Media LLC) confirmed SB
