      - SB 46 allows qualified patients (conditions: cancer, terminal illness, epilepsy,
      chronic pain) access to cannabis products via doctor recommendation.

      - Product forms restricted to pills, skin patches, creams (smoking/vaping prohibited).


      2. THE DISCOVERY

      - ACIA launched inaugural Alabama Medical Cannabis Conference on October 13-14,
      2023.

      - Event location: Sheraton Hotel in Birmingham, Alabama.

      - John McMillan confirmed as featured speaker with title: Executive Director
      of the Alabama Medical Cannabis Commission.

      - Event marked by ACIA as first major cannabis-focused conference in state history.


      3. THE PIVOT

      - Conference announcement validates ACIA is mobilizing resources based on SB
      46 legislative activity.

      - Inclusion of Alabama Medical Cannabis Commission leadership (McMillan) confirms
      regulatory infrastructure exists to support SB 46.

      - Chey Garrigan (ACIA CEO) directly links conference goals to legislative progress,
