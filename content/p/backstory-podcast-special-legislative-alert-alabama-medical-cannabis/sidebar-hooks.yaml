  tiny-steps:
    brief: '1. THE CONFLICT: Alabama House passed SB 46 (Medical Marijuana) requiring
      Senate final approval and Gov. Ivey signature per Article 1. Prior "last session"
      failed to pass major Healthcare/Gambling bills, labeling the legislature as
      blocking serious issues (Article 2).


      2. THE DISCOVERY: State Senator Chris Elliott personally blocked the SAH (Strengthen
      Alabama Homes) funding bill despite a 96-1 House vote; he did this to settle
      a past score where he was removed as a contractor in 2016 for alleged "profiling"
      (Article 2).


      3. THE PIVOT: Article 1 confirms SB 46 passed the House only to face Senate
      approval. Article 2 serves as the ''smoking gun'' exposing that State Senator
      Elliott has a documented history of blocking House-passed legislation (SAH)
      via personal vendetta, predicting the same vulnerability for SB 46 in Article
      1.


      4. KEY ENTITIES: SB 46, Chris Elliott (State Senator), Chip Brown (Rep., introduced
      SaH funding bill), Gov. Ivey, SAH (Strengthen Alabama Homes), Chey Garrigan
      (Alabama Cannabis Industry Association).'
