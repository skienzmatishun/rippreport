      - Bill allows patients with 12+ conditions (cancer, terminal illness, epilepsy,
      chronic pain) to buy cannabis in pill/patch/cream forms.

      - Widget Article claims Gov. Robert Bentley refused Medicaid expansion in 2015,
      leaving $3 billion on the table.

      - Widget Article claims Gov. Kay Ivey is refusing Medicaid expansion in 2021,
      continuing the same refusal as Bentley.


      THE DISCOVERY:

      - Historical Pattern: Gov. Robert Bentley is identified in 2015 for not expanding
      Medicaid under the Affordable Care Act despite public pressure.

      - Current Impact (2021): Widget Article claims Gov. Kay Ivey "doing the same
      thing over and over" regarding Medicaid expansion.

      - Financial Data: Refusal to expand Medicaid in Alabama claims a revenue/healthcare
      loss between $15 billion and $20 billion.

      - Social Impact Data: Claimed result of refusal is closed rural hospitals and
      preventable loss of lives.

      - Public Sentiment: AUM poll cited claims a majority of citizens wanted Medicaid
      Expansion, which Ivey ignored.


      THE PIVOT:

      - Common Entity: Both articles center Governor Kay Ivey''s decision-making power
      over Alabama healthcare policy.

      - Bridging Function: Widget Article establishes Governor Ivey’s political and
      fiscal history regarding healthcare funding (Medicaid refusal).

      - Connection: Main Article positions Governor Ivey as the upcoming gatekeeper
