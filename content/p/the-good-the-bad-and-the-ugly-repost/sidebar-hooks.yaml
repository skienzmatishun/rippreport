      \ against City Attorney misconduct regardless of which article is read.\n\nKEY ENTITIES:\n- Mayor Wilson (Current Mayor)\n- Mayor \"Can’t\" (Reference to former or specific political opponent)\n- Dean Mosher\n- Matt Bowers (Developer; attempted to reconsider clock plan changes per Mr. Mosher)\n- Buddy Breland (Developer/Breland Lawsuit)\n- Ronan McSharry / McSharry Bar and Restaurant\n- Marcus McDowell (City Attorney)\n- Boone (Council Member)\n- Burrell (Council Member; protected by City Attorney)\n- Catalyst Council\n- Alabama Supreme Court\n- Fairhope City Council (Former members voted out of office)"
