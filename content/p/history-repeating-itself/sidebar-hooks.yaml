  FAUXHOPE HISTORY:
    brief: "CONFLICT: \n- On July 15, 2020, Francis Paul Ripp (founder of The Ripp Report) published an exposé titled “History repeating itself” regarding Mayor Wilson’s waterfront project.\n- Article states Howell Raines (former NYT editor, forced out 2003) is circulating a flyer and writing op-eds about the waterfront grant to make a “strictly political move.”\n- Ripp claims Raines admitted to being six weeks late reading about the project, never attending a meeting, and ignoring survey data from 570 citizens.\n- Article alleges Mayor Wilson’s council is “the worst council to ever sit in Fairhope's council chambers” regarding historical neglect.\n\nDISCOVERY: \n- A second report titled “FAUXHOPE HISTORY” reveals a continuation of this governance pattern under Mayor Sherry Sullivan.\n- New data shows historical demolitions occurred in Fairhope, specifically mentioning the home of Nancy Lewis (a formerly enslaved resident), which was demolished before a draft preservation ordinance.\n- This\
      \ second article identifies Mayor Sullivan as being “100% pro development” and notes the council will provide city services to developers first.\n- Widget article names Councilman Kevin Boone, identifying him as a developer who supports “back room good ole boy politics.”\n\nPIVOT: \n- The second article is the smoking gun because it proves the accusation in Article 1 (that leadership prioritizes development over history/ADA/community input) is not limited to one administration.\n- The 2020 exposure of Raines/Wilson political maneuvering validates the recurring theme in Article 2: current leadership (Sullivan/Boone) is operating under the same “100% pro development” framework that was already flagged in 2020.\n- The pattern confirms the Ripp Report’s long-term investigation that Fairhope leadership consistently ignores historic preservation and historical figures (like Nancy Lewis) while collaborating with external developers.\n\nKEY ENTITIES: \n- Francis Paul Ripp\n- Howell Raines\
      \ (former NYT Editor)\n- Mayor Wilson (2020 context)\n- Mayor Sherry Sullivan (Current context)\n- Councilman Kevin Boone (Developer/Official)\n- Nancy Lewis (Homeowner/Historic figure)\n- First Baptist Church (Accused of demolishing houses for parking)\n- The Ripp Report\n- Lagniappe Mobile"
