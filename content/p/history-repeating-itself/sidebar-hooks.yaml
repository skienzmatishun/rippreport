      - Full City Council now has challengers running against them.
      - Challengers are not replacing individual seats; they are running as a "slate of candidates."
      - Challenge is specifically framed to break the "good ole boy culture" of current administration.
      - Goal stated in article: Replace 2 or 3 council members is insufficient; need to "Knock out the council" so Mayor must listen instead of colluding.

