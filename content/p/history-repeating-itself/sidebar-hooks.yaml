  where-hell-were-you:
    brief: |-
      THE CONFLICT:
      - Howell Raines published op-eds and letters regarding Fairhope waterfront project (Jul 2020).
      - Raines claimed Mayor Wilson proposed the plan; Ripp Report (Paul Ripp) says project is citizens’ plan.
      - Raines asserted bluff would be graded away, beach unusable.
      - Paul Ripp (Lagniappe) stated Raines was "six weeks late" learning about project.
      - Ripp claimed Raines never attended meetings, addressed City Council, or spoke to Alabama Gulf Coast Recovery Council.
      - Ripp noted Raines did not respond to survey by 570 citizens (referenced in Art 1).

      THE DISCOVERY:
      - Article 2 lists historical corruption/controversies Raines ignored or publicly defended via his platform.
      - Specific allegations against City Council (Kevin Boone, Robert Brown):
        - Bought $2.65 million farmland for recreation at airport (Ripp Report claims original site chosen against racial considerations).
        - Purchased K1 center without a plan, costing tens of thousands to fix condemned structure.
        - Attempted to give away Triangle Property (valued at $11.25 million).
        - Council defeated change of government ballot to maintain power.
        - Federal Lawsuit lost by council for denying citizens speech rights at meetings.
      - Council members Boone and Brown publicly labeled Raines a "carpetbagger."

      THE PIVOT:
      - Article 2 proves Raines’ claim in Article 1 that he is being "misled" about waterfront issues contradicts his silence during major council scandals.
      - Article 2 connects Raines' current opponent (Boone/Brown/Catalyst) to a long history of governance conflicts he ignored.
      - Article 2 suggests Raines’ criticism is tactical/aligned with CATALYST for status quo maintenance, validating Article 1’s "political move" claim.
      - Raines uses NY Times credibility (Art 1 mention of 2003 firing) while Article 2 highlights his ignorance/absence regarding local decisions.

      KEY ENTITIES:
      - Howell Raines
      - Paul Ripp (The Ripp Report)
      - Kevin Boone (Fairhope Council, CATALYST member)
      - Robert Brown (Fairhope Council, CATALYST member)
      - Mayor Wilson (Fairhope)
      - CATALYST (Group referenced in Wire Article)
      - New York Times (Rainex former employer)
