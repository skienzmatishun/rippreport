  BALDWIN-COUNTY-SHERIFF-APPOINTMENT:
    brief: 'THE CONFLICT


      - Sheriff Hoss Mack promoted from Captain to Sheriff specifically for assisting
      in the wrongful conviction of Murray "Bubba" Lawrence Jr.

      - Case involved capital murder victim Brandon Hastings; Bubba Lawrence spent
      20 years in Holman Prison.

      - Investigators Sheriff Mack, Anthony Lowery, and Dean McGowan produced no physical
      evidence of crime scene or murder weapon.

      - Prosecution David Whetstone and Judge Robert Wilters withheld exculpatory
      evidence from the defense during trial.

      - Autopsy in Mississippi (witnessed by Dean McGowan) listed cause of death as
      asphyxiation by strangulation; prosecution changed theory to gunshot without
      ballistics or weapon.

      - Exculpatory evidence discovered in 2023; Mack, Whetstone, and Wilters acknowledged
      withholding it to protect the conviction in a Lagniappe cover story.

      - During trial transcript (page 1591), Officer Tony Fuqua testified: no fingerprints,
      stolen property, or cell phone records connected Bubba Lawrence to Brandon Hastings.

      - Actual killer Jarius McNeal implicated Bubba Lawrence after being threatened
      with death sentence by Mack unless he named an accomplice.

      - Mack, Whetstone, and Wilters ordered body exhumed in 2003/2004 to override
      original findings; all acknowledge holding evidence from defense.


      THE DISCOVERY


      - Sheriff Hoss Mack is stepping down ("one foot out the door") ending tenure
      as Baldwin County Sheriff.

      - Governor’s Appointment Office collecting information for replacement candidate;
      Mr. Mason Bass is the Appointment Director.

      - Anthony Lowery, former investigator in Murray Lawrence case, submitted as
      "second choice" replacement for Mack by BCSO leadership.

      - Lowery publicly stated he did not want the job despite internal placement
      as a candidate.

      - Ripp Report article notes Lowery knows "a ton of crap out of the Hoss Boss
      closet" is going to surface regarding BCSO conduct.

      - Families of deceased victims (Peyton Little, O.J. French, Robert Yates, Johnathan
      Victor, Joseph Andrews, Kevin Andrews) being directed to submit complaints directly
      to Appointment Office via Mr. Mason Bass before Lowery’s potential appointment.

      - O.J. French case: Shot dead by Bay Minette police, cleared by Baldwin County
      Major Crimes Unit where Chief was a member.

      - Robert Yates case: Died during SWAT eviction breach; 114+ shells/bullet casings
      used without exigent emergency.

      - Johnathan Victor case: Unarmed man shot 4 times from 7 yards by Deputy Mark
      Hunady.


      THE PIVOT


      - Current Sheriff exit creates vacancy where Anthony Lowery is officially positioning
      to take command.

      - Lowery was active investigator in the same case (Hastings/Lawrence) where
      exculpatory evidence was suppressed by Mack and Whetstone.

      - Article 2 confirms the Governor’s office is receiving submissions specifically
      about these wrongful conviction details, death cover-ups (Yates/Victor/Andrews),
      and Lowery’s past role.

      - Appointment Director Mr. Mason Bass guaranteed confidentiality for submitted
      testimony regarding prior BCSO misconduct.

      - This structure exposes Lowery’s transition to power while previous allegations
      remain unresolved and publicized by the Ripp Report.

      - Article 1 identifies names tied to obstruction (Mack, Lowery); Article 2 confirms
      those same names are now subject to state review for leadership.


      KEY ENTITIES


      - Hoss Mack (Baldwin County Sheriff)

      - Anthony Lowery (Suggested Sheriff, Former BCSO Investigator)

      - Murray "Bubba" Lawrence Jr. (Innocent Convict)

      - Brandon Hastings (Victim, Capital Murder Case)

      - Jarius McNeal (Actual Killer, Informant)

      - Dean McGowan (Investigator, Autopsy Witness)

      - David Whetstone (Prosecutor/DA)

      - Judge Robert Wilters (Presiding Judge in 2003/2004)

      - Tony Fuqua (Officer at autopsy, testified lack of evidence)

      - Mr. Mason Bass (Governor’s Appointment Office Director)

      - Peyton Little (Confidential Informant, Suicide Ruling)

      - O.J. French (Shot dead by Bay Minette Police)

      - Robert Yates (Eviction Death)

      - Johnathan Victor (Unarmed Shooting Victim)

      - Joseph Andrews and Kevin Andrews (Pursuit Deaths)

      - Dominic Scotti Garcia Jr. (Driver in I-10 Pursuit)

      - Mark Hunady (Deputy charged in Johnathan Victor shooting case)'
