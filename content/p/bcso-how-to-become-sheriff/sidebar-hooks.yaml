  wrongful-conviction:
    brief: 'THE CONFLICT:

      - 2003/2004: Murder of Brandon Hastings occurs in Baldwin County.

      - Murray "Bubba" Lawrence Jr. wrongfully convicted of Hastings'' murder; incarcerated
