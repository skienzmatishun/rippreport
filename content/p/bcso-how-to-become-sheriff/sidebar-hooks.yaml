  justice-denied-a-wrongful-conviction-buried-by-power-and-politics:
    brief: "1. THE CONFLICT\n- 2003/2004 timeframe: Murder of victim Brandon Hastings.\
      \ \n- Murray “Bubba” Lawrence Jr convicted in 2005 Baldwin County capital murder\
      \ trial for Hastings death.\n- Cause of death established by Mississippi autopsy\
      \ as asphyxiation/strangulation; prosecuted as gunshot wound.\n- No physical\
      \ evidence tied Lawrence to crime (no DNA, fingerprints, murder weapon produced).\n\
      - Real killer identified as Jarius McNeal. McNeal threatened with death penalty;\
      \ coerced by Sheriff Mack into implicating Lawrence as accomplice to save his\
      \ own life.\n- District Attorney David Whetstone negotiated plea deal with McNeal\
      \ despite unreliable testimony; admitted making “deal with the devil.”\n- Judge\
      \ Robert Wilters presided over trial; allowed prosecution to proceed despite\
      \ evidentiary inconsistencies.\n- Exculpatory evidence discovered in 2023 (Lagniappe\
      \ Mobile “Digging Deep” report).\n- Whetstone, Wilters, and Mack suppressed\
      \ the new exculpatory evidence from defense; admitted withholding it.\n- Sheriff\
      \ Hoss Mack promoted and elected partly based on participation in the Lawrence\
      \ wrongful conviction.\n\n2. THE DISCOVERY\n- Four men responsible for building/winning\
      \ Lawrence’s case now hold high-ranking positions.\n- Huey “Hoss” Mack: Retired\
      \ Baldwin County Sheriff; appointed to newly created state-level position.\n\
      - Anthony Lowery: Current Baldwin County Sheriff (appointed by Kay Ivey); seeking\
      \ election in 2026.\n- Robert Wilters: Retired from bench, now Baldwin County\
      \ District Attorney since approximately 2015.\n- David Whetstone: Retired; previously\
      \ District Attorney during trial.\n- In 2023, Wilters rejected a Rule 32 filing\
      \ on Lawrence’s behalf while serving as District Attorney.\n- Lowery (as Chief\
      \ Investigator/DA investigator in 2005) and Mack controlled access to evidence\
      \ at the time of trial.\n\n3. THE PIVOT\n- Article 1 establishes the misconduct:\
      \ suppression of evidence, coerced confession, fake science to secure Lawrence’s\
      \ conviction.\n- Article 2 proves those same actors retained control over Baldwin\
      \ County justice system post-conviction.\n- Wilters’ 2023 rejection of Rule\
      \ 32 filing is direct evidence of continuity: the same judge who approved the\
      \ conviction now uses his DA authority to block relief in the exact same case.\n\
      - This validates Article 1’s claim that a “good ole boy culture” protected the\
      \ wrongful conviction rather than letting accountability occur.\n- Power structure\
      \ confirmed: Individuals accused of covering up injustice are still the decision-makers\
      \ blocking redress.\n\n4. KEY ENTITIES\n- Murray “Bubba” Lawrence Jr (Innocent\
      \ Convict)\n- Jarius McNeal / McNeil (Original Suspect/Real Killer)\n- Brandon\
      \ Hastings (Victim)\n- Huey “Hoss” Mack (BCSO/State Official)\n- Anthony Lowery\
      \ (Sheriff)\n- Robert Wilters (District Attorney/Former Judge)\n- David Whetstone\
      \ (Retired District Attorney)\n- Baldwin County Sheriff’s Office (BCSO)\n- Lagniappe\
      \ Mobile"
