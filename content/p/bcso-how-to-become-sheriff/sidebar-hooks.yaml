      - Sheriff Hoss Mack served as lead investigator (Lt.) during the case.

      - Prosecution led by District Attorney David Whetstone; trial judge Robert Wilters.

      - Conviction relied on testimony of Jarius McNeal who implicated Lawrence under
      duress ("threatened with death sentence").

      - No physical evidence presented: no blood, DNA, fingerprints on stolen property,
      murder weapon, or ballistics.

      - Transcript shows Officer Tony Fuqua admitted no records linked Lawrence to
      Hastings (no cell records, no stolen goods found).

      - 2023: Body exhumed; new autopsy findings discovered.

      - 2023: Whetstone, Mack, and Wilters acknowledge withholding exculpatory evidence
      from defense; Lawrence remains in Holman Prison.

      - Mississippi autopsy (witnessed by Dean McGowan) initially listed cause as
      strangulation; prosecution argued gunshot theory.

      - Hoss Mack promoted from Captain to Sheriff following the conviction.


      THE DISCOVERY:

      - BCSO has long history of withholding information; Lawrence case cited as a
      "prime example" alongside Steve Nodine and Jonathan Victor.

      - Nine people killed under BCSO/Major Crimes Division oversight with no officers
      found responsible.

      - Lt. Andre Reid and Bay Minette Police withholding body camera footage in Otis
      "O.J." French Jr. killing case.

      - Clark Neily (Cato Institute) notes some agencies "play games" withholding
      info and engage in a "circle-the-wagons, Thin-Blue-Line mentality."

      - Article 2 confirms BCSO routinely uses Alabama Supreme Court rulings to block
      public/media access to body cam footage.

      - Public records confirm BCSO is under heavy scrutiny for transparency and accountability
      ("Major Crimes Division" has little public support).


      THE PIVOT:

      - Article 2 proves the pattern in Article 1 is institutional, not isolated.

      - Identifies Lawrence as a deliberate "smoking gun" case within BCSO history
      to highlight corruption.

      - Links Hoss Mack (current Sheriff) directly to the office now responsible for
      withholding evidence in O.J. French Jr.''s case (Article 2).

      - Confirms 2023 withholding of autopsy data in Lawrence case fits the "long
      history" claim made in Article 2.

      - Shows continuity of personnel (Mack/Whetstone/Wilters) between wrongful conviction
      period and current BCSO leadership.


      KEY ENTITIES:

      - Hoss Mack

      - Anthony Lowery

      - Dean McGowan

      - David Whetstone (retired District Attorney)

      - Robert Wilters (Judge, now Baldwin County DA)

      - Murray "Bubba" Lawrence Jr.

      - Jarius McNeal

      - Brandon Hastings

      - Otis "O.J." French Jr.

      - Steve Nodine

      - Jonathan Victor

      - Lt. Andre Reid

      - Tony Fuqua

      - Baldwin County Sheriff’s Office (BCSO)

      - Major Crimes Division'
