  po-po-hoss-mack-ccuo:
    brief: 'THE CONFLICT

      - Sheriff Huey Hoss Mack and DA David Whetstone involved in 2003/2004 murder
      trial of Murray "Bubba" Lawrence Jr.

      - Victim: Brandon Hastings killed by asphyxiation/strangulation (per Mississippi
      autopsy by Dr. Paul McGarry).

      - Prosecution used killer Jarius McNeal''s testimony; McNeal pressured to name
      accomplice or face death penalty.

      - No physical evidence linked Lawrence (no fingerprints, no weapons found).

      - 2023: Exhumation of Hastings body performed by Mack, Whetstone, and Judge
      Robert Wilters.

      - Exculpatory autopsy evidence discovered in 2023 was allegedly withheld from
      defense during trial.


      THE DISCOVERY

      - May 17, 2004: Hoss Mack and his father received copies of Alabama Department
      of Forensic Sciences letter sending Hastings autopsy/forensic reports.

      - Feds and FBI Task Force investigating BCSO for "possible mishandling of evidence."

      - Ripp Report sources claim identity of BCSO officers responsible for missing
      evidence is known internally.

      - Mack previously denied any impact to cases during federal investigation press
      statement; Article 1 claims Ripp Report knows who is responsible.


      THE PIVOT

      - May 17, 2004 email trail (from Article 2) proves Mack had full knowledge of
      original Mississippi autopsy evidence before trial, supporting Article 1''s
      claim he hid it.

      - Federal FBI Task Force investigation (from Widget) links current leadership
      accountability to past wrongful convictions like Lawrence.

      - Contradiction: Mack claimed in Article 2 he had "little to do with" the case,
      yet metadata confirms his name was on the forensic chain of custody.


      KEY ENTITIES

      - Huey Hoss Mack (Sheriff BCSO)

      - Murray "Bubba" Lawrence Jr. (Wrongfully Convicted)

      - Brandon Hastings (Victim)

      - Jarius McNeal (Accomplice/Actual Killer)

      - David Whetstone (District Attorney)

      - Robert Wilters (Judge)

      - Dr. Paul McGarry (Forensic Pathologist)

      - Anthony Lowery (CCUO / Investigator)

      - Tony Fuqua (Officer / Witness)

      - Dean McGowan (Investigator/Autopsy Witness)

      - Jon Grey (Public Relations / School Board link)'
