      material are exempted from open records law due to their "investigative" nature,
      even if the investigation is concluded. Judge William Cassady denied claims
      against Sheriff Mack and qualified immunity in the case of Jonathan Victor.
      Rumors indicate officers who shot French were previously fired and that police
      officials (Chief Tolbert) are being covered up by elected officials.


      THE PIVOT

      Article 2 provides the specific legal precedent (Alabama Supreme Court ruling
      on open records law for body cam footage) that explains why Sheriff Mack''s
      refusal to release footage (mentioned in Article 1) is legally permissible,
      undermining his claim of transparency. Article 2 also details operational rumors
      suggesting police cover-ups related to the French shooting and other deaths
      investigated by the Major Crimes Unit (BCMCU).


