      - Mayor Wilson was one of the first Baldwins County mayors to urge Governor for a shelter-in-place order; Council members Burrell and Brown opposed this.
      - Development on Fly Creek apartments (behind Publix) is continuing while workers are present in the community.
      - Public has filed nominations for all 5 City Council seats (qualification period July 7 through July 21; Election August 26th).

      THE DISCOVERY:
      - Article 2 confirms Robert Brown has a pending complaint with the Alabama Attorney General regarding unethical conduct; potential referral to Mobile FBI and Alabama Ethics Commission.
      - Article 2 discloses Council President Burrell has two sealed juvenile charges on his police record not disclosed prior to the last election.
      - Article 2 links Councilman Scott Boone directly to CATALYST and Kevin Boone (son relationship) holding multiple LLCs used for conflicts of interest.
      - Article 2 specifies the financial blunder: Council members (Three B's) spent $2.65 million on recreation land that was leased for farming at $9,000/year.
      - Article 2 states this land purchase forced a city budget adjustment of exactly $2.65 million during the pandemic.
      - Article 2 reveals Council President Burrell previously used Airport Authority and taxpayer money to hire lawyers investigating a whistleblower alleging bid-rigging, resulting in no report ever supplied.

      THE PIVOT:
      - Article 2 proves the financial mismanagement ($2.65 million land deal) is not an isolated error but a coordinated pattern by the "Three B's" (Brown, Boone, Burrell) referenced in Article 1.
      - Article 2 connects Robert Brown’s current political stance (opposing curfew, using religion) to a history of abuse of office: Art Center contract benefits and lying about Ethics Commission permission.
      - Article 2 demonstrates the Council’s protectionism: Burrell uses taxpayer money to derail investigations into himself and hides juvenile charges; Council voted themselves raises and full family insurance unavailable to other city employees.

