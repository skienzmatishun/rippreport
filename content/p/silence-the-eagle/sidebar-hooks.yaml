  wrongful-conviction:
    brief: |-
      THE CONFLICT:
      - Incident Date: July 25, 2021.
      - Location: Opelika/Auburn area (Auburn Police involved).
      - Subject: Walker Cole Barkley.
      - Event: Wife Nicole Barkley called police (911) claiming husband had a gun due to intoxication.
      - Police Action: Officer fired 10 shots through door/opening despite presence of four children inside.
      - Resistance: Barkley returned fire with two shots after officer retreated and stopped firing; officer did not identify self as police.
      - Prosecution Status: Charged with attempted murder. Sentencing hearing set for August 23 at 3pm; Prosecution seeking life without parole.
      - Media Suppression: Local media FOIA requests and investigations stonewalled by police, city, or District Attorney’s office until after Barkley returned to jail for sentencing.

      THE DISCOVERY:
      - Baldwin County Sheriff’s Office (BCSO) history of withholding information and misleading public cited as systemic behavior.
      - Case: Murray Lawrence Jr (“Bubba”) wrongfully convicted in 2005, imprisoned for 19+ years.
      - Evidence Failure: No blood, DNA, witnesses (5 alibis), fingerprints, weapon, or ballistics linked in Lawrence case.
      - Official Involvement (Lawrence): Lead investigator Lt. Hoss Mack; Prosecutor David Whetstone (retired); Judge Robert Wilters.
      - Current Pattern: Hoss Mack and DA Robert Wilters (former judge in Lawrence case) currently involved in O.J. French/Bay Minette investigation where footage is contested.
      - Policy Barrier: Lt. Andre Reid (BMCU) confirmed body camera footage withheld to "respect privacy"; Alabama Supreme Court ruling effectively strips media/public right to sue for body camera footage.

      THE PIVOT:
      - Article 2 exposes the Baldwin County/Mack/Wilters system of secrecy (refusing footage, relying on testimony over physical evidence).
      - Article 2 proves the pattern in Article 1 (blocking media/FOIA requests) is not isolated: same tactics of non-transparency used by officials with "Thin-Blue-Line mentality."
      - Article 2 confirms that Alabama officials prioritize harsh sentences and protecting investigations over releasing truth/FOIA documents.
      - Direct parallel: Hoss Mack (Article 2) and Robert Wilters (Article 2 Judge turned DA) represent the same class of officials Article 1 accuses of withholding evidence to ensure conviction/sentencing.

      KEY ENTITIES:
      - Walker Cole Barkley (Defendant)
      - Nicole Barkley (Wife/911 Caller)
      - Auburn Police / Auburban PD
      - Murray Lawrence Jr. (Wrongfully Convicted)
      - Hoss Mack (Baldwin Sheriff / Lead Investigator Lawrence Case)
      - Robert Wilters (Current Baldwin County DA / Former Judge Lawrence Case)
      - David Whetstone (Retired District Attorney, Lawrence Case Prosecutor)
      - Lt. Andre Reid (BMCU/Officials in current French case context)
