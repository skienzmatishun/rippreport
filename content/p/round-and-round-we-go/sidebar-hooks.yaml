  triangle-roaches:
    brief: 'THE CONFLICT:

      *   The Triangle lawsuit involved property ownership/development disputes over
      a piece of land (The Triangle) in Fairhope.

      *   Former Mayor Can’t fueled this lawsuit throughout his 16 years as Mayor.

      *   In February 2014, Councilman Ford successfully added an agenda item to the
      City Council meeting to authorize Mayor Can''t to seek "legal settlement over
      the Triangle lawsuit."

      *   The public was unaware of this authorization prior to September 2014 when
      the legal settlement (of $8.25 million after $3 million in fees) was announced
      as a purchase for park land.

      *   This process resulted in the loss of growth pines and erosion due to logging
      roads over 10 years ago, leaving poor scrub oak vegetation on The Triangle piece
      stripped of old growth pines.


      THE DISCOVERY:

      *   The City Council (Fairhope), through its ETJ jurisdiction, is currently
      obligated to approve building permits for parcels like the one at Highway 13
      and Fairhope Avenue where a gas station application has surfaced.

      *   Commissioner Chris Elliott stated the roundabout project involved acquisition
      of right-of-way; the remaining parcel owner completed negotiations after this
      process.

      *   The property remains un-zoned in the North West corner due to prior voter
      decisions on county zoning.

      *   Despite being un-zoned, Fairhope’s ETJ grants them authority over permits
      and subdivision approval for the parcel, even if they are constrained by regulations.


      THE PIVOT:

      *   Article 1 details current regulatory constraints (ETJ/Un-zoned status) impacting
      a gas station application near the roundabout, placing responsibility on Fairhope
      City leadership despite public opposition.

      *   Article 2 provides historical evidence of similar political maneuvering
      and alleged obstruction regarding development in the same municipality, where
      former Mayor Can''t was accused of using the legal settlement (The Triangle)
      as cover for financial loss while influencing Council decisions.

      *   Both articles connect current development roadblocks (the gas station application
      vs. previous lawsuits) to systemic issues within Fairhope’s governance and political
      leadership ("roaches" analogy).


      KEY ENTITIES:

      *   Fairhope City Council / City of Fairhope

      *   Baldwin County Commission

      *   Chris Elliott (County Commissioner/Senator)

      *   Can’t (Former Mayor of Fairhope, Former Utility Director)

      *   Cain Orear (City Attorney who guaranteed refund of legal fees)

      *   Councilman Ford

      *   The Triangle (Land/Property Entity)

      *   Highway 13 / Fairhope Avenue intersection (Roundabout project location)'
    generated_at: '2026-07-18T00:54:57.339131Z'
