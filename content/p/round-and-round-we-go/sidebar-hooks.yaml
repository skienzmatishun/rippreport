  triangle-roaches:
    brief: 'THE CONFLICT

      *   Roundabout project at Highway 13 and Fairhope Avenue involved right-of-way
      acquisition.

      *   Negotiations for the roundabout included requests from a property owner
      for access to remaining parcels.

      *   The property owner of the remaining parcel sold it after the right-of-way
      process concluded.


      THE DISCOVERY

      *   The "Triangle" project was resolved via a Legal Settlement for $8.25 million,
      not a purchase.

      *   The settlement involved Attorney Cain Orear guaranteeing legal fee refunds
      that were not provided to the city.

      *   Former Mayor Tim Kant fueled the lawsuit during his 16 years as Mayor and
      is responsible for current lawsuits.

      *   City Council authorized Mayor Can''t to enter into settlement talks regarding
      the Triangle lawsuit in February 2014.


      THE PIVOT

      *   The failure of the Triangle settlement (loss of legal fees and property
