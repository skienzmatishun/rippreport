      \ evidence.\n- Moves from general accusations (\"CATALYST is at work\") to specific\
      \ allegations: Sullivan’s firing under Mayor Wilson, the recreation land deal\
      \ deficit.\n- Connects the July 14th congressional recommendation: Article 2\
      \ explicitly asks to vote for Jerry Carl to oppose Hightower.\n- Proves the\
      \ \"Cantal-Catalyst\" pipeline: Cant’s failed administration and Sullivan’s\
      \ fallout are now leveraged as campaign baggage.\n\nKEY ENTITIES:\n- Jack Burrell\n\
      - Sherry Sullivan\n- Tim Cant\n- Bill \"Lowtower\" Hightower\n- Jerry Carl\n\
      - Karin Wilson\n- Daphne Mayor Haygood\n- CATALYST Group (formerly Stacy, Haygood\
