      - Powell cited allegations Elliott planned to "profile applicants" and "cherry
      pick" based on confidential info.

      - Recent incident: Elliott pleaded guilty in city court regarding a bar-related
      legal matter.

      - Elliott is petitioning against driver’s license suspension, arguing his "elected
      position" (Baldwin County Commissioner) would suffer "irreparable harm."

      - Elliott has refused to answer a simple yes/no question about whether he was
      at the bar that night.


      PIVOT:

      - Widget article confirms Chris Elliott’s active role as the "weasel contractor"
      central to the CATALYST machine identified in Main article.

      - Elliott’s documented 2016 breach of contract rules (accessing bid secrets)
      validates Main article’s claims about CATALYST rigging systems for personal
      gain.

      - Connection established: The person running the alleged "Weasel Contractor"
      scheme (Elliott) is the same architect of the "CATALYST" election machine described
      in Main article.

      - Elliott’s use of elected office to avoid accountability for license violation
      parallels Main article’s accusation that CATALYST uses offices to protect interests.


      KEY ENTITIES:

      - Chris Elliott (State Senator / Contractor)

      - Daphne Haygood

      - Jack Burrell

      - Bill Hightower (Lowtower)

      - Tim "Cant" Boone

      - Sherry Sullivan

      - Scott Boone Consulting (CATALYST)

      - Brian Powell (SAH Director)

      - HB-188 (Grant Bill)'
