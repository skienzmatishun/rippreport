      \ for Mayor.\n- Article 1 reports Bill \"Lowtower\" Hightower running for Congress\
      \ with CATALYST support.\n- Baldwin County history referenced regarding long-term\
      \ judicial and election rigging.\n\nTHE DISCOVERY:\n- Widget confirms Sherry\
