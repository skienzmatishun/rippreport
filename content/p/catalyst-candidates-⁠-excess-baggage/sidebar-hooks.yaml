      4. KEY ENTITIES

      - ORGANIZATIONS: CATALYST, Baldwin County Government, Fairhope Municipal Election.

      - INDIVIDUALS: Jack Burrell (Council President), Sherry Sullivan-Cant, Tim Cant,
      Karin Wilson, Bill Hightower ("High-tower"), Jerry Carl.

