      - Mismanagement Allegations: Burrell lease deal with recreation land (2.65M
      purchase, 9K annual lease); transition obstruction against Mayor Karin Wilson;
      Sherry Sullivan-Cant fired for insubordination and obstructing Cant''s administration.

      - Upcoming Targets: Fairhope Municipal Election August 25; First Congressional
