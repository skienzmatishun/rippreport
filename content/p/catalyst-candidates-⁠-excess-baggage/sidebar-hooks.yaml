      - Confirms Article 1’s claim of a "body of the snake": After cant/leaving, council
      hired same law firm and same municipal Judge to protect interests.

      - Confirms CATALYST is expanding beyond Fairhope city limits into Baldwin County
      wide operations.

      - Proves that current Mayor Karin Wilson is not aligned with CATALYST, triggering
      their plan to run a candidate against her.


      3. THE PIVOT

      - Article 2 is the "smoking gun" because it connects individual candidates (Burrell,
      Sullivan-Cant) to a unified political machine rather than isolated corruption.

      - Article 2 confirms that the "bad baggage" (financial loss, bid rigging) from
