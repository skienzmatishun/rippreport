      *   County Commissioner Tucker Dorsey is alleged to be tied to the same individuals
      and multiple LLC networks as those connected to Kevin Boone.

      *   The Alabama Ethics Commission has been criticized for failure to enforce
      ethical standards or timely resolution of complaints involving public officials.

      *   In Fairhope, Council members Kevin Boone and Burrell are accused of obstructing
      the Mayor''s transparency efforts.


