      them without engineering expertise.

      *   Baldwin County Commissioner Tucker Dorsey is connected via LLC webs with
      individuals tied to Fairhope councilman Kevin Boone’s financial interests and
      business dealings (Mr. John Avent).


      THE DISCOVERY

      *   The political organization CATALYST rebranded as Scott Boone Consulting
      SBC in the 2020 election cycle due to public toxicity, cementing a consolidated
      power structure.

      *   SBC utilized its influence to elect the Mayor of Fairhope and four councilmen,
      establishing centralized control over municipal operations.

      *   SBC strategically appointed loyalists, including a municipal judge (Fairhope’s
      biggest developer) and a City Attorney, to ensure political protection and cover
      their interests.

      *   The annexation of Parker Road from Baldwin County Commission on January
      25, 2021, was orchestrated by this powerful network, linking major contributors/developers
      to the city''s expansion.


      THE PIVOT

      *   Article 1 identifies specific elected officials (Kevin Boone, Tucker Dorsey)
      benefiting financially or politically from conflicts of interest via LLC networks
      and campaign contributions from Mr. John Avent (Preble-Rich/Dewberry).

      *   Article 2 reveals that these LLC webs are not incidental but form the organized
      operating framework (SBC) of a centralized political cabal that controls Fairhope''s
      key institutions (City Council, Municipal Judge, City Attorney) and directs
      public works decisions.


      KEY ENTITIES

      *   **Individuals:** Kevin Boone, Scott Boone (son of K.B.), John Avent (Preble-Rich/Dewberry),
      Tucker Dorsey, Chris Elliott, Mayor Cant, Trip Pittman, Hand Anderall Sale.

      *   **Organizations:** CATALYST (original cabal name), Scott Boone Consulting
      SBC, Baldwin County Commissioners, Ethics Commission.

      *   **Locations/Projects:** Fairhope City, Parker Road, U. S. Highway 98, Triangle
      lawsuit, Publix project.'
