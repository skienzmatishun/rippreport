      - Despite county commission warnings on May 8th, 2010, they proceeded with the
      bid.

      - June 4th, 2010: Fairhope City Council awarded the contract to Pittman Tractor
      rather than Oil Recovery.

      - A subsequent check for $372,165.90 was issued by Fairhope six days later.

      - Trip Pittman legislatively passed qualifications for Baldwin County Sheriff
      that enabled re-election without opposition.


      THE DISCOVERY

      - Article 2 reveals that the local conflicts highlighted in Article 1 (e.g.,
      Kevin Boone''s LLC ties) are consistent with a ten-year pattern of systemic
      corruption.

      - The common denominator identified across all major alleged issues—including
      the Mega Site, Airport bid rigging by Council President Burrell, and land transfers
      for $2.65 million (Triangle property)—is the political organization CATALYST.

      - Article 2 confirms that no politician, attorney, or judge has been held accountable,
      arrested, or indicted for crimes during this decade of alleged misconduct.


      THE PIVOT

      - Article 2 provides historical evidence showing that the "well oiled corrupt
      machine" mentioned in Article 1 is not a recent development but an entrenched
      system stretching back years.

      - It contextualizes specific modern allegations (e.g., Councilman Boone''s LLC
      conflicts, Chris Elliott DUI) within a documented framework of county-wide political
      control and regulatory capture led by CATALYST politicians.


      KEY ENTITIES

      - Kevin Boone (Fairhope City Councilman)

      - Tucker Dorsey (County Commissioner)

