      new taxes.

      *   Article 2 corroborates Boone''s conflicts: It confirms "Councilman [Kevin]
      Boone... has partners in several LLC’s, that Mr Boone voted on."


      **THE PIVOT**

      *   Article 1 alleges specific unethical voting and campaign contribution ties
