      to vote and promote self-interest.

      *   Fairhope city councilman Kevin Boone has LLCs connected to John Avent, who
      holds a share of Baldwin County Sewer.

      *   Kevin Boone voted for engineer firms he favored and obstructed Mayor’s efforts
      regarding utility infrastructure.

      *   County Commissioner Tucker Dorsey is tied to multiple individuals and LLCs.

      *   Tucker Dorsey seeks to replace State Senator Trip Pittman.


      THE DISCOVERY

      *   The Alabama Ethics Commission has failed in its mission by allowing elected
      officials to manipulate ethics rules using informal and advisory opinions as
      a defense for ethical violations.

      *   State Senator Trip Pittman used his office for personal gain (fleece Fairhope
      out of BP money) and headed off complaints by serving on the ethics committee,
      with complaints abandoned by the Attorney General’s office.

      *   The Ethics Commission has consistently failed to hold politicians accountable,
      allowing corruption to continue despite investigations.


      THE PIVOT

      *   Article 2 proves that the Ethics Commission is a tool for manipulation,
      demonstrating how politicians (like Pittman) use the commission structure to
      evade accountability, which validates and explains *how* officials like Boone
      and Dorsey manage to hide conflicts of interest through LLC networks detailed
      in Article 1.


      KEY ENTITIES

      *   Kevin Boone

      *   John Avent

      *   Baldwin County Sewer

      *   Tucker Dorsey

      *   Trip Pittman (State Senator)

      *   Chris Elliott (County Commissioner)

      *   Jack Burrell

      *   Ray Hix (Fairhope Airport Authority board member)

      *   Snedeker (Fairhope Municipal Judge’s partner)

      *   Tim Kant (Former Mayor)

      *   Mike Hubbard'
