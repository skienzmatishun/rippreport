  got-fleas:
    brief: 'THE CONFLICT

      * Decades-long strategy for Gulf Coast transformation was finalized involving
      the Governor’s office, federal agencies, and key investors.

      * In 2019, over 50,000 residents, including those led by Jim Zeigler, publicly
      opposed planned tolls, stating "we do not want tolls."

      * Politicians who initially supported the opposition to tolls later became vocal
      supporters of the overall project, described as selling out the public.


      THE DISCOVERY

      * The Fairhope Waterfront Project ($6.2 million grant), funded by RESTORE Act
      money from the BP oil spill, was significantly changed after municipal elections.

      * Howling Raines noted that the new administration moved forward with "radical
      changes" to the plan due to political shifts, converting what was planned as
      resilient/sustainable into short-sighted maintenance.

      * The change was implemented without sufficient public input; council members
      provided only 14 days'' notice before moving forward with approved plans by
      engineering firms and architects.


      THE PIVOT

      * Article 2 provides specific procedural evidence (14 days'' notice, lack of
      vetting) of how the scheme detailed in Article 1 is being executed locally.
      It shows that the project’s progression is driven by political decisions in
      a new administration rather than community consensus or proper due process.


