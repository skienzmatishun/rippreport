hooks:
  triangle-part-2-public-driven-vision:
    brief: 'THE CONFLICT

      *   The Triangle property was purchased by the City of Fairhope to settle a
      lawsuit.

      *   The lawsuit settlement cost the City $11.25 million, including $3 million
      in attorney fees.

      *   Councilman Burrell and Boone lied about the purchase being for a City Park.

      *   Burrell and Boone attempted to declare the property a conservation easement
      to prevent development.


      THE DISCOVERY

      *   A $650,000 Fairhope Area Community-based Comprehensive Land Use Plan is
      being approved using BP Restore Act funding.

      *   This plan will serve as a guide for future planning and must include the
      Triangle property.

      *   The new plan incorporates "Public-Driven Vision" to determine land use decisions.


      THE PIVOT

      *   Article 1 focuses on politicians (Burrell and Boone) making unilateral decisions
      regarding the Triangle property status.

      *   Article 2 reveals that the future decision for the Triangle property must
      be made through the comprehensive planning process, not individual council member
      advocacy.

      *   The Comprehensive Plan provides a framework for land use that supersedes
      the political maneuvering described in Article 1.


      KEY ENTITIES

      *   Fairhope

      *   Councilman Burrell

      *   Mr. Boone

      *   Mayor Kant

      *   Mayor Karin Wilson

      *   Jack Burrell (Council President)

      *   BP Restore funds

      *   $11.25 million settlement cost

      *   $3 million attorney fees

      *   $650,000 Comprehensive Land Use Plan'
    generated_at: '2026-07-11T05:51:45.894102Z'
  fairhope-jester-and-fly-creek:
    brief: 'THE CONFLICT:

      *   Fairhope Mega-Site ("Triangle property") was purchased by the City of Fairhope
      to settle a lawsuit.

      *   The lawsuit settlement cost the City $11.25 million plus $3 million in attorney
      fees.

      *   Councilman Burrell and Boone misled the public regarding the property''s
      status (claiming voluntary purchase for a City Park) to secure tax incentives
      favoring sellers.

      *   Mayor Kant was involved in keeping the public uninformed during the settlement
      process.


      THE DISCOVERY:

      *   Developers install low pressure sewer systems because they do not pay most
      of the total system costs, as opposed to the standard gravity fed system established
      by Fairhope Utilities in 2002.

      *   Low pressure systems require homeowners to pay for grinder pumps and ongoing
      pumping costs, which is why developers choose them to avoid paying overall system
      costs.


      THE PIVOT:

      *   Article 2 reveals a systemic preference among developers for cost-saving
      infrastructure (low pressure sewer) that directly relates to the financial incentives
      and development decisions surrounding properties like the Triangle Mega-Site
      detailed in Article 1. The sewer debate exposes how regulatory standards are
      circumvented for financial gain.


      KEY ENTITIES:

      *   Councilman Burrell

      *   Councilman Boone

      *   Mayor Kant

      *   City of Fairhope

      *   Triangle property

      *   Fairhope Utilities

      *   City Planning Commission

      *   Robert Brown (Councilman/Eastern Shore Art Center Board Member)

      *   Fly Creek developers'
    generated_at: '2026-07-11T05:51:45.894110Z'
  eagles-eye-catalyst-kant-corte:
    brief: 'THE CONFLICT

      *   Fairhope’s Triangle property was purchased by the City of Fairhope to settle
      a lawsuit, allegedly falsely claimed as a voluntary purchase for a City Park.

      *   The lawsuit settlement cost the City $11.25 million and $3 million in attorney
      fees.

      *   Councilman Burrell and Boone lied about the nature of the Triangle property
      sale and sought to declare it a conservation easement.

      *   The settlement was finalized without public participation, with Mayor Kant
      involved in keeping the public in the dark.


      THE DISCOVERY

      *   Councilman Burrell and Boone facilitated a "Gift" approved by the last City
      Council to the developer Angelo Corte.

      *   Burrell and Boone accepted threats of lawsuits from developers, allowing
      them to facilitate the deal for the Kant-Corte Apartments project.

      *   The Kant-Corte Apartments are currently clearing property on Fly Creek for
      development.


      THE PIVOT

      *   Article 2 reveals that Burrell and Boone’s actions in facilitating the developer
      "Gift" directly demonstrate the same pattern of corruption and undue influence
      regarding land deals that characterized their handling of the Triangle Mega-Site
      lawsuit and purchase agreement described in Article 1.

      *   Burrell and Boone are shown to have caved to developer threats, linking
      past legal deceit (Triangle) to present corrupt dealings (Apartments).


      KEY ENTITIES

      *   Burrell

      *   Boone

      *   Kant

      *   Corte

      *   Triangle property

      *   City of Fairhope

      *   Mayor Kant

      *   Mayor Wilson

      *   Catalyst'
    generated_at: '2026-07-11T05:51:45.894116Z'
  big-heads:
    brief: 'THE CONFLICT:

      *   Fairhope Triangle property was purchased by the City of Fairhope to settle
      a lawsuit.

      *   The lawsuit settlement cost the City $11.25 million and attorney fees were
      $3 million.

      *   Councilman Burrell and Boone falsely claimed the purchase was for a City
      Park/conservation easement.

      *   Mayor Kant worked with Burrell, Boone, and water carriers to keep the public
      uninformed regarding the Triangle property.


      THE DISCOVERY:

      *   The land transfer agenda (February 15, 2018) directed an acre of land to
      the Fairhope Single Tax Corporation for the Tatumville Subdivision.

      *   This same location is where a sewage spill occurred into Big Head Gully
      and Tatumville Gully.


      THE PIVOT:

      *   Article 2 proves that the Triangle property transfer was not a simple legal
      settlement but an orchestrated land transfer scheme involving conflicts of interest
      among City Council members and developers, exposing the ulterior motives behind
      Burrell and Boone''s actions described in Article 1.


