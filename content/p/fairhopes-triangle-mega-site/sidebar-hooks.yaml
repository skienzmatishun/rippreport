      Park, which is false.

      *   The settlement occurred without public participation, with Mayor Kant keeping
      the public in the dark.


      THE DISCOVERY

      *   A new deal, "The Triangle Nature Trail Park," has emerged as another Kant/good
      ole boy deal lacking public participation.

      *   Thompson Engineering (an associate of Mayor Kant) is authorized to plan
      the new park without approval from the council.

      *   The property was cleared of pines prior to purchase, leaving it susceptible
      to erosion and thorns, requiring approximately $1 million for development on
      land paid $11.25 million for.


      THE PIVOT

