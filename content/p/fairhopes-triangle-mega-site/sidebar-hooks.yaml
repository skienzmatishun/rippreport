  the-good-the-bad-and-the-ugly:
    brief: 'THE CONFLICT

      *   Fairhope’s Mega-Site (The Triangle property) was purchased by the City of
      Fairhope to settle a lawsuit.

      *   City Councilman Burrell and Boone claimed the purchase was for a City Park/conservation
      easement but lied.

      *   The lawsuit settlement cost the City $11.25 million.

      *   The City spent $3 million on attorney fees, despite promises that the City
      would pay no fees.

      *   Mayor Kant, Burrell, and Boone attempted to prove the property was a park.


      THE DISCOVERY

      *   Fairhope prevailed in the latest lawsuit preceding (the Breland case).

      *   A unanimous decision by the Alabama Supreme Court favored the developer,
      Buddy Breland.

      *   The Catalyst Council refused to discuss settlement or legal costs.

      *   The City Council (Boone and Burrell) demonstrated a mirror image of bad
      management seen in the Triangle lawsuit.


      THE PIVOT

      *   Article 2 confirms that the City Council members Boone and Burrell actively
      refused to settle the lawsuit, directly contradicting their claims about voluntary
      action or public participation mentioned in Article 1.

      *   Article 2 establishes the definitive legal outcome (Supreme Court ruling
      for Breland), proving the negative consequences of the council''s obstructionism
      described in Article 1.


      KEY ENTITIES

      *   Burrell

