  fairhope-a-city-owned-by-outside-interests-and-good-ole-boys:
    brief: 'THE CONFLICT

      *   The Triangle property was purchased by the City of Fairhope to settle a
      lawsuit.

      *   The lawsuit settlement cost the City $11.25 million.

      *   Attorney fees totaled $3 million.

