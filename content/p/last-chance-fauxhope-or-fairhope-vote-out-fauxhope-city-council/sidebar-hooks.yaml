      - Ronan McSharry (McSherry - Arrests, Assaults, Council Cover-up)

      - Troy Vickers (New Candidate Place 1 per Article 1)

      - Karen Wilson (Referenced in Article 2 as Prior Mayor who refused utility check)

      - Jade Consulting ($500 donation pending project)

      - Publix (Developer/Parker Road Project mud dumping)

