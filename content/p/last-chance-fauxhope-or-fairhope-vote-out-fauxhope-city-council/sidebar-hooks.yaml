      as reward for winning 2020 election. Qualified utility engineer fired and replaced
      with high school graduate. Author claims Burrell accepted $500 from Jade Consulting
      (pending developer project). Jack and Council refused author''s request to speak
      during public participation; Federal Court case resulted in City/Author losing
      and paying attorney fees. Ronan McSharry (Council Member) arrested multiple
      times for assaulting women; Council remained silent and covered up.


      THE DISCOVERY: Mayor Karin Wilson posted a "confidential" letter to the Fairhope
      City Council on June 11th at 7:30pm. Letter outlines complaints regarding Personnel
      Claims and "monitoring/spying" (reviewing employee emails). Gulf Coast News
