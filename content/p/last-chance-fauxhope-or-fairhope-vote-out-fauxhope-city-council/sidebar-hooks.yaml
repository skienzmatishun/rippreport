      instead of the Main Article''s CMS shortcode `{{< socialpreview url="..." >}}`.

      - Widget Article contains embedded image links `<img loading="lazy" src="/cdn-cgi/image/width=750...">`
      (6 images) which are not present in the Main Article''s content block.

      - Text Discrepancy: Widget Point 10 reads "One of Jack''s friends is Ronan McSherry"
      whereas Main Article Point 10 reads "One of the friends is Ronan McSherry".

      - Text Discrepancy: Widget Article Title omits "VOTE OUT FAUXHOPE" phrasing
      compared to Main Article.

      - Widget Content explicitly calls for "vote for Troy Vickers place 1" at the
      bottom (Main Article does not explicitly name Vickers in the call to action
      text, only links to site).


      THE PIVOT

      - Article 2 (Widget) transforms the Main Article''s investigative content into
      direct campaign material for Troy Vickers (`troyvickers.com`).

      - Both articles share the same source links (e.g., `https://troyvickers.com/`,
      Ripp Report article URLs).

      - The Widget Article is technically a repurposed clone of the Main Article,
      evidenced by identical 1-point text but different image assets (Vickers photos
      vs Flag/Lightning).

      - Meta Tag Discrepancy: Main Article metadata lists "Ronan McSharry" while Article
      2 Body Text uses "Ronan McSherry".

      - Vote Instruction Discrepancy: Main Article asks "Fauxhope keep Jack -- Fairhope
      -- vote Jack OUT"; Widget instructs "... vote for Troy Vickers place 1".


