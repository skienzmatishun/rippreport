      Burrell regarding ethics, utilities, and project costs.

      - Specific Amount Match: Both articles cite "500 dollars from Jade Consulting"
      (Main Point 5, Widget Point 5).

      - Specific Amount Match: Both articles cite cost increase from "6.3 million"
      to "10 million" (Waterfront project).

      - Specific Date Match: Both articles reference "covid election in 2020" (Main
      Point 2, Widget Point 2).

      - Specific Date Match: Main Article metadata indicates "over 23 years" (Author
      tenure).

      - Specific Date Match: Point 10 mentions "multiple times for multiple reasons"
      (Arrests).


