  Baldwin-county-wrongful-conviction:
    brief: |-
      1. THE CONFLICT
      - Murray "Bubba" Lawrence Jr. convicted of capital murder May 13, 2005 in Baldwin County, Alabama.
      - Defendant spent 18 years incarcerated for crime allegedly occurring May 6, 2003.
      - Victim: Brandon Hastings (murdered during robbery).
      - Prosecution based on testimony of Jarius McNeil, turned informant July 31, 2003.
      - No physical evidence secured: no fingerprints, weapon, ballistics, blood, DNA, or fiber linking Lawrence to crime.
      - Transcript records 2,200 pages of testimony.
      - Five witnesses testified placing Lawrence at home during the time of the murder.
      - Body disposed over 2 hours drive away in Mississippi; transcript analysis claims impossible to travel and commit crime within evidence timeframe.
      - District Attorney David Whetstone quoted in transcripts: "I have made a deal, a deal with the devil so that evidence could be heard."

      2. THE DISCOVERY
      - The Ripp Report produced podcast "A Verbal Lynching in Alabama" detailing the conviction.
      - Analysis conducted over 1,000 hours on >2,000 page official court transcript.
      - Investigation includes Brandon Hastings’ phone logs and physical re-tracing of murderer’s route from Alabama to Mississippi.
      - Rebecca Chambliss (pro bono attorney) now presenting case pro bono to The Innocence Project.
      - Links existing case narrative back to prior Ripp Report exposure: "railroaded-by-the-law" article.
      - Case page links to petition site justiceformurraylawrencejr.com for public support.

      3. THE PIVOT
      - Widget article validates Main Article claims by confirming "exhaustive research" exists to prove the case impossible.
      - Ripp Report podcast (Article 2) serves as multimedia proof of corruption claims made in Main Article.
      - Widget explicitly states Baldwin County Sheriff’s Department investigates themselves; connects Lawrence case to pattern of local judicial system corruption.
      - Confirms transcript analysis timeline created the "missing piece" needed to expose prosecution fiction described in Main Article.

      4. KEY ENTITIES
      - Murray "Bubba" Lawrence Jr. (Convicted Defendant)
      - Brandon Hastings (Victim)
      - Jarius McNeil (Witness/Accomplice)
      - David Whetstone (Retired District Attorney / Prosecutor)
      - Lt. Hoss Mack (Former Lead Investigator, Current Baldwin County Sheriff)
      - Robert Wilters (Retired Judge at trial / Current Baldwin County District Attorney)
      - Willy Huntley (Defense Attorney)
      - Rebecca Chambliss (Pro Bono Defense Counsel)
      - The Ripp Report (Media/Investigative Outlet)
      - Baldwin County, Alabama / Mississippi disposal site
