        - Geographical Impossibility: Crime location Baldwin County, AL; Body dump Mississippi (2+ hours one way).
        - Prosecution Theory: Based on McNeil's confession; McNeil told by lead investigator Hoss Mack he would receive death penalty if no accomplice named.
      - Official Team:
        - Lead Investigator/Sheriff (Current/At time): Hoss Mack.
        - Prosecutor: District Attorney David Whetstone (Retired).
        - Judge: Robert Wilters (Current DA of Baldwin County at time of article).

      2. THE DISCOVERY
      - Lagniappe Magazine Cover Story titled "Digging Deep":
        - Identified as a discovery of exculpatory autopsy evidence not disclosed during original trial.
        - Found in Baldwin County records post-2023 (or referenced late 2023).
      - Admissions:
