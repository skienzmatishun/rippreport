      Sheriff Mack was elected and promoted from Captain to Sheriff for assisting
      in the wrongful conviction.


      THE PIVOT

      Internal conduct allegations (Article 1) are linked to systemic corruption established
      in the Lawrence case details (Article 2).

      Mack’s promotion path connects directly to his role as lead investigator in
      Lawrence, explaining the lack of accountability for internal misconduct.

      Anthony Lowery is cited as Mack''s "water carrier" during the Lawrence trial,
      establishing a chain of command involving current internal affairs targets.

      Judges and Prosecutors (Wilters, Whetstone) implicated in withholding evidence
      confirm the "cover up" culture claimed in internal affairs allegations.

      Transcript Page 1591 explicitly documents the lack of forensic connection to
      Lawrence, supporting claims that Mack''s investigations are evidence-poor.


      KEY ENTITIES

      Hoss Mack

      Murray "Bubba" Lawrence Jr.

      Brandon Hastings

      Robert Wilters

      David Whetstone

      Anthony Lowery

      Dean McGowan

      Tony Fuqua

      Jarius McNeal

      Baldwin County Sheriff''s Department (BCSO)

      Holman Prison'
