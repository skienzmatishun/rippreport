  4-20:
    brief: 'THE CONFLICT:

      - April 20, 2010: Deepwater Horizon / BP Oil Spill occurs in Gulf of Mexico.

      - May 8, 2010: Governor Bob Riley forms task force to handle spill aftermath.

      - Tripp Pittman appointed by Governor Riley as "trustee" and banker for district
      funds intended for spill victims.

      - May 3, 2010: Pittman meets privately with Mayor of Fairhope to draft a personal
      contract for funds.

      - Article alleges Pittman diverted trust responsibilities toward self-enrichment
      and contract deals rather than public use.

      - Article claims Baldwin County suffered economic collateral damage due to state
      and legislative mismanagement regarding the spill.


      THE DISCOVERY:

      - April 20, [Current Year]: Alabama Cannabis Association forms organization
      with 21 members.

      - Tripp Pittman identified as attempting to enter Hemp industry as lobbyist
      and farmer (“Boom Boom Pittman”).

      - Article claims Pittman is not a legitimate Hemp farmer.

      - Pittman and Fairhope City Council back Bill Hightower for First Congressional
      runoff on July 14, 2020.


      THE PIVOT:

      - Main Article warns of political corruption, apathy in Alabama leadership,
      and the need for public skepticism regarding health/political information.

      - Widget Article validates this warning by exposing Tripp Pittman as a specific
      example of corrupt leadership (misuse of BP Trustee role).

      - Widget Article links Pittman''s past financial mismanagement to current Hemp
      politics and political races (Hightower), proving the Main Article’s thesis
      that "Birds of a feather flock together" regarding corruption.


      KEY ENTITIES:

      - Tripp Pittman (Former State Senator, Current State Representative, BP Task
      Force "Trustee")

      - Bill Hightower ("lowtower", First Congressional Seat Candidate)

      - Governor Bob Riley

      - Alabama Cannabis Association

      - BP / Deepwater Horizon Oil Spill Task Force

      - Fairhope City Council (Mayor)'
