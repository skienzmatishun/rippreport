      receive scholarships from the fund he oversees. The Trust holds millions of
      dollars at Regions Bank and is managed alongside Circuit Court Judges and lawyers
      who are accused of money laundering, tax evasion, or wire fraud.


      THE PIVOT

      Widget article confirms Article 1’s corruption thesis by identifying specific
      actors (Tom Albritton, Regions Bank). The financial impropriety in the Mabel
      Amos Trust proves Article 1’s claim that Alabama is "dead last" and "first in
      political corruption" is not abstract rhetoric.


      KEY ENTITIES

      - Tom Albritton (Director, Ethics Commission)

      - Regions Bank

      - Mabel Amos Memorial Trust / Fund

      - Tommy Gallion (Montgomery attorney)

      - Leigh Manning (relative of Mabel Amos, Gallion’s client)

