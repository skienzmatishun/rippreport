      million, including interest.

      *   The county spent $32 million on the land purchase in 2012.

      *   Specific payments made to the Crosby Trust ($25,976,500) and Catawba Land
      Company LLC ($6,312,500) occurred in 2012.

      *   Approximately $15 million of debt remains outstanding, including $8 million
      owed to the county’s oil and gas trust fund.

      *   The Baldwin County Economic Development Alliance (BCEDA) provided misleading
      information regarding the site''s readiness.


