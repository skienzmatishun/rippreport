      the money on a "good ole boy deal." This amounts to $40 million every 10 years.

      *   Tucker Dorsey is associated with multiple LLCs, including Baldwin County
      Sewer and a "private" business.


      THE DISCOVERY:

      *   Tucker Dorsey uses multiple LLCs to hide his business interests.

      *   Chris Elliott is alleged to be covering for Tucker Dorsey regarding these
      business interests.

      *   The address Summerdale 13040 Underwood Rd. has numerous LLCs linked to a
      Catalyst connection.

      *   Chris Elliott is linked to the Mega "Dump" site that cost taxpayers over
      $32 million.


      THE PIVOT:

      *   Article 2 provides evidence linking Tucker Dorsey’s use of LLCs and hidden
      business interests (mentioned in Article 1) to specific physical addresses and
      organizations (Summerdale address, Catalyst connection).

      *   Article 2 solidifies the accusation that both Dorsey and Elliott are politically
      motivated self-servers who depend on donations.


