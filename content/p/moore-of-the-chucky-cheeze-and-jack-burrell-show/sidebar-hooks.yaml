  jester-clone-clown:
    brief: '1. THE CONFLICT

      - Senator Tripp Pittman was appointed Trustee of BP funds in Fairhope.

      - In 2017, an ethics complaint was filed by Max Shelby regarding Pittman James.

      - Article 2 alleges Pittman allegedly plotted to skim $750,000 from the BP fund
