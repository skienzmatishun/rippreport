  fairhope-special-meeting:
    brief: 'THE CONFLICT:

      *   Jack Burrell and Chuckee were allegedly engaged in a campaign to smear the
      Mayor of Fairhope through media publications, specifically referencing actions
      taken around 2017.

      *   The conflict centered on Jack Burrell''s alleged attempt to undermine the
      Mayor due to her interference with a plan involving Burrell and Kant.


      THE DISCOVERY:

      *   Jack Burrell called a special City Council meeting on Friday, December 29,
      2017, at 8:00 am (referenced in PDF).

      *   The document confirms this action was taken by Jack Burrell and is tied
      to the political climate of late 2017.


      THE PIVOT:

      *   Article 2 provides specific, dated documentary evidence (the Special Council
      Meeting agenda) that verifies Jack Burrell’s involvement in a high-stakes maneuver
      to assert control and "cover his ass" during the precise period when Chuckee
      was allegedly running smear campaigns against Fairhope leadership.


      KEY ENTITIES:

      *   Jack Burrell

      *   Chuckee

      *   Fairhope City Council (and administration)

      *   Kant

      *   Sen Tripp Pittman'
