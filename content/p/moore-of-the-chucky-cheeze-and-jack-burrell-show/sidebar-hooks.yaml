      THE DISCOVERY

      *   Jack Burrell called a special meeting on Friday, December 29th, 2017, at
      8:00 am.

      *   Burrell is using a hand-picked attorney to cover his actions regarding the
      city.

      *   The city has discussed hiring a full-time city attorney, but not Jack Burrell.


      THE PIVOT

      *   Article 2 shows Burrell actively leveraging political control (special meeting,
      attorney use) which reinforces the narrative established in Article 1 that Burrell
      is an extreme and controlling elected official ("number one worst elected official").

      *   The current actions detailed in Article 2 demonstrate Burrell’s sustained
      power and intent to dominate the city, linking his past controversies (Article
      1) to present-day governance control.


