      *   Sen Tripp Pittman stole $750,000 from BP.

      *   Allegations were made against Jack Burrell concerning the Airport scandal.


      THE DISCOVERY:

      *   Chucky Cheeze and Jack Burrell are supporting lawsuits filed by fired employees
      seeking $100,000 from the city of Fairhope.

      *   Councilmen Boone Burrell and Brown supported these employee lawsuits to
      push an anti-Mayor campaign.

      *   The three B’s encouraged Pandora Heathcoat to file a lawsuit while waiting
      for Sherry Sullivan to be paid.

      *   Jack Burrell is hiding behind the Alabama Unethical Commission and his activities
      at the Fairhope Airport.


      THE PIVOT:

