  jack-ass:
    brief: 'THE CONFLICT

      *   Past allegations exist regarding a BP scandal involving Senator Tripp Pittman''s
      theft of $750,000 while serving as trustee for BP funds (Main Article).

      *   Senator Tripp Pittman served on the Alabama Ethics Commission and is alleged
      to have received an ethical pass despite his involvement in contracts with BP.

      *   The City of Fairhope has allegedly awarded municipal public contracts through
      its City Council over a ten-year period without transparent bid processes.


      THE DISCOVERY

      *   Article 2 details that for over ten years, the City of Fairhope awarded
      emergency hurricane debris removal contracts (specifically Bid No. 009-17) to
      Pittman Tractor, a private business owned by Senator Trip Pittman.

      *   The contract in question could bring millions of dollars to the recipient.

      *   Article 2 confirms Pittman used his position as "trustee" of BP funds to
      siphon off $750,000 and also leveraged political office to secure heavy equipment
      contracts for Baldwin County Government.


      THE PIVOT

      *   The Main Article makes generalized claims about a "$750,000 theft from BP."
      The Widget Article provides specific evidence by identifying Pittman''s role
      as "trustee" of the BP funds and linking this financial misconduct to his simultaneous
      awarding of massive municipal contracts (Bid No. 009-17).

      *   The Main Article claims Burrell and Pittman benefited from an unethical
      pass; the Widget Article illustrates this corruption by showing Pittman, a sitting
      public official and elected member, bidding on major city contracts within his
      own district (City Council agenda item: 6).


      KEY ENTITIES

      *   Jack Burrell (Council President/Councilman)

      *   Sen. Trip Pittman / Senator Tripp Pittman (Elected Official, Former Trustee
      of BP Funds)

      *   The City of Fairhope (Municipality, Body awarding contracts via City Council)

      *   Pittman Tractor (Private business owned by Sen. Trip Pittman)

      *   BP (Source of the alleged $750,000 funds/scandal)

      *   Mayor Wilson (Responsible for having contaminated contracts re-bid to new
      recipients)

      *   The Courier / #MeToo (Journalistic body being dragged down in political
      disputes)'
