      multiple lawsuits regarding deaths and alleged misconduct.

      *   Jonathan Victor was shot to death, unarmed, by the BCSO in May 2017.

      *   Robert Yates was shot to death on March 5, 2018, during an eviction, involving
      over 114 shells/bullet casings fired by SWAT team members.

      *   Peyton Little died by suicide (hanging with a seat belt) while in a moving
      car, alleged to be a confidential informant for the drug task force.

      *   Sheriff deputy William ‘Bill’ Smith was deceased after a drowning attempt
      on Fort Morgan Road.


      THE DISCOVERY

      *   BCSO received over $65 million in funding in 2020 and 2021.

      *   $700,000 was allocated for body and vehicle cameras, used by Mack to claim
      accountability and transparency within the BCSO.

      *   The legal process for cases involving the BCSO is being hampered by a "Closed
      Records Act" decision from the Alabama Supreme Court, restricting public access
      to law enforcement records (body cam footage, 911 transcripts).

      *   Sheriff Mack’s actions have generated multi-million dollar lawsuits against
      the BCSO.


      THE PIVOT

      *   Article 2 proves that the claims of lack of accountability and transparency
      regarding specific deadly incidents (Victor, Yates, Little) are consistent with
      the general pattern of systemic failure and legal restrictions placed on evidence
      access within the BCSO structure.

      *   The specific details provided in Article 2 reinforce the allegations made
      in Article 1 concerning Sheriff Mack''s political power over the County Commission
      and the alleged whitewashing of internal investigations by his Major Crime Unit.


