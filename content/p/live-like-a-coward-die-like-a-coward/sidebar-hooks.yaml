  carolyn-amick:
    brief: 'THE CONFLICT:

      - John McAfee operated in Belize from 2010 onward.

      - McAfee was fleeing a wrongful death lawsuit in Arizona, U.S. at the time.

      - McAfee hired Tom Mangar to beat up a local Belizian man in 2011 due to McAfee''s
