      - The beaten man died from his injuries; McAfee’s first murder in Belize.

      - McAfee employed 5 to 6 "street dogs" (bodyguards) in San Pedro.

      - Gregory Faull, a local retiree, threatened McAfee’s dogs with poison.

      - Dogs were poisoned; cause unconfirmed. Gregory Faull was later shot and killed
      in his house by an unknown assailant (executed-style).

      - McAfee asked Tom Mangar for a boat ride out of the country at night in fear.

      - McAfee offered Tom Mangar $5,000 USD to facilitate his escape from Belize.

      - McAfee eventually fled to Guatemala and later the U.S., where he was jailed
      awaiting extradition.

      - Article 1 narrator lived in Belize for 16 years; claims to be proud Belizian
      since Independence on September 21, 1981.


      THE DISCOVERY:

      - Carolyn Amick co-founded and managed Mariah Reef Resort on Ambergris Caye
      in Belize.

      - She designed the resort, interior decor, furniture, and staffed operations
      between 1979 and 1986.

      - Carolyn Amick lived on the island alongside her husband ("I") and daughter
      Mariah starting with their move in 1979.

      - Carolyn oversaw renovations of multiple properties on the island, including
      Paradise Villas condos and San Pedro resorts.

      - Article 2 confirms the existence of Mariah Reef Resort as a legitimate business
      venture established by Carolyn Amick.


      THE PIVOT:

      - Article 2 proves Mariah Reef Resort is the physical hub where John McAfee
      was operating (Article 1).

      - Article 2 connects Carolyn Amick as the local power/owner of the resort where
      McAfee lived (Article 1).

      - The timeline in Article 2 (move to Belize, 1979) overlaps with McAfee’s arrival
      noted in 2010 (Article 1: narrator known McAfee since 2010).

      - This establishes the location as a shared network: McAfee used Mariah Reef
      Resort''s infrastructure, and Carolyn Amick designed the exact facility.


      KEY ENTITIES:

      - John McAfee

      - Carolyn Amick (CA)

      - Mariah Reef Resort

      - Tom Mangar

      - Gregory Faull

      - Belize Government

      - San Pedro / Ambergris Caye / Belize City'
