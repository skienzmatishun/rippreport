  american-citizen:
    brief: "THE CONFLICT: \n- John McAfee utilized money and Belize’s weak jurisdiction\
      \ to evade a wrongful death lawsuit in Arizona.\n- 2011: McAfee hired Tom Mangar’s\
      \ circle of associates via gang members to beat a local man. Man died from injuries\
      \ (McAfee’s first orchestrated murder).\n- McAfee then hired criminals/bodyguards\
      \ (\"street dogs\") to control San Pedro beach area.\n- Gregory Faull (retiree)\
      \ confronted McAfee’s guards. Dogs poisoned; Faull found shot dead (executed\
      \ style).\n- 2011: McAfee fled Belize after killing Faull. Promised Tom Mangar\
      \ $5,000 for extraction to get him out of country.\n- US Authorities/Embassy\
      \ ignored Faull case and McAfee’s knowledge for years despite multiple attempts\
      \ by Tom Mangar.\n- Ronan McSharry assaulted Paula Dinardi at a bar/restaurant\
      \ in Fairhope, Alabama.\n- Incident date: November 2018 (evening of relaxation\
      \ turned to assault).\n\nTHE DISCOVERY:\n- Baldwin County local justice system\
      \ protected McSharry via procedural defects despite medical evidence of \"physical\
      \ injury.\"\n- Municipal Judge Stankowski ruled there was a defect in the first\
      \ charging document (missing wording: \"Did cause physical injury to another\"\
      ).\n- One year statute allotted to amend the document was passed; document was\
      \ not amended in time.\n- Text asserts City Attorney knew medical evidence but\
      \ failed to correct the defect within legal limits.\n- Fairhope City Council\
      \ President, Burrell, and appointed Municipal Judge Snedeker are identified\
      \ as connected to protecting McSharry.\n- Paula Dinardi (Victim, American Citizen)\
      \ lost her position as manager of the American Legion Tiki Bar in January 2019,\
      \ one month prior to assault date.\n- Suspicions suggest local politicians used\
      \ influence to remove Dinardi and allow McSharry's release.\n\nTHE PIVOT:\n\
      - Article 2 acts as the domestic parallel to McAfee’s foreign evasion.\n- McAfee\
      \ evaded accountability via Belize jurisdiction and local weakness; Article\
      \ 1 claims the rich/connected escape justice.\n- McSharry’s case (Article 2)\
      \ proves this mechanism exists within US legal systems too: Legal technicalities\
      \ and political influence (City Attorney, Council, Judges) were used to release\
      \ a convicted assault suspect.\n- It validates Article 1's central thesis that\
      \ money and connections override victim justice, now confirmed locally in Baldwin\
      \ County.\n\nKEY ENTITIES:\n- John McAfee\n- Ronan McSharry\n- Paula Dinardi\n\
      - Gregory Faull\n- Tom Mangar\n- Nanette Burnstein (Producer)\n- Marcus McDowell\
      \ (Fairhope City Prosecutor)\n- Judge Snedeker (Municipal Judge)\n- Stankowski\
      \ (Judge who ruled on document defect)\n- Burrell (Council President)\n- Fairhope\
      \ City Council\n- Baldwin County Justice System\n- Belize Government"
