  fairhope-voters-guide:
    brief: 'THE CONFLICT:

      *   Former Mayor and three councilmen were voted out in a recent election.

      *   Councilmen Burrell and Boone achieved the Triangle lawsuit ($12 million)
      and the sewer plant ($11 million).

      *   Mr. Boone opposed the resolution for the Cassady Company, Inc. engineering
      study, suggesting alternative firms (Dewberry/Preble-Rish LLC., Volkert, HMR,
      Huthingson Moore & Ranch).

      *   Mr. Burrell blocked the Mayor and led a charge to oppose a part-time Administrative
      Assistant position.

      *   Councilmen Burrell and Boone are characterized as "connected players" representing
      special interests.


      THE DISCOVERY:

      *   Kevin Boone holds numerous LLCs related to developments and is a partner
      in the "Strawman" series.

      *   John G. Avent is listed as a partner in LLCs associated with Kevin Boone.

      *   Jack Burrell was involved in airport/bid rigging, lying about the Triangle
      lawsuit, personal farmland purchases ($2.65 million), and holding an undisclosed
      police record.

      *   Robert Brown used inside information to secure public contracts totaling
      close to $1 million for a soccer field concession building and Fairhope Art
      Center contract.


      THE PIVOT:

      *   Article 2 identifies the specific nature of the corruption and self-interest
      behind the council actions described in Article 1 by linking specific individuals
