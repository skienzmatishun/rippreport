      (HMR).

      *   Mr. Boone had a conflict of interest affiliation with John G. Avent Firm
      Partner and was associated with North Ridge, LLC. (Formation Date: 6-2-2008).


      THE DISCOVERY:

      *   The Mayor utilized city funds to pay down on the Triangle lawsuit ($3 million
      drained from the utility fund) and secured a $5.25 million bank loan for the
      settlement.

      *   A major fraud allegation was raised regarding the Triangle lawsuit, specifically
      that the Mayor falsely claimed the settlement was a purchase of a Park rather
      than a legal settlement.

      *   The city lost opportunities to spend $30 million on a new sewer facility
      instead of a $10 million upgrade.

      *   There is an active BP grant fraud complaint filed against the Mayor and
      Senator Pittman, leading to an FBI investigation and conviction by the Alabama
      Attorney General’s office.


      THE PIVOT:

      *   Article 2 provides concrete evidence (financial details and legal outcomes)
      regarding the misuse of funds and specific acts of corruption (like the Triangle
      lawsuit and BP grant fraud) that Article 1 only broadly implies through accusations
      of "connected" players and ignored infrastructure problems.

      *   The widget proves that the actions taken by council members like Boone and
      Burrell were not merely political disagreements but involved direct financial
      decisions and potential criminal activity (grant fraud).


