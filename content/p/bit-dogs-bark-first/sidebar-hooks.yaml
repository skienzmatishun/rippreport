      despite having 68 lift stations.

      *   Catalyst Associates was formed on August 11, 2014, listing Michael Scott
      Boone as a manager.


      THE DISCOVERY

      *   Article 2 reveals that Catalyst is the political organization/entity supported
      by Elliott, Haygood, and Stacy to influence local politics in Fairhope.

      *   It confirms Councilman Kevin Boone’s son, Michael Scott Boone (who serves
      as a manager for Catalyst), is operating within this influential group.

      *   The discovery frames the opposition from Mr. Burrell and Mr. Boone toward
      Mayor Wilson as "dirty tricks" by Catalyst to regain power following fair elections.


      THE PIVOT

      *   Article 1 raises specific conflict of interest concerns regarding Councilman
      Kevin Boone’s affiliation with John G. Avent, a partner at Preble-Rish, Inc.,
      evidenced by SS filings linking Boone (via BA-101, LLC) to Avent''s associated
      entities.

      *   Article 2 provides the systemic context for this alleged conflict by revealing
      that the "Council" is being steered by Catalyst—a political organization controlled
      in part by Kevin Boone’s family and supported by key figures like Elliott and
      Haygood.

      *   This proves Article 1''s claim of individual corruption (Boone/Avent link)
      is tied to a broader, structured political machine (Catalyst/Elliott/Haygood).


      KEY ENTITIES

      *   Fairhope City Council / Fairhope

      *   Councilman Kevin Boone (and Mr. Boone)

      *   Mr. Burrell (Councilman / President)

      *   Triangle lawsuit ($12M settlement)

      *   John G. Avent (Preble-Rish, Inc. Firm Partner)

      *   Catalyst Associates (Political organization formed Aug. 11, 2014)

      *   Michael Scott Boone (Manager of Catalyst Associates; son of Kevin Boone)

      *   Coley M. Boone (Registered Agent for Catalyst/BA-101, LLC)

      *   Elliott

      *   Haygood

      *   Lynn Stacey'
