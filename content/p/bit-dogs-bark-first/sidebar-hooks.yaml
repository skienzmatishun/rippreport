  fairhope-town-hall-meeting:
    brief: 'THE CONFLICT:

      *   Fairhope City Council corruption involving Mayor, Councilmen Mr. Burrell
      and Mr. Boone.

      *   Triangle lawsuit settled for $12 million and sewer plant for $11 million
      behind closed doors.

      *   Mr. Boone''s opposition to a Professional Engineering Capacity Study for
      Gas, Water, and Sewer utilities (Cassady Company, Inc.).

      *   Mr. Boone’s conflict of interest due to affiliation with John G. Avent Firm
      Partner Preble-Rish, Inc.

      *   Councilman Jay Robinson having contributions totaling $1,000 from Ray Hix
      (Airport Authority Board member/Sec. Treasurer) to influence votes on the Airport
      Authority.


      THE DISCOVERY:

      *   The City Council is refusing to address critical citizen issues during the
      first town hall meeting.

      *   The council president refuses to put the repeal of ordinance 1572 on the
      city council agenda.

      *   The Airport Authority is demanding control and ownership of airport land,
      which constitutes 21% of the city debt.

      *   Fairhope is spending more on the Airport Authority than on schools.


      THE PIVOT:

      *   Article 2 confirms that the interests of corrupt Councilmen (Burrell/Boone)
      are centered on protecting the status quo regarding the Fairhope Airport Authority
      and land control, which is a key element of the larger infrastructure and political
      corruption detailed in Article 1.


      KEY ENTITIES:

      *   Fairhope City Council

      *   Mr. Burrell

      *   Mr. Boone

      *   John G. Avent Firm Partner Preble-Rish, Inc.

      *   Jay Robinson

      *   Ray Hix (Airport Authority Board member/Sec. Treasurer)

      *   Cassady Company, Inc.

      *   Fairhope Airport Authority'
    generated_at: '2026-07-11T12:21:08.489582Z'
  fairhope-voters-important-notice:
    brief: 'THE CONFLICT

      *   Past corruption involved Mayor and councilmen who were "connected" players.

      *   Accomplishments included the Triangle lawsuit settlement and a sewer plant
      for $11 million.

      *   Mr. Boone and Mr. Burrell were key figures in these accomplishments.

      *   Mr. Boone opposed the selection of Cassady Company for an engineering study,
      suggesting Preble-Rish LLC., Volkert, or HMR, Huthingson Moore & Ranch (HMR).

      *   Conflict of interest noted: Mr. Boone''s affiliation with John G. Avent
      Firm Partner Preble-Rish, Inc.


      THE DISCOVERY

      *   The current council is operating under the influence of the minority and
      prioritizing personal friendships over city issues.

      *   The council imposed a hiring freeze to punish Mayor Wilson.

      *   The council rejected Mayor Wilson''s choices for the Airport Authority board
      and certain hires.

      *   Catalyst Associates was formed on August 11, 2014, with Michael Scott Boone
      and Lynn Stacey as managers.


      THE PIVOT

      *   Article 1 details specific past governmental corruption (lawsuits, infrastructure
      decisions) and conflicts of interest involving specific entities (BA-101, LLC,
      Preble-Rish).

      *   Article 2 reveals the modern structure of the opposition—the existence of
      Catalyst Associates, which is explicitly linked to Councilman Boone’s son (Coley
      M. Boone), demonstrating that the past corruption feeds into current organized
      political efforts aimed at discrediting the Mayor.


      KEY ENTITIES

      *   Boone, Kevin G (Registered Agent for BA-101, LLC)

      *   Burrell

      *   Boone

      *   Triangle lawsuit

      *   Sewer plant ($11 million)

      *   Preble-Rish LLC.

      *   John G. Avent Firm Partner Preble-Rish, Inc.

      *   Catalyst Associates

      *   Mayor Wilson

      *   Ray Hix (Airport Authority Board member/Sec. Treasurer)

      *   Jay Robinson'
