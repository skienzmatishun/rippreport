  fairhope-citizens-citizens-citizens:
    brief: 'THE CONFLICT

      - Fairhope City Council failed to address infrastructure needs, specifically
      ignoring a sewer plant project worth $11 million for ten years.

      - The Triangle lawsuit was settled behind closed doors without public participation.

      - Councilmen Mr. Boone and Mr. Burrell opposed a Professional Engineering Capacity
      Study resolution intended to secure fresh eyes on utilities.

      - Mr. Boone''s involvement with John G. Avent (via North Ridge, LLC) created
      a conflict of interest.

      - Councilmen Jay Robinson and Mr. Burrell sided against Mayor Wilson and community
      interests regarding infrastructure oversight.


      THE DISCOVERY

      - The Airport Authority debt represents 21 percent of Fairhope’s overall borrowing.

      - The Airport Authority purchased 258 acres in 2007 for $8.85 million.

      - Mayor Wilson urged the council to take ownership of the property from the
      Airport Authority.


      THE PIVOT

      - Article 1 details how corrupt council members (Boone, Burrell) blocked infrastructure
      studies and ignored city needs.

      - Article 2 reveals that Mr. Burrell is using his position at the Fairhope Airport
      Authority to obstruct Mayor Wilson''s efforts to gain city ownership of airport
      land, linking personal interests to public funds.


      KEY ENTITIES

      - Fairhope City Council

      - Mr. Boone (Kevin G. Boone)

      - Mr. Burrell (Jack Burrell)

      - Mr. Avent (John G. Avent)

      - North Ridge, LLC

      - Jay Robinson

      - Ray Hix (Airport Authority Board member/Sec. Treasurer)

      - Fairhope Airport Authority

      - Mayor Karin Wilson'
