  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT

      *   Fly Creek Apartments development contested by citizens.

      *   City council voted for a 120-day extension on the sunset clause allowing
      the developer more time for a site plan.

      *   Conflict of interest alleged involving Mr. Brown and Mr. Corte.

      *   Mr. Corte and the former Mayor cost $11.25 million in a triangle lawsuit
      settlement.

      *   Council members (Burrell/Beavis, Boone/Butthead) are accused of steering
      the council to favor the developer.


      THE DISCOVERY

      *   The six-day trial revealed that the proposed drainage plan will allow excess
      stormwater from the apartment complex to be dumped directly into wetlands.

      *   This discharge point is located 100 to 150 feet from the outfall pipe, combined
      with Publix construction drainage.

      *   The new plan ditches Fly Creek by detouring the retention pond and omitting
      expansion plans for a 5-acre pond.


      THE PIVOT

      *   Article 2 provides the technical proof (the flawed drainage plan) that justifies
      Article 1''s accusations that the council ignored environmental violations and
      favored the developer.

      *   The physical mechanism of pollution (dumping stormwater into Fly Creek wetlands)
      connects the political decision-making (extension vote) to direct, documented
      ecological harm.


      KEY ENTITIES

      *   Fly Creek Apartments

      *   Angelo Corte

      *   Burrell (Jack Burrell)

      *   Boone (Kevin Boone)

      *   Robert Brown

      *   Senator Pittman

      *   Mayor Wilson

      *   Adam Milam (Plaintiff''s attorney, Friends of Fly Creek)

      *   Publix site

      *   Fly Creek Watershed'
    generated_at: '2026-07-11T11:06:44.801625Z'
    text: Jack Burrell and Kevin Boone handed the developer a 120-day extension while
      ignoring a drainage plan that dumps toxic runoff into wetlands. This technical
      discovery reveals the exact mechanism these politicians are using to trade our
      environment for developer favors.
