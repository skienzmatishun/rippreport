      *   Dorsey allegedly ignored that Governor Riley designated Senator Pittman\
      \ as the \"trustee\" of these specific funds.\n*   The Mega Site project has\
      \ reportedly cost Baldwin County over $50 Million in lost opportunities/costs\
      \ while under Dorsey’s watch.\n\nTHE DISCOVERY\n*   The Widget Article (Open\
      \ letter to DA Robert Wilters) reveals that an organization called Catalyst\
      \ is allegedly running a \"shadow government\" within Baldwin County and Fairhope.\n\
      *   It proves a coordinated campaign exists to unseat elected officials, citing\
      \ the complaint submitted by Councilman Kevin Boone against Mayor Wilson as\
      \ evidence of this effort.\n*   The letter accuses DA Robert Wilters of being\
      \ compromised, specifically noting his support for Lynn Perry (a Catalyst candidate)\
      \ for Probate Judge and discouraging Harry D’Olive from running.\n\nTHE PIVOT\n\
      *   Article 1 presents specific instances of individual misconduct by Commissioner\
      \ Tucker Dorsey regarding financial oversight (BP Grant, Mega Site) and administrative\
      \ firings.\n*   Article 2 introduces the overarching organizational structure\
      \ (\"Catalyst\") that allegedly enables or orchestrates this type of corruption\
      \ systemically.\n*   The pivot moves the focus from single-instance political\
      \ failure (Dorsey’s actions) to a suspected coordinated institutional attack\
      \ on the Baldwin County government, leveraging media (*The Courier*, WACO radio)\
      \ and legal influence (DA Wilters).\n\nKEY ENTITIES\n*   Tucker Dorsey (Baldwin\
      \ County Commissioner)\n*   Senator Pittman\n*   Governor Riley\n*   Robert\
      \ Wilters (Baldwin County District Attorney)\n*   Kevin Boone (Fairhope City\
      \ Councilman / Catalyst member)\n*   Mayor Wilson\n*   Catalyst (Political organization)\n\
      *   John Avant \n*   Lynn Perry\n*   Harry D’Olive\n*   Lagniappe (Investigative\
      \ source)\n*   Hoss Mack (Baldwin County Sheriff)"
