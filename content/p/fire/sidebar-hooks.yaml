      attorneys to prevent Sen. Pittman from facing ethics charges related to the
      BP Grant.

      *   Dorsey ignored Sen. Pittman''s company receiving combined $750,000 contracts
      for BP Boom deployment.

      *   Sen. Pittman was designated by Governor Riley as the "trustee" of those
      funds.


      THE DISCOVERY:

      *   The Alabama Ethics Commission issued a 4-0 opinion ruling on July 29, 2016.

      *   The ruling stated Commissioner Dorsey should not vote, attempt to influence,
      or participate in issues related to business dealings with BCSS because Burke
      was his employer.

      *   The specific complaint cited the failure of Commissioner Dorsey to heed
      the Ethics Commission''s unanimous advice regarding matters related to BCSS.


      THE PIVOT:

      *   Article 2 provides a formal legal finding from the Alabama Ethics Commission
      confirming a conflict of interest and disqualification concerning business dealings
      with BCSS.

      *   This ruling serves as the official basis for the allegations of corruption
      and unethical conduct detailed in Article 1 regarding Dorsey''s connections
      and actions related to BP funds.


      KEY ENTITIES:

      *   Tucker Dorsey (Commissioner)

      *   Sen. Pittman

      *   BP Grant

      *   Governor Riley

      *   Alabama Ethics Commission

      *   BCSS'
