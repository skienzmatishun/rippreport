hooks:
  you-re-fired:
    brief: 'THE CONFLICT:

      - October 2010: The Alabama Ethics Commission issued an advisory opinion regarding
      Commissioner Tucker Dorsey’s potential conflicts of interest.

      - This opinion determined that because Burke was Dorsey’s employer, Dorsey should
      not participate in or vote on issues related to business dealings with Baldwin
      County Sewer Service (BCSS).


      THE DISCOVERY:

      - Francis Paul Ripp/The Ripp Report filed the July 29, 2016, widget article
      directly addressing this historical conflict.

      - The widget functions as a statement of facts presented to the Alabama Ethics
      Commission, alleging that Commissioner Dorsey failed to heed the unanimous advice
      given in the October 2010 advisory opinion.


      THE PIVOT:

      - Article 1 (Fire) alleges current and past ethical failures regarding large
      contracts ($750,000 from BP for Mega Site) and business ties.

      - Article 2 is the ''smoking gun'' because it provides a specific, dated regulatory
      record—the October 2010 advisory opinion—demonstrating that Dorsey was previously
      warned about exactly this type of financial conflict (association with an employer/business
      dealing) and subsequently failed to adhere to ethical guidelines.


      KEY ENTITIES:

      - Commissioner Tucker Dorsey

      - Baldwin County Commission

      - Alabama Ethics Commission

      - Burke (Employer/Developer of BCSS)

      - BP (Business contracting for Mega Site)

      - Sen. Pittman (Recipient of $750,000 contracts)

      - Governor Riley

      - Lagniappe / Eric Mann (Investigative reporting source)

      - Francis Paul Ripp / The Ripp Report

      - Baldwin County Sewer Service (BCSS)'
