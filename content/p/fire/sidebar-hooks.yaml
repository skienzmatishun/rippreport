  green-acres-on-acid:
    brief: '**1. THE CONFLICT:**

      *   Commissioner Dorsey fired key Baldwin County employees including county
      manager, EMA director, and attorneys (circa 2018) as part of a political maneuver.

      *   Dorsey claimed these dismissed employees were attempting to prevent State
      Senator Pittman from facing ethics charges related to contracts involving BP
      funding for the Mega Site.

      *   As County Commissioner, Dorsey reportedly ignored his duty regarding Sen.
      Pittman’s $750,000 combined contract with BP Boom deployment in Baldwin County
      while he was designated by Governor Riley as the funds'' trustee (2016).


      **2. THE DISCOVERY:**

      *   The second article confirms State Senator Tripp Pittman received contracts
      from Fairhope and Perdido beach involving BP that netted him $750,000 through
      his company/personal interests while acting as designated trustor for Baldwin
      County funds.

      *   Pittman allegedly operated a marine contractor company without the required
      general contractor’s license (a felony) to install oil protective boom.

      *   The contracts involved substandard work, including using defective or used
      equipment and leaving recovery anchors cut at water level instead of retrieving
      them as required by contract.


      **3. THE PIVOT:**

      *   Article 2 substantiates the "ethics" claim cited in Article 1; it provides
      documented evidence (Ethics Commission complaint) that Sen. Pittman engaged
      in serious financial malfeasance and criminal contracting practices related
      to Baldwin County''s BP funds.

      *   The confirmation of a filed complaint, FBI investigation, Grand jury subpoena,
      and transfer to the Alabama Attorney General’s white collar crime division verifies
      the existence and severity of the ethics charges mentioned by Dorsey as a political
      motivation for dismissals.


      **4. KEY ENTITIES:**

      *   Dorsey (Commissioner/County Employee)

      *   Sen. Pittman / Tripp Pittman (State Senator, Trustor of BP Funds)

      *   Governor Riley (Designated Trustee)

      *   Baldwin County (Government Entity)

      *   BP Boom Deployment (Contract Subject)

      *   Ethics Commission (Alabama)

      *   FBI (Investigation body mentioned)

      *   Fairhope City Council / Fairhope Mayor (Council/Mayor)

      *   AG’s white collar crime division (State Attorney General transfer point)

      *   Lagniappe (Publisher of Article 1)'
