hooks:
  hi-jack-ed:
    brief: 'THE CONFLICT

      *   Mayor Karin Wilson sought to take ownership of 258 acres purchased by the
      Fairhope Airport Authority in 2007 for $8.85 million.

      *   The Airport Authority debt represents 21 percent of Fairhope''s overall
      borrowing according to Mayor Wilson.

      *   Jack Burrell, who served as Council President, Airport Authority Board member,
      and liaison, actively undermined Wilson''s efforts.

      *   Burrell refused to recuse himself from comments regarding a bid he selected
      that went to a Board member and close friend.


      THE DISCOVERY

      *   The widget article acknowledges the ongoing coverage of the Fairhope Airport
      Authority by John Sharp, Jane Nicholes, and Ron Sivak.

      *   It suggests that future information and documentation will support Mayor
      Wilson''s position against Burrell.


      THE PIVOT

      *   Article 2 frames the conflict within a broader political context, implying
      that the existing coverage and anticipated documentation will expose Jack Burrell''s
      role in supporting the Airport Authority over citizen interests.

      *   The widget establishes that the controversy surrounding the Airport Authority
      is documented and being covered by local media figures.


      KEY ENTITIES

      *   Mayor Karin Wilson

      *   Jack Burrell (Council President, Airport Authority Board member, liaison)

      *   Fairhope Airport Authority

      *   258 acres property

      *   $8.85 million purchase price (2007)

      *   Fairhope City Council

      *   John Sharp

      *   Jane Nicholes

      *   Ron Sivak'
