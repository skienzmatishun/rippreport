      Airport Authority debt ($8.85 million for 2007 purchase of 258 acres, representing
      21% of total municipal borrowing).

      *   The conflict centers on placing the airport land title into city ownership
      using "TAX DOLLARS."

      *   Council President Jack Burrell has been publicly challenging Wilson''s efforts,
      responding to her concerns with a mocking dismissal: "The citizens. The citizens.
      The citizens."

      *   Burrell refuses to recuse himself from comments regarding Airport Authority
      bids he selected, despite allegations that the bid benefited a Board member
      and personal friend.


      THE DISCOVERY

      *   Article 2 identifies "Catalyst Associates" as an influential political organization
      allegedly directing City Council actions against Mayor Wilson.

      *   Catalyst was formed on August 11, 2014, with Michael Scott Boone and Lynn
      Stacey listed as managers and Coley M. Boone (son of a councilman) as its registered
      agent.

      *   Councilmen Jack Burrell and Kevin G. Boone are identified in the Widget
      Article as being slowed down by this Catalyst organization.

      *   Catalyst is linked to political figures such as Elliott and Haygood, whose
      group was claimed to ensure 100% of their candidates won elections until Mayor
      Wilson''s election changed the dynamic.


      THE PIVOT

      *   Article 1 focuses on Burrell’s obstructive behavior (refusal to recuse;
      undermining city efforts).

      *   Article 2 provides a structure for this obstruction by linking Councilman
      Burrell and Councilman Boone directly to Catalyst, an organization with deep
      familial roots among council members.

      *   The pivot shifts the narrative from a standard political clash between Wilson
      and Burrell to alleged coordinated resistance orchestrated by a politically
      connected minority group (Catalyst) attempting to maintain self-serving control
      over City Council decisions.


      KEY ENTITIES

      *   Mayor Karin Wilson

      *   Jack Burrell (Council President / Airport Authority liaison)

