  court-public-opinion-now-session:
    brief: 'THE CONFLICT

      *   Ground Lease execution date: December 17th, 2015.

      *   Request for Advisory Opinion submitted by Dennis R. Bailey on December 16th,
      2015.

      *   Advisory Opinion issued by the Alabama Ethics Commission on February 3rd,
      2016 (after the lease was executed).

      *   Inconsistencies found between the executed lease documents and the Request
      for Bids (RFP) terms and the Advisory Opinion requirements regarding bidding
      procedures.


      THE DISCOVERY

      *   The Fairhope Airport Authority is engaged in a dispute over property ownership:
      the Mayor wants the land in the City of Fairhope name, while the Authority seeks
      to retain ownership and use tax dollars ($310,000/year) for debt reduction.

      *   Council President Jack Burrell was an elected official and an Airport Authority
      Board member who negotiated the ground lease and selection process.


      THE PIVOT

      *   Article 2 connects the alleged bid rigging detailed in Article 1 (inconsistent
      leases, flawed RFP process) to specific political actors by revealing that Council
      President Jack Burrell participated in negotiating the lease, suggesting his
      involvement directly influenced the procedural flaws noted in the legal dispute.


