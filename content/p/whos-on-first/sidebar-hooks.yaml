      * Multiple inconsistencies were noted between the executed Dec. 17, 2015 lease
      and various submitted documents (e.g., EXHIBIT C dated December 21, 2015), including
      differences in contractual terms regarding personal guaranty and construction
      timelines.


      THE DISCOVERY

      * Councilman Brown stated that ethics complaints against Council President Jack
      Burrell and Airport board member Mr. Ray Hix have been "ruled baseless," despite
      investigations being ongoing.

      * The Ripp Report alleges Council President Jack Burrell pressured an investigation
      into City of Fairhope invoices to divert attention from his own pending ethics
      scrutiny regarding airport operations.


      THE PIVOT

      * The documented historical failure of the Fairhope Airport Authority to adhere
      to Ethics Commission protocols (2015-2017) provides the context and foundation
