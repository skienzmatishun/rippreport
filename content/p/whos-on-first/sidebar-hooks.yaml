      opinion.

      *   December 17, 2015: Fairhope Airport Authority executes a Ground Lease and
      Operating Agreement.

      *   Post-2016: Allegations surface regarding suspicious handling of hangar bids
      at the airport following former Fairhope Mayor Can’t''s defeat in 2016.


      THE DISCOVERY

      *   The governance of the Fairhope Airport Authority is controlled by Council
      President Jack Burrell, who actively isolates the City of Fairhope from participation
      despite city subsidies.

      *   Captain Jack holds a position overseeing the bid process for board members
      while reportedly receiving personal benefits (free air miles and golf vacations).

      *   There are severe lack of accountability regarding revenue collection; the
      Authority receives 7 cents on the dollar in fuel income, but no record is kept
