  court-public-opinion-now-session:
    brief: 'THE CONFLICT

      * Dec 16th, 2015: Dennis R. Bailey requested an Advisory Opinion from the Alabama
      Ethics Commission regarding a proposed Ground Lease for Fairhope Airport Authority.

      * Feb 3rd, 2016: The Ethics Commission rendered its Advisory Opinion, stating
      that any contract must be filed within ten days of execution.

      * Dec 17th, 2015: The Authority executed the Ground Lease and Operating Agreement
      (the lease). This date is prior to the Feb 3rd, 2016 advisory opinion requirement.

      * December 28th, 2015: Memorandum of the ground lease was recorded with Baldwin
      County Judge of Probate.

      * Jan 25th, 2017: The Ripp Report sent a Supplement to Complaint detailing allegations
      of improper bidding and bid rigging against the Fairhope Airport Authority and
      its officials.


      THE DISCOVERY

      * Jack Burrell (Fairhope City Council President) was the elected official who
      served as an Airport Authority voting Board member during the negotiation and
      selection process for the lease.

      * Burrell, along with other members, sat on the ad hoc committee that reviewed
      and recommended the RFP (Request for Proposal).

      * Current dispute involves Mayor [Name not specified/Wilson] seeking city ownership
      of airport property versus Council President Jack Burrell''s insistence on Authority
      ownership.

      * Burrell controls the council agenda and has blocked attempts to repeal ordinance
      1572 regarding the Airport property asset transfer.


      THE PIVOT

      * Article 1 established that the leasing process was procedurally flawed, specifically
      citing a violation of Ethics Commission rules by executing a lease (Dec 17,
      2015) before obtaining the required Advisory Opinion (Feb 3, 2016).

      * Article 2 identifies Jack Burrell as an involved official in both negotiating
      and selecting the winning bidder (Hix/Snedeker), revealing that the legal irregularities
      detailed in Article 1 were not just procedural errors but may have been influenced
      by a high-ranking official with vested interests in maintaining Authority ownership.


      KEY ENTITIES

      * Fairhope Airport Authority

      * Jack Burrell (City Council President / Airport Authority Board Member)

      * Dennis R. Bailey (Attorney for Hix/Snedeker)

      * Alabama Ethics Commission

      * Baldwin County Judge of Probate

      * Francis Paul Ripp (The Ripp Report)

      * Joe McEnerney (Airport Authority Chairman)

      * Josh Myrick (Attorney, recipient of the correspondence)

      * Mr. Ray Hix / Hix/Snedeker Companies'
