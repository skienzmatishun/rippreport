hooks:
  fairhope-airport-un_authorized:
    brief: 'THE CONFLICT

      *   Fairhope Airport Authority executed a Ground Lease and Operating Agreement
      on December 17th, 2015.

      *   There were inconsistencies between the executed lease documents (Dec. 17th,
      Dec. 21st Exhibit C) and the terms of the Request for Bids (RFP).

      *   The execution of the lease allegedly predated the required Ethics Commission
      Advisory Opinion (March 3, 2016), violating filing requirements.


      THE DISCOVERY

      *   A lawyer was paid to draft an ethics opinion (No. 2016-04) to permit a Board
      member/lawyer to enter into a lease with the Airport Authority.

      *   Board members failed to adhere to ethics rules regarding confidential information
      and conflicts of interest when awarding the lease.

      *   The memorandum of lease was signed by the Airport Authority with Mid-Bay
      Air LLC on December 23, 2015, prior to receiving the necessary Ethics Opinion.


      THE PIVOT

      *   Article 2 proves that the ground lease described in Article 1 is fundamentally
      null and void because it was executed despite ethical violations and procedural
      failures by the Airport Authority Board members (specifically Jack Burrell)
      who failed due diligence.


      KEY ENTITIES

      *   Fairhope Airport Authority

      *   Dennis R. Bailey

      *   Ray Hix

      *   Jack Burrell (City Council President/Board Member)

      *   Alabama Ethics Commission

      *   Mid-Bay Air LLC'
    generated_at: '2026-07-11T11:26:16.833337Z'
  fairhope-airport-authority-flying-without-a-compass:
    brief: 'THE CONFLICT

      *   Fairhope Airport Authority ground lease documents exhibited multiple inconsistencies
      regarding dates and content.

      *   The Ground Lease and Operating Agreement was executed on December 17th,
      2015.

      *   Attorney Dennis Bailey requested an Advisory Opinion from the Alabama Ethics
      Commission on December 16th, 2015.

      *   The Advisory Opinion was issued March 3rd, 2016.

      *   The executed lease was not filed with the Alabama Ethics Commission within
      ten days of execution (required by the Advisory Opinion rules).


      THE DISCOVERY

      *   Prior to the current airport controversy, there were indications of corruption
      and ethical failure at Fairhope Airport.

      *   An "illegal meeting" occurred, leading to Fairhope City Council receiving
      additional ethics training.

      *   The City Council failed the subsequent Alabama Ethics course.


      THE PIVOT

      *   The Widget Article proves that systemic ethical failures and poor behavior
      existed previously, setting the stage for the current issues (like the conflicting
      leases) by showing a history of corruption and lack of adherence to legal/ethical
      procedures by airport officials and city council members.


      KEY ENTITIES

      *   Josh Myrick

      *   Joe McEnerney (Chairman)

      *   Jack Burrell (City Council)

      *   Dennis R. Bailey (Attorney)

      *   Ray Hix

      *   Alabama Ethics Commission

      *   Fairhope City Council'
    generated_at: '2026-07-11T11:26:16.833348Z'
