      \ wings (backing Carl) vs Conservative activist wing/Club for Growth (backing\
      \ Hightower).\n\nDISCOVERY:\n- Baldwin County election data analyzed in Article\
      \ 2.\n- 150,104 registered voters; only 36,073 voted (24% turnout).\n- Article\
      \ 2 claims they followed 8 \"Catalyst Candidates\" who were well funded.\n-\
      \ Outcome: Catalyst candidates only secured one race by significant margin (Judge\
      \ Scully, 60% of vote).\n- Other margins were extremely close:\n    - Jeb Ball\
