  catalyst-signs:
    brief: "1. THE CONFLICT:\n- AL-1 congressional race between candidate Jerry Carl\
      \ and opponent \"Lowtower\" (Hightower).\n- July 14, 2020: Main article directs\
      \ readers to vote for Jerry Carl.\n- Article identifies \"Lowtower\" as the\
      \ embodiment of \"Catalyst\" (Status Quo).\n- Carl backed by: Business Council\
      \ of Alabama, Alabama Farmers Federation, Byrne.\n- Lowtower/Hightower backed\
      \ by: Club for Growth (expected to spend >$1 million on ads).\n- Narrative frames\
      \ Carl as \"activist/business\" vs. Lowtower as \"good ole boys/politics for\
      \ personal gain.\"\n\n2. THE DISCOVERY:\n- Widget Article identifies \"Catalyst\"\
      \ as rebranded political consulting firm Scott Boone Consulting (CSB).\n- Name\
      \ \"Catalyst\" abandoned due to political toxicity and elected officials disassociating.\n\
      - CSB/Scott Boone operation spans Baldwin County: Fairhope, Daphne, Spanish\
      \ Fort, Bay Minette.\n- Evidence used: PVC framed political yard signs linking\
      \ candidates Sherry Snedeker BBB, Boone Brown, Burrel, and Scott Boone.\n- CSB\
      \ operates like a political PAC (Club for Growth style); sharing gratuity and\
      \ forming an alliance among candidates.\n- Specific local connections exposed:\n\
      \  - Municipal Judge is devout CSB supporter; City Council voted in his favor\
      \ multiple times.\n  - Burrell arranged to sit on bid committee awarding CSB-backed\
      \ Municipal Judge a jet airplane hanger location.\n  - Signage in Fairhope:\
      \ Sherry Snedeker BBB signs grouped with Boone/Boone/Burrell candidates (100%\
      \ CSB).\n\n3. THE PIVOT:\n- Widget Article proves the abstract \"Catalyst\"\
      \ mentioned in Main Article is literally Scott Boone Consulting.\n- Confirms\
      \ Lowtower/Hightower connection: Municipal Judge had \"Lowtower\" signs on property\
      \ provided by CSB.\n- Validates Main Article's claim that Carl is fighting a\
      \ consolidated political machine, not individual candidates.\n- Links Club for\
      \ Growth (Lowtower’s financial backer in Main Article) to CSB/Boone local operations\
      \ (Widget Article), showing national and local political machinery are one network.\n\
      \n4. KEY ENTITIES:\n- Jerry Carl (Republican candidate AL-1).\n- \"Lowtower\"\
      \ / Hightower (Opponent, backed by Club for Growth).\n- Scott Boone Consulting\
      \ (CSB / former Catalyst).\n- Sherry Snedeker BBB.\n- Scott Boone.\n- Boone\
      \ Brown.\n- Burrel.\n- Municipal Judge (Baldwin County).\n- Mayor of Daphne.\n\
      - Club for Growth.\n- Business Council of Alabama."
