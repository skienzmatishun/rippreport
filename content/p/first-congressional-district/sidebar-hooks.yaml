      THE DISCOVERY:

      - Article 2 Reveals “Catalyst” is a political machine operating in Baldwin County.

      - Group Origins: Formerly Stacy Elliott and Haygood; evolved into “Catalyst”
      when Chris Elliott became County Commissioner.

      - Leadership: Mr. Scott Boone (son of Fairhope Councilman Kevin Boone).

      - Strategy: Hand-picks candidates for County Commission (Districts 1-4), Probate
