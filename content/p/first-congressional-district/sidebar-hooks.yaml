hooks:
  catalyst-attack:
    brief: 'THE CONFLICT:

      - July 14, 2020: AL-1 Congressional Election.

      - Jerry Carl runs for Alabama''s 1st Congressional District seat (Republican).

      - Opponent referred to as "Lowtower" (text also identifies as Hightower/Scutaro
      context).

      - Main Article: "CARL IS NOT CATALYST, HIS OPPONENT ''Lowtower'' IS CATALYST".

      - Main Article: Club for Growth backing Hightower/Attack Carl; expected to spend
      >$1 million on ads.

      - Main Article: Business Council of Alabama, Alabama Farmers Federation, and
      Mike Byrne backing Carl.

      - Widget Article: Catalyst (CSB) failed to take over Baldwin County administration
      in 2018; lost seats for commissioners, probate judge.

      - Main/Widget: Catalyst (CSB) attempted to "take over entire county administration"
      in 2018 and failed.


      THE DISCOVERY:

      - Widget Article: "Catalyst/Scott Boone Consulting" is a profit-making political
      group.

      - Scott Boone is Principal; son of Fairhope Councilman Kevin Boone.

      - Involved in "Strawman" land fraud series (Lagniappe investigation).

      - Funding: Over $1 million from developers funneling money through "voted politicians".

      - Developer Donors: Prebble, DR Horton, Columbia Southern, Truland, Corte Cox.

      - Tactics: CSB candidates run in a block position supporting each other in Daphne
      and Fairhope.

      - CSB claims intimidation against opposing politicians: "I represent every sitting
      judge... you don''t want to run against my client."

      - 2018: After "bitter defeat in congressional race," Catalyst changed name to
      Scott Boone Consulting.


      THE PIVOT:

      - Widget Article validates Main Article''s identification of the opposing political
      machine ("Catalyst") as Scott Boone Consulting.

      - Confirms Main Article''s assertion that the machine was defeated: "CATALYST
      lost to Jerry Carl in the congressional race last month."

      - Reveals financial incentive missing in Main Article: The "Catalyst" label
      is backed by the Strawman land fraud deal ($1M+ in developer funds).

      - Explains "block signs": Widget confirms block positioning by CSB candidates
      across Fairhope, Daphne, Spanish Fort, Bay Minette as a coordinated strategy
      linked to Carl''s election cycle aftermath.


      KEY ENTITIES:

      - Jerry Carl

      - Hightower/Lowtower (Text uses both)

      - Scott Boone

      - Kevin Boone

      - Scott Boone Consulting (CSB) / Catalyst

      - Club for Growth

      - Business Council of Alabama

      - Mike Byrne

      - Prebble

      - DR Horton

      - Columbia Southern

      - Fairhope/Daphne/Spanish Fort/Bay Minette (Baldwin County municipalities)'
