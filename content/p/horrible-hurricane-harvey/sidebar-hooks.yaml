  troubled-waters:
    brief: '**THE CONFLICT**

      *   Hurricane Harvey caused devastating flooding in Texas and Louisiana.

      *   Jack Burrell was criticized for allegedly denying a citizen freedom of speech
      at a Fairhope City Council meeting.

      *   The Kingston coal ash spill occurred in 2005, releasing 5.5 million cubic
      yards of sludge and poisoning 300 acres.

      *   A major boat crash occurred after November 22 involving a 16-year-old driver
      (allegedly the judge’s son).


      **THE DISCOVERY**

      *   The $2.5M Restore Act wetland project in Mobile Bay involves dumping dredge
      material over submerged aquatic grasses with no public oversight or officials
      attending hearings.

      *   Alabama Power is continuing to bury coal ash containing arsenic, cadmium,
      and mercury at Plant Berry (a 597-acre ash pit).

      *   The Baldwin County Sheriff holds "strong disdain" for the Alia Marine Patrol.

      *   Fairhope Police Department delayed response to the November boat crash by
      six to eight hours and took teens home without testing them for alcohol.


      **THE PIVOT**

      *   Article 1 alleges specific political mismanagement (Burrell’s perceived
      denial of free speech) that threatens local leadership and public support (Catalyst).

      *   Article 2 reveals systemic environmental deregulation (lack of oversight
      on Mobile Bay project, ongoing ash disposal) and municipal institutional failure
      in the same geographic region (Fairhope/Baldwin County), suggesting a pattern
      of unchecked power.

      *   The pervasive themes—political conflict over integrity, government inaction
      regarding public safety, and corporate pollution without regulation—connect
      the political friction mentioned in Article 1 to a deeper structural breakdown
      documented in Article'
