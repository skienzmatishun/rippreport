  gulf-shores-and-orange-beach-closed-to-residents-of-baldwin-county:
    brief: 'THE CONFLICT

      *   July 2018: Brett Robinson Real Estate Development Co. applied to the Orange
      Beach Planning Commission for rezoning 5.8 acres on Perdido Beach Boulevard
      to develop "Phoenix Gulf Towers," consisting of two 26-story buildings and a
      seven-story parking garage (Widget Article).

      *   Circa 2017: Jack Burrell, as President of the Fairhope City Council, was
      accused of denying Free Speech to a citizen during a council meeting (Main Article).

      *   2020: Scott Boone (Catalyst King) stated that Catalyst would not support
      Jack Burrell for Mayor in the 2020 election. Catalyst pledged support to re-elect
      County Commissioners and Chris Elliott (Main Article).


      THE DISCOVERY

      *   Chris Elliott and Tucker Dorsey fully advocate for maximum development in
      Gulf Shores and Orange Beach, disregarding infrastructure needs (Widget Article).

      *   Mayor''s Craft and Kennon are alleged to have aligned City Council members
      to prevent opposition to development decisions.

      *   The unchecked development driven by officials like Chris Elliott risks making
      the Gulf inaccessible and closing it permanently to residents of Baldwin County
      due to congestion and land loss.


      THE PIVOT

      *   The Widget Article proves that key political figures identified in the Catalyst
      timeline (Chris Elliott, Tucker Dorsey) were not merely involved in campaign
      politics but were actively steering zoning and development policies—such as
      the Phoenix Gulf Towers rezoning—that directly impacts Baldwin County residents
      despite their public statements about supporting certain candidates.


