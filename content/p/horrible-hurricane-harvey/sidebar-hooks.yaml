  people-power-wake-up-gulf-shores:
    brief: 'THE CONFLICT:

      *   Hurricane Harvey caused widespread devastation and flooding in Texas and
      Louisiana, leading to relief efforts organized by agencies like the Red Cross
      within Baldwin County.

      *   In Gulf Shores, an opposition effort was mounted against a high-density
      apartment development (Regency Place Apartments).

      *   The Planning Commission approved the Site Plan Application on October 3,
      2018, despite opposition from over 750 individuals led by resident Pete Sims
      who filed an appeal.


      THE DISCOVERY:

      *   Pete Sims'' appeal revealed that City Staff previously utilized the Land
      Use Plan (LUP) as a critical evaluation criterion for site plans in prior years
      (citing examples from February 25, 2014, and January 28, 2014).

      *   The approval of the Regency Place Apartments plan is alleged to be based
      on the Planning Commission failing to consider this established LUP criteria,
      despite Andy Bauer stating on September 6, 2016, that the LUP designates the
      area for Medium Density Residential (6-10 units per acre).


      THE PIVOT:

      *   The Main Article raises broader critiques of local political maneuvering
      and governance failures within Baldwin County and Fairhope City Council.

      *   The Widget Article provides a specific, documented instance of alleged administrative
      failure—the Planning Commission''s omission of the Land Use Plan criteria when
      approving the Regency Place Apartments site plan in 2018—demonstrating systemic
      issues with governmental adherence to established zoning ordinances and Comprehensive
      Plans (LUP).


      KEY ENTITIES:

      *   Andy Bauer (Planning Director)

      *   Pete Sims

      *   Mayor Robert Craft (Gulf Shores City Council)

      *   Jack Burrell (City Council President/Member)

      *   Scott Boone / Catalyst (political organization)

      *   Pittman

      *   Baldwin County

      *   Fairhope City Council

      *   Regency Place Apartments'
