      *   Robin LeJeune was elected Mayor of Daphne on 2020-10-09, winning a runoff
      election by over 1,000 votes.

      *   LeJeune defeated the Catalyst/Scott Boone Consulting candidate and favored
      developer candidates.

      *   The victory indicates that Daphne residents chose to slow development and
      prioritize infrastructure over growth strategies associated with Catalyst''s
      influence in Fairhope.


      THE PIVOT:

