  free-speech:
    brief: 'THE CONFLICT

      *   Fairhope City Council member Jack Burrell has been accused of denying a
      citizen their Freedom Of Speech, referencing a 2017 video link in the Main Article.

      *   The Fairhope Airport Authority was involved in an ethical conflict regarding
      H. Ray Hix (Board Member/Operator) and Joe McEnerney (Airport Chairman).

      *   This conflict involved alleged manipulation of Requests for Advisory Opinion
      submitted to the Alabama Ethics Commission starting around December 16th, 2015.


      THE DISCOVERY

      *   The Widget Article reveals a detailed timeline proving that the Fairhope
      Airport Authority was compromised by conflicts of interest and false documentation
      between late 2015 and early 2017.

      *   Specifically, it details H. Ray Hix allegedly using inside information to
      secure an aircraft hanger lease via an RFP manipulated by Board members like
      Pam Caudill and Jack Burrell.


      THE PIVOT

      *   Article 2 provides documented evidence of deep-seated corruption and conflicts
      of interest among Fairhope City Council/Airport Authority leadership, lending
      credibility and substance to the current political scrutiny regarding Burrell''s
      denials of free speech (referenced in Article 1).

      *   The detailed timeline (Dec 2015–Mar 2017) acts as proof that council members
      have a history of using their positions to bypass ethics laws.


      KEY ENTITIES

      *   Jack Burrell (Council President/City Council Member)

      *   Scott Boone ("Catalyst King") / CATALYST

      *   H. Ray Hix (Board Member, Operator)

      *   Joe McEnerney (Fairhope Airport Authority Chairman)

      *   Dennis R. Bailey ESQ (Ethics Consultant)

      *   Karin Wilson (Mayor of Fairhope)

      *   Pam Caudill (Council Board Member/FAA board member)

      *   Mike Turner (Letter to the editor author)

      *   Chuckee (Editor of The Fairhope Courier)

      *   Robert Jester and Cucky Cheez'
