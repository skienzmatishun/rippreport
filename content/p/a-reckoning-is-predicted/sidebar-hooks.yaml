  a-decade-of-corruption:
    brief: 'THE CONFLICT:

      *   Anthony Lowery (Sheriff) faced Matt McKenzie in election; Lowery had five
      times more money.

      *   Hoss Mack was responsible for lack of transparency/accountability at BCSO
      under Lowery.

      *   Kristi Hagood, supported by Jon Gray and Scott Boone, was installed as a
      judge despite being unqualified to represent GOBs.

      *   Robert Wilters (District Attorney) was the architect/recruiter for Hagood''s
      judicial appointment.

      *   Murray Lawrence Jr. was wrongfully convicted involving Lowery (lead investigator),
      Wilters (DA), Mack (Sheriff), and David Whitstone (former DA).


      THE DISCOVERY:

      *   Over 10 years, Baldwin County experienced blatant corruption including financial
      improprieties related to BP money.

      *   Tripp "Boom Boom" Pittman secured a bid for $636,000 from Fairhope for BP
      work despite initial denials by the County Commission (May 8th, 2010).

      *   Pittman later received a check of $372,165.90 from Fairhope City Council
      on June 4th, 2010, for "COMPLETED" boom work without proper licensing or approval.

      *   A legislative change by Pittman allowed the BCSO Sheriff to be re-elected
      twice unopposed.


      THE PIVOT:

      *   Article 2 provides a concrete, verifiable historical example (the BP contract
      scandal) of systemic financial corruption and procedural circumvention in Baldwin
      County governance. This establishes that deep-seated institutional failure and
      cronyism are not isolated events related to the Murray Lawrence case, but rather
      a sustained pattern ("10 years") endorsed by local political structures, mirroring
      the alleged GOB control over the BCSO/Judiciary described in Article 1.


