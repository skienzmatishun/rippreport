      - The wrongful conviction of Murray Lawrence Jr. involved Lowery, Wilters, Mack,
      and the new judge Kristi Hagood.


      THE DISCOVERY:

      - Widget Article confirms BCSO has a culture of "absolute immunity" with no
      accountability or transparency.

      - Widget Article states this self-investigative culture was developed by Hoss
      Mack and passed to Anthony Lowery.

      - Widget Article notes the past 18 years of BCSO history are clouded by cases
