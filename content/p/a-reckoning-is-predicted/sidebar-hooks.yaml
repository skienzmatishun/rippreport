      *   Fidler

      *   McSharry

      *   Catalyst

      *   Fairhope'
    generated_at: '2026-06-23T15:43:05.873082Z'
    text: Tripp Pittman helped change the law for Hoss Mack after walking away with
      hundreds of thousands in questionable BP money. This decade of financial shell
      games proves that the corruption in the Murray Lawrence case is just one piece
