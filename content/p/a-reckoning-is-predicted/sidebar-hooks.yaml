      - ALEA (Alabama Law Enforcement Agency)'
    generated_at: '2026-06-23T15:43:05.873050Z'
    text: Hoss Mack spent eighteen years teaching Anthony Lowery how to operate with
      absolute immunity and zero accountability. This is why the BCSO investigates
      itself while families of the wrongfully convicted wait for a justice that never
