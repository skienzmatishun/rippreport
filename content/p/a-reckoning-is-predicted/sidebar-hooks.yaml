    text: The Good Ole Boys think they own Baldwin County, but voters in Bay Minette
      are finally pushing back against the machine. We reveal how Chris Elliott does
      the bidding of Hoss Mack and Anthony Lowery to keep their corrupt power structure
      alive at your expense.
  bcso-culture-2:
    brief: 'THE CONFLICT:

      - Anthony Lowery was lead investigator in the wrongful conviction of Murray
      Lawrence Jr.

      - Robert Wilters was the DA involved in the trial of Murray Lawrence Jr.

      - Hoss Mack, former Sheriff, is implicated in BCSO''s lack of transparency/accountability.

      - Kristi Hagood was an unqualified judge supported by GOBs, including David
