  judicial-trick:
    brief: 'THE CONFLICT:

      - Nov 22, 2018: Ronan McSherry shoved Paula DiNiardi off a bar stool at McSherry’s
      Bar in Fairhope; incident captured on video.

      - Oct 17, 2020 (Main Article): Allegation that Baldwin County judicial system
      protects wealthy/powerful figures, specifically linking Sen. Tripp Pittman/BP
      fraud and Sen. Chris Elliott/DUI as context for systemic corruption.

      - Oct 17, 2020 (Main Article): Slappin Mike McMillian newly elected Mayor of
      Spanish Fort acquitted in harassment charge despite alleged slap on camera video
      (WorldStarHipp).

      - Oct 17, 2020 (Main Article): Claim municipal attorney Marcus McDowell failed
      to file assault charges for McSherry incident after vowing he would, despite
      case remaining in media attention.

      - Oct 2020 (Widget Article): Specific detail reveals Judge Clark Stankoski dismissed
      most serious charges (causing bodily harm) because municipal attorney McDowell
      failed to amend charging document after a year-long gap.


      THE DISCOVERY:

      - Widget Article confirms the McSherry/Diniardi assault is the primary evidence
      of Baldwin County corruption.

      - Circuit Judge Clark Stankoski presided over civil case involving McSherry
      and DiNiardi.

      - Stankoski used a technicality by McDowell (failure to amend charge “did cause
      bodily harm”) to drop serious assault charges, despite McSherry pleading guilty
      in municipal court (Judge Snedeker) to 180 days jail.

      - McDowell successfully represented Jack Burrell (Fairhope City Council President);
      Burrell is described as “best buddies” with McSherry.

      - James Pittman, brother of Tripp Pittman, represented McSherry after attorney
      John Beck departed; James Pittman subpoenaed Ripp/Lagniappe media and Judge
      Stankoski partially granted subpoenas.

      - Fairhope City Council President Jack Burrell canceled Public Participation
      during 2020 coronavirus peak as part of this environment.


      THE PIVOT:

      - Widget Article provides the legal mechanics proving Main Article’s claim of
      corruption.

      - Shows Marcus McDowell was both opposing counsel to Ripp and aligned with Council
      President Burrell, while presiding attorney Stankoski allowed charges to drop
      on procedural grounds involving video-confirmed assault.

      - James Pittman (Tripp Pittman’s brother) leveraging subpoena power against
      media suggests retaliation for investigative reporting, validating Main Article''s
      claim of a "cabal."

      - Confirms McDowell’s failure to file/amend charges lasted from incident (Nov
      2018) through Oct 2020, supporting Main Article’s claim that McDowell “cared
      less... and is on the record.”


      KEY ENTITIES:

      - Ronan McSherry (McSherry’s Bar Owner)

      - Paula DiNiardi (Victim/Witness)

      - Marcus McDowell (Municipal Attorney, Fairhope)

      - Clark Stankoski (Baldwin County Circuit Judge)

      - Slappin Mike McMillian (Mayor, Spanish Fort)

      - Tripp Pittman (State Senator)

      - James Pittman (McSherry’s lawyer, Tripp Pittman''s brother)

      - Jack Burrell (Fairhope City Council President)

      - Chris Elliott (State Senator referenced for DUI)

