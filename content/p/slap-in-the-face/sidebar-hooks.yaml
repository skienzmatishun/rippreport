      - Highlights Tripp Pittman''s retention of $750,000 BP funds as evidence of
      systemic failure to hold power accountable.


      KEY ENTITIES:

      - Michael "Slappin Mike" McMillian (Spanish Fort Mayor)

      - Tripp Pittman (Sen. BP Fraud)

      - Chris Elliott (Sen. DUI)

      - Marcus McDowell (Fairhope Municipal Attorney)

      - Paula DiNiardi (Witness in McSherry case)

      - John Merrill (Alabama Sec of State)

      - Michelle Thomason (Judge)

      - Buddy Bracken (Judge)

      - Steven Johnson (Attorney)

      - Karin Wilson (2016 Fairhope Mayor)

      - Kay Ivey (Alabama Governor, HB 371 Signer)

      - Thomas Gallion III (Attorney, Book Author "Shadow Government Southern Style")

      - The Ripp Report'
