  boycott-mcsharrys:
    brief: '1. THE CONFLICT

      - Published 2020-10-17; Main Article alleges judicial corruption in Baldwin
      County.

      - Spanish Fort Mayor Mike McMillian acquitted despite video evidence of slapping
      female city employee; article claims attorney/judge system protected him.

      - Cites past corruption cases: Sen. Tripp Pittman (BP fraud), Sen. Chris Elliott
      (DUI).

      - Focuses on Fairhope City Attorney Marcus McDowell allegedly failing to file
      assault charges in a case involving Ronan McSharry and Paula DiNardi.


      2. THE DISCOVERY

      - Widget Article confirms Ronan McSharry trial occurred in Fairhope Municipal
      Court.

      - Confirms McDowell handled proceedings involving Paula DiNardi against McSharry’s
      bar.

      - Author was ejected from courtroom during McSharry trial under Ala. R. Evid.
      615 despite being a public observer/advocate, not official court witness.

      - Judge Stankowski presided; McSharry found guilty of intoxication/assault,
      sentenced to 180 days (time served in rehab), probation unsupervised.

      - Confirms Fairhope City Council President Jack Burrell unilaterally appointed
      himself as next councilperson without public process (cited prior lawsuit).

      - Article alleges Judge Stankowski used power to manipulate outcomes for "friends"
      in a pattern of "good ole boys."


      3. THE PIVOT

      - Widget Article validates Main Article’s claim that Marcus McDowell failed
      to pursue criminal assault charges.

      - Ejection of author under witness exclusion rule serves as evidence of active
      suppression against victim’s case (Paula DiNardi).

      - Connects the lenient sentencing (Judge Stankowski) directly to the "corruption"
      ecosystem identified in Main Article.

      - Exposes judicial bias link between City Attorney McDowell, Council President
      Burrell, and Judge Stankowski.


      4. KEY ENTITIES

      - Mike McMillian ("Slappin Mike")

      - Marcus McDowell (Fairhope City Attorney)

      - Ronan McSharry (McSharry’s Owner)

      - Paula DiNardi (Victim)

      - Judge Stankowski

      - Jack Burrell (Fairhope City Council President)

      - John Beck (Defense Attorney)

      - Tripp Pittman

      - Chris Elliott'
