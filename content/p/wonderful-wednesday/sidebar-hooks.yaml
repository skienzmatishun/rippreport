      THE DISCOVERY

      *   In Fall 2016, while a developer sought Site Plan Approval for a one-point
      drainage system through the out-fall pipe of the current detention (in violation
      of PUD Amendment 1572), the developer simultaneously deeded the entire 4-acre
      parcel, including wetlands, to the City.

      *   This transfer was labeled as a "Deed of Gift" from Corte to the City of
      Fly Creek.

      *   The City is now acting as both an upper landowner (relative to downstream
      residents) and the lower landowner (to the PUD project).


      THE PIVOT

      *   Article 2 reveals that the infrastructure deals and zoning manipulation
      alleged against Kant and Corte in Article 1 were facilitated by a specific,
      legally questionable "gift" involving land ownership and environmental liability.

