  cut-the-head-off-the-snake:
    brief: 'THE CONFLICT

      *   Mayor Kant has faced numerous lawsuits and complaints regarding alleged
      fraud and corruption in Fairhope government since at least 2016 (when initial
      infrastructure projects/contributions were noted).

      *   The Mayor is accused of practicing "good ole boy tricks" and using political
      influence to maintain control.


      THE DISCOVERY

      *   Arthur Corte, identified as a major contributor to the City Council and
      Fairhope development, dictated that Fly Creek Apartments be approved despite
      standard planning and zoning issues.

      *   Ripp Report states that without Arthur Corte’s proposal, Mayor Kant would
      not have even considered the project; he was instructed by Corte to get it "approved."


      THE PIVOT

      *   Article 1 alleges that Mr. Corte demanded Mayor Kant reverse a planning
      decision (dead end road, new lift station) and paid $1 million in public infrastructure
      for his private development.

      *   Article 2 serves as the smoking gun by explicitly naming Arthur Corte’s
      influence as the direct cause of the project''s existence, proving the decisions
      were dictated by the Mayor''s "major contributor" rather than independent governance.


      KEY ENTITIES

      *   Mayor Kant

      *   Arthur Corte

      *   Fly Creek Apartments

      *   Fairhope City Council (Place 4/City Councilman Robert Brown)

      *   Ripp Report / Baldwin County Legal Eagle'
