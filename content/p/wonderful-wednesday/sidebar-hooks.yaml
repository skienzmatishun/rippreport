  showing-your-true-colors:
    brief: 'THE CONFLICT

      *   Mayor Kant faced numerous lawsuits and complaints regarding alleged fraud
      during his tenure.

      *   Developer Angelo Corte successfully pressured Mayor Kant to reverse planning
      and zoning decisions concerning Fly Creek Apartments.

      *   Fairhope incurred approximately $1 million in costs for infrastructure related
      specifically to Angelo Corte''s private development.


      THE DISCOVERY

      *   After losing re-election (Nov 7, 2016), Mayor Kant attempted to secure legacy
      projects during his "smooth transition."

      *   Kant planned the establishment of a Performing Arts Center, intended possibly
      as a personal legacy named the “Timothy Kant Performing Arts Center.”

      *   The Planning and Zoning Board met on September 6, 2016, to review two specific
      high-cost developments: The Retreat at Fairhope Village (240 units) by Dewberry
      / Preble-Rish, LLC; and Old Battles Place (110 units) requested by Hutchinson,
      Moore, & Rauch, LLC.

      *   Mayor Kant supported legal efforts on September 6, 2016, involving the Hand
      Arendall law firm to reverse a summary judgment denial for Fly Creek Apartments
      in favor of Angelo Corte.


      THE PIVOT

      *   The second article transforms Article 1’s general claims ("good ole boy
      tricks") into specific evidence of procedural corruption during Kant''s political
      transition (Post-Nov 7, 2016).

      *   It provides concrete dates and names the legal firms/developers who benefited
      directly from Mayor Kant’s actions immediately following his loss, linking him
      to the infrastructure payments made for Corte''s development.


      KEY ENTITIES

      *   Mayor Timothy Kant

      *   Angelo Corte (Developer)

      *   Sherry Sullivan ("Mayor in Training")

      *   Jennifer Fiddler

      *   Dewberry / Preble-Rish, LLC (Retreat at Fairhope Village project)

      *   Hutchinson, Moore, & Rauch, LLC (Old Battles Place project)

      *   Hand Arendall (Law Firm)

      *   Fly Creek Apartments'
