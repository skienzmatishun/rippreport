      THE DISCOVERY: What does the second article prove or reveal today?

      - Councilmen Burrell and Boone are actively engaged in bullying, condescending
      behavior directed at the newly elected mayor during public city council meetings.

      - Mr. Burrell publicly stated his intent to "drive the mayor out of office"
      within a year and assume her position.

      - Catalyst, an organization linked to Councilman Boone (and previously associated
      with former Mayor Kant), is actively supporting actions detrimental to the community
      and aimed at countering the new administration''s policies (e.g., hiring freeze).


      THE PIVOT: Why is Article 2 the ''smoking gun'' for Article 1?

      - Both articles, authored by Francis Paul Ripp, reveal a persistent pattern
      of political instability and systemic corruption in Fairhope City government.

      - Article 1 establishes the historical foundation of "good ole boy" tricks and
      mayoral malfeasance under Kant (e.g., misuse of taxpayer funds, Cronyism).

      - Article 2 proves this pattern continues today through aggressive council behavior
