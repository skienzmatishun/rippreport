hooks:
  game-on:
    brief: '**THE CONFLICT:**

      - Mayor Kant was accused of fraud and being involved in lawsuits/complaints
      dating prior to July 2016.

      - In 2017, Mr. Corte (Developer) successfully forced a planning and zoning decision
      reversal by Mayor Kant for Fly Creek Apartments.

      - This included allowing a fire station on a dead end road adjacent to the proposed
      apartments.

      - Fairhope paid approximately one million dollars in infrastructure costs for
      Mr. Corte''s private development project.


      **THE DISCOVERY:**

      - The widget article proves that public dissatisfaction with "the good ole boys"
      and lack of checks and balances was widespread among voters in June 2016.

      - It identifies major systemic failures, including the Triangle lawsuit costing
      $12 million due to poor planning/lack of transparency.

      - Candidates like Karin Wilson (running for Mayor) specifically targeted Mayor
      Kant, claiming his appointed planning and zoning board failed by rubber-stamping
      personal agendas and favors.


      **THE PIVOT:**

      - Article 1 provides specific evidence of "good ole boy" politics through the
      Mr. Corte/Mayor Kant zoning decision and tax expenditure misuse (trips to Europe),
      while Article 2 confirms this behavior was widely recognized, leading voters
      to push for radical change (e.g., replacing Mayor Kant) due to systemic lack
      of oversight, infrastructure neglect, and high-cost litigation.

      - Both articles connect the alleged corruption at City Hall to the prioritization
      of developers ("developers come first") over citizens.


      **KEY ENTITIES:**

      - Mayor Kant

      - Jennifer Fiddler (new mayor in training/travel companion)

      - Sherry Sullivan (Mayor in Training)

      - Mr. Corte (Developer for Fly Creek Apartments)

      - Senator Pittman

      - BP Fraud grant

      - Karin Wilson

      - John Lake

      - Triangle lawsuit ($12 million cost)

      - Harry Still III

      - Fairhope City Council

      - Catalyst'
