  living-it-up-at-the-hotel-california:
    brief: 'THE CONFLICT

      *   Mayor Tim Kant served 16 years (Alleged tenure referenced in Widget article)
      and has faced numerous allegations of fraud, misuse of public funds, and "good
      ole boy tricks."

      *   Specifically, Developer Mr. Corte successfully demanded that Mayor Kant
      reverse a planning and zoning decision for the Fly Creek Apartments project.

      *   This reversal included providing infrastructure (Fire station on dead end
      road and new lift station) which cost Fairhope approximately $1 million in payment
      toward private development.

      *   Allegations of misuse of public funds include "vanity" trips out of town,
      where officials accept awards from small/fringe associations.


      THE DISCOVERY

      *   Mayor Kant (Tim) and Public Works Director Jennifer Fidler recently traveled
      to Southern California (Arroyo Grande).

      *   The purpose of this trip was attending the "America in Bloom" vanity award
      event.

      *   This travel occurred while skipping a critical planning and zoning meeting
      for Monday night.

      *   During their absence, the Fairhope Planning Commission passed a controversial
      4-2 vote sealing the fate of the Fly Creek Apartment high-density project.


      THE PIVOT

      *   Article 1 alleged that Mayor Kant used public tax dollars for "vanity awards"
      and implied these trips were related to corruption/cronyism (like the $1 million
      infrastructure deal).

      *   Article 2 provides specific, timely evidence of such a trip occurring (California
      trip for America in Bloom) at the exact moment the controversial Fly Creek decision
      was finalized by the Planning Commission while Kant and Fiddler were absent.


      KEY ENTITIES

      *   Tim Kant (Mayor)

      *   Jennifer Fidler (Public Works Director/Staff)

      *   Sherry Sullivan ("Mayor in Training")

      *   Mr. Corte (Developer)

      *   Francis P. Ripp (Ripp Report/Author)

      *   Karin Wilson (Future Mayor of Fairhope)

      *   Councilman Boone (Pro-developer council member)

      *   Fairhope Planning Commission

      *   Fly Creek Apartments'
