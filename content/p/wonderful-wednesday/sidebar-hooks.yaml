  re-gift-gift:
    brief: '**THE CONFLICT:**

      *   Fall 2016: Developer Corte sought Site Plan Approval for Fly Creek Apartments
      (private development).

      *   Corte''s proposal involved using the out-fall pipe of the current detention
      pond as a primary release point, violating PUD Amendment 1572.

      *   Mayor Kant and the last City Council approved this arrangement, which included
      deeding a critical 4-acre parcel (adjacent to the project/Fly Creek) from Corte
      to the Fairhope City.


      **THE DISCOVERY:**

      *   Article 2 confirms that during Corte''s application for drainage approval,
      he simultaneously deeded the sensitive 4-acre wetland parcel directly to the
      City of Fairhope.

      *   This discovery revealed the "gift" was intrinsically tied to the developer’s
      desire to channel runoff onto this specific property before building.


      **THE PIVOT:**

      *   Article 1 alleges Mayor Kant used "dirty tricks" and fraud to benefit Corte,
      specifically citing $1 million paid by Fairhope for a new lift station located
      next to Corte''s apartments.

      *   Article 2 proves the mechanism of this alleged trick: the developer gave
      up critical municipal land (the 4-acre tract) while ensuring his private project
      was permitted to utilize the City’s public infrastructure (outfall pipe/detention
      pond).


      **KEY ENTITIES:**

      *   Corte

      *   Mayor Kant (Tim Kant)

      *   Sherry Sullivan ("Mayor in Training")

      *   Fairhope City Council / Mayor Wilson

      *   Fly Creek Apartments (Development project)

      *   PUD Amendment 1572

      *   $1 Million (Infrastructure payment from Fairhope to Corte''s project)

      *   4 Acre Parcel (Deeded land)'
