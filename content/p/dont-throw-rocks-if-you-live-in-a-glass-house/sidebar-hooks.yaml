  scratch-my-back-i-scratch-yours:
    brief: 'THE CONFLICT:

      *   Mayor Kant failed to cooperate with the transition of power or attend pre-inauguration
      functions during Mayor Wilson''s swearing in.

      *   Council President Jack Burrell supported Mayor Kant''s moves, only opposing
      him on the Fly Creek Apartment issue.

      *   City employees reported that some were determined to undermine Mayor Wilson
      and report to Mayor Kant.


      THE DISCOVERY:

      *   State Senator Tripp Pittman used his elected office to garner contracts
      within Baldwin County.

      *   The Fairhope City Council voted to award a conditional disaster debris removal
      and disposal contract to D&J Enterprises Inc., effectively ending an arrangement
      with Sen. Tripp Pittman that had been in place since 2012.


      THE PIVOT:

      *   Article 2 proves that the local political landscape (Fairhope) is influenced
      by powerful state figures like Sen. Pittman, linking municipal power struggles
      (Kant/Burrell dynamics) to state-level influence and contract manipulation.


