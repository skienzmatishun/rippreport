  caught-trap-like-rat:
    brief: 'THE CONFLICT

      *   Mayor Karin Wilson was elected in Fairhope.

      *   Mayor Kant did not attend the swearing-in or cooperate with the transition
      of power.

      *   A power struggle began between Mayor Wilson and Council President Jack Burrell
      immediately following the inauguration.


      THE DISCOVERY

      *   Jack Burrell is facing serious trouble regarding ethics complaints, including
      four filed complaints with the Ethics Commission.

      *   Burrell allegedly used his authority as Council President to control the
      City Council Agenda.

      *   Burrell attempted to prevent the repeal of ordinance 1572 concerning the
      Fly Creek Apartments.

      *   Burrell is implicated in alleged "bid rigging" related to the Airport Authority
      Land ownership, specifically insisting the land remain in the Authority''s name
      while the city paid the mortgage.


      THE PIVOT

      *   Article 2 reveals that Burrell’s actions—controlling the agenda and involvement
      in bid rigging—are the underlying reason for the power struggle described in
      Article 1.

      *   Article 1 suggests Burrell was a surrogate of Mayor Kant; Article 2 proves
      Burrell is caught in an ethical trap for his own actions related to the Fly
      Creek Apartments and airport land.


      KEY ENTITIES

      *   Mayor Karin Wilson

      *   Mayor Kant

      *   Jack Burrell (Council President)

      *   Mr. Conyers

      *   Mr. Brown

      *   Mr. Robinson

