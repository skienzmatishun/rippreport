  absolute-power:
    brief: 'THE CONFLICT

      *   Past administration involved Mayor Kant and Council members including Burrell
      (who supported every move for four years) and Jack (only opposed him once at
      Fly Creek Apartment issue).

      *   Mayor Kant did not cooperate with the transition of power or provide city
      information.

      *   The previous council was perceived as "so bad" that the community elected
      three new councilmen: Conyers, Brown, and Robinson on a platform of failure
      reform.

      *   During the organizational meeting following Mayor Wilson''s swearing-in
      (the first woman mayor), Council President Burrell nominated himself for AMEA
      without mayoral input, which he successfully voted 4-0 into office.

      *   Article 1 alleges that former administration officials (Kant/Burrell) convinced
      current leaders they could not defeat him, and suspects city employees were
      determined to undermine Mayor Wilson by secretly reporting to Mayor Kant.


      THE DISCOVERY

      *   The second article identifies "absolute power" being concentrated with a
      specific faction: "the three B’s" (referring to council figures like Jack Burrell).

      *   It asserts that the election was a popularity contest, where Sherry Sullivan
      lost and new interests have taken control of Fairhope.

      *   Despite previous efforts by Mayor Wilson to eliminate lawsuits, issues such
      as the McSherry case are remaining and now fall under Mayor Sullivan''s (Sherry)
      desk or City Attorney’s handling.


      THE PIVOT

      *   Article 1 warned that a "power struggle" immediately began after transition
      and expressed concern that new councilmen would willingly "piggyback decisions
      of Mr. Burrell."

      *   Article 2 proves Article 1''s underlying fear is true by identifying the
      current political reality: a concentrated power structure ("the three B''s")
      that will be difficult for a new mayor (Sherry Sullivan) to resist or control.


      KEY ENTITIES

      *   Fairhope City Council

      *   Mayor Kant

      *   Karin Wilson

      *   Council President Jack Burrell / "Jack the King B"

      *   Jimmy Conyers

      *   Robert Brown

      *   Jay Robinson

      *   Sherry Sullivan (New Mayor)

      *   Catalyst / Scott Boone Consulting

      *   MEA/AMEA

      *   McSherry case'
    generated_at: '2026-07-18T02:13:37.216489Z'
