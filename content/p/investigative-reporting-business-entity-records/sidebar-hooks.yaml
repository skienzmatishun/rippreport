  alabama-ag:
    brief: 'THE CONFLICT

      *   The core conflict involves alleged systemic political and judicial corruption
      within Baldwin County, Alabama.

      *   Francis Paul Ripp of The Ripp Report alleges that Sheriff Hoss Mack, District
      Attorney Robert Wilters (Judge), and retired prosecutor David Whetstone colluded
      to withhold vital information (specifically the Coroner''s Report) from the
      defense of Murray “Bubba” Lawrence.

      *   Murray "Bubba" Lawrence was wrongfully convicted and incarcerated for over
      18 years (6570 days).

      *   Allegations also include cover-ups surrounding the murder of Brandon Hastings,
      where police/prosecutors allegedly pushed a gun theory despite lacking ballistic
      evidence or witnesses.


      THE DISCOVERY

      *   North Ridge, LLC is a Domestic Limited Liability Company established in
      Baldwin County on June 2, 2008.

      *   The entity''s ownership structure includes specific individuals: John Avent
      (AVENT, JOHN G), Joseph Bullock (BULLOCK, JOSEPH P), and Kevin Boone (BOONE,
      KEVIN).


      THE PIVOT

      *   Article 1 establishes the existence and membership of North Ridge, LLC within
      Baldwin County. Article 2 details a pattern of political corruption alleging
      misconduct by high-ranking Baldwin County officials (Sheriff Mack, DA Wilters)
      regarding legal cases in that same county. The potential link is geographic
      and jurisdictional proximity to the alleged malfeasance described in Article
      2.


      KEY ENTITIES

      *   North Ridge, LLC (Entity ID: 420 - 935)

      *   John Avent (Member of North Ridge, LLC)

      *   Joseph Bullock (Member of North Ridge, LLC)

      *   Kevin Boone (Member of North Ridge, LLC)

      *   Hoss Mack (Baldwin County Sheriff)

      *   Robert Wilters (Judge/District Attorney in Baldwin County)

      *   David Whetstone (Retired District Attorney)

      *   Francis Paul Ripp / The Ripp Report (Investigative entity)

      *   Brandon Hastings (Murder Victim)

      *   Murray “Bubba” Lawrence (Wrongfully Convicted Individual)'
    generated_at: '2026-07-18T04:26:51.839187Z'
