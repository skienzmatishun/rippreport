  a-spiders-web:
    brief: 'THE CONFLICT:

      *   Systemic corruption involving elected officials in Baldwin County through
      complex webs of Limited Liability Companies (LLCs).

      *   The alleged scheme has operated for over 50 years.

      *   Officials use these LLC structures to obscure business interests and potential
      conflicts of interest while voting on issues that affect their own financial
      standing.


      THE DISCOVERY:

      *   North Ridge, LLC is a Domestic Limited Liability Company formed in Baldwin
      County on June 2, 2008 (Entity ID 420-935).

      *   The company''s declared nature of business is to ACQUIRE/MANAGE/DEVELOP/LEASE/SELL/EXCHANGE
      REAL PROPERTY.

      *   Kevin Boone and John Avent are explicitly listed as members of North Ridge,
      LLC on official records from the Alabama Secretary of State’s office.


      THE PIVOT:

      *   The Widget Article alleges that Kevin Boone has a direct financial interest
      in engineering firms whose services he votes on while serving on the Fairhope
      City Council.

      *   The Main Article provides the concrete corporate evidence by confirming
      that North Ridge, LLC—a property development entity and business vehicle mentioned
      implicitly in both reports—is officially co-owned by John Avent (of Preble-Rich/Dewberry)
      and Kevin Boone.


      KEY ENTITIES:

      *   North Ridge, LLC (Baldwin County formation)

      *   Kevin Boone (Councilman / Member of North Ridge, LLC)

      *   John Avent (Member of North Ridge, LLC; Representative for Preble-Rish,
      LLC)

      *   Joseph Bullock (Co-member of North Ridge, LLC)

      *   MARLIN MANAGEMENT LLC (Registered Agent for North Ridge, LLC)

      *   HEADWATER HOLDINGS LLC and LAUREL LLC (Other members listed in Article 1)

      *   Baldwin County (Place of Formation for the entity)'
    generated_at: '2026-07-18T04:26:51.839172Z'
  alabama-ethics-a-political-tool:
    brief: 'THE CONFLICT

      - Systemic ethical violations involving local political figures in Baldwin County,
      specifically referencing Fairhope City Council members (e.g., Jack Burrell),
      Airport Authority board members (Ray Hix), and State Senator Tripp Pittman between
      2017 and present.

      - Allegations include misuse of elected office for personal gain, securing municipal
      contracts (Pittman), and corruption involving former Mayor Tim Kant.


      THE DISCOVERY

      - North Ridge, LLC was formed in Baldwin County on June 2, 2008.

      - Key members/owners listed for the real property development company are: John
      Avent, Joseph Bullock, and Kevin Boone.

      - Council Member Kevin Boone is a publicly documented member of the private
      real estate firm North Ridge, LLC (Baldwin County formation).


      THE PIVOT

      - The discovery connects public political office (Councilman Kevin Boone) to
      significant private financial interests in regional property development via
      his ownership stake in North Ridge, LLC.

      - This links the backdrop of widespread ethical corruption and alleged malfeasance
      detailed in Article 2 to specific, non-public business assets held by figures
      tied to local politics described in Article 1.


      KEY ENTITIES

      - John Avent (Member, North Ridge, LLC)

      - Joseph Bullock (Member, North Ridge, LLC)

      - Kevin Boone (Council Member / Member, North Ridge, LLC)

      - Fairhope City Council / Jack Burrell

      - Ray Hix

      - Tripp Pittman

      - Tim Kant

      - Baldwin County'
