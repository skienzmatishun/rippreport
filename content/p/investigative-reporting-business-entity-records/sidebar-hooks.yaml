      trial (reported by Ashley Remkus on July 28, 2021).

      *   A Columbia Mayor (Rhonda Freeman) case involving ethics violations was scheduled
      before the Commission on August 4, 2021.


      THE DISCOVERY:

      *   North Ridge, LLC (Entity ID 420-935), a Baldwin County domestic limited
      liability company formed on June 2, 2008, exists as an entity for acquiring/managing
      real property.

      *   Key members listed for North Ridge, LLC include John Avent, Joseph Bullock,
      and Kevin Boone.


      THE PIVOT:

      *   The business records of specific local entities (North Ridge, LLC), detailing
      the financial interests and membership of figures like John Avent and Joseph
      Bullock, provide a tangible corporate footprint potentially linked to networks
