  ALABAMA ETHICS COMMISSION HIDE THE LIST:
    brief: "1. THE CONFLICT\n    *   The Mabel Amos Scholarship Trust allocated over\
      \ $3.2 million in scholarships between 2013 and 2021.\n    *   Tom Albritton\
      \ held concurrent roles as a Trustee of the Mabel Amos Trust (e.g., January\
      \ 29, 2024) and Executive Director of the Alabama Ethics Commission.\n    *\
      \   The trust’s records are being scrutinized in civil litigation (*Lawrence\
      \ v. State*) following demands for public disclosure of all scholarship recipients\
      \ (\"The List\").\n    *   Albritton was alleged to routinely deny legitimate\
      \ ethics complaints while serving as trustee.\n\n2. THE DISCOVERY\n    *   Main\
      \ Article reveals North Ridge, LLC (Entity ID 420-935) is a domestic limited\
      \ liability company formed on June 2, 2008, in Baldwin County, AL.\n    *  \
      \ The business entity lists several key individuals as members: John G. Avent,\
      \ Joseph P. Bullock, and Kevin Boone.\n\n3. THE PIVOT\n    *   Article 1 (Business\
      \ Records) provides the concrete names of specific local figures—John G. Avent,\
      \ Joseph P. Bullock, and Kevin Boone—who are associated with a Baldwin County\
      \ LLC structure.\n    *   The Widget Article's central theme is that corruption\
      \ exists among \"privileged politicians, lawyers, bankers\" who benefit from\
      \ trusts (like Mabel Amos Trust) and operate near the Ethics Director (Albritton).\n\
      \    *   Article 1 identifies the specific local individuals whose financial/business\
      \ activities could connect to the broader network of privileged insiders targeted\
      \ by the allegations in Article 2.\n\n4. KEY ENTITIES\n    *   **People:** Tom\
      \ Albritton, John G. Avent, Joseph P. Bullock, Kevin Boone.\n    *   **Entities/Organizations:**\
      \ North Ridge, LLC (ID 420-935), Mabel Amos Trust, Alabama Ethics Commission,\
      \ HEADWATER HOLDINGS LLC.\n    *   **Locations:** Summerdale, AL; Baldwin County,\
      \ AL."
    generated_at: '2026-07-18T04:26:51.839202Z'
