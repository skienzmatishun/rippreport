      - Lawrence incarcerated for 20+ years (as of 2023/2024 reports).
      - Article 1 flags BCSO history of withholding evidence/misleading media in Murray Lawrence, O.J. French, Nodine cases.

      THE DISCOVERY:
      - Article 2 confirms four specific individuals from the 2005 trial now hold high office or power in Baldwin County.
      - Robert Wilters (2005 Judge): Now District Attorney; rejected filing of Rule 32 in 2023 (hindering post-conviction relief).
      - Anthony Lowery (2005 Chief Investigator): Now Baldwin County Sheriff; controls current investigations and accountability operations.
      - Huey 'Hoss' Mack (2005 Lead Investigator): Now retired at state-level position; allegedly coerced McNeil to shift blame onto Lawrence.
      - David Whetstone (2005 DA): Retired; admitted in court he made a deal with McNeil despite knowing testimony was unreliable.
      - Article 2 cites Innocence Project findings that exculpatory evidence was suppressed during trial.

      THE PIVOT:
