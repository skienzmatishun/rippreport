  biased-investigation:
    brief: |-
      1. THE CONFLICT
      - 2005: Murray Lawrence Jr., known as "Murray Bubba," jailed for life based solely on testimony from a single informant bargaining a reduced sentence.
      - Lawrence conviction lacked physical evidence: no blood, DNA, fingerprints, ballistics, weapon recovered, or other witnesses.
      - Lead Investigator on Lawrence case was Lt. Hoss Mack (currently Sheriff of Baldwin County).
      - Prosecutor for Lawrence case was District Attorney David Whetstone (retired).
      - Judge presiding over Lawrence case was Robert Wilters (currently District Attorney of Baldwin County).
      - Sheriff’s Office history cited: nine individuals killed by officers; zero officers found remotely responsible.
      - Past cases (Steve Nodine, Jonathan Victor) associated with misleading info releases or total information withholding by BCSO.

      2. THE DISCOVERY
      - Recent incident: Police shot and killed Otis (O.J.) French Jr in Bay Minette; community alleges excessive force during an eviction dispute context.
      - Investigation led by Baldwin County Major Crimes Unit (MCU) which refuses to release the identity of the officer who killed French.
      - MCU Lt. Andre Reid stated body camera footage would not be released during the investigation to "respect privacy," despite Alabama Supreme Court rulings effectively stripping public right to sue for footage.
      - Article 2 confirms Sheriff Hoss Mack now holds power over the unit and department historically implicated in withholding info for Lawrence.
      - Article 2 confirms Robert Wilters (former Judge) now serves as Baldwin County District Attorney, overseeing legal landscape for current police shooting.

      3. THE PIVOT
      - Article 2 serves as evidence that the lack of transparency and officer protection from accountability identified in Lawrence case is an ongoing operational standard for Baldwin County.
      - Structural link: Hoss Mack and Robert Wilters retained critical roles (Sheriff/Lead Investigator, Judge->DA) across both the past wrongful conviction and current fatal police shooting.
      - MCU's refusal to name officers or release footage in French case replicates the obstructionist tactics claimed in Lawrence and Nodine/Victor cases.

      4. KEY ENTITIES
      - Murray Lawrence Jr. (Inmate/Subject)
      - Hoss Mack (Lt./Sheriff, Major Crimes Unit head)
      - Robert Wilters (Judge/District Attorney of Baldwin County)
      - David Whetstone (Retired District Attorney)
      - O.J. French Jr / Otis French (Victim)
      - Lt. Andre Reid (Baldwin County MCU)
      - Baldwin County Sheriff’s Office (BCSO)
      - Major Crimes Unit (MCU)
