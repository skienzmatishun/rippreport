  rumors:
    brief: |-
      THE CONFLICT:
      - Murray Lawrence Jr. has been in prison since 2005 for murder based on single witness testimony; conviction had no blood, DNA, fingerprints, weapon, or ballistics evidence.
      - Lead Investigator on Lawrence case: Lt. Hoss Mack (now Baldwin County Sheriff). Judge at conviction: Robert Wilters (now District Attorney of Baldwin County). Prosecutor: DA David Whetstone (retired).
      - Jonathan Victor shot by sheriff deputy April 2021; victim unarmed, allegedly shot from 7 yards away.
      - O.J. French (32) killed by Bay Minette Police Aug 20 after traffic stop for vehicle equipment violation.
      - BCMCU (Baldwin County Major Crimes Unit) investigating O.J. French under Chairman Bay Minette Police Chief Al Tolbert; includes Baldwin Sheriff Hoss Mack, Daphne PD Chief David Carpenter, Gulf Shores PD Chief Edward Delmore.

      THE DISCOVERY:
      - Alabama Supreme Court ruled August 2021 (Friday) that media outlet Lagniappe Mobile cannot access Jonathan Victor case footage; court claimed records exempt under "investigative" nature, despite investigation closing.
      - Chief Justice of Alabama Supreme Court issued fervent dissent regarding public records law and state’s withholding power.
      - Sheriff Hoss Mack requested $600,000 taxpayer funding from Baldwin County Commissioners for body/dash cameras during public meeting.
      - BCMCU is currently self-investigating O.J. French shooting; rumors state camera footage will never be provided to public due to internal privacy policies (Andre Reid quote).
      - Rumors on O.J. French: Officer Brandon Thompson (alleged shooter) was previously fired by City of Bay Minette and other forces; victim allegedly shot in back.

      THE PIVOT:
      - Article 2 reveals the legal mechanism used to block evidence in current case matches previous Baldwin County obstruction: The Alabama Supreme Court ruling on Jonathan Victor footage (Article 2) gives Sheriff Mack’s office cover to withhold O.J. French evidence under "investigative" claims.
      - Article 2 confirms Hoss Mack and Al Tolbert are currently leading an investigation (BCMCU) for a police killing involving O.J. French while simultaneously controlling records on the Jonathan Victor shooting they are also linked to.
      - Article 2 proves Sheriff Mack’s track record of promising accountability (requesting cameras) vs delivering transparency (refusing to release Victor footage after Ala Supreme Court ruling).
      - Article 2 exposes the same leadership pattern: Hoss Mack and Robert Wilters (Lawrence case/Former Judge) are now overseeing the same type of internal policing and record-sealing that plagued the Murray Lawrence wrongful conviction.

      KEY ENTITIES:
      - Huey “Hoss” Mack (Baldwin County Sheriff, BCMCU member, Lead Investigator Lawrence)
      - Robert Wilters (Baldwin County DA, Former Judge Murray Lawrence case)
      - David Whetstone (Former District Attorney Larry Lawyer case; retired)
      - Al Tolbert (Bay Minette Police Chief, BCMCU Chairman; Rumored previous firing)
