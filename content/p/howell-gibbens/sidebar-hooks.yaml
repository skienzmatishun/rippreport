  quid-quo-pro:
    brief: 'THE CONFLICT:

      - Howell Gibbens is running for Fairhope City Council against incumbent Robert
      Brown.

      - Gibbens platform (Slow Down FairHope): Criticizes rapid growth, infrastructure
      strain, and lack of community bond.

      - Ripp Report alleges Brown is already in power: Accused of using office for
      personal gain, fully supported Fly Creek Apartments project and mentor Angelo
      Corte.

      - Robert Brown (Incumbent Councilman): Previously held City Council position;
      faces pending Ethics complaint and Attorney General complaint regarding city
      contracts.

      - Allegation: Brown is a loyalist to CATALYST organization (Scott Boone connection);
      associated with Baldwin County "good ole boy’s club."


      THE DISCOVERY:

      - Widget article cites Mayor Karin Wilson claiming City Council made "quid pro
      quo" deals under Brown and Burrell Boone leadership.

      - Specific Vote Evidence: Council voted 3-to-2 (Boone and Brown) to purchase
      recreation property for $2.6 million without clear appraisal process or public
      comment; Wilson calls this a "documented, lie."

      - Triangle Property Deal: Allegations that Brown supports giving up 102 acres
      around the Triangle for $20 million city property transfer/conservation easement
      without proper transparency.

      - Arts Contract Issues: Brown pushing past Eastern Shore Art Center (ESAC) contract
      without providing documentation of Ethics Commission permission or multiple
      bids.

      - Connections to FSTC: Mayor''s comments link Brown, Pittman, and Turner with
      Fairhope Single Tax Colony (FSTC) in controversial deals.


      THE PIVOT:

      - Article 2 (Widget) provides current, specific voting records and deal details
      that substantiate the corruption narrative in Article 1 (Main).

      - Confirms Robert Brown''s involvement in the specific $2.6 million recreation
      land purchase mentioned as "without public participation" in Article 1.

      - Connects the CATALYST allegations from Article 1 to specific council votes
      backing them in the Widget article.

      - Demonstrates Brown''s pattern: From "Fly Creek Apartments" (Main) to "Quid
      Quo Pro recreation purchases and Triangle deals" (Widget).


      KEY ENTITIES:

      - Howell Gibbens

      - Robert Brown

      - Karin Wilson (Mayor)

      - Burrell Boone

      - CATALYST

      - Angelo Corte

      - Cliff Pittman

      - Lee Turner

