  writ-of-mandamus-update:
    brief: |-
      THE CONFLICT:
      *   Baldwin County Judges, specifically Judge Norton and Judge Snedeker, accused of violating Alabama Judicial Canons.
      *   Violations include Canon 2 (appearance of impropriety), Canon 5 (regulating extra-judicial activities), and Canon 6 (filing financial interests).
      *   Judge Norton allegedly used position to influence police investigation regarding his son’s boat crash (16-year-old teen critically injured).
      *   Judge Norton involved in questionable bids at Fairhope Airport regarding personal jet hanger.
      *   Judge Snedeker tied to Catalyst/Scott Boone Consulting (described as political activity inappropriate to judicial office).
      *   Councilman Jack Burrell is subject of formal complaints; Ripp Report offers $5,000 reward to prove complaint documents are false or fabricated.

      THE DISCOVERY:
      *   Francis Paul Ripp filed a Writ of Mandamus with Montgomery County Circuit Court on October 18th.
      *   On November 25th, Judge Johnny Hardwick (Montgomery Circuit) held a status review hearing.
      *   Chief Justice Tom Parker selected Judge Hardwick to preside over ethics cases on November 1st.
      *   Judge Hardwick read evidence submitted in Ripp Report’s Writ of Mandamus and found it “very interesting.”
      *   Judge Hardwick recused himself from hearing the case due to a potential conflict of interest.
      *   Civil case filed (or pending) against Regions Bank involving trustees of the Mabel Amos Memorial Fund.

      THE PIVOT:
      *   Article 2 provides the legal escalation that validates the Ripp Report’s claims in Article 1; it moves from public accusation to formal legal motion (Writ of Mandamus).
      *   Judge Hardwick’s recusal highlights the existence of "conflicts of interest" within the very judicial system being challenged in Article 1, effectively exposing the accountability gap.
      *   Target shifts from local judges (Norton/Snedeker) to the Ethics Commission executive director (Albritton), linking judicial misconduct directly with ethical oversight corruption.

      KEY ENTITIES:
      *   Francis Paul Ripp (The Ripp Report)
      *   Judge Norton
      *   Judge Snedeker
      *   Jack Burrell (Fairhope Councilman)
      *   Judge Johnny Hardwick
      *   Chief Justice Tom Parker
      *   Mr. Albritton (Ethics Commission Executive Director)
      *   Regions Bank
      *   Fairhope Airport
      *   Mabel Amos Memorial Fund
