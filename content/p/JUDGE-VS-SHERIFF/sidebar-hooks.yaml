      - In the 2021 case Lagniappe v. Mack, Associate Justice Greg Shaw ruled law enforcement investigative materials are not public records, preventing media access to bodycam footage of Deputy Matt Hunady shooting an unarmed motorist.

      **THE DISCOVERY:**

      - The second article links the 2004 Murray Lawrence Jr. wrongful conviction case to Mack and Wilters.
      - Documents show an autopsy was performed on May 17, 2004; Wilters signed the order allowing it.
      - Mack (as lead investigator then) and others allegedly hid autopsy evidence that would have proven Lawrence innocent.
      - Recent allegations indicate BCSO is mishandling evidence in cases involving an FBI Task Force.
      - Sheriff Mack responded to 1819 News that he is "not aware of any cases that have been impacted or any missing evidence."
      - Sheriff Mack employed Jon Grey, a public relations expert who also works for the Baldwin County School Board and Ventures 68.
      - Internal allegations claim Sheriff Mack protects "insiders" (like investigators with misconduct histories) while punishing those outside the circle.

      **THE PIVOT:**

      - The Lawrence Jr. autopsy cover-up proves Sheriff Mack’s history of hiding exculpatory evidence, corroborating the Main Article’s claim that he treats investigations as political tools.
      - The 2004 concealment connects directly to the Main Article’s assertion that Mack relies on District Attorneys and Judges he influenced to facilitate cover-ups.
      - The Jon Grey connection adds a third layer: Mack has hired external PR spin control to manage public perception regarding these misconduct allegations.

      **KEY ENTITIES:**

      - Huey Hoss Mack (Baldwin County Sheriff)
      - Robert Wilters (Baldwin County District Attorney)
      - Trip Pittman / Boom Boom Pittman (State Senator, Bill 312 sponsor)
      - Justice Greg Shaw (Alabama Supreme Court Judge, Lagniappe ruling)
      - Deputy Matt Hunady
      - Murray Lawrence Jr. (Wrongful conviction subject)
      - Anthony Lowery / Lowry (Investigator, referenced in comments and past scandals)
      - Jon Grey (Public Relations Consultant)
