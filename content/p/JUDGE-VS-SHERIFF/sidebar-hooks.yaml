  boss-sheriff:
    brief: |-
      THE CONFLICT
      - Sept 2023: Baldwin County Judge rules sheriff’s office must return seized Camaro to vehicle owner.
      - Immediate Aftermath: District Attorney Robert Wilters and Sheriff Hoss Mack petition judge to reverse the ruling.
      - Political Backdrop: DA Wilters and Sheriff Mack described as “joined at the hip” with a 30+ year relationship.
      - Sheriff Mack’s Political Security: Secured position via State Sen. Trip Pittman (10 years prior).
      - Senate Bill 312: Sponsored by Sen. Pittman to increase Sheriff qualifications; used by Mack to eliminate competition and lock in two-term control (Baldwin County only had these qualifications).
      - Financial Conflict: In 2013, Sen. Trip Pittman awarded himself $750,000 in B/P money (Bridge Report link).
      - Precedent: 2021 Lagniappe v. Mack lawsuit resulted in ruling stating law enforcement investigative records (including body cam footage) are not public; only Chief Justice Tom Parker dissented.
      - Specific Incident: Deputy Matt Hunady shooting of unarmed motorist on I-10 (August 2021); footage withheld under the Lagniappe v. Mack precedent.

      THE DISCOVERY
      - Widget confirms FBI notified of citizen concerns regarding BCSO actions.
      - Confirms DA Wilters takes orders from Sheriff Mack; “Boss” terminology repeatedly linked to authority.
      - Confirms majority of local Judges placed in office by Sheriff Mack (reinforces Article 1’s allegation of judicial capture).
      - Reiterates pattern: Sheriff Mack’s office has its own Major Crimes Division, ensuring internal accountability (claims BCSO never held responsible for shootings).

      THE PIVOT
      - Widget Article validates Main Article’s claim that Sheriff Mack exerts political control over the judiciary.
      - Lagniappe v. Mack (2021) ruling serves as direct evidence for Main Article’s claim that Sheriff Mack can use the court to block transparency (body cam footage).
      - FBI notification in Widget Article confirms external validation of the "bad behavior" and corruption allegations stated in Main Article.

      KEY ENTITIES
      - Sheriff Hoss Mack (Baldwin County)
      - District Attorney Robert Wilters
      - State Sen. Trip Pittman
      - Judge (unnamed, reversing car seizure case)
      - Deputy Matt Hunady
      - Baldwin County Sheriff’s Office (BCSO)
      - FBI
