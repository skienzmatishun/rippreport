      - Connects the "S.O.S." leadership criticism in Article 1 directly to concrete
      financial and planning failures detailed in Article 2 (Waterfront, Sewer, Land
      Acquisitions).

      - Confirms the pattern of leadership deceit established in Article 1 (Burrell
      hiding from public scrutiny) with new specific instances regarding developer
