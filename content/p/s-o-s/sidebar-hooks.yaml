      KEY ENTITIES:

      - Jack Burrell (Fairhope City Council President)

      - Sherry Sullivan (Mayor, Fairhope)

      - Previous Mayor Wilson (Sullivan’s predecessor; credited with sewer/waterfront
      funding but criticized in Art 2)

      - Stewart "The Liar" Speed (Leaf River Group Developer)

      - Jay Robinson (Councilman, Fairhope)

      - Sheriff Hoss Mack (Baldwin County Sheriff)

      - Deputy Hunady (Shooting victim of Victor case mentioned in Art 1; Hoss Mack’s
      subordinate)

      - ADEM (Alabama Department of Environmental Management)

      - RESTORE Act Funding Source'
