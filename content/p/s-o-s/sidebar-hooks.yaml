      PIVOT:

      - Article 2 serves as the "smoking gun" because it validates Ripp Report’s earlier
      predictions ("Redneck Renovations") regarding the $6.2 million project being
      mismanaged.

      - Article 2 provides specific evidence (Burrell removing jetties/swim area for
      personal preference) that supports the accusation in Article 1 that Council
