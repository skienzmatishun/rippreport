      - Federal law requires specific design elements (swim area, rock jetties for
      pier foundation), but Council removed them.

      - Municipal officials admitted project was year behind schedule on planning;
      Burrell altered plan to prioritize short-term maintenance over sustainable design.


      DISCOVERY:

