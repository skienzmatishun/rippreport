      KEY ENTITIES:

      - Fairhope City Council (Current)

      - Jack Burrell (Council President)

      - Sullivan (Mayor)

      - Mayor Wilson (Previous administration context)

      - Howell Raines (“Howling”)

      - Sheriff Hoss Mack

      - Deputy Hunady

      - RESTORE Act (Funding source)'
