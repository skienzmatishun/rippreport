      Fairhope Airport and resisted public questioning regarding finances.

      2. THE DISCOVERY: Investigation into the Mobile Area Boy Scout Council revealed
      a nine-year average yearly loss of over $200,000 since 2008; Michael Hartigan
      (Executive Director) was paid an average salary/benefits exceeding $12,000 per
      month, totaling over $1 million since January 2009.

      3. THE PIVOT: The allegations of severe financial mismanagement and documented
      legal/ethical breaches—specifically Phil Webb''s alleged IRS violations regarding
      the Camp Maubila land sale in 2015—serve as a case study for systemic abuse
      of local funds, paralleling the claims in Article 1 that city council members
      are ignoring progressive financial responsibility and allowing special interests
      (Airport) to supersede city welfare.

      4. KEY ENTITIES: Council President Burrell; Fairhope City Council; Michael Hartigan;
