  comment-surprised-ripp-report-baldwin-county-legal-eagle:
    brief: 'THE CONFLICT:

      *   Fairhope City Council obstructed the city budget approval for three months.

      *   Mayor offered ideas to save money, but the council maintained an ultra-conservative
      view focusing on expenses.

      *   Council President Burrell protected Fairhope Airport interests.

      *   The council sided with fired employees regarding litigation.


      THE DISCOVERY:

      *   Councilmen Boone and Burrell faced allegations of conflicts of interest.

      *   Mr. Boone''s business interests conflicted with his voting on issues, which
      he failed to disclose on his ethics form and dissolved LLCs after exposure.

      *   Burrell raised red flags regarding the handling of the airport, but the
      council defended him by claiming familiarity with "all the players."

      *   The past council (Boone and Burrell) accepted a gift of wetlands near Fly
      Creek (four acres instead of 100 square feet).

      *   Deed for the wetland gift was filed three days prior to acceptance.

      *   Duplicate public documents show Mayor Kant signed one resolution in October
      2016, and the newly elected Mayor signed the same document weeks later.


      THE PIVOT:

      *   Article 2 provides concrete evidence (the wetland gift transaction and undisclosed
      business interests) that substantiates the claims made in Article 1 regarding
      conflicts of interest and self-dealing by Councilmen Boone and Burrell, which
      were previously ignored during budget discussions.


      KEY ENTITIES:

      *   Burrell

      *   Boone

      *   Fairhope City Council

      *   Fairhope Airport

      *   Mayor Kant

      *   Alabama Non-Ethics Commission (or Ethics Commission)'
