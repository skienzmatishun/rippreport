  now-you-know-jack:
    brief: 'THE CONFLICT:

      *   Fairhope City Council has obstructed the Mayor regarding the city budget
      for three months.

      *   Council President Jack Burrell protects Fairhope Airport funds and hides
      behind the Alabama Non-Ethics Commission.

      *   Burrell micromanages employees and aids disgruntled employees in litigation
      against the city.


      THE DISCOVERY:

      *   Jack Burrell orchestrated a campaign to obstruct the Mayor since day one.

      *   Burrell is complicit in leaking documents and fueling an Ethics complaint
      filed by the Mayor.

      *   Burrell fought to keep control of the Fairhope Airport land title, denying
      the Mayor legal counsel.


      THE PIVOT:

      *   Article 2 proves that the budget obstruction described in Article 1 is directly
      orchestrated by Burrell''s personal conflict and unethical actions, not just
      procedural delay.

      *   Article 2 reveals Burrell’s motive was tied to a failed political plan (Mayor
      Kant reelection) and illegal use of office to silence critics.


      KEY ENTITIES:

      *   Jack Burrell

      *   Fairhope City Council

      *   Mayor Kant

      *   Fairhope Airport

      *   Alabama Non-Ethics Commission

      *   The Ripp Report'
