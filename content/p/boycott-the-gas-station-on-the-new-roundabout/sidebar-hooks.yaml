      previous administrations involving Mayor Kant and County Commissioner Elliott.

      *   Trip Pittman and Tim Kant were involved with BP anchors cited by the Main
      Article.

      *   A $40,000 handshake deal was approved by the City Council without proper
      documentation.

      *   Jack “Come Fly With Me” Burrell and Beavis and Butthead (Boone and Come
      Fly With Me Burrell) were present during decisions regarding the roundabout
      infrastructure.


      THE DISCOVERY

      *   Catalyst Associates was formed on August 11, 2014, with Michael Scott Boone,
      Lynn Stacey, and Coley M. Boone as managers/agent.

      *   Catalyst is described as the "illegitimate brain child" of a political group
      (Elliott, Haygood, Stacy) known for winning 100% of candidates.

      *   Councilmen Boone and Burrell are actively working to slow down city business
      and discredit the Mayor through political actions like hiring freezes and rejecting
      mayoral choices.


      THE PIVOT

      *   Article 2 identifies Catalyst Associates as the organized "good ole boys"
      network, which provides the structural explanation for why the individuals mentioned
      in Article 1 (Burrell, Kant, Elliott) were able to move ahead with questionable
      deals and infrastructure decisions without proper oversight.

      *   Catalyst represents the same influence network that motivated the alleged
      greed leading to the gas station placement described as a failure of city planners
      and officials in Article 1.


      KEY ENTITIES

      *   Burrell (Jack “Come Fly With Me”)

      *   Kant (Tim)

      *   Elliott (County Commissioner)

      *   Pittman

      *   Boone (Michael Scott, Coley M.)

      *   Stacey (Lynn)

      *   Catalyst Associates

      *   Mayor Wilson'
    generated_at: '2026-07-11T10:26:08.889253Z'
