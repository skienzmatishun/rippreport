      *   Article 2 provides quantitative proof of financial misconduct—a $14.25 million
      ($11.25M settlement + $3M fees) transaction—carried out by the same individuals
      (Burrell and Boone) using city resources without public participation to secure
      land benefiting "good ole boys" and developers, mirroring the alleged political
      quid pro quo of Article 1.


      KEY ENTITIES

      *   Fairhope City Council

      *   Councilman Burrell (Jack “Come Fly With Me” Burrell)

      *   Boone (Council Member/City Council Member)

      *   Mayor Kant (Former Mayor)

      *   County Commissioner Elliott (or Elliot)

      *   Dyas (Lawsuit Plaintiff)

      *   Pittman (mentioned in context of BP anchors/infrastructure)'
