      the previous City Council without paperwork or invoices.

      *   Key figures mentioned in this past development issue: Jack “Come Fly With
      Me” Burrell, Mayor Kant, Beavis (Boone), Butthead (Burrell), and County Commissioner
      Elliott.


      **THE DISCOVERY:**

      *   Current developments show massive planned unit developments (PUD) underway
      or proposed for the northwest corner of Fairhope Avenue and Hwy 181.

      *   Developer Tom Mitchell is involved in a three-part PUD application by Gayfer
      Village Partners, LLC.

      *   The PUD includes 16 commercial lots, 232 multi-family apartment units (R-5),
      and 77 single-family residential lots (R-3).

