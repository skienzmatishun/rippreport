    brief: 'THE CONFLICT:

      *   Fairhope City Council refused economic and community development support.

      *   Mayor made a $40,000 "handshake deal" without proper paperwork.

      *   Jack “Come Fly With Me” Burrell, Beavis, Butthead (Boone), Mayor Kant, and
      County Commissioner Elliott were involved in decisions regarding the roundabout
      construction.

      *   The city faced criticism regarding safety negligence related to placing
      a gas station on a roundabout.


      THE DISCOVERY:

      *   A planned unit development project ("Catalyst") is proposed for 76 acres
      near Fairhope Avenue and Hwy 181.

      *   The development includes 232 multi-family apartment units, 77 single-family
      residential lots, and 16 commercial lots (totaling 566 units).

      *   Tom Mitchell is the developer for this project.

      *   Gayfer Village Partners, led by Municipal Judge Haymes Snedeker and organizer
      Ray Hix, is submitting the application for approval.


      THE PIVOT:

      *   Article 1 alleges corruption and incompetence among local politicians ("Good
