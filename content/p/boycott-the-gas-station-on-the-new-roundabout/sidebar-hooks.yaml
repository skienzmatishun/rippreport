      *   Boone (City Council Member)

      *   Mayor Kant

      *   County Commissioner Elliott

      *   ALDOT

      *   Highway 98

      *   Johnson Road

      *   Developers (General entity mentioned in both analyses)'
    generated_at: '2026-07-18T08:28:16.252645Z'
  fairhopes-triangle-mega-site:
    brief: 'THE CONFLICT

      *   Construction occurred on a roundabout in Fairhope (Fairhope Avenue and 13)
      involving placing a gas station entrance/exit directly onto the intersection.

      *   This development took place during the "last administration," following
      assurances from Beavis, Butthead (Boone and Burrell), Mayor Kant, and County
      Commissioner Elliott that it would not happen prior to election time.

      *   The City of Fairhope purchased the Triangle property for $11.25 million
      to settle a lawsuit involving Dyas.


      THE DISCOVERY

      *   Article 2 reveals the Triangle property is currently estimated at a value
      between $16 and $20 million.

      *   It proves that the purchase by Burrell and Boone was not voluntary, but
      necessitated by settling a legal dispute (the Dyas lawsuit).

      *   The settlement included $3 million in attorney fees paid to city-hired attorneys
      who had promised no public costs for the defense.


      THE PIVOT

      *   Article 1 identifies the "good ole boy network" and corruption related to
      the safety violation (gas station on roundabout) carried out by Burrell, Boone,
