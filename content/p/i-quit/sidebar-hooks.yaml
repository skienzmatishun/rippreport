      Main Article claims 2016/2020 City Council (3 B''s) used public office for personal
      gain.

      Main Article claims Mayor Sherry Sullivan is part of a deal between developers
      and CSB (Scott Boone Consulting) to "embrace development."

      Main Article claims Council President Burrell and CSB orchestrated the vacancy
      plan for Brown''s seat.


      DISCOVERY:

      Article 2 confirms challengers to replace incumbents will face "The 3 B’s":
      Joshua Gammon vs Kevin Boone; Howell Gibbens vs Robert Brown; Deb Hopkins vs
      Jack Burrell.

      Article 2 alleges a Former Mayor/State Senator stole $639,000 of BP grant money
      while Sherry Sullivan was employed.

      Article 2 details Karin Wilson''s financial record: Obtained $23 million in
      grants; reversed annual $6 million debt without borrowing.

      Article 2 notes Sherry Sullivan was fired in 2017; has held three jobs since
      then, resigned from Riviera Utilities.

      Article 2 claims CATALYST is run by Councilman Boone’s son, Scott Boone.


      PIVOT:

      Brown''s resignation without notice supports Main Article’s claim that the council
      is unstable and unproductive.

      Article 2 explicitly links CATALYST to Scott Boone Consulting, confirming Main
      Article’s accusation of “dirty hands” and insider control.

      Article 2 lists specific challengers for the seats Brown, Burrell, and Boone
      seek to keep, proving the political stakes of Brown’s "quit."

      Article 2 provides specific fiscal data (debt reduction, grant money) to validate
      Main Article’s claim that the current council mismanages funds compared to previous
      administrations.


      KEY ENTITIES:

      Robert Brown, Jack Burrell, Kevin Boone, Sherry Sullivan, Karin Wilson, Scott
      Boone, CSB (Scott Boone Consulting), CATALYST.'
