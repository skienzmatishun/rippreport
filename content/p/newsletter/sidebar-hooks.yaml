hooks:
  newsletter-the-ripp-report:
    brief: '**THE CONFLICT**

      * Article 1 (Main) announces Ripp Report will cover upcoming elections in Baldwin
      County.

      * Article 1 states general corruption exists due to low voter participation
      (30% vote, 20% straight ticket = 10% participation).

      * Article 1 does not name specific candidates or election dates.

      * Article 1 links to Baldwin County al.gov/Government/municipalities for community
      data.


      **THE DISCOVERY**

      * Article 2 (Widget) specifies mid term election with qualification cutoff date
      of Feb 9th @ 5:00 pm.

      * Article 2 identifies candidate BP Pittman for District 32 State Senate seat.

      * Article 2 alleges Pittman skimmed $750,000 from BP.

      * Article 2 states district 32 had no identity on goat hill in the past other
      than carrying water.


      **THE PIVOT**

      * Article 2 validates Main''s claim of high corruption by naming specific perpetrator
      (BP Pittman) and amount ($750,000).

      * Article 2 defines the Main''s vague "upcoming elections" with specific deadline
      (Feb 9th).

      * Article 2 confirms Article 1''s mission to expose corruption by providing
      concrete evidence against a current official.


      **KEY ENTITIES**

      * Organization: The Ripp Report (Consumer Group)

      * Partner Organization: Baldwin County Legal Eagle

      * Locations: Baldwin County, 14 Municipalities (link http://baldwincountyal.gov/Government/municipalities)

      * Individual: BP Pittman (District 32 State Senate Seat Incumbent)

      * Financial Amount: $750,000 (skimmed from BP)'
    generated_at: '2026-03-08T21:57:43.909396Z'
  exposure-2:
    brief: 'The Conflict: The Ripp Report specializes in exposing political corruption
      by filing legitimate complaints with the Alabama Ethics Commission and Alabama
      Attorney General. Records from 12 years of operation indicate these complaints
      fell on deaf ears; public belief suggests the Ethics Commission provides cover
      for offenders.


      The Discovery: Article 2 confirms Alabama City Councils ignore complaints and
      protect each other, effectively compounding corruption. It identifies an organization
      called Catalyst as a group protecting "good ole boys" within Baldwin County.
      Article 2 states the only effective way to challenge corruption is exposure,
      as formal complaints fail and indictments are lacking.


      The Pivot: Article 2 validates the strategy in Article 1 by confirming that
      filing complaints with official entities (Ethics Commission/AG) was ineffective,
      justifying the shift to a public Newsletter for "exposure" rather than relying
      on government channels. Article 2 identifies the specific target (Baldwin County)
      and entities (14 municipalities, Baldwin County Commission) which aligns with
      Article 1''s stated coverage area.


      Key Entities: The Ripp Report, Baldwin County Legal Eagle, Alabama Ethics Commission,
      Alabama Attorney General, Catalyst (Organization), Baldwin County, Baldwin County
      Commission, 14 municipalities of Baldwin County.'
    generated_at: '2026-03-08T21:57:43.909406Z'
  exposure:
    brief: 'THE CONFLICT

      - The Ripp Report is a not for profit organization based in Baldwin County.

      - Major goal stated: Expose political corruption, assist consumerism issues
      related and unrelated to politics.

      - Scope covers all 14 municipalities in Baldwin County.

      - Offer: Provide facts about candidates and history, assist exposing/solving
      community government corruption problems, free assistance (no charge), anonymous
      work.

      - Corruption rationale: Roughly 30 percent vote, 20 percent straight ticket
      voting leaving 10 percent of population participating meaningfully in municipal
      government.


      THE DISCOVERY

      - The Ripp Report collaborated with Baldwin County Legal Eagle (BCLE) for a
      record posting titled "BALDWIN COUNTY FAMILY COURT - A COTTAGE INDUSTRY".

      - Posting metrics: 48,200 people reached (112 shares, 109 likes, 28 comments).

      - Action taken: 9 phone calls received from the posting campaign.

      - Specific allegations identified in Article 2 against Judge Thomason and Attorney
      Stephen Johnson (added to earlier allegations).

      - Concrete impact recorded: One prospective client of Attorney Stephen Johnson
      decided to go elsewhere for an attorney based on Ripp Report advice.

      - Political context: Majority of citizens moved to Baldwin County in the last
      15 years; majority feel they care less about supporting criminal enterprise.
      Defeat of Tim Kant cited as an example affecting good ole boys.


      THE PIVOT

      - Article 2 validates The Ripp Report''s existence and activity in Baldwin County
      (as claimed in Article 1) by confirming a partnership with a county entity (BCLE).

      - Article 2 provides specific names of judicial figures (Judge Thomason, Attorney
      Stephen Johnson) to support the Article 1 claim regarding high levels of corruption
      in Baldwin County government.

      - Article 2 expands Article 1''s "candidates" focus to the judiciary system
      (Family Court), proving Ripp Report operations extend beyond just municipal
      elections.


      KEY ENTITIES

      - The Ripp Report

      - Baldwin County Legal Eagle (BCLE)

      - Baldwin County (14 municipalities, Family Court, county government)

      - Judge Thomason

      - Attorney Stephen Johnson

      - Tim Kant

      - Divorce Corp.'
    generated_at: '2026-03-08T21:57:43.909409Z'
  GAME-ON-MAYOR-KANT-HUBBARD-GOES-DOWN-YOURE-NEXT:
    brief: '1. THE CONFLICT: The Ripp Report was established over 10 years ago due
      to a lack of honest information from Fairhope city hall. Original scope was
      local Fairhope politics targeting Mayor Kant Hubbard specifically. Author cites
      low voter participation in municipal government as a cause for corruption (30%
      vote turnout).

      2. THE DISCOVERY: Article 2 proves the organization is self-funded for the last
      10 years at approximately $15,000.00. No salaries are paid; donations go exclusively
      to social media advertising and public education, not the organization itself.
      The scope has expanded from Fairhope politics to all 14 Baldwin County municipalities
      via the blog site.

      3. THE PIVOT: Article 2 identifies "The Ripp Report" as the specific entity
      promoting its newsletter in Article 1. It confirms the URL provided (https://rippreport.com/).
      Article 2 establishes the credibility of the whistleblower (private citizen,
      not elected, self-funded) which validates Article 1''s offer to expose political
      corruption anonymously and free of charge.

      4. KEY ENTITIES: The Ripp Report, Mayor Kant Hubbard, Baldwin County Legal Eagle,
      Fairhope city hall, Baldwin County (14 municipalities), ripreport.com.'
    generated_at: '2026-03-08T21:57:43.909437Z'
  freaky-fairhope:
    brief: 'THE CONFLICT

      - The Ripp Report is a not-for-profit consumer group with a major goal to expose
      political corruption in Baldwin County.

      - Services provided are free and citizenship assistance includes exposing/solving
      problems within community government.

      - Coverage target: All 14 Baldwin County municipalities for upcoming elections
      (20% straight ticket vote, ~30% turnout results in 10% participation leading
      to high corruption).

      - Citizens encouraged to sign up via rippreport.com for anonymous facts about
      candidates and histories.


      THE DISCOVERY

      - Fairhope (Baldwin County) local politics described as status quo resembling
      criminal enterprise; worst council seen in 50 years.

      - Specific allegation: In 2010, State Senator Boom Boom Pittman and Mayor Cant
      orchestrated major fraud of BP funds totaling $639,000.00.

      - Specific allegation: Current Council members Boone, Brown, and Burrell using
      office for personal gain (full family insurance package estimated at $17,500).

      - Specific allegation: Three Council members purchased farmland for recreation
      property without public participation, driving city surplus from $1.7 million
      to 1.2 million dollar deficit overnight.

      - Specific allegation: Land leased back to farmer for $9000 dollars a year (breaking
      promise to black community).

      - Specific allegation: State Senator Boom Boom Pittman and Mayor Cant were candidates
      in 2010; Challenger to Mayor retired from BP.

      - PR manipulation: Company CATALYST (Scott Boone Consulting) replaced "CHUCKIE
      CHEEZE" with new op-ed writer "HOWLING RAINS".

      - Howling Rains has 6.3 million dollar grant from BP; described as distraction/liar
      by author (absent from meetings last 4 years).

      - Specific allegation: Historic Bluffs claim is false (eroding cut bank covered
      with kudzu) vs Historic Marker on Scenic 98 in Montrose.

      - Election qualification deadline: Next week July 21st (Year of context 2020
      mentioned for municipal election).


      THE PIVOT

      - Main Article promises to provide facts about candidates and history "that
      you may not read elsewhere."

      - Widget Article supplies specific names for the promised candidate histories
      (Mayor Cant, Boom Boom Pittman) and organizations.

      - Widget Article provides specific dollar amounts ($639,000 fraud, $17,500 insurance,
      land deals) validating the promise to expose corruption.

      - Widget Article links specific entities (CATALYST, Howling Rains) to the corruption
      targets, fulfilling Main Article''s goal of exposing sources (e.g. 6.3 million
      dollar grant to Howling Rains from BP).

      - Widget Article identifies the specific location (Fairhope, Baldwin County)
      aligning with Main Article''s "Baldwin County" scope.


      KEY ENTITIES

      - Organizations: The Ripp Report, CATALYST (Scott Boone Consulting), Howling
      Rains, Courier.

      - People: Boom Boom Pittman, Mayor Cant, Scott Boone, Chuckie Cheeze, Candidates
      (Boone, Brown, Burrell).

      - Companies/Clients: BP (British Petroleum).

      - Locations: Fairhope, Alabama, Baldwin County, Mobile Bay, Montrose.

      - Projects/Topics: Historic Bluffs (Historic Marker Scenic 98), Waterfront Project,
      Recreation Property.

      - Financial Figures: $639,000.00 (2010 fraud), 6.3 million dollar (Grant to
      Howling Rains), ~$17,500 (Insurance), $9,000/year (Lease), $1.7 million/ 1.2
      million deficit (Land Surplus).'
    generated_at: '2026-03-08T21:57:43.909450Z'
  there-are-more-of-us-than-them:
    brief: '**THE CONFLICT**


      *   **Baldwin County Participation Stat:** Article 1 states roughly 30% of the
      population participates in municipal government (citing "roughly 30 % vote,
      20% of them vote straight ticket").

      *   **Corruption Premise:** Article 1 claims high level of corruption throughout
      Baldwin County due to low voter participation (only 10% actually participate
      in some way).

      *   **Fairhope Election Data:** Article 2 reports only 5,500 people voted in
      the last Fairhope city elections.

      *   **Fairhope Turnout:** Article 2 states only 30% to 35% of registered voters
      voted.


      **THE DISCOVERY**


      *   **Mayor Kant Corruption:** Article 2 identifies Mayor Kant (Fairhope) as
      receiving 3,026 votes in last election; alleges he is under cloud of investigation
      involving participation in BP Grant fraud.

      *   **Mayor Kant Roles:** Article 2 claims Mayor Kant also draws a salary as
      Utilities Director.

      *   **Baldwin County Corruption:** Article 2 identifies Commissioner Tucker
      Dorsey (Baldwin) as firing whistle-blowers of Pittman Kant BP fraud.

      *   **Dorsey Mega-Site:** Article 2 notes Commissioner Dorsey involved in mega-site
      deal costing 30 million+ dollars for connected landowners.

      *   **Flag Violations:** Article 2 notes Commissioner Tucker Dorsey and Commissioner
      Elliot refused to fly flag at half mast following Orlando terrorist attack.

      *   **Commissioner Elliot Legal Issues:** Article 2 states Commissioner Elliot
      had a DUI, went to jail, and refused blood/blow test.

      *   **Specific Damages:** Article 2 alleges sewer system needed $10 million
      "band aid" upgrade; Soccer fields cost dwarfs money spent on education.

      *   **Candidate Funding:** Article 2 reports Mayor Kant received over $50,000
      in campaign donations (over 50% from people not living in Fairhope).


      **THE PIVOT**


      *   **Validation of Claim:** Article 2 validates the turnout percentage claimed
      in Article 1 (30-35% vs roughly 30%), proving the low participation statistic
      cited by Ripp Report.

      *   **Identifying Targets:** Article 2 converts the abstract "high level of
      corruption" in Baldwin County (Article 1) into specific names: Mayor Kant and
      Commissioner Tucker Dorsey.

      *   **Specific Candidates:** Article 2 lists Jennifer Fiddler and Sherry Sullivan
      ("mayor in training") accompanying the mayor to DC, identifying them for potential
      tracking per Article 1''s promise to cover candidates.

      *   **Scope Expansion:** Article 2 connects Fairhope corruption (Mayor Kant)
      to the broader Baldwin County scope mentioned in Article 1''s "covering all
      14 municipalities" goal.

      *   **Specific Links:** Article 2 links Pittman Kant to the "triangle lawsuit"
      utility fund settlements referenced in Article 1''s context (though Art 2 specifies
      utilities, Art 1 mentions utility fund generally).


      **KEY ENTITIES**


      *   **Names:** Mayor Kant, Tucker Dorsey, Commissioner Elliot, Mike Hubbard
      (former Speaker of House), Judge Roy Moore, Billy Bentley ("Bentley''s wandering
      hands"), Jennifer Fiddler, Sherry Sullivan.

      *   **Locations:** Baldwin County, Fairhope (City), Fly Creek Apartments, Quail
      Creek Golf Course.

      *   **Organizations:** Ripp Report, Baldwin County Legal Eagle, Board of Election
      (implied), Boy Scout Board (Mobile).'
    generated_at: '2026-03-08T21:57:43.909453Z'
  a-slap-on-the-wrist:
    brief: '1. THE CONFLICT: Article 1 establishes The Ripp Report as a not for profit
      consumer group with no charge, missioned to expose political corruption in Baldwin
      County''s 14 municipalities. Article 1 claims low voter participation (roughly
      30% vote, 20% straight ticket, 10% population participation) causes high corruption.
      Article 1 promises to cover candidates/facts and assist citizens in solving
      problems anonymously if desired via rippreport.com.


      2. THE DISCOVERY: Article 2 confirms The Ripp Report is a Non-Profit Consumer
      Organization that cannot give legal advice but offers consultation on issues
      and helps find attorneys. Article 2 links the case to Lagniappe Mobile coverage
      of the "Bar stool" incident in Fairhope. Specific facts reveal McSharry was
      on probation at time of 2018 incident; roughly two months earlier, McSharry
      was convicted of "breach of peace" for allegedly harassing artist Nall Hollis.
      McSharry received 12-month probation with instructions to avoid contact with
      Hollis and "no distilled liquors". McSharry received 6 months jail in Nall case,
      never served a day. Victim Paula DiNiardi incurred medical expenses with no
      apology or payment from McSharry; this is alleged to be McSharry''s fourth alcohol
      related incident (two settled out of court).


      3. THE PIVOT: Article 2 acts as the evidence for Article 1''s corruption claims
      by identifying a specific political cabal (CATALYST, changed to Scott Boone
      Consulting SBC) active in Baldwin County during 2020 election cycle. Article
      2 links Jack Burrell (Fairhope Councilman) to the control of the council and
      SBC candidates, identifying his son Kevin Boone as a Councilman ("Strawman")
      and conduit to SBC. Article 2 links Haymes Snedeker (Fairhope Municipal Judge,
      large land owner) to the Council and SBC support for his 4-year appointment.
      Article 2 identifies City Attorney Marcus McDowell as working for Council and
      Burrell controls the council. Article 2 states Judge Stankoski has responsibility
      for finding justice for DiNiardi and notes he does not appear to have connection
      to SBC.


      4. KEY ENTITIES: The Ripp Report, Baldwin County Legal Eagle, Baldwin County
      Government, Lagniappe Mobile. Names: Jack Burrell, Kevin Boone, Scott Boone,
      Paula DiNiardi, Nall Hollis, Marcus McDowell, Haymes Snedeker, Stankoski, McSharry.
      Organizations: CATALYST, Scott Boone Consulting SBC, Ripp Report, Lagniappe
      Mobile. Locations: Baldwin County (14 municipalities), Fairhope. Roles: Municipal
      Judge, City Attorney, Councilman, Mayor, Victim (DiNiardi), Artist (Hollis).'
    generated_at: '2026-03-08T21:57:43.909456Z'
  corruption-is-legal-in-america:
    brief: 'THE CONFLICT

