      the council''s financial recklessness directly to physical construction disputes.

      *   The widget article identifies Boone Burrell and Brown as providers of shovels
      used by the council to "dig another hole."

      *   Article 2 suggests that the underlying goal is a "GOB strategy" supported
      by Burrell and Boone to remove the mayor, linking development corruption to
      political sabotage.


