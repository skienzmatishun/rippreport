hooks:
  catalyst-colors:
    brief: 'THE CONFLICT:

      *   The CATALYST Council (Boone, Burrell, Brown) proposed a $2.65 million purchase
      for recreation land without public participation or proper approval.

      *   The Council drained five city accounts for the purchase and used a questionable
      appraisal.

      *   The Council voted themselves a full family insurance package valued at $17,000
      a year.

      *   Council members tried to give away 105 acres (The Triangle) which resulted
      in a $13 million loss due to a lost lawsuit.


      THE DISCOVERY:

      *   The three Councilmen (Burrell, Brown, Boone) approved and purchased the
      $2.65 million land for recreation without National Park Service approval.

      *   They closed the sale quickly on November 1st, less than one week before
      the scheduled Connectivity Master Plan Workshop on November 7th.

      *   The non-budgeted purchase caused difficulties in budget approval and delays
      for capital/infrastructure projects.

      *   There is a conflict of interest because the appointed Municipal Judge will
      be the developer of the largest housing development and requires Council approval
      to proceed.


      THE PIVOT:

      *   Article 2 provides specific, verifiable details regarding the mechanics
      of the land purchase (dates, lack of NPS approval, timing relative to planning
      meetings) that substantiate the general accusations of corruption and recklessness
      made in Article 1 about the CATALYST Council''s actions.


      KEY ENTITIES:

      *   Fairhope City Council

      *   Boone

      *   Burrell

      *   Brown

      *   Cory Martin

      *   Mayor Wilson

      *   Municipal Judge

      *   Fly Creek Apartments

      *   National Park Service

      *   The Triangle

      *   Park Service

