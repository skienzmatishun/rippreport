      *   Judge Michelle Hart (aka Thomason) was a founder of BCSA and the first client
      of Catalyst.


      THE DISCOVERY

      *   Chris Elliott is an architect of Catalyst who gave up his County commission
      seat and sold his business for a political opportunity.

      *   Elliott’s wife is employed by Sheriff Hoss Mack.

      *   Sheriff Mack and School Superintendent Eddie Tyler are linked to Chris Elliott''s
      efforts.

      *   Catalyst is actively pursuing the County Commission, State Senate Seat 32,
      and Fairhope.


      THE PIVOT

      *   Article 2 establishes Chris Elliott as the central architect of Catalyst’s
      political machine, providing the underlying structure for the schemes detailed
      in Article 1 (such as the manipulation involving Jeb Ball and BCSA).

      *   Elliott is positioned as the key figure driving Catalyst''s goal to secure
      the County Commission seat.


