hooks:
  catalyst-does-baldwin-county:
    brief: '**THE CONFLICT**

      *   Baldwin County Substance Abuse Services (BCSA) was founded by judges and
      lawyers, including Judge Michelle Hart (aka Thomason).

      *   Michelle Hart is alleged to be the first client of the political group CATALYST.

      *   In Baldwin County District One Commissioner race, Catalyst recruited Jeb
      Ball as a candidate for the seat while abandoning incumbent Frank Burt.

      *   Jeb Ball was simultaneously designated Director of BCSA; Article 1 argues
      this creates an intolerable conflict of interest between holding a Commissioners
      seat and managing BCSA fees collected in cash under a politically compromised
      agenda.


      **THE DISCOVERY**

      *   CATALYST seeks widespread political dominance across Baldwin County (State
      Senate Seat, County Commission, Fairhope).

      *   Chris Elliott, described as an architect of CATALYST, is campaigning for
      the State Senate Seat 32.

      *   The organization’s reach includes connections between Sheriff Hoss Mack
      and Eddie Tyler (Superintendent), who are central figures in the broader Catalyst
      political equation.


      **THE PIVOT**

      *   Article 1 identifies BCSA as a localized "money scheme" and political compromise
      involving Michelle Hart, CATALYST, and Jeb Ball.

      *   Article 2 reveals this is not an isolated incident but a symptom of systemic
      corruption: CATALYST uses its influence over high-profile candidates (Chris
      Elliott) and key county officials (Hoss Mack, Eddie Tyler) to build "the corrupt
      wheel" necessary to achieve maximum political control across the entire county
      government.


      **KEY ENTITIES**

      *   Baldwin County

      *   CATALYST

      *   Frank Burt

      *   Jeb Ball

      *   Michelle Hart (aka Thomason)

      *   BCSA (Baldwin County Substance Abuse Services)

      *   Chris Elliott

      *   State Senate Seat 32

      *   Sheriff Hoss Mack

      *   Eddie Tyler'
    generated_at: '2026-07-18T19:18:33.813432Z'
  say-goodbye-incumbents:
    brief: 'THE CONFLICT:

      - Frank Burt held the position of Baldwin County Commissioner since 1988 (approx.
      29 years).

      - Catalyst recruited Jeb Ball as a "foot soldier" to challenge incumbent Frank
      Burt for District No. 1 (Seat 1).

      - Judge Michelle Hart (also known as Thomason) was one of the founders of Baldwin
      County Substance Abuse Services (BCSA).

      - BCSA is accused of operating as a "money scheme," allowing convicted individuals
      to pay their way out of crimes, and has faced criticism for collecting fees
      and urine tests in CASH.


      THE DISCOVERY:

      - The push against incumbents extends beyond Frank Burt; Widget Article 2 aims
      to replace all four Commissioners.

      - Catalyst’s influence is noted by its connection to Tucker Dorsey (former Baldwin
      County Commissioner) who is described as a "good ole boy" and a partner of Clarence
      Burke (President of BCSS).

      - Seat 3 includes Billy Joe Underwood challenging Tucker Dorsey.


      THE PIVOT:

      - Article 1 focuses on the specific conflict between Catalyst''s Jeb Ball (and
      the BCSA conflict of interest) versus incumbent Frank Burt.

      - Article 2 reveals that this conflict is part of a broader, systemic political
      effort to retire all current leadership and details multiple candidates challenging
      the status quo in every district, confirming the pervasive influence and opposition
      targeted by "Catalyst" mentioned in Article 1.


      KEY ENTITIES:

      - Baldwin County Commission

      - Frank Burt (Incumbent Commissioner)

      - Jeb Ball (Candidate for Seat 1 / Director of BCSA)

      - Michelle Hart / Thomason (BCSA Founder)

      - Catalyst (Political organization and endorsee network)

      - Billy Joe Underwood (Challenger for Seat 3)

      - Tucker Dorsey (Commissioner connected to Clarence Burke/Catalyst influence)

      - Chris Elliot (Candidate for Senate seat, linked by family connection in the
      broader political field)'
    generated_at: '2026-07-18T19:18:33.813449Z'
  catalyst-candidates:
    brief: "THE CONFLICT:\n- Frank Burt held Baldwin County Commissioner District\
