      - Article 2 proves that "gracious loser" sportsmanship (Article 1) is a failure
      of expectations because history shows those lied to can commit violence.

      - Article 2 confirms the mechanism: reliance on The President’s word ("President
      said so") is the primary driver for accepting stolen election claims today.


      KEY ENTITIES:

      - People: Martin Luther King, Robert Kennedy, The President (current), Captain
      of LOSING team.

      - Locations: El Toro California, Los Angles Airport (LAX), Nation''s Capital,
      Capitol, Khe Sanh.

      - Groups: Marine Corp, Military Police, US Armed Forces, NFL.

      - Specifics: Super Bowl LV (51st modern-era game), 2020 NFL season, Martin Luther
