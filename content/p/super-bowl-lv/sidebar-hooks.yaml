      claims alongside the Super Bowl hype.

      - Vietnam context: Year 1968 saw assassinations of Martin Luther King and Robert
      Kennedy; Tet Offensive and Battle of Khe Sanh claimed thousands.

      - Author was discharged from Marine Corp in El Toro California after 13 months
      in Vietnam.

      - Military Police escorted Author to Los Angles Airport (LAX) due to anticipated
      public hostility.


      THE DISCOVERY:

      - Author states government is currently "perpetuating yet another lie" similar
      to Vietnam.

      - Americans who believe election was stolen are driven because "The President
      said so, just like Vietnam."

      - Persons faithful to The President were incited to "attack the Capitol, disrupting
      a sitting body of government while in session."

      - Pandemic death toll (400,000 to 455,000) is acknowledged by some as a "lie"
      or "hoax."

      - Author states dishonest posts on social media often encourage violence and
      should be avoided.


      THE PIVOT:

      - Article 2 validates the "Insurrection" fear in Article 1 by explicitly linking
      it to The President’s narrative.

      - Article 2 connects the historical cost of lies (55,000 American lives in Vietnam)
