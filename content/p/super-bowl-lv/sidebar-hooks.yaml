      KEY ENTITIES:

      - Kansas City Chiefs

      - Tampa Bay Buccaneers

      - Tucker Dorsey (Baldwin County Commissioner)

      - Commissioner Elliot

      - Mayor Kant (Fairhope Mayor/Utilities Director)

      - Sherry Sullivan (Mayor in training/accompanied Dorsey/Kant on trips)

