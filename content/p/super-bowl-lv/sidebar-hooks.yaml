  alabama-suicide:
    brief: 'THE CONFLICT:

      - 2020 Presidential Election resulted in what Article 1 calls a "contested election"
      and Article 2 identifies as grounds for the events of Jan 6th.

      - January 6th: Over 250,000 people attended a rally organized by President Trump.

      - During the rally: Trump told the crowd to "Take it to the State House."

      - Rudy Giuliani encouraged the crowd with suggestion of "Trial by Combat".

      - Alabama representative Mo Brooks stirred up the crowd, encouraging them to
      "kick Ass."

      - The Presidential Electoral College confirmation was delayed due to the assault
      on the Capitol.


      THE DISCOVERY:

      - Article 2 confirms specific Alabama officials utilized this conflict to contest
      election results.

      - Barry Moore, Mike Rogers, Jerry Carl, Robert Aderholt, and Gary Palmer raised
      their hands to contest the Electoral College.

      - Newly elected Alabama Senator Tommy Tuberville joined the contest despite
      warnings from Richard Shelby and Senate Majority Leader Mitch McConnell.

      - Article 2 establishes Alabama as a "prime target" for political tools that
      stand up and make fools of themselves on camera.

      - Article 2 identifies Alabama as the state where politicians prioritized visibility
      ("like the camera''s and lights") over constituent interests during this event.


      THE PIVOT:

      - Article 1 uses the Capitol insurrection as a backdrop to demand voters accept
      election results like football fans respect game outcomes.

      - Article 2 provides the "smoking gun" evidence of political figures following
      that exact path (contesting results/insurrection).

      - Article 2 validates Article 1''s moral warning by showing concrete examples
      (Tuberville, Moore, etc.) who failed the "sportsmanship" test cited in Article
      1.

      - Article 2 links Alabama officials directly to the President’s rhetoric and
      Giuliani''s direction during the riot.


      KEY ENTITIES:

      - President Trump / Donald Trump Jr.

      - Rudy Giuliani

      - Mo Brooks

      - Barry Moore

      - Mike Rogers

      - Jerry Carl

      - Robert Aderholt

      - Gary Palmer

      - Tommy Tuberville

      - Richard Shelby

      - Mitch McConnell

      - Biden / Harris'
