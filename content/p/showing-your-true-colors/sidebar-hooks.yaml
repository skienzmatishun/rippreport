  follow-bouncing-ball:
    brief: '**THE CONFLICT:**

      *   Mayor Kant, following re-election loss, made "transition moves," including
      using Planning & Zoning (P&Z) meetings to approve building projects for campaign
      contributors.

      *   Specific P&Z items targeted in 2016 included a request from Dewberry / Preble-Rish,
      LLC for the "Retreat at Fairhope Village" (a 240-unit project) and a request
      from Hutchinson, Moore, & Rauch, LLC for "Old Battles Place" (a 110-unit project).

      *   On Sept. 6, 2016, Mayor Kant also supported Angelo Corte''s efforts to reverse
      summary judgment denial in court regarding Fly Creek Apartments.


      **THE DISCOVERY:**

      *   Article 2 provides P&Z Commission Minutes demonstrating that Kevin Boone
      consistently voted on and supported projects involving Dewberry/Preble-Rish
      LLC (and HMR, LLC) despite business ties with the firm''s partners.

      *   Boone is identified as a business partner of John Avent (Dewberry/Preble-Rich).

      *   On Sept 3, 2016, Kevin Boone voted against Hollie MacKellar’s motion to
      deny Dewberry/Preble-Rich for Fly Creek Apartments due to drainage issues.

      *   Article 2 notes that Dewberry/Preble-Rish LLC donated $2,500 to Kevin Boone''s
      re-election campaign.


      **THE PIVOT:**

      *   Article 1 makes the general accusation that the Mayor used P&Z meetings
      for "good boy building projects" benefiting donors; Article 2 provides specific
      voting records (Aug/Sept/Oct 2016) proving Councilman Kevin Boone actively supported
      and pushed through those exact development applications while having a financial
      partnership with the key firm (Preble-Rich/Dewberry).

      *   Article 2 establishes that the P&Z actions described in Article 1 were not
      just external pressure, but resulted from active self-interest and failure to
      recuse by local officials like Kevin Boone.


      **KEY ENTITIES:**

      *   Mayor Kant / Timothy Kant (Former Mayor)

      *   Kevin Boone / Councilman Boone (City Council Member)

      *   John Avent (Business partner of Mr. Boone; Representative of Preble-Rish,
      LLC)

      *   Dewberry / Preble-Rish, LLC

      *   HMR, LLC

      *   "Retreat at Fairhope Village" / Fly Creek Apartments

      *   "Old Battles Place"

      *   John Avent (2017-01-25 role listed)

      *   August 1, 2016; Sept. 3, 2016; Oct. 3, 2016 (Specific meeting dates)'
