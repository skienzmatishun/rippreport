  living-it-up-at-the-hotel-california:
    brief: '**THE CONFLICT:**

      *   Mayor Kant was facing re-election challenges in 2016/early 2017.

      *   In his transition period, he announced plans for a "Timothy Kant Performing
      Arts Center" (a legacy project).

      *   Kant attempted to leverage the Planning and Zoning Board''s meetings on
      September 6, 2016, to push through projects requested by major contributors.

      *   These included Dewberry / Preble-Rish, LLC’s proposal for "The Retreat at
      Fairhope Village" (a 240-unit project near Fly Creek Avenue).

      *   He also sought judicial support on September 6, 2016, to help Angelo Corte
      reverse a denial of summary judgment regarding Fly Creek Apartments.


      **THE DISCOVERY:**

      *   Mayor Kant and Public Works Director Jennifer Fidler were absent from the
      critical Planning Commission meeting concerning the controversial Fly Creek
      Apartment deal (cited as the sixth time they missed it).

      *   Their absence was due to attending an "America in Bloom" vanity award event
      in Southern California.

      *   While Mayor Kant and Director Fidler were vacationing, the Fairhope Planning
      Commission sealed the fate of the high-density project with a 4-2 vote.


      **THE PIVOT:**

      *   Article 1 accuses Mayor Kant of using his final official meetings to improperly
      push through developer projects.

      *   Article 2 reveals that during these critical planning sessions and voting
      periods, Mayor Kant actively bypassed his civic duties by taking personal vacations
      in Southern California rather than participating in or overseeing the decisions
      impacting the community he claimed to be "transitioning" from/to.


      **KEY ENTITIES:**

      *   Mayor Kant (Timothy Kant)

      *   Jennifer Fidler (Public Works Director)

      *   Angelo Corte

      *   Dewberry / Preble-Rish, LLC

      *   Hutchinson, Moore, & Rauch, LLC

      *   Fairhope Planning Commission

      *   Fly Creek Apartment/Fly Creek Avenue

      *   America in Bloom'
