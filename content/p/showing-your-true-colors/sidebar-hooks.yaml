  cut-the-head-off-the-snake:
    brief: '1. THE CONFLICT:

      - Mayor Kant''s transition period following a re-election loss involved plans
      to use the Planning and Zoning board meetings for politically motivated projects
      (2016).

      - The Mayors attempt on September 6, 2016, included supporting Angelo Corte’s
      efforts to secure approval for Fly Creek Apartments.

      - At that time, the City Council was reviewing two projects: SD 16.14 (Retreat
      at Fairhope Village) by Dewberry / Preble-Rish, LLC and SD 16.16 (Old Battles
      Place) by Hutchinson, Moore, & Rauch, LLC.


      2. THE DISCOVERY:

      - The Mayor''s decision-making was not independent but driven by external contractors
      and "good ole boys."

      - Arthur Corte, identified as the mayor’s major contributor, explicitly instructed
      Mayor Kant to get the Fly Creek Apartments project “approved.”

      - This confirms that projects like Fly Creek were based on contractor instructions
      rather than community needs or administrative processes.


      3. THE PIVOT:

      - Article 1 details the "transition moves" and specific meetings involving Angelo
      Corte’s legal push for Fly Creek (September 6, 2016).

      - Article 2 reveals that this pressure was specifically from Arthur Corte, demonstrating
      that Mayor Kant was a victim of micromanagement and was acting directly on orders
      from his contributors regarding the Fly Creek Apartments project.


      4. KEY ENTITIES:

      - Mayor Kant / Timothy Kant (Former Mayor)

      - Angelo Corte (Developer/Legal Push)

      - Arthur Corte (Contributor/Contractor Director)

      - Preble-Rish, LLC (Dewberry partnership involved in Retreat at Fairhope Village)

      - Fly Creek Apartments (Major project targeted by both the P&Z and legal pushes)

      - The Ripp Report / Baldwin County Legal Eagle'
