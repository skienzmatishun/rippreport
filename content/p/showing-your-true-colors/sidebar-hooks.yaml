  in-the-dark:
    brief: 'THE CONFLICT

      • Mayor Kant faced re-election in late 2016 but allegedly used his final months
      of office to promote "good ole boy building projects" for campaign contributors.

      • September 6, 2016: Planning Commission held public hearings on two major multi-occupancy
      projects: SD 16.14 (Retreat at Fairhope Village, 240 units) by Dewberry / Preble-Rish,
      LLC; and SD 16.16 (Old Battles Place, 110 units) by Hutchinson, Moore, & Rauch,
      LLC.

      • Mayor Kant supported Angelo Corte''s attempt to appeal a denial of summary
      judgment involving Fly Creek Apartments in court on September 6, 2016, involving
      the Hand Arendall law firm.


      THE DISCOVERY

      • The City Council engaged in legislative action in late 2018 that contradicted
      previous state judicial rulings.

      • Resolution #23 (end of 2018): Mayor Karin Wilson authorized an engagement
      letter with Tobias McCormick and Comer Lawyers, LLC for professional legal services
      representing the City against Charles K/ Breland, Jr., et al. (Case CV-2013-901096).

      • The case was returned to Baldwin County by a unanimous 9-0 Alabama Supreme
      Court ruling in favor of the property owner, yet the council proceeded with
      litigation and legal fees.


      THE PIVOT

      • Both articles document the use of local government power—the Planning Commission
      (2016) and City Council Resolutions (2018)—to advance specific interests: large-scale
      developer projects and costly legal defense against multi-million dollar lawsuits,
      regardless of taxpayer cost or adverse court rulings.


      KEY ENTITIES

      • Mayor Kant / Timothy Kant

      • Angelo Corte

      • Dewberry / Preble-Rish, LLC

      • Hutchinson, Moore, & Rauch, LLC

      • Hand Arendall (law firm)

      • City Council / Fairhope City Council (2016 and 2018 actions)

      • Mayor Karin Wilson

      • Charles K/ Breland, Jr.

      • Tobias McCormick / Comer Lawyers, LLC

      • Snedecker (Fairhope Municipal Judge)

      • Fly Creek Apartments'
