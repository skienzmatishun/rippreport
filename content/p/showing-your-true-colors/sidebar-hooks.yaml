  tale-of-two-cities:
    brief: '**1. THE CONFLICT:**

      - In 2016, during a transition period following Mayor Kant’s election outcome,
      the Fairhope Planning and Zoning board met on September 6, 2016, to consider
      requests for two large occupancy projects: Retreat at Fairhope Village (240
      units) by Dewberry / Preble-Rish, LLC, and Old Battles Place (110 units) by
      Hutchinson, Moore, & Rauch, LLC.

      - On the same date, Mayor Kant supported Angelo Corte''s attempt to get a judge
      to reverse a denial of summary judgment involving Fly Creek Apartments.


      **2. THE DISCOVERY:**

      - Article 2 reveals that Daphne Planning and Zoning operates independently and
      can actively listen to citizen concerns regarding zoning requests, as seen when
      they rejected a proposed 24-hour service station near Colonaid Apartments after
      public opposition from Daphmont Subdivision residents.

      - It proves that despite intense local pushback in Fairhope (9 meetings held
      on Fly Creek Apartments with over 1000 attendees and 99% opposition), the city
      council and Planning and Zoning have failed to listen to these citizens, contradicting
      the model of civic accountability displayed in Daphne.


      **3. THE PIVOT:**

      - Article 1 details a specific instance (September 6, 2016) where Mayor Kant
      allegedly used his final transition moves to push through developer projects
      for campaign contributors and support a controversial legal reversal for Fly
      Creek Apartments while ignoring community concerns.

      - Article 2 serves as the "smoking gun" by demonstrating that a neighboring
      municipality (Daphne) *can* effectively listen to public outcry regarding adverse
      development impacts, thereby exposing the deliberate lack of responsiveness
      or selective governance in Fairhope detailed during the events of Article'
