      THE DISCOVERY:

      *   Fairhope employees view Sherry Sullivan as the "Mayor in Training."

      *   Mayor Kant is accused of fraud in lawsuits and complaints.

      *   Kant uses political operatives and manipulation to maintain control, such
      as reversing planning decisions based on demands from Mr. Corte.

      *   Fairhope paid $1 million for infrastructure for Mr. Corte''s private development
