      *   A vote for Tucker Dorsey supports Clarence Burke and Baldwin County Sewer
      and LLCs affiliated with Tucker.

      *   Tucker Dorsey uses LLCs to hide business interests, and Chris Elliott is
      covering for him.


      THE PIVOT

      *   Article 2 reveals that the political positions held by Elliott and Dorsey
