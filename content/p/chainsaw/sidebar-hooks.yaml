  fairhope-council-shows-its-colors:
    brief: 'THE CONFLICT

      *   Baldwin County Commissioner Chris Elliott and Tucker Dorsey (Catalyst candidates)
      attempted to deny Zundle’s Road public access to Mobile Bay.

      *   This action was driven by donors who did not want common folk using the
      public access.


      THE DISCOVERY

      *   Fairhope citizens utilized the Alabama petition process, gathering over
      800 signatures to trigger a 90-day election period for a new form of government
      initiative.

      *   The Fairhope City Council is attempting to derail an October 2nd election
      and stop this citizen display of power.

      *   Mayor Karin Wilson delayed her special election for the Council-Manager
      form of government from 10/2 until the general election on 11/6.


      THE PIVOT

      *   Article 2 reveals that the political struggle involves a broader effort
      by citizens (using the Alabama petition process) to bypass or undermine local
      governing bodies, which provides the mechanism for the public pressure described
