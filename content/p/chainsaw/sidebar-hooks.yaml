hooks:
  public-access:
    brief: 'THE CONFLICT

      *   Baldwin County Commissioner Chris Elliott and Tucker Dorsey tried to deny
      Zundle’s Road public access to Mobile Bay.

      *   This action was done by Catalyst candidates running for office.


      THE DISCOVERY

      *   The motivation behind denying public access was major donors who live on
      the bay wanting the property vacated.

      *   Elliott and Dorsey doubled down with threats against citizens and defended
      their actions in a County Commission Meeting regarding the barricade.


      THE PIVOT

      *   Article 2 reveals that the political maneuver discussed in Article 1 (using
      votes/petitions) is based on the underlying financial interest of donors seeking
      to vacate property, providing the true motive for the commission’s actions.


      KEY ENTITIES

      *   Chris Elliott

      *   Tucker Dorsey

      *   Catalyst candidates

      *   Zundle’s Road

      *   Mobile Bay

      *   County Commission'
    generated_at: '2026-07-11T05:16:36.462894Z'
  elliotttuckercatalyst-selling-your-soul:
    brief: 'THE CONFLICT

      *   Baldwin County Commissioner Chris Elliott and Tucker Dorsey tried to deny
      Zundle’s Road public access to Mobile Bay.

      *   The conflict involves political maneuvering regarding public access to the
      bay.


      THE DISCOVERY

      *   Chris Elliott and Tucker Dorsey are spending tens of thousands of dollars
      donated by developers and Catalyst to get elected.

      *   Elliott and Dorsey used County Funds to promote a public relations story
      for their candidacy, echoing "Alabama Values."

      *   They previously secured a "mega-site" deal valued at $35 million for a cow
      pasture with no access.

      *   This mega-site was funded using BP money and spent county reserves.


      THE PIVOT

      *   Article 2 proves that Elliott and Dorsey''s political actions (like denying
      public access in Article 1) are driven by significant financial incentives and
      past deals made through Catalyst funding ("Selling their Soul").

      *   The spending and use of taxpayer money for the mega-site demonstrate that
      their candidacy is transactional, linking their political goals to deep financial
      interests.


