      *   Arthur Corte was identified as a contributor whose campaign received benefits
      from the Fly Creek project.

      *   The Publix-projected filled Fly Creek wetlands, flooded the area, cut down
      buffers, and graded right of ways, leading to a lawsuit that the City lost (Widget
      Article).

      *   Mayor Kant faces accusations of "good ole boy deals" through P&Z appointments
      and using utility funds for lawsuits.

      *   Allegations exist regarding Mayor Kant and Sen. Pittman involvement in BP
      Boom Grant Fraud, forwarded to Special Prosecutor Matt Hart.


      THE DISCOVERY

      *   The Planning and Zoning Board is accused of being a financial drain and
      vehicle for corruption due to its appointment structure by the Mayor.

      *   The Fly Creek development (involving Arthur Corte) caused documented environmental
      damage leading to city losses in litigation.

      *   Mayor Kant faces multiple accusations regarding conflicts of interest, including
      using municipal funds ($3 million from utility fund) on a $12 million "Triangle"
      legal settlement that was not a park purchase.


      THE PIVOT

      *   Article 1 asserts the City Council betrayed promises and paved the way for
      developers (Fly Creek). Article 2 provides specific evidence of this betrayal,
      linking Arthur Corte directly to the damaging Fly Creek project, documenting
      the resulting environmental/wetland failure, confirming the lawsuit loss, and
      connecting it to campaign financing.


      KEY ENTITIES

      *   Fairhope City Council

      *   Mayor Kant

      *   Arthur Corte

      *   Planning and Zoning Board

      *   Fly Creek Apartments

      *   The Triangle Lawsuit

      *   Special Prosecutor Matt Hart

