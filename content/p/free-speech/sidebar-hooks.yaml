  going-down:
    brief: 'THE CONFLICT

      - 2015: Fairhope Airport Authority Ground Lease and Operating Agreement process
      initiated via requests from Mid-Bay Air, LLC.

      - December 16th to 21st, 2015: Discrepancies found between signed lease (Limited
      Personal Guaranty) on Dec 17th and unsigned version submitted as Exhibit C to
      the Alabama Ethics Commission on Dec 21st.

      - February 3rd and August 2nd, 2016: Fairhope Airport Authority Chairman Joe
      McEnerney hired attorney Dennis R. Bailey ESQ for "Potential Claims against
      Francis Rip," later submitting the fraudulent Dec 21st lease to the Ethics Commission.

      - March 20th, 2017: Affidavit filed in Baldwin County Probate references signed
      December 17th 2015 Ground Lease rather than the ethics-submitted December 21st
      version.

      - Past/Current: Fairhope City Council obstructed Mayor (Karin Wilson) from doing
      job and paved way for developers on Fly Creek development despite public opposition.


      THE DISCOVERY

      - Baldwin County has no sewer regulations.

      - Unbridled development in Fairhope is outpacing infrastructure capacity, leading
      to regular sewer spills into the Bay.

      - Over 566 apartments are under construction or proposed in Fairhope alone.

      - "Corridor of Chaos" (181/Fairhope at Walmart) and developments between Parker
      Road and Publix represent a traffic nightmare due to lack of planned connectivity
      routes.

      - The Catalyst Council supports development, arguing no limits can be placed
      on property rights while citing the need for sprawl to combat greed.


      THE PIVOT

      - Unregulated rapid growth (Widget Article) is the consequence of political
      influence/corruption (Main Article).

      - The "Catalyst Council" and developer interests push projects that ignore public
      infrastructure needs (sewer, traffic, schools), mirroring the council''s alleged
      betrayal on Fly Creek development.

      - Infrastructure failure (lack of sewer regs, severe traffic congestion near
      Parker Road) suggests that political maneuvering (Airport Authority conflicts,
      bypassing ethics rules) was used to bypass regulatory scrutiny and enable large-scale,
      unchecked development in Fairhope.


      KEY ENTITIES

      - Baldwin County: Government entity; no existing sewer regulations.

      - Fairhope City Council / Catalyst Council: Local governing bodies pushing high-density
      development.

      - Karin Wilson: Mayor of Fairhope (subject of criticism for council obstruction).

      - Jack Burrell: Councilman, involved in Airport Authority and alleged corruption
      links.

      - Pam Caudill: Board member of FAA/Airport Authority; linked to Ray Hix and
      Jack Burrell.

      - Ray Hix: Board member of Airport Authority; subject of ethics charges and
      bidding conflicts.

      - Joe McEnerney: Former Fairhope Airport Authority Chairman; involved in the
      Dec 2015 lease irregularities.

      - Dennis R. Bailey ESQ: Attorney hired by FAA to manage ethics complaints regarding
      the fraudulent leases.

      - Chuckee: Journalist/Editor of The Fairhope Courier, reporting against Mayor
      Wilson.

      - Parker Road / Publix: Location cited as a key area for impending traffic chaos
      due to new developments.'
