  fairhope-council-asleep-at-the-wheel:
    brief: 'THE CONFLICT:

      • Mayor Karin Wilson opposed the development of Fly Creek Apartments and the
      "Retreat at Fairhope Village" project, warning about long-range consequences
      for traffic and quality of life.

      • The City Council/CATALYST council sided with the developers despite the Mayor’s
      opposition; this siding is alleged to have led to a major factor in the 2016
      municipal election.

      • Past allegations: "The Council also betrayed the entire city with election
      promises of stopping the development on Fly Creek, they paved the way for the
      developer." (Article 1)

      • Separate ethics scandal at Fairhope Airport Authority (FAA): In December 2015,
      FAA Chairman Joe McEnerney and Ray Hix engaged in a hangar lease RFP process.
      Dennis R. Bailey ESQ was involved; Article 1 alleges this resulted in an improperly
      secured bid by Mr. Hix using false information regarding plane ownership/fuel
      usage and conflicts of interest involving board members Pam Caudill and Jack
      Burrell.

      • The ethics scandal, which the article claims cost Fairhope "Millions," occurred
      between December 2015 and February 2017 (Ethics Commission filing dates).


      THE DISCOVERY:

      • As of the current reporting period, the first units of the controversial 240-unit
      "Retreat at Fairhope Village" apartment complex (located behind Publix on Hwy
      98) are scheduled to become available next month.

      • Significant traffic congestion is a documented problem along U.S. 98 and Parker
      Road due to ongoing development projects ("The Retreat" and the adjacent 77-unit
      townhome project, "The Highlands").

      • City Council/CATALYST council continued their pattern of prioritizing developers,
      even while facing public outcry over infrastructural issues (traffic).


      THE PIVOT:

      • Article 1 detailed a past political corruption conflict (FAA ethics violations,
      obstruction by the City Council regarding Fly Creek development).

      • Article 2 provides current evidence that this historical political failure
      resulted in tangible negative outcomes today: developer-approved housing is
      now being built and its existence has immediately created severe traffic congestion
      on public roads. The "CATALYST council" criticized in Article 1''s context (supporting
      developers) is the entity identified as responsible for these ongoing infrastructural
      failures in Article 2.


      KEY ENTITIES:

      • Karin Wilson (Mayor of Fairhope, proponent/opposed developer projects)

      • CATALYST Council (Alleged to side with developers and ignore public concerns
      regarding traffic/development)

      • Fly Creek Apartments / "The Retreat at Fairhope Village" (Controversial development
      project behind Publix on Hwy 98)

      • U.S. 98 / Parker Road (Locations experiencing severe, documented congestion)

      • Joe McEnerney (Fairhope Airport Authority Chairman in past ethics controversy)

      • Ray Hix (Former FAA Board Member/Operator in past ethics controversy regarding
      RFP)

      • Dennis R. Bailey ESQ (Legal counsel involved in the Dec 2015–2017 Ethics Commission
      filings)

      • Jack Burrell (Mentioned in Article 1 connection to Chuckee and FAA board dynamics)

      • Pam Caudill (Board member of Fairhope Airport Authority mentioned in past
      ethics controversy)'
