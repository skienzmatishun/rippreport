hooks:
  demand-the-truth:
    brief: 'THE CONFLICT

      *   Connie “the Hachette” Baggett broke a story on November 20, 2010, regarding
      a senators'' company being awarded $63,900.

      *   The issue led to FBI investigation and subsequent white collar crime division
      investigations handled by Alabama Attorney General Special Council Matt Hart.

      *   Mike Hubbard (Former Speaker of the House) was convicted in an adjoining
      complaint related to this type of activity by Matt Hart.


      THE DISCOVERY

      *   On July 7, 2016, Francis Paul Ripp filed a complaint stating that Senator
      Trip Pittman and Mayor Kant were involved in BP fraud investigation regarding
      debris removal contracts with Fairhope City.

      *   Ripp claims the Mayor/Senator falsely assured the public and the Fairhope
      City Council that an Ethics Commission letter exonerated them or granted permission
      for conflicts of interest relating to BP Fraud claims.

      *   The complaint details how Senator Pittman used his position to secure personal
      financial enrichment through private business contracts with Fairhope, which
      are predominantly funded by federal funds (FEMA/State).


      THE PIVOT

      *   Article 1 provides the broader context of "BP Fraud" and names Mayor Kant
      and Senator Pittman.

      *   Article 2 serves as the specific evidence (''smoking gun'') by detailing
      the mechanism of that fraud: recurring municipal debris removal contracts awarded
      to Senator Pittman''s company since 2004, specifically targeting Fairhope City
      contracts despite prior promises to not bid on district contracts.


      KEY ENTITIES

      *   Senator Trip Pittman (State Senator)

      *   Mayor Kant (Former Mayor of Fairhope/Fairhope City Council member)

      *   Matt Hart (Special Prosecutor for the Alabama Attorney General''s Office
      / White Collar Crime Division)

      *   Connie Baggett (Blogger/Reporter, al.com)

      *   Bob James (Business Partner of Senator Pittman)

      *   Mike Hubbard (Convicted individual referenced in the investigation)

      *   Fairhope City Council (Local governing body involved in contracts)

      *   Francis Paul Ripp (Author/Lead Advocate for The Ripp Report)'
