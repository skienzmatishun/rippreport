  demand-the-truth:
    brief: 'THE CONFLICT:

      *   Mayor Kant and Senator Pittman were involved in BP Fraud.

      *   Connie Baggett broke the story on November 20, 2010.

      *   Retaliation occurred via newly elected commissioners Dorsey and James (Pittman’s
      business partner).

      *   The fallout resulted in demotion of the EMA director and firings of whistle-blowers.

      *   The FBI investigation led to the white collar crime division of the Alabama
      Attorney General.

      *   Matt Hart (special prosecutor for the Alabama Attorney General''s office)
      convicted Speaker Mike Hubbard.


      THE DISCOVERY:

      *   Senator Pittman maintained debris removal contracts with Fairhope since
      2004, despite prior commitments not to obtain contracts from his district.

      *   Pittman admitted poor judgment but subsequently bid on Fairhope debris removal
      contracts.

      *   The Ethics Commission issued an opinion regarding the conflict of interest,
      which Mayor of Fairhope claimed was permission for Pittman to proceed.

      *   Both the Mayor and Senator misled the public and the Fairhope City Council
      about the Ethics Commission''s role.

      *   Pittman is allegedly using his position to secure multi-million dollar municipal
      contracts funded by FEMA/Federal Government.


      THE PIVOT:

      *   Article 2 provides specific evidence that Senator Pittman misused his official
      position to secure federal/FEMA-funded municipal contracts (debris removal),
      which constitutes a distinct form of corruption tied directly to the BP fraud
      investigation mentioned in Article 1.

      *   The discovery that officials lied about Ethics Commission approval is the
      smoking gun, revealing how political maneuvering enabled Pittman''s misuse of
      funds, connecting the general BP Fraud context to specific governmental contract
      manipulation.


      KEY ENTITIES:

      *   Mayor Kant

      *   Senator Pittman

      *   Connie Baggett

      *   Dorsey (Commissioner)

      *   James (Business partner)

      *   Matt Hart (Special Prosecutor/Alabama Attorney General)

      *   Mike Hubbard (Speaker of the House)

      *   Fairhope City Council

      *   State of Alabama Ethics Commission

      *   FBI

      *   Federal Emergency Management Agency (FEMA)'
