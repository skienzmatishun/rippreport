  observations-of-a-poll-watcher:
    brief: 'THE CONFLICT

      *   November 20, 2010: Connie “the Hachette” Baggett broke a story via *al.com*
      detailing a company awarded $63,900 related to senators’ companies in Baldwin
      County.

      *   Following the initial exposé: Retaliation occurred by newly elected Commissioners
      Dorsey and James, resulting in the demotion of the EMA director and firings
      of whistleblowers who had been involved in investigations.

      *   The investigation advanced to Matt Hart, acting as Special Council/Attorney
      General''s Office (White Collar Crime Division). 2016: Mike Hubbard was convicted
      by Matt Hart for BP Fraud related to the case.


      THE DISCOVERY

      *   July 24, 2014: Chris Warner, Ph.D., submitted a formal letter to Will Sutton
      at the Elections Division alleging systemic election fraud and corruption in
      Fairhope and Baldwin County.

      *   Fairhope Allegations: In the 2012 primary for Mayor of Fairhope (then incumbent
      Mayor Kant), Warner’s poll showed an alleged 55% vote for Kant, despite a reported
      22% approval rating; Kant''s political consultant was Lynn Stacey ("the fix-it
      guy").

      *   Baldwin County Allegations: In the commission runoff involving Bob James
      and Chris Elliot, Cody Phillips received 3,000 votes, which Warner claimed allowed
      Elliott to defeat James by an unusually high percentage (19%), aided by Lynn
      Stacey.

      *   Broader Claim: Warner linked these local issues to broader corruption including
      bid-rigging "BP Boom Scandal" involving Senator Trip Pittman and his client
      Lynn Stacey.


      THE PIVOT

      *   Article 1 establishes a history of major financial and political misconduct
      (BP Fraud, contract awards) in Baldwin County involving Mayor Kant and BP interests/Senator
      Trip Pittman.

      *   Article 2 expands this scope to prove that the corrupt influence is not
      limited to public contracts but extends into electoral integrity across multiple
      races (Fairhope, Baldwin County Commission).

      *   The common thread linking both articles is the alleged pervasive role of
      Lynn Stacey ("the fix-it guy") in facilitating political wins and/or financial
      gain for local leaders like Mayor Kant, Bob James, Chris Elliot, and Senator
      Trip Pittman.


      KEY ENTITIES

      *   Connie “the Hachette” Baggett: Reporter (al.com)

      *   Baldwin County Commissioners: Dorsey, James

      *   Matt Hart: Special Council/White Collar Crime Division Attorney General’s
      Office

      *   Mike Hubbard: Convicted individual (BP Fraud)

      *   Chris Warner, Ph.D.: Author of the election fraud letter (2014)

      *   Will Sutton: Recipient of the election fraud complaint; Elections Division

      *   Mayor Kant: Mayor of Fairhope; target of 2012 primary allegations

      *   Lynn Stacey: Political consultant/fix-it guy for multiple candidates

      *   Bob James: Baldwin County Commissioner (Primary candidate)

      *   Chris Elliot: Baldwin County Commission (Runoff winner)

      *   Cody Phillips: Third candidate in the county commission race

      *   Senator Trip Pittman: Allegedly involved in the "BP Boom Scandal" and a
      client of Lynn Stacey

      *   Alabama Ethics Commission'
