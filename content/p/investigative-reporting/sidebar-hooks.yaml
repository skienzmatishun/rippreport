  as-long-as-i-count-the-votes-what-are-you-going-to-do-about-it:
    brief: 'THE CONFLICT

      *   Connie Baggett broke the story on November 20, 2010 regarding a company
      awarded $63,900 by senators’ companies in Baldwin County.

      *   Baldwin County government officials Dorsey and James retaliated against
      whistle-blowers following this report, leading to EMA director demotions and
      official firings.

      *   The FBI investigation was transferred to Special Council Matt Hart of the
      Alabama Attorney General''s office for white collar crime prosecution.

      *   Matt Hart convicted Speaker of the House Mike Hubbard on BP Fraud complaints.

      *   Senator Trip Pittman received a federal subpoena in 2016 related to a BP
      oil spill contract investigation.


      THE DISCOVERY

      *   On September 11, 2012, a poll watcher documented alleged fraudulent and
      non-compliant procedures during Fairhope municipal elections.

      *   Observations included Election Supervisor Mrs. Culver lacking control of
      voting machines and failure by public observers to monitor final machine opening
      and tape certification security packaging.

      *   Election official Tom Odom (Fire Marshall for the City of Fairhope) opened
      absentee voting machinery while participating as a poll watcher only, requesting
      extra tapes that were subsequently withheld from other watchers.

      *   Tom Odom is identified as the father-in-law to Tim Kant, a mayoral candidate
      in Fairhope.


      THE PIVOT

      *   Article 2 provides local evidence (election irregularities) of systemic
      governmental failure and potential manipulation within the municipal sphere
      where Mayor/candidate Kant operated during the early phase of his public career.

      *   This mirrors the high-level institutional corruption established in Article
      1, which implicates Kant as part of a network tied to major state fraud investigations
      (BP Fraud).

      *   The presence of Tom Odom—a key figure in local electoral irregularity documented
      in Article 2—demonstrates how individuals connected to Mayor/candidate Tim Kant
      may have been operating within the same compromised governmental ecosystem highlighted
      in Article 1.


      KEY ENTITIES

      *   Mayor Kant / Tim Kant (Mayoral candidate, former Mayor)

      *   Senator Trip Pittman / Senator Pittman

      *   Matt Hart (Alabama Attorney General Special Prosecutor)

      *   Tom Odom (City of Fairhope Fire Marshall/Election official)

      *   Mrs. Culver (Fairhope Election Supervisor)

      *   Connie "the Hachette" Baggett

      *   Baldwin County

      *   Fairhope City

      *   Lonnie Mixon'
