      THE DISCOVERY:

      *   A poll watcher observed alleged fraudulent behavior and violations during
      Fairhope municipal elections (specifically Aug. 23 elections).

      *   Violations included lack of control over voting machines, young children
      inserting assumed parent ballots into voting machines, and election officials
