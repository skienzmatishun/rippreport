      - Alabama Ethics Commission sugarcoated 17 violations without filing criminal charges.
      - Former official McCallum fined $100,000 by Ethics Commission but received no criminal prosecution from Attorney General.
      - McCallum paid $37,437 by Alabama Bar in August 2021 (ten months after resignation) while under Ethics Commission investigation.
      - UA Board of Trustees spent $4.3 million on a party house; "retired" administrators paid millions in RSA payments to settle harassment suits.
      - Ripp Report filed Writ of Mandamus against unethical judicial appointments and ethics decisions (involving Municipal Judge, Councilman, State Senator).
      - Montgomery Circuit Court Judge Johnny Hardwick recused himself from the Writ of Mandamus case after reviewing Ripp Report evidence.
      - Chief Justice Tom Parker selected Judge Hardwick for ethics cases in November 1st prior order.

      2. THE DISCOVERY:
      - Lagniappe Mobile published findings from UA investigation identifying the Albritton trust payments and self-dealing.
      - Trust 990 tax filings confirm $15,000 scholarship payments to Albritton's children using assets he oversaw.
      - Article 2 confirms that the Ethics Commission Executive Director is receiving personal financial benefits via a position he holds.
      - Article 2 confirms that neither the Ethics Commission, Bar Association, nor Attorney General filed criminal charges regarding Albritton's self-dealing.
      - Lagniappe identified that media outlets in Alabama had not reported on the "retired" administrator payments or RSA harassment settlement.
      - Ripp Report complaints against various officials (judges, councilmen) were dismissed/quashed by the oversight trio.

      3. THE PIVOT:
      - Article 1 claims Albritton is doing his "best for Alabama to remain the most corrupt" and mentions the tuition story as a fact sprouting from investigation.
      - Article 2 substantiates Article 1's claim with specific IRS code (Section 4941(d)) and dollar amounts ($105,000 total) proving the self-dealing occurred.
      - Article 2 proves that despite knowing Albritton violated trust rules, the Ethics Commission and AG saw "no problem," validating Article 1’s claim of a protective alliance.
      - The $105,000 in illicit benefits (per IRS) is the specific hook that links abstract claims of corruption to one documented official’s financial history.
      - Judge Hardwick recusing himself shows the judicial component of Article 1 (Writ of Mandamus) is impacted by these internal conflicts.

      4. KEY ENTITIES:
      - Tom Albritton (Ethics Commission Executive Director)
      - Mabel Amos Trust
      - Johnny Hardwick (Montgomery Circuit Judge)
      - Tom Parker (Chief Justice)
      - Lagniappe Mobile
      - The Ripp Report
