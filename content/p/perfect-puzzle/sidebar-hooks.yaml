      - Chief Justice Tom Parker selected Hardwick to preside over certain ethics cases, yet conflict of interest led to recusal.

      DISCOVERY:
      - Francis Paul Ripp submitted a formal written letter directly to Steve Marshall (Alabama Attorney General) at 501 Washington ave. Montgomery Alabama 36104.
      - Letter alleges Albritton is one of three trustees and an attorney for the Mabel Amos Memorial Fund.
      - Letter states that specific fund awarded Albritton’s daughters a total of $105,000 in scholarships to the University of Texas.
      - Ripp claims Albritton’s actions violate IRS codes and constitute self-dealing because he oversees the fund.
      - Letter enclosed specific evidence: Lagniappe article titled "SELF-DEALING," an Ethics Complaint, a Writ of Mandamus, and Alabama Bar Complaint.
      - Letter cites that the Ethics Commission dismissed complaints involving Albritton without accountability, citing similar patterns of self-dealing by other trustees.

      PIVOT:
      - Article 2 serves as the 'smoking gun' because it converts general allegations in Article 1 into a direct enforcement demand against state law enforcement (AG Marshall).
      - Article 2 provides the verifiable data point confirming Article 1’s allegation: it specifies "Mabel Amos Memorial Fund" and "$105,000," proving the self-dealing claim is not just rhetoric but an active subject of complaints filed with Ripp Report.
      - Article 2 shows Francis Paul Ripp is actively coordinating evidence (Writ of Mandamus, Bar Complaint) to force AG Marshall’s office to act on the Lagniappe/Ripp Report findings.

