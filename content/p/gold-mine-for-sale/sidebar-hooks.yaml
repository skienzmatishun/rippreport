      KEY ENTITIES

      *   Fairhope City Council

      *   Weeks Bay Foundation

      *   Fairhope City

      *   Developers (specifically Aurther Corte)

      *   Councilman Brown

      *   Councilman Burrell

      *   106 acres of land

      *   $13 million property value'
    generated_at: '2026-07-10T21:02:43.603822Z'
    text: This conservation easement is nothing more than an un-armed robbery staged
