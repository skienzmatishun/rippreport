    text: Hoss Mack doesn’t just run the Sheriff's office; he owns the legal system from the DA's desk to the Judge’s bench. Look at the "Boom Boom" Pittman payoff and the Camaro seizure to see how these elites rewrite the law just to keep their dirty secrets and your property under their thumb.
