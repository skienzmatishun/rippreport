      THE PIVOT: Article 2 is the smoking gun because it links Hoss Mack’s political rise to specific corruption mechanisms: his role in drafting the legislation that protects his office (SB 312) and the Alabama Supreme Court rulings cited in Article 1 that block transparency. It also connects him to a broader network of corruption involving the Ethics Commission Executive Director, Tom Albritton, who is accused of embezzling scholarship funds from the Mabel Amos Memorial Foundation using a will his firm drafted.

      KEY ENTITIES: Hoss Mack (Huey Hoss Mack), Tripp Pittman, Tom Albritton, Chief Justice Tom Parker, Mabel Amos Memorial Foundation, Senate Bill 312, Don Sigleman, Judge Thomasson.
