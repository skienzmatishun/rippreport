      2. THE DISCOVERY
      - Anthony Lowery appointed new Baldwin County Sheriff (Article 1 link confirmation).
      - Hoss Mack officially leaving office August 31.
      - Evidence reveals Governor Ivey ignored "letters to the appointment board" and pending federal lawsuits when making Mack's appointments.
      - Two new wrongful death federal lawsuits filed specifically mentioning Baldwin County Major Crimes Unit (Ripp Report links provided as source).
      - Complaints exist regarding sexual relations and affairs between officers (violating BCSO behavior policies) under Mack's watch.
      - No camera footage or transparency released on deaths or investigations involving Major Crimes Unit.

      3. THE PIVOT
