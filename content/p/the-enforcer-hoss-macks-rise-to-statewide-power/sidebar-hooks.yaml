      - The "smoking gun" evidence links Mack's power directly to the 2 federal lawsuits and potential misconduct in Major Crimes Unit.
      - Reveals new Sheriff Anthony Lowery is a "carbon copy" of Hoss Mack.
      - Shows potential consequences awaiting Mack: Federal lawsuits continuing against his predecessor agency (Major Crimes Unit) as he exits Aug 31.
      - Exposes the chain of command: Lowery is inheriting a department already flagged for federal review and internal corruption.

      4. KEY ENTITIES
      - Hoss Mack (Former/Sheriff)
      - Kay Ivey (Alabama Governor)
      - Anthony Lowery (Baldwin County Sheriff, new appointee)
      - Murray Lawrence (Case subject/Wrongful conviction)
      - Steve Nodine (Case subject/Prosecutor's case)
      - Baldwin County Sheriff’s Office (BCSO)
      - Major Crimes Unit (Unit of BCSO, subject of lawsuits)
      - Alabama Attorney General’s office / Federal District (Implied via lawsuits)
      - Ripp Report (Publishing the link/bridge info)
    generated_at: '2026-03-09T16:33:39.169589Z'
    text: Governor Kay Ivey claims she is cleaning up Baldwin County, but she just hand-picked a "carbon copy" of Hoss Mack to keep the cover-up alive. While Mack retreats from federal lawsuits and dead bodies, Anthony Lowery steps in to ensure the Major Crimes Unit keeps investigating itself behind closed doors.
