  money-on-the-table:
    brief: 'THE CONFLICT:

      - Fairhope City administration (Mayor vs CATALYST Council) conflict over budget
      spending and project approval.

      - Mayor claims city debt paid in full June 2019 (Art 1).

      - CATALYST Council accused of obstructing Mayor''s initiatives and prioritizing
      personal ambitions over city needs (Art 1).

      - Council purchased 2.65 million in farmland for recreation then leased at $9,000/year
      (Art 1 & Art 2).

      - Fairhope Working Waterfront Project set for $6.2 million investment; past
      administrations allegedly ignored goal of utilizing pier/waterfront (Art 1).

      - Council previously supported $3M school tax but rejected Mayor''s non-tax
      financing plan for same cost (Art 2).

      - City purchased $2.5M K-1 Center, Fairhope Community Park, and Nix Center;
      no immediate renovation plans despite funding (Art 2).


      THE DISCOVERY:

      - Article 2 confirms Waterfront Project details after 3.5 years of planning;
      a detailed, 48-minute presentation was delivered to the council (Art 2).

      - Council took no immediate action on Waterfront permitting despite timeline
      urgency; slated to revisit plan at meeting on May 11th (Art 2).

      - Mayor Dane Haygood proposed $65,000 marketing plan to assist businesses and
      welcome tourists via lodging tax hike (6% → 7%) and gas tax.

      - CATALYST Council rejected Mayor’s $65,000 marketing proposal and tax increase
      plan (Art 2).

      - Council approved salary raises + full family insurance for council members
      totaling approx. $125,000 (Art 2).

      - BCEDA donations: City annually donates $35,000 to BCEDA; Burrell, Brown, Boone
      criticized for prioritizing these deals over local business aid (Art 2).

      - Quail Creek Golf Course opening prioritized by Council; Burrell blamed Mayor
      Haygood for public health-related closure (Art 2).


      THE PIVOT:

      - Article 2 serves as the smoking gun for Article 1’s claim of Council obstruction
      by documenting specific, recent rejections (May 11th delay on Waterfront; rejection
      of $65k marketing plan).

      - Article 2 validates "Money on the Table" claims: Council voted to reject funding
      for business marketing while accepting budget items (golf course opening, K-1
      Center) that lacked immediate ROI.

      - Article 2 exposes nepotism allegations: BCEDA CEO Lee Lawson is Mayor Haygood’s
      brother-in-law and Councilman Burrell close friend (Art 2).

      - Article 2 confirms the "Good ole Boy deal" narrative regarding the $2.65M
      farmland purchase (leased for $9k/yr) involving Councilmen Burrell, Brown, and
      Boone without public participation (Art 1 & Art 2).


      KEY ENTITIES:

      - Dane Haygood (Mayor, Fairhope)

      - Lee Lawson (BCEDA Director; Mayor Haygood’s brother-in-law)

      - Councilman Burrell

      - Robert Brown (Councilman "B")

      - Kevin Boone (Councilman "B")

      - Fairhope City Council

      - CATALYST group/coalition

      - Baldwin County Economic Development Alliance (BCEDA)'
