  poison-water-alabama-senate-special-election:
    brief: 'THE CONFLICT

      *   May 2017: U.S. Attorney General Jeff Sessions leaves Alabama Senate seat
      to assume federal position in Washington.

      *   August-December 2017: Primary for the vacant Senate seat begins (Aug 15,
      2017); special election is set for December 12, 2017.

      *   September 2019: State Senator Pittman was involved in a $750,000 "money
      grab" of BP funds while serving as BP trustee.

      *   Pre-December 2017: Roy Moore is noted for being thrown off the Alabama Supreme
      Court twice on failed attempts to seek higher office or uphold judicial rulings.


      THE DISCOVERY

      *   The special election race (replacing Jeff Sessions) featured candidates
      whose personal ethics and professional records were deeply flawed, undermining
      Republican establishment credibility.

      *   Luther Strange ("Big Luther") was accused of selling out to Bentley by ignoring
      investigations and failing to address evidence against Sen. Tripp Pittman regarding
      the $750,000 BP fund misappropriation.

      *   Sen. Roy Moore was revealed as a candidate who had failed judicial vetting
      on two occasions before even running for the Senate seat.


      THE PIVOT

      *   Article 1 frames Doug Jones and Roy Moore''s run-off (2017) against the
      backdrop of political "blood in the water" involving corruption and flawed candidates.
      Article 2 functions as the smoking gun by providing specific, verifiable details—such
      as Strange''s financial ties to BP funds and Pittman’s history with those same
      funds—that provide concrete evidence supporting Article 1''s claim that Alabama
      politics is plagued by compromised integrity and self-serving officials.


      KEY ENTITIES

      *   Doug Jones (Politician, Democrat)

      *   Roy Moore (Senator/Judge Candidate)

      *   Luther Strange ("Big Luther," Politician/Senator)

      *   Tripp Pittman (State Senator, BP Trustee)

      *   Jeff Sessions (U.S. Attorney General / Former Alabama Senator)

      *   Mo Brooks (Congressman/Senate Candidate)

      *   Del Marsh (Speaker pro tem of Alabama Senate)

      *   Bentley (Reference to Bentley’s investigation into Strange)'
    generated_at: '2026-07-18T13:22:00.636784Z'
  little-choice:
    brief: 'THE CONFLICT

      *   2017 Alabama US Senate primary election cycle contested by 19 candidates
      (11 Republicans, 8 Democrats).

      *   The Democratic runoff included candidate Doug Jones against Republican Roy
      Moore (Senate-elect/Judge).

      *   Controversies surrounding the GOP field included allegations of ethical
      misconduct and corruption.


      THE DISCOVERY

      *   Luther Strange faced multiple ethics complaints during this period and allegedly
      turned a blind eye to Sen. Trip Pittman''s actions as "appointed Trustee" of
      BP Funds.

      *   Sen. Trip Pittman was alleged to have received $750,000 while under scrutiny
      for financial misconduct.

      *   Mo Brooks (R-AL) called for other candidates to drop out if President Trump
      fired U.S. Attorney General Jeff Sessions.

      *   The Alabama Court of the Judiciary suspended Judge Roy Moore on September
      30, 2016, after finding him guilty of six charges violating judicial ethics
      canons.


      THE PIVOT

      *   Article 1 critiques "self serving elected officials" and political corruption
      generally in Alabama politics but lacks specific proof.

      *   Article 2 provides the concrete evidence (e.g., Strange''s failure to act
      on complaints, Pittman''s alleged $750k payment, Moore’s judicial suspension)
      confirming the institutional corruption and ethical breaches that Article 1
      alludes to.


      KEY ENTITIES

      *   Doug Jones

      *   Roy Moore

      *   Luther Strange

      *   Mo Brooks

      *   Jeff Sessions

      *   Trip Pittman (Sen.) / Sen. Trip Pittman

      *   Randy Brinson

      *   Fairhope City Council

      *   BP'
