  fairhope-voters-guide:
    brief: '**THE CONFLICT:**

      *   December 2017: Low voter turnout for a one party run-off in Alabama (451,161
      votes / 3,134,166 registered voters).

      *   State of Alabama context: Discussion of political corruption and the "self
      serving elected officials" resulting from straight ticket voting.

      *   Specific event focus: Senate election runoff between Troy Moore and Doug
      Jones.


      **THE DISCOVERY:**

      *   Fairhope municipal politics (2016-present): Local government is controlled
      by a group called "CATALYST," which the article claims favors development interests
      over public good.

      *   Corruption allegations: Incumbent Robert Brown faced an ethics complaint
      filed with the Alabama Attorney General for using office to land contracts totaling
      close to one million dollars (Soccer Fields and Fairhope Art Center).

      *   Incumbent Burrell’s actions: Jack Burrell is accused of refusing local blogger
      Paul Ripp free speech during public participation, leading to a federal court
      lawsuit.


      **THE PIVOT:**

      *   The articles connect large-scale state political dysfunction and claims
      of corruption (Article 1) with specific examples of organized municipal machine
      politics ("CATALYST," Scott Boone Consulting) leveraging insider status to enrich
      themselves (Article 2). Both contexts highlight the prevalence of "self serving
      elected officials."


      **KEY ENTITIES:**

      *   Doug Jones (Democrat, Senator candidate 2017-19)

      *   Troy Moore (Republican, Senate race subject 2017)

      *   Scott Boone / CATALYST (Political organization/consultancy associated with
      the local machine)

      *   Jack Burrell (Council President, Fairhope)

      *   Robert Brown (City Councilman, $1 million contracts alleged)

      *   Paul Ripp (Local blogger who sued City/CATALYST)

      *   Karin Wilson (Mayor of Fairhope, first female Mayor in 2016 election)

      *   Howell Gibbens (Council candidate opposing Robert Brown)

      *   Kevin Boone (Father associated with CATALYST/Scott Boone Consulting)'
