  catalyst-attack:
    brief: 'THE CONFLICT

      *   Catalyst is a group of corrupt politicians and business interests responsible
      for obstructing Fairhope Government and assaulting the Mayor.

      *   Chris Elliott raised $500,000 in campaign funds for a job paying $42,000.

      *   Tucker Dorsey became a millionaire through political office.

      *   Judge Michelle Thomason is described as infamous and incompetent.


      THE DISCOVERY

