  catalyst-the-three-bs-and-chuckee-cheeze:
    brief: 'THE CONFLICT

      Catalyst is a political organization established by Stacy Elliott and Haygood
      that morphed into Catalyst when Chris Elliott became a county commissioner and
      Haygood became the Mayor of Daphne.


      THE DISCOVERY

      Catalyst operates by strategically placing candidates in various positions across
      multiple races, which facilitates shady deals such as the county Mega-Site.
      The organization spreads through financial ties involving Prebble-Rish engineering
      company and multiple LLCs listed on the Alabama Secretary of State website.


      THE PIVOT

      Article 2 identifies the core structure of Catalyst as a "political cancer"
      and details how its leadership (Scott Boone) uses intimidation and that financial
      structures (Prebble-Rish/LLCs) are used to finance candidates, proving the claims
      in Article 1 that candidates are "bought and paid for."


