  catalyst-birds-of-the-same-feather:
    brief: 'THE CONFLICT

      *   Catalyst is a political group in Baldwin County identified as "political
      cancer."

      *   Catalyst actively obstructs Fairhope government and engages in personal
      assaults against the Mayor.

      *   Catalyst manipulates candidates to secure positions across multiple offices
      (Probate Judge, State Senate, County Commission).

      *   Specific candidates involved: Billie Joe Underwood (County Commission),
      David Northcutt (State Senate Seat 32), Christy Olinger Edwards (Court of Civil
      Appeals Judge, Place 1), Tucker Dorsey (County Commission/Millionaire), Michelle
      Thomason (Family Court Judge).


      THE DISCOVERY

      *   Catalyst originated with Stacy Elliott and Haygood.

      *   Catalyst evolved when Chris Elliott became a County Commissioner and Haygood
      became the Mayor of Daphne.

      *   Catalyst uses intimidation and bully tactics to discourage non-aligned candidates.

      *   Catalyst''s goal is to achieve total control over Baldwin County government
      by seeding candidates in all available positions (County Commission, Probate
      Judge, State Senate, District Judge).


      THE PIVOT

      *   Article 2 details the organizational structure and historical lineage of
      Catalyst, providing the mechanism (how they operate) that explains why specific
      individuals (like Elliott, Dorsey, Northcutt) are targeted or positioned within
      the political system described in Article 1.


      KEY ENTITIES

      *   Billie Joe Underwood

      *   Chris Elliott

      *   David Northcutt

