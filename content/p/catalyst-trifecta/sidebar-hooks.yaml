      Government.

      *   Chris Elliott owes Catalyst money.

      *   Tucker Dorsey is reported to be a millionaire due to his political position.

      *   Chris Elliott is linked to a Mega “Dump” site costing taxpayers $32 million.


      THE DISCOVERY

      *   Catalyst is financially supporting Tucker Dorsey for Baldwin County commission
      and Chris Elliott for the State Senate Race.

      *   Tucker Dorsey uses LLCs (including Clarence Burke and Baldwin County Sewer
      LLCs) to hide business interests.

      *   Chris Elliott is covering for Tucker Dorsey regarding his business interests.


      THE PIVOT

      *   Article 2 provides specific legal and corporate links (LLCs, ownership)
      that substantiate the general allegations of corruption and financial maneuvering
      made in Article 1 concerning Chris Elliott and Tucker Dorsey''s political roles.


