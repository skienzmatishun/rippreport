  catalyst-is-drowning:
    brief: 'THE CONFLICT

      *   Catalyst is a group responsible for obstructing Fairhope Government and
      personal assaults on the Mayor.

      *   Catalyst candidates were bought and paid for and expected to swear an alliance
      to the Catalyst club.

