  catalyst-central:
    brief: 'THE CONFLICT

      *   Catalyst is an "old boys club" obstructing Fairhope Government.

      *   Chris Elliott owes Catalyst members.

      *   Tucker Dorsey became a millionaire through his political position on the
      County Commission.

      *   Judge Michelle Thomason is described as infamous and incompetent.

      *   County Commissioners Joe Davis and Jeb Ball voted in favor of Catalyst developers.


      THE DISCOVERY

      *   Catalyst candidates attempted to drive the Mayor out of office before 2020
      but failed electorally.

      *   Catalyst operates through power brokers and self-serving deals that benefit
      developers.

      *   The Fairhope Councilman Kevin Boone is an official conduit feeding information
      to obstruct city business.

      *   Commissioner Joe Davis voted for contractors on the Savannah ESTATES project
      despite engineer/community disapproval.

      *   Baldwin County lacks sewer regulations, which aligns with Catalyst''s preferred
      system.


      THE PIVOT

      *   Article 2 provides historical context showing how Catalyst established its
      control through past election interference (e.g., Stacy, Haygood, Elliott partnership)
      and ongoing structural corruption (developers, appointments).

      *   Article 2 proves the mechanism by which Catalyst achieves obstruction of
      government in Fairhope, validating the claims made about Commissioner Davis’s
      actions and the political nature of the local power structure.


      KEY ENTITIES

