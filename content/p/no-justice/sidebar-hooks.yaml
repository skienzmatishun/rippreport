  railroaded-by-the-law:
    brief: '1. THE CONFLICT: 2003 murder of Brandon Hastings in Baldwin County. Murray
      Lawrence Jr. sentenced to life without parole based on state’s gunshot theory
      despite exhumed autopsy suggesting suffocation. Three officials signed the coroner
      report regarding Hastings’ exhumation but suppressed it during trial: Robert
      Wilters (Judge), Hoss Mack (Investigator/Lt.), and David Whetstone (Prosecutor).
      Case now facing Rule 32 petition filed by Assistant DA Haygood Kristi Deason;
      current judge presiding is Scott P Taylor. Wilters was presiding judge during
      original trial while also serving as District Attorney for the case.


      2. THE DISCOVERY: Second autopsy performed on Brandon Hastings exhumed roughly
      one month after murder (May 14, 2003). Report authorized by Wilters. Written
      May 17, 2004 letter from Alabama Department of Forensic Sciences delivered report
      to District Attorney. Letter explicitly CC’d Hoss Mack Sr. and current Sheriff
      Hoss Mack. Letter delivered to David Whetstone personally while case was ongoing
      or recently concluded; all recipients on file had knowledge of report.


      3. THE PIVOT: Current Prosecutor David Whetstone testified in response to Rule
      32 that he "didn’t order it and I don’t remember ever receiving such an autopsy."
      The May 17, 2004 forensic letter proves he received the data. Wilters admitted
      during proceedings regarding Rule 32: "if that had been done... Mr. Huntley
      certainly should have received it" implies awareness of the report''s value.
      This directly contradicts claims in Haygood Kristi Deason’s filing that this
      was "Harmless error" or oversight; Wilters signed the order allowing it, proving
      intent.


      4. KEY ENTITIES:

      - Murray Lawrence Jr. (Convicted Defendant)

      - Brandon Hastings (Victim)

      - Robert Wilters (Current DA, Former Presiding Judge in Lawrence Case, Signer
      of Autopsy Order)

      - Hoss Mack Jr. (Current Baldwin County Sheriff, Lead Investigator at time of
      murder)

      - Hoss Mack Sr. (Former Coroner, CC''d on autopsy letter)

      - David Whetstone (Prosecutor, Signer of Coroners Report)

      - Haygood Kristi Deason (Assistant DA, Rule 32 Filer)

      - Scott P Taylor (Circuit Court Judge on Rule 32 Petition)

      - Willie Huntley (Lawrence’s Defense Attorney)'
