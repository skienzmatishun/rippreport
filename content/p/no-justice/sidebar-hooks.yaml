      \ level after Sheriff tenure.\n- David Whetstone: Prosecutor who closed case;\
      \ Retired. Publicly noted for plea deal tactics with McNeil to secure testimony\
      \ against Lawrence.\n- Anthony Lowery: Chief Investigator during 2005 trial;\
      \ Currently Sheriff of Baldwin County.\n- Connection: The very officials who\
