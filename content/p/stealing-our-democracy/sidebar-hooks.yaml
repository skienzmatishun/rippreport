      - Lindsey switched political party from Democrat to Republican 15 minutes before election qualification deadline (alleged as per campaign report claims).
      - Article alleges Lindsey was "told to switch parties" because she could not win as a Democrat.

      THE PIVOT: CONNECTING THE NARRATIVE
      - Main Article establishes CATALYST (Fairhope) and Baldwin County as historically engaged in election rigging/fixing.
      - Widget Article confirms a candidate (Andrea Lindsey) explicitly identified as being on the "Catalyst" list is engaging in party-switching and financial/promotion reciprocity (donation -> vote) consistent with the Main Article’s description of CATALYST tactics.
      - Lindsey is described in Widget as a "rubber stamp vote," matching Main Article’s description of how elected officials on Catalyst are expected to function.
      - Timeline (Jan 17 donation, Jan 18 promotion) provides specific evidence supporting the Main Article’s broader claims about "smelly" but barely legal political dealings.

