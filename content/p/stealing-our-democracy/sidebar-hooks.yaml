      - Mayoral race: Incumbent administration approval rated 22% by Warner’s scientific poll.
      - Baldwin County Commission runoff (recent to letter date): Incumbent Bob James vs challenger Chris Elliot separated by 150 votes in primary; runner-up Cody Phillips received 3,000 votes.
      - Runoff: Elliot defeated James by exactly 19% of votes (matching the 3,000 vote difference), with Phillips allegedly pledging support to James prior.
      - Pattern identified: Candidates backed by consultant Lynn Stacey win 100% of campaigns in the area.

      THE DISCOVERY:
      - July 24, 2014: Chris Warner, Ph.D., filed formal complaint with Will Sutton, Elections Division (State Capitol Building), citing election tampering.
