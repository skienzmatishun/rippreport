  fairhopes-triangle-mega-site:
    brief: 'THE CONFLICT

      *   Fall 2016: Developer Corte submitted a site plan to use an out-fall pipe
      for primary drainage through detention pond outfall (violating PUD Amendment
      1572). At the same time, they deeded 4 acres of land adjacent to Fly Creek and
      wetlands to the City.

      *   Past: Councilman Burrell and Boone facilitated a settlement involving Dyas
      (implied plaintiff), leading to the City purchasing the Triangle property for
      $11.25 million plus $3 million in attorney fees (estimated total value $16–$20
      million).

      *   Both events involve high-level city officials acquiring critical land assets
      through non-transparent means ("Deed of Gift" vs. "Settlement").


      THE DISCOVERY

      *   The Widget Article reveals that the Triangle property was purchased via
      a lawsuit settlement rather than being a voluntary park purchase or conservation
      easement as claimed by Councilman Burrell and Boone.

      *   It proves a history of using legal maneuvers to acquire land, resulting
      in substantial public debt ($14.25M+ loss).

      *   It identifies Mayor Kant''s involvement in efforts to keep the public unaware
      of these high-value property acquisitions and their associated costs.


      THE PIVOT

      *   The Widget Article proves a pattern of behavior: City leaders (Burrell,
      Boone, Kant) using settlements and legal processes behind closed doors to acquire
      significant private land at taxpayer expense while allegedly misleading the
      community.

      *   This established precedent of opaque dealings supports the Main Article''s
      suspicion that the "Gift" from Corte in 2016 was not a transparent civic contribution
      but another example of developer-influenced city decision-making.


      KEY ENTITIES

      *   Corte (Developer)

      *   Tim Kant (Councilman/Mayor)

      *   Councilman Burrell / Council President Burrell

      *   Boone (City Council Member)

      *   Mitsy (Council Member)

      *   Mayor Wilson

      *   Fly Creek PUD Amendment 1572

      *   Triangle Mega-Site

      *   Dyas (Lawsuit Plaintiff)'
