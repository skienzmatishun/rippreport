  bend-over-fairhope:
    brief: 'THE CONFLICT: What happened in the past?

      * Fall 2016: Developer Corte sought Site Plan Approval for a one-point drainage
      system through the outfall pipe of a detention pond, violating PUD Amendment
      1572.

      * During this attempt to gain approval, Corte also deeded an entire 4-acre parcel
      (including wetlands) adjacent to Fly Creek and between the proposed project
      and Fly Creek to the City of Fairhope.

      * Mayor Wilson expressed shock at the City taking ownership of the property
      despite the environmental risks associated with the PUD Amendment project.


      THE DISCOVERY: What does the second article prove or reveal today?

      * The current Fairhope City Council is accused of obstructing the Mayor''s office
      and prioritizing developer interests over public trust and citizen concerns.

      * Mr Burrell, as Council President, is alleged to lead a council group that
      "favored the developer" in relation to issues like Fly Creek.

      * Council Members Boone and Brown have direct ties to the proposed Single Tax
      plan, which critics claim favors development on the banks of big-head-gully/Triangle
      property.


      THE PIVOT: Why is Article 2 the ''smoking gun'' for Article 1?

      * Article 1 details a specific historic instance (Fall 2016) where Council action
      resulted in the City acquiring critical environmental land from a developer
      while that same developer was engaged in controversial drainage practices.

      * Article 2 reveals a systemic pattern of perceived corruption and obstruction,
      alleging current council members like Boone and Brown maintain these pro-development
      ties that mirror the behavior observed when the city acquired property from
      Corte years prior.


      KEY ENTITIES:

      * Corte (Developer)

      * Fly Creek / Retention Pond Outfall Pipe

      * PUD Amendment 1572

      * Mayor Wilson

      * Mitsy

      * Mr Burrell (Council President)

      * Boone (City Council Member)

      * Brown (City Council Member)

      * Kant (Mentioned as the benefactor of the "gift")'
