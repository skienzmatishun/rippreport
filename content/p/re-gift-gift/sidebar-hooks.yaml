hooks:
  community-or-developer:
    brief: 'THE CONFLICT:

      *   Fall 2016: A developer attempted Site Plan Approval for a one-point drainage
      system via the out-fall pipe in violation of PUD Amendment 1572 (requiring non-point
      discharge).

      *   Simultaneously: The developer deeded 4 acres, including wetlands, to the
      City.

      *   The City became both the upper landowner (in relation to downstream users)
      and the lower landowner (to the PUD project).


      THE DISCOVERY:

      *   The legal and environmental liability regarding the out-fall pipe, gift/deed,
      lift station, sewer lines, and associated lawsuits must be investigated.

      *   City Council members have conflicts of interest related to the developer,
      engineers, contractors, and landowners involved in the Fly Creek PUD project.


      THE PIVOT:

      *   Article 2 reveals that decisions regarding the ongoing damaging development
      (Fly Creek PUD) are being made by City Council members who have established
      "conflicts of interest" with the developers and contractors ("Catalyst fraternity").

      *   This suggests potential obstruction or protection of the developer''s interests
      regarding the disputed deed/site plan transfer detailed in Article 1.


      KEY ENTITIES:

      *   Mitsy

      *   Mayor Wilson

      *   Corte

      *   Fly Creek PUD Amendment 1572

      *   Developer

      *   City Council

      *   Baldwin Insider

      *   Catalyst fraternity (county commissioners, attorneys, judges, developers)'
