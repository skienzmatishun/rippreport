  triangle-part-2-public-driven-vision:
    brief: '**THE CONFLICT**

      *   Fall 2016: Developer Corte deeded a 4-acre parcel to the City of Fairhope.

      *   This occurred while attempting Site Plan Approval for a PUD system via the
      retention pond outfall pipe, violating PUD Amendment 1572 (which requires non-point
      discharge across the entire south side boundary).

      *   The Triangle property was subject to litigation for over 25 years.

      *   Fairhope acquired the Triangle property through a legal settlement costing
      approximately $14.25 million ($11.25M purchase + ~$3M in legal fees), despite
      an estimated current value of $18–$20 million.


      **THE DISCOVERY**

      *   Mayor Karin Wilson is launching a "Public-Driven vision" Comprehensive Land
      Use Plan, funded by a $650,000 RESTORE Act grant, to provide a 20-year blueprint
      for growth and coordinated development.

      *   Council President Jack Burrell and Mr. Kevin Boone are advocating for placing
      the Triangle property into a conservation easement or "park."

      *   This advocacy is framed as supporting "policies of the past," despite Mayor
      Wilson’s push toward future planning guided by public vision.


      **THE PIVOT**

      *   Article 1 documents high-stakes, politically sensitive municipal land acquisitions
      (4 acres from Corte) linked to regulatory violations and liability creation
      under specific administrations (Tim Kant/Last City Council).

      *   Article 2 proves that even when the city adopts a comprehensive plan aimed
      at "responsible growth" and a "Public-Driven vision" (Mayor Wilson), powerful
      political figures (Burrell and Boone) are using past legal precedents to push
      policies that restrict development on valuable municipal assets like the Triangle.


      **KEY ENTITIES**

      *   Corte

      *   Fly Creek PUD Amendment 1572

      *   Tim Kant / Former Mayor Kant

      *   Karin Wilson (Mayor/Council Member)

      *   Kevin Boone

      *   Jack Burrell (Council President)

      *   Triangle Property (Land entity)

      *   Fairhope City Council'
