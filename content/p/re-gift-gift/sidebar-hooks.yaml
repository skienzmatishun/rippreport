  deliberate-distortion-or-twisting-of-meaning:
    brief: 'THE CONFLICT

      * Developer Corte deeded a sensitive 4-acre parcel to the City of Fairhope in
      Fall 2016.

      * The timing coincided with the developer seeking Site Plan Approval for a one-point
      drainage system through an outfall pipe at Fly Creek.

      * This proposed system violated PUD Amendment 1572, which requires non-point
      discharge.

      * Mayor Wilson publicly expressed shock regarding the City taking ownership
      of this property from Corte.


      THE DISCOVERY

      * The Fairhope City Council is currently attempting to "dispose" of approximately
      106 acres of City of Fairhope Property through a Conservation Easement involving
      Weeks Bay.

      * This disposition grants Weeks Bay management and control of the land for perpetuity
      ("forever").

      * An anonymous donor contributed $39,000 toward this deal, which the City Council
      wants to keep secret.


      THE PIVOT

      * Article 1 establishes that Fairhope received a critical parcel from Corte
      under suspicious circumstances (the alleged "gift" coinciding with code violations).

      * Article 2 reveals the current mechanism by which the City is surrendering
      vast amounts of its own property rights and control to external interests (Weeks
