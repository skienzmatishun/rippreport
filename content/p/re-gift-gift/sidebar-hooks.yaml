hooks:
  community-or-developer:
    brief: 'THE CONFLICT

      *   Fall 2016: A developer submitted a site plan using the outfall pipe of the
      current detention pond as the primary drainage point, violating PUD Amendment
      1572 (which required non-point discharge across the southern boundary).

      *   Simultaneously, in Fall 2016, the same developer deeded a specific parcel—4
      acres including wetlands located between Fly Creek and the proposed project—to
      the City of Fairhope.

      *   This deed was "a gift" from Corte to the City, involving Mayor Wilson’s
      shock regarding why the city took ownership of this property at that time.


      THE DISCOVERY

      *   The Widget Article (April 2017) reveals a long-standing community conflict:
      The Fly Creek PUD Sunset Provision has been debated in City Council for ten
      meetings, with strong opposition from thousands to the project despite developer
      pressure.

      *   It identifies conflicts of interest among council members related to engineers
      and contractors connected to the developer.

      *   The article also mentions infrastructure issues under scrutiny, specifically
      the placement of a fire station on Parker Road near an upgraded sewer lift station,
      which was allegedly located on developer land.

      *   It names "Catalyst" as a group comprising county commissioners, attorneys,
      judges, and developers who allegedly operate through networks like The Baldwin
      Insider.


      THE PIVOT

      *   Article 1 establishes the physical act: A strategic deed transfer (Corte
      to City) at the precise moment a developer was violating environmental codes
      related to water run-off into Fly Creek.

      *   Article 2 confirms the political climate surrounding this development and
      land use by highlighting the persistent "coward" narrative from council members,
      confirming that the PUD amendment was highly contested and fraught with conflicts
      of interest among local decision-makers linked to developers.


      KEY ENTITIES

      *   Corte (Developer)

      *   Mayor Wilson

      *   Mitsy (City Council member who emailed regarding the deed''s importance)

      *   Fly Creek/Fly Creek Watershed

      *   PUD Amendment 1572

      *   Fairhope City Council

      *   Kant (Former Mayor/Politician associated with the "gift")

      *   Parker Road

      *   Catalyst (Political/Professional group)

      *   The Baldwin Insider'
