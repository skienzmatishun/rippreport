      KEY ENTITIES

      * Fairhope City Council

      * City of Fairhope

      * Corte (Developer)

      * Weeks Bay (Conservation Organization/Municipal Representative)

      * Fly Creek PUD Amendment 1572

      * Tim Kant

      * Mayor Wilson

      * Anonymous donor'
