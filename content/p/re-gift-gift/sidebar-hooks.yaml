  holes:
    brief: 'THE CONFLICT

      *   Fall 2016: Developer Corte submitted a site plan for the Fly Creek detention
      pond outfall pipe as the primary release point through its existing out-fall.
      This was in violation of PUD Amendment 1572, which required non-point discharge
      diffusing across the south side boundary.

      *   Simultaneous action (Fall 2016): Developer Corte deeded a 4-acre parcel,
      including wetlands and land adjacent to Fly Creek, directly onto the City of
      Fairhope between the outfall pipe and Fly Creek.


      THE DISCOVERY

      *   Current Fairhope City Council is pursuing an alleged "GOB strategy," supported
      by Burrell and Boone, with the goal of taking down Mayor Wilson and reinstating
      fired employees.

      *   The council is currently engaged in large-scale development issues (e.g.,
      $1.5 million grading for soccer fields; controversial Publix strip center) and
      has been characterized as obstructionist toward Mayor Wilson''s agenda.


      THE PIVOT

      *   The critical 2016 acquisition of sensitive wetlands by the City from Corte
      occurred during a period that established the current legal liability dynamics
      (City becoming a "lower landowner"). This historical administrative decision
      is now viewed through the lens of ongoing political instability, where council
      members Burrell and Boone are actively working to remove Mayor Wilson from office.


      KEY ENTITIES

      *   Mayor Wilson

      *   Developer Corte

      *   Tim Kant

      *   Council Member Mitsy

      *   Fairhope City Council / City Council of Fairhope

      *   Burrell (Council President/Council Member)

      *   Boone (Councilman/Council Member)

      *   Brown / Robert-Brown

      *   Fly Creek

      *   PUD Amendment 1572'
