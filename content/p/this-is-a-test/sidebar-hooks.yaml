      - Judge Ben Bowden, Covington County Circuit Court (former law partner of Albritton), received 45,000 dollars for his children’s education from the fund between 2014 and 2017.
      - Regions Bank received approximately one million dollars in benefits from oil and gas leases associated with the Mabel Amos Memorial Fund.
      - Alabama Attorney General Steve Marshall’s office failed to investigate a corruption complaint delivered personally by Ripp regarding a Fairhope councilman using his board position for personal enrichment.

      2. THE DISCOVERY:
      - Article 2 is a direct letter from Francis Paul Ripp to Attorney General Steve Marshall at 501 Washington ave. Montgomery Alabama 36104.
      - Letter re-affirms Albritton is one of three trustees and an attorney for the Mabel Amos Memorial Fund.
      - Enclosures attached include: The Lagniappe article "SELF-DEALING," an Ethics Complaint, a Bar Association Complaint, and the Writ of Mandamus.
      - Letter alleges AG Marshall previously assured Ripp his office would take complaints seriously, which was broken when they ignored the Fairhope councilman complaint.
      - Article highlights that AG Marshall’s office did not respond or investigate the Fairhope councilman case Ripp delivered to them in Montgomery.

      3. THE PIVOT:
      - Article 2 transforms the allegations from general reporting into a formal legal demand directed at the highest law enforcement officer in the state.
      - Links the October 18 Writ of Mandamus filed against state officials directly to AG Marshall’s office through the physical enclosure list.
      - Uses Marshall’s past campaign promise in Fairhope as a leverage point to demand an investigation into Albritton and the Mabel Amos Memorial Fund trustees.

      4. KEY ENTITIES:
      - Francis Paul Ripp (The Ripp Report Founder)
      - Tom Albritton (Alabama Ethics Commission Executive Director, Mabel Amos Fund Trustee)
      - Steve Marshall (Alabama Attorney General)
      - Judge Johnny Hardwick (Circuit Judge, Montgomery County)
