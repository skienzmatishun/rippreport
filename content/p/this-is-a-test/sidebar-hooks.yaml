  striking-oil:
    brief: |-
      1. THE CONFLICT
      - Tom Albritton served as Executive Director of the Alabama Ethics Commission while simultaneously acting as a trustee for the Mabel Amos Memorial Fund.
      - Albritton utilized the trust to pay $120,000+ in tuition for his children between 2014 and 2017.
      - Ben Bowden (Covington County Circuit Court Judge, Albritton's former law partner) received $45,000 for his children’s tuition from the same fund during 2014-2017.
      - Francis Paul Ripp filed a Writ of Mandamus on October 18 regarding the ethics commission and Fund mismanagement.
      - Circuit Judge Johnny Hardwick scheduled a status review hearing for the Writ of Mandamus on November 25 in Montgomery County.
      - Regions Bank held management duties for the Mabel Amos Memorial Fund from 2002 to 2018.
      - Property Amos 36-3, leased from the Mabel Amos Memorial Fund, was struck for oil and gas production without notification to local residents or the Amos family.

      2. THE DISCOVERY
      - IRS 990 filings reveal Regions Bank charged over $1 million in management fees between 2002 and 2018.
      - Bank worked an average of five hours per week on the fund while distributing scholarships and paying itself close to half as much as it distributed in scholarships during that time.
      - Leigh Manning (grandniece of Mabel Amos, former Secretary of State) confirmed the oil strike occurred in 2010.
      - Amos 36-3 well produced $70 million to $80 million worth of oil and gas, generating 100 barrels a day after 10 years.
      - No citizens of Conecuh County (pop. ~12,000) or relatives of Mabel Amos were informed when the strike occurred or profited.
      - Leigh Manning retained Montgomery attorney Thomas Gallion to formally investigate the handling of the Mabel Amos Memorial Fund.

      3. THE PIVOT
      - Article 2 confirms the financial scale of Regions Bank's involvement, validating the claim that "Self Dealing" was possible via legitimate-looking management fees.
      - IRS 990 filings in Article 2 prove gross mismanagement (5 hours/week) justifying complaints filed by The Ripp Report.
      - Manning’s direct quote ("This is the deal") confirms that information was intentionally withheld regarding the oil strike from public stakeholders.
      - Hiring of Thomas Gallion by Leigh Manning converts allegations of abuse into active legal defense, proving the family has validated The Ripp Report’s findings.

      4. KEY ENTITIES
      - Tom Albritton (Ethics Commission Director / Trustee)
      - Mabel Amos Memorial Fund
      - Regions Bank (Managing Trustees: Albritton, John Bell)
      - Leigh Manning (Former Sec of State / Grandniece of Mabel Amos)
