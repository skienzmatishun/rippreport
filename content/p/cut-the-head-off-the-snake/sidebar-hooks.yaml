  caught-trap-like-rat:
    brief: 'THE CONFLICT

      Mayor Kant practiced micromanagement in Fairhope, specifically regarding development
      projects like the Fly Creek Apartments. Arthur Corte instructed Mayor Kant to
      approve the project via contractor Arthur Corte.


      THE DISCOVERY

      Jack Burrell, a City Council member, used his authority to block the resolution
      to repeal ordinance 1572 concerning the Fly Creek Apartments. Burrell allegedly
      participated in "bid rigging" and prevented public inquiry into his involvement.


      THE PIVOT

      Article 2 provides evidence that Jack Burrell’s resistance to development (which
      Article 1 implies is tied to corruption) was not merely political opposition,
      but criminal activity (bid rigging), directly linking the alleged corrupt status
      quo described in Article 1 to a formal ethics complaint.


      KEY ENTITIES

      Mayor Kant

