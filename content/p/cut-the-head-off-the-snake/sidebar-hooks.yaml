hooks:
  dont-throw-rocks-if-you-live-in-a-glass-house:
    brief: 'THE CONFLICT

      *   Mayor Kant adopted micromanagement techniques starting in 2000.

      *   Arthur Corte instructed Mayor Kant to get the Fly Creek Apartments approved.

      *   Jack Burrell voted against the Fly Creek Apartment project, which saved
      him from being voted out of office.


      THE DISCOVERY

      *   Mayor Kant did not attend the swearing-in ceremony or cooperate with the
      transition of power.

      *   A power struggle emerged immediately following the new Mayor''s swearing-in
      meeting.

      *   Jack Burrell acted as a surrogate for Mayor Kant, agreeing to support him
      if he waited four years for the mayoral position.

      *   City employees reported that some were determined to undermine Mayor Wilson
      and secretly report to Mayor Kant.


      THE PIVOT

      *   Article 2 reveals that Mayor Kant''s control and influence (through surrogates
      like Burrell) extended beyond official actions, establishing a clear path for
      undermining the new administration. This proves Kant''s role as the "head of
      the snake" is tied not just to policy but to manipulation of political appointments
      and internal staff dynamics.


      KEY ENTITIES

      *   Mayor Kant

      *   Karen Wilson

      *   Jack Burrell (Council President)

      *   Arthur Corte

      *   Jay Robinson (City Council)

      *   Robert Brown (City Council)

      *   Fly Creek Apartments

      *   Conyers

      *   Consyers'
