  showing-your-true-colors:
    brief: 'THE CONFLICT:

      *   Mayor Kant''s micromanagement techniques were adopted in 2000.

      *   Arthur Corte instructed Mayor Kant to get the Fly Creek Apartments project
      approved.

      *   The election involves Mayor Kant versus Karen Wilson.


      THE DISCOVERY:

      *   Mayor Kant promised a smooth transition after losing re-election on November
      7th.

      *   Kant announced plans for a $35,000 Performing Arts Center (PAC).

      *   Kant used the Planning and Zoning board meetings to push through development
      projects for campaign contributors.

      *   The Planning Commission meetings on September 6, 2016, included hearings
      for Dewberry / Preble-Rish, LLC (240-unit project) and Hutchinson, Moore, &
      Rauch, LLC (110-unit project).

      *   Kant supported Angelo Corte''s attempt to go back to court on September
      6, 2016, regarding a summary judgment denial for the Fly Creek Apartments.


      THE PIVOT:

      *   Article 2 shows that Mayor Kant’s "transition" involves using the Planning
      and Zoning board to push through developer projects (like Fly Creek Apartments)
      and coordinating with legal counsel (Hand Arendall) to extract tax dollars,
      directly proving the corruption allegations made in Article 1.


