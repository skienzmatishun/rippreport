  cut-nose-off-spite-face:
    brief: 'THE CONFLICT:

      *   Past political dynamics in Fairhope involved Mayor Kant being criticized
      for micromanagement since 2000.

      *   The Fly Creek Apartments project was tied to Arthur Corte, a major contributor
      who reportedly "INSTRUCTED" the Mayor to get it approved.

      *   On April 24, 2017, the City Council agenda shows the Mayor’s Veto of an
      Ordinance Amending Ordinance No. 1572 (Fly Creek PUD Sunset Provision).


      THE DISCOVERY:

      *   The current council members Jack Burrell and Kevin Boone are accused of
      a "vindictive campaign" to undermine newly elected Mayor Wilson.

      *   Burrell and Boone led the council to install a hiring freeze specifically
      intended "TO PUNISH the mayor."

      *   They have reportedly slowed down the city budget process into a stalemate
      without valid reasons, affecting morale and quality of life.


      THE PIVOT:

      *   Article 1 alleges Mayor Kant is controlled by political contributors ("the
      good ole boys") like Arthur Corte.

      *   Article 2 proves this structure''s malicious operational tactics are active;
      Burrell and Boone used the legislative body to actively sabotage a successor
      (Mayor Wilson) via retaliatory actions like hiring freezes, confirming that
      the network is not merely passive cronies but an obstructionist force seeking
      revenge for lost political power.


      KEY ENTITIES:

      *   Mayor Kant

      *   Arthur Corte

      *   Karen Wilson

      *   Jack Burrell

      *   Kevin Boone

      *   Jay Robinson

      *   Murray Lawrence

      *   Robert Brown

      *   Fly Creek Apartments

