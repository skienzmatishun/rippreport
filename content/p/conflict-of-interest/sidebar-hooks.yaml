      *   Boone claimed he had no conflict or LLCs involved with the parties mentioned.


      THE PIVOT:

      *   Article 2 confirms that Boone was formally asked to recuse himself from
      voting on the specific conflict areas (Fly Creek PUD, Corte, Preble Rish) despite
      his prior involvement in related projects described in Article 1. This contradicts
