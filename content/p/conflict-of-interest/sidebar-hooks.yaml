      * On April 17, 2017, under previous administration Mayor Tim Kant, City Council
      passed Resolution 2606-16 to accept a deed from Angelo A. Corte for the city''s
      sewer lift station.

      * The acceptance of property from developer Angelo A. Corte was later revealed
      (by Widget Article sources) to include three or more acres of wetlands and stormwater
      runoff land beyond the initial claim, suggesting the "gift" was significantly
      larger than disclosed.


      THE DISCOVERY

      * Article 2 proves that a history exists within Fairhope City Council where
      council members (such as Mr. Burrell) accepted or presided over significant
      property transfers from developers while failing to fully disclose the scope
      of those gifts.

      * This established pattern of "good ole boys" influence demonstrates past instances
      where city officials prioritized developer interests, even when transparency
      was lacking or a Mayor’s veto on ordinance no. 1572 (Fly Creek PUD) had been
      issued.


      THE PIVOT

      * Article 2 provides the historical context that validates Article 1''s accusation
      of systemic conflict of interest; it shows concrete examples where council dynamics
      and developer relationships have resulted in non-transparent land transfers
      or legislative decisions, supporting the claim that Kevin Boone’s conflicts
      regarding Preble-Rish are part of a pattern.

      * The events involving Angelo A. Corte and Councilman Mr. Burrell demonstrate
      how large-scale benefits can be funneled to council members under the guise
      of simple municipal "gifts," reinforcing Article 1''s argument that elected
      officials habitually prioritize private business interests over citizen oversight
      and ethics.


      KEY ENTITIES

      * Kevin Boone / Mr Boone

      * John Avent (Representing Preble-Rish, LLC)

      * Fairhope City Council

      * Angelo A. Corte

      * Tim Kant (Former Mayor)

      * Burrell / Jack Burrell

      * Marion Wynne (City Attorney)

      * Fly Creek PUD

      * Ordinance No. 1572'
