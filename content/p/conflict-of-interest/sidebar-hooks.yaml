      and the engineering company Preble-Rish.

      *   Boone voted for Preble Rish projects, such as Firefly, for four and a half
      years.

      *   In Sept 2016 (SD 16.14), Boone attended and voted on the Fly Creek Apartments/Retreat
      at Fairhope issue while John Avent (Preble-Rish) was representing them.


      THE DISCOVERY

      *   Catalyst Associates was formed on Aug. 11, 2014, with Michael Scott Boone
      (Councilman''s son) listed as manager and Coley M. Boone as registered agent.

      *   Catalyst is described as a political group attempting to discredit the Mayor.


      THE PIVOT

      *   Article 2 reveals that Councilman Boone’s son founded Catalyst Associates,
      an entity linked to undermining city governance, directly connecting his personal
      business interests (Article 1) with ongoing political efforts to manipulate
      the city council and challenge Mayor Wilson.


