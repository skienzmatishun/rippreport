  fairhope-voters-important-notice:
    brief: 'THE CONFLICT

      *   Councilman Kevin Boone had a direct business connection with Mr. John Avent
      of Dewberry Preble-Rish, LLC prior to serving on the Council.

      *   This relationship resulted in Mr. Boone voting for projects by Preble-Rish
      over four and a half years (e.g., Firefly).

      *   Specific conflict: In Sept 2016 (SD 16.14), Kevin Boone attended and voted
      on the "Retreat at Fairhope" / "Fly Creek Apartments" project while John Avent
      was representing Preble-Rish.

      *   Mr. Boone has historically failed to recuse himself from voting on these
      conflicts, unlike Councilman Robinson, Conners, and Brown who recently acknowledged
      their own interests.


      THE DISCOVERY

      *   Article 2 reveals Catalyst Associates is a political organization operating
      within Fairhope politics, claiming 100% election victories for its candidates.

      *   Catalyst was formed August 11, 2014, with Michael Scott Boone listed as
      manager and Lynn Stacey as manager.

      *   Coley M. Boone (Councilman Kevin Boone''s son) is the Registered Agent for
      Catalyst Associates.

      *   The organization involves Elliott, Haygood, and Stacy to undermine Mayor
      Wilson and influence Council decisions.


      THE PIVOT

      *   Article 1 identifies a conflict of interest between Kevin Boone and Preble-Rish/John
      Avent, which he failed to disclose or recuse from since at least Sept 2016.

      *   Article 2 reveals that this persistent, undisclosed conflicts are facilitated
      by Catalyst Associates, an organization directly managed and controlled by Councilman
      Kevin Boone''s family (Michael Scott Boone as manager; Coley M. Boone as registered
      agent).

      *   Catalyst provides the organizational mechanism for Mr. Boone to advance
      his private interests through city council votes, hiding connections under a
      political banner supported by key figures like Elliott and Haygood.


      KEY ENTITIES

      *   Kevin Boone / Councilman Kevin Boone

      *   John Avent (Dewberry Preble-Rish, LLC)

      *   Catalyst Associates

      *   Coley M. Boone (Councilman Boone''s son; Registered Agent for Catalyst)

      *   Michael Scott Boone

      *   Lynn Stacey

      *   Preble-Rish, LLC

      *   Elliott

      *   Haygood

      *   Mayor Wilson / Burrell (Council Member/Council President 2025-08-05)'
