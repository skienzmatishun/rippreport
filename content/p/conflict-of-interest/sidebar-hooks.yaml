hooks:
  boone-doggle:
    brief: 'THE CONFLICT

      *   Councilman Kevin Boone has business connections through several LLCs to
      individuals and the engineering company Preble-Rish.

      *   Boone voted on Preble-Rish projects, specifically Firefly, for four and
      a half years.

      *   Boone attended and voted on the *Retreat at Fairhope* village (Fly Creek
      Apartments) in Sept 2016 (SD 16.14) while John Avent of Preble-Rish was representing
      the company.

      *   Councilman Robinson, Conners, and Brown acknowledged conflicts of interest
      with certain agenda items and abstained from voting.


      THE DISCOVERY

      *   Boone has numerous undisclosed LLCs, including those involving family members.

      *   Boone has voted in favor of council resolutions involving hundreds of thousands
      of dollars for engineering companies through his LLC connections.


      THE PIVOT

      *   Article 2 generalizes Boone''s pattern of self-serving business interests
      (LLCs and side deals) and reinforces the specific conflict detailed in Article
      1 by establishing a systemic pattern of undisclosed financial conflicts, rather
      than just single incidents.


      KEY ENTITIES

      *   Kevin Boone (Councilman)

      *   Preble-Rish

      *   John Avent

      *   Fly Creek Apartments / Retreat at Fairhope village

      *   Robinson (Councilman)

      *   Conners (Councilman)

      *   Brown (Councilman)'
    generated_at: '2026-07-11T12:03:52.247874Z'
  fairhope-voters-important-notice:
    brief: 'THE CONFLICT

