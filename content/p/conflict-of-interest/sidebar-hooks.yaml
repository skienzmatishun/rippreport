  good-ole-boys-alive-and-well:
    brief: 'THE CONFLICT:

      *   Councilman Kevin Boone had business connections through LLCs to individuals
      and Preble-Rish engineering company.

      *   Boone voted for four and a half years on Preble-Rish projects (e.g., Firefly).

