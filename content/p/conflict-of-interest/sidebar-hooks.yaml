  fairhope-a-city-owned-by-outside-interests-and-good-ole-boys:
    brief: 'THE CONFLICT:

      *   Councilman Kevin Boone had direct business connections through LLCs to individuals
      and Preble-Rish engineering company.

      *   Boone voted for Preble-Rish projects, including Firefly, over the last four
      and a half years.

      *   Conflict occurred when Boone attended and voted on the _Retreat at Fairhope_
      village (Fly Creek Apartments) in September 2016 (SD 16.14) while John Avent
      (Preble-Rish) was representing Preble-Rish.


      THE DISCOVERY:

      *   The Fly Creek Apartments approval was part of a wider corruption scheme
      involving Mayor Kant and "good ole boys."

      *   The Triangle lawsuit was settled for $11.25 million.

      *   The city borrowed $5.25 million, paid attorneys $3 million, and took $3
      million from the utility reserve fund regarding the lawsuit settlement.

      *   A new deal, the Triangle Nature Trail Park, costs approximately $1 million
      to develop on land that was already paid $11.25 million for.

      *   Councilwoman Diana Brewer sided with Mayor Kant concerning the Fly Creek
      Apartments.

      *   Councilmen Mueller and Boone pledged allegiance to the mayor''s interests
      and serve only one term.


      THE PIVOT:

      *   Article 2 proves that Boone’s specific conflict of interest regarding the
      Fly Creek Apartments was not an isolated incident but part of a systemic corruption
      network (Kant and good ole boys).

      *   Article 2 reveals the financial scope ($11.25 million in land payments,
      $11.25 million lawsuit settlement) and the political structure (Mayor Kant''s
      influence over engineering firms like Thompson Engineering) that enabled Boone’s
      conflicted voting behavior described in Article 1.


      KEY ENTITIES:

