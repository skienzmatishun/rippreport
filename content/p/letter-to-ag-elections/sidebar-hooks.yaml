  a-time-for-reflection-goobers-on-notice:
    brief: 'THE CONFLICT

      Election concerns in Baldwin County involving the Sheriff''s race, a 20-year
      culture of BCSO, lack of transparency, and suspected voter fraud.


      THE DISCOVERY

      A specific upset occurred in Fairhope in August prior to 2016 involving mayors
