  court-of-public-opinion:
    brief: 'THE CONFLICT:

      *   In Baldwin County, there are strong allegations of election fixing involving
      numerous races in the past.

      *   There is a long-standing "Good Ole Boy" culture regarding elections, specifically
      concerning the Sheriff who is the custodian of ballot boxes.

      *   The county has a 20-year culture of BCSO with no transparency or accountability.


      THE DISCOVERY:

      *   Baldwin County''s history includes significant financial issues, such as
