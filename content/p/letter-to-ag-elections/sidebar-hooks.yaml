      *   There are documented instances of local government obstruction (e.g., Fairhope
      city council obstructing the Mayor).

      *   Local political bodies have failed in their duty to ensure transparency
      and accountability.


      THE PIVOT:

      *   Article 2 reveals that the alleged election fixing and lack of transparency
