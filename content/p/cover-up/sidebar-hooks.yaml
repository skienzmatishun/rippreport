      unethical office use, and personal gain

      - Alabama Bar complaint pending against Wills; complaints dismissed by Ethics
      Commission/Alabama Bar officials

      - BCMCU and ethics boards accused of colluding with corrupt officials (e.g.,
      AG Marshall v. Albritton)


      THE DISCOVERY:

      - Baldwin County Legislative Delegation voted on Nov 16 to lease office space
      at 125 D’Olive Street, Bay Minette

      - Property owner identified as Mayor Bob Wills (Robert A. Wills, Sr.)

      - Lease term: Jan 1, 2023 to Dec 31, 2027 (5 years)

      - Rent: $49,080 per year; initially delegation agreed to pay full cost

      - Report by Lagniappe Mobile identified Wills as owner; Gulf Coast Media omitted
      this fact


