      - Article 2 exposes the specific lease agreement proving Wills is personally
      profiting from his position as Mayor by renting space to state legislators

      - Validates Article 1’s claim of "self-dealing" and unethical conflicts of interest
      between Wills'' dual role as elected official and private landlord

      - Confirms the financial link between the Mayor and the County Commission/Delegation
      responsible for overseeing county operations


      KEY ENTITIES:

      - Bob Wills (Mayor, Bay Minette)

      - O.J. French (Decedent)

      - Tamara French (O.J.’s sister; recipient of Wills’ letter)

      - Al Tolbert (Bay Minette Police Chief/BCMCU Chairman)

      - Baldwin County Major Crimes Unit (BCMCU)

      - Alabama Ethics Commission

      - Alabama Attorney General Steve Marshall

      - Cliff McCollum (Delegation Director of Constituent Services)

