  backstory-podcast-no-75-a-year-of-plague:
    brief: 'THE CONFLICT:

      - Pandemic data discrepancy: Article 1 cites 31,280,000 US cases/560,000 deaths
      globally; Article 2 cites 29,395,000 US cases/534,196 deaths.

      - Alabama Governance: Article 1 flags local corruption via "Fairhope pier project"
      and Baldwin County Sheriff lawsuit regarding I-10 crash; Article 2 confirms
      pervasive corruption via "Fairhope Council appointment without Citizen Input"
      and Jonathan Victor police shooting.

      - Judicial Integrity: Article 1 discusses medical cannabis bill failure; Article
      2 details specific judicial manipulation where assault charges against Paula
      DiNardi dismissed because original pleading was "defective (or sabotaged or
      worse)".


      THE DISCOVERY:

      - Article 2 confirms the operational scope of The Ripp Report by explicitly
      referencing its own coverage ("The Ripp Report and Lagniappe were replete with
      quality stories...").

      - Article 2 provides statutory verification of misconduct hinted in general
      local governance reports: Lee County DA Brandon Hughes charged with "use of
      his office for personal gain".

      - Article 2 identifies specific legal outcomes regarding the Jonathan Victor
      shooting and Judge Clarke Stankoski (public intoxication appeal, assault charges
      for Paula DiNardi dismissed).


      THE PIVOT:

      - Article 2 is the "smoking gun" because it moves from general criticism (Article
      1''s mention of Fairhope pier/states) to documented legal and political failures
      (DiNardi dismissal, Hughes charges), validating the Ripp Report’s reporting
      on Alabama/Florida corruption.

      - Article 2 exposes Judge Stankoski (fairhope Municipal Court) handling public
      intoxication appeals in "2018 incident" connected to the same jurisdiction mentioned
      in Article 1''s Fairhope coverage.

      - Article 2’s inclusion of specific case stats (Alabama: 503,305 cases) provides
      a data baseline that Article 1 lacks but relies on contextually for pandemic
      framing.


      KEY ENTITIES:

      - John Merrill ("Ole Peg-gy")

      - Ron DeSantis / Florida Gov.

      - Matt Gaetz (R-Pace, FL)

      - Baldwin County Sheriff (Lawsuit plaintiff implied via crash suspects).

      - Brandon Hughes (Lee County District Attorney, suspended)

      - Paula DiNardi / Jonathan Victor (Officer involved shooting).

      - Clarke Stankoski (Fairhope Municipal Court Judge)

      - Toforest Johnson (Alabama inmate)

      - Steve Marshall (AG Alabama).

      - The Ripp Report / Lagniappe.'
