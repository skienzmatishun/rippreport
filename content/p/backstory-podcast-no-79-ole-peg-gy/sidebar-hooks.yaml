      \ the McSharry assault case, response cited as an \"all time classic.\"\n  \
      \  - Linkage suggested to Judicial power run amok in Baldwin County.\n\nTHE\
      \ DISCOVERY (CURRENT FACTS)\n- Current reporting (Article 2/No. 79) confirms:\n\
      \    - Medical Cannabis bill has \"died in the Senate\" (legislative failure\
      \ of previous movement).\n    - Lawsuit filed against Baldwin County Sheriff\
      \ regarding fiery crash where 5 suspects pursued wrong way down I-10; resulted\
      \ in death of father and son + others.\n    - Delta 8 THC targeted for new illegalization\
