  dirty-little-secrets:
    brief: 'THE CONFLICT:

      - City of Gulf Shores Planning and Zoning admitted to not following Section
      3-3E "Findings and Conclusions" of its own Zoning Ordinance.

      - This violation is specifically cited regarding the "Regency Place Apartments
      Site Plan".

      - Mayor Robert Craft requested that the Regency Place plan be revisited, citing
      a "technical deficiency" in the ordinance omission.

      - Planning Commission held an Executive Session on August 17, 2018.

      - City Attorney advised Mayor to resubmit the Site Plan for a second look following
      complaints about the "technical deficiency".


      THE DISCOVERY:

      - Article dated 9/20/2018 by Pete Sims ("FREAKY FRIDAY") details findings from
      Public Records Request.

      - Sims obtained the ten (10) most recent Site Plan Applications plus the first
      three for each year from 2014 to 2017.

      - Review shows City Staff referenced the "Land Use Plan" in recommendations
      to the Planning Commission as recently as 2016.

      - Records show City Staff used "Land Use Plan" criteria in recommendations during
      2014, 2015, and 2016.

      - Current City position claims "Land Use Plan" is simply a strategy to guide
      planning with no bearing on recommendations.


      THE PIVOT:

      - Citizen Rex Lawson identified the critical omission of Section 3-3E "Findings"
      in the Ordinance.

      - City Attorney advised Mayor to correct this oversight ("Houston we have a
      problem" moment) causing embarrassment among volunteers.

      - City Attorney had an urgent need to explain the nature of the deficiency to
      the Planning Commission in a closed Executive Session (Aug 17, 2018) rather
      than public meeting.

      - This proves the City knew its process was technically non-compliant and used
      executive session to conceal it from press and opponents.


      KEY ENTITIES:

      - Pete Sims (Author/Commentator)

      - Andy Bauer (Director of Planning and Zoning)

      - Robert Craft (Mayor of Gulf Shores)

      - Rex Lawson (Citizen who reported deficiency)

      - City Attorney (unnamed)

      - Regency Place Apartments (Subject Development Project)

      - Planning Commission (City of Gulf Shores Volunteer members)'
