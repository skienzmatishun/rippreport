  people-power-wake-up-gulf-shores:
    brief: 'THE CONFLICT:

      - Gulf Shores Planning Commission voted 6-3 on October 3, 2018 to approve the
      Regency Place Apartments Site Plan Application.

      - Project involves ~313 housing units in a quiet residential neighborhood (Regency
      Road) otherwise comprised of single-family homes/owner-occupied condos.

      - "City Staff" allegedly removed the Land Use Plan from their criteria in 2017/2018
      recommendations despite using it previously (SP2015-03, SP2016-02) to evaluate
      similar developments.

      - Development proposes 20.6 DUPA (Dwelling Units Per Acre) vs neighborhood average
      of 8.1 DUPA, changing the character from "low-density" to high-density rental
      complex.

      - Plaintiffs (residents) claim Planning Commission violated Zoning Ordinance
      Article 138 and Section 3-3E by failing to submit required "findings" regarding
      Land Use Plan compliance.


      THE DISCOVERY:

      - Pete Sims filed a formal appeal on October 22, 2018 to Mayor Robert Craft
      requesting rescission of the Planning Commission''s approval.

      - Sims cites U.S. Census Bureau data: 13.8% property value decrease expected
      from apartments (compared to Strip Club at 14.7% and Homeless Shelter at 12.7%).

      - Local surveys indicate 95.7% of nearby owners fear property value drops; Enclave
      alone projected to lose over $3 million in owner equity.

      - "City Staff" recommendations allegedly ignored Zoning Ordinance Article 1
      General Provision 1-3 and the 2008/2014 Land Use Plan, which historically required
      consistency checks (last used as explicit criteria for SP2014-01 and SP2016-03).

      - Over 750 individuals signed a petition opposing the development.


      THE PIVOT:

      - Gulf Shores City Council is mandated to hear the citizen appeal on Monday,
      October 29, 2018 at 4:00 p.m. Gulf Shores City Council Chambers.

      - This hearing is identified as the "last and best chance" for residents to
      overturn the decision before development proceeds.

      - Public campaign pushes citizens to pressure Mayor Craft and Council members
      (specifically Philip Harris) before the 4:00 p.m. meeting deadline to demand
      a vote against the development.

      - The case shifts from administrative zoning approval by volunteers (Planning
      Commission) to political obligation of elected officials (City Council).


      KEY ENTITIES:

      - Pete Sims (Appeal Filer/Media Contact)

      - Robert Craft (Mayor, Gulf Shores)

      - Philip Harris (Council Member/Planning Commission Rep/Harris Construction)

      - Andy Bauer (Planning Director, 2016 findings source)

      - Regency Place Apartments

      - Gulf Shores City Council

      - Planning Commission (Unelected/Volunteers, 6-3 vote)

      - Enclave / Regency Club / The Ridge / Lakewood (Surrounding developments for
      value data)'
    generated_at: '2026-03-13T13:18:50.841198Z'
