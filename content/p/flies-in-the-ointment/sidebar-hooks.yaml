  political-intimidation:
    brief: 'THE CONFLICT

      *   Past political system characterized by straight-ticket voting leading to
      "Flies in the Ointment"—politicians elected by party loyalty, not qualifications.

      *   Tucker Dorsey (Baldwin County Commissioner) has alleged business connections
      and is linked to Catalyst organization.

      *   Judge Michelle Thomason used the Baldwin County Republican Party structure
      and primary elimination tactics ("not republican enough") to secure election.

      *   Kevin Boone (Fairhope City Council member) was initially a loyalist following
      the Mayor’s direction in his first term, later becoming an "obstructionist."


      THE DISCOVERY

      *   Mayor Kant of Fairhope is alleged head of corruption and has raised over
      $50,000 for mayoral election.

      *   Over 50% of those donations come from outside Fairhope/unidentified PACs.

      *   Allegations include Mayor Kant rigging the last two elections and establishing
      a puppet candidate system (e.g., Jay Robinson running against Mueller’s seat).

      *   Financial link: Senator Pittman, who was Trustee of BP funds for Baldwin
      County, allegedly received $636,000 from those same funds with Mayor Kant''s
