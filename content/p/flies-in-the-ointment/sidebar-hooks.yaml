      to the alleged corruption within Mayor Kant''s controlled system.


      KEY ENTITIES

      *   Tucker Dorsey (Baldwin County Commissioner)

      *   Michelle Thomason (Judge/Catalyst Queen)

      *   Kevin Boone (Fairhope City Council member)

      *   Catalyst organization / Scott Boone Consulting

      *   Mayor Kant (Fairhope)

      *   Senator Pittman (Former BP Trustee/State Senator)

      *   Jim Nix (Former Mayor of Fairhope)

      *   Sherry Sullivan

      *   Lee Turner

      *   Jay Robinson

      *   Mike Hubbard

      *   Fly Creek Apartments / Soccer Complex'
