      honest, and transparent" local government while serving as President of The
      Woodlands Property Association during the Publix Big Box construction dispute.

      - Prior to Catalyst formation, in 2012: Chris Elliott and Dane Haygood ("Mr.
      Fix it" Lynn Stacey) formed a consulting group, collecting $7,000 from Kevin
      Boone for political services (alongside $22,500 from Tim Kant and $12,000 from
      Hoss Mack).

      - 2014 (August 11): Catalyst Associates, LLC was formed by Scott Boone (son
      of Kevin Boone), joined by Lynn Stacey. The entity’s stated purpose is "Any
      Legal Activity."

      - 2014 (August 14): Judge Michelle Thomason hired Catalyst for $2500 in consulting
      and polling.


      THE DISCOVERY:

      - CATALYST has rebranded/migrated to the Scott Boone Consulting banner.

      - This new corporate layer continues the structure of "fixing" elections and
      stacking the deck in Fairhope (e.g., Kevin Boone’s council seats).

      - Joshua Gammon is a specific challenger running for Place 5, directly challenging
      Kevin Boone''s seat.


      THE PIVOT:

      - Article 1 establishes Catalyst Associates as an early vehicle ("The Other
      Plan") used by the family to provide political consulting and legal services
      (e.g., to Judge Thomason).

      - Article 2 reveals that this web of influence has evolved, with the operations
      shifting under the Scott Boone Consulting banner, demonstrating the longevity
      and modernization of the same structural corruption identified in Article 1.


      KEY ENTITIES:

      - Kevin Boone

