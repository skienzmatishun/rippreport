  a-spiders-web:
    brief: "THE CONFLICT\n*   2012: Chris Elliott and Dane Haygood formed \"Elliott,\
      \ Haygood & Stacy\" consulting group with Lynn Stacey, collecting funds from\
      \ candidates including Kevin Boone ($7,000) who subsequently won elections.\n\
      *   August 11, 2014: Catalyst Associates, LLC was formed by Scott Boone (son\
      \ of Kevin Boone) and Lynn Stacey, specifically structured for \"Any Legal Activity.\"\
      \n*   August 14, 2014: Judge Michelle Thomason became one of the first clients\
      \ of Catalyst Associates, paying $2,500 for consulting and polling.\n*   The\
      \ Main Article alleges that Kevin Boone manipulated local government (e.g.,\
      \ regarding The Woodlands vs. Rock Creek/Triangle Lawsuit) to benefit personal\
      \ interests while withholding financial transparency from citizens.\n\nTHE DISCOVERY\n\
      *   Current political influence in Baldwin County is maintained through complex\
      \ layers of LLC ownership, making true owners and connections nearly impossible\
      \ to determine.\n*   Kevin Boone maintains direct ties via multiple LLC structures\
      \ to John Avent of Preble-Rich/Dewberry. \n*   These same interconnected LLC's\
      \ include shares in Baldwin County Sewer infrastructure.\n*   Boone is currently\
      \ voting for engineering firms linked to these conflicted entities, while simultaneously\
      \ blocking the Fairhope City Mayor’s efforts to hire an external firm (\"fresh\
      \ eyes\") to evaluate utility infrastructure.\n*   County Commissioner Tucker\
      \ Dorsey is also implicated within this same network of LLC connections.\n\n\
      THE PIVOT\n*   The Main Article exposed Catalyst Associates' founding mechanism\
      \ and early use as a vehicle for profiting from political relationships (e.g.,\
      \ payment to Judge Thomason).\n*   The Widget Article proves that this foundational\
      \ system has not dissolved but has instead matured into a permanent, entrenched\
      \ operational method. It shows the current application of those LLC structures—specifically\
      \ tying Kevin Boone's modern legislative actions and votes directly to financial\
      \ interests held through connected partners like John Avent, proving the conflict\
      \ is ongoing and systemic.\n\nKEY ENTITIES\n*   Kevin Boone (Fairhope City Councilman)\n\
      *   Chris Elliott / Dane Haygood / Lynn Stacey\n*   Scott Boone\n*   Catalyst\
      \ Associates, LLC\n*   Judge Michelle Thomason\n*   John Avent (Preble-Rich/Dewberry)\n\
      *   Tucker Dorsey (Baldwin County Commissioner)\n*   Fairhope City Council\n\
      *   Baldwin County Sewer"
