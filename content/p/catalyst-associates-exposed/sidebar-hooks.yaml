      tens of thousands from local candidates including Tim Kant ($22,500), Hoss Mack
      ($12,000), and Kevin Boone ($7,000).

      *   **Conflict of Interest:** Catalyst (founded 2014) subsequently contracted
      Judge Michelle Thomason three days after formation for consulting/polling services.

      *   **Other Claims:** Paul Ripp alleges that Fairhope Councilman Kevin Boone
      misrepresented the $12.2 million Triangle Lawsuit settlement to avoid scrutiny
