hooks:
  conflict-of-interest:
    brief: '**THE CONFLICT**

      *   In 2012/2014, politicians including Chris Elliott, Dane Haygood, and Lynn
      Stacey formed "Elliott, Haygood & Stacy," a political consulting firm.

      *   This group collected tens of thousands of dollars from candidates in Baldwin
      County, including Kevin Boone ($7,000) for 100% success rate.

      *   In August 2014, Catalyst Associates LLC was formed by Scott Boone and Lynn
      Stacey''s son (Son of the older "Mr. Fix it" Stacey), stating its purpose as
      "Any Legal Activity."

      *   Three days after formation (August 14, 2014), Judge Michelle Thomason hired
      Catalyst for $2500 in consulting/polling services.

      *   Main Article alleges Kevin Boone used his position to settle the Triangle
      Lawsuit by agreeing to a $12.2 million settlement while misleading the public
      and eliminating finance committees.


      **THE DISCOVERY**

      *   The Widget Article proves that Councilman Kevin Boone maintains direct,
      ongoing business connections with John Avent of Dewberry Preble-Rish, LLC (an
      engineering firm), dating back prior to his tenure on City Council or Planning
      and Zoning.

      *   Boone has voted for four and a half years on planning and zoning projects
      involving Preble-Rish.

      *   The specific conflict involved the "Retreat at Fairhope" / Fly Creek Apartments
      project, where Boone attended and voted in favor of the issue in September 2016
      while John Avent was representing Preble-Rish at the meeting.

      *   The article notes that Councilman Robinson, Conners, and Brown recently
      acknowledged similar conflicts and abstained from voting, contrasting with Boone''s
      conduct as an elected official who never recused himself.


      **THE PIVOT**

      *   Article 1 establishes a historical pattern of political maneuvering (Catalyst)
      used to secure financial backing and favors for powerful figures like Judge
      Thomason.

      *   Article 2 reveals that those historic connections manifested in tangible,
      recurring conflicts within local municipal government specifically regarding
      land use, contracting with Preble-Rish, and zoning decisions under Kevin Boone''s
      direct watch. Article 1 establishes the motive/means of political influence;
      Article 2 proves the resulting specific business conflict of interest in execution.


      **KEY ENTITIES**

      *   Kevin Boone (Fairhope Councilman)

      *   John Avent (Representative for Preble-Rish, LLC)

      *   Preble-Rish / Dewberry Preble-Rish, LLC

      *   Catalyst Associates, LLC

      *   Scott Boone

      *   Lynn Stacey / Lynn (Older "Mr. Fixit" Stacey''s son)

      *   Chris Elliott / Chris Elliot

      *   Dane Haygood

      *   Judge Michelle Thomason

      *   The Triangle Lawsuit

      *   Fly Creek Apartments / Retreat at Fairhope'
