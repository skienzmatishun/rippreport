  catalyst-bullies:
    brief: 'THE CONFLICT:

      - In 2012, "Elliott, Haygood & Stacy" political consultants were formed by Chris
      Elliott and Dane Haygood (Mayor of Daphne) along with Lynn Stacey to manage
      Baldwin County candidates; they took $7,000 from Councilman Kevin Boone, which
      helped his campaign succeed.

      - After conflict of interest concerns arose following Elliott becoming County
      Commissioner, Scott Boone, son of Kevin Boone, joined Lynn Stacey to form Catalyst
      Associates, LLC on August 11, 2014.

      - Judge Michelle Thomason became one of the first clients of Catalyst and paid
      $2500 for consulting and polling within three days of the company''s formation
      in August 2014.

      - The Main Article details Kevin Boone’s historical alleged conflicts of interest
      (e.g., awarding municipal contracts to Senator Pittman, handling a $12.2 million
      Triangle lawsuit settlement, eliminating Finance Committee with Mayor Tim Kant).


      THE DISCOVERY:

      - Article 2 reveals that "CATALYST/Scott Boone Consulting" (CSB) is currently
      led by councilmen Burrell Boone and Brown.

      - This entity is alleged to use its power and influence from a network of special
      interests (Sewer, attorneys, judges) to manipulate the Fairhope political landscape.

      - CSB is actively pushing candidates like Sherry Sullivan through signs in residential
      yards and encourages voters to block vote for four specific CSB-backed candidates:
      Burrell Boone, Brown, and Sherry Sullivan.


      THE PIVOT:

      - Article 2 proves that the historical conflict of interest (Article 1) has
      evolved into a current strategy for political control within Fairhope. The network
      established by Kevin Boone''s son (Scott Boone/Catalyst Associates) is now directly
      operating through councilmen Burrell Boone and Brown to secure specific local
      seats.

      - Article 2 introduces Marcus McDowell, the city attorney who serves the council
      appointed by CSB, revealing that this influence extends to legal outcomes—specifically
      his failure to charge Ronan McSharry for assault, allowing the statute of limitations
      to run out despite recorded evidence.


      KEY ENTITIES:

      - Kevin Boone (Councilman)

      - Scott Boone (Consultant/Son of Councilman Kevin Boone)

      - Lynn Stacey (Founder/Manager of Catalyst Associates)

      - Catalyst Associates / CSB (Catalyst/Scott Boone Consulting)

      - Michelle Thomason (Judge, former client of Catalyst in 2014)

      - Chris Elliott (Former Consultant)

      - Tim Kant (Former Mayor connected to Kevin Boone''s political dealings)

      - Burrell Boone (Councilman, linked to CATALYST)

      - Brown (Councilman, linked to CATALYST)

      - Marcus McDowell (City Attorney of Fairhope/Fairhope City Attorney)

      - Ronan McSharry (Bar Owner/Alleged domestic abuser who was not charged by the
      City Attorney)'
