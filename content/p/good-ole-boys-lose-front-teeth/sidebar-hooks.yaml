      - Organizations: Good Ole Boys (GOB), Catalyst, Stacy Elliot and Haygood, Scott
      Boone Consulting.

      - Locations: Baldwin County, Bay Minette, Spanish Fort, Summerdale, Robertsdale,
      Fauxhope, Gulf Shores, Orange Beach, Daphne.

      - Offices: Baldwin County Sheriff, County Commissioner, Mayor (various municipalities),
      Judge, City Council.'
