      KEY ENTITIES:

      - Scott Boone (Catalyst Political Promoter)

      - Chris Elliott (Catalyst Operative/Senate Candidate)

      - Karin Wilson (Fairhope Mayor/Catliaist Link)

      - Jonathan Armstrong (Catalyst Candidate Daphne Council)

