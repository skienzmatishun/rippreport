      and target the same municipalities where GOB failed.


      KEY ENTITIES: Bob Willis, Joshua Brown, Brad Bass, Mike ("Slappin'' Mike"),
      Randy Farris, Charlie Murphy, Russell Johnson, Ruthie Campbell, Jerry Carl,
      Scott Boone, Kevin Boone, Catalyst, Scott Boone Consulting (CSB), CSB, The Ripp
      Report, Baldwin County Legal Eagle.'
    generated_at: '2026-03-08T20:13:35.538073Z'
    text: Baldwin County finally stood up to the developer-funded bullies hiding behind
      the Catalyst brand. We have the proof that Scott Boone’s consulting firm is
