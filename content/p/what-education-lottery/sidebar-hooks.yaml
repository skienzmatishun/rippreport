      to the general fund from 2013 to 2015, with no allocation for a future Education
      Fund. The lottery was manipulated by the Poach Creek Indians who provided over
      $100,000 to five Republican tourism committee members to influence their votes.
      Senator Chris Elliott ("TAX MAN") allegedly diverted education money from the
      1% tax, reportedly diverting about $200,000 a year, and opposed funding for
      the Education Fund.


      THE DISCOVERY:

      Alabama was ranked "DEAD LAST" in the National ranking of best states for Education
      (US News reference date: 2017). The article suggests that politicians and voters
      are responsible for the deplorable state of Alabama''s education system and
      that there is no provision for education funding in proposed lottery revenue.


      THE PIVOT:

      Article 2 establishes the systemic failure (Alabama being ranked "DEAD LAST"
      in education) that the mechanisms described in Article 1—the flawed lottery
      structure and political corruption involving figures like Senator Elliott—are
      attempting to address or exploit. Article 2 provides the context of institutional
      failure that the financial/political maneuvering in Article 1 is occurring within.


