      in August 2022.

      *   Total local revenue paid to BCBOE and Gulf Shores BOE for the first eleven
      months of fiscal year 2022 totaled $140,269,185.76.

      *   This total amount is strictly local revenue and is not shared with the state
      equity program.

      *   BCBOE is hiring high-level positions (HR, Special Services) with salaries
