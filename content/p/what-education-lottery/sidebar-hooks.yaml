      access for lobbyists to buy politicians.

      *   The lottery funds are explicitly directed toward funding prisons and repaying
      past debt, not education.

      *   The Poach Creek Indians admit that Alabama was played by political interests
      and plan to expand their influence without paying taxes.


      THE PIVOT:

      *   Article 2 provides the structural context of Alabama''s corruption (lobbyists
