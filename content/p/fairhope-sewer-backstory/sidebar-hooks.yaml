      *   This action resulted in Fairhope losing its best senior utility supervisor to Daphne and $3 million to attorneys.
      *   No sewer infrastructure work was done despite the misuse of funds.

      THE DISCOVERY
      *   The current Catalyst Council is obstructing Mayor Wilson and city employees regarding sewer projects.
      *   A new $13 million sewer plant failed to process 500,000 gallons of raw sewage that overflowed into Big Head gully and the Fly Creek watershed.

      THE PIVOT
      *   Article 2 demonstrates citizen action (2276 signatures) successfully influencing municipal decisions (stopping the Tuberville subdivision).
      *   This connects the past infrastructure neglect caused by corruption to current citizen-led efforts attempting to force accountability on the failing sewer system.

