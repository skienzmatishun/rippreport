  police-report:
    brief: 'THE CONFLICT:

      *   Jack Burrell, City Council President of Fairhope, was accused of disgrace
      and lack of accountability.

      *   An incident occurred Friday night (date unspecified, but referenced in relation
      to an email sent Aug. 27, 2018) at Mr. Burrell’s home party where minors attended,
      police were called, and no arrests were made for minors or adults/property owners.

      *   The Ripp Report alerted Mayor Wilson and the City Council about this incident.


      THE DISCOVERY:

      *   A police report exists regarding Jack Burrell''s incidents with the law,
      allegedly resulting from "good connections."

      *   Taxpayer money was used for Jack Burrell''s legal defense, leading to an
      ethics complaint filed by the Airport Authority.

      *   The Fairhope City Council was aware of the police report but chose to ignore
      it and refuse accountability.

      *   Jack Burrell has failed to disclose his police record.


      THE PIVOT:

      *   Article 2 provides documented evidence (police report, paid legal defense)
      that substantiates the claims made in Article 1 regarding Jack Burrell’s questionable
      conduct and lack of transparency within City leadership.

      *   The police report is the direct source of the alleged "bad connections"
      and criminal history that Burrell failed to disclose, making it the underlying
      reason for his position as Council President.


      KEY ENTITIES:

      *   Jack Burrell (Council President, City Liaison to Airport Authority Board)

      *   Fairhope City Council

      *   Mayor Wilson

      *   City Attorney

      *   Airport Authority

      *   Police Report'
