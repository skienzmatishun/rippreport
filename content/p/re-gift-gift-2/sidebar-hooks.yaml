  fairhopes-triangle-mega-site:
    brief: 'THE CONFLICT:

      *   Fall 2016: A developer attempted Site Plan Approval using the out-fall pipe
      for a one-point drainage system, violating PUD Amendment 1572 which required
      a non-point discharge system.

      *   Simultaneously, the Developer deeded the entire 4-acre parcel (including
      wetlands) to the City of Fairhope.

      *   The Main Article suggests this action was a "Deed of Gift" attributed to
      Tim Kant and Corte.


      THE DISCOVERY:

      *   The Widget Article reveals that the Triangle property was purchased by the
      City of Fairhope to settle a lawsuit.

      *   The settlement cost the City $11.25 million, with $3 million in attorney
      fees.

      *   The estimated value of the Triangle property is between $16 million and
      $20 million.


      THE PIVOT:

      *   Article 2 proves that the transfer/gift described in Article 1 (the 4-acre
      parcel) was part of a larger municipal transaction—specifically, the purchase
      of the "Triangle" property to settle a lawsuit.

      *   The evidence suggests the City''s actions regarding land ownership and development
      were tied directly to legal settlements and political maneuvering involving
      Councilman Burrell and Boone and Mayor Kant.


