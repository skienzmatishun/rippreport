  broken-eggs:
    brief: 'THE CONFLICT:

      *   Jack Burrell served as City Council President for five years.

      *   Burrell was responsible for obstructing the Mayor.

      *   Burrell was involved in decisions concerning the triangle lawsuit, soccer
      fields, sewer plant, gift of wetlands from Corte, and the Fairhope Airport debacle.

      *   Lee Turner held the position of head of Planning and Zoning and Single Tax.


      THE DISCOVERY:

      *   The City Council has failed to discuss the budget with the Mayor for two
      weeks.

      *   Burrell seeks to send the budget to an "APPOINTED" finance committee instead
      of having the council review it.

      *   Mr. Chunk Zunk, who is with the Fairhope Airport Authority (FAA), defended
      Burrell’s free airplane flights and flawed Requests for Proposals (RFPs).

      *   Zunk was on the Fairhope Finance committee in 2010 when Burrell was not
      President.


      THE PIVOT:

      *   Article 2 proves that Burrell''s conflicts of interest regarding the FAA/airport
      activities were defended by Zunk, revealing potential misconduct or manipulation
      related to airport operations that is part of the overall mismanagement cited
      in Article 1.


      KEY ENTITIES:

      *   Jack Burrell (City Council President)

      *   Lee Turner (Planning and Zoning)

