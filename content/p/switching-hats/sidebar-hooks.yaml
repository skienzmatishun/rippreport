      *   The City Council engaged in a passive-aggressive approach against the Mayor
      to prevent her goals from being achieved.

      *   Resolution 2606-16 involved accepting the deed of property for the city''s
      sewer lift station from Angelo A. Corte.

      *   Fairhope was gifted three plus acres of wetlands/land by Angelo A. Corte,
      which included the entire lot and storm water runoff areas, contrary to the
      designation as a small lift station area.

      *   Burrell presided over the resolution despite being ignorant of the full
      details and timing of the "gift."


      THE PIVOT

      *   Article 2 proves that Burrell’s involvement in decisions concerning Angelo
      A. Corte and the wetlands/sewer transfer (mentioned in Article 1) was deliberate
      and involved covering up critical information (the lack of map details).

      *   Article 2 reveals that the council overrode the Mayor''s veto to favor the
      developer, demonstrating the council''s willingness to bend over citizens and
      developers, which aligns with Burrell’s role as an obstructionist.


