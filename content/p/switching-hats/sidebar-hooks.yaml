  good-ole-boys-alive-and-well:
    brief: '**THE CONFLICT:**

      *   Fairhope City Council has maintained a consistent pattern of non-rotation
      for its leadership, with Jack Burrell serving as City Council President for
      five years.

      *   The council has been accused of obstructing the Mayor''s initiatives and
      impeding city governance (e.g., Airport Authority appointments).

      *   Councilmember Jack Burrell is linked to decisions involving the Triangle
      lawsuit, soccer fields, sewer plant issues, the "gift" of wetlands from Angelo
      A. Corte, the Fly Creek Apartments PUD, and airport debacles.

      *   The City Council has a history of overriding the Mayor''s vetoes (e.g.,
      regarding Ordinance No. 1572 Fly Creek Pud).


      **THE DISCOVERY:**

      *   Article 2 reveals a specific instance from 2017 where resolution 2606-16
      was passed by the previous City Council under Tim Kant’s tenure to accept property
      for the city’s sewer lift station from developer Angelo A. Corte.

      *   The "gift" encompassed three+ acres of wetlands from the Publix site, not
      merely the small lot initially presented in Exhibit A.

      *   Jack Burrell presided over this meeting and reviewed Resolution 2606-16
      on or about October 17th, yet he falsely claimed ignorance regarding the full
      scope of the "gift" (the entire wetland parcel) and that it had been officially
      recorded three days earlier (October 21st).


      **THE PIVOT:**

      *   Article 2 moves Burrell''s involvement in general "worst decisions" (as
      alleged in Article 1) from theoretical claims to a documented act of apparent
      intentional deception regarding the Angelo A. Corte wetland acquisition.

      *   Burrell’s subsequent denial of knowledge about the three-acre acquisition
      and its prior recording date, despite having presided over the meeting where
      it was approved, suggests active complicity or willful disregard for transparency
      rather than mere political obstruction or incompetence.


      **KEY ENTITIES:**

      *   Jack Burrell (City Council President / Mayor 2017)

      *   Angelo A. Corte (Developer / Property Donor)

      *   Tim Kant (Former City Council leadership / Mayor)

      *   Lee Turner (Head of Planning and Zoning; Single Tax Corporation)

      *   Fairhope City Council (Collective Body)

      *   Fly Creek Apartments PUD (Ordinance No. 1572)

      *   Airport Authority Board Appointments

      *   CATALYST (Political organization referenced as shadow government)'
