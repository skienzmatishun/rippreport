hooks:
  broken-eggs:
    brief: 'THE CONFLICT

      *   Jack Burrell served as City Council President for approximately 5 to 7 years.

      *   Burrell’s tenure involved oversight of several controversial projects: Triangle
      Lawsuit, sewer plant infrastructure issues, gift of wetlands from Corte, and
      the Fairhope Airport Authority "debacle."

      *   The council authorized a transfer of $10 million from utility funds to the
      general budget in 2015 and 2016 for non-utility expenses.

      *   The soccer complex project started at an estimated cost of $3.5 million
      but escalated to nearly $6 million, resulting in sub-standard fields that were
      not level.


      THE DISCOVERY

      *   The Fairhope City Council is intentionally obstructing the Mayor by transferring
      its responsibility to review the city budget to a newly appointed Finance Committee
      instead of conducting the review as elected officials.

      *   Conflict of Interest: Chunk Zunk, a member of the new Finance Committee
      (and former Airport Authority FAA member), previously defended Jack Burrell
      regarding alleged conflicts of interest and acceptance of free jet service provided
      by Ray Hix.

      *   Robert Brown, while serving on council, required Jack Burrell''s second
      to pass a motion designed to delay hiring a consultant for impact fees.


      THE PIVOT

      *   Article 1 alleges that Burrell uses his influence (the "switching hats"
      theme) and position as Council President to circumvent procedures and engage
      in misconduct.

      *   Article 2 provides concrete evidence of this systemic obstruction: demonstrating
      that the council is actively abdicate its oversight duties by delegating budget
      review power to an appointed committee led by individuals with known conflicts
      linked directly to Burrell''s past actions (Zunk/Hix).


      KEY ENTITIES

      *   Jack Burrell / Mr. Burrell

      *   Lee Turner

      *   Ray Hix

      *   Chunk Zunk

      *   Robert Brown

      *   Boone

      *   Conyers

      *   Robinson

      *   Snedeker

      *   Fairhope City Council / Planning and Zoning Board

      *   Fairhope Airport Authority

      *   Corte'
