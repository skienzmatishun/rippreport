  whose-agenda:
    brief: 'THE CONFLICT:

      - Fairhope City Council experienced a lack of leadership rotation for approximately
      five years; Jack Burrell served as City Council President during this period.

      - Mr. Burrell has been linked to numerous controversial decisions and failures,
      including the "Airport debacle," the Triangle lawsuit, sewer plant issues, and
      the gift of wetlands from developer Corte.

      - Lee Turner held dual positions head of Planning and Zoning and Single Tax
      Corporation for years; he was involved in promoting the Tatumville Gully project
      while allegedly circumventing normal procedures using his position alongside
      Burrell.

      - In Resolution 27 (Widget), previous Library Envelope Repairs issues, dating
      back to when former Mayor Can’t and Public Works Jennifer Fidler were in office,
      implicated Council President Burrell and Councilman Boone; these construction
      failures were reportedly "swept under the rug" for years without accountability
      or warranty enforcement.


      THE DISCOVERY:

      - The March 8th City Council agenda (Widget) revealed ongoing operational conflicts,
      specifically a proposed purchase of properties from Baldwin County Board of
      Education (K-1 Center, Fairhopers Community Park, James P. Nix Center), authorized
      by Mayor Karin Wilson and Council President Jack Burrell (Resolution 10).

      - A resolution approved a half million dollar Fly Creek dredging contract involving
      the City and the Fairhope Yacht Club (Resolution 11); this is linked to prior
      development accountability failure at Publix which caused flooding due to unstable
      red fill/topsoil spill.

      - The Council is currently pursuing a Request for a Special 3 Mill Ad Valorem
      School District Tax Election, as noted by Burrell''s desire "to get out of the
      school business" (Resolution 12).

      - Use of Executive Session (Resolution 30) was flagged due to its potential
      detrimental effect on City competitive negotiation position regarding property
      purchase/sale.


      THE PIVOT:

      - Article 1 makes accusations of obstruction and lack of leadership in council;
      Article 2 provides current, concrete examples of the Council''s agenda pushing
      large-scale contracts (Fly Creek), taxing schools (3 Mil Tax), and authorizing
      major land acquisitions without public disclosure or explanation—validating
      the accusation that the Council is operating with a hidden "agenda" rather than
      serving transparent public interest.

      - Article 1 cites past failures (Airport); Article 2 demonstrates ongoing fiscal
      irresponsibility and failure to address root causes, such as repeated dredging
      needs caused by poor development accountability at Publix construction sites.


      KEY ENTITIES:

      - Jack Burrell: City Council President; Councilman (linked to Airport debacle,
      Triangle lawsuit).

      - Lee Turner: Head of Planning and Zoning / Single Tax Corporation (involved
      in Tatumville Gully project promotion).

      - Karin Wilson: Mayor (authorized purchase of K-1 Center, etc.).

      - Jennifer Fidler: Public Works representative (named regarding ignored Library
      construction issues).

      - Councilman Boone: (Named alongside Burrell as part of the responsibility for
      Library repair neglect).

      - Baldwin County Board of Education: Owner of properties slated for City purchase.

      - Corte: Developer (linked to gift of wetlands in Main Article).

      - Publix: Grocery Store/Gas Station developer (responsible for unstable fill
      at Fly Creek).

      - Fairhope Yacht Club: Partner in the half million dollar Fly Creek dredging
      contract.'
