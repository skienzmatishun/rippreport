      * Project controversies include the Triangle lawsuit (2018-12-06 implied), the
      Tatumville Gully development in Fairhope involving a $1 acre of land requested
      by Single Tax Corp., Fly Creek Apartments, and issues related to the sewer plant
      and soccer fields.

      * The Airport Authority bid for an airplane hangar was handled by Board Member
