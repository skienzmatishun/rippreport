hooks:
  laugh-out-loud-baldwin:
    brief: 'THE CONFLICT

      *   Chris Elliott was appointed to the Baldwin County Commission by Governor
      Robert Bentley.

      *   Tripp Pittman took $750,000 of BP money and maintained municipal contracts
      with Fairhope while serving as a Senator.

      *   Elliott used the schools for the 1c sales tax (renewal of the 2012 penny
      tax) to garner support.

      *   Elliott and Dorsey approved a license agreement allowing Baldwin County
      Sewer to use right-of-way in the Fish River area.

      *   Catalyst attempted to take control of the Baldwin County Commission and
      Mayor seats.


      THE DISCOVERY

      *   Chris Elliott covered for Superintendent Eddie Tyler regarding the School
      separation lawsuit between Gulf Shores and Baldwin County, and obscured voter
      input on the penny tax.

      *   Elliott is attempting to divert attention from a raised GAS TAX.

      *   Sherry Sullivan was picked by Catalyst for Mayor of Fairhope in 2020 but
      failed in her role, leading to lawsuits when fired.


      THE PIVOT

      *   Article 2 provides specific evidence that Elliott''s political maneuvering
      (Article 1) involved corruption regarding school funding and tax votes, directly
      linking him to the tactics used by Catalyst against local governance structures.


      KEY ENTITIES

      *   Chris Elliott

      *   Governor Robert Bentley

      *   Tripp Pittman

      *   Catalyst

      *   Eddie Tyler

      *   Sherry Sullivan

      *   Karin Wilson

      *   Jack Burrell

      *   Fairhope City Council

      *   Baldwin County Commission

      *   Gulf Shores

      *   Fish River area'
