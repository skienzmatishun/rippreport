      *   The Baldwin County Commission voted to approve a license agreement allowing
      Baldwin County Sewer to use the right-of-way in the Fish River area (a vote
      for Tucker Dorsey).

      *   Chris Elliott and Tucker Dorsey were noted as selling their souls for votes.


      THE DISCOVERY

      *   Tens of thousands of dollars were contributed to Chris Elliott and Tucker''s
      campaign by developers and Catalyst.

      *   Elliott and Tucker are spending money to get elected at all costs, using
      "Alabama Values" for public relations.

      *   Elliott and Dorsey accomplished a mega-site deal valued at $35 million for
      a cow pasture with a gate to nowhere.

      *   They used BP money to repair county infrastructure based on this "good ole
      boy deal."


      THE PIVOT

      *   Article 2 proves that Elliott and Tucker are actively using developer and
      Catalyst funds to secure elections, directly validating the claims in Article
      1 that Elliott and Dorsey were willing to compromise for votes.

      *   The mega-site funding and infrastructure repairs detailed in Article 2 confirm
      the corruption inherent in the "Catalyst way" described in Article 1.


