hooks:
  liar-liar-pants-on-fire-2:
    brief: 'THE CONFLICT:

      - Publix and Fly Creek Apartments projects caused significant infrastructure
      and environmental damage at the mouth of Fly Creek.

      - Highway 98 shoulder collapsed, dumping tons of dirt into creek.

      - New red dirt dumped on steep slope; culvert foundation damaged in several
      areas; requires repeated "band aid" repairs.

      - Past Mayor Tim Kant and City Council supported Fly Creek Apartments; ignored
      infrastructure issues for 16 years.

      - Project promised environmental safety, luxury status, and permanent ownership
      to citizens in public meetings (250-300 attendees).

      - Actual outcome: Creek contamination, drainage issues, easement destruction.

      - Developers sold apartments shortly after completion despite promises not to;
      citizens currently paying for repairs via lawsuits.

      - Current Mayor Sullivan and Council (with exception of Corry Martin) same as
      previous Kant administration.

      - Current council unlikely to complete infrastructure grants (>$10M) previously
      obtained under Mayor Wilson.


      THE DISCOVERY:

      - Over 5 lawsuits filed against project, Leaf River Group (Stewart “The Liar”
      Speed), and city officials regarding pollution of Fly Creek.

      - Stewart Speed made recorded public statements: promised apartments would not
      contaminate Fly Creek, no sale of management rights, luxury project.

      - Stewart Speed has repeat fraud pattern: similar lies on Mobile townhomes;
      project sold before completion.

      - Jack Burrell identified as Council President responsible for behind-the-scenes
      communications/gifts with Speed.

      - Stewart Speed planning to divorce current wife and remarry at Grand Hotel
      this Friday; Baldwin County development elite attending.

      - Current phase: Town homes in same Fly Creek project underperform; priced high,
      obstructed view of Publix loading dock.


      THE PIVOT:

      - Widget Article identifies Speed, Burrell, and Corte as the specific individuals
      behind the infrastructure corruption cited in Main Article.

      - Proves "recorded lies" (environmental/ownership) directly correlate to physical
      damage Main Article cites (mud, sediment, contamination).

      - Validates claims that Burrell and Kant/Corte "played a very important part"
      in project success.

      - Confirms the pattern of developer selling off projects after extraction (Main
      Article prediction) is factual based on Speed’s Mobile history.


      KEY ENTITIES:

      - Fly Creek / Fairhope Village Apartments (Publix Project).

      - Stewart “The Liar” Speed (Leaf River Group / Mississippi developers).

      - Angelo Corte / Arthur Corte.

      - Jack Burrell (Council President).

      - Tim Kant / Mayor Kant.

      - Publix Corporation.

      - Baldwin County Government.

      - Grand Hotel (Fairhope).'
