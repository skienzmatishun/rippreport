  fly-creek-a-drainage-ditch:
    brief: "1. THE CONFLICT\n- October 2016: Fairhope City Council officially endorsed\
      \ the Fly Creek Apartments project.\n- April 2017: Newly elected City Council\
      \ (with exception of Mr. Jimmy Conyers) granted extension of time for project\
      \ to proceed.\n- Past Council composition included support from Mayor Kant and\
      \ Council members Jack Burrell, Kevin Boone.\n- Current Article 1 Field Observations:\n\
      \  - Highway 98 shoulder caved in, dumping tons of dirt into Fly Creek.\n  -\
      \ Culvert foundation damaged; steep slope not compacted.\n  - Red soil dumped\
      \ on site overhanging creek causes ongoing runoff into stream.\n- Result: 4\
      \ or 5 lawsuits filed regarding Publix project and apartments.\n- Angelo Corte\
      \ sold apartments, received funding, left city; residents now bear repair costs\
      \ for repairs and maintenance.\n\n2. THE DISCOVERY\n- Six-day trial in Bay Minette\
      \ held to challenge City Council’s zoning and planning decisions allowing the\
      \ complex.\n- Plaintiff’s attorney: Mr. Adam Milam (Friends of Fly Creek).\n\
      - Specific Engineering Revelations from Trial Evidence:\n  - Drainage plan calls\
      \ for single point discharge at outfall pipe.\n  - Detours current 1-acre retention\
      \ pond; omits expansion to 5-acre retention pond.\n  - Excess storm water dumped\
      \ directly into wetlands draining into Fly Creek (100-150 feet from outfall\
      \ pipe).\n  - Plan routes storm water directly into wetlands combined with Publix\
      \ drainage.\n- Wetlands ownership: Jack Burrell and Kevin Boone.\n- Trial notes\
      \ reveal 3 supervisors + at least 8 employees left city employment related to\
      \ the project fallout.\n\n3. THE PIVOT\n- Article 2 Trial Evidence proves that\
      \ the physical damage in Article 1 (sediment, runoff) is a direct result of\
      \ the drainage plan where excess water is dumped via single point discharge\
      \ into wetlands/watershed.\n- Confirms City Council and Mayor Kant bypassed\
      \ public safeguards in 2016/2017 votes despite warnings about runoff and erosion.\n\
      - Validates claim that Burrell and Boone accepted a \"gift\" (wetlands as drainage)\
      \ knowingly.\n- Demonstrates that the lawsuits mentioned in Article 1 are rooted\
      \ in ignored planning violations detailed in Article 2.\n\n4. KEY ENTITIES\n\
      - Angelo Corte (Developer)\n- Fly Creek Apartments\n- Publix (Grocery Store/Project)\n\
      - Jack Burrell (City Council Member / Wetlands Owner)\n- Kevin Boone (City Council\
      \ Member / Wetlands Owner)\n- Mayor Kant / Tim Cant (Former Mayor)\n- Current\
      \ Mayor Sullivan\n- Former Mayor Wilson (Previous administration, secured $10M\
      \ grants)\n- Mr. Adam Milam (Attorney for Friends of Fly Creek)"
    generated_at: '2026-03-13T23:35:35.030762Z'
