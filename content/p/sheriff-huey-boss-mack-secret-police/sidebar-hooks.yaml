      despite rumors he was a confidential informant.

      *   Deputy Justin Correa was involved in the Robert Yates incident and reportedly
      threatened to kill the plaintiff.

      *   Murray Lawrence Jr. was wrongfully incarcerated for over 16 years based
      on baseless allegations.


      THE DISCOVERY:

      *   The Alabama Supreme Court ruled that body camera footage and other investigative
      material held by law enforcement agencies are exempt from public records access
      due to their "investigative" nature, even if the investigation is closed (Lagniappe
      vs. Mack case).

      *   Sheriff Mack made a policy of not providing camera footage to the media
      or public.

      *   The BCSO lacked crisis intervention teams and specific training in de-escalation
      techniques in 2017.

      *   Evidence from the Victor shooting was deemed insufficient for prosecution
      due to inadequate training.


      THE PIVOT:

      *   Article 2 proves that despite soliciting taxpayer funds ($600,000 requested
      for cameras) under the pretense of accountability, Sheriff Mack actively suppressed
      public access to crucial evidence (body cam footage, 911 transcripts) by exploiting
      a Supreme Court decision that blocks transparency.

      *   This demonstrates that the stated goal of "accountability and transparency"
      is directly contradicted by the actions taken by the BCSO leadership under Sheriff
      Mack.


