      techniques in 2017.

      *   Lawsuits citing failure to train as establishing a standard for excessive
      force (Judge William Cassady).


      THE DISCOVERY:

      *   The existence of systemic failures within the BCSO, including insufficient
      training (no crisis intervention/de-escalation) and resulting legal liability
      against the department.

      *   Evidence that video and audio in controversial cases are "selective."

      *   Proof of Sheriff Mack''s political control over the County Commission and
      the BCSO.


      THE PIVOT:

