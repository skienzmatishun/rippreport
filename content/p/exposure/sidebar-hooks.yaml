  public-service-announcement-alabama-court-of-civil-appeals-judge-place-one:
    brief: 'THE CONFLICT

      *   The Ripp Report and Baldwin County Legal Eagle (BCLE) conducted an investigation
      into practices within the Baldwin County Family Court system.

      *   Allegations of dysfunction and unethical behavior were leveled against Judge
      Thomason and attorney Stephen Johnson.


      THE DISCOVERY

      *   The Widget Article reveals a political campaign to remove Michelle Thomasson
      from her judicial position.

      *   It claims she is the "absolute worst Family Court Judge in the state."

      *   It asserts that more complaints have been filed against her than all other
      judges in Baldwin County, and that she has damaged hundreds of families and
      children.


      THE PIVOT

      *   Article 1 establishes the existence of documented allegations and investigative
      scrutiny regarding misconduct (the problem).

      *   Article 2 uses these negative perceptions to convert critical exposure into
      a specific electoral threat, urging readers to vote for Christy Olinger Edwards
      against Thomasson (the solution/action).


      KEY ENTITIES

      *   Michelle Thomasson (Baldwin County Family Court Judge)

      *   Stephen Johnson (Attorney mentioned in investigations)

      *   The Ripp Report / Baldwin County Legal Eagle (Investigative entities)

      *   Christy Olinger Edwards (Candidate promoted in Widget Article)

      *   Baldwin County Family Court (Jurisdiction/Setting)'
    generated_at: '2026-07-18T01:55:48.313897Z'
  baldwin-county-un-family-court:
    brief: 'THE CONFLICT:

      *   2018: The Ripp Report received well over one hundred complaints targeting
      Baldwin County Family Court (BCFC) and Judge Michelle Thomason.

      *   Allegations cited in 2018 included Judge Thomason’s poor decisions, favoritism
      toward certain attorneys, arbitrary child visitation schedules, family destruction,
      and a link to a child suicide following her decision to separate children from
      their mothers.


      THE DISCOVERY:

      *   The Ripp Report continues documenting systemic issues at the BCFC in 2018
      through current reporting (Main Article).

      *   Current allegations involve unethical judges and "cottage industry attorneys"
      who allegedly fleece clients.

      *   Recent activity mentions specific targets, including Judge Thomason and
      Attorney Stephen Johnson, noting a prospective client decided to switch counsel
      based on these issues.


      THE PIVOT:

      *   The 2018 Widget Article establishes the historical basis for the systematic
      complaints against Judge Michelle Thomason and BCFC dysfunction before the Main
      Article''s current exposés. It proves that the allegations of court incompetence,
      attorney exploitation, and poor judicial decisions are not isolated incidents
      but a long-standing pattern documented by The Ripp Report.


      KEY ENTITIES:

      *   Baldwin County Family Court (BCFC) / Baldwin County

      *   Judge Michelle Thomason / Michele Thomasson

      *   The Ripp Report

      *   Stephen Johnson (Attorney)

      *   "Anonymous 1 and so on" (Complainants)

      *   Baldwin County Legal Eagle (publication)'
    generated_at: '2026-07-18T01:55:48.313905Z'
  shackled-chained-handcuffed-bc-un-family-court:
    brief: 'THE CONFLICT

      *   Baldwin County Family Court was accused of operating as a "cottage industry"
      characterized by unethical judges and attorneys, according to prior reports
      in *The Ripp Report* and *Baldwin County Legal Eagle*.

      *   Allegations previously targeted Judge Michelle Thomason regarding the court''s
      dysfunction and the professional practices of associated counsel, including
      Attorney Stephen Johnson.


      THE DISCOVERY

      *   A specific case study (Chey Garrigan) demonstrates alleged systemic failures,
      detailing her initial arrest by Fairhope Police without Miranda rights after
      a domestic dispute at her ex-husband’s home.

      *   The widget article reveals that attorney Austin Burdick filed a federal
      lawsuit against Judge Michelle Thomason challenging the legality of her decade-long
      tenure and jurisdictional overreach (District vs. Circuit Court).

      *   The article documents allegations that Steven Johnson, representing the
      opposing side in Garrigan''s case, exploited procedural loopholes to secure
      rulings favorable to him and judge Thomason, despite negative evaluations and
      evidence presented by Chey Garrigan.


      THE PIVOT

      *   Article 1 made broad claims of systemic corruption requiring voter intervention.
      Article 2 serves as a "smoking gun" by providing concrete, documented legal
      challenges (the federal suit initiated by Austin Burdick) that prove the alleged
      corruption involves specific judicial overreach and verifiable malfeasance in
      family court cases, such as Chey Garrigan''s struggle for custody.


      KEY ENTITIES

      *   Judge Michelle Thomason

      *   Attorney Stephen Johnson / Steven Johnson

      *   Chey Garrigan

      *   Austin Burdick (Attorney)

      *   John Merrill (Secretary of State/Defendant in Federal Suit)

      *   Fairhope Police

      *   Bayside Academy

      *   Tom Albritton (Executive Director, Ethics Commission)

      *   Ripp Report / Baldwin County Legal Eagle

      *   Jake Simkins

      *   Brian Chun / Buddy Brackin'
