  baldwin-county-family-court-a-cottage-industry:
    brief: 'THE CONFLICT

      *   Allegations leveled against Judge Thomason regarding her family court rulings
      and perceived bias in custody decisions.

      *   Attorneys operating a "cottage industry" for divorce and child custody cases,
      draining resources of parents over periods up to 12 years.

      *   Specific complaints filed against Judge Thomason (six complaints in the
      last 18 months) regarding her handling of cases.


      THE DISCOVERY

      *   Changes have been implemented involving DR/Family Court presided over by
      Judge Floyd.

      *   Answer and waiver divorces will be assigned to circuit judges for rotating
      handling.

      *   Temporary motions for cases assigned to Judge Thomason and Judge Bosch will
      be heard by other circuit judges (Judge Floyd, Judge Bishop, Judge Norton, Judge
      Taylor).

      *   Judge Thomason is prevented from inflicting bad judgment at temporary custody
      and support hearings.

      *   Domestic violence dockets have been removed from Judge Thomason''s control.


      THE PIVOT

      *   Article 2 reveals specific procedural changes (Judge Floyd''s interventions)
      that directly mitigate the alleged negative impact of Judge Thomason''s previous
      rulings on temporary custody and support orders.

      *   This procedural change demonstrates a tangible mechanism to prevent her
      "bad judgment" from being applied in real-time, validating the broader claim
      in Article 1 that the system is dysfunctional.


      KEY ENTITIES

      *   Judge Michelle Thomason

      *   Attorney Stephen Johnson

      *   Buddy Brackin

      *   Judge Floyd

      *   Judge Bosch

      *   Judge Bishop

      *   Judge Norton

      *   Judge Taylor

      *   Baldwin County Family Court'
    generated_at: '2026-07-11T13:03:12.738196Z'
  baldwin-county-family-court:
    brief: 'THE CONFLICT

      *   Allegations of a "cottage industry" in the Baldwin County Family Court system
      where attorneys profit from long, unresolved cases.

      *   Allegations leveled against Judge Thomason and Attorney Stephen Johnson
      regarding corrupt practices.


      THE DISCOVERY

      *   Judge Thomason is accused of turning divorce and child custody cases into
      a cottage industry that supplies bottom-feeding attorneys.

      *   Specific instances of judicial misconduct include allowing attorneys to
      illegally obtain medical records by going directly to doctors'' offices without
      notification or permission.

      *   Evidence that Judge Thomason failed to follow legal procedure regarding
      expert testimony (psychological evaluations) and rulings on evidence presentation.

      *   Judge Thomason allegedly allows parties to commit perjury, stopping testimony
      and admonishing them with no consequence.


      THE PIVOT

      *   Article 2 provides concrete, specific examples of judicial misconduct (illegal
      record acquisition, biased custody rulings, failure to apply the law) which
      directly proves the existence and nature of the "cottage industry" described
      in Article 1 by showing how the court system facilitates attorney exploitation.


      KEY ENTITIES

      *   Judge Thomason

      *   Attorney Stephen Johnson

      *   Tim Kant

      *   Craig Pittman

      *   Board of Baldwin Substance Abuse Services

      *   Baldwin County Family Court

      *   Alabama Bar Association'
