  failing-our-children-in-baldwin-county:
    brief: 'THE CONFLICT

      *   Allegations of unethical judges (Judge Thomason) and attorneys (Stephen
      Johnson) within the Baldwin County Family Court system.

      *   Systemic failure to protect children from neglect and abuse by multiple
      agencies.


      THE DISCOVERY

      *   A specific case involving a daughter exposed to sexual intercourse and explicit
      materials for over five months while under the supervision of two mothers was
      not protected despite involvement from multiple agencies.

      *   The Baldwin County Sheriff Department, Daphne Police Department, Loxley
      Police Department, DHR, and Family Court system failed to take necessary intervention
      actions.

      *   The court-appointed Guardian Ad Litem (GAL) failed to conduct a home inspection
      or interview the daughter, exhibiting conflict of interest behavior in court.

      *   DHR demonstrated lack of thoroughness by failing to perform home inspections
      and interviews.

      *   Mother was arrested on January 10, 2024, for Domestic Family Violence, and
      another mother attempted suicide.


      THE PIVOT

      *   Article 2 provides specific, documented evidence of systemic failures (DHR
      staffing issues, lack of action by police/court) that substantiate the general
      claims in Article 1 regarding corruption and dysfunction within the Baldwin
      County judiciary and legal community.

      *   The specific failure of DHR, law enforcement, and the GAL to intervene directly
      proves the "cottage industry" or unethical nature implied by the broader allegations
      against judges and attorneys mentioned in Article 1.


      KEY ENTITIES

      *   Judge Thomason

      *   Attorney Stephen Johnson

      *   Baldwin County Family Court

      *   Detective Trey Kraynak

      *   Case #230 700 147 (Police Case Number)

      *   DHR (Department of Human Resources)

      *   Baldwin County Sheriff Department

      *   Daphne Police Department

      *   Loxley Police Department

      *   Guardian Ad Litem (GAL)

      *   Baldwin County Child Advocacy Center

      *   Case #DR-2017-900956.03 (Author''s Family Law Case Number)'
    generated_at: '2026-07-11T13:03:12.738241Z'
