hooks:
  baldwin-county-family-court-a-cottage-industry:
    brief: 'THE CONFLICT:

      *   Judge Michelle Thomason was criticized for issuing 50/50 joint physical
      custody status quo orders, which critics claim occurred even when a genuine
      equal relationship between parents did not exist.

      *   She received up to six complaints regarding her practice in the last 18
      months (relative to publication).

      *   One complaint specifically addressed Judge Thomason''s position with the
      Eastern Shore Republican Women versus judicial compliance with Canons of Judicial
      Ethics 5 and 7.

      *   The legal system was described as a "malfunction junction" where divorces
      could take up to 12 years, facilitating an alleged "cottage industry."


      THE DISCOVERY:

      *   Presiding Judge Floyd instituted administrative changes in the court to
      mitigate the impact of specific judges'' rulings and potential conflicts.

      *   In 2017, Thomason’s temporary motions (pendente lite) were reassigned; she
      is now heard by Floyd and Bishop, while Norton and Taylor handle other motion
      dockets.

      *   Thomason was removed from hearing domestic violence dockets in 2017.

      *   Answer and waiver divorces are now randomly assigned across four general
      jurisdiction circuit judges.


      THE PIVOT:

      *   Article 1 alleges misconduct and systemic corruption (Judge Thomason, Attorney
      Stephen Johnson). Article 2 provides the administrative proof that internal
      scrutiny led to structural reform—specifically the reassignment of dockets and
      temporary motions away from Judge Thomason—to prevent the repetition of her
      alleged poor judgment.


      KEY ENTITIES:

      *   Michelle Thomason (District Judge)

      *   Judge Floyd (Presiding Judge)

      *   Bishop (Circuit Judge)

      *   Norton (Circuit Judge)

      *   Taylor (Circuit Judge)

      *   Stephen Johnson (Attorney)

      *   Eastern Shore Republican Women

      *   Baldwin County Legal Eagle

      *   Ripp Report / Ripp'
    generated_at: '2026-07-18T01:55:48.313868Z'
  baldwin-county-family-court:
    brief: '**THE CONFLICT:**

      *   The Ripp Report and Baldwin County Legal Eagle published an investigation
      concerning practices within Baldwin County Family Court under the title "Baldwin
      County Family Court - A Cottage Industry."

      *   This report contained earlier allegations targeting Judge Thomason and Attorney
      Stephen Johnson regarding corruption and ethical failures within the court system.


      **THE DISCOVERY:**

      *   The second article details specific instances of judicial misconduct by
      Judge Thomason, including ignoring procedural rules (e.g., failing to allow
      medical record subpoenas; refusing evidence), disregarding expert psychological
      evaluations for child custody decisions, and verbally chastising parties who
      committed perjury without imposing legal consequences.


      **THE PIVOT:**

      *   The Widget Article serves as the "smoking gun" because it moves beyond general
      accusations of a "cottage industry" (Main Article) to provide granular, case-specific
      evidence detailing how Judge Thomason personally disregards established law
      and expert recommendations while presiding over child custody cases.


      **KEY ENTITIES:**

      *   Judge Thomason

      *   Attorney Stephen Johnson

      *   The Ripp Report

      *   Baldwin County Legal Eagle (BCLE)

      *   Craig Pittman

      *   BP (Baldwin Substance Abuse Services)'
    generated_at: '2026-07-18T01:55:48.313882Z'
  catalyst-queen-remember-family-court:
    brief: 'THE CONFLICT

      *   Concerns documented in Baldwin County legal reporting regarding corruption
      within Family Court practices involving Judge Thomason. (Main Article)

      *   Allegations that attorneys, referred to as "cottage industry" lawyers, fleece
      clients and operate under the court''s blessing. (Main Article)

      *   The Ripp Report previously alleged issues concerning Judge Thomason and
      Attorney Stephen Johnson. (Main Article)


      THE DISCOVERY

      *   Catalyst was formed by figures such as Eliott Haygood and Stacy after they
      dissolved prior affiliations/entities. (Widget Article)

      *   Judge Michelle Thomason''s first client for the organization CATALYST was
      herself, establishing a direct professional link between the judge and the political
      group. (Widget Article)

      *   The Ripp Report previously published over one hundred complaints detailing
      Judge Thomason’s decisions regarding family matters, including allegations of
      child suicide linked to her court rulings. (Widget Article)


      THE PIVOT

      *   Article 1 establishes the *existence* of dysfunction and unethical attorney
      behavior in Baldwin County Family Court under Judge Thomason.

      *   Article 2 provides the specific political/financial context by proving Judge
      Thomason was a client of CATALYST, a politically motivated organization founded
      by individuals connected to former county leadership (e.g., Haygood). This suggests
      influence beyond simple judicial error.


      KEY ENTITIES

      *   Judge Michelle Thomason

      *   CATALYST

      *   The Ripp Report

      *   Baldwin County Family Court

      *   Stephen Johnson (Attorney)

      *   Eliott Haygood

      *   Stacy'
