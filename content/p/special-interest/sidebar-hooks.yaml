      2 referendum on a new form of government to delay or nullify the vote.

      *   Council members failed to seek necessary legal advice regarding the election
      details, demonstrating incompetence or deliberate obstruction.

      *   The Council is using procedural delays and misinformation as an excuse to
      prevent citizens from voting on reform.


      THE PIVOT:

      *   Article 2 reveals that the alleged opposition (the Catalyst Council) is
      actively trying to use legal maneuvers (injunctions, delaying tactics) to destroy
      the political movement described in Article 1. This shows the council''s intent
      behind their resistance.


      KEY ENTITIES:

      *   Fairhope City Council

      *   Catalyst

      *   Tim Kant (former Mayor)

      *   Karin Wilson

      *   Jack Burrell (Council President)

      *   Jay Robinson (Councilman, attorney)

      *   Steve Marshall (Alabama Attorney General)

      *   Fresh Start Fairhope'
