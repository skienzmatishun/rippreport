      efforts.

      *   Councilman Jay Robinson is expected to lead the opposition.

      *   J Boy (an attorney) learned about the peril facing the Council.

      *   J Boy may be a new pick for Mayor in 2020.


      THE PIVOT

      *   Article 1 predicts Catalyst will stoke the fire and support the current
      City Council to kill change efforts.

      *   Article 2 reveals the Council''s active strategy to oppose change and the
      internal maneuvering (e.g., J Boy’s role) that confirms Article 1''s prediction
