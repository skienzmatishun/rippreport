      - Widget article proves Superintendent Eddie Tyler and lobbyist Jon Gray—the same network connected to Elliott’s campaign—are actively managing his rise in the Senate.
      - This proves Article 1’s claim of Elliott leveraging a “political machine” for profit: he is the only survivor of the Catalyst group so far (½ win), using $600,000 coffers and political backdoors.
      - Article 2 serves as the smoking gun of his continued reliance on this machine despite losing voters’ trust with Dorsey and Thomasson, supporting Article 1’s argument he cannot be trusted to serve the public.

