      - Billie Jo Underwood defeated Tucker Dorsey (Article 1 machine member) for Baldwin County Commission Place 3.
      - Christy Olinger Edwards defeated “Catalyst Queen” Michelle Thomasson; Thomasson lost 34% of Baldwin County votes.
