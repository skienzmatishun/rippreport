      - Elliott ran a campaign using lobbyist Jon Gray (of Strategy) as his campaign manager and was backed by Superintendent Eddie Tyler.
      - Sheriff Mack provided support to Elliott; Strategy PR firm linked to negative campaigning and defense of the 1% education tax.
      - Voters in Virginia showed resistance to Elliott regarding that same 1% education tax deal, despite his claim it was “Baldwin Made.”

      THE PIVOT:
