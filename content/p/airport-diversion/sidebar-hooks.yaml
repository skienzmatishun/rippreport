    text: Council President Jack Burrell didn't just stumble into an ethics investigation; he spent years perfecting a rigged bidding system for his cronies. This research exposes how Burrell traded political favors for free flights while blocking any real oversight of city assets.
  fairhope-airport-un_authorized:
    brief: |-
      **THE CONFLICT:**
      *   Ethics complaints were filed against Council President Jack Burrell and Airport Board Member Ray Hix (Main Article).
      *   There was an ongoing investigation into these matters, though claims by Councilman Brown ruled them "baseless" (Main Article).
      *   In 2015–2016, Fairhope Airport Authority selected Ray Hix as Secretary/Treasurer.
      *   Hix gained privileged access to confidential airport lease and financial information starting August 2015.
      *   The Airport Authority signed a memorandum of lease with Mid-Bay Air LLC on December 23, 2015 (Widget Article).
      *   An Ethics Commission advisory opinion required board members not to use confidential information gained through their position for personal benefit when bidding/leasing (Widget Article; Ethics Opinion, page 3).
      *   A subsequent request made in November 2016 seeking a report on the Mid-Bay Air Lease found that "No lease has ever been submitted" to the Alabama Ethics Commission, despite having occurred December 2015 (Widget Article).
      *   Jack Burrell, as City Council President and Airport Authority Board Member, failed to object or advise Hix to step down when conflict of interest was apparent (Widget Article).

      **THE DISCOVERY:**
      *   The Widget Article proves that a specific, documented conflict of interest existed where Ray Hix secured a lease for Mid-Bay Air LLC in December 2015 while simultaneously serving on the Airport Authority and receiving confidential bid information.
      *   It reveals the Fairhope Airport Board failed its due diligence regarding Ethics rules and failed to properly oversee this transaction or report it to the Alabama Ethics Commission as required by state law (Widget Article).

      **THE PIVOT:**
      *   The documented failure of the Airport Board (specifically Jack Burrell's inaction) to uphold ethical standards during the 2015-2016 Mid-Bay Air lease directly substantiates the ongoing "ethics complaints" mentioned in the Main Article. The specific, provable breach confirms the validity of the allegations currently under investigation by the Ethics Commission.

      **KEY ENTITIES:**
      *   Jack Burrell (Council President, Airport Authority Board Member)
      *   Ray Hix (Airport Authority Board Member, Municipal Judge)
      *   Fairhope Airport Board / Fairhope Airport Authority
      *   Mid-Bay Air LLC
      *   The Alabama Ethics Commission
