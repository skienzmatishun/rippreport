  whos-on-first:
    brief: |-
      THE CONFLICT
      *   Ethics complaints were filed against Council President Jack Burrell (and airport board member Mr. Ray Hix). (Mentioned in Main Article)
      *   These complaints were publicly "ruled baseless" despite ongoing investigation allegations. (Main Article, via Councilman Brown's statement)
      *   The Fairhope Airport Authority entered into Ground Lease and Operating Agreements on Dec 17th, 2015. (Widget Article)
      *   A Request for Advisory Opinion was filed with the Alabama Ethics Commission by attorney Dennis R. Bailey representing Mr. Ray Hix on Dec 16th, 2015. (Widget Article)

      THE DISCOVERY
      *   The Widget Article provides a detailed rebuttal using documents from the Fairhope Airport Authority and Ethics Commission. (Widget Article)
      *   It proves that the executed lease of Dec. 17, 2015, predates Advisory Opinion No. 2016-04 rendered by the Commission on March 3, 2016, violating filing requirements (lease should have been submitted by Dec. 27, 2015). (Widget Article)
      *   It reveals inconsistencies between three different lease versions: Exhibit B (sample), Exhibit C (unsigned/Ethics submission), and the executed Dec. 17th version, specifically regarding Guaranty type and dates. (Widget Article)
      *   The leases provided by the Authority conflict with the terms set forth in its Request for Bids (RFP). (Widget Article)

      THE PIVOT
      *   Article 2 provides documentary evidence that contradicts public statements made about the legality of the ground lease, lending credence to concerns raised in Article 1 regarding unethical conduct and oversight failures.
      *   The detailed timeline discrepancies discovered in the Widget Article substantiate the suspicion mentioned in the Main Article (i.e., that the issues surrounding invoices/leagues are attempts to "get heat off [Burrell]' s ass about the pending ethics investigation").

