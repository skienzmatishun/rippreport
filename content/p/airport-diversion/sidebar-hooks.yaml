  jack-box-airport:
    brief: |-
      **THE CONFLICT:**
      *   A pending ethics investigation exists against Council President Jack Burrell (Councilman) and Airport board member Ray Hix (Airport Authority).
      *   Main Article mentions an ethics complaint was "ruled baseless" by some entities, but the author claims investigations are ongoing.

      **THE DISCOVERY:**
      *   Article 2 reveals that the Fairhope Airport Authority is using tax dollars to hire "the top ethics attorney in Alabama" for its board members (Jack Burrell and Ray Hix).
      *   This defense strategy involves a conflict of interest: Ray Hix’s own attorney, who previously prepared the lease and was paid by Mr. Hix to seek an advisory opinion from the Ethics Commission, is now representing the Authority Board.
      *   A Fairhope resident (Jack) contacted Ethics Commission Chief Council Hugh Evens regarding the Airport Authority; this request was blind-copied to Ray Hix’s attorney, Mr. Bailey.

      **THE PIVOT:**
      *   Article 1 establishes that Jack Burrell is allegedly using scrutiny of City invoices/ethics complaints as deflection from his pending investigation.
      *   Article 2 demonstrates a direct abuse of institutional power and legal process: the Airport Authority (which should be investigating legitimate concerns) has hired an attorney tied directly to Hix’s prior advisory opinion request—a clear attempt at "an end run around" accountability, confirming suspicion that these investigations are being undermined by self-interested actions.

