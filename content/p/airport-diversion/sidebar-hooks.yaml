  court-public-opinion-now-session:
    brief: 'THE CONFLICT

      *   Ethics complaint against Council President Jack Burrell and Airport board
      member Ray Hix was ruled baseless by Councilman Brown.

      *   Jack Burrell was investigated regarding ethics complaints and securing the
      airport bid for Board Member Hix.

      *   Invoices and letters concerning City of Fairhope computer work were involved,
      with Deborah Smith resigning and suspected of giving documents to Jack Burrell.


      THE DISCOVERY

      *   The Fairhope Airport Authority''s Request for Proposal (RFP) bidding process
      was grossly flawed and gerrymandered.

      *   Jack Burrell aided and abetted the improper RFP bidding process.

      *   The lease was signed and notarized on December 17th, 2015, prior to the
      Ethics Commission Advisory Opinion dated February 3rd, 2016.

      *   Allegations of bid rigging and collusion among Airport Authority Board members
      were made.


      THE PIVOT

      *   Article 2 provides evidence that substantiates the underlying claims in
      Article 1 by proving that Jack Burrell actively participated in a corrupt process
      (bid rigging) concerning the Airport Authority lease, which is directly linked
      to his involvement with the Airport bid and ethics investigations mentioned
      in Article 1.


