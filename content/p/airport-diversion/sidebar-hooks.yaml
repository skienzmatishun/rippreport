  fairhope-airport-authority-flying-without-a-compass:
    brief: |-
      THE CONFLICT:
      *   Approximately one year prior to Widget Article publication date (2016/12), Fairhope Airport Authority held an illegal meeting involving major players including Mayor and City Council members of that time.
      *   Following this illegal meeting, Fairhope City Council subsequently failed a required additional training course in Alabama Ethics.

      THE DISCOVERY:
      *   The current investigation into Jack Burrell (Council President) and Ray Hix (Airport board member) is stated as ongoing, despite reports from Article 1 suggesting the ethics complaints have been "ruled baseless."
      *   Article 2 proves a documented history of ethical failures and illegal conduct within the Fairhope Airport Authority prior to the current controversy.

      THE PIVOT:
      *   The past record (illegal meetings, failure to pass ethics training) establishes a historical pattern of systemic misconduct at the airport, making the current ongoing investigations into Burrell and Hix relevant rather than isolated incidents.
      *   Article 2 demonstrates that despite previous warnings ("every indication... something stunk at the airport"), then leaders failed to act against those behaviors.

      KEY ENTITIES:
      *   Fairhope Airport Authority (FAA)
      *   Jack Burrell (Council President / Councilman)
      *   Ray Hix (Airport board member, Former Board Member 2019-10-11)
      *   City of Fairhope
      *   Fairhope City Council
      *   Deborah Smith (resigned after turning in documents to Jack)
