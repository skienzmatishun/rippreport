  stirring-the-pot:
    brief: |-
      THE CONFLICT:
      *   Ethics complaints against Council President Jack Burrell and Airport board member Mr. Ray Hix were ruled "baseless" according to a statement by Councilman Brown.
      *   Despite this ruling, RIIPP reports that investigations are ongoing into financial issues concerning City of Fairhope invoices and computer work contracts.
      *   The investigation involved documents provided to Jack from Deborah Smith, who subsequently resigned as an official for the City of Fairhope.

      THE DISCOVERY:
      *   Article 2 publicly challenges Council President Burrell regarding his silence on the massive costs associated with the airport.
      *   It reveals a current focus on the fact that "the Airport has cost us millions while we invest little in our schools."

      THE PIVOT:
      *   Article 1 suggests Burrell was using pressure over invoice issues to deflect attention from his pending ethics investigation.
      *   Article 2 serves as the 'smoking gun' by bypassing the political deflection narrative and directly confronting Burrell with accountability for the airport’s multimillion-dollar financial burden, demanding an answer on why he remains silent about those costs.

      KEY ENTITIES:
      *   Jack Burrell (Council President)
      *   Mr. Ray Hix (Airport board member)
      *   Fairhope Airport
      *   The Courier / Chucky Cheese
      *   Deborah Smith
      *   Councilman Brown
      *   "come fly with me” Jack
