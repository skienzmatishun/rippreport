  stirring-the-pot:
    brief: 'THE CONFLICT:

      *   Ethics complaint against Council President Jack Burrell and Airport board
      member Ray Hix was ruled "baseless."

      *   An ongoing investigation is occurring regarding Jack Burrell and Ray Hix.

      *   Invoices and letters regarding computer work for the City of Fairhope were
      issued.

      *   Deborah Smith resigned and is suspected of giving documents to Jack, who
      forwarded them to Chucky Cheese.

      *   Burrell pressed for an investigation into invoices that allegedly saved
      the city thousands of dollars.


      THE DISCOVERY:

      *   The Airport has cost the city millions despite minimal investment in schools.

      *   Jack Burrell has no answers regarding questions posed by "come fly with
      me."

      *   Karma and Fate are predicted to catch Jack Burrell.


      THE PIVOT:

      *   Article 2 provides commentary that suggests Burrell''s actions and position
      will lead to negative consequences ("Karma and Fate") for him, directly challenging
      his current standing detailed in Article 1.


