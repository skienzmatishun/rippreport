  whos-on-first:
    brief: 'THE CONFLICT:

      *   Ethics complaint filed against Council President Jack Burrell and Airport
      board member Ray Hix was ruled baseless.

      *   Jack Burrell pressed for an investigation into invoices that saved the city
      thousands of dollars.


      THE DISCOVERY:

      *   The Fairhope Airport Authority''s ground lease agreements are inconsistent,
      featuring multiple conflicting leases (Dec 17th 2015 lease, Dec 21st 2015 Exhibit
      C lease).

      *   The executed lease (Dec 17th 2015) was signed nearly three months before
      the required Ethics Commission Advisory Opinion was issued (March 3rd 2016).

      *   The ground lease documents and terms contradicted the Terms and Conditions
      outlined in the Request for Bids (RFP).


      THE PIVOT:

      *   Article 2 proves that the legal foundation of the airport ground lease,
      specifically involving Ray Hix and Ethics Commission filings, was fundamentally
      flawed and inconsistent with the RFP process, providing a specific actionable
      failure point related to the allegations mentioned in Article 1.


