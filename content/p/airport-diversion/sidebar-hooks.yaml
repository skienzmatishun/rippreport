      work related to the City of Fairhope.

      *   There is suspicion that documents were given by Deborah Smith to Jack, who
      forwarded them.


      THE DISCOVERY:

      *   An ethics opinion (no. 2016-04) was written allowing a lawyer, also a Fairhope
      Airport Board member, to enter into a lease with the Airport Authority.

      *   The Ethics Opinion stated that an Airport Authority member may not use confidential
      information gained from their position to benefit their company/bid.

      *   A memorandum of lease for Mid-Bay Air LLC was signed on December 23, 2015,
      prior to any Ethics Opinion.

      *   The lease is considered null and void because the required report to the
      Alabama Ethics Commission regarding the lease was never filed.


