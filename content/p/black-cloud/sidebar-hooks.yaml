hooks:
  your-rights-your-money:
    brief: 'THE CONFLICT:

      - Sheriff Huey Hoss Mack requested approximately $700,000 in funding for body
      and car cameras to increase transparency.

      - Mack now refuses public access to footage, keeping specific investigative
      materials and video recordings secret.

      - Ethics Commission Executive Director Tom Albritton accused of "self-dealing"
      by using funds from a private charitable trust he helps oversee to pay over
      $100,000 for his children’s college tuition.

      - Circuit Court Judge Thomason accused of holding special circuit court appointments
      for over a decade, exceeding alleged 180-day state law limits.

      - Lagniappe in Mobile filed a request for public release of details regarding
      a 2017 traffic stop and fatal shooting involving the Baldwin County Sheriff’s
      Office.


      THE DISCOVERY:

      - Alabama Supreme Court, via Chief Justice Tom Parker, ruled on a 2021 statute
      allowing BCSO to hide "any materials related to a particular investigation"
      and "items of substantive evidence that existed before the investigation began,"
      including video recordings.

      - The Supreme Court rejected Lagniappe’s request for Sheriff Huey Hoss Mack
      to release details regarding the 2017 fatal shooting.

      - Confirmed connections regarding Mabel Amos Memorial Fund: Tom Albritton, Regions
      Bank, and Covington County Circuit Court Judge Ben Bowden were involved with
      the trust that awarded scholarships.


      THE PIVOT:

      - Article 2 identifies the specific Alabama Supreme Court legal ruling (Chief
      Justice Parker) that provides the exact mechanism Sheriff Mack uses to legally
      refuse footage requested in Article 1.

      - Article 2 confirms the Alabama Supreme Court decision explicitly protects
      pre-investigation evidence, validating Article 1''s claim that Mack can now
      legally refuse taxpayer footage despite the $700k+ spent on body cams.

      - Article 2 corroborates the conflict of interest for Albritton: confirms Judge
      Bowden and Regions Bank connection to the same fund Article 1 flags for potential
      self-dealing.


      KEY ENTITIES:

      - Huey Hoss Mack (Baldwin County Sheriff)

      - Tom Albritton (Ethics Commission Executive Director)

      - Chief Justice Tom Parker (Alabama Supreme Court)

      - Judge Thomason

      - Regions Bank

      - Mabel Amos Memorial Fund

      - Tripp Pittman (State Senator)

      - Ben Bowden (Covington County Circuit Court Judge)'
