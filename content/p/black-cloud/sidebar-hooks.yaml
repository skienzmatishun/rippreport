  letter-to-the-alabama-attorney-general:
    brief: 'THE CONFLICT:

      *   Tom Albritton serves as Executive Director of the Alabama Ethics Commission.

      *   Article "BLACK CLOUD" cites linked Lagniappe piece "License to Steal," alleging
      Albritton allowed a private charitable trust he helps oversee to pay more than
      $100,000 for his children’s college tuition.

      *   Article alleges Albritton used ethics law enforcement power to protect these
      private financial interests (self-dealing).

      *   Baldwin County Sheriff "Boss" Mack requested approximately $700,000 for
      body cameras but denied public access to footage from the same force.

      *   Judge Thomason accused by Burdick in motion for appointing circuit court
      judges repeatedly beyond the 180-day statutory limit.

      *   Francis Paul Ripp stated to AG Steve Marshall in prior meeting that Ethics
      Commission was not investigating complaints.


      THE DISCOVERY:

      *   Francis Paul Ripp sent a formal letter to Alabama Attorney General Steve
      Marshall at 501 Washington Ave, Montgomery.

      *   Ripp enclosed "Lagniappe article SELF-DEALING," an Ethics Complaint, Alabama
      Bar Complaint, and a Writ of Mandamus.

      *   Letter asserts Albritton is one of three trustees and an attorney for the
      Mabel Amos Memorial Fund.

      *   Letter states Mabel Amos Memorial Fund awarded Albritton’s daughters $105,000
      in scholarships to the University of Texas.

      *   Letter cites IRS code violations regarding the Mabel Amos Memorial Fund
      trusteeship and Albritton’s role as an Alabama Attorney.


      THE PIVOT:

      *   Article 1 (Black Cloud) exposes the conflict: Albritton’s trust payments
      and lack of oversight.

      *   Article 2 (Letter) uses that exposure to formally demand state intervention
      against Albritton and the Mabel Amos Memorial Fund.

      *   The $105,000 tuition/scholarship figure is the specific financial evidence
      requested for AG review in Article 2 to prove "self-dealing."

      *   Article 1 identifies the problem; Article 2 submits it as actionable evidence
      to state legal officials.


      KEY ENTITIES:

      *   Tom Albritton (Alabama Ethics Commission)

      *   Francis Paul Ripp (The Ripp Report / Lagniappe Mobile)

      *   Steve Marshall (Alabama Attorney General)

      *   Mabel Amos Memorial Fund

      *   University of Texas

      *   Baldwin County Sheriff “Boss” Mack

      *   Judge Thomason'
