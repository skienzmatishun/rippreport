      notes 9 innocent lives lost and unethical land deals.


      THE DISCOVERY:

      - Article 2 reveals Baldwin County has only one state elected official acting
      on election tampering complaints: John Merrill (AL Sec. of State).

      - Complaints filed with Alabama Judiciary against Judges Michelle Thomason and
      Buddy Bracken: No action taken.

      - Complaints filed with Alabama Bar Association against attorney Steven Johnson:
