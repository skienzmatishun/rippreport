      - In State of the State address, Gov. Ivey stated she alone should appoint the Commissioner so they are a "team player."

      THE DISCOVERY:
      - Article 2 proves Lt. Gov Ainsworth broke with his party (Republicans) over veterans governance.
      - Confirms specific motivation: Ainsworth believes "men and women who have actually worn a uniform should remain in charge."
      - Confirms opposing voices: Senators April Weaver (R-Briarfield) and Chris Elliott (R-Josephine).
      - Confirms House involvement: Rep. Ed Oliver (R-Dadeville) is sponsoring the companion bill in Alabama House of Representatives.
      - Confirms Gov Ivey’s intent to centralize power: Current practice gives board three names for selection; SB67 strips this advice role, leaving Governor with final appointment authority.

      THE PIVOT:
