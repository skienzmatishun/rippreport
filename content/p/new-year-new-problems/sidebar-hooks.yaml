      year of council meetings before voting passed (Councilman Brown was absent).

      * Attempt to create an entertainment district failed with a 2/2 vote (Conyers
      & Burrell in favor; Boone & Robinson against).

      * Council adopted a motion prohibiting any failed item from being brought back
      to the council for 60 days.


      THE DISCOVERY

      * Mayor Karin Wilson supported "Fresh Start Fairhope" on June 21st via social
      media, while the Council remained silent regarding form of government changes
