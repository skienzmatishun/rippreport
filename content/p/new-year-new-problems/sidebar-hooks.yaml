      *   Following the failure, the council adopted a motion preventing failed items
      from being brought back for 60 days.


      THE DISCOVERY

      *   The Catalyst Fairhope Council is characterized as obstructionist and manipulating
      public perception regarding government change.

      *   Article 2 claims the council only took action after the Attorney General
      released an opinion that did not favor the council''s interests.

      *   Catalyst alleges the council has been "asleep at the wheel" on legal ramifications
      for government changes, attempting to cover tracks and delay lawful elections.


      THE PIVOT

      *   Article 1 documents specific procedural failures (e.g., failed votes, motion
      adoption) by the City Council.

      *   Article 2 labels these specific procedures as deliberate, calculated acts
      of obstruction designed to maintain the status quo despite external pressures
      and legal threats regarding government structure change.


