      Catalyst.

      * Ripp has alleged in U.S. District Court that Burrell denied Ripp Amendment
      rights regarding free speech and 14th Amendment rights (due process/equal protection).

      * Chuck Zunk stated the Fairhope City Council was acting as a "free speech censor."


      THE PIVOT

      * Article 2 identifies the specific allegations of censorship and intimidation
