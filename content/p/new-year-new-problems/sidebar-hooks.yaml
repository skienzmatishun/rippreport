      * Charles K. Breland (Property Owner/Plaintiff)

      * Mr. Burrell (City Council Member / Negotiator)

      * Conyers & Robinson (Council Members/Opposing Votes on Entertainment District)

      * City Attorney for Fairhope

      * Fairhope City Council / at large council

      * Dyas (Lawsuit Plaintiff)

      * The Catalyst (Political Organization)'
