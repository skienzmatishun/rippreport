      about rezoning.

      *   A controversial decision by Council President Jack Burrell allegedly involved
      overriding the Mayor’s veto on zoning for the Fly Creek extension and settling
      the Triangle lawsuit in a manner that misrepresented the land purchase to citizens
      as a park.

      *   There are ongoing accusations of council corruption regarding the "disposal"
      of 106 acres of city property valued at $20 million, with allegations that Burrell
