hooks:
  opposition-obstruction:
    brief: 'THE CONFLICT:

      *   Fairhope City Council debated rezoning of property on Greeno road (Green
      Nursery, oldest established business) during a council meeting after the 2018
      change initiative.

      *   The entertainment district proposal—to decriminalize alcohol activity downtown—failed
      with a 2/2 split vote.

      *   Councilman Conyers and Councilman Burrell voted for decriminalization; Councilmen
      Boone and Robinson voted against it (per Main Article).


      THE DISCOVERY:

      *   Recent council actions indicate systematic obstruction by the City Council
      acting as a unit under Council President Jack Burrell’s direction.

      *   On Sept 11, the city council rejected an insurance bid from a company the
      Mayor had recommended.

      *   The refusal to open and resubmit the second bid cost taxpayers $60,000 and
      resulted in lower coverage than available.

      *   Councilman Boone defended the leaking of subpoenaed city documents as "transparency,"
      despite warnings from two lawyers against doing so.


      THE PIVOT:

      *   Article 1 outlines specific political conflict (Entertainment District vote)
      that led to a failure; Article 2 proves this is part of a deliberate pattern
      of opposition rather than isolated disagreement.

      *   Article 2 establishes Burrell''s control over the council ("writing on the
      wall") and reveals financial obstruction ($60,000 insurance bid) alongside issues
      with public participation and information leaks (Boone/transparency), supporting
      the "lack of leadership" claim made in Article 1.


      KEY ENTITIES:

      *   Jack Burrell (Council President / Councilman)

      *   Fairhope City Council

      *   Conyers, Burrell, Boone, Robinson (City Council Members)

      *   $60,000 (Insurance bid cost/loss)

      *   September 11 (Date of insurance bid action)

      *   Greeno road / Green Nursery'
