  fairhopes-blast-from-the-past:
    brief: 'THE CONFLICT

      *   Early 2018 Fairhope City Council obstructed newly elected Mayor and administration
      efforts.

      *   Zoning for "Green Nursery" property on Greeno road passed after a year of
      council meetings (early 2018).

      *   Entertainment district decriminalization proposal failed at a vote split
      2/2 (Conyers/Burrell FOR vs. Boone/Robinson AGAINST).

      *   Council adopted a motion preventing failed agenda items from being brought
      forward for 60 days.

      *   Councilman Brown was absent during the Greeno road zoning discussion without
      excuse.


      THE DISCOVERY

      *   Former and current council members have allegedly united to attempt to reshape
      Fairhope’s government through political maneuvering (The "Bees").

      *   Robert Brown ("The Jester") used inside information regarding Single Tax
      contribution to the Art Center via his partner Cliff Pittman.

      *   Brown awarded a bid for Art Center work to himself and Cliff Pittman, bypassing
      other contractors in a self-dealing conflict of interest.

      *   Jack Burrell faced allegations regarding an "Airport Scandal," denying citizens
      free speech, and threatening McSherry’s owner while drunk at the bar.

      *   Kevin Boone is linked to complex LLC structures and operates as a conduit
      for city knowledge to his son, Scott Boone (head of Catalyst).


      THE PIVOT

      *   The current allegations prove that past political obstruction was driven
      by established factions ("The Bees") who maintain power through entrenched influence
      and unethical self-dealing.

      *   Brown’s alleged contract fraud demonstrates the systemic corruption/conflict
      of interest mentioned in the earlier council debates regarding lack of leadership.

      *   Catalyst''s "at large" election strategy is identified as a mechanism used
      by these entities to prevent accountability, validating the complaints from
      2018 about political obstruction.


      KEY ENTITIES

      *   Boone (Kevin) / Scott Boone (Councilman/Political consultant)

      *   Burrell (Jack Burrell - Council President)

      *   Brown (Robert Brown - "The Jester" / Councilman)

      *   Conyers (Councilman)

      *   Robinson (Councilman)

      *   Catalyst (Political organization)

      *   Cliff Pittman (Director of Single Tax/Construction business partner)

      *   McSherry’s (Bar location)

      *   The Fairhope City Council'
