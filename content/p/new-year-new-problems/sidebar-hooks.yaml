      THE PIVOT

      *   Article 1 details localized political failures (zoning obstruction, failed
      ordinances, lack of leadership). Article 2 explains the systemic, structural
      reason these local decisions hold no democratic weight: the entire government
      apparatus is operating for five years without a single elected official or appointed
      leader having served full terms.

      *   The push to restrict public speech (Agenda Items) directly contradicts the
      need for accountability regarding major failures highlighted in Article 1 (lack
