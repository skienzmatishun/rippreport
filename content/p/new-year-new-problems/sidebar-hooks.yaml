      *   This specific voting session occurred without the attendance of the Mayor
      or Councilman Brown.


      THE DISCOVERY

      *   Municipal elections for Fairhope have not taken place for five years, having
      been postponed by the Alabama legislature (2024).

      *   The current council consists entirely of non-elected personnel, including
      the appointed municipal attorney and judge.

      *   Fairhope is currently facing a critical infrastructure crisis: its sewer
      plant has been beyond capacity since 2020, discharging into the Bay despite
      rapid growth and over 1,000 approved homes.

      *   The City Council is considering an ordinance to eliminate non-agenda public
      participation rights, forcing all commentary to be restricted solely to agenda
