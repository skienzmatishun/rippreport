  fairhope-catalyst-a-dirty-little-secret:
    brief: '1. THE CONFLICT

      *   **Political Structure:** Fairhope City Council operates as an "at Large"
      elected body, which is tied to a political machine called Catalyst.

      *   **Past Obstruction (2018):** A special meeting was held by councilors to
      file an injunction against the October 2, 2018 referendum aimed at changing
      Fairhope''s government form.

      *   **Motivations for Injunction:** Council members used the legal process—specifically
      citing advice from Alabama Attorney General Steve Marshall—to prevent a vote
      on District representation that would break up Catalyst’s "at large" dominance.

      *   **Contemporary Conflict (Main Article):** The current City Council is obstructing
      the newly elected Mayor''s administration and being sued for preventing free
      speech/public participation.


      2. THE DISCOVERY

      *   The Fairhope City Council was historically hand-picked by former Mayor Tim
      Kant and operates under a self-imposed "Catalyst" machine structure designed
      to maintain political control over municipal government, specifically the "At
      Large" system.

      *   Current council voting patterns (e.g., zoning votes on Greeno Road; failed
      2/2 vote on the Entertainment District) are part of this established pattern
      of non-cooperation and poor leadership.


      3. THE PIVOT

      *   The Catalyst machine context reveals that current governmental gridlock—such
      as the entertainment district''s 2/2 split or council obstruction—is not random
      incompetence but a systemic effort by interconnected Council members to maintain
      their powerful "at large" position and prevent structural democratic change
      (like moving to districts).


      4. KEY ENTITIES

      *   Fairhope City Council / Fairhope City Government

      *   Catalyst (political organization/machine)

      *   Tim Kant (former Mayor, source of Catalyst slate)

      *   Conyers

      *   Burrell

      *   Boone

      *   Robinson

      *   Jay Robinson (Councilman and attorney involved in legal maneuvering)

      *   Chuck Zunk (Spokesperson for Fresh Start Fairhope opposing Council actions)

      *   Alabama Attorney General Steve Marshall / AG Steve Marshall'
