    brief: |-
      1. THE CONFLICT: WHAT HAPPENED IN THE PAST? (Names/Dates)
      - Francis Paul Ripp met with Alabama Attorney General Steve Marshall in Fairhope, AL during the last election cycle regarding corruption in Baldwin County.
