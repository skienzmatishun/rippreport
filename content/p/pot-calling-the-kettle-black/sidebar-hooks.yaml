      - Ripp Report claims Marshall’s office did not respond to or investigate the Fairhope councilman complaint personally submitted.
      - Alabama Ethics Commission Director Tom Albritton oversees a private charitable trust (Mabel Amos Memorial Fund).
      - Trust awarded Tom Albritton’s daughters $105,000 in scholarships to the University of Texas.
      - Tom Albritton is paid/used over $100,000 from the same trust for his children’s tuition.
      - Former State Senator Tripp Pittman took $750,000 in BP funds while serving as a trustee.
      - Ripp Report published (2021) evidence labeling Albritton’s actions as self-dealing.

      2. THE DISCOVERY: WHAT DOES THE SECOND ARTICLE PROVE OR REVEAL TODAY?
      - Francis Paul Ripp sent a formal letter to Attorney General Steve Marshall at 501 Washington Ave, Montgomery.
      - Letter cites specific evidence proving Albritton's conflict of interest (Mabel Amos Memorial Fund).
      - Letter confirms Albritton is one of three trustees and an attorney for the trust.
      - Letter lists attached documents: Lagniappe article, Ethics Complaint, Alabama Bar Complaint, Writ of Mandamus.
      - Letter highlights the specific $105,000 scholarship payout to Albritton’s daughters as proof of oversight failure.
      - Letter asserts Ripp Report has a readership of 80,000 and used this public reach to pressure the AG.

      3. THE PIVOT: WHY IS ARTICLE 2 THE 'SMOKING GUN' FOR ARTICLE 1?
      - Article 1 (Main) accuses Tom Albritton of self-dealing as Ethics Director; Article 2 provides the specific transactional proof.
      - Article 1 claims Ripp Report has tried to expose this publicly; Article 2 is the formal legal escalation of that claim.
      - Article 2 proves Article 1's point about AG Marshall’s inaction: Ripp reports that he previously delivered a case personally to AG investigators with no follow-up.
      - Article 2 connects the "pot calling the kettle black" narrative directly to actionable complaints (Bar Complaint/Writ of Mandamus).

      4. KEY ENTITIES: SPECIFIC NAMES, ORGANIZATIONS, LOCATIONS
      - Francis Paul Ripp (Founder of The Ripp Report)
      - Steve Marshall (Alabama Attorney General, 501 Washington Ave Montgomery)
      - Tom Albritton (Director of Alabama Ethics Commission, Trustee)
      - Tripp Pittman (Former State Senator, BP Fund Trustee)
      - Mabel Amos Memorial Fund (Charitable Trust)
      - University of Texas (Recipients of scholarships)
      - Alabama Ethics Commission
      - The Ripp Report
