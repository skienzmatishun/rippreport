      - Article 2 credits Lagniappe as the only publication exposing corruption at high levels (U of A trustees, retired administrators, Ethics Commission trust).
      - Article 2 highlights that Federal/FBI/Courts are ignoring or overlooking these issues, confirming the systemic lack of accountability.
      - Montgomery Circuit Judge Johnny Hardwick recused himself from Ripp Report's Writ of Mandamus case after reading evidence found "very interesting," having been selected by Chief Justice Tom Parker on November 1.
      - Article 2 details that the U of A Board oversaw perks ignoring ethics laws while Albritton simultaneously overlooked similar ethical breaches in public life.

      THE PIVOT
