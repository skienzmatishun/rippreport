      - Article 2 proves the ecosystem Article 1 describes exists: Ethics Director (Albritton), Media, and Legal system mutually protecting each other ("all the parties are aiding and abetting each others conduct").
      - Article 2 validates Article 1’s accusation that the Ethics Commission is acting like a "criminal enterprise" by showing its Director used his oversight role for personal family gain.

