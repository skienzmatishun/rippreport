  shackled-chained-handcuffed-bc-un-family-court:
    brief: '**THE CONFLICT:**

      *   May 20, 2016: Chris Elliott (County commissioner) was arrested in Fairhope
      for DUI after attending a social event at the municipal venue.

      *   2016/2017: David J. "Baloney" Mahoney faced multiple instances of DUI; one
      arrest in Orange Beach was reportedly dismissed because he knew City Judge Julian
      Brackin (City of Daphne).

      *   May 4, 2016: *Baldwin County Legal Eagle* published an article detailing
      the operations of Baldwin Substance Abuse Services, Inc. (BSAS), a non-profit
      formed by judges and attorneys in May 2007; this report claimed BSAS was used
      as a "cash cow" for its incorporators, including Judge Michelle Thomason, who
      had not provided public financials.


      **THE DISCOVERY:**

      *   The second article reveals an ongoing systemic failure of Baldwin County
      judicial processes (Family Court), alleging that judges and attorneys are actively
      engaged in corruption, asset stripping, and disenfranchising voters to benefit
      a "Machine."

      *   Specifically, the Widget Article details Chey Garrigan''s eight-year battle
      against Judge Michelle Thomason’s court system. She alleges Thomason used her
      position as District/Circuit Judge to rubber-stamp questionable legal decisions
      involving attorneys like Steven Johnson and Buddy Brackin for personal gain
      and control over custody issues.

      *   The second article also details a federal lawsuit filed by Austin Burdick
      (representing Chey Garrigan) against Secretary of State John Merrill, claiming
      Thomason''s successions as Circuit Judge exceed the 180-day limit and constitute
      voter disenfranchisement.


      **THE PIVOT:**

      *   Article 1 establishes that Baldwin County has historically operated a flawed
      legal system where DUI arrests lead to "steady income" for attorneys/non-profits
      (BSAS) and local officials like Chris Elliott, suggesting systemic corruption
      is endemic.

      *   Article 2 provides the specific, modern example of this same systemic failure:
      Judge Michelle Thomason’s court, allegedly utilizing high-profile family law
      cases as a mechanism to enrich select attorneys (e.g., Steven Johnson), control
      child welfare outcomes, and undermine the rule of law—a direct continuation
      and escalation of the institutional corruption hinted at in Article 1''s analysis
      of local financial schemes.


      **KEY ENTITIES:**

      *   Judge Michelle Thomason (District/Circuit Judge)

      *   Austin Burdick (Plaintiff/Attorney)

      *   Chey Garrigan (Client/Litigant)

      *   Steven Johnson and Buddy Brackin (Attorneys associated with Thomason''s
      court)

      *   John Merrill (Secretary of State, Defendant in federal suit)

      *   David J. "Baloney" Mahoney (DUI offender)

      *   Chris Elliott (County Commissioner)

      *   Julian Brackin (City Judge)

      *   James Ball (Instructor/BSAS)

      *   Tom Albritton (Executive Director of Alabama Ethics Commission)'
