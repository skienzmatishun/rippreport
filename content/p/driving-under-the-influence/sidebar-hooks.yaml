      \ Thomason** and attorney **James Ball**, who taught mandatory $400 DUI education\
      \ courses.\n\nTHE DISCOVERY: Article 2 reveals the systemic political control\
      \ and lack of accountability held by Sheriff Mack’s BCSO, functioning as \"\
