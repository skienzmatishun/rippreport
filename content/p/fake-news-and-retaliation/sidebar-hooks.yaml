      \ but as an ineffective Mayor (micromanaging) whose agenda is solely dictated by powerful contributors like Arthur Corte and the \"good ole boys,\" thus justifying voter change.\n\n**KEY ENTITIES:**\n*   Mayor Tim Kant\n*   Jennifer Fidler (Former Employee/Witness)\n*   Sherry Sullivan (Former Employee)\n*   Pandora Heathcoat (Accuser/Former Employee)\n*   Arthur Corte (Developer/Major Contributor to Mayor Kant)\n*   Jester 666 / Chucky (Online Commentators/GCN Courier)\n*   Catalyst (Political organization funding GCN Courier)\n*   City Councilman Boone\n*   Jack Burrell (Council Member, Endorsed by Ripp Report for City Council)\n*   Karen Wilson (Endorsed candidate for Mayor change)\n*   Karin Wilson (Endorsed candidate for Mayor change)\n*   Ripp Report / Baldwin County Legal Eagle (Non-profit consumer group/endorser)"
