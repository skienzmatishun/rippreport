      *   McCollum specifically won an award (Best In-Depth News Coverage) from the Virginia Press Association for a series of stories concerning alleged assault on Mayor Karin Wilson by former HR Director (an individual connected to the main article's claims).
      *   Widget Article asserts that Catalyst Fairhope City Council assisted former employees in suing the City "for the sole purpose of humiliating the Mayor," proving the reporting is not objective.

