      *   They are accused of leading the council to install a hiring freeze and slow down budget processes specifically to "PUNISH" Mayor Wilson, suggesting vindictive behavior against her administration.
      *   The article frames this as revenge for the previous political structure ("good ole boy network") losing elections.

      THE PIVOT
