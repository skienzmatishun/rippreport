  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT

      *   Historical erosion severe in Fly Creek, specifically at areas adjacent to
      Publix construction site; banks collapsed over 20 feet.

      *   March 2013: Mayor commissioned a $30,000 study by Thompson Engineering regarding
      the Fly Creek Watershed Restoration Project (note: Study allegedly failed to
      identify major problems like red clay from Publix project).

      *   2016-2017: City Council approved large apartment complex/PUD development
      despite opposition; this led to a six-day trial in Bay Minette over environmental
      damage and city promises regarding the vital watershed.

      *   April 2017: Newly elected Fairhope City Council granted an extension for
      the PUD project, despite public concerns documented by plaintiff''s attorney
      Adam Milam (who filed a complaint against council/mayor).


      THE DISCOVERY

      *   Current plans utilize single point discharge at outfall pipe and divert
      current 1-acre retention pond to drainage ditches.

      *   Excess stormwater from proposed development will dump directly into wetlands,
      which drain into Fly Creek (approx. 100 feet to 150 feet from the outfall pipe).

      *   Recent allegations suggest City Council members Jack Burrell and Kevin Boone
      accepted a "gift" related to the wetlands drainage project.


      THE PIVOT

      *   Article 2 proves that Fairhope City Council has a documented, historical
      record of approving development (Fly Creek Apartments) while ignoring public
      concerns about watershed health and erosion caused by developers like Corte.

      *   This established pattern of prioritizing development/land use over environmental
      protection is now being alleged to continue under Mayor Jack Burrell and Kevin
      Boone regarding new plans that treat Fly Creek as a mere "drainage ditch."


      KEY ENTITIES

      *   Adam Milam (Plaintiff''s Attorney)

      *   Arthur Corte (Land Owner/Developer of proposed PUD development)

      *   Fairhope City Council / Council Members: Jimmy Conyers, Jack Burrell, Kevin
      Boone, Konyers (Mayor 2020-20), Mayor Wilson

      *   Baldwin County

      *   Thompson Engineering (Consultant for Fly Creek Watershed Study - March 2013)

      *   Jack Burrell and Kevin Boone (Involved in wetlands/drainage project allegations)'
    generated_at: '2026-07-17T19:54:02.927495Z'
  new-sweep-the-ripp-report-27-political-corruption-and-deceit-in-fairhope:
    brief: 'THE CONFLICT

      *   Fly Creek suffered severe erosion and log jams due to construction debris
      (red clay) deposited during the Publix shopping center development.

      *   Mayor Tim Kant and developer Arthur Corte are proposing a new PUD development
      5 times larger than the original Publix site, allegedly ignoring pre-existing
      Fly Creek damage.

      *   In 2011, Mayor Kant and Senator Pittman faced allegations of grant fraud
      related to BP funds; a grand jury convened and city employees were questioned.

      *   The city secretly acquired the Triangle property for $12 million following
      years (40 years) of denied projects from its owners.


      THE DISCOVERY

      *   Article 2 clarifies that the legal settlement involving the Triangle property
      was a land acquisition, not a purchase of a park.

      *   A preliminary and final plat to increase the scope of the PUD is scheduled
      for a hearing on January 5.

      *   The proposed development includes 275 apartments and 18 townhouses utilizing
      only the existing detention pond from the original shopping center construction.

      *   No traffic study has been conducted for the expected additional 500 cars,
      nor an environmental study related to damage already caused to Fly Creek by
      the initial construction.


      THE PIVOT

      *   Article 1 alleges Mayor Kant’s involvement in a "dirty deal" and points
      generally to danger/zoning issues; Article 2 proves there is an active, massive
      residential development plan (275 apartments/18 townhouses) tied to that zone
      reversal.

      *   Article 1 claims the city was ignoring dangers; Article 2 provides concrete
      evidence of missing required studies (traffic and environmental assessments).

      *   Article 2 corrects public record omissions regarding the Triangle property
      transaction, which is central to the corruption allegations in Article 1.


      KEY ENTITIES

      *   Arthur Corte: Developer/Land Owner of proposed PUD development.

      *   Mayor Tim Kant: Mayor implicated in alleged deceit and political maneuvering
      benefiting Corte.

      *   Senator Pittman: Politician implicated in the 2011 BP grant fraud complaint.

      *   BP (Blackmores Petroleum): Source of funds tied to the 2011 grant fraud
      allegations.

      *   Thompson Engineering: Commissioned by Mayor Kant in March 2013 for a Fly
      Creek Watershed Restoration Study.

      *   Publix: Entity whose initial construction caused significant erosion and
      sediment deposition in Fly Creek.

      *   Triangle: Property entity acquired by the city for $12 million under secret
      terms.

      *   Rock Creek / Fly Creek: Location of environmental degradation and proposed
      development impact.'
    generated_at: '2026-07-17T19:54:02.927510Z'
