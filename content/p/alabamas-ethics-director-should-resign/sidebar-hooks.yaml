  line-in-the-sand:
    brief: 'THE CONFLICT:

      - Tom Albritton serves as Executive Director of the Alabama Ethics Commission
      and sits on the Mabel Amos Memorial Scholarship Trust board.

      - Attorney General Steve Marshall filed a Civil Filing alleging Albritton improperly
      benefited from the Trust as a “Trustee.”

      - In 2021, complaints were lodged against Albritton (Ethics Complaint, Bar Complaint,
      Writ of Mandamus in Montgomery County Circuit Court) alleging self-dealing.

      - In 2022, Brandon Still ran for Attorney General and made stump speeches regarding
      Albritton’s activities with the Ethics Commission and Trust.

      - A civil lawsuit was filed in Montgomery County Circuit Court by relatives
      of Mabel Amos regarding the handling of the charitable trust.

      - The lawsuit alleges a scheme between Regions Bank and trustee Albritton regarding
      improper scholarships awarded to board members’ children.


      THE DISCOVERY:

      - Lagniappe article confirms Albritton and former law partner Rick Clifton served
      as board members on the trust since its inception after Mabel Amos died in 1999.

      - Financial records cited in the lawsuit show Albritton’s son and daughter received
      at least $120,000 in scholarship money from the trust.

      - Albritton claimed he was not involved in “self-dealing” because he abstained
      from voting on his children’s scholarships, though Lagniappe could not verify
      this claim.

      - Regions Bank fees were massively increased over time, totaling $1.2 million
      taken between 2002 and 2020.

      - Lagniappe verified Ben Bowden, a Covington County Circuit Court Judge and
      Albritton’s former partner, had a child awarded $45,000 in scholarships to SMU
      between 2014 and 2017.

      - The lawsuit alleges John Bell of Regions Bank was involved in a scheme with
      Albritton and Clifton.


      THE PIVOT:

      - Article 1 calls for resignation based on AG allegations and prior complaints
      regarding self-dealing.

      - Article 2 provides specific lawsuit details proving the financial conflict
      (Trustee awarding scholarships to children in his care).

      - Article 2 validates the “smoking gun” nature of Article 1’s allegations by
      confirming through independent litigation that Albritton and his firm benefited
      from the trust as a Board Member.

      - Article 2 links Regions Bank (John Bell) and Judge Ben Bowden to the corruption,
      giving weight to the 2021 Bar Complaints referenced in Article 1.


      KEY ENTITIES:

      - Tom Albritton (Ethics Commission Director, Trustee)

      - Steve Marshall (Attorney General)

      - Brandon Still (AG Candidate 2022)

      - Mabel Amos (Trust Creator/Deceased, died 1999)

      - Regions Bank / John Bell (Bank Representatives)

      - Rick Clifton (Former Law Partner, Trustee)

      - Ben Bowden (Covington County Circuit Court Judge, former Law Partner)'
