      - Raulston claimed Albritton’s children received no scholarships since 2015 (Ripp refutes this via records).
      - Raulston suggested a statute of limitations applied to trust benefits (Ripp disputes this).
      - Letter confirms Trust modifications occurred in 2014: Albritton, two other trustees, and Regions Bank altered trust handling to list schools instead of student names.
      - Letter identifies Circuit Judge Ben Bowden received $45,000 in scholarships for his children (Bowden is a former Albritton law partner).
      - Letter cites 2010 oil discovery ($80M+ value) on Mabel Amos land funding the trust.
      - Ripp notes over $1M in fees charged by Regions Bank for trust management.

      THE PIVOT
      - The August 2022 letter provides the "smoking gun" documentation behind AG Marshall’s recent Civil Filing.
      - Ripp’s letter explicitly details the same "Self Dealing" (trustee/scholarship) allegations Marshall is now alleging publicly.
      - Ripp’s letter documents a pattern of obstruction: no response from agencies Marshall is supposed to oversee (AG, Bar, Ethics Commission) since mid-2022.
      - Raulston’s confession in Jan 2022 confirms the financial impropriety (undisclosed trust benefit) cited as a conflict of interest.
      - Ripp’s letter confirms lawsuits are pending against the trust/Regions Bank, promising damaging discovery that supports Marshall's allegations.

