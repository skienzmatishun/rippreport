  alabama-black-hole:
    brief: "THE CONFLICT\n- Attorney General Steve Marshall filed a Civil Filing (date\
      \ relative to Main Article: \"this Tuesday\") alleging Alabama Ethics Commission\
      \ Director Tom Albritton improperly benefited from the Mabel Amos Memorial Scholarship\
      \ Trust.\n- Marshall alleges Albritton served as a \"Trustee\" of the trust\
      \ from which his children received over $100,000 in scholarships.\n- Reporter\
      \ Francis Paul Ripp of The Ripp Report filed multiple prior complaints against\
      \ Albritton and the Commission in 2021, including:\n  - An Ethics Complaint\
      \ against the Commission.\n  - A Bar Complaint against Albritton for self-dealing\
      \ regarding trust funds.\n  - A Writ of Mandamus in Montgomery County Circuit\
      \ Court to force the Commission to review three complaints they allegedly disposed\
      \ of without investigation.\n- In 2022, Harry Still (R-Baldwin) ran for Attorney\
      \ General against Steve Marshall; still referenced the Ethics Commission, Mabel\
      \ Amos Trust, and Albritton’s activities in stump speeches.\n\nTHE DISCOVERY\n\
      - Francis Paul Ripp wrote a formal letter dated August 21, 2022, addressed to\
      \ Special Prosecution Office (c/o Clark Morris) and Attorney General Steve Marshall.\n\
      - Ripp states that as of the date of the letter, no agencies (AG Office, Alabama\
      \ Bar, Ethics Commission) have replied to his previous appeal.\n- Ripp confirms\
      \ Cynthia Raulston contacted him via telephone in January 2022.\n- During the\
      \ call, Raulston admitted Albritton failed to disclose his multi-million dollar\
      \ trust trusteeship on his economic statement.\n- Raulston claimed Albritton’s\
      \ children received no scholarships since 2015 (Ripp refutes this via records).\n\
      - Raulston suggested a statute of limitations applied to trust benefits (Ripp\
      \ disputes this).\n- Letter confirms Trust modifications occurred in 2014: Albritton,\
      \ two other trustees, and Regions Bank altered trust handling to list schools\
      \ instead of student names.\n- Letter identifies Circuit Judge Ben Bowden received\
      \ $45,000 in scholarships for his children (Bowden is a former Albritton law\
      \ partner).\n- Letter cites 2010 oil discovery ($80M+ value) on Mabel Amos land\
      \ funding the trust.\n- Ripp notes over $1M in fees charged by Regions Bank\
      \ for trust management.\n\nTHE PIVOT\n- The August 2022 letter provides the\
      \ \"smoking gun\" documentation behind AG Marshall’s recent Civil Filing.\n\
      - Ripp’s letter explicitly details the same \"Self Dealing\" (trustee/scholarship)\
      \ allegations Marshall is now alleging publicly.\n- Ripp’s letter documents\
      \ a pattern of obstruction: no response from agencies Marshall is supposed to\
      \ oversee (AG, Bar, Ethics Commission) since mid-2022.\n- Raulston’s confession\
      \ in Jan 2022 confirms the financial impropriety (undisclosed trust benefit)\
      \ cited as a conflict of interest.\n- Ripp’s letter confirms lawsuits are pending\
      \ against the trust/Regions Bank, promising damaging discovery that supports\
      \ Marshall's allegations.\n\nKEY ENTITIES\n- Francis Paul Ripp / The Ripp Report\n\
      - Steve Marshall (Attorney General of Alabama)\n- Tom Albritton (Ethics Commission\
      \ Executive Director / Trustee)\n- Cynthia Raulston (Trustee / Legal Partner\
      \ to Albritton)\n- Clark Morris (Special Prosecution Office contact)\n- Mabel\
      \ Amos Memorial Scholarship Trust\n- Regions Bank\n- Harry Still (Attorney /\
      \ AG Candidate)\n- Ben Bowden (Circuit Judge / Trustee beneficiary's parent)"
