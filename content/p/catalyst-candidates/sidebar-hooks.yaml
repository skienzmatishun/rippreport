  catalyst-held-back:
    brief: 'THE CONFLICT

      *   Event: June 9, 2018 primary election in Baldwin County.

      *   Catalyst had candidates seeded across multiple offices.

      *   Catalyst held over $500,000 behind their candidates.

      *   Outcome: Catalyst only secured three races.


      THE DISCOVERY

      *   Voter turnout was low: 36,073 votes out of 150,104 registered voters (24%).

      *   Financial disparity: Catalyst had over $500,000; People’s Choice had less
      than $10,000.

      *   Electoral outcome contradicted funding: Catalyst failed to secure significant
      victories despite substantial funding.


      THE PIVOT

      *   Article 2 proves that money is not the main factor in elections, contrasting
      with Article 1''s implication of financial power determining success.

      *   The low voter turnout suggests Catalyst’s high funding was ineffective in
      securing wins when compared to the influence of the People’s Choice.


      KEY ENTITIES

      *   June 9, 2018 primary election

      *   Baldwin County Probate Office

      *   Michelle Thomason (Catalyst Queen)

      *   Jeb Ball vs. Frank Burt (County Commission District No. 1) - 1000 vote margin

      *   Joe Davis vs. John Lake (Place 2 race)

      *   Skip Gruber vs. Jerry Johnson (District 4) - 700 vote margin

      *   Judge Scully (60% vote share)

      *   Billie Joe Underwood (People’s Choice) vs. Tucker Dorsey (County Commission
      District 3) - 10% margin

      *   Jody Wise Campbell (Circuit Clerk) vs. Mark Stejskal (Catalyst Candidate)
      - 16% lead for Campbell'
    generated_at: '2026-07-11T06:03:49.775174Z'
  catalyst-birds-of-the-same-feather:
    brief: 'THE CONFLICT

      *   Primary election date: June 9, 2018.

      *   Catalyst was founded by Stacy Elliott and Haygood.

      *   Catalyst evolved when Mr. Chris Elliott became a county commissioner and
      Haygood became Mayor of Daphne.

      *   Catalyst seeks to control Baldwin County government by seeding candidates
      across numerous offices (Probate Judge, State Senate, four Baldwin County commission
      races).


      THE DISCOVERY

      *   Catalyst uses intimidation and bully tactics to discourage non-affiliated
      candidates.

      *   Joe Davis in District two is being supported by Catalyst and Tim Kant.

      *   Tim Kant supported the Fly Creek Apartments development despite local opposition,
      prioritizing developers over citizens/environment.


      THE PIVOT

      *   Article 1 claims Catalyst intends to gain total control; Article 2 proves
      this intent through specific endorsements (Kant supporting Davis) and shows
      how Catalyst utilizes political influence to secure specific outcomes and deals
      (like the Mega-Site).

      *   Article 2 connects the historical structure of Catalyst to current candidate
      support, showing *how* Catalyst executes its plan for power.


      KEY ENTITIES

      *   Catalyst Candidates

      *   Michelle Thomason ("The Catalyst Queen")

