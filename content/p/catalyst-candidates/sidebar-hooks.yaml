  catalyst-intimidation-a-pig-pen:
    brief: 'THE CONFLICT: Catalyst seeks control of Baldwin County government via
      a slate of candidates for the June 9, 2018 primary election.


      THE DISCOVERY: Catalyst operates by destabilizing Fairhope Government through
      political intimidation, attacking the Mayor, and using editor Chuckee Cheeze
      (Gulf Coast Courier) to spread rumors and leak documents without formal Freedom
      of Information requests.


      THE PIVOT: Article 2 reveals the methods (intimidation, document leaks via Cheeze)
      and the history of conflict involving Catalyst, which provides context for why
      Catalyst views political opposition as threats in their "pig pen" strategy mentioned
      in Article 1.


      KEY ENTITIES:

      Catalyst

      June 9, 2018 primary election

      Michelle Thomason (The Catalyst Queen)

      Kevin Boone (Councilman in Fairhope)

      Scott “baby” Boone ("brains" of Catalyst)

      Chuckee Cheeze (Editor, Gulf Coast Courier)

      The Ripp Report

      Jack Burrell (Freedom of Speech lawsuit)'
