hooks:
  catalyst-intimidation-a-pig-pen:
    brief: 'THE CONFLICT:

      *   Prior to the June 9, 2018 local and state primary elections in Baldwin County,
      the Catalyst organization placed numerous candidates across various offices.

      *   The Ripp Report identified Michelle Thomason as "The Catalyst Queen" during
      this period, noting her addition to official candidate lists.


      THE DISCOVERY:

      *   Article 2 reveals that Catalyst operates as a cohesive driving force behind
      a specific slate of candidates (including those targeting County Commission,
      Probate Judge, and District Judge).

      *   It alleges the organization uses political intimidation tactics, including
      removing campaign signs from opposing non-Catalyst candidates.

      *   The article proves connections between Catalyst''s operation and local media
      figures, citing Chuckee Cheeze as an editor for the *Gulf Coast Courier*, used
      to spread rumors against the Mayor of Fairhope.


      THE PIVOT:

      *   Article 1 provided evidence of Catalyst’s strategic candidate placement
      in 2018.

      *   Article 2 transforms this static list into a narrative of intentional, coordinated
      political action, revealing methods (intimidation), operational structure ("good
      ole boys club"), and specific agents like Chuckee Cheeze that link the organization''s
      goals to local government destabilization efforts against incumbents like the
      Mayor.


      KEY ENTITIES:

      *   Catalyst

      *   Ripp Report

      *   Baldwin County Probate Office / Baldwin County Election Coordinator

      *   Michelle Thomason ("The Catalyst Queen")

      *   Chuckee Cheeze (Editor of *Gulf Coast Courier*)

      *   Kevin Boone

      *   "Baby" Boone

      *   Mayor of Fairhope'
    generated_at: '2026-07-18T19:34:14.741239Z'
    text: Catalyst isn't just a group of candidates; it’s a coordinated machine built
      to intimidate and destroy anyone in its path. They use agents like Chuckee Cheeze
      to smear the Fairhope Mayor while Thomason, the "Catalyst Queen," waits to seize
      power and protect her fellow good ole boys.
  catalyst-does-baldwin-county:
    brief: 'THE CONFLICT

      *   The June 9, 2018 primary election listed candidates in Baldwin County for
      Local and State Offices.

      *   "The Ripp Report" added the designation "Catalyst Candidates" to the official
      list provided by the Baldwin County Probate Office (March 2018).

      *   Michelle Thomason was noted as a Catalyst Candidate/Court of Civil Appeals
      judge, referred to as "The Catalyst Queen."


      THE DISCOVERY

      *   Chris Elliott is identified as an architect and candidate for State Senate
      Seat 32.

      *   Elliott has recently given up his County Commission seat while campaigning
      in the runoff.

      *   There are allegations that Chris Elliott was "bought and paid for" by Goat
      Hill.

      *   Eddie Tyler served/is present regarding both Sheriff Hoss Mack (as spouse''s
      employer) and Eddie Tyler as School Superintendent.

      *   Catalyst seeks control of County Commission, State Senate Seat, and the
      city of Fairhope to achieve a "corrupt wheel."


      THE PIVOT

      *   Article 2 provides internal political details showing how Catalyst uses
      high-ranking positions (State Senate candidates/County Commissioners) to exert
      influence in Baldwin County.

      *   It specifically identifies Chris Elliott''s loss of his County Commission
      seat as evidence of Catalyst''s failure or vulnerability, directly connecting
      the candidate warnings from Article 1 with real election outcomes and internal
      power dynamics.


      KEY ENTITIES

      *   Baldwin County (Government Entity)

      *   CATALYST (Political Organization)

      *   Chris Elliott

      *   Michelle Thomason ("The Catalyst Queen")

      *   Hoss Mack (Sheriff/School Superintendent connections mentioned)

      *   Eddie Tyler (School Superintendent/Front and Center figure)

      *   Karin Wilson (Mayor of Fairhope, opposing catalyst rule)

      *   Jeff Boyd (Candidate who came in third)

      *   David Northcutt (Opposing candidate for State Senate Seat 32 run-off)'
    generated_at: '2026-07-18T19:34:14.741249Z'
    text: The Good Ole Boy wheel keeps turning as Chris Elliott trades his commission
      seat for a shot at the State Senate. This corrupt machine wants total control
      over Fairhope, but Elliott’s desperate moves prove Catalyst is terrified of
      losing their grip on our local tax dollars.
  catalyst-held-back:
    brief: 'THE CONFLICT

      - June 9, 2018 primary election in Baldwin County involved multiple "Catalyst
      Candidates."

      - The Main Article expressed concern regarding Catalyst''s widespread presence
      across county and state offices, labeling it a potential threat to local government
      integrity ("Good Ole Boys plan").


      THE DISCOVERY

      - Widget Article details post-election results from the 2018 primary.

      - It proves that despite over $500,000 in reported funding for Catalyst candidates,
      they achieved limited success, winning only three races by narrow margins (e.g.,
      Jeb Ball beating Frank Burt by 1,000 votes).

      - The article shows "People''s Choice" utilized grassroots efforts and social
      media to counter Catalyst''s heavy financial backing.


      THE PIVOT

      - Article 1 established the political threat posed by the concentration of Catalyst
      candidates in Baldwin County government (the risk).

      - Article 2 provided the factual results, revealing that Catalyst failed to
      secure monolithic control or achieve dominant wins against People’s Choice challengers
      (the execution/failure).


      KEY ENTITIES

      - Baldwin County / Baldwin County Probate Office

      - CATALYST

      - People''s Choice

      - Michelle Thomason ("The Catalyst Queen")

      - Elliott (State Senate Seat 32 candidate)

      - David Northcutt (People’s Choice, State Senate Candidate)

      - Judge Scully (won District Court Judge Place no. 2 by 60%)

      - Jeb Ball (County Commission District No. 1 winner)

      - Frank Burt (lost County Commission District No. 1)

      - Joe Davis and John Lake (Place 2 race outcome)

      - Skip Gruber, Jerry Johnson (District 4 race)

      - Mark Stejskal / Christy Edwards / Billie Joe Underwood / Tucker Dorsey (Circuit
      Clerk and District 3 races)

      - Ripp Report'
    generated_at: '2026-07-18T19:34:14.741255Z'
    text: Catalyst spent over half a million dollars to buy Baldwin County, but they
      couldn't beat the will of the people. While Thomason and her cronies expected
      a sweep, grassroots voters sent a clear message by crushing their dreams of
      total political dominance at the ballot box.
  catalyst-birds-of-the-same-feather:
    brief: 'THE CONFLICT

      *   Catalyst began as a political group involving Stacy Elliott and Haygood
      in Baldwin County.

      *   The group evolved ("morphed") when Chris Elliott became county commissioner
      and Haygood served as Mayor of Daphne.

      *   Michelle Thomason was labeled "The Catalyst Queen" in relation to her role
      (Court of Civil Appeals).


      THE DISCOVERY

      *   Catalyst is a structured political organization described as an organized
      entity that "hand picks" candidates rather than merely grouping them by affiliation.

      *   The group’s strategic goal is placing vetted candidates across all levels
      of government, including Probate Judge, State Senate, and Baldwin County commission
      races.

      *   Scott Boone (Fairhope Councilman Kevin Boone’s son) is identified as the
      leader at the helm of Catalyst.


      THE PIVOT

      *   Article 1 presents a curated list of "Catalyst Candidates" for the June
      9, 2018 primary election based on official and Ripp Report additions to candidate
      lists.

      *   Article 2 functions as the ''smoking gun'' by proving this is not just a
      labeling exercise but evidence of coordinated political control. It reveals
      that individuals appearing in Article 1 are part of a deliberate network ("Birds
      of the same feather") designed by Catalyst—founded by figures like Haygood and
      Stacy Elliott—to gain total control over Baldwin County government through calculated
      placement.


      KEY ENTITIES

      *   Catalyst (Political Organization)

      *   Baldwin County Probate Office

      *   Michelle Thomason ("The Catalyst Queen," Judge)

      *   Scott Boone (Leader/Consultant)

      *   Haygood (Mayor of Daphne, General Partner in Catalyst origin)

      *   Stacy Elliott (Original Member of CATALYST)

      *   Chris Elliott (County Commissioner)

      *   Joe Davis (Candidate supported by Catalyst and Tim Kant)

      *   Tim Kant (Fairhope Mayor/Councilman)

      *   John Lake (Competitor for District 2 Commission seat, anti-Catalyst candidate)

      *   Fairhope City'
    generated_at: '2026-07-18T19:34:14.741261Z'
    text: Scott Boone now pulls the strings of a deliberate network designed to hand-pick
      every leader in this county. From former Mayor Tim Kant to the "Catalyst Queen"
      Michelle Thomason, these birds of a feather flock together to ensure the public
      never has a real choice in local government.
  catalyst-meets-social-media:
    brief: '**THE CONFLICT:**

      *   Main Article addressed concerns regarding Catalyst having candidates seeded
      in many offices during the June 9, 2018, primary election in Baldwin County.

      *   The Ripp Report warned against "Catalyst control of our county government"
      and highlighted Michelle Thomason as “The Catalyst Queen” among candidates.


      **THE DISCOVERY:**

      *   Widget Article reveals that social media exposed Catalyst''s goals and players
      beyond just candidate registration numbers.

      *   Specific political defeats: Catalyst lost key members, including their "queen
      bee" Michelle Thomason and Dorsey (Catalyst’s "most worthless bee").

      *   Scandals/Controversies revealed: Elliot faced poor election performance
      (only a 700 vote margin against David Northcutt). Sheriff Hoss Mack and Eddie
      Tyler are reportedly seeking divorce from Elliott.

      *   Local governance issues shown: Catalyst Mayor Haygood instructed city workers
      in Daphne to destroy fiber optic cable feeds due to displeasure with social
      media, leading to council dissatisfaction.

      *   Catalyst''s influence on local races: Haygood (a charter member) influenced
      Joe Davis to run against John Lake in Daphne City Council; Jonathan Armstrong
      was subsequently positioned by Catalyst interests.


      **THE PIVOT:**

      *   Article 1 established the premise of widespread political presence via candidate
      lists (the "what").

      *   Article 2 functions as the ''smoking gun'' by proving the nature and consequences
      of that power (the "how" and "why"), demonstrating how specific members utilized
      their positions (e.g., Haygood’s destruction of city infrastructure, Catalyst-backed
      nominations) rather than merely appearing on ballots during the initial election
      cycle.


      **KEY ENTITIES:**

      *   CATALYST (Political organization/group)

      *   Baldwin County

      *   Michelle Thomason ("The Catalyst Queen")

      *   Elliott

      *   Dorsey

      *   Haygood (Mayor of Daphne, General Partner in political machine)

      *   Karin Wilson (Mayor, Fairhope)

      *   City Council of Fairhope / City Council of Daphne

      *   Joe Davis

      *   John Lake

      *   David Northcutt (Senate Candidate, District 32)

      *   Hoss Mack (Sheriff/GOB member)

      *   Eddie Tyler (Superintendent of Schools)

      *   Jonathan Armstrong'
    generated_at: '2026-07-18T19:34:14.741279Z'
    text: When social media exposed their secret games, former Mayor Haygood got so
      desperate he ordered city workers to destroy Daphne's fiber optic cables. This
      isn't just politics; it’s a temper tantrum from a failing machine that watched
      its "Catalyst Queen" and other cronies fall from power.
  catalyst-vs-the-people:
    brief: '**THE CONFLICT:**

      * Date of focus: June 9, 2018 primary election in Baldwin County.

      * Parties involved: Political group CATALYST vs. public/Ripp Report opposition
      ("Good Ole Boys plan").

      * Catalyst presence: Organization CATALYST seeded candidates across multiple
      offices including Court of Civil Appeals (Michelle Thomason, labeled "The Catalyst
      Queen").


      **THE DISCOVERY:**

      * The Widget Article (dated May 2018) documents a focused and aggressive campaign
      against the CATALYST political group.

      * It suggests that opposition to CATALYST was not limited to simple candidate
      scrutiny but involved framed ideological or systemic conflict ("CATALYST VS
      THE PEOPLE").


      **THE PIVOT:**

      * The Main Article (June 2018) establishes Catalyst''s official presence in
      the election roster as reported by Ripp Report.

      * The Widget Article provides contemporaneous evidence (May 2018) that this
      political organization was already being actively and heavily framed as a threat
      ("CATALYST VS THE PEOPLE") before their candidates were fully established on
      the primary ballot, establishing early adversarial intent.


      **KEY ENTITIES:**

      * Baldwin County

      * CATALYST (Political organization/Group)

      * Michelle Thomason / Judge Thomason (Candidate for Court of Civil Appeals;
      "The Catalyst Queen")

      * Ripp Report / Ripp (Media outlet/Lawsuit Filer/Reporter)

      * Sheriff (Mentioned in context of opposition)'
    generated_at: '2026-07-18T19:34:14.741286Z'
    text: Before the first ballot was even cast, the Ripp Report exposed Catalyst
      as a systemic threat to every citizen in Baldwin County. We saw the "Good Ole
      Boys" plan coming from a mile away, and this early warning was the only thing
      standing between you and a total Catalyst takeover.
  catalyst-players:
    brief: 'THE CONFLICT:

      - 2018 Mid-term elections featured a CATALYST slate of candidates running for
      nearly every Baldwin County office, allegedly attempting to achieve "perfect
      political coup."

      - In the 2016 Fairhope Municipal Elections, CATALYST ran a full slate of candidates
      on the City Council. The council was accused of hiring its own municipal attorney
      and appoining the municipal judge, both affiliated with the group.


      THE DISCOVERY:

      - Article 2 reveals that CATALYST is characterized as a powerful, secretive
      organization operating since at least 2017 (as seen in mentions of Haygood/Elliott
      affiliations).

      - It details specific long-term strategies and personnel ties, including Elliott
      serving as an original member of the political group.

      - It alleges deliberate corruption, specifically that the municipal attorney
      botcheled the McSherry case to protect CATALYST interests.


      THE PIVOT:

      - Article 1 merely identifies individual candidates (such as Michelle Thomason)
      on a specific list for the June 9, 2018 election based on Probate Office data.

      - Article 2 functions as the "smoking gun" because it provides the context of
      systemic control and institutional influence, detailing how CATALYST allegedly
      manipulated appointments, legal outcomes, and municipal structures prior to
      and beyond individual candidate elections in Fairhope (e.g., Mayor Cant being
      the "head of the snake").


      KEY ENTITIES:

      - Baldwin County Probate Office

      - CATALYST (The political organization)

      - Michelle Thomason ("The Catalyst Queen")

      - Haygood (General Partner / Political Group Member)

      - Elliott / Elliot (County Commissioner / Original member of CATALYST)

      - Cant (Former Mayor, linked to Fairhope City Council structure)

      - McSherry (Defendant in the botcheled case)'
    generated_at: '2026-07-18T19:34:14.741292Z'
    text: The 2018 election was just one piece of a larger coup designed to fix legal
      cases and rig municipal appointments. With former Mayor Tim Kant leading the
      way, Catalyst manipulated the system to protect their own interests while leaving
      the public to deal with the fallout of their corruption.
  faux-candidates:
    brief: 'THE CONFLICT

      *   June 9, 2018: Primary election in Baldwin County for local and state offices.

      *   The *Ripp Report* added "Catalyst Candidates" and Michelle Thomason''s title
      as "The Catalyst Queen" to the official list provided by the Baldwin County
      Probate Office.

      *   CATALYST is noted as having candidates seeded in many county offices during
      this period (2018).


      THE DISCOVERY

      *   Current activity: CATALYST utilizes "FAUX candidates"—politicians selected
      by them who operate without claiming membership in CATALYST.

      *   Self-sabotage strategy: CATALYST is actively planning opposition campaigns
      designed to oust existing members, such as Mayor Haygood of Daphne (a former
      original member of the Catalyst group including Stacy and Elliott).

      *   Current influence examples include a pact between Can’t, Sherry Sullivan,
      and Jack Burrell regarding the Fairhope mayoral race.


      THE PIVOT

      *   Article 1 documents CATALYST''s initial penetration into Baldwin County
      politics in 2018 via official election documentation.

      *   Article 2 proves that the organization remains active today by showing its
      evolution from mere candidate placement to a complex, self-correct political
      machine capable of orchestrating internal conflict (ousting former allies like
      Haygood) and manipulating current races using proxy candidates ("FAUX").


      KEY ENTITIES

      *   CATALYST

      *   Ripp Report / Ripp

      *   Baldwin County Probate Office

      *   Michelle Thomason (The Catalyst Queen, Judge)

      *   Mayor Haygood (Daphne, original CATALYST member)

      *   Stacy (original CATALYST member)

      *   Elliott (original CATALYST member, State Senator)

      *   Jack Burrell (Fairhope City Council President/Councilman)

      *   Tim Can''t (Former Mayor of Fairhope)

      *   Sherry Sullivan (Fairhope Mayor)

      *   Lowtower (CATALYST Congressional candidate)'
    generated_at: '2026-07-18T19:34:14.741298Z'
    text: Catalyst has evolved into a self-correcting machine that uses "faux candidates"
      to hide their true agenda from unsuspecting voters. Now, former Mayor Tim Kant
      and his cronies are orchestrating secret pacts to manipulate the Fairhope mayoral
      race and keep their corrupt wheel spinning.
  catalyst-aka-scott-boone-consulting:
    brief: '**THE CONFLICT:**

      *   June 9, 2018 primary election in Baldwin County featured "Catalyst Candidates"
      running for numerous local and state offices, including the Court of Civil Appeals
      seat held by Michelle Thomason ("The Catalyst Queen").

      *   The Ripp Report warns against allowing "Catalyst control" through a stated
      "Good Ole Boys plan."


      **THE DISCOVERY:**

      *   CATALYST has rebranded as Scott Boone Consulting (SBC).

      *   Article 2 asserts that this is not a new entity but the same individuals
      and network behind CATALYST, now attempting to hide under another name.

      *   SBC/Catalyst is accused of being financed by developers and landowners who
      profit from unbridled development while opposing regulations and impact fees.

      *   The group is alleged to be part of a criminal enterprise, potentially linked
      to the "Strawman" land fraud series involving Baldwin County sewer issues.


      **THE PIVOT:**

      *   Article 1 focuses on CATALYST as a collection of campaign candidates in
      the 2018 election cycle.

      *   Article 2 redefines CATALYST from a simple political group into an intricate,
      evolving network ("Scott Boone Consulting") used by specific actors to conceal
      financial transactions and relationships (LLCs). This article provides the "who"
      behind the original candidate list by linking them to ongoing local figures
      like Kevin Boone and Tucker Dorsey via alleged land fraud.


      **KEY ENTITIES:**

      *   CATALYST / CATALYST Candidates

      *   Scott Boone Consulting / Scott Boone

      *   Kevin Boone (Fairhope councilman)

      *   Michelle Thomason ("The Catalyst Queen")

      *   Tucker Dorsey (Former Baldwin County Commissioner; Catalyst Endorsee)

      *   Baldwin County Probate Office

      *   Lagniappe (Publisher of "Strawman" series)'
    generated_at: '2026-07-18T19:34:14.741303Z'
    text: Catalyst rebranded as Scott Boone Consulting to hide their financial ties
      to greedy developers and suspicious land deals. This criminal enterprise uses
      the same old players, like Kevin Boone and Tucker Dorsey, to profit from unbridled
      development while you pay the price.
  catalyst-attack:
    brief: 'THE CONFLICT

      - In 2018, political organization CATALYST was running candidates across various
      Baldwin County offices during the June 9 primary election cycle, including Court
      of Civil Appeals justice Michelle Thomason.

      - The main article warned that "Catalyst Candidates" posed a threat to county
      government integrity due to the perceived "Good Ole Boys plan."


      THE DISCOVERY

      - CATALYST rebranded as Scott Boone Consulting (CSB) after suffering a bitter
      defeat in the congressional race against Jerry Carl.

      - Article 2 reveals CSB is a profit-making political group that funnels over
      one million dollars toward candidate campaigns.

      - CSB acts as the "bank" and money distributor for vetted candidates representing
      developer interests, operating across municipalities including Fairhope, Daphne,
      Spanish Fort, and Bay Minette.


      THE PIVOT

      - Article 1 raised concerns about the pervasive influence of the organization
      CATALYST in local races; Article 2 identifies the precise mechanism of this
      influence—a financial control structure (CSB) managed by Scott Boone that dictates
      which candidates are supported based on developer funding, effectively proving
      their organized manipulation.


      KEY ENTITIES

      - CATALYST

      - Scott Boone Consulting (CSB)

      - Michelle Thomason

      - Jerry Carl

      - Kevin Boone / Mr Boone

      - Developer Entities: Prebble, DR Horton, Columbia Southern, Truland, Corte'
    generated_at: '2026-07-18T19:34:14.741308Z'
    text: Scott Boone now runs a million-dollar political bank designed to funnel
      developer cash into the pockets of vetted puppets. This financial machine dictates
      exactly who wins and loses in Baldwin County, proving that your local government
      is bought and paid for by big money interests.
theme_analysis:
  image_theme: 'The image features a universal prohibition symbol—a red circle with
    a diagonal slash—overlaid on the word "CATALYST." The primary theme is one of
    explicit rejection, warning, and opposition. It functions as a visual "stop" sign,
    conveying an immediate sense of alarm or advocacy. Rather than being neutral,
    the image is designed to signal that the entity it covers is undesirable, prohibited,
    or must be blocked from progress.

    '
  article_theme: 'The core theme of the article is the exposure of a coordinated political
    machine ("Catalyst") attempting to seize systemic control over local government
    through the strategic placement of candidates in multiple offices. The emotional
    core is one of urgent warning and grassroots alarm; it frames Catalyst not as
    a legitimate political movement, but as a "Good Ole Boys" plan designed to monopolize
    power and manipulate the democratic process for their own interests.

    '
  theme_connections:
  - The image serves as a direct visual translation of the article's call to action,
    where the author urges citizens to 'advise your friends' against Catalyst's influence.
    It transforms the investigative reporting into an immediate, actionable command
    for voters to reject these candidates at the ballot box.
  - The prohibition symbol represents a defense against the 'machine' described in
    the sidebar hooks—a coordinated effort to hijack local government. While the article
    provides the evidence of infiltration (the list of names), the image symbolizes
    the broader ideological stance of grassroots resistance against an organized political
    monopoly.
  - By striking through the word Catalyst, the image creates a sense of 'othering,'
    framing the organization as an interloper whose presence is incompatible with
    fair governance. This mirrors the article's tone that the inclusion of these candidates
    on the official list is a threat to be neutralized rather than a standard political
    development.
