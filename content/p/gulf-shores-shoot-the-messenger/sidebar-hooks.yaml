      *   The controversy led to firings, retirements, and resignations of over a dozen employees in Fairhope.
      *   The development was proposed as a high-density, four-story apartment complex.

      THE DISCOVERY
      *   Gulf Shores Planning and Zoning is not following its own Ordinance, specifically Section 3-3E ("Findings and Conclusions").
      *   This failure led to the need to revisit the Regency Place Apartments Site Plan.
      *   City Staff allegedly disregarded the "Land Use Plan" criteria when making recommendations for Site Plans between 2014 and 2016, despite previously referencing it.

      THE PIVOT
      *   Article 2 proves that the alleged oversight regarding the Regency Place Apartments site plan (mentioned in Article 1) was not merely a "technical deficiency" but a deliberate disregard for zoning ordinances and land use plans by City Staff.
      *   This exposes the systemic failure that allowed Fairhope's past mistakes to be replicated in Gulf Shores, validating community complaints against the current administration's response ("Shoot the messenger").

