      *   A six-day trial was held in Bay Minette over the Fly Creek Apartments development.
      *   In October 2016, the City Council endorsed the project.

      THE DISCOVERY:
      *   The trial revealed that the new drainage plan for the apartment complex calls for a single point discharge of excess stormwater directly into Fly Creek wetlands.
      *   This plan involves detouring the current 1 acre retention pond and omitting plans for expansion to a 5 acre pond.
      *   This discharge point is located approximately 100 to 150 feet from the outfall pipe, combining with Publix construction runoff into Fly Creek.

      THE PIVOT:
      *   Article 2 proves that the development approved by previous city officials (as referenced in Article 1) directly results in the pollution and drainage disruption of the vital Fly Creek Watershed.
      *   The physical consequences of the apartment complex's infrastructure are now detailed via legal evidence, contrasting with the political decisions made previously to approve the project without adequate public input.

