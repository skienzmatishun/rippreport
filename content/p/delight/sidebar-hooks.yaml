      - Council Refusal: Fairhope’s “Catalyst” Council and Mayor Wilson repeatedly refused to negotiate or settle Breland/68 Ventures claims despite low-risk settlement offers.

      3. THE PIVOT
      - Why Article 2 is the 'smoking gun' for Article 1:
          - Article 2 provides insider testimony that validates Article 1’s claim of corruption and incompetence.
          - It proves the “changing rules after the fact” accusation is a repeated tactic (Triangle/Breland vs. Gables/Skyline).
          - It exposes Insurance Company involvement: The city was sued for negligence/arbitrariness in the Breland/Triangle cases, proving the conduct was financially reckless.
          - It places blame on specific individuals (Jack Burrell, Cain O’Rear) rather than abstract “Council.”
          - It confirms the $11.25 million loss in Article 1 was not accidental, but the result of O’Rear’s direct lies and the Council’s refusal to negotiate.

      4. KEY ENTITIES
      - Cain O’Rear (Attorney, City Counsel during Triangle case)
      - Jack Burrell (Councilman, identified as "real problem," poor negotiator, K-1 Center manager)
      - Mike Cant (Former Mayor, referred to as "Mayor Can’t")
