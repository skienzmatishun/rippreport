      THE CONFLICT:
      - Fairhope city council and Mayor accused of changing rules after the fact.
      - 10 million dollar lawsuit filed in U.S. District Court for Southern District of Alabama on Oct. 27 by developer 68 Ventures (Cox).
      - Lawsuit concerns denied developments: Gables on Lawrence (~20 acres) and Skyline Village (~16.5 acres).
      - Past Triangle Incident:
        - City lost a two-decade lawsuit regarding Triangle property.
        - Taxpayers paid $8.25 million buyout judgment + ~$3 million legal fees (total $11.25 million).
        - Hand, Anderall & Sale hired as additional counsel; accused of lying to citizens.
        - Attorney Cain O’Rear raised hand in City Council Chambers promising taxpayers city would not pay legal fees; claim proved false.
      - Current allegations: City killing medical marijuana requests, building electric sub station against neighborhood wishes, K-1 center mismanaged.

      THE DISCOVERY:
      - Tunnel Project Presentation confirmed on Monday, March 14 by Scott Hutchinson of Goodwyn, Mills and Cawood.
      - Plan details match allegations of opaque governance:
        - Includes underground tunnel connecting properties on Triangle.
        - Uses a home donated to the city late last year.
        - Beach explicitly left out of plans despite being top citizen request.
      - K-1 Center Confirmed details:
        - Purchased for $4 million without existing plan.
        - Over 50 years old; required ~$100k in temporary roof repairs immediately.
      - Triangle Property Financials Confirmed:
        - Property is 102 acres, valued at ~$20 million.
        - City drained $3 million from utilities to pay Triangle lawsuit (supports Article 1 claims).
      - Airport and Recreation Land:
        - $2.65 million spent on recreation land (City leases for $9,000/year).
        - Land located adjacent to the Airport (elevated lights issue raised).

      THE PIVOT:
      - Article 2 validates specific dollar amounts from Article 1 regarding the Triangle property ($8.25M judgment + $3M legal fees).
      - Article 2 confirms Cain O’Rear’s role and the "no legal fees" lie by detailing how attorneys pledged payment but city got new offices instead.
      - Article 2 links current Council members (Burrell, Boone) to the lost Triangle lawsuit mentioned in Article 1.
      - Article 2 proves current transparency is missing: Master plan presented March 14 excludes beaches and ignores previous citizen demands, matching Article 1's "no long range plan" critique.

      KEY ENTITIES:
      - Cain O’Rear (City Attorney)
      - Hand, Anderall & Sale (Law Firm)
      - Jack Burrell (Councilman/Mayor’s ally/K-1 involved)
      - Boone (Council member who supported Triangle lawsuit)
      - 68 Ventures / Cox (Plaintiff in new $10M lawsuit)
      - Goodwyn, Mills and Cawood (Architects for tunnel plan)
      - Scott Hutchinson (Goodwyn, Mills and Cawood rep)
