      2. THE DISCOVERY:

      *   Lagniappe recently implemented a paywall for online subscribers.

      *   Ripp Report is using shared Lagniappe content in their coverage.

      *   New paywall blocks Ripp Report readers from linking to Lagniappe articles:
      "many of our readers have complained that they cannot link onto the article."


      3. THE PIVOT:

      *   Article 2 serves as the "smoking gun" by linking The Ripp Report directly
      to the content disruption described in Article 1.

      *   While Article 1 states they were blocked by Facebook, Article 2 confirms
      Francis Paul Ripp is actively fighting a similar "blocking" battle with Lagniappe’s
      new paywall.

      *   Proves Ripp Report is the central entity affected by platform gatekeeping
      across both Facebook and Lagniappe online portals.


      4. KEY ENTITIES:

      *   Francis Paul Ripp

      *   The Ripp Report

      *   Lagniappe Mobile (Publisher)

      *   Facebook

