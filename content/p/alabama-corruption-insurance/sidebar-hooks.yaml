      - Documents show documented loans between Ben Freeman and Columbia Mayor; Mayor’s mother-in-law (Senior Center Director).
      - Allegations include illegal favors: forklift loans, free water without account setup, melon deliveries, taxpayer money gifts (ham/flowers).
      - Freeman and officers accused of ethical breaches not prosecuted despite Alabama Bar Association complaints.

      2 THE DISCOVERY:
      - Ripp sends letter directly to Alabama Attorney General Steve Marshall in Montgomery.
      - Letter references past election cycle conversation where Marshall allegedly promised serious complaint handling regarding Baldwin County corruption.
      - Ripp states he personally delivered a case to Marshall’s investigators in Montgomery regarding Fairhope councilman enriching himself.
      - Ripp alleges AG office ignored that specific complaint; Marshall made no independent investigation despite Ethics Commission's belief of the councilman.
      - Letter targets Ethics Director Tom Albritton for self-dealing/IRS violations.
      - Tom Albritton is one of three trustees on the Mabel Amos Memorial Fund.
      - That same fund awarded Albritton’s daughters $105,000 in scholarships.
      - Ripp notes Ethics Commission previously dismissed similar complaints regarding Albritton and others with similar self-dealing conduct.

      3 THE PIVOT:
      - Article 2 validates the structural claims in Article 1 by documenting direct communication with Steve Marshall regarding his failure to investigate.
      - Albritton’s personal financial gain (scholarships) from the fund he oversees proves the "get out of jail free" protection system exists.
      - Ripp uses the Fairhope/Albritton case in Article 2 to demonstrate the exact refusal of investigation against board members that he claims protects Columbia officials in Article 1.

      4 KEY ENTITIES:
      - Francis Paul Ripp (The Ripp Report founder)
      - Steve Marshall (Alabama Attorney General)
      - Tom Albritton (Director of Alabama Ethics)
      - Ben Freeman (Columbia Prosecutor/Lawyer/Mayor's son-in-law)
      - Jim Mock (Columbia Police Officer)
      - Lori Mock (Officer Jim Mock’s wife)
      - Mabel Amos Memorial Fund
