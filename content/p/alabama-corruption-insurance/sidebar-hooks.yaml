  top-shelf-corruption:
    brief: |-
      THE CONFLICT:
      - Columbia, Alabama Mayor and Police Chief Jim Mock subject to corruption allegations including abuse of power and misuse of public funds.
      - Complainant alleges Ben Freeman (Columbia Municipal Prosecutor/Town Lawyer) is the son of the Mayor.
      - Ben Freeman represented Lori Mock (wife of Officer Jim Mock) in a legal matter while holding financial relationships with the Mayor.
      - Freeman reported having "documented loans" with the Mayor of Columbia and his mother-in-law (Senior Center Director).
      - Allegations against Mayor include illegal distribution of town property, unauthorized loans of town equipment (forklift), and free water usage.
      - Complaints filed with Attorney General and Alabama Ethics Commission; Article 1 claims the "corruption insurance" results in a 98% rejection rate for valid complaints.

      THE DISCOVERY:
      - Article 2 reveals Tom Albritton was confirmed as Executive Director of the Alabama Ethics Commission in March 2015.
      - Two children of Tom Albritton received $15,000 scholarships each to the University of Texas from a trust fund overseen by Albritton.
      - Total scholarships distributed to Albritton’s children between 2014 and 2018 equaled $105,000.
      - Article 2 states the Ethics Commission unanimously approved an administrative resolution for a case involving McCallum, forwarding it to Attorney General Steve Marshall.
      - Marshall approved the resolution but withheld criminal investigation; only fines were meted out to McCallum.
      - Article 2 notes Albritton received a "pass" from the Ethics Commission, Alabama Bar, and Attorney General regarding his own conduct.

      THE PIVOT:
      - Article 1 claims the Alabama Ethics Commission and AG are "insurers" that protect officials from prosecution via formal advisory opinions.
      - Article 2 proves the heads of those agencies (Albritton and Marshall) are actively corrupt or conflict-ridden.
      - Albritton managed a trust fund used to pay his children’s education costs while serving as Ethics Director.
      - Marshall, a lawyer who should enforce ethics laws, refused to criminally pursue McCallum’s transgressions.
      - These specific violations validate Article 1's theory that the agencies designed to police corruption are complicit in it.

      KEY ENTITIES:
      - Tom Albritton (Alabama Ethics Commission Executive Director)
      - Steve Marshall (Attorney General of Alabama)
      - Ben Freeman (Municipal Prosecutor/Columbia Mayor's Son)
      - McCallum (Subject of AG resolution)
      - Jim Mock (Columbia Police Officer/Lori Mock's Husband)
      - Lori Mock (Wife of Jim Mock/Ben Freeman’s client)
      - University of Texas
      - Columbia, Alabama
