  alabama-ethics-vs-tony-kennon:
    brief: 'THE CONFLICT:

      Mayor Tony Kennon was involved in an incident on Labor Day 2024 involving an
      employee at 911 and a woman on the Coastal Resources building balcony.

      Local council members, including Councilman Robert Stewart and Councilwoman
      Ginger Harrelson, filed ethics complaints against Mayor Tony Kennan regarding
      interference with public records and legislative items.


      THE DISCOVERY:

      The Alabama Ethics Commission, the Attorney General, the Alabama Bar, and Ethics
      Commission members are alleged to protect politicians through legal maneuvering
      (whitewashing culpability).

      Specific individuals within the ethics system, including Director Tom Albritton
      and commission members Greg Pappas, George Pierce, and David Pruet, were allegedly
      involved in or ignored litigation related to the Mabel Amos Trust.


      THE PIVOT:

      Article 2 reveals that the legal and ethics bodies tasked with investigating
      the fallout from the conflict in Article 1 are themselves corrupt structures
      designed to protect powerful figures like Mayor Kennan and manipulate outcomes
      (e.g., Albritton being forced out of the trust).


