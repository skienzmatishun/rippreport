    text: If you wonder why the 2025 election feels like a battlefield, look at how the Council protects its At-Large power. Jack Burrell and Kevin Boone didn't just ignore Mayor Wilson; they used the Catalyst connection to silence dissent and sue citizens for exercising their rights.
  FAIRHOPE-FREE-YEAR:
    brief: |-
      1. THE CONFLICT: Fairhope City Council and Mayor Sullivan operating for five consecutive years without a valid voter mandate; infrastructure projects approved in 2020 uncompleted while sewer plant beyond capacity discharges into Bay; residents claiming ignored concerns amidst 3-year running water shortage and traffic increases without new roads.

      2. THE DISCOVERY: Alabama legislature postponed municipal elections in 2024; Francis Paul Ripp sued Council President Jack Burrell over speech rights in US District Court for Southern District of Alabama; City settled lawsuit, agreeing to pay Ripp’s attorney fees, American Express charges, accounting and advertising bills.

      3. THE PIVOT: Article 2 substantiates Article 1’s “Ignoring Public Concerns” warning by revealing officials are serving a fifth term without an election vote (2024 delay); filed Ordinance No. 1692 amendment to remove non-agenda public participation, confirming the move to exclude constituents.

      4. KEY ENTITIES: Jack Burrell (Council President), Mayor Sullivan, Francis Paul Ripp (The Ripp Report), Fairhope City Council, Alabama Legislature, Ordinance No. 1692, US District Court for the Southern District of Alabama, American Express Card (legal expense entity).
