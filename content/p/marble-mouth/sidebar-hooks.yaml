      *   Council President Burrell

      *   Councilmen Brown

      *   Mr. Bowers (Boutique Hotel owner)

      *   Mayor Wilson

      *   CATALYST

      *   Tim Kant

      *   Councilman Boone

      *   Fairhope City Council'
