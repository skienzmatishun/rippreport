      costly control and favoritism toward special interests (CATALYST).

      *   Burrell lied about forgetting who proposed disposing of 106 acres of city
      property valued at $20 million.

      *   Burrell led the City Council to override the Mayor’s veto regarding the
      Fly Creek extension zoning.

      *   Burrell settled the Triangle lawsuit and falsely claimed it was a purchase
      of a park.


      THE PIVOT

      *   Article 2 reveals that Burrell’s control has been costly due to his lack
      of leadership and favoritism.

      *   Article 2 explicitly names Burrell as the individual who lied about the
      origin of the 106-acre disposal plan referenced in Article 1.

      *   Article 2 provides context showing Burrell''s pattern of corruption, including
