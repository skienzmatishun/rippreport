      million to settle lawsuits relating to environmental damage caused by developer
      Arthur Corte and Mayor Timothy Kant regarding the Publix Project ($1 million
      in assessed violations).

      • Estimated total cost: At least $11 million, including over $2 million in attorney
      fees, plus additional costs related to cleanup grants (e.g., Fly Creek Restoration
      Project Number Three requesting $19 million).

      • Allegation: Mayor Kant allegedly manipulated the City Council and failed to
      hold developer Arthur Corte accountable for environmental damage across the
      Fly Creek Watershed.


      THE DISCOVERY

      • Contemporary development plans involve an underground tunnel connecting two
      properties on or near the historical Triangle location.

      • The master plan is being advanced by Scott Hutchinson of Goodwyn, Mills and
      Cawood.

      • Confirmation of past legal history: City paid $8.25 million plus $3 million
      in attorney fees as a settlement for the "infamous triangle" lawsuit (totaling
      approximately $11.25 million).


      THE PIVOT

      • The modern development plan involving an underground tunnel shows continued
      developer-driven projects proceeding on or near the land implicated in the original
      Triangle controversy, despite previous legal settlements and alleged corruption
      by Mayor Kant.

      • It links current municipal planning to developers (Scott Hutchinson) who are
      partners with city officials/judges (Martin), echoing patterns of unchecked
      development described in 2013’s report.


      KEY ENTITIES

      • Arthur Corte (Developer/Property Owner - Triangle)

      • Timothy Kant / Mayor of Fairhope

      • City Council (Fairhope)

      • BP (Environmental cleanup claims)

      • Dyas Family (Property sellers)

      • Ripp Report (Publisher, 2013)

      • Scott Hutchinson (Representative for Goodwyn, Mills and Cawood)

      • Martin (Councilman/Developer Partner)

      • Burrell / Boone (City Council Members involved in the Triangle settlement
      vote)

      • City Attorney (Fairhope)'
