  fairhopes-triangle-mega-site:
    brief: 'THE CONFLICT:

      - The Triangle property involved a lawsuit stemming from the relationship between
      Mayor Timothy Kant and developer Arthur Corte.

      - In 2013, Fairhope City purchased the Triangle property for $8.7 million plus
      over $2 million in attorney fees (total effective cost cited as at least $11
      million) to settle legal disputes with the Dyas Family below its appraised value.

      - The purchase was later characterized by critics as a deal masking accountability
      and corruption related to Mayor Kant’s connections and prior involvement in
      scandals like grant fraud/the BP boom scandal.


      THE DISCOVERY:

      - The second article confirms that the Triangle property acquisition was for
      "settling" a lawsuit, directly contradicting claims made by Councilman Burrell
      and Boone that it was a voluntary purchase intended as a City Park or conservation
      easement.

      - The total documented cost of the settlement is quantified at $14.25 million
      ($11.25 million in purchase plus $3 million in legal fees).


      THE PIVOT:

      - While Article 1 (2013) accuses Mayor Kant and the City Council of a "masterful
      pattern of deceit" and hiding the true cost, Article 2 serves as the ''smoking
      gun'' by explicitly stating that local leaders Burrell and Boone lied to the
      community about the property being a voluntary Park settlement.

      - It directly validates the suspicion raised in Article 1 regarding lack of
      accountability, confirming the purchase was an undisclosed legal maneuver rather
      than a transparent public land acquisition process.


      KEY ENTITIES:

      - Fairhope City Council (or specific council members Burrell and Boone)

      - Mayor Timothy Kant

      - Arthur Corte (Developer/Land Owner)

      - Dyas Family

      - BP (environmental cleanup related funds/Restore Act)

      - The Triangle Property/Mega-Site'
