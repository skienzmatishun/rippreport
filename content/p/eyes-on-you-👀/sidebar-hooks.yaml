  go-to-hell-ethics:
    brief: |-
      THE CONFLICT:
      - Ripp Report alleges Mayor Bob Wills of Bay Minette is entering a lease deal with Baldwin County Legislative Delegation (BCLD) for office space in a building he owns.
      - Ripp Report claims initial agreement terms provided $245,000 in rent for the first five years.
      - Ripp Report alleges Mayor Wills added two additional 5-year lease extensions, projecting $867,000 in total rental revenue into his family bank account.
      - Ripp Report alleges the property is worth far less than this valuation suggests self-dealing.
      - State Rep Matt Simpson (BCLD Chairman/Spokesman) publicly stated the lease is “legal” when questioned but could not claim it was ethical or transparent.
      - Ripp Report notes Mayor Wills already has a pending Ethics complaint and a pending Alabama State Bar complaint for past self-dealing.
      - Ripp Report notes Mayor Wills, State Senator Chris Elliott, and Sheriff Hoss Mack are described as being “joined at the hip” regarding Bay Minette police matters and approvals.

      THE DISCOVERY:
      - Baldwin County Commission approved a revised lease agreement between BCLD and Mayor Bob Wills for offices at 125 D’Olive Street, Bay Minette.
      - Initial reported rent cost was $4,090 per month for five years. Revised deal lowered rate to $1,750 per month through December 2027.
      - Brad Hicks, Baldwin County Attorney/Commission Attorney, stated publicly he sees no ethics violation with the lease.
      - Brad Hicks refused to seek an official opinion from the Alabama Ethics Commission or Attorney General, stating he would simply “go to hell with obtaining any opinions” and knows best.
      - The lease grants BCLD access to two offices, two conference rooms, parking, and other amenities in Wills’ longtime law building.

      THE PIVOT:
      - Article 2 proves Ripp Report’s accusation that officials are bypassing oversight: Brad Hicks explicitly rejects the Ethics Commission as a requirement ("I don't get how you can go ahead with this when I'm telling you I have filed complaints... contact Ethics, Attorney General or the legal council for the Speaker of the house and get an official opinion. Instead he just said go to hell"), validating Article 1’s claim that the deal is proceeding despite ethical red flags.
      - Confirmation of a formal lease by Baldwin County Commission (per Article 2) proves the deal described as "suspect" in Article 1 is official and moving forward under Brad Hicks’ approval rather than external review.
      - The specific financials in Article 2 confirm the BCLD is utilizing taxpayer money to rent space directly from a Mayor under scrutiny, reinforcing Article 1’s corruption narrative regarding State Rep Matt Simpson and the BCLD.

      KEY ENTITIES:
      - Bob Wills (Mayor, Bay Minette)
      - Brad Hicks (Baldwin County Attorney/Commission Attorney)
      - Matt Simpson (State Rep, House Ethics & Campaign Finance Committee Chairman Elect)
      - Baldwin County Legislative Delegation (BCLD)
