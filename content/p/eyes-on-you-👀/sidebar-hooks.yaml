      - Letter claims allegations of a “cover up” are “without merit.”
      - Baldwin County Major Crimes Unit (BCMCU) has withheld information; relies on rumors.
      - BCMCU Chairman is Bay Minette Police Chief Al Tolbert (self-investigation).
      - Bay Minette officers scheduled training with AltaPoine Health on mental health de-escalation and firearms conflict resolution following the killing.

