  bayminette:
    brief: |-
      1. THE CONFLICT:
      - Mayor Bob Wills of Bay Minette entered into a lease agreement for the Baldwin County Legislative Delegation.
      - Vote by Baldwin County Commission occurred Tuesday, Nov 16 (Year inferred as late 2023 based on lease start of Jan 1, 2023).
      - Lease property address: 125 D’Olive Street, Bay Minette.
      - Property owner identified as Mayor Bob Wills (Robert A. Wills, Sr.).
      - Term: Jan 1, 2023 to Dec 31, 2027 (5 years).
      - Cost: $49,080 annually ($245,400 total initial).
      - Delegation agreed to pay entire cost; County Commission voted to approve.
      - Previous arrangement: Delegation used Oak Street county-owned building free of charge.

      2. THE DISCOVERY:
      - Widget article confirms Main Article claim that Wills is the landlord, not just a third-party entity.
      - Confirms lease rate matches Main Article claims ($245k range).
      - Commissioner Billie Jo Underwood noted vote was rushed: “This showed up on the agenda very quickly.”
      - Commissioner Jeb Ball stated, “we’re technically providing your space at no cost,” acknowledging public nature of the arrangement.
      - Confirmed Baldwin County Commissioners know Delegation pays full cost, yet still approve via public vote.

      3. THE PIVOT:
      - Article 2 proves Article 1’s core accusation: Self-dealing lease between elected officials and a property owner in their chain of command.
      - Article 2 cites Lagniappe as reporting Wills’ name in deed/lease, whereas Gulf Coast Media initially omitted the ownership conflict.
      - Article 2 confirms ethical vacuum: Alabama Attorney General’s Office and Ethics Commission declined comment when asked about Wills acting as landlord while serving legislative needs.
      - Article 2 confirms conflict of interest: Wills’ role as landlord vs Mayor requesting services from state legislators.

      4. KEY ENTITIES:
      - Bob Wills (Mayor / Robert A. Wills, Sr.)
      - Baldwin County Legislative Delegation (BCLD) / Guy Busby
      - State Rep. Matt Simpson
      - Chris Elliott
      - Sheriff Hoss Mack
      - O.J. French
      - Billie Jo Underwood (Commissioner / Budget Committee Chair)
      - Jeb Ball (Commissioner)
