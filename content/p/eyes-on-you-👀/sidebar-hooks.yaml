    brief: "THE CONFLICT\n\n*   **Event:** Baldwin County Legislative Delegation (BCLD) entered a five-year lease agreement for offices in Bay Minette.\n*   **Lessee:** Baldwin County Legislative Delegation (BCLD), specifically State Rep Matt Simpson (House seat 96, Chairman/Spokesman for the delegation).\n*   **Lessor:** Mayor Bob Wills of Bay Minette, who owns the building.\n*   **Financial Terms (as stated in Main Article):** \n    *   First 5 years: $245,000.00.\n    *   Second 5 years extension: Around $283,000.00 (text specifies \"$283.00\").\n    *   Third 5 years extension: $339,000.00 (text specifies \"$339.00\").\n    *   Stated Total Cost: $867,000.00 in Mayor Wills family bank account potential profit, for a building worth \"far less.\"\n*   **Additional Deals:** Mayor Wills provided two 5-year lease extensions to sweeten the deal.\n*   **Corruption Allegations:** \n    *   Mayor Wills has pending Ethics complaints and State Bar complaints for past \"self-dealing.\"\n    *  \
