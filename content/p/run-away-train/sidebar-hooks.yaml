  stinking-ticking-time-bomb:
    brief: 'THE CONFLICT:

      *   Baldwin County experiences "unprecedented growth" described as a "Runaway
      Train."

      *   Residential unit increase: 545% in the last two years.

      *   Development data includes 1276 lots over 50 subdivisions and 6,600 homes/apartment
      units/vacation rentals underway.

      *   Municipalities (Daphne, Fairhope) operate independently without coordination
      on traffic or planning.


      THE DISCOVERY:

      *   The Baldwin County Sewer Service (BCSS) is the only privately operated,
      unregulated sewer service in Alabama.

      *   BCSS uses county right of ways free and permits/penalties are ignored regarding
      conversion of farmland into subdivisions, accelerating sprawl.

      *   Sewage is being imported to the Fort Morgan facility from Fairhope and Magnolia
      Springs.

      *   Legal actions exist regarding BCSS fraud (Straw-man case involving Clarence
      Burke and Delaney) and alleged hidden debt obligations for Mr. Burke and Corte.


      THE PIVOT:

      *   The unregulated sewer system (BCSS) is identified as the "number one culprit
      to sprawl" converting farmland, which directly fuels the residential growth
      statistics ("Runaway Train") cited in Article 1.

      *   The failure of the County Commission and Planning and Zoning Department
      to regulate BCSS allows uncontrolled development expansion.


      KEY ENTITIES:

      *   Baldwin County Sewer Service (BCSS)

      *   Clarence Burke (President of BCSS, resides in Costa Rica)

      *   Delaney (South Alabama lender)

      *   DR Horton (Assumed management of Bellaton Property Owners Association lots
      in 2012)

      *   Little Lagoon Preservation Society (LLPS)

      *   Fort Morgan facility

      *   Fairhope

      *   Magnolia Springs'
    generated_at: '2026-07-11T00:16:52.515624Z'
  shovel-ready:
    brief: 'THE CONFLICT:

      *   Baldwin County experienced unprecedented residential growth, with 545% increase
      in residential units over two years (Foley).

      *   Residential growth is estimated to bring another 100,000+ residents to an
      estimated 212,000 population in 2017.

      *   Municipalities operate independently (e.g., Daphne and Fairhope decisions
      regarding apartments/traffic) without coordination.


      THE DISCOVERY:

      *   The Baldwin County Economic Development Alliance (BCEDA) is actively promoting
      a "Mega Site" on Interstate 65 near Bay Minette as being "shovel ready."

      *   The Mega Site was a finalist for the Toyota-Mazda complex and represents
      lost revenue/opportunity estimated at $50 million today.

      *   BCEDA appears to be in high gear regarding growth, despite increased traffic,
      degraded quality of life, and insufficient school capacity.


      THE PIVOT:

      *   Article 2 reveals that the BCEDA is leveraging its alliance structure (14
      municipalities, various boards) to push development projects ("Mega Site") while
      the county infrastructure suffers due to uncontrolled residential growth documented
      in Article 1.

      *   BCEDA promotes the Mega Site as "shovel ready," which is presented as a
      false promise given the underlying strain on county services and infrastructure.


      KEY ENTITIES:

      *   Baldwin County

      *   Foley

      *   Fairhope

      *   Miriam Boutwell

      *   Lagniappe Mobile (PLAN)

