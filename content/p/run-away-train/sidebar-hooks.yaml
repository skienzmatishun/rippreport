      *   Fairhope Municipality

      *   Foley

      *   Catalyst Council

      *   Corridor of Chaos (181/Fairhope at Wal-Mart)

      *   Bay Minette

      *   Parker Road

      *   98 (Highway 98)'
    generated_at: '2026-07-11T00:16:52.515606Z'
  paradise-lost:
    brief: 'THE CONFLICT:

      *   Baldwin County operates with 14 independent municipalities and 15 Planning
      and Zoning departments that do not communicate regarding traffic or infrastructure
      decisions.

      *   Residential growth is extreme: Foley reported a 545% increase in residential
      units over two years.

      *   Specific growth figures include: Fairhope (1200 lots in 17 subdivisions),
      Gulf Shores (1382 lots in 17 subdivisions), and Orange Beach being the "most
      single year development in the city’s history" in 2018.

      *   The estimated population of Baldwin County was 212,000 in 2017, with projections
      for an additional 100,000+ people.


      THE DISCOVERY:

      *   Ongoing costs of residential growth are outpacing adequate infrastructure
      development across coastal communities (Daphne/Fairhope, Gulf Shores/Orange
      Beach).

      *   Unchecked development has diminished the quality of life for residents due
      to traffic, congestion, and crowded facilities.

      *   A regional approach utilizing smart growth principles is required to manage
      density and sustain local capacity.

      *   Potential solutions proposed include a trolley system from Gulf Shores to
      the Florida State Line and a ferry system from Fairhope/Daphne to Mobile.


      THE PIVOT:

      *   Article 1 identifies the problem (Runaway Train/uncontrolled growth) but
      offers no solution, relying on an individual attempt (Miriam Boutwell/PLAN).

      *   Article 2 proves that isolated municipal decisions are failing residents
      and infrastructure; it establishes that regional cooperation is necessary to
      protect property values and quality of life.

      *   Article 2 frames the issue not just as growth, but as a failure of governance,
      making the need for regional planning (as advocated by PLAN) a necessity rather
      than an option.


      KEY ENTITIES:

      *   Baldwin County

      *   14 municipalities

      *   14 Mayors

      *   County Commission

      *   Planning and Zoning departments

      *   Daphne

      *   Fairhope

