  baldwin-county-sewer-regulation-a-litmus-test:
    brief: 'THE CONFLICT:

      - 2017: Fairhope City Council heard Baykeepers presentation regarding sewage/water
      testing in Fly Creek Watershed.

      - During the same period, reports surfaced of regular sewer spills and sewage
      dumping into Mobile Bay from subdivisions like Firefly and The Woodlands.

      - Environmental concerns focused on the outfall pipe from Publix dumping directly
      into wetlands.


      THE DISCOVERY:

      - Current consumer issue is that Baldwin County Sewer System (BCSS) operates
      as a monopoly with entirely unregulated fees.

      - BCSS can charge any amount it wishes without limit, potentially reaching $154.50
      per month.

      - Richard Dayton initiated action against this fee structure in GlenLakes subdivision
      in Foley to challenge local elected officials and the monopoly.

      - There is an allegation that former County Commissioner Tucker Dorsey acted
      as an agent of BCSS while holding office.


      THE PIVOT:

      - The environmental degradation (sewer spills, discolored water in Fly Creek
      Watershed) described in 2017 was a direct result of unregulated sewer dumping
      into the bay and wetlands.

      - Article 2 reveals that the systemic lack of municipal oversight is due to
      BCSS operating as an unchecked monopoly with documented influence over local
      government, providing the regulatory environment for pollution.


      KEY ENTITIES:

      - Arthur Corte (Land Owner/Developer)

      - Kevin Boone (Fairhope Councilman/LLC related to Firefly project)

      - Casi Callaway (Director of Baykeeper)

      - Sandy Ford (Resident complainant)

      - Fairhope City Council

      - Fly Creek Watershed

      - Publix

      - Baldwin County Sewer System (BCSS) / BC$$

      - Richard Dayton (Activist/Petition Leader)

      - Tucker Dorsey (Former Commissioner/Agent of BCSS)'
