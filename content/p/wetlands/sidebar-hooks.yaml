  fairhope-sewer-backstory:
    brief: 'THE CONFLICT

      *   2012–2016: Mayor “Can’t,” Councilman Boone, and Councilman Burrell utilized
      utility funds as a slush fund to balance the general fund and pay for lawsuits.

      *   This action resulted in Fairhope losing its senior utility supervisor to
      Daphne and costing the city $3 million to attorneys.

      *   During this period (2012–2016), no infrastructure work was completed on
      the sewer systems, leading to chronic environmental issues like sewage spills
      observed by residents near Firefly subdivision in 2017 (Main Article).


      THE DISCOVERY

      *   The current and persistent failure of Fairhope’s sewer infrastructure is
      revealed not as a recent lapse, but as a direct consequence of financial mismanagement
      and deliberate inaction involving the city''s leadership between 2012 and 2016.


      THE PIVOT

      *   Article 1 highlights current environmental concerns regarding Fly Creek
      and sewage spills, criticizing officials like Mayor Can’t (implied context)
      and Baykeepers for failing to act on citizen complaints. Article 2 provides
      the ''smoking gun'' historical evidence, proving that these specific infrastructure
      failures were allowed to persist because past leaders (Mayor Can’t, Councilman
      Boone, Councilman Burrell) prioritized draining utility funds over necessary
      sewer upgrades for a decade.


      KEY ENTITIES

      *   Mayor “Can’t”

      *   Councilman Boone (former/Kevin Boone)

      *   Councilman Burrell

      *   Arthur Corte (Firefly project owner/Landowner refusing testing)

      *   Casi Callaway (Baykeeper Executive Director, criticized for lack of action
      in Fly Creek area)

      *   Mayor Karin Wilson (current Mayor advocating for infrastructure change since
      2017)'
    generated_at: '2026-07-18T13:56:21.548530Z'
    text: Fairhope residents are paying the price for years of sewage spills and environmental
