      *   The City Council of Fairhope failed to follow up on citizen complaints regarding
      these spills despite Baykeepers testing location issues near Publix outfall
      pipes.


      THE DISCOVERY:

      *   The CATALYST City Council refused to fund the necessary sewer rehabilitation
      and infrastructure repairs since 2016, preventing proper corrective action.

      *   Mayor Karin Wilson stated she requested funding for engineering and technical
      departments but was denied by the council, leading to current lawsuits regarding
      sewer deficiencies in Fairhope.


      THE PIVOT:

      *   Article 1 provides documented evidence of environmental neglect (Fly Creek
      pollution) dating back to at least October 2017. Article 2 reveals that the
      systemic reason for this long-term decay and failure to resolve issues is a
      political refusal by the CATALYST City Council (including Kevin Boone’s alleged
      project involvement with Arthur Corte) to fund essential repairs or hire professional
      engineers required for remediation.


      KEY ENTITIES:

      *   Kevin Boone (Councilman, associated with Arthur Corte''s Firefly LLC)

      *   Arthur Corte (Land Owner/Developer of Firefly Subdivision; refused Baykeeper
      testing on his property)

      *   CATALYST City Council (Political entity that allegedly refused to fund sewer
      rehabilitation since 2016)

      *   Publix (Associated with an outfall pipe dumping into the Fly Creek Watershed
      wetlands)

      *   Casi Callaway / Baykeeper (Environmental organization reporting local pollution)

      *   Karin Wilson (Mayor who advocated for technical and engineering department
      funding starting around 2019/2020)'
