  stinking-ticking-time-bomb:
    brief: 'THE CONFLICT

      *   September 2017: Baykeepers presented data to Fairhope City Council regarding
      sewage dumping into Fly Creek Watershed.

      *   October 9, 2017: Residents reported foul odors and discolored water in the
      Firefly subdivision area of Fly Creek (Fairhope/Sandy Ford).

      *   Historical Inaction: The City of Fairhope, EPA, Dept of Health, ADEM Lance
