      KEY ENTITIES

      *   Arthur Corte: Developer (Land owner of property refusing testing in Fly
      Creek).

      *   Clarence Burke: President of Baldwin County Sewer Service (BCSS); Businessman.

      *   Kevin Boone: Councilman; associated with LLC related to the Firefly subdivision
