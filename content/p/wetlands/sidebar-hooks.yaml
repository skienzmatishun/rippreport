      *   This misuse drained the utility fund and resulted in $3 million paid to
      attorneys without any sewer infrastructure work being done.


      THE DISCOVERY:

      *   The current Catalyst Council is obstructing Mayor Wilson and city employees
      regarding sewer issues.

      *   Baykeepers has been mute on Fly Creek and its watershed for over 10 years
      despite complaints about sewage spills and environmental damage.


      THE PIVOT:

      *   Article 2 proves that systemic misuse of the utility fund (by Can''t, Boone,
      and Burrell) historically prevented necessary sewer infrastructure work. This
      historical failure explains why current environmental problems persist and why
