      THE DISCOVERY

      *   Clarence Burke is the President of BCSS and resides in Costa Rica, meaning
      consumers are paying for his services without oversight.

      *   Legal records indicate a history of financial misconduct involving key figures:
      Bass sued BCSS/Burke/Delaney regarding an alleged Ponzi scheme (The Straw-man
