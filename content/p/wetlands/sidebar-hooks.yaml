hooks:
  can-you-smell-it:
    brief: 'THE CONFLICT:

      *   Fairhope City Council meeting on Oct 9th regarding Fly Creek Watershed testing.

      *   Arthur Corte refused testing on his property.

      *   Residents reported foul odors and discolored water in the Fly Creek Watershed.

      *   City lift stations were problematic in the area.

      *   City officials (City of Fairhope, EPA, Jim Graves, Myron Riley, ADEM Lance
      Leflur, Corp. of Engineers, Glenn Cunningham) failed to respond to citizen complaints.

      *   Councilman Kevin Boone had an LLC related to the Firefly project and dissolved
      it after exposure.


      THE DISCOVERY:

      *   Baykeepers ignored meetings regarding Fly Creek while Tim Kant was Mayor.

      *   The Publix project construction caused Fly Creek to be filled with runoff
      mud, and its outfall pipe dumped directly into the wetlands.

      *   Fairhope spent $13 million upgrading the sewer plant instead of moving it
      inland.

      *   Fairhope utilities paid $10 million for NON-UTILITY expenses during 2015
      and 2016, ignoring necessary infrastructure.

      *   Baykeepers was absent from meetings regarding watershed impact lawsuits.

      *   Another recent sewer spill affected the Fly Creek Watershed.


      THE PIVOT:

      *   Article 2 provides specific financial data ($13 million sewer upgrade vs.
      zero spending on necessary infrastructure) and links specific developers/politicians
      (BP contractors, Sen. Pittman, Mayor Kant) to pollution events (anchors/rope
      in the bay), directly undermining Baykeepers'' purported environmental advocacy
      mentioned in Article 1.


      KEY ENTITIES:

      *   Fairhope City Council

      *   Baykeepers

      *   Arthur Corte

      *   Fly Creek Watershed

      *   Firefly subdivision

      *   City of Fairhope

      *   EPA

      *   Jim Graves

      *   Myron Riley

