      *   Bass: Plaintiff in land fraud case against BCSS, Burke, and Delaney.

      *   Delaney: Prominent South Alabama lender implicated in financial schemes
      with BCSS.

      *   Jody Bishop: Circuit Judge presiding over related civil/fraud cases.

      *   BCSS (Baldwin County Sewer Service): Unregulated private utility.'
