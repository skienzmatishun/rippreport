      *   Glenn Cunningham

      *   Tim Kant (Mayor)

      *   Karen Wilson (New Mayor)

      *   BP contractors

      *   Sen. Pittman

      *   Kevin Boone'
    generated_at: '2026-07-11T08:17:25.854157Z'
  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT

      *   2017: Public complaints regarding sewer spills and sewage dumping into Mobile
      Bay concerning the Fly Creek Watershed.

      *   Fairhope City Council meeting on October 9th, 2017, involving Baykeepers
      testing water in the Fly Creek Watershed.

      *   Arthur Corte refused testing on his property.

      *   Conflict of Interest: Councilman Kevin Boone had an LLC related to the Firefly
      project and dissolved it after exposure.


      THE DISCOVERY

      *   The six-day trial over the Fly Creek Apartments development revealed the
      drainage plan will dump excess stormwater directly into the wetlands, draining
      into Fly Creek 100-150 feet from the outfall pipe.

      *   The new drainage plan omits expansion to a 5 acre pond and detours the current
      1 acre retention pond.

      *   This discharge path combines with Publix drainage.


      THE PIVOT

      *   Article 2 reveals that the Fly Creek Apartments development was designed
      with a specific drainage plan (single point discharge) that directly violates
      environmental concerns raised in Article 1 regarding sewage and wetland contamination,
      showing how a specific development plan caused existing issues.


      KEY ENTITIES

      *   Fairhope City Council

      *   Arthur Corte

      *   Baykeepers

