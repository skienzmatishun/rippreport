hooks:
  can-you-smell-it:
    brief: 'THE CONFLICT

      - Historical environmental issues centered on sewer spills and sewage dumping
      into Mobile Bay, Fairhope, Daphne, and Spanish Fort have occurred as far back
      as 2017.

      - In October 2017, residents from the Firefly subdivision (subdivided by Arthur
      Corte) complained to the Fairhope City Council about foul odors and discolored
      water in the Fly Creek Watershed.

      - The city''s land owner, Arthur Corte, has refused testing on his property
      regarding the watershed’s condition.

      - Concerns also focused on the Publix outfall pipe dumping directly into the
      wetlands along Fly Creek behind The Woodlands.

      - Kevin Boone, a Councilman at the time, had an LLC related to the Firefly project
      which was later dissolved due to exposure of conflicts of interest.


      THE DISCOVERY

      - Article 2 reveals historical instances where Mayor Tim Kant’s administration
      (and others) allegedly ignored environmental concerns regarding Fly Creek.

      - It highlights that Fairhope utilities paid $10 million for non-utility expenses
      in 2015 and 2016, while only $13 million was spent on sewer upgrades rather
      than necessary infrastructure.

      - The discovery identifies BP contractors (Sen. Pittman) as leaving hundreds
      of anchors and feet of rope in Mobile Bay during a spill event, suggesting potential
      connections to political figures (Sen. Pittman and Mayor Kant).

      - It argues that organizations like Mobile Baykeeper were absent from key meetings
      and failed to raise alarms regarding the impact on Fly Creek despite its funding
      and public presence.


      THE PIVOT

      - Article 1 presents observed damage (eroding banks, discolored water) and requests
      scientific testing by Baykeepers due to political inaction (e.g., Case Callaway).

      - Article 2 provides the ''smoking gun'' by introducing the specific names (Sen.
      Pittman/Mayor Kant) allegedly responsible for environmental negligence (the
      BP incident) and detailing a systemic pattern of political self-interest and
      municipal financial mismanagement that renders official complaints ineffective
      or ignored.


      KEY ENTITIES

      Arthur Corte (Developer, Land Owner)

      Kevin Boone (Councilman, Firefly LLC owner)

      Casi Callaway (Director of Baykeeper at time of 2017 meeting)

      Sandy Ford (Resident/Whistleblower in Rock Creek area)

      Tim Kant (Former Mayor)

      Karen Wilson (Mayor)

      Sen. Pittman (State Senator, former BP Trustee)

      Fairhope City Council

      Mobile Baykeeper (Baykeepers)

      Fly Creek Watershed

      Publix

      Daphne

      Spanish Fort'
    generated_at: '2026-07-18T13:56:21.548502Z'
    text: Residents in the Firefly subdivision are choking on the stench of raw sewage
      while developer Arthur Corte blocks property testing. This report uncovers how
      former Mayor Tim Kant and Sen. Pittman prioritized political favors and BP contracts
      over the crumbling Fly Creek infrastructure.
