      THE DISCOVERY

      *   Baldwin County operates an unregulated sewer system (BCSS), which is a private
      monopoly servicing 19,000 homes.

      *   Sewer fees are unregulated and BCSS has the power to charge arbitrary rates,
      potentially threatening service cutoff without regard for customer health.


      THE PIVOT

      *   Article 2 reveals that the environmental failure in Fairhope (local sewage/spills)
      is part of a larger systemic issue: the lack of regulation and monopoly control
      over sewage fees in Baldwin County.

      *   The struggle against unregulated fees (Art 2) demonstrates how political
      influence and corporate structure enable problems like sewer spills and environmental
