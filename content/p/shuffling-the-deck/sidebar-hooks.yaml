  bcso-how-to-become-sheriff:
    brief: |-
      THE CONFLICT:
      - In 2003/2004, BCSO Captain Hoss Mack and investigators (including Anthony Lowery) prosecuted Murray “Bubba” Lawrence Jr. for murder of Brandon Hastings in Baldwin County.
      - Conviction was built primarily on the testimony of Jarius McNeal, who claimed Lawrence killed Hastings.
      - Evidence notes in article: No physical evidence linked Lawrence; no murder weapon produced by prosecution.
      - Conviction and subsequent legal outcome led to Hoss Mack’s promotion from Captain to Sheriff; Anthony Lowery secured tenure and a “cushy Friday paycheck.”

      THE DISCOVERY:
      - New exculpatory evidence found in 2023 (Lagniappe "Digging Deep" investigation) details withheld autopsy results.
      - Original Mississippi autopsy (witnessed by Dean McGowan, John Stewart, Tony Fuqua) listed cause of death as asphyxiation by strangulation.
      - Prosecution (David Whetstone), Judge Robert Wilters, and Sheriff Mack allegedly hid this autopsy report from the defense for 20 years.
      - All three (Mack, Wilters, Whetstone) acknowledge in 2023 they held this evidence but failed to disclose it.
      - Trial transcript (Page 1591): Officer Tony Fuqua testified under oath he possessed no fingerprints, stolen property, weapons, or records linking Murray Lawrence to the victim.

      THE PIVOT:
      - Article 2 provides specific evidence of obstruction and corruption regarding the wrongful conviction cited as the primary flaw in Article 1.
      - Confirms Lowery and Mack were instrumental not just in the prosecution, but specifically in suppressing evidence (Mississippi autopsy) to secure a conviction.
      - Proves that Article 1's claim of Lowery’s "checkered history" is tied directly to the Brandon Hastings case where he and Mack allegedly manipulated justice for promotions and positions.

      KEY ENTITIES:
      - Hoss Mack (BCSO Sheriff/Former Captain)
      - Anthony Lowery (Investigator/Sheriff Candidate)
      - Murray “Bubba” Lawrence Jr. (Wrongfully Convicted Man)
      - Jarius McNeal (Key Witness/Confessor)
      - Dean McGowan (Investigator/Autopsy Witness)
      - Tony Fuqua (BCSO Officer/Defendant Testimony)
      - David Whetstone (District Attorney/Prosecutor)
      - Robert Wilters (Judge)
