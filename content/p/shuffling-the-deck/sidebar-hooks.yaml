  BALDWIN-COUNTY-SHERIFF-APPOINTMENT:
    brief: |-
      THE CONFLICT:
      - Hoss Mack retiring as Baldwin County Sheriff (BCSO).
      - Causes listed in Article 1: Federal investigation, internal investigation, wrongful conviction of Murray Lawrence Jr., federal lawsuit involving Johnathan Victor.
      - Mack’s first choice for replacement: Andre (refused position).
      - Mack’s second choice (stated preference): Anthony Lowery.
      - Murray Lawrence Jr. wrongful conviction details: Article 1 states case happened in "04." Claimed to be the reason Mack got promoted and Lowery kept his job/paycheck.

      THE DISCOVERY:
      - Article 2 confirms Governor's Appointment Office led by Mr. Mason Bass is handling the new Sheriff selection.
      - Article 2 states Hoss Mack is "hoping to slide" Anthony Lowery in as suggested replacement.
      - Article 2 explicitly links Anthony Lowery back to the Murray Lawrence Jr. wrongful conviction: "Anthony Lowery was an investigator in [the] case and had knowledge of the available evidence."
      - Article 2 uses specific deaths to pressure Governor Bass: Peyton Little (strangled), O.J. French (shot by Bay Minette police), Robert Yates (killed during forced eviction).
      - Article 2 mentions Federal lawsuit regarding Johnathan Victor (unarmed, shot 4 times).
      - Mr. Mason Bass is the contact for confidential submissions against Mack/Lowery/BCSO corruption.

      THE PIVOT:
      - Article 1 alleges Anthony Lowery has a “checkered history” and is directly tied to corruption (Lawrence Jr. case).
      - Article 2 turns that allegation into actionable evidence by officially opening a review process with Governor Mason Bass where Lowery’s candidacy is currently being vetted.
      - Article 2 proves the window of opportunity: The allegations in Article 1 (wrongful conviction record) are now direct disqualifiers or accountability items for the appointment process described in Article 2.

      KEY ENTITIES:
      - Hoss Mack (BCSO Sheriff)
      - Anthony Lowery
      - Mr. Mason Bass (Governor’s Appointment Office lead, 600 Dexter Ave., Montgomery Alabama)
      - Murray Lawrence Jr. (Wrongful conviction victim, case from "04")
      - Robert Wilters (Judge involved in Lawrence Jr. and murder trial)
      - David Whetstone (Prosecutor involved in withheld evidence case)
      - Johnathan Victor (Civilian shot by BCSO deputy)
      - Peyton Little (Confidential informant ruled suicide, Lowery quoted at funeral scene)
      - O.J. French / Otis French Jr. (Shot by Bay Minette police, BCSO Major Crimes Unit cleared them)
      - Robert Yates (Died in 2018, excessive force by BCSO SWAT)
