  guilty-audiobook:
    brief: 'THE CONFLICT

      Murray Lawrence Jr. was wrongfully convicted in Baldwin County, Alabama. Involved
      parties include Hoss Mack (Former sheriff), Robert Wilters (Judge in the case),
      and David Whetstone (Infamous prosecutor).


      THE DISCOVERY

      Candidates running for office in Baldwin County elections are linked to individuals
      involved in the wrongful conviction and systemic corruption of the county''s
      legal and law enforcement system.


      THE PIVOT

      The specific figures involved in past injustice serve as evidence that the current
      political structure, voted upon in the elections (e.g., Matt McKenzie, Richard
      Cox, Jeremiah Giles), is built upon or protected by the same institutional misconduct.


      KEY ENTITIES

      Matt McKenzie, Richard Cox, Angelo Fermo, Kevin Brock, Tracey Gambill, Jeremiah
      Giles, Grant Blackburn, Whitney Scapecchi, Terry Waters, Mike Van, Danielle
      Dugger, Joe Freeman, Anthony Lowery, Hoss Mack, Kristy Haygood, Robert Wilters,
      David Whetstone, Maxwell-Tillman Attorneys.'
