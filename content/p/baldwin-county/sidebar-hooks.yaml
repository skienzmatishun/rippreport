hooks:
  baldwin-county-citizens-for-government-accountability-cga:
    brief: 'THE CONFLICT:

      - Baldwin County Sheriff’s Department approved by Commission for $662,567.00
      to purchase 129 body cameras and related technology.

      - Sheriff Hoss Mack’s department rarely releases footage; cited July Alabama
      Supreme Court meeting regarding Jonathan Victor 2017 death incident.

      - Fairhope City Attorney failed to file assault charge for Ronan McSharry three
      separate times.

      - McSharry attorney James Pittman demanding two years of video footage from
      Little Whiskey Christmas Club.

      - Sheriff Mack’s S.I.T. (Special Investigative Team) already investigates internal
      department incidents.


      THE DISCOVERY:

      - Chris Elliott and Eddie Tyler brokered a deal in January 2017 to swap Penny
      Sales Tax percentages with the Baldwin County Commission.

      - Deal expired tax funding May 30, 2018, to allow voters to decide, but Commission
      stepped in.

      - Eddie Tyler admitted at Robertsdale town hall (sponsored by Senator Albritton)
      the deal was made because of "fear the Voters would not approve" permanent tax.

      - County Commission exchange cost BCBOE around $4 million/year ($40 million
      over 10 years) in funding to the County.

      - Chris Elliott’s 2018 campaign raised $483,700 total.

      - Over $352,250 of Elliott’s donations came from 67 PACs including Alabama Realtors
      Political Action Committee.

      - Chris Elliott earns approx $42,000/year for position he holds in system.


      THE PIVOT:

      - Article 2 exposes the Baldwin County Commission as a covert power center,
      proving Article 1’s claim that "politicians are fine with no community engagement."

      - Links both stories: The same Commission that approved Sheriff Mack’s opaque
      camera budget and refused transparency (Article 1) is the body that authorized
      Chris Elliott/Eddie Tyler’s secret tax deal (Article 2).

      - Proves Article 1''s corruption narrative: Officials use "fear of voters" to
      bypass transparency, mirroring how McSharry is allowed to escape accountability
      via legal technicalities despite public camera footage (body cams) being purchased
      with tax dollars.


      KEY ENTITIES:

      - Baldwin County Commission

      - Hoss Mack (BCSO)

      - Chris Elliott

      - Eddie Tyler

      - Ronan McSharry

      - James Pittman

      - Sherry Sullivan (Fairhope)

      - Jack Burrell (Council)

      - Jonathan Victor'
