  Baldwin-County-seeks-public-input-on-land-use-plan:
    brief: 'THE CONFLICT:

      - Sheriff Hoss Mack approved by Baldwin County Commission for $662,567.00 to
      fund 129 body cameras and cloud-based retention tech.

