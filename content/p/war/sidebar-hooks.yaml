  lt-governor-ainsworth-breaks-with-governor:
    brief: |-
      1. THE CONFLICT:
      - Admiral Kent Davis, Director of Veterans Affairs (ADVA), filed an ethics complaint with Alabama Ethics Commissioner Kim Boswell.
      - Governor Kay Ivey declared "war" on Davis, the Veterans Board, and veterans' groups.
      - Governor Ivey fired Admiral Kent Davis despite the Veterans Board refusing to back that action.
      - The state is attempting to strip veteran representation by moving the Veterans Board from an operational governing body to a purely advisory position.
      - The goal is to transfer appointment power of the Commissioner entirely to the Governor instead of a system where veterans' groups provide three names.

      2. THE DISCOVERY:
      - February 11, 2025 – Lt. Governor Will Ainsworth publicly opposes Senate Bill 67 (SB 67).
      - SB 67 is sponsored by State Senator Andrew Jones (R-Centre) at the request of Governor Ivey.
      - SB 67 would allow Gov. Ivey to appoint a new Board and Veterans Commissioner directly ("team player").
      - Confirms the ethics complaint trigger: Ainsworth cites Kent Davis filing a complaint with Kim Boswell as context for the Governor's retaliation.
      - Legislative schedule set: Senate to consider SB 67 when it gavels in at 2:00 p.m. CST (date of publication Feb 11, 2025).

      3. THE PIVOT:
      - Article 2 transforms the Main Article's general political claim into a specific legislative timeline (SB 67).
      - The Lt. Governor’s opposition validates the Main Article's allegation that this is a targeted "power grab" retaliation following the removal of Kent Davis.
      - Confirms Rep. Ed Oliver is sponsoring SB 67 in the House, linking both chambers to this specific restructuring of VA authority.

      4. KEY ENTITIES:
      - Kay Ivey (Governor, R)
      - Will Ainsworth (Lt. Governor, R - Opposing the bill)
      - Kent Davis (ADVA Director/Commissioner - Target of conflict)
      - Kim Boswell (Alabama Ethics Commissioner)
      - Andrew Jones (State Senator, R-Centre - Bill Sponsor)
      - Ed Oliver (House Rep, R-Dadeville - Bill Sponsor)
      - April Weaver (State Senator, R-Briarfield)
      - Chris Elliott (State Senator, R-Josephine)
