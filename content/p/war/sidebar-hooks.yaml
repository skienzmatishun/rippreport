    text: Governor Ivey wants total control over the brave veterans who served this country by stripping their board of any real power. Lt. Governor Ainsworth just blew the whistle on SB 67, exposing it as a dirty revenge plot against Admiral Kent Davis for filing a legitimate ethics complaint against the administration.
  go-to-hell-veterans:
    brief: |-
      1. THE CONFLICT
      - Kay Ivey proposes restructuring State Board of Veterans Affairs to limit veterans representation to an advisory position.
      - New cabinet position proposed for ADVA Director creates structure subservient directly to Governor, stripping current veterans board representation.
      - Accusation that Ivey is retaliating against veteran’s board and ADVA Director Admiral Kent Davis.
      - Specific grievance: Ivey allegedly used “supreme executive power” to remove ADVA Director Admiral Kent Davis.
      - Mobilization: Veteran rally scheduled in Montgomery on Feb 25th at 11:30 to protest bill stripping representation.

      2. THE DISCOVERY
      - Bill restructing State Board of Veterans Affairs passed Alabama State Senate 21-9 earlier this month.
      - Bill passed House 56-39; did not debate when vote of final passage occurred.
      - Sponsor: Rep. Ed Oliver, R-Dadeville (Chairman of House Military and Veterans Affairs Committee).
      - Ethics Complaint: ADVA Commissioner Kent Davis filed complaint against Director Kimberly Boswell of Alabama Department of Mental Health.
      - Complaint details: Accuses Boswell of colluding with officials to divert $7 million from American Rescue Plan Act (ARPA) intended for ADVA.
      - Legislative Motive: Bill explicitly cited as retaliation for ethics complaint filed by Davis regarding Boswell.
      - Historical Context: Rep. Ed Oliver had long-standing issue with ADVA management dating to 2020 showdown over COVID-era protocol at Bill Nichols State Veterans Home in Alexander City.
      - Vote Split: Mobile-area representatives Napoleon Bracy, Chip Brown, Barbara Drummond, Brett Easterbrook, Jennifer Fidler, Donna Givens, Frances Holk-Jones, Chris Pringle, Mark Shirey, Matt Simpson, Shane Stringer and Margie Wilcox all voted against bill.

      3. THE PIVOT
      - Widget article provides concrete proof of the retaliation motive claimed in Main Article by confirming legislation is directly tied to ethics complaint against Kent Davis.
      - Widget article identifies Ed Oliver as the specific House sponsor carrying water for Ivey, reinforcing Main Article’s claim of personal conflict and retaliation.
      - Specifics on $7 million ARPA funds missing from Boswell’s administration validates the “corruption” and motive allegations raised against Ivey and her allies.
      - Confirms Andrew Jones (State Sen) involvement as a favor called in for Ivey regarding this restructuring.

      4. KEY ENTITIES
      - Kay Ivey (Governor)
      - Kent Davis (ADVA Commissioner/Director)
      - Kimberly Boswell (Director, Alabama Dept of Mental Health)
      - Ed Oliver (State Rep, R-Dadeville)
      - Andrew Jones (State Sen, Cherokee County)
      - Alabama State Board of Veterans Affairs
      - Bill Nichols State Veterans Home (Alexander City)
      - American Rescue Plan Act (ARPA)
