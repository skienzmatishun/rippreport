hooks:
  alabama-sec-of-state-the-only-one:
    brief: 'THE CONFLICT

      *   State Rep. Randy Davis was indicted last year on federal conspiracy and
      bribery charges.

      *   Tripp Pittman walked away with $750,000.00 of BP money while Davis faced
      indictment.

      *   Complaints were filed regarding possible election tampering in Baldwin County/Fairhope
      involving Judges Michelle Thomason and Buddy Bracken, attorneys like Steven
      Johnson, and elected officials to the Alabama Judiciary and Ethics Commission.


      THE DISCOVERY

      *   John Merrill, the Secretary of State, took action by having his office monitor
      the 2016 Fairhope election.

      *   The monitoring led to Karin Wilson winning by approximately 600 votes over
      an incumbent mayor.

      *   The Ripp Report submitted complaints to the Alabama Sec. of State for two
      elections (2016).


      THE PIVOT

      *   Article 2 proves that there is a specific, tangible mechanism (John Merrill''s
      action) used to monitor and potentially influence election integrity in Fairhope,
      contrasting with the general failure of the judiciary/DA office to act on other
      corruption complaints against elected officials.


      KEY ENTITIES

      *   Randy Davis

      *   Tripp Pittman

      *   John Merrill (Sec. of State)

      *   Karin Wilson

      *   Michelle Thomason

      *   Buddy Bracken

      *   Steven Johnson

      *   The Ripp Report'
