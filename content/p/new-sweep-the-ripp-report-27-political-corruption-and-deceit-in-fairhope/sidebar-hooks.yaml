      letter from the Ethics Commission concerning the Fairhope BP Boom Grant, leading
      to public accusations of fraud and conflict of interest regarding municipal
      contracts.


      **THE DISCOVERY**

      *   The Widget Article reveals that the supposed "exonerating letter" held by
      Mayor Kant and Senator Pittman is fraudulent; the FBI investigated the BP issue,
      resulting in a Grand Jury referral forwarded to Special Prosecutor Matt Hart
      (AAG white collar division).

      *   Article 2 provides specific details on past ethical breaches involving Mayor
      Kant and Sen. Pittman, such as authorizing emergency debris removal contracts
