  bull:
    brief: 'THE CONFLICT

      - Past Mayor Karen Wilson (2016–2020) refused dual salary positions and reduced
      "good ole boy" connections for city contracts.

      - Current Mayor Sullivan draws full salary as both Mayor and Utility Director
      (historically $90k/$60k split); this role was reinstated after Wilson’s term.

      - Alabama Legislature postponed 2024 municipal elections due to the presidential
      election; officials received a full year of pay, health insurance, and authority
      without an actual vote cast.

      - Current Council reversed Wilson’s gains by allowing co-mingling of City operating
      expenses and Utility budget to subsidize government operations.


      THE DISCOVERY

      - Current administration allowed Council to cut infrastructure funding in 2017
      and 2018 despite expert Utility Operations Director advising more technical
      experience was needed.

      - Council defunded Assistant Superintendent positions in Utilities as they retired:
      Electric (mid-2017), Gas (late 2017), Water & Sewer (Feb 2018).

      - Utility and City finances were co-mingled; profits from utility fees (rated
      rates) were transferred to pay general government expenses, falsely reporting
      massive surpluses.

      - Population increased 32% in one term and another 18% since, while full-time
      Utility Department employees were decreased (FT employee count only went up
      around 3% after deficit hiring).

      - "Working Waterfront" project (Municipal Pier/South Beach Park) is three years
      behind schedule.

      - Mayor and Council are supported by developers while infrastructure (sewer
      plant, water tanks) is prioritized behind parks and tunnels.


      THE PIVOT

      - Article 2 validates Article 1’s accusation of dual-salary corruption by documenting
      the specific financial history (Wilson refusing $60k vs current taking full
      salary).

      - Article 2 provides the specific infrastructure decisions (budget cuts in 2017/2018)
      that prove Article 1’s claim of "taxed infrastructure" and neglect.

      - Article 2 confirms the governance structure (Council, Mayor, Attorney, Judge)
      acts as a monolithic "good ole boy" unit targeting the next election cycle.


      KEY ENTITIES

      - Mayor Sullivan (implied in Metadata, referenced as "The Mayor")

      - Karen Wilson (Former Mayor 2016–2020)

      - Fairhope City Council

      - Alabama Legislature

      - Utility Operations Director (Hired by Wilson’s administration)'
