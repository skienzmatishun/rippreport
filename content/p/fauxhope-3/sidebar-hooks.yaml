  fauxhope-crier:
    brief: 'THE CONFLICT:

      - Fauxhope City Council, Mayor Sullivan, Municipal Judge, and Municipal Attorney
      have not been elected or appointed for their 5th year in office.

      - Alabama legislature postponed municipal elections in 2024 due to the presidential
      election.

      - No single vote was cast for these officials during their 5th year in office
      (full salary, full family health insurance received).

      - Infrastructure neglected: sewer plant overburdened, water tanks/solver ignored.

      - 10 million dollar waterfront project underway; construction company to be
      a supporter in next election.

      - Mayor/Utility Director holds full salary but lacks utility qualifications;
      term length cited as 20 years with taxpayers.


      THE DISCOVERY:

      - Cory Martin has become the new "Crier" and spokesperson for the City Council.

      - Martin introduced an ordinance requiring people annex inside city limits before
      tapping into Fairhope water.

      - Martin is publicly supporting the "Fauxhope Municipal Judges east side project."

      - Martin confirmed infrastructure projects for ALDI and the east side are already
      being worked on by the city.

      - Martin claims: "We actually have a water line that is coming for the ALDI
      store and all of the infrastructure that is coming to the east side... We’re
      not just developing."

      - Article requests State of the City report and Budget Overview links; Article
      2 highlights these documents to question transparency.


      THE PIVOT:

      - While Article 1 establishes the leadership (Mayor, Council) is unaccountable
      due to election irregularities and corruption, Article 2 names the specific
      operative (Cory Martin) executing their agenda.

      - Cory Martin is identified as the face of the "developer support" infrastructure
      push mentioned in Article 1 (the waterfront project and general development).

      - Cory Martin’s advocacy for the Municipal Judge’s east side project aligns
      directly with Article 1’s claim that decisions are prioritized by "very few
      people" and developer interests.


      KEY ENTITIES:

      - Fauxhope / Fairhope City Council

      - Mayor Sullivan (Utility Director)

      - Cory Martin (Councilman/Crier)

      - Alabama Legislature (postponed 2024 elections)

      - ALDI (ALDI store infrastructure projects)

      - Municipal Judge (East side project beneficiary)

      - City Sketches (Propaganda publication mentioned)

      - The Ripp Report (Source of allegations/analysis)'
