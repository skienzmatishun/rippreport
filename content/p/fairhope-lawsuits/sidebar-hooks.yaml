      2606-16 regarding the acquisition of property from Angelo A. Corte (Widget Article).

      *   On April 24th, 2017, Mr. Burrell presided over a meeting where he reviewed
      this resolution after it had been recorded on October 21st, failing to notice
      details (Widget Article).

      *   The "gift" from Angelo A. Corte was revealed to be three-plus acres of wetlands
      and the entire lot, not just the city lift station (Widget Article).

      *   This action occurred while Mr. Burrell''s presence on the Council led to
      criticism regarding his alleged complicity or incompetence in misrepresenting
      the "gift" to citizens (Widget Article).

      *   The current Fairhope City Council is facing potential lawsuits related to
      planning, zoning, and Fly Creek Apartments, with claims of council actions leading
      to obstruction of the Mayor (Main Article).


      **THE DISCOVERY:**

      *   Article 2 proves that previous council sessions, including those led by
      Mr. Burrell (as a presiding officer), involved decisions made without full transparency
      or disclosure of key property details regarding developer Angelo A. Corte''s
      "gift" (Widget Article).

      *   It reveals the Council historically used agenda changes and resolutions
      to advance development interests ("FAIR to the developer") while overriding
      the Mayor’s vetoes and public concern (Main Article/Widget Article).

      *   The Widget Article highlights specific conflicts of interest, such as Mr.
      Boone needing to recuse himself from Fly Creek PUD issues involving Angelo Corte
      (Widget Article).


      **THE PIVOT:**

      *   Article 2 provides historical evidence that the current claims in Article
      1—regarding council obstruction, overriding mayoral vetoes, and hidden dealings
      with developers like Angelo A. Corte (via Triangle/Fly Creek)—are not isolated
      incidents but part of a long-standing pattern of governance by Council figures
      like Mr. Burrell.

      *   It validates the assertion that the City Council actively works against
      the Mayor''s agenda to "prevent her from doing her job" (Main Article/Widget
