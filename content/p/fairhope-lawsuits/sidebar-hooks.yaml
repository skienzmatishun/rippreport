      Council meeting held on August 28, 2017, violating the First and Fourteenth
      Amendments.


      THE PIVOT:

      *   Article 2 provides a specific legal action (Ripp vs. Burrell lawsuit) that
      exemplifies Jack Burrell''s actions and obstruction mentioned in Article 1 regarding
      denial of constitutional rights.

      *   The conflict over free speech rights is a documented instance of the council/Burrell’s
      controversial behavior that fuels the city''s ongoing lawsuits mentioned in
