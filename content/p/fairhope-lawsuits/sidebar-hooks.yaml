      **KEY ENTITIES:**

      *   Fairhope City Council / Fairhope

      *   Mr. Burrell (Jack Burrell)

      *   Mayor Kant (Tim Kant)

      *   Angelo A. Corte

      *   Boone (Sherry-Lea Bloodworth-Botop)

      *   Fly Creek Apartments / Fly Creek PUD

      *   Marion Wynne (City Attorney)

      *   CATALYST (political organization)

      *   Triangle (Land/Property Entity)'
