      overruled decisions made by planning and zoning departments (Main Article).


      THE DISCOVERY:

      - Councilmen Coley M. Boone and Burrell are allegedly slowing down city business
      to "grind the mayor to a halt" (Widget Article).

      - Catalyst Associates was formed on August 11, 2014; Michael Scott Boone (Councilman''s
      son) managed it, and Coley M. Boone was its registered agent (Widget Article).

      - Councilmen are accused of allowing personal friendships to supersede city
      issues and "turning a blind eye" to the majority vote (Widget Article).


      THE PIVOT:

      - Article 1 details that the City Council made costly legal decisions (settlements,
      overriding zoning/planning) following employee firings.

      - Article 2 reveals the specific structural relationship between key council
      members—Cole M. Boone and Burrell—and Catalyst Associates, a political group
      accused of manipulating city governance and undermining Mayor Wilson''s authority
      (Widget Article).


      KEY ENTITIES:

      - Fairhope City Council

      - Burrell / Council President Burrell

      - Coley M. Boone / Michael Scott Boone

      - CATALYST / Catalyst Associates

      - Mayor Wilson

      - Jack (Councilman)'
    generated_at: '2026-07-18T14:36:47.630453Z'
    text: The Fairhope City Council is deliberately grinding city business to a halt
      just to sabotage the current Mayor. The smoking gun is Catalyst Associates,
      a political front managed by Councilman Coley M. Boone’s son that allows the
      Good Ole Boys to trade city progress for personal favors and backroom influence.
