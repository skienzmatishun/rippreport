  alabama-black-hole:
    brief: 'THE CONFLICT

      *   Roy Moore, then Alabama Senator or candidate for Senate, faced significant
      scrutiny regarding his adherence to the rule of law and ethics.

      *   Moore was reported to have violated his oath of office/judiciary twice.

      *   Moore was found guilty of Ethics charges and subsequently removed from the
      bench.

      *   The scandal culminated in Moore losing the Alabama Senate race (the "Moore
      Factor").


      THE DISCOVERY

      *   Tom Albritton, serving as Executive Director of the Ethics Commission, is
      accused of failing to investigate or covering up "Self Dealing" regarding the
      Mabel Amos Trust.

      *   Albritton allegedly failed to disclose on his economic statement that he
      was a trustee for a multi-million dollar trust.

      *   This led to Albritton and other trustees (including Regions Bank) altering
      trust handling in 2014, hiding beneficiaries.

      *   Circuit Judge Ben Bowden, a former law partner of Tom Albritton, reportedly
      received $45,000 through scholarship funds from the trust.

      *   A complaint regarding these allegations was filed on August 21, 2022, with
      Clark Morris/Special Prosecution Office and multiple other state agencies (AG,
      Ethics Commission, Alabama Bar).


      THE PIVOT

      *   The Main Article highlights a public political failure due to an ethics
      scandal involving Roy Moore''s violations.

      *   The Widget Article proves that the institutional mechanism designed to enforce
      those ethical standards—the Ethics Commission led by Tom Albritton—was itself
      compromised and allegedly involved in protecting white-collar crime, including
      financial exploitation of the Mabel Amos Trust and covering up judicial misconduct
      (Ben Bowden).


      KEY ENTITIES

      *   Tom Albritton: Executive Director of Alabama Ethics Commission; trustee
      of Mabel Amos Trust.

      *   Roy Moore: Former Alabama Senator/Judge under ethics scrutiny.

      *   Clark Morris: Attorney General of Alabama; lead recipient of the complaint
      regarding Albritton.

      *   Ben Bowden: Covington County Circuit Court Judge; former law partner of
      Tom Albritton.

      *   Cynthia Raulston: Associate defending Tom Albritton against corruption allegations.

      *   Mabel Amos Trust / Mabel Amos Memorial Fund: Multi-million dollar trust
      involved in the alleged financial self-dealing.

      *   Regions Bank: Institution cited as a trustee and manager for the fund implicated
      in handling alterations.

      *   The Ripp Report/Francis Paul Ripp: Originator of the investigation into
      Albritton''s conduct.'
