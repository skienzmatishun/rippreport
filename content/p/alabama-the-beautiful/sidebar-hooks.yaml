      - The state maintains a prison system with poor conditions, cited as the worst
      or first in the U.S.

      - State policy strongly restricts abortion, refusing exemptions for rape, incest,
      or victims who are minors.

      - Kay Ivey, then Governor, was expected to make decisions regarding these contentious
      legislative bills.


      THE PIVOT

      - Article 1 details a specific political scandal (Roy Moore’s ethics failure)
