      over credential vetting.


      **THE DISCOVERY:**

      *   Article 2 reveals that systemic institutional corruption exists at the highest
      level of state government (Attorney General, Ethics Commission, State Bar).

      *   Tom Albritton, Executive Director of the Alabama Ethics Commission (confirmed
      in March 2015), allegedly oversaw a trust.

      *   Albritton’s children reportedly received $105,000 between 2014 and 2018
      through scholarships from that same trust (990 records).

      *   The Attorney General''s office (led by Steve Marshall) approved requests
      forwarded by the Ethics Commission regarding violations by individuals like
