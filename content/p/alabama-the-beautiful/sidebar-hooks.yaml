  pandemic-corruption:
    brief: 'THE CONFLICT:

      *   Roy Moore was found guilty of ethics charges, violated his oath of office
      twice, and was thrown off the bench from the judiciary.

      *   The Alabama Ethics Commission faced claims that its credibility lacked authority,
      with outgoing member Dr. Stewart Hill Tankersley (2017-10-04) stating three
      members—Jerry Fielding, Frank "Butch" Ellis, Jr., and Charles Price—saw ethics
      as an obstacle rather than a goal.

      *   State Sen. Pittman was linked to skimming $750,000 from BP while serving
      as State Senator / BP Trustee (2019-08-16).


      THE DISCOVERY:

      *   The corruption is not isolated but systemic across state and local leadership,
      involving the Governor’s office, City Councils, and county commissions.

      *   Fairhope City Council is cited for obstructing the Mayor while supporting
      disgruntled employees suing the city and ignoring allegations against political
      allies or fellow councilmen.


      THE PIVOT:

      *   Article 1 focuses on Roy Moore’s individual ethical failure and lack of
      adherence to the rule of law. Article 2 reveals that the institutional checks
      meant to hold politicians accountable (like the Ethics Commission) are fundamentally
      compromised, complicit, or actively working to protect powerful figures rather
      than upholding ethics for the public.


      KEY ENTITIES:

      *   Roy Moore

      *   Dr. Stewart Hill Tankersley

      *   Charles Price

      *   Frank "Butch" Ellis, Jr.

      *   Jerry Fielding

      *   Sen. Pittman

      *   BP (The corporation involved in financial misconduct)

