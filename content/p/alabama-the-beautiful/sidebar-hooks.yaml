  alabama-first-in-political-corruption:
    brief: 'THE CONFLICT

      *   **Roy Moore:** Violated oath of office twice; found guilty of Ethics charges
      and thrown off the bench for breaking the law during the 2017 Senate race timeline.

      *   **Mike Hubbard:** Former Speaker of the Alabama House of Representatives
      (2019-2022); was convicted of 12 felonies three years ago.


      THE DISCOVERY

      *   Article 2 confirms that the state is considered "First in Political Corruption"
      because elected officials evade consequences.

      *   Mike Hubbard remains unjailed despite his conviction, currently appealing
      to the Alabama Supreme Court via his defense regarding legal confusion he helped
      create.

      *   The Alabama Ethics Commission and the Alabama Bar Association are identified
      as failing or complicit in covering up offenses rather than ensuring accountability.


      THE PIVOT

      *   Article 1 identifies the "Moore Factor" as an ethics problem rooted in flawed
      political culture; Article 2 provides a concrete, ongoing example (Hubbard)
      that proves this is not an isolated incident but a systemic failure of state
      judicial and ethical bodies to hold powerful officials accountable.

      *   The existence of Hubbard''s conviction being overturned/appealed despite
      the severity of his crimes confirms the deep institutional rot discussed in
      Article 1 regarding how "bad politicians get elected" or stay in power.


      KEY ENTITIES

      *   Roy Moore: Senator-Elect / Judge (2017); Alabama Senator; Political Candidate.

      *   Mike Hubbard: Former Speaker of the House of Representatives (2019-2022);
      Convicted individual.

      *   Alabama Ethics Commission.

      *   Alabama Bar Association.

      *   Judicial Committee.'
