hooks:
  corruption-is-legal-in-america:
    brief: 'THE CONFLICT:

      • Roy Moore, while serving as a Senator-Elect / Judge in Alabama around 2017,
      was involved in ethics charges and violations of his judicial oath of office
      twice.

      • His loss represented a failure to contain "a tsunami of embarrassing ethics
      investigations" within the Republican party structure during mid-term elections.

      • Alleged corruption issues existed across local entities, including the Fairhope
      Airport Authority scandal, soccer fields, fly creek apartments, lawsuits, and
      sewer plant contracts.


      THE DISCOVERY:

      • Current voting data indicates low civic participation, noting that only 17%
      of voters exercise their right to vote in America, which suggests political
      corruption is flourishing.

      • The existing Alabama Ethics Commission has been deemed "fruitless" in its
      attempt to hold elected officials accountable.

      • Corruption risks are heightened specifically within the 14 municipalities
      and county commission of Baldwin County.


      THE PIVOT:

      • While Article 1 focuses on a specific political figure (Roy Moore) failing
      due to ethical breaches, Article 2 reveals that these failures are symptomatic
      of a larger systemic vulnerability: extremely low voter turnout (17%).

      • This low participation allows corruption to persist across local and state
      governments even after high-profile figures like Moore have been removed.


      KEY ENTITIES:

      • Roy Moore (Senator-Elect / Judge)

      • Baldwin County

      • Fairhope (City/Municipality)

      • Alabama Ethics Commission

      • Ripp Report

      • Doug Jones'
