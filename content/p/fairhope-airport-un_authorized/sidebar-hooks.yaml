  fairhope-airport-authority-flying-without-a-compass:
    brief: |-
      THE CONFLICT:
      *   Ray Hix served as an Airport Authority Board member and Municipal Judge for Fairhope while simultaneously pursuing a lease with Mid Bay Air LLC.
      *   On December 23, 2015, the Airport Authority signed a memorandum of lease with Mid Bay Air LLC (award date around December 2015).
      *   The deal involved conflict of interest concerns regarding Hix utilizing confidential airport information for personal benefit via his company.
      *   In November 2016, a request was made to the Alabama Ethics Commission regarding this specific Mid-Bay Air Lease, which resulted in a Dec. 2, 2016 reply stating "No lease has ever been submitted to us regarding this issue."

      THE DISCOVERY:
      *   The Widget Article proves that significant systemic governance failure at the Fairhope Airport Authority existed prior to the Mid Bay Air scandal.
      *   Specific past incidents include an "illegal meeting" held by the airport authority in October 2015.
      *   Following the illegal meeting, the Fairhope City Council received additional ethics training in November 2015 and was reported to have failed that course.

      THE PIVOT:
      *   The Widget Article functions as historical context, demonstrating a pattern of prior institutional negligence (illegal meetings and failing Ethics courses) at both the Airport Authority and Fairhope City Council, thereby validating the claims of systemic failure concerning oversight and due diligence regarding Hix's lease conflict in late 2015.

      KEY ENTITIES:
      *   Ray Hix (Airport Authority Board Member; Municipal Judge)
      *   Mr Burrell (Councilman; Airport Authority Board member/Ad hoc committee chair)
      *   Mid Bay Air LLC
      *   Fairhope Airport Authority
      *   Joe McEnerey (Chairman of Airport Authority, 2015–)
      *   Pam Caudill (Vice Chair of Airport Authority, 2015–)
      *   Alabama Ethics Commission
      *   City Council of Fairhope
