  jack-box-airport:
    brief: 'THE CONFLICT:

      *   Airport Authority signed a memorandum of lease with Mid-Bay Air LLC on December
      23, 2015.

      *   Board members Jack Burrell and Ray Hix were implicated in a conflict of
      interest regarding a lease.

      *   Ray Hix was the Secretary/Treasurer of the Airport Authority and had privileged
      confidential information regarding leases and bids.

      *   Jack Burrell reviewed the bids and determined an associate board member
      won the lease despite potential conflicts of interest.


      THE DISCOVERY:

      *   The Airport Authority is hiring Ray Hix''s attorney (who prepared the lease)
      to represent the Authority while Ray Hix holds the position of Secretary/Treasurer.

      *   Ray Hix''s attorney was paid by Mr. Hix to prepare a request to the Alabama
      Ethics Commission for an Advisory Opinion regarding the Mid-Bay Air Lease.

      *   Information regarding the Airport Authority was blind copied to Mr. Bailey
      (Mr. Hix''s attorney) after a resident inquired with the Ethics Commission Chief
      Council, Hugh Evens.


      THE PIVOT:

      *   Article 2 reveals that the investigation and defense efforts against the
      Board members (Burrell and Hix) are being financed by the Airport Authority,
      indicating an attempt to quash accountability for the original conflict of interest
      detailed in Article 1.

      *   Article 2 explicitly connects Ray Hix''s attorney, his payment, and the
      request to the Ethics Commission, providing a direct link to the legal mechanisms
      surrounding the questionable lease identified in Article 1.


      KEY ENTITIES:

      *   Jack Burrell

      *   Ray Hix (Secretary/Treasurer)

      *   Mid-Bay Air LLC

      *   Airport Authority

      *   Alabama Ethics Commission

      *   Hugh Evens

      *   Mr. Bailey (Ray Hix''s attorney)'
    generated_at: '2026-07-11T12:46:55.504315Z'
  court-public-opinion-now-session:
    brief: 'THE CONFLICT:

      *   The Fairhope Airport Authority signed a memorandum of lease with Mid-Bay
      Air LLC on December 23, 2015.

      *   Ray Hix was appointed Secretary/Treasurer of the Airport Authority.

      *   Jack Burrell served as City Council President and an Airport Authority Board
      Member who reviewed bids and determined the winner of the lease.

      *   The Alabama Ethics Commission issued an Advisory Opinion on the Mid-Bay
      Air Lease on February 3, 2016.

      *   The Ethics Commission stated that no lease had ever been submitted regarding
      this issue (Dec 2, 2016).


      THE DISCOVERY:

      *   A complaint compiled by the Court of Public Opinion alleges bid rigging
      and collusion among Airport Authority Board members regarding the Mid-Bay Air
      LLC lease process.

      *   Jack Burrell is accused of aiding and abetting the flawed RFP bid process.

      *   Burrell allegedly made numerous flights on aircraft provided by Hix/Snedeker
      companies (Mid-Bay Air LLC).

      *   The execution of the lease occurred on December 17, 2015, prior to the Ethics
      Advisory Opinion (February 3, 2016).


      THE PIVOT:

      *   Article 2 provides specific evidence and allegations linking Jack Burrell
      directly to the bid rigging and confirming that Board members colluded.

      *   It connects Burrell''s alleged personal travel with Hix/Snedeker aircraft
      to his official role, proving a conflict of interest that was overlooked in
      Article 1.


      KEY ENTITIES:

      *   Jack Burrell (City Council President, Airport Authority Board Member)

      *   Ray Hix (Airport Authority Secretary/Treasurer)

      *   Mid-Bay Air LLC (Hix/Snedeker Companies)

      *   Fairhope Airport

      *   Alabama Ethics Commission

      *   Executive Aviation

      *   Court of Public Opinion'
    generated_at: '2026-07-11T12:46:55.504321Z'
  whos-on-first:
    brief: 'THE CONFLICT:

      *   Fairhope Airport Authority signed a memorandum of lease with Mid-Bay Air
      LLC on December 23, 2015.

      *   Jack Burrell, a Board Member, reviewed bids and determined an associate
      board member was the winner.

      *   Board members resigned on August 7, 2015.

      *   The Airport Authority sought an Advisory Opinion from the Alabama Ethics
      Commission regarding the Mid-Bay Air Lease around November 8, 2016.


      THE DISCOVERY:

      *   Article 2 reveals procedural inconsistencies proving the lease is null and
      void due to failure to follow rules.

      *   The request for the Ethics Advisory Opinion was made (December 16, 2015)
      before the lease was executed (December 17, 2015).

      *   The Advisory Opinion was issued on March 3, 2016, *after* the lease execution.

      *   The executed lease was filed with the Ethics Commission on March 8, 2016,
      over 60 days late (deadline was ten days after entry).

      *   There are multiple inconsistent leases submitted for the same RFP (Exhibit
      B, Exhibit C, and the December 17, 2015, lease), contradicting Terms and Conditions
      of the RFP.


      THE PIVOT:

      *   Article 1 concludes the lease is null and void based on a conflict of interest/lack
      of due diligence.

      *   Article 2 provides the specific evidence that the Authority failed to adhere
      to both its own RFP terms and the Ethics Advisory Opinion requirements regarding
      filing deadlines and the validity of the submitted documents.


      KEY ENTITIES:

      *   Jack Burrell

      *   Joe McEnerey (Chairman)

      *   Pam Caudill (Vice Chair)

      *   Ray Hix (Secretary/Treasurer)

      *   Mid-Bay Air LLC

      *   Alabama Ethics Commission

      *   Dennis R. Bailey (Attorney)

      *   Fairhope Airport Authority

      *   Exhibit B, Exhibit C

      *   RFP (Request for Bids)'
    generated_at: '2026-07-11T12:46:55.504326Z'
  stirring-the-pot:
