  captain-jack-at-the-controls:
    brief: 'THE CONFLICT:

      *   On December 23, 2015, the Airport Authority signed a memorandum of lease
      with Mid-Bay Air LLC.

      *   Board member Ray Hix was privy to confidential information regarding airport
      leases, bids, and financial information.

      *   Ray Hix proceeded with the lease as Mid Bay Air LLC despite an obvious conflict
      of interest.

      *   Jack Burrell set up an ad hoc committee chaired by himself to review bids,
      ignoring ethics issues.

      *   The Alabama Ethics Commission replied on December 2, 2016, stating, "No
      lease has ever been submitted to us regarding this issue."


      THE DISCOVERY:

      *   Millions of development dollars from federal agencies expanded the airport
      with additional runways and long-term hangar leases.

      *   Captain Jack Burrell allegedly received free air miles and golf vacations
      from a board member while overseeing the bid process for that same board member.

      *   The Airport Authority receives 7 cents on the dollar as fuel income from
      lease holders.

      *   There is no record of what fuel is being used or how the 7 cents are collected
      by the Authority.

      *   The Fixed Based Operator does not share gallons consumed with the Authority,
      preventing payment records.


      THE PIVOT:

      *   Article 2 proves that the conflict of interest involving the lease (Article
      1) was compounded by operational financial opacity and potential personal enrichment
      involving Captain Jack Burrell and board members overseeing hangar leases.


      KEY ENTITIES:

      *   Jack Burrell

