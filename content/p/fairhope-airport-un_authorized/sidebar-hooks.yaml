      THE CONFLICT:
      1. In late 2015, Ray Hix, a Fairhope Airport Authority Board Member (who also held roles like Secretary/Treasurer), secured a lease for Mid Bay Air LLC at Sonny Callahan Airport in Fairhope, Alabama.
      2. On December 23, 2015, the Airport Authority signed the memorandum of lease with Mid-Bay Air LLC.
      3. Critics alleged conflict of interest as Hix used confidential information gained through his board position to benefit his company.
      4. Jack Burrell (City Council President and Airport Authority Board Member) chaired an ad hoc committee and reviewed bids, determining Hix’s associate was the winner despite alleged ethics issues.
      5. A 6-page advisory opinion from the Ethics Commission for a lawyer/Board member leasing with the same authority was sought in early 2016 (Ethics Opinion #2016-04).
      6. On December 2, 2016, the Alabama Ethics Commission replied to a request that no lease document had ever been submitted by the Authority regarding this issue.

      THE DISCOVERY:
      1. The Fairhope Airport Authority hired an attorney described as "the top ethics attorney in Alabama" to investigate and defend its board members (Jack Burrell and Ray Hix).
      2. This defense counsel is identified as Ray Hix’s personal attorney.
      3. Evidence reveals this same attorney had previously prepared the original lease in question for Mid Bay Air LLC.
      4. Furthermore, this lawyer was paid by Mr. Hix to prepare a request for an Advisory Opinion from the Ethics Commission regarding the 2015 lease before it was signed.

      THE PIVOT:
      1. Article 1 alleges that Burrell and the Board failed in their duty of due diligence and ignored conflicts of interest, specifically concerning Ray Hix’s use of confidential data related to a Dec 2015 lease.
      2. Article 2 reveals the mechanism by which the Authority is attempting to quash or defuse those same claims: using an attorney employed by Mr. Hix—the same lawyer who assisted in drafting the original problematic lease and secured Hix's initial attempts at ethical cover (Advisory Opinion).

      KEY ENTITIES:
      * Ray Hix (Board Member, Secretary/Treasurer)
      * Jack Burrell (City Council President, Airport Authority Board Member)
      * Mid Bay Air LLC
      * Alabama Ethics Commission
      * Hugh Evens (Ethics Commission Chief Counsel)
