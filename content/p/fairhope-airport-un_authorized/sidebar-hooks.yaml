      **THE CONFLICT**
      - August 7, 2015: Three board members resigned from the Fairhope Airport Board; Joe McEnerey (Chairman), Pam Caudill (Vice Chair), and Ray Hix (Secretary/Treasurer) were appointed.
      - Ray Hix gained access to confidential airport leases, bids, and financial information while serving on the board.
      - December 23, 2015: The Airport Authority signed a memorandum of lease with Mid-Bay Air LLC (associated with Ray Hix).
      - A lawyer paid another lawyer for an ethics advisory opinion (No. 2016-04) detailing standards for leases involving Board members and airport authorities.
      - Mr. Burrell (City Council President/Board Member) reviewed the bids and determined Mid-Bay Air LLC was the winner despite a conflict of interest.
      - November 8th, 2016: The Ripp Report requested information from the Alabama Ethics Commission regarding the Dec 2015 Mid-Bay Air Lease.
      - December 2, 2016: The Alabama Ethics Commission responded that "No lease has ever been submitted to us regarding this issue," confirming lack of due diligence/compliance with ethics rules.

      **THE DISCOVERY**
      - Fairhope City Council continues to allocate $500,000 annually (a significant portion of the city budget) to the Airport Authority, which is criticized as a "black hole for information."
      - Mr. Burrell currently serves in dual roles: Fairhope City Council President and the city’s liaison for the Airport Authority.
      - The Widget Article states that Mr. Burrell leverages his position to support the Authority over citizens' interests.
      - The previous scandal established that Mr. Burrell, despite ethical rules, chose to review bids favoring his associates rather than raising objections.

      **THE PIVOT**
      - The 2015-2016 lease failure involving Hix and Mid-Bay Air LLC proves Mr. Burrell previously ignored clear conflicts of interest regarding airport business.
      - This historical pattern demonstrates that he is willing to prioritize personal/professional connections over public scrutiny or legal compliance.
      - His current dual role as Council President and Airport Liaison, combined with the established history of non-compliance (unreported 2015 lease), reveals a persistent structural conflict of interest where his position enables further unchecked decisions for the Authority.

      **KEY ENTITIES**
      - Mr. Burrell (Fairhope City Council President / City Liaison for Airport Authority)
      - Ray Hix (Former Fairhope Airport Board Member, Organizer of Gayfer Village Partners, Llc)
      - Mid-Bay Air LLC
