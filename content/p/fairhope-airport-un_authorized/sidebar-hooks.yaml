      *   Jack Burrell reviewed bids and determined an associate board member won
      the lease.

      *   Three board members resigned on August 7, 2015.


      THE DISCOVERY:

      *   An ethics opinion (no. 2016-04) was sought regarding the Mid-Bay Air Lease.

      *   The Ethics Opinion concluded the lease is null and void due to failure of
      the Airport Board to oversee conflict of interest or comply with ethics rules.

      *   The main article questions Jack Burrell about potential business interests
      in Hix/Snedecker companies and personal aviation conflicts.


      THE PIVOT:

      *   Article 2 generalizes the ethical failure described in Article 1 by focusing
