  bushwhacked-hijacked-fairhope-style:
    brief: 'THE CONFLICT:

      *   A lawyer sought an ethics opinion (no. 2016-04) for a lawyer/board member
      to enter a lease with the Fairhope Airport Authority.

      *   Board member Ray Hix had privileged confidential information regarding airport
      leases and bids.

      *   Jack Burrell reviewed bids and determined an associate board member was
      the winner of the Mid-Bay Air LLC lease.

      *   The Airport Authority signed a memorandum of lease with Mid-Bay Air LLC
      on December 23, 2015.


      THE DISCOVERY:

      *   Jack Burrell is the City Council President and leader of a group supported
      by former employees and media outlets (Kant, Courier, W.A.C.O.).

      *   Burrell used his position to secure control over the Fairhope Airport title
      in the name of the Airport Authority, not the city.

      *   The City Council supported Burrell''s effort to maintain control over the
      airport.


      THE PIVOT:

      *   Article 2 reveals that Burrell’s actions as a City Council President were
      used to secure political control and manipulate municipal assets (like the airport
      title), which connects directly to the conflict of interest and failure of oversight
      regarding the Airport Authority lease detailed in Article 1.

      *   Burrell''s role in the City Council provides the political mechanism for
      circumventing ethics rules that were allegedly ignored by the Airport Board
      members.


      KEY ENTITIES:

      *   Jack Burrell (Lawyer, Board Member, City Council President)

