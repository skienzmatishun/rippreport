      *   Article 2 is the 'smoking gun' because it provides concrete documentation—a letter from the Attorney General dated January 2017—that moves Burrell from a passive board member to an active participant in a flawed, allegedly rigged bidding process involving Hix/Snedeker companies and Executive Aviation.
      *   Article 2 also connects this past corruption to current political behavior by noting Burrell's role as the de facto controller of Council proceedings regarding the airport property today.

