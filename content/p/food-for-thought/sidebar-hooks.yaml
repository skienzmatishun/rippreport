    generated_at: '2026-03-09T16:04:30.557656Z'
  run-away-train:
    brief: 'THE CONFLICT:

      - Baldwin County residential population was 212,000 in 2017; projection indicates
      +100,000 incoming.

      - Foley recorded 545% increase in residential units over last two years, with
      1,276 lots and over 50 subdivisions in final stages.

      - Fairhope approved 1,200 residential lots across 17 subdivisions.

      - Daphne approved 683 residential lots for 16 subdivisions on Highway 98.

      - Orange Beach recorded highest single year development in city history (2018).

      - Daphne and Fairhope both allowed apartments on Highway 98 within one mile
      of each other without communication or traffic analysis between municipalities.

      - Main Article identifies a specific publicly owned land parcel in Baldwin County
      with zoning designation not matching physical reality; tied to "The 68 Blueprint."


      THE DISCOVERY:

      - Widget Article confirms Baldwin County operates with 14 independent municipalities,
      14 mayors, and 15 different Planning and Zoning departments.

      - No central "conductor" coordinates development; decisions are made locally
      without shared data on traffic or infrastructure impact.

      - Miriam Boutwell, former Foley community development director, noted in Widget
      Article that her staff had to solve problems individually before establishing
      Plan Lower AL Now (PLAN).

      - Main Article confirms existence of a strategically placed land parcel currently
      operating outside public discussion.


      THE PIVOT:

      - Widget Article proves the governance structure is fragmented (15 zoning depts,
      independent mayors), creating a system reliant on opaque decisions and infrastructure
      strain (Highway 98).

      - Main Article’s undisclosed land parcel becomes a potential central control
      point ("The Foundation") within this fragmented system; its "mismatched zoning"
      allows it to bypass normal oversight, making it critical leverage in the absence
      of a "conductor."


      KEY ENTITIES:

      - Miriam Boutwell (Foley community development director; co-founder of PLAN)

      - Plan Lower AL Now (PLAN)

      - Baldwin County Government / Baldwin County Commission

      - Southern Visions LLP (Sweet Brew manufacturing facility site, Bay Minette)

      - Highway 98

      - City of Daphne

      - City of Fairhope

      - City of Foley'
    generated_at: '2026-03-09T16:04:30.557660Z'
  dirty-little-secrets:
    brief: '1. THE CONFLICT

