      \ Workshop.\n- Process scheduled for public meetings:\n  - Monday, Jan. 24 (Central\
      \ Annex Auditorium).\n  - Tuesday, Jan. 25 (Fairhope & Foley locations).\n\n\
      THE PIVOT:\n- Article 2 validates the jurisdiction where Article 1’s undisclosed\
