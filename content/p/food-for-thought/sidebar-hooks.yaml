      - City officials (Mayor Robert Craft, Director Andy Bauer) admitted failure
      to adhere to Section 3-3E "Findings and Conclusions" of Zoning Ordinance.

      - Internal City Staff recommendations previously referenced the "Land Use Plan,"
      but claims this is now insignificant.


      2. THE DISCOVERY

      - Public Records Requests by Pete Sims/The Ripp Report show City Staff cited
      "Land Use Plan" in 2014, 2015, and 2016 site plan recommendations.

      - Sims discovered Citizen Rex Lawson pointed out the omission of Section 3-3E
      in Regency Place Site Plan.

      - City Attorney advised Mayor Craft to resubmit Site Plan; craft called this
