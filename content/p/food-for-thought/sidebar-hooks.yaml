      - Article 2 proves officials (Bauer, Craft) knowingly ignore ordinances to push
      development.

      - These violations validate the suspicion in Article 1 that the undisclosed
      Baldwin County parcel involves similar zoning irregularities.


      4. KEY ENTITIES

      - Pete Sims (Author/Investigator)

      - Andy Bauer (Director of Planning and Zoning, City of Gulf Shores)

      - Robert Craft (Mayor, City of Gulf Shores)

      - Rex Lawson (Citizen, identified whistleblower on zoning issues)

