      KEY ENTITIES:

      - Kent David (Former Real Admiral, Jag Officer, Alabama Veterans Affairs Commissioner)

      - Governor Ivey (Alabama Gov)

      - Andy Ruten (Mobile Attorney representing City of Bay Minette in OJ French
      Jr case)

      - Brandon Thompson (BMPD Officer killed OJ French Jr)

      - OJ French Jr (Deceased victim, family suing City of Bay Minette)

      - Bob Wills (Bay Minette Mayor)

      - 1819 News (Sylacauga, AL news outlet)

      - Baldwin County / Fairhope (Locations of economic and political friction cited)'
