hooks:
  FEDERAL-CIVIL-RIGHTS-LAWSUIT-INVOLVES-BCSO-AND-MAJOR-CRIMES-UNIT:
    brief: 'THE CONFLICT

      - OJ French Jr killed by Bay Minette Police Department officer Brandon Thompson.

      - City of Bay Minette sued by French family through Mobile Attorney Andy Ruten.

      - Andy Ruten’s firm hires Bay Minette Mayor Bob Wills to represent them in a
      separate malpractice lawsuit after Ruten represented the City.

      - Sheriff Huey “Hoss” Mack and Baldwin County Sheriff’s Office (BCSO) are central
      to ongoing civil rights scrutiny.


      THE DISCOVERY

      - Federal civil rights lawsuit filed against Sheriff Mack and Baldwin County
      Major Crimes Unit (BCMCU).

      - BCMCU consists of Tolbert (Bay Minette), Mack, Kendrick, Delmore, Carpenter,
      and Bullock.

      - BCMCU Chairman is Bay Minette Police Chief Al Tolbert; agency investigates
      its own members.

      - Jonathan Victor case: April 2021, Judge William Cassady denied Qualified Immunity
      to Mack and Hunady.

      - Sheriff provided false facts regarding Victim Jonathan Victor (unarmed) to
      Judge Cassady.


      THE PIVOT

      - Article 2 proves the "cover-up" claims from Article 1 are part of a pattern;
      this is the 10th death investigated by BCMCU with similar issues.

      - First 8 prior incidents found no police at fault, but camera footage was withheld
      from the public (same as OJ French case).

      - Confirms Sheriff Mack''s direct involvement in federal civil rights violations,
      not just local misconduct.

      - Links Andy Ruten’s defense strategy (withholding body cams) to broader withholding
      of evidence in BCMCU history.


      KEY ENTITIES

      - OJ French Jr

      - Brandon Thompson

      - Huey "Hoss" Mack

      - Andy Ruten

      - Bob Wills

      - Al Tolbert

      - Judge William Cassady'
    generated_at: '2026-03-10T23:50:39.562345Z'
    text: Sheriff Huey Mack claims he runs a clean shop while families bury their
      sons in silence. This federal lawsuit proves the Major Crimes Unit buried evidence
      in ten separate deaths to protect their own skin and hide the truth.
