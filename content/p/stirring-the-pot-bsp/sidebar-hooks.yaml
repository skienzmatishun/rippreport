  bay-minette-vote-out-mayor-wills-remember-oj-french:
    brief: 'THE CONFLICT:

      - OJ French Jr. died in police custody incident involving BMPD Officer Brandon
      Thompson.

      - Family filed federal civil lawsuit: "Otis French Sr vs. City of Bay Minette,
      Alabama".

      - City represented by Mobile Attorney Andy Ruten; he requested bodycam review
      but blocked public release.

      - Mayor Bob Wills of Bay Minette hired by Ruten’s firm to represent them in
      a lawsuit where the firm was being sued for malpractice.


      THE DISCOVERY:

      - Joshua Brown campaign ad weaponizes the OJ French Jr. case to remove Mayor
      Bob Wills from office.

      - Campaign alleges Mayor Wills lied to the French family regarding death circumstances
      and initially said they were "OK with the circumstances."

      - Campaign alleges Wills supported a "kangaroo court" via Baldwin County Major
      Crimes Unit (BCMCU) and Sheriff Department.


      THE PIVOT:

      - Article 1 establishes the legal link: Wills is physically and financially
      tangled in lawsuits related to OJ French Jr. (via attorney Ruten).

      - Article 2 reveals the political weaponization: The lawsuit and perceived lies
      are now the core justification for an election campaign (Vote Out Mayor Wills).


      KEY ENTITIES:

      - Bob Wills (Mayor, Bay Minette)

      - Joshua Brown (Campaign Candidate for Mayor)

      - OJ French Jr. / Otis French Sr. (Victim / Plaintiff)

      - Brandon Thompson (BMPD Officer)

      - Andy Ruten (Mobile Attorney representing City in context of OJ French case/malpractice
      suit)

      - Baldwin County Major Crimes Unit (BCMCU)'
    generated_at: '2026-03-10T23:50:39.562356Z'
    text: Mayor Bob Wills sold out the French family to protect his pocketbook and
      his legal cronies. Now, a new campaign exposes how he used a kangaroo court
      and blatant lies to hide the reality of a local police killing.
    character_count: 212
  cover-up:
    brief: 'THE CONFLICT

      - OJ French Jr killed by Bay Minette Police Officer Brandon Thompson on August
      20, 2021.

      - Family of OJ French Jr sued City of Bay Minette for the death.

      - Mobile Attorney Andy Ruten represents City; asked Judge to review bodycam
      footage without releasing it publicly.

      - Andy Ruten’s firm hired Bay Minette Mayor Bob Wills to represent them in a
      lawsuit where their firm is being sued for malpractice.

      - Ethics Commission Executive Director Mr. Albritton accused by Alabama AG Steve
      Marshall of fraud and self-dealing in Mabel Amos Memorial Fund oversight.


      THE DISCOVERY

      - The Ripp Report received a copy of a letter from Mayor Bob Wills to Tamara
      French, O.J.’s older sister.

      - Letter references Mr. O.J. French who was killed by Bay Minette police August
      20, 2021.

      - Mayor Wills’ letter states allegations of a “cover up” and other allegations
      are without merit.

      - Baldwin Commission Attorney Brad Hicks stated he sees no ethics violation
      with Mayor Wills renting his building to Legislative Delegation.

      - Brad Hicks declined to contact Ethics or Attorney General for official opinion,
      stating “go to hell with obtaining any opinions.”

      - Bay Minette officers scheduled for AltaPoine Health training on mental health
      crisis intervention and firearms conflict resolution after the killing.


      THE PIVOT

      - Mayor Wills publicly denies cover-up allegations regarding OJ French Jr’s
      death via the letter obtained by The Ripp Report.

      - Mayor Wills has pending ethics complaints and Alabama Bar complaints regarding
      questionable self-serving deals, including an office lease deal where he added
      two 5-year lease extensions totaling ~$867,000 in potential profit.

      - Albritton, who dismissed complaints against Mayor Wills and others, is facing
      three lawsuits and accusation of fraud by AG Steve Marshall.

      - Baldwin County Major Crimes Unit (BCMCU), chaired by Bay Minette Chief Al
      Tolbert, lacks unbiased credibility when investigating its own members.


      KEY ENTITIES

      - Bob Wills (Mayor Bay Minette)

      - OJ French Jr

      - Brandon Thompson (Officer, BMPD)

      - Tamara French

      - Andy Ruten (Attorney)

      - Albritton (Ethics Commission Executive Director)

      - Steve Marshall (Alabama Attorney General)

      - Al Tolbert (Bay Minette Police Chief, BCMCU Chairman)

      - Brad Hicks (Baldwin Commission Attorney)'
    generated_at: '2026-03-10T23:50:39.562649Z'
    text: Mayor Bob Wills sent letters denying a cover-up while he quietly pocketed
      nearly a million dollars in shady office leases. While he protects killer cops,
      his allies at the Ethics Commission face their own fraud charges.
    character_count: 219
