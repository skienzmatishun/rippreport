      THE DISCOVERY

      *   Strike Two resolution authorized a Conservation Easement Agreement between
      the City of Fairhope and Weeks Bay Foundation, Inc. for two conservation easements
      on the Dyas/Triangle property.

      *   The total cost for the easement transaction was $39,025.00.

      *   Diana Brewer, a former councilwoman who supported the developer, reached
      out to the council regarding the Conservation Easement.


