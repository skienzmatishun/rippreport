      30, 2016, after six charges regarding violations of judicial ethics canons.

      *   Fairhope City Council voted in August 2017 to end its contract arrangement
      with State Sen. Trip Pittman''s company for disaster debris removal.


      THE DISCOVERY

      *   The U.S. Senate election cycle is influenced by organized political groups
      like the GOB ("good ole boys") and Catalyst.

      *   Trip Pittman announced he would not seek re-election to the Alabama State
      Senate due to "term limits" before pivoting to run for the U.S. Senate seat.

      *   The movement of career politicians began following Jeff Sessions'' appointment
      as U.S. Attorney General.

      *   Baldwin County Commissioner Chris Elliott, who previously faced serious
      DUI charges while in office, is now seeking a State Senate seat and is linked
