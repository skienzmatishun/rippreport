      Gov") and allegedly turned a blind eye to Sen. Pittman''s activities while acting
      as "appointed Trustee" of BP Funds.

      - Trip Pittman was accused of taking $750,000 from BP funds while serving in
      the role of trustee, leading to him being labeled the worst elected official
      in Baldwin County.

      - Fairhope City Council voted to end a contract with State Sen. Trip Pittman’s
      company (D&J Enterprises Inc.) after they had been an arrangement since 2012;
      he subsequently chose not to seek another term.

      - Judge Roy Moore was suspended by the Alabama Court of the Judiciary on September
      30, 2016, for six charges violating canons of judicial ethics.


      THE DISCOVERY:

      - The special election replacing Jeff Sessions (who became US Attorney General
      less than three months ago) is scheduled for December 12, 2017.

      - Article 2 specifies that Strange compromised himself by selling out to Bentley
      to secure his temporary seat in the Senate.

      - It confirms Pittman''s involvement with BP Funds ($750,000 "money grab") and
      emphasizes he held the position of trustee at the time of the alleged theft.


      THE PIVOT:

      - Article 2 establishes a causal link (selling out to Bentley) that explains
      the alleged compromise/blind eye attributed to Luther Strange in Article 1.

      - It connects Pittman’s local political failures (Article 1 - Fairhope contract
      ending) directly to the systemic financial corruption involving his dual role
      as State Senator and BP Funds Trustee (Article 2).


