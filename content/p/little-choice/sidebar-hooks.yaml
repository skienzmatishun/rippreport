      - Luther Strange

      - Trip Pittman / Sen. Trip Pittman

      - Jeff Sessions

      - Bentley

      - Roy Moore

      - Mo Brooks

      - Lagniappe Mobile

      - Fairhope City Council

      - D&J Enterprises Inc.'
