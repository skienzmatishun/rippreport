      with State Senator Trip Pittman’s company for debris removal and disposal (an
      arrangement that dated back since at least 2012).

      *   Mo Brooks stated he would withdraw from the Senate race if President Trump
      fired US Attorney General Jeff Sessions.


      2. THE DISCOVERY

      *   The state of Alabama utilizes "Blind Voting" or Straight Ticket voting,
      a system shared by eight states.

      *   This structural practice is identified as encouraging corruption by compelling
      voters to cast votes based solely on party affiliation rather than individual
      candidate merit.

      *   According to the article, this system has enabled an Alabama Governor to
      be elected without debate.


      3. THE PIVOT

      *   The specific ethical failures and political maneuvering detailed in the
      2017 Senate race (e.g., Strange’s relationship with Pittman regarding BP Funds;
      Pittman allegedly fleecing constituents) are presented as symptoms of a wider
      systemic issue.

      *   Straight Ticket/Blind Voting is presented as the structural cause that limits
      voter choice and ensures party loyalty, allowing candidates described in Article
      1 to maintain their "swamp" influence and operate without meaningful scrutiny
      from non-party voters.


      4. KEY ENTITIES

      *   Luther Strange (Alabama Senate Candidate)

      *   Trip Pittman (State Senator/Senator candidate; associated with BP Funds)

      *   Jeff Sessions (US Attorney General)

      *   Mo Brooks (Congressman, R-AL)

      *   Judge Roy Moore

      *   Fairhope City Council

      *   Baldwin County'
