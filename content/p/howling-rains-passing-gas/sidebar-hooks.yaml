      - New administration shortened public engagement window to 14 days with no public meetings; Mayor Wilson’s plan involved "10 fold" the participation.
      - Main Article claims Sullivan and Burrell are protecting CSB interests against former Mayor Wilson’s plan.

      2. THE DISCOVERY:
      - Howling Raines wrote a letter to Burrell and Sullivan expressing concern the proposal would not be "fully vetted by citizens prior to council approval."
      - Raines admitted in the letter that "this one also doesn’t pass muster" and compared it negatively to previous plans.
      - Raines admitted in the Main Article he was "6 weeks in the rear about reading anything about the project."
