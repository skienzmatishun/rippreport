        - Public participation previously canceled by council.
        - Fly Creek apartments forced through in favor of developer contributor; creek filled with mud requiring annual dredging.
        - Council members voted themselves full family insurance and raise; previous Mayor Wilson felt this was wrong (she declined the paychecks).

      THE PIVOT
