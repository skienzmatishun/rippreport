      - Current leadership Council President Jack Burrell and Mayor Sherry Sullivan took office after Wilson’s term.
      - Article 1 alleges CSB/Scott Boone controls the Council, Mayor, and City Attorney, overriding citizen decision-making.
      - Burrell and Sullivan expressed opposition to Wilson’s proposed new beach north of the pier and rock jetties.
      - New administration attempted to delay ADA compliance requirements for over a year before conceding they were mandatory.

      THE DISCOVERY
      - Article 2 confirms Mayor Sullivan took "close to a year" just to understand federal grant provisions regarding ADA compliance.
      - Article 2 confirms Councilman/President Burrell eliminated the swim area and rock jetties because he "does not like the look."
      - Article 2 states Tim Cant and Jack Burrell did "absolutely nothing" regarding sewer infrastructure for years; Wilson was responsible for tackling the sewer issue.
      - Article 2 documents Stewart "The Liar" Speed (Leaf River Group) recorded lies to 250-300 citizens about luxury apartments not being sold out and environmental safety.
      - Article 2 notes Burrell lied to press about optional locations available for an electric sub-station.
      - Article 2 confirms the K-1 Center was acquired in 2019 for $2.5 million from Baldwin County Board of Education and is now a waste risk under Burrell’s control.

      THE PIVOT
      - Article 2 provides external validation that the specific $6.2 million Waterfront Grant and sewer infrastructure projects listed in Article 1 as Wilson’s achievements are real and active.
      - Article 2 proves the accusation that Burrell/Sullivan are sabotaging projects: they delayed ADA compliance by a year and removed safety features (jetties/beach) despite grant requirements.
      - Article 2 links Burrell’s history of "liability land gifts" and misleading public statements (sub-station, Speed apartments) to the alleged corruption described in Article 1.
      - Both articles confirm Wilson left projects for Sullivan/Burrell to complete that are currently falling behind schedule or being altered.

      KEY ENTITIES
      - Jack Burrell (Council President)
      - Sherry Sullivan (Mayor)
      - Mayor Wilson (Previous Administration)
      - CSB / Scott Boone (Alleged controlling force)
      - Tim Cant (Previous Mayor/Administration, sewer lawsuit context)
