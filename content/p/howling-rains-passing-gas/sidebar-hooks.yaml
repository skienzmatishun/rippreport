  truth:
    brief: |-
      THE CONFLICT
      - Outgoing Mayor Wilson left the city with $23 million in grants and restoration funds.
      - Council President Jack Burrell claimed Wilson left $23 million in grants for comprehensive planning, including a funded $40 million plan for sewer, gas, and water infrastructure.
      - Mayor Sherry Sullivan and Burrell are opposing the GMC engineer Scott Hutchinson’s waterfront project plans.
      - The Hutchinson plan includes a new sand beach north of the pier and fill dirt to create pedestrian ramps.
      - Sullivan opposes installing a new sand beach north of the pier and putting fill dirt in front of the bluffs.
      - Burrell is adamantly opposed to the new beach; he favors improvements at North Beach and Magnolia Beach.
      - Burrell stated parking around the fountain should remain; under Hutchinson’s plan, visitors would walk length of two football fields to reach pier.
      - Article 1 alleges CSB (Catalyst Scott/Boone) owns the council, municipal judge, city attorney, and mayor.

      THE DISCOVERY
      - Leslie Callies Hollis posted an unfiltered comment on Robert Brown stating: “Mr Brown has a pending Attorney General Complaint and an Ethics Complaint pending.”
      - Hollis alleges the city used a no bid contract to award grant money (likely oil spill) paid to private contractors who were friends with the last Mayor.
      - Hollis claims nothing regarding the grant was for the good of citizens because the transaction came to light through lack of transparency.
      - Hollis identifies a political group called “The Three Bs” (Brown, Burrell, Boone) that needs to be removed.
      - Hollis notes leadership opposes change because Mayor Wilson’s work might make her “look as though she was busy working.”

      THE PIVOT
      - Article 2 substantiates Article 1’s corruption claims by revealing Robert Brown is under official investigation (Attorney General/Ethics Complaint).
      - Article 2 confirms the specific "no bid contract" mechanism regarding oil spill grant money mentioned in general terms by Article 1.
      - Article 2 connects the Wilson-era no-bid spending to "friends," validating the internal claim that CSB/Wilson's network operated outside normal transparency.

      KEY ENTITIES
      - Jack Burrell (City Council President)
      - Sherry Sullivan (Mayor/Leader opposing waterfront plans)
      - Robert Brown (Councilman with pending complaints)
      - Howling Rains / Howell Raines (Journalist/Critic)
      - Leslie Callies Hollis (Source of insider comments on Brown)
      - Catalyst Scott/Boone (CSB group accused of controlling city)
      - Scott Hutchinson (GMC engineer for waterfront plan)
