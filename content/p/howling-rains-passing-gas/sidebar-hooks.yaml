      - Following Wilson’s term, Mayor Sullivan and City Council President Jack Burrell were elected.
      - Allegations state Catalyst Scott/Boone Consulting (CSB) holds "complete total control" over the new council, municipal judge, and city attorney.
      - Article 1 states Burrell and Sullivan oppose Wilson’s plan specifically to install a new beach north of the pier and fill dirt for pedestrian ramps.

      THE DISCOVERY
      - Article 2 confirms the $6.2 million waterfront project was "watered down" from a resilient plan to short-sighted maintenance ("Redneck Renovation").
      - Swimming area and jetties planned in the first 18 months have been thrown out/eliminated.
      - Bathrooms, viewing areas, and amphitheaters were eliminated from the revised plan.
      - Previous plan regarding sloping the "bluff" was erased; ADA plans downgraded to a ramp instead of switchback access.
      - Public input collected over 18 months was discarded; new administration issued a two-week window for written comments with no public meetings.

      THE PIVOT
      - Article 2 validates Article 1's claim that CSB (Catalyst/Scott Boone) exerts control over the council and mayors to direct decisions rather than citizens.
      - Article 2 identifies Howling Rains’ letter as a tool used to justify the "outlandish lies" and gutting of Wilson’s public-engagement plan.
      - Both articles link the change from sustainable infrastructure to minimal "renovation" directly to political distortions following the municipal elections and CSB/Catalyst alignment.

      KEY ENTITIES
      - Jack Burrell (Fairhope City Council President)
      - Mayor Sullivan (Fairhope)
      - Jack Wilson (Former Mayor of Fairhope)
      - Catalyst Scott/Boone Consulting (CSB)/Scott Boone
      - Howling Rains / Howell Raines
      - Scott Hutchinson (GMC engineer)
      - Fairhope City Council
