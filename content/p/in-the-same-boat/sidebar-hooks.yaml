  disposal:
    brief: |-
      THE CONFLICT
      *   Fairhope faced major infrastructure/sewer problems from before Mayor Wilson ran for office.
      *   Baykeeper failed to act on issues including the Publix project, Fly Creek flooding by a developer, and filling creek areas with development mud/sand.
      *   Private citizens sued the City while Baykeeper was unresponsive.
      *   Council President Jack Burrell violated Constitutional rights and was found guilty in Federal court regarding his actions.
      *   Burrell overrode the Mayor’s veto on the Fly Creek extension zoning.

      THE DISCOVERY
      *   The Fairhope City Council, specifically Council President Jack Burrell, orchestrated the disposal of 106 acres of city property valued at $20 million.
      *   Burrell lied to the council regarding who proposed the land disposal idea.
      *   Burrell and Councilman Boone favored the Fly Creek apartment developer by accepting wetland parcels at the Fly Creek Hwy 98 culvert.
      *   Burrell misrepresented a settlement involving the Triangle lawsuit as a purchase of a park.
      *   The Council avoided public participation or community engagement when handling issues like conservation easements.

      THE PIVOT
      *   Article 2 proves that the environmental neglect and civic failure described in Article 1 were rooted in systemic political corruption and specific land-grabbing decisions made by Council President Burrell, which are the direct cause of the ongoing legal/political conflict mentioned in Article 1.
      *   The disposal of the $20 million property is the ultimate proof of Burrell’s prioritization of special interests over public welfare.

