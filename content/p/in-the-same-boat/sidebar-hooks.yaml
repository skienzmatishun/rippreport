  people-power-2:
    brief: |-
      THE CONFLICT
      *   Fairhope faced major infrastructure and sewer problems for years.
      *   Baykeeper ignored citizen complaints regarding the Publix project, Fly Creek flooding by developers, and development site mud/sand filling of the creek.
      *   Private citizens sued the City over these issues while Baykeeper was unresponsive.
      *   The City Council obstructed Mayor Wilson's duties and infrastructure projects.

      THE DISCOVERY
      *   2,276 citizens signed a petition to stop the proposed Tuberville subdivision.
      *   A new $13 million sewer plant failed to process 500,000 gallons of raw sewage that overflowed into Big Head gully and the Fly Creek watershed.
      *   The City Council obstructed infrastructure projects while simultaneously obstructing the Mayor's duties.

      THE PIVOT
      *   Article 2 provides concrete evidence (petition signatures, failed plant metrics) directly linking citizen action to the severity of the sewer infrastructure problem mentioned in Article 1.
      *   Article 2 demonstrates that citizen opposition and failed infrastructure performance are directly related to the political obstruction described in Article 1.

      KEY ENTITIES
      *   Fairhope Mayor Wilson
      *   Baykeeper (Casi Callaway)
      *   Fly Creek
      *   City Council President Jack Burrell
      *   Councilman Robinson
      *   2,276 signatures
      *   Tuberville subdivision
    generated_at: '2026-07-10T20:26:55.076460Z'
    text: While Fairhope officials played politics with our crumbling sewers, local citizens finally took matters into their own hands to save the city. Read how 2,276 residents fought back as Council President Jack Burrell watched 500,000 gallons of raw sewage flood the Fly Creek watershed.
  letter-of-concern:
