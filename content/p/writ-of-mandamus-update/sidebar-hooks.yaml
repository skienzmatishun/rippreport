  letter-to-the-alabama-attorney-general:
    brief: |-
      THE CONFLICT
      - Francis Paul Ripp (The Ripp Report) filed a Writ of Mandamus with Montgomery County Circuit Court on October 18.
      - Case targets Tom Albritton, Executive Director of Alabama Ethics Commission.
      - Allegation: Albritton engaged in "self-dealing" while serving as a trustee for the Mabel Amos Memorial Fund.
      - Specific incident: Albritton helped award his own daughters $105,000 in scholarships from the fund (University of Texas).
      - Judge Johnny Hardwick was scheduled to hear status review for pending motions on November 25.
      - On November 1, Judge Hardwick recused himself from hearing the case due to potential conflict of interest after reading Ripp’s Writ evidence.
      - Chief Justice Tom Parker selected Hardwick to preside over certain ethics cases on November 1.

      THE DISCOVERY
      - Letter sent by Ripp to Alabama Attorney General Steve Marshall confirms initial formal complaints filed with state officials.
      - Provides specific evidence that Albritton is one of three trustees and an attorney for the Mabel Amos Memorial Fund.
      - Details that Ethics Commission dismissed prior complaints involving similar self-dealing (Fairhope Councilman case).
      - Confirms Ripp has submitted an Ethics Complaint, Alabama Bar Complaint, and Writ of Mandamus regarding Albritton.
      - Reaffirms Ripp intends to file a civil case involving Regions Bank and the Mabel Amos Memorial Fund trustees.

      THE PIVOT
      - This Letter validates the Main Article’s legal actions as grounded in formal complaints, not just speculation.
      - The Letter specifically names the scholarship figure ($105k) and trustee role, confirming the "self-dealing" claim central to Ripp’s Writ.
      - Establishes a timeline: Formal complaints were sent to the AG; then media followed up via Ripp’s status update on Judge Hardwick’s recusal.
      - Shows the AG’s office was contacted directly before public judicial status changes, proving Ripp escalated via proper legal channels first.

      KEY ENTITIES
      - Francis Paul Ripp (Ripp Report Founder)
      - Tom Albritton (Ethics Commission Director, Trustee)
      - Steve Marshall (Alabama Attorney General)
      - Johnny Hardwick (Circuit Judge)
      - Chief Justice Tom Parker (Supreme Court)
      - Mabel Amos Memorial Fund
      - Regions Bank
