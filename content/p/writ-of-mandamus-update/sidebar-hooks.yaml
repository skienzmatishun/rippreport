      - Article 2 exposes the hypocrisy: Albritton is executing the very "self-dealing" prohibited by ethics standards he is paid to enforce via the Ethics Commission.
      - Article 2 expands the civil case target list from Albritton alone to include Regions Bank and co-trustee John Bell based on shared misuse of trust funds.

