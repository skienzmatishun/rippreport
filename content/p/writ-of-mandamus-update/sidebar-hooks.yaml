hooks:
  writ-of-mandamus-and-bar-complaint:
    brief: |-
      THE CONFLICT:
      - Francis Paul Ripp filed a Writ of Mandamus on October 18 regarding the Ethics Commission.
      - Ripp alleges Tom Albritton, Executive Director of the Alabama Ethics Commission and a trustee for the Mabel Amos Memorial Fund, is engaging in “self-dealing.”
      - Lagniappe article (June 29, 2021) reported the Mabel Amos Memorial Fund paid over $100,000 for Albritton’s children’s college tuition.
      - On November 25, Judge Johnny Hardwick (Montgomery Circuit) was to hear a Status Review of the Writ of Mandamus.
      - Judge Hardwick read evidence for Ripp’s Writ, found it “very interesting,” but recused himself due to a conflict of interest after being assigned ethics cases by Chief Justice Tom Parker.
      - Ripp plans to file a civil case against Regions Bank involving trustees of the Mabel Amos Memorial Fund.

      THE DISCOVERY:
      - Article 2 cites Lagniappe proving Tom Albritton’s children received scholarships valued at $105,000 from the Mabel Amos Memorial Fund.
      - Confirms Albritton is a trustee on the private charitable trust overseeing the scholarships his children receive.
      - Confirms Ripp filed both an ethics complaint and a separate Alabama Bar Complaint against Albritton.
      - Highlights Ripp’s assertion that as an attorney, Albritton is fully aware of IRS rules regarding self-dealing and taxable expenditures.
      - Validates the core accusation in Article 1: Albritton uses a fund he is legally bound to oversee for personal family financial gain.

      THE PIVOT:
      - Article 2 serves as the evidence packet proving Ripp’s "self-dealing" claim is not hypothetical but documented (specifically the $105,000 scholarships).
      - This external evidence forces Albritton’s hands regarding the resignation demand in Article 1; if he admits the tuition payments (as Lagniappe notes), it confirms the conflict of interest.
      - Connects Judge Hardwick’s review (Article 1) directly to the specific dollar amounts and roles exposed in Article 2, proving Ripp’s case is based on verifiable data, not just allegations.

      KEY ENTITIES:
      - Francis Paul Ripp (The Ripp Report)
      - Tom Albritton / Greg Albritton (Executive Director, Ethics Commission; Trustee)
      - Johnny Hardwick (Montgomery Circuit Judge)
      - Tom Parker (Chief Justice)
      - Harry Still (Attorney for Ripp)
      - Regions Bank
      - Mabel Amos Memorial Fund / Mabel Amos Trust
      - Lagniappe (Rob Holbert)
      - Alabama Ethics Commission
