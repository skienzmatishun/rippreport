  a-spiders-web:
    brief: 'THE CONFLICT

      *   Date: September 25, 2015

      *   Initiated by Francis Paul Ripp of The Ripp Report.

      *   Target: Lee Turner, who held dual roles as Chairman of Fairhope Planning
      & Zoning Commission and President of Single Tax Corporation.

      *   Core Issue: Conflict of Interest regarding P&Z approvals for the corporation
      (which owns property in Fairhope).

      *   Secondary Allegation: George Robards, a Planning & Zoning member, was receiving
      public contracts from the Single Tax Corporation without proper consultation/approval
      process visibility to tenants.


      THE DISCOVERY

      *   The Widget Article reveals systemic corruption involving elected officials
      using complex layers of LLC ownership (e.g., covering one LLC with another)
      to obscure personal financial interests and influence voting decisions.

      *   Specific Discovery: Councilman Kevin Boone is linked through LLC relationships
      with John Avent, who represents Preble-Rich/Dewberry.

      *   Conflict Detail: Mr. Boone advocated for specific engineering firms while
      opposing external evaluation of Fairhope''s utility infrastructure despite having
      a direct financial interest in the related entities (Baldwin County Sewer).


      THE PIVOT

      *   Article 2 reveals that Lee Turner’s alleged conflicts (Article 1) are not
      isolated incidents but part of a broader, decades-old, systemic pattern within
      Baldwin County where elected officials conceal personal and business ties to
      influence municipal decisions for self-gain.

      *   It proves the ethical concerns raised in 2015 regarding dual roles and undisclosed
      contracts are symptoms of a widespread failure by government bodies (like the
      Ethics Commission) to address concealed conflicts hidden behind complex corporate
      structures.


      KEY ENTITIES

      *   Lee Turner

      *   Francis Paul Ripp / The Ripp Report / Baldwin County Legal Eagle

      *   Tom Albritton (Director, Alabama Ethics Commission)

      *   George Robards

      *   Single Tax Corporation

      *   Fairhope Planning & Zoning Commission

      *   Kevin Boone (City Councilman)

      *   John Avent (Preble-Rich/Dewberry)

      *   Tucker Dorsey (County Commissioner)

      *   Baldwin County Ethics Commission

      *   LLC network'
