  single-tax-colony-letter:
    brief: 'THE CONFLICT:

      *   September 25, 2015: Francis Paul Ripp filed an Ethics Complaint against
      Lee Turner with Tom Albritton, Director of the Alabama Ethics Commission.

      *   Lee Turner held concurrent positions as Chairman of the Fairhope Planning
      & Zoning Commission and President of the Single Tax Corporation (FSTC).

      *   Ripp raised concerns that P&Z issues commonly involve FSTC property and
      that this dual role allowed oversight over decisions affecting public interests
      without appropriate conflict mitigation.

      *   Specific concern: George Robards, a member of P&Z, received regular public
      contracts from the Single Tax Corporation which had to be approved through the
      Planning & Zoning process presided over by Lee Turner.


      THE DISCOVERY:

      *   The second article (Paul Ripp''s letter) confirms Lee Turner still holds
      simultaneous leadership roles in FSTC and the Planning Commission (though context
      suggests this is a continuation of the unresolved issue).

      *   It reveals active attempts to manipulate FSTC finances, specifically Council
      Person Burrell seeking $1 million in FSTC membership dues for an area known
      as "Dyas Triangle."

      *   The article alleges that local government actions by Mayor Kant and other
      entities (mention of AMIC lawsuits) are linked to institutional failures within
      the Planning Commission.

      *   It claims Lee Turner is now positioned to become a defendant due to these
      systemic issues, and FSTC plans "kangaroo court" measures against members who
      ask questions or seek truth.


      THE PIVOT:

      *   Article 1 identified an ethical conflict (dual roles). Article 2 proves
      this conflict has not been resolved but has escalated into active financial
      manipulation ($1 million acquisition) and institutional corruption, showing
      that Turner''s positions facilitated ongoing misuse of power in FSTC/Planning
      despite the previous ethics inquiry.


      KEY ENTITIES:

      *   Lee Turner (Chairman/President)

      *   Francis Paul Ripp (Author/Complainant/Letter Sender)

      *   Tom Albritton (Recipient/Ethics Commission Director)

      *   George Robards (P&Z Member with FSTC Contracts)

      *   Marion Wynne (Fairhope City Attorney, mentioned in Article 1 context)

      *   Council Person Burrell (FSTC $1 million acquisition attempt)

      *   Dean Mosher (Instructor cited in Article 2 context)

      *   Mayor Kant (Cited regarding Planning Commission approval/actions)

      *   Single Tax Corporation / FSTC'
