  elephant-in-a-volkswagen:
    brief: 'THE CONFLICT

      *   Date of Complaint: September 25, 2015 (Ripp Report)

      *   Complainant: Francis Paul Ripp (The Ripp Report / Baldwin County Legal Eagle).

      *   Defendant 1: Lee Turner, identified as Chairman of Fairhope Planning & Zoning
      Commission and President of the Single Tax Corporation.

      *   Defendant 2: George Robards, member of P&Z who garnered public contracts
      with the Single Tax Corporation while overseeing them in P&Z.

      *   Core Allegation: Conflict of interest regarding Mr. Turner’s dual positions
      and Mr. Robards'' contractor status, as the corporations/entities intersect
      frequently on infrastructure projects (e.g., sidewalks).


      THE DISCOVERY

      *   Current Event Focus: Ordinance directing land transfer to Fairhope Single
      Tax Corporation for the Tatumville Subdivision project.

      *   Current Status of Conflict: Lee Turner is actively pushing this project
      in his capacity as President of Single Tax while simultaneously chairing Fairhope
      Planning & Zoning, serving as the "salesman" for the project—a conflict of interest
      noted by Mr. Ripp in 2015.

      *   Associated Parties: Cliff Pittman (Single Tax Board member/business partner
      of Councilman Robert Brown) is noted as another advocate pushing the project
      despite ethical concerns.

      *   Procedural Irregularity: Turner has reportedly brought this project up without
      prior approval or a vote from Single Tax membership, breaking procedure and
      cooperating with certain council members who allow the action.


      THE PIVOT

      *   Article 1 (2015) flagged Turner''s dual role and the systemic use of Ethics
      Commission cover-ups for conflicts in Fairhope City Government.

      *   Article 2 demonstrates that these past suspicions are still highly relevant
      today through a specific, actionable example: the Tatumville project where Lee
      Turner is explicitly leveraging his position as P&Z Chair (approving land transfer)
      to facilitate and drive a deal benefiting Single Tax Corporation/his interests
      (developer/salesman role).

      *   The pattern shows consistent exploitation of dual authority for corporate/personal
      gain.


      KEY ENTITIES

      *   Lee Turner: Chairman of Fairhope Planning & Zoning; President of Single
      Tax Corporation.

      *   Francis Paul Ripp / The Ripp Report: Original complainant and chronic monitor
      of these conflicts.

      *   George Robards: Former P&Z member who received Single Tax public contracts
      overseen by Turner''s department in 2015.

      *   Cliff Pittman: Single Tax Board member; business partner to Councilman Robert
      Brown.

      *   Councilman Robert Brown: Business partner of Cliff Pittman (involved in
      the Tatumville project).

      *   Anil Vera: Real estate salesperson/friend of Lee Turner who rents property
      near the Tatumville gully.

      *   Fairhope Planning & Zoning Commission.

      *   Fairhope Single Tax Corporation.'
    generated_at: '2026-07-17T20:27:15.718167Z'
  bend-over-fairhope:
    brief: 'THE CONFLICT

      * Date: Sept 25, 2015 (Main Article) and historical period prior to that (Article
      1/Entity timeline).

      * Parties Involved: Lee Turner (Chairman of Fairhope Planning & Zoning Commission;
      President of Single Tax Corporation) and George Robards (Planning & Zoning Member
      and contractor for the Single Tax Corporation).

      * Event: The City Attorney requested an ethics opinion from Tom Albritton regarding
      whether Lee Turner was serving under a conflict of interest due to his dual
      leadership roles overseeing planning decisions while the Single Tax Corporation
      owned significant property in Fairhope.


      THE DISCOVERY

      * The Widget Article reveals ongoing systemic conflicts of interest involving
      current city officials and private interests.

      * Council members Boone (recused himself) and Brown have direct ties to the
      Single Tax Corporation.

      * The article specifically calls for recusal from council members due to these
      ties during a contemporary project development ("Triangle" on gully banks).


      THE PIVOT

      * Article 1 identified Lee Turner''s dual role as Chairman of Planning & Zoning/President
      of Single Tax Corp, creating a conflict where his office oversaw decisions that
      also benefited the Corporation.

      * Article 2 shows this historical conflict has metastasized and persists today,
      demonstrating that other Council members (Boone, Brown) are currently leveraging
      their municipal positions to advance interests tied directly to the problematic
      Single Tax entity identified in Article 1.


      KEY ENTITIES

      * Lee Turner (Former Chairman of Fairhope Planning & Zoning/President of Single
      Tax Corporation).

      * George Robards (Fairhope Planning and Zoning Commission Member; contractor
      for Single Tax Corp).

      * Tom Albritton (Director, Alabama Ethics Commission).

      * Marion Wynne (Fairhope City Attorney).

      * Council Members Boone and Brown.

      * Fairhope Single Tax Corporation (Private entity holding land/property interests
