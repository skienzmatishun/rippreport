hooks:
  manley-road-sidewalk-conflicts:
    brief: '**THE CONFLICT:**

      *   On Sept. 25, 2015, Francis Paul Ripp of The Ripp Report submitted an Ethics
      Complaint to Tom Albritton, Director of the Alabama Ethics Commission.

      *   The complaint centered on Lee Turner''s dual position: Chairman of the Fairhope
      Planning & Zoning Commission and President of the Single Tax Corporation.

      *   Ripp alleged conflicts regarding City of Fairhope joint financial projects
      with Single Tax Corp for infrastructure (like sidewalk construction) overseen
      by Turner.

      *   Specific allegation included George Robards holding public contracts from
      Single Tax Corporation, which required approval through a Planning & Zoning
      board chaired by Lee Turner.


      **THE DISCOVERY:**

      *   The March 14, 2016 Widget Article provides evidence of the specific conflict
      Ripp alleged in his Sept. 2015 complaint.

      *   It details Resolution #22: Authorization for City and Fairhope Single Tax
      Corp partnership for Manley Road sidewalk construction.

      *   The article notes that past contracts for these sidewalks were awarded to
      George Robards, a Planning and Zoning member whose president was Lee Turner
      (and also the President of Single Tax).


      **THE PIVOT:**

      *   Article 1 raises the general allegation of a conflict involving Lee Turner’s
      dual leadership role (P&Z Chair / Single Tax President) regarding city contracts
      and property.

      *   Article 2 functions as the ''smoking gun'' by providing a specific, dated
      example of that exact alleged conflict: George Robards receiving sidewalk contracts
      for the Manley Road project, which had to be approved by Turner-chaired P&Z
      while also being tied to Single Tax Corp interests.


      **KEY ENTITIES:**

      *   Francis Paul Ripp / The Ripp Report

      *   Tom Albritton (Director, Alabama Ethics Commission)

      *   Lee Turner (Chairman of Fairhope Planning & Zoning; President of Single
      Tax Corporation)

      *   George Robards (Planning and Zoning member/contractor)

      *   Fairhope City Government

      *   Fairhope Single Tax Corporation

      *   Manley Road Sidewalk Construction project'
    generated_at: '2026-07-17T20:27:15.718068Z'
  independence-day-2014:
    brief: '**THE CONFLICT:**

      *   Date: September 25, 2015.

      *   Francis Paul Ripp submitted an ethics complaint to Tom Albritton (Director
      of the Alabama Ethics Commission).

      *   Target: Lee Turner for holding dual roles as Chairman of Fairhope Planning
      & Zoning and President of the Single Tax Corporation (FSTC).

      *   Allegation: Conflict of interest due to FSTC ownership of property in Fairhope.

      *   Specific Evidence Cited: George Robards, a member of P&Z, received public
      contracts from the FSTC that required approval through the same body chaired
      by Turner.


      **THE DISCOVERY:**

      *   Recent report by Paul Ripp (dated July 4).

      *   Confirms the dual position of Lee Turner as Chairman of Planning & Zoning
      and President of FSTC is a "huge conflict of interest."

      *   Allegations of current turmoil caused by Turner within FSTC: removal of
      two members who questioned his actions, threats of police use against citizens
      at meetings.

      *   Current Operational Constraints: Public participation in FSTC limited to
      once per year for non-agenda items.

      *   Ongoing Issues Mentioned: Baptist Church dispute, Publix involvement, and
      Dyas Lawsuit complications.

      *   Proposed Action: Paul Ripp suggests a potential class action lawsuit against
      officials on the FSTC.


      **THE PIVOT:**

      *   The 2015 report (Article 1) was an inquiry into *potential* ethics violations
      concerning Turner''s dual positions and contract conflicts.

      *   The current report (Article 2) provides specific, contemporary evidence—such
      as the removal of members and micromanagement of processes—proving that those
      theoretical/potential ethical conflicts are manifesting in active organizational
      turmoil and warrant legal intervention.


      **KEY ENTITIES:**

      *   Lee Turner (Planning & Zoning Chair / FSTC President)

      *   Francis Paul Ripp / The Ripp Report

      *   Tom Albritton (Director, Alabama Ethics Commission)

      *   George Robards (P&Z Member/Contractor)

      *   Fairhope Single Tax Corporation (FSTC)

      *   Mayor Kant (Alleged controller of P&Z votes)

      *   Marion Wynne (City Attorney)

      *   Dyas Lawsuit / Baptist Church'
