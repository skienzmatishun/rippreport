  recuse-yourself:
    brief: 'THE CONFLICT:

      *   September 25, 2015 (Ripp Report): Ethics complaint filed by Francis Paul
      Ripp regarding potential conflict of interest involving Lee Turner.

      *   Lee Turner held dual roles as Chairman of Fairhope Planning & Zoning Commission
      and President of the Single Tax Corporation in the same municipality.

      *   The Single Tax Corporation owns substantial property within Fairhope, directly
      engaging with P&Z decisions overseen by Turner.

      *   George Robards (P&Z member) reportedly received public contracts from the
      Single Tax Corporation that required approval through the Planning & Zoning
      process presided over by Lee Turner.


      THE DISCOVERY:

      *   Current reporting alleges systemic failure of the Fairhope City Council
      to discipline conflicts of interest during votes on personally involved issues
      or businesses with council members.

      *   Councilman Mr. Boone has multiple undisclosed LLC business interests and
      a direct relationship with the Catalyst organization, which is a conflict in
      itself.

      *   Mr. Boone has undisclosed business ties dating back prior to his election
      involving Preble-Rish and developer Angelo Corte.


      THE PIVOT:

      *   Article 1 establishes a precedent (2015) of conflicts arising from dual
      roles within the Fairhope governmental/development structure.

      *   Article 2 demonstrates that these historical conflicts extend into current
      Council decision-making involving private business interests (Preble-Rish, Angelo
      Corte) and personal financial structures (Mr. Boone’s LLC network).

      *   The two articles show a pattern of self-interest prioritization across different
      tiers of Fairhope local government over many years.


      KEY ENTITIES:

      *   Lee Turner

      *   George Robards

      *   Single Tax Corporation

      *   Tom Albritton / Alabama Ethics Commission (2015)

      *   Mr. Boone

      *   Angelo Corte (Developer)

      *   Catalyst

      *   Fly Creek Apartments

      *   Preble-Rish

