  you-show-me-yours-and-i-will-show-you-mine-letter-that-is:
    brief: 'THE CONFLICT

      *   2015-09-25, The Ripp Report filed an Ethics Complaint with Tom Albritton
      (Director of Alabama Ethics Commission) regarding Fairhope City Government conflicts
      of interest.

      *   The complaint targeted Lee Turner, who held dual roles as Chairman of the
      Fairhope Planning & Zoning Commission and President of Single Tax Corporation.

      *   Conflict involved George Robards, a member of Planning & Zoning, who regularly
      received public contracts from the Single Tax Corporation that required P&Z
      approval under Turner''s oversight.


      THE DISCOVERY

      *   The Widget Article reveals contemporary accusations (c. 2016-2017) that
      Senator Pittman secured municipal contracts with Fairhope for emergency debris
      removal using a personal company.

      *   Senator Pittman was accused of operating without the mandatory general contractor’s
      license at the time of the contract award.

      *   The article alleges Mayor Kant and City Council authorized these conflicts,
      claiming an exonerating letter from the Ethics Commission that Francis Paul
      Ripp asserts does not exist or is meaningless regarding personal gain.

      *   Two identical complaints were filed with the Alabama Attorney General''s
      Office/Special Prosecutor Matt Hart; one was also filed with the BP Fraud Division.


      THE PIVOT

      *   Both articles establish a pattern of systemic conflict of interest within
      Fairhope City Government (P&Z, Single Tax Corporation, Municipal Contracting).

      *   Article 1 establishes that officials like Lee Turner and George Robards
      have long engaged in conflicts between governmental duties and affiliated private
      entities/contracts.

      *   Article 2 proves this is not an isolated issue but a broader pattern of
      corruption where elected officials (Mayor Kant/Senator Pittman) are accused
      of exploiting city resources for personal gain, while the Ethics Commission
      fails to adequately investigate or enforce ethical rules, as alleged by Francis
      Paul Ripp in both instances.


      KEY ENTITIES

      *   Lee Turner

      *   George Robards

      *   Tom Albritton

      *   Francis Paul Ripp (The Ripp Report)

      *   Mayor Kant

      *   Senator Pittman

      *   Single Tax Corporation

      *   Fairhope Planning & Zoning Commission

      *   Matt Hart (Special Prosecutor)

      *   Alabama Ethics Commission'
