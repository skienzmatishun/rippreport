      4. KEY ENTITIES

      - Huey Hoss Mack (Sheriff Baldwin County)

      - Tom Albritton (Ethics Commission Executive Director)

      - Tripp Pittman (State Senator)

      - Chief Justice Tom Parker (Alabama Supreme Court)

      - Judge Thomason (Circuit Court Baldwin County)

      - Mabel Amos Memorial Foundation / Trust

