  quid-quo-pro:
    brief: 'CONFLICT:

      - Fairhope City Council (referred to by critics as "CATALYST" or the 3B''s:
      Burrell, Brown, Boone) rejected a land choice preferred by State Park Board
      and citizens.

      - June 28, 2019: Appraisal date for property released privately before public
      input.

      - Councilmen Burrell, Brown, Boone decided on purchase before appraisal results
      fully utilized or public knowledge.

      - December 2019: Council voted to purchase property for $2,650,000 using taxpayer
      funds.

      - Funds were not originally budgeted for recreation land; money previously spent
      on K1 Center and Nix Building (>$5M) was not available.

      - January 2020: Within 60 days of purchase, City Council declared property surplus
      and not needed for public/municipal purposes.

      - January 1, 2020: Property leased for $9,000/year with four one-year options
      instead of developed.

      - Article 1 alleges Councilmen Burrell, Brown, and Boone received "commission
      checks" in exchange for approval.


      DISCOVERY:

      - Article 2 confirms the specific voting count for the purchase was 3 to 2 involving
      Burrell, Boone, and Brown.

      - Article 2 labels the arrangement as "Quid Quo Pro" / "Something for Something."

      - Article 2 explicitly links Councilman Robert Brown to Clifford Pittman as
      a business partner and "inside contact" for Fairhope Single Tax Colony.

      - Article 2 alleges Councilman Brown is pushing a contract to build a subdivision
      in the Gully (near Triangle property) with potential financial enrichment.

      - Article 2 accuses Councilman Brown of lacking documentation for Ethics Commission
      permission regarding Eastern Shore Art Center (ESAC) contracts.

      - Article 2 asserts Mayor Karin Wilson is publicly supporting this faction while
      citizens file written complaints regarding the "favor for a favor" scheme.


      PIVOT:

      - Article 2 is the smoking gun because it explicitly names the corruption model
      ("Quid Quo Pro") that Article 1 rhetorically questions.

      - Article 2 provides the motive: Business partner ties (Brown/Pittman) and potential
      personal contract wins (Gully subdivision), explaining why the City Council
      prioritized buying/leasing this specific land in 2019-2020.

      - Article 2 validates the specific vote count (Burrell, Boone, Brown) that Article
      1 identifies as the "3B''s" manipulating the process.


      KEY ENTITIES:

      - Mayor Karin Wilson

      - Councilman Burrell

      - Councilman Brown (Robert Brown)

      - Councilman Boone

      - City of Fairhope

      - Catalyst Coalition / CATALYST

      - Cliff Pittman (Fairhope Single Tax Colony)

      - Eastern Shore Art Center (ESAC)

      - Gully property triangle

      - State Park Board'
