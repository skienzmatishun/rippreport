      to convince the Daphne City Council.

      *   John Lake has served 24 years on the Daphne City Council with no ethics
      complaints or allegations of self-dealing.

      *   The Catalyst candidate structure is portrayed as a political cancer and
      an agent of obstruction.


      THE DISCOVERY

      *   The Fairhope City Council acted to cancel the October special election despite
      legal guidelines regarding a change of government petition filed by Fresh Start
      Fairhope.

      *   The council instructed the city attorney to cancel the referendum, spreading
      misinformation to voters.

      *   The Catalyst/No vote base has a core group estimated at approximately 3500
      voters.


      THE PIVOT

      *   Article 2 reveals the specific legal and procedural maneuvers (canceling
      elections, utilizing the Attorney General''s opinion) that allowed the Fairhope
      City Council to obstruct the democratic process, which is the underlying systemic
      corruption referenced by the Catalyst failures in Article 1.


