    text: The council drained city savings and impact fees to force through a reckless land deal they promised was only an appraisal. Boone, Burrell, and Brown are intentionally sabotaging the city's future to fund their own reckless agenda. They voted for family insurance while the city's bank accounts ran dry.
  catalyst-colors:
