      *   Elected officials in Shelby County have begun fighting unregulated sewage fees.

      THE DISCOVERY
      *   Baldwin County Sewer Service is the only privately operated sewer service in Alabama and remains unregulated.
      *   Mr. Clarence Burke is the principal of BCSS and resides in Costa Rica, a cost borne by Baldwin County residents.
      *   BCSS uses county right-of-ways free and allows developments on farmland to use BCSS for subdivisions, facilitating sprawl.
      *   A straw-man lawsuit alleges that BCSS President Clarence Burke conspired with South Alabama lender Delaney to use a Ponzi scheme.
      *   Sealed court records reveal business and political connections between major players in Baldwin County development.

      THE PIVOT
