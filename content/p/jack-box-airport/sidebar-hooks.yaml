  bushwhacked-hijacked-fairhope-style:
    brief: "**1. THE CONFLICT:** \n*   The Airport Authority is planning to hire a\
      \ \"top ethics attorney\" at public expense to defend board members Jack Burrell\
      \ and Ray Hix against complaints from The Ripp Report.\n*   Jack Burrell, as\
