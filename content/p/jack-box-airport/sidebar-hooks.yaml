  whos-on-first:
    brief: 'THE CONFLICT

      • Focus of complaint against the Fairhope Airport Authority involved Councilman
      Jack Burrell and Ray Hix (2017).

      • Allegations included improper use of taxpayer funds to hire legal counsel
      to quash or deflect an investigation from the Attorney General and Ethics Commission.

      • The "top ethics attorney" identified in the dispute was Dennis R. Bailey,
      representing Mr. Hix.

      • A specific incident involved Fairhope resident inquiries made to Ethics Commission
      Chief Council Hugh Evens regarding airport information, wherein Mr. Evens copied
      Mr. Hix''s attorney, Dennis R. Bailey.


      THE DISCOVERY

      • The correspondence from 2017 reveals procedural and substantive inconsistencies
      within the lease approval process for a Ground Lease (dated December 17th, 2015).

      • Attorney Dennis R. Bailey submitted a Request for Advisory Opinion to the
      Alabama Ethics Commission on Dec. 16th, 2015, referencing an unsigned copy of
      the lease called EXHIBIT C (dated Dec. 21st, 2015).

      • The actual executed Ground Lease and Memorandum of Lease was recorded with
      Baldwin County Judge of Probate on December 28, 2015.

      • This execution predates both the Ethics Commission Advisory Opinion (March
      3rd, 2016) and the required filing deadline of Dec. 27th, 2015 (as stated in
      the advisory opinion).

      • Multiple lease versions exist: EXHIBIT B (sample), EXHIBIT C (ethics request),
      and the recorded December 17th/2015 version; these documents contradict each
      other regarding construction timelines and legal language.


      THE PIVOT

      • The Main Article alleges procedural corruption—that Hix''s attorney was used
      by the Authority to manipulate a standard ethical inquiry into his own interests
      (The "Jack in the Box" accusation).

      • The Widget Article proves this manipulation resulted in demonstrably flawed,
      inconsistent, and legally questionable administrative decisions regarding the
      Ground Lease, demonstrating systemic failure of regulatory adherence.


      KEY ENTITIES

      • Jack Burrell (City Council)

      • Ray Hix (Sec. Treasurer for Authority / Former Board Member)

      • Dennis R. Bailey (Attorney representing Mr. Hix)

      • Hugh Evens (Ethics Commission Chief Counsel)

      • Joe McEnerney (Fairhope Airport Authority Chairman)

      • Josh Myrick (Recipient of Open Letter/Attorney)

      • Fairhope Airport Authority

      • Alabama Ethics Commission

      • Baldwin County Judge of Probate'
