      \ under investigation.\n*   Ray Hix's attorney prepared a lease in question\
      \ and was paid by Mr. Hix to request an Advisory Opinion from the Ethics Commission.\n\
      *   The Fairhope Airport Authority is hiring Ray Hix’s attorney while he serves\
      \ as Sec. Treasurer of the Authority to conduct its own investigation into a\
      \ legitimate complaint.\n*   A resident inquired with Ethics Commission Chief\
      \ Council Hugh Evens regarding the Fairhope Airport Authority; Mr. Evens CC'd\
      \ Jack Burrell's attorney, Mr. Bailey, in confidence.\n\n**2. THE DISCOVERY:**\
      \ \n*   City Council President Jack Burrell is leading a political crusade to\
      \ obstruct and harass Mayor Karin Wilson (referred to as \"the Mayor\") to drive\
      \ her out of office.\n*   Burrell’s faction seeks to maintain control over the\
      \ Fairhope Airport Authority and secure its title in the name of the Authority\
      \ rather than the city.\n*   The City Council is attempting to strip the budget\
      \ responsibility from the Mayor to a council-hand picked financial committee,\
      \ running against law.\n*   Jack Burrell has a history as an Airport Board member\
      \ where he allegedly accepted gifts (wetlands and drainage) for developers like\
      \ Fly Creek Apartments while ignoring infrastructure issues.\n\n**3. THE PIVOT:**\
      \ \n*   The second article reveals that Jack Burrell is actively engaged in\
      \ a political effort to maintain control over city functions, including the\
      \ Fairhope Airport Authority.\n*   This established motive (controlling assets\
      \ and obstructing current administration) provides context for Article 1's claim\
      \ that Burrell/the City Council are engaging in questionable ethics practices\
      \ to quash accountability using hired attorneys during an investigation of their\
      \ own oversight bodies.\n\n**4. KEY ENTITIES:**\n*   Jack Burrell (City Council\
      \ Member, Airport Board Member)\n*   Ray Hix (Sec. Treasurer for the Authority;\
      \ former Airport Authority Board Member)\n*   The Ripp Report\n*   Fairhope-Airport\
      \ Authority\n*   Ethics Commission / Ethics Commission Chief Council Hugh Evens\n\
      *   Karin Wilson (Mayor)\n*   Jack Burrell's Attorney (Mr. Bailey)"
