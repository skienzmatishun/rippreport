      bad behavior dating back to 2015.


      THE PIVOT

      * The historical record (Widget Article) proves that systemic ethical failures
      and disregard for rules existed at the airport level years before current accusations
      against Jack Burrell and Ray Hix, establishing a pattern of institutional misconduct
      rather than isolated incidents.


      KEY ENTITIES

      * Fairhope Airport Authority

      * Jack Burrell

      * Ray Hix

      * The Ripp Report

      * Hugh Evens (Ethics Commission Chief Council)

      * City Council (Historical/Current members)'
