hooks:
  hi-jack-ed:
    brief: '**BRIDGE BRIEF**


      **THE CONFLICT:**

      *   Allegations of a plan to quash investigations into the Fairhope Airport
      Authority using tax dollars was raised.

      *   The "top ethics attorney in Alabama" allegedly hired by the Authority Board
      involved Ray Hix’s attorney, who prepared a lease and was paid by Mr. Hix (Sec.
      Treasurer).

      *   Mr. Hugh Evens (Ethics Commission Chief Council) blind-copied Mr. Bailey
      (Hix''s attorney) regarding an inquiry about the Fairhope Airport Authority
      from a resident in 2017.

      *   The Ripp Report alleged that while these ethics issues were unfolding, Councilman
      Jack Burrell was deflecting responsibility and attacking Mayor Kant/Mayor Wilson
      for financial decisions ($90,000 cost).


      **THE DISCOVERY:**

      *   Article 2 confirms the Fairhope Airport Authority has historically been
      a "black hole" of public information and scrutiny.

      *   The budget allocates $500,000 annually to the Airport Authority (nearly
      $200k more than education contribution), with no questions asked.

      *   The Board consists of members with personal/financial links to the Airport;
      justification was limited to needing aviation knowledge.

      *   Mayor Wilson highlighted that 21% of the City’s budget is the Airport, serving
      less than 1% of residents.

      *   Mr. Burrell (Council President) serves as the city''s liaison for the Authority
      despite his role representing citizen interests.

      *   The discovery suggests Mr. Burrell used his Council President position to
      oversee and select bids for airplane hangers via an ad hoc committee, creating
      a conflict with his liaison duties.


      **THE PIVOT:**

      *   Article 2 substantiates Article 1''s claims by demonstrating systemic conflicts
      of interest (Board member links, financial allocation disparities) and showing
      Mr. Burrell’s role in the Authority beyond simple deflection.

      *   It reveals that despite external ethics concerns, the Airport Authority
      has functioned as an entity prioritized over general city interests, lending
      weight to Article 1''s accusations that the Board is "above" citizen accountability.

      *   Article 2 frames Mr. Burrell not just as a deflector (as accused in Art
      1), but as integral to managing and potentially benefitting from the Authority''s
      lack of transparency and control, including influencing ad hoc committees for
      contracts like airplane hangers.


      **KEY ENTITIES:**

      *   Jack Burrell / Mr. Burrell

      *   Ray Hix / Mr. Hix (Sec. Treasurer)

      *   Hugh Evens

      *   Mayor Wilson

      *   Fairhope City Council / Fairhope Airport Authority

      *   Mr. Bailey (Hix''s attorney)'
    generated_at: '2026-07-18T05:00:27.926308Z'
  fairhope-airport-un_authorized:
    brief: 'THE CONFLICT:

      *   August 7, 2015: Ray Hix was appointed as Secretary/Treasurer of the Fairhope
      Airport Board, alongside Joe McEnerey (Chairman) and Pam Caudill (Vice Chair).

      *   Hix acquired privileged confidential information regarding airport leases
      and bids while holding this position.

      *   December 23, 2015: The Airport Authority signed a memorandum of lease with
      Mid Bay Air LLC. This occurred prior to any formal request for an Ethics Commission
      advisory opinion.

      *   Jack Burrell acted as the Chair of an ad hoc committee that reviewed bids
      and determined Hix’s associated company was the winner.

      *   November 8, 2016: A request was made to the Alabama Ethics Commission regarding
      the Mid-Bay Air Lease awarded around December 2015.

      *   December 2, 2016: The Alabama Ethics Commission responded that "No lease
      has ever been submitted to us regarding this issue."


      THE DISCOVERY:

      *   The Airport Authority is currently utilizing tax dollars to hire an attorney
      to investigate and defend board members Jack Burrell and Ray Hix.

      *   This appointed “top ethics attorney of Alabama” is the legal counsel for
      Ray Hix, who was specifically paid by Hix to prepare a request for an Ethics
      Commission advisory opinion.

      *   The representation is occurring while Mr. Hix still holds his position as
      Secretary/Treasurer for the Authority.

      *   Ethics Commission Chief Council Hugh Evens blind-copied Mr. Bailey (Hix’s
      attorney) on an inquiry made by Fairhope resident "Jack" regarding the Airport
      Authority in 2017.


      THE PIVOT:

      *   The current hiring of an ethics lawyer to deflect accountability is a direct
      response to established, documented conflicts of interest and failures in due
      diligence detailed in Article 2 (e.g., signing leases before adhering to ethics
      requirements).

      *   Article 1 demonstrates that the parties are attempting to circumvent investigation
      using legal maneuver—specifically, employing Hix''s own counsel—which proves
      they recognize the inherent ethical liability outlined in the historical lease
      documents from Article 2.


      KEY ENTITIES:

      *   Jack Burrell (Council President / Airport Board Member)

      *   Ray Hix (Secretary/Treasurer of Airport Authority / former Municipal Judge)

      *   Mid Bay Air LLC

      *   Joe McEnerey (Former Chairman, Airport Authority)

      *   Pam Caudill (Former Vice Chair, Airport Authority)

      *   Hugh Evens (Ethics Commission Chief Council)

      *   Mr. Bailey (Ray Hix''s Attorney)

      *   The Ripp Report'
    generated_at: '2026-07-18T05:00:27.926317Z'
  court-public-opinion-now-session:
    brief: 'THE CONFLICT

      - A formal complaint ("Supplement to Complaint Fairhope Airport Authority")
      was filed on January 25, 2017, by Francis Paul Ripp of The Ripp Report.

      - Allegations targeted Jack Burrell for aiding and abetting a grossly flawed
      Request for Proposal (RFP) process at the Fairhope Airport Authority.

      - Specific allegations included improper bidding, lack of ethics compliance,
      and bid rigging involving Hix/Snedeker aircraft (Mid Bay Air LLC).

      - The complaint highlighted that the "lease" was signed and notarized on December
      17, 2015, while the required Ethics Advisory Opinion was not rendered until
      February 3, 2016.

      - Jack Burrell held dual roles: Fairhope City Council President and Airport
      Authority voting Board member/liaison during this process.


      THE DISCOVERY

      - The second article (Widget) provides documented historical context for current
      allegations against Council President Jack Burrell and Sec. Treasurer Ray Hix
      regarding the airport''s property status and debt of $8 million.

      - It reveals that Burrell controls the City Council agenda and has blocked efforts
      to repeal ordinance 1572 concerning the Airport Authority.

      - The report details a prior public complaint (from January 2017) citing improper
      use of inside information by Ray Hix, who utilized his past role (April to July
      2015) as Sec. Treasurer to gain privileged access to the Authority''s financial
      records before the RFP process began.


      THE PIVOT

      - Article 2 provides the specific documented history and detailed allegations
      (bid rigging, flawed RFP, illegal lease execution date vs. advisory opinion
      date) that explain why Ray Hix’s attorney and Jack Burrell are being hired by
      the Airport Authority to "head off" investigations in Article 1.

      - Article 1 references a legitimate complaint already in authorities'' hands;
      Article 2 reveals this complaint is detailed, specific (dating back to Dec 2015/Jan
      2017), and focuses directly on Burrell''s dual role as Council President and
      Board member overseeing the conflicted bidding process.


      KEY ENTITIES

      - Jack Burrell (Fairhope City Council President / Airport Authority Voting Board
      member)

      - Ray Hix (Sec. Treasurer for Fairhope Airport Authority; Board Member of Hix/Snedeker
      companies)

      - Francis Paul Ripp / The Ripp Report (Lead advocate and complaint filer)

      - Hugh Evens (Ethics Commission Chief Council)

      - Attorney Bailey (Hix’s attorney)

      - Snedeker (Hix/Snedeker aircraft, Mid Bay Air LLC)

      - Mr. Terry Chapman and Kel Jones (Bidders for the RFP)

      - Fairhope Airport Authority (Entity under investigation regarding lease negotiation
      and tax dollars)'
    generated_at: '2026-07-18T05:00:27.926335Z'
  fairhope-airport-authority-flying-without-a-compass:
