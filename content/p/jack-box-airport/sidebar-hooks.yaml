  captain-jack-at-the-controls:
    brief: 'THE CONFLICT:

      *   2017: Fairhope resident inquired about the Airport Authority via Ethics
      Commission Chief Council Mr. Hugh Evens; Mr. Evens blind copied Mr. Bailey,
      Hix’s attorney, regarding the inquiry.

      *   Post-2016 (After defeat of former Mayor Can''t): Documents were presented
      to The Ripp Report detailing suspicious handling of hangar lease bids at the
      Airport Authority. This involved a board member receiving free air miles and
      golf vacations while overseeing the bid process.


      THE DISCOVERY:

      *   The Fairhope Airport Authority, currently controlled by Council President
      Jack Burrell (acting as council liaison), lacks transparency regarding long-range
      plans and refusal to allow City of Fairhope title acquisition despite subsidies.

      *   Financial operations are opaque; the Authority receives $0.07 per gallon
      on fuel income, but the Fixed Based Operator fails to provide usage records
      necessary for accurate billing/auditing.

      *   The Authority is currently engaging in a legal defense strategy using taxpayer
      dollars to hire an ethics attorney, specifically Ray Hix''s counsel, to quash
      potential investigations by AG and Ethics Commission.


      THE PIVOT:

      *   Article 1 outlines the current attempt to use tax money for a legal "end
      run" against accountability (hiring Mr. Hix’s attorney). Article 2 provides
      historical evidence of a long-standing pattern of improper governance, opaque
      financial management, and self-dealing within the Authority under Burrell''s
      oversight ("Captain Jack").

      *   The history of shady bids and lack of records detailed in Article 2 proves
      that the current legal maneuvers described in Article 1 are part of an ongoing
      effort to shield the Authority from accountability for deep, systemic governance
      failures.


      KEY ENTITIES:

      *   Fairhope Airport Authority (FAA)

      *   Jack Burrell (Council Member / Council President)

      *   Ray Hix (Sec. Treasurer; Board Member)

      *   Mr. Hugh Evens (Ethics Commission Chief Council)

      *   Joe McEnerney (Authority Board President)

      *   The Ripp Report

      *   City of Fairhope

      *   Former Mayor Can''t'
