  fairhope-going-backwards:
    brief: '1. THE CONFLICT

      *   Date: May 15, 2015.

      *   Event: Fairhope City Council faced a "disconnect" following the March 31
      referendum vote rejection of property tax increases (70% voter rejection).

      *   Claim/Allegation: Mayor orchestrated an unethical council meeting that omitted
      citizen participation while settling a lawsuit for $12 million, purportedly
      for "Future Park."

      *   Financial Disparity: City spending on lawsuits and parks reached $17 million.
      Education funding was only $350k over the last 2 years ($21.88 per voter).

      *   Implication: The Mayor inflated city contributions to education by classifying
      "city services" (paid for by taxpayers) as "$2.5 Million in ''in kind services''."


      2. THE DISCOVERY

      *   Revelation: The second article alleges a systemic network of corruption
      involving the "three B''s": Jack Burrell, Robert Brown, and Kevin Boone.

      *   Organization identified: CATALYST/Scott Boone Consulting is presented as
      an organized political entity that supports these officials and has been linked
      to "wasteful contractors" within City Hall.

      *   Action Taken: Mayor Wilson is credited with successfully scrutinizing, identifying,
      and eliminating the majority of this corruption and reversing a $6 million debt
      to fiscal health.

      *   Specific Link: Scott Boone Consulting is noted as being run by Councilman
      Kevin Boone’s son (Scott).


      3. THE PIVOT

      *   The first article documented massive spending ($17M in lawsuits/parks) that
      was seen as diverting resources from education, implicating Jack Burrell and
      the city council structure of 2015.

      *   The second article identifies the specific political organization (CATALYST),
      individuals (Burrell, Boone, Brown), and familial ties (Scott Boone / Kevin
      Boone) responsible for the alleged "inside deal" and wasteful contracting, providing
      a concrete framework to understand why high-cost decisions like $12 million
      park lawsuits were made.


      4. KEY ENTITIES

      *   Jack Burrell: Council President in 2015; implicated in misallocation of
      city funds (Main Article). Later identified as one of the "three B''s" and subject
      of challenges by Deb Hokpkins.

      *   Robert Brown: Identified as one of the "three B''s"; facing challenger Joshua
      Gammon.

      *   Kevin Boone: Councilman; linked to CATALYST through his son, Scott Boone
      (Scott is a consultant/owner).

      *   Diana Brewer: Council member mentioned in 2015 article regarding $12 million
      lawsuit settlement.

      *   Karin Wilson: Mayor who reversed debt and eliminated "wasteful contractors,"
      countering the influence of CATALYST/three B''s (Widget Article).

      *   CATALYST / Scott Boone Consulting: Political organization linked to Burrell,
      Brown, and Kevin Boone; accused of sponsoring corruption and block voting.

      *   Jack Burrell (2015) vs. Jack Burrell (Current): The entity from the past
      is connected to the current critique of him being part of the corrupt "three
      B''s" network.'
