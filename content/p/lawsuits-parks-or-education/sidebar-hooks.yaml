      *   Fairhope donated only $350 thousand to education over two years, contrasting
      sharply with the $17 million spent on lawsuits and parks (approx. $21.88 per
      voter for education vs. $17,000 per voter for infrastructure/lawsuits).


      THE DISCOVERY:

      *   A 2016 political guide explicitly identifies the "triangle lawsuit" as a
      historical event costing Fairhope $12 million and leading to public outcry.

      *   It confirms that Mayor Kant was criticized by candidates like Karin Wilson
