hooks:
  last-chance-fauxhope-or-fairhope-vote-out-fauxhope-city-council:
    brief: 'THE CONFLICT

      - 23 years of Fairhope politics followed by author citing "Good Ole Boy Club"
      existence.

      - Jack Burrell identified as Councilman and "de facto Mayor".

      - 2020: COVID election win awarded reward of second paycheck for Mayor role
      to head of utilities ("double dipping").

      - Utilities engineer position occupied by "high school graduate with no qualifications"
      after qualified engineer fired under guidance of Jack Burrell and Council.

      - Waterfront Project started 5 years ago (11th hour of Wilson Administration),
      funds secured by Mayor Wilson.

      - Waterfront Project cost increased from 6.3 million to 10 million (ballooned);
      attributed by Council/Jack Burrell to rise in construction costs ("B.S.").

      - Jack Burrell rejected spending money on another Water Tank; resulted in multiple
      water shortages.

      - Publix project developer ignored violations, dumped tons of mud in Fly Creek
      and bulldozed county/city right of ways.

      - Jack Burrell accepted 500 dollars from Jade Consulting (pending development
      project).

      - Freedom of Speech case: Jack refused right to speak in front of city council;
      Federal Court resulted in Council/Jack losing and paying attorney fees.

      - Council reinstated same Municipal Judge and Municipal Attorney without objection.

      - Former Councilmen Brown (Fairhope Art Center contract) and Boone removed for
      conflict of interest, but no one on Council objected.

      - Friend Ronan McSherry (or McSharry) arrested multiple times for assaulting
      women; Council/Municipal Attorney covered up wrongdoing.

      - Author (Troy Vickers) claims Council ghosts citizen complaints and no resolution
      to issues (Library issue).


      THE DISCOVERY

      - Widget Article Point 7 adds specific update not in Main Article: "Today mud
      still goes into fly creek from the apartments built not far from its banks".

      - Main Article Point 7 ends with "Thanks Jack???" after stating environmental
      damage and lawsuits.

      - Main Article Image Context: Troy Vickers at table with constituents.

      - Widget Article Image Context: Fairhope city flag with clock tower design,
      overlaid with lightning bolts (symbolizing controversy).

      - Widget Article Metadata Key Topics explicitly list: Mayor Wilson, Publix,
      Waterfront Project, Ronan McSharry.

      - Main Article Metadata Key Topics limited to: Elections, City Council, Burrell.

      - Widget Title includes "VOTE OUT FAUXHOPE CITY COUNCIL".

      - Main Article Title limited to "LAST CHANCE - FAUXHOPE OR FAIRHOPE".

      - Widget Text Point 10 uses spelling "McSharry" in arrest context vs "McSherry"
      in friendship intro (Text inconsistency: "One of the friends is Ronan McSherry.
      McSharry has been arrested").


      THE PIVOT

      - Article 2 serves as an updated verification of ongoing environmental damage
      from Article 1''s Publix claim ("Today mud still goes").

      - Both articles share identical text structure for all 10 allegations (including
      "double dipping", Waterfront costs, Water Tank) sourced from the same `rippreport.com`
      link structure.

      - Widget Metadata explicitly flags entities (Mayor Wilson, Publix, Waterfront
      Project) as topics for Article 1''s Main Content points.

      - Widget Image context (Lightning bolts) directly matches the "controversy"
      framing requested by Main Article''s content ("infamous flip flopping").

      - Both articles instruct reader to use Search bar on `rippreport.com` for "Jack
      Burrell" to access historical evidence.


      KEY ENTITIES

      - Jack Burrell (Councilman, labeled de facto Mayor)

      - Troy Vickers (Candidate, Place 1)

      - Mayor Wilson (Prior, awarded second paycheck in 2020)

      - Ronan McSherry / Ronan McSharry (Friend, arrested multiple times)

      - Kevin Boone (Former Councilman, Art Center contract)

      - Andrea Faust (Incumbent Council Member "rubber stamp" replacement)

      - Council Brown (Former Councilman, removed)

      - Jade Consulting ($500 donation recipient)

      - Fairhope Art Center (Contract issuer for Brown)

      - Fly Creek (Location of mud dumping)

      - Publix (Developer, violations ignored)

      - Baldwin County (Municipality involved in lawsuits/damages)'
