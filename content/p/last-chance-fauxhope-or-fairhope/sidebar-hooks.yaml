      citizens complaints"; Citizens left with no resolution to Library issue.

      - Waterfront Project: Secured funds 5 years ago during Wilson Administration;
      Original contractor replaced; Cost ballooned from $6.3 million to $10 million;
      Project not finished.

      - Infrastructure: Mayor Wilson left millions in grants for upgrades; Jack/Council
      did not finish infrastructure upgrades in 5 years; Multiple water shortages
      approved while spending on development.

      - Conflicts of Interest: Burrell accepted $500 from Jade Consulting (pending
      development project); Councilman Brown took Fairhope Art Center bid; Councilman
      Boone took contract from developer.

      - Freedom of Speech: Burrell/Council refused citizen right to speak during scheduled
      public participation; Federal mediation resulted in Burrell/Council paying attorney
