hooks:
  skunked:
    brief: 'THE CONFLICT:

      *   Chuck Zunk was appointed to the finance committee by Jack Burrell to monitor
      and financially obstruct Mayor Wilson and the budget process.

      *   The conflict stems from Zunk’s connection to the Airport scandal and dubious
      airplane hanger lease, where Zunk supports keeping property with the Airport
      Authority rather than the city.


      THE DISCOVERY:

      *   The "Fresh Start for Fairhope" movement shifted its focus on government
      structure, moving from Districts to At-Large representation.

      *   Chuck Zunk’s survey (39 votes) influenced this shift, leading him to declare
      that Fairhope needed to remain with a Council "at large."


      THE PIVOT:

      *   Article 2 proves Article 1''s claim that Zunk is manipulating the political
      agenda. The discovery shows that Zunk used his survey results to push for At-Large
      representation because he and affiliated groups (like Catalyst) desire control
      over the Council structure rather than citizen accountability provided by Districts.


      KEY ENTITIES:

      *   Chuck Zunk

      *   Mayor Wilson

      *   Jack Burrell

      *   Airport Scandal

      *   City Council

      *   Catalyst group

      *   Fresh Start Fairhope

      *   Judge Tim Russell'
