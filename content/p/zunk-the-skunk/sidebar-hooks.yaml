  in-your-face:
    brief: 'THE CONFLICT:

      - Chuck Zunk was appointed to the finance committee by Jack Burrell to monitor
      and obstruct Mayor Wilson’s budget process.

      - Zunk supported keeping the Airport property with the Airport Authority instead
      of the city.


      THE DISCOVERY:

      - Jack Burrell structured the $350,000 city school fund appropriation to cover
      only mortgage payments, ensuring the Airport held the mortgage rather than the
      city.

      - Councilman Robert Brown secured a contract with the Eastern Shore Art Center
      without obtaining necessary approval from the Ethics Commission.

      - An Ethics Complaint was filed against Councilman Brown on February 26, 2018,
      regarding his actions concerning the Art Center contract.


      THE PIVOT:

      - Article 2 provides specific evidence (the Ethics Complaint and details of
      Burrell’s financial maneuvering) that connects the general conflict in Article
      1 (Airport scandal, accountability) to concrete instances of elected officials
      misusing their positions for personal gain.


      KEY ENTITIES:

      - Chuck Zunk

      - Jack Burrell

      - Mayor Wilson

      - Fairhope Airport

      - Councilman Robert Brown

      - Ethics Commission

      - Eastern Shore Art Center'
