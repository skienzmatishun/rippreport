  fire:
    brief: 'THE CONFLICT:

      * Date: May 2014 (Primary Election period)

      * Allegation: Rampant political corruption among Baldwin County incumbents ("Sicko
      Six").

      * Key Figures Involved: Senator Pittman, Mayor Kant, Tucker Dorsey, Bob James,
      and Charles Gruber.

      * Events: The "BP Boom Scandal" involved Pittman and Mayor Kant stealing grant
      money. They also maneuvered legislation to allow Hoss Mack access to the Sheriff
      position and doubled county commission pay through unconstitutional moves.

      * Cover-up: Key administrators (Emergency Management Director Leigh Ann Ryals,
      County Administrator Michael Thompson, Legal Department Scott Barnett) were
      fired by the Pittman/Kant group specifically to cover up financial crimes related
      to the BP Boom grant.


      THE DISCOVERY:

      * Article 2 confirms Tucker Dorsey''s direct involvement in and complicity with
      the corruption described in Article 1.

      * It proves that as a County Commissioner, Dorsey ignored Pittman’s company
      receiving $750,000 in combined contracts for BP Boom deployment.

      * Article 2 links this financial misconduct to Governor Riley, who had designated
      Sen. Pittman as the "trustee" of those specific grant funds.

      * It re-establishes that Dorsey initially fired key county management (county
      manager, EMA director, county attorneys) at a time when these individuals were
      actively trying to prevent Sen. Pittman from facing ethics charges related to
      the BP Grant.


      THE PIVOT:

      * Article 1 makes generalized accusations that Tucker Dorsey is part of the
      corrupted "Sicko Six" and enabled financial misconduct by Senator Pittman (specifically
      regarding the theft of boom grant money).

      * Article 2 serves as the ''smoking gun'' because it provides specific transactional
      evidence: It proves Dorsey knew about, witnessed, and intentionally overlooked
      the $750,000 contracts awarded to Pittman’s company during the BP Boom deployment.
      This moves his role from general complicity to documented obstruction of ethics/financial
      oversight.


      KEY ENTITIES:

      * Senator "Slippery Trip" Pittman (State Senator)

      * Mayor Kant / Tim Kant (Mayor)

      * Tucker Dorsey (County Commissioner)

      * Bob James (Business Partner)

      * Charles Gruber (Baldwin County Commissioner, Seat 4)

      * Hoss Mack (Referenced as a beneficiary/puppet)

      * Governor Riley (Designer of the BP Grant funds trustee)

      * Leigh Ann Ryals (Fired Emergency Management Director)

      * Michael Thompson (Fired County Administrator)

      * Scott Barnett (Fired Legal Department head)'
