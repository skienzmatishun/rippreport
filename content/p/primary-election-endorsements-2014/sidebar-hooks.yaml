hooks:
  you-show-me-yours-and-i-will-show-you-mine-letter-that-is:
    brief: 'THE CONFLICT

      *   May 24, 2014, The Ripp Report filed a complaint regarding political corruption
      in Baldwin County.

      *   The allegations centered on Senator Pittman maintaining emergency debris
      removal contracts for the City of Fairhope while allegedly stealing the BP Boom
      Grant with Mayor Kant.

      *   Senator "Slippery Trip" Pittman and Mayor Kant were accused of being caught
      "red-handed along with" a BP Boom Scandal.

      *   Complaints regarding these crimes were submitted to the Alabama Ethics Commission
      in 2014.


      THE DISCOVERY

      *   The second article reveals that Senator Pittman and Mayor Kant do not possess
      an exonerating letter from the Ethics Commission concerning the Fairhope BP
      Boom Grant matter.

      *   While Article 1 mentioned a complaint, Article 2 discloses the investigation
      escalated to the FBI, resulting in a Grand Jury.

      *   The case was forwarded by the Alabama Attorney’s Office to Special Prosecutor
      Matt Hart within the AG''s White Collar Division for resolution.

      *   The complaint revealed that Pittman lacked mandatory general contractor’s
      license at the time of his Fairhope debris removal contract and admitted authorizing
      anchors/rope to be cut free from the boom rather than retrieved as required
      by contract.


      THE PIVOT

      *   Article 1 publicly suggested the allegations were under review by the Alabama
      Ethics Commission.

      *   Article 2 serves as the ''smoking gun'' because it debunks the defense''s
      public narrative of exoneration, revealing that the matter is not merely an
      ethics dispute but a higher-level criminal investigation involving the FBI and
      Special Prosecutor Matt Hart.


      KEY ENTITIES

      *   Senator Pittman

      *   Mayor Kant (Tim Kant)

      *   Alabama Ethics Commission

      *   Matt Hart (Special Prosecutor / White Collar Division of AG’s Office)

      *   City of Fairhope

      *   BP Boom Grant Scandal

      *   Tucker Dorsey

      *   Bob James

      *   Charles Gruber

      *   Leigh Ann Ryals (Emergency Management Director, mentioned in Article 1 context)'
