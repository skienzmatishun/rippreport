  you-dont-know-jack:
    brief: "1. THE CONFLICT: \n- Jack Burrell has served as Fairhope City Council President for 9 years (now starting third term).\n- Federal court lawsuit filed against Burrell and City Council for denying public speech rights in violation of city ordinance.\n- The City lost the lawsuit; taxpayers billed thousands plus costs.\n- Public meetings at Fairhope Airport Authority have had no recorded video since February due to lack of transparency.\n- Mayor (new) and Burrell are bypassing previous Mayor Wilson’s demand for online transparency.\n- Specific allegation: Airport Authority issued an RFP Sept 21, 2015 for ground lease of commercial hanger on Plat 2 with submittal date Oct 13, 2015.\n\n2. THE DISCOVERY: \n- Widget article confirms the RFP dates (Sept 21/Oct 13, 2015) and identifies Jack Burrell as on the committee reviewing bids for this project.\n- Vince Boothe and Ray Hix (Airport Authority Board members) were involved in the bid process; Snedecker is partner of Hix.\n- On Nov 17,\
      \ Ray Hix recused himself from that specific meeting but the board (led by Burrell and Boothe) voted.\n- Jack Burrell moved to award the bid; Vince Boothe seconded.\n- Winner: Hix/Snedecker Companies DBA Mid-Bay Air, LLC (Snedecker is Fairhope Municipal Judge).\n- Lease recorded Dec 17, 2015. Mid-Bay Air has not started construction as of Nov 2016.\n- New Council elected on platform of transparency is inheriting these contracts without full FOIA disclosure regarding bid histories and conflicts.\n\n3. THE PIVOT: \n- Widget article is the \"smoking gun\" because it names the specific people involved in the bid process for the RFP Article 1 calls out as a \"bad deal.\"\n- It proves Burrell was directly involved on the committee reviewing his own city’s airport bids while simultaneously being Council President, confirming his dual role abuse of power.\n- It details the conflict: a Municipal Judge (Snedeker) is partner in the winning bid company where his associate Board member (Hix) sat\
      \ while Burrell cast the vote.\n- Validates Article 1’s claim of \"No Radar\" and lack of oversight with concrete dates (22-day bid window), named board members, and the actual lease record date.\n\n4. KEY ENTITIES: \n- Jack Burrell\n- Vince Boothe\n- Ray Hix\n- Haymes Snedeker\n- Marcus McDowell (City Attorney)\n- Kevin Boone\n- Raines\n- Fairhope Airport Authority\n- Hix/Snedecker Companies DBA Mid-Bay Air, LLC\n- Fairhope City Council\n- Baldwin County"
