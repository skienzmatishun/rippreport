      - October 13, 2015: RFP submittal deadline set (only 22 days from issue).
      - October 20, 2015: RFP bid opening; Burrell described as "quarterback" for deal.
      - November 2021 (approx): Burrell abruptly resigned Council Presidency, sliding to a single council member status.
      - Airport Authority sued Fixed Based Operator (Continental Motors) citing insurance/fuel maintenance/hangar failures.

      2. THE DISCOVERY:
      - Article 2 confirms Burrell personally canceled video broadcasts of Airport Authority meetings in March (validating the "not since February" silence).
      - Reveals Burrell’s resignation from Presidency occurred to distance himself from the Airport Authority FBO lawsuit (Continental Motors).
      - Confirms Burrell called Continental’s lease termination a “ploy to drive a wedge” and a method “to coerce us into settling this dispute in a manner not in our best interest.”
      - Confirms specific costs of questionable deals attributed to Burrell’s tenure: Recreation land ($2.65 million); K-1 building leaking/rotting; Town clock purchase ($6,000).
      - Confirms former Mayor Wilson was the primary driver for previous transparency compliance.

      3. THE PIVOT:
      - Article 2 provides the motive for Article 1’s allegations of "No Radar" secrecy.
      - Article 1 raised the concern: "NO Airport Authority meetings on line... since February."
      - Article 2 confirms: This silence correlates directly with the Continental Motors FBO lawsuit and ongoing bid-rigging accusations.
      - Article 2 reveals Burrell’s defense regarding the FBO was that they were trying to avoid settlement pressure, proving the secrecy (no video record) was intentional to hide negotiation terms and protect bad deals involving specific developers.
      - Article 2 exposes that Burrell resigned the Presidency in November specifically to avoid full accountability for Airport Authority actions while remaining on the council.

      4. KEY ENTITIES:
      - Jack Burrell (Council President / Airport Authority Board Rep).
      - Fairhope City Council.
      - Marcus McDowell (City Attorney; works for Council, controlled by Burrell).
      - Kevin Boone (“Strawman” Councilman; father of Scott Boone; SBC conduit).
      - Robert Brown (Railroad nomination / Property owner; purchased property July 21, 2020).
      - Haymes Snedeker (Municipal Judge; sworn in by Burrell).
      - Continental Motors (FBO sued for lease violations).
      - City Attorney Raines.
      - Former Mayor Wilson.
