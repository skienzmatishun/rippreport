hooks:
  double-red-flags-faux-hope:
    brief: |-
      THE CONFLICT:
      - Jack Burrell holds 3rd term as Fairhope Council President after monopolizing seat for 9 years.
      - City sued in Federal court by Ripp for denying public speech rights; City lost, taxpayers spent thousands.
      - Since February, Fairhope Airport Authority meetings not recorded online; no public explanation/notice.
      - Burrell designates Airport Authority as separate entity to excuse lack of recording/transparency.
      - Sept 21, 2015: Airport Authority RFP issued with only 22 days for submittal (due Oct 13) for ground lease on Plat 2.
      - Mayor Karin Wilson previously demanded online transparency; current Mayor leaves decision to Burrell.
      - City purchases land for electric substation near Hawthorn Glenn for $40,000 (List price $290,000); seller Kathy Hoffren alleged “political payback” context.

      THE DISCOVERY:
      - Airport Authority receives >$300,000/year city allocation (down from $500,000); zero return on investment; City paid but Authority holds title.
      - Fairhope purchased K-1 Center for $4 million; building deteriorated, required ~$100k in roof repairs immediately.
      - May 24: Council unanimously approves 25-year lease of K-1 Center to FEEF for $1/year with no clear maintenance funding.
      - Council approved 2 million dollar tax abatement for company planning to hire only 5 employees.
      - Substation location contradicts Comprehensive Plan; moved from commercial site (near ABC store) to residential area.
      - FEEF lease signed prior to securing a 3.5 million dollar grant (previous grant offer denied: $7M).

      THE PIVOT:
      - Widget Article proves “No Radar” transparency violations in Main Article were intentional shields for financial abuse.
      - Confirms "No Video" policy (Main) allowed K-1 deal to slide: $4M purchase, then 25-year lease at $1/year (Widget), bypassing public scrutiny.
      - Confirms Airport Authority deal rigging: RFP timeline (Main) + $300k/year subsidy with no revenue (Widget).
      - Confirms power consolidation: Burrell uses "Separate Entity" claim (Main) + obscure resolutions (Widget) to avoid oversight on taxpayer money.
      - Shows direct cost of secrecy: Ripp flags Hawthorn Glenn substation purchase as “political payback” (Widget) because Council/Acting Mayor showed up, then took exit door leaving residents exposed.

      KEY ENTITIES:
      - Jack Burrell (Council President)
      - Kevin Boone (Councilman, Strawman)
      - Karin Wilson (Former Mayor)
      - Marcus McDowell (City Attorney)
      - Fairhope City Council
      - Fairhope Airport Authority
      - FEEF (K-1 Center operator)
      - Kathy Hoffren (Hawthorn Glenn Property Seller)
