    text: Jack Burrell thinks he can run Fairhope like a private club while taxpayers foot the bill for his lost lawsuits and secret meetings. This discovery proves Burrell killed the video feed to hide the K-1 Center scam, where he handed a $4 million building to his friends for just one dollar a year.
  lego-rocket-scientist:
    brief: |-
