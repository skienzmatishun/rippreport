      KEY ENTITIES

      - Candidates: Anthony Lowery ("Lowery", "Lowey"), Hoss Mack.

      - Successor Candidate: Matt McKenzie.

      - Current Officials Mentioned: Sheriff Hoss Mack, Judge Robert Wilters, David
