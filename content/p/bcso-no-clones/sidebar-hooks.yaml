      3. THE PIVOT:

      - Article 1 alleges Lowery is a "clone" of Mack; Article 2 reveals specific
      shared culpability in the Hastings/Lawrence case.

      - Article 2 states Sheriff Mack hired Antony Lowery to "carry his water and
      go along with anything Mack said" prior to being Sheriff; explicitly states
