  catalyst-does-fairhope:
    brief: |-
      **THE CONFLICT:**
      - Highway 98 and Parker Road intersection identified as a high-danger zone for motorists.
      - Fly Creek Apartments project proposed: 230-unit development along Fly Creek behind Publix.
      - Former Mayor Tim Kant administration: Allegedly prioritized developer Angelo Corte over community concerns.
      - Infrastructure subsidies provided by public funds:
        - Fire Station constructed on Corte property (dead end) adjacent to proposed apartments.
        - Sewer lift station authorized slightly off Highway 98 north side above Fly Creek; has capacity to service apartments.
      - Land dispute: Publix property drains into wetlands/Fly Creek. Angelo Corte donated the affected land/wetlands to City of Fairhope.
      - Municipal approval: Councilmen Burrell and Boone voted to accept the land “gift” from Corte, shifting drainage liability to taxpayers.

      **THE DISCOVERY:**
      - Fly Creek Apartments are actively preparing site work and clearing living vegetation on the property.
      - Infrastructure connections are materializing: Apartments will be serviced by sewer lift station paid for by taxpayers; drainage from Publix flows into Corte-donated land.
      - Catalyst organization explicitly endorsed the Fly Creek Apartments project and developer Angelo Corte.
      - Development is predicted to create traffic havoc on Highway 98 and create shortcuts through Sandy Ford and Rock Creek neighborhoods.

      **THE PIVOT:**
      - Article 1 claims danger at Highway 98 is due to CATALYST Council, Mayor Kant, and Angelo Corte.
      - Article 2 proves this by linking Catalyst explicitly to the Fly Creek Apartments project and infrastructure subsidies.
      - Article 2 identifies the specific mechanism (sewer lift station, drainage land “gift”) through which Catalyst-supported development creates the exact traffic and safety risks warned of in Article 1.
      - Article 2 confirms Catalyst’s 100% support for Corte, validating the accusation in Article 1 that “CATALYST supported this project” leading to unsafe conditions.

      **KEY ENTITIES:**
      - Angelo Corte
      - Tim Kant (Former Mayor)
      - CATALYST (Fairhope political party/organization)
      - Fly Creek Apartments
      - Publix
      - City of Fairhope
      - Councilmen Burrell and Boone
      - Parker Road
      - Highway 98
    generated_at: '2026-03-20T17:09:18.628144Z'
    text: Highway 98 and Parker Road are a death trap because Fairhope’s Catalyst politicians sold out the community for developer profits. This investigation exposes how Tim Kant and Angelo Corte used taxpayer-funded sewer lines and a gifted wetlands scam to dump 230 apartments onto our already crumbling roads.
