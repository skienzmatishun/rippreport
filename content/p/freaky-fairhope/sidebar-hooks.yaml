    text: Pittman and Kant expect you to forget the $639,000 BP shell game they orchestrated a decade ago. We have the receipts showing a $372,165.90 payout for "completed" work to an unlicensed contractor before the ink even dried on the rigged deal.
  where-hell-were-you:
    brief: |-
      THE CONFLICT:
      - 2010 BP Fraud allegations: State Senator Pittman and Mayor Cant orchestrated fraud of BP funds totaling $639,000.
      - 2016–Present Fairhope City Council: Members Scott Boone, Robert Brown, and Burrell (referred to as "Three Bs") accused of financial improprieties.
      - Land deal: Council members purchased 2.65 million dollars worth of farmland for recreation property via city surplus (1.7 million) and debt; leased it back to a farmer for $9,000/year.
      - Insurance/Perks: Council members voted themselves full family insurance and raises (estimated at $17,500 per policy); no other city employees have this.
      - K1 Center: Council bought the property without a plan, put roof on condemned building costing tens of thousands.
      - Triangle Property: Council attempted to give away park property valued at 11.25 million dollars; used lawsuit precedent for denying public speech in related cases.
      - Infrastructure: Council delayed sewer infrastructure discussions repeatedly; Fly Creek apartments shoved down citizens' throats for a developer contributor.
      - Mayor Wilson (Current): Refused to take two paychecks over 4 years (Mayor and Utility Director roles), sacrificing over $250,000 in potential salary.
      - Waterfront Project: Proposed project funded by 2010 BP oil spill grant (6.2 million dollars); City advertised meetings and encouraged public engagement in last three years.

      THE DISCOVERY:
      - Roger Howling (Howell Raines) is recently writing op-eds for Catalyst regarding the Waterfront Project.
      - Widget Article explicitly asks Roger Howling: "Where were you Mr. Raines when Boone Brown and Burrell bought $2.65 million of farmland for recreation?"
      - Widget Article asks Roger Howling: "Where were you when the main reason that the recreation property was located at the airport... original location was close to the black neighborhood."
      - Widget Article challenges Howling’s silence on: Council buying K1 center without plan; Triangle Property; Public Participation cancellation; Federal Lawsuit against council for denying citizens to speak.
      - Widget Article challenges Howling’s silence on Mayor Wilson taking two paychecks vs council members taking insurance/raises.
      - Howling’s op-ed stance cited by the same people (Boone, Brown) who publicly called him a "carpetbagger."
      - Howling received 6.3 million dollar grant from BP; Main Article claims his purpose is to "distract, confuse, lie and mislead" for Catalyst.

      THE PIVOT:
      - Article 1 introduces Roger Howling as a BP-funded proxy for Catalyst and links him to "dirtier" candidates.
      - Article 2 provides the "smoking gun" by documenting Howling’s complete absence (in writing) regarding the specific corruption schemes detailed in Article 1 (Farmland deal, K1 center abuse, Triangle property issues).
      - Howling’s focus on the Waterfront Project (BP money) now, combined with his silence during previous corruption scandals revealed in Article 2, validates the claim that he is aligning with "Catalyst" and protecting the status quo despite claims of independent integrity.

      KEY ENTITIES:
      - Roger Howling (Howell Raines) / "Howling Rains"
      - Scott Boone Consulting / Catalyst
      - Fairhope City Council Members: Scott Boone, Robert Brown, Burrell ("Three Bs")
      - Past Officials: Mayor Cant (2010), State Senator Pittman ("Boom Boom")
      - Current Official: Mayor Wilson
      - Locations/Assets: K1 Center, Triangle Property (park), Fairhope Waterfront Project, Farmland at Airport
      - Organizations: BP / "Facebook Cowards" (slur from campaign)
