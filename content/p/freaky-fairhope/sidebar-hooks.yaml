      - The NYT resignation scandal regarding Raines proves Catalyst’s use of "journalists" with fabricated reputations is part of the status quo.
      - Article 2 proves the connection: BP/Catalyst money -> Howling Rains op-eds/campaigns vs City Council Waterfront Grant (6.2M BP funds).
      - Howling Rains’ opposition to the Pier project aligns with Catalyst’s agenda, exposing him as the “smoking gun” mechanism for disinformation campaigns coordinated by Boone Consulting.

