hooks:
  a-decade-of-corruption:
    brief: |-
      THE CONFLICT:
      - May 8, 2010: Baldwin County Commission ordered State Senator Tripp "Boom Boom" Pittman and Fairhope Mayor Tim Kant not to proceed with a bid for BP boom work.
      - Pittman/Kant proceeded anyway using Fairhope staff Greg Mims, Sherry Sullivan, and Jennifer Fidler to secure a $639,000 bid.
      - June 4, 2010: Fairhope City Council awarded the contract to Pittman Tractor.
      - Pittman had no general contractor’s license, marine insurance, or ethics approval at the time of award.
      - 6 days post-award: Pittman received a check from Fairhope for $372,165.90 labeled "COMPLETED" boom work payable to Pittman Tractor.
      - 2010–2018: Pittman maintained debris contract with City of Fairhope for over 8 years; contracts ended only after Karin Wilson elected.
      - Three B’s (Boone, Brown, Burrell) on current Council leased city surplus land back to farmer for $9,000/year; moved city surplus of $1.7M into $1.2M deficit overnight.
      - Article 1 claims State Senator Pittman and Mayor Kant orchestrated this major BP fund fraud in 2010.

      THE DISCOVERY:
      - Widget article confirms the specific financial figures from Main article ($639k claim, $636k secured).
      - Names specific staff emplyees who executed the deal: Greg Mims, Sherry Sullivan, Jennifer Fidler (all fired/quit/voted out).
      - Confirms the "Oil Recovery" shell proposal used after County Commission stop order.
      - Confirms Pittman Tractor paid despite no required licensing or approval through May 2010.
      - Connects Pittman’s actions to wider "Catalyst" network including Burrell, Boone, Brown, and McSharry.
      - Confirms no politician, attorney, or judge held accountable for the 2010 corruption in last decade.

      THE PIVOT:
      - Main article (FREAKY FAIRHOPE) names Pittman/Kant and the BP fraud without detailed mechanics; treats it as known corruption.
      - Widget article (A DECADE OF CORRUPTION) provides the evidence trail: specific dates, exact check amounts ($372,165.90), and unlicensed nature of contract.
      - Widget article proves Main article’s claim that "State Senator Boom Boom Pittman and Mayor Kant... orchestrated major fraud" was not exaggeration.
      - Shows pattern: 2010 incident is the origin of Pittman’s leverage over Baldwin County (Sheriff qualifications, unopposed elections) used for a decade.
      - Confirms the connection between "Howling Rains" / Catalyst influence and Pittman’s protected corruption.

      KEY ENTITIES:
      - Tripp "Boom Boom" Pittman (State Senator)
      - Tim Kant (Fairhope Mayor)
      - Greg Mims (Former Fairhope Staff)
      - Sherry Sullivan (Former Fairhope Staff)
      - Jennifer Fidler (Former Fairhope Staff)
      - John Burrell (Fairhope Council President/Three B's)
      - Bill Boone (Fairhope Councilman/Three B's)
      - Brown (Fairhope Councilman/Three B's - Brown)
      - Karin Wilson (Fairhope Mayor, ended Pittman contracts)
      - CATALYST / Scott Boone Consulting
