      II. THE DISCOVERY

      *   The current Fairhope City Council is characterized as an "at Large Catalyst
      council," revealing a specific political affiliation and influence structure
      within the municipal government (Article 2).

      *   This group, representing approximately 30% of the city’s population, utilizes
      its control to oppose changes in governance, such as referendums for a new Council-Manager
