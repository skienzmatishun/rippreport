hooks:
  fairhope-voters-important-notice:
    brief: '1. THE CONFLICT

      *   Fairhope City Council members failed to recuse themselves when voting on
      issues tied to personal business interests, including the extension of the sunset
      clause for Fly Creek Apartments and Preble-Rish projects. (Main Article)

      *   Councilman Mr. Boone has undisclosed past business interests with developers
      Angelo Corte and Preble-Rish that conflict with his council duties. He is alleged
      to have hidden these conflicts prior to election. (Main Article)

      *   Catalyst Associates, a political entity, was formed on August 11, 2014,
      involving Michael Scott Boone and Lynn Stacey as managers. (Widget Article)


      2. THE DISCOVERY

      *   The Widget Article proves that Catalyst Associates is tied directly to Councilman
      Mr. Boone''s family through Coley M. Boone, who served as its registered agent.
      (Widget Article)

      *   Catalyst Associates connects Councilmen Boone and Burrell to former political
      figures such as Elliott and Haygood. (Widget Article)


      3. THE PIVOT

      *   The Main Article alleges that Mr. Boone uses his council position for self-interest,
      citing a "trail of LLC’s" and undisclosed conflicts with Angelo Corte and Preble-Rish.
      The Widget Article provides the corporate structure—Catalyst Associates—that
      substantiates *how* these interests are organized and connects them directly
      to Councilman Boone''s immediate family (his son, Coley M. Boone). Catalyst
      is presented as the vehicle for Mr. Boone’s political/business influence within
      city government.


      4. KEY ENTITIES

      *   Angelo Corte

      *   Councilman Mr. Boone / Michael Scott Boone / Scott Boone

      *   City Council of Fairhope

      *   Preble-Rish

      *   Fly Creek Apartments

      *   Catalyst Associates (August 11, 2014)

      *   Lynn Stacey

      *   Coley M. Boone (Registered Agent for Catalyst Associates)

      *   Councilman Burrell

      *   Mayor Wilson

      *   Elliott

      *   Haygood'
    generated_at: '2026-07-18T06:56:16.517258Z'
  conflict-of-interest:
    brief: 'THE CONFLICT:

      * Kevin Boone has undisclosed business interests with Preble-Rish and Angelo
      Corte that predate his election to City Council.

      * Allegations center on conflicts of interest regarding Fly Creek Apartments
      and various Preble-Rish related projects.


      THE DISCOVERY:

      * Article 2 proves a direct, long-standing business connection exists between
      Kevin Boone and John Avent (Representative for Dewberry Preble-Rish, LLC) prior
      to Boone serving on the council.

      * The conflict is concretely documented regarding "The Retreat at Fairhope"
      (Fly Creek Apartments); Kevin Boone attended and voted in favor of the project
      twice during a Sept 2016 Planning and Zoning meeting while John Avent was representing
      Preble-Rish.


      THE PIVOT:

      * Article 1 raises general accusations about Mr. Boone''s trail of LLC''s, Catalyst
      ties, and conflicts with Preble-Rish/Angelo Corte.

      * Article 2 functions as the ''smoking gun'' by providing specific dates (Sept
      2016) and individuals (John Avent) to prove that these alleged conflicts were
      not new, but pre-existing relationships that Boone repeatedly failed to recuse
      himself from while voting on city matters.


      KEY ENTITIES:

      * Kevin Boone (City Councilman/Councilman)

      * Angelo Corte (Developer)

      * John Avent (Representative for Dewberry Preble-Rish, LLC; Business partner
      of Mr. Boone)

      * Preble-Rish / Dewberry Preble-Rish, LLC (Engineering Company)

      * Fly Creek Apartments / The Retreat at Fairhope (Development Project)

      * Catalyst (Political Organization/Connection Network)

      * John Robinson (Councilman who acknowledged conflict and abstained)

      * Conyers (Councilman who acknowledged conflict and abstained)

      * Brown (Councilman who acknowledged conflict and abstained)'
    generated_at: '2026-07-18T06:56:16.517268Z'
  good-ole-boys-alive-and-well:
    brief: '**THE CONFLICT**

      *   Past council proceedings, specifically a meeting in April 2017 during the
      term of Mayor Tim Kant, involved City Council members Jack Burrell and Mr. Boone.

      *   A resolution (Resolution 2606-16) was introduced to accept a deed for a
      city lift station from Angelo A. Corte.

      *   Mr. Burrell reviewed and approved this Resolution before October 24th despite
      being copied on documents showing the resolution was already recorded three
      days prior, on October 21st.

      *   The transfer involved property that included wetlands (storm water runoff
      site for Publix) under an outfall pipe from a retention pond, covering more
      than just the house-sized lift station area described in Exhibit A.

      *   Council members, including Mr. Burrell and City Attorney Marion Wynne, were
      aware of or should have been aware of these undisclosed details but proceeded
      with the resolution despite concerns.


      **THE DISCOVERY**

      *   Current council scrutiny reveals continued conflict issues involving Councilmember
      Boone regarding Fly Creek Apartments/PUD and Preble-Rish engineering.

      *   Boone is identified as directly related to Catalyst, a political group linked
      to Angelo Corte (specifically, he reportedly never exposed past business interests
      with Preble-Rish or Angelo Corte).

      *   The current council faced pressure to address Boone''s "trail of LLC’s"
      and recuse himself from voting on issues related to Fly Creek Apartments/PUD
      due to these connections.


      **THE PIVOT**

      *   Article 2 reveals the historical basis for Boone''s ongoing conflicts, specifically
      his involvement with Angelo A. Corte in 2017 via a resolution (Resolution 2606-16)
      handled by Burrell and Mr. Boone during Kant’s administration.

      *   This incident establishes long-term "good ole boy" patterns of the Council
      intentionally obscuring major financial or legal dealings involving developers
      like Angelo Corte, which provides historical proof supporting current calls
      for recusal regarding Fly Creek/Preble-Rish.


      **KEY ENTITIES**

      *   Angelo A. Corte

      *   Boone (City Council Member)

      *   Jack Burrell (Council President/Councilman)

      *   Tim Kant (Former Mayor)

      *   Fly Creek Apartments / PUD

      *   Preble Rish

      *   CATALYST

      *   Marion Wynne (City Attorney)

      *   Publix'
    generated_at: '2026-07-18T06:56:16.517273Z'
  selective-memory:
    brief: 'THE CONFLICT

