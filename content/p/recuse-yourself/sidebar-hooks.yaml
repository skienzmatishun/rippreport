  fairhope-voters-important-notice:
    brief: 'THE CONFLICT:

      *   Fairhope City Council ignored conflicts of interest when voting on the extension
      of the sunset clause related to Fly Creek Apartments.

      *   Councilman Mr. Boone has undisclosed business interests with Angelo Corte
      and Preble-Rish dating prior to his election.


      THE DISCOVERY:

      *   Catalyst Associates was formed on Aug. 11, 2014, involving Michael Scott
      Boone and Lynn Stacey as managers and Coley M. Boone as registered agent (Councilman
      Boone’s son).

      *   Councilmen Boone and Burrell are actively slowing city business.

      *   Catalyst is supporting Councilmen Boone and Burrell to undermine the Mayor.


      THE PIVOT:

      *   Article 2 reveals that the conflicts of interest cited in Article 1 (Boone''s
      business ties) are now being leveraged by a political group (Catalyst) to disrupt
      city governance and challenge Mayor Wilson, linking past financial misconduct
      to current political obstruction.


      KEY ENTITIES:

      *   Mr. Boone

      *   Angelo Corte

      *   Fly Creek Apartments

      *   Preble-Rish

      *   Catalyst Associates

      *   Mayor Wilson

      *   Councilman Burrell'
