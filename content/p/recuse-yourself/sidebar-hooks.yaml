      *   Mr. Boone eventually requested recusal from voting on issues involving the
      Fly Creek PUD, Angelo Corte, or Preble Rish engineering.


      THE DISCOVERY:

      *   During a council meeting under Tim Kant, Resolution 2606-16 was added: the
      city accepted the deed of property for its sewer lift station from Angelo A.
      Corte.

      *   Mr. Burrell and Mr. Boone were present at this meeting.

      *   The gifted property included three plus acres of wetlands that receive storm
      water runoff from the Publix site and the location of the outfall pipe from
      the retention pond.

      *   Mr. Burrell failed to notice a map issue regarding the "gift," though the
      city attorney acknowledged it had been recorded.


      THE PIVOT:

      *   Article 2 provides specific documentation (Resolution 2606-16) showing that
