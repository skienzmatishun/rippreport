  conflict-of-interest:
    brief: 'THE CONFLICT

      *   Fairhope City Council members ignored conflicts of interest when voting
      on issues related to personal involvement or business interests.

      *   Councilman Kevin Boone had undisclosed business interests relating to Preble-Rish
      and Angelo Corte prior to being elected.

      *   The Council was asked to investigate Mr. Boone’s involvement with Angelo
      Corte in January.

      *   Council members, including Robinson, Conners, and Brown, acknowledged conflicts
      of interest and abstained from voting on certain agenda items.


      THE DISCOVERY

      *   Mr. Boone had direct business connections through LLCs to Preble-Rish for
      many years and never disclosed them or recused himself from voting on related
      issues.

      *   Mr. Boone voted for four and a half years on Preble Rish projects (e.g.,
      Firefly) which were listed in an LLC with Mr. Avent.

      *   Mr. Boone attended and voted on the _Retreat at Fairhope_ village/Fly Creek
      Apartments issue twice in September 2016 (SD 16.14) while Mr. Avent represented
      Preble-Rish.

      *   Mr. Boone voted in favor of the Fly Creek Apartments project despite citizen
      discussion to repeal Ordinance 1572.


      THE PIVOT

      *   Article 2 provides specific dates and voting records (Sept 2016, SD 16.14)
      demonstrating that Mr. Boone actively participated in a conflict-ridden vote
      related to the Fly Creek Apartments, proving the general claims of conflict
      of interest made in Article 1 are factual.


      KEY ENTITIES

      *   Kevin Boone

      *   Angelo Corte

      *   Preble-Rish

      *   Fly Creek Apartments (Retreat at Fairhope village)

      *   Kevin Avent

      *   Councilman Robinson

      *   Councilman Conners

      *   Councilman Brown

      *   Ordinance 1572'
    generated_at: '2026-07-11T11:03:22.137863Z'
  good-ole-boys-alive-and-well:
    brief: 'THE CONFLICT:

      *   Fairhope City Council members had conflicts of interest when voting on the
