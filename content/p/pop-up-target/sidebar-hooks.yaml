      *   A previous plan ("Jack Plan") failed.

      *   The Triangle LAWSUIT settlement totaled $8.25 million plus $3 million in
      legal fees.

      *   Burrell and the Council President raided the utility fund for $3 million
      to pay attorneys upfront regarding the Triangle property.


      THE DISCOVERY

      *   The Mayor is now promoting Community Engagement discussions for the K-1
      Center, the Triangle property, and the Comprehensive Land Use Plan.

      *   A public meeting is scheduled for March 27 concerning the K-1 Center and
      a Conservation Easement on the Triangle property.

      *   Councilman Conyers and Robinson favor the Community Engagement route.

      *   Burrell, Boone, and Brown favor rushing a Conservation Easement decision
      before the Comprehensive Land Use Plan is complete.


      THE PIVOT

      *   Article 2 shows that while past council actions involved secrecy (Article
      1), current political maneuvering involves attempting to maximize public participation
      regarding the K-1 Center and land use issues.

      *   Article 2 reveals specific votes and alignments (Conyers, Robinson, Burrell,
      Boone, Brown) concerning a Conservation Easement versus public involvement.


