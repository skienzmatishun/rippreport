      - Robert Brown compared COVID virus deaths to 850,000 abortions in 2017.
      - Council members (Brown, Burrell, Boone) accused of using offices for personal enrichment.
      - Fairhope municipal election qualifications deadline is July 21.

      THE DISCOVERY
      - Article 2 exposes Robert Brown, Kevin Boone, and Jack Burrell spent $2.65 million on recreation land nobody wanted.
      - Town is forced to adjust budget by $2.65 million; leased land for farming at $9,000/year.
      - Article 2 alleges Brown pushed deal to give away triangle property valued at $13 million.
      - Angelo Corte identified as Brown’s mentor and Fly Creek Apartments developer (work continued during pandemic).
      - Complaint filed with Alabama Attorney General regarding Brown; further investigation planned with Mobile FBI and Alabama Ethics Commission.
      - Article 2 states Brown claimed Ethics Commission approved personal gain; author claims Brown is lying and was the only bid.
      - Mayor Wilson confirmed as first Baldwin County Mayor to implore Governor for shelter-in-place order (opposed Burrell/Brown stance).

      THE PIVOT
      - Article 2 provides hard financial evidence supporting Main article’s claim of corruption.
      - Links Mayor Wilson’s proper handling with Council members’ resistance, proving internal conflict on pandemic response.
      - Confirms “Catalyst” influence in Main article through Brown’s ties to developer Angelo Corte.
      - Validates Ripp Report’s narrative that council members are “fleecing” taxpayers with land deals, not just ignoring safety.

      KEY ENTITIES
      - Robert Brown
      - Jack Burrell
      - Kevin Boone
      - Joshua Gammon
      - Angelo Corte
      - Mayor Wilson
      - Jerry Carl
      - Fairhope City Council
