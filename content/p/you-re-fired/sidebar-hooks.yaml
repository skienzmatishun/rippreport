      County Sewer Service (BCSS) due to her employer status.

      *   The Ethics Commission ruled unanimously (4-0) that Dorsey should not vote
      or participate in issues related to BCSS business dealings, citing conflict
      of interest defined as actions affecting an official''s personal financial interests.

      *   Prior years/Ongoing: State Senator Pittman held debris removal contracts
      with the City of Fairhope since 2004 (excluding one period when his business
      partner Bob James held the contract).

      *   Pittman and the Mayor of Fairhope were subject to a BP fraud investigation,
      which was transferred to Special Prosecutor Matt Hart.


      THE DISCOVERY

      *   The Widget Article reveals a second, parallel corruption case involving
      State Senator Pittman and the Mayor of Fairhope regarding multi-million dollar
      debris removal contracts funded by FEMA/State resources.

      *   It alleges that officials (Pittman and the Mayor) are publicly claiming
      Ethics Commission letters provided "permission" or exoneration from guilt relating
      to BP Fraud claims, which Ripp asserts is false.


      THE PIVOT

      *   The Main Article establishes a precedent of an official (Dorsey) receiving
      clear, unanimous ethical guidance against participating in conflicting business
      dealings with her employer.

      *   Article 2 proves that other officials (Pittman/Mayor) are actively misleading
      the public and City Council by manipulating or misrepresenting the true meaning
      and scope of Ethics Commission advisory opinions to legitimize contracts for
      personal financial gain while under investigation.


      KEY ENTITIES

      *   Francis Paul Ripp / The Ripp Report

      *   Commissioner Dorsey

      *   Baldwin County Commission

      *   BCSS (Baldwin County Sewer Service)

      *   Senator Pittman

