      *   The Fairhope Airport was purchased and financed by tax dollars, but the finance committee wanted the Airport title to be in the City’s name, not the Airport Authority (FAA).

      THE DISCOVERY
      *   Chuck Zunk, who is formally from the Fairhope Airport Authority (FAA), was recruited to head Burrell’s financial committee.
      *   Zunk defended Burrell’s free airplane flights, flawed Requests for Proposals (RFPs), and conflicts of interest related to Burrell's position with the FAA.
      *   Zunk previously served on the Fairhope Finance committee in 2010 when Burrell was not President and Tim Kant was Mayor.
      *   Councilman Robert Brown attempted to delay a vote on hiring a consultant for impact fees, suggesting his motivation involved protecting developer buddies regarding impact fees.

      THE PIVOT
      *   Article 2 reveals that the individuals (Burrell and Zunk) controlling the finance committee structure described in Article 1 are directly implicated in conflicts of interest concerning airport authority dealings and misuse of municipal funds.
      *   Article 2 shows Zunk's role as a defender of Burrell’s actions regarding the Airport Authority, which links directly to the corruption claims surrounding Burrell's bid committees mentioned in Article 1.

