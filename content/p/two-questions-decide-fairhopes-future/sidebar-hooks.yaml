hooks:
  last-chance-fauxhope-or-fairhope-vote-out-fauxhope-city-council:
    brief: 'THE CONFLICT:

      - Karin Wolff Wilson (Former Mayor) left office citing that the Utilities Director
      position should not hold a second salary; she refused to accept double pay.

      - Wilson alleged that upon her departure, Mayor Sherry Sullivan appointed herself
      as Utilities Director (taking the second salary) and removed a qualified engineer.

      - Wilson alleges a high school graduate is currently managing city utilities,
      including electric, gas, water, and sewer.

      - Wilson advocates for replacing 5 at-large Council seats with elected council
      districts to ensure accountability and reduce special interest influence.

      - Wilson claims she pushed for district systems previously; the vote failed,
      and incumbents spread misinformation to protect special interests.


      THE DISCOVERY:

      - Article 2 (Ripp Report) explicitly accuses Jack Burrell of orchestrating the
      Utilities Director double salary scheme.

      - Article 2 confirms Wilson''s allegation that a "qualified utility engineer"
      was fired and replaced with an unqualified high school graduate.

      - Article 2 confirms Jack Burrell has historically been the "key council opponent"
      for establishing districts, killing the initiative during three previous administrations.

      - Article 2 links current council stagnation on infrastructure (water shortages,
      unfinished waterfront project) and ethics to the "Good Ole Boy Club" led by
      Burrell.

      - Article 2 highlights specific conflicts involving developers, bids, and potential
      cover-ups regarding Ronan McSharry’s legal issues.


      THE PIVOT:

      - Article 2 transforms Wilson''s personal ethical stance ("I refused double
      pay") into a concrete accusation of corruption against Councilman Jack Burrell.

      - Article 2 validates Wilson''s claim that the current council fights district
      reforms; Burrell is identified as the primary blocker of district implementation.

      - The "high school graduate" utility manager cited by Wilson is explicitly named
      as a Burrell-driven personnel decision in Article 2, confirming a chain of command
      (Burrell -> Current Mayor) that matches Wilson''s narrative.


      KEY ENTITIES:

      - Karin Wolff Wilson (Former Mayor, Pro-District)

      - Jack Burrell (Councilman, Primary Defendant in Widget Article)

      - Sherry Sullivan (Mayor, Current City Utilities Head per Wilson''s claims)

      - Fairhope Utilities Engineer (Former qualified staff fired per both accounts)

      - High School Graduate (Current manager of utilities per Wilson/Article 2)

      - BP (Original funding source mentioned in Wilson''s post)

      - Troy Vickers (Endorsed candidate for replacement per Widget Article)'
