      decision-making on 27 million in failed projects.

      - Plaintiff Francis Paul Ripp sued Defendant Jack Burrell (Ripp v Burrell) in
      US District Court S.D. Alabama Southern regarding denial of public participation
      at council meetings.

      - Officials (Mayor, Council, Municipal Attorney, Municipal Judge) have not been
      elected for 5 years; Alabama Legislature postponed municipal elections in 2024
      to coincide with Presidential election.

      - Specific financial disputes involved: Waterfront project ($6.2M grant), Soccer
      fields ($3.5M-$6M issues), Triangle "Legal Settlement" (11.2M spent + 3M legal
      fees not refunded to Attorney Cain O rear).

      - Citizens allege City Council and Mayor Sherry Sullivan (and predecessor Wilson)
      prioritized developer interests (Leaf River Group, Arthur Corti) over infrastructure
      and ADA compliance.


      THE DISCOVERY:

      - Second article confirms Waterfront project ($6.2M) originally required ADA
      compliance, stated by then-Mayor Wilson; Council delayed understanding/voting
      on this for close to 1 year.

      - Council President Jack Burrell ordered elimination of swim area and rock jetties
      from waterfront plan because he personally "does not like the look," ignoring
