hooks:
  nuff-said:
    brief: 'THE CONFLICT

      *   RiPP Report began investigating the Fairhope Airport Authority scandal in
      November 2016.

      *   The initial complaint centered on Mr. Jack Burrell and city airport spending
      allegations compared to school funding.

      *   Subsequent investigation focused on Board Member Ray Hix, who won a lease
      on December 17, 2015.

      *   Allegations against Ray Hix included using inside information regarding
      the bidding process and submitting inaccurate bid data (e.g., aircraft ownership
      percentage, estimated fuel usage).

      *   Mr. Jack Burrell was accused of reducing Mid-Bay’s fuel estimate by 15,000
      gallons on behalf of the bid committee.

      *   RiPP Report filed a specific ethics complaint against Ray Hix in March (Ethics
      Complaint PDF link provided).


      THE DISCOVERY

      *   Article 2 confirms that RiPP has been reporting on the Airport scandal continuously
      since November 2016.

      *   The report states all formal complaints regarding the scandal have been
      filed with authorities, effectively "putting this story to rest."

      *   It shifts focus to criticizing the Fairhope City Council for allegedly choosing
      to ignore facts and failing to act upon allegations of unethical behavior within
      its own ranks.


      THE PIVOT

      *   Article 1 examines the current legal investigation into RiPP Report itself
      by attorneys hired by the Fairhope Airport Authority (FAA).

      *   Article 2 provides the historical conclusion that all initial complaints
      were handed over to authorities, indicating a cessation of RiPP''s direct investigative
      action and framing the subsequent legal scrutiny as part of a larger pattern
      of council lack of accountability.


      KEY ENTITIES

      *   Ray Hix

      *   Jack Burrell (Council President/Councilman)

      *   Fairhope Airport Authority (FAA)

      *   The Ripp Report

      *   Fairhope City Council'
