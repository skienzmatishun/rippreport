  double-down-and-i-call:
    brief: 'THE CONFLICT:

      - Hanger lease bid process at Fairhope Airport Authority (FAA).

      - Allegation that Ray Hix won a lease without inside information, despite being
      a FAA Board Member for six months prior.

      - Hix recused himself during the bidding process but questions remained about
      his ability to use internal knowledge.

      - Bid form discrepancies cited in Main Article: Hix claimed 100% ownership of
      three aircraft; Lagniappe stated one.

      - Lease execution date was December 17, 2015. The hanger construction is less
      than 50% complete 27 months later.


      THE DISCOVERY:

      - Letter dated December 21, 2016 (addressed to Attorney General Matt Hart, Jody
      W. Bishop) outlines institutional conflicts regarding the FAA hangar lease process.

      - It revealed that Advisory Opinion 2016-4 addressed whether an Airport Authority
      Board member could bid on a proposal.

      - The letter exposed interconnected relationships: Ray Hix''s board partner
      was the Municipal Judge for Fairhope.

      - The Fairhope City Council President, who is an FAA active member, sat on the
      two-man ad hoc committee selecting the lease winner and shared common friendships
      with involved parties.


      THE PIVOT:

      - Article 2 establishes that the ethical concerns are not solely about Hix''s
      alleged errors (as detailed in Article 1) but represent a broader systemic issue
      of conflict of interest involving multiple interconnected leaders—including
      both FAA Board Members, local elected officials (City Council President), and
      the Municipal Judge.

      - It frames the ongoing investigation (Article 1''s ethics complaint against
      Hix) not as an isolated incident of error, but potentially a deliberate manipulation
      of the Ethics Commission utilizing personal relationships to circumvent rules.


      KEY ENTITIES:

      - Ray Hix

      - Joe McEnerney (Airport Authority Chairman/Board President)

      - Jack Burrell (City Council Member / Bid Committee member)

      - Jody W. Bishop (Circuit Judge)

      - Matt Hart (Attorney General Special Prosecutor)

      - Fairhope Airport Authority (FAA)

      - Ripp Report

      - Lagniappe (Publisher)

      - Fairhope City Council'
