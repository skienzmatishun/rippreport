  airport-diversion:
    brief: 'THE CONFLICT:

      *   Fairhope Airport Authority (FAA) is under investigation regarding a complaint
      filed by The Ripp Report.

      *   Board member Ray Hix won a lease for his company without inside information
      about the bidding process.

      *   Discrepancies exist in bid documentation, specifically regarding the number
      of aircraft claimed (Hix claimed 100% ownership of three planes, only one was
      confirmed).

      *   Disputes over fuel purchase estimates were made between Ray Hix and Mr.
