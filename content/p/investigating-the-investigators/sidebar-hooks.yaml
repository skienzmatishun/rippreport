  double-down-and-i-call:
    brief: 'THE CONFLICT:

      *   Ray Hix was hired by an attorney to request an advisory opinion from the
      Ethics Commission.

      *   Hix won a lease for his company without inside information regarding the
      bidding process.

      *   Hix served as a board member for 6 months prior to the bid process, having
      responsibility to review leases.

      *   Discrepancies exist in fuel estimates provided by Ray Hix versus verified
      usage figures (85,000 to 95,000 gallons estimated vs. actual use based on one
      plane''s 70,000 gallons).


      THE DISCOVERY:

      *   Jack Burrell (City Council President/FAA Board Member) is double-downing
      that airport operations are legal and questioning the scope of investigation
      authority.

      *   The Mayor filed an Ethics Complaint against Ray Hix in early December regarding
      actions by the FAA and board members concerning past airplane hanger leases.

      *   Allegations were made that the Ethics Commission was manipulated by individuals
      using Advisory Opinions.


      THE PIVOT:

      *   Article 2 provides the specific action taken (Mayor filing an Ethics Complaint
      against Hix) and broadens the scope of the alleged misconduct beyond a single
      bid irregularity described in Article 1, suggesting systemic manipulation of
      the Ethics Commission.


      KEY ENTITIES:

      *   Ray Hix

      *   Jack Burrell

      *   Fairhope Airport Authority (FAA)

      *   Ethics Commission

      *   Fairhope City Council President

      *   Mayor of Fairhope'
