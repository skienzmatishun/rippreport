  stirring-the-pot:
    brief: 'THE CONFLICT

      *   The Fairhope Airport Authority (FAA) is under investigation due to a Ripp
      Report complaint and ethics inquiry.

      *   Ray Hix was hired by board member Ray Hix’s attorney to request an advisory
      opinion from the Ethics Commission.

      *   Hix won a lease for his company without inside information about the bidding
      process.

      *   The bid process involved questions regarding aircraft ownership (three planes
      claimed vs. one confirmed).

      *   Discrepancy in fuel estimates: Hix projected 100,000 to 110,000 gallons
      of Jet A usage based on historical data (2014-15) and projected growth.

      *   Mr. Burrell reduced the fuel bid by 15,000 gallons.


      THE DISCOVERY

      *   The Widget Article questions accountability regarding truthfulness ("Who’s
      telling the truth?").

      *   It states that Mr. Burrell has no answers regarding the situation.

      *   It critiques the Mayor''s handling of the investigation and implies potential
      liability for Hix.


      THE PIVOT

      *   Article 2 acts as a smokescreen, intensifying the public questioning of
      accountability surrounding the issues detailed in Article 1 (leverage/pressure
      on Burrell and Hix).

      *   Article 2 shifts focus to who is telling the truth, deepening the conflict
      presented by the specific factual discrepancies (fuel estimates, aircraft counts)
      found in Article 1.


      KEY ENTITIES

      *   Ray Hix

      *   Fairhope Airport Authority (FAA)

      *   Ethics Commission

      *   Mr. Jack Burrell

      *   Ripp Report

      *   Fairhope Airport'
