  fairhope-citizens-citizens-citizens:
    brief: 'THE CONFLICT

      *   Ray Hix won a lease for his company without inside information regarding
      the bidding process.

      *   Mr. Hix’s answers on the bid form contradicted his submitted bid regarding
      aircraft ownership (claimed 100% ownership of three planes but only owned one).

      *   Mr. Hix provided fuel estimates that differed significantly from actual
      usage data reported by Mr. Burrell.


      THE DISCOVERY

      *   The Fairhope Airport Authority (FAA) debt represents 21 percent of Fairhope''s
      overall borrowing.

      *   The FAA purchased 258 acres in 2007 for $8.85 million.

      *   Mayor Wilson urged the council to take ownership of the Airport Authority
      property to pay down debt and market the land.


      THE PIVOT

      *   Article 1 alleges irregularities in bidding (Hix''s lack of insider information).

      *   Article 2 reveals that the FAA holds significant debt and owns valuable
      public land, suggesting a conflict between the Authority''s financial management/ownership
      claims and taxpayer interest.


      KEY ENTITIES

      *   Ray Hix

      *   Fairhope Airport Authority (FAA)

      *   Ethics Commission

      *   Jack Burrell (Council President, FAA Board member)

      *   Mayor Karin Wilson

      *   City Council members (Kevin G. Boone, Jay Robinson, Robert Brown, Jimmy
      Conyers)'
