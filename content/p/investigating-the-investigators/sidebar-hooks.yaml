  in-your-face:
    brief: 'THE CONFLICT

      *   Fairhope Airport Authority (FAA) faced an investigation by attorneys hired
      by the FAA.

      *   Ray Hix was a board member involved in the FAA lease bidding process.

      *   Specific discrepancies were found on the bid form: Hix''s answer regarding
      aircraft ownership did not match his submitted bid.

      *   Hix provided fuel estimates (85,000 to 110,000 gallons of Jet A and 5,000
      gallons of Avgas) that were later disputed by Mr. Burrell.

      *   The FAA received city appropriation funds, with the argument that taxpayers
      were not paying for legal services.


      THE DISCOVERY

      *   An Ethics Complaint was filed against Fairhope City Councilman Robert Brown
      on February 26, 2018.

      *   The complaint alleged Mr. Brown used the Ethics Commission as a vehicle
      to justify actions and failed to heed advice regarding bidding contracts (Eastern
      Shore Art Center).

      *   Mr. Brown allegedly proceeded with securing a contract without requesting
      a formal opinion from the Ethics Commission.


      THE PIVOT

      *   Article 2 establishes a pattern of elected officials using the Ethics Commission
      to justify actions for personal or business gain, which connects directly to
      the questionable practices and potential misconduct identified in Article 1
      regarding the FAA lease bidding.

      *   The failure of accountability demonstrated by Mr. Brown''s actions is framed
      as systemic corruption within local government oversight.


