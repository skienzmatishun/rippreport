  stirring-the-pot:
    brief: 'THE CONFLICT:

      *   The Ripp Report filed a complaint against the Fairhope Airport Authority
      (FAA) concerning financial impropriety, citing that airport appropriation is
      21% of city debt and exceeds spending on all five public schools.

      *   Ray Hix won a lease for his company despite allegedly lacking inside information
      while serving as an FAA Board Member for six months prior to the bid.

      *   Hix''s submitted bid contained inaccuracies: he claimed 100% ownership of
      three aircraft (Lagniappe confirmed only one), and the construction timeline
      estimate was six months, yet after the lease execution date of December 17,
      2015, it took 27+ months for the hangar to be less than 50% complete.

      *   Council Member Mr. Burrell, serving on the bid committee, reduced Mid-Bay''s
      fuel number by 15,000 gallons, which contradicted Hix’s stated estimate based
      on usage of his single aircraft (70,000 gallons in 2016).


      THE DISCOVERY:

      *   The second article ("Stirring the Pot") pivots focus from Ray Hix/FAA to
      Councilman Jack Burrell.

      *   It directly questions Jack Burrell''s conduct and lack of answers regarding
      these issues, specifically targeting him as "Come fly with me" Burrell.

      *   The article suggests that if Jack Burrell has secured legal counsel to address
      The Ripp Report investigation, then the actions of Mayor Burrell (City Council
      member) are also subject to scrutiny.


      THE PIVOT:

      *   Article 1 establishes a pattern of alleged misconduct and inaccuracies regarding
      FAA operations through Hix''s lease/bid process, leading The Ripp Report to
      file an ethics complaint against Ray Hix.

      *   Article 2 serves as the ''smoking gun'' by immediately pivoting the narrative
      back to Councilman Jack Burrell, linking his public profile ("come fly with
      me") and potential legal defenses to the systemic corruption uncovered in Article
      1 (e.g., his alleged reduction of Mid-Bay’s bid).


      KEY ENTITIES:

      *   Ray Hix / Mr. Hix

      *   Joe McEnerney (FAA Board President/Chairman)

      *   Jack Burrell (Councilman/Mayor)

      *   Fairhope Airport Authority (FAA)

      *   The Ripp Report

      *   Lagniappe (Publisher)

      *   Mid-Bay'
