  backstory-podcast-16-the-jack-wilson-complex:
    brief: 'THE CONFLICT

      *   Fair Hope officials, specifically Council President Jack Burrell and Judge
      Snedeker, were ranked as corrupt in a 2016 satirical article.

      *   Burrell failed to disclose a prior police report.

      *   Both Burrell and the Judge are developers with conflicts of interest.

      *   The city council was criticized for lack of transparency and accountability
      regarding city funds (e.g., investigation into a whistleblower with no findings).

      *   Previous GOP promises (2010, under Mike Hubbard) to end corruption were
      unmet by 2020.


      THE DISCOVERY

      *   Paul is advocating for the removal of Council President Jack Burrell.

      *   The city council votes 95% in unison, indicating a lack of debate or transparency.

      *   Specific instances of procedural violations exist: Etowah County Detention
      Center was overbuilt; Todd Entrekin was wrongly accused; North Baldwin Utilities
      evicted a speaker without due process or meeting minutes.


      THE PIVOT

      *   Article 2 provides specific evidence of ongoing systemic local government
      dysfunction (95% unanimous votes, procedural violations) which validates the
      general corruption concerns about Fair Hope leaders mentioned in Article 1''s
      context.


      KEY ENTITIES

      *   Jack Burrell (Council President)

      *   Judge Snedeker

      *   Fair Hope officials

      *   2016 satirical article

      *   Etowah County Detention Center

      *   Todd Entrekin

