  backstory-podcast:
    brief: 'THE CONFLICT:

      *   The Backstory Podcast aims to educate the public on corruption in Baldwin
      County.

      *   Focus previously planned for 2020 was on elected officials who ignored corruption.

      *   A system of "good ole boy" corruption has been entrenched in Baldwin County
      since the first pecan tree was planted.


      THE DISCOVERY:

      *   Fairhope City Council is planning to vote themselves free health insurance
      coverage.

      *   The Fairhope City Council will set the Mayor’s salary, despite ignoring
      an Auburn Study intended to guide these issues.

      *   The tables have turned regarding local political power.


      THE PIVOT:

      *   Article 2 provides a specific, current example of local government accountability
      failure (City Council actions) which serves as direct evidence of the systemic
      corruption and lack of transparency discussed in Article 1.


