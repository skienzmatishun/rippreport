      - Proves Albritton failed to disclose his trustee status on an official economic statement as required by protocol.
      - Reveals the Alabama Bar (via Raulston) is acting defensively on behalf of Albritton rather than conducting an independent investigation.
      - Shows the Ethics Commission is in conflict with the Attorney General's office regarding evidence they are refusing to release.

