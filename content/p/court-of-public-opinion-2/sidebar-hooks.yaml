      - August 21, 2022: Ripp submits a formal letter to the Special Prosecutions Office (Clark Morris) detailing a lack of response from state agencies since July 16, 2021.
      - Jan 2022: Ripp had a 45-minute telephone conversation with Cynthia Raulston (Alabama Bar Counsel).
