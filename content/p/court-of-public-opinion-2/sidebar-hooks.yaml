  letter-to-the-alabama-attorney-general:
    brief: |-
      THE CONFLICT:
      - Tom Albritton is Executive Director of the Alabama Ethics Commission and serves as a trustee for the Mabel Amos Memorial Fund.
      - Lagniappe article (referenced in both texts) alleges Albritton used the trust to pay $105,000 in scholarships for his daughters' tuition at the University of Texas.
      - Main article alleges total self-dealing by Albritton totals $120,000.
      - Trust will contains strict language against "self-dealing" citing IRS sections 4941(d) and 5489.
      - The Ripp Report filed an Alabama Bar complaint against Albritton; the bar received a response from Albritton containing omissions (attached as PDF evidence in Article 2).
      - Previous Ethics Commission failure: A Fairhope councilman used his position to enrich himself with no independent investigation from the Commission.
      - Francis Paul Ripp claims Marshall assured accountability during a Fairhope campaign stop, but AG office failed to investigate the councilman complaint Ripp personally delivered in Montgomery.

      THE DISCOVERY:
      - Article 2 is a formal letter from Francis Paul Ripp to Alabama Attorney General Steve Marshall at 501 Washington ave. Montgomery, Alabama 36104.
      - Letter encloses Lagniappe article, Ethics Complaint, Writ of Mandamus, and Albritton's Alabama Bar complaint response.
      - Letter states Ripp Report/Court of Public Opinion reached 80,000 readers.
      - Letter links Albritton’s self-dealing as a primary test case ("litmus test") for AG Marshall's office.
      - Ripp confirms Albritton is one of three trustees (others are John Bell and Rick Clifton); he claims Regions Bank is likely associated with other trustees.
      - Letter asserts Ethics Commission and Alabama Bar are acting as "insulators for corruption" by inaction.

      THE PIVOT:
      - Article 2 proves the accusations in Article 1 are being actively escalated beyond public opinion into formal legal channels.
      - Letter connects the ignored Fairhope Councilman case with Albritton, arguing if Albritton is cleared despite similar self-dealing patterns by board members, the Ethics Commission lacks authority.
      - The "smoking gun" is the enclosed PDF of Albritton's response to the Bar, referenced by Ripp in Article 1 but made official via this letter to AG Marshall.
      - Letter forces AG Marshall's office to acknowledge they were formally approached with specific IRS and Bar violation documentation regarding the Director of Ethics.

      KEY ENTITIES:
      - Francis Paul Ripp
      - Tom Albritton
      - Steve Marshall (AG of Alabama)
      - Mabel Amos Memorial Fund
      - The Ripp Report / Court of Public Opinion
      - Alabama Ethics Commission (General Council)
      - University of Texas
      - John Bell (Trustee)
      - Rick Clifton (Trustee / Regions Bank)
      - Regions Bank
