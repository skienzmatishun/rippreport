hooks:
  mid-term-elections-vote-incumbents-out:
    brief: "THE CONFLICT: \n- Past political environment in Baldwin County characterized\
      \ by a \"good ole boy network.\"\n- Prior leadership included Mayor Karen Wilson,\
      \ former Mayor Kant, and Senator Boom Boom Pittman maintaining established connections\
      \ in Bay Minette.\n- Judge Michelle Thomason held the position of Circuit Judge\
      \ (Family Court) but was criticized for her reputation; she was identified as\
      \ Catalyst's first client before running for Court of Civil Appeals.\n\nTHE\
      \ DISCOVERY: \n- Tucker Dorsey, holding County Commission Seat 3, is presented\
      \ as being tied to both Clarence Burke (President of Baldwin County Sewer Service)\
      \ and the political organization Catalyst.\n- Allegation: Dorsey facilitated\
      \ a $35 million \"mega-site\" deal for the county.\n- Claim: The purchase required\
      \ county employees' funding and resulted in lost revenue.\n\nTHE PIVOT: \n-\
      \ Article 1 broadly identifies Catalyst as promoting \"faux candidates\" tied\
      \ to corruption and established networks (Karen Wilson, Kant).\n- Article 2\
      \ provides concrete proof of this link by specifically naming an active incumbent\
      \ (Tucker Dorsey) whose allegiance is stated to be solely with Clarence Burke\
      \ (BCSS) and Catalyst.\n- The $35 million mega-site deal mentioned in Article\
      \ 2 gives a specific financial mechanism through which the \"back room deals\"\
      \ accused in Article 1 are being executed.\n\nKEY ENTITIES: \n- Baldwin County\n\
      - Karen Wilson\n- Kant\n- Boom Boom Pittman\n- Judge Michelle Thomason (Circuit/Civil\
      \ Appeals)\n- Tucker Dorsey (County Commissioner, Seat 3)\n- Clarence Burke\
      \ (President of BCSS)\n- Catalyst (political organization)\n- Baldwin County\
      \ Sewer Service"
    generated_at: '2026-07-18T17:19:42.566658Z'
  catalyst-does-baldwin-county:
    brief: 'THE CONFLICT:

      • Main Article 1 (Qualification) established concern over "back room deals"
      and corruption in Baldwin County elections prior to mid-term contests.

      • Mention of former Mayor Kant and State Senator Pittman being used by a "good
      ole boy network."

      • Judge Michelle Thomason, as Circuit Judge in Family Court, is flagged for
      her negative reputation and status as Catalyst''s first client (2018).


      THE DISCOVERY:

      • Widget Article 2 (Catalyst Does Baldwin County) reveals internal CATALYST
      dynamics regarding State Senate Seat 32.

      • Chris Elliott, an architect of the Catalyst organization, lost his primary
      run for State Senate Seat 32 after giving up a County Commission seat and selling
      his business.

      • The article proves connections between prominent political figures: Mr. Elliott''s
      wife is employed by Sheriff Hoss Mack; both have been front-and-center for Eddie
      Tyler (School Superintendent).


      THE PIVOT:

      • Article 1 frames the elections as a necessary fight to break the "good ole
      boys" network and question candidates like Judge Thomason, who was Catalyst’s
      first client.

      • Article 2 provides specific evidence of this alleged corruption by identifying
      Chris Elliott as a high-level CATALYST figure whose personal ties (wife working
      for Sheriff Hoss Mack) illustrate the interlocking power structure of the "corrupt
      wheel" mentioned in Article 1.


      KEY ENTITIES:

      • Catalyst (Political organization, GOB representative connection)

      • Baldwin County

      • Judge Michelle Thomason (Circuit Judge in Family Court)

      • Chris Elliott (Architect of CATALYST, former State Senate Seat 32 candidate)

      • Sheriff Hoss Mack / Mack

      • Eddie Tyler (School Superintendent/Campaign Manager for Elliott)

      • Karin Wilson (Duly elected Mayor, catalyst''s opposition figure in Fairhope)

      • David Northcutt (Candidate opposing Elliott for State Senate Seat 32)

      • Boom Boom Pittman

      • Kant'
    generated_at: '2026-07-18T17:19:42.566667Z'
  catalyst-candidates:
    brief: 'THE CONFLICT

      *   Previous Baldwin County political power was held by a "good ole boys" network
      in Bay Minette.

      *   Key figures included former Mayor Kant and State Senator Pittman (who previously
      held the State Senate seat 32).

      *   The previous system relied on these individuals to facilitate corruption
      ("keep the wheels greased").

      *   This established power structure is currently decaying; connections are
      "gone, fired, retired or drying up."


      THE DISCOVERY

      *   The official list of local and state candidates provided by the Baldwin
      County Probate Office was altered.

      *   *The Ripp Report* made this alteration by adding references to "Catalyst
      Candidates" on the official ballot list.

      *   Michelle Thomason was specifically added/re-labeled as "The Catalyst Queen."


      THE PIVOT

      *   Main Article 1 expresses concern regarding whether certain candidates are
      "faux candidates or placement candidates by Catalyst," suggesting an underlying
      organizational control.

      *   Article 2 is the smoking gun because it proves that Catalyst organization
      has directly altered official state and local election documentation, establishing
      its documented presence across multiple contested offices in Baldwin County
      government.


      KEY ENTITIES

      *   Baldwin County (Government entity)

      *   Catalyst (Political organization/group)

      *   Boom Boom Pittman (Former State Senate representative for District 32)

      *   Michelle Thomason (Judge, running for Court of Civil Appeals; identified
      by Ripp Report as "The Catalyst Queen")

      *   Mayor Kant (Former Mayor of Fairhope / Baldwin County political figure)

      *   State Senate seat 32

      *   Baldwin County Probate Office'
    generated_at: '2026-07-18T17:19:42.566678Z'
  say-goodbye-incumbents:
    brief: 'THE CONFLICT

      *   Baldwin County was plagued by a "good ole boys" network involved in "back
      room deals."

      *   The political machine relied on connections facilitated by Fairhope and
      led by former Mayor Kant and Senator Pittman to maintain influence.

      *   Specific officials under scrutiny include Judge Michelle Thomason, who held
      a negative reputation as a Circuit Judge in Family Court and was the first client
      of Catalyst.

      *   Commissioners allegedly saddled the county with large projects, such as
      a "$35 million dollar plus mega site," financed by the back of county employees.


      THE DISCOVERY

      *   Article 2 identifies specific County Commissioner seats requiring removal
      to disrupt this network.

      *   Seat 3 targets Tucker Dorsey, alleging he is connected to Catalyst and Summitt
      Construction, and orchestrated the firing of over a dozen good employees; his
      buddy Trip Pittman helped secure his commission seat.

      *   Seat 1 targets Frank Burt, described as a "political dinosaur" and architect
      of sweetheart deals on the Commission.

      *   Seat 4 targets Charles Gruber for choosing the path of least resistance.


      THE PIVOT

      *   Article 1 provides the overarching indictment that the Baldwin County political
      landscape is controlled by a corrupt network (the "good ole boys") using political
      connections (Catalyst).

      *   Article 2 serves as the smoking gun by naming specific, current incumbents
      within that identified network (Dorsey, Burt, Gruber) and linking their positions
      directly to actionable evidence of corruption or failure (firing employees,
      sweetheart deals, lack of change), validating Article 1''s generalized claims.


      KEY ENTITIES

      *   Karen Wilson (Mayor)

      *   Kant (Former Mayor)

      *   Sen Trip Pittman / Trip Pittman

      *   Judge Michelle Thomason / Thomason

      *   Tucker Dorsey

      *   Clarence Burke (Baldwin County Sewer/BCSS)

      *   Catalyst

      *   Billy Joe Underwood

      *   Frank Burt

      *   Jeb Ball

      *   Charles Gruber

      *   Christopher Callaghan

      *   Chris Elliott

      *   John Lake (from Daphne)'
    generated_at: '2026-07-18T17:19:42.566685Z'
  cross-the-line:
    brief: 'THE CONFLICT

      *   Historical political power structure (the "good ole boy network") was allegedly
      dominated by figures in Bay Minette.

      *   Key individuals associated with this network include former Mayor Kant,
      Former Senate Representative Boom Boom Pittman, and local connections facilitated
      through Fairhope.

      *   The change began with the election of Mayor Karen Wilson to challenge the
      traditional power structure.

      *   Judge Michelle Thomason is a figure under scrutiny for her history as a
      Circuit Judge in Family Court and being listed as the first client of CATALYST
      (2018-05-29).


      THE DISCOVERY

      *   In recent State Senate Seat 32 elections, Elliott secured victory by defeating
      David Northcutt.

      *   The margin of this victory was only 742 votes.

      *   Article 2 asserts that Elliott''s narrow win proves his credibility and
      confirms the enduring influence of CATALYST ("the Catalyst good ole boy").

      *   Jason Fisher is presented as a distinct alternative to the Catalyst-backed
      candidates for State Senate Seat 32, suggesting a shift in voter focus away
      from party lines.


      THE PIVOT

      *   Article 1 claims that the "wheel of corruption has stopped" and that the
      old network connections are fading or gone after Karen Wilson''s election.

      *   Article 2 acts as the ''smoking gun'' by demonstrating that influence (Catalyst)
      remains powerful in key races, specifically State Senate Seat 32, evidenced
      by Elliott’s narrow victory over a non-Catalyst challenger (David Northcutt).
      This suggests the old power structure described in Article 1 has not fundamentally
      dissolved.


      KEY ENTITIES

      *   Baldwin County

      *   CATALYST (Political organization)

      *   Mayor Karen Wilson

      *   Former Mayor Kant

      *   Boom Boom Pittman / Senator Pittman

      *   Judge Michelle Thomason

      *   Elliott

      *   David Northcutt

      *   Jason Fisher

      *   State Senate Seat 32'
    generated_at: '2026-07-18T17:19:42.566691Z'
  who-not-to-vote-for:
    brief: 'THE CONFLICT

      *   Baldwin County previously relied on a "good ole boy network" for political
      control, exemplified by former Mayor Kant and Sen Pittman greasing the wheels
      in Bay Minette.

      *   The established order was challenged by the election of Mayor Karen Wilson.

      *   Judge Michelle Thomason, acting as a Circuit Judge in Family Court (2018),
      had already accumulated a negative reputation.


      THE DISCOVERY

      *   Article 2 reveals specific evidence of GOB/Catalyst strategic placement:
      Tripp Pittman, while claiming term limits for the State Senate seat, decided
      to run for Mr. Sessions'' U.S. Senate seat after being linked to "BP cash" and
      self-enrichment during a catastrophe.

      *   Baldwin County Commissioner Chris Elliott (appointed) is strategically running
      for a State Senate seat despite past charges of DUI and operating The Elliott
      Companies, Inc., specializing in disaster mitigation/restoration services.


      THE PIVOT

      *   Article 1 raises the general suspicion of "faux candidates or placement
      candidates by Catalyst" regarding county commission races. Article 2 provides
      concrete evidence of this pattern through specific actions: Tripp Pittman shifting
      his political focus away from state office, and Chris Elliott using his status
      as a County Commissioner to seek a higher legislative seat (State Senate).


      KEY ENTITIES

      *   Karen Wilson (Former Mayor/Council Member)

      *   Kant (Former Mayor)

      *   Boom Boom Pittman / Sen. Pittman (State Senator District 32)

      *   Judge Michelle Thomason (Circuit Judge in Family Court, Catalyst Queen)

      *   Catalyst (Political Organization)

      *   Jeff Sessions (U.S. Attorney General Candidate)

      *   Tripp Pittman (Former State Senator)

      *   Chris Elliott / Mr. Elliott (Baldwin County Commissioner/State Senate candidate)'
    generated_at: '2026-07-18T17:19:42.566697Z'
  last-chance:
    brief: 'THE CONFLICT

      *   Baldwin County experienced a traditional "good ole boy network" political
      culture prior to recent shifts.

      *   Former figures like former Mayor Kant and Senate Representative Pittman
      maintained influence within Bay Minette.

      *   Mayor Karen Wilson''s election marked an attempt to change the political
      status quo in Baldwin County.

      *   Key positions open for selection (at time of writing): County Commissioners,
      Sheriff, Judge of Probate, State Senate seat 32 (previously held by Boom Boom
      Pittman).


      THE DISCOVERY

      *   Catalyst / Scott Boone Consulting is identified as a "front man" organization
      designed to place politically advantageous candidates ("good ole boy Christians").

      *   Johnathan Armstrong is presented as a candidate for County Commission District
      two with clear conflicts of interest, including receiving dual checks from the
      county and benefits.

      *   Steve Carey is explicitly labeled the Catalyst candidate and supported by
      Tucker Dorsey, designated as the "worst choice" due to potential systemic influence.

      *   The Widget article argues that if Johnathan Armstrong and Commissioner Jeb
      Ball are elected, they could form an alliance ("Block VOTE") counter-productive
      to citizen interests.


      THE PIVOT

      *   Article 1 establishes the general presence of a problematic network (the
      "good ole boy network") and raises the question regarding candidates placed
      by Catalyst ("faux candidates or placement candidates").

      *   Article 2 functions as the ''smoking gun'' by identifying Scott Boone Consulting/Catalyst
      as the specific operational mechanism behind this alleged network. It moves
      from questioning the system to providing concrete evidence of compromised individuals
      (Armstrong, Carey) and detailing the potential negative political outcomes (Block
      VOTE).


      KEY ENTITIES

      *   Baldwin County

      *   CATALYST / Scott Boone Consulting

      *   Matt McKenzie

