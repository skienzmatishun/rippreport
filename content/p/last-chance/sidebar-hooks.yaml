  shooting-yourself-in-the-foot:
    brief: 'THE CONFLICT:

      - Baldwin County is plagued by alleged corruption in the Judiciary and 14 municipal
      governments.

      - Ethics Commission accused of systemic conflict of interest (citing Lagniappe
      Mobile article: ethics director’s kids'' tuition paid from trust he oversees).

      - Catalyst (aka Scott Boone Consulting) accused of: fixed bids, fraud lawsuits,
      judicial shenanigans, and controlling elections through "good ole boys."

      - Tucker Dorsey: Former Commissioner known for lawsuits (Strawman/Baldwin County
      Sewer); removed from office by voters.

      - Scott Boone not just front man; running head for Catalyst political machine
      in the county.


      THE DISCOVERY:

      - District 2 Commission race is the most critical local race in Baldwin County
      (Art 1 & Art 2 consensus).

      - Steve Carney is confirmed as Catalyst-backed candidate for District 2. Previously
      lost Daphne Mayor race because of this same affiliation (Art 2).

      - Johnathan Armstrong + Jeb Ball = Co-conspirators forming a 50% voting block
      on the commission.

      - Jeb Ball’s business interest: BSAS (Baldwin Substance Abuse Services Inc.)
      and BCSA (BCSA LLC).

      - BSAS Founded: 2007 through District Attorney’s office.

      - Ball "selected" to run BSAS with father playing key role; Judge Michell Thomason
      founded BCSA and acted as Catalyst’s first client prior to name change (Art
      2).

      - Armstrong/Ball both receive two monthly checks from County + benefits.

      - BSAS/BCSA is a no-bid contract entity providing classes to arrestees; Ball
      and Armstrong receive revenue from the same people they would govern.

      - Matt McKenzie: Only candidate with no Catalyst ties, working full time (one
      check).


      THE PIVOT:

      - Article 2 provides the financial "smoking gun" proving Article 1’s claim of
      systemic corruption.

      - BSAS establishment (Art 2) validates Article 1’s accusation that the Judiciary
      and DA facilitate corruption for political allies.

      - Confirms Armstrong is not independent; dual paychecks link judicial system
      directly to the candidate.

      - Links "Catalyst" (Art 1 abstract term) specifically to real individuals: Judge
      Michell Thomason and Jeb Ball’s business structure (BSAS).

      - Proves Article 1 is not just opinion: The BSAS contract is locked with no
      public bids, exactly as Art 1 warns about "fixed elections" and "corrupt Ethics
      Commission."


      KEY ENTITIES:

      - Scott Boone (aka Catalyst)

      - Matt McKenzie

      - Johnathan Armstrong

      - Jeb Ball

      - Steve Carney (listed as Carey/Carney)

      - Tucker Dorsey

      - Joe Faust

      - Fidler

      - Judge Michell Thomason

      - Baldwin County Substance Abuse Services Inc. (BSAS)

      - BCSA LLC'
