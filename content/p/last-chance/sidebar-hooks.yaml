  a-decade-of-corruption:
    brief: 'THE CONFLICT

      - Last 10 years of alleged political and judicial corruption across Baldwin
      County judiciary, ethics commission, and 14 municipal governments.

      - May 8th 2010: Baldwin County Commission ordered State Senator Tripp Pittman
      and Fairhope Mayor Tim Kant to halt a BP Boom bid.

      - June 4th 2010: Fairhope City Council awarded contract to Pittman Tractor (not
      Oil Recovery) via special meeting.

      - Six days later: Pittman received a check for $372,165.90 from Fairhope for
      “COMPLETED” boom work; contract lacked general contractors license, marine insurance,
      county approval, or Ethics Commission approval.

      - Alleged bid value: $636,000.00; Pittman utilized alias Oil Recovery to bypass
      rules after initial bid denial.

      - No state or federal officials have been arrested, indicted, or held accountable
      for these documented crimes in the last 10 years.


      THE DISCOVERY

      - Jennifer Fidler identified as Fairhope Staff utilized by Pittman and Kant
      to execute the 2010 BP contract.

      - Tripp Pittman allegedly legislatively changed Sheriff qualifications in Baldwin
      County to prevent opposition during re-election campaigns.

      - Scott Boone Consulting (aka Catalyst) identified as the front organization
      coordinating these corruption patterns for over a decade.

      - Confirmed list of alleged corrupt entities: The Mega Site, Strawnman case,
      Fairhope Airport bid rigging by Council President Jack Burrell, Chris Elliott
      DUI influence, McSharry case.


      THE PIVOT

      - Second article names Jennifer Fidler as a participant in 2010 corruption;
      First article explicitly flags Fidler: "A vote for Fidler is a vote for CATALYST."

      - First article uses Second article''s data (Catalyst control, bid rigging,
      ignored ethics) to validate the claim that Catalyst is still “hiding in shadows”
      controlling the primary election.

      - Specific pivot: Second article proves Fidler’s past role; First article demands
      voters remove her influence tomorrow via Matt McKenzie vs. Johnathan Armstrong
      and Joe Faust retention.

      - Both articles cite the same target for accountability: Scott Boone/Catalyst
      network.


      KEY ENTITIES

      - Tripp Pittman (State Senator)

      - Jennifer Fidler (Fairhope Staff/Political Candidate)

      - Tim Kant (Mayor Fairhope, now out of office)

      - Scott Boone / Catalyst (Scott Boone Consulting)

      - Joe Faust (County Commissioner, incumbent recommendation from Article 1)

      - Johnathan Armstrong (Primary Candidate)

      - Matt McKenzie (Primary Candidate, Article 1’s "best choice")

      - Steve Carey (Catalyst Candidate)

      - Tucker Dorsey (Article 1, Catalyst supporter)

      - Jeb Ball (County Commissioner/Business Associate to Armstrong)

      - Jack Burrell (Fairhope Council President)

      - Karin Wilson (Fairhope Mayor who broke Pittman''s 8-year debris contract)

      - Greg Mims, Sherry Sullivan (Fairhope Staff used in 2010 bid)'
