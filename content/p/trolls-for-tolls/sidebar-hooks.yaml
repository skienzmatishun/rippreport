  liars-bridge:
    brief: |-
      THE CONFLICT:
      - I-10 Bayway Bridge project estimated price tag is $2.2 billion; available funds cited at approximately $500 million (specifically $125M federal risked if delayed + up to $250M state).
      - Politicians initially remained silent on financing for years, then discussed tolls and later "flipped flopped" against public opinion.
      - Facebook group "blockthetolls" formed to oppose tolls; accumulated over 50,000 supporters.
      - Following the petition surge, Mobile and Baldwin MPOs united into a "unified front FOR tolls" to protect politicians from public opinion.
      - Jack Burrell designated as spokesman for the I-10 project despite history of controversy at Fairhope Airport Authority.
      - Jon Gray identified as political strategist hired by Burrell to manage messaging ("promote B.S.") and oppose tolls initially via "social media pressure."

      THE DISCOVERY:
      - Article 2 quotes Jack Burrell claiming he "first promised no federal money was needed, and no tools [tolls]" but is now asking for funding that "we already have received."
      - Burrell asserts bridge will allow the county to "secure federal funding... and continue seeking additional."
      - Article 2 claims internal motivation is not traffic, but "traffic is second to expanding development."
      - Burrell’s council record highlighted: 10 years on council, involved in "slowing down or not even approving projects" while claiming now he needs to fix infrastructure.
      - Jerry Carl and Tommy Tuberville mentioned in Article 2 for voting against the PACT Act (VA healthcare bill) as a parallel to local leaders forgetting promises.

      THE PIVOT:
      - Article 2 provides the "smoking gun" by quoting Burrell’s direct contradiction between past promises (no tolls/no federal money) and current requests for funding to justify tolls.
      - Article 2 explicitly links the MPO merger and toll support to the political panic caused by the "no tolls petition hit 50,000."
      - Article 2 confirms Burrell is using "No Tolls" as an election platform despite internal agreement to support tolls if funding fails.
      - Article 2 identifies Jon Gray’s paid role in manipulating the narrative, validating Article 1's claim that politicians are utilizing external spin doctors to bypass public skepticism.

      KEY ENTITIES:
      - Jack Burrell (Fairhope City Councilman, ESMPO Chairman)
      - Jon Gray (Political Strategist)
      - Jerry Carl (Politician)
      - Tommy Tuberville (Congressman)
      - Jack Burrell’s ESMPO Statement: "Eastern Shore has grown by leaps and bounds"
      - Fairhope Airport Authority
      - Mobile and Baldwin MPOs
    generated_at: '2026-03-15T01:16:37.956673Z'
    text: Jack Burrell claims he never needed federal cash for the I-10 bridge, but his own record tells a different story. These leaked quotes expose Burrell and his paid spin doctor, Jon Gray, as they scramble to tax drivers after their "no tolls" promise went up in smoke.
  no-mo-bridge:
    brief: |-
      THE CONFLICT:
      - Bayway Bridge (I-10) project proposed for Mobile/Baldwin counties.
      - Jack Burrell (Mobile City Councilman, Fairhope Airport Authority) named spokesman for I-10 project.
      - Burrell claims no money coming from federal infrastructure bill or state funds for bridge.
      - Burrell promises toll-free route if citizens choose not to pay toll on Bayway Bridge.
      - Project price tag: $2.2 billion; estimated available funds: ~$500 million ($250M state commitment + $125M federal).
      - Facebook page "Block the Tolls" (Jim Zigler) gained over 50,000 likes; pressured politicians to flip-flop on anti-toll stance.
      - Jon Gray (political strategist) cited as biased advisor for project supporters.

      THE DISCOVERY:
      - Mo Brooks (US House/Senate Candidate) states he believes funding decisions should not be made in Washington.
      - Brooks claims Alabama must shift government away from federal control via 10th Amendment.
      - Mark Colson (CEO, Alabama Trucking Association) states plan is unconstitutional for single-truck tolls violating Commerce Clause.
      - Alabama refused Medicaid expansion (left $3.2 billion revenue on the table) and is "studying" marijuana legalization instead of implementing revenue streams.
      - Fairhope Mayor Sherry Sullivan admits a bridge toll is obvious but claims they will maintain "legacy routes."

      THE PIVOT:
      - Brooks’ ideological opposition to federal funding (Article 2) explains the lack of money Burrell claims is missing (Article 1).
      - Brooks insists on "No more" federal aid while Alabama projects require federal highway dollars to exist.
      - Brooks admits opposition to federal assistance but would take it if offered, contradicting "No More" rhetoric.

      KEY ENTITIES:
      - Jack Burrell (City Council, Airport Authority)
      - Mo Brooks (Congressman/Senate Candidate)
      - Jim Zigler (Facebook Organizer)
      - Jon Gray (Political Strategist)
      - Mark Colson (Alabama Trucking Association, CEO)
      - Sherry Sullivan (Fairhope Mayor)
      - Baldwin County Citizens for Government Accountability (CGA)
    generated_at: '2026-03-15T01:16:37.956696Z'
    text: While Jack Burrell begs for billions to bridge the gap, Mo Brooks is busy cutting the state’s financial lifeline in Washington. Brooks demands an end to federal aid, proving the bridge project is a dead man walking unless local leaders start telling the truth about who pays.
  mouthpiece:
    brief: |-
      1. THE CONFLICT:
      - Bayway Bridge project price tag is $2.2 billion; available committed funding is approximately $500 million ($250M state + $125M federal risk).
      - Public skepticism mobilized via Jim Zigler’s Facebook page "blockthetolls," which gained over 50,000 likes.
      - Politicians initially offered ambiguous silence on financing before flipping to promise toll-free routes ("We are going to have a toll-free route... take the toll-free route").
      - Mobile and Baldwin MPOs unified to support tolls one year after the Facebook campaign.
      - Project requires federal authorization for interstate tolling (cited by David Peterson regarding PA Act 44 from 2007).
      - Jon Gray (political strategist) advises on behalf of ALDOT and local leaders regarding the funding narrative.

      2. THE DISCOVERY:
      - Article 2 identifies Jack Burrell as the central "political mouthpiece" for the bridge and development push.
      - Article 2 alleges Burrell made past promises of "no federal money was needed, and no tolls" regarding infrastructure.
      - Article 2 claims Burrell served on Baldwin County Council for 10 years and "kicked the infrastructure can down the road."
      - Article 2 links Fairhope sewage/infrastructure failures directly to Burrell's inaction (projects slowed or unapproved over 10 years).
      - Article 2 states Burrell currently supports tolls to encourage "soaring population growth."

      3. THE PIVOT:
      - Article 2 proves Burrell is the primary source of misinformation referenced in Article 1 by explicitly labeling him a "consummate liar."
      - Article 2 connects Burrell’s past handling of Fairhope infrastructure neglect to his justification for the Bayway Bridge tolls (claiming he will never approve projects).
      - Article 2 contradicts Burrell’s credibility in Article 1 where he claimed transparency and funding certainty ("transparent about what’s available").
      - Article 2 confirms the conflict: If Burrell cannot be trusted on Fairhope’s sewage/roads (10-year delay), his assertion that tolls are necessary for the I-10 bridge is suspect.

      4. KEY ENTITIES:
      - Jack Burrell (Baldwin County Councilman, I-10 Project Spokesperson)
      - Jim Zigler (Facebook page "blockthetolls" founder)
      - Jon Gray (Political Strategist for Mobile/ALDOT)
      - David Peterson (BALDWIN COUNTY CITIZENS For GOVERNMENT ACCOUNTABILITY / CGA)
      - Dean Young (Local Politician/Advocate mentioned in video)
      - Mobile and Baldwin MPOs
      - ALDOT (Alabama Department of Transportation)
      - Fairhope Airport Authority
