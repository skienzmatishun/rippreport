hooks:
  fairhope-going-backwards:
    brief: 'THE CONFLICT

      - Fairhope City Council led by Jack Burrell, Kevin Boone, and Robert Brown accused
      of forming a corrupt cabal with Scott Boone Consulting ("Catalyst").

      - Municipal positions (Judge, Attorney) appointed by Council cited as holdovers
      from "past corrupt administration" resisting Wilson''s push for change.

      - Marcus McDowell appointed Municipal Attorney and Judge Snedeker reinstated
      immediately following Wilson''s plea for new appointments.

      - Council members (Burrell, Boone, Brown) accused of self-dealing; Wilson''s
      2016-2020 term credited with reversing city debt and removing previous corruption.


      THE DISCOVERY

      - Article 2 explicitly links Council member Kevin Boone to Scott Boone Consulting
      (Catalyst) as the "son" running the firm, confirming an inside deal.

      - Article 2 confirms candidates facing three current councilmen (Deb Hopkins
      vs Burrell, Howell Gibbens vs Brown, Joshua Gammon vs Boone) are the only path
      to removing Council control.

      - Article 2 cites specific financial corruption: Former Mayor and State Senator
      stole $639,000 in BP grant money while Sullivan was employed.

      - Article 2 details Karin Wilson''s fiscal performance: reversed $6M annual
      debt, increased cash funds by 59.18% ($17 million), obtained $23M in grants,
      paid down utility debt.

      - Article 2 confirms Sherry Sullivan has high school education; fired from city
      job in 2017, held three jobs in four years total.


      THE PIVOT

      - Article 2 validates the Main Article''s claim that Burrell, Boone, and Brown
      are operating as a bloc ("3B''s", "Cabal") by citing identical voting patterns
      and corporate affiliations (Catalyst).

      - Article 2 provides the financial "smoking gun" for why changing the council
      is necessary: Council controls appointments (Judge/Attorney) which maintain
      status quo, while only new council (Hopkins/Gibbens/Gammon) can vote out the
      corruption.

      - Article 2 confirms Wilson is the only candidate backed by both articles, proving
      she stabilized city finances (no borrowing), while opponents like Sullivan are
      linked to corporate interests and prior corruption.


      KEY ENTITIES

      - Karin Wilson (Mayor)

      - Jack Burrell (Councilman)

      - Kevin Boone (Councilman, son of Scott Boone Consulting head)

      - Robert Brown (Councilman)

      - Sherry Sullivan (Mayor Candidate, former city employee)

      - Marcus McDowell (Municipal Attorney appointed by Council)

      - Judge Snedeker (Municipal Judge)

      - Scott Boone Consulting (Catalyst)

      - Fairhope City Council'
    generated_at: '2026-03-18T10:48:23.835311Z'
  fairhope-voters-guide:
    brief: 'THE CONFLICT:

      - 2016 Municipal Election: Incumbent Mayor Timothy Kant defeated by Karin Wilson
      (bookstore proprietor, political novice) by margin of 400+ votes.

      - Federal oversight triggered: Alabama Secretary of State sent legal rep to
      Fairhope for tabulation oversight due to prior complaints regarding 2008 and
      2012 election tampering.

      - Current Governance Issue: City Council (Jack Burrell, Kevin Boone, Robert
      Brown) controls appointment of Municipal Judge and Municipal Attorney.

      - Alleged Corruption: Council accused of maintaining "corrupt hold overs" (Judge
      Snedeker, Marcus McDowell) rather than reforming positions.

      - Catalyst Formation: Burrell, Boone, Brown (referred to as "The Three Bs"),
      and Mayor Wilson''s opponent Sherry Sullivan are identified as a connected political
      group/Cabal.


      THE DISCOVERY:

      - Financial Misconduct Confirmed (Robert Brown): Ethics complaint filed with
      Alabama Attorney General.

      - Self-Dealing (Brown): Alleged conflict of interest involving contracts worth
      close to a million dollars for concession building and Fairhope Art Center.

      - Asset Dealings (Jack Burrell): Purchased farmland worth $2.65 million, then
      leased it back to farmers for $9,000/year due to lack of funds.

      - Political Network (Kevin Boone): Father of Scott Boone; linked to "Strawman
      fraud" series via partner John Avant; operates multiple undeclared LLCs for
      development projects he voted on.

      - Sherry Sullivan: Confirmed as Catalyst-backed mayoral candidate; previously
      fired from city employment and sued the city; cited by Article 2 as having high
      school education and limited experience.

      - Public Safety: Kevin Boone noted in spider graph detailing Strawman fraud/land
      development issues.


      THE PIVOT:

      - Evidentiary Bridge: Article 2 provides the specific financial records, legal
      complaints, and land deals that substantiate Article 1''s abstract claims of
      a "Corrupt CABAL."

      - Vetting Authority: Article 2 proves the Council (Burrell, Boone, Brown) has
      unchecked power over future appointments; voting them out is the "Golden Key"
      mechanism identified in Article 1.

      - Election Strategy: Both articles link removal of Burrell, Boone, and Brown
      to securing better appointments (Attorney/Judge) and limiting expansion of Catalyst
      influence.

      - Voter Warning: Article 2 identifies "The Three Bs" and Scott Boone Consulting
      as the specific targets needed to reverse the post-2016 corruption trajectory
      mentioned in Article 1.


      KEY ENTITIES:

      - Karin Wilson (Incumbent Mayor)

      - Jack Burrell (Council President, 8 years tenure)

      - Kevin Boone

      - Robert Brown (Ethics complaint filed)

      - Sherry Sullivan (Mayor candidate, Catalyst representative)

      - Scott Boone Consulting / CATALYST

      - Timothy Kant (2016 Incumbent Mayor)

      - Marcus McDowell (Municipal Attorney appointee)

      - Judge Snedeker (Reinstated Municipal Judge)'
    generated_at: '2026-03-18T10:48:23.835322Z'
