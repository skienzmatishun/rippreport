  fauxhope-or-fairhope:
    brief: 'THE CONFLICT:

      - 2016: Fairhope allegedly ended 16 years of corruption and insurance blacklisting.

      - Prior/Mayor Wilson Era: Accused of stopping internal corruption for 4 years
      but unable to stop Council''s personal gain.

      - Current Administration: City Council led by Jack Burrell (8 years), Kevin
