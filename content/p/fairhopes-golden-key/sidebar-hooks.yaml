      - Strategy confirmed: Running as a slate to "knock out the council."

      - Goal Confirmed: Challengers aim to break Mayor-Council collusion and "good
      ole boy culture" which article 1 details.

      - Evidence of Urgency: Article states last day for qualifications was Aug 26;
