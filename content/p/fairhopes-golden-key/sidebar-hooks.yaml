      KEY ENTITIES:

      - Fairhope City Council (Incumbent)

      - Jack Burrell

      - Kevin Boone

      - Scott Boone Consulting / Catalyst Group

      - Sherry Sullivan

      - Karin Wilson (Candidate recommendation)

      - Marcus McDowell

      - Judge Snedeker

      - Troy Vickers

