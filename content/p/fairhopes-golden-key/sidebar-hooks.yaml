  FAIRHOPE-FREE-YEAR:
    brief: 'THE CONFLICT:

      - Fairhope City Council led by Jack Burrell for 8 years appointed Marcus McDowell
      as Municipal Attorney and reinstated Judge Snedeker, overriding Mayor Karin
      Wilson’s request for new appointments.

      - Council members Burrell, Boone, and Brown support Sherry Sullivan for Mayor;
      Sullivan has only a high school education and was previously fired by the City
      (which she sued).

      - Article 1 asserts Council members hold positions from a "corrupt administration"
      before Mayor Wilson took office in 2016.

      - Burrell, Boone, Brown linked to Scott Boone Consulting (Catalyst).


      THE DISCOVERY:

      - 2024 Fairhope municipal elections postponed by Alabama Legislature to align
      with Presidential election, leaving incumbent council/mayor/attorney/judge un-elected
      for a 5th year.

      - Sewer and infrastructure projects approved in 2020 remain incomplete by Year
      5; sewer plant beyond capacity discharging into the Bay.

      - City of Fairhope settled lawsuit Ripp v. Burrell (US District Court, Southern
      District of Alabama).

      - In the Ripp settlement, City pays The Ripp Report’s attorney fees, American
      Express charges, accountant, advertising bills, computer services, and bank
      charges.


      THE PIVOT:

      - Article 2 confirms Article 1’s claim that the current Council is unaccountable;
      they are technically appointed for a "free year" without voter mandate despite
      Wilson’s 2016 cleanup.

      - The Ripp v. Burrell lawsuit provides tangible evidence of the "corruption"
      and legal costs claimed in Article 1, settled under pressure from City officials.

      - The 2024 election postponement (Article 2) validates Article 1’s demand for
      voters to use the "Golden Key" to elect new officials in future elections who
      can control appointments.


      KEY ENTITIES:

      - Jack Burrell (Council President)

      - Karin Wilson (Mayor)

      - Sherry Sullivan

      - Scott Boone / Catalyst Consulting

      - Marcus McDowell (Municipal Attorney)

      - Judge Snedeker

      - Judge Ripp / Francis Paul Ripp (Plaintiff in federal lawsuit)

