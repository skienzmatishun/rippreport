hooks:
  alabama-black-hole:
    brief: |-
      THE CONFLICT
      - Tom Albritton serves as Executive Director of the Alabama Ethics Commission since appointment in 2015.
      - Mabel Amos Trust Fund is a multi-million dollar trust established to help needy students attend state college.
      - In 2014, Albritton and other trustees (including Regions Bank) allegedly altered trust handling procedures to list schools rather than student names on scholarships.
      - Ripp alleges Albritton, as trustee and Ethics Commissioner, allowed his children to receive scholarships from the trust despite ethical duties.
      - Ripp alleges Circuit Judge Ben Bowden received $45,000 for his children’s scholarships while serving as Albritton’s former law partner.
      - Ripp alleges approximately $120,000 in scholarships were used to spare family expense for Albritton.
      - Previous complaints against Albritton and Raulston were dismissed or ignored; implicated persons included lawyers, a judge, council president, mayor.
      - Mabel Amos land discovered oil/gas in 2010, producing $80 million with potential for additional $20 million.

      THE DISCOVERY
      - Francis Paul Ripp sent a formal complaint letter to Attorney General Clark Morris, Special Prosecutions Office, on August 21, 2022.
      - Ripp previously submitted a complaint to Special Prosecutions on July 16, 2021.
      - Information and evidence package submitted to AG Morris included over 100 bound pages of documents.
      - Recipients of submission copies: AG, Alabama Bar, Governor, Judiciary, Ethics Commission.
      - As of August 21, 2022 letter date, Ripp received zero replies or responses from any agency.
      - A Writ of Mandamus was filed regarding the complaint; Ripp reports no hearing was granted.
      - Former Ethics Director Mr. McCallum had 17 ethics violations filed against him but avoided criminal charges via a "two year bump" policy.
      - Ripp alleges IRS 4941(d) "Self Dealing" violations by the trustees regarding Mabel Amos Trust funds.
      - Ripp states Ethics Commission is in conflict with AG's office regarding exculpatory evidence.

      THE PIVOT
      - Ripp’s letter provides primary-source confirmation that Albritton is under active, unresolved investigation into specific financial self-dealing.
      - Letter connects general allegations (Main Article) to a specific named mechanism: Mabel Amos Trust Fund.
      - Specific dollar figures in letter ($45k to Bowden, $120k family expense) substantiate the "Stealing From Kids" narrative of Main Article.
      - Letter dates (July 2021 to August 2022) prove agencies ignored evidence for >1 year.
      - Letter explicitly names Regions Bank, confirming they are charged with managing the trust and allegedly collecting over $1 million in fees.

      KEY ENTITIES
      - Tom Albritton (Alabama Ethics Commission Executive Director)
      - Cynthia Raulston (Albritton’s lawyer/associate partner in alleged misconduct)
      - Francis Paul Ripp (Owner, The Ripp Report; Founder Alabama Consumers Association 1974)
      - Clark Morris (Attorney General of Alabama, Special Prosecutions Office)
      - Regions Bank
      - Mabel Amos Trust Fund
      - Ben Bowden (Montgomery Circuit Judge, former law partner of Albritton)
      - Mr. McCallum (Former Alabama Bar Executive Director)
