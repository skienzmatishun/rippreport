  listening-not-reading:
    brief: 'BRIDGE BRIEF


      THE CONFLICT

      *   Diana Brewer lost her bid for Fairhope City Council reelection by Jimmy
      Conyers with a margin of 66%.

      *   Brewer ignored opposition from over 98% of attendees across six meetings
      regarding the Fly Creek Apartments.

      *   Brewer’s initiative to form an independent school system cost taxpayers
      over $100,000 but only achieved 35% public support.

      *   The City Council/Planning & Zoning Board decisions led Fairhope City to
      incur millions in lawsuits.

      *   Brewer made a disingenuous claim that the Triangle was purchased as a park
      rather than resulting from a lawsuit settlement.


      THE DISCOVERY

      *   Council President Burrell deliberately misled the public regarding a hangar
      lease at the Fairhope Airport Authority, asserting no RFP (Request for Proposal)
      was needed.

      *   The Ethics Commission maintains that any business between a public official
      and the entity they serve requires a bid process.

      *   Burrell failed to disclose or adhere to this requirement despite Hix serving
      on the Airport Authority board.

      *   A $750,000 hangar (housing a million-dollar plane/fuel farm) was defended
      as making "no real profit" by Burrell, contradicting standard economic goals.

      *   Rick Kingrea filed a "plain vanilla request" to the Attorney General regarding
      possible ethical violations and criminal activity tied to BP in Fairhope.


      THE PIVOT

      *   Article 1 establishes a pattern of elected officials (e.g., Brewer) ignoring
      the will of their constituents regarding major projects (Fly Creek, Triangle).

      *   Article 2 reveals a parallel systemic failure where Council leadership (Burrell,
      Hix) is knowingly violating legal and ethical mandates (RFP requirement, Ethics
      Commission rulings).

      *   Both articles demonstrate elected officials failing to properly execute
      governance—whether by ignoring public opinion or by deliberately skirting established
      procedural laws.


      KEY ENTITIES

      *   Jimmy Conyers (Councilman/Candidate)

      *   Diana Brewer (Former Council Member)

      *   Fairhope City Council (Collective Body)

      *   Hix (Airport Authority Board Member)

      *   Burrell (Council President)

      *   Rick Kingrea (City Councilman)

      *   Sen. Pittman (State Senator)

      *   Ethics Commission (Governing Body)

      *   Fairhope Airport Authority

      *   Fly Creek Apartments / Triangle (Property Entities)

      *   Planning & Zoning Board

      *   Hollie McKellar (Counsel/Staff mentioned in context of P&Z)'
