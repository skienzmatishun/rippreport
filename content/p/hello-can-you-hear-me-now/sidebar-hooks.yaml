      98% opposition.

      *   Brewer''s effort to form an independent school system cost the city over
      $100,000 in taxpayer dollars and received only 35% support.

      *   The Planning and Zoning (P&Z) board decisions caused millions in lawsuits.


      THE DISCOVERY

      *   Karin Wilson successfully ran for Mayor of Fairhope and won the election
      against an incumbent serving four terms.

      *   Wilson''s victory was a result of a grassroots effort that united the community.

      *   Fairhope cast over 2000 votes more than Daphne in the election, setting
      a record for a Fairhope election.


      THE PIVOT

      *   The political instability and specific local issues (P&Z, funding) detailed
      in the Main Article created the environment that allowed Karin Wilson''s grassroots
      effort to succeed and unseat the previous regime.


