      • This opposition is allegedly fueled by CATALYST, a political organization
      formed August 11, 2014, managed by Michael Scott Boone and Lynn Stacey, with
      Coley M. Boone as its registered agent (Councilman Boone''s son).

      • The article details actions such as imposing hiring freezes on the mayor and
      rejecting her choices for the Airport Authority board.


      THE PIVOT:

      • Article 2 serves as the "smoking gun" by moving beyond a single failed campaign
      (Article 1) to expose an organized, systemic political influence (CATALYST and
