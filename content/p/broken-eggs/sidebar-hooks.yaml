      *   The City Council is alleged to have obstructed the Mayor''s office, specifically
      regarding budget oversight (Main Article/Widget Article).

      *   Past major projects implicated in poor policy include: Triangle lawsuit,
      soccer fields (cost increased from $3.5M to nearly $6M), sewer plant issues
      ($10 million transfer for non-utility expenses), and the Airport debacle (Main
      Article).

      *   Ray Hix, who resigned from the Fairhope Airport Authority, accepted free
      jet service provided by another board member while Chunk Zunk was a Finance
      Committee Member (Main Article).


      **THE DISCOVERY:**

      *   The second article reveals leadership failure is not limited to City Council
      but extends to Planning and Zoning.

      *   Lee Turner holds dual roles as Head of Fairhope Planning and Zoning and
      President of the Single Tax Corporation, raising conflict of interest concerns
      regarding development approval processes (Widget Article).

      *   Turner is alleged to have promoted the Tatumville Project for the Tatumville
      Subdivision without following proper procedure, using his position and "his
      good buddy Burrell" to circumvent standards (Widget Article).


      **THE PIVOT:**

      *   Article 1 frames council obstruction around budget control and conflicts
      of interest involving Burrell''s associations (Hix/Snedeker).

      *   Article 2 provides a systemic extension of this alleged corruption, proving
      that the pattern of "bad policy" and "manipulation" spans both governing bodies:
      City Council (Burrell''s political dominance) and Planning and Zoning (Turner''s
      dual role in approving problematic projects like Tatumville Gully).

      *   It connects Burrell’s actions to specific development manipulation via Lee
      Turner, moving the narrative from simple financial mismanagement to systemic
      procedural abuse.


      **KEY ENTITIES:**

      *   Jack Burrell / Mr. Burrell: Council President/City Council Member.

      *   Lee Turner: Head of Planning and Zoning; President of Single Tax Corporation.

      *   Chunk Zunk: Finance Committee Member (Fairhope Airport Authority).

      *   Ray Hix: Former Airport Authority Board Member; Municipal Judge/Board Member.

      *   Judge Snedeker / Snedeker: Municipal Judge (associated with Ray Hix).

      *   Robert Brown: Council Member criticized for postponing votes regarding impact
      fees.

      *   Boone: City Council Member associated with past policy failures and voting
      patterns.

      *   Fairhope Planning and Zoning Commission / Board.

      *   Single Tax Corporation.

      *   Tatumville Project/Subdivision.'
