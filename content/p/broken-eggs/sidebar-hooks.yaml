  image_theme: 'The image depicts the messy, chaotic aftermath of broken eggs. The
    shattered shells and sprawling yolk symbolize destruction, instability, and a
    state of ruin. It conveys a sense of irreversible damage or a "mess" that has
    been created by neglect or failure. There is an inherent feeling of fragility—something
    once contained and protected (the egg) has been compromised, leaving behind a
    disorganized and unusable remains.

