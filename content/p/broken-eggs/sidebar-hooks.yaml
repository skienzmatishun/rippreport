  switching-hats:
    brief: 'THE CONFLICT:

      *   Jack Burrell served as City Council President for seven years (and five
      years according to Article 2).

      *   Burrell was responsible for obstructing the Mayor''s office and the Airport
      debacle.

      *   Burrell was involved in the triangle lawsuit, sewer plant issues, gift of
      wetlands to the city, soccer fields, golf course, library/city buildings renovation,
      and Airport matters.

      *   Burrell accepted free jet service provided by Ray Hix, who is partners with
      Fairhope Municipal Judge Snedeker.


      THE DISCOVERY:

      *   The City Council structure lacks proper leadership rotation.

      *   Jack Burrell manipulated other council members to carry his agenda ("carry
      his water").

      *   Lee Turner holds dual roles as Head of Planning and Zoning and Single Tax,
      which was used to circumvent procedure for the Tatumville Gully project.


      THE PIVOT:

      *   Article 2 reveals that Burrell''s leadership failure (obstructing the Mayor
      and handling the Airport) is systemic, not isolated, by demonstrating his role
      in leveraging conflicts of interest (e.g., with Hix/Snedeker) and manipulating
      zoning processes (via Turner).

      *   Burrell''s actions are proven to be a calculated obstruction mechanism that
      permeates various city departments and projects.


      KEY ENTITIES:

      *   Jack Burrell (Council President)

      *   Ray Hix

      *   Fairhope Municipal Judge Snedeker

      *   Chunk Zunk (FAA)

      *   Lee Turner (Planning and Zoning/Single Tax)

      *   Corte (gift of wetlands source)

      *   Tatumville Gully'
