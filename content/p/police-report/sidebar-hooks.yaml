      process for business with the entity they serve.

      *   Jack Burrell deliberately misled the audience about leasing hanger property
      without issuing a Request for Proposal (RFP).

      *   Burrell knew the Airport Authority was compelled to bid because Mr. Hix
      was on the board.

      *   The conflict involved Burrell''s actions regarding the hanger lease, which
      cost $750,000 and housed a million-dollar airplane with a 30-year lease.


      THE PIVOT

      *   Article 2 provides procedural evidence (the Ethics Commission ruling) and
