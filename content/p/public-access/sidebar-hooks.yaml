      access to Mobile Bay.

      *   Dorsey led barricading of Zundel Road access.

      *   Alleged motive: Major donors living on the Bay desire to vacate the property
      to deny public access.

      *   Call to action demanded removal of Dorsey, Elliott, and Catalyst commissioners
      (June 5th).


      THE DISCOVERY

      *   Catalyst fully supports Tucker Dorsey for Baldwin County commission and
      Chris Elliott for State Senate.

      *   Tucker Dorsey uses LLCs to conceal business interests.

      *   Chris Elliott is allegedly covering for Dorsey''s business interests.

      *   The political positions are dependent on donations from individuals who
      oppose public access.


      THE PIVOT

      *   Article 2 proves that the opposition to public access (Article 1) is driven
      by financial incentives and political allegiance, not solely local concerns.

      *   The use of LLCs by Dorsey and Elliott provides a financial mechanism linking
      them directly to the donors cited in Article 1''s stated motive.


