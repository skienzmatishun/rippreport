      THE DISCOVERY

      *   The Ripp Report filed an Ethics complaint against Jack Burrell regarding
      his participation in the Airport Authority and alleged "bid rigging."

      *   Four complaints have been filed with the Ethics Commission concerning Burrell.

      *   Burrell used his authority to control the City Council Agenda and prevent
      resolution of Ordinance 1572 (Fly Creek Apartments).


      THE PIVOT

      *   Article 2 provides the specific evidence (Ethics complaint) linking Jack
      Burrell’s past actions—specifically bid rigging allegations and Airport Authority
