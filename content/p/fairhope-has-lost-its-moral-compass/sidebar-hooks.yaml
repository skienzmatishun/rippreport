    text: Burrell’s crusade to cripple the Mayor’s office did not start with a policy
      dispute; it started with a dirty grudge. Evidence shows he weaponized his council
      seat to leak documents and hide the ethics complaint he earned through airport
      bid rigging.
  caught-trap-like-rat:
    brief: 'THE CONFLICT

      *   Fairhope City Council and Police Chief attacked the Mayor in a special meeting.

      *   Jack Burrell (Council President) used his positions to secure favorable
      terms for the Fairhope Airport bid.

      *   Burrell ran for office without acknowledging a police record and lied to
