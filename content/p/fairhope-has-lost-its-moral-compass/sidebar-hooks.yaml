      *   Burrell supported an attorney firm investigating him (related to Mr. Ray
      Hick’s ethics opinion).

      *   Mayor Karin Wilson released a "confidential" letter outlining her strategy
      for transparency, fiscal responsibility, and defending herself against personnel
