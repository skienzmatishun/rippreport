      2 referendum seeking a change to the Council-Manager form of government.

      *   Council members failed to seek necessary legal advice from the Attorney
      General before calling a special meeting to delay or cancel the election.

      *   The council is attempting to use claims of misinformation and transparency
      to stop citizens from voting on the proposed government change.


      THE PIVOT

