      at Bone and Barrel restaurant despite open meeting rules.

      *   Council members sought to remove Mayor Wilson and install Jack Burrell.

      *   Council members demanded investigations into: sewer contract increase ($10M
      to $13M), triangle lawsuit ($11.25M/$3M attorney fees), soccer fields ($5-6M),
      developer "gifts," and airport corruption.


      THE DISCOVERY:

      *   The City Council has been actively obstructing the Mayor (Wilson) and pursuing
      an ethics complaint against Jack.

      *   Council members approved over $500,000 for council agenda items while denying
      a $15,000 request for the Mayor''s lawyer.

      *   Councilman Brown claimed that an ethics complaint against the Mayor, accompanied
      by four other complaints, was "ruled baseless," but indicated investigations
      are underway.


      THE PIVOT:

      *   Article 2 proves the Council members'' stated goal of obstruction and political
      spin (playing to TV like mimes) is real.

      *   Article 2 details the specific actions taken by the Council (approving funds,
      denying legal representation) that demonstrate their intent to actively undermine
      the Mayor, linking their obstruction tactics to the systemic corruption demands
      mentioned in Article 1.


      KEY ENTITIES:

      *   Burrell

      *   Boone

      *   Brown

      *   Robert Brown (aka Jester)

      *   Wilson (Mayor)

      *   Jack Burrell

      *   Satterwhite & Associates (Legal Services)

      *   Fairhope City Council

      *   Fairhope Airport Authority'
