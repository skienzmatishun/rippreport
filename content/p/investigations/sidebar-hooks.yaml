hooks:
  mimes-whitewashing:
    brief: "THE CONFLICT:\n- Council Members Jack Burrell, LLC bee (Boone), and soldier\
      \ bee (Brown) are alleged to have engaged in backroom political activity after\
      \ city council meetings regarding corruption and obstruction of Mayor Karin\
      \ Wilson.\n- Allegations included a sewer contract growing from $10 million\
      \ to $13 million without addressing infrastructure.\n- The Triangle lawsuit\
      \ ($11.25 million, $3 million attorney fees) was settled by the former council\
      \ when Burrell (\"King bee\") and Boone (\"LLC bee\") served on it with no public\
      \ participation.\n\nTHE DISCOVERY:\n- The Fairhope City Council is actively\
      \ obstructing Mayor Wilson's administration, acting against her interests.\n\
      - In one meeting, the Council unanimously denied $15,000 requested by the Office\
      \ of Mayor for legal services from Satterwhite & Associates, while simultaneously\
      \ approving over $500,000 for their own agenda items.\n\nTHE PIVOT:\n- The Main\
      \ Article alleges the council wants to investigate \"city invoices\" and seeks\
      \ to get Mayor Wilson out through political maneuvering. \n- The Widget Article\
      \ demonstrates the council's active refusal to cooperate with her legal or administrative\
      \ needs, showing a concerted effort to impede her investigation into corruption\
      \ by denying funds for necessary legal counsel.\n\nKEY ENTITIES:\n- Jack Burrell\
      \ (Council President)\n- Karin Wilson (Mayor)\n- Boone (LLC bee/Council Member)\n\
      - Brown (Soldier bee/Councilman)\n- Satterwhite & Associates (Law firm retained\
      \ by Mayor Wilson)\n- Ripp Report"
    generated_at: '2026-07-18T10:30:24.825395Z'
    text: Jack Burrell and his council cronies love spending millions on secret settlements
      while keeping you in the dark. This discovery proves they are starving former
      Mayor Wilson’s office of legal funds to kill any real investigation into their
      dirty $13 million sewer deals.
    character_count: 269
  leaks-and-collusion:
    brief: 'THE CONFLICT

      *   Fairhope City Council members Jack Burrell, Boone, and Brown met improperly
      following a council session to strategize against Mayor Wilson.

      *   The political maneuvering centers on efforts to remove Mayor Wilson to install
      Jack Burrell as the new leadership ("King Bee").

      *   Allegations of prior financial impropriety include: A sewer contract increasing
      from $10 million to $13 million; The Triangle lawsuit settlement totaling $14.25
      million ($11.25M principal and $3M attorney fees), which was allegedly settled
      by the last council without public participation, involving Burrell and Boone;
      and Soccer fields costing 5 to 6 million.


      THE DISCOVERY

      *   Gulf Coast News (*The Courier*) is receiving confidential city information,
      including HR data, originating from Fairhope City employees using city computers.

      *   The leak suggests that if the same computers were used to undermine the
      mayor on city time and dime, those employees should be fired.

      *   The widget alleges this coordinated coverage by GCN/*the Courier* is influenced
      by Catalyst, Jack Burrell, lawyers, judges, and supported by county commissioners.


      THE PIVOT

      *   Article 1 accuses GCN/*the Courier* of obtaining city documents without
      a formal FOIA request. Article 2 provides confirmation that the information
      is originating from inside City Hall employees through leaked confidential HR
      and operational data on city property. This confirms an unauthorized insider
      leak mechanism, linking the press to internal corruption rather than public
      record scrutiny alone.


      KEY ENTITIES

      *   Boone (Council Member)

      *   Burrell / Jack Burrell (Council President/King Bee)

      *   Brown (Councilman / Jester 666)

      *   Mayor Wilson

      *   Triangle (Lawsuit/Property Entity)

      *   Gulf Coast News (GCN)

      *   _the Courier_

      *   Catalyst'
    generated_at: '2026-07-18T10:30:24.825402Z'
    text: Council President Jack Burrell uses city hall like a private war room to
      plot his political takeovers. We found proof that city employees are using taxpayer
      computers to leak private files to the press, acting as a secret hit squad for
      the council’s corrupt agenda.
    character_count: 265
  switching-hats:
    brief: 'THE CONFLICT

      *   Fairhope City Council members Jack Burrell, Boone, and Brown allegedly met
      at Bone and Barrel restaurant immediately following Monday night''s council
      meeting.

      *   The alleged private meeting was potentially illegal regarding open meetings
      rules (per DELIBERATION Act 2005-40).

      *   Council/Mayor leadership has been under scrutiny for "political spin" and
      obstruction against Mayor Wilson by Council members Burrell, Boone, and Brown
      ("the busy bees").

      *   Major unresolved city issues cited in past council actions include: a $10
      million to $13 million sewer contract increase; the settlement of a Triangle
      lawsuit (allegedly $11.25 million plus $3 million in attorney fees); $5 million
      to $6 million spent on soccer fields; and investigations into airport corruption
      involving millions of dollars.


      THE DISCOVERY

      *   Lee Turner, President of Fairhope Planning and Zoning and Single Tax Corporation,
      has held these dual positions for years, raising conflict of interest concerns.

      *   Turner allegedly used his position to promote the Tatumville project, successfully
      influencing Jack Burrell to circumvent normal procedures by pulling an ordinance
      from public review/planning and bypassing official approvals.

      *   This Tatumville development is projected to add 20-30% more water into a
      watershed already facing serious problems in Magnolia Beach and Loyola Villa.


      THE PIVOT

      *   Article 1 alleges Burrell, Boone, and Brown are engaged in self-serving
      "brain storms" regarding city invoices (sewer, triangle lawsuit, soccer fields).
      Article 2 reveals the mechanism for potential corruption: Jack Burrell actively
      collaborates with Lee Turner to bypass due process via Planning and Zoning/Single
      Tax powers.

      *   Article 1 identifies major problematic projects (Sewer contract increase;
      Triangle lawsuit settlement); Article 2 directly ties specific council members''
      allies (Burrell, Tatumville Project promotion by Turner) to the "sneaky tricks"
      used in recent agenda maneuvers that bypass public oversight of these city funds/projects.


      KEY ENTITIES

      *   Jack Burrell / Mr. Burrell (City Council President since at least 2017;
      allegedly involved with obstruction and council leadership).

      *   Lee Turner (President of Planning and Zoning; President of Single Tax Corporation;
      promoter for Tatumville project).

      *   Boone, Brown (Council members alleged to be "busy bees" supporting Burrell/the
      agenda).

      *   Mayor Wilson (Target of investigation regarding city invoices/administration).

      *   Fairhope City Council.

      *   Triangle / Triangle Lawsuit ($11.25 million settlement).

      *   Sewer contract increase ($10M to $13M).

      *   Soccer fields ($5–$6 million project).

      *   Tatumville Project (Development on an acre of city land; watershed concerns
      in Magnolia Beach and Loyola Villa).

      *   Corte (Developer mentioned previously in connection with a "gift" of wetlands).'
    generated_at: '2026-07-18T10:30:24.825406Z'
    text: Burrell and Boone are meeting in the shadows to cook up new ways to spend
      your hard-earned money. This evidence shows how Jack Burrell works with Lee
      Turner to skip public hearings and shove massive projects like Tatumville down
      our throats without a single vote.
    character_count: 263
  fairhope-catalyst-a-dirty-little-secret:
    brief: 'THE CONFLICT

      * 2018: Fairhope City Council members attempted to file an injunction against
      a referendum scheduled for October 2, 2018.

      * The goal of the referendum was to change Fairhope''s form of government from
      "At Large" to Council-Manager.

      * The council actions were driven by the existing "Catalyst Council," which
      was hand-picked by former Mayor Tim Kant.

      * Opposition came from groups like Fresh Start for Fairhope, led by Chuck Zunk
      and over 1,000 petition signers.


      THE DISCOVERY

      * Current City Council members (Burrell, Boone, Brown) were observed meeting
      immediately after council sessions at Bone and Barrel restaurant.

      * This meeting occurred in what is suspected to be a quorum, violating open
      meetings rules.

      * These meetings are allegedly dedicated to discussing high-stakes financial
      items, including a sewer contract increase from $10 million to $13 million and
      an 11.25 million triangle lawsuit settlement.


      THE PIVOT

      * The widget article establishes the historical pattern of the Council (Catalyst
      Council) using closed-door political maneuvering and legal tactics (the injunction
      attempt in 2018) to suppress public will and maintain their preferred "At Large"
      system.

      * This past obstruction mirrors current allegations that members (Burrell, Boone,
      Brown) are meeting behind closed doors about sensitive financial matters like
      developer gifts and large contract changes.


      KEY ENTITIES

      * Fairhope City Council / Catalyst Council

      * Tim Kant (Former Mayor)

      * Karin Wilson

      * Jack Burrell / King bee Burrell

      * Council Members: Boone, Brown, Burrell

      * Chuck Zunk (Fresh Start for Fairhope)

      * Steve Marshall (Attorney General)

      * Jay Robinson (City Attorney/Councilman)

      * GCN and _the Courier_ (Media organizations involved in leaking documents)'
    generated_at: '2026-07-18T10:30:24.825410Z'
    text: The Catalyst Council has a long history of using legal tricks to silence
      voters and maintain their grip on power. These illegal meetings at Bone and
      Barrel prove the same old players are still hiding multi-million dollar contracts
      from the people they are supposed to serve.
    character_count: 274
  fairhope-sewer-backstory:
    brief: '**THE CONFLICT:**

      *   **Historical Misuse of Funds (2012–2016):** During Mayor Can’t''s tenure,
      Councilman Boone and Councilman Burrell allegedly used the utility fund as a
      slush fund to balance the general fund. This misuse paid for lawsuits and resulted
      in Fairhope losing its best senior utility supervisor to Daphne.

      *   **Infrastructure Neglect:** The alleged use of the utility fund drained
      the resource while zero infrastructure work was done on the sewer system, even
      though the electric department faced funding shortages.

      *   **Current Political Hostility:** Current council members (Burrell, Boone,
      Brown) are accused in the Main Article of meeting secretly after council sessions
      to obstruct Mayor Wilson and demand investigations into city finances ($50 million+).


      **THE DISCOVERY:**

      *   The Widget Article provides specific documented proof that a pattern of
      misuse existed between 2012 and 2016.

      *   It reveals the direct financial mechanism (using utility funds for lawsuits)
      used by Boone and Burrell, establishing their past complicity in municipal financial
      mismanagement.


      **THE PIVOT:**

      *   Article 2 establishes a history of corruption involving Council members
      Boone and Burrell regarding utility/sewer infrastructure and legal fees ($3
      million to attorneys). This historical context serves as the foundation for
      Article 1''s accusations that these "busy bees" (Boone, Burrell, Brown) are
      acting out of self-preservation due to fear of investigations into past administrative
      conduct and financial improprieties.


      **KEY ENTITIES:**

      *   Fairhope City Council

      *   Mayor Can’t

      *   Karin Wilson

      *   Councilman Boone

      *   Councilman Burrell

      *   Councilman Brown

      *   Daphne (Municipality/Town)

      *   Casi Callaway (Director of Baykeeper)

      *   The Ripp Report

      *   Catalyst (Political group/organization)

      *   Triangle Lawsuit ($11.25 million)'
    generated_at: '2026-07-18T10:30:24.825413Z'
    text: Councilman Boone and Jack Burrell spent years treating the city utility
      fund like a personal piggy bank for expensive lawyers. They let our sewer system
      rot while they paid off their friends, and now they are fighting former Mayor
      Wilson to keep those financial secrets buried.
    character_count: 277
  good-ole-boys-alive-and-well:
    brief: 'THE CONFLICT

      * Ongoing political conflict between Mayor Wilson and Fairhope City Council
      members Burrell, Boone, and Brown ("the busy bees").

      * Accusations that Council members meet in quorum after council sessions, violating
      open meeting rules to discuss governance issues.

      * Concerns regarding the obstruction of investigations into city finances and
      the mayor''s administration.

      * Specific allegations concerning $10 million sewer contract increase (to $13M)
      without infrastructure addressing, a Triangle lawsuit ($11.25M plus fees), and
      soccer fields ($5M to $6M).


      THE DISCOVERY

      * The previous City Council under Tim Kant approved Resolution 17 for the city
      of Fairhope to accept a deed from Angelo A. Corte for the sewer lift station.

      * Burrell presided over this resolution (Resolution 2606-16) but claimed ignorance
      regarding its full details or prior recording.

      * The "gift" was not merely the land under the small lift station, but three
      plus acres of wetlands located at the storm water runoff site from Publix, which
      includes an outfall pipe from the retention pond (as recorded in Exhibit A).


      THE PIVOT

      * Article 1 broadly accuses council members Boone and Brown of favoring a developer
      through a "gift" that requires investigation.

      * Article 2 provides the concrete historical evidence for this suspicion by
      detailing the precise transaction: Angelo A. Corte giving three acres of wetlands
      (a significant parcel) to the city under Resolution 17, while Burrell failed
      to account for its true nature or previous recording date.


      KEY ENTITIES

      * Fairhope City Council

      * Mayor Wilson / Tim Kant

      * Jack Burrell

      * Boone

      * Brown

      * Angelo A. Corte (Developer/Property Donor)

      * Marion Wynne (City Attorney)

      * Triangle (Land entity involved in lawsuit)

      * Publix (Source of storm water runoff site)'
    generated_at: '2026-07-18T10:30:24.825417Z'
    text: The busy bees on the council claim they want to protect the city while they
      huddle in secret to help their developer friends. Look at this suspicious gift
      of wetlands from Angelo Corte that Jack Burrell signed off on and then conveniently
      forgot when the public started asking questions.
    character_count: 287
  in-the-dark:
    brief: 'THE CONFLICT

      *   Allegation exists that Fairhope City Council members Burrell, Boone, and
      Brown met secretly after council sessions (violating open meetings rules) to
      discuss city business.

      *   Specific financial issues cited for investigation by these "busy bees" include:
      a sewer contract increase from $10 million to $13 million; the *Triangle* lawsuit
      ($11.25 million settlement plus $3 million in attorney fees); and soccer field
      funding ($5–6 million).


      THE DISCOVERY

      *   In 2018, Fairhope City Council authorized Mayor Karin Wilson to execute
      an Engagement Letter with Tobias McCormick and Comer Lawyers, LLC for professional
      legal services.

      *   This represented the city’s involvement in *Charles K/ Breland, Jr. V. The
      City of Fairhope, Alabama*, CV-2013-901096.

      *   The council proceeded with this litigation despite having to pay $3 million
      in attorney fees for settling a different multi-million dollar lawsuit (*Triangle*)
      and the city being dropped by its insurance carrier.


      THE PIVOT

      *   While Article 1 alleges Burrell, Boone, and Brown are meeting secretly to
      investigate specific financial irregularities (like invoices), Article 2 proves
      that at least one major legal issue (Breland case) was actively managed through
      external counsel authorization in a council-approved motion (Item 23 on the
      agenda).

      *   The existence of these official, documented motions concerning high-stakes
      lawsuits contradicts claims that the members are solely "brainstorming" or avoiding
      action; it proves specific financial liabilities and legal strategies were being
      advanced behind closed doors.


      KEY ENTITIES

      *   Boone (Council Member)

      *   Burrell (Council Member/Council President)

      *   Brown (Councilman)

      *   Karin Wilson (Mayor / Former Mayor)

      *   Snedecker (Fairhope Municipal Judge)

      *   Charles K/ Breland, Jr. (Plaintiff)

      *   Tobias McCormick and Comer Lawyers, LLC (Legal Counsel)

      *   Triangle (Lawsuit entity)'
    generated_at: '2026-07-18T10:30:24.825421Z'
    text: Burrell and his crew swear their private huddles are just harmless chats
      about city invoices. In reality, they are pushing high-stakes lawsuits through
      the back door while the city loses its insurance and taxpayers get stuck with
      the massive $3 million legal bill.
    character_count: 264
  honey-bees:
    brief: 'THE CONFLICT

      *   Council members Burrell, Boone, and Brown were accused of meeting in violation
      of open meetings rules.

      *   Allegations exist regarding the growth of a sewer contract from $10 million
      to $13 million without infrastructure improvements.

      *   The Triangle lawsuit involved $11.25 million total cost plus $3 million
