      and "LLC bee" (Boone) were members.

      *   Allegations concern a developer''s "gift" given to developers with whom
      LLC bee and soldier bee have business dealings, which the Council continues
      to favor.

      *   The Mayor was targeted by the council group as part of an effort to force
      her resignation and replace her with Burrell ("King bee").


      THE DISCOVERY

      *   Council members (Burrell, Boone, Brown) actively pushed through a $2.6 million
      property purchase on Hwy 13 in September without public participation or budget
