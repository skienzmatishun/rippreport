  secret-society:
    brief: 'THE CONFLICT

      *   Council members Burrell and Boone were present on the council during a period
      when the Triangle Lawsuit was settled for $11.25 million plus $3 million in
      attorney fees (Main Article).

      *   These same council members are accused of favoring developers with whom
      they have business dealings, specifically related to projects like soccer fields
      and airport corruption (Main Article).

      *   The "last administration" faced scrutiny over the sewer contract increasing
      from 10 million to 13 million dollars without corresponding infrastructure upgrades
      (Main Article).


      THE DISCOVERY

      *   Baldwin County operates under a political cabal known as CATALYST, which
      rebranded as Scott Boone Consulting SBC in 2020 (Widget Article).

      *   SBC successfully established and controls Fairhope''s leadership by appointing
      loyalists: a municipal judge (Fairhope’s biggest developer) and an SBC-loyalist
      city attorney (Widget Article).

      *   The cabal manipulated city appointments by firing the certified engineer
      Utilities Director and installing a Mayor lacking engineering experience, ensuring
      control over infrastructure deals (Widget Article).


      THE PIVOT

      *   Article 1 details the alleged instances of corruption (the $3M lawsuit fees,
      sewer increases, developer gifts), while Article 2 provides the organizational
      structure and motive behind those specific actions.

      *   Article 2 establishes that council members like Boone and Burrell are not
      acting in isolation but are part of a coordinated political entity—Scott Boone
      Consulting/SBC—which uses legal firms (Hand Anderall Sale) and mayoral appointments
      to push policies favorable to its developer contributors.


      KEY ENTITIES

      *   Fairhope City Council / Fairhope City Hall

      *   Jack Burrell / Jack Burrell (Council President, Mayor 2025-11-14)

      *   Kevin Boone / Scott Boone Consulting (SBC)

      *   Robert Brown

      *   Triangle Lawsuit ($3M legal fees)

      *   CATALYST / Scott Boone Consulting

      *   Hand Anderall Sale (Law firm associated with Triangle lawsuit)

      *   Utilities Director (Former certified engineer)

      *   Mayor Cant'
    generated_at: '2026-07-18T10:30:24.825432Z'
    text: Councilman Boone and Jack Burrell aren't just making mistakes; they are
