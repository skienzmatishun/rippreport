      *   Brown (Soldier bee/Jester)

      *   Mayor of Fairhope

      *   Fairhope City Council

      *   Triangle Property ($102 acres, $20M value)

      *   Hwy 13 Recreation Land (2.6 million purchase)'
    generated_at: '2026-07-18T10:30:24.825425Z'
    text: Jack Burrell and his council lackeys are so desperate for honey they are
      cutting property deals without a single public hearing. A federal judge already
