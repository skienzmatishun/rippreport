      table, resulting in $60,000 lost for better coverage.

      *   Councilman Boone defended leaking subpoenaed information as transparency,
      allegedly aiding lawsuits against the city to attack the Mayor.

      *   Council President Jack Burrell called a special meeting regarding Fairhope
      Airport Authority business.


      THE DISCOVERY

      *   The City Council actively obstructed Mayor Wilson''s efforts.

      *   Councilmen Boone and Burrell ignored sewer infrastructure issues for four
      years while spending $10 million on upgrading the plant, resulting in over $13
      million spent by completion.

      *   The council allegedly failed to communicate with the Mayor regarding a new
      police Sergeant hire, causing friction with the Police Chief.


      THE PIVOT

      *   Article 2 provides concrete financial evidence ($17.8 million Restore Act
      funds and sewer spending discrepancy) that substantiates the general claims
      of obstruction and opposition detailed in Article 1.

      *   The misuse or mismanagement of $10 million for sewer infrastructure directly
      contradicts the narrative of transparent action and highlights specific areas
      where the council actively harmed the city''s finances under Mayor Wilson''s
      tenure.


