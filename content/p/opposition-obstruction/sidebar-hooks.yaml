      *   Resolution authorized the conservation easement purchase for Dyas/Triangle
      property (109 acres), valued at $18 million plus, costing the city $39,025.00
      in closing fees/due diligence (Strike Two).

      *   The Council allegedly acted as a dictatorship, consistently choosing opposing
      actions to citizens and city staff recommendations.


      **THE PIVOT:**

      *   Article 1 shows the Mayor’s advice being obstructed over insurance bids
      costing $60k.

      *   Article 2 demonstrates this obstruction scales up to high-stakes political
      maneuvering involving major land holdings ($18M+ property), where Council President
