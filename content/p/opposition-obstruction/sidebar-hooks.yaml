      the Mayor.


      THE DISCOVERY

      *   City Council resolutions authorized the purchase of properties owned by
      the Baldwin County Board of Education (K-1 Center, Fairhopers Community Park,
      James P. Nix Center).

      *   A resolution authorized Mayor Karin Wilson or Jack Burrell to execute documents
      for the property purchases.

      *   A resolution authorized Mayor Wilson to execute an MOU and contract for
      dredging Main Channel of Fly Creek ($half a million dollar contract split with
      the Fairhope Yacht Club).

      *   The Council rejected discussing alternatives (like a tax referendum) proposed
      by the Mayor regarding school funding, opting instead for a self-imposed tax
      election.


      THE PIVOT

      *   Article 2 reveals that the council''s opposition to the Mayor is not merely
      procedural obstruction but involves specific resolutions authorizing direct
      actions (property acquisition, contract execution) by the Mayor or Council President.

      *   The Widget Article proves *how* the Council implemented the obstruction
      mentioned in the Main Article through official, documented votes and agenda
