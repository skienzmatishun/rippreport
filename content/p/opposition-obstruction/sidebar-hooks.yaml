      THE PIVOT:

      - The Widget Article provides concrete historical evidence of the restrictive
      behavior (control over public discourse/silencing critics, undermining morale
      against Mayor Wilson) that explains why Council President Burrell is able to
      execute the "stiff resistance" and obstruction detailed in the Main Article
