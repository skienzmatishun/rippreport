      the Mayor''s recommendations, as evidenced by actions taken on September 11th
      during a City Council meeting.

      *   During the Sept 11 meeting, the council rejected the Mayor’s insurance bid
      proposal, instead accepting another bidder; this process led to taxpayers losing
      $60,000 and reduced coverage.

      *   Councilman Boone has defended city document leaks as "transparency," despite
      two lawyers warning against leaking subpoenaed information related to three
      pending claims against the city.

      *   The council also held a special meeting on Fairhope Airport Authority business
      just days after the regular meeting in an example of obstruction/lack of transparency.


      **THE DISCOVERY:**

      *   Mayor’s office has repeatedly reported a lack of communication with the
      City Attorney''s office over 18 months, exemplified by the January 28th meeting
      where City Attorney Marcus McDowell and Council President Jack Burrell acted
      unilaterally on Golf Course equipment without advising the Mayor.

      *   Marcus McDowell (City Attorney) is alleged to be insubordinate to the Mayor
      but supported by Jack Burrell (Council President).

      *   McDowell’s selection was allegedly part of a plan, initiated in 2020 under
      Catalyst influence, to facilitate a political shift away from the "Mayor Can''t
      era."

      *   There is a suspicious connection and potential conflict of interest between
      City Attorney Marcus McDowell and Ronan McSharry, as McSharry operates McSharry’s
      Irish Pub/restaurant (which features a Jack Burrell sandwich) and has faced
      multiple legal issues while McDowell acted as public prosecutor for victims
      of his assaults.

      *   McDowell made an "ass of himself" regarding a Federal lawsuit settlement
      after not being able to settle a school yard brawl, which the insurance company
      ultimately took over.


      **THE PIVOT:**

      *   The Widget Article reveals that the obstruction detailed in the Main Article
      (political opposition against the Mayor) is structurally supported by internal
      corruption and insubordination within City leadership (McDowell/Burrell).

      *   The alleged conflict of interest involving McDowell’s role as prosecutor
      for Ronan McSharry, who owns a business referencing Jack Burrell, provides a
      specific example of undue influence that undercuts the claim of public service
      or proper governance cited by Council President Burrell.

      *   The discovery of the "Catalyst" planning behind appointing an insubordinate
      City Attorney (McDowell) proves the Main Article’s assertion that the council
      is acting as a coordinated political unit against the Mayor, regardless of merit.


      **KEY ENTITIES:**

      *   Jack Burrell (Council President / Councilman)

      *   Marcus McDowell (City Attorney / Municipal Attorney)

      *   Ronan McSharry (Restaurant Owner / Alleged assailant)

      *   Boone (Councilman)

      *   Catalyst (Political organization/group)

