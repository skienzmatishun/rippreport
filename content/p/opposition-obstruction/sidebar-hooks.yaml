hooks:
  broken-eggs:
    brief: 'THE CONFLICT:

      *   Fairhope City Council opposes Mayor''s recommendations.

      *   On Sept 11, the council rejected a second bid for city insurance, resulting
      in a $60,000 cost increase but better coverage.

      *   Councilman Boone defends information leaks as transparency despite the council
      subpoenaing and leaking documents regarding pending claims against the city.


      THE DISCOVERY:

      *   The City Council is highly dysfunctional and obstructing the Mayor''s office.

      *   Council President Jack Burrell has obstructed budget discussions, moving
      them to an "APPOINTED" finance committee.

      *   Mr. Chunk Zunk (Fairhope Airport Authority - FAA) is on the newly appointed
      finance committee.

      *   Zunk defended Burrell’s free airplane flights and conflicts of interest
      involving Burrell''s role as liaison to the FAA.

      *   Burrell and Councilman Boone remained silent when $10 million was transferred
      from utilities to the general budget in 2015 and 2016.


      THE PIVOT:

      *   Article 2 reveals that the obstruction seen in Article 1 is tied directly
      to specific conflicts of interest involving the Fairhope Airport Authority (FAA)
      and financial transfers, implicating Burrell''s role and associates like Zunk
      and Hix.


      KEY ENTITIES:

      *   Jack Burrell (Council President)

      *   Mayor

      *   Councilman Boone

      *   Chunk Zunk

      *   Fairhope Airport Authority (FAA)

      *   Ray Hix

      *   Fairhope Municipal Judge Snedeker

      *   $60,000 (Insurance cost)

      *   $10 million (Budget transfer 2015/2016)'
