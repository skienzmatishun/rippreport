  whose-agenda:
    brief: '**THE CONFLICT:**

      *   Fairhope City Council held a meeting on September 11th.

      *   The council actively opposed recommendations from The Mayor regarding city
      insurance bids.

      *   A second bid arrived 23 hours after the deadline; the council refused to
      open it and rejected the Mayor''s preferred bid.

      *   This decision resulted in a loss of $60,000 for taxpayers and reduced coverage.

      *   Council President Jack Burrell insisted the insurance rejection was unrelated
      to The Mayor but maintained opposition.

      *   City Councilman Boone promoted city document leaks, labeling them "transparency,"
      despite two lawyers warning against leaking the information needed for 3 pending
      claims against the city.


      **THE DISCOVERY:**

      *   On March 8th, Fairhope City Council approved several resolutions demonstrating
      a specific agenda not centered on mayoral recommendations or public service
      oversight.

      *   Resolution 10 authorized Mayor Karin Wilson or Council President Jack Burrell
      to purchase properties from the Baldwin County Board of Education (K-1 Center).
      This is noted as the second attempt at acquiring the K-1 center following a
      prior failure.

      *   Resolution 12 approved a Request for a Special 3 Mill Ad Valorem School
      District Tax Election, despite Council President Jack Burrell stating he "wants
      out of the school business."

      *   Resolution 27 authorized Change Order No. 2 to MW Rogers Construction Co.,
      LLC for Library Envelope Repairs 2019, extending the contract from 210 to 222
      calendar days for miscellaneous repairs.

      *   Resolution 30 authorized an Executive Session regarding real property value
      discussions, limiting public transparency.


      **THE PIVOT:**

      *   The Main Article documents general procedural obstruction and political
      maneuvering (e.g., ignoring mayoral recommendations on insurance bids, controlled
      access to public participation).

      *   The Widget Article provides concrete evidence of the *nature* of that obstruction:
      using council authority to push specific financial agendas—including a $3 million
      tax referendum, large contracts like the half-million dollar Fly Creek dredging
      project (M&N of Alabama, LLC), and property acquisitions from Baldwin County
      Education—while simultaneously shielding these actions via Executive Sessions
      (Resolution 30) or by ignoring developer/city accountability.


      **KEY ENTITIES:**

      *   Fairhope City Council

      *   Jack Burrell (Council President, 2025-08-05 / 2019-02-15)

      *   Mayor Karin Wilson (Former Mayor, current resolutions on agenda)

      *   City Councilman Boone

      *   Baldwin County Board of Education

      *   K-1 Center

      *   M&N of Alabama, LLC

      *   MW Rogers Construction Co., LLC

      *   Jennifer Fidler (cited in relation to library construction issues)

      *   Fairhope Yacht Club'
