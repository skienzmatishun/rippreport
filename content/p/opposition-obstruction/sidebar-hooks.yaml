      refinancing process due to his actions (Mayor’s timeline/Widget Article).


      THE DISCOVERY:

      - The second article reveals a sustained pattern of obstruction and lack of
      transparency by Burrell and associated figures dating back several years, specifically
      regarding the $8.845M land purchase at Fairhope Airport and subsequent loan
      refinancings (2016-2017).

      - Mayor Wilson’s efforts to pursue financial clarity were repeatedly undermined,
      including being excluded from key discussions (Feb 9, 2017) and facing accusations
