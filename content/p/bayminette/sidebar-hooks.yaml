  go-to-hell-ethics:
    brief: 'THE CONFLICT:

      - Mayor Bob Wills (Robert A. Wills, Sr.) is facing pending ethics complaints
      and an Alabama Bar complaint for self-dealing using his office for personal
      gain.

      - The Baldwin County Legislative Delegation entered a 5-year lease with Mayor
      Wills for the first floor, parking lot, and grounds of his building at 125 D’Olive
      Street in Bay Minette.

      - Lease terms approved via Baldwin County Commission vote on Nov 16; Lagniappe
      reported the agreement to be $49,080/year ($245,400 total) vs. Gulf Coast Media
      reporting a vote on Nov 16 to have delegation pay full cost ($49,080/year).

      - Lease term set from Jan 1, 2023, to Dec 31, 2027.

      - Budget Committee Chair Billie Jo Underwood noted lack of discussion regarding
      the five-year commitment and cost conditions prior to voting.


      THE DISCOVERY:

      - A revised lease agreement approved Tuesday by the Baldwin County Commission
      reduced monthly rent from $4,090 to $1,750.

      - Brad Hicks (Baldwin Commission Attorney) publicly stated he sees no ethics
      violation with the Mayor renting his building to the Delegation while simultaneously
      refusing to contact the Ethics Commission, Attorney General, or Speaker of the
      House for an official legal opinion.

      - The revised deal maintains access to two offices, conference rooms, and parking
      lot on D’Olive Street through December 2027.

      - Cliff McCollum (Delegation Director of Constituent Services) justified the
      lease by citing inadequate space at their current Oak Street location for five
      new legislators.

      - Reporters from The Ripp Report state complaints with the Ethics Commission
      were already filed before this rent adjustment.


      THE PIVOT:

      - Article 2 is the smoking gun because it shows the deal proceeded without official
      oversight despite pending complaints; Brad Hicks'' declaration that his opinion
      overrides legal channels confirms the bypass.

      - The reduction in rent from $4,090/month to $1,750/month occurred specifically
      after ethics complaints and scrutiny were filed (proving awareness of pressure).

      - The lack of a formal Ethics Commission or AG opinion, highlighted by Hicks,
      validates the central conflict: public funds are being used to lease from a
      politician facing ethics complaints regarding exactly that conduct.


      KEY ENTITIES:

      - Mayor Bob Wills / Robert A. Wills, Sr. (125 D’Olive Street Owner)

      - Brad Hicks (Baldwin Commission Attorney)

      - Billie Jo Underwood (Commissioner / Budget Committee Chair)

      - Jeb Ball (Commissioner)

      - Cliff McCollum (Delegation Director of Constituent Services)

      - Baldwin County Commission

      - The Ripp Report / Lagniappe Mobile'
