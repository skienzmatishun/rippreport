  opposition-obstruction:
    brief: 'THE CONFLICT:

      *   Mayor Karin Wilson faced obstruction from the elected City Council.

      *   Councilmen Boone and Burrell ignored sewer infrastructure issues for four
      years regarding the Restore Act funds.

      *   The Council voted to spend $10 million on upgrading the sewer plant while
      neglecting actual infrastructure spending.

      *   The Council opposed Mayor Wilson''s efforts regarding a new police Sargent
      hire, claiming they were not contacted by her office.


      THE DISCOVERY:

      *   Council President Jack Burrell actively sabotaged Mayor Wilson’s insurance
      bid process by refusing to allow resubmission of bids, costing taxpayers $60,000
      and resulting in poor coverage.

      *   The Council is using public participation and document leaks (subpoenaed
      information) as a tactic to silence critics of the Mayor.


      THE PIVOT:

      *   Article 2 proves that the council''s obstruction is not merely political
      disagreement but involves specific, documented actions (refusing bid resubmission)
      designed to harm the Mayor financially and demonstrate resistance.


      KEY ENTITIES:

      *   Mayor Karin Wilson

      *   Fairhope City Council

      *   Council President Jack Burrell

      *   Councilman Boone

      *   Restore Act funds ($17.8 million)

      *   Sewer infrastructure

      *   Police Sargent hire'
