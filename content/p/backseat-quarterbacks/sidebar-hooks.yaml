      accused of using their elected office for personal gain and betraying Fairhope.

      *   Mayor Wilson successfully reversed a $6 million annual debt, increased city/utility
      cash funds by 59.18%, and paid down long-term debt by 33%.

      *   Mayor Wilson eliminated wasteful contractors and stopped corruption within
      city hall.

      *   The CATALYST group and the three B''s (Burrell Boone, Burrell Brown, and
      Brown) are linked to corrupt contractors seeking control, potentially involving
      former Mayor/State Senator stealing $639,000 of BP grant money.


      THE PIVOT

      *   Article 2 provides evidence that the Council members identified in Article
      1 are part of a corrupt structure (CATALYST/the three B''s) that actively worked
      against Wilson and used city funds improperly, proving their alleged actions
      as systemic corruption rather than isolated mistakes.


