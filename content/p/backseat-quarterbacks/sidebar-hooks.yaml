      political vendetta against the Mayor''s office.


      KEY ENTITIES

      *   Mayor Wilson (Karin)

      *   Kevin Boone (Council Member/Councilman)

      *   Jack Burrell (Former Council President/Current City Council Member)

      *   Fairhope City Council

      *   Police Chief

