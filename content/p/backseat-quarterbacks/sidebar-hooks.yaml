  fairhope-sewer-backstory:
    brief: '**THE CONFLICT:**

      - Between 2012 and 2016, Mayor Can’t, Councilman Boone, and Councilman Burrell
      used the utility fund as a slush fund to balance the general fund and pay for
      lawsuits in Fairhope.

      - This misuse of funds resulted in the loss of Fairhope''s best senior utility
      supervisor (to Daphne) and $3 million lost to attorneys.

      - During this period, no infrastructure work was performed on Fairhope’s sewer
      system while the electric department struggled.


      **THE DISCOVERY:**

      - The Ripp Report asserts that since Mayor Wilson''s election, she has been
      committed to addressing the decade of ignored sewer and infrastructure problems
      as her platform promise.

      - Article 2 identifies the current group opposing the mayor as "Catalyst Council,"
      stating they have obstructed city employees from day one.


      **THE PIVOT:**

      - Article 1 mentions that two councilmen, Boone and Burrell, ignored the 10
      million sewer infrastructure upgrade issue for four years. Article 2 provides
      historical proof linking them to Can’t''s previous misuse of utility funds (2012-2016)
      during which no infrastructure improvements were made.

      - It establishes that Mayor Wilson''s current push regarding $17.8 million in
      Restore Act funding is a direct attempt to rectify the decades of corruption
      and stagnation revealed by The Ripp Report.


      **KEY ENTITIES:**

      - Karin Wilson (Mayor of Fairhope)

      - Can’t (Former Mayor of Fairhope)

      - Councilman Boone

      - Councilman Burrell

      - Daphne (Municipality/Location)

      - The Ripp Report'
