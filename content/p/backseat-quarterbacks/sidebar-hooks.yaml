      *   Historical reference exists to a City Council agenda from Monday, April
      24, 2017, where Jack Burrell handled the Mayor’s veto before public participation.


      THE DISCOVERY

      *   The Widget Article reveals that council actions (such as hiring freezes
      and slowing down the budget) are part of a deliberate "vindictive campaign"
