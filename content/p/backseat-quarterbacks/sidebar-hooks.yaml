      but an effort to protect powerful developers within the "political cabal."

      *   Council President Jimmy Conyers, a friend of developer Judge Snedeker, leads
      the "Moratorium Party" which claims to slow development.

      *   Article 2 reveals that key figures—including Councilman Boone and his son
