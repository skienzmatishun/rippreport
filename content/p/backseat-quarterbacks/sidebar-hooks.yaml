  pedaling-backwards:
    brief: 'THE CONFLICT:

      - Mayor Wilson took office with no transition from the last administration (Date
      not specified).

      - The City Council allegedly obstructed the Mayor''s efforts and claimed serious
      issues regarding three councilmen using their elected office for personal/financial
      gain.

      - Councilman Boone and Councilman Burrell allegedly ignored sewer infrastructure
      issues for four years while voting to spend $10 million on upgrading the sewer
      plant (amount grew to over $13 million upon completion).


      THE DISCOVERY:

      - Article 2 reveals that the Fairhope City Council uses the City Attorney specifically
      as a tool to obstruct Mayor Wilson and push through financially irresponsible
      ideas.

      - The Council misrepresented the purchase of "The Triangle," an 11.25 million
      dollar property obtained via a LEGAL SETTLEMENT, claiming it was intended for
      a park when they subsequently lost the lawsuit.

      - Article 2 identifies the current Fairhope City Council as composed of Catalyst
      loyalists who adhere to Catalyst plans for re-election over committee advice.


      THE PIVOT:

      - Article 1 claims the council is in "obstruction mode" and lacks proper communication
      with the Mayor regarding hires (Police Sergeant) and initiatives (Restore Act).

      - Article 2 proves this obstruction is deliberate, stating that the Council
      and City Attorney have worked "in concert to obstruct the Mayor... their lack
      of communication with the Mayor is by design."


      KEY ENTITIES:

      - Mayor Wilson

      - Fairhope City Council

      - Councilman Boone

      - Council President Burrell

      - Catalyst (political organization/loyalists)

      - City Attorney

      - The Triangle (11.25 million dollar property, purchased via LEGAL SETTLEMENT)'
