  the-eagle-has-landed-and-the-court-of-public-opinion-has-voted:
    brief: 'THE CONFLICT:

      - Mayor Karin Wilson took office with no transition from the previous administration.

      - The City Council entered an "obstruction mode" opposing the Mayor''s efforts
      upon her election.

      - Serious allegations exist regarding three councilmen using their elected office
      for financial or personal gain.

      - Fairhope Councilman Boone and Councilman Burrell allegedly ignored sewer infrastructure
      issues for four years, while approving a $10 million upgrade that grew to over
      $13 million.

      - The Mayor faced opposition regarding the hiring of a new Police Sergeant,
      which led to claims from the City Council and Police Chief that they were not
      contacted.


      THE DISCOVERY:

      - Article 2 details a successful grassroots campaign culminating in Karin Wilson
      defeating "the status quo and incumbent of four terms."

      - Fairhope election recorded over 2000 votes, surpassing the turnout in Daphne.

      - The Ripp Report and Baldwin County Legal Eagle position themselves as committed
      allies to exposing "political and judicial corruption" in the city.


      THE PIVOT:

      - Article 1 details the specific political obstacles (Council obstruction, alleged
      council corruption) Mayor Wilson faces currently.

      - Article 2 establishes her legitimacy via a decisive community mandate (record
      voter turnout/grassroots effort), framing her current battles as a necessary
      fight against "the remnants of the last regime."


      KEY ENTITIES:

      - Karin Wilson (Mayor)

      - City Council (Fairhope City Council)

      - Boone (Councilman)

      - Burrell (Council President / Council Member)

      - The Ripp Report

      - Baldwin County Legal Eagle

      - Alabama Sec. of State Elections Division

      - Daphne'
