  new-year-new-problems:
    brief: '**THE CONFLICT:**

      *   In August 2016, Karin Wilson won an upset election against former Mayor
      Tim Kant in Fairhope/Baldwin County.

      *   This victory was framed as ending a "dubious system" of vote control previously
      held by the mayoral father-in-law (Goober faction).

      *   The event was presented as signaling a move toward transparency and accountability
      for all elected officials.


      **THE DISCOVERY:**

      *   In early 2018, the Fairhope City Council demonstrated obstruction against
      the newly elected Mayor''s administration.

      *   The council voted on zoning changes (Greeno Road) and the Entertainment
      District decriminalization bill.

      *   The entertainment district vote failed by a tie (2/2), with Conyers and
      Burrell voting for decriminalization, and Boone and Robinson voting against
      it.

      *   The city adopted a motion that prohibits previously failed items from being
      brought back to the council for 60 days.


      **THE PIVOT:**

      *   Article 1 establishes Mayor Wilson’s administration on the promise of transparency
      following her August election upset over Tim Kant.

      *   Article 2 reveals this claimed transparency is undermined by legislative
      resistance, specifically when City Councilmen Boone and Robinson actively blocked
      a key decriminalization measure (the Entertainment District vote) during their
      initial year in office.


      **KEY ENTITIES:**

      *   Karin Wilson (Mayor, Elected Winner)

      *   Tim Kant (#1 Goober/Former Mayor, Defeated Candidate)

      *   Fairhope City Council

      *   Conyers (Councilman, Voted FOR Entertainment District)

      *   Burrell (Councilman, Voted FOR Entertainment District)

      *   Boone (Councilman, Voted AGAINST Entertainment District)

      *   Robinson (Councilman, Voted AGAINST Entertainment District)

      *   The Ripp Report (BCLE/Investigative Source)'
