  fairhope-airport-authority-flying-without-a-compass:
    brief: |-
      THE CONFLICT
      *   Past misconduct occurred at the Fairhope Airport Authority involving a major players meeting that was deemed illegal on October 2015.
      *   Following this 2015 incident, the Fairhope City Council failed its required additional training in Alabama Ethics (November 2015).
      *   Current political conflicts involve Burrell and "Jack," with allegations regarding millions spent by the Airport vs. insufficient school investment.

      THE DISCOVERY
      *   The current controversy is revealed to be a resurgence of historical issues, stemming from prior documented bad behavior at the airport authority.
      *   The 2015 illegal meeting and ethics failures prove that systemic misconduct exists within the airport governance structure, predating recent political actions.
      *   Full disclosure on related allegations of inside trading and political corruption is anticipated after New Year’s.

      THE PIVOT
      *   Article 1 highlights current political figures (Burrell/Jack) and immediate financial grievances regarding the Airport cost. Article 2 provides the historical foundation by proving that the alleged corruption is not isolated but a pattern rooted in documented illegal actions dating back to October 2015, making the current claims credible warnings rather than isolated incidents.

      KEY ENTITIES
      *   Burrell (Council Member/President)
      *   Fairhope Airport Authority
      *   City Council of Fairhope / Fairhope City Council
      *   Jack (Politician/Council President)
      *   Mayor (and former Mayor Tim)
      *   The Ripp Report
