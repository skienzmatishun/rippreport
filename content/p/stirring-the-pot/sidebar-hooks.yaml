  fairhope-airport-un_authorized:
    brief: |-
      THE CONFLICT:
      - On August 7, 2015, three board members of the Fairhope Airport Board resigned after Joe McEnerey was unanimously appointed Chairman and Pam Caudill as Vice Chair.
      - Ray Hix became Secretary/Treasurer on that same date (post-August 7, 2015) and subsequently gained access to confidential information regarding airport leases, bids, and financial data.
      - On December 23, 2015, the Airport Authority signed a memorandum of lease with Mid-Bay Air LLC prior to obtaining an ethics opinion or filing necessary disclosures.
      - An ad hoc committee, chaired by City Council President and Airport Authority Board Member Jack Burrell, reviewed bids for this deal.
      - The Alabama Ethics Commission issued no advisory ethics opinions regarding leases for the period between 2015 and 2016 that addressed the conflict of interest where an airport board member (Hix) would lease a business with the same authority.

      THE DISCOVERY:
      - A lawyer paid to draft a letter seeking an advisory ethics opinion confirmed that an Airport Authority member may not use confidential information gained from their position on the Board to benefit their company or bid.
      - The Alabama Ethics Commission’s review of Mid-Bay Air Lease proceedings, initiated in November 2016, concluded "No lease has ever been submitted to us regarding this issue" by December 2, 2016.
      - Article 2 concludes the mid-bay air lease is null and void because the Airport Board failed to prevent a conflict of interest involving Ray Hix's position on the Board while securing the lease for his company (Mid Bay Air LLC).

      THE PIVOT:
      - Article 1 broadly alleges Jack Burrell has "no answers" regarding airport costs costing millions versus school investment, suggesting a political cover-up or scandal.
      - Article 2 identifies the specific conflict of interest—the leasing of Mid-Bay Air LLC by Ray Hix while Burrell chaired the committee approving the deal and Hix possessed confidential Board information—providing documented proof for why Burrell is facing scrutiny in Article 1.

      KEY ENTITIES:
      - Jack Burrell (City Council President, Airport Authority Board Member)
      - Ray Hix (Former Airport Authority Board Member/Secretary/Treasurer, Organizer of Gayfer Village Partners, Llc)
      - Joe McEnerey (Chairman of Fairhope Airport Authority)
      - Pam Caudill (Vice Chair of Fairhope Airport Authority)
      - Mid Bay Air LLC (Lease recipient entity)
      - Alabama Ethics Commission
