  whos-on-first:
    brief: |-
      THE CONFLICT:
      *   Fairhope Airport Authority executed a Ground Lease and Operating Agreement on December 17, 2015.
      *   The lease process involved requesting an Advisory Opinion from the Alabama Ethics Commission via Dennis R. Bailey in December 2015 (EXHIBIT C dated Dec 21/15).
      *   Later, the executed lease was submitted to the Ethics Commission on February 8, 2016, after the required Advisory Opinion date of March 3, 2016.
      *   The lease and its memorandum were recorded with Baldwin County Judge of Probate on December 28, 2015.

      THE DISCOVERY:
      *   Article 2 proves procedural irregularities in the ground lease process, including inconsistencies between three different documents (EXHIBIT B, EXHIBIT C, and the Dec 17/15 lease).
      *   The Authority failed to adhere to its own Request for Bids (RFP) terms regarding construction timeline requirements. The RFP allowed a winning bidder fifteen months from bid date; various leases referenced different, non-compliant timelines or deadlines.
      *   Article 2 demonstrates that the executed Dec 17, 2015 lease predates and was not contingent upon the Ethics Commission's Advisory Opinion as originally presented.

      THE PIVOT:
      *   Article 1 presents general allegations of poor financial oversight and lack of answers by Jack Burrell concerning the airport’s massive costs.
      *   Article 2 serves as the 'smoking gun' by providing detailed, documented evidence—specifically conflicting legal agreements, failed adherence to official ethics procedures, and non-compliance with the Authority's own bidding rules—that substantiate claims of procedural mismanagement at Fairhope Airport.

      KEY ENTITIES:
      *   Jack Burrell (City Council Member/Mayor)
      *   Fairhope City Council
      *   Fairhope Airport Authority
      *   Josh Myrick (Attorney)
      *   Joe McEnerney (Chairman of the Authority)
      *   Dennis R. Bailey (Alabama Ethics Commission Representative)
      *   Ray Hix, Jr. (Associated with board involvement and legal filings in 2017/2018)
      *   Baldwin County Judge of Probate
      *   Ripp Report / Lagniappe
