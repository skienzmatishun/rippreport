    text: The Council President loves to play gatekeeper while city debt skyrockets to fund his airport obsession. This 2017 blueprint proves Burrell has been blocking laws and ignoring taxpayer demands for years to protect his seven million dollar special interest deals at Fly Creek.
  jack-box-airport:
    brief: |-
      THE CONFLICT:
      - Burrell served as Council President and City Council member in various dates spanning 2017 to 2025.
      - Mr. Burrell held both elected official status and board membership for the Fairhope Airport Authority.
      - Historical conflicts regarding ethics existed, such as Mayor Kant refusing two city salaries, which reportedly cost Mayor Wilson $90,000.

      THE DISCOVERY:
      - The Fairhope Airport Authority is hiring Ray Hix’s attorney to defend itself against investigations into Mr. Burrell and The Ripp Report, using tax dollars.
      - Ray Hix’s attorney previously prepared a lease in question and was paid by Ray Hix to request an Advisory Opinion from the Ethics Commission regarding airport matters.
      - Ethics Commission Chief Council Hugh Evens shared details of a confidential inquiry with Fairhope resident via blind copy (bcc) to Mr. Bailey, who is identified as Hix’s attorney.

      THE PIVOT:
      - While Article 1 focuses on Mr. Burrell's failure to provide answers regarding the airport's millions in costs versus school funding investments, Article 2 proves the investigation designed to check his actions is compromised by conflicts of interest involving Ray Hix and his legal counsel.
      - The Airport Authority’s move to hire a specific attorney (Hix’s lawyer) demonstrates an attempt through judicial means to quash accountability rather than address legitimate complaints already before authorities.

      KEY ENTITIES:
      - Jack Burrell / Mr. Burrell (Councilman, Council President, Airport Board Member).
      - Ray Hix (Former Airport Authority Board Member, Sec. Treasurer for the Authority).
      - Hugh Evens (Ethics Commission Chief Council).
      - Mr. Bailey (Hix’s attorney).
