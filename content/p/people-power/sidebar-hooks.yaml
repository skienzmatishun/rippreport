  FAIRHOPE-FREE-YEAR:
    brief: 'THE CONFLICT:

      *   Past four city councils involved fighting over power dynamics (weak Mayor/strong
      council vs. strong Mayor/weak council).

      *   The historical method for gaining power involves voting out councilmen and
      the Mayor.


      THE DISCOVERY:

      *   Municipal elections were postponed by the Alabama legislature in 2024, creating
      a "free year" of office for the City Council, Mayor, municipal attorney, and
      municipal judge (no votes cast).

      *   Infrastructure projects approved in 2020 remain incomplete, resulting in
      a three-year water shortage and lawsuits costing taxpayers hundreds of thousands
      of dollars.

      *   The Council/Mayor is limiting public participation rights by restricting
      public speech to 3 minutes before/after agenda items.


      THE PIVOT:

      *   Article 2 proves that the lack of voter power (postponed elections) allows
      the current municipal government structure to maintain control and suppress
      dissent, which mirrors the stagnation described in Article 1.

      *   The suppression of public participation is a direct action taken by the
      un-elected municipal government, demonstrating how power dynamics are currently
      enforced without citizen oversight.


      KEY ENTITIES:

      *   Fairhope City Council

      *   Mayor Sullivan

      *   Alabama legislature

      *   Francis Paul Ripp (Plaintiff)

      *   Jack Burrell (Defendant)

      *   American Express Card

      *   The Ripp Report'
    generated_at: '2026-07-11T12:53:47.975245Z'
  know-before-you-vote-2:
