      *   Disputes between former employees, Catalyst candidates, and lawsuits filed
      against the City Mayor.


      THE DISCOVERY

      *   The Catalyst group is involved in a third sour grapes lawsuit concerning
      former employees.

      *   Former public works director sued City Mayor Karin Wilson.

      *   Settlements for Sullivan and Pandora were handled by the City Council, not
      through Federal Court.

      *   Family Court Judge Thomasson engaged in a political move to restructure
      a family organization''s Board.


      THE PIVOT

      *   Article 2 provides specific, ongoing examples of the "political" nature
      of power struggles (McSharry case, lawsuits) that fuel the general tension discussed
      in Article 1 regarding who controls local politics.

      *   It shows how political entities (Catalyst Council) actively challenge existing
