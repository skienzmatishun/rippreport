      *   Board President Phil Webb is accused by Gary Finch (TV host) of breaking
      state/federal laws and mismanaging funds during his term as Board President
      (specifically cited for 2014-2016).


      **THE DISCOVERY:**

      *   Tucker Dorsey, a Commissioner in Baldwin County since 2018 (with previous
      roles in the commission dating back to at least 2016), is linked by Lagniappe
      as having failed to address the financial bleeding of the Mobile Area Boy Scouts.

      *   The Widget Article explicitly links his role/connection to "the Mega Site"
      project and suggests that the land sale (mentioned in the Main Article) was
      a strategy used to mitigate budget deficits related to these organizations,
      implying his awareness or complicity.


      **THE PIVOT:**

      *   Article 1 establishes documented financial crisis and illegal activities
      within the Boy Scouts structure involving Phil Webb and Michael Hartigan.

      *   Article 2 connects this ongoing institutional collapse directly to Commissioner
      Tucker Dorsey, accusing him of ignoring the "financial bleeding" of the Mobile
      Area Council while simultaneously pursuing politically controversial county
      decisions (such as Mega Site contracts for Sen. Pittman). The pivot is that
      Dorsey''s political actions and connections overlap with the financial negligence
      described in Article'
