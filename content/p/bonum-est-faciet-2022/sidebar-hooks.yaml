hooks:
  cover-up:
    brief: 'THE CONFLICT:

      O.J. French Jr. killed by Bay Minette police on August 20, 2021.

      Mayor of Bay Minette Robert A Bob Wills allegedly rented his office building
      to the Baldwin County Legislative Delegation for county-required space.

      Rental deal structured as 5-year initial lease at $245,000 total.

      Two additional 5-year extensions proposed adding ~$283,000 and $339,000.

      Total estimated benefit to Wills family bank account: ~$867,000 for building
      allegedly worth significantly less.

      Alabama Ethics Commission Executive Director Tom Albritton accused of self-dealing
      with Mable Amos Trust where he serves as a Trustee.

      Alabama Ethics Commission and Alabama Bar dismissed multiple complaints against
      Albritton.

      BCMCU (Baldwin County Major Crimes Unit) tasked to review officers'' actions
      but chaired by Bay Minette Police Chief Al Tolbert.


      THE DISCOVERY:

      Tamara French (O.J.’s older sister) received a letter from Mayor Bob Wills regarding
      O.J. French Jr.''s death.

      Letter dismisses "cover up" allegations as "without merit."

      Letter contains no mention of Alabama’s political corruption or systemic racism.

      BCMCU leadership includes: Bay Minette Chief Al Tolbert (Chairman), Robertsdale
      Chief Brad Kendrick, Sheriff Huey "Hoss" Mack, Gulf Shores Chief Edward Delmore,
      Daphne Chief David Carpenter, Foley Chief Thurston Bullock.

      Brad Hicks (Baldwin Commission Attorney) stated he sees no ethics violation
      with Wills renting building to Delegation but refused to obtain official opinions
      from Ethics or AG.

      Mayor Wills’ office scheduled officer training with AltaPoine Health for mental
      health de-escalation and firearms conflict resolution after French’s death.

      AG Steve Marshall joined Mable Amos Trust lawsuit, stating State of Alabama
      has an interest in case.

      Albritton indicted former Jefferson County Constable Jonathan Barbee despite
      3-Judge Special Ethics Panel clearing him.


      THE PIVOT:

      Article 2 (COVER UP) proves Wills’ behavior regarding the French killing aligns
      with the unethical conduct outlined in Article 1 (Bonum Est Faciet).

      Wills uses identical "self-serving deal" language and immunity tactics in the
      French death context (Article 2) that were previously identified as suspicious
      regarding his office rental arrangement in Article 1.

      BCMCU’s lack of transparency cited in Article 2 directly supports the "Cover
      Up" theme introduced in Article 1 regarding Baldwin County/Legislative Delegation
      lack of integrity.

      Albritton’s immunity in the Ethics Commission (Article 2) provides context for
      why complaints against Wills regarding the rental deal and conduct were dismissed.

      Wills’ letter to Tamara French constitutes the "smoking gun" because it publicly
      refutes integrity while financially benefiting from unethical rent deals mentioned
      in Article 1.


      KEY ENTITIES:

      Robert A Bob Wills (Mayor of Bay Minette)

      Tamara French

      O.J. French Jr.

      Al Tolbert (Bay Minette Police Chief)

      Tom Albritton (Alabama Ethics Commission Exec Director, Mable Amos Trustee)

      Huey "Hoss" Mack (Baldwin County Sheriff’s Office)

      Brad Hicks (Baldwin Commission Attorney)

      Brad Kendrick

      Steve Marshall (Attorney General of Alabama)

      Steven King (Blount County Circuit Judge)'
