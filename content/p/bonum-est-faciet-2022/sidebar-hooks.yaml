      Ethics Commission, Alabama Bar, and Attorney General Steve Marshall regarding
      Albritton’s self-dealing.

      - July 16, 2021: Writ of Mandamus filed by Ripp seeking hearing on Albritton’s
      conduct; no hearing granted.

      - 2021: Main Article reports AG Steve Marshall joins Mabel Amos Trust lawsuit,
      stating “State of Alabama has an interest in the case.”

      - Main Article reports AG Steve Marshall indicted former Jefferson County Constable
      Jonathan Barbee despite being cleared by a 3-Judge Special Ethics Panel.

      - Main Article notes Albritton is accused of self-dealing with the Amos Trust
      while serving as Ethics Commission Executive Director.


      2. THE DISCOVERY

      - August 21, 2022: Francis Paul Ripp sends formal letter and evidence package
      to Attorney General Steve Marshall’s Special Prosecution Office.

      - Rep for office listed in letter: Clark Morris (Office of Special Prosecutions).

      - Complaint alleges Albritton failed to disclose Mabel Amos Trustee status on
      required economic statement.

      - Evidence alleges Albritton’s children received scholarships through the Trust;
      specific connection noted between Circuit Judge Ben Bowden and scholarships
      awarded to law partners'' children.

      - Evidence alleges Regions Bank charged over $1 million in fees for managing
      the Trust while Albritton benefited.

      - August 21 Letter states: “As of today not a single reply from any agency”
      (AG, Alabama Bar, Ethics Commission).

      - Letter alleges AG Steve Marshall’s office and Ethics Commission are "covering
      up" the allegations.


      3. THE PIVOT

      - Main Article claims AG Steve Marshall is entering Mabel Amos Trust lawsuit
      due to self-dealing involving Albritton.

      - Widget Article is the primary source document (dated Aug 21, 2022) detailing
      those specific allegations filed directly with Marshall’s office.

      - Widget Article validates Main Article’s claim of “Self Dealing” by listing
      specific trustee alterations and non-disclosure.

      - Widget Article exposes conflict of interest: Ethics Commission Executive Director
      (Albritton) is accused of stealing from the Trust he manages, while Ripp Reports
      notes AG and Bar ignored prior complaints.

      - Letter reveals Cynthia Raulston acted as Albritton’s defense liaison in July
      2021; both are central to the corruption claims.


      4. KEY ENTITIES

      - Tom Albritton (Executive Director, Alabama Ethics Commission; Trustee, Mabel
      Amos)

      - Steve Marshall (Attorney General of Alabama)

      - Francis Paul Ripp (The Ripp Report)

      - Mabel Amos Trust

      - Regions Bank

      - Cynthia Raulston (Counsel/Albritton associate)

      - Clark Morris (Office of Special Prosecutions rep in letter)

      - Ben Bowden (Blount County Circuit Judge; Albritton law partner)

      - Jonathan Barbee (Former Jefferson County Constable)'
