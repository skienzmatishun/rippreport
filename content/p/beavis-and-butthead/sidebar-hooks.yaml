      THE PIVOT: Why is Article 2 the ''smoking gun'' for Article 1?

      - While Article 1 focuses on Councilmen Burrell and Boone’s alleged misconduct,
      Article 2 exposes a deeper political connection: it confirms that Councilman
      Boone relies on CATALYST to influence media (GCN/Courier) against the Mayor.

      - Article 2 shifts the focus from simply describing "bullying" by council members
