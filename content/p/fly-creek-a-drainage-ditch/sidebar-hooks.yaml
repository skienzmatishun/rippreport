  community-or-developer:
    brief: 'THE CONFLICT:

      *   Fly Creek Apartments development was endorsed by the City Council in October
      2016.

      *   A six-day trial occurred regarding the project, resulting in a jury decision
      that did not agree with the plaintiff.

      *   The proposed drainage plan calls for a single point discharge of stormwater
      from the apartment complex directly into wetlands, which drains into Fly Creek
      (100 to 150 feet from the outfall pipe).

      *   Past city officials were dismissed (Mayor lost job; Public Works Director
      fired), and subsequent council members have taken actions that exacerbated environmental
      problems.


      THE DISCOVERY:

      *   The City Council is delaying resolution on the Fly Creek PUD Sunset Provision
      for a tenth meeting, despite the project having permanently damaged Fly Creek
      and the watershed.

      *   Council members involved in the project possess conflicts of interest related
      to developers, engineers, contractors, and landowners.

      *   There is a pending lawsuit and high probability of future lawsuits against
      council members who vote for the project.


      THE PIVOT:

      *   Article 2 reveals that the City Council''s continued actions (delaying resolution)
      are enabled by deep political conflicts of interest among council members tied
      to developers and contractors, showing that the process is being manipulated
      behind the scenes rather than through public consensus.


