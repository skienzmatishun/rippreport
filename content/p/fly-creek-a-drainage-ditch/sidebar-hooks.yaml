      THE CONFLICT
      *   In 2016, the Fairhope City Council and Mayor approved a large apartment complex development by developer Corte on land within the Fly Creek Watershed in Baldwin County.
      *   The approval was controversial, with Friends of Fly Creek citing concerns over erosion, sedimentation impacts, and runoff into the vital watershed.
      *   In April 2017, the newly elected city council granted an extension for the project to proceed despite public opposition.
      *   The development utilized a drainage plan involving single point discharge directly into wetlands near existing damage from Publix construction, bypassing plans for a larger retention pond.

      THE DISCOVERY
      *   Article 2 reveals ongoing conflicts of interest regarding Fly Creek development, specifically noting that the "Fairhope Jester" supports Kant-Corte Apartments while owning property on Fly Creek.
      *   A specific ethics complaint against Fairhope City Councilman Robert Brown is identified under case number 2018-42 involving the Eastern Shore Art Center Board.
      *   The widget article clarifies technical regulatory loopholes: Developers frequently install low pressure sewer systems rather than the city standard gravity fed system to reduce overall infrastructure costs, circumventing established City Planning Commission standards set in December 2002.

      THE PIVOT
      *   Article 1 documented the initial governmental compromise and environmental risk posed by developer Corte's apartment project on Fly Creek land.
      *   Article 2 provides context for this compromise by exposing patterns of ethics complaints (Robert Brown) and conflicts of interest (The Jester/Corte) within local governing bodies, suggesting regulatory decisions regarding development approvals may be compromised by personal or contracted financial interests.

