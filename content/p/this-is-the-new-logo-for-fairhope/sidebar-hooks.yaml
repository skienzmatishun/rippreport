      - Jack Burrell is President of Fairhope Catalyst "At Large" Council and holding
      the city hostage regarding Airport governance.


      THE DISCOVERY:


      - Colby Cooper is Chief Operating Officer for a company owned by Ray Hix.

      - Ray Hix holds position as Fairhope Municipal Judge and Board member.

      - Jack Burrell is President of Airport Authority where he handled an RFP for
      a 1 million dollar hangar.

      - Jack Burrell flew on that private jet before the bid process officially occurred.

      - Cooper resigned from Mobile government (Chief of Staff to Mayor) after 11
      days following an irate public reaction over cutting a tree in Medal of Honor
      Park.


      THE PIVOT:


      - Article 2 exposes that the opposition to government change is tied directly
      to Ray Hix and Colby Cooper''s financial/operational overlap.

      - Article 2 confirms Jack Burrell’s involvement in Airport Authority corruption
      (private jet usage prior to bid) links him to the special interests controlling
      the "NO" narrative.

      - Widget article provides evidence that Ripp Report’s prior 12 years of criticism
      regarding Fairhope governance is corroborated by specific named individuals
      and financial conflicts, rather than generic complaints.


      KEY ENTITIES:


      - Colby Cooper

      - Ray Hix

      - Jack Burrell

      - The Ripp Report

      - Fairhope City Council

      - Fairhope Airport Authority'
