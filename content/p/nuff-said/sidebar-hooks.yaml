  court-public-opinion-now-session:
    brief: 'THE CONFLICT

      *   The Airport scandal originates from an alleged improper bidding process
      for a ground lease involving the Fairhope Airport Authority and City officials
      starting in 2015/2016.

      *   Councilman Jack Burrell, acting as Council President and Airport Authority
      voting Board member, was central to negotiating the RFP selection.

      *   The initial allegations claim Burrell aided and abetted a grossly flawed
      bidding process, specifically favoring Hix/Snedeker companies (Mid-Bay Air LLC).

      *   Key date: Lease was signed on Dec 17, 2015; Ethics Advisory Opinion rendered
      Feb 3, 2016.

      *   The Ripp Report filed complaints with the Attorney General''s office in
      Jan 2017 regarding bid rigging and collusion.


      THE DISCOVERY

      *   Current dispute involves ownership of the Fairhope Airport property between
      the City of Fairhope and the Airport Authority.

      *   Council President Jack Burrell is actively controlling council agenda items
      to prevent discussion (e.g., repeal of Ordinance 1572) that would mandate City
      ownership of the asset.

      *   Burrell advocates for the Airport Authority retaining ownership and receiving
      $310,000 annually, yet has provided "no plan" regarding debt management for
      the property''s $8 million debt.


      THE PIVOT

      *   The current institutional obstruction (Burrell controlling agenda/refusing
      transparency) proves the initial allegations of unethical behavior by Council
      members are not isolated incidents but a pattern of political resistance and
      lack of accountability that has persisted since the original scandal in 2016.

      *   Burrell’s refusal to allow scrutiny into airport finances or asset ownership
      mirrors his historical role as an official who oversaw a compromised bidding
      process without disclosure.


      KEY ENTITIES

      *   Jack Burrell (Council President, City Councilman)

      *   Francis Paul Ripp (Author of The Ripp Report/Lead Advocate)

      *   Fairhope Airport Authority / City of Fairhope

      *   Hix (Sec. Treasurer, Board Member)

      *   Snedeker Aircraft / Mid-Bay Air LLC

      *   Executive Aviation (Competing bidder)

      *   Office of the Attorney General (Jan 25, 2017 supplement)

      *   Ethics Commission'
