  fairhope-airport-un_authorized:
    brief: 'THE CONFLICT:

      *   Airport scandal reported since November 2016 (Main Article).

      *   Conflict of interest involving board members and airport leases at Fairhope
      Airport.

      *   Board member Jack Burrell reviewed bids and determined an associate was
      the winner despite potential conflicts.


      THE DISCOVERY:

      *   A lawyer obtained an advisory ethics opinion (no. 2016-04) allowing a board
      member to enter a lease with the Airport Authority.

      *   The ethics opinion states a board member may not use confidential information
      gained from their position to benefit their company/bid.

      *   An Airport Authority signed a memorandum of lease with Mid-Bay Air LLC on
      December 23, 2015.

      *   The Alabama Ethics Commission stated that no lease was ever submitted regarding
      the Mid-Bay Air Lease.


      THE PIVOT:

      *   Article 2 provides specific legal evidence (ethics opinion and null/void
      lease finding) demonstrating a concrete conflict of interest involving Jack
      Burrell and the Airport Authority, which serves as the foundational proof for
      the broader claims of unethical behavior and lack of accountability mentioned
      in Article 1.


      KEY ENTITIES:

      *   Jack Burrell

      *   Fairhope Airport Board Member

      *   Airport Authority

      *   Mid-Bay Air LLC

      *   Joe McEnerey (Chairman)

      *   Pam Caudill (Vice Chair)

      *   Ray Hix (Secretary/Treasurer)

      *   Alabama Ethics Commission'
    generated_at: '2026-07-11T11:19:24.714701Z'
