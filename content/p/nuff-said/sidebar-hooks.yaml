  fairhope-airport-un_authorized:
    brief: '**THE CONFLICT**

      *   Ripp Report has been reporting on an "Airport scandal" since November 2016.

      *   The Main Article suggests the City Council failed to hold council accountable
      and ignored allegations of unethical behavior involving one of their own.


      **THE DISCOVERY**

      *   Article 2 reveals a specific conflict regarding the Fairhope Airport Board
      and leasing practices in 2015/2016.

      *   Ethics Opinion No. 2016-04 was obtained, outlining standards for board members
      not to use confidential information or benefit their companies from airport
      data.

      *   Joe McEnerey (Chairman), Pam Caudill (Vice Chair), and Ray Hix (Secretary/Treasure)
      were appointed in August 2015 following the resignation of three prior board
      members.

      *   Board member Ray Hix was privy to confidential information regarding airport
      leases and bids starting in mid-2015 while serving on the Board.

      *   A memorandum of lease with Mid Bay Air LLC was signed by the Airport Authority
      on December 23, 2015, prior to an Ethics Opinion being finalized or complied
      with.

      *   The Alabama Ethics Commission stated on Dec 2, 2016, that "No lease has
      ever been submitted" regarding this specific issue, despite a request for remarks
      concerning the Mid-Bay Air Lease awarded around December 2015.

      *   Jack Burrell (City Council President and Airport Authority Board Member)
      set up an ad hoc committee to review bids; he determined his associate board
      member was the winner despite the ethics conflict.


      **THE PIVOT**

      *   Article 1 establishes the existence of a long-running investigation into
      general "Airport scandal" unethical behavior by City Council members.

      *   Article 2 provides concrete proof (Ethics Opinion No. 2016-04 and the Dec
      23, 2015 lease) that specific council/board figures—specifically Ray Hix and
      Jack Burrell—ignored or participated in a conflict of interest allowing an airport
      board member to secure a lease using confidential information gained through
      his position on the Board.

      *   The failure by the Airport Board (and Councilman Burrell''s apparent oversight)
      to comply with ethics rules forms the basis for the alleged "unethical behavior"
      mentioned generally in Article'
