  hi-jack-ed:
    brief: 'THE CONFLICT

      *   Ongoing reporting by The Ripp Report concerning the Fairhope Airport scandal
      since Nov. 2016.

      *   Allegations that the City Council chose to ignore facts regarding unethical
      behavior within its own ranks.

      *   Prior complaints filed with authorities (as stated in Main Article).

      *   Fairhope has historically provided $500,000 annually to the Fairhope Airport
      Authority from the city budget while under-funding education.


      THE DISCOVERY

      *   The Fairhope Airport Authority functions as a "black hole" for information,
      led by a board with linked personal or financial connections (conflict of interest).

      *   Mayor Wilson’s administration faced an option in 2012 where the city could
      reclaim land owned by them if the airport loan principal was not paid.

      *   Council Member Mr. Burrell held simultaneous leadership roles: Fairhope
      City Council President and the city''s liaison for the Airport Authority.

      *   Mr. Burrell served on an ad hoc committee of two overseeing and selecting
      bids related to Airplane hangars, constituting a conflict with his position
      as Council President/Liaison.


      THE PIVOT

      *   The Main Article stated that ethical issues were being ignored by the City
      Council and demanded accountability from authorities after complaints were filed.

      *   The Widget Article provides concrete evidence (specific roles, financial
      allocations of $500k vs education funding, specific ad hoc committee membership)
      which defines the nature of the "unethical behavior" referenced in the first
      article.

      *   This discovery substantiates the claim that Mr. Burrell''s support for the
      Authority over citizen interest was not merely political disagreement but a
      conflict stemming from his dual leadership roles within the Airport’s governing
      structure and selection process.


      KEY ENTITIES

      *   Mr. Burrell (City Council Member / City Council President)

      *   Fairhope Airport Authority

      *   Mayor Wilson

      *   The Ripp Report

      *   Fairhope City Council'
