  court-public-opinion-now-session:
    brief: 'THE CONFLICT

      *   Mayor wants the property at the Airport in the name of the City of Fairhope.

      *   Airport Authority seeks to appropriate $310,000 a year from the city to
      pay down an $8 million debt and retain ownership of the property.

      *   Council President Jack Burrell has been adamant that the Airport Authority
      should have ownership.


      THE DISCOVERY

      *   The RFP bid process for the Airport Authority was grossly flawed and gerrymandered.

      *   Jack Burrell aided and abetted the flawed bidding process.

      *   The lease was signed on December 17th, 2015, prior to the Ethics Commission
      Advisory Opinion dated February 3, 2016.

      *   Allegations of bid rigging and collusion among members of the Airport Authority
      Board.


      THE PIVOT

      *   Article 2 provides specific evidence (signed lease date, timing relative
      to the Ethics Opinion, details on bidders like Executive Aviation and Hix/Snedeker
      companies) that proves Article 1''s general allegations regarding unethical
      behavior by the City Council/Authority are substantiated through illegal bidding
      practices.


      KEY ENTITIES

      *   Jack Burrell (City Council President, Fairhope Airport Authority voting
      Board member, liaison).

      *   Fairhope Airport Authority.

      *   Hix/Snedeker aircraft (Mid Bay Air LLC).

      *   Executive Aviation.

      *   Terry Chapman.

      *   Kel Jones.

      *   Ethics Commission.'
    generated_at: '2026-07-11T11:19:24.714712Z'
