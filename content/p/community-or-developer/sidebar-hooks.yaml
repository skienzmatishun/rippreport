      concerning the developer, engineers, contractors, and landowners related to
      the Fly Creek project.

      *   The Main Article frames political factions ("Baldwin Insider" and "Catalyst")
      as powerful groups influencing local control.


      THE DISCOVERY

      *   City Council resolutions authorized Mayor Karin Wilson or Council President
      Jack Burrell to purchase properties owned by the Baldwin County Board of Education
      (K-1 Center, Fairhopers Community Park, James P. Nix Center).

      *   A half-million dollar contract was approved for the dredging of the Main
      Channel of Fly Creek via an MOU between M&N of Alabama, LLC and the City of
      Fairhope, split between the City and the Fairhope Yacht Club.

      *   The Council discussed a special 3 Mill Ad Valorem School District Tax Election,
