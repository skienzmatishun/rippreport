hooks:
  fairness:
    brief: 'THE CONFLICT

      • April 10, 2017: Fairhope City Council agenda included final adoption of an
      ordinance amending Ordinance No. 1572 (Fly Creek PUD Sunset Provision).

      • Main article suggests ongoing political pressure and conflict of interest
      regarding the developer, engineers, contractors, land owner.

      • The Ripp Report identifies "The Baldwin Insider" as connected to "Catalyst,"
      a fraternity including county commissioners, attorneys, judges, and developers.


      THE DISCOVERY

      • Widget article confirms four councilmen voted for a 120-day extension of the
      sunset clause for multiple occupancy site plan approval.

      • Mr. Brown admitted his long-term relationship with developer Mr. Corte prior
      to the vote.

      • Mr. Boone has a business relationship with Mr. Corte and the associated engineering
      company.

      • The article details a past $11.25 million lawsuit settlement involving Mr.
      Corte and former Mayor Tim, facilitated by council including "Beavis" (Burrell)
      and "Butthead" (Boone).


      THE PIVOT

      • Article 1 alleges a broad network of conflicts ("Catalyst fraternity") but
      provides general suspicion regarding who might vote on the Fly Creek project.

      • Article 2 transforms this generalized political accusation into specific evidence
      by naming council members with direct, documented business and personal relationships
      to Mr. Corte (Mr. Brown and Mr. Boone), thereby proving that alleged conflicts
      of interest are present within the council structure itself.


      KEY ENTITIES

      • Fairhope City Council

      • Fly Creek PUD / Fly Creek Apartments

      • Developer: Mr. Corte

      • Political Groups: Catalyst, Baldwin Insider, "Beavis" (Burrell), "Butthead"
      (Boone)

      • Involved Officials: Mayor Tim (former), Mayor Wilson

      • Financial Detail: $11.25 million settlement'
