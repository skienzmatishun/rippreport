    generated_at: '2026-07-11T11:10:13.864168Z'
    text: Former Mayor Tim Kant spent years building a "good ole boys" network that
      put developers above the law. These records expose how he and Arthur Corte manipulated
      the Triangle lawsuit to drain $11.25 million from the city while lining the
      pockets of hand-picked engineers at Thompson Engineering.
