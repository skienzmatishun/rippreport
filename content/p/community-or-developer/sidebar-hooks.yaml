      approve controversial high-density developments (like the Fly Creek Apartments).

      - It proves that the actions of former Fairhope Mayor Tim Kant mirrored those
      who "shoot the messenger" regarding development concerns.

      - The controversy resulted in significant collateral damage, including firings,
