  no-more-silence-we-want-answers:
    brief: 'THE CONFLICT

      *   City Council voted on Final Adoption of Ordinance Amending Ordinance No.
      1572 (Fly Creek PUD Sunset Provision) on Monday, April 10, 2017.

      *   The Fly Creek project damaged Fly Creek and the Fly Creek Watershed.

      *   A pending lawsuit related to the development was discussed, involving conflicts
      of interest among council members, developers, engineers, and landowners.


      THE DISCOVERY

      *   The Triangle lawsuit cost $12 million to settle.

      *   The Mayor drained $3 million from the utility fund to pay down the settlement
      and secured a $5.25 million bank loan for the settlement.

      *   The Mayor falsely claimed the Triangle lawsuit was the purchase of a Park
      when it was a legal settlement requiring the City to purchase property.

      *   A $10 million sewer upgrade was deemed a "band aid" instead of a proposed
      $30 million new facility located away from the bay.

      *   The Mayor and Senator Pittman faced a BP Grant Fraud complaint, leading
      to an FBI investigation forwarded to the Alabama Attorney General’s White Collar
      Crime Division (where the Special Prosecutor convicted the Speaker of the House).


      THE PIVOT

      *   Article 2 provides evidence that the financial management and decisions
      made by Mayor Kant regarding lawsuits and public funds were fraudulent or corrupt.

      *   The specific financial maneuvers—using utility funds for settlement payments,
      misrepresenting lawsuit settlements, and alleged BP grant fraud—expose systemic
      corruption underpinning the Fly Creek development conflict described in Article
      1.


      KEY ENTITIES

      *   Fairhope City Council

      *   Fly Creek PUD

      *   Baldwin Insider

      *   Catalyst fraternity (county commissioners, attorneys, judges, developers)

      *   Mayor Kant

      *   Senator Pittman

      *   Triangle lawsuit ($12 million settlement)

      *   Planning and Zoning Board

      *   Arthur Corte

      *   Fire Department

      *   FBI investigation

      *   Alabama Attorney General / Matt Hart

      *   BP Boom Grant funds'
    generated_at: '2026-07-11T11:10:13.864174Z'
    text: The Fly Creek disaster is just the tip of a corrupt iceberg involving drained
      utility funds and secret settlements. We uncovered evidence that former Mayor
      Tim Kant faces an FBI investigation for BP grant fraud while hiding the true
      $12 million cost of his fraudulent backroom legal deals.
    character_count: 289
