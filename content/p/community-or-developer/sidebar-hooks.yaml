  fairhopes-triangle-mega-site:
    brief: 'THE CONFLICT

      *   April 10, 2017: Fairhope City Council held a final adoption vote regarding
      the Fly Creek PUD Sunset Provision (Ordinance No. 1572).

      *   The debate involved allegations of developer conflicts of interest related
      to contractors and landowners.

      *   Concerns were raised about environmental damage to Fly Creek Watershed from
      bulldozers on the Publix site.

      *   A pending lawsuit regarding the Fly Creek development was mentioned as a
      risk if the developer proceeded.

      *   Simultaneously, Councilman Burrell and Boone had been managing controversy
      over the Triangle property for six years, allegedly misrepresenting its purpose
      (settlement vs. public park).


      THE DISCOVERY

      *   Article 2 reveals that the Triangle Mega-Site acquisition was a lawsuit
      settlement.

      *   The city paid $11.25 million in total to acquire the land and settle claims
      with former insurer Dyas.

      *   $3 million of that payment was allocated specifically for attorney fees,
      despite assurances that the city would incur no such costs.

      *   Councilman Burrell and Councilwoman Boone allegedly led a charge to keep
      developers off the Triangle property while misinforming the public about its
      true acquisition purpose (a lawsuit settlement).


      THE PIVOT

      *   Article 2 provides concrete financial data ($11.25 million purchase, $3
      million in legal fees) for a major land deal where city leaders used deception
      ("Liar Liar pants on fire") and political maneuvering to advance development
      interests under the guise of settling legal disputes or creating "parks."

      *   This establishes that the "conflicts of interest" and potential corruption
      cited in Article 1 regarding Fly Creek''s developer-led project are consistent
      with a documented pattern of politically sensitive land acquisitions by council
      members (Burrell, Boone) benefiting select developers over community consensus.


      KEY ENTITIES

      *   Fly Creek PUD Sunset Provision / Ordinance No. 1572

      *   Fairhope City Council

      *   Catalyst

      *   The Baldwin Insider

      *   Boone (City Council Member/Councilman)

      *   Burrell (Council President/Councilman)

      *   Kant (Former Mayor)

      *   Dyas (former insurer / Lawsuit Plaintiff)

      *   Triangle Property'
