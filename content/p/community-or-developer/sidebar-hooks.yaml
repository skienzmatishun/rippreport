  whose-agenda:
    brief: '**THE CONFLICT:**

      *   In April 2017, the Fairhope City Council was debating Ordinance No. 1572
      regarding the "Fly Creek PUD Sunset Provision."

      *   The debate focused on whether to allow developer control over Fly Creek
      land, with claims of conflicts of interest involving council members and developers.

      *   A pending lawsuit threatened the project if development proceeded.

      *   The Main Article alleged that political groups like "Catalyst" (which included
      county commissioners, attorneys, judges, and developers) controlled local politics
      to serve their own interests against public good.


      **THE DISCOVERY:**

      *   In a recent agenda (March 8th), the Fairhope City Council authorized high-cost
      contracts and property transfers while failing to inform the public of key facts.

      *   Resolution 11 details a $500,000 dredging contract for Fly Creek, split
      between the City and the Fairhope Yacht Club. This action is linked to environmental
      damage caused by red fill from when Publix was built, requiring repeated future
      dredging costs borne by taxpayers.

      *   The council authorized Mayor Karin Wilson to purchase properties owned by
      Baldwin County Board of Education (K-1 Center, Park, James P. Nix Center).

      *   Resolution 27 detailed Change Order No. 2 for the Library Envelope Repairs
      (Bid No. 005-18), extending the contract by 12 days due to unforeseen conditions
      discovered during demolition.


      **THE PIVOT:**

      *   Article 2 transforms Article 1''s abstract warning about "conflicts of interest
      related to the developer" into concrete, recent actions (the $500k dredging
      contract and the Fly Creek issue) that demonstrate favoritism toward developers/private
      entities over public accountability.

      *   It provides specific examples of financial mismanagement (Library warranty
      issues ignored; future dredging costs) and lack of transparency (Executive Session
      30), proving the systemic "agenda" criticized in Article 1 is ongoing, not historical.


      **KEY ENTITIES:**

      *   Fly Creek PUD / Fly Creek Watershed

      *   Fairhope City Council

      *   Baldwin Insider / Catalyst

      *   Karin Wilson (Mayor)

      *   Jack Burrell (Council President/City Council Member)

      *   Jennifer Fidler

      *   Councilman Boone

      *   Board of Education (Baldwin County)

      *   Fidlers and Can’t (former Mayor/Public Works figures cited for library negligence)

      *   M&N of Alabama, LLC / Fairhope Yacht Club'
    generated_at: '2026-07-18T06:40:17.799449Z'
