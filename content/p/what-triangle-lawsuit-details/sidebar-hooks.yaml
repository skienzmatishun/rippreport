      systemic fraud and lack of public input regarding a $12.5 million expenditure
      involving the Triangle Property.

      *   Key entities involved in past misconduct include Mayor Tim Kant (Mayor),
      City Council, Cain O''Rear (Hand-Arendall attorney), Thompson Engineering, and
      Arthur Corte (developer).

      *   The city entered into an agreement settlement for the Dyas family lawsuit
      regarding land ownership but initially claimed commercial restrictions that
      later changed to allow "any use," contingent on PUD/Planning & Zoning.

      *   $3 million in taxpayer money was used for attorney fees related to this
      fraud, and $22 million (BP Restore Act Funds) were potentially misapplied based
      on a Thompson Engineering study criticized for omitting damage caused by Arthur
      Corte’s filling of Fly Creek with red clay.

      *   Mayor Tim Kant had been involved in investigations by the BP Fraud Division
      involving Senator Trip Pittman regarding grand jury proceedings.


      **THE DISCOVERY:**

      *   Recent actions (November 2024) revealed that only three Fairhope City Council
      members—referred to as "the 3 B’s" (Burrell, Brown, and Boone)—approved a $2.65
      million land purchase designated for recreation.

      *   This recent purchase occurred without approval from the National Park Service
      (NPS), lacked public participation, and involved a questionable appraisal process.
      The sale was closed on November 1st, just before the Connectivity Master Plan
      Workshop scheduled for November 7th.

      *   The council utilized municipal accounts to fund this land acquisition, reportedly
      causing delays in capital/infrastructure projects.

      *   Further current issues include a $5 million unbudgeted payment and the entire
      city council voting themselves an annual "full family insurance package" valued
      at $17,000 each, details which were previously hidden from public view.

      *   Current Attorney General complaints have been noted against Robert Brown
      concerning personal financial gain related to the Eastern Shore Art Center.


      **THE PIVOT:**

      *   The 2014 Triangle lawsuit exposé served as a documented warning regarding
      council and mayoral corruption involving large, unvetted land deals (the Triangle
      Property) and misuse of public/restricted funds (BP Restore Act).

      *   Article 2 proves this past pattern is currently active: Current Council
      members are executing similar maneuvers—approving major land acquisitions ($2.65
      million vs $12.5 million) without transparency, bypassing regulatory oversight
      (NPS approval), utilizing city accounts to cover deficits, and concealing self-serving
      financial arrangements like the family insurance package.

      *   The shift from historical fraud related to a BP Restore Act settlement to
      current mismanagement/conflict of interest suggests recurring institutional
      corruption under different leadership while exhibiting similar "CATALYST" tendencies.


      **KEY ENTITIES:**

      *   Fairhope City Council / Fairhope Municipal Government

      *   Triangle Property (land entity)

      *   Arthur Corte (developer)

      *   Cain O''Rear (Hand-Arendall attorney)

      *   Thompson Engineering (consulting firm)

      *   BP Restore Act Funds ($22,000,000 USD)

      *   Dyas Family

      *   Tim Kant / Tim: Former Mayor of Fairhope (past administration involved in
      2014 conflict)

      *   Robert Brown / Councilman Brown / "The Jester" (currently accused of office
      abuse/Eastern Shore Art Center)

      *   Jack Burrell / Burrell / Jack Burrell (Council President, City Council member)

      *   Kevin Boone / K. Boone / Kevin Boone (Council Member)

      *   CATALYST (political organization/group)

      *   National Park Service (NPS)'
