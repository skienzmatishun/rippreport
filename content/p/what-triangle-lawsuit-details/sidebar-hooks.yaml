      4. KEY ENTITIES:

      - Tim Kant (Mayor/Former Mayor)

      - Cain O''Rear (Attorney for Hand-Arendall)

      - Trip Pittman (Senator, BP Fraud Division investigation context)

      - Buddy Breland / Mr. Breland (Property owner and lawsuit plaintiff in current
