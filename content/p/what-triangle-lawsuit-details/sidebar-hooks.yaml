      a property down payment, plus securing a $5.75 million loan from Compass Bank,
      and paying $3 million in attorney fees by Hand-Arendall/Cain O''Rear.

      - The settlement originally restricted the property to non-commercial or industrial
      use; however, the final agreement allowed "any use," conditioned upon Planning
      & Zoning approval.


      THE DISCOVERY:

      - In December 2015, a Planning and Zoning meeting revealed developer Arthur
      Corte’s proposal (a non-resident landowner) for a Fly Creek PUD to build 240
      “upscale apartments” on the disputed land.

      - Despite initial city consensus that the project would pass, public opposition
      was fierce, with citizens demanding a hand raised vote due to misleading sales
      points regarding apartment construction.

      - Mayor Tim Kant voted against the PUD proposal (along with Jennifer Fiddler),
      resulting in a 5 no, 4 yes decision, contradicting the council''s initial support
      for the project.


      THE PIVOT:

      - Article 1 established that the Triangle lawsuit settlement allowed "any use"
      on the land contingent upon Planning & Zoning approval; Article 2 reveals exactly
      what type of use—the controversial Fly Creek PUD and apartment construction
      by Arthur Corte—was being pursued years after that agreement was finalized.


      KEY ENTITIES:

      - Arthur Corte (developer/land owner)

      - Tim Kant (Mayor)

      - Cain O''Rear (Hand-Arendall attorney)

      - City Councilman Ford

      - Dyas Family

      - Trip Pittman

      - Thompson Engineering

      - Fairhope Planning and Zoning

      - Fly Creek PUD / Fly Creek Watershed Restoration Plan'
