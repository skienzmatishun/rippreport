  miracle-blindside-reality:
    brief: 'THE CONFLICT:

      - The City of Fairhope, led by Mayor Tim Kant and Councilman Ford, entered a
      conditional settlement agreement concerning the Triangle Lawsuit regarding Dyas
      Family land in December 2013/2014 (specific date not given).

      - This $12.5 million expenditure was conducted without public participation
