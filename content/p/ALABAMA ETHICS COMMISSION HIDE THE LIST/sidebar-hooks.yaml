      Mabel Amos Trust.

      - Total value of disputed scholarships alleged in Main Article is 3.2 Million
      dollars distributed to Judges, Bankers, Lawyers, and Politicians via a trust
      Albritton knew.

      - Tom Albritton served as Executive Director of the Alabama Ethics Commission.

      - Main Article claims Albritton routinely denied legitimate ethics complaints
      while holding that position.

      - Lagniappe article notes trust law and tax code forbid self-dealing where board
      members benefit from charitable funds.

      - Albritton’s two children received scholarships totaling $120,000 for University
      of Texas tuition over six years.

      - Oil discovery on trust-owned land in Conecuh County in 2011/2013 caused millions
      to flow into the trust.


      2. THE DISCOVERY:

      - Lagniappe article confirms Albritton’s children were the direct beneficiaries
      of scholarships shortly before/after his appointment as Ethics Director.

      - AG Steve Marshall initially moved to join the civil case overseeing the trust,
      claiming official oversight standing.

      - AG Marshall’s office filed motions to dismiss Tyra Lindsey from the case;
      Lindsey is a high school student representing students denied scholarships.

      - Lindsey’s attorney, Byron Mathews Jr., noted AG Marshall had significant conflicts
      of interest.

      - Mathews stated AG Marshall’s office paid millions in fees to same attorneys
      representing Regions Bank in the trust case.

      - Mathews noted AG Marshall received significant campaign cash from both Regions
      Bank and lawyers involved in the case.

      - Judge Johnny Hardwick has ruled on almost none of the 70+ motions filed in
      the case.

      - Albritton previously litigated with AG Marshall last year over Ethics Commission
      requirement to provide exculpatory (Brady) evidence.


      3. THE PIVOT:

      - Second article provides the specific mechanism (Mabel Amos Trust oil discovery)
      and dates confirming the massive influx of money in Article 1.

      - Second article proves Albritton’s “conflict” is not just ethical but legal:
      he used trustee power to benefit family while holding ethics oversight power.

      - Second article exposes AG Marshall as a central figure in the financial structure
      (via Regions/campaign funds), validating Article 1''s claim of systemic corruption.

      - Second article provides legal context for why the List is being hidden: AG
      Marshall moving to toss plaintiff Lindsey who demands disclosure of the recipient
      list.


      4. KEY ENTITIES:

      - Tom Albritton (Executive Director, Ethics Commission; Trustee)

      - Rick Clifton (Albritton Law Firm attorney/Trustee)

      - John Bell (Regions Bank officer)

      - Mabel Amos Memorial Fund / Trust

      - Steve Marshall (Alabama Attorney General)

      - Tyra Lindsey (Petitioner student)

      - Byron Mathews Jr. (Lindsey''s Attorney)

      - Regions Bank

      - Judge Johnny Hardwick

      - Albritton Law Firm / Andalusia location'
