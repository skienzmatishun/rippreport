hooks:
  alabama-attorney-general:
    brief: '1. THE CONFLICT

      Tom Albritton, Executive Director of the Alabama Ethics Commission and Trustee
      for the Mabel Amos Scholarship Trust, is accused of using his position to divert
      $3.2 million in scholarship funds anonymously between 2013 and 2021 to privileged
      individuals including judges, bankers, lawyers, and politicians. The Ripp Report
      alleges Albritton awarded himself $135,000 in trust funds for his children’s
      University of Texas tuition. While serving as Ethics Director, Albritton allegedly
      dismissed legitimate ethics complaints filed by citizens. Plaintiffs in Lawrence
      v. State (2006) and others demanded the Attorney General release the names of
      recipients who received funds exceeding $3.2 million, but lists remain sealed.


      2. THE DISCOVERY

      Article 2 (Letter from Francis Paul Ripp) confirms AG Steve Marshall admitted
      in public statements that Albritton committed fraud and acted self-servingly.
      It details specific legal representation identifying Ashby Pate as counsel for
      Albritton and Rick Clifton, Tommy Gallion representing Megan Carmack (Mabel
      Amos family member), and Bryon Mathews representing Tyra Lindsey. It specifies
      the Mabel Amos Trust grew from $500k originally to $8.2 million currently, with
      an oil well yielding approximately $100 million in revenue (approx 4.1M by 2011).
      It reveals Allen Dodd was appointed Deputy Attorney General following the lawsuit
      and that Ripp Report filed a 100-page complaint with AG office.


      3. THE PIVOT

      Article 2 serves as the ''smoking gun'' by:

      - Validating Article 1’s fraud allegations with direct confirmation from Attorney
      General Marshall and specific financial breakdowns ($3.2M anonymous, $135k personal
      use).

      - Highlighting the specific conflict of interest: Albritton managed a corruption
      case as Ethics Director while his own salary was raised from $25k to $210k annually.

      - Exposing the legal defense teams protecting Albritton, confirming he is actively
      being defended (Pate) while recipients remain anonymous.


      4. KEY ENTITIES

      Tom Albritton, Steve Marshall, Allen Dodd, Rick Clifton, Francis Paul Ripp,
      Megan Carmack, Tyra Lindsey, Ashby Pate, Tommy Gallion, Bryon Mathews, Regions
      Bank, Mabel Amos Trust, Matt Simpson.'
