  alabama-black-hole:
    brief: 'THE CONFLICT:

      - Tom Albritton holds dual roles as Executive Director of the Alabama Ethics
      Commission and trustee for the Mabel Amos Trust.

      - Plaintiffs in civil litigation (Lawrence v. State) involving Attorney General
