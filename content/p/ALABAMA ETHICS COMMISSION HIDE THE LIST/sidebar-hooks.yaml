      - Article 1 notes the Justia case "Lawrence v. State" shows AG Marshall''s office
      got involved in civil litigation regarding the trust.

      - Article 1 alleges Alabama Bar originally signed off on Albritton’s actions
      as Trustee.

      - Article 1 cites a pattern: While denying legitimate ethics complaints to citizens,
      Albritton approved funds for "Good ole Boys" connected to the trust.

      - Article 1 states Governor Kay Ivey and most Alabama news organizations have
      remained silent on the list.


      THE DISCOVERY:

      - Article 2 confirms AG, State Representatives, and Local Senators are aware
      of Albritton’s unethical handling of the Mabel Amos Trust.

      - Article 2 states Alabama Bar Association has "dropped any complaints" against
      Albritton regarding the trust.

      - Article 2 notes Albritton remains in office with a salary of over $100,000
      while being the central target of allegations.

      - Article 2 confirms Albritton actively lobbies against changes to Alabama Ethics
      Rules despite his allegations of violating them.

      - Article 2 highlights legal action is ongoing involving the trust, validating
      the "legal battle" implied in Article 1’s demand for public records.

      - Article 2 identifies Representative Matt Simpson and HB-277 as the political
      vehicle attempting to address the ethics gap.


      THE PIVOT:

      - Article 2 validates the conflict of interest raised in Article 1 by exposing
      Albritton using his Ethics Director role to insulate himself while violating
      ethics as Trustee.

      - Article 1’s demand that AG investigate complaints Albritton dismissed while
      he was Ethics Director is supported by Article 2’s evidence that the Bar Association
      refused to acknowledge his wrongdoing.

      - The "smoking gun" link is Article 2’s confirmation that Albritton lobbies
      against rule changes while holding the exact power to investigate them, proving
      the cover-up implied in Article 1.

      - Both articles connect the "Alabama Bar" (silence/sealing) directly to Albritton’s
      continued employment and lack of accountability.


      KEY ENTITIES:

      - Tom Albritton (Executive Director, Alabama Ethics Commission; Trustee, Mabel
      Amos)

      - Mabel Amos Trust

      - Regions Bank (cited in Justia snippet/oversight)

      - Steve Marshall (Attorney General of Alabama - former or oversight capacity)

      - Amanda Priest (AG Communications Director - listed contact 334-322-5694)

      - Cameron Mixon (AG Communications - listed contact 334-322-5694)

      - Alabama Bar Association (Signed off, dropped complaints)

      - Representative Matt Simpson (Proponent of HB-277)

      - HB-277 (Bill cited in Article 2 for ethics reforms)'
