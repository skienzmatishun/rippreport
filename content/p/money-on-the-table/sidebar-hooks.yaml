hooks:
  fairhope-waterfront:
    brief: |-
      **1. THE CONFLICT**
      *   Fairhope City Council delays action on $6.2 million BP-funded Waterfront Project after 3.5 years of planning.
      *   During work session, Council took no immediate action; next meeting scheduled May 11th creates further delay.
      *   Councilman Jack Burrell, Robert Brown, Kevin Boone referred to as "3 Bs" purchased $2.65 million recreation land without public participation, leased for $9,000/year; leased property costs taxpayers while they "digg hole so deep."
      *   Council refused Mayor Dane Haygood's proposal to raise lodging tax (6% to 7%) and add ½ cent gas tax to fund $65,000 marketing plan.
      *   Council rejected proposal to make annual donations ($35k BCEDA, $21k Downtown Business Assoc) into appropriations.
      *   Council approved raising their own salaries and full family insurance for entire council, approximately $125,000 total.
      *   Council spent over half a million on the Clock Property (1,000 sq ft).

      **2. THE DISCOVERY**
      *   Goodwyn Mills & Cawood held press conference at Fairhope City Hall directly responding to political accusations from Council ("CATALYST").
      *   Goodwyn Mills & Cawood confirmed the $6.2 million grant is from BP, Fairhope is only municipality on Eastern Shores to be awarded this specific grant.
      *   Confirms project is first major Fairhope Waterfront project in 50 years.
      *   Confirms Council previously approved $500,000 funding for engineering/conceptual plans; Council now tries to characterize it as Mayor's initiative.
      *   Goodwyn Mills & Cawood confirmed 493 people filled out questionnaires and dozens attended meetings to support project, invalidating "Mayor's Plan" claims.

      **3. THE PIVOT**
      *   Goodwyn Mills & Cawood press conference validates Article 1’s claim that the project is community-driven (493 questionnaires) not just Mayor or Council driven.
      *   Goodwyn Mills & Cawood expose the "CATALYST" narrative is being used by politicians to turn political opinion into a tool for upcoming elections.
      *   Confirms Council has run "rouge" for 4 years by delaying the $6.2 million grant to tank project rather than help community development.
      *   Goodwyn Mills & Cawood confirm the "CATALYST" council is politicizing the project despite previous approval of $500k for engineering.

      **4. KEY ENTITIES**
      *   Dane Haygood (Mayor)
      *   Jack Burrell
      *   Robert Brown
      *   Kevin Boone
      *   Lee Lawson (BCEDA Director/Brother in law to Mayor)
      *   Baldwin County Economic Development Alliance (BCEDA)
      *   Goodwyn Mills & Cawood
    generated_at: '2026-03-20T01:54:23.625303Z'
    text: The "3 Bs" on the City Council claim they are protecting your tax dollars while they let a $6.2 million grant rot on the vine. These engineers just caught them in a massive lie by proving the public demands this project that Burrell and his cronies are burying for political gain.
  fairhope-sold-to-the-highest-bidder:
    brief: |-
      THE CONFLICT:
      Fairhope City Council, labeled "CATALYST," delayed and blocked the $6.2 million Waterfront Project after 3+ years despite presentations.
      Council refused a Mayor’s $65,000 marketing plan for tourism/business recovery funded by lodging/gas tax increases.
      Council rejected Mayor’s plan to finance $3,000,000 school tax without raising taxes.
      Council members Burrell, Brown, and Boone ("3 Bs") allegedly purchased $2.65 million in recreation land with no public participation, leased it for $9,000/year.
      Mayor Dane Haygood is identified as brother-in-law to Lee Lawson (BCEDA executive).
      Council ignored Cory Martin’s public pleas for financial transparency on the recreation land purchase.

      THE DISCOVERY:
      Widget confirms the "recreation land" purchase involves 113 acres closing in November which drains all capital improvement funds.
      Mayor Wilson states the purchase prevents adding four ballparks for up to ten years due to lack of funds.
      Confirms "5 accounts drained" for the purchase; complex sat idle years before being built as sub-standard.
      Council used conservative revenue projections despite FY2019 sales tax coming in higher than estimated.
      Mayor refused a city administrator position; Council refuses to hire one specifically to spite the Mayor.

      THE PIVOT:
      The $2.65 million recreation land deal is the primary "smoking gun" connecting both reports:
      Article 1 flags it as a corrupt, non-public deal by "3 Bs."
      Article 2 provides the financial proof: it drains capital funds needed for urgent ballparks and repairs.
      Both articles accuse the Council of prioritizing personal/political connections (Lawson, BCEDA) over city infrastructure and revenue realities.
      Identity Conflict: Article 1 names Mayor Dane Haygood; Widget quotes Mayor Wilson. This requires verification in further research.

      KEY ENTITIES:
      Jack Burrell (Councilman)
      Kevin Boone (Councilman)
      Robert Brown (Councilman)
      Mayor Dane Haygood
      Karen Wilson (Cited as Mayor in quotes)
      Lee Lawson (BCEDA Executive, alleged H.H. brother-in-law)
      Baldwin County Economic Development Alliance (BCEDA)
      Fairhope City Council
      Fly Creek Apartments
