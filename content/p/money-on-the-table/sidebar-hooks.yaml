  nail-in-the-coffin:
    brief: |-
      1 THE CONFLICT:
      - Fairhope City Council delayed permitting for the $6.2 million Waterfront Project after a 48-minute presentation detailing planning and public participation.
      - Mayor Dane Haygood proposed funding a $65,000 marketing plan to aid local businesses and tourism via a lodging tax increase (6% to 7%) and half-cent gas tax; Council refused.
