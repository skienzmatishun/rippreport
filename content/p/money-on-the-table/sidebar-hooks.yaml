  fairhope-state-of-the-city:
    brief: |-
      THE CONFLICT:
      - Fairhope City Council (CATALYST) opposed Mayor Karin Wilson’s $65,000 marketing/business plan to raise lodging tax from 6% to 7%.
      - Council delayed Fairhope Waterfront Project ($6.2 million) for 3+ years; took no immediate action after 48-minute presentation in work session (next meeting listed as May 11th).
      - Jack Burrell, Robert Brown, and Kevin Boone collectively referred to as the "3B’s" secretly purchased 2.65 million acres of recreation land without public participation or budget allocation.
      - Council rejected Mayor's proposal to fund Hatch program/BCEDA payments through appropriations.
      - Quail Creek Golf Course closed for health reasons; Burrell publicly blamed Mayor Wilson without explaining Council inaction.

      THE DISCOVERY:
      - Appraisal for disputed farmland property was approved June 28, 2019 (attributed to Councilmen Burrell, Brown, Boone).
      - City of Fairhope paid full $2.65 million purchase price for the farmland in December 2019 using tax dollars not budgeted/allocated.
      - In January 2020 (within 60 days of purchase), City Council declared the same property "surplus and not needed" under Ordinance #6.
      - Land leased to outside entity for $9,000/year with four one-year renewal options rather than developed into public recreation.
      - Lack of funds allocated for this deal correlates to lack of budgeted repairs for K1 Center and City Hall roof.

      THE PIVOT:
      - Article 2 provides the timeline proving Burrell, Brown, and Boone "made up their minds" on land use by June 2019 before the official "appraisal."
      - Article 2 confirms Article 1's claim that funds for this land were not in the budget or allocated for recreation.
      - Highlights conflict between Council's stance on "economic development" (rejecting Mayor’s $65k plan) vs purchasing surplus land ($2.65M) that generates only $9,000/year revenue immediately after acquisition.

      KEY ENTITIES:
      - Karin Wilson (Mayor)
      - Jack Burrell
      - Robert Brown
      - Kevin Boone
      - Lee Lawson (Head of BCEDA)
      - Baldwin County Economic Development Alliance (BCEDA)
      - Eastern Shore Chamber of Commerce
      - K1 Center
      - Quail Creek Golf Course
