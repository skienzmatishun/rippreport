      - Council spent millions on K-1 Center and Nix Center ($2.5 million) but denied funding for necessary repairs or roofs, leaving critical infrastructure in disrepair.

      2 THE DISCOVERY:
      - Article 2 exposes Agenda Item 19, authorizing the $2,650,000.00 purchase of 114 acres at 8875 County Road 32.
      - The purchase was funded by stripping funds from Investment CD ($1,065,146.07), Prepay Debt Reserve ($700,285.37), and Impact Fees Recreation ($884,568.56).
      - This purchase occurred without a FY2020 budget approval; the Council used Agenda Item 20 to extend the previous fiscal year solely to accommodate this spending.
      - Article 2 confirms County Road 32 property is vacant and will be utilized for a future plan not yet developed.

      3 THE PIVOT:
      - Article 2 confirms Councilman Burrell's history of using reserves and impact fees to acquire vacant land for "good ole boys" (Soccer Fields, Triangle Park), validating Article 1’s accusation of financial mismanagement.
      - Article 2 proves the Council bypassed standard fiscal procedure (no public budget approval), substantiating the "corruption" claims made in Article 1 regarding their financial autonomy.
      - Article 2 details the specific mechanism (using impact fees/reserves) that connects Article 1’s general accusation of “muddy waters” to concrete fiscal evidence.

      4 KEY ENTITIES:
      - Dane Haygood (Mayor)
      - Jack Burrell (Council President/Councilman)
      - Robert Brown
      - Kevin Boone
      - Lee Lawson (BCEDA Director, Brother-in-law to Mayor Haygood)
