      THE DISCOVERY:

      *   Lee Lawson of the Baldwin County Economic Development Alliance claims the
      South Alabama Mega Site is the only certified mega site left in the entire state
      of Alabama, as all others have landed businesses.


      THE PIVOT:

      *   Article 2 proves that the county''s position is "dead last" because the
      regional economic development alliance asserts the Mega-site is now the sole
      remaining opportunity, validating the failure described in Article 1 regarding
      the lack of sales plans or visibility (no sign).


