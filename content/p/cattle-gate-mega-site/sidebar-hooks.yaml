  all-smoke-and-mirrors:
    brief: 'THE CONFLICT

      *   Baldwin County Mega-site development status update in May last year showed
      no progress.

      *   The Baldwin County Economic Development Alliance failed to find a tenant
      for the Mega-site.

      *   The County Commission skimmed $5 million from schools using the penny tax.

      *   The Mega-site is undeveloped, marked only by a cattle gate and palm trees.


      THE DISCOVERY

      *   The Mega-site represents a significant lost opportunity cost, estimated
      over $50 million tied up in vacant land.

      *   County officials rely on "promises and projections" rather than hard sales
      statistics for the $32 million project.

      *   The Fairhope Airport Authority uses "smoke and mirrors" to maintain control
      over land and deflect complaints against board members.


      THE PIVOT

      *   Article 2 establishes a pattern of systemic deceit by comparing the Mega-site
      failures to the manipulation tactics used by the Fairhope Airport Authority.

      *   The Airport Authority''s use of legal defense funded by tax dollars to discredit
      whistleblowers serves as proof that the County Commission/Alliance are engaged
