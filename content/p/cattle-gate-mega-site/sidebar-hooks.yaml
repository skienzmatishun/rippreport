  economic-development-baldwin-county-style:
    brief: 'THE CONFLICT

      *   Baldwin County spent $32 million on 2300 usable acres for the Mega-site
      in 2012.

      *   Commissioners failed to generate interest or find a tenant for the site.

      *   County employees helped pay the $32 million price tag.


      THE DISCOVERY

      *   The $32 million expenditure in 2012 is now estimated to be worth $50 million
      today, representing lost opportunity.

      *   Commissioners skimmed $5 million from a penny school tax for county infrastructure
      projects without public vote.

      *   Current commissioners claim greater oversight regarding the Mega-site but
      it was not approved by the commission in 2017.


      THE PIVOT

      *   Article 2 provides financial context and details on how the money was handled
      (employees paying, skimming taxes), linking the political actions of the commissioners
      directly to the failure and subsequent devaluation of the Mega-site project
      described in Article 1.


