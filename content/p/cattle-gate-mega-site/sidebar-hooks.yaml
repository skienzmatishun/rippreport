  paradise-lost-ii:
    brief: 'THE CONFLICT

      Baldwin County commissioners failed to generate interest in the Mega-site development.
      The Economic Development Alliance failed to find a tenant for the mega-site.
      All southeast mega-sites have been sold. The site currently has no sign, only
      a cattle gate and palm trees.


      THE DISCOVERY

      Urban planning principles dictate that uncontrolled growth risks diminishing
      quality of life. New developments outside city limits lack authority from local
      planning departments. Fairhope was sued by the State of Alabama for failing
      to properly manage its sewerage system causing costly spills.


      THE PIVOT

      Chris Warner''s article provides an urban planning framework demonstrating why
      the Mega-site situation is problematic: poor management and planning lead to
      sprawl and diminished quality of life, directly linking to the lack of zoning
      authority that allowed the Mega-site to remain undeveloped or poorly marketed
      without proper oversight.


