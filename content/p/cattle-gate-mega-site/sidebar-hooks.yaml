      *   Commissioners faced criticism during mid-term elections for failure to generate
      interest or sales activity on the Mega-site.

      *   Current status: No sign or development visible at the property ("cattle
      gate and a few palm trees").


      THE DISCOVERY

      *   A specific, publicly owned parcel of land within Baldwin County is being
