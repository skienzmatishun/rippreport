      mega-site benefiting only sellers.

      *   Fairhope Councilman Burrell flies private jets for the municipal judge and
      oversees bids for the Judge/partner on the Airport Board.

      *   Fairhope Councilman Brown received a several hundred thousand dollar contract
      with board approval.

      *   The Attorney General used PAC funds to get elected, while the Ethics Executive
      Director (Tom Albritton) is skimming trust.

      *   Sheriff Hoss Mack was appointed by Pittman to eliminate competition and
      maintains a monopoly on the job.


      THE DISCOVERY:

      *   The systemic corruption in Baldwin County is amplified because the States
      reputation for being corrupt bolsters the county''s corruption.

      *   Government agencies designed for accountability (Ethics Commission, Attorney
      General) are failing due to self-dealing by officials like Tom Albritton.

      *   Fairhope council members, attorneys, and judges are acting as "good ole
      boys" supported by developers.


      THE PIVOT:

      *   Article 2 highlights the environmental assault on the Bay (sewer spills,
      coal ash potential, toll politics) as a parallel reality to the political corruption
      detailed in Article 1.

      *   The systemic failure described in Article 2—where politicians favor projects
      over the environment and accountability is ignored—is the foundation that allows
      the specific financial corruption transactions outlined in Article 1 (e.g.,
      Pittman''s contracts, councilman deals) to persist without consequence.


