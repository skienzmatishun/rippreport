      *   Tripp Pittman

      *   BP funds

      *   Baldwin County Commission

      *   Chris Elliott

      *   Fairhope Councilman Burrell

      *   Fairhope Councilman Brown

      *   Councilman Boone

      *   Senator Chris Elliott

      *   Sheriff Hoss Mack

      *   Tom Albritton (Ethics Executive Director)'
