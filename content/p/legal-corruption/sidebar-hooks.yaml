  a-decade-of-corruption:
    brief: 'THE CONFLICT

      *   Former Baldwin County State Senator Tripp Pittman was appointed trustee
      of BP funds and awarded himself $750,000.00 in contracts from Fairhope.

      *   Baldwin County Commission purchased a mega-site benefiting only sellers
      (CATALYST).

      *   Various officials (Pittman, Kant, Burrell, Brown, Boone, Robinson, Conyers)
      engaged in deals without accountability.


      THE DISCOVERY

      *   State Senator Tripp Pittman and Fairhope Mayor Tim Kant used Fairhope Staff
      (Greg Mims, Sherry Sullivan, Jennifer Fidler) to secure a $636,000 bid for BP
      Boom work.

      *   Pittman was initially told by the County Commission not to proceed with
      the bid on May 8th, 2010, but subsequently supplied a second proposal ("Oil
      Recovery").

      *   The Fairhope City Council awarded the contract to Pittman Tractor on June
      4th, 2010, for $372,165.90 for "COMPLETED" boom work.

      *   Pittman generated approximately $750,000 of BP money over ten years through
      political maneuvering.

      *   Pittman legislatively passed Sheriff qualifications that enabled the Baldwin
      County Sheriff to be re-elected twice without opposition.


      THE PIVOT

      *   Article 2 provides specific financial and timeline details (dates, exact
      contract amounts, names of staff) that substantiate the general claims in Article
      1 regarding corruption and special interests.

      *   Article 2 proves *how* Pittman obtained the BP funds via a fraudulent contract
      process ($372,165.90 check) and shows the explicit collusion between Pittman,
      Kant, and Fairhope officials to secure the deal.


