    text: The Council loves to ignore the 493 citizens who actually demanded a better waterfront for our community. They have a history of backroom deals, like blowing $2.65 million on farmland only to lease it back for pennies while the city’s $6.2 million BP grant hangs in the balance.
  howling-rains-passing-gas:
    brief: |-
      THE CONFLICT:
