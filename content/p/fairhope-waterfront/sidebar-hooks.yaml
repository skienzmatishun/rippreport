         - Leslie Callies Hollis explicitly states Robert Brown has a pending Attorney General Complaint and an Ethics Complaint.
         - Hollis identifies "Jack and Boone have real competition" for office, while noting NO ONE HAS SIGNED UP TO RUN AGAINST ROBERT.

      2. THE DISCOVERY:
         - Leslie Callies Hollis accuses Council of using position for a "PR campaign of Robert Equals Good and Karin Equals Bad."
