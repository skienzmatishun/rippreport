hooks:
  money-on-the-table:
    brief: |-
      **THE CONFLICT**
      - Fairhope City Council approved initial $500,000 engineering/conceptual plans for Waterfront project.
      - Project is $6.2 million BP grant awarded to Fairhope (first major waterfront project in 50 years).
      - Mayor Goodwyn Mills & Cawood claims proposal was two-years old, backed by 493 questionnaires and numerous community meetings.
      - Council claims Mayor is making it his "plan" when citizen input drives it; Council claims citizens are unfamiliar with proposal.
      - Mayor holds press conference to dispel "political agenda" rumors on social media.
      - Council spent $2,650,000 for recreation property without public participation.
      - Mayor accuses CATALYST Council of using Waterfront project as a political tool for upcoming election.

      **THE DISCOVERY**
      - Widget article confirms Mayor Goodwyn Mills presented detailed 48-minute Waterfront proposal to Council.
      - Council "took no immediate action on the plan," delaying permitting phase despite timing sensitivity.
      - Upcoming Council meeting scheduled for May 11th; article labels this "another delay."
      - Mayor proposed $65,000 marketing plan to restore business and tourism; Council refused.
      - Mayor proposed tax increases (Lodging 6% to 7%, Gas 1/2 cent) to finance marketing; Council rejected.
      - Council approved raising salaries and full family insurance for the entire body (approx $125,000) instead.
      - Councilman Burrell, Brown and Boone cited as purchasing 2.65 million in recreation land without public participation; leased back for $9,000/year.
      - Baldwin County Economic Development Alliance (BCEDA) run by Lee Lawson, identified as Mayor Dane Haygood’s brother-in-law.
      - Council refuses to support Fairhope businesses but supports BCEDA payroll (likely use of funds).

      **THE PIVOT**
      - Article 2 proves Council inaction is financially intentional; refusal to approve $65k marketing plan directly leaves Waterfront permit timeline "on the table."
      - Article 2 confirms Council prioritizes internal compensation (~$125k) over economic development (Mayor’s proposal).
      - Article 2 connects specific individuals (Burrell, Brown, Boone) to "CATALYST" label and $2.65M land purchase without public participation (Article 1 claim of rogue behavior).
      - Article 2 confirms political link: BCEDA Director Lee Lawson is Brother-in-law to Mayor Dane Haygood, validating Article 1's claim of systemic "CATALYST" council behavior.
      - Article 2 confirms Council rejected tax proposals Mayor suggested for business recovery, leaving money "on the table."

      **KEY ENTITIES**
      - Mayor Goodwyn Mills & Cawood
      - Councilman Jack Burrell
      - Councilman Robert Brown
      - Councilman Kevin Boone
      - Lee Lawson (BCEDA)
      - Mayor Dane Haygood
      - Baldwin County Economic Development Alliance (BCEDA)
      - Fairhope Waterfront Project / Goodwyn Pier
    generated_at: '2026-03-19T12:07:44.260319Z'
    text: The CATALYST Council claims they are protecting Fairhope while they intentionally stall the $6.2 million Waterfront project. Burrell, Brown, and Boone rejected every plan for business recovery just to hand themselves a massive $125,000 pay raise and gold-plated family insurance.
