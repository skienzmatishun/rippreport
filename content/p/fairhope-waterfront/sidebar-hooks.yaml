      - Current administration (Sullivan/Burrell) accused of undermining project, using public input process for political agenda instead of community plan.
      - Allegations: Council wants to eliminate/modify aspects of design while threatening public employees (no "CSB tattoos" comment).

      THE DISCOVERY:
      - Confirms Mayor Sullivan and Jack Burrell are personally opposing the GMC/Scott Hutchinson engineering proposals.
      - Specific objections by Sullivan and Burrell:
        - Oppose new sand beach north of pier.
        - Oppose fill dirt for pedestrian ramps in front of bluffs.
        - Prefer preserving parking around fountain, more funds to North Beach/Magnolia Beach instead of waterfront changes.
      - Design friction: GMC proposal involves walking length of two football fields to pier from North Beach picnic area parking.
      - Administration procedural shift: 2-week written comment period proposed for further comments instead of public meetings.
      - Howling Rains (journalist): Admitted being 6 weeks behind on project info; admits no meetings attended regarding the plan.

      THE PIVOT:
      - Article 2 identifies specific decision-makers (Sullivan/Burrell) responsible for the "Mayor’s plan" narrative discussed in Article 1.
      - Confirms the external engineering firm (GMC/Scott Hutchinson) mentioned in Article 1 is directly targeted by Council President and Mayor.
      - Proves political conflict: Rains and "New Mayors" align against the plan supported by Mayor Wilson’s legacy and citizen surveys cited in Article 1.
      - Links the "tanking a $6.2M grant" accusation in Article 1 to specific design objections by Sullivan/Burrell in Article 2.

      KEY ENTITIES:
      - Jack Burrell (Council President)
      - Mayor Sullivan
      - Mayor Wilson (Former)
      - Howling Rains
      - GMC / Scott Hutchinson
      - BP
