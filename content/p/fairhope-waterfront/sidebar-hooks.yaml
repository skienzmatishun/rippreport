      THE DISCOVERY:
      - Article 2 confirms $6,200,000 BP grant award for "Fairhope Working Waterfront and Green Space Project" to promote tourism/fishing.
      - Article 2 details past Council action: elected against public outcry to purchase 2.65 million worth of farmland for recreation during budget process without development funding.
      - Article 2 details past Council action: Within weeks of purchase, deemed property "surplus" and leased it for farming at $9,000/year (did not pay interest).
      - Article 2 confirms City debt paid in full June 2019; credits Mayor and staff, not CATALYST Council.
      - Article 2 notes employee morale is higher; attributes financial success to Mayor and Superintendent staff, not Council.

      THE PIVOT:
      - Article 2 proves CATALYST Council precedent for opaque financial decisions (buying 2.65M land, then leasing as surplus) matches Article 1's accusation of "no public participation."
      - The $2.65M farmland lease scandal in Article 2 provides factual evidence supporting Article 1's claim the Council is playing "rouge" to hide financial mismanagement during the Waterfront Grant push.
      - Links political obstruction (blocking Mayor in Article 2) to their ability to mismanage the BP grant funds mentioned in both texts.

      KEY ENTITIES:
      - CATALYST City Council (Fairhope)
      - Mayor of Fairhope
      - Goodwyn Mills & Cawood
      - BP (Grantor)
      - Lagniappe
      - RippReport
      - Fairhope City Hall
