  letter-to-the-alabama-attorney-general:
    brief: |-
      THE CONFLICT:
      - The Ripp Report (Francis Paul Ripp) publicly accuses Alabama Attorney General Steve Marshall of using political buzzwords to sidetrack accountability and refusing to investigate real corruption.
      - Specific Incident: The Ripp Report filed a formal complaint regarding Ethics Executive Director Tom Albritton.
      - AG Response: Marshall’s office responded to the Ripp Report with a letter stating they "cannot, however, disclose to you any decision about your complaint," and the letter was not signed by name.
      - Prior History: Ripp alleges Marshall’s office ignored a separate complaint personally delivered regarding a Fairhope Councilman using his position to enrich himself.

      THE DISCOVERY:
      - This letter (Widget Article) is the original submission from Francis Paul Ripp to Steve Marshall’s office.
      - Provides specific evidence submitted for the Albritton investigation:
          - Documents include a Lagniappe article titled “SELF-DEALING,” an Ethics Complaint, an Alabama Bar Complaint, and a Writ of Mandamus.
      - Critical Detail Submitted: Ripp notes Albritton is one of three trustees and an attorney for the Mabel Amos Memorial Fund.
      - Specific Evidence: Ripp reports Albritton’s daughters received $105,000 in scholarships from the Mabel Amos Memorial Fund (awarded by University of Texas) while he serves as a trustee for the fund.

      THE PIVOT:
      - Article 1 uses Marshall’s vague "we cannot disclose" response as proof of obstruction and lack of accountability.
      - Article 2 serves as the "smoking gun" that proves the Ripp Report actually escalated a substantive financial conflict to Marshall rather than making empty noise.
      - By linking Albritton’s daughter scholarships ($105,000) directly to the complaint Marshall supposedly ignored, Article 2 proves Ripp’s case is specific and actionable, making Article 1's claim of "blatant corruption" substantiated by actual documents attached in this letter.

      KEY ENTITIES:
      - Steve Marshall (Alabama Attorney General)
      - Francis Paul Ripp (Founder, The Ripp Report)
      - Tom Albritton (Director of Alabama Ethics Commission / Attorney General's office liaison)
      - Mabel Amos Memorial Fund (Trust fund in question regarding Albritton’s daughter scholarships)
      - Fairhope Councilman (Subject of prior ignored complaint mentioned in letter)
      - Lagniappe Mobile (Media outlet whose “Self-Dealing” article was submitted as evidence)
      - University of Texas (Recipient institution for Albritton daughters’ scholarships)
