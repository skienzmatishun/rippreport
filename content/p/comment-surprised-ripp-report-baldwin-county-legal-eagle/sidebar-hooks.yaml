      into his financial interests.

      *   Boone''s conflicts with Angelo Corte and Preble-Rish date back prior to
      his election as Councilman/Mayor.

      *   Specific issues requiring Mr. Boone to recuse himself include Fly Creek
      Apartments, the extension of its sunset clause, and matters related to Angelo
      Corte or Preble-Rish.


      **THE PIVOT:**

      *   Article 1 asserts that Boone’s interests were never listed; Article 2 provides
      specific entities (Angelo Corte, Preble-Rish) and proves these conflicts predate
      his political service, transforming the general allegation into a verifiable
      pattern of non-disclosure.

      *   While Article 1 vaguely mentions council negligence, Article 2 connects
      current conflicted voting directly to active municipal decisions concerning
      Fly Creek Apartments.


