      and Judge Robert Wilters conspired to withhold vital evidence violating Brady
      vs. Maryland (1963).

      - Lawrence’s supporters claim officials knew he was innocent despite withheld
      reports.


      THE DISCOVERY:

      - Lagniappe/Ripp Report confirms second autopsy report was never mentioned during
      trial or provided to defense.

      - Correspondence proves officials knew: Alabama Department of Forensic Sciences
      letter dated May 17, 2004 delivered results to Whetstone.

      - Hoss Mack Jr., his father, and David Whetstone were CC''d on the May 17, 2004
      results letter from Alabama Department of Forensic Sciences.

      - Wilters signed the order allowing autopsy; Whetstone admitted if results suggested
      another outcome, Huntley "certainly should have received it."

      - Officials publicly claim ignorance now: Whetstone stated "first I’ve heard
      of this"; Mack downplayed role.


      THE PIVOT:

      - Article 2 proves the "vital information" claimed to be withheld (May 14, 2003
      autopsy) was directly authorized by and sent to Wilters and Mack.

      - Documentary evidence contradicts officials’ current claims of ignorance regarding
      autopsy authorization.

      - Establishes Wilters, Whetstone, and Mack directly controlled the chain of
      custody for suppressed evidence.

      - Confirms suppression occurred exactly as described in Article 1’s Brady violation
      allegations, providing dates (May 2003/2004) and names for prosecution or exoneration
      efforts.


      KEY ENTITIES:

      - Murray Bubba Lawrence (Defendant)

      - Hoss Mack Jr. (Sheriff / Official)

      - Hoss Mack Sr. (Authorized autopsy authority)

      - David Whetstone (Prosecutor / Current official)

