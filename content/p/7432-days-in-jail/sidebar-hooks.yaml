  justice-denied-a-wrongful-conviction-buried-by-power-and-politics:
    brief: 'THE CONFLICT:

      - Murray Bubba Lawrence Jr. incarcerated for 7,432 days (approx. 20 years).

      - Convicted of capital murder for killing Brandon Hastings in 2005 trial.

      - No physical evidence (no DNA, fingerprints, or murder weapon) linking Lawrence
      to crime scene.

      - Authorities accused: Baldwin County Sheriff Hoss Mack, Prosecutor David Whetstone,
      Judge Robert Wilters.

      - Claim of conspiracy to withhold vital information from defense violating Brady
      vs. Maryland (1963 SC ruling).


      THE DISCOVERY:

      - Innocence Project findings confirm suppression of key exculpatory evidence
      during trial.

      - Autopsy shows victim Brandon Hastings was strangled in Mississippi; prosecution
      falsely claimed he was shot in Alabama.

      - Real killer Jarius McNeil confessed but shifted blame to Lawrence after being
      threatened with death penalty.

      - Prosecution offered plea deal to Jarius McNeil despite knowing testimony was
      unreliable; District Attorney admitted this in court.

      - Alibi witnesses never called; forensic evidence ignored; Lawrence’s appointed
      lawyer told him not to testify.


      THE PIVOT:

      - Article 2 identifies the specific officials from Article 1 who held control
      during conviction, proving they were "responsible" rather than peripheral.

      - Connects current/later positions of officials to their actions in the 2005
      case (e.g., Robert Wilters as Judge vs. now DA).

      - Confirms Hoss Mack and Anthony Lowery directly orchestrated investigation
      and evidence handling at time of conviction.


      KEY ENTITIES:

      - Murray Bubba Lawrence Jr.

      - Jarius McNeil (Real Killer)

      - Brandon Hastings (Victim)

      - Robert Wilters (2005 Judge, Now District Attorney)

      - Huey ''Hoss'' Mack (Former Sheriff, Lead Investigator 2005)

      - Anthony Lowery (Chief Investigator 2005, Current Sheriff)

      - David Whetstone (2005 District Attorney, Retired)

      - Baldwin County Sheriff’s Office (BCSO)

      - Innocence Project'
