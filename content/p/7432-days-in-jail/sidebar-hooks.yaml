hooks:
  justice-denied-a-wrongful-conviction-buried-by-power-and-politics-repost:
    brief: '**THE CONFLICT**

      *   **Event:** 2005 Capital Murder Trial in Baldwin County for murder of Brandon
      Hastings.

      *   **Defendant:** Murray Bubba Lawrence Jr.

      *   **Result:** Convicted of a crime he did not commit; incarcerated for 7432
      days (over 20 years).

      *   **Alleged Wrongdoing:** Prosecution and defense team withheld vital exculpatory
      information (Brady vs. Maryland violation).

      *   **Key Accused:** Sheriff Hoss Mack, Prosecutor David Whetstone, Judge Robert
      Wilters.


      **THE DISCOVERY**

      *   **Evidence Suppression:** Court records and Innocence Project findings confirm
      key exculpatory evidence was withheld during trial.

      *   **Autopsy Discrepancy:** State claimed victim was shot in Alabama; autopsy
      proved Brandon Hastings was strangled in Mississippi.

      *   **Witness Coercion:** Huey “Hoss” Mack allegedly coerced real killer Jarius
      McNeil into shifting blame onto Murray Lawrence.

      *   **Plea Deal:** David Whetstone admitted in court he made a deal with McNeil
      for testimony, acknowledging the testimony was unreliable.

      *   **Defense Failure:** Murray’s court-appointed lawyer told him not to testify,
      preventing him from speaking in his own defense.


      **THE PIVOT**

      *   **Power Structure:** The second article reveals the same four officials
      now hold positions controlling post-conviction relief and current investigations.

      *   **Robert Wilters:** Former 2005 trial judge; now Baldwin County District
      Attorney (since ~2015); rejected a Rule 32 filing in 2023.

      *   **Anthony Lowery:** Former Chief Investigator; now Baldwin County Sheriff
      (appointed by Kay Ivey); controls current law enforcement operations.

      *   **Huey “Hoss” Mack:** Former Lead Investigator/Captain; now holding a newly
      appointed state-level position after retiring as Sheriff.

      *   **David Whetstone:** Former District Attorney who built the case; now retired
      but architect of prosecution strategy.


      **KEY ENTITIES**

      *   Murray Bubba Lawrence Jr

      *   Brandon Hastings (Victim)

      *   Jarius McNeil (Witness/Actual Killer)

      *   Huey “Hoss” Mack

      *   David Whetstone

      *   Robert Wilters

      *   Anthony Lowery

      *   Baldwin County Sheriff’s Office (BCSO)

      *   Baldwin County District Attorney''s Office'
