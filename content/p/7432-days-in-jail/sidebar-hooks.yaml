  no-justice:
    brief: 'THE CONFLICT:

      - Murray Bubba Lawrence Jr convicted of murder in 2003 (Baldwin County).

      - Served 7432 days in jail for a crime he allegedly did not commit.

      - Accusers allege conspiracy by three officials: Sheriff Hoss Mack, Prosecutor
      David Whetstone, and Judge Robert Wilters.

      - Accusation centers on withholding vital information that could have proven
      innocence.


      THE DISCOVERY:

      - A second autopsy report on victim Brandon Hastings was located 18 years post-conviction.

      - Report is linked to the Rule 32 petition filed by Assistant DA Haygood Kristi
      Deason.

      - Cause of death stated as suffocation, not gunshot (opposite of prosecution''s
      claim).

      - Report was ordered by DA Robert Wilters and signed by Judge Wilters while
      presiding over the case.

      - State admits it was a violation of discovery order; claim is that it was "harmless
      error."


      THE PIVOT:

      - Article 2 provides the physical proof for Article 1’s allegation of evidence
      suppression.

      - Hiding the autopsy report is "vital information" referenced in Article 1 under
      Brady vs. Maryland rules.

      - The autopsy proves Lawrence’s guilt narrative (gunshot murder) was fabricated
      based on missing evidence.


      KEY ENTITIES:

      - Murray Bubba Lawrence Jr (Convicted Defendant)

      - Robert Wilters (Current DA, Ex-Judge in original case)

      - Hoss Mack (Current Sheriff, Ex-Lead Investigator)

      - David Whetstone (Ex-Prosecutor)

      - Brandon Hastings (Victim)

      - Jarius McNeil (Co-conspirator witness)

      - Haygood Kristi Deason (Assistant DA)

      - Scott P Taylor (Current Circuit Court Judge for Rule 32 petition)'
