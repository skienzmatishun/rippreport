  bcso-how-to-become-sheriff:
    brief: 'THE CONFLICT

      - Murray Bubba Lawrence Jr has spent 7432 days in jail for a murder he did not
      commit.

      - Victim was Brandon Hastings; killer identified as Jarius McNeal.

      - Trial occurred in Baldwin County; Lawrence convicted based on coerced testimony
      from McNeal.

      - Prosecution and defense relied heavily on Sheriff Mack, Prosecutor David Whetstone,
      and Judge Robert Wilters.


      THE DISCOVERY

      - Second article confirms Mississippi autopsy was conducted; witness list: Dean
      McGowan, John Stewart, Tony Fuqua.

      - Cause of death listed as "asphyxiation by strangulation," not gunshot.

      - Exculpatory evidence from original autopsy found in 2023.

      - Prosecutor and Sheriff had body exhumed for a second autopsy but withheld
      Mississippi autopsy findings from defense.


      THE PIVOT

      - Article 2 validates Article 1''s claim of Brady vs Maryland violation by confirming
      3 officials knew about withheld evidence.

      - In a Lagniappe cover story titled "Digging Deep," Sheriff Mack, DA Whetstone,
      and Judge Wilters acknowledged they did not give the evidence to defense.

      - Prosecution shifted from original strangulation finding (no weapon required)
      to "gunshot" theory without producing a murder weapon or ballistics.

      - McNeal told prosecutor he would get death sentence unless he named an accomplice;
      he implicated Murray Bubba Lawrence Jr.


      KEY ENTITIES

      - Murray Bubba Lawrence Jr

      - Hoss Mack (Baldwin County Sheriff)

      - David Whetstone (Prosecutor/District Attorney)

      - Robert Wilters (Judge/District Attorney/Article Reference: currently serving
      role mentioned in text)

      - Jarius McNeal (Victim''s killer/Co-conspirator against Lawrence Jr)

      - Anthony Lowery (Investigator for Mack; associated with BCSO)

      - Dean McGowan (Initial Investigation/Co-conspirator mention)

      - Dr. Paul McGarry (Forensic pathologist who performed autopsy)'
