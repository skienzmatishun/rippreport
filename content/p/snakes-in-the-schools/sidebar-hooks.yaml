      *   Eddie Tyler is the Baldwin County Superintendent who is reportedly working
      to be fired and using the schools for his political agenda.

      *   Elliott was involved in forcing a penny tax down on Baldwin County without
      voter approval.


      THE DISCOVERY:

      *   The County Commission approved an extension of the penny sales tax for the
      Baldwin County School System, making the extension permanent without School
      Board or Legislature approval.

      *   A deal was brokered between the Business Council of Alabama (BCBOE) and
      the County Commission regarding the penny sales tax percentages.

      *   This deal cost the BCBOE approximately $4 million dollars a year in funding,
      which went to the County Commission.


      THE PIVOT:

      *   Article 2 reveals that Tyler agreed to the controversial tax swap because
      he feared voters would not approve the extension or make it permanent. This
      establishes a direct financial quid pro quo between Elliott’s political agenda
      and the school system finances.


