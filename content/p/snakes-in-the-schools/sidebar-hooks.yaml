      by using the school system as a political tool.

      *   Jonathan Gray acts as a consultant for both Chris Elliott and the Baldwin
      County School System.

      *   The Business Council of Alabama (BCA) contributed $35,000 to Chris Elliott.

      *   Chris Elliott forced the penny tax down the throat of Baldwin County without
      public voting.


      THE DISCOVERY

      *   Chris Elliott collected nearly $500,000 in campaign funds, with potential
      earnings of $750,000 for a State Senate Seat ($42,000 salary).

      *   Elliott started funding from Catalyst ($8,640.00) and switched to Strategy,
      which has collected $140,951.80.

      *   Eddie Tyler is supported by Strategy (Mr. Jon Gray), who serves as Elliott''s
      campaign manager and the lobbyist for the Baldwin County School System.

      *   The "Black Hole" infrastructure project consumed almost $40 million.


      THE PIVOT

      *   Article 2 provides specific financial figures ($500,000 collected, dollar
      amounts for Catalyst/Strategy payments) that validate the allegations of backroom
      politics and money manipulation described in Article 1.

      *   Article 2 explicitly links Jonathan Gray (Strategy/Campaign Manager) to
      Eddie Tyler''s support of the school system, confirming the relationship implied
      in Article 1.


      KEY ENTITIES

      *   Chris Elliott

      *   Eddie Tyler

      *   Jonathan Gray

      *   Baldwin County School System

      *   Business Council of Alabama (BCA)

      *   Catalyst

      *   Strategy

      *   David Northcutt

      *   Sheriff Hoss Mack'
