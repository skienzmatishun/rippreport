      citing repeated violations of the Oath of Office while on the Alabama Supreme
      Court.

      *   Moore''s campaign continues despite being shunned by Republican leadership
      and facing accusations regarding sexual assault allegations and relationships
      with teens.


      THE PIVOT:

      *   Article 1 frames Alabama’s political environment as rife with corruption
      where elected officials disregard the rule of law (as cited in comparison to
      other state rankings). Article 2 provides concrete proof that a central candidate,
      Roy Moore, demonstrably ignored constitutional rights and violated his oath
      twice while holding judicial office. This validates the premise of systemic
      failure described in Article 1.


      KEY ENTITIES:

      *   Roy Moore

      *   Big Luther Strange (Former Alabama Attorney General)

      *   Sen. Trip Pittman

      *   Alabama Supreme Court

      *   U.S. Senate

      *   Mitch McConnell

      *   Fairhope'
