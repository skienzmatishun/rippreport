      Oak Fire Insurance Company regarding Charles K/ Breland, Jr. V (CV-2013-901096).

      *   The Triangle lawsuit cost the city $11.25 million.


      THE DISCOVERY

      *   The legal strategy employed by the Council resulted in them losing the Triangle
      lawsuit and having to pay $8.25 million for property settlement.

      *   The court ruled that Fairhope must now pay attorney costs for both the Triangle
      and Breland cases, potentially costing millions.

      *   Councilman Burrell is identified as a poor negotiator who allowed the case
      to fester.


      THE PIVOT

      *   Article 2 proves that the Council''s refusal to negotiate or comply with
      legal advice (like offering payment for fees/easements) directly led to massive
      financial liability and loss of assets, which was the core issue Article 1 obscured
      through political maneuvering.


