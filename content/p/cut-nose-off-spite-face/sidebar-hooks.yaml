  fake-news-and-retaliation:
    brief: 'THE CONFLICT

      *   Former Council President Jack Burrell and Councilman Kevin Boone are accused
      by the Main Article of slowing city government under a post-election vindictive
      campaign against Mayor Wilson.

      *   The Widget Article reveals that former employees Jennifer Fidler, Sherry
      Sullivan, and Pandora Heathcoat were employed by Tim Kant prior to being fired;
      these three individuals have since turned on the newly elected Mayor and alleged
      assault/filing lawsuits based on provocation from Mr. Kant.


      THE DISCOVERY

      *   The media outlets reporting on opposition (GCN Courier) are identified as
      choices of Catalyst, a political group supported by Councilman Boone’s son.

      *   Tim Kant is accused of provoking the three former employees into filing
      allegations and perpetuating "FAKE NEWS."


      THE PIVOT

      *   Article 2 reveals that critics attacking Mayor Wilson using employee testimony
      are not independent entities but rather loyal subjects (Fidler, Sullivan, Heathcoat)
      previously under Tim Kant''s influence.

      *   It connects Burrell and Boone to a specific power base: Catalyst is backed
      by Councilman Boone’s family and Jack Burrell, showing the current council''s
      "obstructionism" against Mayor Wilson stems from this established internal network.


      KEY ENTITIES

      *   Mayor Wilson

      *   Jack Burrell (Council President)

      *   Kevin Boone (Councilman/Son of a Director at Catalyst)

      *   Tim Kant

      *   Jennifer Fidler (Fired employee/Witness)

      *   Sherry Sullivan (Former Mayor/City Council Member)

      *   Pandora Heathcoat (Accuser/Former Employee)

      *   Catalyst (Political organization)

      *   GCN Courier (Media outlet affiliated with Catalyst)'
