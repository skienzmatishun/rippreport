  comment-surprised-ripp-report-baldwin-county-legal-eagle:
    brief: 'THE CONFLICT:

      *   Jack Burrell and Kevin Boone engaged in a vindictive campaign to undermine
      Mayor Wilson.

      *   Burrell and Boone led the council to install a hiring freeze to punish Mayor
      Wilson.

      *   Burrell and Boone slowed down the budget process without valid reasons.


      THE DISCOVERY:

      *   Councilmen Boone and Burrell had allegations levied against them regarding
      conflicts of interest and handling of the airport.

      *   Boone’s business interests conflicted with his voting record, and he failed
      to disclose these interests on his ethics form, despite voting on related issues
      for five years.

      *   Burrell raised red flags concerning the airport authority that were not
      investigated.

      *   The council accepted a gift of wetlands next to Fly Creek, receiving four
      acres instead of 100 square feet, with documentation filed three days prior
      to acceptance.

      *   Duplicate public documents (resolution 2606-16) show Mayor Kant signing
      one document in October 2016 and the newly elected Mayor signing the same document
      weeks later.


      THE PIVOT:

      *   Article 2 reveals specific, documented instances of conflicts of interest
      and improper deals (wetlands gift, undisclosed business interests) that serve
      as concrete proof of the corruption and obstructionism alleged against Burrell
      and Boone in Article 1.


      KEY ENTITIES:

      *   Jack Burrell

      *   Kevin Boone

      *   Mayor Wilson

      *   Fairhope City Council

      *   Alabama Ethics Commission

      *   Mayor Kant'
