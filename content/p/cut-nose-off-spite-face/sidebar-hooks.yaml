  cut-the-head-off-the-snake:
    brief: 'THE CONFLICT

      *   Historical development deal involving Arthur Corte and former Mayor Kant.

      *   Arthur Corte acted as a "major contributor" who instructed Mayor Kant to
      approve the Fly Creek Apartments project.

      *   The status quo governance under Mayor Kant was allegedly dictated by contractors
      who demanded payment in services or contracts.


      THE DISCOVERY

      *   Article 2 reveals that City Council members hold differing, documented positions
      on major development deals (Fly Creek Apartments).

      *   Jack Burrell voted against the apartments and listened to property value
      concerns.

      *   Jay Robinson served on P&Z and voted for the 250-apartment project, but
      is presented as needing a change in perspective regarding development.


      THE PIVOT

      *   Article 1 alleges that Jack Burrell and Kevin Boone installed a hiring freeze
      and stalled the budget to *punish* Mayor Wilson (a vindictive political action).

      *   Article 2 provides systemic evidence of corruption by linking major development
      decisions (Fly Creek Apartments) directly to powerful contributors like Arthur
      Corte, proving that "good ole boy network" behavior is an established pattern
      in Fairhope governance.


      KEY ENTITIES

      *   Arthur Corte (Developer/Contributor)

      *   Mayor Wilson / Karen Wilson / Karin Wilson

      *   Jack Burrell (Council President)

      *   Kevin Boone (Councilman)

      *   Jay Robinson (City Councilman, P&Z member)

      *   Kant (Former Mayor)

      *   Fly Creek Apartments

      *   Ripp Report

      *   Baldwin County Legal Eagle'
