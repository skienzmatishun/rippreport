      THE CONFLICT
      Governor Kay Ivey is targeting the Alabama Department of Veterans Affairs (ADVA) as retaliation for an ethics complaint filed against Kimberly Boswell.
      Complaint filed by ADVA Commissioner Admiral Kent Davis at the direction of the State Board of Veterans Affairs.
      Allegation: Kimberly Boswell, Director of Alabama Department of Mental Health and Ivey cabinet member, “colluded” to prevent ADVA from obtaining $7 million in American Rescue Plan Act funds.
      Ethics Commission dismissed the complaint but is accused of rushing to give Governor Ivey a copy for visibility.
      Tom Albritton, Ethics Director, accused of misusing the Mabel Amos Trust ($120,000 for children’s scholarships).
      Legislation to “restructure” the State Board of Veterans Affairs passed Alabama State Senate 21-9.
      Opponents claim this is retaliation for the Boswell ethics complaint.

      THE DISCOVERY
      Lower chamber (House) voted on the restructuring bill without debate during final passage.
      Bill passed House 56 to 39 on Thursday afternoon.
      Mobile-area representatives voting against the bill: Napoleon Bracy, Chip Brown, Adline Clarke, Barbara Drummond, Brett Easterbrook, Jennifer Fidler, Donna Givens, Frances Holk-Jones, Chris Pringle, Mark Shirey, Matt Simpson, Shane Stringer, Margie Wilcox.
      Rep. Alan Baker was the only local member to vote in favor of the bill.
      Veterans and advocates calling the move “cutting their throats” and promising to work to overturn it.
      Editorial links the bill to personal animosity between Ed Oliver and Kent Davis over a 2020 showdown at the Bill Nichols State Veterans Home in Alexander City regarding COVID-era protocol.

      THE PIVOT
      Article 2 confirms the legislative retaliation (House vote) is complete, validating Article 1’s accusation of a “siege” by Ivey.
      Article 2 specifically identifies State Rep. Ed Oliver as the Senate bill’s sponsor in the House, linking his role directly to the attack on veterans.
      Article 2 highlights Oliver’s long-standing personal conflict with Kent Davis, proving the retaliation is rooted in specific personal enmity rather than just policy.
      Article 2 reinforces Article 1’s claim that Andrew Jones and Ed Oliver are acting on Governor Ivey’s behalf, cementing them as the legislative conduits for her “vindictive drive.”

      KEY ENTITIES
      Kay Ivey (Governor)
      Kent Davis (ADVA Commissioner)
      Kimberly Boswell (Director, Dept. of Mental Health / Ivey Cabinet member)
      Admiral Kent Davis
      Andrew Jones (State Senator, Cherokee County)
      Ed Oliver (State Rep., Military and Veterans Affairs Committee chairman)
      Tom Albritton (Ethics Director, former)
      Mabel Amos Trust
      Greg Griffin (Montgomery County Circuit Court Judge)
      Jim White (Special Fiduciary)
