  above-the-law:
    brief: 'THE CONFLICT

      *   Roy Moore violated his oath of office twice regarding The Alabama Supreme
      Court.

      *   Moore was subsequently removed from office for violating constitutional
      rights he swore to protect.

      *   In 2017-12-13, Roy Moore served as a Judge and Senator-elect (implied).

      *   In 2018, the US Senate announced plans to remove Moore if elected.


      THE DISCOVERY

      *   Ripp Report filed complaint CSP NO. 2016-296 against Steven Patrick Johnson
      on behalf of Ripp.

      *   The complaint alleged that John/Johnson admitted under oath during a divorce
      proceeding to purchasing, transporting, and selling marijuana.

      *   On March 17, 2016, the Alabama State Bar responded stating "no further action
      in this matter" after reviewing the complaint from two attorneys at the General
      Council of the Alabama State Bar.

      *   Follow-up with The Disciplinary Commission of the Alabama State Bar on July
      20, 2016 and August 30, 2016 revealed no disciplinary action recorded against
      Steven Patrick Johnson or his firm Brackin McGriff and Johnson.


      THE PIVOT

      *   Article 1 details Roy Moore''s refusal to adhere to the Oath of Office despite
      constitutional violations leading to removal from office.

      *   Article 2 proves that even when a specific attorney (Steven Patrick Johnson)
      admitted to illegal acts under oath, The Alabama State Bar failed to record
      or enforce discipline against him through repeated procedural stonewalling and
      dismissals of Ripp’s complaints.


      KEY ENTITIES

      *   Roy Moore (Alabama Supreme Court/US Senate Candidate)

      *   The Alabama State Bar / General Council of the Alabama State Bar

      *   Steven Patrick Johnson (Attorney, Brackin McGriff and Johnson)

      *   Ripp Report (Complainant for CSP NO. 2016-296)

      *   Alabama Supreme Court'
