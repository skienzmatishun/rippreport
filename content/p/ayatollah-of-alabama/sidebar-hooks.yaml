  alabama-ag:
    brief: 'THE CONFLICT:

      - Roy Moore previously violated his oath of office for The Alabama Supreme Court
      twice.

      - He was removed from office for those same constitutional violations despite
      being a political candidate/Senator-elect.


      THE DISCOVERY:

      - A complaint filed by Francis Paul Ripp details systemic corruption within
      the Baldwin County Sheriff’s Office and judicial system over 18 years (6570
      days).

      - Officials identified include Sheriff Hoss Mack, District Attorney Robert Wilters,
      and retired prosecutor David Whetstone.

      - Allegations center on collusion to withhold exculpatory evidence ("Coroners
      Report") from the defense of Murray Lawrence during a murder trial involving
      Brandon Hastings.


      THE PIVOT:

      - Both articles establish patterns of failure in high-ranking Alabama officials
      (Roy Moore’s personal violations vs. Mack/Wilters’ institutional misconduct).

      - Article 2 provides concrete examples of severe ethical and legal failures
      regarding evidence, wrongful convictions, and corruption that mirror the general
      theme of political dysfunction presented in Article 1.


