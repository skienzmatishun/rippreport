  alabama-moore-strange:
    brief: 'THE CONFLICT:

      *   Roy Moore was removed from office for violating his oath of office twice
      while serving on the Alabama Supreme Court (implied prior to 2017/2018 election
      cycles).

      *   Big Luther Strange served as Alabama Attorney General between 2017 and September
      2023.


      THE DISCOVERY:

      *   The second article reveals allegations that Big Luther Strange used his
      position as AG to allow Senator Trip Pittman off of BP fraud charges.

      *   It alleges strange political influence, claiming a quid pro quo where "Big
      Luther" allegedly gave Roy Moore a pass on lies/affairs (sordid affairs) in
      exchange for political maneuvering.

      *   The second article suggests the Alabama Republican party is influenced by
      financial contributions and mandates from Washington and Mitch McConnell to
      manage figures like Big Luther Strange and Roy Moore.


      THE PIVOT:

      *   Article 1 establishes that Roy Moore violated constitutional rights and
      was twice removed by the Alabama Supreme Court.

      *   Article 2 serves as the ''smoking gun'' by introducing Big Luther Strange,
      then Attorney General, who allegedly allowed these legal failures (Moore’s removal/affairs)
      to be bypassed or dismissed in exchange for political loyalty and financial
      support. This suggests a systemic cover-up involving key figures of the time.


      KEY ENTITIES:

      *   Roy Moore

      *   Big Luther Strange / Luther Strange

      *   Trip Pittman

      *   Mitch McConnell

      *   BP (British Petroleum)'
