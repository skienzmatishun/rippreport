      Creek Apartments despite 95% public opposition.

      *   Sen. Pittman and Mayor Kantor are accused of siphoning $636,000 in BP funds
      intended for environmental remediation.

      *   The Widget Article reveals that a lawsuit involving Cutre and Kant resulted
      in a taxpayer settlement of $11.25 million.


      THE PIVOT

      *   While the Main Article focuses on Roy Moore''s constitutional violations
