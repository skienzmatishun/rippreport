  alabama-attorney-general:
    brief: 'THE CONFLICT

      Roy Moore violated his oath of office twice and was removed from office for
      constitutional violations. Tom Albritton, as the Alabama Executive Director
      of the Ethics Commission and a trustee of the Mabel Amos Scholarship Trust,
      is accused of fraud and self-serving actions regarding trust funds.


      THE DISCOVERY

      The Mabel Amos Scholarship Trust fund value ballooned from $500,000 to $8.2
      million by 2021 due to oil discovery in 2010. Trustees, including Tom Albritton
      and Regions Bank, allegedly benefited financially by awarding personal funds
      to themselves and associates, while denying scholarships to eligible students.


      THE PIVOT

      Article 2 proves that systemic financial corruption and misuse of public trust
      are endemic in Alabama governance (via the Ethics Commission), providing a foundation
      for understanding Moore’s claimed narrative of political dysfunction and corrupt
      leadership. Albritton''s actions demonstrate the type of unchecked power and
      self-dealing Moore is accused of perpetuating.


      KEY ENTITIES

      Roy Moore, Tom Albritton, Mabel Amos Scholarship Trust, Regions Bank, Rick Clifton,
      Allen Dodd, Tommy Gallion, Megan Carmack, Tyra Lindsey, Lagniappe Mobile, Alabama
      Supreme Court, Ethics Commission, State Rep. Matt Simpson.'
