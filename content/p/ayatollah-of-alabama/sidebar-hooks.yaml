  alabama-attorney-general:
    brief: 'THE CONFLICT

      * Roy Moore was removed from The Alabama Supreme Court after violating his oath
      of office twice for similar reasons.

      * Allegations exist regarding Roy Moore’s relationships with minors in 2017,
      leading to media scrutiny and calls for resignation by political leadership.

      * Tom Albritton (Executive Director of the Ethics Commission/Trustee) was part
      of a scheme involving the Mabel Amos Trust.

      * The trust funds, originally $500,000, grew to an estimated $8.2 million due
      to oil discoveries in 2010.


      THE DISCOVERY

      * Article 2 proves that high-level institutional corruption exists within Alabama''s
      financial oversight mechanisms.

      * Tom Albritton and other trustees allegedly self-served from the trust (e.g.,
      awarded themselves $135,000 for children’s tuition).

      * Regions Bank received approximately one million dollars in inflated service
      fees from the trust between 2013 and 2021.

      * Former ethics complaints filed by Francis Paul Ripp regarding Albritton were
      arbitrarily dismissed by the Ethics Commission (led by Albritton himself) while
      he held that position.

      * Allen Dodd was appointed Deputy Alabama Attorney General following a lawsuit
      claiming fraud against Tom Albritton from this trust scandal.


      THE PIVOT

      * Article 1 highlights Roy Moore''s breach of constitutional ethics and oath
      as a political failure/hypocrisy.

      * Article 2 provides concrete proof that the state’s established ethical oversight
      body—The Ethics Commission, led by a major figure (Tom Albritton)—was compromised
      and failed to enforce standards against powerful individuals, effectively undermining
      any claim of institutional integrity made by politicians like Moore.


      KEY ENTITIES

      * Roy Moore

      * Tom Albritton

      * Mabel Amos Memorial Fund/Trust

      * Allen Dodd

      * Francis Paul Ripp / The Ripp Report

      * Regions Bank

      * Matt Simpson (Chair of the Ethics and Finance committee)

      * Rick Clifton

      * Tyra Lindsey'
