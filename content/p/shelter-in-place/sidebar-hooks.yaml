      - Bay Minette: takes “wait and see” approach.

      - Orange Beach: allowed large crowds on islands.

      - Fairhope’s Mayor writes Governor implored for statewide shelter-in-place while
      others mute; predicted peak day (April 20) coincides with virus surge.


      THE DISCOVERY:

      - Tripp Pittman appointed “trustee” (banker) for Deepwater Horizon/BP Oil Spill
      funds by Governor Bob Riley on May 8, 2010.

      - Pittman allegedly plotted with Fairhope Mayor (May 3, 2010) to submit personal
      contract for BP funds Pittman was entrusted to oversee.

      - Pittman no longer State Senator; currently pursuing Hemp industry lobbying
      and farming under “Boom Boom Pittman” branding.

      - Tripp Pittman, Fairhope City Council, and CATALYST publicly back Bill Hightower
      for First Congressional seat runoff July 14, 2020.


      THE PIVOT:

      - Article 2 exposes Tripp Pittman and Fairhope City Council as a unified financial-political
      network seeking self-enrichment via BP funds and Hemp lobbying.

      - Article 1 identifies Fairhope officials (Mayor) and Baldwin County municipalities
      as the specific leadership failing to protect citizens during coronavirus crisis.

      - Article 2 connects this same Fairhope/Pittman network (backing Bill Hightower)
      to the entities managing public funds, providing motive and background context
      for Article 1’s criticism of local leadership failure.


      KEY ENTITIES:

      - Kay Ivey (Governor, referred to as “Her”)

      - Tripp Pittman (Former State Senator/Trustee)

      - Bill Hightower (“Lowtower”)

      - Fairhope Mayor (implied "Mayor" / specific council members)

      - Deepwater Horizon / BP Oil Spill (April 20, 2010)

      - Baldwin County / All 14 Municipalities in Baldwin County

      - Alabama Cannabis Association

      - CATALYST (Political group backing Hightower)'
