      \ Governor demanding statewide order; Bay Minette took \"wait and see\" approach.\n\
      - Final crisis escalation occurred Saturday: Alabama finally ordered statewide\
      \ \"Shelter in Place\".\n- Article 1 notes rapid rise of 136 cases/36 deaths\
      \ immediately after previous public health updates.\n\n2. THE DISCOVERY:\n-\
      \ Second article confirms the election timeline that defines who holds power\
      \ during this crisis.\n- Qualifying deadline for District Attorney, Sheriff,\
      \ Circuit Judge Place, and Baldwin County Commission seats set for January 28,\
      \ 2022.\n- Reveals conflicts of interest surrounding the current leadership:\n\
