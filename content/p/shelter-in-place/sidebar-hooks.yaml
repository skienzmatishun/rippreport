      KEY ENTITIES:

      - Alabama Governor (Resisting initial shelter order).

      - Paula DiNardi.

      - Judge Clarke Stankoski (Fairhope Municipal Court).

      - Fairhope Council (Criticized for appointments without Citizen Input).

      - Bay Minette.

      - Orange Beach.

      - Johnathan Victor (Ripp Report referenced police officer shooting).'
