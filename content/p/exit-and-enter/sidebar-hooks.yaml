      *   The soccer field complex cost over $5 million.

      *   Parkland acquisition involved a legal settlement that drained $3 million
      in tax dollars for attorney fees.

      *   Kant micromanaged the city and controlled committees (City Council and Planning
      and Zoning Board).


      THE DISCOVERY:

      *   Mayor Kant is attempting to establish a legacy by naming a Performing Arts
      Center the “Timothy Kant Performing Arts Center.”

      *   Kant used the Planning and Zoning board meetings to push through projects
      benefiting his campaign contributors.

      *   Kant supported Angelo Corte to pursue a lawsuit regarding Fly Creek Apartments,
      intending to drain tax dollars via the Hand Arendall law firm.


      THE PIVOT:

      *   Article 2 shows specific examples of Kant''s "transition" moves (P&Z actions
      and legal support) which substantiate Article 1''s claims that he obstructed
      transition and enriched himself/his associates through lawsuits and development
      deals.


