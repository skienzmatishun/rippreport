      from former Mayor Jim Nix.

      *   Kant oversaw projects costing over $20 million, including soccer fields
      estimated at over $5 million.

      *   Parkland was established through a legal settlement that drained $3 million
      in tax dollars for attorney fees.

      *   The City Council deliberately omitted public participation regarding the
      lawsuit settlement concerning the Triangle property.


      THE DISCOVERY

      *   The Triangle property was purchased by the City of Fairhope to "settle"
      a lawsuit, not as a voluntary purchase for a park or conservation easement.

      *   The total cost for the lawsuit settlement included $11.25 million and $3
      million in attorney fees.

      *   The estimated current value of the Triangle property is between $16 and
      $20 million.

      *   Councilmen Burrell and Boone lied to the community about the nature of the
      purchase.


      THE PIVOT

      *   Article 2 proves that the Triangle Mega-Site was a legal settlement costing
      millions, which directly connects to Article 1''s claims regarding lawsuits
      costing the city millions and enriching Kant’s attorneys.

      *   Article 2 reveals that Councilmen Burrell and Boone actively misled the
      public regarding the property status, linking this action to Mayor Kant''s obstruction
      of transparency in the past council''s decision-making.


