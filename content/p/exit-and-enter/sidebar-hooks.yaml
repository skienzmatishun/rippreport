      \ fees related to the Dyas lawsuit.\n    * Article 1 claims these settlements\
      \ and projects (like soccer fields) represent millions in taxpayer money that\
      \ enriched selected attorneys.\n\n2. THE DISCOVERY:\n    * The triangle lawsuit\
      \ settlement cost the City of Fairhope a total of $11.25 million, including\
      \ $3 million in attorney fees from firms who misrepresented the costs to the\
      \ city council.\n    * The Triangle Mega-Site property, valued today between\
      \ $16 and $20 million, was purchased with incentives favoring developers.\n\
      \    * Councilman Burrell and Boone actively misled the community for 6 years,\
      \ claiming the land would be a park instead of a commercial development to satisfy\
