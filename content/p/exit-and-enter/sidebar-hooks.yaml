      \ Boone\n    * Dyas (Lawsuit Plaintiff)\n    * City of Fairhope\n    * Planning\
      \ and Zoning Board\n    * Attorney fees ($3 million in legal costs for the settlement)"
    generated_at: '2026-07-18T02:04:53.113973Z'
