  court-of-public-opinion:
    brief: 'THE CONFLICT

      *   BP Pittman vacated District 32 State Senate seat.

      *   Pittman is cited as a poster child for corruption.

      *   Pittman skimmed $750,000 from BP.

      *   Baldwin County has a $32 million debt.

      *   Four county commissioners are up for re-election and need replacement.


      THE DISCOVERY

      *   Fairhope city council obstructed the newly elected Mayor.

      *   The Fairhope city council failed to uphold transparency and accountability.

      *   The Court of Public Opinion holds officials accountable for actions.


      THE PIVOT

      *   Article 2 proves that local government corruption (Fairhope city council
      obstruction) is a recurring issue, mirroring the systemic failure in Baldwin
      County politics detailed in Article 1.

      *   Article 2 shows specific mechanisms (obstruction, using silence) by which
      elected officials abuse their office, connecting directly to the general corruption
      being exposed in the county.


      KEY ENTITIES

      *   BP Pittman

      *   Baldwin County

      *   Fairhope city council

      *   Mayor (Fairhope)

      *   Court of Public Opinion'
