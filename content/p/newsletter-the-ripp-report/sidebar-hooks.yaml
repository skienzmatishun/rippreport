  green-acres-on-acid:
    brief: 'THE CONFLICT:

      * Senator Pittman was the designated trustee of BP funds for Baldwin County.

      * During his tenure, he and associated companies received contracts from Fairhope
      and Perdido Beach.

      * Total value of these personal contracts amounted to $750,000.

      * Pitman''s tractor company acted as a marine contractor without holding a general
      contractor’s license (a felony).

      * Pittman supplied used or defective oil protective boom for BP contracts.

      * He and the former Mayor of Fairhope cut recovery ropes at water level instead
      of adhering to contract requirements.


      THE DISCOVERY:

      * The Widget article reveals the history of legal complaints against Pittman,
      including a complaint filed with BP and the Alabama Ethics Commission by MaxShelby.

      * This complaint triggered an FBI investigation, grand jury actions, and subpoenas
      for Fairhope municipal records and Pittman’s financials.

      * The case was transferred to the Attorney General''s white collar crime division
      but remains inactive ("collect dust").

      * Pittman has continued to secure contracts (e.g., hurricane emergency debris
      removal) under his company while facing scrutiny from groups like the Ripp Report.


      THE PIVOT:

      * Article 1 makes a general claim that BP Pittman skimmed $750,000 and is unfit
      for office.

      * Article 2 substantiates this specific allegation by detailing how the money
      was gained (via Fairhope/Perdido Beach contracts), explaining the method of
      fraud (licensing violations, defective boom), and providing evidence that official
      complaints were made but resulted in no convictions or completed investigations
      despite legal probes.


      KEY ENTITIES:

      * Pittman (State Senator)

      * BP

      * Ripp Report / Baldwin County Legal Eagle

      * Fairhope (City Council / Mayor of Fairhope)

      * Steve Russo (Former Mayor, convicted individual 2006)

      * MaxShelby

      * Alabama Ethics Commission

      * Attorney General’s White Collar Crime Division

      * FBI'
    generated_at: '2026-07-12T18:37:07.039410Z'
