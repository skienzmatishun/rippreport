  a-decade-of-corruption:
    brief: 'THE CONFLICT:

      *   State Senator Tripp “Boom Boom” Pittman and Fairhope Mayor Tim Kant secured
      a $636,000 bid from Fairhope to Senator Pittman for BP Boom work using Fairhope
      Staff (Greg Mims, Sherry Sullivan, Jennifer Fidler).

      *   Pittman and Kant were told by the County Commission on May 8th 2010 not
      to proceed with the bid but agreed.

      *   On June 4th 2010, the Fairhope City Council awarded the contract to Pittman
      tractor instead of an alternative proposal (Oil Recovery).

      *   Pittman received a check from Fairhope for $372,165.90 for "COMPLETED" boom
      work payable to Pittman Tractor.

      *   Pittman accumulated close to $750,000 of BP money through this activity
      over the last 10 years.


      THE DISCOVERY:

      *   The specific details of how Senator Pittman and Mayor Kant obtained and
      utilized BP funds were documented via city contracts and payments.

      *   Pittman used his legislative power to pass qualifications for Baldwin County
      Sheriff, enabling the Sheriff to be re-elected twice without opposition.

      *   Corruption flourished over ten years, involving multiple local officials
      and entities (Mega Site, Strawman case, Fairhope Airport bid rigging).


      THE PIVOT:

      *   Article 2 provides the specific financial transactions ($636,000 bid, $372,165.90
      check) and the timeline of events that substantiate Pittman''s claim in Article
      1 regarding his "$750,000 he skimmed from BP."

      *   Article 2 provides the operational details (who was involved: Kant, Mims,
      Sullivan, Fidler; dates: May 8th 2010, June 4th 2010) that prove the corruption
      exists.


      KEY ENTITIES:

      *   Tripp “Boom Boom” Pittman

      *   Tim Kant (Fairhope Mayor)

      *   Greg Mims (Fairhope Staff)

      *   Sherry Sullivan (Fairhope Staff)

      *   Jennifer Fidler (Fairhope Staff)

      *   Fairhope City Council

      *   Pittman Tractor

      *   BP

      *   County Commission

      *   Karin Wilson'
