      KEY ENTITIES:

      - Murray Lawrence Jr. (Convict)

      - Brandon Hastings (Victim)

      - Hoss Mack (Sheriff / Lead Investigator)

      - Robert Wilters (District Attorney / Judge)

      - David Whetstone (Retired Prosecutor)

