      - Prosecuting attorney identified as David Whetstone.

      - Presiding judge associated with case is Robert Wilters.

      - New evidence allegedly suppressed "willfully rather than inadvertently" and
      withheld from defense.


      THE DISCOVERY:

      - Francis Paul Ripp filed formal complaint with Alabama Attorney General Steve
      Marshall regarding corruption in Lawrence case.

      - Complaint submitted after over three years of independent research into the
      2005 conviction.

      - Letter specifically accuses Sheriff Hoss Mack, District Attorney Robert Wilters,
      and retired prosecutor David Whetstone of collusion.

      - Specific accusation: They withheld "Coroner''s Report" from the defense.

      - Defense attorney Willy Huntley signed affidavit on September 18, 2023, stating
      he never received the "Coroner''s Report."

      - Transcript cited in complaint: Page 1747 / Synopsis page 47 item 187 shows
      Mack testified Jarius Ireland said Lawrence shot victim BEFORE being asked about
      a gun.

      - Claim: Missing Jarius Ireland written statement lacks that early "gun" reference
      used by Mack in testimony.

      - Ripp claims Sheriff’s Major Crimes Division investigates loss of life within
      its own department and Baldwin County officers.

      - Two lawsuits pending against Sheriff’s Office involving 6 unarmed victims
