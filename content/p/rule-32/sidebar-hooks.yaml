      THE PIVOT:

      - Article 2 (Letter) confirms the exact individuals named in Article 1 are targets
      of official complaint to AG office.

      - Article 2 provides external documentation (AG complaint) backing Article 1’s
      claim of "willful suppression" with specific names and transcript pages.

      - Article 2 confirms transition of representation: From Willy Huntley (Sep 18,
