  alabama-ag:
    brief: 'THE CONFLICT:

      - Murray Lawrence Jr., aka "Bubba," convicted in 2005 for murder of Brandon
      Hastings.

      - Lawrence incarcerated over 18-20 years (Article 1: 7500 days; Article 2: 6570+
