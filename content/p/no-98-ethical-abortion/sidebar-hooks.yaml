      facilitators after fetal heartbeat detection (approx. 6 weeks).

      - Article 1 notes: Peacock Network airing documentary "Monster in the Shadows"
      regarding Brittney Wood’s disappearance and Baldwin County family convicted
      of child sexual abuse.


      THE DISCOVERY:

      - Article 2 confirms Lagniappe Mobile Newspaper published articles this week
      on UA Confidentiality Agreements.

      - Article 2 confirms a new bill signed by the Alabama Governor allows $400 Million
      in Covid Aid to be redirected for $1.2 Billion in prison construction.

      - Article 2 notes this prison funding move is not subject to the Public Bid
      Law.

      - Article 2 notes: Facebook leaks indicate UA officials/admins "running for
      exits."


      THE PIVOT:

      - Article 2 is the smoking gun because it validates Ripp’s central thesis via
      third-party verification: Lagniappe (referenced in both articles) is exposing
      similar financial and ethical irregularities at the state level.

      - The link between Ripp’s complaints against Albritton (Ethics Commission) and
      Lagniappe’s reporting on UA agreements/Govt corruption proves a pattern of oversight
      failure in the specific jurisdiction Ripp is targeting.

      - The second article details public corruption (Prison Construction Bill, Saban
      Salary) that contextualizes Ripp’s complaints against Albritton as part of a
      broader systemic issue, not an isolated incident.


      KEY ENTITIES:

      - Mr. Ripp

      - Tom Albritton (Executive Director, Alabama Ethics Commission)

      - Mable Amos Scholarship Trust

      - Lagniappe Mobile Newspaper

      - The Alabama Governor (Signer of prison construction bill)

      - Nick Saban (University of Alabama Head Coach)

      - Brittney Wood

      - Baldwin County

      - Mo Brooks (Candidate/Senator)

      - Jo Bonner (Lagniappe refers to as de facto Governor of Alabama)'
