      and suppress public participation.

      *   The Fairhope Airport Authority (FAA) meetings are not public or recorded
      ("No Radar"); no recordings have been made since February, and no public notice
      is given.

      *   Burrell''s actions involve questionable deals regarding property transactions
      and controlling the City Council.


      THE PIVOT:

      *   Article 2 reveals that Burrell''s pattern of suppressing information (FAA
      meetings, denying public speech) and manipulating council decisions serves as
      the evidence supporting the claims in Article 1 about corruption and "sneaky
      methods to hide."

      *   The lack of transparency regarding the FAA and property transactions proves
      Burrell’s history of suppressing information mentioned in Article 1.


