      *   Angelo Corte (Developer)

      *   Burrell (Council Member/President)

      *   Boone (City Council Member)

      *   Brown (Councilman)

      *   Mayor Wilson

      *   Publix (Entity/Project)

      *   Kant-Corte Apartments (Specific Project)

      *   GOB strategy (Political movement)'
