  a-legal-win-for-fairhope-citizens-who-oppose-fly-creek-apartments:
    brief: 'THE CONFLICT

      *   Fairhope approved digging a hole for a strip center to accommodate a Publix.

      *   Developers seek to locate apartments over Fly Creek.

      *   Soccer fields required $1.5 million for grading.

      *   City Council obstructs the mayor.

      *   A GOB strategy, supported by Burrell and Boone, aims to remove the mayor
      and reinstate fired employees replacing Mayor Wilson.


      THE DISCOVERY

      *   Friends of Fly Creek filed a lawsuit against Fairhope City, Fairhope Planning
      and Zoning, Fairhope City Council, and Leaf River group LLC (Defendants).

      *   The Court denied the defendants'' motion to dismiss the lawsuit.

      *   The case can now move into a discovery phase requiring production of documents
      and emails.

      *   Leaf River Group has one year to complete construction or zoning must be
      reversed (no apartments).


      THE PIVOT

      *   Article 2 provides the legal basis for the development dispute mentioned
      in Article 1, revealing that the controversial projects (apartments over Fly
      Creek) are subject to a legally binding court process.

      *   The lawsuit discovery phase may reveal testimony regarding intimidation
      used by the Mayor against city employees.


      KEY ENTITIES

      *   Fairhope

      *   Fly Creek

      *   Burrell

      *   Boone

      *   Wilson

      *   Councilmen Brown

      *   Leaf River group LLC

      *   George Robards

      *   Citizen Kant'
