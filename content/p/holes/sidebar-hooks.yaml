  fairhope-jester-and-fly-creek:
    brief: 'THE CONFLICT

      *   Fairhope development projects involving a strip center for Publix and proposed
      apartment construction over Fly Creek.

      *   Estimated costs of $1.5 million for grading soccer fields and $5-6 million
      for the overall complex.

      *   The Fairhope City Council obstructing the Mayor Wilson.

      *   A GOB strategy supported by Burrell and Boone to remove Mayor Wilson and
      reinstate fired employees.


      THE DISCOVERY

      *   The Fairhope Jester supports the Kant-Corte Apartments on Fly Creek and
      is building a home on the same creek.

      *   The Jester supports the developer responsible for damage to the creek from
      the Publix project and is now building 230 apartments near the creek.

      *   An Ethics Complaint (Case #2018-42) was filed against Fairhope City Councilman
      Robert Brown and an Eastern Shore Art Center Board member, citing a lack of
      permission for a contract.

      *   There is a dispute between Gravity Fed vs. Low Pressure Sewer Systems regarding
      new developments; developers use low pressure systems to avoid paying total
      system costs.


      THE PIVOT

      *   Article 2 reveals that the developer implicated in the creek damage (linked
      to Publix/apartments) is connected to the Fairhope Jester, providing a specific
      figure within the development scheme mentioned implicitly in Article 1''s controversy.

      *   The mention of Robert Brown and the Ethics Complaint links city council
      activity directly to potential ethics violations regarding contracts and land
      use planning issues discussed in both articles.


