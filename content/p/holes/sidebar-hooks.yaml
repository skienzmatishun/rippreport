      *   The City Council is accused of obstruction and corruption regarding city
      business and conflicts of interest.

      *   A GOB strategy involving Burrell and Boone is alleged to aim to remove Mayor
      Wilson from office.


      THE DISCOVERY

      *   Councilmen (Mr. Brown, Mr. Boone) have documented relationships with developer
      interests (Mr. Corte).

      *   Mr. Boone has a business relationship with Mr. Corte and his engineer company,
      raising conflict of interest concerns.

      *   A past lawsuit involving Mr. Corte and the former Mayor cost $11.25 million;
      this settlement involved the assistance of the last council, which included
      Beavis and Butthead.


      THE PIVOT

