  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT:

      *   Fairhope approved digging a hole for a strip center to accommodate a Publix.

      *   The City Council obstructed Mayor Wilson from accomplishing goals.

      *   Councilman Brown ran for office due to dissatisfaction with soccer field
      development.

      *   Burrell and Boone provided shovels for the city council’s actions.


      THE DISCOVERY:

      *   The Fly Creek Apartments project went to a six-day trial in Bay Minette.

      *   The new drainage plan calls for a single point discharge of apartment complex
      stormwater directly into Fly Creek wetlands (100-150 feet from the outfall pipe).

      *   The current planning and zoning board rejected public concerns in favor
      of the developer, bypassing safeguards.


      THE PIVOT:

      *   The trial revealed that the drainage plan is fundamentally destructive to
      Fly Creek, exposing how city actions allowed for direct dumping into wetlands.

      *   This discovery links the past conflicts (corruption, obstruction) mentioned
      in the main article to a specific environmental outcome enabled by current planning
      decisions.


