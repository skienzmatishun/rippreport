hooks:
  community-or-developer:
    brief: 'THE CONFLICT:

      *   Fairhope has undergone controversial development projects, including a strip
      center/Publix site that spawned lawsuits and required complex grading issues.

      *   A separate project involving soccer fields incurred an estimated $1.5 million
      to achieve level grade; the overall cost of this complex is between $5M and
      $6M.

      *   Councilman Brown raised concerns regarding how the soccer field development
      was carried out, specifically questioning who were the contractors/subcontractors
      used.


      THE DISCOVERY:

      *   The Fly Creek PUD Sunset Provision has been a recurring issue for Fairhope
      City Council; as of April 2017 (Agenda item), this had been addressed 10 times
      due to developer insistence.

      *   This development process has resulted in permanent damage to the Fly Creek
      Watershed and led to pending and high probabilities of future lawsuits.

      *   The widget article identifies that conflicts of interest exist among some
      council members related to developers, engineers, contractors, and landowners.


      THE PIVOT:

      *   Article 1 alleges a systemic "GOB strategy" implemented by Burrell and Boone
      aimed at removing Mayor Wilson due to perceived obstruction.

      *   Article 2 reveals the institutional root of this corruption, identifying
      organized pressure groups like Catalyst (a fraternity involving developers,
      county officials, judges) which exerted control over development decisions in
      Fairhope through repeated agenda items (like the Fly Creek PUD Sunset Provision).


      KEY ENTITIES:

      *   Burrell and Boone (Council members involved in opposing Mayor Wilson)

      *   Mayor Wilson (Mayor facing opposition from City Council/GOB strategy)

      *   City Council of Fairhope (body debating development ordinances, specifically
      Ordinance Amending Fly Creek PUD Sunset Provision)

      *   Catalyst (political organization described as a fraternity including developers
      and county officials)

      *   Baldwin Insider (organization mentioned in relation to Catalyst’s activities)

      *   Brown (Councilman who questioned field contractors/subcontractors)'
