      million to achieve level grade; the total cost was projected between $5-6 million.

      *   Angelo Corte developed apartments that were sold after being marketed as
      a "top rate project" but subsequently experienced flooding, resulting in multiple
      lawsuits.

      *   The Kant-Corte Apartments are identified as the responsibility of the previous
      City Council (including Burrell and Boone).


      THE DISCOVERY: What does the second article prove or reveal today?

      *   Current infrastructure failure is evident through mud flowing into Fly Creek
      from highway shoulder collapses and ongoing dumping of red dirt used for temporary
      repairs.

      *   The culvert foundation in Fly Creek is damaged, requiring continuous "band
      aid" style fixes rather than permanent repair.

      *   Angelo Corte successfully sold the apartments after guaranteeing their value
      to Fairhope citizens, only for them to flood and damage several units.


      THE PIVOT: Why is Article 2 the ''smoking gun'' for Article 1?

      *   Article 2 provides current physical evidence (caved highway shoulders, damaged
      culverts, visible creek erosion) that validates the claims in Article 1 regarding
      failed development planning and subsequent costly repairs necessitated by past
      council decisions.

      *   The ongoing financial drain of repeated repair after repair proves the systemic
      negligence associated with projects championed by specific entities mentioned
