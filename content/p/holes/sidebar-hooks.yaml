  fly-creek-a-drainage-ditch:
    brief: "THE CONFLICT: \n*   Fairhope City Council endorsed the Fly Creek Apartments\
      \ project in October 2016 despite public opposition and environmental concerns\
      \ regarding its impact on the vital Fly Creek Watershed.\n*   In April 2017,\
      \ a newly elected City Council granted an extension to proceed with the development\
      \ while the case was ongoing in Bay Minette.\n*   The current political climate\
      \ involves Councilmen Burrell and Boone supporting a \"GOB strategy\" aimed\
      \ at removing Mayor Wilson through obstruction of city business, tied partly\
      \ to controversial past developments like the Publix center grading issues ($1.5\
      \ million).\n\nTHE DISCOVERY: \n*   Article 2 reveals that the planned drainage\
      \ system for the apartment complex calls for a single point discharge into wetlands\
      \ adjacent to Fly Creek (100-150 feet from the outfall pipe), effectively dumping\
      \ stormwater directly into the creek.\n*   The council plan omits necessary\
      \ expansion of retention ponds, moving away from an original 1 acre to no defined\
      \ expanded capacity.\n*   Article 2 explicitly states that Councilman Jack Burrell\
      \ and Kevin Boone accepted a \"gift\" related to this critical discharge point\
      \ while playing \"dumb\" when questioned about its source or purpose.\n\nTHE\
      \ PIVOT: \n*   Article 2 provides concrete proof of financial impropriety (the\
      \ undisclosed gift) linked directly to the environmental damage caused by the\
      \ Fly Creek Apartments development, which is the foundation of the current conflict\
      \ outlined in Article 1 between Mayor Wilson and Councilmen Burrell/Boone.\n\
      \nKEY ENTITIES: \n*   Fly Creek Watershed / Wetlands\n*   Jack Burrell\n*  \
      \ Kevin Boone\n*   Adam Milam (Plaintiff's Attorney)\n*   Mayor Wilson\n*  \
      \ Fairhope City Council"
