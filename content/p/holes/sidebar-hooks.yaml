      in Fairhope.

      - **Consequences:** Three million dollars was paid to attorneys; Fairhope lost
      its best senior utility supervisor to Daphne; no infrastructure work (especially
      on sewer) occurred while electric department worked minimally on a "shoe string."


      **THE DISCOVERY:**

      - **Modern Allegations:** The current Catalyst Council has been obstructing
      Mayor Wilson since 2020.

      - **The Goal of Obstruction:** To take down the mayor and remove her from office
      to reinstate fired/replaced employees.

