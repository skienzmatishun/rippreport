  fairhope-sewer-backstory:
    brief: 'THE CONFLICT

      *   Fairhope developers dug a hole for a Publix strip center.

      *   Soccer fields required $1.5 million for grading/filling.

      *   The Fairhope City Council is digging a hole in the city.

      *   Burrell and Boone provided shovels for the council''s activities.


      THE DISCOVERY

      *   Mayor Can’t enjoyed a double paycheck (Mayor and utility director).

      *   Between 2012 and 2016, Mayor Can’t, Councilman Boone, and Councilman Burrell
      used the utility fund as a slush fund to pay lawsuits.

      *   This action resulted in Fairhope losing its best senior utility supervisor
      to Daphne and $3 million to attorneys.

      *   The utility fund was drained with no sewer infrastructure work being done.

      *   Mayor Wilson promised to fix the sewer/infrastructure problem, but the current
      Catalyst Council is obstructing her efforts for 2020.


      THE PIVOT

      *   Article 1 details current development and council obstruction (digging holes).

      *   Article 2 reveals that the alleged corruption of the council members (Burrell,
      Boone) stems from a past misuse of the utility fund to pay lawsuits, which directly
      relates to the city''s failure to address sewer infrastructure mentioned in
      the context of Fairhope''s ongoing problems.


