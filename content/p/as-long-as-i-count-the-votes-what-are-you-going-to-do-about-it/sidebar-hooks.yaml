  the-eagle-has-landed-and-the-court-of-public-opinion-has-voted:
    brief: 'THE CONFLICT

      *   Alleged fraudulent behavior observed during Fairhope municipal elections
      on August 23, 2012.

      *   Poll watcher observations noted: Election Supervisor Mrs. Culver lacking
      control of voting machines.

      *   Election official Tom Odom opened an absentee voting machine and requested
      extra tape copies.

      *   Lack of procedure: Poll watchers were not allowed to observe final machine
      opening and tape certification security packaging.

      *   Issue with certification: Tapes had a signing line for a poll watcher that
      was not signed on public tapes, questioning legality.


      THE DISCOVERY

      *   Karin Wilson ran for Mayor of Fairhope and won the election.

      *   Fairhope cast over 2000 votes more than Daphne in the election.

      *   The Alabama Secretary of State Elections Division conducted last-minute
      monitoring of the elections.


      THE PIVOT

      *   Article 1 establishes systemic procedural violations and suspicion of fraud
      in Fairhope elections.

      *   Article 2 demonstrates a successful electoral outcome (Wilson''s victory)
      despite these procedural concerns, suggesting that the alleged irregularities
      did not prevent the election result.


      KEY ENTITIES

      *   Fairhope

