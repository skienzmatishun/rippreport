hooks:
  hallucinations:
    brief: 'THE CONFLICT

      *   Chuckee Cheeze (Mr. McCollum) took over The Fairhope Courier, transforming
      it into a political media source for Catalyst and special interests.

      *   The Courier won an award for a bogus story regarding an alleged assault
      on Fairhope’s former HR director by Mayor Karin Wilson, costing the city thousands
      of dollars.

      *   Chuckee Cheeze only reported one side of lawsuits against Fairhope.

      *   The Catalyst Fairhope City Council assisted former employees in suing the
      City to humiliate the Mayor.

      *   Councilman Robert Brown used his elected office and appointed board position
      to secure a several hundred thousand dollar contract from the Fairhope Art Center
      for his construction company.

      *   An Ethics Complaint was filed against Councilman Robert Brown regarding
      his actions.


      THE DISCOVERY

      *   Chuckee Cheeze experienced a hallucination that he received an award for
      Freedom of Information requests and First Amendment Rights.

      *   The Alabama Press Association awarded Chuckee for a bogus story; the allegations
      listed did not hold up.

      *   Information supporting Cheeze’s reporting was provided by Catalyst members
      and City Council persons via "back doors," bypassing official FOIA requests.

      *   The Ripp Report obtained thousands of documents via FOIA, establishing that
      information passed through back doors from Council Chambers is not accepted.


      THE PIVOT

      *   Article 2 proves that Chuckee Cheeze’s professional achievements (the award)
      and his reporting success are tied directly to receiving non-public information
      funneled by Catalyst and City Council members rather than legitimate journalism
      or public records.

      *   The award was for a fabricated story, proving the credibility of his reporting
      was compromised by political backing.


