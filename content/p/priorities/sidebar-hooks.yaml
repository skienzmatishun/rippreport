      - Connects abstract non-regulation status (Article 1) to concrete financial danger via consumer petition and specific rate fears ($154.50/month).
      - Proves the utility (BCSS) has successfully influenced/lobbied officials to ignore oversight.
      - Bridges the gap: The sewer hearing is now a tool for testing if officials will support voter protection (Shelby County model) or the private monopoly.

