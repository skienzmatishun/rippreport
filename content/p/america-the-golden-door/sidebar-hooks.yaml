  public-service-announcement-alabama-court-of-civil-appeals-judge-place-one:
    brief: 'THE CONFLICT:

      *   Judge Michelle Thomason separated children from their mothers in many divorces
      when other options were available.

      *   This forced separation is explicitly defined as "clinical child abuse."


      THE DISCOVERY:

      *   Judge Michelle Thomason of the Baldwin County Family Court has inflicted
      damage on hundreds of families and children.

      *   More complaints have been filed against Judge Thomason than all other judges
      in Baldwin County.


      THE PIVOT:

      *   Article 2 provides specific evidence (number of complaints, reputation)
      confirming that Judge Michelle Thomason is the problematic figure referenced
      in Article 1 regarding forced separation of children.


      KEY ENTITIES:

      *   Judge Michelle Thomason

      *   Baldwin County Family Court

      *   Christy Olinger Edwards

      *   July 17th'
