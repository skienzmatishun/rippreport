      family hardship.

      *   Thomason had as many as 6 complaints filed against her in the last 18 months,
      all dismissed by the Judiciary.

      *   Court changes are being implemented to prevent Thomason from inflicting
      bad judgment on temporary custody and support hearings.


      THE PIVOT

