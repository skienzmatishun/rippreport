      during trial.

      - Mississippi autopsy originally listed cause of death as "asphyxiation by strangulation."

      - Prosecution and court ordered the body exhumed in 2003/2004 to conduct a second
      autopsy in Baldwin County.


      THE DISCOVERY:

      - New attorneys representing Lawrence uncovered that the second autopsy ordered
      in 2003/2004 was never included in his trial file.

      - Criminal rights advocates confirmed this exculpatory autopsy evidence was
      suppressed from the defense during the original trial.

      - Evidence re-emerged and was discovered by advocates in 2023.


      THE PIVOT:

      - This second article alleges Sheriff Hoss Mack, DA David Whetstone, and Judge
      Robert Wilters all ordered the body exhumation.

      - Article claims these three officials admitted in a prior Lagniappe cover story
