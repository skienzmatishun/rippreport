  no-justice:
    brief: 'THE CONFLICT: 2003 murder of Brandon Hastings in Baldwin County. Murray
      “Bubba” Lawrence Jr. convicted and sentenced to life without parole based on
      prosecution claim of gunshot wound.

      THE DISCOVERY: Second autopsy/coroner’s report unearthed during Rule 32 petition
      phase. Report states cause of death was suffocation, NOT gunshot. Discovery
      order violation confirmed; report never provided to defense during trial.

      THE PIVOT: Robert Wilters (District Attorney) and Hoss Mack (Lead Investigator)
      signed the withheld autopsy report. Wilters also presided as Judge during Lawrence’s
      trial. Discovery proves suppression was willful and deliberate by the specific
      officials who later signed off on state response to Rule 32.

      KEY ENTITIES: Murray “Bubba” Lawrence Jr., Brandon Hastings, Robert Wilters
      (DA/Judge), Hoss Mack (Sheriff/Investigator/Coroner), David Whetstone (Prosecutor),
      Haygood Kristi Deason (Current ADA).'
