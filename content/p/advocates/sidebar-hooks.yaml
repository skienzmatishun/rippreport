      - Report authorized by Mack Sr. "under the authority granted by the District
      Attorney Office."

      - State Department of Forensic Sciences delivered results in letter dated May
      17, 2004.

      - Letter CC’d to Hoss Mack and his father (Mack Sr.).

      - Wilters wrote/signed the order allowing autopsy.


      PIVOT:

      - Article 2 (Ripp Report) alleges Sheriff, District Attorney, and Presiding
