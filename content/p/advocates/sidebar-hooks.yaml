      - Hastings (Victim)

      - Willie Huntley (Defense Attorney)

      - Whetstone (Prosecutor/District Attorney)

      - Wilters

      - Hoss Mack

      - Mack Sr. (Hoss Mack''s father)

      - McNeil'
