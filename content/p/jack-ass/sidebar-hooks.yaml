      *   Senator Pittman leveraged his office to obtain heavy equipment contracts
      for Baldwin County Government and other municipal contracts.


      THE DISCOVERY:

      *   Jack Burrell orchestrated a campaign to obstruct the Mayor’s office.

      *   Burrell is complicit in leaking documents and fueling attacks on the Mayor
      due to an Ethics complaint filed against her.

      *   Burrell fought to keep control of the Airport land title within the Authority,
      opposing the City''s position.

      *   Burrell approved Airport funds to hire an attorney to investigate The Ripp
      Report.


      THE PIVOT:

