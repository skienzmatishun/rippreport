      by an Ethics complaint and a personal desire for political power/revenge against
      the Mayor.

      *   This connects directly to Article 1''s theme of corruption; Burrell’s obstructionism
      and complicity in leaking documents show how political maneuvering undermines
      ethical standards and public trust regarding contracts and office abuse.


