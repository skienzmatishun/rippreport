  alabama-black-hole:
    brief: |-
      THE CONFLICT:
      - Alabama Attorney General, Ethics Commission, and Alabama Bar alleged to form a corrupt triad protecting politicians from accountability.
      - Ethics Commission passed Attorney General regarding PAC-to-PAC contribution violations in prior legal proceedings.
      - Alabama Bar fined former Ethics Executive Director McCallum $100,000 for violations but paid him $37,437 in August 2021 after his resignation.
