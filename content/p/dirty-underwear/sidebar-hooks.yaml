      - Ripp Report filed multiple complaints targeting Municipal Judge, Councilman, and Circuit Judge; authorities quashed all inquiries.

      THE DISCOVERY:
      - Francis Paul Ripp (The Ripp Report) sent a formal complaint dated August 21, 2022 to Clark Morris (Attorney General).
      - Letter includes a 100+ page evidence packet on Albritton’s "Self Dealing."
      - Zero response received from Special Prosecution Office, Ethics Commission, or Alabama Bar as of letter writing.
      - Cynthia Raulston (Albritton’s partner/Trustee) called Ripp in January 2022 to advise against complaint; admitted Albritton concealed trusteeship duties on economic statement.
      - Mabel Amos Trust: Trustees and Regions Bank altered records in 2014 to list schools instead of students, hiding beneficiaries.
      - Circuit Judge Ben Bowden (Albritton’s former law partner) received $45,000 in scholarships through the altered trust records.
      - Attorney General's Office currently in conflict with Ethics Commission regarding "exculpatory evidence."

      THE PIVOT:
      - Article 2 is the primary evidentiary document (letter/packet) validating Article 1’s systemic corruption claims.
      - Establishes a direct timeline: Ripp contacted agencies July 16, 2021; formally demanded action August 21, 2022.
      - Proves Article 1’s claim of "black hole" corruption via the lack of response to the August 2022 formal appeal.
      - Confirms Albritton/Raulston collusion referenced in Article 1 via specific Jan 2022 phone call documentation included in the letter.
      - Validates IRS "self-dealing" claims (Section 4941(d)) by documenting the specific economic statement omission and Regions Bank involvement.

      KEY ENTITIES:
      - Francis Paul Ripp (The Ripp Report)
      - Clark Morris (Attorney General of Alabama)
      - Tom Albritton (Ethics Commission Exec Director)
      - Cynthia Raulston (Albritton Co-Truster/Partner)
      - Ben Bowden (Circuit Judge/Law Partner)
      - Mabel Amos Trust
      - Regions Bank
