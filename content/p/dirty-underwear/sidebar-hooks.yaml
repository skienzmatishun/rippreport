      - Examiners report outlines McCallum was paid salary for months after resigning and continued perks.
      - Ethics Commission offered no details about what laws Albritton allegedly broke in lawsuit context.
      - No state agency or Governor has taken action on the charges revealed via lawsuit and civil suit filings.
      - Allegation that only recourse for justice is to file a civil suit because AG/Bar/Commission see no problem.

