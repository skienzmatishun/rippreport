  gulf-shores-lawsuit-2020:
    brief: 'THE CONFLICT

      *   Gulf Shores City Council heard an appeal of the Planning Commission''s decision
      to approve the Regency Place Apartments Site Plan Application on Monday, October
      29, 2018.

      *   Over 750 individuals signed a petition opposing the high-density apartment
      complex.

      *   Residents feared property values would decrease by 13.8%.

      *   Pete Sims filed an appeal of the Planning Commission''s action to the Mayor
      and City Council.


      THE DISCOVERY

      *   Gulf Shores citizens have officially filed a lawsuit against the City of
      Gulf Shores regarding the approved apartment complex.

      *   The Widget Article notes that Pete Sims received special recognition for
      his perseverance in representing affected citizens.


      THE PIVOT

      *   Article 1 details the initial flawed planning approval process and the citizen''s
      attempt to stop it via appeal.

      *   Article 2 confirms that the legal action has escalated beyond an appeal,
      resulting in a formal lawsuit against the City Government concerning the same
      development.


      KEY ENTITIES

      *   Regency Place Apartments

