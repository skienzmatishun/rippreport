    text: 'One father’s struggle against Case #DR-2017-900956.03 is just the tip of
      a very dirty iceberg. The Ripp Report has tracked over 150 complaints against
      Judge Michelle Thomasson, proving her courtroom is exactly where justice goes
      to die for Baldwin County families.'
