      - Tucker Dorsey (Baldwin County Commissioner / SARPC Interim Director)

      - Senator Tripp "Boom Boom" Pittman

      - Tim Kant (Fairhope Mayor)

      - Francis Paul Ripp

      - BP (Oil Company)

      - CATALYST (Political organization, Common Denominator)

      - Frank Burt (County Commissioner/Stakeholder in Mega Site project)

      - Greg Mims (Former Fairhope Staff utilized by Pittman/Kant)

