      "skimmed 750,000 of BP money" through his company and used a letter from the
      Ethics Commission to enter Fairhope municipal contracts within his district.


      THE DISCOVERY:

      - The Widget article proves that corruption in Baldwin County has been systemic
      for approximately ten years ("A DECADE OF CORRUPTION").

      - It identifies CATALYST as the common denominator linking multiple alleged
      corrupt acts, including Mega Site theft, The Strawman case, and political control
      efforts.

      - It reveals further specific examples of widespread issues: Fairhope Airport
      bid rigging by Council President Burrell; Councilman Boone''s LLC dealings;
      Councilman Brown''s Art Center/soccer field contracts; the attempted $11.2 million
      triangle property deal for conservation easement via CATALYST council; and The
