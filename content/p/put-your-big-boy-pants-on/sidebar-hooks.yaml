      - It alleges that judicial bodies (Judges, Attorneys) are complicit in insulating
      accused politicians and dismissing evidence regarding these conflicts of interest.


      THE PIVOT:

      - Article 1 focuses narrowly on the Dorsey/Pittman conflict and a singular $750k
      BP incident.

      - Article 2 transforms this specific event into proof of a decade-long, systemic
      rot within Baldwin County government and the judicial structure.

      - It provides the organizational context (CATALYST) that connects individual
      actions (like Pittman’s BP contract success in 2010) to larger patterns of political
      corruption and resource mismanagement (Mega Site/Triangle land deals).


