hooks:
  catalyst-queen-remember-family-court:
    brief: 'THE CONFLICT

      *   Judge Michelle Thomason is accused of inflicting damage on hundreds of families
      and children through her Family Court decisions in Baldwin County, Alabama.

      *   Multiple complaints have been filed against Judge Thomason regarding favoritism
      for attorneys and poor judicial decisions.


      THE DISCOVERY

      *   Judge Michelle Thomason was the first client signed up by the organization
      Catalyst.

      *   Catalyst is described as a ghost organization directed by Scott “baby” Boone,
      with members including Eliott Haygood and Stacy.

      *   Complaints against Judge Thomason involve arbitrary/inconsistent child visitation
      schedules that destroyed families.

      *   A child suicide was credited to Judge Thomason after she split up children
      from their mother.


      THE PIVOT

      *   Article 2 provides specific structural links (Catalyst organization, Scott
      Boone) and concrete examples of judicial harm (child suicide, arbitrary scheduling)
      that substantiate the general claims of corruption and poor performance made
      in Article 1 against Judge Thomason.


      KEY ENTITIES

      *   Judge Michelle Thomason

      *   Baldwin County

      *   Catalyst

      *   Scott “baby” Boone

      *   Eliott Haygood

      *   Stacy

      *   Christy Olinger Edwards (candidate)'
    generated_at: '2026-07-11T03:44:34.075669Z'
    text: Judge Michelle Thomason's reign in Baldwin County Family Court has left
      a trail of shattered homes and grieving parents. We discovered she was the charter
      client for Catalyst, a ghost group run by Scott "baby" Boone that pulls the
      strings while children suffer under her arbitrary and deadly rulings.
  baldwin-county-family-court:
    brief: 'THE CONFLICT

      *   Judge Michelle Thomasson of Baldwin County Family Court is accused of inflicting
      damage on hundreds of families and children.

      *   She is described as infamous, having extensive "baggage and skeleton’s in
      her closet."

      *   Specific judicial misconduct includes allowing attorneys to illegally obtain
      medical records without consequence.

      *   Thomasson disregarded expert psychological evaluations regarding child custody
      decisions, leading to long legal battles for the child.

      *   Thomasson allowed parties to lie on the stand (perjury) with no disciplinary
      action.


      THE DISCOVERY

      *   Judge Thomasson is running for the Court of Appeals position vacated by
      Craig Pittman.

      *   She intends to use the Republican party to retaliate against opponents in
      the court system.

      *   Thomasson is a charter member of the Board of Baldwin Substance Abuse Services,
      an organization with questionable financial transparency regarding collected
      fees from DUI/drug convictions.


      THE PIVOT

      *   Article 2 reveals that Thomasson’s professional ambition (running for Court
      of Appeals) and political maneuvering contradict her stated commitment to judicial
      integrity described in Article 1.

      *   The alleged "dirty politics" and reliance on a "cottage industry" (supplying
      attorneys with cases) cited in Article 1 are reinforced by her pursuit of a
      higher court position, suggesting self-interest over the welfare of children.


      KEY ENTITIES

      *   Michelle Thomasson

      *   Baldwin County Family Court

      *   Court of Appeals

      *   Craig Pittman

      *   Christy Olinger Edwards

      *   Board of Baldwin Substance Abuse Services

      *   Alabama Bar Association

      *   DUI/drug cases'
    generated_at: '2026-07-11T03:44:34.075678Z'
    text: While Judge Michelle Thomasson claims to protect children, her record is
      actually a playground for bottom-feeder attorneys. She is now gunning for the
      Court of Appeals to escape her scandals, all while sitting on the board of a
      substance abuse group that refuses to show the public where the money goes.
  shackled-chained-handcuffed-bc-un-family-court:
