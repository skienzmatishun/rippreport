      *   Daphne Police Department

      *   Loxley Police Department

      *   Guardian Ad Litem (GAL)

      *   Case #230 700 147

      *   Mother arrested (January 10, 2024)'
    generated_at: '2026-07-11T03:44:34.075707Z'
    text: Law enforcement and the courts claim to defend the innocent, yet they watched
