  failing-our-children-in-baldwin-county:
    brief: 'THE CONFLICT

      *   Judge Michelle Thomasson of Baldwin County Family Court is accused of inflicting
      damage on hundreds of families and children.


      THE DISCOVERY

      *   A father detailed a case where his daughter was exposed to sexual intercourse
      and explicit materials while under the care of two mothers over five months.

      *   Agencies including the Baldwin County Sheriff Department, Daphne Police
      Department, Loxley Police Department, DHR, and the Family Court system failed
      to intervene or protect the children.

      *   Detective Trey Kraynak investigated Case #230 700 147 but took no effective
      action.

      *   The court-appointed Guardian Ad Litem (GAL) failed to conduct a home inspection
      or interview the daughter and displayed a conflict of interest in court.

      *   The mother was arrested for Domestic Family Violence on January 10, 2024,
      and another mother attempted suicide.


      THE PIVOT

      *   Article 2 proves that the systemic failures within law enforcement, DHR,
      and the family court system allowed child abuse and neglect to continue unchecked,
      directly connecting to the allegations made against Judge Thomasson in Article
      1 regarding damage inflicted on families/children.


      KEY ENTITIES

