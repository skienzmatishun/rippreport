  baldwin-county-family-court:
    brief: 'THE CONFLICT

      *   Judge Michelle Thomasson of Baldwin County Family Court is accused of inflicting
      damage on hundreds of families and children.

      *   She is described as infamous, having extensive "baggage and skeleton’s in
      her closet."

      *   Specific judicial misconduct includes allowing attorneys to illegally obtain
      medical records without consequence.

      *   Thomasson disregarded expert psychological evaluations regarding child custody
      decisions, leading to long legal battles for the child.

      *   Thomasson allowed parties to lie on the stand (perjury) with no disciplinary
      action.


      THE DISCOVERY

      *   Judge Thomasson is running for the Court of Appeals position vacated by
      Craig Pittman.

      *   She intends to use the Republican party to retaliate against opponents in
      the court system.

      *   Thomasson is a charter member of the Board of Baldwin Substance Abuse Services,
      an organization with questionable financial transparency regarding collected
      fees from DUI/drug convictions.


      THE PIVOT

      *   Article 2 reveals that Thomasson’s professional ambition (running for Court
      of Appeals) and political maneuvering contradict her stated commitment to judicial
      integrity described in Article 1.

      *   The alleged "dirty politics" and reliance on a "cottage industry" (supplying
      attorneys with cases) cited in Article 1 are reinforced by her pursuit of a
      higher court position, suggesting self-interest over the welfare of children.


      KEY ENTITIES

      *   Michelle Thomasson

