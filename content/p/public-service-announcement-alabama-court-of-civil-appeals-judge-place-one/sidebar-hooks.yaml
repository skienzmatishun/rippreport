  catalyst-queen-remember-family-court:
    brief: 'THE CONFLICT

      *   Judge Michelle Thomason is accused of inflicting damage on hundreds of families
      and children through her Family Court decisions in Baldwin County, Alabama.

      *   Multiple complaints have been filed against Judge Thomason regarding favoritism
      for attorneys and poor judicial decisions.


      THE DISCOVERY

      *   Judge Michelle Thomason was the first client signed up by the organization
      Catalyst.

      *   Catalyst is described as a ghost organization directed by Scott “baby” Boone,
      with members including Eliott Haygood and Stacy.

      *   Complaints against Judge Thomason involve arbitrary/inconsistent child visitation
      schedules that destroyed families.

      *   A child suicide was credited to Judge Thomason after she split up children
      from their mother.


      THE PIVOT

      *   Article 2 provides specific structural links (Catalyst organization, Scott
      Boone) and concrete examples of judicial harm (child suicide, arbitrary scheduling)
      that substantiate the general claims of corruption and poor performance made
      in Article 1 against Judge Thomason.


