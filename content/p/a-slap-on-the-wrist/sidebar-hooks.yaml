      - Municipal Plea: McSharry pleaded guilty to assault; sentenced 180 days jail
      with two months credited for rehab.

      - Circuit Involvement: Baldwin County Circuit Court Judge Clark Stankoski assigned
      to handle civil and intoxication charges.


      THE DISCOVERY:

      - Charge Dismissal Reason: Stankoski dismissed the assault charge based on failure
      to amend Fairhope charging document to include "did cause bodily harm."

      - Municipal Attorney Role: Marcus McDowell failed to amend complaint over a
      year post-assault.

      - Discovery Orders: McSharry''s attorney James Pittman subpoenaed officials
      and media; Stankoski partially granted subpoenas, ruling shield laws do not
      protect information provided.

      - Systemic Connections: Jack Burrell (Fairhope City Council President), Marcus
