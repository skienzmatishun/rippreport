  catalyst-justice:
    brief: 'THE CONFLICT:

      - 2018: Ronan McSharry physically assaulted Paula DiNiardi in a bar stool incident
      at his pub, Fairhope. Video evidence of assault exists; DiNiardi injured (potentially
      broke neck), lost job, incurred $10,000+ in medical bills.

      - 2017 (two months prior to 2018 incident): McSharry convicted of “breach of
      peace” after allegedly harassing artist Nall Hollis.

      - 2017 Probation: McSharry sentenced to probation requiring no distilled liquors,
      no inebriation, and avoiding contact with Hollis.

      - 2017 Jail: McSharry sentenced to 6 months jail for the Nall Hollis case; never
      served a day.

      - Current Legal: Municipal Attorney Marcus McDowell (City Attorney) failed in
      duties; Appeals Court dropped McSharry’s assault charge due to prosecutor inaction.


      THE DISCOVERY:

      - Second article confirms the Appeals Court dropped McSharry’s assault charge
      specifically because the prosecutor failed to act properly.

      - Second article identifies Ronan McSharry’s Irish Pub as the “watering hole”
      for CATALYST attorneys, judges, and Councilman Jack Burrell.

      - Second article establishes a pattern of immunity for political allies: Tripp
      Pittman ($750,000 theft), Chris Elliott (DUI charge used/escapes responsibility),
      Mayor Cant (FEMA fund misuse), Robert Brown (Fairhope Art Center deal).

      - Reveals the group name: CATALYST (operates under Scott Boone Consulting SBC).


      THE PIVOT:

      - Article 2 is the smoking gun because it links McSharry’s personal crimes to
      a larger organizational protection racket.

      - Confirms Article 1''s claim of “Systemic Corruption” by showing the City Attorney
      and Prosecutor failed to prosecute their friends (McSharry/Burrell) while protecting
      them from victim backlash.

      - Proves McSharry’s pub was not a random location but an operational hub (“watering
      hole”) for the political cabal mentioned in Article 1.


      KEY ENTITIES:

      - Ronan McSharry (Suspect/Owner)

      - Paula DiNiardi (Victim)

      - Jack Burrell (Fairhope Councilman)

      - Marcus McDowell (City Attorney/Municipal Prosecutor)

      - Judge Haymes Snedeker (Municipal Judge, large developer)

      - Judge Stankoski (Baldwin County Circuit Court)

      - Nall Hollis (Artist, prior victim)

      - Tripp Pittman (Former Senator)

      - Chris Elliott (Senator)

      - Mayor Cant (Former Mayor)

      - Robert Brown (Councilman)

      - Kevin Boone (“Strawman” Councilman, SBC conduit)

      - Scott Boone (SBC owner/consultant)

      - CATALYST / SBC'
