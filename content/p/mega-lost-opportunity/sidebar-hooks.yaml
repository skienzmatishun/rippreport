    text: Politicians are turning the $48 million Mega Site disaster into a campaign prop to hide a decade of failure. Lee Lawson claims we are the "only choice" left, but the total lack of rail or water proves we are actually dead last in the state.
  all-smoke-and-mirrors:
    brief: |-
      THE CONFLICT
      - Baldwin County paid $32 million in 2012 for the 3,009-acre Mega Site.
      - Payment split: Crosby Trust ($25,976,500) and Catawba Land Company LLC ($6,312,500).
      - 2013-2014: Lamar Advertising and Pensacola Daily News report site has insufficient traffic and no big industry interest.
      - 2015: County Commission approves further debt payments ($8.5M on existing debt; $23.7M total remaining) despite zero infrastructure (no rail, water, power, or signs).
      - Lee Lawson (BCEDA CEO) claims "shovel ready" status and 55-60 real inquiries over 8 years.
      - Article 1 author notes site had no sign or gate for 10 years; BCEDA receives hundreds of thousands in county funding annually.
      - Ron Cink (Budget Director) estimates total taxpayer investment including interest at approximately $48 million.

      THE DISCOVERY
      - Article 2 explicitly labels both the Mega Site and Fairhope Airport Authority as "all smoke and mirrors."
      - Confirms Fairhope Airport Authority debt represents 21% of the city's total debt.
      - Citizens fund Airport Authority projects via appropriation; Authority retains ownership and control of land.
      - Fairhope Airport Authority board hires attorneys paid by tax dollars to intimidate citizens filing complaints.
      - Confirms "penny school tax" skimmed $5 million from schools for county infrastructure.

      THE PIVOT
      - Article 2 proves the "empty claims" and financial mismanagement highlighted in Article 1 are not isolated to one deal but represent a systemic pattern in Baldwin County development.
      - Validates skepticism of Lee Lawson by showing similar "misleading tactics" and public fund abuse at the Fairhope Airport Authority under the same local governance culture.
      - Elevates Article 1 from "land deal complaint" to evidence of a corrupt economic development apparatus using intimidation against the public.

      KEY ENTITIES
