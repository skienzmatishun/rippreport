  lt-governor-ainsworth-breaks-with-governor:
    brief: |-
      THE CONFLICT:
      - Alabama State Senator Andrew Jones (R-Centre) is carrying Senate Bill 67 at the request of Governor Kay Ivey.
      - SB67 is designed to place more control of the Department of Veterans Affairs under the Governor.
      - Current law requires veterans' groups to provide three names for board members and have the Veterans Board select the Commissioner.
      - SB67 allows Governor Ivey sole appointment power for both board members and the Commissioner, bypassing the existing Veterans Board.
      - Governor Ivey fired former Veterans Commissioner Kent Davis following an ethics complaint he filed with Ethics Commissioner Kim Boswell.
      - Governor Ivey claimed in her State of the State address she must control appointments to ensure a "team player" Commissioner.

      THE DISCOVERY:
      - As of February 11, 2025, Lt. Governor Will Ainsworth released a statement opposing SB67.
      - Senate Bill 67 is scheduled for consideration in the Alabama Senate on February 11, 2025 at 2:00 p.m. CST.
      - Republican colleagues, including Senator April Weaver (R-Briarfield) and Senator Chris Elliott (R-Josephine), have publicly opposed the bill.
      - Representative Ed Oliver (R-Dadeville) is sponsoring SB67 in the House of Representatives.
      - Article 2 confirms Governor Ivey’s internal goal: removing power from the Veteran's Board to centralize it under her executive branch via an appointed Commissioner.

      THE PIVOT:
      - Article 1 (The Rally) is a direct physical response to the legislation and policy shift defined in Article 2.
      - Article 2 identifies SB67 as the specific instrument causing the dissent, turning a generic protest into actionable political resistance.
      - Article 2 provides the internal Republican fracture (Ainsworth vs. Ivey/Jones) that validates veterans' claims of being ignored by their own party leadership, making Ainsworth’s opposition the catalyst for credibility among GOP legislators mentioned in Article 1.

      KEY ENTITIES:
      - Governor Kay Ivey (R)
      - Lt. Gov Will Ainsworth (R)
      - Kent Davis (Veterans Commissioner)
      - Kim Boswell (Ethics Commissioner)
      - Senate Bill 67 (SB67)
      - Alabama Department of Veterans Affairs / ADVA
      - State Senator Andrew Jones (R-Centre)
      - Senate April Weaver (R-Briarfield)
      - Senator Chris Elliott (R-Josephine)
      - Rep. Ed Oliver (R-Dadeville)
    generated_at: '2026-03-10T13:51:19.974679Z'
    text: Governor Ivey thinks she can bully the Veterans Board into submission, but her own party is finally jumping ship. When even Lt. Governor Ainsworth calls out her shady SB67 power play, you know the corruption has gone way too far.
  go-to-hell-veterans:
    brief: |-
      THE CONFLICT:
      Veterans rallying at Alabama State House against placing ADVA (Alabama Department of Veterans Affairs) under Governor Kay Ivey's control.
      Legislation to restructure the State Board of Veterans Affairs passed Alabama State Senate 21-9.
      Legislation passed Alabama House by vote of 56 to 39, removing debate from the floor.
      Bill moves VA authority toward Governor’s office instead of current board structure.

      THE DISCOVERY:
      House bill sponsored by Rep. Ed Oliver (R-Dadeville), chairman of Military and Veterans Affairs Committee.
      Specific legislators voted against bill including: Napoleon Bracy, Chip Brown, Barbara Drummond, Brett Easterbrook, Jennifer Fidler, Donna Givens, Frances Holk-Jones, Chris Pringle, Mark Shirey, Matt Simpson, Shane Stringer, Margie Wilcox.
      Rep. Alan Baker (R-Brewton) is the only local House member voting in favor of bill.
      Bill alleged as retaliation by Kay Ivey following ethics complaint regarding $7 million in American Rescue Plan Act funds intended for ADVA.
      Ethics complaint filed by ADVA Commissioner Kent Davis targeting Alabama Department of Mental Health Director Kimberly Boswell.
      Claim of collusion: Officials allegedly prevented ADVA from obtaining 7 million dollars in ARPA funds.
      Rep. Ed Oliver history noted: Long-standing issue with ADVA management since 2020 showdown regarding COVID-era protocol at Bill Nichols State Veterans Home.

      THE PIVOT:
      Article 2 reveals the legislative mechanism and specific retaliatory motive behind Article 1's rally.
      Identifies Rep. Ed Oliver as the key legislative vehicle (sponsor) pushing the Governor’s agenda on this issue.
      Connects the rally in Article 1 directly to the ethics complaint and missing $7 million funds mentioned in Lagniappe Mobile article.
      Proves Article 1 is not random protest but a response to specific voting betrayal (56-39) and financial irregularities with Boswell, Ivey’s cabinet member.
      Article 2 names Sen. Andrew Jones of Cherokee County as another target linked to the effort ("should be targeted in next election").

      KEY ENTITIES:
      Kay Ivey (Governor)
      Kent Davis (ADVA Commissioner)
      Kimberly Boswell (Director, Alabama Department of Mental Health)
      Ed Oliver (Rep. R-Dadeville)
      Andrew Jones (State Sen.)
      Greg Albritton
      Alan Baker
    generated_at: '2026-03-10T13:51:19.974686Z'
    text: Rep. Ed Oliver is doing the Governor’s dirty work by stripping veterans of their voice after a $7 million ethics scandal. This isn't about policy; it’s a cold-blooded retaliation against Admiral Davis for exposing the state's financial rot.
