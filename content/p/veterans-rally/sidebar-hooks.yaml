      - The Veterans Board opposed Governor Ivy’s forced removal of Admiral Davis.

      THE DISCOVERY:
      - Widget article identifies current legislative push as “retaliation” by Governor Ivy against the Veterans Board.
      - Specific protest date confirmed: Montgomery rally scheduled for Feb 25th at 11:30.
      - Claims Governor Ivy’s “Biden condition” may impact her ability to finish term.

      THE PIVOT:
      - Article 2 (Widget) provides motive: links legislative bill to personal political retaliation between Governor Ivy and Veterans Board.
      - Article 2 explains the specific chain of events: Admiral Davis removal -> Board opposition -> Legislative retaliation via bill.
      - Identifies specific target for activism: Legislators voting for this bill (to be challenged/blackballed).

      KEY ENTITIES:
      - Governor Ken Ivy (“poison Ivy”)
      - Admiral Kent Davis (Director of Veterans Affairs)
      - Department of Veterans Affairs (ADVA)
      - Alabama State House
      - Alabama State Capitol
      - Montgomery, AL
