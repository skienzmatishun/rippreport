      - Lt. Andre Reid (BCSU MCU) refused immediate release of body camera footage to "respect privacy" despite Alabama Supreme Court ruling stripping public right to sue for such access.
      - Prosecutor District Attorney David Whetstone (since retired) handled the earlier wrongful conviction case.

      THE DISCOVERY
      - Murray Lawrence Jr wrongfully convicted of murder held in jail since 2005.
      - Case against Murray Lawrence Jr built on: 1) Single witness testimony bargaining reduced sentence, 2) No blood, 3) No DNA, 4) No witnesses, 5) No fingerprints, 6) No weapon/ballistics.
      - Two medical examiner reports in Murray Lawrence case disputed state’s official cause of death.
      - Sheriff Hoss Mack was lead investigator in Murray Lawrence case and never produced any evidence; Deputy District Attorney Robert Wilters served as judge on the case.
      - Current Baldwin County Sheriff Hoss Mack and current District Attorney Robert Wilters are explicitly linked by Article 2 to the O.J. French/Otis case investigation team.

      THE PIVOT
      - Article 2 proves Hoss Mack and Robert Wilters are not new officials; they are the specific individuals responsible for a known wrongful conviction (Murray Lawrence Jr) and now hold oversight roles in the current O.J. French/Otis case.
      - Article 2 states: "Sheriff Hoss Mack and D.A. Wilters were involved in the Murray Lawrence case. The same people are now involved in the O.J. French case."
      - Article 2 exposes a track record: 9 people killed by BCSO, no officer held remotely responsible; O.J. French/Otis case fits this pattern of suppressed evidence (body cam) and cover-up behavior similar to the 2005 Lawrence conviction.

      KEY ENTITIES
      - Murray Lawrence Jr (Wrongful convict).
      - O.J. French/Otis (Victim).
      - Hoss Mack / Huey Mack (Lt/MCU -> Baldwin County Sheriff).
      - Robert Wilters (Judge in Lawrence case -> District Attorney of Baldwin County).
