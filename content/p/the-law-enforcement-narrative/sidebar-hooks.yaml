      - Article 1 alleges Baldwin County Major Crimes Unit is spreading a cover-up narrative.
      - List of seven previous BCSO/Major Crimes-associated incidents cited as pattern: Uvalde, Jonathan Victor death (I-10), Robert Yates death (Key Largo Villas eviction), Peyton Little death (confidential drug informant detail hidden from investigating deputy), 5-person wrong-way pursuit on I-10, Steve Nodine malicious prosecution case, Forest Bullin attempted murder conviction.
      - Main Article alleges Sheriff Huey Mack is responsible for misinformation and lack of transparency.

      THE DISCOVERY:
      - Article 2 classifies OJ French’s death as incident number 8 in a string of escalating excessive force cases over more than five years.
      - Article 2 identifies specific composition of Baldwin County Major Crimes Unit (BCMCU): Bay Minette Police Chief Al Tolbert (current chairman), Robertsdale Police Chief Brad Kendrick, Sheriff Huey “Hoss” Mack (BCSO), Gulf Shores Police Chief Edward Delmore, Daphne Police Chief David Carpenter, Foley Police Chief Thurston Bullock.
      - Article 2 confirms BCMCU is tasked with reviewing actions of officers for member organizations.
      - Article 2 quotes BMJL organizer Joshua Brown stating police narrative makes no sense knowing French’s character (devoted to faith, musician alias “The Juice”).
      - Article 2 asserts BCMCU never admits police responsibility; claims internal investigation body is "smoke and mirrors."

      THE PIVOT:
      - Article 2 provides structural proof of why Main Article’s skepticism is warranted: BCMCU includes Sheriff Huey Mack and local police chiefs reviewing their own officers’ actions.
      - Article 2 validates Main Article’s claim that the unit will not provide video footage unless federal government (FBI) gets involved.
      - Article 2 confirms OJ French is death #8 in a known statistical pattern of lethal force, solidifying the “Lethal Force” narrative rather than treating it as an isolated incident.
      - Article 2 links Sheriff Mack directly to the lack of accountability allowing political control and monetization of jails.

      KEY ENTITIES:
