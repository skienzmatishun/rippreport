      *   The same council members (Boone, Burrell, Brown) are proposing the $2.65
      million recreation land purchase based on a questionable appraisal.

      *   This council has a history of similar corruption: draining 5 city accounts
      for the soccer fields purchase and spending over $5 million on a substandard
