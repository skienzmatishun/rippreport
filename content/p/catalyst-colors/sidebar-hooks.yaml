  fairhope-state-of-the-city:
    brief: 'THE CONFLICT

      *   Three Fairhope City Councilmen (Burrell, Brown, Boone) approved and purchased
      $2.65 million in land for recreation without National Park Service approval.

      *   The purchase was completed on November 1st.

      *   Council members allegedly used city accounts to fund the purchase.


      THE DISCOVERY

      *   The council ordered a highly questionable appraisal for the property, dated
      June 28, 2019, before public notification.

      *   In January 2020, the City Council declared the $2.65 million property "surplus
      and not needed for public or municipal purposes" via an ordinance, leasing it
      for $9,000.00 a year.

      *   Funds were not allocated or budgeted for recreation land, causing delays
      in infrastructure projects (K1 center, Nix building roof repairs).


      THE PIVOT

      *   Article 2 proves that the initial purchase (Article 1) was based on a questionable
      appraisal and was subsequently designated surplus by the city council shortly
      after closing, indicating a deliberate misuse of public funds and process manipulation.


      KEY ENTITIES

