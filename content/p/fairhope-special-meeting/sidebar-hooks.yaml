      from the city of Fairhope.

      *   Councilmen Boone Burrell and Brown (the three B''s) supported Sherry Sullivan’s
      settlement and encouraged other employees (Pandora Heathcoat) to file lawsuits
      against the city.

      *   Burrell is accused of using his position to obstruct the Mayor and hiding
      activities at the Fairhope Airport under the Alabama Unethical Commission.


      THE PIVOT:

      *   Article 2 provides specific evidence that Burrell''s general control (Article
      1) is manifested through deliberate actions supporting employee lawsuits and
      obstruction, proving he is actively harming the city/employees rather than merely
      holding office.


