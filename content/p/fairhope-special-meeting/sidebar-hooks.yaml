  jack-ass:
    brief: '**BRIDGE BRIEF**


      **1. THE CONFLICT:**

      - Jack Burrell called a special city council meeting on Friday the 29th (implied
      July 2017) citing concerns over his control and administrative actions in Fairhope.

      - The City of Fairhope had awarded a major contract for emergency hurricane
      debris removal (Bid No. 009-17) to Pittman Tractor, which is owned by Senator
      Trip "Trip" Pittman.


      **2. THE DISCOVERY:**

      - On Monday night''s city council meeting (July 2017), Burrell defended the
      award of the contract despite a lack of ethics opinion, claiming it was legal.

      - The Widget Article alleged that Senator Pittman used his position as "trustee"
      of BP funds to siphon off $750,000 and leveraged political office for other
      municipal contracts in Baldwin County.

      - Mayor Wilson later re-bid the contracts under a new process to ensure fairness
      and prevent elected officials from receiving preferential treatment.


      **3. THE PIVOT:**

      - The Widget Article serves as the evidence for Burrell''s alleged control/corruption
      mentioned in the Main Article, showing he actively defended an illegal or unethical
      award of a multi-million dollar municipal contract (to Pittman Tractor) rather
      than addressing his hand-picked official''s actions during the special meeting
      called to critique him.


      **4. KEY ENTITIES:**

      - Jack Burrell (City Council President/Politician)

      - Senator Trip "Trip" Pittman

      - Mayor Wilson

      - Fairhope City Council

      - BP funds / Baldwin County Government'
