      threat/opportunity in the same corrupt pocket.


      4. KEY ENTITIES

      - Tripp Pittman

      - Bob Riley (former Governor)

      - Bill Highower (also spelled "Lowower" in text)

      - Jack Burrell

      - AG Steve Marshall

      - Deepwater Horizon / BP (ExxonMobil/BP implied by spill)

      - Fairhope City Council

      - Golden Triangle Project / Stapleton'
