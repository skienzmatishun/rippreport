      million gallons released, 13 lives lost.

      - May 8, 2010: Alabama Governor Bob Riley appoints State Senator Tripp Pittman
      as "trustee" to oversee BP spill settlement funds for Baldwin County.

      - May 3, 2010: Pittman allegedly conspires with then-Mayor of Fairhope to submit
      a personal contract for the BP funds Pittman is appointed to oversee.

      - April 20, 2020: Alabama Cannabis Association announced with 21 members; Tripp
      Pittman seeking Hemp lobbyist/farmer role.

      - July 14, 2020: Runoff date for First Congressional seat in Alabama; Pittman
      and Fairhope City Council backing Bill “Hightower”.


      DISCOVERY:

      - Article 2 confirms ongoing corruption and legal volatility in Baldwin County/Fairhope
      via Sheriff Mack lawsuits.

      - Article 2 identifies "Taxman Elliott" flip-flopping on tax policies as a local
      conflict.

      - Article 2 notes Alabama Legislature in session passing largest General Fund
      Budget despite pandemic; officials are inaccessible to public.

      - Confirms "Fairhope" remains a focal point of local power consolidation (Art
      Fest, Pier plans).


      PIVOT:

      - Article 1 exposes Pittman’s history of self-enrichment via public funds and
      political alliances in Fairhope.

      - Article 2 validates this ecosystem is currently active: Sheriff Mack lawsuits
      and Elliott’s tax flip-flops show the same type of local government friction
      where Pittman allegedly operates.

      - Article 2 proves the "Fairhope/Baldwin" political machine described in Article
      1 (Pittman, Council, Hightower) is a continuing entity influencing Sheriffs
      and Taxmen.

      - Article 2 serves as real-time context proving Pittman is still influencing
      high-level officials (Sheriff, Taxman) in the same zone where his past misconduct
      occurred.


      KEY ENTITIES:

      - Tripp Pittman (State Senator/Rep, "Trustee", Hemp Lobbyist candidate)

      - Bill “Hightower” (Bill Hightower, Hightower/HighTower)

      - Fairhope City Council

      - Sheriff Mack (Sheriff of Baldwin/Fairhope)

      - Elliott (Taxman, Tax Commissioner context)

      - Bob Riley (Former Alabama Governor)

      - BP / Deepwater Horizon

      - The Ripp Report'
