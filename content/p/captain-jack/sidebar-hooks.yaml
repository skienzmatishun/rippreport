  you-dont-know-jack:
    brief: 'THE CONFLICT

      *   Fairhope Airport Authority held a special meeting on January 8th regarding
      a "notice of availability."

      *   The meeting revisited issues concerning leases and bidding procedures from
      late 2016.

      *   Captain Jack accused Chairman Joe McEnerney of guaranteeing hanger locations
      prior to the bid process.


      THE DISCOVERY

      *   A Request for Proposal (RFP) was sent out by the Airport Authority on September
      21, 2015, with a submittal deadline of October 13, 2015 (22 days).

      *   The RFP opening for a ground lease for a commercial hanger on plat 2 occurred
      on October 20, 2015.

      *   Airport Authority minutes recorded that Jack Burrell and Vince Boothe were
      appointed to review bids.

      *   Jack Burrell led the review process for the winning bid awarded to Hix/Snedecker
      Companies DBA Mid-Bay Air, llc.

      *   Mr. Hix recused himself from a discussion regarding the recommendation.

      *   The memorandum of lease was recorded on December 17, 2015.


      THE PIVOT

      *   Article 2 provides specific documentation (RFP dates, meeting minutes) proving
      that Council President Jack Burrell and Airport Authority members (Hix, Snedecker)
      were involved in awarding a commercial hanger lease for 30 years without proper
      ethical disclosure or recusal.

      *   This moves the conflict from general accusations against Joe McEnerney to
      specific evidence of a corrupt deal involving Burrell''s dual roles on both
      the City Council and the Airport Authority.


      KEY ENTITIES

      *   Captain Jack

      *   Joe McEnerney (Chairman of the Board)

      *   Burrell (Council President; Airport Authority member)

      *   Hix (Airport Authority Board member; associated with Burrell)

      *   Snedecker (Fairhope Municipal Judge)

      *   Vince Boothe

      *   Mid-Bay Air, llc'
