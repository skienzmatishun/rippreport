  investigating-the-investigators:
    brief: 'THE CONFLICT

      *   Fairhope Airport Authority held a special meeting on January 8th to discuss
      a "notice of availability."

      *   Issues being revisited included leases, bidding procedures, and fuel farms
      from a "failed" process in late 2016.

      *   Captain Jack clashed with Joe McEnerney (Chairman of the Board) regarding
      hanger locations and guaranteeing specific sites prior to bidding.

      *   Captain Jack dominated the position of Council President for seven years.


      THE DISCOVERY

      *   The Fairhope Airport Authority is investigating attorneys hired by them
      following a complaint filed against the Authority.

      *   Specific discrepancies were found in Ray Hix''s bid submission for a lease,
      including questions regarding aircraft ownership (Hix claimed 100% ownership
      of three aircraft but answered with one), fuel estimates (Hix provided figures
      that did not match his stated ownership/usage), and construction timelines.

      *   The Authority argues they are paid from airport profits, not city appropriation,
      which raises taxpayer concerns.


      THE PIVOT

      *   Article 2 reveals specific factual errors and inconsistencies within Ray
      Hix''s bid submission for a lease, directly contradicting the claims or expectations
      associated with the past "failed" process mentioned in Article 1.

      *   The discovery of inaccuracies in Hix''s bidding process serves as evidence
      that undermines the integrity of the decisions Captain Jack sought to control
      via his influence over the Airport Authority leadership (Joe McEnerney).


