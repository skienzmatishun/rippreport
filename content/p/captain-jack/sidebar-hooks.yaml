  captain-jack-at-the-controls:
    brief: 'THE CONFLICT:

      *   Fairhope Airport Authority held a special meeting on Jan 8th to discuss
      a "notice of availability."

      *   Past issues involving leases, bidding procedures, and fuel farms were revisited
      from a failed process in late 2016.

      *   Captain Jack was previously scrutinized for overseeing suspicious lease
      bids in 2016, allegedly receiving free air miles and golf vacations from a board
      member while managing the bid process.


      THE DISCOVERY:

      *   Millions of development dollars from federal agencies expanded the airport
      with additional runways.

      *   Hangers are being offered on long-term leases without a specific long-range
      plan presented to the public.

      *   The Airport Authority receives 7 cents on the dollar as fuel income, and
      there is no record of what fuel is being used.


      THE PIVOT:

      *   Article 2 proves that Captain Jack''s past handling of suspicious lease
      bids (2016) was tied to current operational issues concerning development dollars
      and opaque financial practices (fuel income).


      KEY ENTITIES:

      *   Captain Jack

      *   Joe McEnerney (Chairman of the Board)

      *   Jack Burrell (Council President/City liaison)

      *   Fairhope Airport Authority

      *   City of Fairhope

      *   Fixed Based Operator'
