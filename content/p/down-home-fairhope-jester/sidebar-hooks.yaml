      *   The Council was found guilty in Federal Court for violating the right of free speech.
      *   Council members (Burrell, Boone, Brown) allegedly used their office for personal gain regarding land purchases.

      THE DISCOVERY
      *   The City Council approved a $2,650,000 purchase for 114 acres of recreation land without public participation.
      *   The Council lied by promising only to seek an appraisal but proceeded directly to purchase the land.
      *   This untimely purchase delays infrastructure and sewer projects and impacts the 2020 budget.
      *   Specific properties like the Triangle PARK were either legal settlements or poorly executed deals (e.g., soccer fields).

      THE PIVOT
