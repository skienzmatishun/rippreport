    text: Fairhope leaders just handed the keys to the courthouse to the city’s biggest developer, Haymes Snedeker. This investigation reveals the sickening conflict where the Council appoints the very judge who needs their signatures on his multi-million dollar construction bids.
  BACKPEDALING-FAUXHOPE:
    brief: |-
      1. THE CONFLICT
      - Fairhope City Council operates without term limits for officeholders; multiple members, Mayor Sullivan, and Municipal Judge served 5th consecutive year due to Alabama legislature postponing municipal elections for 2024.
