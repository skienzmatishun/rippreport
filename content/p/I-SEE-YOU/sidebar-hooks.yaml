      - Infrastructure spending includes Clock Plaza project awarded to RH Deas Building Co., LLC (Bid No. 23-025-2022-PWI-007) at $282,211.00; Council claims past council failures cost taxpayers over $600,000.
      - Public participation at meetings reduced to 3 minutes per person; Council previously manipulated rules attempting to eliminate public comments, forcing a backpedal due to outcry.

      2. THE DISCOVERY
      - Second article proves Councilman Jack Burrell lied when claiming he was “surprised” to see the public participation item on the recent agenda, citing federal court case Ripp v Burrell where he lost/handed his hat.
      - Second article confirms financial mismanagement across multiple projects:
        - Soccer fields cost increased from $3.5M to nearly $6M for substandard drainage/construction; City promised millions in soccer tournaments but ended short.
        - Waterfront project listed at $6.2 million with questions regarding where grants and design costs went; narrative spun as “new” by officials.
        - Triangle property settlement involved 8.25M legal settlement plus $3 million in guaranteed law fees (Attorney Cain O rear), totaling over 11M with no refund.
      - No election for Council or Mayor held during their fifth term, making them technically “un-elected” for current terms.

      3. THE PIVOT
      - Article 2 provides the smoking gun regarding trustworthiness of Councilman Burrell by citing Ripp v Burrell, which invalidates his claim of being a victim or “surprised” regarding agenda transparency.
      - Article 2 validates Article 1’s claim of a “development council” and lack of oversight by exposing the $27 million in failed projects (Soccer/Waterfront/Triangle) and unaccounted infrastructure funds.
      - Burrell’s public opposition in Article 2 regarding eliminating participation rules directly contradicts his alleged lack of knowledge about Council business, proving the Council operates via closed-door maneuvering as Article 1 alleges.

      4. KEY ENTITIES
      - Jody W. Bishop (Circuit Judge)
      - Haymes Snedeker
      - Jack Burrell
      - Councilman Martin (Bounced on regarding agenda surprise claims)
      - Mayor Sullivan
      - CATALYST Council (Members: Boone Burrell, Brown)
      - Cain O rear
      - RH Deas Building Co., LLC
      - ProTecVideo, LLC
      - United States District Court for the Southern District of Alabama
