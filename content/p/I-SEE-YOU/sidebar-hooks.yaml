  conflict-on-interest:
    brief: |-
      1. THE CONFLICT
      - City Council Agenda date: Monday 22 May 2023.
      - Resolution #5 approved appointment of Municipal Judge Haymes Snedeker.
      - City Council appointed Snedeker as Municipal Judge via Resolution presented before Honorable Jody W. Bishop, Circuit Judge, 28th Judicial Circuit.
      - Haymes Snedeker identified as the largest developer in Fairhope.
      - Council approved Resolution #11: Bid No. 23-025-2022-PWI-007 to RH Deas Building Co., LLC for Fairhope Clock Plaza.
      - Contract amount: Not-to-exceed $282,211.00 (includes 10% contingency).
      - Council approved Resolution #13: Sole-source procurement of Police Intelligence-Led Policing Sensor Kits from ProTecVideo, LLC.
      - Cost: Not-to-exceed $20,000.00; no public notice or discussion recorded on agenda text provided.
      - Public record notes taxpayer funding used for infrastructure tied to Snedeker’s ALDI store and East Fairhope development projects.
      - Historical context cited: Past Publix development failure cost taxpayers millions in infrastructure; past failures over $600,000.

      2. THE DISCOVERY
      - Widget article establishes the legal question: "How can a city council approve the largest development in Fairhope when the Municipal Judge is the developer?"
      - Widget article explicitly labels Haymes Snedeker’s dual role as a Conflict of Interest.
      - Widget article links this 2023 agenda to The Ripp Report November 8, 2019 findings regarding Coastal Alabama water court and development disputes.
      - Widget article references similar legal and corruption precedents including Fort Lauderdale Marina Project and Daphne Lawyers 2012 settlement.
      - Widget article calls for attendance at the City Council meeting on November 13 to be heard.

      3. THE PIVOT
      - Main article proves the specific mechanism of the Conflict: The City Council that approved the development bids is the same body authorized to appoint Snedeker as Municipal Judge.
      - Widget article provides the investigative lens that defines this Council appointment and developer overlap not just as procedure, but as a structural "Conflict of Interest" requiring scrutiny.
      - Combination shows: Council controls the Judge (Snedeker), and Court/Judge influence overlaps with projects (ALDI/East Fairhope) paid for by taxpayers (Council approval).

      4. KEY ENTITIES
      - Haymes Snedeker (Municipal Judge / Largest Developer).
      - Fairhope City Council.
      - Jody W. Bishop (Circuit Judge, 28th Judicial Circuit).
      - RH Deas Building Co., LLC (Clock Plaza contractor).
      - ProTecVideo, LLC.
      - ALDI store project.
      - East Fairhope development.
