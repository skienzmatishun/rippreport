  FAUXHOPE-TUNNEL:
    brief: |-
      THE CONFLICT:
      - Fairhope City Council agenda held May 22, 2023, included appointment of Haymes Snedeker as Municipal Judge despite Snedeker being the largest developer in Fairhope.
      - Resolution awarded Fairhope Clock Plaza to RH Deas Building Co., LLC for $282,211.00 (includes contingency).
      - Council approved Intelligence-Led Policing Sensor Kits from ProTecVideo, LLC as sole source provider ($20,000 total) without public notice.
      - City Council approved utility infrastructure (water lines/roads) for ALDI and East Fairhope development projects using taxpayer money prior to construction.
      - City lost a 20-year lawsuit regarding the Triangle property, resulting in $8.25 million settlement and $3 million legal fees (attorneys pledged to pay but didn't).
      - Mayor Can’t and Councilman Martin associated with past deals allowing Publix to develop across the street from the Triangle property via a "select developer" deal.

      THE DISCOVERY:
      - Article 2 confirms Scott Hutchinson (Goodwyn, Mills and Cawood) presented tunnel masterplan to council on Monday, March 14.
      - Article 2 confirms Mayor begged Council for reconsideration of Triangle conservation easement and Airport issues at the May 29, 2023 council meeting.
      - Article 2 confirms $8.25 million lawsuit payout and $3 million drained from utilities budget specifically for the Triangle property loss (Burrell and Boone involvement).
      - Article 2 confirms Councilman Martin explicitly stated water lines for ALDI and infrastructure for the East side are currently being worked on before construction begins.

      THE PIVOT:
      - Article 2 provides the direct quote validating Article 1’s accusation of secret infrastructure development. Councilman Martin admits: "We actually have a water line that is coming for the ALDI store... We’re not just developing. The infrastructure is there to develop."
      - Article 2 confirms the tunnel masterplan (Hutchinson) directly ties taxpayer-paid infrastructure to private projects, proving Article 1's claim that the city is "preparing with the infrastructure" for specific developers (Snedeker, Aldi).
      - Article 2's timeline of the Triangle lawsuit ($8.25M loss) supports the claim that City leadership ignores long-range planning, matching Article 1's critique of a "no conflict interest" and "no plan" governing style.

      KEY ENTITIES:
      - Haymes Snedeker (Municipal Judge/Developer)
      - Scott Hutchinson (Goodwyn, Mills and Cawood - Tunnel Masterplan Rep)
      - Councilman Martin (Infra/Municipal Judge connection)
      - Mayor Can’t
      - Fauxhope City Council / Fairhope City Council
      - ALDI (Infrastructure recipient)
      - Publix
      - Burrell and Boone (Triangle Plaintiffs/Defendants)
      - RH Deas Building Co., LLC
      - ProTecVideo, LLC
