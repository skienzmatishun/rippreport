  bcso-how-to-become-sheriff:
    brief: '1. THE CONFLICT:

      - Murray Lawrence Jr imprisoned 20+ years for murder of Brandon Hastings.

      - Case built in Baldwin County in 2005 (or 2003/2004).

      - No physical evidence: No DNA, no fingerprints, no murder weapon.

      - State claimed victim shot in Alabama; Autopsy proved strangulation in Mississippi.

      - Prosecution (David Whetstone) used plea deal to secure testimony from real
      killer Jarius McNeil.

      - Investigator Huey ''Hoss'' Mack allegedly coerced McNeil into shifting blame
      to Lawrence.

      - Key figures in trial built case despite inconsistencies: Judge Robert Wilters,
      Chief Investigator Anthony Lowery, Lead Investigator Huey ''Hoss'' Mack.


      2. THE DISCOVERY:

      - Exculpatory evidence discovered and withheld from defense in 2023 (Lagniappe
      "Digging Deep").

      - Evidence includes Mississippi autopsy results by Dr. Paul McGarry contradicting
      State''s gunshot theory.

      - Law enforcement withheld evidence; Mack, Lowery, and Whetstone implicated
      in suppression.

      - Police officer Tony Fuqua (2019 transcript, page 1591) testified no evidence
      connected Lawrence to victim (no fingerprints, weapon, or stolen property).

      - Last person to see victim alive never testified in 2005 trial (unless testimony
      did not favor conviction).

      - Baldwin County Sheriff Hoss Mack promoted to office for assisting in wrongful
      conviction.


      3. THE PIVOT:

      - Second article confirms First Article claim regarding power dynamics and current
      office-holders.

      - First Article cites 2005 trial roles; Second Article confirms present status
      of those officers in Baldwin County Sheriff''s Office (BCSO).

      - Robert Wilters transitioned from 2005 Judge to DA (since ~2015), rejected
      Rule 32 in 2023.

      - Anthony Lowery transitioned from 2005 Chief Investigator to Current Sheriff,
      appointed by Governor Kay Ivey.

      - Hoss Mack transitioned from 2005 Captain to Sheriff (elected/promoted), later
      state-level position.

      - Article 2 links Mack and Lowery''s promotions directly to the corruption of
      the case against Lawrence.


      4. KEY ENTITIES:

      - Murray Lawrence Jr (Convict, "Bubba" Lawrence).

      - Brandon Hastings (Victim).

      - Jarius McNeil (Real Killer, Accomplice to death).

      - Robert Wilters (2005 Judge, current DA).

      - David Whetstone (2005 District Attorney, retired).

      - Huey ''Hoss'' Mack (2005 Captain, current former Sheriff/State position).

      - Anthony Lowery ("Antony" Lowery), 2005 Chief Investigator, current Sheriff.

      - Dean McGowan / Dr. Paul McGarry (Forensic Pathologist).

      - Tony Fuqua (Police Officer, attended autopsy).

      - Baldwin County Sheriff''s Office / BCSO.

      - Holman Prison.

      - Lagniappe (Source of 2023 evidence story "Digging Deep").'
    generated_at: '2026-03-08T16:13:38.762300Z'
    text: Baldwin County rewards the same men who ignore the truth just to secure
      a conviction. Hoss Mack and Anthony Lowery rode the Murray Lawrence case straight
      into power while they hid the autopsy that proved their entire theory was a
      lie.
