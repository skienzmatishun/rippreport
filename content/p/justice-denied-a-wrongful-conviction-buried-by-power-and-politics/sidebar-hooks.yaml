  no-justice:
    brief: 'THE CONFLICT:

      Date of Murder: April 5, 2003. Victim: Brandon Hastings (Baldwin County).

      Defendant: Murray Lawrence Jr. (Served >20 years prison/Life Without Parole).

      Trial Year: 2005. Presiding Judge: Robert Wilters (Circuit Court).

      Prosecution: David Whetstone (District Attorney).

      Lead Investigators: Anthony Lowery, Huey ''Hoss'' Mack.

      State Narrative: Victim shot/gunshot wound (murder location claimed Alabama).

      Real Facts (per autopsy): Victim strangled/cause of death suffocation (body
      dumped in Mississippi).

      Coerced Testimony: State relied on confession of Jarius McNeil (real killer)
      who was threatened with death penalty to implicate Lawrence.

      Key Figures Post-Trial: Robert Wilters promoted to DA (approx 2015); Anthony
      Lowery appointed Sheriff by Gov Kay Ivey (seeking re-election 2026); Huey ''Hoss''
      Mack retired Baldwin Sheriff (moved to state level).


      THE DISCOVERY:

      Timeframe of Discovery: 18+ years post-sentencing (Current Article 2).

      Evidence Found: Second autopsy report for Brandon Hastings.

      Report Details: Cause of death listed as suffocation/strangulation, NOT gunshot.

      Report Signatories: Ordered by DA (David Whetstone), Signed by Presiding Judge
      (Robert Wilters).

      Trial Error: The report was never provided to the defense during the 2005 trial
      (Suppressed Evidence).

      Legal Response: Assistant DA Haygood Kristi Deason argues the non-disclosure
      was a "harmless error" in the Rule 32 petition filing.

      Timeline Witnesses: Debra Fudge (identified McNeil in victim car, 1:30 AM, April
      5); Officer Wendall Thomas (Fairhope stop at 5:01 AM).


      THE PIVOT:

      Article 2 names Robert Wilters and David Whetstone as the officials who signed/ordered
      the suppressed autopsy report.

      Article 1 claims Robert Wilters and David Whetstone suppressed evidence to maintain
      conviction while advancing in power (Judge -> DA).

      Article 2 confirms Wilters signed the suppressed evidence as a Judge; Whetstone
      ordered it. This validates Article 1''s claim that they held the specific power
      to suppress exculpatory evidence at trial.

      Link to Haygood Deason: Article 2 identifies Kristi Deason as the current Assistant
      DA handling Rule 32 petition for Lawrence, responding to Article 1''s call for
      media pressure/accountability.


      KEY ENTITIES:

      Murray Lawrence Jr (Defendant).

      Brandon Hastings (Victim).

      Jarius McNeil (Real Killer/Co-conspirator).

      Robert Wilters (Judge 2005, Baldwin County DA since ~2015).

      David Whetstone (Prosecutor/Retired).

      Anthony Lowery (Investigator, Current Baldwin County Sheriff).

      Huey ''Hoss'' Mack (Lead Inv, Retired Sheriff/State Level Position).

      Haygood Kristi Deason (Assistant DA, Petition Filers).

      Judge Scott P Taylor (Current Rule 32 Judge).

      Locations: Baldwin County, Mississippi, Fairhope.'
    generated_at: '2026-03-08T16:13:38.762308Z'
    text: Robert Wilters and David Whetstone didn't just win a case; they orchestrated
      a cover-up from the bench and the prosecutor’s desk. This suppressed autopsy
      bears their signatures and proves they knew Murray Lawrence was innocent the
      whole time.
