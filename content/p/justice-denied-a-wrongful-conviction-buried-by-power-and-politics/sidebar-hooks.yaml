  innocent:
    brief: 'THE CONFLICT

      - Murray Lawrence Jr convicted of capital murder Baldwin County Alabama, May
      13, 2005.

      - Arrested/incarcerated 18 months prior to conviction (per Widget).

      - Victim Brandon Hastings killed May 6, 2003 in Foley Alabama.

      - Autopsy proves victim strangled in Mississippi; State claimed shot in Alabama.

      - Case built by four officials: Robert Wilters (Judge), David Whetstone (DA),
      Huey ''Hoss'' Mack (Investigator Captain), Anthony Lowery (Chief Investigator).

      - Jarius McNeil implicated Lawrence July 31, 2003 (4 months pre-conviction).

      - McNeil provided testimony under coercion/threat of death penalty.


