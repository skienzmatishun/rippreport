  7432-days-in-jail:
    brief: 'THE CONFLICT:

      - 2005 Capital Murder Trial for victim Brandon Hastings in Baldwin County.

      - Defendant: Murray Lawrence Jr (convicted despite lack of physical evidence).

      - Real Killer: Jarius McNeil. Claimed he confessed then shifted blame to Murray
      after coercion by Law Enforcement.

