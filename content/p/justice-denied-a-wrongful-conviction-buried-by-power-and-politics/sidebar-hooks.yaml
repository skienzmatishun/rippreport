      Anthony Lowery (Chief Investigator), Huey ''Hoss'' Mack (Lead Investigator),
      David Whetstone (District Attorney).

      - Evidence Suppression: Exculpatory evidence buried during trial per Innocence
      Project findings. Rule 32 filed and rejected in 2023.

      - Sentence Duration Claimed: Lost more than 20 years of life.


      THE DISCOVERY:

      - Official Incarceration Count: 7432 days in jail confirmed (Article 2).

      - Legal Precedent Cited: *Brady vs. Maryland*, 1963 United States Supreme Court
      ruling.

      - Ruling Definition: Suppression of evidence favorable to the accused violates
      constitutional due process if material.

      - Source Attribution: Article 2 authored by Nancy R Koerner (Lagniappe Mobile).


      THE PIVOT:

      - Article 2 provides the legal definition for "Evidence Suppression" cited in
      Article 1 (Innocence Project findings).

      - Article 2 confirms the total incarceration time (7432 days) matches Article
      1''s claim of "more than 20 years" (7432 / 365 = ~20.3 years).

      - Article 2 names the same four officials as conspirators for withholding evidence:
      Hoss Mack, David Whetstone, Robert Wilters.

      - Article 2 provides a legal basis (Brady vs. Maryland) to challenge the suppression
      claims made in Article 1 against prosecutors/officials now in higher office.

      - Article 1 identifies current status of officials (Wilters as DA since ~2015,
      Lowery as Sheriff, Mack retired to state level); Article 2 identifies same names
      but focuses on current conspiracy.


      KEY ENTITIES:

      - Individuals: Murray Lawrence Jr (Murray Bubba), David Whetstone, Robert Wilters,
      Anthony Lowery, Huey ''Hoss'' Mack, Jarius McNeil, Brandon Hastings, Governor
      Kay Ivey, Nancy R Koerner.

      - Organizations: Baldwin County Sheriff''s Office, Baldwin County District Attorney''s
