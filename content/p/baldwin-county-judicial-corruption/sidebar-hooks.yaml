hooks:
  bcso-how-to-become-sheriff:
    brief: "1. THE CONFLICT\n- Baldwin County Sheriff’s Office (BCSO) has maintained\
      \ criminal cases and lost lives over 20 years without accountability.\n- District\
      \ Attorneys dismissed citizen complaints regarding judicial honesty and prosecutorial\
      \ corruption.\n- Sheriff Hoss Mack promised $600,000 in body/car cameras to\
      \ public but allegedly refuses to release unedited footage.\n- New evidence\
      \ discovered proves Murray Lawrence Jr. (incarcerated 20 years) was innocent\
      \ in a murder trial, alleging state officials had motive to convict: self-promotion.\n\
      - Core case involves murder of Brandon Hastings, where Murray Lawrence Jr. took\
      \ a fall for friend Jarius McNeal.\n- Sheriff Hoss Mack promoted from Captain\
      \ to Sheriff based on assistance in this wrongful conviction.\n\n2. THE DISCOVERY\n\
      - Exculpatory evidence found and dated 2023: Original Mississippi autopsy reports\
      \ for victim Brandon Hastings.\n- Autopsy findings cause of death listed as\
      \ \"asphyxiation by strangulation\"; ignored by prosecution who switched to\
      \ gunshot theory without producing a weapon or ballistics.\n- Lagniappe article\
      \ (\"Digging Deep\") documents that Sheriff Mack, District Attorney Robert Wilters\
      \ (Judge), and David Whetstone acknowledge signatures on evidence withheld from\
      \ defense.\n- Officer Tony Fuqua testified at trial (transcript page 1591) he\
      \ had:\n    - No fingerprints of Bubba Lawrence.\n    - No stolen property from\
      \ Lawrence.\n    - No cell phone records connecting Lawrence to Brandon Hastings.\n\
      - Jarius McNeal, actual killer/suspect, received life with possibility of parole.\
      \ Murray Lawrence Jr. received life without parole (Holman Prison).\n- Deputy/Investigator\
      \ Dean McGowan and Anthony Lowery involved in the case; Lowery has no field\
      \ experience.\n\n3. THE PIVOT\n- Widget Article transforms general corruption\
      \ allegations in Main Article into provable specific misconduct via the Lawrence\
      \ case.\n- Proves \"Self promotion\" motive cited in Main Article: Mack gained\
      \ Sheriff rank specifically for Lawrence conviction.\n- Proves \"Willful Suppression\"\
      \ cited in Main Article: Mack, Whetstone, and Wilters signatures confirmed on\
      \ withheld exculpatory evidence; Lagniappe confirms they knowingly didn't give\
      \ it to defense.\n- Connects specific individuals (Mack, Wilters, Whetstone)\
      \ directly to the case previously used as a vague example of corruption.\n-\
      \ Shows pattern of intimidation: Officials (Mack) allegedly bullied Jarius McNeal\
      \ into implicating Lawrence to save his own life from death penalty.\n\n4. KEY\
      \ ENTITIES\n- Hoss Mack (Sheriff)\n- Robert Wilters (District Attorney and Judge)\n\
      - David Whetstone (Prosecutor/District Attorney)\n- Murray Lawrence Jr. (\"\
      Bubba\" Lawrence)\n- Brandon Hastings (Victim)\n- Jarius McNeal (Suspect/Informant)\n\
      - Anthony Lowery (BCSO Deputy/Investigator)\n- Dean McGowan (Deputy/Investigator/Autopsy\
      \ Witness)\n- Tony Fuqua (Police Officer/Testifier)\n- Dr. Paul McGarry (Forensic\
      \ Pathologist/Mississippi Autopsy)\n- Holman Prison"
