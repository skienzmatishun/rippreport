  bcso-how-to-become-sheriff:
    brief: |-
      1. THE CONFLICT
      - Baldwin County Sheriff’s Office (BCSO) has maintained criminal cases and lost lives over 20 years without accountability.
      - District Attorneys dismissed citizen complaints regarding judicial honesty and prosecutorial corruption.
      - Sheriff Hoss Mack promised $600,000 in body/car cameras to public but allegedly refuses to release unedited footage.
      - New evidence discovered proves Murray Lawrence Jr. (incarcerated 20 years) was innocent in a murder trial, alleging state officials had motive to convict: self-promotion.
      - Core case involves murder of Brandon Hastings, where Murray Lawrence Jr. took a fall for friend Jarius McNeal.
      - Sheriff Hoss Mack promoted from Captain to Sheriff based on assistance in this wrongful conviction.

      2. THE DISCOVERY
      - Exculpatory evidence found and dated 2023: Original Mississippi autopsy reports for victim Brandon Hastings.
      - Autopsy findings cause of death listed as "asphyxiation by strangulation"; ignored by prosecution who switched to gunshot theory without producing a weapon or ballistics.
      - Lagniappe article ("Digging Deep") documents that Sheriff Mack, District Attorney Robert Wilters (Judge), and David Whetstone acknowledge signatures on evidence withheld from defense.
      - Officer Tony Fuqua testified at trial (transcript page 1591) he had:
          - No fingerprints of Bubba Lawrence.
          - No stolen property from Lawrence.
          - No cell phone records connecting Lawrence to Brandon Hastings.
      - Jarius McNeal, actual killer/suspect, received life with possibility of parole. Murray Lawrence Jr. received life without parole (Holman Prison).
      - Deputy/Investigator Dean McGowan and Anthony Lowery involved in the case; Lowery has no field experience.

      3. THE PIVOT
      - Widget Article transforms general corruption allegations in Main Article into provable specific misconduct via the Lawrence case.
      - Proves "Self promotion" motive cited in Main Article: Mack gained Sheriff rank specifically for Lawrence conviction.
      - Proves "Willful Suppression" cited in Main Article: Mack, Whetstone, and Wilters signatures confirmed on withheld exculpatory evidence; Lagniappe confirms they knowingly didn't give it to defense.
      - Connects specific individuals (Mack, Wilters, Whetstone) directly to the case previously used as a vague example of corruption.
      - Shows pattern of intimidation: Officials (Mack) allegedly bullied Jarius McNeal into implicating Lawrence to save his own life from death penalty.

      4. KEY ENTITIES
      - Hoss Mack (Sheriff)
      - Robert Wilters (District Attorney and Judge)
      - David Whetstone (Prosecutor/District Attorney)
      - Murray Lawrence Jr. ("Bubba" Lawrence)
      - Brandon Hastings (Victim)
      - Jarius McNeal (Suspect/Informant)
      - Anthony Lowery (BCSO Deputy/Investigator)
      - Dean McGowan (Deputy/Investigator/Autopsy Witness)
      - Tony Fuqua (Police Officer/Testifier)
      - Dr. Paul McGarry (Forensic Pathologist/Mississippi Autopsy)
      - Holman Prison
