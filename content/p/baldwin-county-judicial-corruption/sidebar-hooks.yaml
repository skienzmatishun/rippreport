      \ “internal” Major Crimes Division, lack of accountability, edited or unreleased\
      \ body/car camera footage.\n- Hoss Mack promised County Commission $600,000\
      \ body and car cameras for public transparency; footage allegedly not released\
      \ or released edited.\n- Recent discovery of new evidence in Lawrence case suppressed\
      \ willfully rather than inadvertently; defense was never informed.\n\nTHE DISCOVERY:\n\
      - Article 2 confirms Murray Lawrence is innocent based on withheld exculpatory\
      \ evidence.\n- Murray was at home with girlfriend at time of murder; did not\
      \ know victim.\n- No physical evidence (DNA, fingerprints, murder weapon) tied\
      \ Murray to crime.\n- Prosecution claimed Brandon Hastings was shot in Alabama;\
      \ autopsy proved victim strangled in Mississippi.\n- Jarius McNeil identified\
      \ as real killer, initially confessed before shifting blame to Murray under\
      \ threat of death penalty.\n- Robert Wilters, in 2023 as Baldwin County DA,\
      \ rejected filing of Rule 32 petition despite evidence supporting innocence.\n\
      - Huey “Hoss” Mack allegedly coerced McNeil to shift blame onto Lawrence during\
      \ original 2005 investigation.\n- David Whetstone admitted in court he made\
      \ a deal with McNeil to secure testimony despite knowing unreliability.\n- Court-appointed\
      \ lawyer instructed Murray not to testify in his own defense.\n\nTHE PIVOT:\n\
      - Article 2 proves Article 1’s claim of self-promotion motive; McNeil coerced\
      \ into false testimony to avoid death penalty, while state ignored exculpatory\
      \ evidence.\n- Article 2 identifies the “four men” responsible for conviction\
      \ are now holding positions of power:\n  - Robert Wilters (Ex-Judge, current\
      \ DA)\n  - Anthony Lowery (Chief Investigator then, current Sheriff)\n  - Huey\
      \ “Hoss” Mack (Captain then, former Sheriff)\n  - David Whetstone (DA then,\
      \ retired architect of prosecution strategy)\n- Supports Article 1’s assertion\
      \ that corruption in Baldwin County is institutional: those who built the case\
      \ on misconduct and suppressed evidence are still directing law enforcement\
      \ and prosecution in Baldwin County.\n- Confirms systemic suppression: The specific\
      \ willful withholding of evidence in Lawrence case matches the pattern described\
      \ in Article 1 (glossing over cases, lack of transparency).\n\nKEY ENTITIES:\n\
      - Murray Lawrence Jr (Innocent Defendant)\n- Jarius McNeil (Actual Killer/Witness)\n\
      - Huey “Hoss” Mack (Sheriff / Investigator)\n- Robert Wilters (Judge / District\
      \ Attorney)\n- Anthony Lowery (Sheriff, Chief Investigator)\n- David Whetstone\
      \ (District Attorney)\n- Brandon Hastings (Victim)"
