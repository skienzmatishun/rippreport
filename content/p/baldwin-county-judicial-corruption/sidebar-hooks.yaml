  po-po-hoss-mack-ccuo:
    brief: 'THE CONFLICT

      - Sheriff Huey Hoss Mack has led Baldwin County Sheriff’s Office for approximately
      20 years.

      - BCSO internal Major Crimes Division alleged to gloss over complaints regarding
      criminal cases and loss of life.

      - No accountability ever found for Sheriff deputies involved in incidents.

      - Hoss Mack promised Baldwin County Commission $600,000 worth of body and car
      cameras for public/police transparency; footage allegedly never released or
      heavily edited.

      - Murray Lawrence Jr. incarcerated for 20 years based on a murder trial where
      critical evidence is claimed to have been suppressed.

      - New evidence discovered calls into question motive for conviction (self-promotion)
      vs guilt.

      - Claims District Attorney Robert Wilters and Prosecutor David Whetstone knowingly
      withheld evidence from Lawrence’s defense.

      - Affidavits indicate signatures of Mack, Wilters, and Whetstone appear on suppressed
      evidence.


      THE DISCOVERY

      - A second autopsy report exists for Lawrence’s murder case containing letters
      and documents never included in trial.

      - Alabama Department of Forensic Sciences sent autopsy, forensic biology, and
      toxicology reports on May 17, 2004.

      - A letter accompanying the forensic report was CC’d to Hoss Mack and his father
      regarding the autopsy performance.

      - Hoss Mack served as lead investigator in related cases at the time of discovery,
      later claiming little involvement.

      - Anthony Lowery was an investigator during this period and functions as a subordinate
      to Mack (“will do whatever Mack says”).

      - Robert Wilters wrote and signed the official order allowing the autopsy.

      - BCSO currently investigating possible mishandling of evidence by FBI task
      force; Mack states no cases impacted (claim disputed).


      THE PIVOT

      - Article 2 provides the May 17, 2004 correspondence proving Hoss Mack and Robert
      Wilters were aware of forensic autopsy results prior to Lawrence’s trial.

      - This directly supports Article 1''s claim that evidence suppression was "willful"
      rather than inadvertent.

      - Connects the 20-year wrongful conviction (Lawrence) specifically to Mack,
      Lowery, and Wilters'' operational roles and communication chains.

      - Links internal BCSO "cover-up" culture to the specific mechanics of withholding
      Lawrence''s autopsy evidence (CC’d internal awareness).


      KEY ENTITIES

      - Huey Hoss Mack (Sheriff)

      - Murray Lawrence Jr. (Condemned man)

      - Robert Wilters (District Attorney, Former Judge, Authorized Autopsy Order)

      - David Whetstone (Prosecutor/District Attorney)

      - Anthony Lowery (Investigator)

      - Baldwin County Sheriff’s Office (BCSO)

      - Jon Grey (Public Relations / Consultant linked to Mack and School Board)

      - Andre Reid (Internal staff/Deputy involved in separate internal misconduct
      claims)'
