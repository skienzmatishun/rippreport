      which preceded his current campaign for State Senate.


      THE DISCOVERY:

      - Tucker Dorsey (Baldwin County Commission Seat 3) is explicitly linked by The
      Ripp Report as being supported by Clarence Burke (President of Baldwin County
      Sewer Service/Developer), and the political entity CATALYST.

      - Voting for Tucker Dorsey signifies a vote for the "good ole boys" machine,
      which pushed through a $35 million mega-site project that resulted in lost county
      revenue despite promises of future profit.


      THE PIVOT:

      - Article 1 establishes Chris Elliott and Pittman as candidates operating within
      a sphere influenced by CATALYST and GOBs (Good Old Boys).

      - Article 2 provides financial proof that the same "good ole boys" machine controls
      key economic development in Baldwin County via the association between Dorsey,
      Clarence Burke (BCSS), and the specific $35 million cost of county infrastructure
      projects.


      KEY ENTITIES:

      - Chris Elliott (Commissioner/Candidate for State Senate)

      - Tripp Pittman (State Senator Candidate)

      - CATALYST (Political Organization/Entity linking candidates)

      - Tucker Dorsey (Baldwin County Commissioner, associated with Catalyst Endorsement)

      - Clarence Burke (President of BCSS/Developer, linked to the "good ole boys"
      machine)'
