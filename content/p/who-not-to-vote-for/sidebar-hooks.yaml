      *   Elliott allegedly used his position/legal resources (via attorney Jon Gray)
      to receive preferential treatment, resulting in only a 29-day suspension instead
      of the statutory 90 days for refusal.

      *   Article 2 reveals Elliott skimmed $4 million from the school 1% tax over
      one year.


      **THE PIVOT:**

      *   Article 1 mentions "gloss[ing] over his previous comments and the serious
      charge of DUI" as a general point against him. Article 2 moves this accusation
      from vague political criticism to specific, documented proof of how he allegedly
      manipulated legal proceedings (emergency stay/filing suit) and financial impropriety
      ($4 million tax skim).

      *   Article 2 establishes concrete evidence of misconduct (legal loopholes and
      financial fraud) rather than just political rhetoric or generalized "Catalyst"
