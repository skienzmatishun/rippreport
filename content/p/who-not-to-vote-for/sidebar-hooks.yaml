      **KEY ENTITIES:**

      *   Chris Elliott

      *   David Northcutt

      *   Jon Gray

      *   Eddie Tyler (Baldwin County Schools Superintendent)

      *   The Elliott Companies, Inc.

      *   $4 million (skimmed from the school 1% tax)

