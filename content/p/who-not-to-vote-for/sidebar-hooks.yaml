      *   Baldwin County Commissioner Chris Elliott is running for State Senate seat.

      *   Elliott owns and operates The Elliott Companies, Inc., which handles Service
      Master Restore franchises (disaster mitigation).

      *   Sen. Trip Pittman held $750,000 in his pocket regarding actions concerning
      BP Funds.

      *   Fairhope City Council ended a contract with State Sen. Trip Pittman''s company
      (D&J Enterprises Inc.) in 2017, ending an arrangement dating back to 2012.

      *   Luther Strange faces multiple ethics complaints and allowed the Luv Gov
      to pass on Sen. Pittman’s actions as "appointed Trustee" of BP Funds.


      THE DISCOVERY:

      *   The US Senate primary election for Alabama is less than four days away,
      featuring 19 candidates (11 Republicans, 8 Democrats).

      *   Sen. Trip Pittman remains a focal point for political corruption and maneuvering
      during the election cycle.

      *   Congressman Mo Brooks stated he would withdraw his candidacy if Jeff Sessions
      was fired.


      THE PIVOT:

      *   Article 2 details the current political landscape (the US Senate primary)
      which is directly fueled by the strategic placements and corruption actions
      detailed in Article 1 (e.g., Pittman’s alleged ties, Elliott’s business interests,
      Strange''s ethics complaints).

      *   The historical misconduct and financial dealings of entities like Pittman
      and Strange provide the context for voters deciding who to elect in the current
      primary race.


      KEY ENTITIES:

      *   Jeff Sessions (U.S. Attorney General)

      *   Jack Burrell

      *   Tripp Pittman (Sen.)

      *   Chris Elliott (Baldwin County Commissioner)

      *   The Elliott Companies, Inc.

      *   Service Master Restore franchises

      *   D&J Enterprises Inc.

      *   BP Funds

      *   Luther Strange

      *   Congressman Mo Brooks'
