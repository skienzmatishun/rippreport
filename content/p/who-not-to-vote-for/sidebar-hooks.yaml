  catalyst-sold-to-the-highest-bidder:
    brief: '**THE CONFLICT:**

      1.  Tripp Pittman served as State Senator (2017–present) and was accused of
      utilizing "BP cash" and enriching himself during a catastrophe while in office.

      2.  Pittman announced he would not seek re-election for the state senate seat,
      running instead for Jeff Sessions'' U.S. Senate seat.

      3.  Baldwin County Commissioner Chris Elliott (appointed) was selected to run
      for the State Senate seat vacated by Pittman.


      **THE DISCOVERY:**

      1.  Chris Elliott utilized campaign funds totaling almost $500,000 from Montgomery
      in a runoff against David Northcutt (July 17th).

      2.  Elliott secured the Education 1% tax without a public vote and skimmed money
      from it for county infrastructure, despite the "Black Hole" mega-site costing
      nearly $40 million.

      3.  Chris Elliott''s wife works for Sheriff Hoss Mack (Sheriff of Baldwin County
      since 2021–2026), who supports Elliott to maintain political stability against
      opposition threats regarding qualification changes.

      4.  Eddie Tyler, Superintendent of Education, is allied with Elliott and supported
      by Jon Gray.


      **THE PIVOT:**

      1.  The Main Article questioned the connection between Elliott''s corporate
      disaster mitigation business and Pittman’s alleged profiteering.

      2.  Article 2 proves this systemic influence is tied to financial ties: Elliott
      initially paid $8,640.00 to Catalyst before shifting primary funding to Jon
      Gray/Stragtegy ($140,951.80).

      3.  This establishes that the connection questioned in Article 1 (Pittman/Elliott)
      is part of a larger network involving specific political handlers and special
      interest groups known as Catalyst and Goat Hill.


      **KEY ENTITIES:**

      *   Tripp Pittman

      *   Chris Elliott / Commissioner Chris Elliott

      *   Catalyst (political organization)

      *   Jeff Sessions

      *   Hoss Mack / Sheriff Hoss Mack (Baldwin County Sheriff, 2024–present)

      *   Jon Gray (Lobbyist/Campaign Manager for both Tyler and Elliott)

      *   Eddie Tyler (Superintendent of Education)

      *   David Northcutt'
