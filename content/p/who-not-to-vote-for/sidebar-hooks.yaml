hooks:
  little-choice:
    brief: 'THE CONFLICT

      • Judge Roy Moore suspended as Chief Justice on September 30, 2016, for six
      charges of violating judicial ethics canons.

      • State Senator Trip Pittman was accused of acting as "appointed Trustee" of
      BP funds and personally enriching himself while in office (e.g., receiving $750,000).

      • Former U.S. Attorney General Jeff Sessions vacated a U.S. Senate seat.


      THE DISCOVERY

      • Current campaign messaging targets politicians associated with the GOB and
      CATALYST political organizations as "career politicians" climbing the ladder
      or using their office for personal gain.

      • Historical records confirm documented cases of ethical misconduct and financial
      impropriety involving State Senator Trip Pittman (who is targeted in current
      criticisms).


      THE PIVOT

      • The widget article provides verifiable, specific evidence of corruption—such
      as Pittman’s role with BP funds and the 2017 contract termination by Fairhope
      City Council from his associated company—that substantiates present campaign
      accusations that politicians are engaged in self-enrichment and ethical breaches.


      KEY ENTITIES

      • Trip Pittman (State Senator)

      • Chris Elliott (Baldwin County Commissioner/Candidate)

      • Jeff Sessions (Former U.S. Attorney General)

      • Luther Strange (Alabama Republican candidate)

      • Judge Roy Moore

      • Mo Brooks (Congressman)

      • BP

      • CATALYST / GOB'
