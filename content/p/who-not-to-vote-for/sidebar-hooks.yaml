      vacated by Jeff Sessions, was accused of being enriched by "BP cash" and using
      his office to personally enrich himself during a catastrophe.

      *   Chris Elliott was appointed to the Baldwin County Commission (2014) and
      later selected to run for a State Senate seat.

      *   The main narrative suggests that candidates are strategically placed by
      "the GOB" and "Catalyst" in elected positions ahead of mid-term elections.


      THE DISCOVERY

      *   Article 2 establishes historical context regarding the "good ole boy network,"
      claiming it once greased the wheels in Bay Minette (involving former Mayor Kant
      and Sen Pittman).

      *   It identifies Fairhope as a past facilitator of corruption within this system
      before the wheel stopped turning.

      *   It reveals that Judge Michelle Thomason, who is running for Court of Civil
      Appeals, was identified as Catalyst''s first client.


      THE PIVOT

      *   Article 1 makes specific contemporary accusations regarding the connections
      between Chris Elliott and Tripp Pittman (via Catalyst/GOB influence). Article
      2 provides the systemic background to these accusations by confirming that this
      pattern of backroom dealings and placement by entities like Catalyst has a long
      history in Baldwin County, naming specific past facilitators like Fairhope.


      KEY ENTITIES

      *   Tripp Pittman

      *   Chris Elliott

      *   Catalyst (organization)

      *   GOBs ("good ole boys" network)

      *   Fairhope (municipality/facilitator)

      *   Jeff Sessions

      *   BP

      *   Michelle Thomason

      *   Karen Wilson'
