  court-of-public-opinion:
    brief: 'THE CONFLICT

      *   Fairhope City Debt was $6.83 million, slated for full payment by June 2019.

      *   The previous Mayor used the public utility fund to pay off lawsuits or maintain
      a fractured bookkeeping system.

      *   The previous Mayor drew a second city paycheck from the utility totaling
