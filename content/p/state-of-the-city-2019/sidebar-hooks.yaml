  nappi-award:
    brief: 'THE CONFLICT:

      *   Previous Mayor used the utility fund as a piggy bank for lawsuits or poor
      bookkeeping.

      *   Previous Mayor drew a second city paycheck from the utility amounting to
      $60,000 a year.

      *   The City was running an annual $6 Million deficit, requiring utility profits
      to subsidize the budget.


      THE DISCOVERY:

      *   Mayor Karin Wilson achieved fiscal self-reliance and paid off long-term
      debt.

      *   Wilson increased combined City/Utility cash funds by almost 60%.

      *   Wilson invested $14 million in utility upgrades without borrowing a dime.

      *   Wilson obtained $11 million to offset sewer line rehabilitation and plan
      an SSO Prevention Plan for the Eastern Shore.

      *   The administration secured $18 Million in RESTORE funds, primarily for sewer
      system upgrades and an SSO prevention plan.


      THE PIVOT:

      *   Article 2 (Nappi Award) serves as validation for the fiscal and operational
      achievements detailed in Article 1.

      *   Wilson’s four consecutive Nappi Awards prove she accomplished more in four
      years than the previous Mayor did in sixteen years, validating claims of progress
      and successful management despite council opposition.


