      *   Fairhope City Council spent a year obstructing the newly elected Mayor.

      *   Baldwin County commissioners were up for re-election in November 2018.

      *   The county is saddled with a $32 million debt.


      THE DISCOVERY

      *   The City Council limited public participation and used silence as a weapon
      against challengers.

      *   The Mayor successfully pushed transparency and accountability and hired
      new city employees.

      *   The Court of Public Opinion exists to hold elected officials accountable
      for actions.


      THE PIVOT

