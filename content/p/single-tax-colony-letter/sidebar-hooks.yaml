  youre-not-from-here:
    brief: 'THE CONFLICT

      *   **2016 (February 5):** Arthur Corti made "entitlement" statements during
      a Fairhope Planning meeting, claiming he shaped the city for his own benefit
      while developers moved in to enjoy it.

      *   **2016/2017:** A large-scale apartment project was proposed near Fly Creek
      and Parker Road involving over 500 units on property owned by "entitled property
      owners," which residents viewed as a corrupt inside deal facilitated by the
      Mayor for developer gain.

      *   **Past (Pre-Main Article):** The Planning Commission has been accused of
      lawsuits, poor decisions, and inability to enforce rules, leading to wasted
      millions in taxpayer dollars.

      *   **Current Period:** Burrell attempted to acquire $1 million in FSTC membership
      dues related to the Dyas Triangle "park."

      *   **2018-Present (Ongoing):** Lee Turner holds simultaneous positions as President
      of Fairhope Single Tax Corporation (FSTC) and Head/President of Fairhope Planning
      and Zoning.


      THE DISCOVERY

      *   The 2016 meeting record reveals that planning decisions, including the installation
      of infrastructure like a fire station and sewer lift plant worth over $1 million
      in tax dollars, were driven by "good ole boy" developer interests rather than
      comprehensive community planning for residents.

      *   It proves that specific city leaders (Mayor/Corti) historically controlled
      planning boards to facilitate deals favoring private land owners and developers.


      THE PIVOT

      *   The 2016 incident acts as historical proof of the systemic corruption and
      "corrupt inside deal" pattern described in Article 1.

      *   It provides evidence that the claim made by Paul Ripp (Article 1) that "the
      same bad players in the City have now infiltrated your FSTC" is based on a documented
      history (starting with Corti/Mayor control over planning) of officials benefiting
      from development agreements at the expense of community interests.


      KEY ENTITIES

      *   Lee Turner: President of Fairhope Planning and Zoning; President of Single
      Tax Corporation.

      *   Paul Ripp: Reporter/Author who wrote Article 1.

      *   Burrell: Council Member who tried to acquire $1 million in FSTC membership
      dues for the Dyas Triangle.

      *   Dyas Triangle: Park location related to FSTC land acquisition issues.

      *   Arthur Corti: Individual whose "entitlement" speech and historical development
      deals were critiqued in 2016.

      *   Jennifer Fidler: Fairhope Public Works Commissioner/Mayor’s staff, criticized
      for ignoring violations.

      *   Hollie MacKellar: Planning Commission member cited for being the only "NO"
      vote on certain planning matters.

      *   Senator Pittman (or Pitman): Former State Senator cited regarding receiving
      $636,000 in BP money as a trustee and involvement with development deals.

      *   Fairhope Single Tax Colony (FSTC).'
