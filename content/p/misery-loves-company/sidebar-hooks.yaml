  corridor-of-chaos:
    brief: 'THE CONFLICT

      - Daphne residents of the Daphmont neighborhood at Johnson Road and Highway
      98 have been experiencing increased traffic jams and overcrowding in school
      buses due to recent apartment construction developments.

      - Residents are organized against zoning change, concerned that development
      (including a proposed service station) is being pushed through despite resident
      concerns regarding quality of life and traffic impacts at the intersection with
      Highway 98.


      THE DISCOVERY

      - The "KLUMP PUD" project application involves Gayfer Village Partners for a
      three-part planned unit development on 76 acres in Fairhope (northwest corner
      of Fairhope Avenue and Hwy 181).

      - The proposed units include: Unit 2 (232 multi-family apartment units), Unit
      3 (77 lots single family residential), and Unit 1 (16 commercial lots B-2).

      - Gayfer Village Partners, Llc is owned solely by Municipal Judge Haymes Snedeker;
      his business partner is Ray Hix.


      THE PIVOT

      - Article 1 details generalized neighborhood opposition to large development
