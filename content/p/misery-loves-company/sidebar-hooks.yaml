  eagles-eye-catalyst-kant-corte:
    brief: 'THE CONFLICT:

      *   Daphne residents oppose zoning changes and development impacting Johnson
      Road and Highway 98 intersection.

      *   Fairhope residents oppose the construction of apartments and a proposed
      service station on an already taxed intersection.


      THE DISCOVERY:

      *   The Kant-Corte Apartments were approved by the last Fairhope City Council
      due to corruption involving council members.

      *   Boone and Burrell facilitated a "Gift" to developers, caving to developer
      threats.

      *   Tim Kant did not attend the final meeting but was involved in the deal.


      THE PIVOT:

      *   Article 2 reveals that the development conflict described in Article 1 is
      rooted in corruption orchestrated by Boone and Burrell facilitating a deal with
      Angelo Corte.

      *   The approval of the apartments (Kant-Corte) was achieved through illicit
      political action, making the developers'' project inherently illegitimate.


      KEY ENTITIES:

      *   Daphne

      *   Fairhope

      *   Fly Creek Apartments / Kant-Corte Apartments

      *   Johnson Road and Highway 98

      *   Boone

      *   Burrell

      *   Angelo Corte

      *   Tim Kant

      *   Mayor Kant

      *   Mayor Wilson'
