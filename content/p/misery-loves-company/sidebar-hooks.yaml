  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT

      *   Fly Creek Apartments development was subject to a six-day trial in Bay Minette.

      *   The City Council endorsed the project in October 2016.

      *   Residents opposed zoning changes and development impacting Daphmont neighborhood
      and the intersection of Johnson Road/Highway 98.


      THE DISCOVERY

      *   The developer''s drainage plan calls for a single point discharge of excess
      stormwater directly into wetlands, which drains into Fly Creek.

      *   This plan omits expansion to a 5-acre pond.

      *   The development will dump stormwater approximately 100 to 150 feet from
      the outfall pipe combined with Publix construction drainage into Fly Creek.


      THE PIVOT

      *   The trial revealed that the City Council sold out residents by allowing
      the project despite public concerns, demonstrating a failure in planning and
      zoning oversight.

      *   The specific drainage plan proves how the apartment complex will pollute
      Fly Creek, directly linking development to environmental degradation mentioned
      implicitly in Article 1''s neighborhood impact claims.


      KEY ENTITIES

      *   Fly Creek Apartments

      *   Bay Minette City Council

      *   Adam Milam (Plaintiff''s attorney)

      *   Mayor

      *   Daphmont neighborhood

      *   Fairhope

      *   Johnson Road and Highway 98 intersection

      *   Jack Burrell

      *   Kevin Boone'
