      \ is characterized as toothless and provides \"protection from prosecution\"\
      \ for elected officials who violate ethics rules if they are in the Republican\
      \ party.\n*   Senator Chris Elliott supports the gas tax without a citizens\
      \ vote and uses police for public relations purposes.\n\nTHE DISCOVERY:\n* \
      \  Baldwin County is cited as one of the most corrupt counties in Alabama, with\
      \ elected officials not fearing the Ethics Commission or the Attorney General/FBI.\n\
      *   Former Baldwin County State Senator Tripp Pittman received $750,000.00 in\
      \ contracts from Fairhope through his role as \"trustee\" of BP funds, aided\
      \ by the Mayor without accountability.\n*   Baldwin County officials engaged\
      \ in specific self-dealing:\n    *   The Commission purchased a mega-site benefiting\
      \ only sellers (a \"good ole boy deal\").\n    *   Fairhope Councilman Burrell\
      \ flew a private jet for the municipal judge and oversaw a bid involving his\
      \ business partner on the Airport Board.\n    *   Fairhope Councilman Brown\
      \ received a several hundred thousand dollar contract through the Art Center,\
      \ approved by the board.\n    *   Councilman Boone has partners in several LLCs\
      \ that he voted on as city councilman.\n\nTHE PIVOT:\n*   Article 2 provides\
      \ concrete evidence (specific dollar amounts and documented transactions) of\
      \ self-enrichment and illegal dealings by specific named officials within Baldwin\
      \ County, directly validating the broader claims in Article 1 about systemic\
      \ legislative corruption and the failure of oversight mechanisms (Ethics Commission).\n\
      \nKEY ENTITIES:\n*   Baldwin County legislators\n*   Senator Chris Elliott (\"\
      TAX MAN\")\n*   Tripp Pittman\n*   BP funds\n*   Fairhope Councilman Burrell\n\
      *   Fairhope Councilman Brown\n*   Councilman Boone\n*   Conyers\n*   Robinson\n\
      *   Commission\n*   FBI\n*   Attorney General"
