      - McDowell claims he will not legally be able to refile and is waiting for statute of limitations; no accountability filed.
      - DiNardi confirms City Council appointed the negligent prosecutor yet refused to hold McDowell accountable for egregious negligence during public meetings.
      - DiNardi confirms specific council members targeted (Burrell, Boone) are the same officials facing broader scrutiny regarding corruption and mismanagement in Article 1.

      THE PIVOT:
      - Article 2 (DiNardi) provides concrete proof of the systemic incompetence/corruption alleged in Article 1.
      - McDowell's specific failure with DiNardi (neglecting court orders/appointed role) validates the claim that City Attorney/Prosecutor is not protecting citizens.
      - Connects Article 1’s broad "CATALYST corruption" claim to a specific, verifiable case (DiNardi) where the appointed prosecutor lost charges due to negligence.

