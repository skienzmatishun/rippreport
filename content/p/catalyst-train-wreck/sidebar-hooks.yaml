      - Ronan McSharry is accused of committing assaults; previous instances appear ignored by officials.
      - Fairhope City Council accused of corruption under the "Catalyst" faction; Mayor claims council treats women poorly.
      - At Fairhope City Council meeting (Jan 28): Council President "Captain Jack" and City Attorney Marcus McDowell decided on Golf Course equipment without advising the Mayor.
      - Councilman Boone yelled at the Mayor; demanded Councilman Burrell adjourn meeting immediately.
      - Councilman Burrell cut off the Mayor after she pledged to be allowed time to speak.

      THE DISCOVERY:
      - Marcus McDowell (City Attorney) has been Public Prosecutor at least three times representing citizens victimized by Ronan McSharry.
      - Specific connection revealed: "McDowell has been to court at least three times as public prosecutor representing citizens that have fallen victim to Mr. McSharry assaults."
      - Marcus McDowell is labeled a "holdover from the Mayor Can’t era" who was selected by Council President and City Attorney to support them.
      - McDowell and Captain Jack (Sherry Sullivan) allegedly chose McDowell "to carry their water and help pave the way to a Catalyst overthrowing the present Fairhope Government, in 2020."
      - McDowell and Sherry Sullivan allegedly caused a Federal lawsuit against the City that cost taxpayers (thousands of dollars) by refusing to settle early.
      - A sandwich named "J. Burrell" on McSharrys menu suggests a connection between Ronan McSharry and Councilman Jack Burrell.
      - Marcus McDowell accused of being insubordinate to the Mayor while working for the City; alleged that he ignored a police report Mr Burrell was hiding.

      THE PIVOT:
      - Article 2 proves the City Attorney (McDowell) is not just a passive official but actively represents victims of McSharry in court, validating Article 1's claim that officials are failing to prosecute him correctly.
      - Article 2 reveals the political machinery behind the "Catalyst" corruption mentioned in Article 1; McDowell is identified as a tool of Sherry Sullivan and Council President to "overthrow the present Fairhope Government."
      - Article 2 exposes personal/financial links between Councilman Jack Burrell and Ronan McSharry (sandwich on menu) that Article 1 only alludes to as a "connection."
      - McDowell’s dual role exposes the conflict: he is the Council’s lawyer used to politically manipulate cases against McSharry while simultaneously failing the victims he is supposed to prosecute as Public Prosecutor.

