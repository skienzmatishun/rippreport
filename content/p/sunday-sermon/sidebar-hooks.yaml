      - Senator Chris Elliott defended this arrangement publicly via radio, claiming
      no wrongdoing despite ethics office silence.

      - Separate background: Chris Elliott faced DUI charges; attorney argued license
      suspension would cause "irreparable harm" to his ability to work and serve as
      a Baldwin County Commissioner.


      THE DISCOVERY:

      - Public Probate records (Elberta, Key Hole Rd) show Chris Elliott and wife
      purchased property from Christopher G Stradtman on Jan 3, 2018.

      - Property listed value: $290k; Recorded purchase price: $49,725.20.

      - Elliott secured a purchase-money mortgage for $100,000 from Trustee National
