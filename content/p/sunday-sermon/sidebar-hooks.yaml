hooks:
  Smell-Test:
    brief: 'THE CONFLICT:

      - Baldwin County Legislative Delegation rents office space from Bay Minette
      Mayor Bob Wills.

      - Lease rate is $4,090 per month for five years ($245,000 initial cost).

      - Mayor Wills arranged two 5-year lease extensions: second 5 years ($283,000),
      third 5 years ($339,000).

      - Total potential payout to Mayor Wills family account is $867,000 for a building
      worth significantly less.

      - Alabama AG deferred to Ethics Commission; Commission did not respond. Questioned
      potential conflict of interest for Wills acting as landlord and mayor.

      - Article states Senator Chris Elliott is a major architect of this lease.

      - In 2012, Chris Elliott and group "Stacy, Elliott and Haygood" played a major
      role in electing Mayor Bob Wills.

      - Chris Elliott had hidden lawsuit settlement with former employer for showing
      up to work, following a DUI incident where video cameras were allegedly turned
      off.


      THE DISCOVERY:

      - Andrea Lindsey (Daphne School Board Member) explicitly identified as "Catalyst,
      a typical GOB candidate."

      - Jan 17: Andrea Lindsey received $1,000 campaign donation from Superintendent
      Tyler''s wife (verified by State campaign finance reports).

      - Jan 18: Lindsey seconded and voted for motion to promote Superintendent Tyler''s
      wife.

      - Lindsey switched from Democrat party to Republican party 15 minutes before
      qualification; claims she was told to switch.

      - Carrie Hosier identified as the opposing candidate not affiliated with Catalyst;
      claims transparency vs Lindsey''s insider deals.


      THE PIVOT:

      - Article 2 confirms Andrea Lindsey uses the same "Catalyst" network methodology
      as established in Article 1.

      - Article 2 proves quid pro quo behavior (donation from Superintendent''s wife
      followed immediately by promotion vote) is active under the current "Catalyst"
      operation.

      - Article 1 links Chris Elliott and the "Stacy, Elliott and Haygood" group to
      the formation of Catalyst/Scott Boone Consulting.

      - Article 2 links Lindsey directly to "Catalyst."

      - Combined evidence shows Chris Elliott''s historical power structure (Article
      1) is currently operating via Lindsey''s corruption in Daphne schools (Article
      2).


      KEY ENTITIES:

      - Chris Elliott (State Senator, Architect of Catalyst network)

      - Bob Wills (Bay Minette Mayor)

      - Andrea Lindsey (Daphne School Board Candidate)

      - Carrie Hosier (Daphne School Board Candidate/Opponent)

      - Jeb Ball / James Ball (Commissioners involved in lease vote)

      - Eddie Tyler (Superintendent)

      - Scott Boone Consulting

      - Stacy Elliott Haygood Group'
