hooks:
  now-you-know-jack:
    brief: '**THE CONFLICT:**

      *   Fly Creek PUD Amendment was approved by Fairhope City Council following
      representations made by developers Leaf River and Corte between January 2016
      and October 2016.

      *   These defendants allegedly misrepresented facts to the Planning Commission/City
      Council: they intended to use a point discharge system (instead of environmentally
      friendly non-point drainage) and planned to move red soil into critical areas
      within 100’ of Fly Creek wetlands, violating Red Soil Ordinance #1423.

      *   The project resulted in Fly Creek being filled with mud; the detention pond
      failed; a lawsuit was settled and another is pending; $1 million in damage was
      assessed by the Fairhope Tree Committee for ordinance violations.


      **THE DISCOVERY:**

      *   Article 2 reveals Council President Jack Burrell allegedly orchestrated
      obstruction of Mayor Kant’s office, claiming his actions stem from frustration
      over her not being named next Mayor.

      *   The article identifies a pattern of Burrell weaponizing his elected office
      to silence dissent and restrict free speech (e.g., denying the ability for citizens
      to speak at City Council meetings).

      *   Burrell is linked to using Airport funds to hire an attorney for The Ripp
      Report while simultaneously leading efforts to deny the Mayor legal counsel,
      demonstrating a bias against critical reporting.


      **THE PIVOT:**

      *   Article 1 details specific instances of council/developer misconduct and
      environmental damage regarding Fly Creek that required significant political
      willpower and public challenge by citizens (The Ripp).

      *   Article 2 establishes Burrell''s alleged pattern of using his position as
      Council President to obstruct the Mayor, suppress opposing views, and financially
      fund investigations into critics while legally hamstringing those in power.
      This pivot suggests that the procedural blockages (like excluding agenda items
      or denying public participation) seen in Article 1 are consistent with a larger
      political strategy of obstruction documented in Article'
