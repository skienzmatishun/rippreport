    text: Developers like Leaf River and Corte lied about protecting Fly Creek while
      they choked the wetlands with red mud. Council President Jack Burrell paved
      their way by sabotaging the Mayor and using City hall as a personal weapon to
      hide these dirty secrets from the public.
