hooks:
  now-you-know-jack:
    brief: 'THE CONFLICT:

      *   Defendants Leaf River and Corte made representations to the City of Fairhope
      Planning Commission, City Council, Plaintiffs, and residents regarding the Fly
      Creek PUD Amendment between January 2016 and October 2016.

      *   Representations involved claiming an environmentally friendly non-point
      discharge system when they planned a point discharge system into the Fly Creek
      wetlands.

      *   Defendants misrepresented compliance with the Red Soil Ordinance #1423 by
      planning to move red soil (clay or silt) into critical areas within 100'' of
      wetlands, violating the ordinance through "filling activity."

      *   Fly Creek was filled with mud during construction; the Detention pond failed,
      leading to a settled and pending lawsuit.


      THE DISCOVERY:

      *   Council President Jack Burrell orchestrated a campaign to obstruct the Mayor’s
      office and was complicit in leaking documents and fueling an Ethics complaint
      against the Mayor.

      *   Burrell acted to ensure Mayor Kant won reelection and secured a promotion.

      *   Burrell approved funds to hire an attorney to investigate The Ripp Report
      but denied the Mayor the same right to legal counsel.


      THE PIVOT:

      *   Article 2 reveals that Council President Burrell used his office and political
      power to obstruct public interest, suggesting his involvement may have facilitated
      or covered up the material misrepresentations made by Defendants Leaf River
      and Corte concerning the Fly Creek PUD Amendment (Article 1).

      *   Burrell''s actions demonstrate a pattern of using elected office as a weapon,
      which parallels the defendants'' use of misleading representations to gain approval
      for the controversial project.


      KEY ENTITIES:

      *   Jack Burrell (Council President)

      *   Leaf River and Corte (Defendants)

      *   Mayor Kant

      *   Fly Creek Apartments PUD Amendment

      *   City of Fairhope Planning Commission

      *   Fairhope Tree Committee'
