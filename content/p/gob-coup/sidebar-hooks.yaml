  GAME-ON-MAYOR-KANT-HUBBARD-GOES-DOWN-YOURE-NEXT:
    brief: 'THE CONFLICT:

      *   Mayor Wilson was targeted by Jack Burrell and his cronies following a coup
      attempt.

      *   Jack Burrell was assured by Tim Kant that he would be the next mayor.

      *   Employees Fiddler and Sullivan were fired, and a hiring freeze was imposed.

      *   The HR Director filed an incident report on Dec 29, 17, and filed a claim
      on May 19, 17, alleging assault by Mayor Wilson.

      *   Jack Burrell and Scott Boone (Catalyst representative) are alleged to have
      colluded with employees to support the municipal government coup.


      THE DISCOVERY:

      *   The Ripp Report was founded as a non-profit consumer group focusing on political
      and judicial corruption in Fairhope.

      *   Mayor Kant is characterized as the worst public official in Baldwin County.

      *   There is deep suspicion that past election results were tampered with.


      THE PIVOT:

      *   Article 2 establishes the investigative framework (The Ripp Report) dedicated
      to exposing political and judicial corruption, validating the specific allegations
      of malfeasance detailed in Article 1 regarding Burrell, Boone, and the city
      council.


