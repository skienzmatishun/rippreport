      * Judge Snedeker (a partner with Ray Hix, linked to airport bid complaints)
      was sworn in immediately.

      * HR Director filed an incident report against Mayor Wilson concerning alleged
      assault (incident Dec 29, ''17; police report Jan 25, ''18; claim May 19, ''17),
      seeking $100,000 in damages.


      THE DISCOVERY:

      * "Scary Sherry" and the group known as CATALYST (and the 3 B’s) are linked
      to actively attempting a political takeover/coup of Fairhope municipal government.

      * Scary Sherry was a disgruntled employee who sued the city; she, along with
      two coworkers, assisted the CATALYST council in undermining Mayor Wilson from
