hooks:
  GAME-ON-MAYOR-KANT-HUBBARD-GOES-DOWN-YOURE-NEXT:
    brief: '1. THE CONFLICT:

      - An "old guard" in Fairhope politics planned a coup to oust Mayor Wilson.

      - Opposition leaders included Mr. Burrell and Tim Kant followers, with support
      from the political group Catalyst.

      - Insubordination occurred among city employees; Fiddler and Sullivan were fired.

      - The City Council imposed a hiring freeze following these events.

      - Jack secured Judge Snedeker''s immediate appointment as municipal judge without
      public comment.

      - Allegations include Mr. Burrell boasting about driving Mayor Wilson out in
      one year.


      2. THE DISCOVERY:

      - The Ripp Report operates independently, self-funded to the tune of $15,000,
      as a consumer group focused on political and judicial corruption.

      - The report explicitly targets Mayor Kant, labeling him the "worst public official"
      in Baldwin County and calling for his retirement.

      - The Ripp Report claims suspicion that Fairhope election results were tampered
      with.


      3. THE PIVOT:

      - Article 2 (The Ripp Report''s mission) provides the independent platform and
      investigative mandate to expose corruption surrounding local power brokers,
      specifically targeting GOB representatives and figures like Mr. Burrell and
      Catalyst.

      - The HR incident—the $100,000 damages claim filed by a director against Mayor
      Wilson following an alleged assault on May 12 (following Dec 29, 17 filings)—is
      detailed in Article 1 as the culmination of institutional abuse by this established
      corrupt network.


      4. KEY ENTITIES:

      - Fairhope

      - Baldwin County

      - Major political figures: Wilson, Burrell, Tim Kant

      - Key organizations/groups: Catalyst (led by Scott Boone)

      - Specific individuals linked to corruption claims: Kevin Boone, Jack, Ray Hix,
      Judge Snedeker, Fiddler, Sullivan

      - Media outlets mentioned: The Ripp Report, Baldwin County Legal Eagle'
