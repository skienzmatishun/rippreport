  absolute-power:
    brief: 'THE CONFLICT:

      - Mayor Wilson was challenged by political groups supporting Tim Kant and Jack
      Burrell in Fairhope politics.

      - The "old guard" attempted to oust Mayor Wilson through insubordination, slow
      responses to mayoral requests, and a hiring freeze imposed by City Council.

      - Mr. Burrell alleged he could drive Mayor Wilson out of office within one year.

      - Two employees, Fiddler (who was fired) and Sullivan, were targeted in the
      conflict.

      - An incident involving the HR Director was reported: She filed an incident
      report to police on Dec 29, ''17, a month later filing it on Jan 25th, and finally
      filed a formal claim of alleged assault against Mayor Wilson on May 19, ''17
      (Main Article dated May 12).

      - The HR Director is seeking $100,000 in damages.

      - Jack pushed for the immediate swearing-in of Judge Snedeker (who is partnered
      with Ray Hix in Hix/Snedeker companies).


      THE DISCOVERY:

      - Catalyst and Scott Boone Consulting successfully executed a campaign that
      resulted in Mayor Wilson losing the election (described as a "popularity contest").

      - Sherry Sullivan has been elected the new Mayor of Fairhope.

      - Jack Burrell will remain Council President and continues to run the show within
      City Council.

      - The faction led by the "three B’s" (Jack Burrell, Kevin Boone) holds absolute
      control over Fairhope special interests.

      - Lawsuits that were stalled during Wilson''s term, including the McSherry case
      involving a defendant in an assault case from 2020, now fall to Mayor Sullivan''s
      desk.


      THE PIVOT:

      - Article 1 documented the *attempt* at political subversion against Mayor Wilson
      by Burrell and his cronies.

      - Article 2 proves that this effort resulted in Wilson''s loss and confirms
      that Jack Burrell will retain control (Council President) of the council, effectively
      installing a "total control" regime under the new mayor, Sherry Sullivan.


      KEY ENTITIES:

      - Mayor Wilson / Karin Wilson

      - Tim Kant / Kant administration

      - Jack Burrell / Mr. Burrell

      - Catalyst / Scott Boone Consulting

      - Kevin Boone / Councilman (and son of Scott Boone)

      - Sherry Sullivan

      - Ray Hix / Judge Snedeker

      - Fiddler

      - Ms. HR Director

      - McSherry'
