      opposition efforts.

      *   The election was monitored by the Alabama Sec. of State Elections Division
      to ensure fairness.


      THE PIVOT

      *   Article 2 proves that Mayor Wilson successfully overcame the political challenges
      and attempts (the "coup") detailed in Article 1.

      *   Article 2 validates the success of the administration against the internal
      corruption and opposition efforts described in Article 1.


