      *   The triangle lawsuit cost $12 million.

      *   The Mayor was paid as Utility Director and Mayor ("double dipping").

      *   Mayor Kant appointed a planning board that rubber-stamped agendas, resulting
      in numerous lawsuits.


      THE DISCOVERY:

      *   Karin Wilson ran to unseat the incumbent Mayor (Kant).

      *   Fairhope cast over 2000 votes, surpassing Daphne.

      *   The election was monitored by the Alabama Sec. of State Elections Division.


      THE PIVOT:

      *   Article 1 identifies systemic corruption and failed governance under Mayor
      Kant.

      *   Article 2 confirms a successful grassroots effort led by Karin Wilson to
      replace the incumbent regime in Fairhope, validating the call for change made
      in Article 1.


