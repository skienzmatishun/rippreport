      "criminal enterprise" with no transparency. A major point of contention was
      the $12 million Triangle lawsuit and excessive spending on projects like a soccer
      field ($5M+). In Daphne, criticism focused on Mayor Haygood''s connection to
      political entities like Stacy, Elliot, and Catalyst.


      THE DISCOVERY:

      - Timeline: October 12, 2018.

      - Revelation: The City Council was characterized as an "at Large Catalyst council"
      composed of groups with special interests who resist government change in Fairhope.

      - Status Check: These entrenched individuals were reportedly pushing for a Referendum
      (Nov 6th) regarding the Change of Government and potential transition to a Council-Manager
      system.


      THE PIVOT:

      - Article 1 identified "the good ole boys" political network, connections like
      those involving Stacy and Elliot with Mayor Haygood/Catalyst, as responsible
      for systemic corruption and favoritism (e.g., Triangle Lawsuit).

      - Article 2 reveals that this alleged corrupt network has formalized its control
      within the local government structure by operating under the name "Catalyst
      council" to actively resist reform efforts and maintain power over Fairhope''s
      governance.


      KEY ENTITIES:

      - Mayor Kant (Fairhope) / City Councilman (Fairhope)

      - Haygood (Mayor of Daphne)

      - Stacy / Elliot

      - CATALYST / at Large Catalyst council

      - John Lake (Daphne)

      - Karin Wilson

      - Harry Still III (City Council candidate/representative)

      - Triangle Lawsuit ($12 million cost)'
