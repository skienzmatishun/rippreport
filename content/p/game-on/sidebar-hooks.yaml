      others.

      *   John Lake was criticized in Main Article 1 for his political connections,
      specifically being linked to a group involving Haygood, Stacy, and Elliot that
      used "good ole boy tactics" within Baldwin County''s Catalyst organization to
      advance politicians.


      THE DISCOVERY

      *   The Widget Article reports on a recent Fairhope City Council meeting where
      the Mayor and Council demonstrated genuine cooperation and respect for one another.

      *   The council is characterized as composed of three professional new councilmen
      dedicated to representing the public interest.

      *   The Widget Article notes that historically, the last 16 years saw councils
