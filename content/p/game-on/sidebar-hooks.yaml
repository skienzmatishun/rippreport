      who have run Fairhope as a criminal enterprise/corruption machine under Mayor
      Kant (who is referenced in both documents as the previous mayor) through failure
      to allow public input and rubber-stamping personal agendas.

      • Specific issues cited: Triangle lawsuit costing $12 million; soccer field
      project over $5 million; lack of infrastructure checks/balances.


      THE DISCOVERY

      • Article 2 reveals that following Karin Wilson’s victory against Mayor Timothy
      Kant in the 2016 municipal election (oversight provided by Alabama Secretary
      of State), the City Council was populated by five individuals chosen by the
      previous administration and controlled by figures associated with CATALYST/Scott
      Boone Consulting.

      • Current council members have been using this control to thwart efforts by
      the new Mayor over the last four years regarding planning, growth management,
      infrastructure (wastewater/storm water), and development oversight.

      • Article 2 details ongoing specific corruption allegations including an ethics
      complaint filed against Councilman Robert Brown (for receiving public contracts
      for personal gain) and Jack Burrell''s eight-year grip on power with a history
