      - Fairhope City Council and Mayor accused of governance style reminiscent of past “Mayor Can’t” era leadership.
      - City lost 20-year lawsuit regarding Triangle property; judgment set at $8.25 million.
      - City paid ~$3 million in legal fees for Triangle case; Council Attorney Cain O’Rear swore before the public “city would not have to pay legal fees,” then taxpayers did.
      - March 14 City Council meeting: Scott Hutchinson (Goodwyn, Mills and Cawood) unveiled masterplan involving underground tunnel connecting properties; beach excluded.
      - K-1 building purchased for $4 million without plan; roof deteriorated to critical condition despite utilities already being installed.
      - Councilman Jack Burrell overseeing K-1 mismanagement under guise of economic development; Mayor receives two payroll checks.

      THE DISCOVERY
      - Second article confirms Fairhope facing $10 million lawsuit in Federal Court (U.S. District Court for Southern District of Alabama).
      - Lawsuit filed October 27 by development company 68 Ventures.
      - New suit targets Gables on Lawrence (20 acres, corner of Lawrence Road and Marshall Lane) and Skyline Village (16.5 acres along Dyer Road).
      - Plaintiff 68 Ventures claims City changed rules after the fact to deny development.
      - Re-confirms Triangle property was given to Single Tax Corporation despite $11.25 million in total taxpayer cost (judgment + fees).

      THE PIVOT
      - Second article provides independent confirmation of the Triangle financial mismanagement and false legal promises cited in Article 1.
      - New Federal Lawsuit exposes identical behavior: “changing rules after the fact,” confirming the pattern of governance described in Article 1.
      - Confirms Attorney Cain O’Rear and law firm Hand Anderall Sale’s history of liability (costing taxpayers $3 million) is not an isolated incident.
      - Demonstrates Fairhope council prioritizes development deals (like tunnel/waterfront) over legal precedent and taxpayer planning.

      KEY ENTITIES
      - Fairhope City Council / Mayor (Current administration)
      - Jack Burrell (Councilman, K-1 Oversight)
      - Scott Hutchinson (Goodwyn, Mills and Cawood rep for Tunnel Masterplan)
      - Cain O’Rear (Former City Attorney/Hand Anderall Sale lawyer)
      - Hand Anderall Sale (Law Firm)
      - 68 Ventures (Federal Lawsuit Plaintiff)
      - Single Tax Corporation (Triangle property recipient)
