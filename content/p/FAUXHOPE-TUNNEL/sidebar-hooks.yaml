hooks:
  I-SEE-YOU:
    brief: |-
      1. THE CONFLICT:
      - Fairhope/Fauxhope City Council elected to represent developer interests; alleged "Mayor Can’t" days resumed.
      - City lost 20-year Triangle lawsuit; forced to fork out $8,250,000 settlement.
      - City spent an additional $3,000,000 in legal fees (attorneys had pledged payment upon loss; city drained utilities revenue to pay).
      - City Council rejected multiple Triangle proposals (performing arts center, archery range) despite property valued at over $20 million.
      - Council appointed Haymes Snedeker as Municipal Judge; Snedeker is also the largest developer in Fairhope requiring council approval for his projects.
      - Councilman Martin revealed tunnel project plans with Goodwyn, Mills and Cawood via email/Monday, March 14 briefing.
      - Taxpayers paying for infrastructure (water lines) for ALDI/East Fairhope development allegedly tied to Municipal Judge partners.

      2. THE DISCOVERY:
      - Article 2 provides City of Fairhope Agenda dated May 22, 2023 confirming business decisions.
      - Item 5: Resolution formally appointed Haymes Snedeker as Municipal Judge by Circuit Judge Jody W. Bishop (28th Judicial Circuit).
      - Item 11: Resolution awarded Fairhope Clock Plaza to RH Deas Building Co., LLC; total cost $282,211.00 (includes 10% contingency).
      - Item 13: Resolution approved Intelligence-Led Policing Sensor Kits from ProTecVideo, LLC as sole source provider; total $20,000.
      - Councilman Martin repeated in Article 2 that infrastructure for ALDI and East Fairhope (developed by Municipal Judge/partners) is being paid by taxpayers.

      3. THE PIVOT:
      - Article 2 Agenda confirms Article 1’s claim that Council appoints the Judge who approves his own development projects.
      - Confirms "sole source" procurement (Article 2) validates Article 1’s claim of closed-door decisions without public notice.
      - Publicly documents the infrastructure link between taxpayer funds and Municipal Judge-driven development (ALDI/East Fairhope tunnel project).
      - Provides specific dollar amounts for Councilman Martin’s alleged waste (K-1 $4M, Clock Plaza $282k) to corroborate Article 1’s financial criticisms.

      4. KEY ENTITIES:
      - Haymes Snedeker (Municipal Judge/Developer)
      - Jody W. Bishop (Circuit Judge, 28th Judicial Circuit)
      - Councilman Martin
      - Fairhope City Council
      - Goodwyn, Mills and Cawood (Architects)
      - RH Deas Building Co., LLC
      - ProTecVideo, LLC
      - Publix (Developer)
      - Triangle Property (102 acres/Conservation easement value $20M)
    generated_at: '2026-03-13T03:00:25.907509Z'
    text: The Fairhope Council continues to bleed taxpayers dry to line the pockets of their favorite developer "godfathers." This May 2023 agenda is the smoking gun, proving they appointed Haymes Snedeker as judge while simultaneously funneling public funds into infrastructure for his private projects.
  delight:
