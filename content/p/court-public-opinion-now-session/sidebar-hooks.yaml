hooks:
  fairhope-airport-un_authorized:
    brief: 'THE CONFLICT:

      * Allegations of improper bidding and gerrymandering by the Fairhope Airport
      Authority.

      * Elected official Jack Burrell served as City Council President and Airport
      Authority voting Board member and liaison during the RFP process for Mid-Bay
      Air LLC lease selection.

      * In April–July 2015, Ray Hix was a member of the Airport Authority board with
      access to confidential airport financial information prior to the RFP.

      * Mr. Burrell chaired an ad hoc committee that reviewed the RFP bids.

      * The lease for Mid-Bay Air LLC (Hix/Snedeker companies) was signed and notarized
      on December 17, 2015, before the Alabama Ethics Commission issued its Advisory
      Opinion on February 3, 2016.


      THE DISCOVERY:

      * Article 2 establishes that an ethics advisory opinion (No. 2016-04) was required
      for a Board member to lease property from the same Authority they served.

      * The Ethics Opinion states that a contract/lease must be filed with the Alabama
      Ethics Commission within ten days of being entered into.

      * On December 2, 2016, the Alabama Ethics Commission confirmed in writing: "No
      lease has ever been submitted to us regarding this issue."

      * This confirms the initial Advisory Opinion standards were not followed and
      that critical documentation was never filed.


      THE PIVOT:

      * Article 1 makes broad claims that the bidding process was "grossly flawed
      and gerrymandered" based on ethical concern.

      * Article 2 serves as the ''smoking gun'' by proving a specific, verifiable
      procedural failure: The lease was signed (Dec 23, 2015) without compliance with
      the Ethics Commission rules or filing requirements established after that date,
      demonstrating clear conflict of interest and regulatory disregard.


      KEY ENTITIES:

      * Jack Burrell / Mr. Burrell (City Council President/Councilman; Airport Authority
      Board Member)

      * Ray Hix (Airport Authority Board member; Sec. Treasurer; Mid-Bay Air LLC)

      * Joe McEnerey (Chairman of the Fairhope Airport Authority, 2016-12-02)

      * Pam Caudill (Vice Chair of the Airport Authority, 2016-12-02)

      * Mr. Terry Chapman and Kel Jones (Executive Aviation bidders)

      * Ethics Commission (Alabama Ethics Commission)

      * Mid-Bay Air LLC / Hix/Snedeker companies

      * Sonny Callahan Airport (Fairhope Airport)'
    generated_at: '2026-07-18T04:37:03.674788Z'
  jack-box-airport:
    brief: 'THE CONFLICT:

      *   January 19, 2015 to February 3, 2016: Fairhope Airport Authority engaged
      in a Request for Proposal (RFP) bid process regarding airport leasing while
      an Ethics Commission Advisory Opinion was being drafted/required.

      *   December 17, 2015: Lease signed and notarized by the Authority prior to
      receiving the required Ethics Advisory Opinion of February 3, 2016.

      *   The Ripp Report filed a supplement complaint with the Attorney General’s
      Office on January 25, 2017, alleging improper bidding and bid rigging involving
      Jack Burrell (Fairhope City Council President/Airport Authority Board member).

      *   Allegations claimed Mr. Burrell aided the flawed RFP process and failed
      to question inaccuracies regarding Mid-Bay Air LLC''s (Hix) aircraft ownership
      and fuel claims during committee selection.


      THE DISCOVERY:

      *   The Fairhope Airport Authority is currently hiring a new legal defense team
      to "head off" investigations launched by The Ripp Report, the Attorney General’s
      office, and the Ethics Commission.

      *   This appointed "top ethics attorney of Alabama" for the Authority has been
      revealed to be Ray Hix’s personal attorney—the same lawyer who prepared the
      original disputed lease in question and previously drafted the Advisory Opinion
      request on behalf of Mr. Hix.


      THE PIVOT:

      *   The hiring of Hix''s own conflicted counsel by the Airport Authority demonstrates
      a systemic attempt at internal corruption, self-defense, or an end run around
      external accountability for the allegations originally raised against Burrell
      and Hix in 2017.

      *   It establishes that the primary entity under investigation (Airport Authority)
      is utilizing privileged information derived from the contested lease/Advisory
      Opinion process to defend itself against the very charges of corruption it allegedly
      facilitated.


      KEY ENTITIES:

      *   Jack Burrell: Fairhope City Council President, former Airport Authority
      voting Board member, liaison, RFP committee reviewer.

      *   Ray Hix / Mid Bay Air LLC: Former Airport Authority Board Member, recipient
      of the disputed lease/RFP process winner.

      *   Francis Paul Ripp / The Ripp Report: Author/advocate submitting complaint
      and monitoring ongoing legal/ethics fallout.

      *   Attorney Bailey: Lawyer representing Ray Hix and hired by the Fairhope Airport
      Authority to lead the defense against investigations into its board members.

      *   Hugh Evens: Ethics Commission Chief Counsel who was blind-copied by Mr.
      Bailey after a resident inquiry regarding Fairhope Airport Authority information.

      *   Fairhope City Council / Fairhope Airport Authority: Government entities
      involved in the 2015/2016 lease and subsequent investigation.'
    generated_at: '2026-07-18T04:37:03.674794Z'
  hi-jack-ed:
    brief: 'THE CONFLICT

      - Fairhope Airport Authority (AA) originally held land subject to a loan option
      allowing city reclaim for $10.00 if principal was unpaid by 2012.

      - In late 2015, AA initiated an RFP process to select a lessee and hanger developer
      from bidders including Executive Aviation and Hix/Snedeker Aircraft (Mid-Bay
      Air LLC).

      - On December 17, 2015, the lease was signed before an Ethics Advisory Opinion
      was rendered on February 3, 2016, allegedly violating law.

      - Francis Paul Ripp filed a formal complaint with the Office of the Attorney
      General on January 25, 2017, alleging improper bidding and bid rigging by AA
      Board members who were linked to elected officials.


      THE DISCOVERY

      - The current dispute involves whether property ownership at the Airport remains
      with the Authority or transfers to the City of Fairhope (which desires city
      title).

      - The Mayor wants the AA to appropriate $310,000 annually toward an $8 million
      debt while leaving title with the Authority.

      - Jack Burrell, as Council President and liaison, is obstructing efforts to
      repeal Ordinance 1572 related to the Airport''s governance and has resisted
      providing a clear plan for the property.


      THE PIVOT

      - Article 2 (Widget) reveals that the scrutiny of AA’s structure—including its
      operation as an information "black hole" receiving $500,000/year from city budget
      while maintaining private control of land—is not a recent development but a
      long-standing issue.

      - It proves Burrell''s role in selecting bids (as part of an ad hoc committee
      for airplane hangers) is not a new accusation but a documented conflict of interest
      that has been publicly highlighted for years, lending historical weight to the
      2017 complaint details cited in Article 1.


      KEY ENTITIES

      - Jack Burrell / Mr. Burrell (City Council President/AA Board Member)

      - Mayor Wilson (Fairhope Mayor)

      - Francis Paul Ripp (Author of The Ripp Report)

      - Fairhope Airport Authority

      - Hix/Snedeker Aircraft / Mid-Bay Air LLC

      - Executive Aviation

      - Ordinance 1572'
    generated_at: '2026-07-18T04:37:03.674798Z'
  whos-on-first:
    brief: 'THE CONFLICT

      *   Fairhope Airport Authority initiated a Request for Proposal (RFP) process
      for a ground lease.

      *   Jack Burrell served as City Council President and an elected official/Airport
      Authority Board member during the negotiation and selection phase.

      *   Mr. Ray Hix, via Mid-Bay Air LLC, was favored over other bidders including
      Mr. Terry Chapman and Executive Aviation.

      *   Allegations were made that Burrell aided in a process described as "gross[ly]
      flawed and gerrymandered."

      *   Specific allegations noted: Prior to the RFP (April–July 2015), Hix was
      able to pool privileged information from Executive Aviation, which they had
      discussed leasing with prior to the public RFP.


      THE DISCOVERY

      *   The Authority entered into a Ground Lease and Operating Agreement on December
      17th, 2015.

      *   Legal documentation provided by Dennis R. Bailey (representing Hix) was
      contradictory, referencing an "EXHIBIT C" dated Dec. 21st, 2015.

      *   The Authority presented multiple versions of leases (Exhibit B, Exhibit
      C, and the recorded Dec. 17 Lease), which contained inconsistencies in terms
      (e.g., Article XLVII titled either "Limited Personal Guaranty" or "Personal
      Guaranty").

      *   The executed lease was submitted to the Alabama Ethics Commission on March
      8, 2016, more than 60 days late relative to the required filing deadline following
      the February 3rd Advisory Opinion.

      *   Language regarding construction completion deadlines in the signed leases
      (e.g., "within a reasonable time period... not longer than 6 months") contradicted
      the terms of the Authority’s own RFP document (15 months).


      THE PIVOT

      *   Article 2 provides forensic, documentary evidence demonstrating that the
      process was legally compromised and inconsistent with official records, moving
      beyond mere allegations.

      *   The existence of three differing lease documents for a single RFP demonstrates
      documentation inconsistencies not addressed in Article 1''s general claims.

      *   The confirmed late submission of the executed Dec. 17th, 2015, lease to
      the Ethics Commission (March 8, 2016) proves non-adherence to regulatory requirements,
      undermining any legal defense for the process claimed in Article 1.


      KEY ENTITIES

      *   Jack Burrell / Councilman Jack Burrell / City Council President

      *   Ray Hix / Mid-Bay Air LLC

      *   Mr. Terry Chapman

      *   Executive Aviation

      *   Joe McEnerney (Airport Authority Chairman)

      *   Dennis R. Bailey

      *   Alabama Ethics Commission

      *   Baldwin County Judge of Probate

      *   Fairhope City Council / Fairhope Airport Authority'
