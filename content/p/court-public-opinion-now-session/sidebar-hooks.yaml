      the City of Fairhope to pay down an $8 million debt, keeping the property in
      the Authority''s name.

      *   Allegations of improper bidding (RFP) and bid rigging involving members
      of the Airport Authority Board.

      *   Mr. Jack Burrell was accused of aiding and abetting a flawed RFP process.


      THE DISCOVERY

      *   The second article emphasizes that Jack Burrell has no answers regarding
      the alleged corruption.

      *   It suggests Burrell will need an attorney because "Karma and Fate are going
      to catch Jack."


      THE PIVOT

      *   Article 1 details specific mechanisms of alleged corruption (bid rigging,
      access to financial information) involving Burrell and the Authority Board members.

      *   Article 2 serves as commentary that validates the urgency and suspicion
      surrounding Burrell''s lack of accountability, reinforcing the investigative
      focus on him.


