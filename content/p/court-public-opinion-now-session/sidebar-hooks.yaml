      Airport Authority retain ownership of the property.

      *   The Airport Authority wants to appropriate $310,000 annually from the city
      budget to pay down an $8 million debt and keep the property in Authority ownership.

      *   The Court of Public Opinion investigation alleges improper bidding and bid
      rigging by the Fairhope Airport Authority involving Mr. Burrell.


      THE DISCOVERY:

      *   Jack Burrell used his position as City Council President to obstruct city
      business, bully, and harass Mayor Karin Wilson.

      *   Burrell is accused of supporting fired employees (e.g., Sherry Sullivan)
      who sued the city and were subsequently silenced.

      *   Burrell had a history of corruption, including accepting free jet transportation
      from friends while serving on the Airport Board.


      THE PIVOT:

      *   Article 2 reveals that Burrell''s actions were not limited to airport bidding
