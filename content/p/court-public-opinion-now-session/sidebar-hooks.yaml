  captain-jack:
    brief: 'THE CONFLICT

      *   Fairhope tax payers face a situation where the Mayor wants the Airport property
      in the City of Fairhope name.

      *   The Airport Authority seeks to appropriate city tax dollars ($310,000 a
      year) to pay down an $8 million debt and retain the property ownership in the
      Authority.

      *   Council President Jack Burrell insisted the Authority should have ownership
      and provided no plan.

      *   The RFP bid process for leases was alleged to be grossly flawed, gerrymandered,
      and involved collusion/bid rigging among the Airport Authority Board members.


      THE DISCOVERY

      *   During a special meeting on Jan 8th, Council President Burrell showed up
      late and allowed Chairman Joe McEnerney to know who was "Captain" (referencing
      Captain Jack).

      *   Captain Jack explicitly stated that no hangar location is granted without
      his approval.

      *   Burrell dominated the position of Council President, running the Airport
      Authority for less than 1% or less of users.

      *   Burrell controlled appointments for the City Attorney and Municipal Judge
      positions.


      THE PIVOT

      *   Article 2 proves that Jack Burrell''s alleged control and influence over
      the bidding process (corruption in Article 1) were not just procedural but involved
      direct, personal power dynamics within the Authority structure.

      *   The conflict between Burrell and McEnerney regarding who controls the operations
      demonstrates Burrell’s unchecked authority and ability to dictate board decisions,
      which directly supports the allegation that he aided and abetted a flawed RFP
      process.


      KEY ENTITIES

      *   Jack Burrell (Council President/Airport Authority Board member)

      *   Fairhope Airport Authority

      *   Joe McEnerney (Chairman of the Board)

      *   RFP bid process

      *   Lease signed Dec. 17th 2015

      *   Ethics Commission Advisory Opinion Feb. 3 2016

      *   Francis Paul Ripp (The Ripp Report)'
    generated_at: '2026-07-11T12:00:36.265538Z'
