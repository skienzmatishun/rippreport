  citizens-fighting-back:
    brief: 'THE CONFLICT

      *   Gulf Shores citizens filed a lawsuit against the City of Gulf Shores regarding
      an approved apartment complex.

      *   The City of Gulf Shores and the Mayor stated the apartments were a "done
      deal."

      *   Pete Sims represented the affected citizens in the lawsuit.

      *   Fairhope citizens previously changed planning/zoning rules by voting out
      elected officials.


      THE DISCOVERY

      *   Negative impact on property values from high-density apartment complexes
      is staggering (e.g., Enclave property values could decline by over $3,000,000).

      *   Over 625 citizens signed petitions against the apartments.

      *   94% of those polled are against the apartments being located among single-family
      homes.

      *   Baldwin County growth is linked to "carpetbaggers" and power brokers undermining
      constitutional rights.


      THE PIVOT

      *   Article 2 provides historical context showing that citizens have successfully
      fought municipal government overreach in Baldwin County and Fairhope.

      *   It provides data quantifying the negative economic impact of the development
      being challenged in Article 1.

      *   Article 2 establishes a precedent that the City of Gulf Shores is ignoring
