  fairhope-council-shows-its-colors:
    brief: 'THE CONFLICT:

      *   Gulf Shores citizens filed a lawsuit against the City of Gulf Shores and
      the Mayor regarding an approved apartment complex.

      *   The City of Gulf Shores and the Mayor dismissed resident objections by stating
      the apartments were a "done deal."

      *   Pete Sims represented the negatively impacted citizens in the lawsuit.


      THE DISCOVERY:

      *   Fairhope citizens used a petition process (800+ signatures accepted by the
      probate judge) to trigger a 90-day election period for a change in government
      structure, circumventing the City Council.

      *   Mayor Karin Wilson of Fairhope delayed her special election scheduled for
      October 2nd until the general election on November 6th.


      THE PIVOT:

      *   The Gulf Shores lawsuit is an action taken by citizens to fight local government
      decisions (zoning/development), paralleling the Fairhope strategy of using citizen
      petition power to force changes or control elections when the governing body
      is ineffective.

      *   Fairhope''s successful use of petitioning demonstrates a mechanism citizens
      can use to affect needed change against recalcitrant officials, which contrasts
      with Gulf Shores residents fighting development approvals ignored by the City
      Government.


      KEY ENTITIES:

      *   Gulf Shores

      *   Pete Sims

