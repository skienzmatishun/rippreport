  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT:

      *   Gulf Shores citizens filed a lawsuit against the City of Gulf Shores and
      elected officials regarding an approved apartment complex in 2020.


      THE DISCOVERY:

      *   A six-day trial was held in Bay Minette regarding the Fly Creek Apartments
      development, focusing on environmental impact.

      *   The developer''s drainage plan calls for a single point discharge of excess
      stormwater directly into wetlands, which will drain into Fly Creek approximately
      100 to 150 feet from the outfall pipe.

      *   This discharge combines with runoff from Publix construction affecting Fly
      Creek.


      THE PIVOT:

      *   The trial evidence reveals the specific mechanism (dumping stormwater into
      Fly Creek via wetlands) that constitutes the environmental harm cited in the
      lawsuit filed by Gulf Shores residents.


      KEY ENTITIES:

      *   Gulf Shores

