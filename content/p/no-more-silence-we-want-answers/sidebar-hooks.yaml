      triangle lawsuit and $7.7M land debt adjacent to the airport.

      *   City debt was inflated by $3.3M spent on operating costs for the airport
      over 10 years.

      *   Mayor Karin Wilson initiated a request to transfer the airport land back
      to the city, citing unmanageable debt (including a projected $6.9 million balloon
