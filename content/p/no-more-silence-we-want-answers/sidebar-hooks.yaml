      *   The Mayor drained $3 million from the utility fund to pay down on the settlement.

      *   The Mayor claimed the Triangle lawsuit was a purchase of the property, but
      it was a legal settlement.


      THE DISCOVERY:

      *   The Fly Creek Apartments approval was based on corruption involving Mayor
      Kant and Arthur Corte.

      *   The Triangle lawsuit was settled for $11.25 million without public participation.

      *   A new deal ("Triangle Nature Trail Park") has emerged, planned by Mayor
      Kant and Arthur Corte, which includes an archery range and trails on the property
      that was cleared of pines prior to the city purchase.


      THE PIVOT:

      *   Article 2 proves that the Triangle lawsuit settlement and the subsequent
      development plans are part of a wider pattern of corruption involving Mayor
      Kant and Arthur Corte, confirming that decisions were made behind the backs
      of the public.


