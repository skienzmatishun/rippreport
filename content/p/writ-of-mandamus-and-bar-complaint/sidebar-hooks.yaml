      - Albritton is one of three trustees and an attorney for the Mabel Amos Memorial Fund.
      - Lagniappe Mobile article (June 29, 2021) reveals the Fund awarded Albritton’s daughters $105,000 in scholarships.
      - Scholarship usage was for college tuition at the University of Texas.
      - Ripp Report accuses this arrangement as "self-dealing" violating ethics rules and IRS codes.
      - Ripp Report files Alabama Bar Complaint, Ethics Commission complaint, and Writ of Mandamus against Albritton and the Commission.

      THE DISCOVERY
      - Francis Paul Ripp, The Ripp Report formally submits complaints against Albritton and Ethics Commission.
      - Evidence includes attached PDFs for the Writ of Mandamus and Bar Complaint.
      - Letters to Attorney General Steve Marshall distributed via email/post (August/July timeframe).
      - Ripp Report asserts AG office previously ignored similar corruption complaints regarding Baldwin County and Fairhope Councilman.

      THE PIVOT
