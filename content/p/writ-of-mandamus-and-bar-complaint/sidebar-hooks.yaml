      - Letter encloses all evidence: Lagniappe article, Ethics Complaint, Bar Complaint, Writ of Mandamus.
      - Letter uses Albritton’s case as proof that AG Marshall’s office fails to investigate (referencing ignored Fairhope Councilman complaint).
      - Public release links Albritton directly to oversight bodies he is supposed to police, proving conflict of interest.

      KEY ENTITIES
