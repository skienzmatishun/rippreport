      - Violation: Acts described as "self-dealing" and a conflict of interest under ethics regulations and Internal Revenue Codes.

      2. THE DISCOVERY
      - Date: October 18, 2021. Source: The Ripp Report (Francis Paul Ripp).
      - Event: Filing of a Writ of Mandamus against the Alabama Ethics Commission.
      - Discovery Date: November 25, 2021.
      - Location: Montgomery County Circuit Court (Judge Johnny Hardwick).
      - Event: Status review hearing scheduled for all pending motions relative to the Writ of Mandamus filed by Ripp Report.
      - Additional Action: Separate Alabama Bar Complaint filed against Tom Albritton for legal ethics violations.

      3. THE PIVOT
      - Widget Article confirms Writ is active litigation and not a theoretical complaint.
      - Expands corruption scope: Covington County Circuit Court Judge Ben Bowden (Albritton’s former law partner) received $45,000 for children’s tuition from same fund between 2014 and 2017.
