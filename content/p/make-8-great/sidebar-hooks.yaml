    text: Jack Burrell and his Catalyst Council cronies traded public safety for developer favors at the deadly Parker Road intersection. Vote these sellouts out on August 25th before their "Malfunction Junction" turns into a 1,000-car daily nightmare for every local family.
  FAIRHOPE-FREE-YEAR:
    brief: "THE CONFLICT: \n- Fairhope historically annexed property only if requested by owner to avoid annexing African American community.\n- New proposed Planning District 8 allows zoning control for fast food and nightclubs near homes; activist Clarice Hall Black claims zoning districts were pushed \"down the throats\" of citizens.\n- Jack Burrell is identified as the driver behind a purchase: Fairhope spent $2.6 million on farmland for recreation but leased it back to farmers at $9,000/year; African American neighbor area received zero in parkland investment.\n\nTHE DISCOVERY: \n- Alabama legislature postponed municipal elections in 2024 due to the presidential election; no city council person, mayor, municipal attorney, or municipal judge has been elected/appointed for their 5th year in office.\n- Fairhope City Council (including Mayor) is legally \"un-elected\" for this period under Ordinance No. 1692.\n- Ripp v. Burrell: Francis Paul Ripp filed suit against Jack Burrell and others\
      \ in United States District Court for Southern District of Alabama; The Ripp Report was told by the judge the court did not want to return for future hearings.\n- Clarice Hall Black is organizing petitions at Twin Beech Rd & Section St against current zoning.\n\nTHE PIVOT: \n- The Widget article proves Jack Burrell (named in Main Article regarding land deals) is currently Council President despite the lack of election.\n- The Widget article provides concrete legal evidence linking The Ripp Report and Burrell directly through the specific lawsuit (Ripp v. Burrell), confirming the antagonism mentioned in Main Article's zoning grievances is part of an ongoing legal clash.\n- The \"Free Year\" status (no voters for 5 years) explains the unchecked authority Burrell wields over decisions like Planning District 8.\n\nKEY ENTITIES: \n- Jack Burrell (Council President, named in Ripp v. Burrell lawsuit).\n- Francis Paul Ripp (Plaintiff, The Ripp Report founder).\n- Planning District 8.\n- Clarice\
      \ Hall Black (Organizer of \"Make 8 Great\" protest).\n- City of Fairhope."
    generated_at: '2026-03-15T15:13:34.087511Z'
    text: Jack Burrell rules Fairhope as an "un-elected" king thanks to a legal loophole that skipped the 2024 election. This "Free Year" of power explains why he ignores neighbors in District 8 while fighting the Ripp v. Burrell lawsuit in federal court.
  fairhope-council-shows-its-colors:
