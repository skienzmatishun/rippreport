  malfunction-junction:
    brief: |-
      THE CONFLICT
      - Fairhope historically used a “request only” annexation policy to avoid taking African American neighborhoods.
      - Fairhope spent $2.6 million purchasing farmland for recreation; leased it back for farming at $9,000/year.
      - Jack Burrell led the farmland purchase; Burrell Boone and Brown pushed the location despite community objection to airport proximity.
      - Proposed Planning District 8 is being considered by residents as an alternative to annexation into Fairhope.
      - Current zoning (unzoned areas) allows fast food/nightclub risks for residents.
      - Highway 98/Parker Road intersection cited as “Malfunction Junction” with high accident frequency.
      - 2020 Fairhope Municipal Elections scheduled for Aug. 25th.

      THE DISCOVERY
      - Catalyst City Council supports developers in exchange for development approval on Parker Road.
      - Developer projects completed and approved include existing apartments plus 48 additional units on Parker Road.
      - New development increases local population from roughly 50 residents to approximately 500–700 additional residents.
      - Projected traffic increase at intersection equals equivalent of over 1,000 cars per day upon completion.
      - Article calls for removing all “Catalyst Council members” during upcoming election.

      THE PIVOT
      - Both articles target the same August 25th Fairhope Municipal Election.
      - Article 1 frames Council/Land deals (Burrell) as ignoring specific communities and zoning abuse.
      - Article 2 frames Council actions (“Catalyst City Council”) as causing safety hazards via zoning/development collusion.
      - Both articles demand voting out current leadership simultaneously to reverse zoning and development abuses.

      KEY ENTITIES
      - Clarice Hall Black (Petition organizer)
      - Jack Burrell
      - Burrell Boone and Brown
      - Catalyst City Council
      - Fairhope City Council
      - Publix
