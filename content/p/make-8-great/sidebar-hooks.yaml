      - Fairhope City Council attempted to derail the resulting Oct 2nd election using
      legal maneuvering and "dirty tricks" as reported.

      - City Attorney has been instructed by the Council (via the Catalyst Council)
      to represent city interests over constituents.

      - Mayor Karin Wilson delayed a planned special election scheduled for Oct 2nd,
      moving it to the Nov 6th general election via a Probate Judge decision.


      THE DISCOVERY:

      - Article 2 reveals the City Council is actively delaying citizen-mandated votes
      to preserve their current power structure.

      - A revised Alabama statute (July 2018) invalidated earlier legal opinions used
      by the Council to ignore citizen petitions.

      - Mayor Karin Wilson announced directly via the Judge of Probate’s office that
      special municipal voters would be "well-informed" regarding a referendum on
      government form (Nov 6).

      - This confirms the Council refuses to listen to alternative legal opinions
      offered as early as June 26, 2018.


      THE PIVOT:

      - Article 2 is the "smoking gun" because it exposes the exact mechanism City
      Council uses to block community oversight: delaying ballots, using legal technicalities,
      and coordinating with special interest groups (Catalyst Council).

      - Proves the City Attorney serves only the Council, not citizens or Mayor.

      - Validates Article 1’s claim that Fairhope has a "dismal reputation" regarding
      neighbor treatment: the same corruption seen in zoning/annexation deals (Burrell)
      is now visible in their election obstruction.


      KEY ENTITIES:

      - Jack Burrell

      - Boone (Burrell Boone)

      - Brown

      - Clarice Hall Black

      - Karin Wilson (Mayor)

      - City Attorney

      - Catalyst Council

      - Fairhope City Council

      - Probate Judge'
    generated_at: '2026-03-15T15:13:34.087513Z'
    text: The Catalyst Council used dirty legal tricks and a compliant City Attorney
      to hijack your right to vote on a new government. They moved the October election
      to November just to protect their power and keep Jack Burrell’s shady land deals
      from facing real oversight.
