      competition in primary elections.

      * Kevin Boone serves on Fairhope City Council and is described as a loyal "good
      ole boy" who initially complied with the former Mayor''s directives.


      THE DISCOVERY

      * A pervasive network of entrenched politicians (the “Flies”) exists across
      Baldwin County, connecting officials like Tucker Dorsey (County Commissioner),
      Michelle Thomason (Judge), and Kevin Boone (Fairhope City Councilman).

      * This network is identified as being politically linked to the Catalyst political
      organization.

      * Scott Boone, son of Kevin Boone, serves as a principal operative for Catalyst,
      establishing a conflict of interest connection across local offices.


      THE PIVOT

