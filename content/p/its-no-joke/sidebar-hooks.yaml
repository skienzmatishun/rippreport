      candidacy occurring specifically within Baldwin County and Fairhope, Alabama.

      *   The protests involved local constituents (women and men), not paid or out-of-state
      actors.

      *   Named participants in the opposition include Ginger Broadway Poynter, Michele
      Walker Harmon, and Kim Mc Cuiston.


      THE PIVOT

      *   Article 1 argues that Moore’s views will cause economic isolation for Alabama
      due to international corporate withdrawal.

      *   Article 2 is the smoking gun because it provides historical evidence of
      concrete, local resistance and rejection of Roy Moore from within his perceived
      support base (local constituents), proving the deep-seated cultural divide cited
      in Article 1 was not merely theoretical or abstract.


      KEY ENTITIES

      *   Roy Moore

      *   Alabama Senate / Alabama State

      *   Baldwin County

      *   Fairhope

      *   H Bryant Ayers (Columnist)

      *   Ginger Broadway Poynter

      *   Michele Walker Harmon

      *   Kim Mc Cuiston

      *   Tim (former Mayor/Council Member)'
