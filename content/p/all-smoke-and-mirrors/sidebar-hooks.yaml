  economic-development-baldwin-county-style:
    brief: 'THE CONFLICT

      *   Baldwin County spent $32 million in 2012 on the 3000-acre Mega-Site.

      *   The Fairhope Airport Authority structure allows taxpayers to cover airport
      debt (21% of city debt) while the Authority retains control/ownership of the
      land.

      *   County Commissioners skimmed $5 million from schools using a penny tax for
      infrastructure projects.


      THE DISCOVERY

      *   The Mega-Site, purchased for $32 million in 2012, remains vacant; lost opportunity
      value is estimated at $50 million today.

      *   County commissioners sold the project to "sleeping citizens," and county
      employees helped pay the $32 million price tag.

      *   Current commissioners claim greater oversight, but past actions involved
      lack of documentation (Fairhope Economic Development invoice).


      THE PIVOT

      *   Article 2 provides specific details regarding how the $32 million Mega-Site
      was acquired (commissioners/employees facilitating the sale) and the specific
      mechanism for skimming funds ($5 million penny tax), directly substantiating
      the generalized claims of mismanagement made in Article 1.


      KEY ENTITIES

      *   Baldwin County Commission

      *   Fairhope Airport Authority

      *   Mega-Site (3000 acres)

      *   $32 Million cost

      *   $5 Million skim from schools

      *   Jack Burrell (Council President/Mayor)

      *   Fairhope Economic Development'
