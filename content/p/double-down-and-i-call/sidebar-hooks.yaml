      Ethics Commission (via Informal Opinion Request) not to use his office or associated
      businesses for self-benefit.

      *   Mr. Brown, who is partners with Cliff Pittman of Pittman Brown Development
      Co., proceeded with the contract despite warnings, while Mr. Pittman was a director
      of Single Tax Corp. and voted on Art Center funds.


      THE DISCOVERY

      *   Jack Burrell (Fairhope City Council President) serves as an active member
      of the Fairhope Airport Authority Board.

      *   Burrell is currently on a two-man committee reviewing bids for airplane
      hangar leases at the airport.

      *   The Ripp Report alleges that these past actions regarding harbor leases
      mirror the pattern seen in 2018, suggesting Burrell’s current dual roles create
      an undisclosed conflict of interest.


      THE PIVOT

      *   The documented failure to hold Robert Brown accountable after his 2018 Ethics
      Commission warning provides a historical precedent showing how elected officials
      use official advice as a pretext while engaging in conflicts of interest for
      personal or business gain.

      *   This pattern serves as the "smoking gun" evidence that Jack Burrell’s current
      adherence to legality (claiming everything is fine) may be a manipulation of
      ethical rules, similar to Robert Brown''s documented actions.


      KEY ENTITIES

      *   Jack Burrell: Fairhope City Council President, Fairhope Authority Board
