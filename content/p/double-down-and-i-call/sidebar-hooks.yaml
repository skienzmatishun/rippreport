      the City paid the mortgage for that same land (representing 21% of city debt).

      - Mayor pushed to repeal Ordinance 1572 regarding Fly Creek Apartments, but
      Council President reportedly refused to place it on the City Council agenda.


      THE DISCOVERY:

      - Current investigation alleges past actions concerning airplane hanger leases
      involved potential conflicts of interest and criminal activity within the Airport
      Authority board.

      - Allegations include an Airport Authority Board member''s partner being the
      municipal judge for Fairhope (jody W. Bishop context).

