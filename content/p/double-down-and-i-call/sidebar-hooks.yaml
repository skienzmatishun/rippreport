hooks:
  investigating-the-investigators:
    brief: '**THE CONFLICT:**

      *   Allegations regarding past unauthorized airplane hangar leases at Fairhope
      Airport Authority came into question.

      *   A letter dated December 21, 2016, was sent to Alabama Attorney General Special
      Prosecutor Matt Hart and Circuit Judge Jody W. Bishop referencing the issues.

      *   The core conflict involved potential conflicts of interest for individuals
      who were both Fairhope Airport Authority Board members and City Council liaisons/Municipal
      Judges (e.g., a board member''s partner being the municipal judge).

      *   Concerns were raised that the Ethics Commission was manipulated through
      Advisory Opinions, such as Opinion 2016-4, which involved Jack Burrell (City
      Council President and Airport Authority active member) participating in the
      ad hoc committee selecting bidders.


      **THE DISCOVERY:**

      *   The investigation revealed significant inconsistencies within a bid won
      by board member Ray Hix for an airport lease.

      *   Hix’s submitted bid appeared to contain inaccurate data regarding aircraft
      ownership, planned operational usage (Jet A and Avgas), and construction timeline
      estimates.

      *   During the bidding process, Jack Burrell (who was on the two-man ad hoc
      committee) reduced Mid-Bay’s fuel estimate by 15,000 gallons, leading to questions
      about his authority to amend a submitted bid.

      *   The article highlights that Ray Hix had served as an Airport Authority Board
      Member prior to the bid process and possessed potentially advantageous "inside
      information."


      **THE PIVOT:**

      *   Article 2 transitions the investigation from general suspicions of institutional
      conflict of interest (Main Article) to specific, documented evidence of potential
      procedural irregularities and ethical misconduct by key individuals involved
      in a single lease award.

      *   It moves beyond merely asking *if* conflicts existed (Main Article''s call
      for investigation) to demonstrating how those potential conflicts played out
      through flawed bid processes (Hix’s bid inconsistencies and Burrell’s alleged
      modification of the fuel figure).


      **KEY ENTITIES:**

      *   Jack Burrell (City Council President, Fairhope Authority Board Member)

      *   Ray Hix (Former Airport Authority Board Member, Municipal Judge)

      *   Matt Hart (Alabama Attorney General Special Prosecutor)

      *   Jody W. Bishop (Circuit Judge, 28th Judicial Circuit)

      *   Fairhope Airport Authority (FAA)

      *   Ethics Commission/Advisory Opinion 2016-4

      *   Mid-Bay (The company that received the lease bid modification)

      *   Joe McEnerney (Airport Authority Chairman)'
