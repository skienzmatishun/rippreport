  fairhope-airport-un_authorized:
    brief: 'THE CONFLICT

      *   2015-08-07: Three Airport Authority board members resigned: Joe McEnerey,
      Pam Caudill, and Ray Hix.

      *   Post-resignation: Board member Ray Hix gained privileged access to confidential
      airport lease, bid, and financial information.

      *   Conflict Point: Ray Hix (Municipal Judge for Fairhope) was positioned to
      secure a lease as Mid Bay Air LLC.

      *   Burrell’s Role: Jack Burrell served as the City Council President, liaison
      for the council, active Airport Authority member, and head of an ad hoc committee
      reviewing bids.

      *   2015-12-23: The Airport Authority signed a memorandum of lease with Mid
      Bay Air LLC (awarded Dec 2015).

      *   Legal Precedent Sought: A lawyer paid another lawyer to obtain Advisory
      Ethics Opinion #2016-4, which addressed whether an AA Board member could enter
      into a lease while serving on the same authority.


      THE DISCOVERY

      *   The Widget Article confirms that an ethics opinion was sought specifically
      to allow the conflict of interest involving Hix (Board Member/Judge) and Mid
      Bay Air LLC.

      *   Article 2 proves Burrell chaired the ad hoc committee that reviewed bids
      and ultimately selected his associate''s interests as the winner, despite evident
      conflicts of interest.

      *   The Ethics Opinion #2016-4 required a contract to be filed with the Alabama
      Ethics Commission within ten days.

      *   In response to a request on November 8, 2016, concerning the Mid-Bay Air
      Lease awarded in late 2015, the Alabama Ethics Commission stated: "No lease
      has ever been submitted to us regarding this issue."

      *   Article 2 concludes that the Mid Bay Air Lease is null and void due to failure
      of oversight and non-compliance with ethics rules.


      THE PIVOT

      *   Main Article 1 asserts Jack Burrell insists all airport operations are "perfectly
      legal" and asks authorities for an independent investigation.

      *   Widget Article 2 provides specific, documented proof (Ethics Opinion #2016-4,
      the failure to file the lease by Dec 2016) that the critical Mid Bay Air Lease
      was both a conflict of interest and intentionally concealed from the Alabama
      Ethics Commission.

      *   Article 2 directly refutes Burrell’s claims of legality by demonstrating
      his involvement in an unauthorized transaction involving Hix/Snedecker companies.


      KEY ENTITIES

      *   Jack Burrell (City Council President, AA Board Member)

      *   Ray Hix (Board Member, Municipal Judge for Fairhope, Secretary/Treasurer
      of AA)

      *   Snedecker (Fairhope Municipal Judge)

      *   Joe McEnerey (Former Airport Authority Chairman)

      *   Pam Caudill (Former Airport Authority Vice Chair)

      *   Alabama Ethics Commission

      *   Mid Bay Air LLC

      *   Advisory Ethics Opinion #2016-4'
