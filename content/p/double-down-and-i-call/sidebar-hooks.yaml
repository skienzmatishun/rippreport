  fairhope-citizens-citizens-citizens:
    brief: '**THE CONFLICT:**

      *   Past allegations involve potential conflict of interest regarding airplane
      hanger lease bids at Fairhope Airport Authority.

      *   The issue references Advisory Opinion 2016-4, which questioned if an Airport
      Authority Board member could bid on an airport proposal.

      *   Allegation specifies that the partner of a involved board member is the
      municipal judge for Fairhope (Jody W. Bishop).

      *   Jack Burrell served as Council President and was part of a two-man ad hoc
      committee selecting qualified bids for hanger space in this past incident.


      **THE DISCOVERY:**

      *   Mayor Karin Wilson noted that Airport Authority debt represents 21% of Fairhope''s
      overall borrowing.

      *   The Mayor urged the city council to take ownership of 258 acres purchased
      by the Authority in 2007 for $8.85 million to address this debt.

      *   Jack Burrell was observed mocking the citizens during a discussion regarding
      these airport assets, while remaining on the committee involved in selecting
      bids that went to a "close personal friend."


      **THE PIVOT:**

      *   The Main Article documents historical suspicion and ethics complaints (filed
      in early December) regarding conflicts of interest in past Airport Authority
      bid selections.

      *   The Widget Article proves Burrell’s current active role as Council President/Authority
      Board member continues to place him at the decision-making nexus for critical,
      high-value airport assets (258 acres).

      *   It confirms his ongoing refusal to recuse himself from actions regarding
      bids favoring personal associates, indicating a sustained pattern of behavior
      linked to the past ethical concerns.


      **KEY ENTITIES:**

      *   Jack Burrell: Council President; Fairhope Authority Board Member.

      *   Karin Wilson: Mayor of Fairhope (Current).

      *   Fairhope Airport Authority.

      *   Jody W. Bishop: Circuit Judge for 28th Judicial Circuit/Municipal Judge
      for Fairhope.

      *   Matt Hart: Alabama Attorney General Special Prosecutor (referenced in Main
      Article).

      *   City Council.'
