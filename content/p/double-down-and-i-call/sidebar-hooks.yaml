      of the Airport Authority board members.

      *   The Main Article alleges manipulation of the Ethics Commission through Advisory
      Opinions (Opinion 2016-4) concerning Board member bidding on Airport proposals,
      noting the Municipal Judge is the partner of the Board member.


      THE DISCOVERY

      *   Fairhope Town Hall meeting issues include the repeal of ordinance 1572 and
      the conflict between the Fly Creek Apartments and the Airport Authority regarding
      airport land control.

      *   The Airport Authority is demanding maintenance of control over airport land,
      which represents 21% of the city debt.

      *   Fairhope is spending more on the Airport than on schools.


      THE PIVOT

      *   Article 2 reveals that the Council President actively works behind efforts
