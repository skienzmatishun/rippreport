hooks:
  audio-of-bay-minette-attorney-councilman-fight-offers-new-details:
    brief: 'THE CONFLICT

      *   **Event:** Physical altercation between Harry Still (Attorney) and Matthew
      Franklin (Bay Minette City Councilman).

      *   **Date:** September 3 (specific date of arrest incident referenced in Article
      2).

      *   **Location:** Bay Minette City Councilman Franklin’s office and outside
      on the street.

      *   **Police Action:** Baldwin County Sheriff''s Office (BCSO) and Bay Minette
      Police Department (BMPD) arrested Still, booked him into county jail.

      *   **Legal Consequence:** BMPD filed petition for involuntary competency hearing/mental
      institution commitment (unsuccessful per Article 1); Still barred from city
      facilities on bond conditions.

      *   **Internal Directive:** Sheriff Anthony Lowery directed deputies to "pre-target"
      attorney Harry Still at a Republican event, citing prior jail log photo despite
      no conviction in prior incident.

      *   **Prior History:** Baldwin County Courthouse security pass revoked for Harry
      Still in 2019 and 2020 due to "suspicious" behavior.


      THE DISCOVERY

      *   **Evidence:** 8+ hours of audio recording provided by Harry Still to Lagniappe
      (Article 2), recorded on Still''s cell phone.

      *   **Verbal Threats:** Franklin audibly threatens to kill Still and his dog:
      "I’m going to kill your fucking dog, and I’m going to kill you."

      *   **Physical Action:** Franklin asks "Are you done now?" while Still restrains
      him; witnesses allegedly saw Still restraining Franklin.

      *   **Denial:** Franklin denies putting hands on Still during police inquiry
      ("I don’t know why you touched me").

      *   **Injury Claim:** Still told officers he did not feel injured ("I don’t
      feel anything") despite claiming a "busted lip" to Lagniappe later.

      *   **Audio Contradiction:** Recording contradicts narrative offered by former
      Mayor Bob Wills and Police statements that Still attacked Franklin initially.


      THE PIVOT

      *   **Smoking Gun Status:** The audio recording proves Franklin issued lethal
      threats against Still, contradicting the official narrative used to justify
      the arrest and involuntary commitment petition.

      *   **Retaliation Indicator:** Article 1 links Sheriff Lowery’s directive to
      use prior jail log against Still to viewpoint-based policing, which Article
      2’s audio context supports by showing Frankline''s aggression was real (threatening
      killing Still) rather than a false assault claim.

      *   **Political Motivation:** Discussion in audio confirms political animosity
      involving Mayor-elect Joshua Brown (beat Wills Aug. 26 election) and Police
      Chief Al Tolbert, aligning with Article 1’s claim of BCSO pre-targeting Still
      regarding political attacks.


      KEY ENTITIES

      *   **Harry Still** (Attorney, Podcast Host, Plaintiff)

      *   **Matthew Franklin** (Bay Minette City Councilman)

      *   **Anthony Lowery** (Baldwin County Sheriff)

      *   **Bob Wills** (Former Mayor of Bay Minette, Resigned Nov. 3)

      *   **Al Tolbert** (Former Bay Minette Police Chief, Joined BCSO Deputy)

      *   **Joshua Brown** (Bay Minette Mayor-elect, Aug. 26 election)

      *   **Otis French** (Reference regarding fatal police shooting)

      *   **Baldwin County Sheriff''s Office / Bay Minette Police Department (BCSO/BMPD)**

      *   **Bay Minette** (City)

      *   **Francis Paul Ripp / Whitney Scapecchi** (Podcast participants/reporters)'
