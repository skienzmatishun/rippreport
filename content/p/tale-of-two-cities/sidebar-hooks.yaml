      *   The City Attorney advised the Mayor to send the Site Plan back for a second
      look.

      *   The City is intentionally not following its "Land Use Plan," as evidence
      showed City Staff used the Land Use Plan criteria in recommendations for Site
      Plans during 2014, 2015, and 2016, but now claims the plan is insignificant.


      THE PIVOT:

      *   Article 2 exposes systemic regulatory failures (ignoring ordinances and
      land use plans) within the Gulf Shores jurisdiction.

      *   This shows that local zoning disputes and rejection of public input (as
      seen in Article 1) are rooted in intentional disregard for established municipal
      rules and planning criteria, rather than legitimate technical deficiencies.


