hooks:
  community-or-developer:
    brief: |-
      THE CONFLICT
      *   Ongoing debate concerning Fly Creek Apartments development in Fairhope.
      *   Multiple public meetings held with over 100 attendees expressing opposition; stated opposition rate of 99%.
      *   Fairhope City Council consistently delayed decisions regarding the Fly Creek PUD Sunset Provision across various council meetings (up to the 10th meeting).

      THE DISCOVERY
      *   Article 2 reveals specific allegations concerning conflicts of interest between Fairhope City Council members and developer, engineers, contractors, and landowner related to Fly Creek.
      *   It names "Catalyst," a fraternity allegedly including county commissioners, attorneys, judges, and developers, claiming these groups are working for themselves rather than the community (GOB's/Goobers).

      THE PIVOT
      *   Article 2 provides the systemic framework and institutional motive (conflict of interest, political network control) that explains the council members’ inaction described in Article 1. It transforms a local zoning dispute into an alleged effort by a powerful cabal (Catalyst fraternity) to override public will through procedural stalling and entrenched interests.

      KEY ENTITIES
      *   Beavis (City Council Member)
      *   Butthead (City Council Member)
      *   Fairhope City Council
      *   Fly Creek Apartments / Fly Creek PUD Sunset Provision
      *   Daphmont Subdivision
      *   Daphne Planning and Zoning Board
      *   Catalyst (Political organization/fraternity)
      *   The Baldwin Insider
    generated_at: '2026-07-18T09:42:22.652754Z'
    text: Fairhope officials ignored thousands of angry residents to protect the Fly Creek development through endless procedural delays. This investigation exposes "Catalyst," a secret fraternity of power brokers who treat the city council like a private club for their own developer friends.
  follow-bouncing-ball:
    brief: |-
      THE CONFLICT
      *   Councilman Kevin Boone of Fairhope consistently voted on zoning requests involving Dewberry/Preble-Rish, LLC or its partners without recusal.
      *   The firm donated $2500 to Mr. Boone’s re-election campaign.
      *   Specific votes documented include the 240-unit Retreat at Fairhope Village (Fly Creek Apartments) on Sept. 3, 2016, and HMR, LLC projects, where Mr. Boone favored these development firms despite conflicts of interest.

      THE DISCOVERY
      *   The second article proves that the failure of officials in Fairhope to listen to citizens regarding large developments is not mere political oversight, but a documented system of ethical violation and self-dealing.
      *   It reveals specific instances (2016) where Mr. Boone supported projects benefiting his business partners, such as John Avent.

      THE PIVOT
      *   Article 1 characterizes the Fairhope City Council as cowering and ignoring public dissent regarding the Fly Creek Apartments project (99% opposition).
      *   Article 2 serves as the 'smoking gun' by providing legal documentation demonstrating that this inaction is rooted in conflict of interest; Mr. Boone’s votes were consistently aligned with projects favored by his business associates, who were also financial contributors to his campaign.

      KEY ENTITIES
      *   Kevin Boone (Councilman)
      *   John Avent
      *   Dewberry/Preble-Rish, LLC
      *   HMR, LLC
      *   Fly Creek Apartments / The Retreat at Fairhope Village
      *   Daphne Planning and Zoning Board
      *   Fairhope City Council
    generated_at: '2026-07-18T09:42:22.652761Z'
    text: Councilman Kevin Boone pretended to listen to public concerns while consistently voting for his biggest campaign donors. These records prove Boone’s votes were not just bad policy; they were direct payoffs to business partners like John Avent for high-density apartment projects.
  fairness:
    brief: |-
      THE CONFLICT
      *   Fly Creek Apartments project in Fairhope faced sustained public opposition across multiple meetings, with over 1000 attendees and 99% opposing the development.
      *   Citizen concerns included Fly Creek being full of red mud from the Publix site, right-of-way grading that removed trees/living things, and historical violations.

      THE DISCOVERY
      *   Fairhope City Council voted to extend a sunset clause by another 120 days for developer Corte to achieve multiple occupancy status despite public outcry.
      *   Conflict of Interest Allegations: Councilman Brown's long-term relationship with Mr. Corte; Councilman Boone’s business ties to the engineer company used by Mr. Corte.
      *   Historical Context: The $11.25 million Triangle lawsuit settlement involved a previous council (including Beavis and Butthead) aiding Corte/former mayor, suggesting historical influence on city decisions.

      THE PIVOT
      *   Article 1 establishes that despite overwhelming citizen dissent in Fairhope (9 meetings), the Planning and Zoning board and City Council "cowered" and failed to listen to opponents regarding Fly Creek Apartments.
      *   Article 2 proves this failure by identifying specific council actions—voting for extensions/approvals of the project's terms—and alleging that these votes were compromised by undisclosed business relationships between current officials (Brown, Boone) and developer Corte.

      KEY ENTITIES
      *   Fairhope City Council
      *   Fly Creek Apartments
      *   Developer Corte
      *   Mayor Wilson
      *   Councilman Brown
      *   Councilman Boone
      *   Burrell / Beavis / Butthead
      *   Senator Pittman (connected to the Triangle Lawsuit)
      *   Triangle Lawsuit ($11.25 million settlement)
    generated_at: '2026-07-18T09:42:22.652764Z'
    text: The Fairhope City Council cowered behind closed doors while a thousand residents demanded they stop the Fly Creek project. We found the paper trail connecting Councilmen Brown and Boone to developer Arthur Corte, showing exactly why they sold out the community for a developer’s favor.
  a-legal-win-for-fairhope-citizens-who-oppose-fly-creek-apartments:
    brief: |-
      THE CONFLICT:
      - Friends of Fly Creek (Plaintiffs) sued the City of Fairhope and local officials regarding development decisions surrounding Fly Creek Apartments.
      - Defendants (City of Fairhope, Fairhope Planning and Zoning, Fairhope City Council, Leaf River Group LLC) moved to dismiss the lawsuit in June this year.
      - George Robards was cited by the Plaintiffs as the loudest voice opposing the suit, calling it "frivolous."

      THE DISCOVERY:
      - The court denied the Defendants' motion to dismiss (a ruling referenced in 2016).
      - Denial allows the lawsuit to move into a discovery phase.
      - Discovery requires the production of all documents, phone calls, and donations by Fairhope officials/defendants.

      THE PIVOT:
      - Article 1 presents Daphne Planning & Zoning as listening to citizens who opposed zoning changes for Daphmont Subdivision (demonstrating public influence).
      - Article 2 serves as the 'smoking gun' by proving that in Fairhope, despite the developer gaining initial approval and political opposition from officials like George Robards, a court ruling invalidated the Defendants’ attempt to dismiss the legal challenge against the development.

      KEY ENTITIES:
      - Friends of Fly Creek (Plaintiffs)
      - City of Fairhope / Fairhope Planning and Zoning / Fairhope City Council (Defendants)
      - Leaf River Group LLC (Developer/Defendant)
      - George Robards (Former Mayor, P&Z Member)
      - Daphne Planning and Zoning Board
      - Daphmont Subdivision
    generated_at: '2026-07-18T09:42:22.652772Z'
    text: Former Mayor George Robards mocked citizens by calling their lawsuit against the Fly Creek development frivolous and a waste of time. A judge just crushed that arrogance by ordering the city to hand over every secret phone call and donation record involving the project’s shadowy backers.
  daphne-decision:
    brief: |-
      THE CONFLICT:
      - Past event: City Council seat in Daphne vacated by District 7 Councilman Joe Davis, III.
      - Date: November 13th.
      - Immediate fallout: Daphne City Council opened the vacancy search on December 10, 2018, accepting resumes until December 7, 2018.
      - Underlying political conflict: Ongoing zoning and development battles between residents (Daphmont Subdivision, Fly Creek Apartments) and local officials/developers, often attributed to influences like "Beavis" and "Butthead."

      THE DISCOVERY:
      - Article 2 proves that the Daphne City Council operates via coordinated recruitment by specific political organizations.
      - Catalyst is revealed as a formal organization (founded around 2017-2020) designed to hand pick candidates, specifically recruiting Johnathan Armstrong for vacancies like the one left by Joe Davis, III.
      - The leadership of Catalyst includes figures who served in other local roles: Eliott Haygood and Stacy Elliott (originally).

      THE PIVOT:
      - Article 1 details the current public struggle regarding zoning decisions and lack of citizen listening between Daphne and Fairhope (Daphmont Subdivision vs. Fly Creek Apartments).
      - Article 2 provides the historical blueprint for how those political outcomes are achieved, demonstrating that key positions (like the Council seat) are filled by candidates linked directly to coordinated political machines like CATALYST/GOB’s rather than solely through independent public will.

      KEY ENTITIES:
      - Daphne City Hall (Location of planning meetings and council chambers).
      - Daphmont Subdivision (Neighborhood opposing zoning change for 24 hour service station).
      - Colonaid Apartments (Development next to the proposed service station on Johnson Road/Highway 98).
      - Fly Creek Apartments (Project in Fairhope that has generated over 1000 public attendance and intense opposition).
      - Joe Davis, III (District 7 Councilman who vacated seat, November 2018).
      - Johnathan Armstrong (Candidate recruited by Catalyst for the vacant seat).
      - CATALYST (Political organization/network founded by figures like Elliott Haygood and Stacy Elliott; linked to Judge Michelle Thomasson's non-profit BSAS).
      - Beavis and Butthead (Cited in Article 1 as dragging Fairhope into an abyss, implying political influence on zoning decisions).
    generated_at: '2026-07-18T09:42:22.652775Z'
    text: Residents in Daphne think their local leaders are independent, but the "Catalyst" machine is actually hand-picking candidates behind the scenes. This report uncovers how the group rigged the recruitment process to install Johnathan Armstrong into a vacant council seat to ensure total control.
  living-it-up-at-the-hotel-california:
    brief: |-
      * THE CONFLICT:  Past zoning battles regarding Fly Creek Apartments in Fairhope have involved numerous meetings and proposals despite overwhelming public opposition (approx. 1000+ attendees, 99% opposed). Tim Kant served as Mayor for 16 years before his transition to Karin Wilson.

      * THE DISCOVERY: Article 2 reveals that while a planning commission voted 4-2 on the controversial Fly Creek Apartment deal, Mayor Tim Kant and Public Works Director Jennifer Fidler were absent from the crucial meeting at their Southern California vanity award trip. Councilman Boone is cited as being pro-developer regardless of infrastructure needs or public opposition.

      * THE PIVOT: Article 1 established the narrative that Fairhope ignores citizens despite widespread protests (specifically citing Fly Creek). Article 2 provides concrete evidence of this institutional disregard, showing a specific instance where the Mayor and Public Works Director abandoned their duties during high-stakes votes; further cementing the claim through Councilman Boone's pro-developer stance undermining public outcry.

      * KEY ENTITIES:
          * Daphne City Hall / Daphne Planning and Zoning Board
