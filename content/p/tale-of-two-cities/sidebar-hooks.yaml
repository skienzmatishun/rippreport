    generated_at: '2026-07-18T09:42:22.652779Z'
    text: While Fairhope residents fought to save their town from the Fly Creek development, their leaders were busy tanning on a California vanity trip. Former Mayor Tim Kant and Jennifer Fidler abandoned their posts during a critical vote, leaving pro-developer Councilman Boone to do the dirty work.
  no-more-silence-we-want-answers:
    brief: |-
      THE CONFLICT:
      - Main Article reports on a Daphne Planning and Zoning Board meeting regarding a proposed zoning change for a 24-hour service station/drive-through food service at Johnson Road and Highway 98, next to Colonaid Apartments in Daphmont Subdivision.
      - Daphne P&Z Board rejected the zoning request, recommended rejection to Daphne City Council.
      - Main Article contrasts this with Fairhope’s handling of Fly Creek Apartments, noting over 1000 residents attended nine meetings opposing the project.

      THE DISCOVERY:
      - Widget article alleges Mayor Kant uses the Planning and Zoning (P&Z) Board as a mechanism for "good ole boy deals" and violates city ordinances/comprehensive plans.
      - P&Z Board is cited in connection with multiple lawsuits, including the Triangle lawsuit which cost $12 million to settle.
      - The Triangle settlement drained $3 million from the Fairhope utility fund.
      - Fly Creek Apartments development is identified as a "good ole boy deal" involving developer Arthur Corte, costing the city hundreds of thousands of dollars after lost litigation.
      - City funds were allegedly used to build a Fire station on Parker Road (dead end) and associated lift stations for Mr. Corte's project at $500k plus several hundred thousand more.

      THE PIVOT:
      - Main Article criticizes Fairhope officials for ignoring citizen opposition to the Fly Creek Apartments zoning change.
      - Widget article provides specific evidence that this disregard stems from systemic corruption, proving Mayor Kant uses the P&Z Board and city funds (utility fund, $500k Fire station cost) to benefit political associates and developers like Arthur Corte rather than acting in the public interest.

      KEY ENTITIES:
      - Daphne Planning and Zoning Board
      - Fairhope Planning and Zoning Board
      - Fly Creek Apartments
      - Daphmont Subdivision
      - Mayor Kant (Fairhope)
      - Angus Cooper
      - Arthur Corte (Developer/Contributor)
      - Johnson Road
      - Highway 98
      - Colonaid Apartments
      - Parker road
    generated_at: '2026-07-18T09:42:22.652783Z'
    text: Daphne’s board finally stood up to developers, but Fairhope’s leadership continues to treat the city utility fund like a private piggy bank. Evidence shows former Mayor Kant burned through tax dollars to build infrastructure for Arthur Corte while residents begged him to stop the project.
  dirty-little-secrets:
    brief: |-
      THE CONFLICT:
      - The City of Gulf Shores is accused by Pete Sims of failing to adhere to Section 3-3E ("Findings and Conclusions") of the Zoning Ordinance regarding the Regency Place Apartments Site Plan.
      - This omission was initially missed by "City Staff" but was pointed out by citizen Rex Lawson on September 21, 2018 (implied date context).
      - The failure to follow ordinance requirements led the City Attorney to advise Mayor Robert Craft to send the site plan back for review.
      - An Executive Session occurred on August 17, 2018, involving city staff outside public view to address this "technical deficiency."

      THE DISCOVERY:
      - Public Records Requests obtained by Pete Sims reveal that Gulf Shores City Staff previously incorporated and referenced the "Land Use Plan" in Site Plan recommendations dating back through 2014, 2015, and 2016.
      - This contradicts the current public claim that the Land Use Plan is insignificant or merely a "strategy to guide planning."

      THE PIVOT:
      - The Daphne story establishes a precedent where residents successfully pressured the Daphne Planning and Zoning Board to reject a zoning request for a 24-hour service station at Johnson Road and Highway 98.
      - Article 2 shows that despite having strict ordinances (like Section 3-3E) and a Land Use Plan, City of Gulf Shores officials allegedly bypass or ignore these regulatory requirements through procedural gaps ("technical deficiencies") or intentional disregard, mirroring the public outcry against zoning issues in other municipalities like Fairhope.

      KEY ENTITIES:
      - Andy Bauer (Director of Planning and Zoning, 2018-09-21)
      - Pete Sims (Developer/Citizen/Author)
      - Rex Lawson (Citizen who identified the ordinance omission on 2018-09-21 context)
      - Robert Craft (Mayor, 2018-10-28; involved in Regency Place site plan issue)
      - Daphne Planning and Zoning Board
      - Johnson Road / Highway 98 (Location of proposed development dispute in Article 1)
      - Gulf Shores City Staff/City Attorney
    generated_at: '2026-07-18T09:42:22.652787Z'
    text: Gulf Shores officials claim they follow the rules, yet they "accidentally" forgot an entire section of the zoning law to help a developer. Records now prove Mayor Robert Craft and his staff intentionally hid their own Land Use Plan to bypass public oversight and push through the Regency Place site plan.
