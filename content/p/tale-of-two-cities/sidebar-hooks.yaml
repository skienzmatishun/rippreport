      THE DISCOVERY:

      *   The City of Gulf Shores Planning and Zoning is not adhering to Section 3-3E
      ("Findings and Conclusions") of the Zoning Ordinance.

      *   This failure was cited by Mayor Robert Craft and Andy Bauer (Director of
      Planning and Zoning) when seeking to revisit the Regency Place Apartments Site
