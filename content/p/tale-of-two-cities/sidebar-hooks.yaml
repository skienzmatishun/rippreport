hooks:
  community-or-developer:
    brief: 'THE CONFLICT:

      *   Daphne Planning and Zoning Board rejected a request to change zoning on
      a parcel at the entrance to Daphmont Subdivision.

      *   A proposal for a 24-hour service station with drive-through food service
      was proposed near Johnson Road and Highway 98, adjacent to Colonaid Apartments.

      *   Fairhope has been involved in ongoing conflict regarding the Fly Creek PUD
      (Planned Unit Development).


      THE DISCOVERY:

      *   The Fairhope City Council agenda (April 10, 2017) shows an ordinance amendment
      to Ordinance No. 1572 (Fly Creek PUD Sunset Provision) being considered for
      the 10th time.

      *   Council members have conflicts of interest related to the developer, engineers,
      contractors, and landowners concerning the Fly Creek project.

      *   The Fly Creek PUD project has permanently damaged Fly Creek and the Fly
      Creek Watershed.


      THE PIVOT:

      *   Article 2 proves that local planning and zoning decisions (Fairhope) are
      heavily influenced by conflicts of interest and political maneuvering among
      a specific group ("Baldwin Insider" and "Catalyst") regarding major development
      projects, which serves as a model or contrast to the perceived failure of city
      officials in Daphne mentioned in Article 1.


      KEY ENTITIES:

      *   Daphne Planning and Zoning Board

      *   Daphmont Subdivision

      *   Fairhope City Council

      *   Fly Creek PUD

      *   Johnson Road and Highway 98

      *   Colonaid Apartments

      *   Baldwin Insider

      *   Catalyst fraternity (county commissioners, attorneys, judges, developers)'
