  run-away-train:
    brief: |-
      THE CONFLICT
      - Baldwin County has 14 municipalities operating with independent planning and zoning systems (15 different departments total).
      - No communication exists between city governments on joint issues; Daphne and Fairhope independently approved apartments on Highway 98 within one mile of each other, creating traffic problems.
      - Residents and officials describe growth as a "Runaway Train" with no conductor due to lack of countywide coordination.
      - Existing land use plans are legally required but fragmented and outdated before the new planning process.

      THE DISCOVERY
      - Miriam Boutwell (Foley’s community development director) established "Plan Lower AL Now" (PLAN) because local staff could no longer solve problems individually.
      - Widget Article provides growth statistics proving the urgency: Foley added 545% residential units in two years; Daphne approved 683 lots; Gulf Shores has 1382 approved lots in 17 subdivisions.
      - Population data: 212,000 in 2017, with another 100,000 plus projected from ongoing development.
      - Confirms infrastructure and traffic are being neglected due to uncoordinated municipal decisions (e.g., 1200 lots in Fairhope alone).

      THE PIVOT
      - Article 2 proves the chaos that necessitates the official countywide planning effort in Article 1.
      - Baldwin County Commission’s Planning and Zoning Department is now formally utilizing consultants Design Workshop to update the land use plan.
      - The new meetings (Jan 24, Jan 25) represent the attempt to finally coordinate the "15 different Planning and Zoning departments" cited in the Widget.
      - Without this update, the "Runaway Train" of development continues unchecked across 14 independent municipalities.

      KEY ENTITIES
      - Miriam Boutwell
      - Plan Lower AL Now (PLAN)
      - Baldwin County Commission
      - Design Workshop
      - Foley City Government
      - Fairhope City Government
      - Daphne City Government
      - Baldwin County Central Annex Auditorium, Robertsdale
    generated_at: '2026-03-15T02:40:06.403081Z'
    text: Fifteen different planning departments are driving this county off a cliff because none of the bureaucrats talk to each other. Hard data shows thousands of new lots hitting the market while infrastructure fails, proving this Runaway Train has no conductor.
