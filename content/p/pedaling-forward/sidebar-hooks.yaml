  whose-agenda:
    brief: 'THE CONFLICT:

      *   Fairhope City Council has been avoiding supporting education funding solutions
      for years.

      *   A proposed solution involves a 3 mill property tax in a designated school
      district, estimated to generate $1.88 million.

      *   County Commissioner Chris Elliott and School Superintendent Eddie Tyler
      skimmed $200,000 a year from the school tax for County infrastructure.

      *   Council President Jack Burrell expressed an interest in leaving the school
      business.


      THE DISCOVERY:

      *   The City Council agenda included Resolution 12 to authorize filing for a
      Special 3 Mill Ad Valorem School District Tax Election.

      *   Resolution 10 authorized Mayor Karin Wilson or Council President Jack Burrell
      to purchase properties owned by the Baldwin County Board of Education (K-1 Center,
      Fairhopers Community Park, James P. Nix Center).

      *   Resolution 11 authorized Mayor Karin Wilson to execute a half-million dollar
      contract for dredging the Main Channel of Fly Creek with the Fairhope Yacht
      Club.

      *   The Council kept discussions regarding real property transactions and construction
      issues out of public view (Resolution 30).


      THE PIVOT:

      *   Article 2 provides specific, actionable resolutions demonstrating exactly
      how the City Council is currently prioritizing self-serving agendas and bypassing
      the proposed school tax solution outlined in Article 1.

      *   The agenda reveals that the Council has already pursued property acquisition
      and controversial contracts instead of discussing equitable funding options
      with the public.


      KEY ENTITIES:

      *   Fairhope City Council

      *   Burrell (Council President)

      *   Wilson (Mayor Karin)

