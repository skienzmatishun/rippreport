  catalyst-candidates-⁠-excess-baggage:
    brief: 'THE CONFLICT

      *   Jack Burrell held the City Council President position for two terms (8 years).

      *   Burrell''s decisions resulted in Fairhope losing $1.2 million surplus and
      becoming a $1.5 million deficit.

      *   Burrell was involved in bid rigging at the Airport and a hidden police report.

      *   Jack Burrell purchased $2.65 million dollar recreation land, which he leased
      for $9,000 a year.

      *   Sherry Sullivan-Cant acted as Tim Cant’s puppet and travel companion, covering
      tracks regarding the BP scandal, Fly Creek Publix project, Airport dealings,
      and soccer fields.

      *   Sullivan-Cant failed in her role running the recreation center.

      *   Sullivan-Cant assisted Burrell and CATALYST in obstructing Mayor Karin Wilson''s
      duties.


      THE DISCOVERY

      *   CATALYST is recruiting Sherry Sullivan-Cant to run for Mayor.

      *   Tim Cant and Sherry Sullivan-Cant are attempting to resurrect Tim Cant’s
      political base by campaigning together.

      *   Sherry Sullivan-Cant’s baggage includes city employees who want her gone,
      due to her prior employment with the city administration.


      THE PIVOT

      *   Article 2 reveals that CATALYST is specifically lining up candidates (Burrell,
      Cant, Sullivan) and explicitly lists the "excess baggage" of each candidate
      as a deliberate strategy against them.

      *   This links Burrell''s financial misconduct/corruption (costing millions)
      directly to the current election strategy involving Jack Burrell and Sherry
      Sullivan-Cant.


      KEY ENTITIES

      *   Jack Burrell

      *   Sherry Sullivan-Cant

      *   Tim Cant

      *   Karin Wilson

      *   Bill Hightower

      *   Jerry Carl

      *   Fairhope Municipal Election (Aug. 25)

      *   CATALYST

      *   Airport

      *   Fly Creek Publix project'
    generated_at: '2026-07-11T04:40:06.892908Z'
  catalyst-does-fairhope:
    brief: 'THE CONFLICT

      *   Fairhope residents opposed the Fly Creek Apartments development.

      *   Mayor Tim Kant bent over for developer Angelo Corte’s requests while taxpayers
      paid.

      *   The City Council aided and abetted Mayor Kant and Corte while ignoring public
      outcry.

      *   Taxpayers paid for a Fire Station on Parker Road, a sewer lift station,
      and accepted the "Gift" of wetlands/land to the City of Fairhope.


      THE DISCOVERY

      *   The Fly Creek Apartments project is clear-cutting land along Fly Creek.

      *   Mayor Kant authorized a sewer lift station that services the apartments
      before the majority of the community due to location and capacity.

      *   Angelo Corte gifted land/wetlands to the City of Fairhope, which was the
      recipient of water draining from the Publix property into Fly Creek.

      *   Taxpayers funded infrastructure (Fire Station, lift station) for the developer.


      THE PIVOT

      *   Article 2 proves that Catalyst supported the developer and local political
      structure benefiting from these projects, directly contradicting any claim of
      opposing them.

      *   The specific details regarding the land gift, infrastructure funding, and
      Mayor Kant''s actions establish a pattern of corruption/self-interest that Catalyst
      allegedly supported.


      KEY ENTITIES

      *   Catalyst

      *   Fly Creek Apartments

      *   Fairhope

      *   Tim Kant (Former Mayor)

      *   Angelo Corte (Developer)

      *   City Council

      *   Publix property

      *   Highway 98

      *   Parker Road intersection

      *   Burrell and Boone (Councilmen)'
    generated_at: '2026-07-11T04:40:06.892914Z'
