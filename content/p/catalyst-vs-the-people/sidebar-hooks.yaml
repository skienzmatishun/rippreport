  catalyst-meets-social-media:
    brief: 'THE CONFLICT

      *   Catalyst lost members Thomasson and Dorsey.

      *   Elliott''s performance garnered only a 700 vote margin against David Northcutt.

      *   Sheriff Hoss Mack and Eddie Tyler are married to Elliott and seeking divorce.

      *   Mayor Haygood instructed city workers to destroy fiber optic cable feeds
