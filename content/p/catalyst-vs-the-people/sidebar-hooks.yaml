      *   The District Attorney for Baldwin County was placed into office by Catalyst.


      THE DISCOVERY

      *   Catalyst''s influence is being exposed via social media, revealing goals
      and players.

      *   Harry D Olive was discouraged from running for Probate Judge by the District
      Attorney because of his Catalyst standing.

      *   Gulf Shores Mayor Craft and staff are facing citizen pushback regarding
      a planned apartment complex.


      THE PIVOT

      *   Article 2 shows that Catalyst''s political influence extends beyond local
      party members to include support structures in coastal communities (Gulf Shores,
