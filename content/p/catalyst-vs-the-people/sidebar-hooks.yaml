      Judge Wilters'' retirement when Catalyst guaranteed the position to the DA Office.

      *   Sheriff Mack supports Catalyst candidates and is involved in political races.

      *   Sheriff Mack cooked for Judge Scully during a BBQ event involving Catalyst.


      THE PIVOT:

