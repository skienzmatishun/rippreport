hooks:
  catalyst-players:
    brief: 'THE CONFLICT

      *   CATALYST attempted a political coup during the 2018 mid-term elections in
      Baldwin County.

      *   CATALYST ran candidates for almost every Baldwin County race.

      *   In 2016 Fairhope Municipal Elections, CATALYST candidates ran a full slate.

      *   The City attorney was involved in the McSherry case.


      THE DISCOVERY

      *   The council members in Fairhope exposed their affiliation to CATALYST after
      years of lies.

      *   The city attorney botched the McSherry case on purpose.

      *   The municipal attorney and Municipal Judge are appointed by the council
      and are CATALYST members.


      THE PIVOT

      *   Article 2 provides the specific evidence detailing how the Fairhope council
      became the body of the CATALYST snake and confirms that the City attorney''s
      actions regarding the McSherry case were intentional.


      KEY ENTITIES

      *   CATALYST

      *   Chris-Elliott

      *   Council members (Fairhope)

      *   Mayor Cant

      *   Municipal Judge

      *   City Attorney

      *   Ronan-Mcsharry

      *   mcsharrys'
    generated_at: '2026-07-11T04:40:06.892861Z'
  catalyst-sheriff:
    brief: 'THE CONFLICT:

      *   Catalyst seeks total control over Baldwin County Government, including the
      County Commission, Probate Judge, Circuit Judge, Sheriff, and District Attorney.

      *   Hoss Mack is supporting several Catalyst candidates.

      *   Chris Elliott was appointed to the Baldwin County Commission by Governor
      Robert Bentley.


      THE DISCOVERY:

      *   The current Fairhope Police Chief, Joseph Pettis, announced his retirement
      after 36 years.

      *   There was a visit from the FBI to Fairhope two weeks prior.

      *   Catalyst is attempting to gain votes for the June 5th primary.

      *   Hoss Mack intends for Chris Elliott to protect him and keep Sheriff qualifications
      in favor of Hoss.


      THE PIVOT:

      *   The Widget Article reveals that Catalyst is actively attempting to destabilize
      the current police leadership (retiring Chief Pettis) and utilizing political
      tactics (FBI visit, candidate support via Hoss Mack) to gain control over key
      county positions, which aligns with the overarching goal of Catalyst detailed
      in the Main Article.


      KEY ENTITIES:

      *   Catalyst

      *   Fairhope

      *   Bill Press (Former Police Chief)

      *   Joseph Pettis (Current Fairhope Police Chief)

      *   Hoss Mack

      *   Chris Elliott

      *   Governor Robert Bentley

      *   Tucker Dorsey (Candidate for Baldwin County commission)'
    generated_at: '2026-07-11T04:40:06.892870Z'
  cooking-for-the-judge:
    brief: 'THE CONFLICT:

