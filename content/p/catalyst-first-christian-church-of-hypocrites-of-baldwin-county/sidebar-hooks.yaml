hooks:
  catalyst-meets-social-media:
    brief: 'THE CONFLICT

      *   Fairhope CCCF members attempted to disrupt the Fairhope Government and attack
      the Mayor.

      *   Allegations against City Council Members included conflicts of interest,
      hiding business ventures under LLCs, bid rigging, and police reports involving
      crimes against juveniles.

      *   Mr. Elliott ran a campaign raising over $500,000 from special interest groups.

      *   CCCF lost its queen bee Thomasson and its most worthless bee Dorsey.


      THE DISCOVERY

      *   Social media has exposed Catalyst’s goals and players, causing the Baldwin
      County Republican Party to recognize that it has been hijacked by Catalyst "Christian
      Republicans."

      *   Mayor Karin Wilson won the Politicos Nappie Award."

      *   Mr. Elliott''s performance garnered only a 700 vote margin against David
      Northcutt, exposing his true colors.

      *   Sheriff Hoss Mack and Superintendent Eddie Tyler are seeking divorce from
      Mr. Elliott.

      *   The District Attorney confirmed that Harry D Olive won for Probate Judge
      despite Catalyst backing.


      THE PIVOT

      *   Article 2 provides the social media evidence that validates the claims of
      political takeover and internal corruption detailed in Article 1, confirming
      that Catalyst is "reeling" after being exposed.

      *   It shows that key leaders (Mayor Haygood, Elliott) are losing power or facing
      legal consequences, directly correlating with the obstruction tactics mentioned
      in Article 1.


      KEY ENTITIES

      *   Tim Can’t

      *   Mr. Elliott

      *   Karin Wilson (Mayor)

      *   Judge Thomasson (Catalyst Queen)

      *   Hoss Mack (Sheriff)

      *   Eddie Tyler (Superintendent of Schools)

      *   Harry D Olive (District Attorney)

      *   Daphne City Council Members'
