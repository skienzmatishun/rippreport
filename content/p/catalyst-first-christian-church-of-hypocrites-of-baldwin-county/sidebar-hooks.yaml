      *   Members engaged in disrupting the Fairhope Government and attacking the
      Mayor.

      *   Allegations included conflicts of interest, hiding business ventures under
      LLCs, bid rigging, and police reports involving crimes against juveniles.

      *   Mr. Elliott ran for County Commission/State Senate, raising over $500,000
      from special interest groups.


      THE DISCOVERY:

      *   Catalyst operates as a political force attempting to control candidates
      (County Commission, Probate Judge, State Senate).

      *   The organization uses political intimidation against opponents, ensuring
      Catalyst signs are visible while non-Catalyst candidates do not receive signs.

      *   "Baby" Boone is identified as the "brains" of Catalyst and aims for members
      to believe his father has no connection to Catalyst.


      THE PIVOT:

      *   Article 2 reveals the operational structure behind Article 1''s political
      claims, showing that Catalyst uses specific individuals (Kevin Boone) and media
      channels (Chuckee Cheeze/Gulf Coast Courier) to destabilize Fairhope government,
      which validates the CCCF''s claims of obstruction and manipulation.


      KEY ENTITIES:

      *   Catalyst First Christian Church of Fairhope (CCCF)

      *   Tim Can’t

      *   Mr. Elliott

      *   Mr Kevin Boone (Councilman in Fairhope)

      *   Scott "baby" Boone

      *   Chuckee Cheeze (Editor of the Gulf Coast Courier)

      *   The Ripp Report

      *   Judge Thomasson'
