      THE DISCOVERY:

      *   Fairhope’s City Council has slowed down infrastructure projects and misused
      city funds.

      *   Three councilmen (Boone, Brown, and Burrell) paid $2.75 million for land
      for recreation/farming instead of addressing sewer infrastructure.


      THE PIVOT:

      *   Article 2 provides specific evidence that the Council actively diverted
      necessary funds ($2.75 million) away from essential sewer repairs to pursue
      non-infrastructure projects (land leasing), confirming the accusations of obstruction
      and misuse of city funds mentioned in Article 1.


