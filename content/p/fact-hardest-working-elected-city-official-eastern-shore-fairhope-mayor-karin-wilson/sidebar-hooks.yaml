  fairhope-sewer-backstory:
    brief: 'THE CONFLICT

      *   Previous Mayor Can’t had a double paycheck (Mayor and utility director).

      *   Between 2012 and 2016, Mayor Can’t, Councilman Boone, and Councilman Burrell
      used the utility fund as a slush fund to balance the general fund and pay for
      lawsuits.

      *   This action resulted in Fairhope losing its best senior utility supervisor
      to Daphne and $3 million paid to attorneys.

      *   During this period (2012-2016), no infrastructure work was done on sewer
      infrastructure while the electric department was neglected.


      THE DISCOVERY

      *   Mayor Karin Wilson ran with a platform promising to immediately tackle the
      sewer and infrastructure problem, a promise she has kept.

      *   Wilson has started an aggressive rehabilitation plan for wastewater collection,
      transmission, and treatment systems.

      *   A $11M in RESTORE funding plan is in place and has begun.

      *   Mayor Wilson has done more in Fairhope than Executive Director Casi Callaway
      in the entire bay.


      THE PIVOT

      *   Article 2 provides documented proof of past corruption (the utility fund
      misuse by Can’t, Boone, and Burrell) that explains why the sewer infrastructure
      was ignored for a decade (as mentioned in Article 1).

      *   Article 2 validates Mayor Wilson''s success by showing she delivered on
      her platform promise to fix the neglected system.


      KEY ENTITIES

      *   Mayor Karin Wilson

      *   Mayor Can’t

      *   Councilman Boone

      *   Councilman Burrell

      *   Daphne (senior utility supervisor)

      *   Executive Director Casi Callaway

