  nappi-award:
    brief: 'THE CONFLICT

      *   Mayor Karin Wilson ran on fixing sewer and utility infrastructure in Fairhope,
      Alabama.

      *   The Fairhope City Council obstructed infrastructure projects.

      *   Councilman Boone and Burrell spent $13 million on a sewer plant located
      next to the Bay.

      *   $22 million was available for relocating the sewer plant inland.

      *   Fairhope Public Beach tested as "potentially unsafe" for bacteria contamination
      according to an Environment America Research & Policy Center report.


      THE DISCOVERY

      *   Mayor Wilson received four consecutive Nappi Awards for "HARDEST WORKING
      ELECTED CITY OFFICIAL—EASTERN SHORE MAYOR."

      *   The City Council received ZERO Nappi Awards during the same period.

      *   Wilson invested $14 million in utility upgrades without borrowing.

      *   Wilson obtained $11 million to offset rehabilitating sewer lines and plan
      an SSO Prevention Plan for the Eastern Shore.

      *   Wilson obtained $18 million in RESTORE funds, primarily invested in sewer
      system upgrades and a sewer overflow prevention plan.


      THE PIVOT

      *   Article 2 proves that Mayor Wilson''s administration successfully executed
      infrastructure plans and secured significant funding ($14M utility investment,
      $11M/ $18M in RESTORE funds) despite active opposition from the City Council
      (who received zero awards).

      *   The Nappi Award serves as validation that her accomplishments exceeded those
      of the previous Mayor over a 16-year period.


      KEY ENTITIES

      *   Mayor Karin Wilson

      *   Fairhope City Council

      *   Councilman Boone

      *   Councilman Burrell

      *   Mobile Bay Watershed

      *   RESTORE funding

      *   Nappi Award'
