hooks:
  fauxhope:
    brief: 'THE CONFLICT:

      *   Mayor Karin Wilson promised to fix sewer and utility infrastructure due
      to long-term neglect.

      *   Councilman Boone and Burrell spent $13 million on a sewer plant located
      near the Bay, failing to address the core problem for four years.

      *   Wilson obtained $11M in RESTORE funding and was responsible for the $6.2
      million Waterfront project grant.


      THE DISCOVERY:

      *   The City Council, specifically Council President Burrell, eliminated parts
      of the waterfront project (swim areas and rock jetties) due to aesthetic preference.

      *   The city acquired the K-1 Center from the Baldwin County Board of Education
      in 2019 for $2.5 million, involving questionable land deals by Jack Burrell.

      *   A lawsuit settlement required the city to develop an SSO response plan and
      public notification plan for wastewater treatment, which were omitted in the
      past.


      THE PIVOT:

      *   Article 1 states Mayor Wilson tackled the sewer issue and obtained millions
      for infrastructure. Article 2 reveals that internal council politics, land deals
      (Burrell''s liability gifts), and flawed Comprehensive Plans prioritize developers
      and short-sighted maintenance over necessary infrastructure and public good.

      *   Article 2 proves that even with major funding secured by Wilson, political
      obstructions and corrupt planning by the Council undermined the goal of sustainable
      growth.


      KEY ENTITIES:

      *   Mayor Karin Wilson

      *   Councilman Boone

      *   Councilman Burrell

      *   Fairhope City Council

      *   $13 million (spent on sewer plant)

      *   $11M (RESTORE funding)

      *   $6.2 million (Waterfront project grant)

      *   Jack Burrell

      *   Leaf River Group (developers from Mississippi)

      *   Alabama Legislature'
