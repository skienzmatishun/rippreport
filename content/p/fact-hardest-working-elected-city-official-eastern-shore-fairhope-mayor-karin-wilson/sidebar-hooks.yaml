  wetlands:
    brief: 'THE CONFLICT

      *   Mayor Karin Wilson promised to fix the sewer and utility infrastructure
      after years of neglect by previous administrations.

      *   Councilman Boone and Burrell spent $13 million on a sewer plant located
      next to the Bay, failing to relocate it inland as planned for $22 million in
      potential savings.

      *   The Mobile Bay watershed is affected by failing septic systems (5-35% failure
      rate) and illicit discharge/flushable wipes from North AL.


      THE DISCOVERY

      *   Fairhope City Council received a presentation regarding testing water in
      12 locations, including the Fly Creek Watershed.

      *   Land owner Arthur Corte refused testing on his property within the Fly Creek
      Watershed.

      *   Residents reported foul odors and discolored/contaminated water near Firefly
      subdivision wetlands and problematic city lift stations.

      *   Agencies (City of Fairhope, EPA, Dept of Health, Corp. of Engineers) failed
      to follow up or contact citizens regarding complaints about the area.


      THE PIVOT

      *   Article 2 provides specific, localized evidence (Fly Creek Watershed pollution
      and lack of official response) that substantiates the claim in Article 1 that
      there was a systemic, ongoing failure in sewer management despite efforts to
      address the issue.

      *   The connection is made by noting that Councilman Kevin Boone''s LLC was
      related to the same project involving Firefly and Arthur Corte, suggesting direct
      political involvement in the localized issues mentioned in the larger infrastructure
      struggle.


