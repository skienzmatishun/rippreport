  poison-ivy-bridge:
    brief: 'THE CONFLICT:

      - Jack Burrell (Baldwin County Commissioner) supports Mobile River Bridge and
      Bayway project; claims population growth/infrastructure is needed.

      - Burrell previously told constituents/federal officials there would be no federal
