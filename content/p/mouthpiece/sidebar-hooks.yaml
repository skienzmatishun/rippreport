      *   The tax increase (Rebuild Alabama Act) confirms infrastructure/transportation
      funding is being forced through via taxes/tolls despite political claims.

      *   The financial reality (bridge, taxes) links directly to Burrell’s admitted
      10-year tenure handling infrastructure failures.

      *   Shows the direct consequence of Burrell’s “no tolls” lies: the actual imposition
      of tolls, gas taxes, and school fees.


      4. KEY ENTITIES

      *   Jack Burrell (Baldwin County Commissioner/Council)

      *   Junior Senator Elliott (State Senator, referred to as "The Tax Man")

      *   Governor Ivey (referred to as "Governor Poison Ivy" in source)

      *   Rebuild Alabama Act

      *   Mobile River Bridge / Bayway Project

      *   Baldwin County School Board

      *   Fairhope

      *   Spanish Fort'
    generated_at: '2026-03-14T00:15:48.693572Z'
    text: Jack Burrell promised no tolls and no federal interference, but his ten
