      - Fairhope infrastructure is 10 years behind, cited as consequence of Burrell
      kicking projects down the road.

      - Mobile/Baldwin residents facing planned tolls for bridge project; organized
      opposition forming.


      THE DISCOVERY:

      - Local political leadership and residents are organizing protests, petitions,
      and Facebook events against the toll plan.

      - Fairhope Mayor Karin Wilson states BP settlement money was stolen/misused
      by State and Senator Pittman ($750,000 to his tractor company) instead of funding
      infrastructure.

      - State Senator Chris Elliott (R-Daphne) is mentioned but criticized for not
      holding proper meetings location.

      - Change.org petition against ALDOT Director John Cooper is circulating; residents
      demand Baldwin and Mobile residents get toll passes.

      - Governor Kay Ivey labeled “Poison Ivy” by opposition group for pushing bridge
