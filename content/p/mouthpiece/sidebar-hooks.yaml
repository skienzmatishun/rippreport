      2. THE DISCOVERY

      *   I-10 Mobile River Bridge/Bayway project is confirmed as a Marine/Port operation
      disguised to drive billions in traffic costs.

      *   “Rebuild Alabama Act” passed with a 10-cent indexed fuel tax hike.

      *   Baldwin County School Board approved special election for a 3 million dollar
      school tax district in Fairhope and Spanish Fort.

      *   Upcoming September referendum required to approve new school taxes (contrasted
      with 1% tax already passed).

      *   Costs rising for residents via tolls, gas taxes, and congestion (collateral
