  fairhopes-triangle-mega-site:
    brief: 'THE CONFLICT

      *   Fly Creek Apartments: Friends of Fly Creek filed a lawsuit against Fairhope
      City/Planning and Zoning regarding development decisions for Leaf River Group
      LLC.

      *   George Robards (P&Z member, Mayor) dismissed the suit as "frivolous" in
      2016.

      *   The court denied the motion to dismiss in June 2016, allowing the lawsuit
      to proceed to discovery and placing construction of the apartments under a one-year
      deadline before zoning could be reversed.

      *   Triangle Property: The City acquired the Triangle property through a lawsuit
      settlement (implied involving Dyas).

      *   This settlement cost the City $11.25 million plus $3 million in attorney
      fees, for attorneys who promised no fee payment and victory.

      *   Former Mayor Kant, along with Councilman Burrell and Boone, settled this
      suit to keep the public "in the dark."


      THE DISCOVERY

      *   The second article reveals that political figures (Councilman Burrell and
      Boone) are currently trying to push a $20 million decision regarding the Triangle
      property.

      *   This current discussion contrasts with past actions where Mayor Kant, Councilman
      Burrell, and Boone allegedly settled the lawsuit without public participation.


      THE PIVOT

      *   Both cases illustrate how Fairhope local government utilized legal/political
      maneuvers to control zoning and development outcomes contrary to citizen desires
      or public interest.

      *   Article 1 shows political pushback (George Robards) against citizens opposing
      a specific developer (Leaf River Group).

      *   Article 2 shows large-scale city expenditure ($14.25M+) on land acquisition
      via litigation, used by politicians (Kant, Burrell, Boone) to bypass public
      transparency regarding the true nature or value of the resulting "mega-site."


      KEY ENTITIES

      *   Fairhope Planning and Zoning Board

      *   George Robards (P&Z/Mayor)

      *   Arthur Corte (Developer/Bosom Buddy)

      *   Leaf River Group LLC

      *   Councilman Burrell

      *   Boone

      *   Mayor Kant (Former Mayor)

      *   Dyas (Lawsuit Plaintiff for Triangle)

      *   City of Fairhope'
    generated_at: '2026-07-17T23:12:21.054093Z'
