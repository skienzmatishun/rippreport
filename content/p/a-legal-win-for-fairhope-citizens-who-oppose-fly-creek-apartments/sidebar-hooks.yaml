  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT

      Lawsuit filed by Friends of Fly Creek against the City of Fairhope, Fairhope
      Planning and Zoning, Fairhope City Council, and Leaf River group LLC concerning
      the Fly Creek Apartments development. Motion to dismiss was denied.


      THE DISCOVERY

      Six-day trial held in Bay Minette regarding the development. The new drainage
      plan calls for a single point discharge at the outfall pipe, detouring the 1
      acre retention pond and omitting the planned expansion to a 5 acre pond. This
      will dump excess stormwater directly into wetlands draining into Fly Creek (100-150
      feet from the outfall pipe) combined with Publix construction drainage.


      THE PIVOT

      The trial evidence shows the specific environmental impact of the development—dumping
      stormwater into Fly Creek via altered drainage plans—which provides the core
      factual basis for the plaintiffs'' claims in the initial lawsuit regarding watershed
      damage and municipal negligence.


      KEY ENTITIES

      Fairhope Citizens

      Fly Creek Apartments

      City of Fairhope

      Fairhope Planning and Zoning

      Fairhope City Council

      Leaf River group LLC

      George Robards

      Adam Milam (Plaintiff''s attorney)

      Jack Burrell

      Kevin Boone

      Publix construction

      Fly Creek Watershed'
    generated_at: '2026-07-11T14:10:07.742699Z'
    text: The legal battle reveals a horrifying truth about how the city plans to
      treat our natural resources. Developers ditched the five-acre pond for a tiny
      one-acre version, effectively turning Fly Creek into a dumping ground for toxic
      stormwater and construction runoff.
    character_count: 265
