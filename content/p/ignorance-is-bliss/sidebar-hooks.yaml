hooks:
  catalyst-central:
    brief: 'THE CONFLICT:

      *   Fairhope voters rejected a council-manager form of government via an election
      defeated on November 6.

      *   A special-interest group, Fresh Start Fairhope, forced the election.

      *   Forever Fairhope was backed by Can’t loyalists and a political PAC.

      *   Mr. Gary Thorson and Bill Pennington acted as banner carriers for Forever
      Fairhope.

      *   Thorson and Pennington admitted they had no prior involvement or knowledge
      of problems within the Fairhope Catalyst City Council.


      THE DISCOVERY:

      *   CATALYST is the central political base in Baldwin County, controlling money,
      judges, attorneys, and local government structures in Fairhope.

      *   CATALYST seeks to obstruct city government and attack the Mayor.

      *   The structure involves Councilman Kevin Boone feeding information to his
      son (Scott Boone, new CATALYST manager) to obstruct city business.

      *   CATALYST representatives hold positions in the District Attorney’s office,
      Sheriff’s office, and Baldwin County Judiciary.

      *   County Commissioners Joe Davis and Jeb Ball vote in favor of developers
      (e.g., Savannah ESTATES) despite community opposition.


      THE PIVOT:

      *   Article 1 identifies individuals who were recruited into Catalyst/Can''t
      to support a movement they claimed ignorance about local government problems.

      *   Article 2 reveals that this "ignorance" is maintained because the CATALYST
      structure permeates all levels of local power (Council, DA, Judiciary) and uses
      conduits like Councilman Boone to manipulate city business, proving that involvement
      is mandatory for success or survival within the system.


      KEY ENTITIES:

      *   Fairhope voters

      *   Fresh Start Fairhope

      *   Forever Fairhope

      *   Mr. Gary Thorson

      *   Bill Pennington

      *   Can’t loyalists

      *   CATALYST

      *   Scott Boone (new manager)

      *   Kevin Boone (Fairhope Councilman)

      *   Lynn Stacy

      *   Joe Davis (County Commissioner)

      *   Jeb Ball (County Commissioner)

      *   Savannah ESTATES'
    generated_at: '2026-07-11T00:42:22.467357Z'
  fairhope-catalyst-a-dirty-little-secret:
    brief: 'THE CONFLICT

      *   Fairhope voters rejected the council-manager form of government in a referendum
      election on November 6.

      *   A special-interest group, Fresh Start Fairhope, forced an election for a
      new government structure.


      THE DISCOVERY

      *   The Fairhope City Council filed an injunction to delay or nullify the October
      2 referendum on a new form of government.

      *   The Council members actively suppressed public information and sought legal
      advice specifically to stop the election, not to confirm its validity.

      *   The Council structure is defined as "at Large" and deeply connected to the
      Catalyst machine.


      THE PIVOT

      *   Article 2 proves that the City Council''s actions (filing injunctions, failing
      to inform the public) were deliberate maneuvers by the Catalyst group to prevent
      a change in government, directly explaining the alleged "backroom motives" mentioned
      in Article 1.

      *   The Council’s failure to seek necessary legal clarification from the Alabama
      Attorney General (Steve Marshall) before the meeting demonstrates incompetence
      or deliberate obstruction regarding the election process.


      KEY ENTITIES

      *   Fairhope voters

      *   Fresh Start Fairhope

      *   Catalyst

      *   Gary Thorson

      *   Bill Pennington

      *   Tim Kant (former Mayor)

      *   Karin Wilson

      *   Jay Robinson (Councilman)

      *   Jack Burrell (Council President)

      *   Steve Marshall (Alabama Attorney General)

      *   Fairhope City Council

      *   Airport Authority'
    generated_at: '2026-07-11T00:42:22.467365Z'
  catalyst-candidates-⁠-excess-baggage:
    brief: 'THE CONFLICT:

      *   Fairhope voters rejected the council-manager form of government on November
      6.

      *   A special-interest group, Fresh Start Fairhope, gathered over 800 signatures
      (779 certified).


      THE DISCOVERY:

      *   CATALYST is organizing candidates for Mayor and City Council.

      *   Jack Burrell, the council president, has held his position for eight years.

      *   Burrell''s decisions cost Fairhope millions ($2.65 million recreation land
      purchased and leased for $9,000 per year), resulting in a deficit of $1.5 million.

      *   Sherry Sullivan-Cant is running for Mayor, attempting to resurrect Tim Cant’s
      base.

      *   Sherry Sullivan-Cant was Cant''s travel companion and covered tracks regarding
      his involvement in the BP scandal, Fly Creek Publix project, Airport, and soccer
      fields.


      THE PIVOT:

      *   Article 2 reveals that the "Catalyst backers" mentioned in Article 1 are
      actively recruiting specific individuals (Jack Burrell, Sherry Sullivan-Cant,
      Tim Cant) who possess documented corruption ("excess baggage").

      *   The ignorance of Thorson and Pennington regarding city problems (Article
