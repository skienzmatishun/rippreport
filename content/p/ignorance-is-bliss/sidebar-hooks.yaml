      structure (Council-Manager vs. At Large).

      *   Mayor Wilson publicly supported the Council-Manager form of government.

      *   Kevin Boone filed a complaint against Mayor Wilson and her efforts to clarify
      confusion via social media.

      *   A lawsuit was filed by The Ripp Report alleging Burrell denied free speech/due
      process rights.


      THE PIVOT

      *   Article 2 reveals specific institutional conflicts (Council deadlock, intimidation
      tactics) that provide context for the alleged backroom recruitment described
