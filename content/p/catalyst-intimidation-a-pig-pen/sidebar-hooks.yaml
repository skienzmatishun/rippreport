  catalyst-bullies:
    brief: 'THE CONFLICT

      *   Catalyst attempts to destabilize Fairhope Government by attacking the Mayor.

      *   Catalyst uses Chuckee Cheeze (Gulf Coast Courier editor) to spread rumors.

