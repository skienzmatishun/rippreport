hooks:
  catalyst-candidates:
    brief: 'THE CONFLICT

      *   Catalyst operates as a Public Relations firm attempting to control Baldwin
      County government.

      *   Catalyst aims to destabilize Fairhope’s Government by attacking the Mayor.

      *   "Baby" Boone is the strategic mind behind Catalyst, seeking to hide his
      father''s involvement.

      *   Catalyst uses Chuckee Cheeze (editor of Gulf Coast Courier) to spread rumors
      without official documents.


      THE DISCOVERY

      *   The candidate qualifications period is ending, leading to a race for the
      primary election on June 9, 2018.

      *   The official list of candidates provided by the Baldwin County Probate Office
      includes specific Catalyst Candidates and Michelle Thomason ("The Catalyst Queen").


      THE PIVOT

      *   Article 2 shows that Catalyst has specifically seeded candidates in various
      offices as part of a coordinated effort for the June 9, 2018 primary election.

      *   This proves the Main Article’s claim that Catalyst is actively seeking to
      hijack county government and control positions like the County Commission and
      Probate Judge.


      KEY ENTITIES

      *   Catalyst

      *   Kevin Boone (Councilman)

      *   Scott "baby" Boone

      *   Chuckee Cheeze

      *   Fairhope Government

      *   The Ripp Report

      *   Jack Burrell

      *   Michelle Thomason ("The Catalyst Queen")

      *   June 9, 2018 primary election'
    generated_at: '2026-07-11T05:32:20.395130Z'
    text: Catalyst wants total control of Baldwin County while destroying Fairhope's
      local government. The Probate Office candidate list exposes their stealth campaign,
      proving Scott Boone planted hand-picked shills like Michelle Thomason directly
      onto the primary ballot to hijack key offices.
  catalyst-held-back:
    brief: 'THE CONFLICT

      * Catalyst operates as a Consultant/PR firm aiming to destabilize Fairhope’s
      Government by attacking the Mayor.

      * Catalyst uses Chuckee Cheeze, editor of the Gulf Coast Courier, to spread
      rumors via leaked documents that were not obtained through Freedom of Information
      requests.

      * Catalyst seeks to hijack County Commission, Probate Judge, State Senate seat
      32, and District Judge positions.


      THE DISCOVERY

      * In Baldwin County, voter turnout was only 24% (36,073 votes out of 150,104
      registered voters).

      * Catalyst candidates secured only three races despite having over $500,000
      thousand dollars behind them.

      * Specific election results: Judge Scully received 60% in the District Court
      Judge race.

      * Catalyst won County Commission District No. 1 by beating Frank Burt by 1000
      votes.

      * Catalyst lost the Probate Judge race and State Senate Seat 32.


      THE PIVOT

      * Article 2 proves that Catalyst’s political intimidation and financial backing
      were ineffective, showing limited success in securing key positions despite
      their strategy.

      * The failure to secure an outright victory among top players (Thomason, Elliott,
      Dorsey) indicates the limits of Catalyst’s control over Baldwin County politics.


      KEY ENTITIES

      * Catalyst

      * Kevin Boone (councilman)

      * Scott "baby" Boone ("brains")

      * Chuckee Cheeze

      * Fairhope Government

      * Judge Scully

      * Jeb Ball

      * Frank Burt

      * Skip Gruber

      * Jerry Johnson

      * Thomason

      * Elliott

      * Dorsey

      * Billie Joe Underwood

      * Jody Wise Campbell'
    generated_at: '2026-07-11T05:32:20.395135Z'
    text: Scott Boone and his Catalyst group spent over half a million dollars to
      bully their way into Baldwin County offices. But official election results prove
      voter turnout crashed their party, handing embarrassing losses to key puppets
      like Thomason and Dorsey.
  catalyst-does-baldwin-county:
    brief: 'THE CONFLICT:

      *   Catalyst attempts to destabilize Fairhope’s Government by attacking the
      Mayor.

      *   Kevin Boone is a councilman in Fairhope.

      *   Scott "baby" Boone is considered the "brains" of Catalyst.

      *   Catalyst engages in political intimidation against opposing candidates.


      THE DISCOVERY:

      *   Chris Elliott, an architect of Catalyst, is running for the State Senate
      Seat 32.

      *   Elliott sold his business and gave up his County commission seat.

      *   Elliott is described as being "bought and paid for."

      *   Catalyst’s goal involves securing the County Commission, State Senate Seat,
      and Fairhope.


      THE PIVOT:

      *   Article 2 shows the specific high-level political objective (State Senate
      Seat 32) that Catalyst is pursuing, connecting the local intimidation tactics
      described in Article 1 to a broader statewide ambition.


      KEY ENTITIES:

      *   Catalyst

      *   Kevin Boone

      *   Scott "baby" Boone

      *   Chuckee Cheeze

      *   Chris Elliott

      *   Karin Wilson (Mayor)

      *   Hoss Mack (Sheriff)

      *   Eddie Tyler (School Superintendent)

      *   David Northcutt'
    generated_at: '2026-07-11T05:32:20.395138Z'
    text: Catalyst does not just bully small-town council members in Fairhope to get
      their way. Former County Commissioner Chris Elliott sold his business and gave
      up his local seat to pursue State Senate Seat 32, proving this shady group targets
      statewide power.
  catalyst-birds-of-the-same-feather:
    brief: 'THE CONFLICT

      *   Catalyst seeks to destabilize Fairhope’s Government by attacking the Mayor.

      *   Kevin Boone is a councilman; Scott "baby" Boone is the leader of Catalyst.

      *   Catalyst aims to control County Commission, Probate Judge, State Senate
      seat, and District Judge positions in Baldwin County.

      *   Catalyst uses political intimidation, causing non-Catalyst signs to disappear.


      THE DISCOVERY

      *   Catalyst was founded by Stacy Elliott and Haygood.

      *   The group evolved when Chris Elliott became County Commissioner and Haygood
      became Mayor of Daphne.

      *   Scott Boone leads Catalyst and is the central figure.

      *   Joe Davis (District two) is supported by Catalyst and Tim Kant.


      THE PIVOT

      *   Article 2 reveals the historical origins and current leadership structure
      of Catalyst, confirming its nature as a structured political movement ("political
      cancer").

      *   Article 1 details the tactic (intimidation); Article 2 identifies who runs
      the operation (Scott Boone) and who is being targeted (Joe Davis).


      KEY ENTITIES

      *   Catalyst

      *   Baldwin County

      *   Fairhope

      *   Kevin Boone

      *   Scott Boone

      *   Chuckee Cheeze

      *   Stacy Elliott

      *   Haygood

      *   Chris Elliott

      *   Tim Kant

      *   Joe Davis

      *   John Lake'
    generated_at: '2026-07-11T05:32:20.395141Z'
    text: Catalyst relies on stolen campaign signs and dirty tricks to bully Baldwin
      County voters. Dark money origins trace straight back to Scott Boone and his
      political cancer, proving how deep this network goes to target independent candidates
      like Joe Davis.
  catalyst-meets-social-media:
    brief: 'THE CONFLICT

      *   Catalyst operated in Baldwin County politics through political intimidation,
      attempting to hijack positions including County Commission, Probate Judge, State
      Senate seat, and District Judge.

      *   Catalyst used Chuckee Cheeze (Gulf Coast Courier editor) to spread rumors
      using leaked documents not obtained via Freedom of Information requests.

      *   Baby Boone was targeted by the Ripp Report, leading to threats of legal
      action from Catalyst members who favor "their" judges.


      THE DISCOVERY

      *   Social media has exposed Catalyst''s goals and players, causing the Baldwin
      County Republican Party to realize it has been hijacked by CATALYST.

      *   Catalyst lost its queen bee (Thomasson) and worthless bee (Dorsey).

      *   Elliott''s performance was publicly exposed with a 700 vote margin against
      David Northcutt.

      *   Mayor Karin Wilson is operating against Catalyst headquarters and "the three
      bees."


      THE PIVOT

      *   Article 2 shows that Catalyst''s past activities (intimidation, manipulation)
      are now being countered by public exposure via social media, showing the group
      is reeling.

      *   The discovery of specific internal failures (loss of bees, poor performance
      metrics) provides evidence that the political intimidation tactics detailed
      in Article 1 were failing or damaging their core structure.


      KEY ENTITIES

      *   Catalyst

      *   Kevin Boone

      *   Scott "baby" Boone

      *   Chuckee Cheeze

      *   Mayor Karin Wilson

      *   Elliott

      *   Thomasson

      *   Dorsey

      *   David Northcutt

      *   Harry D Olive

      *   Sheriff Hoss Mack

      *   Eddie Tyler

      *   Jonathan Armstrong

      *   Joe Davis'
    generated_at: '2026-07-11T05:32:20.395144Z'
    text: Scott Boone used dirty leaks and intimidation tactics to control local elections
      without public scrutiny. Social media exposure blew their cover, sending Catalyst
      into a tailspin as voters crushed primary candidates like Thomasson and Dorsey
      at the polls.
  catalyst-players:
    brief: 'THE CONFLICT

      *   Catalyst attempts to destabilize Fairhope’s Government and swell ranks with
      like-minded candidates.

      *   Kevin Boone is a councilman in Fairhope, and Scott “baby” Boone is the "brains"
      of Catalyst.

      *   Catalyst intends to hijack the County Commission, Probate Judge, State Senate
      seat, and District Judge positions.


      THE DISCOVERY

      *   CATALYST is a powerful, secret political group representing the Status Quo
      in Baldwin County.

      *   In 2018, CATALYST almost achieved a perfect political coup by running candidates
      for nearly every Baldwin County race.

      *   The Fairhope Municipal Council was identified as the "body of the CATALYST
      snake," and Mayor Cant was the "head of the snake."


      THE PIVOT

      *   Article 2 confirms that Catalyst’s influence is institutionalized, showing
      how positions (City Attorney, Municipal Judge) were directly tied to or controlled
      by the group in the past.

      *   The specific actions taken by the City Attorney (botching the McSherry case)
      and the appointment of the Municipal Judge by the Council reveal the established
      network Catalyst seeks to control.


      KEY ENTITIES

      *   Catalyst

      *   Kevin Boone (Councilman)

      *   Scott “baby” Boone

      *   Chuckee Cheeze (Gulf Coast Courier editor)

      *   Fairhope Municipal Council

      *   Mayor Cant

      *   City Attorney

      *   Municipal Judge'
    generated_at: '2026-07-11T05:32:20.395147Z'
    text: Catalyst wanted a complete takeover of Fairhope's municipal government to
      protect their dirty operations. Court records reveal their reach went far beyond
      elections, using controlled officials like the City Attorney to bury legal cases
      and protect insiders.
  catalyst-aka-scott-boone-consulting:
    brief: 'THE CONFLICT:

      *   Catalyst sought to swell ranks and destabilize Fairhope''s government by
      attacking the Mayor.

      *   Scott “baby” Boone acted as the "brains" of Catalyst.

      *   Catalyst intended to hijack County Commission, Probate Judge, State Senate
      seat, and District Judge positions.


      THE DISCOVERY:

      *   CATALYST rebranded as Scott Boone Consulting.

      *   The entity is financed by developers and landowners profiting from unbridled
      development and opposes regulations/impact fees.

      *   Catalyst operates like a criminal enterprise, linked to the "Strawman" land
      fraud series.

      *   Scott Boone and his father, Kevin Boone, are implicated in land fraud, Baldwin
      County sewer issues, and involvement with former County Commissioner Tucker
      Dorsey.


      THE PIVOT:

      *   Article 2 reveals that Catalyst is not just a political group but a structure
      financed by developers, engaging in land fraud ("Strawman"), and operating like
      a criminal enterprise.

      *   This proves that the political intimidation described in Article 1 is rooted
      in corruption, financial malfeasance, and organized criminality rather than
      simple political maneuvering.


      KEY ENTITIES:

      *   Catalyst

      *   Scott Boone Consulting

      *   Scott “baby” Boone

      *   Kevin Boone (Fairhope councilman)

      *   Chuckee Cheeze

      *   Tucker Dorsey (County Commissioner)'
    generated_at: '2026-07-11T05:32:20.395150Z'
    text: Scott Boone uses political threats to hijack county leadership and push
      dirty deals. Secret financial ties link his rebranded firm, Scott Boone Consulting,
