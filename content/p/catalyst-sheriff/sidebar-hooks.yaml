      *   David Northcutt'
    generated_at: '2026-07-11T04:37:12.818649Z'
    text: The Catalyst machine thinks they own the voters, but the light of public
      scrutiny is finally starting to burn. Chris Elliott is reeling after a pathetic
      showing against David Northcutt, proving that social media exposure can dismantle
      the grip of power brokers like Tucker Dorsey.
  catalyst-the-three-bs-and-chuckee-cheeze:
    brief: 'THE CONFLICT:

