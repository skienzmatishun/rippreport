      THE DISCOVERY

      *   Catalyst structures control through appointed positions: the City Attorney
      and Municipal Judge/Developer are appointed by the Catalyst Council.

      *   Catalyst power brokers make self-serving deals with developers, obstructing
      public interest (e.g., Commissioner Joe Davis voting for Catalyst developers).

      *   Baldwin County lacks any sewer regulations, a policy Catalyst supports to
