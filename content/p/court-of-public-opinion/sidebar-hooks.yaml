      November 2018 mid-term election cycle for four county commissioners.

      *   In Fairhope, City Council showed signs of limiting public participation
      and obstructing Mayor Kant''s initiatives to promote transparency and accountability
      (leading to his departure in January 2020).


      THE DISCOVERY:

      *   Seven years after the initial debt issue, the South Alabama Mega Site remains
      vacant and has incurred a total expense estimate of approximately $50 million.

      *   The Baldwin County Economic Development Alliance (BCEDA), under Lee Lawson’s
      leadership, failed to find a tenant for the property.

      *   Baldwin County Commissioners have scheduled a special meeting on July 25th
      to discuss transferring title of the Mega Site back into "Lawson’s exclusive
      control."


      THE PIVOT:

      *   Article 1 established the initial failure and debt ($32M) created by the
      mega site project.

      *   Article 2 reveals that despite seven years, no resolution has been found
      to fix the site; instead of developing it or addressing the public concern (as
      seen in Fairhope’s municipal land transfer debates), the County Commission is
      planning to give the land away for free back to Lee Lawson and BCEDA, the entity
      responsible for the failure.


