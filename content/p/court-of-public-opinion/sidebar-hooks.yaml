      Library was subject to a $32,510.97 payment for exterior repairs and maintenance
      provided by Walcott, Adams, Verneuille Architects.

      *   The city could not find paperwork proving a contract or authorization for
      this work during Mayor Tim Kant’s tenure.

      *   This architectural expense was approved while Mr. Burrell was Council President
      and Mr. Boone was on the council, creating an unverified "handshake deal" between
      Kant and the architects.


      THE DISCOVERY:

      *   Article 2 reveals that current City Council members are ignoring ethics
      commission directives requiring them to report wrong doing.

      *   The $32,510.97 payment by Walcott, Adams, Verneuille Architects was approved
      by council despite a lack of authorization paperwork or evidence of agreement
      during the administration of former Mayor Tim Kant.


      THE PIVOT:

      *   Article 1 broadly claims that political actions lead to exposure and accountability
      for office abuse.

      *   Article 2 provides specific, documented instances of financial mismanagement—the
      unauthorized $32k payment approved by Mr. Burrell and Mr. Boone during the tenure
      of Mayor Tim Kant—serving as concrete evidence supporting Article 1’s claim
      about systemic abuse of elected or appointed office.


      KEY ENTITIES:

      *   Baldwin County

