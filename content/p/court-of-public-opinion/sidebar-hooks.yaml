  shadow-government:
    brief: 'THE CONFLICT

      *   Baldwin County faced a Nov. 2018 mid-term election with four county commissioner
      seats up for re-election due to past mismanagement and an associated $32 million
      debt linked to the mega site.

      *   In Fairhope, the newly elected Mayor initially faced obstruction from the
      City Council following issues under former Mayor Kant (who is stated to be gone).

      *   Political conflicts existed between candidates like David Northcutt and
      Chris Elliott.

      *   Robert Bentley was criticized by a resident for his political choices during
      this period.


      THE DISCOVERY

      *   A shadow government, referred to as CATALYST or GUMBO (the South Baldwin
      arm of Catalyst), allegedly runs Baldwin County and Fairhope politics.

      *   CATALYST/GUMBO sought to undermine Mayor Wilson through obstruction, rumor,
      and slanted information.

      *   The group deliberately exploited Chief Pettis’ personal family issues to
      support their agenda against the mayor.

      *   Chief Pettis ultimately retired after exhibiting insubordination by reporting
      directly to Tim (the former Councilman) instead of Mayor Wilson.

      *   CATALYST allegedly influenced Jeff Boyd to discredit David Northcutt following
      his critique of Chris Elliott, who was presented as CATALYST''s choice.


      THE PIVOT

      *   The Main Article establishes the existence and nature of political crises
      in Baldwin County (debt, council obstruction) and promises exposure for those
      abusing office.

      *   The Widget Article identifies the specific entity orchestrating these conflicts:
      the CATALYST/GUMBO shadow government. It provides evidence of their methods—manipulating
      police authority (Chief Pettis), undermining elected officials (Mayor Wilson),
      and controlling political narrative/choices (Chris Elliott, Jeff Boyd).


      KEY ENTITIES

      *   Baldwin County

      *   Fairhope City Council

      *   The Ripp Report

      *   CATALYST / GUMBO

      *   Mayor Wilson

      *   David Northcutt

      *   Jeff Boyd

      *   Chief Pettis

      *   Kant (Former Mayor)

      *   Chris Elliott

      *   Robert Bentley

      *   Tim (Council member/former Mayor)'
