  newsletter-the-ripp-report:
    brief: 'THE CONFLICT:

      *   Baldwin County has four incumbent county commissioners facing re-election
      in the November 2018 midterm election.

      *   Baldwin County is saddled with a $32 million debt paid by employees and
      taxpayers.

      *   The Fairhope city council obstructed the newly elected Mayor, while the
      Mayor pushed transparency and hired new employees.


      THE DISCOVERY:

      *   District 32 State Senate seat was vacated by BP Pittman.

      *   BP Pittman is identified as the "Baldwin County poster child for corruption."

      *   BP Pittman skimmed $750,000 from BP.


      THE PIVOT:

      *   Article 2 provides specific evidence of financial corruption ($750,000 skimmed
      by BP Pittman) that serves as a concrete example of the systemic political corruption
      described in Article 1 regarding Baldwin County officials and municipalities.


      KEY ENTITIES:

      *   Baldwin County

      *   Fairhope city council

      *   BP Pittman

      *   $32 million debt

      *   November 2018 election'
    generated_at: '2026-07-11T07:11:29.722069Z'
  baldwin-county-citizens-for-government-accountability-cga:
    brief: 'THE CONFLICT

      *   The County Commission brokered a deal with the BCBOE regarding the Penny
      Sales Tax in January 2017.

      *   The agreement involved the Commission exchanging percentages of the 1984
      Penny Sales Tax for levying the tax.

      *   The Legislature declined to make the extension permanent, agreeing only
      to a six-month extension until May 30, 2018.


      THE DISCOVERY

      *   The deal brokered by the County Commission cost the BCBOE approximately
      $4 million dollars a year in funding.

      *   EDDIE TYLER and CHRIS ELLIOTT made the deal with the County Commission regarding
      the tax swap.

      *   Chris Elliot’s total donations to date are $483,700.00, including $352,250.00
      from 67 PAC Donations.


      THE PIVOT

      *   Article 2 reveals specific financial corruption and quid pro quo arrangements
      involving County Commission members (Elliot and Tyler) concerning a significant
      funding mechanism ($4 million/year).

      *   This establishes a pattern of potential misuse of funds by the elected officials,
      directly correlating with the broader issues of debt and accountability raised
      in Article 1 regarding the county commissioners.


      KEY ENTITIES

      *   Baldwin County Commission

      *   BCBOE (Baldwin County EMC)

      *   Chris Elliot

      *   Eddie Tyler

      *   Penny Sales Tax

      *   November 2018 General Election Ballot'
    generated_at: '2026-07-11T07:11:29.722079Z'
  citizens-fighting-back:
