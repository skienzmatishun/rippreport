      elephant," resulting in a $32 million debt saddled on county taxpayers.

      *   2019 onward: Fairhope City Council reportedly obstructed Mayor Kant’s efforts
      to push transparency and accountability while he worked through the initial
      years of his term, allegedly limiting public participation.


      THE DISCOVERY

      *   The corruption described as vague "abuse of office" in Article 1 is specifically
      identified by name in Article 2.

      *   Article 2 details a scheme where State Senator Tripp “Boom Boom” Pittman
      and Fairhope Mayor Tim Kant secured $636,000 from Fairhope for alleged BP boom
      work (through his tractor business).

      *   Pittman received subsequent contracts with the City of Fairhope, including
      an eight-year debris contract maintained by him and Jack Burrell.

      *   The corruption was institutionalized through CATALYST, a political entity
      that purportedly controlled county politics and influenced legislative changes
      like those benefiting the Baldwin County Sheriff.


      THE PIVOT

      *   Article 1 establishes the existence of major problems (mega site debt, obstruction/silence
      from city council).

      *   Article 2 provides the evidentiary substance: naming Mayor Kant and Jack
      Burrell in contracts with Pittman Tractor, providing specific dollar amounts
      ($636,000 bid; $372k check), and identifying CATALYST as the common denominator
      enabling this systemic corruption.


