hooks:
  pissed-on-or-pissed-off:
    brief: '- THE CONFLICT:

      - Jack Burrell served as Council President under Mayor Cant for 4 years.

      - No action taken on infrastructure repairs except sewer plant repairs; transmission
      lines funding blocked.

      - City had a $1.2 million surplus before purchasing 2.65 million dollar farmland
      for recreation.

      - After purchase, city moved to a $1.7 million deficit.

      - The same three council members purchased the land, then leased it to farmers
      for $9,000/year.

      - Burrell concealed a police record with two incidents involving juveniles prior
      to the last election.

      - Burrell used his position on the Airport Board while taxpayer money was involved.


      - THE DISCOVERY:

      - Ripp Report confirms Burrell and Council paid his attorney fees multiple times
      to avoid public statements.

      - Fairhope City Council lost in Federal Court for refusing a USMC combat veteran
      the right to speak at a meeting.

      - Airport Authority used taxpayer funds to hire lawyers to investigate whistleblower
      allegations of bid-rigging involving Burrell.

      - No investigation report was ever supplied to the council by Airport Authority
      lawyers.

      - Councilman Brown faces a pending complaint with Alabama Attorney General over
      personal gain via contracts.

      - CATALYST organization controls political reach through family connections:
      Scott Boone runs CATALYST; son is Kevin Boone.

      - Councilman Boone has multiple LLCs and a conflict-of-interest history regarding
      political control of Baldwin County.


      - THE PIVOT:

      - Article 2 serves as a financial and legal ''smoking gun'' by confirming the
      land deal numbers (surplus to deficit shift) cited in Article 1.

      - Reveals the mechanism of corruption: Airport Authority hired outside counsel
      to bury bid-rigging evidence regarding Burrell.

      - Confirms systemic behavior: Council pays Burrell’s legal bills, loses First
      Amendment cases, and uses sealed juvenile records against voters.


      - KEY ENTITIES:

      - Jack Burrell

      - Mayor Cant

      - "CATALYST" council group / CATALYST organization

      - Kevin Boone

      - Scott Boone

      - Councilman Brown

      - Councilman Boone

      - Fairhope City Council

      - Airport Authority'
