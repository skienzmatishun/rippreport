  nail-in-the-coffin:
    brief: 'THE CONFLICT:

      - Jack Burrell served as Council President under Mayor Cant for 4 years.

      - No major infrastructure repairs completed; specifically no money approved
      for sewer transmission lines despite approving main plant repairs.

      - Burrell issued media reports taking credit for sewer improvements he allegedly
      voted against.

      - Fairhope City Council approved $2.65 million purchase of 114 acres at 8875
      County Road 32.

      - City financials dropped from $1.2 million surplus to $1.7 million deficit
      immediately after land purchase.

      - Council used savings, reserves, and impact fees to buy land while delaying
      formal Fiscal Year 2020 budget for four years.

      - Burrell included two disturbing juvenile police record incidents omitted from
      public campaigns.


      THE DISCOVERY:

      - Widget article details $2.65 million purchase stripped specific funds: Investment
      CD Savings ($1,065k), Prepay Debt Reserve ($700k), Impact Fees ($884k).

      - Confirms Oct 29, 2019 Council statement: promised public only an appraisal;
      immediately approved purchase instead.

      - Confirms property at 8875 County Road 32 (County Rd 13/32) bought without
      public engagement or community input.

      - Confirms Council extended Fiscal Year to 9/30/2019 to continue spending without
      formal FY2020 budget approval.

      - Confirms Burrell previously pushed Triangle Park purchase where attorneys
      proved it was mandatory lawsuit settlement, not negotiation.

      - Confirms K1 Center/roof repairs lacked funding while $2.65M approved for vacant
      land.


      THE PIVOT:

      - Widget article proves Main Article accusation of Burrell "negotiating" bad
      deals by showing $2.65M reserve raid for vacant land while infrastructure (transmission
      lines/roofs) starved.

      - Widget confirms $1.2M surplus to $1.7M deficit crash, validating Burrell’s
      claim he was financially responsible vs reality of sudden deficit via land deal.

      - Widget confirms 4-year delay in FY2020 budget matches Main Article claim that
      Council ignores planning until cameras appear.

      - Both articles link "CATALYST" council to the land purchase via lack of transparency
      and repeated reserve raids.


      KEY ENTITIES:

      - Jack Burrell

      - Fairhope City Council

      - Mayor Cant

      - 8875 County Road 32

      - $2.65 million (Purchase Price)'
