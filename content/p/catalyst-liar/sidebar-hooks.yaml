      - 2.65 million dollar farmland purchase made by three council members ("three
      B''s") using surplus funds, causing city to shift from 1.2 million surplus to
      1.7 million deficit.

      - City officials operated for multiple years without re-election or appointment
      after 2024 Alabama legislature postponed municipal elections following presidential
      election.


      THE DISCOVERY:

      - Federal lawsuit Ripp v. Burrell filed in US District Court, Southern District
      of Alabama (Francis Paul Ripp vs. Jack Burrell).

      - Case specifically targets Council’s denial of public participation rights
      and transparency failures.

      - Burrell told media he was "surprised" that removing public comments was on
      the agenda while litigation regarding his transparency was active.

      - City Attorney Cain O Rear guaranteed refund of legal fees in Triangle Settlement
      litigation; the city never received this refund.

      - Confirmed City has been run for years by un-elected officials (Mayor, Council,
      Judge) without current vote from Fairhope voters.


      THE PIVOT:

      - Article 2 confirms the legal reality (Ripp v. Burrell) behind the claims in
      Article 1, proving Burrell is being sued for exactly the lack of honesty and
      transparency he displays in sewer/land deals.

      - Burrell’s legal testimony/remarks ("I was surprised") expose a pattern of
      deception that validates Article 1''s claim he lies through his teeth.

      - Confirms "CATALYST" Council’s financial mismanagement (Article 1) is occurring
