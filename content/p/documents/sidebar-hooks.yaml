      Eastern Shore Art Center (ESAC).

      *   There was a dispute regarding ethics letters and bids related to using office
      for personal gain.

      *   The Council approved family insurance worth approximately $17,000 per year
      for part-time employees.


      THE DISCOVERY

      *   Councilman Brown’s contract with the ESAC was obtained through a process
      that violated municipal bid law because the ESAC is a non-profit.

      *   Councilman Brown secured a soccer field clubhouse/bathroom contract worth
      over $750,000, which served as a warm-up to the ESAC contract.

      *   Council members Burrell, Boone, and Brown were involved in a potential purchase
      of 2.6 million dollars in property without public hearing or community involvement.


      THE PIVOT

      *   The Widget Article reveals that Brown''s actions (securing contracts/property
      deals) demonstrate a pattern of using his elected office for personal gain,
      directly contradicting the ethical standards he was accused of violating regarding
      the ESAC contract and municipal bidding laws.

      *   The evidence proves that the awards were based on reputation rather than
      due process, despite ethics complaints being in limbo since May 2, 2018.


      KEY ENTITIES

      *   Robert Brown (Councilman)

      *   Eastern Shore Art Center (ESAC)

      *   Fairhope City Council

      *   Jack Burrell

      *   [Unnamed] Boone

      *   Land/Property transactions'
    generated_at: '2026-07-10T19:36:55.315537Z'
    text: Councilman Robert Brown claims he followed the rules on his shady art center
      contract, but his track record says otherwise. In reality, he skipped the bidding
