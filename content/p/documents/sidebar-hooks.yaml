      *   Robert Brown

      *   Fairhope City Council

      *   Eastern Shore Art Center

      *   Jack Burrell

      *   Theresa Davis

      *   Thomas B. Albritton

      *   Cliff Pittman

      *   Pittman Brown Development Co.

      *   State Of Alabama Ethics Commission'
    generated_at: '2026-07-10T19:36:55.315543Z'
    text: Councilman Robert Brown used his office to launch a development company
      while taxpayers footed his legal bills. Now Council President Jack Burrell demands
      school accountability while he lets airport funds vanish into a black hole that
      benefits almost no one. The hypocrisy in this council room is absolutely staggering.
