      next taxpayer-funded payday. This is a pattern of corruption, not a mistake.
  in-your-face:
    brief: 'THE CONFLICT

      *   Fairhope City Councilman Robert Brown defended his contract with the Eastern
      Shore Art Center.

      *   An Ethics Complaint was filed against Robert Brown on February 26, 2018,
      by Theresa Davis/Thomas B. Albritton to the State Of Alabama Ethics Commission.

      *   The complaint alleged Brown used the Ethics Commission as a vehicle and
      claimed permission to proceed with the contract without a formal opinion.

      *   Robert Brown was linked to Mr. Cliff Pittman and Pittman Brown Development
      Co., who voted to approve funds for the Art Center.


      THE DISCOVERY

      *   Mr. Jack Burrell is demanding accountability for city school funds, which
      total approximately $350,000 a year.

      *   Burrell contrasted this with the Airport funding ($500,000) which benefited
      less than 1% of the population.

      *   Citizens are paying for Mr. Brown''s attorney fees through a "come fly with
      me" bill.


      THE PIVOT

      *   Article 2 establishes a pattern where elected officials (like Brown and
      Burrell) fail to demand accountability for public funds, which provides the
      context for why Brown’s use of the Ethics Commission is viewed as exploiting
      a system ignored by other local officials.


