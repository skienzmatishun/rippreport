      of a broader pattern of politically motivated decision-making controlled by
      Catalyst that resulted in major financial losses for the city.


      KEY ENTITIES

      *   Kevin Boone

      *   Jack Burrell

      *   Robert Brown / Cliff Pittman

      *   Catalyst (Political organization/group)

