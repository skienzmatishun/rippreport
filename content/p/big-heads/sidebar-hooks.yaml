      **BRIDGE BRIEF**

      **THE CONFLICT:**
      - Feb 15, 2018: Fairhope City Council agenda included an Ordinance directing the transfer of one acre of land to Fairhope Single Tax Corporation.
      - The property was designated for Tatumville Subdivision.
      - Prior public concern existed regarding a 100,000–200,000 gallon sewage spill from the Valley Street Lift Station into Big Head Gully/Tatumville Gully in February 2018.
      - Public opposition included petitions of over 2,200 people seeking to save the gully.
      - Specific conflicts were identified:
          - Kevin Boone (Councilman) supported his son's political group, Catalyst.
          - Robert Brown (Councilman) and Cliff Pittman (Single Tax board member/building partner) supported the project.
          - Jay Robinson and Michel Upchurch (Treasurer of Single Tax).
          - Lee Turner was identified as President of Fairhope Planning and Zoning and President of Single Tax.

      **THE DISCOVERY:**
      - The second article reinforces that Fairhope Single Tax Corporation is intended to act as a developer for the Tatumville project, which contradicts its organizational charter.
      - The project lacks support from most members of the City Council and bypasses standard procedures.
      - Anil Vera (real estate salesperson) operates in the Fruit and Nut section near the Tatumville gully.

      **THE PIVOT:**
      - Article 2 confirms that Lee Turner, as President of Single Tax, has been pushing the project for months without a vote from the single tax membership or proper discussion with city department heads.
      - It exposes Turner's dual role—Head of Planning and Zoning Chair and Single Tax President—as a "smoking gun" conflict of interest driving the land transfer that Article 1 merely alleged.

      **KEY ENTITIES:**
      - Anil Vera (Real estate sales person)
      - Lee Turner (President of Fairhope Planning and Zoning; President of Single Tax; project advocate)
      - Cliff Pittman (Single Tax board member; building company partner of Robert Brown)
      - Robert Brown (Councilman)
      - Jay Robinson
      - Michel Upchurch (Treasurer, Fairhope Single Tax)
      - Kevin Boone (Councilman)
