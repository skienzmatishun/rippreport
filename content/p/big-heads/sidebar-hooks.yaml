      a massive sewer spill (100,000–200,000 gallons) occurred on February 12, 2018.

      *   The Main Article noted several conflicts of interest: Kevin Boone''s LLC
      involvement with Catalyst; Robert Brown/Cliff Pittman being partners in a building
      company and supporters of the project; Jay Robinson’s law partner Michel Upchurch
      serving as Single Tax Treasurer; Lee Turner holding multiple roles (President
      of Planning and Zoning, President of FSTC).

      *   The Widget Article references Council members Kevin Boone and Jack Burrell
      failing to settle or discuss settlement during the "Triangle lawsuit," which
      ultimately cost the City $11.25 million when it could have been settled for
      under $1 million.


      THE DISCOVERY

      *   The second article reveals that political group Catalyst, led by councilmembers
      like Boone and Burrell, has a documented pattern of obstruction against existing
      government, specifically accusing them of trying to "overthrow the present government
