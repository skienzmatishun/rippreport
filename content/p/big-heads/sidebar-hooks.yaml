      THE CONFLICT:
      *   City Council adopted an ordinance on February 15, 2018, directing the transfer of land to the Fairhope Single Tax Corporation for the Tatumville Subdivision.
      *   On February 12, 2018, a sewage spill (100,000 to 200,000 gallons) occurred in the area of the Valley Street Lift Station, discharging into Big Head Gully, Tatumville Gully, and Mobile Bay.
      *   Over 2,200 people petitioned against the development of Big Head Gully.
      *   Conflicts of interest were cited among Council members: Kevin Boone (supports Catalyst), Robert Brown/Cliff Pittman (partners in a building company, Brown on Art Board), Jay Robinson/Michel Upchurch (Upchurch is treasurer of Single Tax), and Lee Turner.

      THE DISCOVERY:
      *   The Widget Article identifies Mr. Lee Turner as the head of both Single Tax and Fairhope Planning and Zoning.
      *   This linkage proves that the land development threat involving Big Head Gully is an "inside deal" due to Mr. Turner’s dual role.

      THE PIVOT:
      *   Article 2 establishes that Lee Turner held conflicting positions (Single Tax and Planning and Zoning), directly linking him as the orchestrator of the development process detailed in Article 1.

