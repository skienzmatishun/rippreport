hooks:
  big-head-gully-and-the-fruit-nuts:
    brief: 'THE CONFLICT

      *   Date: February 12, 2018. Event: A public health warning issued regarding
      a sewage spill of an estimated 100,000 to 200,000 gallons into Big Head Gully
      and Tatumville Gully near Valley Street Lift Station.

      *   Date: February 15, 2018. Event: Fairhope City Council agenda included the
      final adoption of an ordinance directing the transfer of one acre of land to
      Fairhope Single Tax Corporation for the Tatumville Subdivision.

      *   Conflict details identified in the main article include Robert Brown’s partnership
      with Cliff Pittman (Single Tax Board) and their shared building company; Jay
      Robinson/Michel Upchurch connection; Kevin Boone''s links to Catalyst; and concerns
      regarding the Mayor''s support of council action.


      THE DISCOVERY

      *   The widget article explicitly frames the land development threat against
      Big Head Gully as an "INSIDE DEAL."

      *   It zeroes in on Lee Turner, identifying him as the central figure responsible
      for the conflict of interest due to his dual leadership roles: President of
      Fairhope Planning and Zoning AND President of Single Tax.


      THE PIVOT

      *   While Article 1 details numerous conflicts across multiple council members
      (Boone, Brown, Robinson), Article 2 sharpens the focus by isolating Lee Turner’s
      specific position as the "two hat" individual simultaneously controlling both
      the permitting process (Planning and Zoning) and the development/financing entity
      (Single Tax). This singular dual role is presented as the primary mechanism
      enabling the project.


      KEY ENTITIES

      *   Lee Turner

      *   Fairhope Planning and Zoning Commission

      *   Fairhope Single Tax Corporation / Single Tax

      *   Tatumville Subdivision

      *   Big Head Gully / Tatumville Gully

      *   Kevin Boone

      *   Robert Brown

      *   Cliff Pittman (Director of Single Tax)

      *   Jay Robinson

      *   Michel Upchurch (Single Tax Treasurer)

      *   City Council of Fairhope'
    generated_at: '2026-07-18T18:20:52.300926Z'
  bend-over-fairhope:
    brief: 'THE CONFLICT

      *   Date: February 15, 2018.

      *   Event: Fairhope City Council voted on Ordinance Directing the Transfer of
      an Acre of Land to the Fairhope Single Tax Corporation.

      *   Purpose of transfer: Development for Tatumville Subdivision; declared surplus
      property not needed for public/municipal purposes.

      *   Associated Event: Public health warning issued February 12, 2018, reporting
      a sewage spill (100,000 to 200,000 gallons) into Big Head Gully and Tatumville
      Gully near the Valley Street Lift Station in Fairhope.

      *   Public Reaction: Over 2,200 people signed a petition objecting to saving
      Big Head Gully.


      THE DISCOVERY

      *   Ongoing Conflict: The council continues to obstruct the Mayor.

      *   Developer Influence: Council members Kevin Boone and Robert Brown have direct
      ties to the Single Tax Corporation; Cliff Pittman (partner of Robert Brown)
      is on the Single Tax Board.

      *   Specific Development Details: Proposal for 12 homes in the Fruit and Nut
      section, which would be fully responsible for detention pond maintenance and
      require special permission for grinder pump sewage usage due to historical backup
      issues.

      *   Continued Public Opposition: A petition rejecting the Fairhope Single Tax
      plan to develop on gully banks has accumulated over 925 signatures.

      *   Procedural Suspicion: Council meetings are being rescheduled unexpectedly
      (e.g., next meeting set for Thursday) to conduct "dirty work without interference
      from the public."


      THE PIVOT

      *   Article 1 establishes a foundational conflict of interest regarding the
      transfer of land in Big Head Gully in February 2018.

      *   Article 2 reveals that these same conflicts and developer interests (Robert
      Brown/Cliff Pittman, Single Tax) are ongoing.

      *   The discovery confirms the original allegations by providing specific details
      on current development plans (12 homes in Fruit & Nut), proving that despite
      public objections and past health crises in Big Head Gully, the council continues
      to push projects benefiting developers through compromised governance structures.


      KEY ENTITIES

      *   Big Head Gully / Tatumville Gully

      *   Fairhope City Council

      *   Fairhope Single Tax Corporation (Single Tax)

      *   Kevin Boone (Councilman; LLC owner)

      *   Robert Brown (Councilman/Developer Tie)

      *   Cliff Pittman (Construction partner to Robert Brown; Single Tax Board member)

      *   Jay Robinson (Councilman; Attorney)

      *   Michel Upchurch (Robinson''s law partner; Single Tax Treasurer)

      *   Lee Turner (Fairhope Planning and Zoning President / Single Tax President)

      *   Jack Burrell (Council/Developer Influence)

      *   Triangle (Past lawsuit reference)

      *   Fruit and Nut section (Specific development location)'
