  triangle-part-2-public-driven-vision:
    brief: '1. THE CONFLICT

      - In early 2018 (February 15, 2018), the Fairhope City Council debated an ordinance
      transferring an acre of land to the Fairhope Single Tax Corporation for Tatumville
      Subdivision.

      - This land transfer occurred in the same area where a 100,000+ gallon sewer
      spill into Big Head Gully was reported on February 12, 2018, leading to public
      health warnings and objections from over 2,200 residents.

      - Alleged Conflicts of Interest (2018): Kevin Boone (Multiple LLC ownership),
      Robert Brown/Cliff Pittman (Building company partners; Pittman served on the
      Single Tax board), Jay Robinson (Attorney) and Michel Upchurch (Single Tax Treasurer
      - his law partner).

      - Lee Turner was identified as driving the project, holding multiple roles:
      President of Fairhope Planning and Zoning, President of Single Tax.


      2. THE DISCOVERY

      - The "Triangle" property is a vacant land asset that has been subject to litigation
      for over 25 years.

      - Fairhope ultimately purchased Triangle as part of a legal settlement for $11.25
      Million, plus approximately $3 Million in legal fees (total cost ~$14.25M minimum),
      with current estimated value between $18 and $20 million.

      - Mayor Karin Wilson’s administration has implemented a "Public-Driven Vision"
      Comprehensive Land Use Plan ($650,000 RESTORE Act funding) intended to guide
      future growth, prevent development in sensitive areas, and protect the environment.


      3. THE PIVOT

      - The 2018 conflicts (Article 1), where council members pushed land transfers
      to Single Tax Corp despite environmental risks, established a pattern of prioritizing
      private interests/development over public good/environment.

      - Today (Article 2), Kevin Boone and Jack Burrell are pushing for conservation
      easements or "park" status on the valuable Triangle property—a reversal of development—but
      this action is viewed as supporting policies of past administrations that resulted
      in millions lost to legal fees, rather than following the new public-driven
      vision established by Mayor Wilson’s Comprehensive Plan.

      - Both articles document high-stakes disputes over key municipal assets (Big
      Head Gully land transfer/Triangle property ownership) driven by powerful political
      figures and private corporate interests within Fairhope''s governing bodies.


      4. KEY ENTITIES

      - Kevin Boone

      - Robert Brown / Cliff Pittman

      - Jay Robinson / Michel Upchurch

      - Lee Turner

      - Jack Burrell

      - Mayor Karin Wilson

      - Single Tax Corporation (Fairhope)

      - Tatumville Subdivision

      - Triangle (Land/Property Entity)

      - Fairhope City Council

      - RESTORE Act'
