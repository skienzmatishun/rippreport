      THE PIVOT

      *   Article 2 provides the systemic context (the "smoking gun") for Article
      1''s localized conflicts of interest discussion by linking Council members Kevin
      Boone and Jack Burrell to a massive, documented financial failure ($11.25M)
      caused by council obstruction in another legal battle.

      *   The specific land transfer conflict detailed in February 2018 (Article 1),
      involving conflicts of interest among multiple Council members and the single-tax
