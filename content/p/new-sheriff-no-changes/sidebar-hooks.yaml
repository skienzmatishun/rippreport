      - Governor Kay Ivey appoints Anthony Lowery as replacement Sheriff.
      - Article 1 claims Governor Ivey ignored two pending federal lawsuits involving Baldwin County Sheriff’s Office (BCSO) and Major Crimes Unit.
      - Article 1 claims Murray Lawrence was wrongfully convicted under previous Sheriff/MCU leadership.
      - Article 1 claims Steve Nodine case involved same Prosecutor, Sheriff (Mack), and Judge as Murray Lawrence case.
      - Article 1 claims Major Crimes Unit justified "10 innocent lives lost" in Baldwin County over last 15 years without camera footage or accountability.
      - Article 2 references specific federal lawsuit regarding O J French murder.

      2. THE DISCOVERY:
      - Second federal lawsuit confirmed pending alongside first O J French lawsuit in Article 2.
      - BCMCU (Bay Minette Comprehensive Model Committee Unit) listed as self-investigating body for officer actions.
      - BCMCU membership: Bay Minette Police Chief Al Tolbert (Chairman), Robertsdale PD Chief Brad Kendrick, Gulf Shores Chief Edward Delmore, Daphne Chief David Carpenter, Foley Chief Thurston Bullock, and Sheriff Mack (BCSO).
      - Specific Federal Civil Rights Lawsuit PDF filed in U.S. District Court for Southern District of Alabama (O J French case).
      - Jonathan Victor shooting documented: April 2021. Sheriff’s Deputy Hunady shot unarmed victim four times from 7 yards.
      - Judge William Cassady denied qualified immunity for Deputy Hunady and Sheriff Mack (decision currently on appeal).
      - Federal lawsuit alleges violation of civil rights.

      3. THE PIVOT:
      - Article 2 substantiates Article 1’s claim of "2 pending federal lawsuits" by providing a direct link/file (O J French PDF) proving active litigation against BCSO and Major Crimes Unit.
      - Article 2 proves the structure of self-investigation (BCMCU with Al Tolbert as Chairman) which Article 1 alleges lacks credibility and transparency.
      - Article 2 confirms the "10 lives lost" statistic; O J French identified as one victim in a series of MCU-investigated cases where footage was withheld or immunity denied.
      - Article 2 confirms the pattern of inaction: Bay Minette Mayor Wills, County Commission, and Police Chief Tolbert attempted to "sweep O J French murder under rug."

      4. KEY ENTITIES:
      - Hoss Mack (Sheriff)
      - Anthony Lowery (Interim/Incoming Sheriff)
      - Kay Ivey (Governor)
      - O J French (Victim/Case Subject)
      - Brandon Thompson (Bay Minette Police Officer, killed O J French victim)
      - Jonathan Victor (Victim in 2017 shooting, unarmed).
      - Hunady (Sheriff's Deputy who shot Victor)
      - William Cassady (Judge denying qualified immunity to Mack/Hunady)
      - Al Tolbert (Bay Minette Police Chief/BCMCU Chairman)
      - Steve Nodine (Victim of wrongful conviction/MCU link case)
      - Murray Lawrence (Wrongful Conviction Case Subject).
      - Bay Minette City Council/Mayor Wills.
