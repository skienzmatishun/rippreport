      - Mack and his unit sent an innocent man (Lawrence) to Holman Prison for 20 years without parole.
      - Two federal wrongful death lawsuits filed against BCSO Major Crimes Unit for 10+ innocent deaths over last 15 years.
      - Hoss Mack leaving office date: August 31, 2024.
      - Anthony Lowery appointed by Governor Kay Ivey as replacement Sheriff on August 27, 2024.

      THE DISCOVERY:
      - Widget article reveals Anthony Lowery was a participating investigator (Captain level) in the Brandon Hastings/Murray Lawrence murder case.
      - Mississippi autopsy report determined cause of death was asphyxiation by strangulation (Dr. Paul McGarry).
      - Prosecution (Whetstone) and Mack changed theory to gunshot; never produced a weapon or ballistics.
      - In 2023, exculpatory autopsy evidence found and confirmed by Judge Wilters/Mack/Whetstone; they withheld it from defense.
      - Transcript proves Officer Tony Fuqua had NO fingerprints, no weapon, and no cell records connecting Lawrence to Hastings: "Not to my knowledge, no."
      - Last person seen alive (Brandon Hastings) never testified.

      THE PIVOT:
      - Main Article claims Lowery is a "carbon copy" and BCSO culture of “no accountability, No justice” continues.
      - Widget article proves this is factually true by showing Lowery was complicit in the original corruption that elevated Mack.
      - Widget proves low-level investigator (Lowery) and leader (Mack) hid evidence together in Hastings case.
      - Connects Lowery’s criminal background and investigation style directly to the system Main Article is warning will continue under new leadership.

      KEY ENTITIES:
      - Hoss Mack (Outgoing Sheriff, former Captain)
      - Anthony Lowery (Incoming Sheriff)
      - Kay Ivey (Alabama Governor, appointed Mack and Lowery)
      - Murray Lawrence Jr. (Wrongfully convicted innocent man)
      - Brandon Hastings (Victim whose death was weaponized for convictions)
      - Dean McGowan (Investigator, present at autopsy)
      - Tony Fuqua (Officer testimony: No evidence found connecting Lawrence to Hastings)
      - Judge Robert Wilters (Withheld exculpatory evidence)
      - David Whetstone (Prosecutor, DA involved in case)
