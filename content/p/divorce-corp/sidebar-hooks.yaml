  baldwin-county-family-court:
    brief: 'THE CONFLICT:

      *   Judge Michelle Thomason (District Court Place 1) receives numerous complaints
      regarding her courtroom conduct and decision-making in Baldwin County Family
      Court.

      *   The court system is alleged to function as a "cottage industry" that supplies
      cases to bottom-feeding attorneys, harming children and incurring thousands
      of dollars in legal fees for parents.

      *   Judge Bracken (law partner of Stephen Johnson) is cited regarding judicial
      behavior.


      THE DISCOVERY:

      *   Judge Thomason illegally allowed an attorney to obtain medical records by
      visiting a doctor''s office and obtaining information while the doctor and nurse
      were on vacation.

      *   Judge Thomason disregarded expert psychological evaluations and ignored
      recommendations for custody, granting primary custody despite evidence to the
      contrary.

      *   Judge Thomason prevented the presentation of important evidence because
      she did not know the law.

      *   Judge Thomason permitted witnesses to commit perjury without consequence,
      chastising them verbally but taking no action.


      THE PIVOT:

      *   Article 2 provides specific, actionable examples (illegal record-keeping,
      judicial disregard for expert testimony, failure to apply law) that substantiate
      the broad claims of incompetence and corruption made in Article 1 regarding
      Judge Thomason''s court practices.


      KEY ENTITIES:

      *   Judge Michelle Thomason

      *   Stephen “bottom feeder” Johnson

      *   Steven Johnson

      *   Judge “buddy” Bracken

      *   Baldwin County Family Court

      *   Board of Baldwin Substance Abuse Services

      *   State Judiciary

      *   Alabama Bar Association'
