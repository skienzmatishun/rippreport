  shackled-chained-handcuffed-bc-un-family-court:
    brief: |-
      **THE CONFLICT:**
      *   Baldwin County Family Court has been accused of having a "cottage industry out of divorce" at the expense of families.
      *   Judge Michelle Thomason is accused in both articles of judicial incompetence, corruption, and enabling unethical behavior by attorneys (specifically Stephen Johnson) under her purview.
      *   The system has generated numerous public complaints against Judge Thomason's court over several years/decades.
      *   The Main Article specifically named Judge "buddy" Bracken and Attorney Steven Johnson as part of this perceived corrupt judicial group, noting they are friends with the same legal circles as Judge Thomson.

      **THE DISCOVERY:**
      *   Chey Garrigan’s specific case serves as a detailed example proving the systemic failings claimed in the broader articles.
      *   The Widget Article documents that when Chey Garrigan went to police for help after being assaulted, she was arrested by Fairhope Police without Miranda rights and became bait in Judge Thomason's court.
      *   In Garrigan’s case, Attorney Steven Johnson represented her (initially on his own terms), followed by Brian Chun and David Simon; both allegedly exploited the system while receiving fees.
      *   The Widget Article reveals that Judge Michelle Thomason repeatedly rubber-stamped requests made by attorney Stephen Johnson, including those during initial drug tests and mental evaluations.
      *   Despite efforts from attorneys like Harry Still or JIC complaints, the court failed to protect Garrigan, eventually leading her case into the jurisdiction of Jody Bishop, where she was detained "Shackled, chained and handcuffed."

      **THE PIVOT:**
      *   The Main Article makes abstract claims regarding Judge Thomason’s judicial competence and the existence of a corrupt legal environment in Baldwin County.
      *   The Widget Article provides the concrete evidence by detailing the Chey Garrigan case—a documented narrative showing how an ordinary mother was exploited, detained, and held financially hostage within Judge Thomson’s system via her "favorite roaches" (Johnson/Bracken).

      **KEY ENTITIES:**
