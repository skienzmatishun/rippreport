  baldwin-county-family-court:
    brief: |-
      THE CONFLICT
      * Judge Michelle Thomason, serving in Baldwin County District Court Place 1 since 2017, faced months of complaints regarding her court’s handling of family matters and divorce cases.
      * The Main Article alleged that Thomason's court developed a "cottage industry" focused on divorce at the expense of children, supplying high volume to attorneys like Stephen Johnson.
      * In previous years (implied context), Judge Thomason was involved in political maneuvering regarding the Court of Appeals position vacated by retiring judge Craig Pittman.

      THE DISCOVERY
      * The Widget Article provides detailed examples from a specific case demonstrating systemic judicial failures in Thomason’s courtroom, proving that her court actively fosters unethical behavior and disregards evidence.
      * Specific revelations include: Judge Thomason not penalizing attorneys for illegally obtaining certified medical records, overruling psychological expert recommendations regarding custody, refusing to allow crucial evidence because she "did not know the law," and allowing attorneys who commit perjury no consequences.

      THE PIVOT
      * The Main Article makes general accusations of judicial incompetence and ethical failings; the Widget Article serves as the 'smoking gun' by providing specific, granular accounts (e.g., illegal record access, dismissal of expert testimony) that illustrate *how* this alleged incompetence functions in practice within her courtroom.

      KEY ENTITIES
      * Judge Michelle Thomason / Judge Thomason
      * Stephen Johnson (Attorney)
      * Jack Burrell
      * Craig Pittman
      * The Ripp Report
      * Baldwin County Family Court
    generated_at: '2026-07-18T12:34:31.770910Z'
    text: Judge Michelle Thomason turned the Baldwin County Family Court into a profitable divorce mill for her inner circle of lawyers. These shocking courtroom records prove she ignores the law and overlooks perjury while innocent kids pay the price for her systemic incompetence.
  baldwin-county-family-court-a-cottage-industry:
    brief: |-
      THE CONFLICT
      - Judge Michelle Thomason (District Court Place 1) faced consistent public and internal complaints regarding the handling of divorce and child custody cases in Baldwin County.
      - Specific allegations include her tendency to mandate joint physical custody in status quo orders regardless of parental relationships, resulting in family hardships.
      - Critics allege a "cottage industry" exists around divorces due to Thomason's practices, noting that she previously had as many as six complaints filed against her in the last 18 months, though all were dismissed by the Judiciary.
      - The court was criticized for favoritism toward pro se litigants.
      - Stephen Johnson (Attorney) is explicitly mentioned and attacked as a frequent subject of judicial complaint.

      THE DISCOVERY
      - Presiding Judge Floyd instituted several structural changes to the DR/Family Court system designed to prevent "bad judgment" in Thomason's cases.
      - All answer and waiver divorces will now be assigned rotationally by clerks to the four general jurisdiction circuit judges instead of being solely handled by Thomason.
      - All *pendente lite*/temporary motions originally assigned to Judge Thomason are now transferred for hearing among other circuit judges (specifically naming Floyd, Bishop, Norton, and Taylor).
      - Specially assigned judges took control of Judge Thomason’s domestic violence dockets in 2017.

      THE PIVOT
      - Article 2 provides the structural evidence that confirms the systemic issues raised by Article 1 are being formally addressed at the highest levels of Family Court jurisdiction, not just through public complaints or re-election efforts.
      - The new judicial protocols (assignment rotation and reassignment of temporary motions) directly counter the "bad judgment" and problematic status quo orders criticized in Article 1, preventing Thomason from having sole authority on initial temporary custody rulings.

      KEY ENTITIES
      - Judge Michelle Thomason (District Court Place 1 / Circuit Judge)
      - Presiding Judge Floyd
      - Stephen Johnson (Attorney)
      - Jack Burrell
      - Buddy Bracken (Judge/Law Partner of Johnson)
      - Judge Roy Moore
      - Eastern Shore Republican Women
      - Baldwin County Bar Association
      - Alabama Unified Judicial System
    generated_at: '2026-07-18T12:34:31.770920Z'
    text: Public outcry against Judge Michelle Thomason’s divorce mill finally reached the top of the local bench. Presiding Judge Floyd took the rare step of stripping her authority and reassigning cases to other judges to stop her pattern of bad judgment once and for all.
