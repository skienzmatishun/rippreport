      Baldwin County, causing harm to children.

      *   Thomason''s 50/50 custody decisions caused unnecessary hardships for families.

      *   Thomason has received as many as 6 complaints filed against her in the last
      18 months, all of which were dismissed by the Judiciary.


      THE DISCOVERY:

      *   Changes have been made involving DR/Family Court, presided over by Judge
      Floyd, to assist parties and hear final trials more expeditiously.

      *   All answer and waiver divorces will be assigned by clerks and handled by
      circuit judges on a rotating basis.

      *   Temporary motions for cases assigned to Judge Thomason and Judge Bosch will
      now be heard by other circuit judges based on schedules set by Judge Floyd and
      Judge Bishop.

      *   Judge Thomason is prevented from inflicting bad judgment on temporary custody
      and support hearings due to changes in docket assignments.

      *   Domestic violence dockets have been removed from Judge Thomason''s control.


      THE PIVOT:

      *   Article 2 proves that systemic changes are being implemented (via Judge
      Floyd) to restrict Judge Thomason’s authority over temporary orders and custody/support
      hearings, directly addressing the incompetence and problematic rulings criticized
      in Article 1.

      *   This shift intends to prevent Thomason from issuing status quo orders that
      may remain in place for years until a final hearing.


