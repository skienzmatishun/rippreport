  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT:

      *   Developers sought waivers from Fairhope Planning Commission on Jan. 4 to
      install low-pressure sewer systems using grinder pumps instead of required gravity
      sewer systems.

      *   Grinder pumps cost $3,500 apiece and were designed to be maintained by homeowners,
      shifting replacement costs to the consumer.

      *   Past administrations allowed developers to use grinder pumps ("good ole
      boys").

      *   Fairhope Operations Director Richard Peterson noted that regulations were
      subject to "loose interpretations" by new utilities directors.


      THE DISCOVERY:

      *   The Fly Creek Apartments development faced a six-day trial in Bay Minette
      due to city council ignoring public concerns regarding environmental impact.

      *   The proposed drainage plan for the apartment complex calls for a single
      point discharge of excess stormwater directly into wetlands, causing it to drain
      into Fly Creek (100–150 feet from the outfall pipe).

      *   This new drainage plan omits plans for expanding the retention pond by 5
      acres.


      THE PIVOT:

      *   Article 2 proves that the political decisions and lax enforcement regarding
      sewer standards and development permits (raised in Article 1) directly resulted
      in an environmental disaster involving Fly Creek.

      *   The decision to allow questionable infrastructure choices (grinder pumps/low-pressure
      systems, as detailed in Article 1) facilitated a drainage plan that intentionally
      dumps polluted runoff into the Fly Creek watershed.


