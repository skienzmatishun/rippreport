hooks:
  fairhope-sewer-backstory:
    brief: 'THE CONFLICT:

      * Past corruption involved Mayor Can’t, Councilman Boone, and Councilman Burrell
      draining the utility fund between 2012 and 2016 for lawsuits.

      * This drain resulted in Fairhope losing its senior utility supervisor and $3
      million to attorneys without infrastructure work being done on sewer systems.

      * Past administrations allowed developers to use grinder pumps through "good
      ole boys" deals.


      THE DISCOVERY:

      * Mayor Wilson defeated the old party and claims she has tackled the sewer and
      infrastructure problem since her election.

      * The current Catalyst Council is actively obstructing Mayor Wilson and city
      employees regarding infrastructure issues starting in 2020.


      THE PIVOT:

      * The historical misuse of utility funds by former officials established a precedent
      for lax regulation, enabling developers to install expensive, short-lifespan
      grinder pumps without accountability.

      * The corruption history provides context for why current regulatory debates
      over sewer standards and developer waivers are occurring now.


      KEY ENTITIES:

      * Grinder pumps

      * Fairhope

      * Mayor Wilson

      * Mayor Can’t

      * Councilman Boone

      * Councilman Burrell

      * The Ripp Report

      * Van Antwerp Park

      * Battles Trace

      * Richard Peterson (Operations Director)'
    generated_at: '2026-07-11T06:46:47.608205Z'
  baldwin-county-sewer-regulation-a-litmus-test:
    brief: 'THE CONFLICT

      *   Developers sought waivers from the Fairhope Planning Commission to install
      low-pressure sewer systems using grinder pumps instead of required gravity sewer
      systems.

      *   Grinder pumps cost $3,500 apiece and were scheduled for replacement every
      10 years.

      *   City operations director Richard Peterson noted that developers used "loose
      interpretations" of city regulations.


      THE DISCOVERY

      *   Baldwin County Sewer System (BCSS) is a monopoly servicing 19,000 homes.

      *   Sewage fees are unregulated, allowing BCSS to charge any amount and shut
      off service regardless of health effects.

      *   Former County Commissioner Tucker Dorsey acted as an agent for BCSS.

      *   The current County Attorney acts as a lobbyist for BCSS.


      THE PIVOT

      *   Article 1 details how developers circumvent established municipal sewer
      standards through equipment (grinder pumps) that shift costs to consumers.

      *   Article 2 reveals the underlying systemic issue: Baldwin County''s sewer
      system is not just poorly regulated by builders, but financially controlled
      by a private monopoly (BCSS) that dictates consumer rates and service access.


      KEY ENTITIES

      *   Mayor Wilson

      *   Richard Peterson

      *   Fairhope Planning Commission

      *   Subdivision developers

      *   Baldwin County Sewer System (BCSS)

      *   Richard Dayton

      *   Tucker Dorsey

      *   County Commissioners

      *   County Attorney'
    generated_at: '2026-07-11T06:46:47.608210Z'
  wetlands:
    brief: 'THE CONFLICT

      Developers sought waivers to install low-pressure sewer systems using grinder
      pumps in Fairhope subdivisions (e.g., Van Antwerp Park, Battles Trace). Grinder
      pumps cost $3,500 apiece and must be replaced every 10 years. City operations
      director Richard Peterson argued that rules were being loosely interpreted by
      utilities directors.


      THE DISCOVERY

      Public complaints regarding foul odors and discolored water in the Fly Creek
      Watershed and sewer spills into Mobile Bay persisted in 2017. Residents reported
      problems with city lift stations in the Sandy Ford/Rock Creek area associated
      with the Firefly subdivision.


      THE PIVOT

      Article 2 proves that the system bypasses discussed in Article 1 led to environmental
      degradation. The infrastructure decisions regarding grinder pumps and sewer
      standards (Article 1) are directly connected to ongoing sewage spills and water
      quality issues in Fly Creek and Mobile Bay (Article 2).


      KEY ENTITIES

      Mayor Wilson, Richard Peterson, Arthur Corte, Kevin Boone (LLC), Fairhope City
      Council, Baykeepers, Firefly subdivision, Fly Creek Watershed, Mobile Bay.'
    generated_at: '2026-07-11T06:46:47.608213Z'
  holes:
    brief: 'THE CONFLICT:

      *   Developers sought waivers from Fairhope Planning Commission on Jan. 4 seeking
      exemptions from requiring gravity sewer systems in new subdivisions (e.g., Van
      Antwerp Park, Battles Trace Phase 5).

      *   Grinder pumps cost $3,500 apiece and require homeowner maintenance/replacement
      every 10 years.

      *   Fairhope regulations mandate gravity sewer systems, but developers sought
      low-pressure systems using grinder pumps to avoid the higher cost of gravity
      systems (estimated at 500% more).

      *   Mayor Wilson was criticized for allowing "good ole boys" deals and wearing
      two hats as Mayor and Utility Director.


      THE DISCOVERY:

      *   The Fairhope City Council is actively digging holes that affect the city,
      potentially obstructing the Mayor''s ability to implement change.

      *   There are controversies regarding development projects like a strip center
      (Publix) and locating apartments over Fly Creek.

      *   Allegations exist that Burrell and Boone implemented a "GOB strategy" aimed
      at removing Mayor Wilson and reinstating fired employees through city council
      obstruction.


      THE PIVOT:

      *   Article 2 reveals the political and physical corruption surrounding Fairhope
      development projects, which directly relates to Article 1''s focus on how developers
      bypass mandated infrastructure costs (sewer pumps).

      *   The conflict in Article 1—developers using cheaper, risky grinder pumps—is
      linked to the broader pattern of city mismanagement and potential conspiracy
      revealed in Article 2 regarding who controls permits and municipal enforcement.


      KEY ENTITIES:

      *   Mayor Wilson

      *   Richard Peterson (Operations Director)

      *   Larry Smith (S.E. Civil Engineering)

      *   Developers

      *   Fairhope Planning Commission

      *   Burrell

