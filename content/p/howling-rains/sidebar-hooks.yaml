hooks:
  where-hell-were-you:
    brief: 'THE CONFLICT:

      - 2016 Fairhope municipal election: Karin Wilson defeated incumbent; first female
      mayor.

      - Previous elections (2008, 2012) suspected rigged; Alabama Secretary of State
      intervened in 2016 to supervise.

      - Recent issue: $6.2 million Restore Act waterfront grant project (funded by
      2010 BP Deepwater Horizon oil spill funds).

      - Six weeks before election: Howling Rains (Kevin Raines) releases critiques
      claiming project is political desperation.

      - Council opposition: City Council, led by Robert Brown and Scott Boone (aka
      "Chuckie Cheeze"), opposes Mayor Wilson''s waterfront plan.

      - Financial specifics in dispute: Council accused of $17,500/year raise; "Triangle"
      Park cost taxpayers $11.25 million.


      THE DISCOVERY:

      - Article 2 identifies Raines as former Executive Editor of New York Times.

      - Article 2 reveals Scott Boone and Robert Brown (City Council members) publicly
      call Raines a "carpetbagger."

      - Article 2 asserts Mayor Wilson saved over $250,000 in salary by declining
      a second paycheck (Utility Director role) over 4 years.

      - Article 2 links previous corrupt decisions to: Fly Creek apartments (racial
      targeting), K1 Center purchase of condemned building, sewer infrastructure delays.

      - Article 2 states Raines''s "conclusion" regarding the waterfront project is
      based on fliers full of inaccuracies.

      - Article 2 notes Waterfront planning used a steering committee, design charrette
      (164 participants), and federal reviews.


      THE PIVOT:

      - Article 2 validates Article 1''s accusation that Raines is an outsider to
      Fairhope (NYT Executive Editor) who was not present for local corruption.

      - Article 2 highlights Raines''s public silence during controversial decisions
      (Triangle land, Fly Creek), contradicting his recent vocal criticism.

      - Article 2 confirms Raines is known personally to the alleged corrupt officials
      (Boone, Brown) as a "carpetbagger," weakening his reformist claim.

      - Article 2 links the Waterfront Project allegations back to systemic corruption
      patterns (sewer delays, Triangle Park) that Raines is now ignoring.

      - Article 1 claims NYT resignation due to plagiarism; Article 2 uses this outsider
      status to question Raines''s integrity on local governance.


      KEY ENTITIES:

      - Kevin Raines (Howling Rains)

      - Karin Wilson

      - Scott Boone

      - Robert Brown

      - Jerry Carl

      - "Chuckie Cheeze" (Scott Boone Consulting)

      - Fairhope City Council

      - Catalyst / Scott Boone Consulting

      - Former Mayor Cant'
