  catalyst-candidates-⁠-excess-baggage:
    brief: 'Conflict: What happened in the past?

      - 2016: Alabama Secretary of State supervised Fairhope municipal election due
      to complaints about rigged 2008 and 2012 elections.

      - 2016: Karin Wilson defeated incumbent Mayor Tim Cant after a 16-year tenure.

      - Fairhope Municipal Election scheduled for Aug 25. Qualification period July
      7–21st.

      - $6.2 million Restore Act Waterfront Grant approved by Fairhope City Council,
      Mayor Wilson, US Dept Treasury, and Alabama Gulf Coast Recovery Council (per
      grant docs).

      - $2.65 million City purchase of farmland for recreation leased back to city
      at ~$9,000/year.

      - Triangle Park project cost taxpayers $11.25 million over time.


      Discovery: What does the second article prove or reveal today?

      - Confirms "Catalyst" group is actively fielding candidates for Fairhope Mayor,
      Council, and Congress (Bill Hightower).

      - Identifies current Council President Jack Burrell as a central Catalyst figure
      holding the post 8 years.

      - Confirms Sherry Sullivan-Cant is a Catalyst candidate running for Mayor alongside
      Jack Burrell.

      - Reveals Sherry Sullivan-Cant’s specific roles: Cant’s "puppet," travel companion,
      propagandist newsletter operator, failed recreation center manager.

      - Validates the financial mismanagement allegations: City shifted from surplus
      to deficit ($1.5 million according to Widget Article) due to Council/Burrell
      decisions.

      - Highlights obstruction tactics: Sullivan-Cant and Cant allegedly obstructed
      Karin Wilson’s transition duties and unionized staff transitions.


      Pivot: Why is Article 2 the ''smoking gun'' for Article 1?

      - Main article identifies Howling Rains as a "Chuckie Cheeze replacement" carrying
      the Catalyst flag without naming specific allies.

      - Widget article defines that alliance: Raines is backed by Burrell and Sullivan-Cant.

      - Widget article provides the "baggage" (financial/ethics scandals) cited in
      Main article, proving Raines is attacking the City under a specific political
      machine (Catalyst) backed by proven corrupt elements.

      - Links the NYT executive editor plagiarism scandal (Howling Raines) directly
      to fairhope local political maneuvering via the "Catalyst" label.


      Key Entities:

      - Howling Raines (“Howling Rains”) - NYT Executive Editor candidate for Catalyst
      commentary/Aid De Camp.

      - Jack Burrell - Council President, Catalyst key ally, accused of bid rigging/land
      lease corruption.

      - Sherry Sullivan-Cant - Catalyst Mayoral candidate, former Cant administration
      employee.

      - Tim Kant ("Cant") - Former Fairhope Mayor (2008-2016), Sullivan-Cant husband/partner
      in politics.

      - Karin Wilson - Current Fairhope Mayor, opponent of Catalyst/Howling Rains
      narrative on Waterfront Grant.

      - Bill Hightower ("Lowtower") - Catalyst candidate for US Congress.

      - Jerry Carl - Opposing Democratic/Independent campaigner recommended by Ripp
      Report for July 14 runoff.

      - "Catalyst" / Scott Boone Consulting - Political organization controlling City
      Council messaging and candidate support.'
