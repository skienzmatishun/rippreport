  three-strikes:
    brief: 'THE CONFLICT:

      *   The Jester used an elected position for personal gain by securing the Fairhope
      Art Center Contract.

      *   The Jester favored the Fly Creek Apartments developer over his constituents.

      *   The Jester is pushing for a conservation easement on land.


      THE DISCOVERY:

      *   Fairhope City Council made decisions on May 29th that supported the land
      transfer to Weeks Bay Foundation, Inc. (Strike Two).

      *   Resolution 28 authorized a Conservation Easement Agreement between the City
      of Fairhope and Weeks Bay Foundation, Inc. for two conservation easements on
      the Dyas/Triangle property for a total cost of $39,025.00.

      *   Diana Brewer, a former councilwoman in favor of the Fly Creek Apartments,
      reached out to the council regarding the Conservation Easement.


      THE PIVOT:

      *   Article 2 proves that the conservation easement favored by "The Jester"
      was orchestrated via political maneuvering and influence (Diana Brewer''s agenda),
      indicating that the land transfer serves private developers rather than public
      interest.

      *   Council President Burrell and Councilman Boone are linked to developers,
      suggesting the council actively facilitated the loss of city property for private
      interests.


      KEY ENTITIES:

