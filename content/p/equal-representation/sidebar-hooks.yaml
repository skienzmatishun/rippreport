      recreation near the Airport was politically motivated, racist, and specifically
      avoided poorer neighborhoods.


      THE PIVOT:

      *   Article 2 proves that the barrier preventing Mayor Wilson’s efforts (in
      Article 1) is institutional corruption and systemic racism maintained by the
      City Council ("Faux-Hope"), identifying specific discriminatory actions as the
      mechanism of control.


