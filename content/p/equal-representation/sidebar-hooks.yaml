      THE DISCOVERY

      *   Fairhope cast over 2000 votes more than Daphne in the election.

      *   Karin Wilson won the mayoral election.

      *   An Alabama Sec. of State Elections Division decision to monitor the elections
      was implemented.


      THE PIVOT

      *   Article 1 framed the need for equal representation and challenging the status
      quo; Article 2 confirms that Karin Wilson successfully won the election through
      a community effort, validating the goals discussed in Article 1.

      *   Article 2 proves the success of the campaign that the initial calls for
      equal representation were campaigning for.


      KEY ENTITIES

      *   Karin Wilson

      *   Fairhope

      *   Daphne

      *   Alabama Sec. of State Elections Division

