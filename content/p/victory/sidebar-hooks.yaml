hooks:
  dirty-little-secrets:
    brief: 'THE CONFLICT:

      *   Fairhope City Council refused action regarding Fly Creek Apartments and
      enforcement of ordinances related to the approved MOP Site Plan.

      *   The City Council sided with the developer and the Mayor.

      *   Attorney Adam Milam was involved in four separate lawsuits concerning Publix
      and the apartment complex.

      *   The Fairhope Planning Commission acted inconsistent with Ordinance 1572
      when approving the MOP Site Plan.


      THE DISCOVERY:

      *   The City of Gulf Shores (Mayor Robert Craft, Director Andy Bauer) failed
      to adhere to Section 3-3E ("Findings and Conclusions") of the Zoning Ordinance.

      *   Citizen Rex Lawson exposed this omission, prompting the City Attorney to
      advise the Mayor to send the Site Plan back for a second look.

      *   The City stopped using the "Land Use Plan" criteria when making recommendations
      to the Planning Commission, despite its importance in 2014, 2015, and 2016.


      THE PIVOT:

      *   Article 2 reveals that the inconsistency and arbitrariness cited against
      the Planning Commission (Article 1) stemmed from the City Staff''s failure to
      follow internal Zoning Ordinance requirements and disregard relevant "Land Use
      Plan" criteria.


      KEY ENTITIES:

      *   Adam Milam

      *   Francis Paul Ripp (President, Fly Creek Watershed Preservation Association,
      Inc.)

      *   Mayor Robert Craft

      *   Andy Bauer (Director of Planning and Zoning)

      *   Rex Lawson

      *   Planning Commission

      *   City Staff'
    generated_at: '2026-07-11T02:19:27.984252Z'
    text: Fairhope officials famously ignored their own laws to side with developers
      over the citizens they serve. This investigative report reveals Mayor Robert
      Craft and Andy Bauer did the exact same thing by trashing zoning rules and Land
      Use criteria just to force through another questionable site plan.
  chasing-your-tail:
    brief: 'THE CONFLICT

      *   The City Council refused to act on behalf of citizens regarding the Fly
      Creek Apartments and enforcing ordinances related to the approved MOP Site Plan.

      *   Attorney Adam Milam pursued four separate lawsuits involving the Publix
      project and the Apartment Complex.


      THE DISCOVERY

      *   Alabama’s Supreme Court ruled against Fairhope in a development suit brought
      by Charles K. Breland (filed 2013, roots back to 2001).

      *   The City Council handled the Dyas lawsuit resulting in a loss of $11.25
      million; Mr. Burrell negotiated the settlement without public participation.

      *   The City Council has failed to deliver a budget and cannot resolve legal
      issues regarding the Entertainment District or K-1 center purchases.


      THE PIVOT

      *   Article 2 proves the City Council’s pattern of inaction described in Article
      1 by showing they deliberately kept the public in the dark regarding major legal
      settlements (Dyas case) and failed to provide leadership in development suits
      (Breland case).

      *   The failure of the Council to manage legal outcomes and transparency is
      the core issue underpinning their refusal to act on behalf of citizens regarding
      projects like the Fly Creek Apartments.


      KEY ENTITIES

      *   Adam Milam (Attorney)

      *   Francis Paul Ripp (President, Fly Creek Watershed Preservation Association,
      Inc.)

      *   City Council

      *   Charles K. Breland

      *   Mr. Burrell

      *   Publix project

      *   Fly Creek Apartments

      *   Dyas lawsuit ($11.25 million loss)'
    generated_at: '2026-07-11T02:19:27.984261Z'
    text: The Fairhope Council loves to play dumb while developers steamroll the local
      community and ignore the law. These documents expose how Burrell and his cronies
      deliberately hid massive legal settlements from the public while losing millions
      of your tax dollars in the Breland and Dyas cases.
  bend-over-fairhope:
    brief: 'THE CONFLICT:

      *   The City Council refused to take action on behalf of citizens regarding
      the Fly Creek Apartments or enforcing ordinances related to the approved MOP
      Site Plan.

      *   The Planning Commission''s approval of the MOP Site Plan was inconsistent
