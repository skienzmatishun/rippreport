    text: Fairhope leadership claims they can’t stop the Fly Creek disaster, but their
      real motives are far more personal and corrupt. Boone and Brown are deep in
      the pockets of special interests, pushing developer-friendly projects while
      the city’s sewer system prepares to dump waste into the gully.
  three-strikes:
    brief: 'THE CONFLICT

      *   Adam Milam handled 4 separate lawsuits involving the Publix project and
      the Fly Creek Apartment Complex.

      *   The City Council refused to act on behalf of citizens regarding the Fly
      Creek Apartments or enforcing ordinances related to the approved MOP Site Plan.


      THE DISCOVERY

      *   The Fairhope City Council approved a Conservation Easement Agreement for
      109 acres of Dyas/Triangle property (valued at $18 million plus) for $39,025.00
      in costs.

      *   Diana Brewer, a former councilwoman who was pro-developer and favored the
      Fly Creek Apartments, reached out to the council regarding the Conservation
      Easement.

      *   Councilman Burrell and Councilman Brown are linked to developers/contractors
      (Arthur Corte, Robert Brown).


      THE PIVOT

      *   Article 2 reveals that the City Council is actively facilitating land giveaways
      ($18 million property) for private sector developers through politically motivated
      actions (the Conservation Easement), directly contradicting their stated refusal
      to support citizens against developers seen in Article 1.

      *   The council’s decision-making process, highlighted by the approval of the
      easement despite citizen opposition, proves the alleged political alignment
      with developers mentioned implicitly in Article 1.


