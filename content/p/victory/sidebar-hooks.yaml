      THE DISCOVERY

      *   Gulf Shores Mayor and Council are mirroring past behavior by insisting they
      ignore citizen complaints and lawsuits regarding development (The Enclave, The
      Regency Club).

      *   Developers and condo boards are "shooting the messenger" rather than acting
      as messengers to alert the community about negative effects.

      *   Planning and Zoning regulations in Gulf Shores are violated more often than
      others.


      THE PIVOT

      *   Article 2 reveals that the conflict is not unique to Fairhope; it is a pattern
      of systemic failure regarding Planning and Zoning mindset, which both towns
      (Fairhope and Gulf Shores) share under similar leadership structures.

      *   The current refusal to address development concerns in Gulf Shores is proof
