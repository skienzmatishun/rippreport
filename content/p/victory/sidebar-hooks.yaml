  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT

      *   Fairhope City Council refused to act on behalf of citizens regarding the
      Fly Creek Apartments development.

      *   The City Council sided with the developer concerning the approval of the
      apartments and MOP Site Plan.

      *   The Fairhope Planning Commission acted inconsistent with Ordinance 1572.

      *   Adam Milam spent years on four lawsuits involving the Publix project and
      apartment complex.

      *   In October 2016, the City Council endorsed the project.


      THE DISCOVERY

      *   The trial revealed that the proposed drainage plan calls for a single point
      discharge at the outfall pipe.

      *   This plan will detour the current 1 acre retention pond and omit expansion
      to a 5 acre pond.

      *   Stormwater from the apartment complex will be dumped directly into wetlands,
      draining into Fly Creek approximately 100 to 150 feet from the outfall pipe
      combined with Publix drainage.


      THE PIVOT

      *   The drainage discovery proves that the developer and the city council''s
      approval created a direct plan to pollute the Fly Creek Watershed by discharging
      apartment complex runoff directly into the creek/wetlands.

      *   This contradicts the stated purpose of protecting the vital watershed promised
      by officials who ignored public concerns.


      KEY ENTITIES

      *   Fly Creek Apartments

      *   Fairhope City Council

      *   Mayor

      *   Adam Milam (Attorney)

      *   Francis Paul Ripp (President, Fly Creek Watershed Preservation Association,
      Inc.)

      *   Publix project

      *   MOP Site Plan

      *   Bay Minette (Trial location)'
    generated_at: '2026-07-11T02:19:27.984290Z'
    text: The Fairhope Council promised to protect our natural resources, but they
      actually signed a death warrant for the local watershed. This shocking discovery
      proves officials approved a drainage plan that dumps toxic apartment runoff
      directly into our wetlands just feet from the Fly Creek outfall pipe.
  gulf-shores-shoot-the-messenger:
    brief: 'THE CONFLICT

