      THE DISCOVERY:

      *   Council members Boone and Brown have direct ties to the Fairhope Single
      Tax plan.

      *   Boone has recused himself, but Brown needs to follow suit because his business
      partner is a Single Tax member pushing the project.

      *   A proposed 12-home development on the big-head-gully area involves grinder
      pumps that will push sewage into the city’s main sewer line, causing backup
      issues.


      THE PIVOT:

      *   Article 2 reveals that Council members Boone and Brown are actively involved
      in supporting specific developments (Single Tax/gully project) which links directly
      to the systemic failure described in Article 1 where the Council favored developers
      over citizens regarding the Fly Creek Apartments.


