hooks:
  fairhope-state-of-the-city:
    brief: 'THE CONFLICT:

      *   Baldwin County School Board wanted to sell the K-1 center for over 10 years.

      *   The Triangle LAWSUIT settlement totaled $8.25 million plus $3 million in
      legal fees.

      *   Councilman Burrell raided the utility fund for $3 million and took a loan
      to pay for the Triangle property.

      *   Council President Burrell and Councilman Brown pushed for a conservation
      easement on the Triangle property, supported by Boone.


      THE DISCOVERY:

      *   The council ordered an appraisal (dated June 28, 2019) before public knowledge
      regarding rejected land.

      *   Councilmen Burrell, Brown, and Boone made decisions in June but held citizens
      out for months before closing on farmland for $2.65 million in December.

      *   This property was later declared "surplus and not needed for public or municipal
      purposes" (January 2020 ordinance) and leased for $9,000/year.

      *   The council purchased the K1 center and Nix building for over $5 million,
      which requires roof repairs.

      *   Millions of dollars are unavailable for infrastructure projects due to lack
      of budgeted funds.


      THE PIVOT:

      *   Article 2 proves that the Triangle property transaction involved a questionable
      appraisal process and lacked public input from Councilmen Burrell, Brown, and
      Boone.

      *   The funding mechanisms (raiding utility funds/taking loans) mentioned in
      Article 1 are linked to the council''s decision-making regarding properties
      detailed in Article 2.


      KEY ENTITIES:

      *   Councilman Conyers

      *   Mr. Burrell

      *   Councilman Brown

      *   Boone

      *   Mayor Karin Wilson

      *   Catalyst City Council

      *   K-1 Center

      *   Nix Center

      *   Triangle property'
    generated_at: '2026-07-10T22:44:29.717913Z'
