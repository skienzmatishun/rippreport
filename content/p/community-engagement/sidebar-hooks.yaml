      *   Council President Jack Burrell raided the utility fund for $3 million and
      took a loan to pay attorneys upfront for the Triangle lawsuit.

      *   The Council favored a Conservation Easement on the 109-acre Triangle property,
      which Catalyst opposed.


      THE DISCOVERY

      *   In September, the Fairhope Council passed a resolution to purchase $2.6
      million of property on Hwy. 13, despite a questionable appraisal and lack of
      public comment from citizens.

      *   The three council members (Burrell, Boone, Brown) voted to approve closing
      costs of approximately $9,000 thousand dollars for the $2.6 million purchase.


      THE PIVOT

      *   Article 1 details the Council''s failure on the conservation easement and
      the subsequent legal/constitutional violations regarding public speech.

      *   Article 2 proves that the Council actively pursued a purchase of property
      (Hwy. 13) rather than adhering to community engagement or preserving the land,
      despite earlier discussions about conservation easements and citizen concerns.


