  back-stabber:
    brief: 'THE CONFLICT

      *   Fairhope citizens advocated for public participation regarding decisions
      concerning the K-1 Center and the Triangle property conservation easement.

      *   The Council President, Jack Burrell, was accused of rushing real estate
      deals without public input.


      THE DISCOVERY

      *   A Special Called City Council meeting on September 4, 2018, authorized the
      Council President to execute a Real Estate Purchase Agreement for properties
      owned by the Baldwin County Board of Education.

      *   The properties included the K-1 Center, Nix Center land, Fairhoper’s Park,
      and the Alternative School.


      THE PIVOT

      *   Article 2 provides documented evidence (email/meeting notice) that Council
      President Burrell initiated a real estate purchase agreement for city properties
      without public participation, directly contradicting the push for Community
      Engagement mentioned in Article 1.


