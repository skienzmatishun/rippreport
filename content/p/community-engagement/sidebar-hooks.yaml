  nail-in-the-coffin:
    brief: 'THE CONFLICT:

      *   The City Council attempted to push through a $2.65 million land purchase
      for recreation without public participation or community engagement.

      *   Councilman Conyers encouraged public participation regarding the K-1 Center
      and Triangle property.

      *   The Council President, Jack Burrell, raided the utility fund for $3 million
      and took a loan to pay for the Triangle property.


      THE DISCOVERY:

      *   The City Council used questionable appraisals to secure the land purchase,
      misleadingly stating they were only seeking an appraisal before moving to purchase.

      *   The Council conspired to pass the land purchase without public input because
      they lacked legitimate public support and engagement.

      *   The $2.65 million purchase delayed infrastructure, sewer, and capital improvements
      and impacted the 2020 budget.

      *   The Triangle property was ultimately a legal settlement worth close to $13
      million (including attorney fees) and is now valued around $20 million.


      THE PIVOT:

      *   Article 2 reveals that the land purchase mentioned in Article 1 was a corrupt
      act of bullying the community, not a legitimate public decision process.

      *   Article 2 identifies "Catalyst" as responsible for the manipulation of the
      land deal and claims the City Council represents interests outside of Fairhope
      citizens or Baldwin County.


      KEY ENTITIES:

      *   Councilman Conyers

      *   Jack Burrell (Council President)

      *   Triangle Property

      *   K-1 Center

      *   Nix Center

      *   Catalyst

      *   $2,650,000.00 land purchase

      *   2020 budget'
