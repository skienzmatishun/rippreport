      - Victim: Brandon Hastings (shotgun case theory vs actual death details disputed).

      - Lawrence sentenced to life without parole.

      - Co-defendant Jarius McNeil named Lawrence as accomplice to save his own life
      from death penalty.

      - Current Status: State filed Brady information claim saying withheld evidence
      is "not reversible error."


      THE DISCOVERY:

      - New coroner''s report was suppressed during the 2003 trial.

      - Report signed by Judge Robert Wilters (then judge in case) and Sheriff Hoss
      Mack.

      - Suppressed evidence indicates cause of death was likely suffocation, not gunshot.

      - Prosecutor David Whetstone originally claimed gunshot; suppressed report supported
      suffocation theory.

      - State Assistant DA Haygood Kristi Deason admitted in filing: "Certainly a
      violation of the discovery order."

      - No physical evidence found linking Lawrence to murder (no gun, bullets, ballistics,
      DNA).


      THE PIVOT:

      - Robert Wilters is currently presiding over the Rule 32 Petition to challenge
      Lawrence''s conviction.

      - Wilters served as Judge in the original case where suppression occurred.

      - Article 2 proves Wilters signed the suppressed report that is the core of
      Lawrence''s current petition.

      - Sheriff Hoss Mack also signed suppressed coroner report and served as lead
      investigator; now current Baldwin County Sheriff.

      - This confirms direct conflict: Judge/Signatory of withheld evidence is now
      reviewing the case he influenced regarding that evidence.


      KEY ENTITIES:

      - Murray "Bubba" Lawrence Jr. (Petitioner)

      - Robert Wilters (Judge/DA; now Alabama football coach/Judge overseeing petition)

      - Brandon Hastings (Victim, murdered 2003)

      - Hoss Mack (Sheriff/Investigator; co-signer of suppressed report)

      - David Whetstone (Prosecutor in original trial)

      - Haygood Kristi Deason (Assistant DA; Filer for State)

