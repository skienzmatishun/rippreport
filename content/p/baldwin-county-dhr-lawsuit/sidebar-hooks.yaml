      - Jonathan Victor shot April 20, 2021 by Sheriff Deputy Hunady; Judge William Cassady denied qualified immunity to Sheriff Mack and Hunady on appeal using untrue facts.
      - County Commission warned of possible Federal Lawsuits by The Ripp Report regarding French murder; did nothing.

      THE DISCOVERY:
      - Second federal civil rights lawsuit filed against Baldwin County Sheriff’s Office (BCSO) and Major Crimes Unit.
      - A third federal lawsuit is pending in this cluster.
      - Sheriff Mack actively leaving Baldwin County; seeking Anthony Lowery to replace him.
      - BCMCU (Major Crimes Unit) lacks credibility due to self-investigating officers (including Bay Minette Chief Al Tolbert as Chairman).
      - French is the 10th fatality in Baldwin County where BCMCU investigated internally with no police at fault found.

      THE PIVOT:
      - Article 2 confirms the systemic corruption in Baldwin County law enforcement, validating the "corrupt system" narrative of Article 1.
      - Both articles show parallel federal legal battles against Baldwin County pillars: Family Court/DHR (Article 1) and Law Enforcement/BCMU (Article 2).
      - The lawsuits prove Baldwin County governance and safety agencies are under federal scrutiny for cover-ups, failures to protect (children/victims), and withholding evidence.

