  shackled-chained-handcuffed-bc-un-family-court:
    brief: |-
      THE CONFLICT
      - Anonymous Main Article author claims corruption in Baldwin County “family” court, DHR, and GAL systems.
      - Main Article alleges children left unprotected for five months despite abuse signs and court-appointed guardian involvement.
      - Federal class action lawsuit forming against DHR via Spanish Fort law firm to be filed against Baldwin County families harmed by DHR/mediation.
      - Widget Article alleges systemic corruption in Baldwin County Judiciary, attorneys, and elected officials for 16 years.
      - Widget Article identifies Judge Michelle Thomson as a primary architect of corruption in family court.

      THE DISCOVERY
      - Austin Burdick filed federal lawsuit in Federal Court vs. Secretary of State John Merrill regarding Judge Thomson’s judicial appointment legality.
      - Burdick alleges Alabama law limits “special court appointments” to 180 consecutive days.
      - Judge Thomson has been appointed successively for over a decade despite being elected as District Court (limited jurisdiction) while presiding in Circuit Court (general jurisdiction).
      - Widget Article details victim Chey Garrigan’s case initiated by unauthorized pickup of her daughter from Bayside Academy.
      - Police arrested Garrigan in Fairhope after domestic dispute with ex-husband Jake Simkins without reading Miranda rights.
      - Garrigan held in jail 30 days; released after refusing plea deal, placed on two-year probation with drug testing.
      - During jail process: Garrigan escorted to different county judge, shackled/chained/handcuffed in orange jumpsuit for 14 days with no undergarments.
      - Garrigan spent $10,000+ on fruitless legal representation via attorneys David Simon and Brian Chun before switching to Harry Still.
      - Attorney Steven Johnson identified as “cockroach attorney” connected to Judge Thomson, with prior contractor relationship/landscaping ties.

      THE PIVOT
      - Widget Article proves Main Article’s allegations of systemic corruption via specific, named judicial mechanisms (Judge Thomson/Burdick Federal Suit).
      - Widget Article provides concrete example of how “harmed children” and financial stripping occur: Garrigan’s 8-year custody deprivation (child denied visitation, unknown school/church details).
      - Widget Article identifies specific mechanisms of abuse used in Main Article: DHR/Family Court collusion with "cockroach attorneys" (Johnson, Brackin) to strip assets/visitation.
      - Federal lawsuit over Judge Thomson’s tenure exposes the illegality that enables the “kangaroo court” system described in Main Article.

      KEY ENTITIES
      - Judge Michelle Thomson (also referred to as Thomason)
      - Austin Burdick
      - Secretary of State John Merrill
      - Chey Garrigan (victim mother)
      - Jake Simkins (Garrigan’s ex-husband/child's father)
      - Steven Johnson (attorney)
      - Buddy Brackin (attorney)
      - Brian Chun (attorney David Chun/Simon context)
      - Attorney David Simon
      - Attorney Harry Still
      - Larry Fison (Strickland youth center director)
      - Priscilla Comer (Bayside teacher)
      - Tom Albritton (Ethics Commission Executive Director)
    generated_at: '2026-03-10T10:19:40.011042Z'
    text: Judge Michelle Thomason and her cockroach attorneys like Steven Johnson strip parents of their rights and assets for profit. The federal challenge to Thomason’s illegal tenure exposes the rot that allows the court to shackle innocent mothers while their children suffer.
