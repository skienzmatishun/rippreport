      Status Quo ("good ole boys") in Baldwin County.

      *   In 2016 Fairhope Municipal Elections, CATALYST ran candidates for almost
      every race.

      *   The Catalyst Council comprised former members of the council; Mayor Cant
      was identified as the head of the organization.


      THE PIVOT

