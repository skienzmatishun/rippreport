      *   Joe Davis was linked to penny tax approval that cost Baldwin County Schools
      $2 million annually.

      *   Randy Davis was indicted.


      THE DISCOVERY

      *   The Catalyst group is run by Councilmen Burrell Boone and Brown, who represent
      Scott Boone Consulting and CSB.

      *   Scott Boone Consulting special interests include Baldwin County Sewer, local
      politicians, connected attorneys, shady judges, and greedy developers.

      *   City Attorney Marcus McDowell acted as a bully to the Mayor and helped facilitate
      Ronan McSharry''s assault case by allowing the statute of limitations to expire
      on charges.

      *   The "Three B''s" (Boone/Brown) are attempting to reinstate corruption by
      placing a fired, under-qualified employee as Mayor.


      THE PIVOT

      *   Article 2 reveals that the political obstruction mentioned in Article 1
      is directly facilitated by organized special interests (Catalyst/Scott Boone
      Consulting).

      *   The discovery of Marcus McDowell’s actions proves how the legal and political
      infrastructure was used to undermine Mayor Wilson, showing *how* the "good ole
      boys" maintain power.


      KEY ENTITIES

      *   KARIN WILSON (Mayor)

