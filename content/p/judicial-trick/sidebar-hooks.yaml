      - Municipal Judge Snedeker sentenced McSherry to 180 days, credited two months
      for alleged rehab time.

      - City Attorney Marcus McDowell failed to amend Fairhope charging document for
      over a year (365 days) to include “did cause bodily harm.”


      THE DISCOVERY:

      - April 24, 2020: Francis Paul Ripp submitted a formal demand letter to Baldwin
      County District Attorney Robert Wilters.

      - The Letter confirms Baldwin County Circuit Judge J. Clark Stankoski dismissed
      McSherry’s appeal denovo based on technicality that the City was outside its
      365-day window to amend charging document.

      - The Letter asserts no double jeopardy applies because Stankoski’s order was
      “pre-trial” (before jury struck).

      - The Letter requests Wilters to take the case back to a grand jury and recharge
      McSherry.

      - The Letter flags that civil motion is underway; Stankoski ordered attorney
      Harry Still to turn over communications with Lagniappe, testing Alabama Source
      Shield Law.


      THE PIVOT:

      - The April 24 Letter transforms the Main Article''s suspicion into a formal
      legal escalation.

      - It identifies specific gaps in the Main Article’s narrative by naming dates
      (Nov 23, 2018 vs March 26) and confirming McDowell’s specific failure regarding
      the charge.

      - It serves as the "smoking gun" because it forces an official record of Ripp’s
      claim: that Stankoski used a procedural loophole to let McSherry off, rather
      than correcting the charging document McDowell botched.

      - It links the judicial trickery directly to a demand for the District Attorney’s
      office to intervene where they currently see no accountability.


      KEY ENTITIES:

      - Ronan (Ronan) McSherry

      - Paula Dinardi

      - Francis Paul Ripp

      - Robert Wilters (Baldwin County District Attorney)

      - J. Clark Stankoski (Circuit Judge)

