      Bar, Fairhope.

      - Incident captured on film; Dinardi suffered physical injury and $10,000 in
      medical bills.

      - Municipal Court: McSherry pleaded guilty; Judge Snedeker sentenced him to
      180 days in jail (credited two months rehab).

      - Baldwin County Circuit Court: Judge Clark Stankoski presided over state case.

      - State Case Outcome: Most serious assault charge dismissed by Judge Stankoski.

      - Official Reason for Dismissal: Municipal Attorney Marcus McDowell allegedly
      failed over one year to amend Fairhope charging document to include “did cause
      bodily harm.”

      - Defense Tactics: McSherry’s lawyer, James Pittman (brother of Sen. Tripp Pittman),
      subpoenaed officials and Judge Stankoski; partial ruling granted regarding media
      shield law.


      2. THE DISCOVERY

      - Article 2 confirms Fairhope City Council appointed Municipal Attorney Marcus
      McDowell to “cover their ass.”

      - Article 2 identifies McSherry’s Bar as a “watering hole” for CATALYST attorneys,
      judges (specifically Stankoski), and Councilman Jack Burrell.

      - Article 2 exposes pattern of official corruption involving: Sen Tripp Pittman
      ($750,000 BP theft), Chris Elliott (DUI charge), Mayor Cant (FEMA fund misuse).

      - Article 2 confirms McDowell is currently the Fairhope city’s largest developer
      (secured by council vote).

      - Article 2 confirms Dinardi suffered job loss and stress due to assault while
      City Council turned a blind eye.


      3. THE PIVOT

      - Article 2 validates Article 1’s claim of systemic corruption by placing the
      officials involved in McDowell and Stankoski into a broader "CATALYST" network.

      - Article 2 proves the alleged negligence in Article 1 (McDowell dropping charges)
      is politically strategic rather than accidental.

      - Article 2 links the dismissed assault charge to a "CATALYST JUSTICE" network
      protecting insiders (Burrell/McSherry) over victims.

      - Article 2 confirms the personal connection between Jack Burrell and Ronan
      McSherry, reinforcing claims of bias over criminal procedure.


      4. KEY ENTITIES

      - Ronan McSherry (McSherry’s Bar Owner)

      - Paula Dinardi (Victim, Civil Plaintiff)

      - Marcus McDowell (Fairhope Municipal/City Attorney)

      - Clark Stankoski (Baldwin County Circuit Judge)

      - Jack Burrell (Fairhope City Council President)

      - James Pittman (McSherry’s Lawyer, Tripp Pittman Brother)

      - Tripp Pittman (Former U.S. Senator)'
