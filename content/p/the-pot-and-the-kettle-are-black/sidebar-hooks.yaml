  help-fairness-killing-us:
    brief: 'THE CONFLICT:

      Frank Burt has served as Baldwin County Commissioner for District No. 1 since
      1989, making him an eight-time incumbent with over 28 years in office. The Catalyst
      group selected Jeb Ball to replace him. BCSA LLC, which is directed by Jebb
      Ball, was founded by Judges and Lawyers including Judge Michell Thomason and
      the catalyst organization''s original network (including Elliott Haygood and
      Stacy).


      THE DISCOVERY:

      Kevin Boone served as the Registered Agent for BA-101, LLC from its formation
      on April 29, 2004. This LLC was linked to developer Angelo Corte and included
      John Avent as a member. Kevin Boone dissolved this company on January 31, 2017,
      shortly before or after being asked by the Fairhope City Council to recuse himself
      due to conflicts of interest involving Angelo Corte.


      THE PIVOT:

      The discovery in Article 2 proves that the pattern of political and economic
      corruption discussed abstractly in Article 1 (the rewards given to the "well
      connected" through Commissioner Burt''s turf) is actively being executed by
      local city council members like Kevin Boone, who directly utilized his position
      as Registered Agent for an LLC owned by a major developer (Angelo Corte).


      KEY ENTITIES:

      Frank Burt, Jeb Ball, Michell Thomason, Catalyst group, Angelo Corte, Kevin
      Boone, John Avent, BA-101 LLC.'
