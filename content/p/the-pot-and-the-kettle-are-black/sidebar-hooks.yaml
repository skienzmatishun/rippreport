  boiling-frog:
    brief: 'THE CONFLICT

      *   Frank Burt served as District No. 1 County Commissioner in Baldwin County
      from 1989 to the present (as of 2024).

      *   The area managed by Frank Burt involves an "infamous mega site" costing
      $35 million plus lost opportunity costs.

      *   Political group CATALYST has selected Jeb Ball, current Director of Baldwin
      County Substance Abuse Services (BCSA), to replace Burt in the upcoming mid-term
      elections.

      *   Jeb Ball was involved in BCSA, an LLC founded by Judge Michell Thomason
      and other "Judges and Lawyers."


      THE DISCOVERY

      *   The City Council approved apartment and townhouse developments on Fly Creek.

      *   These new residential units (approximately 300) are projected to add 700–1000
      vehicles per day onto Parker Road/Hwy. 98, severely worsening existing traffic
      congestion in Fairhope.

      *   The approval of these developments was facilitated by the Fairhope City
      Council and CATALYST.


      THE PIVOT

      *   Article 1 alleges CATALYST is engaging in political maneuvering to secure
      a Commissioner’s seat via elections involving connected candidates (Jeb Ball/BCSA).
      Article 2 proves CATALYST holds legislative influence over local development,
      specifically approving the Fly Creek projects that increase traffic and pressure
      public infrastructure. This confirms the pattern of CATALYST prioritizing self-serving
      interests over civic planning and municipal function.


      KEY ENTITIES

      *   Frank Burt (District No. 1 Commissioner)

      *   Jeb Ball (BCSA Director/CATALYST Candidate)

      *   CATALYST (Political organization)

      *   Judge Michell Thomason (Founder of BCSA)

      *   Baldwin County Substance Abuse Services (BCSA)

      *   Fairhope City Council / Fairhope

      *   Fly Creek (Development location)

      *   Parker Road and Hwy. 98 (Congestion point)'
