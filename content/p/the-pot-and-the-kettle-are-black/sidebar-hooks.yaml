  fake-news-and-retaliation:
    brief: 'THE CONFLICT:

      *   Frank Burt held office as County Commissioner for District No. 1 in Baldwin
      County since 1989 (28 years of tenure).

      *   District one is the site of a "mega-site" costing $35 million, noted as
      an opportunity cost.

      *   CATALYST political organization has been actively involved since at least
      2017/2018 and held influence in past local politics (e.g., supporting former
      Mayor Kant).

      *   The catalyst group selected Jeb Ball to replace Frank Burt in the District
      1 commission seat, despite apparent conflicts of interest (Ball is Director
      of Baldwin County Substance Abuse - BCSA, which was founded by Judge Michell
      Thomason and others associated with Catalyst).

      *   There are allegations that political figures use "conflicts of interest"
      to serve a connected few.


      THE DISCOVERY:

      *   The Widget Article reveals the existence of systematic retaliation against
      former employees (Jennifer Fidler, Sherry Sullivan, Pandora Heathcoat) after
      they became critical of the administration run by Tim Kant.

      *   These women were allegedly fired after speaking out and being used to file
      lawsuits/alleged assaults against a "newly elected Mayor."

      *   The Widget Article exposes the media outlet GCN (Courier) as the media choice
      of Catalyst, which is supported by Councilman Boone and Jack Burrell.


      THE PIVOT:

      *   Article 1 frames CATALYST''s involvement in selecting Jeb Ball to replace
      Frank Burt as an orchestrated political maneuver driven by a desire for control
      ("to insure that they have a commissioner’s seat in their pocket").

      *   Article 2 provides evidence of how this powerful network (Catalyst/GCN)
      operates through retaliation against whistleblowers and utilizing affiliated
      personnel (Councilman Boone, Jack Burrell). It shows the mechanism—political
      machine and media control—that facilitates the kind of power play described
      in Article 1.


      KEY ENTITIES:

      *   Frank Burt / Frank Burt, Jr.

      *   Jeb Ball

      *   CATALYST

      *   Baldwin County (County Commission/Government)

      *   Mega Site

      *   Judges and Lawyers

      *   Michell Thomason (Judge)

      *   Jennifer Fidler

      *   Sherry Sullivan

      *   Pandora Heathcoat

      *   Tim Kant

      *   GCN Courier / Chucky

      *   Councilman Boone

      *   Jack Burrell'
