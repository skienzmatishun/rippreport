      \ formed by Judges and Lawyers, founded by Judge Michell Thomason.\n\nTHE DISCOVERY\n\
      *   The second article establishes that local corruption is routinely ignored\
      \ by the media to protect financial interests/access.\n*   Specific examples\
      \ of conflict of interest exist involving political figures and officials:\n\
      \    *   Former State Senator Tripp Pittman took $750,000.00 of B.P. money while\
      \ acting as a trustee.\n    *   Ethics Director Tom Albritton receives over\
      \ $100,000 in tuition from a private charitable trust he oversees.\n\nTHE PIVOT\n\
