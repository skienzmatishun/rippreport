      *   **Specific Past Events (City):** In 2017-04, the Fairhope City Council met
      on April 24th with an agenda including "Mayor''s Veto of An Ordinance Amending
      Ordinance No. 1572."

      *   **Catalyst Group:** This political organization (founded around 2018) was
      involved in replacing Frank Burt, selecting Jeb Ball as a replacement candidate
      for the Commissioner seat.


      THE DISCOVERY:

      *   The Widget Article reveals that local Fairhope governance is defined by
      "vindictive campaign[s]" and obstructionism directed at Mayor Wilson.

      *   Council President Jack Burrell (who holds a council presidency in 2025-08-05)
