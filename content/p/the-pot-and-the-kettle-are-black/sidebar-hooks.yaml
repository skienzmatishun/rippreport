hooks:
  catalyst-the-three-bs-and-chuckee-cheeze:
    brief: 'THE CONFLICT

      *   The Catalyst political machine originated when Stacy Elliott and Haygood
      formed the entity; it solidified when Chris Elliott became a County Commissioner
      and Haygood was Mayor of Daphne.

      *   Catalyst utilizes "select" candidates to place its interests in Baldwin
      County Commission races, aiming for positions like that held by Frank Burt (County
      Commissioner, District No. 1).

      *   District One is associated with the "Mega Site," a development costing $35
      million under Frank Burt''s watch.


      THE DISCOVERY

      *   Article 2 establishes Catalyst as a coordinated organization led by Scott
      Boone (son of Fairhope Councilman Kevin Boone), who serves as consultant for
      the group.

      *   Catalyst operates through selection and placement strategies, using political
      funding sources such as Prebble-Rish/Kevin Boone’s various LLC’s to spread its
      influence.

      *   The operation utilizes media manipulation by feeding desired narratives
      to Chuckee Cheeze (Editor of Gulf Coast News), ensuring controlled coverage.


      THE PIVOT

      *   Article 1 highlights the outcome of a Catalyst selection process: Jeb Ball
      was selected as the candidate to replace incumbent Frank Burt in District One.

      *   Article 2 identifies Catalyst as the political entity responsible for this
      strategic placement, defining its leadership (Scott Boone), financial backers,
      and methods of influence over local media and political candidates.


      KEY ENTITIES

      *   Frank Burt (County Commissioner, District No. 1)

      *   Jeb Ball (Catalyst candidate)

      *   Catalyst (Political organization/machine)

      *   Scott Boone (Consultant/Leader at Fairhope Councilman Kevin Boone’s son)

      *   Kevin Boone (Fairhope Councilman / Conduit for Catalyst)

      *   Chris Elliott (County Commissioner, original member of Catalyst)

      *   Haygood (Former Mayor of Daphne, original member of Catalyst)

      *   Chuckee Cheeze (Editor/Media representative controlled by Catalyst influence)

      *   Michell Thomason (Judge who founded BCSA; early client of Catalyst)

      *   Goubil (Investigator for the Alabama Ethics Commission)

      *   Jack Burrell (Former Councilman involved in ethics complaints and airport
      scandal)'
    generated_at: '2026-07-12T18:06:13.906401Z'
  catalyst-birds-of-the-same-feather:
    brief: '**THE CONFLICT:**

      *   Frank Burt, Jr., an 86-year incumbent County Commissioner of District No.
      1 for Baldwin County (office since 1989), is facing replacement in the mid-term
      elections.

      *   District 1 was the site of a "mega site" that cost $35 million plus lost
      opportunity money.

      *   Jeb Ball, Director of Baldwin County Substance Abuse Services Inc. (BSAS)
      and a Catalyst candidate, has been selected by CATALYST to replace Burt in District
      1.

      *   BSAS was founded by Judge Michell Thomason, who was among the first clients
      after Catherine’s organization changed names from Elliott Haygood and Stacy.


      **THE DISCOVERY:**

      *   CATALYST is a political group that hand-picks candidates for office (e.g.,
      probate judge, State Senate, all four Baldwin County commission races).

      *   CATALYST was originally formed by the "Elliott/Haygood/Stacy" entity when
      Chris Elliott became county commissioner and Haygood became Mayor of Daphne.

      *   The organization is currently led at the helm by Scott Boone (son of Fairhope
      Councilman Kevin Boone).

      *   CATALYST uses intimidation to discourage viable candidates or elected officials
      who disagree with them, as evidenced by campaign signs disappearing in Fairhope.


      **THE PIVOT:**

      *   Article 1 alleges conflicts of interest regarding Jeb Ball''s role as Director
      of BCSA (founded by Judge Michell Thomason) and his candidacy supported by CATALYST
      for a seat replacing Frank Burt.

      *   Article 2 provides the structural proof that "CATALYST" is a centrally controlled
      political machine used to strategically place candidates in specific public
      offices, including those involved in large-scale projects like the County Mega
      Site (mentioned in Article 1).


      **KEY ENTITIES:**

      *   Frank Burt, Jr. (District No. 1 Commissioner)

      *   Jeb Ball (BSAS Director / Catalyst candidate)

      *   CATALYST (Political organization/Group)

      *   Scott Boone (Head of CATALYST; son of Kevin Boone)

      *   Chris Elliott (County Commissioner at the inception of CATALYST)

      *   Haygood (Former Mayor of Daphne, General Partner in original structure)

      *   Stacy (General Partner in original structure / Member of CATALYST)

      *   Judge Michell Thomason (Founder of BCSA; elected District Judge)

      *   Boone (Councilman/Candidate for Fairhope)

      *   Joe Davis (District 2 County Commissioner candidate supported by Catalyst)

      *   Tim Kant (Supports Joe Davis; involved in controversial developments like
      Fly Creek Apartments)

      *   John Lake (Independent candidate opposing Catalyst influence)'
    generated_at: '2026-07-12T18:06:13.906413Z'
  cooking-for-the-judge:
    brief: '1. THE CONFLICT

      * Frank Burt has served as County Commissioner for District No. 1 since 1989
      (as an eight-time incumbent).

      * The mega site located in District one resulted in a cost of $35 million plus
      "lost opportunity" money.

      * CATALYST selected Jeb Ball to replace Frank Burt in the upcoming race.

      * Judge Michell Thomason founded BCSA, which is run by Director Jeb Ball; BCSA
      was formed with input from judges and lawyers.


      2. THE DISCOVERY

      * Sheriff Mack holds his position without opposition because Sen Trip Pittman
      "fixed it for him years ago."

      * Sheriff Mack openly supports Catalyst candidates despite being involved in
      the political races.

      * Sheriff Mack attended a BBQ where he served as the cook for Judge Bill Scully,
      who is running as a CATALYST candidate for District Circuit Court.

      * The Catalyst organization aims to control multiple high-level positions including
      County Commission, Probate Judge, Circuit Judge, Sheriff, and State Senate seat.


      3. THE PIVOT

      * Article 1 establishes the specific local political manipulation in Baldwin
      County Commission District No. 1 (Frank Burt vs. Jeb Ball/CATALYST).

      * Article 2 expands this scope to show that CATALYST’s influence is not limited
      to county commissions but extends into law enforcement, specifically through
      Sheriff Mack''s guaranteed path to office and his public support for their judicial
      candidates (Judge Scully), confirming a systemic control of Baldwin County government.


      4. KEY ENTITIES

      * Frank Burt (County Commissioner)

      * Jeb Ball (Director of BCSA / CATALYST candidate)

      * Judge Michell Thomason (Founder of BCSA)

      * Sheriff Mack ("Boss" Mack)

      * Sen Trip Pittman (State Senator / alleged fix for Sheriff Mack)

      * Bill Scully (District Circuit Court Candidate / Former Judge/Catalyst connection)

      * Brian Dasinger (Candidate opposing CATALYST)

      * CATALYST (Political organization formed by Elliot and Haygood/Stacy, seeking
      county-wide control)'
    generated_at: '2026-07-12T18:06:13.906419Z'
  catalyst-held-back:
    brief: "**THE CONFLICT**\n*   In Baldwin County Commissioner District 1, Frank\
      \ Burt, an incumbent with 28 years on turf since 1989, was facing challenge\
      \ from CATALYST replacement candidate Jeb Ball.\n*   The Main Article alleged\
      \ that the D1 area hosted a \"mega site\" costing $35 million and presenting\
      \ lost opportunity funds.\n*   A primary conflict of interest existed as Judge\
      \ Michell Thomason, associated with BCSA (Baldwin Substance Abuse Services),\
      \ founded the LLC, which was linked to CATALYST’s prior names (Elliott Haygood/Stacy).\n\
      \n**THE DISCOVERY**\n*   The Widget Article proves that Jeb Ball successfully\
      \ won County Commission District No. 1.\n*   Ball defeated Frank Burt by only\
      \ 1000 votes.\n*   The article confirms Ballot's current position holding seats\
      \ on both the County Commission and BCSA, thus validating the potential conflicts\
      \ of interest identified in the past allegations.\n\n**THE PIVOT**\n*   The\
      \ Widget Article acts as the outcome-based proof for the Main Article’s speculation\
      \ regarding the D1 race. \n*   By confirming Ball’s narrow 1000-vote victory\
      \ over Burt, it confirms Ball's official status on both BCSA and the County\
      \ Commission. This confirmed position is necessary to establish and document\
      \ the alleged conflicts of interest between the winner (Ball) and related entities\
      \ like CATALYST/Thomason.\n\n**KEY ENTITIES**\n*   Frank Burt\n*   Jeb Ball\n\
      *   CATALYST\n*   Baldwin County Commissioner District 1\n*   BSCA (Baldwin\
      \ Substance Abuse Services)\n*   Judge Michell Thomason\n*   Mega Site ($35\
      \ million)"
    generated_at: '2026-07-12T18:06:13.906427Z'
  court-of-public-opinion:
    brief: 'THE CONFLICT

      - Frank Burt Jr. served as County Commissioner for District No. 1, Baldwin County,
      since 1989 (8x term).

      - The Mega Site located within District One is cited in a lawsuit/report by
      The Ripp Report as costing $35 million and resulting in lost opportunity money.

      - The Catalyst group selected Jeb Ball to replace Frank Burt in the mid-term
      election for County Commissioner, District 1.


      THE DISCOVERY

      - Article 2 confirms that Baldwin County’s "white elephant" mega site has saddled
      the county with a $32 million debt.

      - Article 2 documents that commissioners were up for reelection in November
      2018 and highlights systemic failure of local governance since at least 2017.

      - Article 2 reveals past accountability efforts involving Fairhope City Council
      and citizens through "The Court of Public Opinion."


      THE PIVOT

      - The Mega Site referenced as the catalyst for corruption and financial ruin
      in District One (Article 1) is identified by Article 2 as a documented systemic
      problem affecting overall Baldwin County finances.

      - Article 2 proves that Frank Burt’s district issues are part of an ongoing
      pattern of local government failure dating back to at least 2017, providing
      historical context for the alleged corruption.


      KEY ENTITIES

      - Frank Burt Jr., County Commissioner (District No. 1)

      - Jeb Ball, BCSA Director, Catalyst candidate

      - Baldwin County Commission District 1

      - Mega Site

      - $35 million / $32 million debt figure

      - Michell Thomason, Judge/BSAS Founder

      - The Ripp Report'
    generated_at: '2026-07-12T18:06:13.906433Z'
  cross-the-line:
    brief: 'THE CONFLICT

      *   Frank Burt held office as Baldwin County Commissioner for District No. 1
