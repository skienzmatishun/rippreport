  vote-2026:
    brief: 'THE CONFLICT

      Frank Burt has served as County Commissioner for District No. 1 in Baldwin County
      since 1989, holding office for approximately 36 years and being described as
      a "political dinosaur." The district is associated with an infamous mega-site
      that incurred costs of $35 million. Catalyst group selected Jeb Ball to replace
      Burt; Ball is also connected to BCSA (Baldwin Substance Abuse Services), which
      was founded by Judge Michell Thomason and others, indicating potential conflicts
      of interest within the established political structure.


      THE DISCOVERY

      The second article calls for widespread voter rejection of incumbents across
      various Baldwin County positions, framing long-term tenure as evidence of systemic
      failure due to PAC money and lobbyists. It specifically suggests voting for
      Richard Cox against the incumbent in District 1 and identifies multiple specific
      targets (e.g., Kevin Brock, Tracey Gambill) who are explicitly called "worst"
      or must be voted out for change.


      THE PIVOT

      Article 2 provides the overarching narrative that contextualizes Article 1''s
      localized corruption; it moves from a single entrenched incumbent (Frank Burt
      and his alleged $35 million mega-site mismanagement in District 1) to asserting
      that this specific local issue is merely one instance of widespread, systemic
      failure across all levels of Baldwin County government.


      KEY ENTITIES

      *   **People:** Frank Burt, Jeb Ball, Richard Cox, Matt McKenzie, Jeremiah Giles,
      Grant Blackburn, Whitney Scapecchi, Mike Van, Michell Thomason (Judge), Elliott
      Haygood, Stacy.

      *   **Organizations/Groups:** CATALYST group, Baldwin County Commission District
      1, BCSA (Baldwin Substance Abuse Services).

      *   **Locations:** Baldwin County, District No. 1, Mega-site location in the
      district.'
    generated_at: '2026-07-12T18:06:13.906453Z'
