      - Prosecution claimed a gunshot killing without producing the weapon or ballistics
      evidence during trial.

      - Officer Tony Fuqua testified that he held no fingerprints, stolen property,
      weapons, or cell records connecting Bubba Lawrence to Brandon Hastings.

      - Jarius McNeal told investigators he would receive the death sentence unless
      he named an accomplice (Lawrence).

      - Five people testified regarding Bubba Lawrence’s whereabouts; DA Whetstone
      discredited them as drug users to clear the path for McNeal’s confession.

      - Dean McGowan, Sheriff Mack, and David Whetstone allegedly withheld autopsy
