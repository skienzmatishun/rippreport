      possibility of parole; Lawrence remains incarcerated without parole.

      - Sheriff Hoss Mack, DA Whetstone, and Judge Wilters are accused of hiding evidence
      from defense.

      - Stephen Nodine (former Mobile County Commissioner) is the subject of a new
      Oxygen Channel true crime show premiering January 28, 2023 at 8PM.

      - The Nodine case investigation is described as a “political prosecution” for
      murder in Baldwin County.


      THE DISCOVERY:

      - Exculpatory autopsy evidence regarding Brandon Hastings’ death was discovered
