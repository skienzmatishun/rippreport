  fairhope-waterfront:
    brief: |-
      1. THE CONFLICT
      - Leslie Callies Hollis posted a Facebook comment (FairhopeNow group) criticizing Councilman Robert Brown regarding the Waterfront project.
      - Hollis states: "Mr Brown has a pending Attorney General Complaint and an Ethics Complaint pending."
      - Hollis claims Robert Brown opposes the project for political reasons, framing it as: "Robert Equals Good and Karin Equals Bad."
      - Hollis alleges Brown treats the project as a battle between himself and Mayor Wilson rather than city infrastructure.

      2. THE DISCOVERY
      - Goodwyn Mills & Cawood held a press conference at Fairhope City Hall to defend the project.
      - The project is a $6,200,000 grant from BP; Fairhope is the only municipality on the Eastern Shores to be awarded such a grant.
      - Project approved initially via City Council approval of $500,000.00 for engineering/conceptual plans based on community input.
      - 493 people filled out questionnaires; dozens attended public meetings (Ripp Report claims).
      - The CATALYST Council spent $2,650,000 for recreation property previously without public participation.
      - Current Council is calling the project "The Mayor’s plan" despite initial community and council approval history.

      3. THE PIVOT
      - Article 1 (Hollis) alleges Robert Brown is blocking the project to undermine Mayor Wilson’s legacy.
      - Article 2 (Ripp) proves Hollis's claim by validating the project’s legitimacy through BP grant data ($6.2M) and citizen survey results (493 respondents).
      - Article 2 serves as the "smoking gun" because it exposes the Council’s double standard: they previously spent $2.65M without public input, but are now denying a $6.2M BP-funded project that was also based on public input because it benefits Mayor Wilson’s tenure.

      4. KEY ENTITIES
      - Robert Brown (Councilman)
      - Leslie Callies Hollis (Citizen)
      - Karin Wilson / Mayor Wilson (Mayor)
      - Jack Boone (Implied political opponent mentioned in Hollis post)
      - CATALYST Council / Fairhope City Council
      - Goodwyn Mills & Cawood (Consultants)
      - BP (Grant Provider)
      - Fairhope City Hall
