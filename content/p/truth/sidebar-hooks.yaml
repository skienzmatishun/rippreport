hooks:
  invitation:
    brief: |-
      THE CONFLICT:
      - Leslie Callies Hollis posted on Facebook group FairhopeNow challenging Councilman Robert Brown’s opposition to the Waterfront project.
      - Hollis accuses Robert Brown and others of turning personal/political dislike into a "PR campaign" targeting Mayor Karin Wilson.
      - Hollis alleges Robert Brown has a pending Attorney General Complaint and an Ethics Complaint.
      - Hollis references the "Three B’s" needing to leave public office due to unethical conduct.
      - Hollis challenges Brown regarding lack of transparency on soccer field funding and grant usage compared to the Waterfront project.
      - Robert Brown publicly questioned positions regarding the project, which Hollis identifies as resistance to Wilson’s "positive change."

      THE DISCOVERY:
      - The Ripp Report (and Lagniappe) identifies "three councilmen, the three B’s" who purchased a recreation property.
      - That specific purchase by "the three B's" turned a city bottom line surplus of $1.7 million into a deficit of $1.2 million.
      - City Council approved $500,000 for engineering design of the Waterfront project.
      - City Council avoided public participation on the Waterfront and Fly Creek apartments issues prior to Municipal elections, citing they were "voted into office."
      - Ripp Report states opponents of the Waterfront project "never attended a Waterfront meeting" despite Council claiming to offer engagement.
      - Mayor Wilson re-opened the presentation for the project on June 18 after citizens claimed lack of participation.

      THE PIVOT:
      - Article 2 confirms Hollis’s claim in Article 1 that the council is politically motivated.
      - "The three B’s" are linked in Article 2 to the financial shift from surplus to deficit via recreation property purchase—validating Hollis’s accusations of corruption/self-serving behavior in Article 1.
      - Article 2 confirms the Waterfront project is a major election-year issue where Council pushed back for "political capital" rather than transparency.
      - Article 2 explicitly labels the current Council (including Brown via "the three B's") as the worst in 25 years, reinforcing Hollis’s warning about political opportunism.

      KEY ENTITIES:
      - Robert Brown (Councilman)
      - Karin Wilson (Mayor)
      - Leslie Callies Hollis (Commenter/Author of Facebook post "TRUTH")
      - The Three B’s (Specific group of three councilmen including Brown)
      - Fairhope City Council
      - FairhopeNow (Facebook Group)
    generated_at: '2026-03-19T03:05:26.326315Z'
    text: Leslie Hollis called out Robert Brown for turning city business into a nasty personal vendetta against Mayor Wilson. We found the receipts showing how Brown and the “Three B’s” blew a $1.7 million surplus on a private land deal that left Fairhope taxpayers stuck in a massive financial hole.
  redneck-renovations:
    brief: |-
      1. THE CONFLICT
      - Robert Brown (Fairhope Councilman) publicly opposed Mayor Wilson's waterfront development project.
      - Leslie Callies Hollis responded in public (Fairhope Now group) accusing Brown of unethical politics and fear-based opposition to grant-driven improvements.
      - Hollis cited a pending Attorney General Complaint and Ethics Complaint against Robert Brown.
      - Brown’s stance included criticizing grant funding ("positive change") aligned with Mayor Wilson's administration; Hollis called this "Robert Equals Good and Karin Equals Bad" politics.

      2. THE DISCOVERY
      - New administration (post-municipal election) gutted the $6.2 million waterfront park plan in a few weeks of taking office.
      - Jack Burrell and Scott Boone Consulting (Catalyst) now control the direction of Fairhope’s council/mayor.
      - Specific project changes confirmed:
        - Swimming area removed (popular feature).
        - Jetty removed (previously protected infrastructure and Grand Hotel from hurricanes).
        - Viewings area, amphitheater, and bathrooms eliminated.
        - ADA ramp reduced from "winding/switchback access" to minimum code.
      - Citizen comments gathered over 18 months of planning were overridden.

      3. THE PIVOT
      - Article 2 proves the "Three B’s" (Brown, Boone, Burrell) referenced in Article 1 collaborated to destroy the project Hollis defended.
      - Robert Brown’s prior opposition (Article 1) was validated by his political allies (Jack Burrell, Scott Boone/Catalyst) who implemented the post-election plan reduction to "short sighted maintenance" described in Article 2.
      - Howling Raines is revealed (Article 2) as a political mouthpiece for the "status quo" behind these post-election lies, linking Brown’s campaign tactics to the plan's eventual gutting.

      4. KEY ENTITIES
      - Robert Brown
      - Leslie Callies Hollis
      - Karin Wilson (Mayor)
      - Jack Burrell
      - Scott Boone / Catalyst Consulting ("CATALYST")
      - Howling Raines
