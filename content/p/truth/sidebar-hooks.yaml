      - Hollis accuses Brown of political hostility toward Mayor Karin Wilson, specifically stating: “You all made yourselves out to be disrespectful and cruel... It appears that your opposition to this project... is out of growing concern that she might be working to create positive changes for Fairhope.”
      - Hollis claims Robert Brown has pending Attorney General Complaints and Ethics Complaints against him.
      - Hollis notes no other candidates have announced for the position Robert Brown currently holds, stating: “NO ONE YET HAS SIGNED UP TO RUN AGAINST ROBERT.”
      - Hollis explicitly mentions "THE THREE B’S NEED TO GO," implying a collective political bloc.
      - Hollis challenges Brown regarding the purchase/expansion of the soccer field and asks if he used public input or grant money for that land.

      THE DISCOVERY:
      - The second article (FAUXHOPE) confirms the waterfront project is funded by a federal grant of $6.2 million, not the 6 million Hollis mentioned.
      - The article states it took Mayor Sherry Sullivan close to a year to understand federal ADA compliance provisions attached to the grant.
      - Jack Burrell, as Council President, eliminated swim areas and rock jetties designed to protect the pier despite grant requirements.
      - The Widget confirms Mayor Karin Wilson obtained millions in funding for sewer infrastructure and was responsible for the initial Waterfront Project grant (“She also was responsible for the 6.2 million for the Waterfront project”).
      - Jack Burrell and Mayor Sullivan are accused of lying to citizens regarding optional locations for an electric substation.
      - Developer Stewart “The Liar” Speed of the Leaf River Group is named for making public statements claiming apartments would be luxury/never sold to management groups and would never contaminate Fly Creek; both statements were recorded live.
      - The City bought the K-1 Center and surrounding property in 2019 for $2.5 million from the Baldwin County Board of Education.
      - Current administration is required to complete sewer and waterfront projects left unfinished under the Wilson administration during their term.

      THE PIVOT:
      - Article 2 validates Hollis’s claim in Article 1 that Mayor Wilson is the primary architect of the Waterfront and sewer grants. This connects Brown’s political targeting (“stomp on changes”) directly to Wilson’s administrative achievements.
      - Article 2 proves the “Three B’s” dynamic (Brown/Burrell et al.) mentioned in Article 1 is a reality by documenting Burrell’s unilateral decision-making (removing swim areas, land gifts for liability) and Sullivan/Brown leadership delays on ADA compliance.
      - Article 2 links the "waste of taxpayer money" Hollis criticizes to specific facts: Jack Burrell paying $250,000 for land near the ABC store to save money on dirt costs instead of addressing the retention pond as stated.
      - Article 2 confirms Jack Burrell’s connection to developer Arthur Corti through "liability land gifts," supporting Hollis's critique in Article 1 that Burrell uses his position for friends/developers.

      KEY ENTITIES:
      - Leslie Callies Hollis
      - Robert Brown (Councilman)
      - Karin Wilson (Former Mayor/Project Lead)
      - Sherry Sullivan (Mayor)
