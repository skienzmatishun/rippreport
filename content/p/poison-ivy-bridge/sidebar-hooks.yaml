      not implement tolls on the proposed Bay Bridge.


      THE PIVOT:

      *   Article 2 provides specific, established arguments regarding infrastructure
      funding limitations and political strategy against tolls for similar bridge
      projects (I-10), which validates the core premise in Article 1 that tolling
      is based on poor planning and misallocated state funds.


