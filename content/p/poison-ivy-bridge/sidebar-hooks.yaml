      *   Burrell previously promised "no tolls" and "no federal money."


      THE PIVOT:

      *   Article 2 proves that Jack Burrell is acting as the political mouthpiece
      for the proponents of the bridge toll (the opposing side of Article 1).

      *   Burrell''s claims about increased population growth and business benefits
