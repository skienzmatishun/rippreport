      Bridge.

      *   Mayor Karin Wilson argues that state resources, specifically the BP settlement
      money, should be invested in infrastructure rather than funding bridge tolls.


      THE DISCOVERY:

      *   The BP oil spill funds were misused by Alabama officials for personal and
      non-environmental projects (e.g., Governor Bentley renovating a beach mansion,
      Fairhope using money for a park).

      *   Senator Trip Pittman received the first available BP money allocated to
      Baldwin County.

      *   A specific $750,000.00 was secured by Senator Pittman as an appointed BP
      trustee.


      THE PIVOT:

      *   Article 2 proves that Alabama officials (Governor Poison Ivy, Mayor Kant)
      demonstrably misused billions of dollars from the BP settlement for "pet projects,"
      undermining their credibility when they attempt to place financial burdens (tolls)
      on local residents for infrastructure needs mentioned in Article 1.


