  trolls-for-tolls:
    brief: 'THE CONFLICT:

      *   Opposition to a proposed toll on the Mobile River Bridge.

      *   Mayor Karin Wilson (Fairhope) opposed the toll based on financial accountability
      and criticism of State misuse of BP settlement funds.

      *   The debate concerns whether residents of Mobile and Baldwin County should
      bear the cost for infrastructure financing.


      THE DISCOVERY:

      *   Jack Burrell, spokesman for the I-10 project, explicitly opposes tolls due
      to lack of federal funding and insufficient state money available.

      *   A historical precedent (Pennsylvania''s rejection of tolling on I-80 by
