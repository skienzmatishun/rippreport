hooks:
  justice-denied-a-wrongful-conviction-buried-by-power-and-politics:
    brief: 'THE CONFLICT:

      - Murray Lawrence Jr. was convicted of capital murder in Baldwin County, Alabama,
      at trial in approximately 2005.

      - Victim was Brandon Hastings; Lawrence Jr. claims he was at home with his girlfriend
      and did not know the victim.

      - Prosecution relied on testimony of Jarius McNeil, a man who confessed to the
      murder but shifted blame to Lawrence Jr. after being threatened with the death
      penalty by District Attorney David Whetstone.

      - State claimed Brandon Hastings was shot in Alabama. Autopsy proved he was
      strangled in Mississippi.

      - Trial judge Robert Wilters presided; made rulings allowing prosecution to
      proceed despite evidentiary inconsistencies.

      - Defense lawyer advised Murray not to testify at trial; jurors were allegedly
      improperly influenced and alibi witnesses never called.

      - No physical evidence (DNA, fingerprints, murder weapon) physically linked
      Murray Lawrence Jr. to the crime scene.


      THE DISCOVERY:

      - Article 2 reveals the Innocence Project found key exculpatory evidence was
      suppressed during the trial.

      - Advocates (Lagniappe Mobile) discovered autopsy report from Brandon Hastings
      was never included in Murray’s murder trial file.

      - District Attorney Robert Wilters rejected the filing of a Rule 32 motion in
      Murray’s case during 2023.

      - The four men who built the original case against Murray Lawrence Jr. are now
      holding high-ranking positions in Baldwin County law enforcement and justice
      system.

      - David Whetstone admitted to making a deal with Jarius McNeil for testimony
      while knowing statements were unreliable.


      THE PIVOT:

      - Article 2 proves the conviction in Article 1 is tied directly to a power structure
      where officials were not punished but elevated.

      - Robert Wilters (Judge 2005) is now the Baldwin County District Attorney since
      approximately 2015.

      - Anthony Lowery (Investigator 2005) is now the current Baldwin County Sheriff,
      appointed by Governor Kay Ivey.

      - Huey ''Hoss'' Mack (Captain 2005) is in a newly appointed state-level position
      after retiring as Sheriff.

      - This connection transforms the case from an isolated legal error into a political
      issue involving current officials controlling investigations, appeals, and jail
      operations.

      - Murray Lawrence Jr. has spent over 20 years in prison for a crime they now
      identify as built on suppressed evidence and prosecutorial misconduct by these
      specific figures.


      KEY ENTITIES:

      - Murray Lawrence Jr (Defendant)

      - Brandon Hastings (Victim)

      - Jarius McNeil (Confessed killer/Source testimony)

      - Robert Wilters (Judge 2005; Current District Attorney since ~2015)

      - Anthony Lowery (Chief Investigator 2005; Current Sheriff)

      - Huey ''Hoss'' Mack (Lead Investigator/Captain 2005)

      - David Whetstone (District Attorney 2005; Retired)

      - Baldwin County District Attorney’s Office

      - Baldwin County Sheriff’s Office

      - Lagniappe Mobile (Advocacy/Media)

      - The Innocence Project'
