      proved strangulation in Mississippi.

      - Key witness Jarius McNeil initially confessed but was coerced into shifting
      blame to Lawrence; threatened with death penalty.

      - Prosecutor David Whetstone admitted in court he traded a deal for McNeil’s
      testimony despite knowing unreliability.

      - Court-appointed attorney advised Lawrence not to testify during trial; defense
      never called alibi witnesses or forensic experts.

      - Exculpatory evidence suppressed despite Innocence Project and court record
