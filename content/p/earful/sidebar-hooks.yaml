      - Trial transcript (Page 1591) reveals Officer Tony Fuqua testified "No" to
      having any fingerprints, stolen property, weapons, or cell phone records connecting
      Lawrence Jr. to Hastings.

      - Mississippi autopsy witnesses: Dean McGowan, John Stewart, Tony Fuqua (conclusion
