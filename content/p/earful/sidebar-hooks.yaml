  innocent:
    brief: '1. THE CONFLICT:

      - Murray "Bubba" Lawrence Jr. convicted of capital murder on May 13, 2005 in
      Baldwin County, Alabama.

      - Victim is Brandon Hastings; murder committed May 6, 2003 in Foley, Alabama.

      - Body disposal located in Mississippi, over two hours from crime scene one-way.

      - Lawrence arrested and incarcerated 11 months and 10 days prior to conviction
      in May 2005.

      - Case relies solely on testimony from Jarius McNeil, who implicated Lawrence
      after spending 4 months in jail.

      - McNeil threatened with death penalty if he did not give up an accomplice.

      - Investigation produced no fingerprints, ballistics, weapon, DNA, or fiber
      evidence connecting Lawrence to the murder.

      - Five separate witnesses testified seeing Lawrence at his home during the time
      of the crime, conflicting with any travel needed to Mississippi.

      - Prosecutor David Whetstone admitted making a "deal with the devil" to get
      evidence heard.


      2. THE DISCOVERY:

      - Narrative of Lawrence''s wrongful conviction has been recorded for a podcast
      titled "A Verbal Lynching in Alabama."

      - Advocacy group reviewing trial transcripts and visiting alleged murder scene.

      - Attorney Rebecca Chambliss retained pro bono to present case to The Innocence
      Project.

      - 2,200-page trial transcript reviewed; proves timeline inconsistencies making
      murder impossible for Lawrence based on traffic and witness alibis.

      - Website launched at justiceformurraylawrencejr.com to host petition and supporting
      documentation.


      3. THE PIVOT:

      - Article 2 provides the evidentiary backbone for the story detailed in Article
      1.

      - Transcript review proves Lawrence was not physically capable of reaching Mississippi
      body disposal site without contradicting five alibi witnesses.

      - Identifies specific government officials (Whetstone, Mack, Wilters) directly
      tied to the conviction machinery.

      - Confirms "accomplice testimony" violation: no corroborative physical evidence
      supports McNeil''s testimony beyond his own confession.


      4. KEY ENTITIES:

      - Murray "Bubba" Lawrence Jr. (Convicted Defendant)

      - Brandon Hastings (Victim)

      - Jarius McNeil (Informant/Witness)

      - David Whetstone (Retired District Attorney/Prosecutor)

      - Hoss Mack (Lt. Investigator / Current Baldwin County Sheriff)

      - Willy Huntley (Defense Attorney)

      - Robert Wilters (Judge / Current Baldwin County District Attorney)

      - Rebecca Chambliss (Pro Bono Defense Attorney)'
