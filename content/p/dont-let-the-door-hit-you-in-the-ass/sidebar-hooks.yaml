  green-acres-on-acid:
    brief: 'THE CONFLICT

      *   Senator Tripp Pittman was the trustee of BP funds for Baldwin County.

      *   Pittman secured a million-dollar contract from Fairhope.

      *   Pittman personally received $750,000.00 from BP contracts.

      *   Pittman used BP funds for a Gulf Beach Hotel.

      *   Pittman operated his tractor company as a marine contractor without a required
      license (felony).


      THE DISCOVERY

      *   The Alabama Ethics Commission failed to act on complaints regarding Pittman
      and Baldwin County officials.

      *   Ten years passed with no FBI, Ethics, or Attorney General investigation
      resulting in a trial against Pittman.

      *   Pittman''s involvement with BP funds and Luv Gov. Bentley''s use of BP funds
      for a beach mansion suggests political impropriety.


      THE PIVOT

      *   Article 2 reveals the systemic failure of state authorities (Ethics Commission,
      FBI, Attorney General) to investigate Pittman''s misuse of BP funds, directly
      validating the corruption claims made in Article 1 regarding his contracts and
      financial dealings.


      KEY ENTITIES

      *   Tripp Pittman (State Senator)

      *   BP funds

      *   Baldwin County

      *   Fairhope

      *   Jack Burrell

      *   Randy Davis

      *   Joe Faust

      *   Steve Russo (Mayor, convicted in 2006)

      *   Alabama Ethics Commission

      *   FBI

      *   Attorney General''s white collar crime division

      *   Luv Gov. Bentley'
