hooks:
  stinking-ticking-time-bomb:
    brief: 'THE CONFLICT:

      - Baldwin County promoted development (Fairhope, Daphne) while ignoring infrastructure
      for decades.

      - Current Status: Building moratoriums in Fairhope and Daphne; Spanish Fort
      in panic mode over apartment development.

      - Schools stretched max: Portables added, new construction starts full occupancy;
      lower south half schools overcrowded.

      - Infrastructure: Only unregulated sewer system in Alabama (BCSS). No oversight
      on rates, permits, or penalties.

      - Jail Project: County spending $65 million on Bay Minette jail (capacity 951)
      instead of social programs.

      - D.R. Horton: Built over 4,000 homes in Baldwin/Mobile; facing class-action
      lawsuits for shoddy construction.

      - RSA (Retired Systems of Alabama): Proposed housing on golf course land; sued
      Baldwin County over new District 19 zoning.

      - Environmental Threat: Berry Steam Plant has 21 tons of toxic coal ash; Port
      Authority proposing to cover 1,200 acres of wetlands for dredging spoils.


      THE DISCOVERY:

      - BCSS is privately operated, unregulated; residents assume it is a government
      entity due to name.

      - BCSS uses county right of ways at no charge; primary driver of sprawl by enabling
      subdivisions on farmland.

      - Principal/President is Mr. Clarence Burke, resides in Costa Rica (paying residents).

      - "Straw-man case": Unsealed records show business/political connections between
      Burke, developers, and lenders.

      - Bellaton BPOA: Management assumed by D.R. Horton in 2012 after foreclosure/defaults;
      involved in "secret" documents regarding debt obligations.

      - Fairhope/Bay Pollution: 20+ years of sewage imported to Fort Morgan facility
      by BCSS; major Bay pollution contributor.

      - Allegations: In civil trial (Judge Jody Bishop), Burke and lender Delaney
      allegedly conspired on a Ponzi scheme/fraudulent mortgage. No criminal charges
      filed yet.


      THE PIVOT:

      - Article 1 highlights "unregulated sewer" as a risk; Article 2 confirms it
      is private, uncontrolled, and financially abusing the ratepayers (Costa Rica
      residence, no oversight).

      - Article 2 proves infrastructure failure is intentional: BCSS uses free right
      of ways to justify sprawl (which creates the school overflow/jail demand in
      Article 1).

      - D.R. Horton links both: In Art 1, they are a shoddy builder with class actions;
      in Art 2, they took over Bellaton BPOA management and were part of the foreclosure
      web involving Burke/BCSS.

      - RSA/Zoning connection: Both articles discuss how developer power (RSA) dictates
      zoning without community input.

      - Criminal Liability gap: Both highlight lack of consequences; Art 2 notes "No
      criminal charges filed" for the alleged Ponzi scheme involving the utility principal.


      KEY ENTITIES:

      - Clarence Burke (Principal/President, BCSS)

      - D.R. Horton (Homebuilder/BPOA Management)

      - Baldwin County Sewer Service (BCSS)

      - RSA (Retired Systems of Alabama)

      - Baldwin County Commission

      - Port Authority / Mobile Basin

      - Lagniappe Mobile (LLPS)

      - Judge Jody Bishop

      - Bellaton Property Owners Association (BPOA)

      - Boss Hoss (Sheriff)'
    generated_at: '2026-03-15T03:59:53.030399Z'
    text: Baldwin County leaders sold our future to greedy developers while ignoring
      the crumbling pipes and overcrowded schools. This investigation unmasks Clarence
      Burke’s unregulated sewer empire as the private cash cow that uses free public
      land to drive the sprawl destroying our coastal quality of life.
    character_count: 299
  stinky-business:
