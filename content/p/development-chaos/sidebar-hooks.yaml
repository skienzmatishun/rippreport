      4. KEY ENTITIES

      - Baldwin County Commission

      - Baldwin County Sewer Service (BCSS)

      - "Boss Hoss" (Sheriff)

      - D.R. Horton

      - RSA (Retired Systems of Alabama)

      - ADEM (Alabama Department of Environmental Management)

      - Berry Steam Plant'
