      - Miriam Boutwell (Foley Community Development Director)

      - Plan Lower AL Now (PLAN)

      - Retired Systems of Alabama (RSA)

      - D.R. Horton Construction Co.

      - Southern Visions LLP

      - Berry Steam Plant'
