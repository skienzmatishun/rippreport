  demand-the-truth:
    brief: 'THE CONFLICT:

      - July 7, 2016: State Senator Pittman and the Mayor of Fairhope were subject
      to a BP fraud investigation led by the FBI, later transitioned to Special Prosecutor
      for Alabama Attorney General Matt Hart.

      - During this period, Sen. Pittman maintained debris removal contracts with
      Fairhope since 2004; his business partner Bob James briefly held one contract.

      - Allegation: The Mayor and Senator of that time claimed the Ethics Commission
      had exonerated them or provided permission for these contracts, which was allegedly
      untrue based on the lack of clear ethics approval for conflicts of interest.


      THE DISCOVERY:

      - The Widget Article (2016) reveals a pattern where State Senator Pittman used
      his political position to secure lucrative municipal contracts for his private
      businesses despite known investigations (BP fraud claims and Matt Hart investigation).

      - It shows that the local government was complicit in facilitating these conflicts
      by misrepresenting Ethics Commission opinions as formal clearances.


      THE PIVOT:

      - The 2016 complaint establishes a historical precedent of Robert Brown’s partner,
      Cliff Pittman, securing municipal contracts (debris removal) through political
      maneuvering and false ethics assurances from the Fairhope City Council/Mayor.

      - This pattern validates current claims that in the ESAC construction contract
      deal involving Robert Brown and the same business interests (Pittman-Brown Development
      Co.), proper legal procedures—specifically obtaining an Ethics Advisory Opinion
      for a potential conflict of interest—were ignored or bypassed, mirroring the
      "The Jester" conduct documented previously.


      KEY ENTITIES:

      - Cliff Pittman

      - Robert Brown

      - Sen. Tripp Pittman

      - Matt Hart (Special Prosecutor for Alabama Attorney General)

      - Fairhope City Council

      - Mayor of Fairhope (2016 context)

      - Ethics Commission

      - BP Fraud Investigation'
