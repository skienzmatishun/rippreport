      *   The Main Article states Brown failed to apply for an Ethics Advisory Opinion regarding this contract.
      *   Pittman, as Director of Single Tax and former State Senator (2019–2022), was involved in awarding contracts without standard competitive bids or proper insurance/contractor-of-record status.

      THE DISCOVERY:
      *   The Widget Article reveals that the Ethics Complaint against Councilman Robert Brown involving ESAC is being formally sent to the Attorney General (AG) next week.
      *   The article details a specific property purchase of 2.6 million dollars in land by Burrell, Boone, and Brown without public hearing or public notice.
      *   This same group also allegedly approved an additional $750,000 contract for the soccer field clubhouse/bathroom as a precursor to the larger ESAC project.

      THE PIVOT:
      *   Article 1 identifies Robert Brown’s violation of ethics regarding personal business benefits (ESAC) by using his position to secure contracts and avoid advisory opinions.
      *   Article 2 proves this was not an isolated incident but part of a wider pattern of behavior, as the same council members (Burrell, Boone, Brown) are now accused of circumventing public oversight for major municipal property purchases ($2.6 million deal).
      *   The discovery escalates the initial ethics complaint by moving it from internal board failure/ethics limbo to potential state investigation with the AG.

