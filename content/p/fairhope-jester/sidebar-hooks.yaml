      securing $636,000 in Single Tax money despite having no formal ethics advisory
      opinion or competitive bids.

      *   In 2018, Senator Trip Pittman was appointed trustee of BP funds but reportedly
      failed to be a general contractor or possess marine insurance while entrusted
      with over $750,000 in municipal contracts.


      THE DISCOVERY

      *   The Ethics Commission dismissed investigations regarding both the Fairhope
      Airport scandal (involving Jack Burrell and Ray Hix) and the BP Boom scandal
      (involving Trip Pittman).

      *   Dismissals were based on a one-page statement stating "not probable cause
      to believe" violations occurred, despite reports of misconduct.


      THE PIVOT

      *   Article 1 alleged that local officials like Brown bypassed ethics rules
      regarding development contracts.

      *   Article 2 reveals that when similar conduct (e.g., Burrell/Hix, Trip Pittman)
      was brought before the same Ethics Commission, the body consistently "turned
      a blind eye" by dismissing investigations, providing no substantive explanation
      for why they did not prosecute or investigate properly.


      KEY ENTITIES

      *   Robert Brown: City Councilman / Developer / General partner of Pittman-Brown
      Development Co.

      *   Cliff Pittman (or Sen. Tripp Pittman): Director of Single Tax / Former State
      Senator / BP fund trustee.

      *   Jack Burrell: Fairhope City Council President / Airport scandal subject.

      *   Ray Hix: Board member / Airport scandal subject.

      *   Ethics Commission: Body that dismissed investigations into both local council
      actions and state/city scandals without finding probable cause.'
