  fairhope-has-lost-its-moral-compass:
    brief: 'THE CONFLICT:

      - Robert Brown, a Fairhope City Councilman and Board member of Eastern Shore
      Art Center (ESAC), advanced knowledge of an ESAC construction contract involving
      Cliff Pittman (a single tax board director/business partner).

      - Brown told the ESAC Board he had "permission" to proceed with the Pittman-Brown
      contract for ESAC, but never applied for or received a formal advisory opinion
      from the Ethics Advisory Opinion process.

      - In contrast, Senator Tripp Pittman was awarded a $636,000 contract for Pittman
      Tractor related to BP funds while serving as appointed trustee (2019).

      - The main article mentions past Fairhope scandals involving City Council President
      Jack Burrell and Board member Ray Hix regarding the airport bid.


      THE DISCOVERY:

      - In 2025, Mayor Wilson/Mayor Burrell is allegedly leading a faction of the
      city council, including Police Chief, to attack the Mayor during a special meeting.

      - The Widget article claims Jack Burrell—who served as Council President (2019–2021)
      and City Council member—has lost his moral compass, citing past misconduct related
      to securing free plane transportation for bidders prior to awarding the Fairhope
      Airport bid.

      - Burrell is currently involved in a federal lawsuit concerning his actions
      as Council President of Fairhope City Council.


      THE PIVOT:

      - Article 1 exposes internal corruption within the municipal structure (Councilman
      Brown, Cliff Pittman) using non-public information and circumventing ethics
      rules for private gain (ESAC contract).

      - Article 2 provides evidence that this systemic lack of ethical oversight extends
      to high office, specifically accusing Council President Jack Burrell of institutionalizing
      a pattern of self-dealing and unethical behavior (Airport Bid/Federal Lawsuit),
      proving the ''moral compass'' failure alleged in Article 1 is not isolated but
      endemic to the leadership.


      KEY ENTITIES:

      - Fairhope City Council / City Council

      - Robert Brown (Councilman, ESAC Board Member)

      - Cliff Pittman (Director of Single Tax, Business Partner for Brown/ESAC)

      - Eastern Shore Art Center (ESAC)

      - Jack Burrell (Former Council President)

      - Ray Hix (Board member with municipal connections, involved in airport scandal)

      - Senator Tripp Pittman / Sen. Tripp Pittman (Trustee for BP funds contract)

      - Mayor Wilson / Karin Wilson (Mayor’s office, target of council attacks)

      - Police Chief'
