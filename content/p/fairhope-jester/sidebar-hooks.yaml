      * Major municipal issues were ignored by City Councilmen Boone and Burrell for four years; they only voted to spend $10 million on the sewer plant upgrade, which grew to over $13 million upon completion through Restore Act funds.\n\n3. THE PIVOT: \n* The historical pattern of using elected office for financial gain (Brown/Pittman contracts) is now contextualized within a broader narrative where Council members are accused of systemic obstruction and ignoring critical infrastructure needs despite having the opportunity to act.\n* Article 1 shows specific, unethical self-dealing; Article 2 demonstrates contemporary political maneuvers where that same body prioritizes opposition over essential public safety (Police hiring) and necessary city investments ($17.8 million Restore Act funds).\n\n4. KEY ENTITIES: \n* Robert Brown\n* Cliff Pittman\n* Karin Wilson (Mayor)\n* Eastern Shore Art Center (ESAC)\n* City Councilmen Boone\n* City Councilmen Burrell\n* Jack Burrell\n* Ray Hix\n* Tripp\
      \ Pittman"
