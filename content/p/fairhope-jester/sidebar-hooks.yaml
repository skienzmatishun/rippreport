  demand-the-truth:
    brief: 'THE CONFLICT:

      *   Robert Brown, a city councilman, Board member, and Representative for Eastern
      Shore Art Center (ESAC), was involved with Cliff Pittman and Pittman-Brown Development
      Co.

      *   Brown and Pittman had advanced knowledge of the ESAC construction contract.

      *   Pittman voted to approve Single Tax money designated for the ESAC project.

      *   Brown claimed permission to secure the contract but failed to obtain an
      Ethics Advisory Opinion, and the ESAC Board failed to act properly.

      *   Senator Tripp Pittman was appointed trustee of BP funds and awarded a $636,000
      contract for his company Pittman tractor.

      *   The Fairhope Airport scandal involved city council president Jack Burrell
      and Board member Ray Hix.


      THE DISCOVERY:

      *   A complaint was filed with the State of Alabama Ethics Commission on July
      7, 2016.

      *   Senator Pittman maintained debris removal contracts with the city of Fairhope
      since 2004.

      *   Pittman and the Mayor of Fairhope were subject to an FBI BP fraud investigation.

      *   Pittman admitted poor judgment regarding the fraud but later bid on contracts
      again despite a promise not to do so.

      *   The Mayor and Senator claimed the Ethics Commission''s letter granted permission,
      which the complainant asserts was false.

      *   Senator Pittman uses his position to secure multi-million dollar debris
      removal contracts funded by FEMA/Federal Emergency Management Agency (FEMA).


      THE PIVOT:

      *   Article 2 provides the formal ethics complaint and investigation details
      regarding Senator Pittman''s use of municipal contracts, which directly substantiates
      Brown''s claims regarding unethical conduct and misuse of public trust mentioned
      in Article 1.

      *   Article 2 proves that Pittman''s actions (securing lucrative state/federal
      debris removal contracts) are illegal or unethical, validating the concerns
      raised by Brown regarding officials using their positions for personal wealth.


      KEY ENTITIES:

      *   Robert Brown

