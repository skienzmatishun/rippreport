      Shore Art Center/GP of Pittman-Brown Development Co.) had advanced knowledge
      of the ESAC construction contract and voted to approve Single Tax money for
      the project.

      *   Mr. Brown claimed permission to secure the contract without an Ethics Advisory
      Opinion.

      *   Senator Tripp Pittman was appointed trustee of BP funds, awarded a $636,000
      contract for his company Pittman tractor, despite not being the contractor of
      record or having marine insurance.

      *   Fairhope Airport scandal involved city council president Jack Burrell and
      Board member Ray Hix (partner of the Fairhope Municipal Judge).


      THE DISCOVERY:

      *   Ethics complaints were filed against Fairhope officials Jack Burrell and
      Ray Hix, and the Airport Authority authorized an attorney to investigate.

      *   The City Council ignored evidence and issued false statements claiming ethics
      commission complaints were "baseless."

      *   Senator Tripp Pittman used his elected office for personal gain and evaded
      complaints by serving on the ethics committee and having his complaint abandoned
      by the Attorney General’s office, ignoring a Grand Jury/FBI investigation.


      THE PIVOT:

      *   Article 2 proves that the ethical violations and self-dealing involving
      Senator Pittman (who was also linked to Brown via the development company) were
      systemic corruption, not isolated incidents.

      *   Article 2 shows how politicians manipulate ethics guidelines using advisory
      opinions as a defense for actions, which directly validates Mr. Brown’s attempt
      to mislead by claiming permission without proper procedure in Article 1.


      KEY ENTITIES:

      *   Robert Brown

