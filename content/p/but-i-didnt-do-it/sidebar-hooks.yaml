  justice-denied-a-wrongful-conviction-buried-by-power-and-politics:
    brief: 'CONFLICT:

      - 2004: Murray Lawrence Jr. arrested in Baldwin County, Alabama for capital
      murder of Brandon Hastings while working at the Grand Hotel.

      - Lawrence claims innocence: states he was 30 miles away/home with girlfriend;
      did not know victim.

      - Real killer identified: Jarius McNeil, a casual friend of Lawrence who allegedly
      framed him to avoid the death penalty.

      - 2005 Trial: Held in Baldwin County Circuit Court; presided over by Judge Robert
      Wilters.

      - Prosecution Strategy: Led by DA David Whetstone and investigators Huey "Hoss"
      Mack and Anthony Lowery.

      - Conviction: Murray sentenced to life without parole based on McNeil’s testimony
      despite lack of DNA, fingerprints, or physical evidence linking Murray to the
      crime.

      - Trial Errors: Prosecution claimed victim was shot in Alabama; autopsy showed
      he was strangled in Mississippi. Court-appointed lawyer told Murray not to testify.


      DISCOVERY:

      - Innocence Project findings confirm key exculpatory evidence was suppressed
      during trial.

      - Four officials responsible for the prosecution now hold or held positions
      of high power in Baldwin County government.

      - Robert Wilters rejected Murray’s post-conviction relief filing (Rule 32) in
      2023 as current District Attorney.

      - Huey Mack allegedly coerced McNeil and controlled evidence handling via his
      own funeral home during the investigation.

      - David Whetstone admitted in court he made a deal with McNeil for testimony
      despite knowing it was unreliable.

      - No credible evidence exists to support Lawrence''s conviction today; physical
      and forensic record contradicts the prosecution narrative.


      PIVOT:

      - Article 2 transforms the general claims of wrongful conviction in Article
      1 into a specific, prosecutable pattern of misconduct.

      - It exposes the conflict of interest: men who built the 2005 case (Wilters,
      Lowery, Mack, Whetstone) rose to positions of power (Sheriff, DA) that directly
      impact Murray’s case.

      - It proves the "cover-up" element: Wilters’ 2023 rejection of relief and Mack’s
      control over evidence show ongoing systemic resistance to exoneration.


      KEY ENTITIES:

      - Murray Lawrence Jr (“Bubba”) – Convicted individual, now 42.

      - Jarius McNeil – Real killer; government witness.

      - Brandon Hastings – Victim of murder.

      - Robert Wilters – Judge in 2005; Baldwin County District Attorney today (since
      ~2015).

      - Anthony Lowery – Chief Investigator in 2005; Current Baldwin County Sheriff
      (appointed Kay Ivey).

      - Huey “Hoss” Mack – Lead Investigator in 2005; Retired Sheriff, state-level
      role now.

      - David Whetstone – District Attorney in 2005; Retired prosecutor.

      - Baldwin County Sheriff’s Office (BCSO) – Law enforcement body involved in
      arrest and investigation.'
