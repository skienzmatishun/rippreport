  catalyst-ass-whoopin:
    brief: 'THE CONFLICT:

      *   Catalyst failed to secure significant victories in Baldwin County elections
      despite having over $500,000 thousand dollars behind candidates.

      *   Catalyst won only three races.

      *   Judge Scully received 60% in the District Court Judge race.

      *   Catalyst won County Commission District No. 1 (Jeb Ball defeated Frank Burt
      by 1000 votes).


      THE DISCOVERY:

      *   Jerry Carl won the First Congressional Seat.

      *   A swing of 2652 Catalyst votes was shifted from Lowtower to Carl in Baldwin
      County races (primary to runoff).

      *   An estimated 2000 to 2500 votes were gained by Carl from CATALYST in Baldwin
      County races.

      *   Fairhope, the home base of CATALYST, is reeling from the loss of the Congressional
      seat.


      THE PIVOT:

      *   Article 2 proves that Catalyst''s organizational strategy was ineffective
      because a significant portion of their votes was directly shifted to a rival
      candidate (Jerry Carl), demonstrating a major shift away from CATALYST candidates.

      *   The vote swing (2652 votes) confirms that the financial backing of Catalyst
      did not translate into electoral success.


      KEY ENTITIES:

