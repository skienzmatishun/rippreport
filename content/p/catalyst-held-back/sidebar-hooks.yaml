hooks:
  peoples-choice:
    brief: 'THE CONFLICT

      *   Catalyst had over $500,000 behind candidates but only won three races in
      Baldwin County elections.

      *   People’s Choice had less than $10,000 funding compared to Catalyst.

      *   Specific race results included: Judge Scully (60%), County Commission District
      No. 1 (Jeb Ball beat Frank Burt by 1000 votes), Place 2 win (1% margin).

      *   Catalyst lost the Probate Judge race.

      *   The Senate Seat 32 race pitted Catalyst Elliott against David Northcutt
      (People''s Choice).


      THE DISCOVERY

      *   Catalyst Candidate Chris Elliott raised over half a million dollars, aiming
      for $600,000 salary for a Senate Seat.

      *   Elliott’s support coalition includes Realtors, Contractors, Road Builders,
      nurse anesthetists, and certified public accountants.

      *   Jeff "Judas" Boyd, who lost his primary against Elliott, became a member
      of Catalyst and is now campaigning for Elliott.


      THE PIVOT

      *   Article 1 demonstrates the failure of Catalyst to convert massive financial
      investment into electoral victories across multiple races.

      *   Article 2 reveals that Catalyst’s funding came from specific professional
      coalitions rather than broad popular support, exposing the limitations of their
      spending strategy.


