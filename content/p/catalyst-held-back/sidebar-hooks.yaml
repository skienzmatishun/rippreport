      THE DISCOVERY:

      *   Catalyst is identified as Scott Boone Consulting, functioning as the front
      man for "good ole boy" "Christians."

      *   Corruption involves inside contracts, fixed bids, fraud lawsuits, and judicial
      shenanigans in Baldwin County.

      *   Complaints regarding conflict of interest are ignored or dismissed by the
      Ethics Commission.

      *   The Judiciary and Attorney General refer complaints to the Ethics Commission.


      THE PIVOT:

      *   Article 2 proves that Catalyst’s dominance is rooted not just in funding,
