      the Status Quo ("good ole boys").

      *   CATALYST seeks control by having a block vote for council and retaining
      their legal staff.

      *   The municipal Judge is the largest developer in the city, approved by the
      city council, linking Catalyst to development interests.


      THE PIVOT

      *   Article 2 reveals that Catalyst''s power structure—controlling appointments
      (attorney/Judge) and manipulating legal cases (McSherry)—provided them with
      systemic influence that manifested in their election performance detailed in
