      carried out between the administration of Former Mayor Tim Kant (administration
      period unstated).

      *   The city council approved $32,510.97 in payments to Walcott, Adams, Verneuille
      Architects for these repairs.

      *   No paperwork or contract showing authorization for the work was found by
      current city staffers.

      *   Reporters allege this was a "handshake deal" between Former Mayor Tim Kant
      and the architects.

      *   Mr Burrell served as Council President at the time of these events, while
      Mr Boone was serving on council.

      *   The Main Article also details past issues including an airport scandal,
      Triangle lawsuit, and $13 million allocated to a sewer plant that continues
      to dump processed sewage into the bay.


      THE DISCOVERY

      *   Widget Article reveals that in 2017, Fairhope voters (part of Baldwin County)
      voted for Roy Moore despite allegations against him and public protests.

      *   The voter percentage supporting Roy Moore in Fairhope was stated as 62%.

      *   The Widget Article posits this phenomenon (the "Moore Factor")—where the
      local electorate prioritizes party affiliation over municipal concerns—is responsible
      for allowing Kant''s corrupt stranglehold to persist.

      *   The Widget Article explicitly states that Jack Burrell is perceived as the
      new political threat, claiming "This is Kant 101 and he taught Jack well."


      THE PIVOT

      *   Article 2 (Widget) provides a systemic explanation—the public''s pattern
      of favoring partisan candidates (e.g., Roy Moore)—that validates Article 1’s
      assertion that the corruption under former Mayor Tim Kant was entrenched and
      unchecked by democratic accountability.

      *   The finding links historical municipal misconduct (Kant/Walcott, Adams,
      Verneuille) to a specific voter behavior (62% prioritizing party over local
      integrity), suggesting current issues involving Jack Burrell are merely a continuation
      of this demonstrated pattern of systemic neglect and lack of transparency.


      KEY ENTITIES

      *   Fairhope City Council / City Council of Fairhope

      *   Former Mayor Tim Kant / Mayor Kant

      *   Jack Burrell / Mr Burrell (Council President)

      *   Mr Boone (City Council Member)

      *   Walcott, Adams, Verneuille Architects

      *   Karin Wilson / Mayor Wilson

      *   Roy Moore

      *   Doug Jones

