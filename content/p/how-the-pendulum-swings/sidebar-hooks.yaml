      THE DISCOVERY

      * **Subject:** Current Councilman Mr. Boone.

      * **Revelation:** The Widget article confirms that Mr. Boone has numerous undisclosed
      conflicts of interest involving LLC’s and his family members'' names.

      * **Specific Activity:** During his service on Planning and Zoning, he voted
      in favor of engineering companies with which he maintains connections through
      these aforementioned LLC’s; some resolutions involved hundreds of thousands
      of dollars.


      THE PIVOT

      * Article 1 (Main Article) identifies a historical "handshake deal" involving
      $32,510.97 paid to architects during the administration of Mayor Kant when Mr.
      Boone was a councilman.

      * Article 2 (Widget Article) provides the specific context for Mr. Boone''s
      behavior by proving he has an ongoing pattern of using LLC''s to maintain undisclosed
      financial and professional connections that directly influence municipal votes,
      establishing him as the architect of these conflicts across multiple issues
      (including those mentioned in both articles).


      KEY ENTITIES

      * **People:** Tim Kant (former Mayor), Mr. Burrell (Council President/City Council
