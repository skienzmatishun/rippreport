      performed (handshake deal involving Kant).

      *   Past event: City elected $13 million into a sewer plant while neglecting
      sewerage infrastructure.


      THE DISCOVERY

      *   Current political situation involves a coup mentality against Mayor Wilson
      by Jack Burrell and his allies (Catalyst/GOB representative).

      *   Jack Burrell asserted he could remove Mayor Wilson from office within one
      year through insubordination and employee pressure.

      *   The HR Director filed an incident report on December 29, 17, but only filed
      a claim in May 19, 17, seeking $100,000 in damages due to alleged assault by
      the mayor.

      *   Catalyst (GOB representative) and Scott Boone have privileged confidential
      city business linked to Jack Burrell’s group.


      THE PIVOT

      *   Article 2 proves that the political maneuvering and corruption referenced
      in Article 1 are actively being executed through coordinated effort (coup mentality).

      *   The alleged connection between Burrell, his cronies, the HR incident, and
      Catalyst/Boone confirms systemic corruption within the city government structure.


