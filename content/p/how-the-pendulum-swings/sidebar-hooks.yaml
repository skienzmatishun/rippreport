  gob-coup:
    brief: '**THE CONFLICT**

      *   Fairhope City Council approved $32,510.97 in payments to Walcott, Adams,
      Verneuille Architects for exterior repairs on the Fairhope Public Library.

      *   The work was performed during former Mayor Tim Kant''s administration, and
      current city staff could not locate authorization paperwork or contracts.

      *   Councilman Mr. Burrell noted that despite lack of documentation, the architectural
      work was completed.

      *   This alleged handshake deal occurred while Council President Mr. Burrell
      served alongside Kevin Boone on council.

      *   Other historical issues cited include the airport scandal and Triangle lawsuit.


      **THE DISCOVERY**

      *   Mayor Wilson''s victory disrupted two political groups: Tim Kant followers
      and Jack Burrell’s cronies, both supported by Catalyst.

      *   The opposition (led by Mr. Burrell) orchestrated efforts to oust Mayor Wilson
      through insubordination from city employees and a hiring freeze, resulting in
      the firing of Fiddler and Sullivan.

      *   Jack ensured Judge Snedeker was immediately sworn in as Municipal Judge
      without public comment.

      *   Judge Snedeker is partnered with Ray Hix (Hix/Snedeker companies), which
      has connections to the airport bid process and contributed to most city council
      members.

      *   An HR Director filed a claim alleging assault by Mayor Wilson on December
      29, 2017, seeking damages of $100,000.

      *   Catalyst (led by Scott Boone, Kevin Boone’s son) received privileged confidential
      city business supplied by his father and employees following Jack Burrell''s
      influence.


      **THE PIVOT**

      *   Article 1 establishes that the "old guard" utilized unchecked power to bypass
      standard municipal contracts (the library issue).

      *   Article 2 reveals this same entrenched political group (Burrell/Catalyst)
      is actively executing a calculated "coup" against Mayor Wilson, utilizing political
      appointments (Judge Snedeker), personnel sabotage (firings, hiring freezes),
      and exploiting conflicts of interest (Scott Boone’s relationship with Kevin
      Boone''s business).

      *   The coup mechanics prove the underlying institutional corruption extends
      beyond specific financial transactions to systemic political control.


      **KEY ENTITIES**

      *   Mayor Wilson (Karin Wilson)

      *   Tim Kant (Former Mayor)

      *   Jack Burrell / Mr. Burrell

      *   Kevin Boone / Councilman Kevin Boone

      *   Scott Boone

      *   Catalyst (Political organization/GOB representative)

      *   Judge Snedeker

      *   Ray Hix

      *   Walcott, Adams, Verneuille Architects

      *   Fiddler

      *   Sullivan'
