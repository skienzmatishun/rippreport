  5000-00-cash-reward:
    brief: 'THE CONFLICT

      *   Councilman Burrell served as Fairhope City Council President for five years.

      *   The Mayor approached the Council to mediate differences, requesting $15,000.

      *   Burrell allegedly used the Airport Authority to cover his attorney fees
      related to an Ethics complaint.

      *   Burrell defended the city''s spending of $13 million on a sewer plant and
      justified transferring $10 million to the general fund for non-utility expenses.

      *   Burrell held a position as liaison to the Airport Authority and Board member,
      giving him access to inside information regarding airport deals (e.g., aircraft
      hangar).


      THE DISCOVERY

      *   The formal complaint against Councilman Jack Burrell includes an allegation
      that he and his family received free airplane transportation by the winning
      bidder while serving as an elected official.

      *   Burrell was directly involved in the selection of the bid related to this
      transportation service.


      THE PIVOT

      *   Article 2 offers a $5,000 cash reward to prove the formal complaint against
      Burrell is false or fabricated.

      *   The allegation detailed in Article 2 (free airplane transportation) directly
      connects to the job structure described in Article 1 (Burrell''s position as
      Council President and Airport Authority Board member), suggesting misuse of
      public office/position for personal gain related to airport contracts.


