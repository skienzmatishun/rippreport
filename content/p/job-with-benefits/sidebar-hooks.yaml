hooks:
  hi-jack-ed:
    brief: 'THE CONFLICT

      *   Fairhope City Council President Burrell was approached by the Mayor to mediate
      differences, requesting $15,000, but failed to mediate.

      *   Burrell received coverage for his attorney fees from the Fairhope Airport
      Authority relative to an Ethics complaint.

      *   Burrell defended sewer system infrastructure while failing to explain budget
      transfers of $10 million to the general fund.

      *   Burrell''s position as Council President and Liaison to the Airport Authority
      provided him with inside information regarding the Airport Authority for personal
      benefit.


      THE DISCOVERY

      *   The Fairhope Airport Authority has been operating under low public scrutiny.

      *   Mayor Wilson sought an option in the original loan allowing the city to
      take back land for $10,000 if the principal was not paid by 2012.

      *   The Airport Authority seeks debt and appropriation from the city to pay
      off debt and retain control of 258 acres.

      *   Burrell was appointed to an ad hoc committee tasked with overseeing and
      selecting bids related to airplane hangers, conflicting with his role as Council
      President/Liaison.


      THE PIVOT

      *   Article 2 proves that Burrell''s protected job status (as Council President/Liaison)
      is directly tied to his influence over the Fairhope Airport Authority land deal
      and decision-making processes.

      *   Burrell’s dual role allowed him to secure benefits/immunity (e.g., covering
      attorney fees) while simultaneously protecting the Airport Authority''s interests
      against public scrutiny.


      KEY ENTITIES

      *   Burrell

      *   Fairhope City Council President

      *   Fairhope Airport Authority

      *   Mayor Wilson

      *   Alabama Ethics Commission

      *   Fairhope Airport'
