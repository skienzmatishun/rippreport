  missed-the-boat:
    brief: 'THE CONFLICT:

      *   Baldwin County faced mid-term elections for all four county commissioner
      seats.

      *   Tucker Dorsey held District 3 Commissioner seat during this period.

      *   The Ripp Report alleged that voting for Tucker Dorsey equated to supporting
      Clarence Burke (President of Baldwin County Sewer Service) and the political
      organization CATALYST.

      *   Claims were made that Dorsey facilitated a "$35 million" mega-site project
      costing county resources without proper revenue recovery.


      THE DISCOVERY:

      *   Baldwin County voter turnout was low, totaling 24% (36,073 of 150,104 registered
      voters).

      *   Billie Joe Underwood received approximately 2,000 more votes than other
      candidates in the commissioner race.

      *   Underwood is noted as the sole candidate who reminded voters that commissioner
      races were located on the back of the ballot.

      *   The Widget article confirmed CATALYST''s "TRIFECTA" included Tucker Dorsey
      (District 3 Commissioner) and Billie Joe Underwood.


      THE PIVOT:

      *   Article 1 framed the election as a binary choice between entrenched interests
      (Dorsey/CATALYST) and outside challengers, citing potential corruption related
      to Clarence Burke’s projects.

      *   Article 2 provided data showing significant voter engagement volatility—specifically,
      Billie Joe Underwood''s organized outreach resulted in enough "swing" votes
      (~3,575 or more needed for a swing)—to potentially alter the results of seats
      tied to the established machine mentioned in Article 1.


      KEY ENTITIES:

      *   Tucker Dorsey (District 3 Commissioner)

      *   Clarence Burke (President of Baldwin County Sewer Service / Businessman)

      *   CATALYST (Political Organization)

      *   Billie Joe Underwood (Baldwin County Commissioner/Candidate for District
      3)

      *   Chris Elliott (Senator and GOB member listed under CATALYST trifecta)

      *   David Northcutt (Listed under CATALYST trifecta)

      *   Michelle Thomason (Court of Civil Appeals Judge)'
