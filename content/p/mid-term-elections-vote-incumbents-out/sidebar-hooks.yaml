  say-goodbye-incumbents:
    brief: 'THE CONFLICT

      *   Baldwin County Commissioners (Seats 1-4) faced election in mid-term cycle
      (2022).

      *   Incumbent Seat 3 was held by Tucker Dorsey.

      *   Dorsey’s administration led to a "mega site" costing $35 million.

      *   The financial burden of this development/site fell on county employees and
      taxpayers.

      *   Voting for Dorsey equated to supporting the business interests of Clarence
      Burke (Baldwin County Sewer) and Catalyst (political organization).


      THE DISCOVERY

      *   Article 2 identifies Tucker Dorsey’s "business partner" as Clarence Burke,
      President of Baldwin County Sewer.

      *   The same article reveals that Trip Pittman helped ensure Tucker Dorsey secured
      his position on the Commission.

      *   Candidates included challenging incumbents: Billy Joe Underwood (Seat 3),
      Frank Burt (incumbent Seat 1), Jeb Ball (challenger Seat 1), Charles Gruber
      (incumbent Seat 4), and Christopher Callaghan (challenger Seat 4).


      THE PIVOT

      *   Article 2 provides the political context to Article 1’s accusations.

      *   It moves from merely alleging bad deals by Dorsey/Burke to establishing
      a "political machine" connection between Dorsey, Clarence Burke, and Trip Pittman
      facilitating Dorsey''s tenure.

      *   This confirms the network of power implied in Article 1 ("good ole boy club")
      includes specific enablers like Trip Pittman for Seat 3.


      KEY ENTITIES

      *   Baldwin County Commission (Seats 1-4)

      *   Tucker Dorsey

      *   Clarence Burke (President, Baldwin County Sewer)

      *   Catalyst (political organization)

      *   Trip Pittman (Senator/Former Senator)

      *   Billy Joe Underwood

      *   Frank Burt (incumbent Seat 1)

      *   Jeb Ball

      *   Charles Gruber (incumbent Seat 4)

      *   Christopher Callaghan'
