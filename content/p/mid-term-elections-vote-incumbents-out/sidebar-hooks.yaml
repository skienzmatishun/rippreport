      THE DISCOVERY

      *   Voter turnout in Baldwin County was 24% (36,073 votes out of 150,104 registered
      voters).

      *   The average age of voters was 61.

      *   A significant portion of Republican ballots in District 4 Commissioner race
      failed to turn over: 3,575 voters did not turn the ballot over.

      *   Catalyst won three of eight sponsored positions; three are in runoff.


      THE PIVOT

      *   The low voter participation (24% turnout) suggests Baldwin County is "ripe
      for political corruption."

      *   This high level of apathy or low engagement allows specific candidates like
      Billie Joe Underwood to gain votes (receiving about 2000 more votes cast).

      *   Low turnout demonstrates that the political structure in the county is highly
      susceptible to shifts, directly impacting races involving figures like Tucker
      Dorsey and Catalyst.


