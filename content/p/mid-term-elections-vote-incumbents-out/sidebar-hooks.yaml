  qualification:
    brief: 'THE CONFLICT

      *   Tucker Dorsey held County Commissioner seat three.

      *   Dorsey helped marry the county to a mega-site costing $35 million plus lost
      revenue.

      *   County employees paid for the mega-site and are dissatisfied with Dorsey''s
      promise that it would "someday sell."


      THE DISCOVERY

      *   Baldwin County has an opportunity to change the political makeup of the
      "good ole boys" network.

      *   The good ole boy network relied on former Mayor Kant and Sen Pittman to
      maintain connections in Bay Minette.

      *   The wheel of corruption has stopped; valuable "connections" are gone (fired,
      retired, or drying up).


      THE PIVOT

      *   Article 2 provides the context that local political maneuvering (like Dorsey''s
      alleged dealings) is part of a larger, corrupt network ("good ole boys").

      *   Article 2 shows that voters have the opportunity to vote out candidates
      who are part of this established system.


      KEY ENTITIES

      *   Tucker Dorsey

      *   Clarence Burke

      *   Catalyst

      *   Mega-site ($35 million)

      *   Karen Wilson (Mayor)

      *   Kant

      *   Sen Pittman

      *   Fairhope

      *   Michelle Thomason

      *   Ethics Commission'
