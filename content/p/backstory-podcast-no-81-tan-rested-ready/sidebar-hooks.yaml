  backstory-podcast-no-92-a-vintage-year:
    brief: "THE CONFLICT: \n- Texas records 50,000 SARS-COV-2 pandemic deaths in the\
      \ referenced week.\n- Alabama Legislature passed largest General Fund Budget\
      \ in history despite public exclusion from State House sessions.\n- Mabel Amos\
      \ Trust administered by Alabama Ethics Commission Director Thomas Albritton\
      \ creates conflict of interest.\n- Limestone County Sheriff trial halted due\
      \ to State’s Witness sweetheart deal under Judge Pam Baschab (ret).\n- Baldwin\
      \ County Domestic Relations cases show 2/3 chance for District Court Judge Thomas\
      \ or Sculley to preside; only Circuit Judge Bosch regularly hears cases.\n-\
      \ Lance LaCour identified as \"godfather of the Megasite\" former Baldwin County\
      \ EDA Director.\n\nTHE DISCOVERY:\n- Federal Lawsuit filed alleging State Officials\
      \ violated civil rights by permitting District Judge to sit as Circuit Judge\
      \ for \"Family Court\" cases.\n- Plaintiff assisted/advocated by Mr. Ripp; represented\
      \ domestically by Mr. Still in Domestic Relations Court.\n- Thomas Gallion III\
      \ representing Amos family; irony noted regarding trust administration by Alabama\
      \ Ethics Commission Director Thomas Albritton.\n- Baldwin County Commissioners\
      \ purchased property for $32M, sat on it a decade, now in hands of Alliance.\n\
      - County Commissioners denied access to property by Lee Lawson (current EDA\
      \ Director).\n- Lance LaFlour, Director Alabama Dept of Environmental Management\
      \ raised ire of Rivers Alliance regarding mercury/largemouth bass warnings.\n\
      \nTHE PIVOT:\n- Main Article warns of \"Sheriff mayhem lawsuits\" and political\
      \ flip-flops; Widget details specific judicial corruption allegations (Family\
      \ Court bias) confirming the chaos warning.\n- Main Article notes pandemic \"\
      officially over\" in Alabama; Widget reveals 34,316,321 US cases and Delta Variant\
      \ infections rising, Governor Ivey unhappy with unvaccinated.\n- Widget links\
      \ the general \"Mayhem in Fairhope\" claim from Main Article to specific land\
      \ deals ($32M property), Ethics Commission involvement (Albritton), and the\
      \ EDA leadership conflict (LaCour vs. Lawson).\n\nKEY ENTITIES:\n- Mr. Ripp\
      \ (The Ripp Report)\n- Thomas Albritton (Alabama Ethics Commission Director)\n\
      - Thomas Gallion III (Mabel Amos Trust Rep)\n- District Court Judge Thomas\n\
      - District Court Judge Sculley\n- Circuit Judge Bosch\n- Judge Pam Baschab (ret,\
      \ Limestone Sheriff trial)\n- Lance LaCour (EDA Director Katy TX / Former Baldwin\
      \ EDA)\n- Lee Lawson (Current Baldwin County Alliance/Property Director)\n-\
      \ Lance LaFlour (Director, Alabama Dept of Environmental Management)\n- Governor\
      \ Ivey\n- Mayor Bob Wills (Bay Minette)\n- Mr. Still (Legal Representation)"
    generated_at: '2026-03-16T19:33:58.328066Z'
