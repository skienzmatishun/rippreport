  shelter-in-place:
    brief: 'THE CONFLICT:

      - Texas reached 50,000 deaths contributed to the SARS-COV-2 Pandemic.

      - Alabama Legislature in session passing largest General Fund Budget in history;
      sessions closed to public interaction/observation.

      - Public sentiment in Alabama treats the pandemic as "over" or ignored by citizens
