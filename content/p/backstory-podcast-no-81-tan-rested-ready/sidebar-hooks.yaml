  backstory-podcast-senate-impeachment:
    brief: 'THE CONFLICT:

      - Alabama Legislature in session passing largest General Fund Budget in history.

      - Public restricted from observing/interacting with Elected Officials at the
      State House.

      - 50,000 deaths contributed to SARS-COV-2 Pandemic in Texas alone (Main Article
      Claim).

      - Local tensions: Sheriff lawsuits ("Sheriff mayhem"), Fairhope pier plans,
      coal ash apathy (State EMA), gaming tax issues involving Elliott.

      - Public sentiment: Alabamians believe pandemic is "officially over".


      THE DISCOVERY:

      - Alabama Legislature confirmed back in session "without an audience."

      - Pandemic stats confirmed: 27,393,896 cases (USA); 475,459 deaths (USA); 477,570
      cases in Alabama; 9,021 deaths in Alabama.

      - Specific funding reveals: Bay Minette lands $200,000 for AR-15''s, IR Drone,
      Humvee, Covert Surveillance Equipment; no funding for taser shotguns.

      - Settlement: Alabama AG Steve Marshall announces $60M settlement with Terminix;
      no one jailed for Deceptive Trade Practices Act violations.

      - Growth projects: Golden Triangle project in Baldwin County near Stapleton
      (mostly Spanish Fort Planning Jurisdiction); 4,200 Acres; 12,000 residences
      planned; 1.5 Million Sq Ft commercial space.


      THE PIVOT:

      - Article 2 validates Article 1’s claim of inaccessibility to officials by specifying
      sessions occur "without an audience."

      - Article 2 substantiates Article 1’s reference to police/Sheriff issues by
      detailing the Tubbs/Bay Minette $200K hardware deal, providing proof that police
      funding is opaque/controversial.

      - Article 2 provides the raw data (Global/US/Alabama case counts) backing up
      Article 1’s claim that Alabamians are ignoring the ongoing crisis ("pandemic
      is officially over").


      KEY ENTITIES:

      - Mr. Ripp (Author)

      - Jack Burrell (Fairhope Councilman and Eastern Shore MPO Chairman)

      - Sheriff Tubbs / Bay Minette Police

      - AG Steve Marshall

      - Terminix

      - Baldwin County (Stapleton/Spanish Fort)

      - Fairhope Pier / Eastern Shore MPO

      - Alabama Legislature'
