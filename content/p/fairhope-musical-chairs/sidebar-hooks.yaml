  moratorium-party:
    brief: 'THE CONFLICT

      Jack Burrell served 9 years as Council President; his tenure associated with
      taxpayer costs in the millions.

      Burrell appointed Jay Robinson to Council seat replacing Robert Brown, who quit/walked
