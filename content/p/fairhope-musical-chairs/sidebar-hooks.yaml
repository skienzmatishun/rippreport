  disposal:
    brief: 'THE CONFLICT:

      - Jack Burrell held the position of President Fairhope City Council for 9 years
      (alternatively stated as over 7 years).

      - Burrell led council override of Mayor Wilson’s veto on Fly Creek extension
      zoning.

      - Burrell settled Triangle lawsuit then told citizens it was a park purchase.

      - Council lost Federal Lawsuit after refusing public participation rights at
      meetings.

      - Council chose not to purchase Twin Beech Road property despite recommendation;
      staff supported Mayor’s position but cost was deemed too high.

      - Burrell appointed Municipal Judge Haymes Snedeker; Council approved Judge’s
      development plans.

      - Fly Creek land (wetlands, culvert foot) accepted as last agenda item during
      Tim Kant no-show meeting.


      THE DISCOVERY:

      - 106 acres of city property to be "disposed" are worth $20 million.

      - Burrell claimed he "forgot who came up with the idea" to dispose of the 106
      acres in full council chambers.

      - Soccer field error at Twin Beech resulted in $5 million wasted on soil sanitization
      and grading.

      - Judge Haymes Snedeker responsible for barb wire, chain link fencing butted
      up to Fairhope High School.

      - Burrell hid a Police Report prior to last election.

      - Council currently in Court over Conservation Easement location (Breland property
      preferred but ignored).


      THE PIVOT:

      - Article 2 provides the specific evidence of "self-dealing" and financial loss
      detailed in Article 1.

      - The lie regarding the $20 million land disposal proves Burrell’s refusal to
      accept accountability for his leadership tenure.

      - Financial disparity (Soccer field costs vs Land disposal value) validates
      Article 1 claim that Burrell’s tenure "cost taxpayers millions."

      - Confirms Article 1 accusation regarding Snedeker; Widget confirms Burrell
      appointed him and they favor development over community safety.


      KEY ENTITIES:

      - Jack Burrell (Council President)

      - Haymes Snedeker (Municipal Judge)

      - Mayor Sullivan (New Administration)

      - Tim Kant (Council Member, no-show last meeting)

      - Robert Brown (Resigned Council member)

      - Jay Robinson (Appointed Council Member by Burrell, receiving insurance estimated
      at $100k)

      - Scott Boone (Catalyst instigator, son of Kevin Boone)

      - Kevin Boone (Council Member, linked to Scott and Mayor Sullivan)

      - Cory Martin (Council member)

      - Jimmy Conyers (Likely next Council President candidate)

      - Catalyst (Developer/Organization)'
