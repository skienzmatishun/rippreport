      Mayor Sherry Sullivan allied with "Catalyst/Scott Boone Consulting" political
      cabal.

      Former Mayor Tim Kant held dual role (Mayor + Utility Director), manipulating
      funds for Fly Creek Apartments.

      Former Mayor Karin Wilson unseated Kant, refusing dual utility paychecks and
      separating utilities finances from city accounts.

      Council launched 4-year political vendetta against Mayor Wilson after her reforms
      and grant successes.


      THE DISCOVERY

      Fairhope City Council imposed a 12-month subdivision moratorium under the guise
      of managing "explosive growth."

      Council President Jimmy Conyers admitted: "completed applications will not be
      affected" by the moratorium.

      Specific loophole exposes that developers with completed LLCs/permits (Boone,
      Snedeker) are shielded while new developers face delays.

      Mayor Sherry Sullivan maintains pledge to "Embrace Development" after reclaiming
      utility control from Wilson.

      Current Council bickering and procrastination endangered a 6.2 million waterfront
      project grant secured by Mayor Wilson.


      THE PIVOT

      Widget Article confirms the "political cabal" structure alleged in Main Article
      using a new regulatory tool (Moratorium).

      Conyers’ "completed applications" quote proves the council knowingly allows
      protected interests to bypass growth controls.

      Confirms Main Article claim that Council members and Judge Snedeker represent
      developers who are exempt from their own policies.

      Validates the "Musical Chairs" transition: Control moved from Burrell to Conyers/Sullivan/Boone,
      but corruption mechanism (utility control + zoning deals) remains intact.


      KEY ENTITIES

      Jack Burrell

      Jimmy Conyers (Council President)

      Scott Boone / Catalyst / Scott Boone Consulting

      Sherry Sullivan (Mayor)

      Haymes Snedeker (Municipal Judge/Developer)

      Jay Robinson (Council Member, appointed by Burrell)

      Kevin Boone (Scott Boone''s father/Developer/Councilman)

      Karin Wilson (Former Mayor)

      Tim Kant (Former Mayor)'
