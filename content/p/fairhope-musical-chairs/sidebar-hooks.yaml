      - Widget Article proves Council’s "rubber stamping" and lack of leadership directly
      impact Mayor''s ability to enforce lawful monitoring (per Main Article).


      KEY ENTITIES:

      - Jack Burrell (Council President)

      - Karin Wilson (Mayor)

      - Jimmy Conyers (Banker/Council Member)

      - Kevin Boone / Scott Boone (Catalyst/Developer Ties)

