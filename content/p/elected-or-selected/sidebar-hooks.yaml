  as-long-as-i-count-the-votes-what-are-you-going-to-do-about-it:
    brief: 'THE CONFLICT:

      *   Mayor Tim Kant was selected by former Mayor Jim Nix, who was forced out
      of office due to alleged criminal activity.

      *   Mayor Kant became Mayor in 2000 and holds dual roles as Mayor and paid utility
      director.

      *   Corruption involves questionable municipal lease deals signed by Mayor Kant
      (e.g., a lease for a multimillion-dollar pier with city services for $5,000/year).

      *   Infrastructure projects (performing arts center, Highway 98 status) were
      influenced by Nix and Corte decisions.


      THE DISCOVERY:

      *   A poll watcher observed multiple violations during the August 23, 2012,
      Fairhope municipal elections.

      *   Observations included a lack of control over voting machines and tape certification
      procedures.

      *   Specific violations noted include Tom Odom (an election official) opening
      an absentee voting machine and allowing tapes to be run off for poll watchers.

      *   Voter fraud concerns were raised regarding the security packaging and final
      certification procedures.


      THE PIVOT:

      *   Article 2 provides evidence of specific procedural failures and potential
      manipulation within the election system, directly linking the political structure
      detailed in Article 1 (corruption/control) to the integrity of local government
      elections.

      *   The presence of Kant’s poll watcher, Tom Odom, in election official roles
      suggests direct involvement or complicity in the electoral process described
      in Article 2.


      KEY ENTITIES:

      *   Tim Kant

      *   Jim Nix

      *   Mike Ford

      *   Sherry Sullivan

      *   Tom Odom

      *   Karin Wilson

      *   Lonnie Mixon

      *   Fairhope Elections'
