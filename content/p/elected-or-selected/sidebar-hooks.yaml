hooks:
  as-long-as-i-count-the-votes-what-are-you-going-to-do-about-it:
    brief: 'THE CONFLICT

      *   Former Fairhope Mayor Jim Nix was forced out of office for alleged criminal
      activity in order to ensure political control, leading him to SELECT Tim Kant
      as his replacement.

      *   Mayor Jim Nix and Arthor Corte blocked the Dyas family proposal for a Performing
      Arts Center in The Triangle.

      *   Fairhope City Councilman Boone approved a Municipal lease deal that cost
      taxpayers approximately $400/month (5000 per year) for an established business
      on a multimillion-dollar pier, without a public bid.


      THE DISCOVERY

      *   A poll watcher provided detailed observations from Mayoral Candidate Lonnie
      Mixon''s election on 9/11/2012 regarding alleged voter fraud in Fairhope municipal
      elections.

      *   Tom Odom (City of Fairhope Employee/Fire Marshall and Election Official)
      was noted for opening the absentee voting machine while simultaneously participating
      as a poll watcher for Tim Kant.

      *   The poll watcher requested copies of voting machine tapes from Tom Odom,
      who initially denied them.

      *   Mrs. Culver served as the Election Supervisor on 9/11/2012 and was accused
      of lacking control over the election process.


      THE PIVOT

      *   The Widget Article reveals that key individuals associated with Tim Kant
      (specifically his father-in-law, Tom Odom) were involved in procedural irregularities
      during Fairhope elections in 2012.

      *   This links historical claims of political "selection" and systemic control
      (from Jim Nix to Mayor Kant) directly to documented instances of alleged election
      misconduct by officials embedded within the municipality.


      KEY ENTITIES

      *   Jim Nix

      *   Tim Kant

      *   Lonnie Mixon

      *   Arthor Corte

      *   Sherry Sullivan

      *   Mike Ford

      *   Councilman Boone

      *   Tom Odom

      *   Mrs. Culver

      *   The Triangle (Property Entity)'
