  selected-not-elected:
    brief: "1. THE CONFLICT\n    - Former Mayor Jim Nix was forced out of office due\
      \ to alleged criminal activity.\n    - In response, Nixon selected Tim Kant\
      \ to replace him because he needed a controlled official.\n    - The selection\
      \ led to four terms for Mayor Kant, allegedly resulting in infrastructure decline\
      \ and corruption.\n    - City Council Member Robert Brown resigned (or exited)\
      \ his position; the plan was hatched during an election cycle to appoint Jay\
      \ Robinson, who did not campaign for office, on March 8th, 2021.\n\n2. THE DISCOVERY\n\
      \    - The system utilized by CSB and CATALYST is a pattern of appointing (\"\
      SELECT not ELECT\") public officials—including City Council members, Judges\
      \ (e.g., Jody E. Bishop), and the Sheriff—to bypass democratic election processes\
      \ in Baldwin County.\n    - Robert Brown was replaced by Jay Robinson via appointment\
      \ despite Robinson choosing not to run for office, enabling him to serve interests\
      \ aligned with CSB and Jack Burrell's corruption network.\n\n3. THE PIVOT\n\
      \    - The Main Article asserts that Mayor Kant’s ascent was a specific case\
      \ of being \"SELECTED\" rather than elected by his predecessor Jim Nix.\n  \
      \  - The Widget Article provides the operational blueprint for this selection\
      \ mechanism, demonstrating how CSB and CATALYST execute non-electoral appointments\
      \ (like replacing Robert Brown with Jay Robinson) to ensure loyal control over\
      \ public office in Baldwin County.\n\n4. KEY ENTITIES\n    - Jim Nix\n    -\
      \ Tim Kant\n    - Arthor Corte\n    - Diana Brewer\n    - Mike Ford\n    - Sherry\
      \ Sullivan\n    - Robert Brown\n    - Jay Robinson\n    - Jack Burrell\n   \
      \ - CSB (Chris)\n    - CATALYST\n    - Scott Boone Consulting\n    - Baldwin\
      \ County Commissioners/Commission"
