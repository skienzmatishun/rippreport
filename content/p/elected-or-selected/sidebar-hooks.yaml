      - Mayor Kant / Tim Kant

      - Jim Nix

      - Arthor Corte / Corde

      - Sherry Sullivan (Editor of *Fairhope City Sketches*)

      - Baldwin County Commission / Baldwin County Schools

      - CATALYST / Catalyst political group

      - Scott Boone Consulting / Scott Boone

      - Lynn Stacy

      - Eddie Tyler / Eddie Tyler''s wife

      - John Gray

      - Andrea Lindsey

      - Carrie Hosier

      - Kim Earl

      - Daphne / Haygood (Mayor)

      - Triangle (Land/Property Entity)

      - Mike Ford'
