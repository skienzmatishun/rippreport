      *   Infrastructure assets (Pool, Athletic Center, Nix center, Quail Creek golf
      course clubhouse, library) require major repairs.

      *   Jack Burrell is implicated regarding an airport scandal while serving as
      City Council President and Airport Authority liaison/spokesman.

      *   Mayor Wilson faces resistance from the City Council and personnel claims.


      THE DISCOVERY

      *   Councilmen Boone and Burrell are actively slowing down city business and
      attempting to undermine Mayor Wilson.

      *   Catalyst Associates was formed on August 11, 2014, involving Michael Scott
      Boone and Lynn Stacey.

      *   The Council rejected Mayor Wilson''s choices for the Airport Authority board
      and specific hires.

      *   The Council implemented a hiring freeze and rejected the mayor’s budget
      presentation.


      THE PIVOT

      *   Article 2 identifies Jack Burrell and Councilman Boone as key figures in
      Catalyst, proving their coordinated effort to discredit Mayor Wilson and obstruct
      city governance, which is the core political conflict highlighted in Article
      1.


      KEY ENTITIES

      *   Jack Burrell

      *   Mayor Karin Wilson

      *   Councilmen Boone

      *   Councilmen Burrell

      *   Catalyst Associates (formed Aug. 11, 2014)

      *   Fairhope Schools

      *   Airport Authority

      *   Ray Hick'
