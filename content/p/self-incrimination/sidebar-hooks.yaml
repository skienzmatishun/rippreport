  FAUXHOPE HISTORY:
    brief: 'THE CONFLICT

      *   Jack Burrell was involved in an airport scandal as city council president,
      airport authority liaison, and spokesman for the bid committee.

      *   Mayor Karin Wilson issued a "confidential" letter to the Fairhope City Council
