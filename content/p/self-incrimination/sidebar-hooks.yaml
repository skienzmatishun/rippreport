hooks:
  fairhope-voters-important-notice:
    brief: '1. THE CONFLICT:

      - Pending airport scandal involved Jack Burrell in his capacities as City Council
      President and Airport Authority liaison to Fairhope.

      - Council actions against Mayor Karin Wilson included hiring a freeze following
      two employee firings, rejection of mayoral choices for the Board of the Airport
      Authority, and setting precedents that obstructed city business.

      - Mayor Wilson published a public statement regarding personnel claims, legal
      defense strategy, and council obstruction on June 11th.


      2. THE DISCOVERY:

      - Catalyst Associates was formed August 11, 2014.

      - Catalyst is managed by Michael Scott Boone, Lynn Stacey, and Coley M. Boone
      (registered agent).

      - Catalyst is linked to Elliott and Haygood and serves as an organized political
      group intended to undermine the elected mayor using "dirty tricks" and influencing
      council decisions toward self-serving agendas.


      3. THE PIVOT:

      - Article 1 details Jack Burrell''s decision to leak a confidential letter from
      Mayor Wilson’s attorney regarding the city/council disputes, which creates an
      issue of potential misconduct (self-incrimination).

      - Article 2 proves that Burrell and Councilman Boone are not acting individually
      but are actively supporting an organized political machine (Catalyst) whose
      specific goal is to "grind" the mayor to a halt and force her removal.


      4. KEY ENTITIES:

      - Karin Wilson (Mayor of Fairhope, former Mayor)

      - Jack Burrell (Council President/City Council Member)

      - Michael Scott Boone / Coley M. Boone (Catalyst Managers/Registered Agent)

      - Lynn Stacey (Manager of Catalyst Associates)

      - CATALYST (Political organization formed Aug 11, 2014)

      - Elliott

      - Haygood (Mayor of Daphne)

      - Ripp Report (Author who investigated Burrell’s actions regarding the airport
      scandal and ethics opinion)'
