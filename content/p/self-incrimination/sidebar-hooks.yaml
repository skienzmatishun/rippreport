      City Council led by three council members referred to as the "3 B’s": Jack Burrell,
      Kevin Boone, and Robert Brown (Widget Article).

      - The Main Article alleges Mr. Burrell acted with self-incrimination regarding
      an airport scandal while serving as city council president/airport authority
      liaison (Main Article).

      - Mayor Wilson''s attorney wrote a "confidential" letter to the Fairhope City
      Council outlining complaints against the council and seeking changes in government
      operations; this letter was leaked to press via Gulf Coast News on June 12th
      (Main Article).

      - Burrell, Boone, and Brown were accused of using their elected office for personal
      gain by supporting a political group called CATALYST (Widget Article), which
      is linked to Scott Boone Consulting.

      - The Council’s resistance to Mayor Wilson led to personnel claims against her
      and the city (6 million dollar annual debt reversal/fiscal improvements cited
      in Widget).


      THE DISCOVERY

      - The Widget Article explicitly labels the three incumbents, Jack Burrell, Kevin
      Boone, and Robert Brown as having "betrayed Fairhope" and used their office
      for personal gain.

      - It names CATALYST, which is described as being run by councilman Boone’s son,
      Scott (Widget Article).

      - It alleges that Mayor Wilson successfully stopped the majority of corruption
      within city hall by identifying and eliminating wasteful contractors who represented
      CATALYST (Widget Article).


      THE PIVOT

      - The Main Article presents Jack Burrell''s actions regarding his airport liaison
      duties and subsequent attacks on the mayor as evidence of "self incrimination"
      concerning a pending scandal.

      - The Widget Article validates this political framing by explicitly naming Burrell
      as part of the "3 B’s" who have systematically used their council positions
      (2016–present) to support CATALYST—a group linked directly to the Boons'' business
      interests, thereby proving the council has operated under a shared agenda prioritizing
      personal gain over city interest.


      KEY ENTITIES

      - Jack Burrell (Main Council President 2019–Jun; City Council member/President
      May 2025)

      - Kevin Boone (Councilman)

      - Robert Brown (Former Councilman)

      - Karin Wilson (Mayor of Fairhope, AL)

      - CATALYST (Political organization / Scott Boone Consulting connection)

      - Jack Burrell''s Airport Authority liaison role.

      - The "3 B’s" (Burrell, Boone, Brown).'
