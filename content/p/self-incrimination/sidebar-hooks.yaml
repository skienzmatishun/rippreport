      Hick application for an ethics opinion to investigate The Ripp Report or the
      reporter personally.

      *   The Mayor (Karin Wilson) posted a public statement on June 11th detailing
      personnel claims against her and stating that City records and Council meetings
      remain open, though an Executive Session was planned for litigation/marina lease.


      THE DISCOVERY

      *   The Widget Article asserts that previous management under Mayor Karen Wilson
      (circa 2016-2020) neutralized city contracts and she forgave two salaries ($90k/$60k
      historical pay).

      *   It claims the current administration has reversed these gains, specifically
      by hiring an experienced Utility Operations Director.

      *   The Widget Article details that City Council repeatedly cut infrastructure
      funding in budgets from 2017 (Sewer/Electric/Water), 2018, and 2019, despite
