      engineer with an unqualified hire, and he threw out the original waterfront
      project, inflating its cost from $6.3 million to $10 million. Burrell also accepted
      $500 from Jade Consulting for a pending development project.


      THE PIVOT

      Article 2 provides specific evidence (e.g., double dipping, project cost inflation,
      employee firings) that proves Jack Burrell is not merely an obstructionist but
      is actively engaged in systemic corruption and financial mismanagement, which
      explains the deep-seated problems cited in Article 1 regarding infrastructure
      neglect and hindering city progress.


