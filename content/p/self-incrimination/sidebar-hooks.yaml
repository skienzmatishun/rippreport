      upgrades.


      THE PIVOT

      *   The Widget Article challenges the narrative of systemic neglect used in
      the Main Article by providing specific historical evidence that City Council
      itself systematically cut critical infrastructure funding between 2017 and 2019
      when it was needed, contrary to Burrell''s claims of generalized council inaction.

      *   It recontextualizes Mayor Wilson’s previous tenure not as "denial of facts,"
      but as a period where she allegedly curtailed "good ole boy" connections regarding
      city contracts before the current administration took power.


      KEY ENTITIES

      *   Jack Burrell (Council President, Airport Authority Liaison)

      *   Karin Wilson (Mayor of Fairhope)

      *   The Ripp Report (Investigative Reporter/Non-profit Association)

      *   City Council (Collective body of Fairhope government)

      *   Mr. Ray Hick (Recipient of ethics opinion investigation)

      *   Fairhope Schools (Mentioned for failing to rank in top 25)'
