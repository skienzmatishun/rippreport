  fairhope-council-shows-its-colors:
    brief: 'THE CONFLICT

      * Jack Burrell, while serving as City Council President and Airport Authority
      liaison to the city of Fairhope, simultaneously served on the airport authority
      bid committee.

      * In this capacity, Burrell supported hiring an attorney firm to represent Mr.
      Ray Hick in an ethics opinion investigation targeting The Ripp Report or PI
      personally.

      * Mayor Karin Wilson posted a public statement on June 11th detailing personnel
      claims against her and the City, defending the use of IT department monitoring
      and citing resistance from the council.

      * On June 12th, Jack Burrell leaked a confidential letter written by the mayor’s
      attorney to the Fairhope City Council outlining the mayor''s complaints to Gulf
      Coast News.


      THE DISCOVERY

      * Over 800 Fairhope citizens successfully petitioned for a change in government
      form (Council-Manager).

      * This petition was accepted as valid by the probate judge, triggering a required
      90-day period leading up to an election that circumvents the city council structure.

      * Mayor Karin Wilson announced via Facebook that the special election previously
      scheduled for October 2nd has been delayed until the general election on November
      6th.


      THE PIVOT

      * The previous conflicts—including accusations of obstruction, political stalling
      by the council, and resistance to change (Article 1)—are revealed as the primary
      motivation for citizens bypassing the governing body entirely through a constitutionally
      recognized petition process (Article 2).

      * Article 2 confirms that the "recalcitrant" City Council mentioned in Article
      1 is actively being circumvented by an organized citizen movement led by over
      800 signatures.


      KEY ENTITIES

      * Jack Burrell: City Council President / Airport Authority liaison

      * Karin Wilson: Mayor of Fairhope

      * Mr. Ray Hick: Subject of ethics investigation

      * The Ripp Report (Mr. Ripp)

      * Gulf Coast News

      * Catalyst Council

      * Judge of Probate''s office

      * Dates: June 11th, June 12th, October 2nd, November 6th'
