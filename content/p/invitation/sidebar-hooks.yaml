      - Project total cost is confirmed as $6.2 million using RESTORE Act funds, which
      requires monetary and standard auditing.


      THE PIVOT:

      - Article 2 exposes Howell Raines'' direct bureaucratic involvement (letter
      to Council President Jack Burrell), validating Article 1’s claim that the situation
      involves political "opportunist[s]" rather than simple municipal oversight.

      - Article 2 quantifies Mayor Wilson’s engagement ("10 fold the public participation,
      regarding meetings or written surveys"), contradicting claims of silence and
      proving Wilson’s current "invitation" (Article 1) is a continuation of documented
      prior engagement, not new transparency.

      - Article 2 proves Raines (a vocal critic) is now demanding vetting while being
      involved in the prior distortions ("Howling attacks the plan, the grant... Howling
      Raines should also get credit for his contribution of distorting the facts"),
      creating a conflict of interest link between Article 1’s political accusations
      and Raines’ stated demands.


      KEY ENTITIES:

      - Mayor Wilson (Fairhope)

      - Howell Raines ("Howling" / Mr. Raines)

      - Jack Burrell (Council President)

      - Sullivan (Addressed in letter with Raines'' concerns)

      - Fairhope City Council (Specifically the "three B''s" and new administration
      post-election)

      - RESTORE Act (Bureau of Resources & Ecosystem Sustainability / BP Oil Spill
      Funds)

      - City of Fairhope'
