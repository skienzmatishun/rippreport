      - Accusations that Council avoided public participation during the initial 2.6
      million dollar recreation property purchase decision.

      - Allegations Council (specifically "three B''s") changed the city’s financial
      status from a 1.7 million dollar surplus to a 1.2 million dollar deficit via
      the recreation property purchase.

      - Council approved $500,000 in engineering design funds for the Waterfront project.

      - Public frustration citing lack of transparency and perceived corruption compared
      to previous terms (Fly Creek apartments reference).


      THE DISCOVERY:

      - Howell Raines sent a letter to "Sullivan and Council President Jack Burrell"
      stating the proposal will not be fully vetted by citizens prior to council approval.

      - Data indicates 18 months of bureaucracy and hundreds of citizen participation
      meetings occurred before the municipal elections.

      - Following the municipal elections ("new administration"), plan shifted from
