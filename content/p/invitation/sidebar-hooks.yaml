hooks:
  where-hell-were-you:
    brief: 'THE CONFLICT:

      - City Council (specifically Boone, Brown, Burrell) purchased $2.65 million
      recreation property; moved surplus from 1.7M to 1.2M deficit.

      - Recreation property site near airport selection allegedly based on race (moved
      away from Black neighborhood).

      - Council refused public participation rights during Federal Lawsuit; lost lawsuit
      (set precedent for similar U.S. cases).

      - Sewer infrastructure delays and K1 Center purchase without plan/roof repairs
      (costs tens of thousands).

      - Council voted themselves raises and full family insurance; no other employees
      received full insurance.

      - Current conflict: Mayor Wilson announces Waterfront project participation
      meeting (June 18 statement); Council claims transparency yet Ripp Report alleges
      repeated failures to listen.


      THE DISCOVERY:

      - Howell Raines (NYT ex-executive) cited in Lagniappe articles discussing Waterfront
      project; Ripp Report alleges he ignores prior corruption context.

      - Article 2 confirms specific Ripp Report history of Council’s "corruption and
      self serving" actions dating back to 2016.

      - Raines accused by Boone and Brown as "carpetbagger."

      - Article 2 proves Council members (Boone, Brown) bought recreation land and
      are directly involved in current Waterfront discussions they claim public distrusts.


      THE PIVOT:

      - Article 2 validates Article 1’s warnings by exposing specific past failures
      (Fly Creek, K1 Center) matching the Council''s current behavior.

      - Article 2 links Howell Raines to Council corruption directly: Boone/Brown
      labeled him "carpetbagger" after he wrote about the project.

      - Article 2 proves those who criticize current Waterfront process "never attended
      meetings" matches the Federal Lawsuit precedent where citizens were denied speaking
      rights.

      - Article 2 connects the "Three B''s" recreation land purchase directly to current
      attempts to kill or change $6.2M BP-funded grant (which Council previously pushed
      back on for "political capital").


      KEY ENTITIES:

      - Kevin Boone (Councilman).

      - Robert Brown (Councilman).

      - Mayor Wilson.

      - Burrell (Councilmember "Three B''s").

      - Howell Raines.

      - Fairhope City Council.

      - Lagniappe (Fairhope newspaper).

      - The Ripp Report.

      - BP (2010 spill funding source).'
