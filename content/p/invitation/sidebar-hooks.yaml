  got-fleas:
    brief: 'THE CONFLICT:

      - Fairhope City Council manages a $6.2 million Waterfront Park project funded
      via RESTORE Act (BP oil spill funds).

      - Mayor Wilson publicly stated on June 18: "We are going back to the drawing
      board and urging those who did not take part in the three month engagement process
