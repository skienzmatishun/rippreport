  fairhope-waterfront:
    brief: 'THE CONFLICT:

      - Fairhope Mayor Wilson invited citizens to participate in the next presentation
      of a Waterfront project on June 18.

      - Residents allege City Council avoided public participation for the initial
      purchase of a 2.6 million dollar recreation property, despite public outrage.

      - Council voting on this purchase allegedly changed the city’s financial bottom
      line from a 1.7 million dollar surplus to a 1.2 million dollar deficit.

      - Residents claim Council members secured raises and full family insurance,
      privileges other employees do not have.

      - Council approved $500,000 for engineering design and pushed back on the project
      solely for political capital prior to Municipal elections.

      - Council members who recently opposed the project admitted they never attended
      any Waterfront meetings and first heard about it through media coverage.

      - Public office qualification period for City Council and Mayor runs from July
      7 to July 21.


      THE DISCOVERY:

      - Article 2 confirms the City Council approved $500,000 for engineering and
      conceptual plans based on initial community input.

      - Article 2 states 493 people filled out project questionnaires and dozens attended
      initial meetings.

      - Goodwyn Mills & Cawood held a press conference at Fairhope City Hall to dispel
      misconceptions about the project.

      - Project is a 6.2 million dollar grant awarded by BP; Fairhope is the only
      municipality on the Eastern Shores to receive such funding.

      - Article 2 confirms Council spent $2,650,000 for recreation property without
      any public participation.

      - Article 2 asserts Mayor Wilson claims citizens were unfamiliar with a "two
      year old proposal" to discredit them.

      - Residents are urged by Fairhope Now and others to attend meetings before passing
      judgment on rumors or political antics.


      THE PIVOT:

      - Article 2 validates the "corruption" and lack of transparency allegation in
      Article 1 by confirming Council spent $2,650,000 on property without public
      participation.

      - Article 2 confirms the financial scale ($6,200,000 grant, $500,000 engineering)
      making the political allegations in Article 1 significant rather than speculative.

      - Goodwyn Mills & Cawood’s intervention proves the project has an external driving
      force, contradicting claims in Article 1 that political opportunists are the
      sole drivers.

      - Both articles confirm the Mayor is using public interest ("invitation") to
      manage fallout from a project where Council already admitted (in Article 2)
      they are the ones running "rouge."


      KEY ENTITIES:

      - Mayor Wilson

      - City Council (CATALYST council)

      - Goodwyn Mills & Cawood

      - BP

      - Fairhope Now

      - Lagniappe Mobile / The Ripp Report (Media sources)

      - Fly Creek apartments (Reference location/controversy)'
