  alabama-black-hole:
    brief: |-
      THE CONFLICT:
      - Date: July 2, 2021 (initial public report).
      - Subject: Tom Albritton, Executive Director of Alabama Ethics Commission.
      - Allegation: “Self-stealing” from the Mabel Amos Trust while overseeing ethics.
      - Specifics:
        - Albritton’s children received more scholarship money than relatives of Mabel Amos.
        - Records show Albritton and Regions Bank altered handling of the trust; began listing schools receiving scholarships instead of students by name in 2014.
        - Trust was originally intended for children with strong academic history lacking financial capability; beneficiaries included out-of-state students from prominent families.
      - Outcome: Initial complaints against Albritton by Francis Paul Ripp ignored by officials.

      THE DISCOVERY:
      - Date: August 21, 2022 (Ripp formal letter).
      - Documented follow-up to July 16, 2021 complaint.
      - Ripp sent evidence and a 100-page bound copy to Office of Special Prosecutions, AG Clark Morris.
      - Agencies involved (AG, Bar Association, Ethics Commission) provided no replies or action by August 2022.
      - Evidence of cover-up: Ethics Executive Director Cynthia Raulston defended Albritton via telephone in Jan 2022, claiming scholarships had expired by statute of limitations and attempting to discourage Ripp from filing complaints.
      - Evidence of misdeeds:
        - Trustee Albritton failed to disclose his multi-million dollar trust role on economic statements prior to appointment.
        - Circuit Judge Ben Bowden, Albritton's former law partner, received $45,000 for children’s scholarships.
        - Regions Bank charged over $1 million in fees managing the Mabel Amos trust.

      THE PIVOT:
      - Article 2 is the 'smoking gun' because it transforms rumors from Article 1 into documented, formal complaints.
      - Proves Ripp actively pursued legal recourse (Writ of Mandamus, Special Prosecutions) for the issues Article 1 raised.
      - Shows state agencies are non-responsive or colluding (no replies from AG Morris, Bar Association).
      - Shows Cynthia Raulston directly participated in defense of Albritton regarding the trust violations mentioned in Article 1.

      KEY ENTITIES:
      - Francis Paul Ripp (Owner, The Ripp Report)
      - Tom Albritton (Executive Director, Alabama Ethics Commission; Trustee)
      - Cynthia Raulston (Attorney for Albritton; Trustee; Ethics Commission Staff)
      - Clark Morris (Alabama Attorney General)
      - Steve Marshall (Special Prosecution Office Head referenced in letter)
      - Ben Bowden (Circuit Judge; Albritton's former law partner)
