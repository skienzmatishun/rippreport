        - Jack Burrell bid-rigging at Fairhope "Jack Burrell Airport".
        - Robert Brown awarded himself $300,000+ contract while on Fairhope Art Center board.
      - Director Tom Albritton accused of using trust funds he oversees to pay children’s tuition.

      2. THE DISCOVERY
      - Richard Fording (U Alabama Political Science, Elmore Professor) investigated Mabel Sanders Amos Scholarship Trust.
      - Found AEC Director Tom Albritton’s two children received $105,000 total in tuition/scholarships through 2018.
      - Funds sourced from Mabel Sanders Amos Trust overseen by Albritton as AEC Director.
      - IRS Section 4941(d) explicitly prohibits "self-dealing" (using foundation assets for trustee’s children).
      - Regions Bank collected >$1 million in fees managing the fund.
      - Only ~$500 donated historically to Tuskegee University for African American community benefit.

      3. THE PIVOT
      - Widget (Lagniappe) article provides evidence proving Main Article claim of "Self Stealing".
      - Confirms Tom Albritton violates mission statement he enforces (IRS rules vs personal benefit).
      - Proves AEC’s "immunity" loophole protects Director from self-dealing charges.
      - Bridges abstract accusation of corruption to specific $105,000 tuition scandal.

      4. KEY ENTITIES
      - Tom Albritton (Director, Alabama Ethics Commission).
      - Gregory Albritton (Mentioned in Main Article tweet as Head of AEC).
      - Richard Fording (U Alabama Political Science, Prof).
      - Francis Paul Ripp (@RIPPREPORT).
      - Boom Boom Pittman (Last State Senator, $750k skimmer).
      - Jack Burrell.
      - Robert Brown.
      - Regions Bank (Trust Fund Manager).
      - Alabama Ethics Commission.
