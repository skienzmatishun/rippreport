      - City fired a qualified utility engineer, reverting to model similar to former
      Tim Kant administration.

      - Council approved change for Hawthorne Glenn electric substation from ABC store
      commercial area to residential subdivision against comprehensive plan.

      - City purchased 114 acres near Airport for $2.65 million, leased to farmer
      for $9,000/year; airport loses money annually.

      - City raided Utility Fund $3 million to pay Triangle lawsuit they lost.

      - Airport Authority meetings not video recorded for public access since February;
      specific transparency removed under Burrell.

      - City leased K-1 center to FEEF for 25-year term at $1/year cost; building
      deteriorated after purchase.

      - City spent $300,000 to $500,000 on Airport with no dollar in return.


      THE DISCOVERY

      - Article 2 confirms specific resolution details: Resolution 11 approved Certificate
      of Amendment for Airport Authority (Title 4, Chapter 3, Article 2 Code of Alabama).

      - Article 2 specifies Airport meetings have not been taped since February.

      - Substation land deal: City bought 2.9-acre property April for $40k; list price
      was $290,000.

      - Seller: Kathy Hoffren netted ~$19,000; had $200k mortgage on property.

      - Kathy Hoffren (seller) previously circulated petition asking former Mayor
      Karin Wilson to resign.

      - K-1 lease finalized May 24 with FEEF; city seeking grant money that could
      be denied.

      - Airport resolution proposes allowing board members from feeder pattern instead
      of just corporate limits.


      THE PIVOT

      - Article 2 provides documentary evidence for lack of transparency in Airport
      governance claimed in Article 1 (no recordings since Feb).

      - Article 2 connects the underpriced substation land deal ($40k vs $290k) to
      specific political motive (Kathy Hoffren petitioning Karin Wilson to resign).

      - Article 2 exposes the "political payback" intent behind ignoring the Hawthorne
      Glenn comprehensive plan for substation location, validating claims of lack
      of ethics in Article 1.

      - Resolution 11 changes Airport Authority composition rules, confirming Burrell’s
      control over who runs the entity (feeder pattern vs. corporate limits).


      KEY ENTITIES

      - Jack Burrell

      - Karin Sullivan

      - Kathy Hoffren

      - Karin Wilson

      - Tim Kant (former benchmark)

      - FEEF

      - Paul Ripp (Consumer Advocate)

      - Baldwin County Economic Alliance

      - FAA'
