hooks:
  no-radar:
    brief: 'THE CONFLICT

      - Jack Burrell monopolized Fairhope City Council Presidency for 9 years (3 terms),
      refusing term sharing.

      - Burrell and Mayor Sullivan appointed Mayor Sullivan to Utility Director; she
      has High School education with no utility experience.

      - City fired qualified utility engineer to install Sullivan in the role despite
      "No Experience" being required only for her.

      - Fairhope lost a Federal lawsuit where Burrell threatened arrest and removal
      of an inquirer (Ripp) for exercising public speech rights.

      - Fairhope Airport Authority meetings stopped being recorded/online since February
      after Mayor Wilson demanded transparency.

      - Burrell brokered a deal for 114 acres near Airport for $2.65M, leased to farmer
      for $9k/year despite city lack of funds.

      - Triangle lawsuit resulted in city raiding utility fund $3M to pay judgment
      they already lost.


      THE DISCOVERY

      - Article 2 reveals City Attorney Marcus McDowell works for Council/Burrell,
      facilitating lack of oversight.

      - Airport Authority sent RFP for commercial hangar (Plat 2) Sept 21, 2015 with
      only 22-day submittal window to Oct 13, 2015.

      - Article 2 confirms Burrell denied Ripp’s right to speak in a public forum,
      costing taxpayers thousands in the Federal loss.

      - Current lack of Airport Authority video records is confirmed as a "stunt"
      following Wilson’s demand for transparency.

      - Burrell expedited removal of Council member Robert Brown after property purchase
      became public (July 21, 2020).

      - Burrell used City Council meeting to swear in Municipal Judge Haymes Snedeker,
      bypassing standard procedures ("quarterback sneak").


      THE PIVOT

      - Article 2 provides legal confirmation for Article 1’s claim of corruption:
      The Federal lawsuit loss proves a pattern Burrell ignores when silencing records/oversight.

      - Article 2’s specific RFP timeline (Sept/Oct 2015) provides the "smoking gun"
      evidence supporting Article 1’s allegation of bid rigging at the Airport.

      - The connection between Marcus McDowell (City Attorney) and Burrell explains
      how Article 1’s allegations of "no oversight" are being legally enabled.

      - Wilson’s forced transparency measures at the Airport (mentioned in Art 1 context
      of control) were reversed, matching Burrell’s current "NO RADAR" tactic.


      KEY ENTITIES

      - Jack Burrell (Council President)

      - Mayor Sullivan

      - Marcus McDowell (City Attorney)

      - Kevin Boone (Councilman/"Strawman")

      - Haymes Snedeker (Municipal Judge)

      - Robert Brown (Council Member candidate/Property owner)

      - Fairhope Airport Authority

      - Mayor Wilson'
