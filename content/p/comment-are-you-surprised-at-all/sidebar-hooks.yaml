      decisions.

      *   Executive Director Michael Hartigan has been employed by the Mobile Area
      Council since January 2009 with a salary/benefits of over $150,000 without raising
      additional funds or bringing in money since that date.

      *   Audits for Boy Scouts suggest a possible kickback scheme involving local
      accounting firms like Russell, Thompson, Butler and Houston, LLC (3605 Springhill
      Park, Mobile, AL 36608).


      THE DISCOVERY:

      *   The current political climate in Fairhope is characterized by a "blast from
      the past" where former City Council members and fired employees are uniting
      to reshape the city''s government.

      *   Proposed change involves moving away from at-large elections (which Catalyst
      utilizes) toward a council/manager form of government with three district seats,
      aimed at increasing accountability for City officials like Jack Burrell.

      *   Councilman Robert Brown faces current ethics charges in Fairhope after securing
      soccer field and pool contracts and awarding the Art Center bid to himself and
      construction partner Cliff Pittman, demonstrating internal conflicts of interest
      within city governance.


      THE PIVOT:

      *   The Main Article establishes a pattern of corruption (misuse of Boy Scout
      funds, failed oversight by politicians) while the Widget Article identifies
      specific individuals who have held power in Fairhope—like Jack Burrell and Robert
      Brown—who are currently using that entrenched power structure to perpetuate
      self-dealing and avoid accountability.

      *   The failure of state/federal representatives like Byrne, Pittman, and Dorsey
      to act on past Boy Scout financial mismanagement mirrors the current alleged
      ethical failures and contract schemes happening within Fairhope City Council
      (e.g., Brown''s Art Center bid).


      KEY ENTITIES:

      *   Bradley Byrne

      *   Tripp Pittman

      *   Tucker Dorsey

      *   Phil Webb

      *   Michael Hartigan

      *   Russell, Thompson, Butler and Houston, LLC

      *   Jack Burrell

