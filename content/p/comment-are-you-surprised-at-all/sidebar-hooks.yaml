hooks:
  fairhope-voters-important-notice:
    brief: 'THE CONFLICT

      *   Allegations regarding financial mismanagement within the Mobile Area Council
      Boy Scouts (BSA) over a three-year period (2014, 2015, 2016).

      *   The Main Article alleges BSA lost over $750,000 during this time.

      *   Michael Hartigan was Executive Director of the Mobile Area Council Boy Scouts
      since January 2009, earning a salary and benefits of over $150,000 annually
      despite lack of fundraising efforts.

      *   The Main Article accuses Board President Phil Webb (Fairhope resident/Rotary
      Club member) of mismanagement regarding BSA finances.

      *   Allegations exist concerning excessive audit fees charged by Russell, Thompson,
      Butler and Houston, LLC ($40,000+ per year vs. much lower market rates).

      *   Political figures Bradley Byrne, Pittman, and Tucker Dorsey allegedly knew
      about the financial losses for over two years but failed to act.

      *   Prior to Mayor Wilson’s election in Fairhope, powerful political groups
      like those involving Elliott, Haygood, and Stacy maintained local dominance
      through organizational structures.


      THE DISCOVERY

      *   The Widget Article identifies Catalyst Associates as a politically organized
      group opposing the elected government of Fairhope (specifically targeting Mayor
      Wilson).

      *   Councilmen Boone and Burrell are specifically identified as using this opposition
      to slow down city business and undermine the mayor.

      *   Catalyst Associates was formed on August 11, 2014, with Michael Scott Boone
      and Lynn Stacey listed as managers.

      *   Coley M. Boone (son of Councilman Boone) is named as Catalyst''s registered
      agent.


      THE PIVOT

      *   The Main Article establishes a pattern of systemic negligence and alleged
      financial impropriety involving local government oversight figures and large
      external organizations (Russell, Thompson, Butler and Houston, LLC; BSA).

      *   Article 2 identifies the specific political vehicle—Catalyst Associates—that
      is actively weaponized by politically connected council members (Boone and Burrell)
      to subvert elected officials like Mayor Wilson within the same local government
      structure that supposedly failed to prevent financial waste/corruption detailed
      in Article 1.


      KEY ENTITIES

      *   Phil Webb (Fairhope, Al.) - BSA Board President; alleged mismanagement of
      $750k loss.

      *   Michael Hartigan - Executive Director of Mobile Area Council Boy Scouts
      since Jan 2009.

      *   Bradley Byrne - Politician alleged to have knowledge and inaction regarding
      BSA losses.

      *   Pittman (and Tripp Pittman) - Former State Senator/Politician alleged to
      have knowledge and inaction regarding BSA losses.

      *   Tucker Dorsey - Commissioner/Former County Commissioner; political figure
      allegedly aware of financial issues at BSA.

      *   Russell, Thompson, Butler and Houston, LLC - Accounting firm cited for excessive
      audit fees in the BSA scandal.

      *   Catalyst Associates - Political organization formed Aug 11, 2014, used to
      oppose Mayor Wilson.

      *   Boone (Michael Scott) & Boone (Coley M.) - Managers/Registered Agent for
      Catalyst; Michael is Councilman Boone''s son.

      *   Councilman Boone & Councilman Burrell - City council members actively alleged
      to be slowing down city operations against the mayor.

      *   Mayor Wilson - Current Fairhope Mayor targeted by the political opposition
      (Catalyst).'
