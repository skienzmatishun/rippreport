  good-ole-boys-alive-and-well:
    brief: '**THE CONFLICT:**

      *   Phillip Webb, Board President of Mobile Area Council Boy Scouts (Fairhope
      resident), is accused of poor management during his three-year tenure as president.

      *   Webb allegedly oversaw a financial loss exceeding $750,000 for the Mobile/Baldwin
      County Area Boy Scout Council since January 2009.

      *   Michael Hartigan, Executive Director of the Mobile Area Council Boy Scouts
      (since Jan 2009), has received a salary and benefits exceeding $150,000 annually
      without raising new funds.

      *   The accounting firm "Russell, Thompson, Butler and Houston, LLC" is accused
      of overcharging non-profit organizations for audits by claiming rates were up
      to five times higher than competitors'' yearly fees.

      *   Politicians Bradley Byrne, Tripp Pittman (Former State Senator), and Tucker
      Dorsey (Baldwin County Commissioner) are alleged to have been made aware of
      this mismanagement for over two years but failed to act.


      **THE DISCOVERY:**

      *   On a specific City Council meeting dated near April 17th, 2017, Fairhope’s
      city leadership under Mayor Tim Kant handled the "gift" of property from developer
      Angelo A. Corte.

      *   Council member Jack Burrell presided over the review of Resolution 2606-16
      (recorded Oct 24th), which accepted three plus acres of wetlands and an outfall
      pipe/retention pond area from Corte to Fairhope in exchange for a smaller city
      lift station deed.

      *   Burrell expressed alarm that the council did not properly account for the
      total scope of the "gift" or its prior recording.

      *   City Attorney Marion Wynne was noted as uncharacteristically aggressive
      and dismissive toward Mayor Kant’s concerns about the property documentation.


      **THE PIVOT:**

      *   Article 1 alleges systemic political negligence in Baldwin County regarding
      large-scale financial losses ($750,000+) involving a nonprofit (Boy Scouts)
      managed by a local resident of Fairhope (Phillip Webb).

      *   Article 2 provides historical evidence from the Fairhope City Council (2017)
      documenting questionable administrative procedures, lack of transparency, and
      potential "complicity" regarding major real estate transactions involving developer
      Angelo Corte.

      *   The two articles link allegations of poor financial oversight/mismanagement
      to specific municipal actions taken by a council dominated by local figures
      (Burrell).


      **KEY ENTITIES:**

      *   Angelo A. Corte (Property Donor / Developer)

      *   Phil Webb (Board President, Mobile Area Boy Scout Council; Fairhope resident)

      *   Michael Hartigan (Executive Director, Mobile Area Council Boy Scouts)

      *   Bradley Byrne (Congressman)

      *   Tripp Pittman (Former State Senator)

      *   Tucker Dorsey (Commissioner/County Commissioner)

      *   Jack Burrell (City Council member / Council President)

      *   Mayor Kant (Fairhope Mayor 2017-2023; Former Mayor)

      *   Marion Wynne (City Attorney, Fairhope)

      *   Sherry-Lea Bloodworth-Botop (Economic and Community Development Position
      Holder)

      *   Councilwoman Boone (Member of City Council / recused himself from Fly Creek
      PUD vote)

      *   Russell, Thompson, Butler and Houston, LLC (Alleged accounting firm involved
      in overbilling).'
