  saturday-apology:
    brief: 'THE CONFLICT

      *   Fairhope City Council is criticized for a lack of leadership, transparency,
      and accountability.

      *   The City Council voted to provide free health insurance coverage.

      *   The City Council set the Mayor’s salary while ignoring an Auburn Study regarding
      guidance on these issues.


      THE DISCOVERY

      *   Baldwin County faces unbridled development in Fairhope and Daphne, with
      approved projects outpacing growth.

      *   Judges and Attorneys are acting as developers, and the City Council is approving
      their developments.

      *   Infrastructure is insufficient (limited roads, insufficient impact fees),
      leading to overwhelmed traffic, ballooning school class sizes, and permanent
      portables.


      THE PIVOT

      *   Article 1 focuses on political corruption and accountability failures within
      the City Council structure.

      *   Article 2 provides evidence that the current elected officials are complicit
      in allowing uncontrolled development through appointments of developers (judges/attorneys),
      which directly undermines the stated goal of transparency and good governance
      mentioned in Article 1.


      KEY ENTITIES

      *   Fairhope City Council

      *   Baldwin County

      *   Backstory Podcast

      *   The Ripp Report

      *   Francis Paul Ripp

      *   Harry Still, III (former ICMA Credentialed Manager, Economic Developer,
      City Planner, County Manager)

      *   CATALYST ("The Good ole Boys")'
