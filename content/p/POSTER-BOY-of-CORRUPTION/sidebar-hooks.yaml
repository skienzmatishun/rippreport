hooks:
  alabama-attorney-general:
    brief: 'THE CONFLICT:

      - Tom Albritton serves as Executive Director of the Alabama Ethics Commission
      with a public salary exceeding $100,000.

      - The Mabel Amos Scholarship Trust originally held $500,000 but grew to $4.1
      million by 2011 after oil was discovered in 2010.

      - The Ripp Report (Francis Paul Ripp) and Lagniappe Mobile alleged Albritton
      used the trust as a personal "piggy bank."

      - Specific allegations from Article 1: Albritton and co-trustees awarded themselves
      benefits; he lobbies against ethics rule changes while accused of violating
      them.

      - Ripp filed complaints with the Alabama Bar and Ethics Commission regarding
      fraud and mismanagement involving Albritton.

      - Initial legal pressure led to a lawsuit that resulted in Allen Dodd being
      appointed Deputy Alabama Attorney General.


      THE DISCOVERY:

      - Article 2 confirms Albritton, as a trustee, awarded $135,000 to his own children
      for University of Texas education.

      - Article 2 confirms Regions Bank, a trustee, took approximately $1 million
      in fees for "inflated services."

      - Article 2 confirms a third trustee, Rick Clifton, financially benefited from
      the trust.

      - Article 2 verifies Albritton’s salary was raised to $210,000 a year.

      - Article 2 details specific counsel involved in the conflict: Tommy Gallion
      representing Megan Carmack (Mabel Amos family member); Bryon Mathews representing
      Tyra Lindsey (student barred from applying due to lack of transparency).

      - Article 2 confirms complaints regarding Albritton''s conduct submitted by
      The Ripp Report to the Ethics Commission and Alabama Bar were dismissed.

      - Article 2 notes mandamus motions filed by Ripp received no hearing.


      THE PIVOT:

      - Article 2 proves the "Poster Boy" corruption claims in Article 1 were not
      merely opinion; it provides specific financial proof of self-enrichment ($135k
      for children).

      - Article 2 validates the conflict of interest: Albritton directs complaints
      to his own Ethics Commission; Ripp notes Article 1''s claim of him lobbying
      against ethics changes while earning record raises.

      - Article 2 links the abstract "fraud" claims in Article 1 to concrete litigation
      outcomes (Dodd appointment, specific defense counsel Ashby Pate representing
      Albritton).

      - Article 2 reveals the systemic cover-up: The Ethics Commission dismissed Ripp''s
      complaints; Alabama Bar dismissed wrongdoing claims despite $100 pages of evidence
      provided.


      KEY ENTITIES:

      - Tom Albritton (Alabama Ethics Commission Executive Director, Mabel Amos Trust
      Trustee)

      - Francis Paul Ripp (The Ripp Report founder)

      - Matt Simpson (State Rep, Ethics and Finance Committee Chair)

      - Mabel Amos Scholarship Trust

      - Regions Bank (Trustee entity, cited taking $1M)

      - Allen Dodd (Deputy Alabama Attorney General)

      - Ashby Pate (Attorney representing Albritton/Clifton)

      - Rick Clifton (Trustee, 3rd trustee)

      - Tommy Gallion (Attorney for Megan Carmack)'
