  TOP-TO-BOTTOM-CORRUPTION:
    brief: 'THE CONFLICT

      - Tom Albritton, Executive Director of Alabama Ethics Commission, receives $100,000+
      annual salary.

      - Albritton Law Firm in Andalusia established the Mabel Amos Memorial Fund (MAMF)
      charitable trust.

      - Albritton and Rick Clifton became board members for the MAMF trust.

      - 2011: Crude oil discovered on land owned by the MAMF trust in Conecuh County.

      - 2013: Millions of dollars began flowing into the MAMF trust.

      - Albritton’s two children received $120,000 in tuition at the University of
      Texas over six years from MAMF funds.

      - This distribution is classified as “self-dealing,” which is forbidden by law
      and the trust’s own language.

      - Albritton was appointed Executive Director of Alabama Ethics Commission shortly
      after his children began receiving these scholarships.

      - Albritton is currently lobbying against changes in Alabama Ethics Rules despite
      allegations of being the primary offender.


      THE DISCOVERY

      - Lagniappe confirms Alabama Attorney General Steve Marshall filed a motion
      to join the MAMF civil lawsuit, claiming his office has standing.

      - In that motion, Marshall openly accused Albritton of both fraud and self-dealing
      (criminal offenses).

      - Tyra Lindsey, a high school student, petitioned to join the case as representative
      for eligible scholarship students.

      - Attorney Byron Mathews, Jr., representing Lindsey, filed motions adding Albritton
      and the board as defendants.

      - Mathews requested courts force Regions Bank to divulge names of all scholarship
      recipients since 2014, after IRS 990 tax filings stopped disclosing them.

      - Regions Bank officer John Bell sat on the MAMF board alongside Albritton.

      - Marshall’s office reversed course and asked the court to toss Lindsey out
      of the case.

      - Judge Johnny Hardwick, overseeing the civil case, has not ruled on almost
      any of the 70+ motions filed so far.

      - Marshall’s office faces allegations of conflicts: paid millions to same lawyers
      representing Regions, while also facing criticism over campaign cash from those
      involved.


      THE PIVOT

      - Article 1 claims Albritton is unethical but lacks concrete evidence of the
      timeline.

      - Article 2 provides specific dates linking Albritton’s personal financial gains
      (children''s scholarships) directly to his later position overseeing state ethics.

      - Article 2 proves AG Steve Marshall has been aware: he filed public motions
      calling Albritton’s actions criminal fraud before seemingly dropping them.

      - Article 2 exposes the leverage: Albritton’s legal victory over Marshall (regarding
      Brady/evidence disclosure) likely pressured Marshall regarding the Lindsey motion.

      - Article 2 connects Regions Bank and its lawyers to Marshall, suggesting political
      maneuvering rather than standard oversight.


      KEY ENTITIES

      - Tom Albritton (Ethics Director, Trust Board Member)

      - Rick Clifton (Albritton Law Firm, Trust Board)

      - Steve Marshall (Alabama Attorney General)

      - Mabel Amos Memorial Fund (MAMF)

      - Regions Bank / John Bell

      - Tyra Lindsey (Petitioner Student)

      - Byron Mathews, Jr. (Lindsey’s Attorney)

      - Judge Johnny Hardwick

      - Rep Matt Simpson / HB-277'
