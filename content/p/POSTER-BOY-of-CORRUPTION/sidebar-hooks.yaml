  ALABAMA ETHICS COMMISSION HIDE THE LIST:
    brief: '1. THE CONFLICT:

      - Tom Albritton serves as Executive Director of the Alabama Ethics Commission
      with a salary exceeding $100,000.

      - Albritton is accused of abusing his role in the Mabel Amos Trust, allegedly
      benefiting personally and distributing funds to politicians/lawyers/judges.

      - Albritton is alleged to be lobbying against changes in the Ethics Rules (specifically
      HB-277 supported by Rep. Matt Simpson) despite his alleged unethical behavior
      being the primary target of those changes.

      - The Alabama Bar allegedly signed off on Albritton’s actions and dropped complaints
      while civil litigation regarding the trust remains ongoing.

      - Albritton acted as a trustee of the Mabel Amos Trust simultaneously serving
      as Ethics Director.


      2. THE DISCOVERY:

      - Plaintiffs are demanding public disclosure of the names of recipients of over
      $3.2 million in scholarships between 2013 and 2021 from the Mabel Amos Trust.

      - Article identifies "Lawrence v. State" as associated civil litigation involving
      the trust and Regions Financial Bank.

      - Alabama Attorney General Steve Marshall’s office was involved in oversight;
      a deal between the AG and Regions Financial regarding making the trust whole
      was reached during an 11 November hearing.

      - Requests are directed at AG Communications Director Amanda Priest and Cameron
      Mixon (Phone: 334-322-5694).

      - The list allegedly shows privileged politicians, bankers, lawyers, and judges
      received scholarships.


      3. THE PIVOT:

      - Article 2 validates Article 1’s corruption claim by specifying the exact financial
      threshold ($3.2 million) and timeframe (2013-2021) allegedly mismanaged by Albritton.

      - Article 2 proves the conflict of interest: Albritton is using his position
      as Ethics Director to hide the "List" that proves he, and others like him, used
      the Mabel Amos Trust (which he supervised) for preferential distribution.

      - Article 2 confirms the secrecy described in Article 1: Both the Alabama Bar
      and Governor Kay Ivey are currently refusing or silent on releasing this list.


      4. KEY ENTITIES:

      - Tom Albritton (Executive Director, Alabama Ethics Commission)

      - Mabel Amos Trust

      - Alabama Ethics Commission

      - Matt Simpson (State Representative, Author of HB-277)

      - Steve Marshall (Alabama Attorney General)

      - Amanda Priest (AG Communications Director)

      - Cameron Mixon (AG Communications)

      - Kay Ivey (Governor of Alabama)

      - Lawrence v. State

      - Regions Financial Bank'
