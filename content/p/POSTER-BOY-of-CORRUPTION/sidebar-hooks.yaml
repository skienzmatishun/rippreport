  line-in-the-sand:
    brief: 'THE CONFLICT:

      Tom Albritton, Executive Director of the Alabama Ethics Commission, is accused
      of using his position to personally benefit from the Mabel Amos Charitable Trust.

      Albritton and former partner Rick Clifton have served as two of three board
      members for the trust since 1999, following Mabel Amos’ death.

      The Alabama Bar Association dropped complaints against Albritton after accusing
      him of stealing from the trust children, without acknowledging wrongdoing.

      Albritton advocates for no changes to Ethics Rules despite his own conduct being
      central to the investigation.

      A civil lawsuit was filed two weeks prior to report date in Montgomery County
      Circuit Court by Mabel Amos’ relatives.


      THE DISCOVERY:

      The lawsuit alleges a scheme between Regions Bank representative John Bell,
      Tom Albritton, and Rick Clifton involving “self-dealing” of the trust.

      The Ripp Report/Lagniappe verified Albritton’s daughter and son received at
      least $120,000 in scholarship money from the trust.

      Specific notations found include “Scholarship for Board Member Daughter” to
      hide direct conflict of interest.

      Evidence shows Albritton’s former law partner and Covington County Circuit Court
      Judge Ben Bowden had a child awarded $45,000 in scholarships to Southern Methodist
      University (SMU) between 2014 and 2017.

      The Mabel Amos Trust’s bank fees with Regions Bank increased massively, totaling
      $1.2 million taken between 2002 and 2020.

      Albritton claims he abstained from voting on scholarships for his children,
      but remains a board member since the trust''s creation by his former law firm.


      THE PIVOT:

      Article 2 (Widget) validates Article 1’s accusation that Albritton is a “poster
      boy of corruption” by revealing specific financial transactions.

      Article 2 identifies the Alabama AG as complicit for ignoring obvious criminal
      conduct regarding the trust.

      The lawsuit details (scholarship amounts, specific bank fees) provide the factual
      basis Article 1 claims are “shameful” and require an investigation.

      Article 2 reveals that the trust was created by Albritton’s own law firm, linking
      legal ethics to financial misconduct directly.

      Article 2 proves that ethics complaints alone were ineffective; it took a civil
      lawsuit to expose the board’s feeding frenzy of funds.


      KEY ENTITIES:

      Tom Albritton (Executive Director, Alabama Ethics Commission)

      Rick Clifton (Former Law Partner/Trust Board Member)

      Ben Bowden (Covington County Circuit Court Judge/Former Law Partner)

      John Bell (Regions Bank Representative/Trust Board Member)

      Mabel Amos Charitable Trust

      Regions Bank

      Montgomery County Circuit Court

      Alabama Attorney General'
