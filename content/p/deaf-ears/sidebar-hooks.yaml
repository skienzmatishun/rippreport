  letter-to-the-alabama-attorney-general:
    brief: 'THE CONFLICT:

      - Francis Paul Ripp of The Ripp Report filed formal complaints with Alabama
      Attorney General Steve Marshall in Sept 2022 regarding Tom Albritton, Executive
      Director of the Alabama Ethics Commission.

      - Ripp alleges Albritton skimmed $120,000 from the Mabel Amos Trust which he
      is an oversight officer for.

      - Ripp states Albritton has remained Executive Director and received a "handsome
      paycheck" despite AG’s office filing a lawsuit against him.

      - Ripp alleges Baldwin County Sheriff Hoss Mack, Retired Prosecutor David Whetstone,
      and Judge Robert Wilters colluded to wrongfully convict Murray Lawrence in 2005
      for murder of Brandon Hastings.

      - Ripp claims exculpatory evidence including the "Coroner''s Report" was withheld
      from defense.

      - Defense attorney Willy Huntley signed affidavit Sept 18, 2023 stating he never
      received the withheld evidence.

      - Murray Lawrence has been incarcerated over 18 years (6,570 days).


      THE DISCOVERY:

      - Letter from The Ripp Report to Steve Marshall confirms a prior conversation
      during the last election cycle at Fairhope where Marshall promised his office
      "would take all complaints seriously."

      - Ripp claims AG’s office failed to respond or investigate a complaint Ripp
      personally delivered in Montgomery regarding a Fairhope councilman self-enriching.

      - Article confirms Tom Albritton serves as trustee and attorney for Mabel Amos
      Memorial Fund.

      - Specifics confirm Albritton’s daughters received $105,000 in scholarships
      to the University of Texas from the same fund he oversees.

      - The Ripp Report claims a readership of 80,000 via the "Court of Public Opinion."

      - Attachment includes a Writ of Mandamus, Alabama Bar Complaint, and Lagniappe
      article regarding Albritton''s "SELF-DEALING."


      THE PIVOT:

      - Article 2 acts as the smoking gun for Article 1 by proving Marshall received
      direct, personal warnings about Albritton corruption prior to current complaints.

      - Article 2 establishes a specific promise from Marshall ("if elected... take
      all complaints seriously") which contrasts with the behavior described in Article
      1 (Albritton kept job/paycheck, no AG follow-up).

      - Article 2 links the financial conflict directly: confirms Albritton''s ties
      to Mabel Amos Trust as both trustee and scholarship recipient of his own daughters.

      - Article 2 proves The Ripp Report has a documented history of delivering physical/complaints
      (Montgomery visit, Writs) that were ignored before the September 2022 complaints
      in Article 1.


      KEY ENTITIES:

      - Francis Paul Ripp / The Ripp Report

      - Steve Marshall (Alabama Attorney General)

      - Tom Albritton (Executive Director, Alabama Ethics Commission)

      - Murray Lawrence

      - Hoss Mack (Sheriff Baldwin County / Retired)

      - Robert Wilters (Judge/DA Baldwin County)

      - David Whetstone (Retired Prosecutor)

      - Willy Huntley (Defense Attorney)

      - Brandon Hastings

      - Mabel Amos Memorial Fund

      - University of Texas'
