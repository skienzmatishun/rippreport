    generated_at: '2026-07-11T00:58:48.915365Z'
  lego-rocket-scientist:
    brief: 'THE CONFLICT:

      *   Fairhope governance was dysfunctional, controlled by special interests and
      corrupt elected officials.

      *   There was an investigation into the Fairhope Airport and a $1 million corporate
      jet hanger bid involving Ray Hix and Jack Burrell/Snederkerker.

