  catalyst-bullies:
    brief: 'THE CONFLICT

      *   Colby Cooper worked as Chief Operating Officer for a company owned by Fairhope
      Municipal Judge Ray Hix and Fairhope Board member Ray Hix.

      *   Cooper is accused of selling out to the 1% by working for special interests
      (Hix/Snederker).

      *   The Airport Authority bid involving a $1 million corporate jet hanger was
      handled by Jack Burrell, who is President of the Fairhope Catalyst “At Large”
      Council and Airport Authority Board member.


      THE DISCOVERY

      *   The Catalyst group (including Scott Boone Consulting) represents special
      interests such as Baldwin County Sewer, local politicians, connected attorneys,
      shady judges, and greedy developers.

      *   City Attorney Marcus McDowell supported Sullivan and acted as a bully to
      Mayor Karin Wilson.

      *   McDowell helped Ronan McSharry by failing to file assault charges against
      him and allowing the statute of limitations to expire.


      THE PIVOT

      *   Article 2 reveals that the power structure referenced in Article 1 (Cooper
      working for special interests) is actively maintained by specific individuals
      and organizations (Catalyst, Scott Boone Consulting, McDowell, Burrell), detailing
      exactly who benefits from the corruption mentioned in the first article.


      KEY ENTITIES

      *   Colby Cooper

      *   Ray Hix

      *   Jack Burrell

      *   Marcus McDowell

      *   Karin Wilson

      *   Scott Boone Consulting

      *   Catalyst (Council candidates)

