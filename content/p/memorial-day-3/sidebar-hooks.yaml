      - Injured Marine refused to file for Purple Heart, citing inability/need to
      fill out papers after witnessing wounded comrades in field hospital.

      - Refusal directly resulted in a Veterans Claim status that remained pending
      for 51 years.


      THE DISCOVERY

      - Veteran first treated at Veterans Hospital in Birmingham, Alabama in December
      1968.

      - Currently preparing for 15th shoulder surgery (reverse left replacement) at
      same facility.

      - Classified as 100% disabled by VA in 2010, same year he decided to form The
      Ripp Report.

      - As of today: The original trauma claim from March 1968 is still officially
      pending 51 years later.

      - Veteran uses personal claim denial history to motivate investigation into
      local government corruption.


      THE PIVOT

      - The administrative failure during the Purple Heart refusal is the catalyst
      for founding The Ripp Report nonprofit in 2010.

      - Veteran’s personal grievance (unresolved claims) merges with public mission:
      exposing political corruption and the "silent tax" in Baldwin County.

      - Article 2 validates the Main "Memorial Day" theme by exposing how the very
      system veterans trust (VA) mirrors political corruption found in Fairhope.

      - Veteran explicitly states: "In 2010 I decided that I would form the Ripp Report
      as a non profit consumer organization focusing on political corruption."


      KEY ENTITIES

      - Veteran’s Unit: Marine Combat Engineer, Vietnam Tour.

      - Locations: Dong Ha, Vietnam; Birmingham VA Hospital, Alabama; Fairhope City
      Hall.

      - Specific Names: Mayor Wilson; CATALYST.

      - Organizations: The Ripp Report; VA (Department of Veterans Affairs).'
