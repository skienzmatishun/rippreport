      KEY ENTITIES:

      - Jack Burrell (Fairhope City Council President)

      - Robert Brown

      - Kevin Boone

      - Stephanie Durnin

      - Jerry Carl (First Congressional District candidate)

      - Don Lowtower (CATALYST candidate)

