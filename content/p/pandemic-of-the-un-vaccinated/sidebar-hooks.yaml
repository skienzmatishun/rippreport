      THE DISCOVERY:

      - Widget Article confirms Jack Burrell tested positive for COVID-19 (acknowledged
      as Council President).

      - He has been in quarantine for two weeks due to the infection.

      - Rumors indicate Robert Brown is also exposed; he was vocal about avoiding
      masks and downplaying virus.

      - Municipal election deadline July 21 for Fairhope City Council challenges;
      "Three Bs" identified as targets: Jack Burrell, Robert Brown, Kevin Boone.


      THE PIVOT:

      - Main Article critiques Burrell for mocking safety risks ("taking a chance");
