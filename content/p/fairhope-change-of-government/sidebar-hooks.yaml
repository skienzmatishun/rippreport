      in the last Fairhope election).

      *   County Commissioner Tucker Dorsey fired whistleblowers related to Pittman
      Kant BP fraud, including the EMA Director and county manager.

      *   Connected landowners received over $30 million+ for a mega-site deal.

      *   The city''s infrastructure problems are being masked by the Mayor.


      THE PIVOT

