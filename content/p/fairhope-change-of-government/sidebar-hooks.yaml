  there-are-more-of-us-than-them:
    brief: 'THE CONFLICT

      *   Mayor Karin Wilson serves as Utilities Director and draws a salary for the
      position.

      *   The city implemented a $10 million "band aid" upgrade on the sewer system.

      *   The Mayor is under investigation involving participation in BP Grant fraud.

      *   Fly Creek Apartments were implicated in corruption.

      *   Quail Creek Golf Course costs are mentioned as a financial black hole for
      taxpayers.


      THE DISCOVERY

      *   Voter turnout was extremely low (30-35% of registered voters participated
      in the last Fairhope election).

      *   County Commissioner Tucker Dorsey fired whistleblowers related to Pittman
      Kant BP fraud, including the EMA Director and county manager.

      *   Connected landowners received over $30 million+ for a mega-site deal.

      *   The city''s infrastructure problems are being masked by the Mayor.


      THE PIVOT

      *   Article 2 provides evidence linking specific county officials (Dorsey) to
      the fallout of BP fraud and employee firings, directly supporting the claim
      that the Mayor is part of a system benefiting "good ole boys."

      *   The specific financial details regarding the golf course and taxpayer exploitation
      in Article 2 corroborate the general corruption claims made about city finances
      in Article 1.


      KEY ENTITIES

      *   Karin Wilson (Mayor)

      *   Fly Creek Apartments

      *   Sewer system ($10 million upgrade)

      *   BP Grant fraud

      *   Tucker Dorsey (County Commissioner)

      *   Jennifer Fiddler

      *   Sherry Sullivan

      *   Quail Creek Golf Course

      *   Pittman Kant BP fraud

      *   County Manager'
