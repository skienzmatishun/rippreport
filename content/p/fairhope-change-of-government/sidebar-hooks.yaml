hooks:
  special-interest:
    brief: 'THE CONFLICT:

      *   Action called for a YES vote on November 6th, 2018, for a Change of Government
      in Fairhope.

      *   The current Fairhope City Council is described as an "at Large Catalyst
      council" with a dismal record and inability to deliver budgets on time.


      THE DISCOVERY:

      *   30% of the city''s population are connected to special interests, Catalyst
      connections, or the Tim Can’t Club.

      *   These groups actively oppose a change in government because it will cut
      off their access to candidates and reduce their ability to "control" Fairhope.


      THE PIVOT:

      *   Article 2 identifies the specific opposing demographic (Special Interests/Catalyst)
      that benefits from maintaining the status quo of the current City Council structure,
      directly contrasting the goal of Change of Government promoted in Article 1.


      KEY ENTITIES:

      *   Fairhope

      *   November 6th, 2018

      *   Mayor Karin Wilson

      *   Catalyst connections

      *   Tim Can’t Club

      *   Fairhope City Council'
    generated_at: '2026-07-11T01:21:09.958328Z'
  bury-the-body:
    brief: 'THE CONFLICT:

      *   The Fairhope City Council planned to stop the October 2, 2018 vote to change
      the Government in Fairhope.

      *   The Council instructed the City Attorney to find a loophole to delay the
      election.


      THE DISCOVERY:

      *   The attempt to stop the October 2, 2018 vote failed; the vote will now join
      the general election ballot on November 6th, 2018.

      *   The Council is blaming the City Clerk and the Mayor.


      THE PIVOT:

      *   Article 2 proves that the Council actively sought legal means (City Attorney
      finding a loophole) to delay the government change vote, validating the urgency
      implied by Article 1''s call for action on November 6th, 2018.


      KEY ENTITIES:

      *   Fairhope City Council

      *   City Attorney

      *   City Clerk

      *   Mayor'
    generated_at: '2026-07-11T01:21:09.958334Z'
  back-stabber:
