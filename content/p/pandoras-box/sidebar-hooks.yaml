      THE PIVOT:

      *   Article 1 documents specific incidents of alleged corruption (Jack Burrell''s
      conflicts, Joe McEnermy supporting Jack''s lies regarding the airport scandal,
      council members refusing to inspect financial "contents" of legal filings).

      *   Article 2 frames these documented instances as evidence that Councilman
      Kevin Boone, *The Courier*, and WACO radio are representatives acting under
      the direction of the Catalyst shadow government.

      *   It connects disparate pieces of local political misconduct (Kevin Boone''s
      LLC/John Avant relationships; Robert Brown securing a no-bid contract with the
      Fairhope Art Center) into one large pattern of obstruction designed to undermine
      established municipal leadership.


