  mimes-whitewashing:
    brief: 'THE CONFLICT:

      *   HR director filed a $100,000 lawsuit against the city.

      *   Sherry Sullivan and Jennifer Fidler were fired, with Fidler as the HR director''s
      witness.

      *   There is an airport scandal involving Jack Burrell and Joe McEnermy (Chairman
      of the Airport Authority).

      *   The City Council refused to inspect contents or support the Mayor regarding
      these issues.


      THE DISCOVERY:

      *   The Fairhope City Council actively obstructed the Mayor by acting like "mimes,"
      refusing cooperation.

      *   Council members vowed revenge for an ethics complaint filed by the Mayor
      against Jack Burrell, which accompanied four other complaints.

      *   Councilman Brown claimed the ethics complaint was "baseless."

      *   The Council refused funds for the Mayor''s legal representation ($15,000
      limit).


      THE PIVOT:

      *   Article 2 proves that the City Council is directly responsible for "whitewashing"
      complaints and obstructing the Mayor, which justifies why the consequences (Pandora''s
      Box) occurred.

      *   The Council’s refusal to fund the Mayor’s legal services while simultaneously
      pursuing other agenda items demonstrates systemic obstruction related to the
      legal troubles mentioned in Article 1.


      KEY ENTITIES:

      *   Burrell (Jack)

      *   Conyers

      *   Fidler (Jennifer)

      *   Sullivan (Sherry)

      *   Robert-Brown

      *   Wilson (Mayor Karin Wilson)

      *   McEnermy (Joe, Chairman of the Airport Authority)

      *   Boone''s LLC

      *   Councilman Brown

      *   Fairhope City Council'
