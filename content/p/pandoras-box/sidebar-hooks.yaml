      *   Jennifer Fidler was also fired from public service/city staff for reasons
      unknown to the current administration (date unknown).

      *   The Mayor (Mayor Wilson) denied any allegations of assault during her tenure
      and is constrained by liability regarding the firings.


      THE DISCOVERY:

      *   A Catalyst open letter addresses District Attorney Robert Wilters concerning
      a complaint made public by Fairhope City Councilman Kevin Boone against Mayor
      Wilson for violating state law.

      *   The letter explicitly labels "Catalyst" as a shadow government attempting
      to unseat elected officials and obstruct the Fairhope Government.

      *   The letter alleges that DA Robert Wilters’ support for Catalyst candidates
      (like Lynn Perry) requires his office to recuse itself from investigations involving
