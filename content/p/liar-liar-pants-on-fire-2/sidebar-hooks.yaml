  fly-creek-a-drainage-ditch:
    brief: 'THE CONFLICT:

      - Oct 2016: Fairhope City Council endorsed Fly Creek Apartments project (Fairhope
      Village Apartments at Publix).

      - Public meetings held with 250-300 residents opposing project citing drainage
      and creek contamination risks.

      - Developer Stewart Speed (Leaf River Group) promised environmental safety,
      luxury apartments, and no Fly Creek contamination during public presentations.

      - Former Mayor Tim Can’t lost re-election bid; project associated with administration.

      - April 2017: New City Council (excluding Jimmy Conyers) granted time extension
      to proceed with project.


      THE DISCOVERY:

      - Six-day trial held in Bay Minette regarding project legality and environmental
      impact.

      - Plaintiff Attorney Adam Milam (Friends of Fly Creek) sought to overturn City
      Council planning/zoning actions.

      - Evidence showed new drainage plan: single point discharge, omitting 5-acre
      pond expansion and detouring 1-acre retention pond.

      - Plan directs excess storm water into wetlands, draining to Fly Creek within
      100-150 feet from outfall.

      - Jury did not support overturning legislative action; case remitted to court
      for new planning and zoning vote.


      THE PIVOT:

      - Court testimony confirms Arthur Corte claimed to jury he was a "simple potato
      farmer" while being questioned as the lead developer.

      - Trial documents show City Council approved drainage design despite watershed
      concerns, corroborating Main Article''s claim of back door deals and corruption.

      - Trial evidence names Kevin Boone as a decision-maker alongside Burrell regarding
      the wetland drainage plan, validating Main Article''s allegation of political
      bribery/influence.


      KEY ENTITIES:

      - Stewart Speed (Leaf River Group)

      - Arthur Corte

      - Jack Burrell

      - Kevin Boone

      - Mayor Jim Wilson

      - Tim Can’t

      - Adam Milam (Friends of Fly Creek)'
    generated_at: '2026-03-15T19:57:43.789354Z'
    text: Arthur Corte played a "simple potato farmer" in court, but his secret drainage
      plans tell a much more calculated story of greed. These trial documents prove
      Kevin Boone and Jack Burrell dumped toxic runoff into our wetlands just to protect
      Corte’s bottom line.
    character_count: 260
