hooks:
  fairness:
    brief: 'THE CONFLICT

      Project: Fly Creek Apartments (aka Fairhope Village) built on Publix site banks
      of Fly Creek.

      Developer: Arthur Corte and Leaf River Group led by Stewart “The Liar” Speed.

      Events: 250-300 citizens opposed project at public meetings; Mayor Tim Can’t
      lost re-election bid due to opposition.

      Lies: Stewart Speed made recorded promises that complex would be luxury apartments,
      never sold to other groups, and environmentally sound (all proven false).

      Consequences: 5 lawsuits resulting in taxpayer costs of hundreds of thousands;
      creek contamination, drainage issues, Parker Road traffic infrastructure failure.

      Scandal: Council President Jack Burrell allegedly held back-door meetings and
      accepted gifts from developers.


      THE DISCOVERY

      Current Status: 10th public city council meeting held regarding project; citizens
      packed chambers.

      Council Action: Four councilmen voted to extend sunset clause 120 days for multiple
      occupancy site plan.

      Conflict: Mr. Brown cited long-term relationship with Corte but failed to recuse
      from extension vote.

      Conflict: Mr. Boone acknowledged business relationships with Corte and his engineering
      company but participated in the vote.


      THE PIVOT

      Widget Article proves Main article’s claims of ongoing Council corruption; current
      members continue to favor developer Corte despite known violations.

      Widget confirms specific $11.25 million triangle lawsuit cost attributed to
      Corte and former Mayor, validating Main article’s allegations of taxpayer harm.

      Council actions show continuity in the "good ole boys" network protecting the
      project since initial promises were made.


      KEY ENTITIES

      Arthur Corte, Stewart Speed (Leaf River Group), Fly Creek Apartments, Fairhope
      Village Apartments, Jack Burrell, Mr. Brown, Mr. Boone, Mayor Wilson, Tim Can’t
      (Can’t).'
    generated_at: '2026-03-15T19:57:43.788791Z'
    text: The Fly Creek disaster shows how city hall trades our environment for developer
      favors while taxpayers foot the bill for five separate lawsuits. Now we have
      proof that Councilmen Brown and Boone are still protecting Arthur Corte’s profits
      by voting on extensions instead of recusing themselves from the conflict.
    character_count: 312
  fly-creek-mud:
    brief: '1. THE CONFLICT:

      - Stewart Speed (Leaf River Group) recorded during public meetings telling 250-300
      citizens the Fly Creek Apartments (Fairhope Village at Publix) would be "environmental
      sound" and would never contaminate Fly Creek.

      - Arthur (Angelo) Corte and Leaf River Group promised residents the apartments
      would be luxury, "signature" properties never sold to another management group.

      - Construction cost taxpayers hundreds of thousands of dollars in 5 lawsuits
      regarding pollution, drainage, easements, and traffic.

      - Tim Cant lost his re-election bid partially due to public opposition to the
      project during meetings where attendance reached 250-300 people.

      - Apartments were sold by Leaf River/Corte shortly after completion despite
      initial promises they would stay in management.


      2. THE DISCOVERY:

      - Widget shows Highway 98 shoulder on south side over Fly Creek caved in, dumping
      tons of dirt into the creek.

      - Red soil dumped on steep slope overhanging Fly Creek; structure not compactable,
      culvert foundation damaged.

      - Apartments have experienced partial flooding damaging several units; poor
      management replaced twice.

      - Fly Creek apartments directly linked to infrastructure failures causing mud
      and sediment runoff into the creek today.


      3. THE PIVOT:

      - Stewart Speed''s recorded statements (Main) directly contradicted by visible
      mud waves and sediment runoff in Widget.

      - Initial lie (Never sold) confirmed true: Project sold immediately after completion;
      Corte cashed out.

      - Public opposition regarding drainage and pollution (Main) confirmed via physical
      evidence of failing infrastructure in Widget.


      4. KEY ENTITIES:

      - Stewart "The Liar" Speed (Leaf River Group/Developments, Mississippi)

      - Arthur Corte / Angelo Corte (Developer)

      - Tim Cant (Former Mayor of Fairhope)

      - Jack Burrell (Council President)

      - Mayor Sullivan / Current City Council

      - Fairhope Village Apartments (Publix Project)

      - Fly Creek

      - Leaf River Group'
    generated_at: '2026-03-15T19:57:43.789012Z'
    text: Stewart Speed stood before hundreds of citizens and swore his project would
      never poison the waters of Fly Creek. These photos of collapsing shoulders and
      red mud waves prove “The Liar” sold us out before Arthur Corte cashed his check
      and ran with the money.
    character_count: 258
  dear-congressman-bradley-byrne:
    brief: 'THE CONFLICT:

      - Fly Creek Apartments (Fairhope Village/Publix project) construction near banks
      of Fly Creek.

      - Stewart Speed (Leaf River Group) addressed 250-300 citizens at public meetings;
      claimed apartments would be luxury "signature project," never sold to another
      management group, and environmentally sound.

      - Actual outcome: Project was sold as predicted; suffering partial flooding,
      electric/water issues; Stewart Speed admitted in Main Article this was "all
      lies."

      - 5 lawsuits filed against project; taxpayers cost hundreds of thousands in
      legal fees and damages.

      - Creek contamination linked to drainage issues and project pollution; 12+ news
      articles documented violations.


      THE DISCOVERY:

      - Widget Article confirms Fly Creek damage caused by Publix project development,
      not "historic flooding" (as claimed by Congressman Bradley Byrne).

      - Arthur Corte refused property access for mandatory sediment analysis requested
      by Mobile Bay NEP.

      - Previous scientific study documented sediment came from Publix site; Corte’s
      refusal obstructs validation of current environmental claims.

      - Historical corruption record: “Triangle lawsuit” involving Corte and Kant
      settled for $11.25 million in taxpayer funds; Mayor Kant orchestrated settlement
      deliberately omitting public notification.

      - Additional $1 million taxpayer expenditure spent on new lift station and fire
      station placed adjoining the proposed apartments.

      - Mayor Kant commissioned a Fly Creek Watershed Management Plan deemed "bogus"
      to deflect responsibility from the project.


      THE PIVOT:

      - Article 2 names Mayor Kant and Arthur Corte as the primary responsible parties
      for the damage, solidifying Article 1’s claim that this was not just bad management
      by Speed.

      - Confirms "backdoor" rezoning deal: Planning/Zoning board initially voted AGAINST
      rezoning; after Corte complained to Kant, zoning was “FIXED” despite 95% citizen
      opposition.

      - Connects Stewart Speed’s project to a pattern of fraud: Article 2 cites past
      abuse of BP funds by Kant and Sen. Pittman ($636,000 siphoned) triggering FBI
      investigations, validating the Main Article’s claims of corruption in Baldwin
      development.


      KEY ENTITIES:

      - Stewart “The Liar” Speed

      - Leaf River Group (Mississippi Developers)

      - Arthur Corte

      - Timothy “Kant” / Mayor Kant

      - Jack Burrell (Council President)

      - Francis Paul Ripp

      - The Ripp Report

      - Congressman Bradley Byrne'
    generated_at: '2026-03-15T19:57:43.789336Z'
    text: Congressman Bradley Byrne wants you to believe "historic flooding" killed
      Fly Creek, but the paper trail points directly at developer greed. This investigation
      links Mayor Kant’s backdoor rezoning deals and stolen BP funds to the same corrupt
      network protecting Arthur Corte today.
    character_count: 281
