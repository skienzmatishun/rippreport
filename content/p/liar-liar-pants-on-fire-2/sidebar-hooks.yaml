      KEY ENTITIES:

      *   Stewart "The Liar" Speed (Leaf River Group / Mississippi developer)

      *   Jack Burrell (Council President, Fairhope)

      *   Mayor Tim Kant / Mayor Kent (Note: "Cant" in Art 1, "Kant" in Art 2)

