      the assault charge to shield McSharry.

      - Municipal Judge Haymes Snedeker sentenced McSharry 180 days jail time for
      assault and intoxication (served during rehab).

      - Fairhope City Council President Jack Burrell is identified as a friend of
      McSharry, with the bar menu honoring him (Jack’s Sandwich).

      - Ripp Report claims McDowell and Council members used their positions to manipulate
      the case outcome.


      2. THE DISCOVERY

      - Widget confirms Ronan McSharry filed a third-party lawsuit against Little
      Whiskey Christmas Club (LWCC) for making him drunk and causing damages.

      - Widget confirms Judge Clark Stankoski dismissed the serious assault charge,
      validating Ripp''s claim of judicial misconduct.

      - Widget confirms Fairhope City Attorney Marcus McDowell represented Paula DiNardi
      in the case involving McSharry.

      - Widget confirms LWCC asserts a settlement offer was made between DiNardi and
      McSharry early on which DiNardi declined.

      - Widget confirms defense attorney James Pittman is representing McSharry in
      these civil actions.

      - Widget links the assault incident date directly to video evidence used in
      municipal court findings.


      3. THE PIVOT

      - Widget Article provides documentary proof that McDowell represented DiNardi,
      substantiating Ripp’s claim of potential conflict in the criminal proceedings.

      - Widget Article details McSharry’s active attempt to shift liability via LWCC
