      \ County Delegation\n- Baldwin County Commission\n- Dr. Maigen Sullivan (Invisible\
      \ Histories Project)\n- Alabama Archives\n- Mayor Bob Wills\n- Roland Construction\
      \ (Porch Creek Indians)"
