      \ of County Commissioners of Alabama (ACCA).\n- Baldwin County Delegation has\
      \ expressed concern that Elliott is running “rouge” and not consulting the delegation\
      \ prior to introducing legislation.\n- Local opposition to Elliott’s fifth commissioner\
      \ bill is described as “overwhelming.”\n\nTHE DISCOVERY:\n- Article 2 characterizes\
      \ Elliott explicitly as a “Hoss Mack errand boy” who acts independent of the\
      \ Baldwin County Delegation.\n- Widget article links Elliott to specific corruption\
      \ narratives:\n    - Political retaliation against Alabama Archives.\n    -\
      \ Connection to “dirty lease” with Mayor Bob Wills and Rolin Construction (Porch\
      \ Creek Indians).\n    - Use of church to push political aspirations.\n- Mentions\
      \ Dr. Maigen Sullivan, co-founder of Invisible Histories Project, who labeled\
      \ restrictions on marginalized history (a tactic associated with Elliott’s rhetoric)\
      \ as “textbook fascism.”\n- Reconfirms personal tie between Elliott and Sheriff\
      \ Hoss Mack; Article 2 text repeats claim that wife has worked for the sheriff\
      \ since Chris was elected.\n\nTHE PIVOT:\n- Article 2 validates Article 1’s\
