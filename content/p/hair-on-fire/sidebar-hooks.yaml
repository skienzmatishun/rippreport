  weasel-contractor:
    brief: '1. THE CONFLICT

      * Sen. Chris Elliott (R-Josephine) is spearheading Senate Bill 306 to create
      a full-time, non-rotating chairman for the Baldwin County Commission.

      * Local opposition is overwhelming; letters received from Baldwin County Commission
      and Association of County Commissioners of Alabama (ACCA).

      * State Sen. Greg Albritton voted against SB 306, citing lack of support from
      the affected populace.

      * Sheriff Hoss Mack identified as "political director behind anything happening
      in Baldwin County" and influencing the legislation.

      * Delegation remains silent; Elliott accused of running "rouge" without consulting
      the Baldwin County delegation.


      2. THE DISCOVERY

      * Elliott previously targeted HB-188, a home fortification grant program.

      * In 2016, SAH Director Brian Powell removed Elliott Builders Inc from eligibility
      as a contractor under the Strengthen Alabama Homes program.

      * Removal reason: Elliott repeatedly attempted to gain confidential information
      (other contractors'' bids) for "unfair competitive advantage."

      * Powell alleged Elliott planned to "profile applicants and ‘cherry picking’
      applications" based on that information.

      * Elliott received a guilty plea regarding a DUI incident; he argued in court
      that his elected position as Commissioner meant losing his license would cause
      "irreparable harm," a request granted via special handling.

      * After exposure, Elliott copped the guilty plea but refused to answer a simple
      yes/no question regarding his presence in a bar that night.

      * Elliott was never directly elected to State Senate; appointed by "Luv Gov."


      3. THE PIVOT

      * Article 2 proves Elliott has a documented history of unethical behavior regarding
      public grants (HB-188) and litigation self-dealing (DUI).

      * The 2016 removal by Brian Powell confirms Elliott has a pattern of seeking
      "unfair competitive advantage" and breaking rules, mirroring Article 1’s claim
      that his current SB 306 efforts are "rogue."

      * The DUI court argument shows Elliott using elected status to shield himself
      from normal consequences, validating the claim that he seeks special treatment.

      * Article 2 identifies Elliott as a general partner in the "Catalyst" political
      machine (with Michele Thomasson, Tucker Dorsey, Scott Boone), explaining the
      connections between his legislative moves (SB 306) and Sheriff Mack/County operations.


      4. KEY ENTITIES

      * Chris Elliott (State Senator, Baldwin County Commissioner)

      * Hoss Mack (Sheriff)

      * Greg Albritton (State Senator, R-Range)

      * Brian Powell (SAH Director)

      * Michelle Thomasson ("Catalyst Queen")

      * Tucker Dorsey

      * Lynn Stacy

      * Tim Kant

      * Scott Boone ("baby" Boone)

      * Judge Wilters (District Attorney Robert Wilters associated)

      * Baldwin County Commission

      * State Senate Bill 306'
