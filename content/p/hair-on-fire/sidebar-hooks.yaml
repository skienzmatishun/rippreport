      \ Mack over the Delegation.\n- Article 2 provides the motive context (alignment\
      \ with Sheriff/political interests) that explains why Elliott pushes SB 306\
      \ against overwhelming local opposition.\n- Historical/ethics allegations in\
      \ Article 2 substantiate the “Ethics Commission” subject matter from the Main\
      \ Article metadata.\n\nKEY ENTITIES:\n- Sen. Chris Elliott (R-Josephine)\n-\
