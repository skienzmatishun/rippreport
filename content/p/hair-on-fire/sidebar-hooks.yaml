      support.

      - Baldwin County Commission and Association of County Commissioners of Alabama
      (ACCA) sent formal letters opposing the bill.

      - Article warns voters against Elliott’s unchecked authority and Sheriff Mack’s
      influence.


      THE DISCOVERY:

