  airport-diversion:
    brief: 'THE CONFLICT

      *   Jack Burrell demanded accountability for city school funds ($350,000/year)
      but did not demand accountability for the Airport funding ($500,000).

      *   Burrell ensured the Airport held the mortgage rather than the City of Fairhope.

      *   An Ethics Complaint was filed against Councilman Robert Brown regarding
      securing a contract with the Eastern Shore Art Center.


      THE DISCOVERY

      *   The Ethics complaint against Jack Burrell and Airport board member Ray Hix
      was ruled "baseless."

      *   Media coverage (The Courier, AM station) has been providing free flights
      for Jack Burrell.

      *   Invoices and letters regarding City of Fairhope contracts were discussed
      in the media.


      THE PIVOT

      *   Article 2 proves that the Ethics Complaint against Burrell was baseless,
      undermining his claim to accountability detailed in Article 1.

      *   The evidence of free flights and media coverage (Chucky/The Courier) reveals
      that Burrell is using media access for personal gain while ignoring significant
      public spending issues referenced in Article 1.


      KEY ENTITIES

      *   Jack Burrell

      *   Robert Brown (Fairhope City Council)

      *   Ray Hix (Airport board member)

      *   Eastern Shore Art Center

      *   Deborah Smith

      *   The Courier

