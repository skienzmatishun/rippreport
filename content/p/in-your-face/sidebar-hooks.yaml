  listening-not-reading:
    brief: 'THE CONFLICT

      *   Jack Burrell was questioned regarding accountability for city school funds
      ($350,000/year).

      *   Jack Burrell did not demand accountability for the $500,000 Airport appropriation.

      *   Robert Brown (Fairhope City Council) was filing an Ethics Complaint (filed
      Feb. 26, 2018).

      *   Brown secured a contract with the Eastern Shore Art Center.

      *   Brown is partners with Cliff Pittman (Pittman Brown Development Co.), who
      is a director of Single Tax Corp.

      *   Burrell defended the Fairhope Airport Authority, stating they did not need
      a Request for Proposal (RFP) to lease hanger property.


      THE DISCOVERY

      *   The Ethics Commission maintains that public officials must use a bid process
      to do business with an entity, regardless of whether bid laws apply.

      *   The Airport Authority was compelled to issue a bid because Mr. Hix was on
      the board, which Burrell knew.

      *   Burrell''s explanation that the hangar lease made no profit despite high
