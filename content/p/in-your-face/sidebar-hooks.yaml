  flying-high:
    brief: 'THE CONFLICT

      *   Jack Burrell demanded accountability for city school funds ($350,000 a year).

      *   Burrell allegedly ensured the Fairhope Airport received $500,000 in appropriation,
      while citizens paid the resulting costs.

      *   An Ethics Complaint was filed on Feb. 26, 2018, against Councilman Robert
      Brown regarding securing a contract with the Eastern Shore Art Center.


      THE DISCOVERY

      *   Jack Burrell provided information to Chucky (the reporter) leading to the
      Widget Article''s contents.

      *   Robert Brown supports Jack Burrell’s financial committee.

      *   Burrell and the City Council set up a hand-picked financial committee managed
      by Jack Burrell.

      *   Chuck Zunk, from the Airport Board, was recruited to head the finance committee
      under Burrell’s direction.


      THE PIVOT

      *   The Widget Article proves that Burrell and Brown collaborated structurally
      (via the financial committee and appointments like Chuck Zunk) to control city/airport
      finances, which is the underlying corruption implied by the Ethics Complaint
      against Brown in the Main Article.


      KEY ENTITIES

      *   Jack Burrell

      *   Robert Brown (Fairhope City Council)

      *   Fairhope Airport

      *   Eastern Shore Art Center

      *   Chuck Zunk (Airport Board)

      *   Pittman Brown Development Co.

      *   Single Tax Corp.'
