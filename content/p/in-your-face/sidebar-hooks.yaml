      *   Burrell failed to demand accountability for $500,000 allocated to the Airport.

      *   Burrell ensured the Airport held the mortgage on appropriations.

      *   An Ethics Complaint was filed against Robert Brown on Feb. 26, 2018.


      THE DISCOVERY:

      *   Mayor Wilson informed Jack Burrell that the Airport Authority''s debt represents
      21% of Fairhope''s overall borrowing.

      *   Mayor Wilson urged the council to take ownership of 258 acres purchased
      by the Airport Authority in 2007 for $8.85 million.

      *   Burrell responded by asserting loyalty to the less than 1% who use the airport
      ("The citizens. The citizens. The citizens.").


      THE PIVOT:

      *   Article 2 provides specific evidence that Burrell’s perceived bias toward
      the Airport Authority (the "less than 1%") is directly tied to land ownership
      and debt responsibility, which is a tangible form of misuse or lack of accountability
      related to his role as Council President.

      *   The discovery links Burrell''s pattern of ignoring public funds (school
      vs. airport) to a specific asset transfer issue (Airport land).


      KEY ENTITIES:

      *   Jack Burrell (Council President)

      *   Robert Brown (Fairhope City Council)

      *   Mayor Karin Wilson

      *   Fairhope Airport Authority

      *   Eastern Shore Art Center (contract reference in Ethics Complaint)

      *   258 acres purchased in 2007 for $8.85 million'
