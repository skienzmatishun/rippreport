  job-with-benefits:
    brief: |-
      THE CONFLICT
      *   2018: Robert Brown, Fairhope City Councilman, was criticized in an Ethics Commission complaint regarding securing a contract with Eastern Shore Art Center through partnership with Cliff Pittman / Pittman Brown Development Co.
      *   Ethics Commission issued an Informal Opinion to Mr. Brown (date not specified) stating he could not use his office for personal benefit or associated business without formal review; this warning was allegedly ignored.
      *   Burrell, City Council Member, used the ethics complaint process to secure funds covering his attorney fees related to ethics complaints from Fairhope citizens.
      *   In current context (Main Article), Burrell is demanding accountability for $350,000/year in city school funds while previously receiving free plane rides and benefiting from reduced Airport funding ($500k down to $350k).

      THE DISCOVERY
      *   The position of Fairhope City Council President / liaison to the Airport Authority Board provides a "job with benefits" structure for Burrell.
      *   This role grants insider access to the Fairhope Airport Authority, which controls land title and covers costs.
      *   Specific benefits include free plane flights provided by other board members, controlled bidding ("proper Placement") via guaranteed contracts, and payment of all ethics complaint legal bills from the Fairhope Airport Authority.
      *   Burrell has faced criticism regarding infrastructure spending: $13 million was spent on a new sewer plant while insufficient funds were dedicated to actual sewer infrastructure maintenance/spills.

      THE PIVOT
      *   Article 2 proves that Burrell’s acceptance of ethics complaint attorney fees (mentioned in Article 1) is not an incidental payment but part of the established, structured compensation for his role as liaison and board member of the Airport Authority—an entity whose land title secures his job.
      *   The systematic benefits package (free flights, controlled bids, legal expense coverage by the same body that holds his land/job security) establishes a pattern of institutionalized lack of accountability directly contradicting his demands for fiscal oversight in Article 1.

      KEY ENTITIES
      *   Jack Burrell (City Council President / Councilman)
      *   Robert Brown (Fairhope City Councilman - Former)
      *   Cliff Pittman (Business Partner/Former Director of Single Tax Corp.)
      *   Fairhope Airport Authority (Entity holding land title and covering costs)
      *   The Ripp Report / Baldwin County Legal Eagle (New corporate status, sponsoring candidate engagement)
      *   Fairhope City Council
