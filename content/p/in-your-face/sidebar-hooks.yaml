  investigating-the-investigators:
    brief: 'THE CONFLICT

      *   Jack Burrell was concerned about accountability for city school funds ($350,000
      annually).

      *   Burrell failed to demand accountability for the $500,000 appropriated for
      the Fairhope Airport.

      *   Robert Brown (Fairhope City Councilman) faced an Ethics Complaint filed
      on February 26, 2018.

      *   The complaint focused on Robert Brown using his position to secure a contract
      with the Eastern Shore Art Center without following Ethics Commission advice.


      THE DISCOVERY

      *   The Fairhope Airport Authority (FAA) is being investigated by attorneys
      hired due to a Ripp Report complaint and ethics inquiry.

      *   Ray Hix, a board member of the FAA, was involved in securing a lease for
      the airport company.

      *   Evidence suggests Ray Hix won the lease without inside information regarding
      the bidding process.

      *   Specific questions on the bid form were found to be inaccurate (e.g., aircraft
      ownership figures, fuel estimates).


      THE PIVOT

      *   The investigation into Ray Hix and the FAA provides concrete evidence of
      potential misconduct related to contract awarding and financial discrepancies
      within the Airport Authority.

      *   This discovery serves as the "smoking gun" by linking Burrell''s alleged
      failure in oversight (the Ethics Complaint) directly to documented irregularities
      and potential fraud within the airport funding structure.


      KEY ENTITIES

      *   Jack Burrell

      *   Robert Brown

      *   Fairhope City Council

      *   State Of Alabama Ethics Commission

      *   Fairhope Airport Authority (FAA)

      *   Ray Hix

      *   Mr. Bailey (FAA attorney)'
