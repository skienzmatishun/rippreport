      from an original value of 500,000 to 4.1 million in 2011, and currently valued
      at 8.2 million.

      The Ripp Report alleges Albritton used his positions to personally enrich himself
      and Regions Bank by:

      - Awarding his daughters approximately $105,000–$135,000 in scholarships.

      - Taking ~1 million dollars for Regions Bank via inflated service fees (averaging
      5 hours/week management per IRS filings).

      - Keeping scholarship recipients anonymous despite ethical obligations.

      Ripp Report, Thomas Gallion (counsel), and Leigh Manning have filed ethics complaints,
      Bar complaints, Writs of Mandamus, and a formal letter to the Attorney General
      against Albritton''s conduct.


      THE DISCOVERY

      Letter from Francis Paul Ripp (Ripp Report) to Alabama Attorney General Marshall
      confirms specific financial details not fully elaborated in initial "Striking
      Oil" teaser:

      - Mabel Amos Memorial Fund originally started with 500,000; ballooned to 4.1
      million in 2011 after oil discovery.

      - Oil well has yielded approx $100 million total revenue with millions more
      expected.

      - Regions Bank received close to 1 million dollars for management services,
      despite IRS filings showing averaged 5 hours of work/week.

      - Albritton awarded his children a combined $135,000 for University of Texas
      tuition.

      - Rick Clifton (Third Trustee) benefited from the trust alongside Albritton
      and Regions.

      - 3.2 million of fund assets (2013–2021) awarded to anonymous recipients; trust
      kept out of public view.

      - Albritton''s Ethics Commission salary raised from an undisclosed base to 210,000
      per year (+25k raise).


      THE PIVOT

      The Letter serves as the "smoking gun" because it:

      - Confirms Article 1’s suspicion that Albritton leveraged the oil discovery
      for personal gain while holding authority over ethics rules.

      - Links Albritton’s two roles: As a public Ethics Director (supposedly policing
      fraud) while simultaneously profiting from the fund he helps manage.

      - Establishes a legal battle: Gallion (counsel to Amos family) vs. Albritton/Regions
