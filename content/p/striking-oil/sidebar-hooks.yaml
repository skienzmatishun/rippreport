  alabama-ethics-self-dealing-immunity:
    brief: 'THE CONFLICT:

      - Mabel Amos left a trust (Mabel Amos Memorial Fund) intended for the underprivileged
      and African American community.

      - Oil was struck in 2010 in Conecuh County, producing millions of dollars.

      - Tom Albritton served as a trustee and Director of the Alabama Ethics Commission
      while managing portions of the Amos fund.

      - Regions Bank managed the trust assets between 2002 and 2018.

      - IRS filings show Regions Bank brought in over $1 million for management but
      averaged five hours of work per week on the fund.

      - Public records initially listed scholarships as "Amos Mabel Sanders" (incorrect)
      rather than actual name "Mabel Sanders Amos."


      THE DISCOVERY:

      - Richard Fording (U of A professor) discovered via Lagniappe reporting that
      Albritton awarded his two daughters a combined $105,000 in scholarships to attend
      the University of Texas through 2018.

      - The discovery references IRS Section 4941(d), which defines "self-dealing"
      as transferring income or assets to a trustee’s child, effectively prohibiting
      this payment structure for the Amos Trust.

      - Leigh Manning (Mabel Amos grandniece, former Secretary of State) retained
      Montgomery attorney Thomas Gallion to investigate the handling of the trust
      and Regions Bank''s involvement.

      - Ripp Report filed an ethics complaint, Writ of Mandamus, and copies to the
      Attorney General; no official response or investigation confirmed by Albritton’s
      agencies.

      - The Alabama Ethics Commission is described in filings as providing immunity
      from prosecution to politicians regarding financial graft.


      THE PIVOT:

      - Article 2 provides the IRS statutory code (Section 4941(d)) that legally defines
      Albritton’s scholarship awards to his children as "self-dealing" prohibited
      by trust law.

      - Article 2 confirms the $105,000 and University of Texas details with named
      sources (Prof. Fording), moving the claim from allegation to documented financial
      flow.

      - Article 2 links Regions Bank’s >$1 million management fee directly to the
      same trust where Albritton took $105,000 in scholarships.

      - Article 2 confirms the lack of enforcement by stating that despite complaints,
      the Ethics Commission dismisses its own oversight or protects officials like
      Albritton.

      - Article 2 identifies John Bell (Regions Bank trust division) as the point
      of contact Albritton claims to have spoken with.


      KEY ENTITIES:

      - Tom Albritton

      - Regions Bank

      - Mabel Amos Memorial Fund

      - Leigh Manning

      - Thomas Gallion

      - Richard Fording

      - John Bell

      - Conecuh County

      - Alabama Ethics Commission'
