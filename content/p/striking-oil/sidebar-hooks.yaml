      AG Allen Dodd.

      - Proves Article 1’s narrative is treated as an active legal crisis rather than
      rumor, evidenced by dismissal of multiple Ripp Report ethics complaints/mandamus
      motions and Gallion’s active representation.


      KEY ENTITIES

      - Tom Albritton (Director of Ethics, Regions Bank Trustee)

      - Regions Bank (Trust Manager)

      - Rick Clifton (Third Trustee)

      - Mabel Amos Memorial Fund / Mabel Amos Scholarship Trust

