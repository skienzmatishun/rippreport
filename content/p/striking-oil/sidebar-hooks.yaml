  where-is-the-media:
    brief: 'THE CONFLICT:

      - Tom Albritton serves as Director of the Alabama Ethics Commission.

      - Albritton is a trustee for the Mabel Amos Memorial Fund, which Regions Bank
      manages.

      - Oil was struck in Conecuh County around 2010, estimated value between $60
      million to $80 million.

      - Albritton awarded his daughters scholarships totaling $105,000 from the Mabel
      Amos Memorial Fund.

      - Oil was discovered in 2010; citizens of Conecuh County were not informed by
      Albritton or Regions Bank regarding the strikes.

      - Leigh Manning, grandniece of Mabel Amos and former Secretary of State, alleges
      self-dealing by the fund trustees.


      THE DISCOVERY:

      - Lagniappe IRS 990 filings show Regions Bank brought in more than $1 million
      managing the trust between 2002 and 2018.

      - IRS filings show Regions Bank averaged only five hours of work per week on
      the fund during that period.

      - One trustee, John Bell, works in Regions Bank’s trust division; he is the
      only person Manning stated she talked to regarding the fund.

      - Leigh Manning has retained Thomas Gallion, a Montgomery attorney known for
      investigating corruption, to look into the matter.

      - The Ripp Report has filed an ethics complaint, a Writ of Mandamus, and a Bar
      complaint.

      - Alabama Attorney General Office received copies; no response from agencies
      or coverage from major news outlets as of August 2021.


      THE PIVOT:

      - The Lagniappe financial data proves Regions Bank collected fees while claiming
      negligible effort (5 hours/week).

      - The Widget article confirms the total lack of media oversight: no major Alabama
      newspapers or TV stations covered the story despite oil revenue being generated
      in their county.

      - Manning’s retention of Thomas Gallion transforms the allegations from claims
      into an active legal investigation against Albritton and Regions Bank.

      - The documents link Albritton’s position as Ethics Director directly to a personal
      financial benefit ($105,000 in scholarships) from the fund he oversees.


      KEY ENTITIES:

      - Tom Albritton

      - Leigh Manning

      - Regions Bank

      - Mabel Amos Memorial Fund

      - Conecuh County

      - John Bell

      - Thomas Gallion'
