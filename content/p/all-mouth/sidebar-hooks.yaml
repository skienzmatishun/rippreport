      - The $2.65M airport land and Sullivan’s dual roles (cited in Article 1) are
      now explicit campaign talking points for challengers in Article 2.


      KEY ENTITIES:

      - Jack Burrell (Councilman)

      - Sherry Sullivan (Mayor / Utilities Head)

      - Karen Wilson (Former Mayor)

      - Fairhope City Council

      - Fauxhope / Fairhope'
