      KEY ENTITIES:

      *   Jack Burrell (Councilman)

      *   Mayor Sullivan

      *   Mayor Wilson

      *   Ronan McSharry

      *   Jade Consulting

      *   Andrea Faust (Current Council/Target)

      *   Kevin Boone

      *   Publix'
