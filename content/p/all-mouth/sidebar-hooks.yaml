  last-chance-fauxhope-or-fairhope-vote-out-fauxhope-city-council:
    brief: 'THE CONFLICT:

      *   2013: Councilman Jack Burrell led charge to upgrade failing sewer plant;
      budget approved for $10 million, finalized at $13 million.

      *   2015: Comprehensive upgrade completed for $12 million, yet system continues
      to fail demand.

      *   2023: New proposal to replace head works at wastewater treatment plant (North
      end Church Street) met with cool reception due to $5 million price tag; Burrell
      claims high cost, despite 2015 upgrade.

      *   City Council approved non-budgeted $2.65 million land purchase at airport,
      causing budget deficits and delays in infrastructure spending.

      *   Council members voted themselves full family insurance packages valued at
      $17,000/year; Mayor received Utilities Superintendent title to reach salary
      above $100K.

      *   Publix on Parker Road project dumped mud in Fly Creek and bulldozed rights
      of ways; 5 lawsuits filed against developers/council regarding environmental
      damage.


      THE DISCOVERY:

      *   Burrell orchestrated Mayor’s appointment to Utilities Superintendent role
      as a reward for winning the 2020 "Covid election" (double-dipping salary).

      *   Burrell and current council replaced a qualified utility engineer placed
      by Mayor Wilson with an unqualified high school graduate.

      *   Waterfront project originally community-approved for $6.3 million; inflated
      to $10 million under Burrell’s leadership; project unfinished with no forensic
      audit.

      *   Mayor Wilson left millions in infrastructure grants unused; Burrell’s council
      refused to spend funds on a necessary new water tank despite multiple shortages.

      *   Councilman Burrell accepted $500 from Jade Consulting, a firm with pending
      development projects.

      *   City and Municipal Attorney covered up repeated criminal assaults by developer
