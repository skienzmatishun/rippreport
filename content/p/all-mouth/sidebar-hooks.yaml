  catalyst-liar:
    brief: 'THE CONFLICT:

      - Fairhope City Council under Jack Burrell claimed responsibility for sewer
      system upgrades from 2013 to present.

      - Main article alleges infrastructure still failing; costs ballooned from $10M
      approved to $13M completed by 2015.

      - Main article alleges Burrell is hiding financial mismanagement linked to a
      $2.65 million non-budgeted land purchase at the airport.

      - Main article alleges Mayor appointed to Utilities Superintendent position
      ("double dipping" for above $100K salary).

      - Main article alleges Council members ignored developing strain on utilities
      to boost development deals.


      THE DISCOVERY:

      - Widget article confirms Burrell took credit for sewer improvements he voted
      against.

      - Widget article exposes $2.65 million airport farmland deal: City went from
      $1.2M surplus to $1.7M deficit immediately after purchase.

      - Widget article confirms Council approved "full family insurance" valued at
      $17,000/year.

      - Widget article alleges airport bid rigging regarding the land and sewer projects.

      - Widget article confirms Burrell had prior police record involving juveniles
