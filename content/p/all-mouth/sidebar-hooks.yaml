      KEY ENTITIES:

      - Jack Burrell (Council President)

      - Sherry Sullivan (Mayor/Utilities Director Candidate)

      - Mayor Wilson (Previous Mayor, refused dual salary position)

      - Tim Kant (Referenced in past administration corruption context)

