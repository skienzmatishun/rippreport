  a-decade-of-corruption:
    brief: 'THE CONFLICT:

      *   State Senator Tripp Pittman was involved in securing BP contracts from Fairhope/Perdido
      Beach resulting in a reported $750,000 personal net gain through his tractor
      company acting as a marine contractor.

      *   The contracts were reportedly awarded despite no general contractor’s license
      and the use of defective or used boom supplies.

      *   This arrangement led to an FBI investigation, Grand Jury involvement, and
      subpoenas of City records and Pittman''s financials.

      *   Initial complaints against this activity were filed with BP and the Alabama
      Ethics Commission but resulted in inaction from regulatory bodies.


      THE DISCOVERY:

      *   The Widget Article details a specific instance 10 years prior (around May/June
      2010) where State Senator Tripp Pittman utilized Fairhope Staff (Greg Mims,
      Sherry Sullivan, Jennifer Fidler) and Mayor Tim Kant to secure an initial bid
      of $636,000 from Fairhope for BP Boom work.

      *   The County Commission explicitly instructed Pittman and Kant not to proceed
      with the bid on May 8th, 2010, but they proceeded by submitting a second proposal
      ("Oil Recovery").

      *   On June 4th, 2010, the Fairhope City Council awarded the contract to Pittman
      Tractor. Six days later, Pittman received $372,165.90 for "COMPLETED" work while
      working without an ethics or county approval and lacking a general contractor’s
      license.


      THE PIVOT:

      *   Article 1 discusses the *current* unresolved investigative failures (FBI/AG
      investigation going cold) related to Pittman’s substantial contracts and $750,000
      gain.

      *   Article 2 serves as the ''smoking gun'' by proving that the alleged corruption
      was not a single event but a pattern of systemic fraud originating in early
      2010, detailing how City staff and local leadership actively bypassed County
      directives to secure illicit contracts for Pittman’s company over an extended
      period.


      KEY ENTITIES:

      *   Tripp Pittman (State Senator)

      *   Fairhope Mayor Tim Kant

      *   BP

      *   Greg Mims (Fairhope Staff)

      *   Sherry Sullivan (Fairhope Staff/Council Member)

      *   Jennifer Fidler (Fairhope Staff/Witness)

      *   $750,000.00 (Reported Pittman personal gain from BP contracts)

      *   May 8th, 2010 (Date County Commission instructed Pittman not to proceed
      with bid)

      *   June 4th, 2010 (Date Fairhope City Council awarded contract to Pittman Tractor)

      *   $372,165.90 (Initial payment amount to Pittman Tractor)

      *   Alabama Ethics Commission

      *   Luv Gov. Bentley

      *   CATALYST'
