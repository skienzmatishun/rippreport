      - Pittman allegedly operated his tractor company as a marine contractor without
      a general contractor’s license in this process.

      - He supplied used or defective boom material and failed to recover hundreds
      of required oil protective boom anchors.

      - A complaint resulted in an FBI investigation, Grand Jury, and subpoenas; the
      case subsequently stalled within the Alabama Attorney General''s white collar
      crime division.


      THE DISCOVERY

      - The widget article identifies a systemic phenomenon—a "Get Out of Jail Card"—allowing
      many politicians to avoid transparency or criminal charges through legal maneuvers.

      - Examples include Ben Reynolds (Mobile City Councilman) being cleared by DA/District
      Court for a wrongful charge dismissal, and Chris Elliott citing counsel to decline
      breathalyzer testing regarding a BAC citation in 2016.

      - It reveals that Sheriff Hoss Mack has faced multiple cases leading to dismissal
      based on "Qualified Immunity" despite an incident involving eight deaths.

      - The article claims no individual utilizing this legal shield (the card) has
      been held accountable for 15 years in Baldwin County.


      THE PIVOT

      - Article 2 provides a framework—the existence and efficacy of the "Get Out
      of Jail Card"—that explains why high-profile corruption, like that involving
      State Senator Tripp Pittman and his $750,000 BP contracts, never resulted in
      a trial or conviction despite extensive investigations.


