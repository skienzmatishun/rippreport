  railroaded-by-the-law:
    brief: 'THE CONFLICT:

      *   Mayor Steve Russo was convicted in 2006.

      *   State Senator Tripp Pittman received $750,000.00 from BP contracts for Fairhope
      and Perdido beach.

      *   Pittman operated a marine contracting business without a required general
      contractor’s license (a felony).

      *   Authorities failed to act on complaints against Pittman regarding contract
      manipulation.


      THE DISCOVERY:

      *   A man''s murder trial involved authorities (Sheriff, District Attorney,
      Presiding Judge, prosecutor) colluding to withhold a coroner''s report from
      the Defense.

      *   The autopsy for the victim was performed and a second autopsy was conducted
      on May 14, 2003, by the Alabama Department of Forensic Sciences.

      *   The results of the second autopsy were never disclosed or mentioned during
      the trial proceedings.


      THE PIVOT:

      *   Article 2 proves that the system protecting individuals (judiciary/law enforcement)
      is corrupt and deliberately obscures truth, paralleling the political impunity
      described in Article 1 regarding ethics violations and lack of accountability.

      *   The failure to disclose the autopsy information demonstrates a systemic
      failure by authorities (including those linked to Baldwin County politics) to
      ensure justice.


      KEY ENTITIES:

      *   Steve Russo

      *   Tripp Pittman

      *   BP

      *   Alabama Ethics Commission

      *   FBI

