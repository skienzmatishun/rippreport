    brief: '**THE CONFLICT**

      *   State Senator Tripp Pittman awarded BP contracts from Fairhope and Perdido
      beach totaling $750,000.00.

      *   Pittman served as designated trustee of Baldwin County BP funds between
      2016-2024 (implied).

