  a-decade-of-corruption:
    brief: 'THE CONFLICT:

      *   Mayor Steve Russo convicted in 2006.

      *   State Senator Tripp Pittman was awarded $750,000 from BP contracts for Fairhope
      and Perdido beach.

      *   Pittman was the designated trustee of BP funds for Baldwin County.

      *   Pittman engaged in contracting violations (using used/defective boom) to
      maximize profit beyond the contract amount.

      *   A complaint was filed with BP and the Ethics Commission, leading to an FBI
      investigation and Grand jury subpoena.


      THE DISCOVERY:

      *   State Senator Tripp Pittman and Fairhope Mayor Tim Kant secured a $636,000
      bid from Fairhope for BP Boom work using Fairhope staff.

      *   The County Commission told Pittman and Kant not to proceed with the bid
      on May 8th, 2010.

      *   Pittman supplied a second proposal ("Oil Recovery").

      *   The Fairhope City Council awarded the contract to Pittman Tractor on June
      4th, 2010, resulting in Pittman receiving $372,165.90 for "COMPLETED" boom work.

      *   Pittman operated without a general contractor''s license, marine insurance,
      county approval, or Ethics approval during this process.


      THE PIVOT:

      *   Article 2 provides the specific timeline and financial details of how Senator
      Pittman secured and illegally managed BP funds and contracts, directly proving
      the conflict of interest detailed in Article 1.

      *   Article 2 shows the direct mechanism (contract manipulation) used to obtain
      the $750,000 mentioned in Article 1.


      KEY ENTITIES:

      *   Steve Russo

      *   Tripp Pittman ("Boom Boom")

      *   BP

      *   Alabama Ethics Commission

      *   FBI

      *   State Senator Tripp Pittman

