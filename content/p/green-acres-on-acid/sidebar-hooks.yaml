  catalyst-open-letter-to-baldwin-county-district-attorney:
    brief: "1. THE CONFLICT\n    *   State Senator Tripp Pittman was designated trustee\
      \ of BP funds for Baldwin County (2018-07-27).\n    *   Pittman's company awarded\
      \ contracts for debris removal from Fairhope and Perdido beach, netting him\
      \ $750,000.00.\n    *   The contract involved installing oil protective boom\
      \ as a marine contractor without a general contractor’s license (a felony).\n\
      \    *   Pittman allegedly supplied used or defective boom and failed to recover\
      \ all anchor ropes as required by the contract.\n    *   A complaint was filed\
      \ with BP and the Ethics Commission, leading to an FBI investigation, Grand\
      \ jury proceedings, and subpoena of City records/financial statements.\n   \
      \ *   The matter transferred to the Alabama Attorney General's white collar\
      \ crime division but remained unresolved (\"collecting dust\").\n    *   Mayor\
      \ Steve Russo is cited as the last person in Baldwin County seen convicted (2006).\n\
      \n2. THE DISCOVERY\n    *   District DA Robert Wilters is accused of having\
      \ his position aided by \"Catalyst.\"\n    *   Wilters allegedly supported Lynn\
      \ Perry for Probate Judge, a designated Catalyst candidate, and discouraged\
      \ Harry D’Olive from running for Probate Judge.\n    *   The letter claims that\
      \ Kevin Boone (Fairhope City Councilman) and associated media outlets (*WACO\
      \ radio*, *Gulf Coast news, Courier*) are representatives of the group CATALYST,\
      \ which is obstructing Fairhope government.\n    *   Robert Wilters' office\
      \ is challenged to recuse itself from allegations against Mayor Wilson because\
      \ of his history with Catalyst.\n    *   Robert Brown (Fairhope City Councilman)\
      \ allegedly secured a no-bid contract with the Fairhope Art Center while serving\
      \ as a board member for that entity.\n\n3. THE PIVOT\n    *   The stalled FBI/Ethics\
      \ Commission investigation into Pittman's $750,000 contracts proves that external\
      \ pressure and systemic failure prevent accountability in Baldwin County (Article\
      \ 1).\n    *   The Catalyst open letter provides the current political context\
      \ for this failure by alleging that the local legal apparatus—specifically DA\
      \ Robert Wilters—is politically compromised or aligned with anti-accountability\
      \ interests like CATALYST (Article 2).\n    *   If the District Attorney's office\
      \ is influenced by groups obstructing justice, it confirms why previous corruption\
      \ cases like Pittman’s did not result in a trial despite extensive investigations.\n\
      \n4. KEY ENTITIES\n    *   **People/Individuals:** Tripp Pittman, Mayor Steve\
      \ Russo, Robert Wilters (Baldwin County District DA), Kevin Boone (Fairhope\
      \ City Councilman), Mayor Wilson, Robert Brown (Fairhope City Councilman), Lynn\
      \ Perry, Harry D’Olive.\n    *   **Organizations/Groups:** Alabama Ethics Commission,\
      \ FBI, Grand Jury, CATALYST, BP, Gulf Coast News/The Courier, WACO radio, Ripp\
      \ Report.\n    *   **Locations/Bodies:** Baldwin County, Fairhope, Fairhope\
      \ City Council, BP funds Trust."
