hooks:
  railroaded-by-the-law:
    brief: '**THE CONFLICT:**

      - **Tripp Pittman Case:** State Senator Tripp Pittman served as designated trustee
      of BP funds for Baldwin County.

      - **Contract Scandal (2016):** Pittman’s tractor company received contracts
      from Fairhope/Perdido beach, netting him $750,000.00 through the use of defective
      or used oil protective boom and failure to recover required anchors.

      - **Legal Inaction:** Despite FBI investigation, Grand jury subpoena, and transfer
      to AG''s white collar crime division (2016), Pittman faced no trial or conviction.

      - **Lawrence Case:** James Lawrence was convicted and jailed for over 18 years
      based on a "totally bogus theory."

      - **Legal Collusion:** The Sheriff, District Attorney, and Presiding Judge colluded
      to withhold critical coroners report from the defense during the Lawrence trial.


      **THE DISCOVERY:**

      - An autopsy of Hastings'' body occurred via exhumation on May 14, 2003, at
      the Alabama Department of Forensic Sciences for a second evaluation.

      - This detailed medical report was never mentioned or made available to the
      defense during James Lawrence’s murder trial despite its existence.

      - Autopsy results indicated authorization by Mack Sr. "under the authority granted
      by the District Ad''A Office."

      - Whetstone (Prosecutor) claimed no recollection of ordering or receiving information
      on the autopsy, yet documents indicate Wilters wrote and signed the order to
      allow it.

      - Both Hoss Mack and his father were copied (CC’ed) in a May 17, 2004 letter
      from AF Sciences to Whetstone.


      **THE PIVOT:**

      - Article 2 reveals that the lack of accountability seen in Article 1 is not
      isolated corruption but systemic failure involving named law enforcement and
      judicial figures.

      - Both articles point to an environment where powerful county entities (Baldwin
      County/Sheriff''s Department) obstruct justice or regulatory oversight without
      consequence.

      - The involvement of Hoss Mack (Article 2, Sheriff’s Office) demonstrates that
      the same institutions responsible for investigating corruption are themselves
      implicated in illegal cover-ups and withholding evidence.


      **KEY ENTITIES:**

      - **People:** Tripp Pittman / Senator Tripp Pittman, James Lawrence, Willie
      Huntley, Whetstone, Wilters, Mack Sr., Hoss Mack (Hoss "the Boss" Mack).

      - **Organizations/Entities:** BP (Contract Source), Fairhope City Council, Baldwin
      County (Government Entity), Alabama Department of Forensic Sciences, The Ripp
      Report.'
