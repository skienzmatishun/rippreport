  liar-liar-pants-on-fire:
    brief: '**THE CONFLICT:**

      *   Baldwin County political corruption and lack of accountability are highlighted.

      *   State Senator Tripp Pittman was the designated trustee for BP funds in Baldwin
      County.

      *   Pittman awarded himself contracts from Fairhope (including municipal emergency
      debris removal) totaling $750,000.00 using these funds/positions.

      *   He acted as a marine contractor without a general contractor’s license while
      installing oil protective boom and cut corners by supplying defective boom and
      abandoning anchors at the water level, violating contracts and environmental
      standards.

      *   A complaint against Pittman was filed with BP and the Ethics Commission,
      leading to an FBI investigation and grand jury subpoena of city records and
      Pittman''s financials.

      *   The matter languished within the Alabama Attorney General’s white collar
      crime division without a trial or final conviction for 18 years (starting circa
      2016).


      **THE DISCOVERY:**

      *   The Alabama Ethics Commission is described as "toothless" and operated by
      legislators who control its function, providing legal cover from prosecution
      for Republican officials accused of ethics violations.

      *   Baldwin County legislators are actively attempting to legalize corruption
      through legislation that eliminates accountability.

      *   One piece of legislation seeks to redefine "economic developers," giving
      them anonymity ("ghost") to hide the names and identities of benefactors receiving
      incentives or "dinners" in exchange for access/votes.

      *   This legislative environment allows elected officials like State Senator
      Elliott (the TAX MAN) and Sheriff Hoss Mack to use law enforcement issues primarily
      as a form of political public relations rather than genuine reform, diverting
      conversation from self-serving interests.


      **THE PIVOT:**

      *   Article 2 provides the institutional mechanism explaining why Pittman’s
      corruption remained unresolved for nearly two decades despite investigations
      (Article 1).

      *   The Ethics Commission and legislative process are currently being molded
      by Baldwin County officials to guarantee protection from prosecution while allowing
      "incentives" and influence peddling (like Pittman''s $750k BP contracts) to
      proceed without legal penalty.


      **KEY ENTITIES:**

      *   Baldwin County

      *   State Senator Tripp Pittman

      *   BP (formerly Retirement Systems of Alabama - RSA)

      *   Alabama Ethics Commission

      *   Jeff Sessions

      *   Fairhope City Council

      *   State Senator Elliott

      *   Sheriff Hoss Mack'
