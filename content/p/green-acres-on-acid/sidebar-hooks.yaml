      maneuvering (insurance settlements, "resolution reached" dismissals) to shield
      themselves and avoid financial responsibility or public censure.


      **KEY ENTITIES**

      *   Baldwin County

      *   Fairhope City Council / Fairhope Municipal Government

      *   Spanish Fort Mayor / Spanish Fort City Attorney David Conner / Lyndsey Cooper

      *   Summerdale Town Police Department / Baldwin County Sheriff

      *   State Senator Tripp Pittman ($750,000.00 in BP contracts)

      *   Mayor Steve Russo (2006 conviction)

