      THE DISCOVERY

      *   The official council agenda regarding the Elias Technologies investigation
      was manipulated; Jay Robinson was omitted from the final generic version of
      the agenda, despite being charged with obtaining information.


      THE PIVOT

      *   The Widget Article’s dismissal ("Sorry, no Wonderful Wednesday") functions
