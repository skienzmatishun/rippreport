  wonderful-wednesday:
    brief: 'THE CONFLICT

      *   The airport project and Triangle lawsuit were decided under Mr. Burrell,
      Mr. Boone, and Mayor Kant. Total dollar figure cited is around $50 million.

      *   Mayor Kant was involved in land/zoning changes for private development (Fly
      Creek Apartments) where Fairhope paid approximately $1 million in infrastructure.

      *   City Councilman Jay Robinson’s name was omitted from the unofficial August
      2017 council agenda version, despite his wife being friends with one of the
      plaintiffs ("the wishful three").


      THE DISCOVERY

      *   Sherry Sullivan is identified as having the informal title "Mayor in Training"
      among Fairhope employees.

      *   Major travel allegations: Mayor Kant, Jennifer Fiddler, and Sherry Sullivan
      allegedly traveled to Europe using tax dollars for horticulture awards.

      *   The writer suggests these individuals are part of a "threesome."


      THE PIVOT

      *   Article 1 details the city council’s use of subpoenas to gather information
      specifically to aid plaintiffs (Jennifer Fidler, Sherry Sullivan, Pandora Heathcoat)
      in their litigation against the mayor ($100,000 each).

      *   Article 2 provides specific instances of questionable municipal spending
      and improper behavior by those same individuals (Kant, Fiddler, Sullivan), suggesting
      a pattern of "good ole boy tricks" and abuse of office that substantiates why
      these parties are seeking legal action.


      KEY ENTITIES

      *   Mr. Burrell

      *   Mr. Boone

      *   Mayor Kant

      *   Jennifer Fidler / Jennifer Fiddler

      *   Sherry Sullivan / Sherry

      *   Pandora Heathcoat

      *   Jay Robinson (Councilman)

      *   Chuckee (The Courier’s Editor)

      *   Fly Creek Apartments / Mr. Corte'
