      at large council successfully derailed change of government efforts.

      *   The second article confirms the systemic failure in handling legal matters:
      the City Attorney takes orders from the Council and keeps the Mayor uninformed.

      *   Article 2 details the Breland case''s outcome as being ruled against Fairhope
      by Alabama’s Supreme Court regarding development delays.

      *   Mr Burrell is named as having negotiated a settlement for the Dyas lawsuit
