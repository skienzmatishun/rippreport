hooks:
  switching-hats:
    brief: '1. THE CONFLICT:

      *   Fairhope City Council was accused of obstructing the newly elected Mayor
      and limiting public participation during their first year in office (implied
      2018-2019 timeframe).

      *   In 2017, *The Ripp Report* began covering political issues in Baldwin County,
      noting that several unresolved problems would resurface in 2018.

      *   A lawsuit was filed against the council alleging denial of free speech and
      abuse of office by a former Council President (pre-dating current administration).


      2. THE DISCOVERY:

      *   Jack Burrell has served as Fairhope City Council President for approximately
      five years, violating previous city protocol regarding leadership rotation.

      *   Burrell is implicated in numerous major projects and controversies, including
      the "Airport debacle," Triangle lawsuit, soccer fields, sewer plant issues,
      and the gift of wetlands from developer Corte.

      *   Lee Turner holds two positions: Head of Planning and Zoning and President/Head
      of Single Tax Corporation, raising concerns about conflicts of interest.

      *   Turner utilized his position to advance the Tatumville Gully project by
      circumventing procedural rules with Burrell''s help.


      3. THE PIVOT:

      *   The Main Article made a generalized claim that Fairhope City Council engaged
      in obstruction; the Widget Article names Jack Burrell as the central figure
      responsible for this "game of obstruction."

      *   Article 2 provides specific evidence (five years continuous presidency,
      involvement in lawsuits and project failures like Fly Creek Apartments) to substantiate
      the broad accusations of council negligence made in the Main Article.


      4. KEY ENTITIES:

      *   Jack Burrell (Councilman/Council President/Mayor)

      *   Lee Turner (Head of Planning and Zoning; Single Tax Corporation)

      *   Fairhope City Council

      *   Baldwin County Commission

      *   Corte (Developer)

      *   Tatumville Gully Project

      *   Single Tax Corporation

      *   The Ripp Report'
