  broken-eggs:
    brief: 'THE CONFLICT: WHAT HAPPENED IN THE PAST?

      *   The Ripp Report noted in 2017 that Baldwin County had a \$32 million debt
      and needed a "clean sweep" of county commissioners due to issues like "the white
      elephant, the mega site." (Main Article)

      *   In Fairhope, prior administrations, including those led by Mayor Kant, were
      criticized for limiting public participation. (Main Article)

      *   The Ripp Report covered previous political issues in Baldwin County throughout
      2017 that allegedly recurred in 2018. (Main Article)


      THE DISCOVERY: WHAT DOES THE SECOND ARTICLE PROVE OR REVEAL TODAY?

      *   Fairhope City Council, led by Council President Jack Burrell for seven years,
      is currently accused of obstructing the Mayor’s office and failing to discuss
      budget issues recently. (Widget Article)

      *   The city has a newly "APPOINTED" finance committee that some council members
      wish to receive the budget from, rather than reviewing it themselves as elected
      officials. (Widget Article)

      *   Chunk Zunk, who was previously affiliated with the Fairhope Airport Authority,
      is now on this new Finance Committee and has defended Burrell''s actions (e.g.,
      free jet service provided by Ray Hix). (Widget Article)

      *   There are specific allegations regarding infrastructure failures, including
      $6 million soccer fields that are reported to be "not level," and the transfer
      of \$10 million from utilities to the general budget in 2015 and 2016 for non-utility
      expenses. (Widget Article)


      THE PIVOT: WHY IS ARTICLE 2 THE ''SMOKING GUN'' FOR ARTICLE 1?

      *   The Main Article generally accused Fairhope City Council of obstruction
      and failure in the first year of a new Mayor; the Widget Article provides specific
      examples of current financial mismanagement, such as transferring \$10 million
      from utilities to non-utility expenses and passing budget oversight to an "appointed"
      committee.

      *   The general claim that past council issues repeat (Main Article) is evidenced
      by the current allegations involving Council President Burrell''s long tenure
      and the appointment of Chunk Zunk—a former Airport Authority figure—to a finance
      role he was previously associated with while criticizing council conduct.

      *   Specific actions, such as Robert Brown postponing votes to hire consultants
      regarding impact fees or Burrell/Boone consistently voting in the majority without
      dissent, provide concrete evidence for the Main Article''s general assertion
      of "limiting public participation" and using "silence as a weapon."


      KEY ENTITIES: LIST SPECIFIC NAMES TO MENTION

      *   Baldwin County (County Government)

      *   Fairhope City Council (Current/Previous administrations)

      *   Mayor Kant (Former Mayor)

      *   Jack Burrell (Council President / Leader of current council bloc)

      *   Ray Hix (Former Airport Authority Board Member; connected to free jet service
      and Snedeker)

      *   Chunk Zunk (Finance Committee Member; former Airport Authority affiliate)

      *   Judge Snedeker (Municipal Judge; linked to Ray Hix)

      *   Robert Brown (Council Member accused of delaying impact fee discussions)

      *   Boone (Council Member who voted alongside Burrell/Brown)

      *   Conyers (Councilman)

      *   Robinson (Councilman)

      *   Ripp Report / Lagniappe'
