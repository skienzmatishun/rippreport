      *   Fairhope City Council was accused of spending an entire year obstructing
      the newly elected Mayor''s push for transparency and accountability.

      *   The Main Article references lawsuits (via Lagniappe link/social preview)
      alleging that Jack (council president at the time) denied a citizen’s free speech
      against the Fairhope council.


      THE DISCOVERY:

      *   Widget article reveals that in August [specific year implied], Karin Wilson
      achieved an upset victory over former Mayor Tim Kant.

      *   This change followed investigations by the Alabama Secretary of State’s
      Office, which exposed a "dubious system" used previously to control vote counting
      and maintain power among two dual mayors in Fairhope (The "Goobers").

      *   Karin Wilson is identified as building her administration on transparency,
      marking a shift away from public corruption.


