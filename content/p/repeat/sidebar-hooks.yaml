  in-the-dark:
    brief: 'THE CONFLICT:

      *   The Ripp Report in early 2017 covered political issues in Baldwin County,
      which continued into 2018 and later (referenced as a ''Repeat'' issue).

      *   In 2017/early 2018, the Fairhope City Council was accused of limiting public
      participation and using "silence" against critics.

      *   The council, led by Mayor Kant (prior to his departure) and others, created
      political issues involving property owners and legal battles, such as a case
      concerning Charles K/ Breland, Jr. vs. The City of Fairhope, Alabama (CV-2013-901096).

      *   This legal dispute originated from an issue that started before current
      elected officials were in office, but was actively handled by the city later.

      *   The "Triangle lawsuit" cost taxpayers $11.25 million and $3 million in legal
      fees for the City of Fairhope.


      THE DISCOVERY:

      *   A 2018 city council meeting resolution (Item 23) reveals that Mayor Karin
      Wilson authorized an Engagement Letter with Tobias McCormick and Comer Lawyers,
      LLC to represent The City of Fairhope on a Third-Party Complaint against Charter
      Oak Fire Insurance Company in the matter of Charles K/ Breland, Jr. V. The City
      of Fairhope, Alabama, et al. (CV-2013-901096).

      *   This resolution shows Mayor Karin Wilson''s current authorization for legal
      services related to this specific long-running case.


      THE PIVOT:

      *   The Main Article alleges ongoing transparency and accountability issues
      within the Fairhope City Council. The Widget Article provides a direct, dated
      record (2018 council meeting) proving that the Mayor was actively engaged in
      high-stakes litigation against private citizens (Charles K/ Breland, Jr.) while
      simultaneously dealing with political pressures from local voting blocs to avoid
      an entertainment district.

      *   The Widget Article exposes potential conflicts of interest and legal negligence
      by detailing the city''s attempt to settle or continue fighting a multi-million
      dollar lawsuit that taxpayers previously funded through their insurance carrier.


      KEY ENTITIES:

      *   Fairhope City Council

      *   Karin Wilson (Mayor)

      *   Charles K/ Breland, Jr. (Plaintiff/Litigant)

      *   Tobias McCormick and Comer Lawyers, LLC

      *   Charter Oak Fire Insurance Company

      *   Baldwin County'
