      a wetland area for 11 years.

      *   Dyas Lawsuit: A legal case handled by the Council President resulted in
      an $11.25 million loss for the City of Fairhope.

      *   City Governance: The Fairhope City Council was alleged to have spent a year
      obstructing a newly elected Mayor who sought transparency and accountability.


      THE DISCOVERY

