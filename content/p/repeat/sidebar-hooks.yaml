  bury-the-body:
    brief: 'THE CONFLICT:

      * Fairhope City Council engaged in behavior that limited public participation
      and used "silence" against challengers starting around 2017/2018.

      * In October 2018, the Fairhope City Council attempted to prevent a planned
      government change or vote scheduled for October 2, 2018.

      * The Council instructed its legal counsel (the City Attorney/Council Attorney)
      to identify and exploit any loopholes available to delay this election outcome.


      THE DISCOVERY:

      * Article 2 reveals the intentional timeline manipulation by the Fairhope City
      Council.

      * The obstruction tactic successfully delayed the planned vote, ultimately forcing
      the government change issue onto the November 6th, 2018 general election ballot.

      * The Council explicitly used its influence to circumvent scheduled electoral
      processes.


      THE PIVOT:

      * Article 1 claims the Fairhope City Council was obstructing transparency and
      using silence against citizens.

      * Article 2 serves as a smoking gun by proving this obstruction was not passive,
      but an active instruction given to the City Attorney to legally maneuver around
      specific dates (Oct. 2, 2018) for electoral purposes, demonstrating intentional
      political interference.


      KEY ENTITIES:

      * Fairhope City Council

      * Council Attorney (City Attorney)

      * CATALYST

      * Baldwin County

      * Jack (Council President/politician)

      * Kant (Former Mayor, associated with prior Council methods)

      * November 6th, 2018

      * October 2, 2018'
