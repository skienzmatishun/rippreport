      KEY ENTITIES:

      *   Mayor Sherry Sullivan

      *   Councilman Kevin Boone

      *   Scott Boone (Kevin Boone’s son, Catalyst head)

      *   Municipal Judge Haymes Snedeker

      *   Jack Burrell (Former Council President)

      *   Jimmy Conyers

