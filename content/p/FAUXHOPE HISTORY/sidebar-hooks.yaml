hooks:
  fauxhope-crier:
    brief: 'THE CONFLICT

      *   Fauxhope/Fairhope historic buildings and homes (including the home of former
      resident Nancy Lewis) demolished under Mayor Sherry Sullivan and City Council
      administrations.

      *   First Baptist Church cited for destroying houses to create parking lots
      while maintaining "historic preservation" rhetoric.

      *   City Council accused of failing historic preservation for the last 6 councils;
      each attempt "dies a slow death."

      *   Councilman Kevin Boone identified as a developer with connections to "good
      ole boy politics" and developers outside of official council duties.

      *   Article 1 claims infrastructure priority supports commercial projects/developers
      (specifically Fauxhope Municipal Judges project).


      THE DISCOVERY

      *   Cory Martin identified as Councilman and "Crier" introducing an ordinance
      requiring annexation inside city limits before tapping into Fauxhope water.

      *   Cory Martin confirmed on record (via the article) that infrastructure for
      ALDI is already in place: "We actually have a water line that is coming for
      the ALDI store and all of the infrastructure that is coming to the east side."

      *   City leadership (Council/Mayor/Utility Director) accused of withholding
      official financial data: No released "State of the City" reports or Budget Overviews
      (files hosted at rippreport.com).

      *   Specific financial opacity cited: City pays over $500,000/year for full
      family insurance coverage for Council and Mayor; total cost per term cited at
      $2.5 million.

      *   Cory Martin avoids African American community despite previous pledges of
      support to that demographic.


      THE PIVOT

      *   Article 1 establishes Cory Martin as a "pro-developer" figurehead ("Cory
      the Crier") pushing commercial projects like the Municipal Judges eastern side
      infrastructure.

      *   Article 2 provides direct evidence of his role: It confirms he introduced
      the annexation ordinance and explicitly highlighted commercial water infrastructure
      (ALDI) as a priority to justify expansion.

      *   Article 2 links Martin directly to the lack of transparency ("Match the
      reports") demanded in Article 1 by citing his failure (or the Council''s) to
      release Budget/State of City documents.

      *   Article 2 confirms Martin is the "sacrificial lamb" spokesperson used to
      sell these agendas, validating Article 1’s description of him as "bit[ting]
      the poison apple of developers."


      KEY ENTITIES

      *   Cory Martin (Councilman/"Crier")

      *   Mayor Sherry Sullivan

      *   Councilman Kevin Boone

      *   Fauxhope Municipal Judges

      *   First Baptist Church

      *   ALDI (Store location: East side)

      *   Fauxhope/Fairhope City Government'
    generated_at: '2026-03-12T06:54:48.250758Z'
  moratorium-party:
    brief: '**THE CONFLICT: Historical City Government Mismanagement and Bias**

      - Mayor Sherry Sullivan and current Fauxhope City Council consistently prioritize
      development over Historic Preservation, water infrastructure, and public services.

      - First Baptist Church demolished historic houses to create parking lots disguised
      as public amenities; Council approved these demolitions despite preservation
      discourse in 6 consecutive city councils.

      - Under Mayor Tim Cant (16 years prior to Wilson) and continuing under Sullivan:
      Infrastructure neglected, sewage spilled into Mobile Bay during rain.

      - Nancy Lewis’s historic home demolished just months before a draft preservation
      ordinance was announced. Mayor Sullivan called the ordinance a “good start”
      but advised council not to vote on it due to workload.

      - Councilman Kevin Boone publicly stated: “I guess the bottom line I have and
      always had is money” regarding preservation efforts.

      - City operates 100% pro-development to service developer projects first, while
      annexing neighbors without proper zoning protection.


      **THE DISCOVERY: The Political Cabal and Insider Corruption**

      - Catalyst, now branded Scott Boone Consulting, identified as the political
      machine financing and recruiting Mayor Sherry Sullivan.

      - Mayor Sherry Sullivan occupies a second paid position as Utility Director,
      following the same model used by former Mayor Tim Kant.

      - Councilman Kevin Boone is identified as both a developer and Scott Boone’s
      father; described as an inside man in the political machine.

      - Municipal Judge (Snedeker) is one of Fauxhope’s largest developers; appointed
      by the Council which also signs off on his permits.

      - Moratorium (12-month subdivision moratorium) explicitly stated to protect
      “completed applications” and specific LLCs, revealing it is designed for insiders
      like Boone and Snedeker.

      - Council President Jimmy Conyers (Sullivan ally) stated moratorium is necessary
      for “explosive growth” but promised no noticeable decrease in planned construction.


      **THE PIVOT: Article 2 as the Smoking Gun for Corporate Control**

      - Article 1 asserts corruption and developer favoritism; Article 2 proves the
      organizational structure (Catalyst/Scott Boone Consulting) that enables it.

      - Article 2 exposes the Utility Director conflict of interest: former Mayor
      Karin Wilson separated utility finances from city salary to stop dual paychecks;
      Sullivan reversed this, enabling the corruption model.

      - Article 2 links specific developers (Boone, Snedeker) directly to the Council
      and Mayor through personal relationships (Conyers is Scott Boone’s best friend,
      Kevin Boone sits on council).

      - Article 2 validates the “Moratorium Party” claim: it confirms developers and
      Council members are exempt from the development freeze their citizens are being
      told is a community brake.


      **KEY ENTITIES**

      - Sherry Sullivan (Mayor of Fauxhope, City Utility Director)

      - Scott Boone Consulting (aka “Catalyst”)

      - Kevin Boone (Councilman, Developer, Son of Scott Boone)

      - Jimmy Conyers (Council President, Close friend to Scott Boone)

      - Snedeker (Municipal Judge, Developer)

      - Tim Kant (Former Mayor, Utility Director precedent-setter)

      - Karin Wilson (Former Mayor who attempted utility financial separation)

      - Nancy Lewis (Victim of demolition; historic home owner)'
    generated_at: '2026-03-12T06:54:48.250778Z'
  fauxhope-3:
    brief: 'THE CONFLICT

