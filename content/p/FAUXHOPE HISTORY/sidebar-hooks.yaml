      *   Municipal Judge Haymes Snedeker is identified as a developer and major contributor
      to Mayor Sullivan; he was appointed to the bench by Council President Jack Burrell.

      *   Judge Snedeker oversaw construction of chain-link fenced storage units butted
      against Fairhope High School using his public position.

      *   Councilman Kevin Boone’s son, Scott Boone, is the main instigator of "Catalyst,"
