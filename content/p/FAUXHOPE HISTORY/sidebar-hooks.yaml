      - Councilman Kevin Boone identified as a developer working with developers while
      serving on City Council.

      - City government prioritizes services for developers; Council and Mayor accused
      of lying to constituents regarding infrastructure vs. development spending.


      THE DISCOVERY

      - Alabama Legislature postponed 2024 municipal elections; this created a "free
      year" in office.

      - No single city official (Councilperson, Mayor, Municipal Attorney, Municipal
      Judge) was re-elected or appointed for their 5th year during this period.

      - Mayor Sherry Sullivan draws full salary as both Mayor AND Utility Director
      with no utility qualifications; role rewarded for election, not merit.

      - $10 million waterfront project has numerous concept changes; construction
      company awarded the contract is a political supporter for upcoming election.


      THE PIVOT

      - Article 2 confirms Article 1''s claim of lack of accountability: officials
      cited in Article 1 served a full year (2024) without being voted on.

      - Conflicts interest established via Sullivan''s dual salary/role (Mayor + Utility
      Director) directly supports claims of corruption in Article 1.

      - Links infrastructure spending ($10M project) directly to political retention
      of the Mayor/Council, proving the "pro-development" narrative.


      KEY ENTITIES

      - Mayor Sherry Sullivan (Mayor, Utility Director)

      - Councilman Kevin Boone (City Council, Developer)

      - Nancy Lewis (Homeowner/Historic Resident)

      - Cory the Crier (City Official/Media Figure)

      - Alabama Legislature

      - City Council of Fairhope/Fauxhope (referred as both)'
