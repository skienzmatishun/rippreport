  FAUXHOPE-TUNNEL:
    brief: 'THE CONFLICT:

      - Current Mayor, Council, Utility Director, City Attorney, and Municipal Judge
      operate as a consolidated group controlling all city functions.

      - Historic preservation has failed for decades: discussed in the last 6 consecutive
      councils, each proposal dying slowly while buildings were demolished.

      - First Baptist Church destroyed historic houses to create parking lots disguised
      as "events" or "parking."

      - Specific demolition target: Historic home belonging to Nancy Lewis (former
      enslaved person) was removed.

      - City leadership is characterized as pro-developer, with no long-range plan
      for infrastructure or land use.


      THE DISCOVERY:

      - Triangle Property (102 acres, 20M+ value) resulted in a lost 20-year lawsuit;
      city paid $8.25M settlement plus $3M in legal fees (money drained from utilities
      and attorney pledges).

      - New masterplan unveiled for Triangle site (underground tunnel, repurposing
      donated home); project is nearly 3 years behind schedule.

      - K-1 building purchased for $4M without a long-range plan; deteriorating roof
      now requires structural repairs.

      - Recreation land purchased for $2.65M (leased back to city ~$9,000/year) placed
      near airport despite elevated lights concerns.

      - Infrastructure director Martin confirmed utility lines and infrastructure
      are already being prepared for ALDI store and the Municipal Judge’s development
      partners on East Side.

      - City Attorney placed specifically to protect "the council" agenda; municipal
      judge appointed by same council that regulates his developments.


      THE PIVOT:

      - The Tunnel/Triangle project (Article 2) validates the claim in Article 1 that
      officials prioritize commercial developer infrastructure over public planning
      or preservation.

      - The financial data (Triangle lawsuit loss, 3M utility drain) connects Councilman
      Kevin Boone and Mayor Sherry Sullivan directly to the "back room good ole boy
      politics" and mismanagement accused in Article 1.

      - Martin’s statement about infrastructure readiness for "ALDI store and all
      of the... development" links the tunnel project to specific private commercial
      goals, proving the "100% pro-development" claim in Article 1.


      KEY ENTITIES:

      - Sherry Sullivan (Mayor)

      - Kevin Boone (Councilman/Developer)

      - Cory the Crier (TV personality/City supporter)

      - Municipal Judge (Position held by partner developer with appointed council
      approval)

      - First Baptist Church

      - Goodwyn, Mills and Cawood (Consulting firm referenced in tunnel plans)

      - Triangle Property (102 acres, 20M+ value)

      - Nancy Lewis (Former enslaved person/home demolished by city/landlord)'
