      *   Councilman Kevin Boone is identified as both a council member and an outside
      developer working with developers.

      *   Cory Martin ("Cory the Crier") supported the Judges East side infrastructure
      project which prioritizes commercial vehicle access over neighborhood protection.

      *   First Baptist Church destroyed numerous houses to create parking lots designated
      as such despite being underutilized.


      THE DISCOVERY:

