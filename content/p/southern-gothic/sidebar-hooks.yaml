      over constituents.

      *   The system was facilitated by figures like Catalyst and Scott Boone Consulting
      taking precedence.

      *   In 2005, Orange Beach Mayor Steve Russo and City Attorney Larry Sutley were
      prosecuted for public corruption.

      *   Land purchases occurred during the same time as a "Strawman" candidate became
      County Commissioner.

      *   The Baldwin County Sewer Service operated without oversight due to private
      utility status.


      THE DISCOVERY:

      *   The structure of the "good ole boy system" is maintained by current entities
      like Scott Boone Consulting, which operates in the shadows.

      *   The mechanism for perpetuating this system involves former elected officials
      and their associates who maintain connections (e.g., Sheriff Hoss Mack).

      *   Dismantling the system requires voting out incumbents rather than changing
      the culture.


      THE PIVOT:

      *   Article 2 identifies Scott Boone Consulting as representing the current
      "cabal of good ole boys," directly linking them to the corrupt system exposed
      in Article 1.

      *   Article 1 describes *what* the corruption was (land deals, no-bid contracts,
      municipal erosion), and Article 2 details *who* built and maintains the structure
      through former leaders like Hoss Mack and current figures like Chris Elliott
      and Haygood.


