hooks:
  slap-in-the-face:
    brief: 'THE CONFLICT

      *   Past conflict involves Attorney Harry Still confronting judicial and municipal
      corruption in Baldwin County.

      *   Specific historical events include the prosecution of Orange Beach Mayor
      Steve Russo and City Attorney Larry Sutley in 2005 regarding public corruption.

      *   The history includes illegal no-bid awards of BP oil spill funds to a State
      Senator by the City of Fairhope.

      *   The political landscape was shaped by figures on the Baldwin County Commission
      in 2010.


      THE DISCOVERY

      *   Article 2 proves that Alabama is highly corrupt, evidenced by systemic issues
      in the judicial system and the prevalence of fraud.

      *   Specific examples cited include Senator Tripp Pittman''s involvement in
      BP fraud and Sen. Chris Elliott''s DUI.

      *   The article highlights failures by municipal attorneys (Marcus McDowell)
      to file charges regarding cases like the McSharry case.


      THE PIVOT

      *   Article 2 serves as the ''smoking gun'' because it shifts focus from specific
      Baldwin County infrastructure corruption (Article 1) to a generalized indictment
      of Alabama''s judicial system and politics, framing local issues within a larger
      pattern of state-level failure.

      *   The widget article generalizes the corruption seen in Baldwin County by
      linking local graft to major state political figures and federal fraud (FEMA,
      BP).


      KEY ENTITIES

      *   Harry Still

      *   CSB (Catalyst Scott Boone Consulting)

      *   Steve Russo (Orange Beach Mayor)

      *   Larry Sutley (City Attorney)

      *   Tripp Pittman (Senator)

      *   Chris Elliott (Senator)

      *   Marcus McDowell (Municipal attorney for Fairhope)

      *   McSharry case

      *   BP fraud

      *   FEMA fraud'
