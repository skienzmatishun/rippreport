  letter-to-the-alabama-attorney-general:
    brief: '1 THE CONFLICT

      - Steve Marshall (AL Attorney General) published tweets March 20, 15, and 27,
      2018 promising to prosecute white collar crime and political corruption.

      - Francis Paul Ripp (Founder, The Ripp Report) claims Marshall’s office and
