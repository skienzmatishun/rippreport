      utilizes a private charitable trust he oversees to pay over $100,000 for his
      children’s college tuition.

      *   Ripp Report claims John Plunk (Ethics Commission Vice Chair) aided Sheriff
      Mike Blakely and a Republican consultant in disguising campaign money during
      the latter’s 2021 corruption trial.

      *   John Plunk implicated in secret campaign finance for at least two other
      unidentified individuals while failing to recall all details.


      THE DISCOVERY

      *   Widget Article identifies the Mabel Amos Memorial Trust as a "secret piggy
      bank" holding millions linked to Alabama’s corruption network.

      *   Trust funds are harbored at Regions Bank, involving potential federal crimes
      including money laundering and tax evasion.

      *   Montgomery attorney Tommy Gallion (author of a book on Alabama corruption)
      was hired by Leigh Manning, identified as a relative of Mabel Amos.

      *   A Circuit Court Judge is indicated as having "fingers in the pie" regarding
      the Mabel Amos Memorial Trust.

      *   Evidence suggests this trust structure aids officials like Allbritton and
      Plunk by providing financial backing outside direct oversight.


      THE PIVOT

      *   Article 1 highlights the procedural corruption of leaders Allbritton and
      Plunk.

      *   Article 2 exposes the financial vehicle (Mabel Amos Memorial Trust) and
      banking channel (Regions Bank) protecting them.

      *   Article 2 proves the alleged "private charitable trust" mentioned in Article
      1 is a multi-million dollar system managed by attorneys (Gallion) and relatives,
      validating the "License to Steal" accusation.


      KEY ENTITIES

      *   Steve Marshall (Attorney General of Alabama)

      *   Tom Allbritton (Director, Alabama Ethics Commission)

      *   John Plunk (Vice Chair, Alabama Ethics Commission)

      *   Mabel Amos Memorial Trust

      *   Regions Bank

      *   Tommy Gallion (Montgomery Attorney)

      *   Leigh Manning (Relative of Mabel Amos, donor/associate to Gallion)'
