      - Ripp Report claims Ethics Commission believed the Fairhope Councilman without
      independent investigation.

      - Tom Allbritton (Director of Ethics Commission) faces accusations that he uses
      a private charitable trust to pay over $100,000 for his children’s college tuition.

      - John Plunk (Vice Chair of Ethics) is accused of helping Sheriff Mike Blakely
      disguise political money flowing to a Republican campaign consultant.

      - Columbia Mayor Rhonda Freeman case (numbers 2020-0337 & 0361) is pending before
      Ethics Commission, with alleged evidence of corruption by Mayor and police.


      2 THE DISCOVERY

      - Francis Paul Ripp sent a formal letter to Alabama Attorney General Steve Marshall
      at 501 Washington Ave, Montgomery AL.

      - The letter enclosed an Ethics Complaint, an Alabama Bar Complaint, and a Writ
      of Mandamus.

      - All enclosed documents specifically target Tom Allbritton regarding the Mabel
      Amos Memorial Fund.

      - Letters allege Allbritton is a trustee and attorney for the Mabel Amos Memorial
      Fund.

      - The Mabel Amos Memorial Fund is alleged to have awarded Allbritton’s daughters
      $105,000 in scholarships.

      - Ripp Report states they have 80,000 readers who are monitoring the investigation
      of Allbritton’s self-dealing.


      3 THE PIVOT

      - The Letter serves as physical proof that Article 1''s claims of "License to
      Steal" are based on formal, filed complaints rather than speculation.

      - The Letter validates Article 1’s claim that "Attorney General needs to investigate
      the Ethics Commission because they act as if they have immunity."

      - By exposing specific financial links (Mabel Amos Fund), Article 2 connects
      the "Ethics Commission" to a potential conflict of interest, proving why Article
      1 calls their actions unethical.

      - The Letter proves the "cannot answer a letter" claim is specific to Francis
      Paul Ripp and the enclosed evidence regarding Allbritton.


      4 KEY ENTITIES

      - Steve Marshall (Alabama Attorney General)

      - Francis Paul Ripp (The Ripp Report Founder)

      - Tom Allbritton (Director of Alabama Ethics Commission; Mabel Amos Trustee/Attorney)

      - John Plunk (Vice Chair of Ethics Commission)

      - Mike Blakely (Sheriff)

      - Rhonda Freeman (Columbia Mayor)

      - Mabel Amos Memorial Fund'
