  catalyst:
    brief: 'THE CONFLICT:

      *   Fly Creek Apartments site work planned for 230 apartments along Fly Creek
      behind the Publix.

      *   Mayor Tim Kant and developer Angelo Corte received support from Catalyst.

      *   Mayor Kant allegedly bent over for the developer’s requests while taxpayers
      paid.

      *   A Fire Station on Parker Road was constructed on Corte property adjacent
      to the proposed apartments.

      *   Mayor Kant authorized a sewer lift station above Fly Creek, which services
      the new apartments despite Fairhope''s existing sewer infrastructure problems.

      *   The City Council accepted a "Gift" of land/wetlands from Angelo Corte to
      the City of Fairhope (Councilmen Burrell and Boone voted for it).


      THE DISCOVERY:

      *   Catalyst supported the specific development project involving Mayor Kant
      and developer Corte.

      *   Catalyst is running the Fairhope Council, which is described as the "at
      large" council.

      *   The Catalyst council is ineffective, cannot pass a budget, and obstructs
      change due to special interests or connections to the "Tim Can’t Club."


      THE PIVOT:

      *   Article 1 details how Catalyst financially supported specific developers
      and infrastructure decisions that benefited them (e.g., Fire Station, lift station).

      *   Article 2 shows that this same entity (Catalyst) now controls the government
      body (the Council) responsible for future budgeting and decision-making, proving
      their ongoing political influence.


      KEY ENTITIES:

      *   Tim Kant (Former Mayor)

      *   Angelo Corte (Developer)

      *   Fly Creek Apartments

      *   Fairhope City Council

      *   Burrell (Councilman)

      *   Boone (Councilman)'
