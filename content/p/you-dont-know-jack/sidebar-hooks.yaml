  fairhope-council-shows-its-colors:
    brief: "THE CONFLICT:\n- Timeline: Late 2015 to late 2016 in Fairhope.\n- Event:\
      \ A ground lease (30 years) was awarded for a commercial hanger on plat 2 by\
      \ the Fairhope Airport Authority.\n- Key Players/Actions:\n  - Jack Burrell,\
      \ then President of the Fairhope City Council and member of the Airport Authority\
      \ Board, sat on the committee reviewing bids with Vince Boothe.\n  - Ray Hix\
      \ recused himself before any discussion occurred but later was a winning bidder\
      \ for Mid-Bay Air, LLC (with partner Snedecker).\n  - Jack Burrell made a motion\
      \ to award the bid to Hix/Snedecker Companies DBA Mid-Bay Air,llc on November\
      \ 17, 2015.\n  - The motion was second by Vince Boothe and unanimously carried.\n\
      \  - Mr. Snedecker (Fairhope Municipal Judge) and Ray Hix both were connected\
      \ to the decision despite having conflicts of interest/access to confidential\
      \ information.\n\nTHE DISCOVERY:\n- Present Action: Fairhope City Council is\
      \ actively attempting to derail or obstruct a change in government structure.\n\
      - Catalyst Role: The City Attorney is acting under instructions from Catalyst,\
      \ allegedly ignoring citizen interests and legal opinions (e.g., Mayor’s offer\
      \ of 06/26/2018).\n- Citizen Action: Over 800 Fairhope citizens submitted a\
      \ petition to trigger an election for the Council-Manager form of government,\
      \ bypassing City Council influence via the Alabama petition process.\n\nTHE\
      \ PIVOT:\n- Article 1 reveals systemic corruption and unethical practices (conflict\
      \ of interest deals) were historically protected by City officials like Jack\
      \ Burrell/Vince Boothe within the local power structure.\n- Article 2 demonstrates\
      \ that this institutional resistance to transparency and external accountability\
      \ persists today, as current Council members attempt to use established bureaucratic\
      \ means (City Attorney actions, delays in elections) to thwart a citizen-led\
      \ democratic initiative for reform. The historical \"cozy inside deals\" provide\
      \ the motive and pattern for current recalcitrance.\n\nKEY ENTITIES:\n- Jack\
      \ Burrell\n- Vince Boothe\n- Ray Hix\n- Snedecker (Fairhope Municipal Judge)\n\
      - Fairhope Airport Authority Board of Directors\n- City Attorney\n- Catalyst"
