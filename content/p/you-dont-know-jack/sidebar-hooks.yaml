      by Ray Hix and Judge Snedecker), subject to State Ethics Commission approval.
      The motion was seconded by Vince Boothe.

      *   Conclusion of Conflict: Memorandum of lease was recorded on December 17,
      2015.


      THE DISCOVERY

      *   Article 2 reveals that Jack Burrell has a documented history of corruption
