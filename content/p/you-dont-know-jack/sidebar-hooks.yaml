  court-public-opinion-now-session:
    brief: 'THE CONFLICT

      *   Fairhope Airport Authority received a ground lease for a commercial hanger
      on plat 2.

      *   The RFP for the ground lease was sent September 21, 2015, with a submittal
      date of October 13, 2015.

      *   November 17th minutes approved the bid awarded to Hix/Snedecker Companies
      DBA Mid-Bay Air, llc.

      *   Jack Burrell (President of Fairhope City Council) was on the Airport Authority
      Board and reviewed bids.

      *   Vince Boothe seconded the motion and assisted Jack Burrell in the review
      process.


      THE DISCOVERY

      *   The Court of Public Opinion (COP) has compiled a 42-page complaint using
      FOIA documents to allege bid rigging by the Fairhope Airport Authority.

      *   Jack Burrell is identified as the elected official, Airport Authority Board
      member, and liaison who recommended the RFP.

      *   Burrell aided and abetted the flawed bidding process.

      *   Jack Burrell had made flights on aircraft provided by Hix/Snedeker aircraft
      (Mid Bay Air LLC).

      *   The lease was signed on December 17, 2015, and an Ethics Advisory Opinion
      was issued on February 3, 2016.


      THE PIVOT

      *   Article 2 proves that Jack Burrell''s role in the RFP process constituted
      a clear conflict of interest and improper influence (bid rigging), which was
      suggested by Article 1.

      *   Article 2 provides specific proof connecting Burrell to the bidders (Hix/Snedeker)
      and showing how the lease was signed before ethical guidelines were met.


      KEY ENTITIES

      *   Jack Burrell

      *   Vince Boothe

      *   Jack Burrell (as City Council President and Airport Authority Board member)

      *   Hix/Snedecker Companies DBA Mid-Bay Air, llc

      *   Fairhope Airport Authority

      *   Court of Public Opinion (COP)

      *   Ethics Commission

      *   Executive Aviation

      *   Francis Paul Ripp (The Ripp Report)'
    generated_at: '2026-07-11T12:51:04.029268Z'
  fairhope-catalyst-a-dirty-little-secret:
    brief: 'THE CONFLICT

      *   Fairhope City Council members were hand-picked by the former Mayor, Tim
      Kant, as part of a "Catalyst" slate.

      *   Jack Burrell (President of the Fairhope City Council) was on the Airport
      Authority Board and participated in reviewing the bid for the commercial hanger
      on plat 2.

      *   The Airport Authority awarded the ground lease for a commercial hanger to
      Hix/Snedecker Companies DBA Mid-Bay Air, llc.

      *   Jack Burrell made a motion to award the bid to Hix/Snedecker Companies DBA
      Mid-Bay Air, llc.

      *   There were concerns regarding ethical conflicts: Mr. Hix should have resigned
      from the Airport Board, and Judge Snedecker should have been cleared by the
      ethics commission prior to the bid opening.


      THE DISCOVERY

      *   The City Council attempted to file an injunction against an October 2 referendum,
      suggesting an attempt to interfere with a public vote on the city''s form of
      government.

      *   Council President Jack Burrell and Councilman Jay Robinson failed to seek
      legal clarification from the Attorney General regarding the election details
      before a special meeting was called.

      *   The City Council used claims of "misinformation and transparency" as an
      excuse to delay or cancel the referendum, rather than engaging in proper public
      communication.


      THE PIVOT

      *   Article 2 reveals that the current City Council is actively working to undermine
      democratic processes (elections/referendums) while Article 1 shows how key council
      members (Burrell) leveraged their positions within the Airport Authority structure
      to secure lucrative contracts for specific companies (Hix/Snedecker).

      *   Article 2 demonstrates the structural corruption and lack of transparency
      by the Council itself, which is necessary context for understanding why Burrell''s
      actions in Article 1 were protected.


      KEY ENTITIES

      *   Jack Burrell

      *   Vince Boothe

      *   Jack Burrell (President of Fairhope City Council)

      *   Hix

      *   Snedecker Companies DBA Mid-Bay Air, llc

      *   Fairhope Airport Authority Board

      *   Tim Kant

      *   Karin Wilson

      *   Jay Robinson

      *   Catalyst Council

      *   Steve Marshall (Alabama Attorney General)'
    generated_at: '2026-07-11T12:51:04.029273Z'
  jack-gets-an-f-again:
