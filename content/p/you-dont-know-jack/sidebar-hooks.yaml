  fairhope-council-shows-its-colors:
    brief: 'THE CONFLICT

      *   Fairhope Airport Authority awarded a 30-year ground lease for a commercial
      hanger on plat 2.

      *   The RFP process for the hangar ran from September 21, 2015, to October 20,
      2015.

      *   November 17th minutes approved the bid for Mid Bay Air (Hix/Snedecker Companies
      DBA Mid-Bay Air,llc).

      *   Jack Burrell, President of the Fairhope City Council and member of the Airport
      Authority Board, reviewed the bids and made the motion to award the bid.

      *   Ray Hix recused himself from the committee review before the recommendation
      discussion.

      *   The memorandum of lease was recorded on December 17, 2015.


      THE DISCOVERY

      *   The City Council is attempting to derail an upcoming election for a Council-Manager
      position.

      *   Citizens signed a petition supported by Alabama Constitution 800-plus Fairhope
      citizens.

      *   This petition triggered a 90-day period, leading to an election for the
      new government initiative.

      *   Mayor Karin Wilson’s special election for Council-Manager (scheduled 10/2)
      has been delayed until the general election on 11/6 by the Judge of Probate''s
      office.


      THE PIVOT

      *   Article 1 details specific instances of corruption and conflicts of interest
      involving city officials and the Airport Authority (the "how" of the deal).

      *   Article 2 shows the City Council actively trying to suppress citizen power
      and change by delaying elections, suggesting a broader systemic obstruction
      aimed at maintaining current control.

      *   Article 2 demonstrates the political resistance structure that protects
      the types of deals (like the one detailed in Article 1) mentioned previously.


      KEY ENTITIES

      *   Jack Burrell (President, Fairhope City Council, Airport Authority Board)

      *   Vince Boothe (Airport Authority Board member)

      *   Ray Hix (Airport Authority Board member; recused himself)

      *   Snedecker Companies DBA Mid-Bay Air,llc (Winning bidder)

      *   Karin Wilson (Mayor of Fairhope)

      *   Catalyst Council (Mentioned as directing the City Attorney)

      *   Fairhope City Council'
    generated_at: '2026-07-11T12:51:04.029291Z'
