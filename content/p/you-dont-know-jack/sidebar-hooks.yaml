      *   It connects Burrell’s historical pattern of "Airport bid rigging" to his
      current actions regarding the $6.2 million Waterfront Project, where he is allegedly
      undermining public consensus on ADA compliance walkways and bank stabilization.


      THE PIVOT

      *   Article 1 provides specific, documented evidence of a major ethical breach
      involving Jack Burrell (the Mid-Bay Air/Hix deal).

      *   Article 2 uses this confirmed historical misconduct to provide the context
      for his current role as an obstructionist figure who is actively working against
      Mayor Sullivan’s agenda and public data on the Waterfront Project.


      KEY ENTITIES

      *   Jack Burrell: Council President (at time of conflict), Current political
      figure, alleged "Jackass Jack."

