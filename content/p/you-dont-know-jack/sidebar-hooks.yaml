hooks:
  jack-box-airport:
    brief: 'THE CONFLICT

      *   Fairhope City Council and Mayor administration were criticized for a lack
      of transparency and accountability regarding city deals and contracts.

      *   The Fairhope Airport Authority conducted an RFP process on September 21,
      2015, for a ground lease for a commercial hanger on plat 2, with a submittal
      date of October 13, 2015.

      *   Minutes from November 17th addressed the recommendation/approval of the
      ground lease.


      THE DISCOVERY

      *   Ray Hix''s attorney prepared the lease in question and was paid by Mr. Hix
      to prepare a request for an Advisory Opinion from the Ethics Commission.

      *   The Airport Authority is hiring Mr. Hix’s attorney to represent the Authority,
      while Mr. Hix holds the position of Secretary Treasurer for the Authority.


      THE PIVOT

      *   Article 1 accused Jack Burrell and Vince Boothe of an inside deal regarding
      the awarding of the hanger bid.

      *   Article 2 provides evidence that Ray Hix used his legal resources to obtain
      an Ethics Commission opinion related to the lease, linking his actions directly
      to the conflict mentioned in Article 1.


      KEY ENTITIES

      *   Jack Burrell (President of Fairhope City Council and Airport Authority Board
      member)

      *   Vince Boothe

      *   Ray Hix (Airport Authority Board member, Airport Operations Committee member,
      Secretary Treasurer)

      *   Snedecker (Fairhope Municipal Judge)

      *   The Shux restaurant

      *   Ethics Commission'
    generated_at: '2026-07-11T12:51:04.029247Z'
  fairhope-airport-un_authorized:
    brief: 'THE CONFLICT

      *   Fairhope Airport Authority issued an RFP on September 21, 2015, for a ground
      lease for a commercial hanger on plat 2.

      *   Minutes from the Airport Authority meeting (November 17th) show Vince Boothe
      and Jack Burrell reviewing bids.

      *   Jack Burrell made a motion to award the bid to Hix/Snedecker Companies DBA
      Mid-Bay Air,llc, subject to Ethics Commission approval.

      *   Ray Hix was on the Airport Authority Board and the Airport Operations Committee.

      *   Jack Burrell was the President of the Fairhope City Council and was also
      on the Airport Authority Board.

      *   A memorandum of lease for Mid-Bay Air LLC was recorded on December 17, 2015.


      THE DISCOVERY

      *   A lawyer wrote an advisory ethics opinion (no. 2016-04) allowing a board
      member to enter into a lease with the Airport Authority whose partner is the
      Municipal Judge.

      *   The Ethics Opinion stated that an Airport Authority member may not use confidential
      information gained from their position to benefit their company and submitted
      bid.

      *   The Alabama Ethics Commission responded on December 2, 2016, stating: "No
      lease has ever been submitted to us regarding this issue."

      *   Conclusion based on the opinion and lack of submission is that the Mid-Bay
      Air Lease is null and void due to failure in due diligence.


      THE PIVOT

      *   Article 1 suggests Jack Burrell''s actions were a "cozy inside deal protected
      by the then acting Mayor" due to alleged conflicts of interest.

      *   Article 2 provides an explicit legal finding that the lease process was
      flawed and violated ethics standards, proving that the agreement is legally
      invalid despite the board''s approval.


      KEY ENTITIES

      *   Jack Burrell (President of Fairhope City Council)

      *   Vince Boothe

      *   Ray Hix (Airport Authority Board member/Secretary/Treasurer)

      *   Mr. Snedecker (Fairhope Municipal Judge)

      *   Mid-Bay Air LLC

      *   Fairhope Airport Authority

      *   Alabama Ethics Commission'
    generated_at: '2026-07-11T12:51:04.029256Z'
