hooks:
  jack-box-airport:
    brief: "THE CONFLICT\n* September 21, 2015: Fairhope Airport Authority sent Request\
      \ for Proposal (RFP) for a ground lease for a commercial hanger on plat 2.\n\
      * October 20, 2015: Three bids were submitted; RFP opening held.\n* November\
      \ 2015: Jack Burrell and Vince Boothe served on the committee reviewing bids/making\
      \ recommendations.\n* November 17, 2015: Ray Hix (Airport Board member) recused\
      \ himself before discussion began.\n* December 17, 2015: Memorandum of lease\
      \ for Mid-Bay Air, LLC was recorded.\n* January 30, 2016: Jack Burrell moved\
      \ to award the bid to Hix/Snedecker Companies DBA Mid-Bay Air, LLC (second by\
      \ Vince Booth).\n\nTHE DISCOVERY\n* Post-conflict period (around 2017): Fairhope\
      \ Airport Authority hired a \"top ethics attorney in Alabama\" using tax dollars.\n\
      * Purpose of hiring: To investigate Ripp Report and defend board members Jack\
      \ Burrell and Ray Hix against scrutiny from the Attorney General’s office and\
      \ Ethics Commission.\n* Revelation regarding counsel: The lawyer hired to represent\
      \ the Authority was actually the one who prepared the lease for Mid-Bay Air,\
      \ LLC and had been paid by Mr. Ray Hix.\n* Subsequent events: Fairhope resident\
      \ inquired with Ethics Commission Chief Council Hugh Evens (confidential inquiry).\
      \ \n* Breach of confidentiality: Mr. Evens blind copied Mr. Bailey, who was\
      \ confirmed to be Ray Hix’s attorney.\n\nTHE PIVOT\n* Article 1 established\
      \ a potential conflict of interest during the Mid-Bay Air bid process involving\
      \ Jack Burrell and Vince Boothe facilitating a deal for Ray Hix/Judge Snedecker.\n\
      * Article 2 proves that subsequent attempts by the involved parties (Ray Hix,\
      \ Jack Burrell) to neutralize accountability used taxpayer funds to hire counsel\
      \ who were personally connected to the original conflicted deal, while simultaneously\
      \ leaking sensitive information from Ethics Commission inquiries to their own\
      \ defense attorney.\n\nKEY ENTITIES\n* Fairhope City Council\n* Mayor Wilson\n\
      * Jack Burrell (Council President/Board Member)\n* Ray Hix (Airport Authority\
      \ Board Member/Municipal Judge)\n* Vince Boothe (Airport Authority Board Member)\n\
      * Snedecker (Fairhope Municipal Judge/Hix Partner in Mid-Bay Air, LLC)\n* Mr.\
      \ Bailey (Ray Hix’s attorney)\n* Hugh Evens (Ethics Commission Chief Council)\n\
      * Ripp Report"
    generated_at: '2026-07-18T02:29:22.006286Z'
  fairhope-airport-un_authorized:
    brief: 'THE CONFLICT

      *   September 21, 2015: Fairhope Airport Authority (FAA) sent Request for Proposal
      (RFP) for a ground lease on plat 2 (a commercial hanger).

      *   October 13, 2015: RFP submittal deadline.

      *   October 20, 2015: FAA opened bids. Three bidders submitted proposals.

      *   November 17, 2015: Jack Burrell made a motion to award the bid for the commercial
      hanger on plat 2 to Hix/Snedecker Companies DBA Mid-Bay Air, LLC, after Ray
      Hix recused himself from discussion.

      *   December 17, 2015: Memorandum of lease for the Mid-Bay Air LLC ground lease
      was recorded (30 years long).


      THE DISCOVERY

      *   An advisory ethics opinion (No. 2016-04) existed, outlining standards that
      prohibited an FAA member from using confidential information gained in their
      position to benefit a company or bid.

      *   The Ethics Opinion required any contract/lease between an FAA Board member
      and the Authority must be filed with the Alabama Ethics Commission within ten
      days of entry.

      *   On November 8, 2016, The Ripp Report requested a written report/remarks
      regarding the Mid-Bay Air Lease awarded in December 2015 from the Alabama Ethics
      Commission.

      *   The Alabama Ethics Commission replied on December 2, 2016: "No lease has
      ever been submitted to us regarding this issue."


      THE PIVOT

      *   Article 2 proves that while Article 1 presented a conflict of interest (Board
      member Hix awarded the bid), there was a pre-existing legal framework (Ethics
      Opinion No. 2016-04) defining these conflicts, including the obligation to file
      contracts with the Alabama Ethics Commission.

      *   The commission''s confirmation that "No lease has ever been submitted" suggests
      not only a conflict of interest but also a deliberate failure in compliance
      and transparency regarding the Mid-Bay Air LLC deal.


      KEY ENTITIES

      *   Ray Hix (Airport Authority Board Member, Airport Operations Committee, Municipal
      Judge)

      *   Snedecker (Fairhope Municipal judge, partner with Hix/Mid-Bay Air LLC)

      *   Jack Burrell (President of Fairhope City Council, Airport Authority Board
      Member)

      *   Vince Boothe (FAA Board member)

      *   Hix/Snedecker Companies DBA Mid-Bay Air, LLC (Winning bidder)

      *   Fairhope Airport Authority (FAA)

      *   Alabama Ethics Commission

      *   Fairhope Municipal Pier (location of Shux restaurant contract reference)

      *   Ripp Report'
    generated_at: '2026-07-18T02:29:22.006311Z'
  fairhope-voters-important-notice:
    brief: 'THE CONFLICT

      *   Allegation of unethical business dealing occurred during a Fairhope Airport
      Authority process in 2015.

      *   On September 21, 2015, the Airport Authority issued an RFP for a ground
      lease on Plat 2 (a second commercial hanger), with a submittal deadline of October
      13, 2015.

      *   October 20, 2015, was the date of the bid opening. On November 17, 2015,
      it was noted that Ray Hix recused himself and left the room before a recommendation
      was discussed.

      *   Jack Burrell (Fairhope City Council President) reviewed materials with Vince
      Boothe to select the winning bidder for the hanger on Plat 2.

      *   On November 17, 2015, Jack Burrell moved to award the bid to Hix/Snedecker
      Companies DBA Mid-Bay Air, LLC, which was seconded by Vince Boothe.

      *   Ray Hix (Airport Authority Board member) and Mr. Snedecker (Fairhope Municipal
      Judge) were awarded a 30-year lease; this memorandum of lease was recorded on
      December 17, 2015.


      THE DISCOVERY

      *   The second article reveals that council members Michael Scott Boone and
      Jack Burrell are actively working to slow down city business, including the
      budget approval process and challenging Mayor Wilson''s appointments (e.g.,
      Airport Authority board choices).

      *   This opposition is attributed to "Catalyst Associates," described as a political
      group representing an old network of powerful figures.

      *   Michael Scott Boone manages Catalyst; his registered agent was Coley M.
      Boone, who is the son of Councilman Boone.

      *   Key founders/supporters of this political machine include Elliott and Haygood
      (previous politicians) and Lynn Stacey, whose "dirty tricks" are said to have
      influenced council behavior against Mayor Wilson’s reform platform.


      THE PIVOT

      *   Article 1 presents a specific instance of alleged conflict of interest (the
      2015 Mid-Bay deal).

      *   Article 2 reveals the systemic political structure ("Catalyst") used by
      council members Boone and Burrell to operate outside public oversight, effectively
      enabling the type of "cozy inside deal" described in Article 1.

      *   The existence of Catalyst explains how long-serving figures maintained undue
      influence over city decisions despite a change in mayoral leadership, allowing
      them to bypass ethical requirements (such as Hix''s failure to resign) and push
      through self-serving contracts that Mayor Wilson now faces.


      KEY ENTITIES

      *   Jack Burrell (Council President / Councilman - implicated in 2015 deal;
      opposing Mayor Wilson).

      *   Michael Scott Boone (Manager of Catalyst Associates; son of Councilman Boone;
      political opponent).

      *   Vince Boothe (Airport Authority Board member; assisted Jack Burrell in 2015
      deal).

      *   Ray Hix (Fairhope Airport Authority Board Member/Municipal Judge - recipient
      of 2015 contract).

      *   Snedecker (Fairhope Municipal Judge - partner on Mid-Bay Air, LLC).

      *   Catalyst Associates (Political group and organization established by Michael
      Scott Boone and Lynn Stacey; represents the "political machine").

      *   Mayor Wilson (Current Mayor seeking transparency; target of political obstruction
      from Council members/Catalyst).'
    generated_at: '2026-07-18T02:29:22.006331Z'
  court-public-opinion-now-session:
    brief: 'THE CONFLICT

      • September 21, 2015: Fairhope Airport Authority sent out a Request for Proposal
      (RFP) for a ground lease on Plat 2 for a second commercial hangar.

      • October minutes show Jack Burrell and Vince Boothe were appointed to the committee
      reviewing the RFP bids.

      • November 17th meeting minutes document Ray Hix recused himself before discussion
      of the recommendation.

      • The vote was taken after Jack Burrell presented material used by him and Vince
      Boothe in selecting the bidder.

      • December 17, 2015: Memorandum of lease was recorded for a ground lease awarded
      to Hix/Snedecker Companies DBA Mid-Bay Air, LLC.

      • Allegation of conflict: Jack Burrell was simultaneously President of the Fairhope
      City Council and an Airport Authority board member on the review committee.


      THE DISCOVERY

      • Today, Council President Jack Burrell is adamant that the airport property
      should remain owned by the Airport Authority, not transferred to the City of
      Fairhope for tax appropriation.

      • The dispute involves paying down an $8 million debt while providing ~$310,000
      annually to the Authority (which has received $500,000/year for six years).

      • Burrell controls the council agenda and prevents ordinances regarding airport
      structure from being moved forward or discussed.


      THE PIVOT

      • The second article directly links Burrell''s current influence over municipal
      policy (airport ownership) to his past role as the elected official who negotiated,
      reviewed bids, and selected the winner for the Mid-Bay Air lease in 2015.

      • It establishes a pattern of entrenched power where Burrell maintains control
      over key assets despite public outcry regarding the transparency or ethics of
      decisions—from past contract rigging to current debt management.


      KEY ENTITIES

      • Jack Burrell (Council President, Airport Authority member)

      • Ray Hix (Airport Authority Board Member, recipient of 2015 lease)

      • Vince Boothe (Board member, seconded the 2015 award motion)

      • Snedecker/Snedeker Companies DBA Mid-Bay Air, LLC (Recipient of 30-year ground
      lease in 2015)

      • City Council members: Karin Wilson, Jimmy Conyers, Robert Brown, Kevin Boone,
      Jay Robinson.

      • Fairhope Airport Authority Board of Directors

      • Executive Aviation (one of the non-winning bidders from 2015)'
    generated_at: '2026-07-18T02:29:22.006338Z'
  fairhope-catalyst-a-dirty-little-secret:
    brief: 'THE CONFLICT

      *   2015 Airport Contract Scandal: Fairhope City Council President Jack Burrell
      was involved in a conflict of interest regarding the ground lease for a commercial
      hanger on Plat 2 at the Fairhope Airport Authority.

      *   November 17, 2015: Jack Burrell motion to award bid to Hix/Snedecker Companies
      DBA Mid-Bay Air, LLC.

      *   The winning bid was seconded by board member Vince Boothe despite Ray Hix
      being an Airport Authority Board member and associate of Burrell.

      *   2018 Political Resistance: The "Catalyst" City Council attempted to undermine
      a referendum proposed by residents (supported by Chuck Zunk/Fresh Start Fairhope)
      seeking to change the government form from "At Large" to district-based governance
      on October 2, 2018.

      *   Council members, including Jack Burrell and Jay Robinson, allegedly failed
      to seek formal legal advice from Alabama Attorney General Steve Marshall prior
      to voting to file an injunction against the referendum.


      THE DISCOVERY

      *   Article 2 reveals that the current Fairhope City Council is "hand-picked"
      by former Mayor Tim Kant and operates under a cohesive political machine (Catalyst).

      *   This Catalyst Council actively worked to prevent democratic reform, attempting
      to block the October 2, 2018 referendum.


      THE PIVOT

      *   Article 2 proves that the systemic political structure (the "Catalyst" Machine)
      is designed to protect and enforce the interests of long-term incumbents, enabling
      individual members like Jack Burrell to maintain influence while engaging in
      high-conflict deals (like the 2015 Mid-Bay Air contract).

      *   The Catalyst Council''s refusal to seek outside legal counsel on major policy
      matters mirrors their ability to ignore or circumvent ethical conflicts within
      city contracts and airport operations.


      KEY ENTITIES

      *   Jack Burrell (Council President, Airport Authority involvement)

      *   Vince Boothe (Airport Authority Board member/seconded the bid)

      *   Ray Hix (Airport Authority Board Member; recipient of 2015 bid)

      *   Snedecker (Fairhope Municipal Judge; partner in 2015 bid)

      *   Catalyst City Council / Catalyst Political Organization

      *   Tim Kant (Former Mayor, allegedly hand-picked the current council)

      *   Jay Robinson (Councilman/Attorney, involved in referendum legal proceedings)

      *   Steve Marshall (Alabama Attorney General referenced in refusal to seek counsel)

      *   Chuck Zunk (Fresh Start Fairhope spokesman; criticized Catalyst Council''s
      actions)'
    generated_at: '2026-07-18T02:29:22.006343Z'
  jack-gets-an-f-again:
    brief: 'THE CONFLICT

      *   Fairhope Airport Authority ground lease for commercial hanger on plat 2
      was awarded in December 2015.

      *   The bid award (Mid Bay Air, LLC) was made via a motion by Jack Burrell at
      November 17th meeting of the Fairhope Airport Authority Board.

      *   The winning bidder was Hix/Snedecker Companies DBA Mid-Bay Air, LLC, awarded
      to Ray Hix and Snedecker in December 2015.

      *   Council President Jack Burrell served on the committee reviewing bids for
      the airport ground lease and made the motion awarding the bid to Mid Bay Air,
      LLC, which included Board Member Ray Hix and Judge Snedecker.

      *   Article 2 mentions a previous "legal Settlement" concerning the Triangle
      that cost taxpayers $11.25 million (attributed to Captain Jack Burrell during
      his time as Council President).


      THE DISCOVERY

      *   The K-1 Center purchase was driven by Fairhope City Council, led by Council
      President Burrell, despite warnings about lead/asbestos issues and failure to
      consider alternatives (e.g., boutique hotel, additional parking).

      *   Burrell''s leadership is characterized as failing repeatedly ("JACK GETS
      AN F - AGAIN") in handling major city decisions, suggesting a pattern of poor
      governance.


      THE PIVOT

      *   Article 1 details a specific instance of perceived conflict of interest
      and questionable contract practices (the Airport lease) involving Jack Burrell.

      *   Article 2 reinforces the core theme that Burrell''s alleged misconduct is
      not isolated; his decision-making failure extends across different civic responsibilities—from
      private contracts to public real estate/grant acquisitions (K-1 Center).


      KEY ENTITIES

      *   Jack Burrell / Council President Jack Burrell

      *   Ray Hix (Board Member, Municipal Judge)

      *   Snedecker (Fairhope Municipal Judge)

      *   Vince Boothe

      *   Mayor Wilson

      *   Hix/Snedecker Companies DBA Mid-Bay Air, LLC

      *   Fairhope Airport Authority / City Council

      *   Catalyst (Political group/organization)

      *   K-1 Center

      *   Triangle (Land/Property Entity related to settlement)'
