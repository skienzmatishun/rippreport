      *   On November 17, 2015, Ray Hix recused himself prior to discussion; Burrell
      then nominated Mid-Bay Air, LLC (owned by Hix/Snedecker) as the winner.

      *   Vince Boothe seconded the motion unanimously.


      **THE DISCOVERY:**

      *   Article 2 identifies Jack Burrell as a "professional B.S. artist" regarding
      public funds and infrastructure management in Fairhope.

      *   Burrell led efforts to upgrade the failing sewer plant; instead of an original
      2013 proposal for ~$20 million, he championed a $13 million approval (which
