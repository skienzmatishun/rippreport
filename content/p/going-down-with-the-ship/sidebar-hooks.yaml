      - Both expose the political influence of figures like Angus Cooper over municipal
      decisions (Gulf Quest hiring, Fly Creek stance), mirroring how institutional
      inertia stalls major infrastructure goals in Baldwin County.


      **KEY ENTITIES:**

      - Angelo Corte: Developer/Fly Creek Apartments proponent

      - Diana Brewer: Councilwoman/Director of Weeks Bay/Former candidate for Fairhope

      - Hand Arendall: Attorney who won the P&Z lawsuit against Fairhope

