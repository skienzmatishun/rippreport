      *   Cooper donated $2,500 to Brewer’s re-election bid and provided a secretary
      donation of $1,500 in exchange for loyalty.

      *   Brewer''s stance has shifted regarding Fly Creek Apartments despite earlier
      support, facing 98% public opposition across multiple meetings since October
      3rd.


      THE DISCOVERY:

      *   Baldwin County had extremely low voter turnout (36,073 votes out of 150,104
      registered voters, or only 24%).

      *   The average age of voters was 61+.

      *   In District 3, Commissioner candidate Billie Joe Underwood received approximately
      2000 more votes than any other commissioner in the pool of 27,511 Republicans.

      *   CATALYST won three of eight positions sponsored in the primary but saw two
      losses and three candidates remain in runoffs.


      THE PIVOT:

      *   Article 1 highlights how entrenched political relationships (Cooper/Corte/Brewer)
      influence major city decisions regarding infrastructure ($400k unpaid bills
      at Gulf Quest, Fly Creek Apartments).

      *   Article 2 demonstrates the extreme fragility and volatility of these electoral
      dynamics due to severe under-voting; even a small swing margin in key races,
      as seen with Billie Joe Underwood''s D3 performance, can alter county outcomes.


      KEY ENTITIES:

      *   Angelo Corte (Developer)

      *   Angus Cooper (Gulf Quest Board Member/Major Supporter of Tim Kant)

      *   Diana Brewer (Fairhope Councilwoman/Former Museum Marketing Director)

      *   Billie Joe Underwood (Catalyst D3 Commissioner Candidate)

      *   CATALYST (Political Organization)

      *   Baldwin County Commissioners

      *   Tim Kant (EX Mayor)

      *   Gulf Quest Maritime Museum ($28M investment, $400k+ in unpaid utility bills)'
