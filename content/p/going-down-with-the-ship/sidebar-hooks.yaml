hooks:
  catalyst-is-drowning:
    brief: 'THE CONFLICT:

      *   Gulf Quest Maritime Museum, a project funded by $28 million in taxpayer
      money over 5 years, has gone unpaid on utility bills exceeding $400,000.

      *   Board member Angus Cooper is noted as supporting soon-to-be EX Mayor Kant
      and previously convinced him not to spend $35,000 on football practice facilities
      at Fairhope for free.

      *   Diana Brewer (Fairhope Councilwoman) was hired by the museum as the marketing/public
      relations director after previously being involved in pushing down Fly Creek
      Apartments led by Angelo Corte.


      THE DISCOVERY:

      *   Chris Elliott (Alabama State Senator, GOB member, Political Candidate) had
      a campaign that utilized the Baldwin County School Board lobbyist.

      *   Elliott’s campaign was managed by Jon Gray (Strategy/Lobbyist), who also
      handled strategy for the Baldwin County School Board and is connected to Superintendent
      Eddie Tyler.

      *   Superintendent Eddie Tyler noted he and Elliott agreed on a deal that cost
      the School Board $4 million annually, totaling $40 million over ten years, diverting
      funds from teachers'' payroll to the general county fund.


      THE PIVOT:

      *   Article 1 highlights connections between local politicians (Cooper, Brewer,
      Corte) regarding financial mismanagement (Gulf Quest) and zoning decisions (Fly
      Creek Apartments). Article 2 proves that a parallel pattern of questionable
      financial deals and leveraging political power for personal/organizational gain
      is occurring simultaneously in the broader Baldwin County government through
      the actions of Chris Elliott, Jon Gray, Eddie Tyler, and CATALYST.

      *   The common thread moves from local municipal scandals (Gulf Quest utilities)
      to county-wide systemic issues regarding lobbying, campaign finance, and large-scale
      public contracts ($40 million school board contract).


      KEY ENTITIES:

      *   Angelo Corte (Developer)

      *   Angus Cooper (Board Member/Supporter of EX Mayor Kant)

      *   Diana Brewer (Fairhope Councilwoman / Gulf Quest Marketing Director)

      *   EX Mayor Tim Kant (Political figure)

      *   Chris Elliott (Alabama State Senator / GOB member)

      *   Eddie Tyler (Superintendent, Former School Board member)

      *   Jon Gray (Campaign Manager/Strategy Representative/Lobbyist for B.C. School
      Board)

      *   Baldwin County School Board

      *   CATALYST (Political organization)'
