  missed-the-boat:
    brief: 'THE CONFLICT:

      *   Fairhope/Baldwin County political interests are tied to developers like
      Angelo Corte (developer of Fly Creek Apartments) and his connections to Angus
      Cooper (board member for Gulf Quest).

      *   Councilwoman Diana Brewer was hired as marketing director for Gulf Quest
