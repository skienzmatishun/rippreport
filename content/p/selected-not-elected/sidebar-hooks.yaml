  fairhope-catalyst-a-dirty-little-secret:
    brief: 'THE CONFLICT:

      - October 2, 2018: Over 1,000 residents signed a petition to change Fairhope
      government structure from "At Large" to Districts/Council-Manager via referendum.

      - Prior to election: Jack Burrell and Jay Robinson, sitting on City Council,
      allegedly plotted behind closed doors to stop the referendum.

      - During special meeting (September 2018): Council voted to hire City Attorney
      and file an injunction against the Oct. 2 referendum.

      - Article 1 Context (March 8, 2021): Robert Brown vacates Place 4 seat on City
      Council.

      - Immediate Plan (Article 1): Burrell/Council schedule meeting to appoint replacement
      without letting candidates who ran for election choose the vacancy.


      THE DISCOVERY:

      - Article 2 (Widget) proves Jay Robinson and Jack Burrell are central to a long-standing
      "Catalyst" machine that resists democratic reform in Fairhope.

      - October 2018: Robinson and Burrell refused to obtain Attorney General opinion
      on the referendum change until 11 days prior, allegedly to ensure delay tactics
      were used.

      - Article 2 reveals: Fairhope City Council is currently described as "At Large"
      and controlled by Catalyst/CSB connections dating back to former Mayor Tim Kant.

      - Article 1 (Main) confirms: Jay Robinson is now being appointed as council
      member under the direction of Mayor Jack Burrell.

      - Article 1 reveals: Robert Brown had listed his home on MLS in January and
      bought property while campaigning, alleged as part of a plan to clear the seat
      for an appointee.

      - Article 1 reveals: Robinson reportedly told Council President Burrell he had
      Attorney General Nick Saban’s number on speed dial but did not know the actual
      AG Steve Marshall''s number before Oct 2018 meeting.


      THE PIVOT:

      - Jay Robinson is the critical connecting figure. In 2018 (Article 2), he helped
      structure legal maneuvers to block the District government referendum.

      - In 2021 (Article 1), Robinson is being installed via the same "appoint instead
      of elect" method.

      - Jack Burrell is the operational leader connecting both: He led the 2018 obstruction
      (Article 2) and is directing the March 8, 2021 appointment process (Article
      1).

      - Both articles prove a pattern where CSB/Catalyst-backed officials bypass voter
      intent: First via Oct 2018 legal injunction (blocking Districts), now via March
      2021 Council appointments (bypassing election norms).


      KEY ENTITIES:

      - Jack Burrell (Mayor/Acting Mayor)

      - Jay Robinson (Council Member, Attorney)

      - Robert Brown (Former Council Member)

      - Karin Wilson (Mayor 2018-2021)

      - Tim Kant (Former Mayor, Catalyst figurehead)

      - CSB (Scott Boone Consulting)

      - Fairhope City Council

      - Catalyst (Group/Organization)

      - Nick Saban (mentioned incorrectly by Burrell as contact, implies lack of due
      diligence)'
