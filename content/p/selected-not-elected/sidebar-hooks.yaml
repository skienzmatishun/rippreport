      \ Scott Boone Consulting accused of influencing Council appointments (Mayor,\
      \ Judges, Sheriff).\n- Citizens claim Burrell and Councilman are skipping Public\
      \ Participation (scheduled after Oath) to rubber-stamp appointment.\n- Council\
      \ and Burrell accused of bypassing election results by selecting replacement\
      \ (Jay Robinson) instead of choosing from candidates who ran.\n\nTHE DISCOVERY:\
      \ \n- Past documentation (Widget Article) reveals Fairhope City Council instructed\
      \ City Attorney to find loopholes to delay Oct. 2, 2018 vote on government change.\n\
      - The October 2018 measure that voters attempted to approve was moved onto the\
      \ general election ballot on Nov. 6, 2018 due to these delays.\n- Council shifted\
      \ blame for the delay strategy onto City Clerk and Mayor after the fact to avoid\
      \ accountability.\n- Council identified as members of \"King Kant Kingdom\"\
      \ or Catalyst network; linked to previous Mayor Wilson (described as the closed\
      \ door between corrupt officials).\n\nTHE PIVOT: \n- Widget Article (Bury The\
      \ Body) proves the Fairhope City Council and catalyst group have a long-term\
      \ pattern of manipulating election logistics (2018) rather than adhering to\
      \ public mandates.\n- Main Article (Selected Not Elected) confirms the same\
      \ pattern occurring in 2021 via Jay Robinson’s appointment rather than election.\n\
      - Link: The \"City Attorney\" tactics used in 2018 (Widget) mirror the \"Council\
      \ Appointment/Selection\" tactics used in 2021 (Main); both involve the same\
      \ leadership group overriding direct citizen input.\n\nKEY ENTITIES: \n- Jack\
      \ Burrell\n- Jay Robinson\n- Robert Brown\n- Mayor Wilson\n- Corey Martin (Place\
      \ 2 City Councilman)\n- Scott Boone Consulting / CSB\n- CATALYST\n- Jody E.\
      \ Bishop (Circuit Court Judge)\n- City Attorney / City Clerk"
