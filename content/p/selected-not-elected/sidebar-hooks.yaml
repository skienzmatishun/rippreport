hooks:
  csb-railroad-nomination:
    brief: '1. THE CONFLICT

      - Robert Brown resigned/abandoned Fairhope City Council Seat 4 (Place 4 vacant).

      - Jack Burrell acting as Mayor/Council President moving to fill seat before
      citizen input.

      - Agenda scheduled for March 8, 2021 at Fairhope City Council Chamber.

      - Accusations of collusion with CSB (Scott Boone Consulting), Catalyst to install
      preferred officials.

      - Claim that selection bypassed all candidates who ran in the 2021 election.


      2. THE DISCOVERY

      - July 21, 2020: Robert Brown purchased "family property" in Fairhope.

      - January 2021: Robert Brown listed Fairhope home on MLS.

      - July 2020: Jay Robinson publicly announced he would not commit to running
      due to family/health reasons.

      - March 8, 2021: Jay Robinson appointed/sworn in without public participation
      on nomination.

      - Council President Burrell admitted publicly, "I made the decision."

      - Cory Martin apologized during comments for lack of public input regarding
      Robinson’s selection.


      3. THE PIVOT

      - Article 2 confirms timeline disconnect: Robinson claimed non-candidacy in
      July 2020, seat filled March 2021 without re-election.

      - Article 2 proves bypass authority: Burrell verbally admitted, "I made the
      decision," removing need for democratic debate.

      - Article 2 validates financial incentive conflict: Seat includes $11,500/year
      plus family insurance valued at ~$80k-$100k total.

      - Article 2 confirms personal ties: Robinson is long-time best friend of the
      Mayor; Council denied knowledge during property purchase timeline but admitted
      process was manipulated.


      4. KEY ENTITIES

      - Jack Burrell (Council President/Acting Mayor)

      - Jay Robinson (Appointed Council Member)

      - Robert Brown (Outgoing Council Member)

      - Corey Martin (Council Member/Observer)

      - Scott Boone Consulting (CSB) / Catalyst

      - Mayor Wilson (Former Mayor referenced in Article 1)'
