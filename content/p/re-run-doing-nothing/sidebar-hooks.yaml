      *   The City of Fairhope has 27 million dollars in failed or incomplete projects
      and infrastructure is 20 years behind.

      *   The City''s $6.2 million waterfront project was a political issue regarding
      missing grant money and unutilized design work.


      THE DISCOVERY:

      *   Soccer fields degraded from an estimated $3.5 million to $6 million in size,
      resulting in sub-standard facilities due to poor construction, drainage, lack
      of shade, and insufficient parking.

      *   A proposed purchase of recreation land for $2.65 million by CATALYST Council,
      Boone Burrell, and Brown was questioned based on a questionable appraisal.


      THE PIVOT:

