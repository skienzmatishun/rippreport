  quid-quo-pro:
    brief: 'THE CONFLICT

      *   Fairhope City Council voted 3 to 2 to purchase $2.6 million in recreation
      property.

      *   The purchase was based on an appraisal with questionable comps or a plan
      for payment, not a formal purchase.

      *   Councilman Robert Brown is pushing past the Eastern Shore Art Center contract
      without providing documentation.

      *   The Council is repeatedly attempting to give away 102 acres around the triangle
      (worth $20 million in city property).


      THE DISCOVERY

      *   The council actions are described as a "Favor for a Favor" / "Quid quo pro"
      scenario.

      *   CATALYST and Quid quo pro are synonymous.

      *   Councilman Robert Brown is connected to Cliff Pittman, who is an inside
      contact for FSTC (Fairhope Single Tax Colony).

      *   Brown and Pittman are betting on receiving a contract to build a subdivision
      in the gully based on reputation rather than merit.


      THE PIVOT

      *   Article 2 reveals that the council''s decision-making (the conflict in Article
      1) is not based on legitimate public interest but on pre-arranged, corrupt favors
      ("Quid quo pro") between Councilman Brown and his associate Cliff Pittman.

      *   The alleged quid quo pro relationship explains why the council ignores community
      resistance and repeatedly attempts to hand out city property.


      KEY ENTITIES

      *   City Council

