  loser:
    brief: 'THE CONFLICT:

      *   Date: August 28th, 2017.

      *   Event: A Fairhope City Council meeting.

      *   Action: City Council President Jack Burrell refused the author the right
      to speak during public participation.

      *   Context: The City Attorney was aware of the issue earlier but remained silent.


      THE DISCOVERY:

      *   The lawsuit filed by The Ripp Report against the Council/Burrell was settled
      with an Insurance Company.

      *   The settlement allowed The Ripp Report to cover all legal fees and achieve
      profitability ("in the black").

      *   Jack Burrell claimed victory by proving an "at Large" Council is responsible
      to no one, and that he won by avoiding an apology or accountability.


      THE PIVOT:

      *   Article 2 provides Burrell''s boast that the author should have held out
      for more money, and his claim that the city won because the lawsuit was settled
      for too little.

      *   This proves that Burrell’s claimed "win" was based on avoiding accountability
      rather than resolving the initial constitutional dispute regarding free speech.


      KEY ENTITIES:

      *   Jack Burrell (City Council President)

      *   Fairhope City Council

      *   The Ripp Report

      *   Insurance Company

      *   American Express Card

      *   Veterans'
