  catalyst-candidates-⁠-excess-baggage:
    brief: 'THE CONFLICT

      *   Fresh Start and the Fairhope City Council were at odds regarding whether
      the council had the authority to select at large or districts for elections.

      *   The Catalyst council instructed the city attorney to cancel the October
      special election.

      *   Fairhope missed an opportunity to move forward with a change of government
      through the general election (Nov. 6th).


      THE DISCOVERY

      *   Current Fairhope Council members are all affiliated with CATALYST.

      *   Council President Jack Burrell has baggage including bid rigging at the
      Airport and a hidden police report.

      *   Burrell led to the purchase and lease of $2.65 million recreation land,
      causing the city to move from a surplus of $1.2 million to a deficit of $1.5
      million.

      *   Sherry Sullivan-Cant is being recruited by Jack Burrell and CATALYST to
      run for Mayor, leveraging her involvement in covering up Tim Cant''s actions
      regarding the BP scandal and Fly Creek Publix project.


      THE PIVOT

      *   Article 2 proves that the political obstruction and lack of progress detailed
      in Article 1 are rooted in long-standing corruption (Burrell’s financial decisions)
      and coordinated efforts to maintain the status quo (Cant/Sullivan-Cant strategy).

      *   The Catalyst movement''s goal is not simply changing government, but using
      established baggage and past scandals to control the political structure.


      KEY ENTITIES

      *   Fresh Start

      *   Fairhope City Council

      *   Catalyst

      *   Jack Burrell (Council President)

      *   Tim Cant (Former Mayor)

      *   Sherry Sullivan-Cant

      *   Karin Wilson (Mayor)

      *   Bill Hightower

      *   Joe Faust

      *   Danielle Mashburn-Myrick'
    generated_at: '2026-07-11T00:51:27.470691Z'
  catalyst-last-stand:
    brief: 'THE CONFLICT:

      *   Fresh Start Fairhope filed a petition for a change of government.

      *   The Fairhope City Council, referred to as Catalyst, instructed the city
      attorney to cancel the October special election.

      *   The council used fear and misinformation to prevent voters from participating
      in the referendum.

      *   The council members (Burrell, Boone, Brown) have cost the city millions
      for personal gain.


      THE DISCOVERY:

      *   Two council seats had no opposition: Place 3 held by Jimmy Conyers; Place
      2 held by Cory Martin.

      *   Councilmen Burrell, Boone, and Brown used their offices for personal gain
      and cost taxpayers millions.

      *   Kevin Boone has LLCs linking him to developers for personal gain.

      *   Mayor Wilson secured $18 million in BP Restore Act funds for sewer upgrades
      and a Waterfront grant.


      THE PIVOT:

