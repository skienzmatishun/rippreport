  catalyst-held-back:
    brief: 'THE CONFLICT:

      *   Fresh Start and the Fairhope City Council believed they were not in charge
      regarding selecting at large or districts.

      *   The Catalyst council instructed the city attorney to cancel the October
      special election.

      *   Catalyst spread fear and misinformation to voters regarding the referendum
      vote.


      THE DISCOVERY:

      *   Catalyst candidates had over $500,000 thousand dollars behind them.

      *   Catalyst won only three races in the run-off elections.

      *   People’s Choice had less than $10,000 in funding.

      *   The results showed that money was not the main factor in elections.


      THE PIVOT:

      *   Article 2 proves that Catalyst''s political maneuvering (Article 1) and
      core group support (estimated 3500 members) failed to translate into electoral
      success, highlighting systemic corruption or ineffective manipulation.


