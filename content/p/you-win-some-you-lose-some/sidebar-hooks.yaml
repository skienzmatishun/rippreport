      Fairhope City Council

      Fresh Start

      Catalyst council

      Billie Jo Underwood

      Tucker Dorsey

      Christy Olinger Edwards

      Michelle Thomasson

      Elliott

      Jason Fisher (State Senate)

      Strategy (Public Relations firm)'
