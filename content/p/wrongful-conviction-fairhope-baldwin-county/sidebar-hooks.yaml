  bcso-how-to-become-sheriff:
    brief: |-
      THE CONFLICT
      - Murray Lawrence Jr (Fairhope resident) wrongfully convicted in Baldwin County, Alabama capital murder case.
      - Incarcerated for 20 years without possibility of parole at Holman Prison.
      - Trial took place approximately in 2003/2004 involving victim Brandon Hastings.
      - Investigation failed to establish crime scene, murder weapon, or conclusive physical evidence.
      - Accusations of judicial misconduct involving Judge, Prosecutor, and Sheriff Hoss Mack.

      THE DISCOVERY
      - Exculpatory autopsy evidence from Mississippi discovered in 2023.
      - Initial Mississippi autopsy by Dr. Paul McGarry concluded cause of death was asphyxiation/strangulation; prosecution claimed gunshot without ballistics.
      - Baldwin County District Attorney David Whetstone and Sheriff Mack ordered victim body exhumed for second autopsy.
      - Found evidence in 2023 and was never turned over to defense counsel during trial.
      - Lagniappe cover story "Digging Deep" confirms officials (Mack, Whetstone, Wilters) withheld this evidence.
      - Jarius McNeal (primary suspect/killer) identified as man coerced by Sheriff Mack to name Murray Lawrence as accomplice.
      - McNeal receives life with parole eligibility; Lawrence remains incarcerated without parole.

      THE PIVOT
      - Article 1 establishes the wrongful conviction and links to the withholding of autopsy evidence; lacks specific details on coercion.
      - Article 2 serves as the smoking gun by explicitly naming Sheriff Mack, Judge Wilters, and DA Whetstone in the withholding of evidence referenced by Article 1.
      - Article 2 exposes the mechanism: McNeal coerced under threat of death sentence by Mack to implicate Lawrence.
      - Article 2 highlights that Sheriff Mack was promoted from Captain to Sheriff partly due to his involvement in this wrongful conviction.
      - Article 2 confirms testimony from Officer Tony Fuqua (who attended Mississippi autopsy) admitted in trial he had no fingerprints, weapons, or phone records linking Lawrence to the victim.

      KEY ENTITIES
      - Murray Lawrence Jr (Bubba)
      - Hoss Mack / Sheriff Mack / Baldwin County Sheriff's Office (BCSO)
      - David Whetstone (District Attorney/Prosecutor)
      - Robert Wilters (Judge)
      - Jarius McNeal (Suspect/Actual Killer)
      - Brandon Hastings (Victim)
      - Anthony Lowery (Sheriff's Deputy/Investigator)
      - Dean McGowan (Investigator)
      - Tony Fuqua (Officer/Testifying witness at autopsy)
      - Maxwell/Tillman (Pro bono Attorneys)
      - Dr. Paul McGarry (Mississippi Forensic Pathologist)
