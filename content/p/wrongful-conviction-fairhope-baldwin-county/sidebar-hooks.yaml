  justice-denied-a-wrongful-conviction-buried-by-power-and-politics:
    brief: |-
      THE CONFLICT
      - Murray Lawrence Jr., Fairhope resident, convicted of capital murder in Baldwin County (2005).
      - Victim: Brandon Hastings.
      - No physical evidence (DNA, fingerprints, weapon) linked Murray to crime scene.
      - Prosecution case built on Jarius McNeil (actual killer), who shifted testimony after threat of death penalty.
      - Prosecution narrative claimed victim shot in Alabama; autopsy proves strangulation in Mississippi.
      - Exculpatory evidence withheld from defense by Judge, Prosecutor, and Sheriff (per Article 1).
      - Court-appointed lawyer advised Murray not to testify; he never testified personally.

      THE DISCOVERY
      - Article 2 identifies four specific 2005 officials now controlling Baldwin County justice system.
      - Robert Wilters: Presiding Judge at trial; currently Baldwin County District Attorney (since ~2015); rejected Rule 32 post-conviction relief in 2023.
      - Anthony Lowery: Chief Investigator at trial; currently Baldwin County Sheriff (appointed Kay Ivey); seeking election for 2026 retention.
      - Huey "Hoss" Mack: Lead Investigator/Captain at trial; retired Sheriff, now state-level role; allegedly coerced McNeil and controlled body handling.
      - David Whetstone: 2005 District Attorney; retired; admitted making plea deal with McNeil knowing he was unreliable ("deal with the devil").
      - Innocence Project records show exculpatory evidence suppressed during trial.

      THE PIVOT
      - Article 1 claims "Judge, Prosecutor and Sheriff" suppressed evidence; Article 2 names them (Wilters, Whetstone, Mack/Lowery).
      - Turns vague claim of corruption into specific list of men now blocking accountability (Wilters rejecting review, Lowery retaining Sheriff power).
      - Confirms continuity: Officials from 2005 case are currently active in positions that control law enforcement and courts.
      - Autopsy error and suppression of Rule 32 filings (2023) prove current refusal to correct injustice.

      KEY ENTITIES
      - Murray Lawrence Jr. (Subject/Innocent Prisoner)
      - Brandon Hastings (Victim)
      - Jarius McNeil (Actual Killer/Witness)
      - Huey "Hoss" Mack
      - David Whetstone
      - Robert Wilters
      - Anthony Lowery
      - Baldwin County Sheriff's Office (BCSO)
