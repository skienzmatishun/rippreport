hooks:
  dear-congressman-bradley-byrne:
    brief: 'THE CONFLICT:

      *   Francis Paul Ripp/The Ripp Report filed a complaint against Steven Patrick
      Johnson to the Alabama State Bar (CSP NO. 2016-296) on March 17, 2016.

      *   Complaint alleged that Mr. Johnson admitted under oath in his divorce proceedings
      to purchasing, transporting, and selling marijuana to another attorney.

      *   The Alabama State Bar reviewed the complaint but stated they would take
      no further action (March 17, 2016).

      *   Subsequent inquiries with the Disciplinary Commission confirmed on July
      20, 2016, that no action was recorded against Johnson.


      THE DISCOVERY:

      *   The Ripp Report is investigating systemic political and judicial corruption
      within Baldwin County, targeting Fly Creek in Fairhope, Alabama.

      *   Discovery includes allegations of collusion between landowner Arthur Corte
      and Mayor Kant regarding damage to Fly Creek caused by the Publix project development.

      *   Ripp alleges that former State Senator Pittman and Mayor Kant siphoned $636,000
      of BP money for a contract awarded to Sen. Pittman.

      *   A settled ''triangle lawsuit'' cost taxpayers $11.25 million due to alleged
      omission of public notification/participation by the Mayor.


      THE PIVOT:

      *   Article 1 presents an unresolved ethical complaint against one attorney
      (Steven Patrick Johnson) regarding past professional conduct.

      *   Article 2 expands this investigation into a broader scope, connecting specific
      local corruption and financial mismanagement (Corte, Kant, Pittman) with institutional
      failures in Baldwin County government and the judiciary (Judge Thomason''s Family
      Court).


      KEY ENTITIES:

      *   Francis Paul Ripp / The Ripp Report

      *   Steven Patrick Johnson / Brackin McGriff and Johnson

      *   Arthur Corte

      *   Mayor Kant / Timothy Kant

      *   Sen. Pittman

      *   Baldwin County Legal Eagle (BCLE)

      *   Judge Thomason

      *   Bradley Byrne (Congressman)

      *   Fairhope / City of Fairhope

      *   Publix'
