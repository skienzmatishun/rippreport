  alabama-attorney-general:
    brief: 'THE CONFLICT

      - Complaint filed by The Ripp Report against Steven Patrick Johnson: CSP NO.
      2016-296.

      - Allegation: Under oath during divorce proceedings, Mr. Johnson admitted to
      purchasing, transporting, and selling marijuana to another attorney.

      - Response from the Alabama State Bar: A review concluded there would be "no
      further action" taken in March 17, 2016.

      - Lack of accountability: Subsequent follow-ups (July/August 2016) with the
      Alabama State Bar yielded no comment or record of discipline despite the attorney''s
      own admissions.


      THE DISCOVERY

      - Tom Albritton (Alabama Executive Director of the Ethics Commission and Trustee
      of the Mabel Amos Scholarship Trust) is accused by The Ripp Report of financial
      irregularities within the $500,000 trust fund (now worth $8.2 million).

      - Specific allegations: Mr. Albritton awarded himself $135,000 for his children’s
      University of Texas tuition and was associated with a "$1 million" award from
      Regions Bank for "inflated services."

      - Institutional failure: The Ethics Commission allegedly dismissed complaints
      filed by The Ripp Report against Mr. Albritton (and others) beginning around
      2015, suggesting the system is compromised when overseen by the Ethics Director.


      THE PIVOT

      - Article 1 documents a specific instance of institutional failure where the
      Alabama State Bar failed to discipline an unethical attorney despite clear evidence
      (the "Above the Law" problem).

      - Article 2 reveals that this pattern of failing and protecting vested interests
      exists at the core of state leadership, as Tom Albritton—the Ethics Commission
      Director responsible for ensuring integrity—is itself accused of personal financial
      corruption and using his office to unilaterally dismiss complaints against himself.


      KEY ENTITIES

      - The Ripp Report (Francis Paul Ripp)

      - Steven Patrick Johnson

      - Brackin McGriff and Johnson (law firm)

      - Alabama State Bar

      - Tom Albritton (Ethics Commission Executive Director; Mabel Amos Scholarship
      Trust Trustee)

      - Ashley Pate (Attorney representing Mr. Albritton and Mr. Clifton)

      - Rick Clifton (Trustee of the Mabel Amos Scholarship Trust)

      - Allen Dodd (Deputy Alabama Attorney General, appointed following a lawsuit
      related to these allegations)

      - Regions Bank

      - Bryant Mathews (attorney representing Tyra Lindsey)

      - Tyra Lindsey

      - Deborah Carmack'
