  ayatollah-of-alabama:
    brief: 'THE CONFLICT

      *   **Steven Patrick Johnson:** Lawsuit filed by Ripp Report against Steven
      Patrick Johnson (Attorney) on 2016-08-31 concerning CSP NO. 2016-296.

      *   **Event/Date:** In 2016, during a divorce proceeding in the Alabama State
      Bar, Mr. Johnson admitted under oath to purchasing, transporting, and selling
      marijuana to another attorney.

      *   **Legal Failure:** The Office of the General Council reviewed the complaint
      on March 17, 2016, issuing a letter stating they would take "no further action."

      *   **Investigation:** Ripp Report followed up with the Disciplinary Commission;
      in July 2016 and Aug. 30, 2016, the Bar confirmed no disciplinary action was
      recorded, despite Johnson''s own admission under oath.


      THE DISCOVERY

      *   **Roy Moore (Ayatollah of Alabama):** Article reveals a history of constitutional
      violations by Roy Moore.

      *   **Violations:** He violated his oath of office twice while serving as Judge
      for The Alabama Supreme Court and later in the US Senate.

      *   **Political Context:** As he runs for office, supporters claim voters are
      willing to overlook these defiance of law/constitution due to party loyalty.

      *   **Current Activity:** Moore is campaigning in Fairhope (Oak Hollow) on December
      5th.


      THE PIVOT

      *   Article 2 reveals a pattern of systemic failure within Alabama''s institutions
      (legal and political).

      *   In Article 1, the State Bar protects unethical attorneys like Steven Patrick
      Johnson from consequence despite clear evidence (his own admissions).

      *   In Article 2, Moore demonstrates disregard for constitutional limits while
      campaigning in Fairhope; his disqualification by US Senate rules is being resisted
      or ignored.

      *   The ''smoking gun'' connection is the dual existence of powerful figures—Johnson
      and Moore—who operate with impunity within Alabama''s legal/political framework,
      facing public accusations but successfully bypassing formal disciplinary action.


      KEY ENTITIES

      *   Ripp Report / Ripp (Lawsuit Filer)

      *   Steven Patrick Johnson (Attorney)

      *   Brackin McGriff and Johnson (Firm)

      *   Alabama State Bar / Disciplinary Commission of the Alabama State Bar

      *   Roy Moore ("Ayatollah of Alabama")

      *   Fairhope (Oak Hollow venue for campaign)

