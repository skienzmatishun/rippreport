  dirty-underwear:
    brief: 'THE CONFLICT:

      *   In March 17, 2016, The Ripp Report filed a complaint (CSP NO. 2016-296)
      against Steven Patrick Johnson to the Alabama State Bar.

      *   Johnson was accused of purchasing, transporting, and selling marijuana under
      oath during his own divorce proceedings.

      *   The Alabama State Bar responded on March 17, 2016, stating they would take
      "no further action."

      *   On July 20, 2016, the Disciplinary Commission confirmed no disciplinary
      action was recorded in this matter.

      *   On August 30, 2016, follow-up attempts to obtain details from the Bar resulted
      in a lack of comment and closure on the investigation.


      THE DISCOVERY:

      *   The "Dirty Underwear" article reveals systemic corruption involving the
      Attorney General (AG), the Ethics Commission, and the Alabama State Bar.

      *   Tom Albritton, Executive Director of the Ethics Commission, is alleged to
      have received over $105,000 in scholarships for his children between 2014 and
      2018 from the trust he oversees. This potentially violates IRS Section 4941(d)
      regarding self-dealing by a trustee.

      *   McCallum was paid $37,437 by the Bar Association in August 2021 after resigning.
      He had previously been fined $100,000 by the Ethics Commission but faced no
      criminal prosecution from the AG’s Office.


      THE PIVOT:

      *   The State Bar''s refusal to act on a direct complaint against Steven Patrick
      Johnson (Article 1) is contextualized as part of a wider pattern of institutional
      failure and "whitewashing" exposed in Article 2.

      *   Article 2 provides the structural proof that the agencies responsible for
      accountability (Ethics Commission/Bar/AG) are compromised, allowing self-dealing
      (Albritton) and regulatory evasion to occur while ignoring public complaints.


      KEY ENTITIES:

      *   The Ripp Report

      *   Steven Patrick Johnson

      *   Brackin McGriff and Johnson

      *   Alabama State Bar / Disciplinary Commission

      *   Tom Albritton

      *   Ethics Commission

      *   McCallum

      *   Attorney General'
