  letter-to-the-alabama-attorney-general:
    brief: "THE CONFLICT: \n*   Ripp Report filed complaint CSP NO. 2016-296 against\
      \ Steven Patrick Johnson of Brackin McGriff and Johnson to the Alabama State\
      \ Bar.\n*   The complaint alleged Mr. Johnson admitted under oath during his\
      \ divorce proceedings that he purchased, transported, and sold marijuana, specifically\
      \ to another attorney.\n*   In March 2016, the State Bar’s General Council reviewed\
      \ the matter and took no further action against him.\n*   By July 2016, the\
      \ Disciplinary Commission confirmed no action was recorded against Johnson by\
      \ the Alabama State Bar.\n\nTHE DISCOVERY: \n*   Francis Paul Ripp alleges Tom\
      \ Albritton, Executive Director of the Alabama Ethics Commission (and trustee),\
      \ is involved in self-dealing and IRS code violations through his role as one\
      \ of three trustees for the Mabel Amos Memorial Fund.\n*   The fund awarded\
      \ Mr. Albritton’s daughters $105,000 in scholarships to the University of Texas.\n\
      *   Ripp reports that the Ethics Commission has dismissed complaints—including\
      \ those involving a Fairhope Councilman abusing his board position for personal\
      \ enrichment—without independent investigation or accountability.\n\nTHE PIVOT:\
      \ \n*   Albritton’s alleged self-dealing proves that the state’s primary oversight\
      \ body (the Alabama Ethics Commission) is functionally compromised and unable\
      \ to enforce ethical standards against powerful individuals, whether they are\
      \ councilmen or attorneys.\n*   This failure of ethics and regulatory enforcement\
      \ by Albritton demonstrates how systemic corruption acts as an insulator for\
      \ misconduct, enabling attorneys like Steven Patrick Johnson to avoid disciplinary\
      \ action from the State Bar despite admitted professional violations.\n\nKEY\
      \ ENTITIES: \n*   Steven Patrick Johnson / Brackin McGriff and Johnson\n*  \
      \ Tom Albritton / Alabama Ethics Commission (Executive Director)\n*   Mabel\
      \ Amos Memorial Fund (Trustee)\n*   Alabama State Bar / Disciplinary Commission\n\
      *   Francis Paul Ripp / The Ripp Report\n*   Fairhope City Councilman"
