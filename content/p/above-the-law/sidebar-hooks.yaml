  dear-congressman-bradley-byrne:
    brief: |-
      THE CONFLICT
      *   Steven Patrick Johnson filed a complaint with the Alabama State Bar (CSP NO. 2016-296) alleging he admitted under oath during a divorce to purchasing, transporting, and selling marijuana to an attorney.
      *   The Alabama State Bar reviewed the complaint; on July 20, 2016, the Disciplinary Commission responded that no action had been recorded regarding the complaint.

      THE DISCOVERY
      *   Political commentary alleges systemic corruption involving Mr. Arthur Corte and Mayor Kant concerning the Fly Creek project development in Fairhope.
      *   Corte and Kant allegedly colluded to ignore public concerns and damage the creek.
      *   A triangle lawsuit involving Corte and Kant cost taxpayers $11.25 million, and the Mayor omitted public participation during the settlement.
      *   Sen. Pittman and Mayor Kant siphoned $636,000 of BP money for a contract, leading to an FBI investigation and referral to the Alabama Attorney General's White Collar Crime Division.

      THE PIVOT
      *   Article 2 establishes a pattern of political and financial corruption (Corte/Kant) that contrasts with Johnson’s alleged unethical behavior regarding legal testimony (marijuana admission).
      *   Article 2 provides context for systemic malfeasance, suggesting that the same corrupt network operating in Baldwin County may be involved in similar professional misconduct or criminal activity.

