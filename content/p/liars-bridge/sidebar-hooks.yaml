      Money" and promising opposition to tolls.

      - A public petition demanding no tolls reached 50,000 signatures.

      - After the petition hit 50,000 signatures, sources claim politicians panicked
      and reversed course to support the project.

      - Article 1 claims Burrell originally stated no federal money was needed, now
      quotes him stating the project “will allow us to continue to seek additional
      federal funding.”


      THE DISCOVERY:

      - Article 2 reveals during an MPO meeting, 6 out of 8 speakers confirmed Federal
      money is needed.

      - Article 2 confirms the bridge falls under I-10, a federal highway running
      through 8 states and 2,460 miles; implementing tolls solely on Alabama is flagged
      as a potential Commerce Clause violation.

      - Article 2 notes Mike Lee (Page & Jones, former Build the Bridge coalition
      president) identifies a "generational opportunity" tied to current federal infrastructure
      proposals and Sen. Richard Shelby’s appropriations committee role.

      - Article 2 cites Mark Colson (Alabama Trucking Association) stating the plan
      is unconstitutional and that truck-only tolls discriminate against out-of-state
      companies.


      THE PIVOT:

      - Article 2 functions as the “smoking gun” by providing the administrative context
      (MPO votes, funding requirements) that contradicts Article 1’s assertion of
      Burrell’s past "no federal money" promises.

      - The quote from Jack Burrell in Article 1 is corroborated by his new strategy
      noted in Article 2: leveraging federal funding and the federal highway status
      of I-10.

      - Both articles converge on the same accusation: leaders are using infrastructure
      as a political tool to distract from development expansion while contradicting
      prior voter promises (No Tolls).


      KEY ENTITIES:

      - Jack Burrell

      - ESMPO (Eastern Shore MPO)

      - Mark Colson (Alabama Trucking Association)

      - Mike Lee

      - Sen. Richard Shelby

      - I-10 Mobile River Bridge Bayway Project'
    generated_at: '2026-03-14T03:43:57.821495Z'
    text: Jack Burrell spent months promising no federal money for the I-10 bridge,
      but his own MPO records tell a much darker story. This discovery exposes the
      "generational opportunity" for a cash grab that discriminates against truckers
      and violates the very constitution they swore to uphold.
