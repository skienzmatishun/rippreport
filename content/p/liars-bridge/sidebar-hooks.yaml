      THE PIVOT

      - Wilson’s disclosure of local budget efficiency proves the bridge project is
      being pushed as a "financial necessity" it is not, directly linking back to
      Burrell’s admitted changes in funding stance.

      - Pittman’s misuse of BP funds provides evidence supporting the "Liars" narrative
