      KEY ENTITIES

      - Jack Burrell (Fairhope City Councilman, ESMPO Chairman)

      - Karin Wilson (Fairhope Mayor)

      - Chris Elliott (State Senator, R-Daphne)

      - Kay Ivey (Governor of Alabama)

      - Jerry Carl (State Senator)

      - Tommy Tuberville (Congressman)

      - State Senator Pittman'
