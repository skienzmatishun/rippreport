  gulf-shores-and-orange-beach-closed-to-residents-of-baldwin-county:
    brief: 'THE CONFLICT:

      - I-10 Mobile River Bridge/Bayway project announced.

      - Politicians promised "no tolls," "no federal money," and "constituents'' listening"
      to secure initial support.

      - 50,000 signatures on petition demanded these no-toll/no-federal guarantees.

      - Jack Burrell (ESMPO Chairman, Fairhope City Councilman) reversed stance: later
      stated project secures federal funding and allows pursuit of "additional" federal
      money.

      - Burrell previously claimed Fairhope infrastructure was fine; admitted 10-year
      tenure involved slowing down or not approving infrastructure projects.

      - Jerry Carl (Senator candidate mentioned) did not support PACT Act to aid veterans
      suffering from toxic exposure.

      - Ripp Report characterizes this as politicians prioritizing traffic expansion
      for development over promises made during the 50k-signature petition.


      THE DISCOVERY:

      - Chris Elliott (Baldwin County Commissioner) and Tucker Dorsey fully support
      "maximum development" ignoring infrastructure impact.

      - Mayors Gerald Craft (Orange Beach) and Kennon (Gulf Shores) aligned with Elliott,
      rejecting "NO" regarding development.

