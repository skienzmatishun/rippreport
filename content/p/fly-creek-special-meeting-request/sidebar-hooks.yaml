      council under Mayor Tim Kant.

      *   Council Members Mr. Burrell and Mr. Boone allegedly facilitated the deal
      for developers Angelo Corte and Tim Kant during the final meeting of the Fairhope
      City Council.

      *   Article 2 claims this approval was a "gift" to the developer, resulting
      from the city council''s refusal to legally defend citizens against developers
      who threatened lawsuits.


      **THE PIVOT:**

      *   The 2016 call by F. Paul Ripp for greater transparency regarding Fly Creek
      Apartments is revealed in Article 2 to have been triggered by specific alleged
      corruption: Council Members Burrell and Boone supposedly "caved" to threats
