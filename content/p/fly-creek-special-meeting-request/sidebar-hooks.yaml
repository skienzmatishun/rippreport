  fairhope-state-of-the-city:
    brief: '**THE CONFLICT:**

      *   February 12, 2016: F. Paul Ripp requested a special meeting of the Fairhope
      City Council regarding Fly Creek Apartments due to concerns over transparency
      and ethics surrounding proposed development that did not align with Fairhope’s
      model ("strip center").


      **THE DISCOVERY:**

      *   Early January 2020 (Widget Article): The property purchased by the city—first
      acquired via an appraisal dated June 28, 2019—is declared "surplus and not needed
      for public or municipal purposes."

      *   January 2020: Same real property (105 Farmable Acres) is leased annually
      at $9,000.00 to a private entity/individual.

      *   December [Year Undated]: The purchase price of the same land was $2.65 million;
      this was described as being influenced by Councilmen Burrell, Brown, and Boone
      ("the 3B’s").


      **THE PIVOT:**

      *   Article 1 raises concerns about general council ethics regarding large-scale
      developments (Fly Creek Apartments). Article 2 provides a specific case study
      of alleged ethical/financial misconduct where the same local political figures—Burrell,
      Brown, and Boone—are accused of influencing city property acquisition ($2.65
      million purchase) before that land is swiftly designated surplus and leased
      for $9,000, demonstrating a pattern of lack of public accountability similar
      to those raised in'
