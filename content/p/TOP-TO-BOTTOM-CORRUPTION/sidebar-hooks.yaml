hooks:
  line-in-the-sand:
    brief: "THE CONFLICT\n- Mabel Amos created charitable trust via will for needy\
      \ college students after death in 1999.\n- Initial fund value approx $500,000\
      \ managed by Albritton Law Firm (Tom Albritton and Rick Clifton).\n- 2011: Oil\
      \ discovered on trust-owned land in Conecuh County.\n- 2013: Millions of dollars\
      \ poured into trust fund via oil revenue.\n- Albritton and Clifton became board\
      \ members upon Amos’ death.\n- Shortly after funds increased, Albritton appointed\
      \ Executive Director of Alabama Ethics Commission.\n- Tom Albritton and Rick\
      \ Clifton’s two children awarded $120,000 in scholarships to University of Texas\
      \ over six years.\n- Tyra Lindsey petitioned case as student representative;\
      \ AG Marshall filed motion to dismiss her.\n- Article 1 highlights Steve Marshall’s\
      \ conflict of interest (campaign cash from Regions and Albritton lawyers).\n\
      \nTHE DISCOVERY\n- Article 2 confirms scholarship distribution violations through\
      \ civil lawsuit:\n    - Albritton’s children received $120,000 total in trust\
      \ scholarships (verified by Lagniappe).\n    - Ben Bowden (Covington County\
      \ Circuit Court Judge, ex-Albritton partner) had a child awarded $45,000 in\
      \ scholarships to Southern Methodist University (SMU) between 2014 and 2017.\n\
      \    - Albritton admits to some alleged details but claims abstention from voting\
      \ on his own children's scholarships.\n- Article 2 confirms Regions Bank fees:\
      \ John Bell (Regions) took over $1.2 million in fees between 2002 and 2020 for\
      \ managing the trust.\n- Article 2 confirms Albritton Law Firm drafted the will\
      \ creating the trust post-Amos’ death.\n\nTHE PIVOT\n- Article 1 establishes\
      \ Alabama AG Steve Marshall is conflicted (campaign donors overlap with regions/lawyers)\
      \ and refuses to criminally investigate Albritton despite accusations of fraud.\n\
      - Article 2 acts as evidence (smoking gun) by verifying Marshall’s accusations\
      \ of \"self-dealing\":\n    - Proves Albritton received direct benefit (scholarships)\
      \ while leading Ethics Commission.\n    - Proves judicial tie-in: Bowden, a\
      \ judge presiding over cases in the network, received benefits from same trust.\n\
      - Article 1 outlines legal evasion (Marshall dismissing student Tyra Lindsey);\
      \ Article 2 confirms the financial flow of funds that should have been investigated\
      \ but was not.\n\nKEY ENTITIES\n- Mabel Amos Memorial Fund (Charitable Trust)\n\
      - Tom Albritton\n- Rick Clifton\n- Steve Marshall (Alabama Attorney General)\n\
      - Ben Bowden (Covington County Circuit Court Judge)\n- Regions Bank / John Bell\n\
      - Johnny Hardwick (Judge overseeing civil suit; ruled zero on 70+ motions)\n\
      - Tyra Lindsey\n- Albritton Law Firm\n- University of Texas / Southern Methodist\
      \ University"
