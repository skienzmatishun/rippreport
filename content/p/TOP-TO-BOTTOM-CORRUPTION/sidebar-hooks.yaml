  alabama-attorney-general:
    brief: 'THE CONFLICT:

      - 2010/2011: Oil discovered on land owned by Mabel Amos Memorial Fund trust
      in Conecuh County; trust value grew from ~$500k to millions.

      - Tom Albritton and Rick Clifton (Albritton Law Firm) became board members of
      the trust.

      - Albritton awarded his two children approximately $120,000-$135,000 in University
      of Texas tuition over six years while serving as a trust board member (classified
      as "self-dealing").

      - Shortly after children received funds, Albritton was appointed Executive Director
      of the Alabama Ethics Commission.

      - Steve Marshall (Alabama AG) publicly accused Albritton and trust trustees
      of fraud, criminal offenses, and self-dealing in legal filings.

      - Marshall’s office attempted to join a civil suit over the trust, claiming
      standing.

      - Tyra Lindsey (10th grade student) petitioned to join case as a scholarship
      plaintiff; Marshall’s office moved to dismiss her without court ruling.

      - Prior conflict between Albritton and Marshall regarding Ethics Commission
      disclosure rules led to new state law.

      - Alabama Bar and Ethics Commission dismissed The Ripp Report’s >100 page complaints
      regarding Albritton.


      THE DISCOVERY:

      - The Ripp Report filed complaints against Albritton and the Ethics Commission;
      all were dismissed with no hearing granted for mandamus motions.

      - Albritton’s salary as Ethics Director raised to $210,000/year.

      - Regions Bank took over $1 million in fees for managing the trust while claiming
      it only has "standing" to oversee it.

      - Allen Dodd appointed Deputy Alabama Attorney General in connection with a
      near-settlement of the trust case (Nov Circuit Court).

      - Tommy Gallion representing Megan Carmack (Mabel Amos family member) in the
      same case Marshall is handling.

      - Ashby Pate representing Albritton and Rick Clifton regarding insurance claims
      for attorney costs.

      - Approximately 3.2M in anonymous scholarship payouts recorded between 2013-2021;
      trust current value ~$8.2M.

      - Marshall admitted Albritton "embarrassed" the Ethics Commission but took no
      criminal action.


      THE PIVOT:

      - Article 2 confirms Marshall’s public accusations ("fraud," "criminal") resulted
      in zero criminal consequences, only a salary raise for Albritton and a settlement
      process.

      - Marshall’s office is being represented by the same legal circle resolving
      Albritton’s financial misconduct (Allen Dodd, Tommy Gallion).

      - Article 2 provides direct evidence of The Ripp Report’s attempts to hold Marshall
      accountable: complaints filed and ignored while Marshall protected Albritton.

      - Article 2 exposes the "settlement" as non-transparent (anonymous recipients)
      despite Marshall’s public calls for accountability.


      KEY ENTITIES:

      - Steve Marshall (Alabama AG)

      - Tom Albritton (Albritton Law Firm, Ethics Commission Director, Trustee)

      - Rick Clifton (Trustee)

      - Mabel Amos Memorial Fund

      - Regions Bank

      - Tyra Lindsey (Hillcrest High School student)

      - Allen Dodd (Deputy AG, Regional Bank rep)

      - Francis Paul Ripp (The Ripp Report)

      - Judge Johnny Hardwick

      - Matt Simpson (State Rep., Ethics and Finance Committee Chair)'
    generated_at: '2026-03-12T15:19:49.865272Z'
  ALABAMA ETHICS COMMISSION HIDE THE LIST:
    brief: 'THE CONFLICT

      - Rob Holbert (Lagniappe Newsletter, July 15, 2023) reports Mabel Amos Memorial
      Fund (MAMF) created in will of Alabama Secretary of State Mabel Amos via Albritton
      Law Firm, Andalusia.

      - Upon Amos'' death, Tom Albritton and Rick Clifton (Albritton Law Firm) became
      board members of MAMF.

      - 2013: Oil discovered on trust-owned land in Conecuh County; wildcat production
      caused millions to flow into MAMF.

      - Post-2013: Scholarship distribution increased; Tom Albritton''s two children
      received $120,000 in tuition at University of Texas over six years.

      - Shortly after Albritton''s children received scholarship money, he was appointed
      Executive Director of Alabama Ethics Commission.

      - Previous year: Albritton''s relatives filed civil suit against Regions Bank
      regarding over $1 million in management fees.

      - During lawsuit: AG Steve Marshall accused Albritton of fraud and self-dealing
      in a motion to join the case.

      - Six months prior to July 2023: Student Tyra Lindsey petitioned to join case;
      AG Marshall’s office later moved to dismiss her.


      THE DISCOVERY

      - Widget article demands public release of the complete scholarship recipient
      list ("THE LIST") for MAMF.

      - Specific window requested: 2013 to 2021 ($3.2 million total).

      - Claims funds were distributed to judges, bankers, lawyers, politicians via
      the trust.

      - Accuses Tom Albritton of leveraging his Ethics Commission role to overlook
      ethics complaints filed against "Good ole Boys" benefiting from the trust.

      - Demands AG investigate all ethics complaints dismissed by Albritton during
      his tenure as Ethics Director and Trustee.

      - Notes IRS 990 forms stopped publishing scholarship recipient names in 2014,
      prompting legal motions to force disclosure.


      THE PIVOT

      - Article 2 identifies the specific mechanism of impunity: Albritton controls
      Trustee board distribution and simultaneously serves as Executive Director of
      Ethics Commission.

      - Article 2 validates Article 1’s allegation: Marshall is under political pressure
      to withhold the list despite "Lawrence v. State" precedent implying AG oversight
      over charitable trusts.

      - Article 1 proves AG Marshall moved to dismiss the whistleblower student (Lindsey)
      after being accused of conflict; Article 2 proves this aligns with public distrust
      that the list will never be released.

      - The Widget article provides the "public demand" element (call AG Communications
      Director Amanda Priest) missing from the Lagniappe investigative report.


      KEY ENTITIES

      - Tom Albritton (Albritton Law Firm, Mabel Amos Trust Trustee, Ethics Commission
      Executive Director)

      - Steve Marshall (Alabama Attorney General)

      - Regions Bank (Trust Manager/Investment Banker)

      - John Bell (Regions Bank Officer, Trustee on Mabel Amos Trust)

      - Rick Clifton (Albritton Law Firm, Mabel Amos Trust Board Member)

      - Tyra Lindsey (Student Petitioner in Civil Suit vs Regions)

      - Byron Mathews Jr. (Attorney for Tyra Lindsey)

      - Mabel Amos (Deceased founder of Trust; former Secretary of State)

      - Kay Ivey (Alabama Governor, cited for silence in Widget article)'
