      *   McAfee committed a second murder in Belize by shooting and killing Gregory
      Faull in his house after threats regarding dogs/guns.

      *   Tom Mangar was McAfee''s business partner who facilitated his movement out
      of Belize.


      THE DISCOVERY:

      *   John McAfee is categorized as a narcissist, sociopath, or psychopath.

      *   McAfee''s dangerous nature stemmed from his combination of high intelligence
      and money.

      *   McAfee is defined as a murderer and a coward.


