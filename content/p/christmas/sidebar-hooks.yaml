      the first floor, parking lot, and grounds of 125 D’Olive Street in Bay Minette
      from January 1, 2023, to December 31, 2027.

      *   The delegation agreed to pay the entire cost of the lease ($4,090 per month
      or $245,400 total).


      THE PIVOT

      *   Article 2 reveals that Mayor Bob Wills is the owner of the building being
      leased by the legislative delegation, creating a direct conflict of interest
      where he acts as landlord while simultaneously calling on them for city legislative
      needs.


