  mcsharry-madness:
    brief: 'THE CONFLICT:

      Ronan McSharry was found guilty by Fairhope Municipal Judge Haymes Snedeker
      of both assault and intoxication counts following an incident at the Little
      Whiskey Christmas Club. McSharry claimed a settlement agreement with DiNardi
      was reached but refused to abide by it.


      THE DISCOVERY:

      McSharry’s attorney James Pittman is attempting to challenge state Shield Law
      and use conspiracy theories. LWCC claims McSharry was not injured in person
      or property, only financially. The court dismissed the most serious charge (assault)
      because of a procedural issue involving the prosecutor failing to act.


      THE PIVOT:

      Article 2 details the legal defenses and attorney actions that reveal how the
      Fairhope judicial system failed McSharry by allowing him to be sentenced only
      on intoxication charges, despite the underlying assault allegations being dismissed
      due to systemic failures (City Attorney Marcus McDowell''s handling of the case).


      KEY ENTITIES:

      Ronan McSharry

      Paula DiNardi

      Haymes Snedeker (Fairhope Municipal Judge)

      Marcus McDowell (Fairhope City Attorney)

      James Pittman (McSharry’s attorney)

      Jack Burrell (Council President)

      Baldwin County Circuit Judge Clark Stankoski'
