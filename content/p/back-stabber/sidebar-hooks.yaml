hooks:
  quid-quo-pro:
    brief: 'THE CONFLICT:

      *   Jack Burrell and the Fairhope City Council planned a Special Called City
      Council meeting on September 4, 2018, at 4:00 p.m., to approve a Resolution
      allowing the Council President to execute a Real Estate Purchase Agreement for
      properties owned by the Baldwin County Board of Education (k-1 Center, PLAN
      Council).

      *   The council planned this action without public participation or input from
      stakeholders.


      THE DISCOVERY:

      *   The Fairhope City Council voted 3 to 2, including Burrell Boone and Robert
      Brown, to purchase $2.6 million in recreation property based on an appraisal
      with questionable comps or payment plans ("something for something").

      *   Councilman Robert Brown is ignoring requests for documentation regarding
      the Eastern Shore Art Center contract despite claiming permission from the Ethics
      Commission and multiple bids were submitted.


      THE PIVOT:

      *   Article 2 reveals that the decision mentioned in Article 1 (the real estate
      purchase authorization) was not a transparent public process but an illicit
      "Quid quo pro" deal, demonstrating that the lack of public participation criticized
      in Article 1 was rooted in corrupt dealings and favors.


      KEY ENTITIES:

      *   Jack Burrell

      *   Lisa A. Hanks (MMC)

      *   Mayor Karin Wilson

      *   Baldwin County Board of Education

      *   K-1 Center property

      *   PLAN Council

      *   Councilman Burrell Boone

      *   Councilman Robert Brown

      *   Eastern Shore Art Center contract

      *   CATALYST

      *   FSTC

      *   Fairhope City Council'
