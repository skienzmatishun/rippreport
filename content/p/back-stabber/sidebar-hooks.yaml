  whose-agenda:
    brief: 'THE CONFLICT:

      *   Jack Burrell and the Fairhope City Council planned decisions without public
      hearings.

      *   Specific event: Special Called City Council Meeting on September 4, 2018,
      to approve a Resolution authorizing the Council President (Burrell) to execute
      a Real Estate Purchase Agreement for properties owned by the Baldwin County
      Board of Education.


      THE DISCOVERY:

      *   The City Council''s agenda included resolutions regarding the purchase of
      K-1 Center, Fairhopers Community Park, and James P. Nix Center properties (Resolution
      10).

      *   The Council also passed Resolution 11 authorizing Mayor Karin Wilson to
      execute a half-million dollar contract for dredging the Main Channel of Fly
      Creek with M&N of Alabama, LLC and the Fairhope Yacht Club without public discussion
      on necessity or source.

      *   The Council considered filing for a Special 3 Mill Ad Valorem School District
      Tax Election (Resolution 12), despite not discussing alternative solutions with
      the public.

      *   A Change Order was issued for Library Envelope Repairs (Resolution 27),
      implicating former Mayor Can’t, Jennifer Fidler, Jack Burrell, and Councilman
      Boone in construction failures.


      THE PIVOT:

      *   Article 2 shows that the decision to purchase properties owned by BCBE (the
      subject of Article 1) was merely one instance within a pattern where the City
      Council routinely failed to inform the public about facts surrounding resolutions.

      *   The widget article provides evidence that the lack of transparency is systemic,
      proving the actions taken against the K-1 Center property were part of a larger
      agenda of ignoring public input and accountability across multiple city issues
      (dredging, school funding, library repairs).


