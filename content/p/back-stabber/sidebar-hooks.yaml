      acres of city property valued at $20 million.

      *   Burrell lied to the council chambers about forgetting who proposed the idea
      for disposing of the land.

      *   Burrell led the City Council to override the Mayor’s veto regarding the
      Fly Creek extension zoning.

      *   Burrell settled the Triangle lawsuit and falsely claimed it was a park purchase.

