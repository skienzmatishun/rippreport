      - Ongoing: "CATALYST/CSB" candidates running in municipal races for Fairhope, Daphne, Spanish Fort, and Bay Minette.

      THE DISCOVERY:
      - Second article confirms "Scott Boone Consulting" is a direct rebrand of CATALYST, run by the same leadership.
      - Confirms funding sources match earlier reports: Developers including Prebble, Dr Horton, Columbia Southern, Truland, Corte Cox funneling money to CSB candidates.
      - Confirms "Strawman" land fraud series (Lagniappe) connections: Scott Boone and his father Kevin Boone are identified as integral to the fraud web.
      - Links past public officials: Tucker Dorsey (Past County Commissioner) connected to the "Strawman" web.
      - Confirms organizational structure: Defines group using FBI's definition of a criminal enterprise with identified hierarchy.

      THE PIVOT:
      - Article 2 acts as the "smoking gun" by validating that Scott Boone Consulting is not a new entity but the continuity of CATALYST's leadership.
      - Specific Proof: Both articles identify Scott Boone as the central figure (Money Distributor/Principal).
      - Specific Proof: Both articles link Kevin Boone and Tucker Dorsey to the operation via the "Strawman" fraud.
      - Specific Proof: Confirms political strategy remains identical—using block voting, at-large districts to dilute votes, and developer financing.
      - Article 2 removes ambiguity that rebranding was a separate group by explicitly naming the leadership and past illegal associations.

      KEY ENTITIES:
      - Scott Boone (Principal, Son of Kevin Boone)
      - Kevin Boone (Fairhope Councilman)
      - Jerry Carl (First Congressional Race opponent/winner context)
      - Tucker Dorsey (Past County Commissioner, Strawman web link)
      - Baldwin County
      - The Ripp Report
      - Lagniappe
