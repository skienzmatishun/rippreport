    text: Scott Boone rebranded his toxic Catalyst machine as a consulting firm to hide the developer money fueling his local puppets. This smoking gun proves the same "Strawman" land fraud web still pulls the strings for candidates in Fairhope and Daphne while Scott handles the dark money.
