      *   Thorson and Pennington admitted they had no knowledge of problems within
      the Fairhope Catalyst City Council despite living in Fairhope for five to seven
      years.


      THE PIVOT

      *   The second article proves that Thorson and Pennington were recruited to
      cover for Catalyst backers and remain silent regarding city government corruption,
      contradicting their stated ignorance.


