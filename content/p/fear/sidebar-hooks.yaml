  fairhope-catalyst-a-dirty-little-secret:
    brief: 'THE CONFLICT

      *   Gary Thorson is opposing a vote ("NO vote") related to changing the city''s
      power structure.

      *   The Fairhope City Council, members of the "Catalyst" group, are attempting
      to block a referendum on a new form of government (Council-Manager system).

      *   The council voted to file an injunction against an October 2 referendum.


      THE DISCOVERY

      *   The Catalyst City Council members deliberately withheld information from
      the public regarding the proposed change in government structure.

      *   Council members, specifically Jay Robinson and Jack Burrell, failed to seek
      necessary legal advice from the Alabama Attorney General prior to a special
      meeting called to delay or cancel the election.

      *   Fresh Start Fairhope (Chuck Zunk) claims the Council''s actions are designed
      to kill the referendum by seeking a Temporary Restraining Order.


      THE PIVOT

      *   Article 2 reveals that the opposition to change is not based on policy but
      on legal maneuvering and deliberate inaction by the ruling body (Catalyst Council).

      *   The council’s attempt to file an injunction and their failure to inform
      citizens demonstrate the underlying corruption/control structure referenced
      in Article 1''s critique of Fairhope politics.


