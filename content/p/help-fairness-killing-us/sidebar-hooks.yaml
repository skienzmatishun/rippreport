  catalyst-open-letter-to-baldwin-county-district-attorney:
    brief: 'THE CONFLICT:

      *   Fairhope City Council used a hiring freeze to punish Mayor Wilson for firing
      two employees.

      *   Councilmen Boone and Brown cut funds allocated to economic and community
      development, reducing the 60 million plus budget.

      *   Councilmen Boone was asked to recuse himself regarding issues related to
      Angelo Corte, Preeble-Rish, or the Fly Creek Pud LLCs.

      *   The BA-101, LLC (formed April 29, 2004) was dissolved on January 31, 2017,
      six days after publication by The Ripp Report.


      THE DISCOVERY:

      *   Councilman Kevin Boone used media outlets (Courier, WACO radio) to publicize
      a complaint against Mayor Wilson to the Baldwin County District Attorney, Robert
      Wilters.

      *   The Widget Article alleges that Boone acts as a representative for the "Catalyst"
      group, linking him to his son Scott who runs the group and uses media to promote
      their cause.

      *   The article suggests District Attorney Robert Wilters may have been aided
      by Catalyst.


      THE PIVOT:

      *   Article 2 reveals that Councilman Boone’s public complaints against Mayor
      Wilson and his association with Catalyst provide context for the alleged conflict
      of interest and questionable actions referenced in Article 1 (specifically regarding
