  caught-trap-like-rat:
    brief: 'THE CONFLICT:

      *   Fairhope City Council used a definition of "Fairness" to punish the Mayor
      for firing two employees.

      *   Councilmen Boone and Brown cut funds allocated to Economic and Community
      Development.

      *   Councilman Burrell eliminated economic and community development funding
      using the justification of being "fair."

      *   Mr. Boone recused himself from voting on issues related to Angelo Corte,
      Preeble-Rish, or the Fly Creek Pud LLC, which was dissolved six days after publication.


      THE DISCOVERY:

      *   Jack Burrell is caught in a trap involving alleged bid rigging and participation
      in the Airport Authority.

      *   Burrell used his authority as Council President to control the City Council
      Agenda.

      *   Burrell prevented the resolution to repeal ordinance 1572, which involved
      the Fly Creek Apartments.

      *   Burrell insisted that the Airport Authority Land remain in the name of the
      Authority despite the city paying the mortgage.

      *   Four complaints have been filed with the Ethics Commission against Mr. Burrell
      regarding his involvement in the Airport Authority and alleged bid rigging.


      THE PIVOT:

      *   Article 2 reveals that Burrell’s actions, previously characterized in Article
      1 as self-serving financial decisions (cutting development funds), were actually
      illegal participation in the Airport Authority and potential bid rigging, shifting
      the focus from budgetary cuts to criminal ethics violations.


