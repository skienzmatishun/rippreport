hooks:
  beavis-and-butthead:
    brief: 'THE CONFLICT

      *   Councilman Kevin Boone was registered as the Registered Agent for BA-101,
      LLC from 2004 to 2017.

      *   BA-101, LLC, formed in Baldwin County (4/29/2004), had a nature of business:
      PURCHASE/HOLD PROPERTY FOR INVESTMENT.

      *   The Council later questioned Boone regarding this conflict of interest,
      and he claimed no current conflict of interest when facing issues related to
      Angelo Corte or the Fly Creek Pud.

      *   Councilman Burrell was overheard stating he "will drive the mayor out of
      office in less than a year."


      THE DISCOVERY

      *   Kevin Boone is supported by CATALYST (political organization), which represents
      self-interests and ignores the majority.

      *   CATALYST previously financed the 2020 mayor, whom they felt threatened by
      when the current administration took power.

      *   Councilman Burrell ran for City Council instead of Mayor because he feared
      losing to the previous mayor (Jack/John).

      *   Boone and Burrell celebrate actions like the hiring freeze as a victory
      against the newly elected mayor.


      THE PIVOT

      *   Article 2 establishes that Councilmen Boone and Burrell are driven by personal
      political ambition, fear of defeat, and support from self-interested groups
      (Catalyst).

      *   This established motivation proves their institutional decisions in Article
      1—such as utilizing a hiring freeze or reducing funds for Sherry-Lea Bloodworth-Botop—are
      deliberate acts of political hostility toward the mayor rather than objective
      governance.


      KEY ENTITIES

      *   Kevin Boone / Councilman Kevin Boone

      *   Councilman Burrell

      *   Sherry-Lea Bloodworth-Botop (Director of Economic and Community Development)

      *   Angelo Corte (Developer)

      *   CATALYST (Political organization supporting Kevin Boone)

      *   Jack (Former Mayor/Supporter of Catalyst)

      *   Baldwin County

      *   BA-101, LLC'
