      *   Councilman Boone recused himself from voting on issues involving Angelo
      Corte, Preeble-Rish, or the Fly Creek Pud due to a conflict of interest regarding
      an LLC.

      *   The BA-101, LLC, registered to Kevin Boone, was dissolved on 1-31-2017.


      THE DISCOVERY:

      *   Fairhope opened "Pandora''s box" due to the HR director filing a $100,000
      lawsuit against the city.

      *   Sherry Sullivan and Jennifer Fidler were fired without known cause.

      *   Jack Burrell is implicated in events connected to the lawsuits, firings,
      and an airport scandal.

      *   The Airport Authority board remained silent regarding Jack’s alleged conduct
      concerning the airport dealings.


      THE PIVOT:

      *   Article 2 reveals that the council’s actions (conflict of interest involving
      Boone''s LLCs and Burrell''s decisions) are part of a larger pattern of corruption,
      including lawsuits and employment firings, proving that the local legal troubles
      stem from interconnected activities facilitated by figures like Jack Burrell.


