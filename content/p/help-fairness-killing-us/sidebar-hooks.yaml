      *   BA-101, LLC was formed on 4/29/2004 with Kevin Boone listed as the registered
      agent; it was dissolved on 6/3/2017 after its existence became public via Ripp
      Report (January 25).


      THE DISCOVERY:

      *   The second article alleges systematic corruption within Baldwin County Family
      Court practices, characterizing the judiciary as a "cottage industry."

      *   It details allegations of unethical behavior by specific judges and attorneys,
      including Judge Thomason and Stephen Johnson.

      *   The Ripp Report utilizes social media engagement (112 shares, 109 likes)
