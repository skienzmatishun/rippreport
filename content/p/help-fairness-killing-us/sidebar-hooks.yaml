  caught-trap-like-rat:
    brief: '**THE CONFLICT:**

      *   Councilmen Boone and Brown initiated budget cuts to economic and community
      development, which led to the removal of Director Sherry-Lea Bloodworth-Botop.

      *   This action occurred while Botop was in Washington D.C. representing Fairhope.

      *   Kevin Boone faced scrutiny for a conflict of interest related to BA-101,
      LLC (a domestic limited liability company).

      *   BA-101, LLC was formed on April 29, 2004, with Kevin G. Boone as the registered
      agent/member and John Avent as another member.

      *   Boone publicly denied any conflict of interest regarding Angelo Corte or
      Fly Creek Pud during council meetings.

      *   The llc was dissolved by Mr. Boone only six days after a Ripp Report published
      documentation about it (Dissolved: January 31, 2017).


      **THE DISCOVERY:**

      *   A Ripp Report is filing an Ethics complaint against Jack Burrell involving
      his participation in the Airport Authority and alleged "bid rigging."

      *   Mr. Burrell has used his position as Council President to control the City
      Council Agenda.

      *   He has blocked the repeal of Ordinance 1572 (involving Fly Creek Apartments)
      and prevented questioning regarding his involvement in bid rigging at work sessions.

      *   Mayor Wilson, who supports repealing Ordinance 1572 and airport land ownership,
      is actively resisting Burrell’s attempts to control these issues.


      **THE PIVOT:**

      *   The systemic pattern of political maneuvering, self-serving decision-making
      (Burrell using power for personal/factional gain), and the deliberate obfuscation
      of conflicts of interest (Boone dissolving LLC right before scrutiny) suggests
      a broader institutional failure in Fairhope governance.

      *   The Ethics Complaint against Burrell serves as direct proof that current
      leadership is engaged in alleged unethical/illegal behavior involving public
      assets (Airport Authority Land, bid rigging). This mirrors the prior conflict
      where Councilmen cut funding and eliminated an employee (Botop) under the guise
      of "fairness."


      **KEY ENTITIES:**

      *   Angelo Corte

      *   Kevin Boone / Kevin G. Boone

      *   Sherry-Lea Bloodworth-Botop

      *   Jack Burrell / Mr. Burrell

      *   Councilman Brown

      *   Conyers

      *   Mr. Wilson (Mayor)

      *   Ordinance 1572

      *   Fly Creek Apartments/Pud

      *   Fairhope City Council / City Council

      *   Ethics Commission'
