  the-good-the-bad-and-the-ugly:
    brief: 'THE CONFLICT:

      *   The Fairhope City Council previously obstructed a settlement regarding the
      Triangle Lawsuit.

      *   Under this law, Fairhope was forced into an 11.25 million cost when it could
      have been settled for under 1 million.

      *   Councilmen Boone and Burrell were identified as members of the council who
      refused to settle or discuss settlement in the Triangle case.

      *   In a previous developer conflict, Kevin Boone claimed he had no conflict
      regarding LLC agreements with Angelo Corte/Preeble-Rish.

      *   The investigation found BA-101, LLC (owned by K. Boone) was formed on 4/29/2004
      but dissolved only six days after Ripp Report published documents on 4/29/2017
      (dated 2/6/2017).

      *   The Main Article accuses Councilmen Burrell and Brown of eliminating Economic
      and Community Development positions/funds through budgetary cuts while Sherry-Lea
      Bloodworth-Botop was representing Fairhope in Washington D.C.


      THE DISCOVERY:

      *   Article 2 establishes a pattern of obstruction by the Catalyst Council,
      characterizing their agenda as being aimed at overthrowing present government
      and prioritizing developer interests over community welfare.

      *   Article 2 directly compares current administrative decisions (like the recent
      Breland lawsuit) to the past Triangle Lawsuit, noting that both incidents involved
      council obstruction and a refusal to settle efficiently, leading to increased
      city costs.

      *   The Widget Article names Marcus McDowell as City Attorney, alleging he has
      done a poor job protecting the community while doing a "good job" protecting
      Mr. Burrell from scrutiny regarding tax dollars.


      THE PIVOT:

      *   Article 2 provides documented historical evidence (Triangle Lawsuit failure)
      that connects past political obstruction by Councilmen Boone and Burrell to
      current administrative issues mentioned in Article 1.

      *   It reveals a systemic pattern of the Fairhope City Council favoring Catalyst/developers
      over sound financial or community governance, making the budget slashes and
      hiring freezes described in Article 1 appear as a continuation of established
      council patterns rather than isolated incidents.


      KEY ENTITIES:

      *   Kevin Boone (Councilman)

