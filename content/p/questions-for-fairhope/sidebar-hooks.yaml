      - "CATALYST" political group (linked to Scott Boone Consulting) supported Sullivan,
      former candidates Boone Brown and Burrell.

      - Accusations detail: 3 council members spent $2,650,000 on recreation land
      leased out for $9,000/year.

      - Alleged collusion between City Attorney and at least 3 council members to
      obstruct Mayor (Sullivan’s target) or paint them as corrupt.

      - Alleged use of stolen city documents shared with political rivals and tabloid
      press.

      - Municipal Judge and City Attorney allegedly dropped assault charges against
      a citizen on video via repeated negligence.


      2. THE DISCOVERY:

      - Widget article identifies Councilman Kevin Boone explicitly as a "developer"
      with a "rich history of supporting back room good ole boy politics."

      - Confirms current City Council/Mayor is "100% pro development" and prioritizes
      commercial infrastructure (e.g., Judges'' project) over ethics or preservation.

      - Historic preservation efforts are stalled; includes demolition of home of
      Nancy Lewis (woman freed from slavery).

      - "Cory the Crier" appeared on TV supporting Judges'' project, linked to Mayor/Council.


      3. THE PIVOT:

      - Widget article validates Main Article’s core allegation against Kevin Boone/Boone
      Brown (CATALYST allies).

      - Main Article demands Sullivan explain her connection to Kevin Boone and Catalyst;
      Widget article confirms Kevin Boone is a central actor in the "pro-development/corrupt"
      agenda Sullivan questions.

      - Bridges political accusations (Sullivan/Boone alliance) to physical governance
      actions (leaving landmarks demolished, prioritizing developers).


      4. KEY ENTITIES:

      - Sherry Sullivan

      - Kevin Boone (Councilman/Developer)

      - Scott Boone

      - Mayor Cant

      - Catalyst Consulting / CATALYST

      - Cory the Crier

      - Nancy Lewis'
    generated_at: '2026-03-18T15:08:54.979267Z'
  PRETTY-FLOWERS-ROTTEN-ROOTS:
