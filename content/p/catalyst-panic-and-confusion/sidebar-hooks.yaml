  crystal-ball:
    brief: 'THE CONFLICT

      *   Catalyst Fairhope Council ignored legal ramifications regarding a change
      of government.

      *   The Council canceled the October 2 election.

      *   The Council reacted after the Attorney General weighed in with an opinion
      unfavorable to them.

      *   The Council attempted to blame citizens for their mistakes instead of addressing
      structure changes.


      THE DISCOVERY

      *   The Fairhope election to vote on a change of government has been delayed
      until the General Election on November 6th.

      *   Voting logistics are set up to allow residents in Fairhope city limits to
      cast both the general election and the specific Fairhope change of government
      ballot in the same location.

      *   The City Council is stalling because they anticipate pushback against any
      structural change.


      THE PIVOT

      *   Article 1 describes the Council''s panic and obstructionism regarding change
      of government.

      *   Article 2 shows the Council''s current tactic: delaying the vote to force
      a general election, demonstrating their attempt to maintain control and suppress
      citizen action.

      *   This proves Article 1''s assertion that the Council is actively working
      to delay and kill efforts to change Fairhope’s government structure.


      KEY ENTITIES

      *   Catalyst Fairhope Council

      *   Attorney General

      *   Councilman Jay Robinson

      *   Council President Jack Burrell

      *   J Boy (potential Catalyst new pick for Mayor in 2020)

      *   WACO radio

      *   The Courier tabloid'
