  fairhope-council-shows-its-colors:
    brief: 'THE CONFLICT:

      *   The Catalyst Fairhope Council failed to check legal ramifications regarding
      a change of government.

      *   The Council reacted after the Attorney General weighed in.

      *   The Council sought to cancel the October 2 election.


      THE DISCOVERY:

      *   More than 800 Fairhope citizens signed a petition and it was accepted by
      the probate judge.

      *   This citizen measure triggered a 90-day period requiring an election for
      a new government structure, bypassing the city council.

      *   Mayor Karin Wilson delayed the Council-Manager form of government election
      scheduled for October 2nd until the general election on November 6th.


      THE PIVOT:

      *   Article 1 claims the Council is in control and acting improperly.

      *   Article 2 proves that citizens circumvented the City Council using a valid
      Alabama petition process, undermining the Council''s authority to cancel the
      election.


      KEY ENTITIES:

      *   Catalyst Fairhope Council

      *   Mayor Karin Wilson

      *   City Attorney

      *   Attorney General

      *   Probate Judge

      *   October 2nd election

      *   June 26, 2018 (opinion date)'
    generated_at: '2026-07-11T01:52:35.891850Z'
  special-interest:
