      *   Both Thorson and Pennington admitted they had no prior knowledge of problems
      within the Fairhope City Council before being involved with Catalyst backers.


      THE PIVOT:

      *   Article 2 reveals that individuals recruited by Catalyst were ignorant of
      local government problems, suggesting they were positioned to cover for Catalyst
      interests or stay in the shadows, which explains the Council''s panic and silence
      mentioned in Article 1.


