      *   Specific incumbent/figure conflicts include Frank Burt (Seat 1) being labeled
      a "political dinosaur" architect of the mega site, challenging by Jeb Ball (Main
      Article).


      **THE DISCOVERY:**

      *   The GOB culture is failing in neighboring municipalities: Bob Willis lost
      as ex-Mayor of Bay Minette to Joshua Brown (Widget Article).

      *   The public has moved away from long-term incumbents: Brad Bass won the Spanish
      Fort mayoral race over Mike, defeating "slappin'' Mike" (Widget Article).

      *   Political groups like Catalyst and Scott Boone Consulting are successfully
      promoting change by highlighting GOB failures in local elections (Widget Article).


      **THE PIVOT:**

