  who-not-to-vote-for:
    brief: 'THE CONFLICT:

      • Baldwin County Commissioners are facing scrutiny over a "$35 million plus
      mega site" financed on county employees.

      • Incumbent Frank Burt (Seat 1) is criticized as an "architect of many sweet
      heart deals."

      • Tucker Dorsey (Commissioner, Seat 3) is accused of being connected to Catalyst
      and Summitt Construction/Clarence Burke (Baldwin County Sewer) and orchestrating
      the firing of over a dozen employees.


      THE DISCOVERY:

      • Trip Pittman announced he would not seek re-election for State Senate due
      to believing in term limits, but was later linked to filling his pockets with
      BP cash during a catastrophe.

      • Chris Elliott pursued Sen. Trip Pittman''s State Senate seat following Pittman''s
      departure.

      • Article 2 establishes that both Elliott and Pittman have significant connections
      to large-scale corporate interests (e.g., Service Master Restore franchises).


      THE PIVOT:

      • The Widget article reveals the pattern of "career politicians" being selected
      for strategic positions, specifically showing Chris Elliott’s path into higher
      office was aligned with Trip Pittman''s political maneuvering and past corruption
      allegations related to BP.

      • This proves the generalized criticism in Article 1 about the "good ole boys"
      (like Dorsey) is part of a broader, established pattern where candidates like
      Elliott are placed or promoted by these development-linked groups (GOB/Catalyst).


      KEY ENTITIES:

      • Baldwin County Commission

      • $35 million mega site

      • Chris Elliott

      • Trip Pittman / Sen. Trip Pittman

      • Clarence Burke / BP

      • Tucker Dorsey

