      *   Trip Pittman helped Tucker Dorsey into the Commission.

      *   Chris Elliott had a DUI and used a lawyer/privileged card.

      *   Frank Burt is an incumbent architect of deals.


      THE DISCOVERY

      *   Candidates in Baldwin County are being vetted as "faux candidates or placement
      candidates by Catalyst."

      *   Former facilitators of corruption, including former Mayor Kant and Sen Pittman,
      were instrumental in maintaining the political network ("good ole boy network").

      *   Judge Michelle Thomason was the first client of Catalyst.


      THE PIVOT

      *   Article 2 identifies "Catalyst" as the organization determining which candidates
      are legitimate or placements, linking them directly to the corruption and maneuvering
      described regarding the commissioners in Article 1.


