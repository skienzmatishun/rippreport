      sewer plant failing to process 500,000 gallons of raw sewage.

      * This overflow occurred into Big Head gully and the Fly Creek watershed while
      Mayor Wilson was attempting to address identified sewer issues using studies
      provided by city superintendents.

      * The City Council is actively obstructing infrastructure projects despite being
      informed of critical needs, a process which Councilman Robinson dismisses as
