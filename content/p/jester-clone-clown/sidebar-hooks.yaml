  fairhope-special-meeting:
    brief: 'THE CONFLICT: What happened in the past?

      * Robert Brown and Jester 666 had a dispute regarding subjects similar to those
      mentioned in Mr. Brown’s public letter (Main Article).

      * During a council meeting, Robert Brown expressed deep loyalty to the Corte
