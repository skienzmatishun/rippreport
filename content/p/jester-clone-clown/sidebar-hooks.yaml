      Corte projects.

      * Council members John Burrell, Robert Boone, and Robert Brown were observed
      meeting together at Bone and Barrel immediately after an unspecified council
      session to discuss city business.

      * Senator Tripp Pittman leveraged his position as a Trustee of BP funds (appointed
      2018-07-27) and allegedly used Fairhope City Council influence to award municipal
      contracts to his tractor company without necessary licensing or experience,
      potentially skimming $750,000 from BP funds.

      * Prior to this activity, Jack Burrell had voted as council president for Pittman''s
      "Come fly with me" initiative (Main Article).


      THE DISCOVERY: What does the second article prove today?

      * The Widget Article reveals that on Friday, December 29, 2017, Council Member
      Jack Burrell was organizing a special city meeting.

      * This specific action is framed by the Wiget as an attempt by Burrell to protect
      himself ("covering his ass") and maintain personal control over municipal resources
      like the City Attorney position, regardless of cost or benefit to Fairhope taxpayers.


      THE PIVOT: Why is Article 2 the ''smoking gun'' for Article 1?

      * Both articles reference Jack Burrell’s political maneuvering in early-to-mid
      2017/2018 and later (Main Article referencing "Council President").

      * The Widget article provides concrete evidence of an aggressive, self-serving
      political move by Burrell to exert undue influence over the City Council and
      city resources specifically during a time when he was building connections with
      other powerful figures like Pittman.


      KEY ENTITIES: A list of specific names, organizations, or locations to mention

      * John Burrell (Jack Burrell)

      * Robert Brown

      * Tripp Pittman (Senator/Trustee)

      * Frances Paul Ripp / Ripp Report

      * Court President

