      4. KEY ENTITIES

      - Jack Burrell (Council President)

      - Boone Brown (Councilman)

      - Mayor Wilson (Former)

      - Mayor Sullivan (Current)

      - Stewart "The Liar" Speed (Leaf River Group)

      - Arthur Corti (Developer)

      - Councilman Jay Robinson ("Marble Mouth")

