      - Waterfront Project: Cost ballooned from $6.2 million to $10 million; delayed
      five and a half years due to trees/materials issues.

      - Recreation Land: Councilman Boone Brown and Jack Burrell made side deal purchasing
      land, then leased back to farmers for $9,000/year.

      - Airport: Jack Burrell Airport development in hands of developers; 1% population
