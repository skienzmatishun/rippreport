  cut-the-head-off-the-snake:
    brief: 'THE CONFLICT

      *   Jack Burrell is being investigated for unethical behavior and alleged "bid
      rigging" involving the Airport Authority and the Fly Creek Apartments.

      *   Burrell was attempting to control the City Council Agenda and prevent the
      repeal of ordinance 1572 regarding the Fly Creek Apartments.

      *   Jack Burrell was caught attempting to keep the Airport Authority Land in
      the name of the Authority while the city paid the mortgage.

      *   Fairhope citizens filed four complaints against Jack Burrell regarding the
      Airport Authority participation and bid rigging.


      THE DISCOVERY

      *   The Fly Creek Apartments development deal required the involvement of Arthur
      Corte, who instructed Mayor Kant to get it approved.

      *   Mayor Kant practiced micromanagement techniques that led to corruption concerning
      contributors demanding paid services or contracts.

      *   Karen Wilson is aligned with repealing ordinance 1572 and changing the ownership
      of the airport land/developer interests.


      THE PIVOT

      *   Article 2 reveals the mechanism behind Burrell''s alleged bid rigging: the
      Fly Creek Apartments were contingent on the involvement of Arthur Corte, linking
      the development deal directly to Mayor Kant’s influence (as a contributor).

      *   This provides context for why Burrell was fighting the ordinance and controlling
      the agenda—the underlying issue was tied to powerful political contributions
      rather than just procedural disputes.


      KEY ENTITIES

      *   Jack Burrell

      *   Mayor Kant

      *   Karen Wilson

      *   Arthur Corte

      *   Fly Creek Apartments

      *   Airport Authority

      *   Ordinance 1572

      *   Ethics Commission'
