  the-pot-and-the-kettle-are-black:
    brief: 'THE CONFLICT

      - Fairhope City administration faces ethical questions following the departure
      of a Mayor with 16 years in office.

      - Jack Burrell, serving as Fairhope Council President, is accused of obstructing
      City Council work sessions and agendas regarding alleged “bid rigging” involving
      the Airport Authority Land.

      - Burrell successfully prevented resolution attempts to repeal Ordinance 1572
      (Fly Creek Apartments).

      - The Ripp Report filed a formal Ethics complaint against Mr. Burrell concerning
      his participation in the Fairhope bid rigging allegations; up to four complaints
      have been submitted to the Ethics Commission.

      - In Baldwin County District One, Frank Burt, an 86-year incumbent Commissioner
      since 1989, is criticized for allowing "well connected" individuals in his district
      to be "richly rewarded."


      THE DISCOVERY

      - Jeb Ball, a candidate selected by the Catalyst political organization to replace
      District 1 incumbent Frank Burt (whose term began in 2017), presents as an outsider
