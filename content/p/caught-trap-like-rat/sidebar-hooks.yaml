      *   Four complaints were filed with the Ethics Commission against Mr. Burrell.


      THE DISCOVERY

      *   The Alabama Ethics Commission issued an advisory opinion in October 2010
      concerning Commissioner Dorsey.

      *   The opinion ruled that Dorsey should not vote, attempt to influence, or
      participate in issues related to business dealings with BCSS because Burke was
      his employer.

      *   This ruling established a conflict of interest under state ethics law regarding
      official duties and personal financial interests.


      THE PIVOT

      *   Article 2 provides specific legal precedent (the October 2010 advisory opinion)
      demonstrating that Commissioner Dorsey had a defined conflict of interest regarding
      business dealings with BCSS due to his employment relationship with Burke.

      *   This links the ethical scrutiny surrounding Burrell''s alleged involvement
      in the Airport Authority/bid rigging (Article 1) to established rules regarding
      conflicts of interest and official duties involving related entities or individuals
