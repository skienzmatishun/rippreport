      conflicts with BCSA/BSAS founded by Judge Michell Thomason).


      KEY ENTITIES

      - Jack Burrell: Fairhope Council President / Subject of Ethics Complaint.

      - Mayor Wilson: Supported repeal of Ordinance 1572; opposes Mr. Burrell''s actions.

      - Jack Burrell (Alleged): Involved in “bid rigging” regarding Airport Authority
