      and the Alabama Attorney General.

      *   These complaints fell on deaf ears.

      *   Baldwin County City Councils ignore complaints about fellow councilmen and
      protect each other.

      *   An organization named Catalyst exists in Baldwin County to protect and promote
      officials.


      THE DISCOVERY

      *   The only effective way to challenge corruption is by exposure.

      *   A paper trail is being established through expanding the e-mail site, Facebook
      pages, and mailing lists.

      *   Involvement of State and Federal law enforcement agencies and city clerks
      will be included on the mailing list for no deniability.


      THE PIVOT

      *   Article 2 reveals that traditional complaint filing methods (to the Ethics
      Commission/Attorney General) are ineffective or provide "cover."

      *   Article 2 shifts strategy from passive complaining to active exposure as
      the primary method to combat political corruption.


      KEY ENTITIES

      *   The Ripp Report

