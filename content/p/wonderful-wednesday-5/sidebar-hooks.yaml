  fauxhope-2:
    brief: 'THE CONFLICT

      *   Infrastructure problems (electrical/water shortages) in Fairhope resulted
      from neglect during the Tim Kant administration (2000 to 2016).

      *   The Council under Tim Kant included Sherry Sullivan.

      *   During the Wilson administration (2016/2020), the council denied infrastructure
      projects and well digging due to political motivation.

      *   Mayor holds dual role, receiving checks for Mayor and heading up utilities
      without utility experience.

      *   Conflict exists over ownership of the Airport property between the City
      of Fairhope and the Airport Authority ($310,000/year appropriation for $8 million
      debt).

      *   Council President Jack Burrell refused public participation on August 28th,
      2017.


      THE DISCOVERY

      *   The common denominator linking all issues is Jack Burrell and the do nothing
      city council.

      *   Burrell, the Mayor, and the council were supported and financed by CATALYST
      and developers.

      *   Infrastructure costs exceeded $13 million for a re-vamp costing $11 million,
      with no spending on transmission lines.


      THE PIVOT

      *   Article 2 identifies the specific financial backers (CATALYST and developers)
      responsible for supporting Jack Burrell and the city council, providing a direct
      link between political inaction and private financial influence.

      *   This proves that the current quality of life decline is directly tied to
      the same individuals who oversaw the previous administration''s neglect.


      KEY ENTITIES

      *   Tim Kant administration (2000 to 2016)

      *   Sherry Sullivan

      *   Cory Martin

      *   Jack Burrell (Council President)

      *   Fairhope City Council

      *   Mayor

      *   Airport Authority

      *   CATALYST

      *   Developers'
