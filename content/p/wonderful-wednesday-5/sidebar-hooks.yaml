  happy-days:
    brief: 'THE CONFLICT

      *   Attorney General used PAC funds illegally to get elected.

      *   Ethics Executive Director Tom Albritton skimmed trust from his position.

      *   Fairhope taxpayers spent millions on stalled projects favored by developers
