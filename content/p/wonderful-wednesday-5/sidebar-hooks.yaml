  wonderful-wednesday-4:
    brief: 'THE CONFLICT

      *   Past administration involvement: Mr. Burrell and Mr. Boone brought baggage
      regarding the sewer system, airport, soccer fields, and the triangle lawsuit
      (total $50 million).

      *   Current council action: The council is investigating Elias Technologies
      via subpoenas.

      *   Litigation scheme: Council is taking action to expose "potential evidence"
      for Jennifer Fidler, Sherry Sullivan, and Pandora Heathcoat in their litigation
      against the city.

      *   Settlement promise: The wishful three were promised $100,000 each to settle
      lawsuits and hide tax money.


      THE DISCOVERY

      *   84% of Fairhope eligible voters decided NOT to participate or vote in the
      recent US Senate primary.

      *   This voter apathy explains why Fairhope is politically dysfunctional.


      THE PIVOT

      *   The low voter turnout (84%) provides a political justification for the council''s
      obstructionist behavior and self-serving agenda, indicating public disengagement
      as a result of city dysfunction.


      KEY ENTITIES

      *   Mr. Burrell

      *   Mr. Boone

      *   Mayor Kant

      *   Jennifer Fidler

      *   Sherry Sullivan

      *   Pandora Heathcoat

      *   Jay Robinson

      *   Elias Technologies'
