      bed jail, named the Hoss Mack Judicial Center, instead of funding incarceration
      reduction projects.

      *   Sheriff Hoss Mack manipulated elections to secure his position through previous
      State Senator Tripp Pittman''s legislative action.


      THE PIVOT

      *   Article 2 reveals how political figures (Sheriff Mack and State Senator
      Elliott) maintain a mutually beneficial relationship designed to protect corruption
      rather than address it.

      *   The Sheriff’s control over law enforcement/major crimes divisions protects
      his dismal record, which is maintained through political maneuvering, proving
      that local infrastructure decisions are tied directly to corrupt power structures
      mentioned in Article 1.


