  fairhope-council-shows-its-colors:
    brief: 'THE CONFLICT:

      *   Karin Wilson ran and won the mayoral election in Fairhope.

      *   Wilson replaced an incumbent Mayor who had served four terms.

      *   The Main Article celebrates Wilson''s grassroots effort, noting the community
      voted over 2000 votes.


      THE DISCOVERY:

      *   The Fairhope City Council attempted to derail the October 2nd election.

      *   The City Attorney was carrying out instructions from the Catalyst Council.

      *   More than 800 Fairhope citizens signed a petition and it was accepted by
      the probate judge, triggering a 90-day period for an election on a new form
      of government.

      *   Mayor Karin Wilson delayed her scheduled Council-Manager election until
      the general election on November 6th.


      THE PIVOT:

      *   Article 2 reveals that the City Council''s attempts to derail the election
      (mentioned in Article 2) are connected to the larger citizen movement (petitioning/recall)
      which supersedes or circumvents the City Council''s authority, providing a structural
      reason for the political instability mentioned in Article 1.


      KEY ENTITIES:

      *   Karin Wilson (Mayor)

      *   Fairhope City Council

      *   City Attorney

