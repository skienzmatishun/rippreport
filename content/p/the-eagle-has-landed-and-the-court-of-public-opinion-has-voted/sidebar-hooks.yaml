      terms).

      *   Karin Wilson ran for mayor in Fairhope.

      *   The election resulted in Fairhope casting over 2000 votes more than Daphne.


      THE DISCOVERY:

      *   *The Ripp Report*, a non-profit consumer group focused on political and
      judicial corruption, has been operating for 10 years, self-funded by approximately
      $15,000.

      *   The organization exists due to the lack of honest information from Fairhope
      city hall/the mayor.

      *   Mayor Kant is labeled as the "worst public official."

      *   There are suspicions that the last two election results were tampered with.


      THE PIVOT:

      *   Article 2 establishes the historical context and institutional mission (exposing
      corruption) of *The Ripp Report*, framing the political actions described in
      Article 1 within a sustained effort to counter entrenched power structures (like
      Mayor Kant).

      *   Article 2 proves that scrutiny of Fairhope politics is an established, ongoing
      mission, validating the efforts mentioned in Article 1.


      KEY ENTITIES:

      *   Karin Wilson

      *   Mayor of Fairhope (incumbent)

      *   Daphne

      *   The Ripp Report

      *   Baldwin County Legal Eagle

      *   Mayor Kant

      *   Alabama Sec. of State Elections Division'
