hooks:
  game-on:
    brief: 'THE CONFLICT

      *   Karin Wilson ran for Mayor of Fairhope, unseating an incumbent Mayor who
      had served four terms.

      *   Past political decisions included a triangle lawsuit costing $12 million.

      *   City infrastructure was ignored; the soccer field project ($5 million+)
      lacked independent auditing.

      *   A former council/Mayor used decision-making processes that allowed developers
      to prioritize interests over citizens (e.g., Fly Creek Apartments).

      *   The Mayor’s appointed planning and zoning board, under Mayor Kant, failed
      to maintain transparency, leading to numerous lawsuits.


      THE DISCOVERY

      *   The incumbent political structure was defined by a "good ole boys" system
      and political connections used to advance figures like Haygood and Elliot.

      *   Mayor Kant actively used the planning board to push personal agendas favoring
      connected individuals, resulting in needless lawsuits.

      *   A new Mayor (like Wilson) is necessary to replace this regime and reduce
      lawsuits by over 60%.


      THE PIVOT

      *   Article 2 reveals the systemic corruption and mismanagement (double dipping,
      ignoring infrastructure, biased decision-making via the planning board) that
      Article 1 suggests needed to be opposed by the new administration.

      *   The specific critique of Mayor Kant’s use of his power to favor "good ole
      boys" serves as evidence for why Wilson''s victory was necessary and how she
      intends to prevent the "remnants of the last regime from eroding our efforts."


      KEY ENTITIES

      *   Karin Wilson (Mayor)

      *   Mayor Kant

      *   John Lake (Candidate)

      *   Harry Still III (City Council candidate)

      *   Haygood

      *   Elliot

      *   Triangle lawsuit ($12 million)

      *   Fly Creek Apartments

      *   Baldwin County

      *   Fairhope'
