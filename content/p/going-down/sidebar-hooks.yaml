  taxes-tolls-and-schools:
    brief: 'THE CONFLICT

      *   Baldwin County is experiencing rapid, unbridled development leading to infrastructure
      deficits (sewer spills, traffic nightmares like the Corridor of Chaos).

      *   Developers profit millions while citizens are taxed to correct resulting
      issues.


      THE DISCOVERY

      *   The I-10 mobile river bridge project costs billions due to height, raising
      concerns about tolls versus freighter traffic.

      *   Governor Poison Ivy and Junior Senator Elliott (the "TAX MAN") are involved
      in the decision regarding the bridge tolling.

      *   A special tax district is proposed for Fairhope and Spanish Fort for schools
      via a referendum, proposing a $3 million tax addition to existing funding.


      THE PIVOT

      *   Article 2 provides the specific financial mechanisms (toll plans, gas tax
      hikes, targeted school taxes) that quantify the negative impact of the uncontrolled
      development described in Article 1.

      *   It shifts the argument from abstract property rights/greed to concrete,
      rising costs for residents (taxes and tolls).


