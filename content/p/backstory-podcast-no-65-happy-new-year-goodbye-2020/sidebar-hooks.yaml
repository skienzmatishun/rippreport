      KEY ENTITIES

      - Joseph Robinette Biden Jr.

      - Donald Trump

      - Dr. Robert Bentley (CDC mentioned in Main)

      - Justice Lyn Stuart

      - Backstory Podcast

      - National Defense Appropriation Bill

      - SARS-COV-2 (Stats: 83,718,625 worldwide; 350,000 US deaths)

      - Georgia (Runoff date January 6, 2021)'
