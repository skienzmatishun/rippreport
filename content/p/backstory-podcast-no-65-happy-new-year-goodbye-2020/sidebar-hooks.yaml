      - Event C: Podcast reports Dr. Robert Bentley received vaccine; Nashville Christmas
      Day bombing tragedy highlighted (linked to 5G).

      - Event D: Podcast references Georgia Senate runoffs scheduled for Jan 6, 2021.

      - Status: Main article serves as the initial report on status of these late
      2020/early 2021 federal events.


      2. THE DISCOVERY:

      - Data Confirmation: Widget article updates case counts to match timeline of
      Podcast No 65.

      - Impeachment Date: Widget confirms Senate concluded arguments on Trump’s impeachment
      "today" (context: Jan 2021).

      - Local Financials: Widget confirms specific funding for projects mentioned
      in Podcast''s broader coverage of "Bad Bills."

      - Terminix Settlement: AG Steve Marshall announced $60M settlement with Terminix;
