      - US Senate overrides Trump''s veto on National Defense Appropriation Bill,
      limiting his power to withdraw troops (Main).

      - Trump grants pardons to 50+ individuals (Main).

      - Main Article notes state-level election counts continue until certified, casting
      doubt on final outcome.

      - Widget article states media outlets have called the 2020 election for Joseph
      Robinette Biden Jr.


      THE DISCOVERY

      - Widget confirms the podcast is dedicated to discussing Biden''s confirmation
