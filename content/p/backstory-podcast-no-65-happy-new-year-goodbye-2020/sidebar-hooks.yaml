      - Widget Article shows that federal oversight (Federal $ tower, Governor Ivey''s
      plans) is failing or colluding, making Main Article’s national warnings about
      power abuse factually grounded in the Alabama specific cases Widget details.


      KEY ENTITIES:

      - Dr. Robert Bentley (US Health Official, Vaccine oversight)

      - President Trump

      - Justice Lyn Stuart

      - Governor Ivey (Alabama)

      - Nick Saban

      - Gulf Shores / Baldwin County

