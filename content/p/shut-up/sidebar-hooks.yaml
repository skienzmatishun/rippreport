      THE PIVOT

      *   Article 2 proves that Jack Burrell''s actions—undermining morale and pushing
      for opaque deals at the Airport Authority—occurred within a broader municipal
      environment characterized by profound corruption (e.g., misuse of funds, fraudulent
      zoning, ethics violations).

      *   Burrell''s maneuvering is exposed as part of a larger pattern of systemic
      failure and lack of accountability that allows officials like Kant to engage
      in "good ole boy deals" and financial fraud.


