  opposition-obstruction:
    brief: 'THE CONFLICT:

      *   **Date Range:** September 2016 to February 2017.

      *   **Issue:** Financial mismanagement and lack of transparency regarding the
      Fairhope Airport Authority land debt (initially $7,445,629).

      *   **Key Figures/Events:** Mayor Wilson challenged Chairman Joe McEnerney and
      Councilman Jack Burrell on September 15, 2016, questioning loan structure.

      *   **Procedural Conflict:** Burrell claimed the city''s obligation to the land
      was "indefinitely," though Wilson later discovered the balloon payment was scheduled
      for 2020.

      *   **Refinancing Process (Feb 2017):** Mayor Wilson alleged that McEnerney
      and Burrell failed to properly engage her in RFP processes, potentially misled
      the board regarding prepayment penalties, and caused delays during the refinancing
      of the debt with Bryant Bank.


      THE DISCOVERY:

      *   **Current Control:** Council President Jack Burrell is described as directing
      City Council policy (voting "as a unit") against Mayor Wilson''s recommendations.

      *   **Obstruction Tactic 1 (Sept 11):** The council rejected a second, mayor-recommended
      bid for city insurance after it arrived within 23 hours of the deadline. This
      decision allegedly cost taxpayers $60,000 in fees and resulted in worse coverage
      than the accepted bidder.

      *   **Obstruction Tactic 2 (Information Control):** Councilman Boone defended
      leaked subpoenaed information—which concerns three pending lawsuits against
      the city—as "transparency," despite legal warnings advising against leaks.


      THE PIVOT:

      *   The Main Article documents a pattern of procedural obfuscation and failure
      to disclose critical financial details ($7M+ land debt, prepayment penalties)
      by Burrell and McEnerney concerning the Airport Authority refinance (2016-2017).

      *   The Widget Article proves this pattern persists in modern municipal governance
      through explicit political obstruction: using Council votes as a unit to reject
      mayor-preferred insurance bids ($60k cost), controlling procedural access for
      public comment, and selectively leaking privileged information related to pending
      lawsuits.


      KEY ENTITIES:

      *   Jack Burrell (Council President/City Council)

      *   Karin Wilson (Mayor)

      *   Joe McEnerney (Airport Authority Chairman)

      *   Boone (Councilman)

      *   Fairhope City Council / Fairhope Airport Authority

      *   Bryant Bank

      *   The Ripp Report'
