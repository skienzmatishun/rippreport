      *   City debt included an $8.75M settlement for the Dyas triangle lawsuit and
      a $7.7M debt balance for adjacent land.

      *   Mayor Wilson requested financial commitments be transparent regarding the
      airport refinance process (Sept 15, 2016).

      *   The City Council unanimously approved keeping the land in the Airport Authority''s
      name on December 22, 2017, committing $320k/year for seven years.


      THE DISCOVERY

      *   Mayor Kant and the city demonstrated systemic corruption and misuse of funds
      across multiple departments (Planning & Zoning, Utility).

      *   The Triangle lawsuit cost $12 million, which involved draining $3 million
      from the utility fund by the Mayor to pay down on the settlement.

      *   There is evidence of fraud regarding the Triangle lawsuit purchase (allegation
      that it was a park, not a settlement).

      *   Senator Pittman and Mayor Kant were involved in potential BP Grant fraud,
