      - Fairhope Police arrested Garrigan on "threatening phone calls" without reading Miranda rights; Simkins was not arrested.
      - Garrigan spent 30 days in jail shackled, chained, and handcuffed; she refused plea deals.
      - Over 8 years, Garrigan spent over $10,000 but was denied visitation and has no knowledge of daughter's schooling or church.
      - Judge Thomason allegedly ignores findings from Larry Fison (Strickland Youth Center Director) and JIC complaints.

      THE DISCOVERY:
      - Attorney Austin Burdick filed a federal lawsuit against Secretary of State John Merrill regarding Judge Thomason's appointment.
      - Burdick’s complaint alleges Alabama law limits special court appointments to 180 consecutive days, but Thomason has been appointed successively for more than a decade.
      - Burdick’s motion states Thomason took the Circuit Judge office while voters only elected her as a District Judge with limited jurisdiction.
      - Ripp Report document states Tom Albritton is Executive Director of Ethics Commission and cited as blatant corruption example.
      - Burdick claims Thomason has negatively impacted hundreds of families and attorneys/attorneys she protects consider it a "cottage industry."

      THE PIVOT:
      - Article 1 establishes Judge Michelle Thomason as the specific point of judicial abuse in Baldwin County.
      - Article 2 provides federal-level evidence (Burdick v. Merrill) validating Article 1’s claims of Thomason’s corrupt tenure and unauthorized jurisdictional appointment.
      - Article 2 confirms the specific victim (Chey Garrigan) mentioned conceptually in Article 1, proving Thomason’s court strips parental rights via shackling/attorney collusion.

