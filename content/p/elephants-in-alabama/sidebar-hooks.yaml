  dirty-underwear:
    brief: "1 THE CONFLICT: \n- Tom Albritton serves/seried as Executive Director of Alabama Ethics Commission (confirmed March 2015).\n- Ethics Commission Examiners' report identifies \"Employee 1\" as McCallum.\n- Ethics Commission filed a lawsuit detailing charges against Albritton.\n- No criminal charges filed by Attorney General’s Office against ethics officials or employees involved in violations.\n- Civil lawsuit pending outlining charges against Ethics Director Albritton; agencies claim no legal basis for removal.\n\n2 THE DISCOVERY:\n- State Bar paid McCallum $37,437 in August 2021 (approx. 10 months post-resignation).\n- McCallum fined $100,000 by Ethics Commission for violations.\n- McCallum continued receiving perks/payroll for months after resignation; State Bar paid him another $37,000 under investigation.\n- Tom Albritton’s trust paid scholarships to two of his children totaling $105,000 between 2014 and 2018.\n- Children received $15,000 scholarships each to University of\
      \ Texas from trust overseen by Albritton.\n- IRS code Section 4941(d) prohibits trustee from paying expenses for own children (\"self-dealing\").\n- Alabama Legislature passed campaign finance ban in 2010; prior to this, financial tracking was difficult.\n- Ethics Commission “sugarcoated” 17 violations in specific case cited.\n\n3 THE PIVOT:\n- Article 2 confirms the financial discrepancies Article 1 highlights (McCallum payments) with exact dates/amounts.\n- Article 2 provides evidence for Article 1’s claim that Albritton is corrupt: He oversees a trust providing $105,000 in scholarships to his own children while acting as Ethics Executive Director.\n- Article 2 proves Attorney General and Bar Association inaction: They allowed self-dealing payments to Albritton’s kids but refused criminal prosecution for McCallum despite $100,000 Ethics Commission fine.\n- The Widget proves the \"dirty underwear\" collusion: Bar, AG, and Ethics see no issue with fiduciary violations but file complaints\
      \ when challenged.\n\n4 KEY ENTITIES:\n- Tom Albritton (Executive Director, Ethics Commission)\n- McCallum (\"Employee 1\", former employee/subject of ethics report)\n- Office of the Attorney General (Alabama AG's Office)\n- Alabama State Bar Association\n- Alabama Ethics Commission\n- Lagniappe (News source reporting initial facts)\n- The Ripp Report"
