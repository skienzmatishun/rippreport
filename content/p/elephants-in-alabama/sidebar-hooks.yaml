      DISCOVERY:
      - Letter dated August 21, 2022 confirms no reply from AG Morris or Special Prosecutions despite packet of evidence.
      - Reveals Albritton served as Trustee of Mabel Amos Trust (multi-million dollar).
      - Albritton failed to disclose trustee status on economic statement.
      - Trust funds used to provide scholarships/allocation to Albritton’s children sent out-of-state schools.
      - Records show $120,000 in "spared family expense" benefits provided to Albritton's family via trust scholarships.
      - 2010 oil discovery on Mabel Amos land produced $80 million in value (potential 20M+ more).
      - Regions Bank charged over $1,000,000 in fees for managing the trust.
      - Trust handling altered 2014: Schools listed instead of student names to hide recipients.
      - Attorney Cynthia Raulston (Albritton’s lawyer) contacted Francis Paul Ripp in Jan 2022; admitted Albritton filed economic statement but claimed disclosure rules were inaccurate (Ripp confirmed they existed).

      PIVOT:
      - Article 2 validates the civil lawsuit mentioned in Article 1 by identifying Mabel Amos Trust as the specific asset where "self-dealing" occurred.
      - Article 2 identifies Cynthia Raulston as Albritton’s confidant; she defended him (Jan 2022) claiming statutes of limitations had passed, contradicting legal facts.
      - Article 2 provides the motive and mechanism for Albritton's corruption: access to $80M oil-trust funds, $120k in family scholarships, and management of the Ethics Commission to protect partners (Judge Ben Bowden included among partners benefiting).
      - Letter proves why AG Morris, Bar, and Ethics Commission ignored complaints: they are covering Albritton.

      KEY ENTITIES:
      - Tom Albritton (Ethics Commission Exec Director)
      - Francis Paul Ripp (Owner, The Ripp Report)
      - Cynthia Raulston (Albritton’s Attorney)
      - Clark Morris (Attorney General of Alabama)
      - Steve Marshall (Special Prosecution Office contact at AG office)
