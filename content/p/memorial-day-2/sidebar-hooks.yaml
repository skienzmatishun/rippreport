      argument at the Little Whiskey Christmas Club.

      *   McSharry claimed a settlement agreement with Paula DiNardi was reached but
      she refused to abide by it.

      *   Police found McSharry intoxicated and slurring his speech when called regarding
      DiNardi’s assault claim.

      *   Fairhope Municipal Judge Haymes Snedeker found McSharry guilty of both counts
      (assault/intoxication) and imposed an 180-day sentence.


      THE DISCOVERY

      *   McSharry’s third-party complaint alleging damages from LWCC’s conduct was
      dismissed by LWCC, claiming McSharry was not injured.

      *   Baldwin County Circuit Judge Clark Stankoski dismissed the most serious
      assault charge (on video) because McSharry had already pleaded guilty in municipal
      court.


      THE PIVOT

      *   Article 2 proves that the judicial system in Fairhope is biased and corrupt,
      as highlighted in Article 1. The failure of the City Attorney to file the assault
      charge resulted in a judicial "hand off" to Judge Snedeker, indicating judicial
      manipulation rather than impartial justice.


