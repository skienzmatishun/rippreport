hooks:
  follow-bouncing-ball:
    brief: 'THE CONFLICT

      * Main Article claims Councilman Boone has undisclosed conflicts of interest
      involving LLC''s and side deals in municipal business.

      * Claims he voted on hundreds of thousands of dollars for engineering companies
      connected to his private interests.

      * Main article alleges a "pattern" of corruption spanning years, comparing him
      to past councilman Ford (19th/20th-century era).


      THE DISCOVERY

      * Widget Article provides specific Planning and Zoning Commission Meeting Minutes
      from 2016 demonstrating Boone''s involvement in projects related to Dewberry/Preble-Rish
      LLC.

      * Sept. 3, 2016: Jay Robinson voted against the staff recommendation (to deny)
      for Retreat at Fairhope Village project request by John Avent, who is cited
      as a "business partner of Mr. Boone." Kevin Boone was recorded as voting NAY.

      * Oct. 3, 2016: Kevin Boone made a motion to approve Old Battles Place multiple
      occupancy application and granted waiver to LID practices (Presented by Scott
      Hutchinson). Motion carried AYE Bob Clark and Lee Turner; NAY Hollie MacKellar,
      Jay Robinson.

      * Sept. 6, 2016 Public hearing: John Avent''s project request was brought up.
      Kevin Boone voted NAY against the motion tabled by Jay Robinson, Jennifer Fidler,
      etc., indicating opposition to delaying/denial process.


      THE PIVOT

      * Article 1 makes a general accusation of undisclosed conflicts and voting for
      connected firms; Article 2 provides specific dated minutes (Sept./Oct. 2016)
      proving Boone voted on applications from entities like Dewberry/Preble-Rich
      LLC, which also employed his business partner John Avent and later donated $2500
      to his re-election campaign.

      * Article 2 establishes a direct timeline connecting the private business of
      Mr. Boone (via Preble-Rish) to the public voting record regarding municipal
      infrastructure projects.


      KEY ENTITIES

      * Councilman Kevin Boone / Mr. Boone

      * John Avent

      * Dewberry/Preble-Rich LLC / Preble-Rish, LLC

      * HMR, LLC

      * Bob Clark

      * Jay Robinson

      * Hollie MacKellar

      * Lee Turner

      * Jennifer Fidler

      * Scott Hutchinson

      * Paul Ripp / Francis Paul Ripp (Author of The Ripp Report)'
