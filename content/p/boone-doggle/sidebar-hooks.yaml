      - Conflicts involve hundreds of thousands of dollars in council resolutions
      favoring engineering companies with which Boone has connections.


      **THE DISCOVERY:**

      - The Widget Article explicitly names Mr Angelo Corte as a key entity, noting
      that the investigation into Boone’s involvement with him was requested by citizens
      in January (date unspecified).

      - Documents were reportedly provided to Fairhope City Council detailing Boone''s
      conflicts of interest regarding the extension of the sunset clause for Fly Creek
      Apartments and Preble-Rish related issues.

      - The Widget Article asserts some of Mr Boone’s business conflicts predate his
      election as a council member in 2017 (Entity Timeline).


      **THE PIVOT:**

      - While Article 1 alleges general undisclosed LLC interests by Councilman Boone,
      Article 2 pinpoints specific development projects (Fly Creek Apartments and
      Preble-Rish) tied to these conflicts.

      - Article 2 specifically identifies Mr Angelo Corte as a connection point for
      Mr. Boone''s business dealings that the council was warned about but allegedly
      ignored regarding his voting behavior.


      **KEY ENTITIES:**

      - Councilman/Mr Boone

      - Mr Angelo Corte (Developer, entity with multiple roles since 1970s)

      - CATALYST (Political organization related to Mr Boone)

      - Fly Creek Apartments (Development project tied to conflicted votes)

      - Preble-Rish (Entity tied to undisclosed conflicts)'
