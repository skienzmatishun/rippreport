  conflict-of-interest:
    brief: 'THE CONFLICT:

      - Councilman Kevin Boone has generally faced allegations of undisclosed conflicts
      of interest regarding his private involvement in multiple Limited Liability
      Companies (LLCs) and personal connections to engineering firms.

      - Main Article asserts Mr. Boone votes on council resolutions involving hundreds
      of thousands of dollars concerning companies he is linked to, particularly those
      connected through LLC side deals.


      THE DISCOVERY:

      - The second article proves Kevin Boone’s direct business connection with John
      Avent (Preble-Rish, LLC) dates back prior to his tenure as a city council member
      and continues during it.

      - It reveals that in September 2016 (P&Z meeting), Mr. Boone voted favorably
      on the Retreat at Fairhope / Fly Creek Apartments (SD 16.14), while John Avent
      was present representing Preble-Rish.


      THE PIVOT:

      - Article 1 presents a general critique of "undisclosed conflicts" and "side
      deals."

      - Article 2 serves as the smoking gun by providing specific evidence—linking
      Boone''s voting record on major projects (Fly Creek Apartments, Firefly) directly
      to his private business partner (Avent/Preble-Rish) during municipal meetings
      in 2016.


      KEY ENTITIES:

      - Kevin Boone

      - John Avent

      - Preble-Rish, LLC

      - Firefly project

      - Retreat at Fairhope / Fly Creek Apartments

      - September 2016 (SD 16.14 Planning & Zoning meeting)'
