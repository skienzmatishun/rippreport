  follow-bouncing-ball:
    brief: 'THE CONFLICT:

      *   Councilman Boone had undisclosed conflicts of interest regarding planning
      and zoning decisions.

      *   Boone voted on council resolutions involving hundreds of thousands of dollars
      in favor of engineering companies connected through LLCs.

      *   Boone was partnered with John Avent, a business partner of the engineering
      company Dewberry/Preble-Rish, in an unrelated business LLC.


      THE DISCOVERY:

      *   Documents expose that Councilman Boone voted on projects involving the engineering
      firm Dewberry/Preble-Rish without recusing himself or acknowledging a conflict
      of interest.

      *   The same firm (Dewberry/Preble-Rish) donated $2500.00 to Boone’s re-election
      campaign.


      THE PIVOT:

      *   Article 2 provides the specific Planning Commission Minutes (e.g., Sept.
      3, 2016 SD 16.14; Oct. 3, 2016 SD 16.16) detailing exactly how Boone voted for
      projects involving Dewberry/Preble-Rish to prove the conflict of interest alleged
      in Article 1.


      KEY ENTITIES:

      *   Councilman Boone

      *   Dewberry/Preble-Rish, LLC

      *   HMR, LLC

      *   Fly Creek Apartments

      *   Old Battles Place

      *   John Avent

      *   Fairhope Planning and Zoning Commission Minutes'
