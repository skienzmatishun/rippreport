  comment-surprised-ripp-report-baldwin-county-legal-eagle:
    brief: 'THE CONFLICT

      *   Councilman Boone had conflicts of interest involving LLCs and voting on
      engineering companies with which he had connections.

      *   Councilman Boone has been voting on these issues for five years without
      acknowledging his interests.

      *   Councilmen Boone and Burrell faced allegations that should have prompted
      action from the council.


      THE DISCOVERY

      *   Boone’s business interests were not fully disclosed on his ethics election
      form of economic interests, even after dissolving some LLCs when exposed.

      *   Boone and Burrell accepted a gift of wetlands near Fly Creek under the pretense
      it was land for a lift station.

      *   The acceptance involved receiving four acres instead of 100 square feet.

      *   The deed for the land was filed three days prior to the acceptance of the
      gift.

      *   Resolution 2606-16 shows Mayor Kant signing one document in October 2016,
      and the newly elected Mayor signing the same document weeks later.


      THE PIVOT

      *   Article 2 provides concrete evidence (the land deal and the resolution)
      that validates Article 1’s claims regarding Boone''s involvement in questionable
      municipal dealings and conflicts of interest by linking his actions to a specific,
      documented event.


      KEY ENTITIES

      *   Boone

      *   Burrell

      *   Mayor Kant

      *   Fairhope City Council

      *   Fly Creek

      *   Resolution 2606-16'
