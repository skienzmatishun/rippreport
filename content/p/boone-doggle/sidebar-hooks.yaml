  comment-surprised-ripp-report-baldwin-county-legal-eagle:
    brief: 'THE CONFLICT

      *   Councilman Mr. Boone failed to disclose numerous conflicts of interest through
      LLC involvement in municipal business while serving on planning and zoning/City
      Council.

      *   Mr. Boone has allegedly voted in favor of engineering companies linked to
      his private LLC interests during council resolutions involving hundreds of thousands
      of dollars.

      *   The past City Council (including Mr. Boone and Mr. Burrell) accepted a gift
      of wetlands near Fly Creek. This land was acquired under the pretense it was
      only 100 square feet of land beneath a lift station, resulting in the city receiving
      four acres of prime wetlands instead.


      THE DISCOVERY

      *   Mr. Boone''s business interests were allegedly never listed on his ethics
      election form for economic interests despite serving five years on council.

      *   While Mr. Boone dissolved some LLC''s when exposed, evidence suggests other
      interests remain undisclosed/unacknowledged.

      *   Public documents (Resolution 2606-16) show Mayor Kant signed a related resolution
      in October 2016 and the newly elected Mayor signed it weeks later, documenting
      the land transaction involving Boone and Burrell''s tenure.


      THE PIVOT

      *   Article 1 focuses on Mr. Boone’s current undisclosed conflicts (LLCs and
      voting).

      *   Article 2 pivots the investigation from recent ethics violations to a documented
      historical pattern of institutional misconduct, alleging that both Councilmen
      Boone and Burrell engaged in financial impropriety regarding land acquisition
      as early as October 2016 (Resolution 2606-16), suggesting systemic corruption
      rather than isolated incidents.


      KEY ENTITIES

      *   Councilman Mr. Boone

      *   Mr. Burrell

      *   Fairhope City Council

      *   Mayor Kant

      *   City of Fairhope

      *   Ripp Report'
