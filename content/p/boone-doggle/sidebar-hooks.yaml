  recuse-yourself:
    brief: '**THE CONFLICT:**

      - Councilman Mr Boone has a history of voting on municipal issues (planning/zoning)
      involving companies connected to his business interests via LLC''s (Main Article).

      - Boone allegedly failed to disclose conflicts when serving on planning and
