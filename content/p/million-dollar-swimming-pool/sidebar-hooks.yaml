      *   Catalyst aimed to take total control of the Baldwin County Commission and
      Mayor seats in 14 municipalities.

      *   Catalyst used intimidation and bullying against Mayor Karin Wilson.


      THE DISCOVERY:

      *   Chris Elliott''s appointment was orchestrated/convenient.

      *   Elliott took credit for passing taxes (including the 1c sales tax and 2012
      penny tax) using schools as pawns.

      *   Catalyst functioned as the spearhead for dark money, developers, and corrupt
      politicians seeking control of Baldwin County.

      *   Elliott had a falling out with Catalyst because the group became politically
      toxic, even though they maintained ties under the table.


      THE PIVOT:

