  switching-hats:
    brief: '**BRIDGE BRIEF**


      **1. THE CONFLICT**

      *   Fairhope City Council and Fairhope Single Tax Corporation were pursuing
      an Ordinance directing land transfer for Tatumville Subdivision.

      *   The project involved transferring one acre of land designated as surplus
      in the Tatumville gully, a sensitive watershed that flooded Magnolia Apartments
      in 1994 causing $1M+ damage.

      *   Lee Turner (President of Single Tax and Chair of Fairhope Planning and Zoning)
      was the main advocate for the project, despite concerns about conflict of interest
      regarding his dual roles.

      *   Cliff Pittman (Single tax board member) advocated for the project, which
      is also linked to Councilman Robert Brown who should recuse himself due to his
      partnership with Pittman.

      *   Anil Vera, a real estate sales person, is noted as being a close friend
      of Lee Turner and lives in the area near the gully.

      *   City Council members obstructed Mayor appointments to the Airport Authority
      (Agenda Item 13) over multiple years.


      **2. THE DISCOVERY**

      *   Jack Burrell has served as City Council President for five years, bypassing
      standard rotation practices designed to distribute leadership opportunity within
      Fairhope’s governance structure.

      *   Lee Turner maintains dual roles as head of Planning and Zoning and Single
      Tax Corporation for years without resolution regarding the resulting conflict
      of interest.

      *   The Tatumville Gully project was repeatedly advanced through council/work
      sessions (at least four times) despite procedural concerns, including its eventual
      pulling from the agenda without explanation.


      **3. THE PIVOT**

      *   Article 2 confirms that the procedural shortcuts and conflicts described
      in Article 1 were enabled by systemic failures: Jack Burrell’s sustained refusal
      to rotate out of Council Presidency allows for continued obstruction of the
      Mayor/city leadership; Lee Turner’s entrenched dual authority as Head of Single
      Tax and P&Z enables him to push agenda items (like Tatumville Gully) despite
      internal conflict of interest.


      **4. KEY ENTITIES**

      *   Jack Burrell: City Council President (5 years); former Councilman.

      *   Lee Turner: Head of Fairhope Planning and Zoning; President of Single Tax
      Corporation.

      *   Cliff Pittman: Member of single tax board; Construction business partner.

      *   Anil Vera: Real estate sales person, resident near Tatumville gully area.

      *   Fairhope City Council: Local government body involved in procedural obstruction.

      *   Single Tax Corporation/Board.

      *   Tatumville Gully / Tatumville Subdivision Project.

      *   Airport Authority (subject of Mayor appointments and city funding debate).'
