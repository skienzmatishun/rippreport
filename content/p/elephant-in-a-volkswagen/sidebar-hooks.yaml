  people-power-2:
    brief: 'THE CONFLICT

      *   1994: The Tatumville gully watershed flooded the Magnolia Apartments, causing
      over one million dollars in damage.

      *   Ongoing: Lee Turner (President of Single Tax) is pushing projects for the
      Tatumville Subdivision involving land transfer to Fairhope Single Tax Corporation
      (FSTC), raising conflicts of interest.

      *   Past Governance: Former Mayor Jim Nix faced criminal charges before handing
      off office power to Tim Kant; both leaders are credited with the failing sewer
      system (Widget Article).


      THE DISCOVERY

      *   Citizens organized a petition garnering 2,276 signatures opposing the Tuberville
      subdivision due to infrastructure concerns.

      *   The city''s new $13 million sewer plant failed to process 500,000 gallons
      of raw sewage into Big Head gully and Fly Creek watershed.

      *   Widget Article proves that citizens are actively resisting development projects
      mentioned or implied in the Main Article (e.g., Tuberville/Tatumville).


      THE PIVOT

      *   The Widget Article provides tangible proof of the environmental hazards
      (sewage overflow) that contradict the claims made by Lee Turner and FSTC regarding
      the safety of development proposals like Tatumville Subdivision.

      *   It confirms that the Council has failed its duty ("gone into a coma") despite
      being informed of major infrastructure problems, directly supporting Main Article
      accusations of systemic obstruction and dereliction of duty by officials overseeing
      these issues.


      KEY ENTITIES

      *   Lee Turner (President of Single Tax; Chair of Fairhope Planning and Zoning)

      *   Cliff Pittman (Single Tax board member; partner to Councilman Robert Brown)

      *   Councilman Robert Brown (Conflict of interest regarding Tatumville project)

      *   Fairhope Single Tax Corporation (FSTC)

      *   Mayor Wilson

      *   Tatumville gully / Big Head gulley / Fly Creek watershed

      *   Anil Vera (Real estate sales person in the area)

      *   $13 million sewer plant

      *   2,276 signatures (Petition supporting environmental concerns)'
