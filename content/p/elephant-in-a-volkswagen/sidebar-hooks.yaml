  catalyst-does-fairhope:
    brief: 'THE CONFLICT:

      *   1994: Watershed flooding damaged Magnolia Apartments, causing over $1 million
      in damage to Fairhope.

      *   Prior years: The City Council repeatedly fought Mayor appointment processes
      for Airport Authority members.

      *   Single Tax Corporation (led by Lee Turner): Pushed the Tatumville gully
      project since last year without approval or votes from Single Tax membership;
      cited conflicts of interest regarding President/Planning and Zoning Chair roles
      with Cliff Pittman.


      THE DISCOVERY:

      *   The Fly Creek Apartments (230 units) project involved developer Angelo Corte
      receiving a "Gift" of land (wetlands recipient of Publix property drainage)
      to the City from Corso.

      *   Prior to this, Fairhope taxpayers paid for infrastructure beneficial only
      to the developers, including constructing a Fire Station on Corte property and
      authorizing an off-highway sewer lift station specifically servicing the apartments
      before the community.

      *   The development originated during former Mayor Tim Kant''s administration
      (2018-2025), who allegedly bent over for developer requests while city infrastructure
      needs were ignored.


      THE PIVOT:

      *   Article 2 establishes a clear historical pattern of "insider deals" where
      municipal officials (like Mayor Tim Kant) and City Council members facilitate
      land transfers, provide taxpayer-funded infrastructure to private developers
      (Angelo Corte), resulting in long-term liability for the city/taxpayers.

      *   This precedent makes Article 1''s allegations regarding Lee Turner/Cliff
      Pittman pushing the Tatumville project—despite procedural breaches and conflict
      of interest—credible evidence that these projects are consistently designed
      solely for developer profit, mirroring the Fly Creek Apartment scenario.


      KEY ENTITIES:

      *   Lee Turner (President of Single Tax / Chair of Fairhope Planning and Zoning)

      *   Anil Vera (Real estate sales person connected to Lee Turner)

      *   Cliff Pittman (Single Tax Board member / Councilman Robert Brown business
      partner)

      *   Angelo Corte (Developer for Fly Creek Apartments)

      *   Tim Kant (Former Mayor who authorized developer-focused infrastructure spending)

      *   City Councilmen Burrell and Boone (Voted to accept the "Gift" from Angelo
      Corte)

      *   Fairhope Single Tax Corporation / Tatumville gully'
