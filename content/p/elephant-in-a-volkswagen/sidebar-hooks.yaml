hooks:
  bend-over-fairhope:
    brief: 'THE CONFLICT:

      *   Single Tax Corporation began efforts to transfer an acre of land for Tatumville
      Subdivision via Ordinance #5 at a Fairhope City Council meeting.

      *   Lee Turner, President of Single Tax and Chair of Fairhope Planning and Zoning,
      pushed this project despite lacking approval from the full single tax membership.

      *   Conflict of interest concerns were raised regarding Cliff Pittman, who is
      both a member of the Single Tax board and a business partner of Councilman Robert
      Brown.

      *   The City Council previously obstructed Mayor appointments to the Airport
      Authority (Agenda Item #13), contrary to pledges made by some members.


      THE DISCOVERY:

      *   Article 2 explicitly confirms that Councilmen Boone and Brown have direct
      ties/links to the Single Tax project, validating the conflict of interest claims
      regarding Pittman/Brown in Article 1.

      *   The development in the Fruit and Nut section (related to Tatumville gully)
      is linked to technical issues including sewer backup and reliance on grinder
      pumps for sewage disposal uphill.

      *   Article 2 highlights that public opposition to the Single Tax plan includes
      a petition with over 925 signatures.


      THE PIVOT:

      *   The second article moves from procedural suspicion (Item #5) in Article
      1 to documented political/financial ties, confirming the alleged conflicts of
      interest involving Councilmen Boone and Brown as stated in Article 1.

      *   It contextualizes the current development push as part of a historical pattern
      ("Fly Creek") where the council favored developers over public input and city
      concerns.


      KEY ENTITIES:

      *   Fairhope City Council (Collective body)

      *   Single Tax Corporation / Single Tax Colony

      *   Lee Turner (President of Single Tax/Chair of Planning & Zoning)

      *   Cliff Pittman (Single Tax board member, Business partner of Robert Brown)

      *   Councilman Robert Brown (Direct tie to Single Tax business interests)

      *   Councilman Boone (Direct tie to Single Tax)

      *   Anil Vera (Real estate sales person)

      *   Tatumville Gully / Tatumville Subdivision / Fruit and Nut section'
    generated_at: '2026-07-12T18:16:15.570402Z'
  big-heads:
    brief: 'THE CONFLICT:

      *   Fairhope City Council considered an Ordinance to transfer one acre of land
      for the Tatumville Subdivision to Fairhope Single Tax Corporation.

      *   The ordinance was introduced at the January 22, 2018, City Council meeting
      and scheduled for final adoption on February 15, 2018.

      *   Allegations cited included environmental hazards after a sewage spill (estimated
      100k-200k gallons) entered Big Head Gully/Tatumville Gully drainage ditch on
      February 12, 2018.

      *   Initial concerns involved Lee Turner pushing the project despite conflicts
      of interest and alleged lack of membership support for Single Tax to become
      a developer.


      THE DISCOVERY:

      *   The Widget Article provides specific evidence detailing multiple conflicts
      of interest tied to the land transfer proposal.

      *   It identifies Robert Brown, Councilman, whose business partner Cliff Pittman
      is on the Single Tax board and involved in building contracts.

      *   It reveals Kevin Boone supports his son who runs Catalyst, a political group
      supporting council obstruction.

      *   The article confirms Lee Turner holds three concurrent roles: President
      of Fairhope Planning and Zoning, President of Single Tax, and project driver/salesman.


      THE PIVOT:

      *   Article 1 raises general alarms about conflicts of interest; Article 2 provides
      specific names (Boone, Brown, Robinson, Upchurch), dates (Feb 15, 2018 agenda),
      organizational connections (building company partnerships, board contracts),
      and environmental evidence (sewage spill) to substantiate the claims made in
      Article 1.


      KEY ENTITIES:

      *   Fairhope Single Tax Corporation

      *   Lee Turner

      *   Cliff Pittman

      *   Robert Brown

      *   Anil Vera

      *   Kevin Boone

      *   Jay Robinson

      *   Michel Upchurch

      *   Catalyst

      *   Tatumville Subdivision / Tatumville Gully

      *   Big Head Gully'
