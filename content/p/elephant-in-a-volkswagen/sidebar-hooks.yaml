      Zoning, is pushing the Tatumville project.

      *   Mr. Cliff Pittman is a member of the Single Tax board and business partner
      of Councilman Robert Brown.

      *   Controversy exists over appointments to the Airport Authority.


      THE DISCOVERY

      *   Jack Burrell is calling a special City Council meeting on Friday the 29th
      at 8:00 am.

      *   Burrell is using a hand-picked attorney for city matters.

      *   The city has discussed appointing a full-time city attorney, opposing Jack
      Burrell''s role.


      THE PIVOT

      *   Article 2 reveals that Jack Burrell is actively maneuvering within the City
      Council structure concerning legal representation, which is part of the broader
      pattern of political control and obstruction noted in Article 1 regarding projects
      like Tatumville and the Airport Authority.


