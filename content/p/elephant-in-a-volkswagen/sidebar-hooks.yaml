      since "last year" without full single tax membership approval or discussion
      with city department heads.

      *   Cliff Pittman is a member of the STC board and a business partner of Councilman
      Robert Brown, leading to accusations that Brown should have recused himself
      from any related votes.

      *   Jack Burrell (Council President) has an alleged history involving major
      scandals including FEMA Fraud, Airport bid rigging, a $600,000 clock scandal,
      $2.65 million in recreation land costs, and the K-1 fiasco.


      THE DISCOVERY

