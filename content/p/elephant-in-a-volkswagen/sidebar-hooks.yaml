      THE DISCOVERY

      *   Article 2 reveals internal political maneuvering constitutes a "coup" within
      Fairhope municipal government against Mayor Wilson, led by figures including
      Jack Burrell and Catalyst (led by Scott Boone).

      *   It proves a coordinated effort among city employees/ex-employees to support
      this coup structure.

      *   It confirms the influence of outside money: Hix/Snedeker companies were
      contributors to almost all city council members.

      *   The HR Director filed an alleged assault claim against Mayor Wilson for
      damages totaling $100,000.


      THE PIVOT

      *   Article 1 details specific instances of conflicts of interest and procedural
      violations regarding land use (Tatumville project) involving Lee Turner, Cliff
      Pittman, Councilman Robert Brown, and Mr. Anil Vera.

      *   Article 2 serves as the "smoking gun" by proving these individual issues
      are not isolated incidents but symptoms of a systematic political hijacking
      or "GOVERNMENT COUP" within Fairhope City Hall, orchestrated by Burrell and
      Catalyst to gain control over municipal functions (e.g., Judge Snedeker''s appointment)
      that allow these land deals to proceed without oversight.


      KEY ENTITIES

      *   Jack Burrell (Councilman/Politician)

      *   Scott Boone / Catalyst (Political organization/Consultant)

      *   Lee Turner (President of Fairhope Single Tax; Chair of Planning and Zoning)

