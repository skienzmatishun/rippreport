  american-citizen:
    brief: |-
      THE CONFLICT
      - November 23, 2018: Ronan McSharry (Green card holder from Ireland) allegedly knocked Paula DiNardi off a bar stool at Little Whiskey Christmas Club in Fairhope, Alabama.
      - Victim Paula DiNardi received medical treatment for injuries recorded as "physical injury."
      - March 26 (Year implied same cycle): McSharry pleaded guilty to assault in Fairhope Municipal Court.
      - Judge J. Clark Stankowski (Circuit Judge) on April 24, 2020: Dismissed McSharry's appeal denovo of conviction.
      - Rationale for dismissal per Stankowski: City was outside statutory time (365 days / one year) to amend charging document regarding "Did cause physical injury to another."
      - Allegation: City Attorney Marcus McDowell and Municipal Judge Snedeker knew of medical evidence supporting "physical injury" but failed to amend document within legal timeframe.
      - Author Francis “Paul” Ripp (The Ripp Report) demands Baldwin County District Attorney Robert Wilters investigate this ruling and the coordination between courts/city officials.

      THE DISCOVERY
      - January 2019: American Legion canceled management agreement with Paula DiNardi for the Tiki Bar (Mobile Bay) one month prior to assault; she had previously won a business plan pitch and was preparing for 2019 season.
      - October 2018 (One month before assault): DiNardi hosted event at Tiki Bar drawing 1,000 people.
      - Article 2 reveals City Attorney Marcus McDowell was personally given DiNardi’s medical evidence by an attorney representing her before first court appearance.
      - Article 2 alleges Ronan McSharry’s attorneys moved to subpoena communications between Ripp and Lagniappe Newspaper, attempting to circumvent Alabama Source Shield Law.
      - Article 2 highlights question of funds: Whether McSharry has transferred profits from "McSharry's" business back to Ireland since the assault.
      - Article 2 notes McSharry has an extensive police record and was on probation at time of incident related to harassment conviction against Nall Hollis (penalty: 180 days in jail for violation).

      THE PIVOT
      - Article 2 proves the link between legal failure and political connections: McSharry is connected to "CATALYST" party, same party allegedly behind City Attorney McDowell and Judge Snedeker.
      - Article 2 connects the judicial delay/dismissal to DiNardi’s economic harm: Her job loss at American Legion coincides with the fallout from the assault case, suggesting retaliatory motive or protection of McSharry (non-citizen) over US Citizen victim.
      - Article 2 supplies the motive: McSharry allegedly felt business suffering due to DiNardi’s success at Tiki Bar; Article 2 details his jealousy as a reason for retaliation.
      - The dismissal order by Stankowski (April 24, 2020) is the pivot point Ripp cites to claim "Good Ole Boy politics" allowed McSharry to escape full consequences of the assault despite video surveillance and public record.

      KEY ENTITIES
      - Ronan McSharry
      - Paula DiNardi (Spelled also as Dinardi)
      - Francis “Paul” Ripp
      - Marcus McDowell (Fairhope City Attorney)
      - J. Clark Stankowski (Judge/Municipal/Circuit judge referenced in text)
      - Judge Snedeker (Municipal Judge, Fairhope)
      - Robert Wilters (Baldwin County District Attorney)
      - Nall Hollis (Nall, artist/victim referenced in probation case)
      - Fairhope City Council
      - CATALYST Party
      - American Legion (Tiki Bar management)
      - Little Whiskey Christmas Club
      - Lagniappe Newspaper
