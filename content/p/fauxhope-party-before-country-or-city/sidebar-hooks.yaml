      as a "dynasty" lacking transparency and municipal ethics.

      *   In past proposals (pre-2018), Mayor Kant failed to address critical infrastructure
      needs, such as sewer repairs.

      *   Kant previously proposed purchasing the Triangle property for $11.25 million.

      *   Kant also proposed buying land involved in a legal matter concerning the
      Breland case.


      THE DISCOVERY

      *   Current administration (Mayor Karin Wilson and Economic Director Sherry
      Botop) successfully secured $20 million in approved BP funds through new proposals.

      *   This funding includes $6.2 million for waterfront projects, $10 million
      specifically designated for long-neglected sewer projects, and $650,000 for
      a comprehensive land use plan.

      *   The approval of these necessary infrastructure projects directly contrasts
      with the financial failures and inadequate planning during Mayor Kant''s tenure.


      THE PIVOT

      *   Article 1 critiques Tim Kant’s past administration as corrupt and lacking
      accountability (the qualitative claim).

      *   Article 2 provides measurable evidence of this lack of competence by showing
      his proposals were fiscally unsound—resulting in failed deals like the $11.25
      million Triangle property purchase and ignoring necessary sewer infrastructure—while
      Wilson/Botop''s approach successfully leveraged BP funds to address those exact
      neglected areas with proven financial viability.


      KEY ENTITIES

      *   Tim Kant (Former Mayor)

      *   Karin Wilson (Mayor)

      *   Sherry Botop (Economic Director)

      *   BP (Funding Source)

      *   Triangle property

      *   Breland case'
