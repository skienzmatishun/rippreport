      *   Fairhope and Baldwin County voted for Doug Jones, with one-third of ballots
      being straight ticket checkoffs.

      *   Tim Kant ran Fairhope as a dynasty characterized by lack of accountability
      and municipal ethics.

      *   Allegations existed regarding rigged local elections due to low voter turnout
      and straight ticket voting combined with Kant loyalists.


      THE DISCOVERY:

      *   The Fairhope City Council handled Resolution 2606-16, which accepted the
      deed for the city''s sewer lift station from Angelo A. Corte.

      *   Jack Burrell and Boone were present at the council meeting when Resolution
      2606-16 was discussed.

      *   Burrell presided over the meeting and reviewed details of Resolution 2606-16,
      despite failing to notice missing maps.

      *   The property gifted included three plus acres of wetlands, the location
      of the outfall pipe from the retention pond, and the entire lot under a city
      lift station, larger than a house.


      THE PIVOT:

      *   Article 2 provides concrete evidence of corruption and negligence regarding
      the transfer of city property (Resolution 2606-16) that is referenced generally
      in Article 1''s discussion of Fairhope’s corrupt structure.

      *   The specific actions of Burrell and his associates presiding over the resolution
      and failing to notice key details expose complicity or gross incompetence, linking
      directly to the claims of corruption against Kant''s regime mentioned in Article
      1.


