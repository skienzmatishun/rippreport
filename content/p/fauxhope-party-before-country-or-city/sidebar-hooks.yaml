  moratorium-party:
    brief: 'THE CONFLICT:

      *   Tim Kant served as Mayor of Fairhope for 16 years (prior to his defeat around
      2020).

      *   The Cant administration was characterized by a lack of accountability, municipal
      ethics, and infrastructure neglect.

      *   Under Kant, Sherry Sullivan held both the position of Mayor/Council Member
      and Utility Director, allowing her to manipulate city purse strings (a dual
      paycheck model).

      *   Infrastructure failure included sewage spilling into Mobile Bay during heavy
      rain events.

      *   In 2020, Karin Wilson defeated Tim Kant. She initiated reforms by separating
      utilities finances from the city''s budget and secured grants for infrastructure
      projects despite facing opposition from local council members.


      THE DISCOVERY:

      *   The current political structure in Fairhope is controlled by a back-door
      cabal known as Catalyst / Scott Boone Consulting.

      *   Mayor Sherry Sullivan, who succeeded Wilson, was recruited and financed
      by this cabal and reversed Wilson''s financial reforms. She adopted a motto
      of "Embracing Development."

      *   The Municipal Judge (Snedeker) is one of the largest developers in Fairhope;
      his permits are controlled by a council that also approves his developments.

      *   Council President Jimmy Conyers, who advocates for the Moratorium, is friends
      with Scott Boone and processes development loans through his banking career.

      *   Councilman Boone is the father of developer/consultant Scott Boone, providing
      an "inside man" advantage to the cabal.

      *   The Moratorium is not intended to stop development; rather, it allows insiders
      (Boone and Snedeker) to maintain a monopoly on projects while those outside
      the cabal are stalled.


      THE PIVOT:

      *   Article 1 establishes the general claim that Fairhope suffers from systemic
      corruption and that Jack Burrell represents "The New Kant." Article 2 provides
      the specific organizational structure (Catalyst/Scott Boone Consulting) and
      names the key financial ties between current officeholders—Mayor Sullivan, Council
      President Conyers, Municipal Judge Snedeker, and developer Scott Boone.

      *   Article 2 proves the abstract accusation of systemic rot by detailing how
      the Moratorium is used as a political tool to maintain insider control over
      development monopolies rather than actually curbing unchecked growth or corruption.


      KEY ENTITIES:

      *   Fairhope / Fauxhope

      *   Tim Kant (Former Mayor)

      *   Karin Wilson (Former Mayor, implemented reforms)

      *   Sherry Sullivan (Current Mayor, recruited by cabal)

      *   Jack Burrell (Councilman/de facto political successor to Kant’s influence)

      *   Catalyst / Scott Boone Consulting (The political cabal)

      *   Jimmy Conyers (Council President; banker and ally of developers)

      *   Scott Boone / Kevin Boone (Developer / Consultant)

      *   Judge Snedeker (Municipal Judge / Large Developer)

      *   Cory Martin (Councilman who supported Wilson''s infrastructure goals despite
      council vendettas)'
    generated_at: '2026-07-18T16:10:13.237896Z'
