      Environmental, and Tree Committees during his tenure.

      *   A previous development by a landowner at the Publix site damaged Fly Creek
      wetlands and flooded the area, resulting in a lost lawsuit for the city of Fairhope.

      *   Mayor Kant borrowed $50,000 from the Fire Department and $50,000 from a
      city employee, investing both funds into his private investment company; these
      funds were subsequently lost with no accounting provided.


      **THE DISCOVERY**

      *   The Planning & Zoning Board, appointed by Mayor Kant, is described as being
      used for "good ole boy deals" which violate municipal ordinances and the comprehensive
      plan.

      *   Mayor Kant’s administration has a history of misrepresenting legal settlements;
      specifically, the Triangle lawsuit was characterized as a purchase of a park
      when it was actually a legal settlement requiring city compliance (a $12 million
      total settlement).

      *   Mayor Kant eliminated key oversight committees, allowing for unchecked micromanagement
      and potential misuse of public funds.


      **THE PIVOT**

      *   Article 1 accuses the Mayor and "the owner" (Arthur Corte) of engaging in
      a current Quid Pro Quo by linking a new Fire Station on Parker Road to an upcoming
      300-unit development above Fly Creek apartments.

      *   Article 2 proves that this specific type of corruption is not new, revealing
      a systemic pattern wherein Mayor Kant used the Planning & Zoning Board as a
      vehicle for developers (including Arthur Corte regarding Flyer Creek Apartments)
      while maintaining control and avoiding transparency in city dealings.


      **KEY ENTITIES**

      *   Mayor Tim Kant (Fairhope)

      *   Arthur Corte (Developer/Land Owner)

      *   Planning and Zoning Board (Fairhope)

      *   Fly Creek (Wetlands/Property)

      *   Parker Road (Location of proposed fire station)

      *   The Triangle (Lawsuit settlement location)

      *   Professional Equity Management (New developer for Fly Creek site)'
