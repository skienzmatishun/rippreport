      Fire Department.

      *   Past financial misconduct: Mayor secured $50,000 from the fire department
      and $50,000 from a city employee who invested in his private investment company.

      *   Current conflict (Main Article): A Quid Pro Quo project involving the owner
      of the Publix shopping center land and Mayor Kant regarding the placement of
      a new Fire Station on a county road/dead end street, violating the city’s comprehensive
      plan.

      *   Political Conflict: The City Council has been in conflict with Mayor Kant
      (recent administration), specifically concerning funding reductions for the
      Mayor''s discretionary funds (reduced from $15k to $2.5k).


      **THE DISCOVERY:**

      *   The Fairhope Single Tax plan, proposed by developers near Big Head Gulley/Fruit
      and Nut section, faces community opposition via a petition with over 925 signatures.

      *   Council Members Boone and Brown have direct financial ties or business interests
      related to the Single Tax project; Boone has already recused himself.

      *   The Council (led by Mr. Burrell) is actively perceived as obstructing the
      Mayor’s office in favor of developers, using political maneuvering like rescheduling
      meetings (noting past ''Triangle'' lawsuit settlement secrecy).


      **THE PIVOT:**

      *   Article 2 provides contemporary evidence that local political structures
      are heavily influenced by development interests and conflict of interest.

      *   It confirms the systemic breakdown in trust alleged in Article 1: while
      Article 1 alleges Mayor Kant''s cronies use city resources to benefit a property
      owner (the developer), Article 2 shows current Council members like Boone and
      Brown leveraging their positions for similar developer interests (Single Tax),
      confirming the pattern of political interference and conflict.

      *   Both articles detail specific development conflicts (Fly Creek damage/new
      Fire Station vs. Single Tax/Fruit & Nut homes) where community objection is
      ignored in favor of powerful owners/developers.


      **KEY ENTITIES:**

      *   Adam Milam / CC Adam Milam

      *   Aldot

      *   Boone (Council Member, tied to Single Tax)

      *   Burrell (Council President)

      *   Brown (Council Member, business partner in Single Tax project)

      *   Tim Kant (Former Mayor/Mayor; connected to the property owner and past financial
      loss allegations)

      *   Francis Paul Ripp / The Ripp Report

      *   Fairhope City Council

      *   Professional Equity Management (Developer from Scottsdale, AZ)

      *   Fly Creek

      *   Big Head Gulley / Triangle

      *   Mr. Burrell'
