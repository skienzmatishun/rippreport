  fairhope-sewer-backstory:
    brief: 'THE CONFLICT:

      *   Period of corruption occurred between 2012 and 2016 in Fairhope under "Mayor
      Can’t."

      *   Mayor Can’t, Councilman Boone, and Councilman Burrell utilized the utility
      fund as a slush fund to balance general funds and pay for legal actions.

      *   This misuse drained the utility fund, leading Fairhope to lose its best
      senior utility supervisor to Daphne municipality.

      *   The corruption resulted in $3 million lost to attorneys and failure of infrastructure
      work on sewer systems despite electrical department challenges.


      THE DISCOVERY:

      *   Current political tension involves Mayor Wilson''s efforts against the "Catalyst
      Council" which aims for a 2020 resurgence, allegedly obstructing the city.

      *   A current Quid Pro Quo project involves a property owner (of the Publix
      shopping center) and the Mayor securing land/development on Fly Creek.

      *   The new proposed fire station will be located on a dead end street within
      a county road, violating the city’s comprehensive plan and zoning board conditions.

      *   Professional Equity Management (Scottsdale Arizona) is contracted to build
      a 300-unit development above damaged Fly Creek site, linked to the owner''s
      Fire Department misuse of $100,000 ($50k from FD; $50k city employee investment).


      THE PIVOT:

      *   The historical pattern (2012-2016) shows a decades-long institutional failure
      by leadership and Councilmen to provide checks and balances or maintain core
      infrastructure like the sewer system.

      *   This past corruption created an environment where abuse of power was normalized,
      allowing for current actions where the Mayor facilitates deals with property
      owners who violate planning rules (Publix land violation) and control city departments
      (Fire Department).


      KEY ENTITIES:

      *   Mayor Can’t / Tim Kant

      *   Councilman Boone

      *   Councilman Burrell

      *   Aldot

      *   Casi Callaway (Director of Baykeeper)

      *   Karin Wilson

      *   Catalyst Council

      *   Professional Equity Management

      *   Fly Creek

      *   Ripp Report (Francis Paul Ripp / CC Adam Milam Attorney)'
