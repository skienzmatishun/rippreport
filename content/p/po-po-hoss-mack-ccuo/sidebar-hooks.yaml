      - Specifically proves that Governor Ivey prioritized appointment continuity (via Lowery) over the known history of:
          - The Murray Lawrence wrongful conviction.
          - The Steve Nodine case.
          - Pending federal lawsuits involving Major Crimes Unit.
      - Ripp Report frames Lowery's appointment not as a "new sheriff, new rules" moment, but as an institutional hand-off ("carbon copy," "under Mack’s armpit from day one").
      - Connects the legacy of Mack (the "CCUO"/Cover Up Officer) directly to Lowery’s mandate by showing the new appointment ignores existing accountability demands.

