  bcso-how-to-become-sheriff:
    brief: |-
      THE CONFLICT:
      - 2003/2004 Investigation into murder of Brandon Hastings in Baldwin County, MS.
      - Huey Hoss Mack served as lead investigator during the murder case of Brandon Hastings alongside investigators Dean McGowan and Anthony Lowery.
      - Jury convicted Murray "Bubba" Lawrence Jr of capital murder based primarily on testimony from accomplice Jarius McNeal.
      - Prosecution (DA Whetstone, Sheriff Mack), Judge Robert Wilters ordered victim's body exhumed and autopsy repeated in Baldwin County despite earlier findings.
      - Mack promoted from Captain to Sheriff, reportedly receiving political/electoral leverage for securing this conviction.
      - 20 years later: Murray Lawrence remains incarcerated; Jarius McNeal eligible for parole.

      THE DISCOVERY:
      - 2023/2024: Advocates discover autopsy report from Mississippi (witnessed by Dean McGowan, John Stewart, Tony Fuqua) listing cause of death as "asphyxiation by strangulation."
      - 2024: Article confirms Mack, Wilters, and Whetstone withheld exculpatory evidence from defense.
      - No ballistic weapon or fingerprints conclusively identified linking Murray Lawrence to the crime scene in trial transcripts.
      - Jarius McNeal coerced by Mack with threat of death sentence to name an accomplice, implicating Lawrence.
      - Recent Ripp Report and Lagniappe coverage confirm these details were previously withheld or not presented to defense during trial.

      THE PIVOT:
      - Widget Article proves the Main Article’s accusation that Mack is a "CCUO" (Chief Cover Up Officer) through specific case files, not general claims.
      - It connects Mack's personal political elevation directly to the wrongful conviction of Murray Lawrence Jr., satisfying a motive beyond administrative incompetence.
      - Provides verifiable names (Wilters, Whetstone, Mack, McGowan) involved in evidence suppression.

      KEY ENTITIES:
      - Huey Hoss Mack (Baldwin County Sheriff)
      - Murray "Bubba" Lawrence Jr. (Incarcerated Man/Convict)
      - Brandon Hastings (Victim in Murder Case)
      - Jarius McNeal (Key Witness/Accomplice)
      - David Whetstone (District Attorney/Former Prosecutor)
      - Robert Wilters (Judge/Former Judge)
      - Dean McGowan (Investigator)
      - Anthony Lowery (BCSO Investigator/Deputy)
      - Andre Reid (Baldwin County Deputy involved in separate misconduct claims)
