      - FBI Task Force: Ripp Report sources claim FBI found missing evidence/mishandled cases; Mack confirmed 1819 News (via quote in Main Article) that two narcotics investigators are looking into cases but claimed no impact, with Ripp Report calling this statement a "lie."

      THE DISCOVERY:
      - Governor Kay Ivey appointed Anthony Lowery as new Baldwin County Sheriff on August 27, 2024.
      - Mack's departure date confirmed: Leaving office August 31, 2024.
      - Discovery confirms that while Mack is leaving, two federal wrongful death lawsuits specifically targeting the Baldwin County Major Crimes Unit remain active/ignored.
      - Ivey is documented as ignoring prior letters to the appointment board and pending federal lawsuits regarding BCSO before appointing Lowery.
      - Claims that internal issues (sexual relations between officers, harassment) will now fall to Lowery without being resolved under Mack.

      THE PIVOT:
