      *   Developers pay little or no impact fees, shifting costs to taxpayers for
      Schools, Streets/Transportation, and Education.

      *   Politicians seek Governor Ivy''s control over the education system via appointments
      to State School Board Members instead of elections.

      *   Fairhope City Council favored a special school tax over Mayor’s proposal
      for impact fees.


      THE DISCOVERY

      *   The Baldwin County Economic Development Alliance (BCEDA) is promoting a
      Mega Site project near Interstate 65 as "shovel ready."

      *   The BCEDA is supported by developers and business interests.

      *   The Mega Site represents significant lost revenue and opportunity, potentially
      reaching $50 million today.


      THE PIVOT

      *   Article 2 reveals that the BCEDA’s "shovel ready" development schemes are
      the economic growth initiatives that exacerbate the infrastructure suffering
      and tax burdens detailed in Article 1.

      *   The lack of planning regarding growth (Mega Site) directly contributes to
      the schools'' negative impact and the continued reliance on local taxes despite
