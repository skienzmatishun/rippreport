  taxes-tolls-and-schools:
    brief: 'THE CONFLICT

      *   Developers pay little or no impact fees, forcing taxpayers to cover costs
      for Schools, Streets/Transportation, and Education in Baldwin County.

      *   The Baldwin County School System has suffered due to a lack of long-term
      planning from the board.

      *   Governor Ivy seeks increased control over education by appointing State
      School Board Members instead of allowing elections.

      *   Municipal leaders (City Council President) favor special school taxes over
      impact fees.


      THE DISCOVERY

      *   The I-10 bridge project costs billions due to its height, creating massive
      infrastructure expenses for the county.

      *   Governor Poison Ivy and Junior Senator Elliott are involved in the negotiations
      concerning the bridge tolls.

      *   A proposed 3 million tax is being sought via referendum for Fairhope and
      Spanish Fort schools.


      THE PIVOT

      *   Article 2 proves that rising transportation costs (like the I-10 bridge)
      and state-level policy changes (Rebuild Alabama Act/fuel tax hikes) are directly
      fueling the overall financial burden described in Article 1.

      *   The specific political involvement of Governor Ivy and Senator Elliott regarding
      the costly bridge project demonstrates how state power is impacting local finances
      and infrastructure planning.


      KEY ENTITIES

      *   Baldwin County School System

      *   Governor Ivy

      *   State School Board Members

      *   Toll Bridge (I-10)

      *   Elliott (Junior Senator)

      *   Poison Ivy (Governor)

