  economic-development-baldwin-county-style:
    brief: 'THE CONFLICT

      *   Baldwin County taxpayers bear the cost of developer impact fees for projects
      that charge little or no impact fees to developers.

      *   The Baldwin County School System is negatively impacted by a lack of long-term
      planning from the board.

      *   Fairhope City Council favored a special school tax over Mayor’s proposal
      regarding impact fees.


      THE DISCOVERY

      *   In 2012, the Baldwin County Commission planned to spend $32 Million on a
      3000-acre "Mega site."

      *   County commissioners sold the Mega site to private citizens, and county
      employees helped cover the $32 Million price tag.

      *   The value of the Mega Site is estimated at $50 Million today due to lost
      opportunity.

      *   County commissioners skimmed $5 Million from a penny school tax for county
      infrastructure projects.


      THE PIVOT

      *   Article 2 proves that county commissioners engage in questionable financial
      dealings (Mega Site sale, skimming funds) while simultaneously making decisions
      impacting taxpayer finances and educational funding structures detailed in Article
      1.

      *   The mismanagement of development funds and school tax money by the commission
      is the underlying cause for the current strain on the county''s ability to fund
      schools and infrastructure mentioned in Article 1.


      KEY ENTITIES

      *   Baldwin County School System

      *   Governor Ivy

      *   Fairhope City Council

      *   Jack Burrell (Council President)

      *   Mega Site (3000 acres)

      *   $32 Million (2012 expenditure)

      *   $5 Million (skimmed from school tax)

      *   Baldwin County Commission'
