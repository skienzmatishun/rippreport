hooks:
  goat-hill-piggy-bank:
    brief: 'THE CONFLICT

      *   Baldwin County taxpayers bear the cost for schools, streets/transportation,
      and education due to developers paying little or no impact fees.

      *   The Baldwin County School System is negatively impacted by a lack of long-term
      planning from the board.

      *   A special school tax was favored by the City Council over a Mayor’s proposal
      for impact fees.


      THE DISCOVERY

      *   County Commissioner Chris Elliott taxed citizens without a vote.

      *   Elliott raided the 1% school tax for $200,000 per year for the county.

      *   The county functions as a "piggy-bank" for Goat Hill and supplies approximately
      35% of the state''s general budget.

      *   Elected officials (Riley, Bentley, Pittman) were accused of draining accounts
      or skimming funds (e.g., BP money).


      THE PIVOT

      *   Article 2 proves that the tax burden described in Article 1 is not merely
      a consequence of developer impact fees but is actively being exploited and diverted
      by elected officials for political interests ("Goat Hill").

      *   The alleged corruption (Elliott raiding the school tax) explains why the
      education system is failing—funds are being misappropriated rather than allocated
      to schools.


      KEY ENTITIES

      *   Baldwin County School System

      *   Governor Ivy

      *   County Commissioner Chris Elliott

      *   Goat Hill

      *   City Council

      *   Former Governor Riley

      *   Former Governor Bentley

      *   State Senator BP Pittman

      *   BP funds'
    generated_at: '2026-07-10T21:49:10.494515Z'
  gold-star-2:
    brief: 'THE CONFLICT:

      *   Developers pay little or no impact fees for projects.

      *   Taxpayers cover costs related to Schools, Streets/Transportation, and Education.

      *   Baldwin County School System suffers due to lack of long-term planning.

      *   Governor Ivy seeks increased control over the education system by appointing
      State School Board Members instead of electing them (Bill to end election of
      state school board members).

      *   Fairhope City Council favored a special school tax over a Mayor’s proposal
      for impact fees, indicating a desire to exclude School business.


      THE DISCOVERY:

      *   Fairhope schools face swelling class sizes (over 5000 students in five schools)
      and teacher reliance on fund-raising ("FOR SCHOOL SUPPLIES").

      *   The Fairhope City Council must decide whether to support school funding
      through a TAX or the Equitable School Funding Plan proposed by the Mayor ($1.88
      million).

      *   There is a need for municipal coordination regarding Sewers, Zoning, Traffic,
      and Schools across the 14 municipalities of Baldwin County.


      THE PIVOT:

      *   The Fairhope decision on school funding (tax vs. funding plan) serves as
      a microcosm demonstrating the local struggle over tax responsibility and educational
      prioritization that defines the broader systemic failure in Baldwin County''s
      ability to manage its schools through long-term planning.


      KEY ENTITIES:

      *   Baldwin County School System

      *   Governor Ivy

      *   Fairhope City Council

      *   Developers

      *   State School Board Members

      *   The Equitable School Funding Plan

      *   Five Fairhope Schools'
    generated_at: '2026-07-10T21:49:10.494527Z'
  shovel-ready:
    brief: 'THE CONFLICT

