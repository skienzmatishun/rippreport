  fairhope-a-city-owned-by-outside-interests-and-good-ole-boys:
    brief: 'THE CONFLICT:

      - Triangle Lawsuit settled between city and developers/consortium without public
      participation.

      - Settlement resulted in $11,250,000 total payout (City paid property price
      + legal fees).

      - Hand Arendall law firm (Cain O’Rear) received approximately $3,000,000 in
      fees.

      - City purchased Triangle property at $8.25 million recommendation by attorneys
      to settle lawsuit despite losing case.

      - Funding source for Triangle settlement included $3,000,000 removed from Utility
      Reserve Fund and $5.25 million borrowed.

      - Under past Mayor Kant, deals like Fly Creek Apartments and Triangle Park were
      executed without prior public comment or approval.

      - Former Mayor Kant’s re-election was funded largely (>50%) by non-residents
      and anonymous PACs.


      THE DISCOVERY:

      - Article 2 confirms the specific diversion of funds used to pay Hand Arendall
      and settle Triangle without transparency.

      - Validates the existence of an internal power network (Kant/Corte/Boone allies)
      operating decisions behind closed doors.

      - Confirms Thompson Engineering (identified as a "good ole boy") was hired to
      develop Triangle Park plans before official council approval.

      - Confirms Soccer Complex construction cost approximately 6 to 7 million dollars
      despite questionable oversight.


      THE PIVOT:

      - Article 2 validates the financial mechanics Article 1 claims are corrupt:
      hidden utility reserve withdrawals and secret attorney contracts.

      - The $3 million legal fee paid to Hand Arendall (detailed in Art 2) is the
      direct precedent for Article 1’s claim about Burrell trying to appoint them
      again despite losing.

      - Connects historical corruption under Kant (Widget) directly to the current
      financial reward structure under Sullivan (Main), showing continuity of "outsiders"
      and allies controlling the city.


      KEY ENTITIES:

      - Mayor Scott Sullivan (Current) / Former Mayor Kant (Widget context).

      - Hand Arendall Law Firm (Cain O’Rear).

      - Council member Jack Burrell.

      - Council member Kevin Boone / Scott Boone.

      - Council member Diana Brewer.

      - Thompson Engineering (Triangle Park developer).

      - Scott Boone Consulting / Catalyst.

      - Dyas Triangle Property.

      - Fly Creek Apartments project.'
