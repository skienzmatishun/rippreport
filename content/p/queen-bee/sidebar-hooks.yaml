hooks:
  marble-mouth:
    brief: 'CONFLICT

      - New Fairhope Mayor Sullivan sworn in Nov 2, 2016.

      - Proposed salary boost: $112k annual increase; total package to $160k/year.

      - Total 4-year projection: $640,000 gross salary and benefits.

      - Council composition: President Jack Burrell (serving 7+ years), members Kevin
      Boone, Bruce Brown, Jay Robinson ("Marble Mouth").

      - Past Mayor Wilson cited as having finance degree and ethical record; contrasted
      with current administration.

      - Council accused of block voting 95% of time under "Catalyst" influence.

      - Hand Arendall Law Firm (led by Cain O’Rear) previously stood up at council
      promising Fairhope wouldn''t pay attorney fees for "Triangle Lawsuit."

      - Firm took $3M in attorney fees, then lost lawsuit.

      - Councilman Kevin Boone linked to "Strawman" land fraud; son of Scott Boone
      Consulting owner.

      - Councilman Bruce Brown accused of using office for personal gain; pending
      complaint with Alabama Attorney General.

      - Jack Burrell accused of "bid rigging" involving municipal judge who now owns
      large undeveloped land tract.


      DISCOVERY

      - Boutique Hotel Deal: City paid $525,000 for property under 1,000 sq ft at
      rate of $5,250/sq ft.

      - Hotel Owner Mr. Bowers accused City Council of blackmail; stated purchase
      was rushed despite complaints.

      - Dyas Triangle Property: City paid $2.65M for 105 farmable acres two weeks
      prior to "Marble Mouth" article release.

      - Council declared Triangle land "surplus/not needed for public use."

      - New Lease Plan: Farming lease proposed at $9,000/year for surplus land.

      - Mayor Wilson previously noted cycle of city buying property (Dyas Triangle
      105 acres, Park facilities $2.65M, K-1 Center) and doing nothing with it.

      - Council President Burrell identified as the "Negotiator" responsible for property
      deals costing tax dollars.

      - Councilman Robinson (“Marble Mouth”) specifically noted in meetings.


      PIVOT

      - Article 2 provides concrete data (hotel pricing, surplus land declarations)
      validating Article 1’s claims of fiscal mismanagement and corruption.

      - Dyas Triangle link: Article 1 mentions Hand Arendall firm took $3M to lose
      lawsuit on this land; Article 2 shows Burrell declaring same Triangle land surplus
      for private lease, confirming continued control despite financial loss history.

      - Jack Burrell is the connecting figure: Identified as long-term Council President
      and "Negotiator" (Article 1) and obstructive leader of surplus decisions (Article
      2).

      - Article 2 proves the "block vote" structure (95% alignment) mentioned as a
      symptom in Article 1 is active reality.


      KEY ENTITIES

      - Fairhope City Council (Catalyst alignment)

      - Jack Burrell

      - Sullivan (Mayor)

      - Kevin Boone

      - Scott Boone Consulting

      - Hand Arendall Law Firm (Cain O’Rear)

      - Bruce Brown

      - Jay Robinson ("Marble Mouth")

      - Mr. Bowers (Boutique Hotel Property Owner)

      - Municipal Judge

      - Dyas Triangle / Boutique Hotel Property'
