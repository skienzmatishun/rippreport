  wrongful-conviction:
    brief: '**THE CONFLICT:**

      * Murray Lawrence Jr (a/k/a Bubba Lawrence) convicted of murder, jailed >18
      years since 2005.

      * Conviction relied on testimony of single cooperating witness seeking reduced
      sentence; no blood, DNA, witnesses, weapon, or ballistics evidence secured.

      * Second autopsy authorized on Hastings’ body performed ~1 month post-murder;
      results delivered May 2003.

      * Resulting autopsy report delivered via letter to District Attorney David Whetstone
      on May 17, 2004.

      * Autopsy report CC’d to Hoss Mack (Sheriff) and his father; Mack Sr. authorized
      it under District Attorney Office authority.

      * Presiding Judge Robert Wilters, Prosecutor David Whetstone, and Investigator
      Hoss Mack allegedly colluded to withhold this report from Defense during trial.

      * Defendant sent based on a "bogus theory" with no physical evidence linking
      him to the crime scene.


      **THE DISCOVERY:**

      * Article 2 confirms Baldwin County Sheriff’s Office (BCSO) has documented history
      of withholding case information and misleading public/media.

      * Confirms Murray Lawrence case as a known "wrongful conviction" example alongside
      Steve Nodine and Jonathan Victor cases.

      * Highlights BCSO Major Crimes Division never found officer responsible for
      nine victims despite nine deaths occurring in the jurisdiction.

      * Lt. Andre Reid (BCSU MCU) withholding body camera footage from incident involving
      Otis French Jr; cites privacy but ruling strips public right to sue for footage.

      * Article 2 explicitly links Murray Lawrence case to current leadership in the
      same offices: Robert Wilters (Judge -> DA) and Hoss Mack (Investigator -> Sheriff).


      **THE PIVOT:**

      * Article 1 exposes the specific evidence withholding in Lawrence case (Autopsy
      reports).

      * Article 2 serves as "smoking gun" for systemic misconduct by proving Lawrence
      case is not an anomaly but part of a pattern involving the same key players.

      * Confirms continuity: The three individuals accused in Lawrence case (Welters,
      Mack, Whetstone) still hold or held positions of power (Judge, Sheriff, DA).

      * Demonstrates BCSO/Major Crimes Division operating under "circle-the-wagons"
      mentality, refusing transparency in Lawrence case and French Jr/ Nodine cases
      alike.


      **KEY ENTITIES:**

      * Murray Lawrence Jr (Wrongfully convicted inmate)

      * Hoss Mack (Current Sheriff; former Lead Investigator in Lawrence case)

      * Robert Wilters (Current Baldwin County DA; former Presiding Judge)

      * David Whetstone (Retired District Attorney/Prosecutor)

      * Willie Huntley / Willy Huntley (Defense Attorney for Lawrence)

      * Hoss Mack Sr. (Authorized second autopsy)

      * Otis French Jr. / O.J. French Jr. (Current case subject for comparison)

      * Steve Nodine (Reference wrongful conviction case)

      * Jonathan Victor (Reference wrongful conviction case)'
