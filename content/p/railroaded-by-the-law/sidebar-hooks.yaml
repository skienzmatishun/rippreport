hooks:
  bcso-how-to-become-sheriff:
    brief: '1. THE CONFLICT

      - Murray “Bubba” Lawrence Jr. sent to Holman Prison for 18+ years on capital
      murder charge for Brandon Hastings.

      - Prosecution relied on death-bed testimony from killer Jarius McNeal; law enforcement
      fabricated gunshot theory.

      - Mississippi autopsy found cause of death was asphyxiation by strangulation;
      prosecution ignored this.

      - Jarius McNeal implicated Lawrence to avoid death sentence after being told
      by Hoss Mack he needed a co-defendant.


      2. THE DISCOVERY

      - Hoss Mack, District Attorney David Whetstone, and Judge Robert Wilters ordered
      Hastings’ body exhumed for second autopsy (May 14, 2003).

      - Alabama Department of Forensic Sciences report was CC’d to Hoss Mack and Robert
      Wilters on May 17, 2004.

      - Second autopsy report was never disclosed to defense during trial despite
      Mack Sr. authorizing it via District Attorney Office (per Page 4 of report).

      - Evidence recovered in 2023 proves these officials withheld exculpatory material
      from Murray Lawrence Jr.


      3. THE PIVOT

      - Widget article states Hoss Mack was promoted from Captain to Sheriff specifically
      for assisting in the wrongful conviction of Lawrence.

      - Widget article cites trial transcript (Page 1591): Officer Fuqua testified
      under questioning that he had no fingerprints, stolen property, or weapon connecting
      Lawrence to Hastings.

      - Widget article links the suppression of the autopsy evidence directly to the
      success of Hoss Mack’s campaign rather than legal procedure.


      4. KEY ENTITIES

      - Hoss Mack Jr (Sheriff)

      - Anthony Lowery

      - Dean McGowan

      - David Whetstone

      - Robert Wilters

      - Murray Lawrence Jr.

      - Brandon Hastings

      - Jarius McNeal

      - Hoss Mack Sr'
