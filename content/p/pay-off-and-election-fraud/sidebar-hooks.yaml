      this conflict.

      *   To settle the lawsuit, Fairhope purchased the property, but Mayor Tim Kant
      misrepresented the purchase purpose to the public, claiming it was for a "park."

      *   Tim F. Kant’s October 30, 2015, deposition included questioning regarding
      an unspecified loan amount from Bobby Faust for himself related to sealed court
      matters in Case #901403.


      THE DISCOVERY

      *   The Widget article confirms that Mayor Tim F. Kant was questioned about
      a financial relationship with interested party Bobby Faust during his October
      30, 2015 deposition concerning the sealed lawsuit.

      *   Kant testified at that time that although he had no written communication
      regarding the loan, there existed a promissory note related to the funds.


      THE PIVOT

