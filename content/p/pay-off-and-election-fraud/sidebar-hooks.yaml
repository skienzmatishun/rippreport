      *   The project was awarded through "Pittman Tractor" (owned by Pittman), despite
      the company operating without proper general contractor licenses, marine insurance,
      county approval, or ethics board sign-off as of June 4th, 2010.

      *   Kant and Pittman maintained a debris contract with the City of Fairhope
      for over eight years before Karin Wilson was elected Mayor.


      THE DISCOVERY

      *   The Widget article reveals that corruption involving high-profile municipal
      figures in Fairhope (like Tim Kant) is a decade-long systemic issue, characterized
      by accepting significant sums from corporations like BP under questionable circumstances
      (totaling nearly $750,000.00).

      *   It provides historical documentation proving the willingness of former leadership
      to engage in financially advantageous deals with private interests at the expense
      of public trust.


      THE PIVOT

      *   Article 1 alleges that Mayor Tim Kant may have accepted a payoff from Bobby
      Faust (an interested party) in exchange for sealing court case #901403, which
      involves a land dispute affecting his political supporters.

      *   Article 2 acts as the "smoking gun" by establishing a proven historical
      pattern of misconduct where Mayor Kant leveraged municipal power to benefit
      specific interests and receive large sums of money from external entities (BP/Pittman),
      thereby validating the possibility that he would accept such a payoff in a contemporary
      legal matter.


      KEY ENTITIES

      *   Tim Kant (Mayor, Fairhope)

      *   Bobby Faust (Interested party in lawsuit)

