      Tim Kant (including his Campaign Chairman).

      - Allegation suggests Kant accepted money/obtained loan documents from Bobby
      Faust, an interested party in the suit.


      THE DISCOVERY

      - Dr. Chris Warner filed a letter on July 24, 2014, alleging systemic election
      tampering and corruption in Fairhope and Baldwin County (e.g., intimidation,
      theft).

      - Letter claims Mayor Kant’s administration had a low approval rating during
      the 2012 mayoral primary where his request for a hand count was denied after
      being quoted $4,500.

      - The political consultant Lynn Stacey is linked to multiple "unheard of" successful
      campaigns (e.g., Chris Elliot vs. Bob James runoff).


      THE PIVOT

      - Dr. Warner’s letter and subsequent poll watcher observations establish a long-standing
      history of systemic corruption, influence, and questionable practices within
      Fairhope''s political power structure.

      - This documented pattern provides the historical context necessary to question
      modern judicial actions, such as sealing case #901403 involving Tim Kant and
      Bobby Faust.


      KEY ENTITIES

      - Mayor Tim Kant

      - Bobby Faust (Interested party)

      - Dr. Chris Warner (Whistleblower/Letter author)

      - Lynn Stacey (Political Consultant/“Fix-it guy”)

      - Lonnie Mixon (Mayoral candidate, associated with poll watcher observation
      on 9/11/2012)

      - Tom Odom (Fire Marshall/Election official at Fairhope elections)

      - Mrs. Culver (Election Supervisor at Fairhope elections)

      - Baldwin County Commission / City of Fairhope (Governing bodies involved in
      the conflict and election fraud allegations)'
