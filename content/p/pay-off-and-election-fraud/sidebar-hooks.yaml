      Culver, Tom Odom opening absentee voting machines while serving as a poll watcher,
      and lack of oversight on machine tape certification procedures (Main Article;
      9/11/2012 observation).


      **2. THE DISCOVERY:**

      *   The Widget Article establishes that electoral manipulation is systemic across
      Alabama, not isolated (Widget Article).

      *   It details historical instances of election fixing in Baldwin County, involving
      Judge Michelle Thompsson eliminating competition by declaring rivals "not Republican
