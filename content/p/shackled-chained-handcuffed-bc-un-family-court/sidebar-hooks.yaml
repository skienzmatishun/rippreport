  this-is-a-test:
    brief: "1. THE CONFLICT\n- Judge Michelle Thomason appointed as District Judge,\
      \ claims voters misled regarding Circuit duties. \n- Attorney Austin Burdick\
      \ filed suit in Federal Court against Secretary of State John Merrill alleging\
      \ disenfranchisement; Thomason has sat as Circuit Judge for over 10 years without\
      \ election.\n- Baldwin County family court accused of stripping assets and ignoring\
      \ children; specific case involving Chey Garrigan vs. Jake Simkins (ex-husband).\n\
      - Alleged collusion between Judge Thomason and attorneys Steven Johnson, Brian\
      \ Chun (Chunn), Buddy Brackin to restrict Garrigan’s visitation and custody.\n\
      - Chief complaint: Lack of accountability from Alabama Ethics Commission, Bar\
      \ Association, and Judiciary regarding judges and attorneys.\n\n2. THE DISCOVERY\n\
      - Widget article confirms Ripp Report filed Writ of Mandamus with Circuit Court\
      \ Montgomery (Judge Johnny Hardwick) on October 18, for status review November\
      \ 25.\n- Reveals Tom Albritton is Executive Director of Ethics Commission and\
      \ accused of “Self-Dealing” with Mabel Amos Memorial Fund.\n- Albritton received\
      \ over $120,000 for his children’s education from the trust he oversees.\n-\
      \ Covington County Circuit Court Judge Ben Bowden, former law partner of Albritton,\
      \ benefited to the tune of $45,000 for his children’s education.\n- Regions\
      \ Bank reported to benefit one million dollars from the Mabel Amos Memorial\
      \ Fund (land producing $70-80 million oil/gas).\n\n3. THE PIVOT\n- Article 2\
      \ confirms the “toothless” claim in Article 1; Tom Albritton corruption (self-dealing)\
      \ proves the Ethics Commission is complicit and fails to regulate officials.\n\
      - Connection between Albritton (Ethics Director) and Judge Ben Bowden validates\
      \ Article 1’s claim that the Judiciary protects its own.\n- The Mabel Amos Fund\
      \ scandal is a verified statewide corruption case that supports Ripp’s claim\
      \ in Article 1: “No accountability.”\n- Demonstrates the network exists to protect\
      \ judges (like Bowden, linked partner of Albritton) and officials like those\
      \ implicated in the Thomason/Albritton corruption chain.\n\n4. KEY ENTITIES\n\
      - Michelle Thomason (Baldwin County Judge)\n- Chey Garrigan (Mother, victim\
      \ of custody/visitation restrictions)\n- Tom Albritton (Executive Director,\
      \ Ethics Commission)\n- Austin Burdick (Attorney filing Federal suit vs. Thomason)\n\
      - Ben Bowden (Judge, Covington County; Albritton partner)\n- Mabel Amos Memorial\
      \ Fund / Trust\n- Francis Paul Ripp (The Ripp Report Founder)\n- Regions Bank"
    generated_at: '2026-03-15T23:51:07.683409Z'
    text: Judge Thomason dodges voters for a decade while the very people meant to
      watch her are looting the cookie jar. This investigation into Tom Albritton’s
