      THE DISCOVERY:

      - Widget Article confirms Judge Michelle Thomasson has more complaints filed
      against her than all other Baldwin County Judges combined.

      - Widget specifies July 17th as the decisive date for voting out her influence/position.

      - Widget explicitly identifies Christy Olinger Edwards as the replacement candidate
