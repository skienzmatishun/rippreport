hooks:
  baldwin-county-un-family-court:
    brief: 'THE CONFLICT:

      - Judge Michelle Thomason is accused of presiding over Baldwin County Family
      Court beyond her elected jurisdiction (serving as Circuit judge instead of District
      judge).

      - Allegations filed in Federal Court by attorney Austin Burdick claim Thomason’s
      reappointment exceeds 180 days allowed by Alabama law, constituting voter disenfranchisement.

      - Chey Garrigan’s 8-year legal saga details a daughter pickup dispute with Jake
      Simkins leading to Garrigan being arrested by Fairhope Police without Miranda
      rights and subsequently shackled, chained, and handcuffed in jail.

      - Multiple attorneys (Steven Johnson, Brian Chun, David Simon) are accused of
      collaborating with Judge Thomason to financially deplete clients and retain
      custody access.


      THE DISCOVERY:

      - The 2018 Widget Article/Facebook post confirms The Ripp Report had already
      cataloged "well over a hundred complaints" regarding Judge Thomason prior to
      the new details in Article 1.

      - Widget article validates specific consequences of the court system alleged
      in Main Article: financial bankruptcy of clients and a child suicide linked
      to Judge Thomason’s decisions.

      - Widget article confirms an anonymous victim list is being compiled and updated,
      proving the allegations are organized into a formal report.


      THE PIVOT:

      - Article 2 (Widget) is the "smoking gun" because it documents that the systemic
      abuse, corruption, and specific severity (suicide/custody splits) alleged in
      Article 1 are not isolated or new, but have been known to The Ripp Report since
      at least 2018.

      - Article 2 links the specific Judge Thomason complaints from Article 1 into
      a long-term pattern of institutional failure, proving that the specific incidents
      (Garrigan/Johnson) are part of a verified, ongoing scheme rather than individual
      legal disputes.


      KEY ENTITIES:

      - Judge Michelle Thomason

      - Chey Garrigan (Victim/Plaintiff)

      - Jake Simkins (Ex-husband of Chey Garrigan)

      - Attorney Steven Johnson (Counsel for Simkins/Thomason associate)

      - Attorney Austin Burdick (Federal Plaintiff’s attorney)

      - Tom Albritton (Ethics Commission Executive Director)

      - Bayside Academy'
    generated_at: '2026-03-15T23:51:07.683400Z'
    text: Thomason’s illegal power grab stripped mothers like Chey Garrigan of their
      rights and dignity. This smoking gun report proves we tracked hundreds of complaints
      about the bankruptcies and child suicides left in her wake years before the
      court finally faced a federal lawsuit.
