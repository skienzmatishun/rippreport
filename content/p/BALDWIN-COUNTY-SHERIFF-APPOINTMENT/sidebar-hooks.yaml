  rumors:
    brief: '1. THE CONFLICT: Sheriff Hoss Mack exiting Baldwin County Sheriff’s Office;
      Governor’s Appointment Office soliciting testimonials for replacement, including
      "suggested" candidate Anthony Lowery. Main article asserts Mack’s tenure is
      defined by 9 known loss-of-life incidents where BCSO/BCMCU sought no accountability
      (Little, French, Yates, Victor, I-10 crash victims).

      2. THE DISCOVERY: Widget article confirms O.J. French died August 20th during
      traffic stop; shot by Bay Minette Police while investigating his own actions
      (Chairman Al Tolbert). Widget confirms Jonathan Victor case timeline: April
      2021 shooting, Judge William Cassady denied qualified immunity to Mack and Deputy
      Mark Hunady. Alabama Supreme Court blocked public access to Victor investigation
      footage under "investigative nature" exemption.

      3. THE PIVOT: Widget validates Main article’s claim of systemic cover-ups; confirms
      Lowery was investigator during the wrongful conviction where Sheriff Mack, Prosecutor
      David Whetstone, and Judge Robert Wilters withheld exculpatory evidence from
      defense. Widget notes Mack requested $600k for transparency cameras but refused
      to release any footage; Lowery inherits this lack of oversight.

      4. KEY ENTITIES: Hoss Mack, Anthony Lowery, O.J. French, Jonathan Victor, Peyton
      Little, Robert Yates, Al Tolbert (Bay Minette PD Chief/BCMCU Chairman), Judge
      William Cassady, David Whetstone (Prosecutor), Robert Wilters (Judge), Mark
      Hunady.'
    generated_at: '2026-03-11T05:30:42.225505Z'
    text: The Sheriff’s Office claims they want transparency, but they fight every
      single day to keep their dirty secrets behind closed doors. While Mack took
      tax dollars for body cameras, he refused to release the footage of the Victor
      shooting, and now Lowery is set to continue that exact same legacy of silence.
    character_count: 305
