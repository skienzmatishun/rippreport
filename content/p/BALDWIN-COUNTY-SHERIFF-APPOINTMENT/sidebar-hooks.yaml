hooks:
  new-sheriff-no-changes:
    brief: '1. THE CONFLICT (Past Events & Issues)

      - Sheriff Hoss Mack served Baldwin County (BCSO).

      - Five victims died in known BCSO wrong-way pursuit on I-10 involving Dominic
      Scotti Garcia Jr.; 3 burned, 2 died from accident; Mack defended officer publicly.

      - Robert Yates: Died during 2018 eviction; SWAT breached residence at 6:30 p.m.
      without exigent circumstances/evidence of threat; >114 shells fired; no probable
      cause stated.

      - O.J. French: Shot to death by Bay Minette police for signal violation; cleared
      by Baldwin County Major Crimes Unit (MCU); MCU same unit investigated itself.

      - Peyton Little: Ruled suicide by Baldwin County Sheriff Mack; discovered strangled
      with seat belt in moving car, no external bruises/cuts; lowery told family “Peyton
      wanted to die”; BCSO swept incident under rug.

      - Jonathan Victor: Unarmed man shot 4 times at 7 yards; started as single vehicle
      accident; Deputy Mark Hunady denied qualified immunity in petition filed May
      7.

      - Wrongful Conviction Case: One innocent man jailed 20 years; Sheriff Mack,
      Prosecutor David Whetstone, Judge Robert Wilters withheld exculpatory evidence.

      - Sheriff Mack, David Whetstone, Judge Robert Wilters were directly named in
      withholding evidence regarding the wrongful conviction.

      - Anthony Lowery: Identified as an investigator in the wrongful conviction case;
      had knowledge of withheld evidence.


      2. THE DISCOVERY (Today’s Revelation)

      - Governor Kay Ivey appointed Anthony Lowery as new Baldwin County Sheriff.

      - Appointments announced via Montgomery Advertiser on August 27.

      - Hoss Mack departure confirmed for August 31st.

      - Ivey ignored letters submitted to the Appointment Board.

      - Ivey ignored two pending federal lawsuits involving Baldwin County Sheriff
      Office (BCSO) and Major Crimes Unit.

      - Ivey ignored allegations regarding wrongful convictions of Murray Lawrence
      Jr. and Steve Nodine (involved same Prosecutor, Sheriff, Judge as current wrongful
      conviction case).

      - Two wrongful death federal lawsuits filed specifically naming BCSO and Major
      Crimes Unit in investigation.


      3. THE PIVOT (The Smoking Gun)

      - Article 2 confirms the appointment of Anthony Lowery, directly linking him
      to Sheriff Mack’s tenure.

      - Article 2 exposes that two federal wrongful death lawsuits are pending specifically
      naming the Major Crimes Unit—the same unit cited in Article 1 as clearing O.J.
      French and involved in internal BCSO cover-ups.

      - Article 2 notes Lowery was an investigator in the case where Mack, Whetstone,
      and Wilters withheld evidence against an innocent man; establishes Lowery’s
      insider knowledge of prior misconduct.

      - Article 2 states Lowery has two years before election, implying he inherits
      the lawsuits; connects the past misconduct (Article 1) to immediate administrative
      liability.

      - Confirms Governor Ivey and Commission held "false accolades" for Mack despite
      the documented track record of deaths and self-justified MCU investigations.


      4. KEY ENTITIES

      - Hoss Mack (Former BCSO Sheriff)

      - Anthony Lowery (New/Incoming BCSO Sheriff)

      - Kay Ivey (Governor of Alabama)

      - Mr. Mason Bass (Appointment Office Contact, 600 Dexter Ave, Montgomery AL)

      - David Whetstone (Baldwin County Prosecutor)

      - Robert Wilters (Judge, named in wrongful conviction case)

      - Mark Hunady (Baldwin County Sheriff’s Deputy)

      - Murray Lawrence Jr. (Wrongfully convicted individual)

      - Steve Nodine (Wrongful conviction link, MCU case involved)

      - Dominic Scotti Garcia Jr. (I-10 pursuit driver killed 5 people; involved BCSO
      pursuit)

      - Joseph L. Andrews Sr., Kevin J. Andrews, Otis French Jr., Peyton Little, O.J.
      (Otis) French, Robert Yates, Johnathan Victor'
    generated_at: '2026-03-11T05:30:42.225420Z'
    text: Governor Ivey just handed the keys to Baldwin County over to Anthony Lowery
      despite a trail of bodies left behind by the Sheriff’s Office. This investigation
      proves Lowery was the boots-on-the-ground investigator when Mack and Judge Wilters
      buried the evidence that sent an innocent man to prison for two decades.
    character_count: 313
  FEDERAL-CIVIL-RIGHTS-LAWSUIT-INVOLVES-BCSO-AND-MAJOR-CRIMES-UNIT:
    brief: "THE CONFLICT:\n- Sheriff Hoss Mack is leaving Baldwin County position;\
      \ Governor’s Appointment Office (Mr. Mason Bass) collecting info for candidate\
      \ selection.\n- Anthony Lowery is “suggested” replacement; former investigator\
      \ in wrongful conviction where exculpatory evidence withheld.\n- Lowery was\
      \ part of investigation involving innocent man jailed 20 years; Mack, Prosecutor\
      \ David Whetstone, Judge Robert Wilters withheld evidence.\n- History of nine\
      \ known deaths linked to BCSO/Mack/BCMCU:\n  - Peyton Little (ruled suicide;\
      \ died strangled after giving Bay Minette info).\n  - OJ French (killed by Brandon\
      \ Thompson; cleared by Major Crimes).\n  - Robert Yates (eviction killed during\
      \ non-exigent SWAT breach; >114 shells fired).\n  - Jonathan Victor (unarmed,\
      \ shot 4 times from 7 yards by Deputy Mark Hunady).\n  - I-10 Pursuit (5 killed;\
      \ Joseph Andrews, 81; Kevin Andrews, 54; Dominic Scotti Garcia Jr., 26).\n\n\
      THE DISCOVERY:\n- Federal Civil Rights Lawsuit filed in U.S. District Court,\
      \ Southern District of Alabama, Southern Division (documented via https://rippreport.com/FRENCH.pdf).\n\
      - Lawsuit challenges BCMCU and Sheriff Mack.\n- File confirms Jonathan Victor\
      \ case: Deputy Hunady and Sheriff Mack denied qualified immunity by Judge William\
      \ Cassady; BCSO petitioned rehearing (May 7) claiming false facts.\n- BCMCU\
      \ Membership confirmed: Includes Mack, Bay Minette Chief Al Tolbert, Robertsdale\
      \ Chief Brad Kendrick, Gulf Shores Chief Edward Delmore, Daphne Chief David\
      \ Carpenter, Foley Chief Thurston Bullock.\n- Confirms OJ French is 10th fatality\
      \ investigated by BCMCU where they found no police at fault; prior 8 investigations\
      \ also cleared officers.\n\nTHE PIVOT:\n- Article 2 provides the official Federal\
      \ Lawsuit document proving O.J. French clearance was challenged in federal court,\
      \ validating Article 1’s claims of BCSO misconduct.\n- This lawsuit formally\
      \ documents the \"mess\" Mack is leaving (Federal liability, ongoing Victor\
      \ appeal), exposing that the allegations in Article 1 are backed by court filings.\n\
      - Lawsuit implicates Mack and BCMCU oversight directly; as he exits, this document\
      \ proves the credibility of victims’ claims to Governor’s Appointment Board.\n\
      \nKEY ENTITIES:\n- Sheriff Hoss Mack\n- Anthony Lowery\n- Mason Bass (Appointment\
      \ Office Director)\n- O.J. French\n- Brandon Thompson (Bay Minette Police Officer)\n\
      - Peyton Little\n- Jonathan Victor\n- Robert Yates\n- Joseph Andrews (81)\n\
      - Kevin Andrews (54)\n- Dominic Scotti Garcia Jr.\n- Deputy Mark Hunady\n- Prosecutor\
      \ David Whetstone\n- Judge Robert Wilters\n- Judge William Cassady\n- Al Tolbert\
      \ (Bay Minette Chief)"
    generated_at: '2026-03-11T05:30:42.225443Z'
    text: Sheriff Hoss Mack is trying to skip town while the blood of victims like
      O.J. French and Jonathan Victor remains on his hands. These federal court filings
      strip away the department’s lies and show exactly how the Major Crimes Unit
      operates as a protection racket for killer deputies instead of seeking justice.
    character_count: 310
  shuffling-the-deck:
    brief: 'CONFLICT:

      Sheriff Hoss Mack is retiring from the Baldwin County Sheriff’s Office (BCSO).

      Mack’s preferred replacement was "Andre," but Andre could not secure the position.

      Sheriff Mack is now pushing Anthony Lowery as his "second choice" or "suggested"
      replacement.

      The Governor’s Appointment Office (Director Mr. Mason Bass) is reviewing candidates;
      Mack and county officials are trying to influence the selection process.

      Article 1 highlights multiple unresolved fatalities allegedly caused or ignored
      by BCSO under Mack’s watch:

      - Peyton Little (Confidential informant, strangled death ruled suicide).

      - O.J. French (Shot dead by Bay Minette police; cleared by Major Crimes Unit).

      - Robert Yates (Killed during 2018 forced eviction/entry by SWAT).

      - Jonathan Victor (Shot 4 times while unarmed; Qualified Immunity case filed
      May 7).

      - 5 Deaths in I-10 wrong-way pursuit (involving Deputy Dominic Scotti Garcia
      Jr.).

      Article 1 alleges withholding of exculpatory evidence in the Murray Lawrence
      Jr. wrongful conviction case by Sheriff Mack, Prosecutor David Whetstone, and
      Judge Robert Wilters.


      DISCOVERY:

      Article 2 confirms Lowery was involved in the 2004 wrongful conviction of Murray
      Lawrence Jr.

      Article 2 states Lowery went along with “Captain Mack” in the decision to convict
      Murray Lawrence Jr.

      This conviction is still "weaving it way through the courts."

      Article 2 claims that Sheriff Mack’s promotion to Sheriff and Lowery’s tenure/promotion
      were directly tied to this specific wrongful conviction.

      Article 2 asserts the Lawrence Jr. case proves Lowery is "worse than Mack" and
      involved in BCSO''s "morals, accountability, transparency" failures.

      Article 2 notes the appointment board solicitation is an open channel for victims
      of BCSO negligence to submit complaints directly.


      PIVOT:

      Article 2 acts as the "smoking gun" by explicitly linking Anthony Lowery to
      a known wrongful conviction (Murray Lawrence Jr.) rather than just listing him
      as a name.

      Article 1 warns the public that Lowery may be hiding "embarrassing incidents"
      and past behavior.

      Article 2 validates Article 1’s fears by revealing Lowery not just knows about
      the corruption, but benefited from it ("cushy Friday paycheck and tenure").

      Together they create a complete chain: Lowery was promoted via the Lawrence
      conviction (Article 2) and is now attempting to return to power despite known
      patterns of death and cover-ups (Article 1).


      KEY ENTITIES:

      Sheriff Hoss Mack (Retiring)

      Anthony Lowery (Candidate/Suggested Replacement)

      Mr. Mason Bass (Director, Governor’s Appointment Office)

      Murray Lawrence Jr. (Wrongfully Convicted)

      Mr. Andre (First choice successor candidate, failed)

      Captain Mack (Title for Hoss Mack in past contexts)

      Prosecutor David Whetstone

      Judge Robert Wilters

      Deputy Mark Hunady (Victor case)

      Dominic Scotti Garcia Jr. (I-10 Pursuit Driver)'
    generated_at: '2026-03-11T05:30:42.225450Z'
    text: Don't let the badge fool you because Anthony Lowery is simply the second
      act of the Hoss Mack corruption show. Evidence confirms Lowery built his entire
      career on the back of the Murray Lawrence wrongful conviction, proving he is
