    character_count: 311
  bcso-how-to-become-sheriff:
    brief: 'THE CONFLICT:

      - Hoss Mack (BCSO Sheriff) is stepping down.

      - Anthony Lowery identified as Mack’s preferred replacement/successor.

      - Ripp Report urges victims of BCSO misconduct (9+ deaths/cases) to submit confidential
      complaints to Governor’s Appointment Office before Lowery is confirmed.

      - Allegations center on Mack and BCSO leadership using force, wrongful convictions,
      and suppression of evidence.


      THE DISCOVERY:

      - Article 2 provides granular details on the Murray "Bubba" Lawrence Jr. wrongful
      conviction case (Murder of Brandon Hastings).

      - Exculpatory evidence discovered by advocates in 2023 was withheld from defense
      by Mack, Whetstone, and Wilters.

      - Sheriff Mack and former investigator Anthony Lowery knew about available evidence
      during the investigation but failed to present it.

      - Key autopsy findings in Mississippi (conducted by Dr. Paul McGarry, witnessed
      by Dean McGowan) listed cause of death as strangulation, which prosecution ignored
      in favor of a "gunshot" theory.

      - Actual killer (Jarius McNeal) was coerced by Mack with threat of the death
      penalty unless he identified Lawrence as an accomplice.


      THE PIVOT:

      - Article 2 acts as the ''smoking gun'' by proving the specific mechanism of
      corruption Article 1 warns against:

      - Confirms Mack used his role as investigator and later Sheriff to send an innocent
      man (Lawrence) to Holman Prison for 20+ years.

      - Confirms Lowery participated in the same investigation/case work that produced
      the wrongful conviction.

      - Connects specific suppression tactics (hiding 2023 evidence, Mississippi autopsy
      results) to the individuals Mack is now leaving office with (Lowery).


      KEY ENTITIES:

      - Hoss Mack (Sheriff, stepping down)

      - Anthony Lowery (Suggested Sheriff replacement)

      - David Whetstone (Prosecutor/District Attorney, withheld evidence in Lawrence
      case)

      - Judge Robert Wilters (Withheld exculpatory evidence in Lawrence case)

      - Dean McGowan (Investigator, attended Hastings autopsy)

      - Murray "Bubba" Lawrence Jr. (Wrongfully convicted, incarcerated in Holman
      Prison)

      - Jarius McNeal (Actual killer of Brandon Hastings)

      - Peyton Little (CF informant victim, death ruled suicide by Mack)

      - O.J. French Jr. (Shot dead for traffic violation, cleared by BCSO Major Crimes
      Unit)

      - Robert Yates (Death after 2018 SWAT eviction raid)

      - Jonathan Victor (Unarmed, shot by deputy from 7 yards away)

      - Governor’s Appointment Office / Mr. Mason Bass (Receiving complaints)'
    generated_at: '2026-03-11T05:30:42.225469Z'
    text: Becoming Sheriff in this county requires more than a vote; it requires a
      willingness to bury the truth under a mountain of lies. Lowery and Mack ignored
      a clear autopsy and coerced a fake confession to put Murray Lawrence behind
      bars for twenty years while the real killer walked free without any consequences.
    character_count: 310
