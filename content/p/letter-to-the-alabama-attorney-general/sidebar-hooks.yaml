hooks:
  license-to-steal:
    brief: |-
      Conflict:
      - Francis Paul Ripp (The Ripp Report) sent a formal letter to Alabama Attorney General Steve Marshall regarding political corruption.
      - Letter details Ripp personally delivering an ethics complaint to AG investigators in Montgomery which Marshall’s office did not respond to or investigate.
      - Letter alleges Ethics Commission Director Tom Albritton is engaging in self-dealing, specifically having daughters receive $105,000 in scholarships from Mabel Amos Memorial Fund despite being a trustee and attorney for that same fund.
      - Letter includes attached Writ of Mandamus, Alabama Bar Complaint, and Lagniappe article exposing Albritton's actions.
      - Ripp accused Marshall of making empty promises during a Fairhope campaign stop.

      Discovery:
      - Article "License to Steal" confirms zero official response from AG Marshall, Ethics Commission, Alabama Bar, or Ripp's Writ of Mandamus.
      - Article confirms Vice Chair John Plunk allegedly helped Sheriff Mike Blakely disguise political money flowing to a consultant under federal/state investigation.
      - Article confirms Plunk conducting "secret campaign money stuff" for at least two other unidentified persons/entities.
      - Article notes ongoing corruption case numbers 2020-0337 & 0361 involving Columbia Mayor Rhonda Freeman pending before the same Ethics Commission.
      - Article highlights Ripp Report had read on the issue since at least March 2018 based on Marshall's promises.

      Pivot:
      - Article 1 (Letter) provides the specific initial target (Albritton's financial conflict).
      - Article 2 ("License to Steal") proves the system described in Letter is non-functional via total silence and additional corruption (Plunk/Blakely/Freeman).
      - Silence on the Letter proves AG Marshall is not "taking all complaints seriously" as promised, linking Article 1's allegation of inaction to Article 2's "License to Steal" thesis.
      - Connection validates Ripp’s claim that oversight bodies (AG, Commission) act as insulators when high-profile members like Albritton or Plunk are involved.

      Key Entities:
      - Francis Paul Ripp (The Ripp Report)
      - Steve Marshall (Alabama Attorney General)
      - Tom Albritton (Director, Alabama Ethics Commission)
      - John Plunk (Vice Chair, Alabama Ethics Commission)
      - Mike Blakely (Sheriff)
      - Rhonda Freeman (Columbia Mayor)
      - Mabel Amos Memorial Fund
