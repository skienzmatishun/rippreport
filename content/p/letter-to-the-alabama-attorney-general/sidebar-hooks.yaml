      - Current Date (Letter): Francis Paul Ripp sends letter to AG Marshall enclosing:
          - Lagniappe article “Self-Dealing”.
          - Ethics Complaint.
          - Alabama Bar Complaint.
          - Writ of Mandamus.
      - Target: Tom Albritton, Director of Alabama Ethics Commission.
      - Foundation date: The Ripp Report founded 2008; cited as “Consumer organization” monitoring political corruption.

      THE DISCOVERY
      - Second article (Self-Dealing-Self-Stealing) validates allegations from the first letter.
      - Confirms Albritton is one of three trustees on Mabel Amos Memorial Fund.
      - Confirms Albritton’s daughters received scholarships from the fund to University of Texas.
      - Lagniappe data reveals Albritton’s children received more money than fund's original donor's relatives.
      - Specific allegation: Albritton paid for his own children’s tuition using a trust fund he oversees/has access to.
      - Article links back to Lagniappe source URL identical to that referenced in Letter.

      THE PIVOT
      - Article 1 is the whistleblower letter; Article 2 is the public amplification of that same evidence.
      - Specific Proof: Both cite Mabel Amos Memorial Fund conflict regarding Albritton ($105,000 in tuition mentioned in Letter; implied as higher than donor relatives in Article 2).
      - "Self Dealing" label (Letter) is proven by scholarship payout details in Article 2.
      - If Albritton (Director of Ethics) benefits financially, it validates Ripp’s claim that the Commission is failing oversight.
      - Article 2 tweet dated July 2, 2021 shows active dissemination of these claims.

      KEY ENTITIES
      - Francis Paul Ripp (Founder/The Ripp Report)
      - Steve Marshall (Alabama Attorney General)
      - Tom Albritton (Director of Alabama Ethics Commission)
      - Greg Albritton (Mentioned in Widget tweet)
      - Mabel Amos Memorial Fund (Source of scholarships/trust dispute)
      - Fairhope Councilman (Subject of initial ignored ethics complaint)
      - Regions Bank (Cited in Widget for contact; likely funding the Trust/Commission)
