      - Sheriff Mack, DA Wilters (current Baldwin County District Attorney), and Judge Robert Wilters have worked together for over 30 years.
      - No physical evidence (DNA, ballistics, fingerprints) supported the gun theory in Brandon Hastings murder case.

      THE PIVOT:
