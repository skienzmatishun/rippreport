      - The letter asserts the Ethics Commission believed the Councilman without independent investigation in a prior case.
      - Ripp alleges Albritton is engaging in "Self Dealing" regarding the Mabel Amos Memorial Fund.
      - Letter states Albritton’s daughters received $105,000 in scholarships to the University of Texas paid through this fund.

      THE DISCOVERY
      - A Writ of Mandamus was filed on October 18th by Francis Paul Ripp.
      - A Status Review is scheduled for November 25 with Judge Johnny Hardwick (Montgomery County Circuit).
      - Lagniappe journalist Rob Holbert confirmed the Mabel Amos Memorial Fund payouts to Albritton’s family are not isolated.
      - Data reveals between 2014 and 2017, Judge Ben Bowden received $45,000 for his children’s education from the trust.
      - The Amos tract (36-3) is leased to oil/gas producers generating $70M-$80M worth of production from land held by the fund.
      - Regions Bank has benefited approximately $1 million from the fund.

      THE PIVOT
      - Article 2 (Widget) converts Article 1’s general accusation of corruption into specific financial evidence.
      - By linking Albritton's ethical role to direct payouts for Judge Ben Bowden ($45k) and his own children (>$120,000 total), Article 2 proves the "Self Dealing" claim from Article 1 is financially documented.
      - The Writ of Mandamus mentioned in both articles creates a legal deadline proving the ongoing, active nature of the complaint rather than historical rumor.

      KEY ENTITIES
      - Francis Paul Ripp (The Ripp Report)
      - Tom Albritton (Director of Ethics, Trustee, Attorney)
      - Steve Marshall (Alabama Attorney General)
      - Mabel Amos Memorial Fund
      - Ben Bowden (Covington County Circuit Court Judge)
      - Johnny Hardwick (Montgomery County Circuit Judge)
