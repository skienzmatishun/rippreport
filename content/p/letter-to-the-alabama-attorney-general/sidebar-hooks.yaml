  alabama-ethics-self-dealing-immunity:
    brief: |-
      1. THE CONFLICT
      - Francis Paul Ripp (The Ripp Report) sends formal letter to Alabama Attorney General Steve Marshall.
      - Letter references a past conversation where Ripp warned Marshall about corruption in Baldwin County.
      - Ripp claims AG office failed to investigate a complaint Ripp personally delivered regarding a Fairhope councilman enriching himself.
      - Ripp alleges the Alabama Ethics Commission under Director Tom Albritton is an insulator for corruption, rarely holding anyone accountable.
      - Ripp specifically flags Tom Albritton as a trustee/attorney of the Mabel Amos Memorial Fund.
      - Ripp alleges Albritton’s daughters received $105,000 in scholarships from the fund he oversees.

      2. THE DISCOVERY
      - Richard Fording (Marilyn Williams Elmore and John Durr Elmore Endowed Professor, Dept of Political Science) investigated the Mabel Amos Memorial Fund.
      - Fording discovered Tom Albritton, a board member/trustee of the fund, awarded scholarships to his two children.
      - Total scholarship amount: $105,000 through 2018.
      - Beneficiaries attended the University of Texas.
      - Fund stated mission targeted African American community but gave only $500 total to Tuskegee University.
      - Regions Bank managed the fund and received >$1 million in fees since inception.
      - IRS Code Section 4941(d) prohibits foundation payments for trustee’s children (classified as self-dealing).
      - Ethics Commission previously dismissed complaints involving Boom Boom Pittman ($750,000 skimmed), Jack Burrell (bid-rigging Airport corruption), and Robert Brown ($300,000+ contract to self).

      3. THE PIVOT
      - Ripp’s letter demands official investigation into Albritton and the Mabel Amos Fund.
      - Fording’s independent discovery (Article 2) validates Ripp’s specific allegation about Albritton using trust funds for personal gain.
      - Evidence confirms the Letter’s warning: The Trustee/Authority (Albritton) is benefiting from the fund he oversees.
      - Lagniappe article linked in Letter contains Fording’s findings; confirms Ripp is not fabricating the Albritton connection but reporting data obtained externally.
      - Proves AG Marshall was asked to investigate specific self-dealing that actually occurred (Albritton/Children/Tuition).

      4. KEY ENTITIES
      - Francis Paul Ripp (Founder, The Ripp Report)
      - Steve Marshall (Alabama Attorney General)
      - Tom Albritton (Director, Alabama Ethics Commission; Trustee, Mabel Amos Memorial Fund)
      - Richard Fording (Professor of Political Science; Investigator of Mabel Amos Fund)
      - Regions Bank (Trust administrator, Mabel Amos Memorial Fund)
      - Jack Burrell (Baldwin County figures, bid-rigging alleged)
      - Robert Brown (Former Fairhope Councilman, Art Center board member)
      - Boom Boom Pittman (Former State Senator; alleged $750,000 skimming)
      - Mabel Sanders Amos (Namesake of fund; first female AL Secretary of State)
      - University of Texas
