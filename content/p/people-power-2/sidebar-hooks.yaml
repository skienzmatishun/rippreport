  catalyst-the-three-bs-and-chuckee-cheeze:
    brief: 'THE CONFLICT:

      *   The Fairhope City Council is accused of obstructing Mayor Wilson (specifically
      regarding sewer infrastructure).

      *   A petition with 2276 signatures pressured the council to halt support for
      a proposed Tuberville subdivision in Fairhope, AL (February 2018 context mentioned
      via link).

      *   Mayor Wilson has addressed serious sewer and infrastructure problems identified
      by city superintendents.

      *   The council is criticized for failing to act on these reported issues and
      letting raw sewage overflow into Big Head gully/Fly Creek watershed despite
      a new $13 million sewer plant.


      THE DISCOVERY:

      *   "Catalyst," a political organization, acts as an "old guard" group that
      selects and places candidates in various races across Baldwin County (including
      probate judge, State Senate seats, and all four Baldwin County commission races).

      *   Scott Boone is identified as leading Catalyst; he is the son of Fairhope
      Councilman Kevin Boone.

      *   Catalyst utilizes intimidation tactics against elected officials or viable
      candidates who do not align with their interests.

      *   Former Ethics Commission investigator Goubil investigated an Airport scandal
      involving Jack Burrell and Ray Hix, which are cited as examples of "Three Bees"
      (political group/organization) issues.

      *   Jack Burrell is accused of misconduct since entering politics seven years
      ago and has utilized tax money to defend unconstitutional actions related to
      public participation/ethics complaints.


      THE PIVOT:

      *   Article 1 claims the City Council is actively obstructing the Mayor''s duties
      regarding essential infrastructure (sewer).

      *   Article 2 reveals that key council members, such as Kevin Boone and Jack
      Burrell, are tied to "Catalyst," an organization described as a political machine
      using intimidation ("bully tactics") to ensure their interests prevail.

      *   The obstruction of the Mayor''s duties is reframed as part of a systemic
      effort by Catalyst (a group that selects candidates for positions like Councilman)
      to maintain control and serve its own interests over public necessity, such
      as infrastructure projects.


      KEY ENTITIES:

      *   Mayor Wilson / Karin Wilson

      *   City Council of Fairhope

      *   Robinson (Councilman Robinson)

      *   Peterson (Mr Peterson)

      *   Big Head gully / Fly Creek watershed

      *   The fairhope-city-council-save-big-head-gulley-in-fairhope-al petition/social
      media

      *   Catalyst (political organization)

      *   Scott Boone (Chairman of Catalyst; Councilman Kevin Boone’s son)

      *   Kevin Boone (Fairhope councilman/conduit to Chuckee Cheeze and Catalyst)

      *   Jack Burrell / Jack Burrell (Council President/Councilman)

      *   Goubil (Alabama Ethics Commission investigator)

      *   Ray Hix / Ray Hix (Former Airport Authority Board Member)

      *   Chuckee Cheeze / Chuckee (Journalist/Editor for The Courier and Catalyst)'
