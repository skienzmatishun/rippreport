hooks:
  big-heads:
    brief: 'THE CONFLICT

      *   February 12, 2018: Public health warnings were issued after an estimated
      100,000 to 200,000 gallons of sewage spilled into Big Head Gully and the Fly
      Creek watershed from the Valley Street Lift Station.

      *   January 22-February 15, 2018: City Council held discussions regarding Ordinance
      Item 5—the transfer of an acre of land for Tatumville Subdivision to Fairhope
      Single Tax Corporation. This action occurred following environmental warnings
      about the sewage spill.


      THE DISCOVERY

      *   The Widget Article identifies multiple conflicts of interest among key political
      figures involved in the land transfer and municipal development process around
      February 2018.

      *   Specific conflicts include Kevin Boone (LLCs), Robert Brown/Cliff Pittman
      (building partnership, Single Tax Board support for the project), Jay Robinson
      (law partner Michel Upchurch is Single Tax Treasurer), and Lee Turner (President
      of Fairhope Planning and Zoning and President of Single Tax).


      THE PIVOT

      *   The Main Article alleges systematic obstruction by City Council regarding
      critical sewer infrastructure problems and Mayor Wilson''s duties. The Widget
      Article provides the specific, concrete evidence of compromised judgment—multiple
      undisclosed business conflicts of interest among council members—which suggests
      self-interest motivated the political inaction and failed governance during
      the time of the Big Head Gully sewage overflow.


      KEY ENTITIES

      *   Fairhope City Council / Fairhope Single Tax Corporation

      *   Big Head Gully / Fly Creek watershed

      *   Mayor Wilson

      *   Councilman Robinson

      *   Kevin Boone

      *   Robert Brown

      *   Jay Robinson

      *   Michel Upchurch

      *   Cliff Pittman

      *   Lee Turner

      *   Tatumville Subdivision'
    generated_at: '2026-07-12T19:02:25.555668Z'
  bend-over-fairhope:
    brief: 'THE CONFLICT:

      - A Fairhope Single Tax plan was proposed by developers on banks of Big Head
      Gully and Fly Creek watershed.

      - Infrastructure problems were identified through studies proposed by Mayor
      Wilson regarding sewer systems.

      - A new $13 million sewer plant failed to process 500,000 gallons of raw sewage
      into Big Head gully/Fly Creek watershed.

      - Citizens secured a petition with 2,276 signatures that successfully stopped
      the Tuberville subdivision due to these infrastructure failures.

      - In the past (regarding Fly Creek), Mayor Wilson supported citizens while the
      council favored developers.


      THE DISCOVERY:

      - The City Council is actively attempting to obstruct the Mayor''s office leadership
      and reduce discretionary funds from $15,000 down to $2,500.

      - The Council has been accused of using municipal employees to spread rumors
      and manage disgruntled employee settlements (using tax dollars).

      - New petitions, now exceeding 925 signatures, reject the Fairhope Single Tax
      plan for developers on gully banks.

      - Council Members Boone and Brown have direct ties to the proposed Single Tax
      project; one has recused himself but the other is pushing it with a business
      partner.


      THE PIVOT:

      - Article 1 alleges generalized obstruction by the council regarding infrastructure
      issues (Big Head Gully).

      - Article 2 proves this obstruction stems from specific, self-serving motives:
      the Council''s financial ties to the Single Tax developers (Boone/Brown) and
      a calculated effort to undermine Mayor Wilson’s authority through resource depletion
      ($15k to $2.5k discretionary fund reduction) and internal maneuvering.


      KEY ENTITIES:

      - Fairhope City Council

      - Mayor Wilson / Karin Wilson

      - Councilman Robinson

      - Mr Peterson

      - Mr Burrell (Council President)

      - Boone (City Council Member)

      - Brown (City Council Member)

      - Sherry Sullivan

      - Fly Creek watershed

      - Big Head Gully'
    generated_at: '2026-07-12T19:02:25.555694Z'
  bit-dogs-bark-first:
    brief: 'THE CONFLICT

      *   Fairhope City Council has obstructed Mayor Wilson since she took office
      in 2023/2018, specifically regarding necessary sewer infrastructure projects
      and an ongoing moratorium on development.

      *   The council is accused of obstructing the implementation of studies by city
      superintendents to identify sewer and infrastructure issues following a raw
      sewage overflow into Big Head gully (Main Article).

      *   Councilman Jay Robinson has publicly denied responsibility for the failure,
      stating it was not the council''s fault (Main Article).

      *   The Mayor’s efforts to promote transparency regarding professional engineering
      capacity studies (e.g., selection of Cassady Company) have been challenged by
      Council members Burrell and Boone (Widget Article).


      THE DISCOVERY

      *   Widget Article proves that Kevin Boone has a direct conflict of interest:
      he is the sole member of BA-101, LLC; John G. Avent is listed as an affiliated
      firm partner at Preble-Rish, Inc.; John G. Avent is also listed as a "Member"
      in North Ridge, LLC (co-owned by Kevin Boone and Joseph Bullock); and Mr. Boone
      actively opposed the Mayor’s attempt to hire a fresh eye—a local engineer with
      professional ties to Vent/Avent''s network—to inspect the sewer infrastructure
      (Widget Article).

      *   The article reveals that Councilman Jay Robinson received $1,000 from Ray
      Hix (an Airport Authority Board Member) and subsequently voted in favor of an
      Airport Authority resolution against city interests without acknowledging the
      contribution (Widget Article).


      THE PIVOT

      *   Article 2 identifies the specific financial ties between council members
      Kevin Boone/Burrell and professional engineering firms like Preble-Rish, Inc.,
      which are currently being hired to assess the very infrastructure problems that
      have caused a public health crisis in Fairhope. This reveals systemic corruption
      rather than mere political obstruction (Main Article).

      *   Article 2 demonstrates how Councilman Robinson’s vote on Airport Authority
      matters is financially compromised through campaign contributions from Ray Hix,
      contradicting his stated concerns regarding city management and the council''s
      supposed dedication to citizens (Main Article).


      KEY ENTITIES

      *   Fairhope City Council

      *   Mayor Wilson

      *   Councilman Kevin Boone / Mr. Boone

      *   Councilman Burrell / Mr. Burrell

      *   Councilman Jay Robinson

      *   John G. Avent (Preble-Rish, Inc., BA-101, LLC)

      *   The Fairhope Courier

      *   Chuckee Cheeze / Chuckee

      *   Ray Hix

      *   Triange (land/property entity)

      *   Big Head Gully and Fly Creek watershed'
    generated_at: '2026-07-12T19:02:25.555734Z'
  good-ole-boys-alive-and-well:
    brief: 'THE CONFLICT

      *   Fairhope City Council has historically attempted to obstruct the Mayor’s
      duties, including undermining goals and vetoes.

      *   Under a previous council (under Tim Kant), Resolution 2606-16 was passed
      on April 17, 2017.

      *   This resolution accepted a property deed from Angelo A. Corte for a city
      sewer lift station.

      *   The recorded "gift" included three plus acres of wetlands intended to receive
      storm water runoff from the Publix site and outfall pipe location, rather than
      just the small parcel required for the lift station.

      *   In 2017, council members Burrell and Boone were present at this meeting;
      Mayor Kant was absent.


      THE DISCOVERY

      *   The current accusations of obstruction (Article 1) are part of a long-standing
      pattern dating back to April 2017.

      *   The "gift" from Angelo A. Corte, which included critical storm water runoff
      areas, was recorded despite the City Attorney being aware of its full extent
      while council members pretended ignorance.


      THE PIVOT

      *   Article 2 provides a historical precedent that validates Article 1’s claim
      regarding ongoing systemic obstruction and questionable decision-making by certain
      city officials (e.g., Councilman Burrell, Councilman Boone).

      *   The history of questionable deals with developers (Angelo Corte) and the
      deliberate bypassing of transparent process in 2017 establishes a pattern that
      underpins current accusations against the council regarding infrastructure neglect
      and obstruction of Mayor Wilson’s duties during the modern sewer plant crisis.


      KEY ENTITIES

      *   Mayor Wilson / Karin Wilson

      *   City Council

      *   Angelo A. Corte

      *   Burrell (Jack Burrell)

      *   Boone

      *   Tim Kant

      *   Marion Wynne (City Attorney)

      *   Sherry-Lea Bloodworth-Botop

      *   Fly Creek PUD

      *   Preble Rish engineering'
    generated_at: '2026-07-12T19:02:25.555762Z'
  fact-hardest-working-elected-city-official-eastern-shore-fairhope-mayor-karin-wilson:
    brief: 'THE CONFLICT

      *   Fairhope has long suffered from neglect of wastewater collection, transmission,
      and treatment systems, leading to water quality issues.

      *   A report by Environment America Research & Policy Center noted that Fairhope
      Public Beach tested "potentially unsafe" for bacterial contamination in July
      2019.

      *   The city spent $13 million on a sewer plant located next to the Bay, allegedly
      done during the tenure of Councilman Boone and Burrell.

      *   Former officials Jim Nix (7 terms) and Tim Kant are credited with failing
      to fix the sewer system under their administrations.


      THE DISCOVERY

      *   Mayor Karin Wilson launched an aggressive 5-year rehabilitation plan for
      wastewater systems immediately upon taking office, utilizing $11M in RESTORE
      funding.

      *   The problem predates her tenure, having developed over many years of neglect
      by previous administrations.

      *   Article 2 claims the Fairhope City Council has consistently hindered infrastructure
      projects through "simple obstruction and procrastination."


      THE PIVOT

      *   Article 2 provides historical context for Article 1''s claim that the council
      is obstructing the Mayor’s duties; it confirms prior instances where City Council
      members (Boone, Burrell) failed to adequately address or properly fund essential
      sewer infrastructure.

      *   Article 2 reveals specific details about the inadequate $13 million sewer
      plant mentioned in Article 1, noting it was located near the Bay when an inland
      relocation would have cost $22 million.


      KEY ENTITIES

      *   Mayor Karin Wilson (current Mayor of Fairhope)

      *   City Councilman Robinson

      *   Councilman Boone

      *   Councilman Burrell

      *   Jim Nix (Former 7-term Mayor)

      *   Tim Kant (Previous Mayor/Official mentioned in context of corrupt administration)

      *   $13 million (amount spent on previous sewer plant)

      *   $11M (RESTORE funding committed by Mayor Wilson)

      *   Fairhope City Council / Fairhope Single Tax Petition (2,276 signatures)'
    generated_at: '2026-07-12T19:02:25.555766Z'
  timeline:
    brief: 'THE CONFLICT:

