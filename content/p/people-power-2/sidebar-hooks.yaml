      but was obstructed by the City Council (including Councilman Robinson, Boone,
      and Burrell).

      * The City Council failed to act on these known infrastructure issues despite
      reports from staff like Mr. Peterson.


      THE DISCOVERY

      * Widget Article (dated January 10, 2020) proves that the council’s obstruction
      is a long-standing pattern rather than a recent failure.

      * Boone Brown and Burrell specifically allocated $2.75 million for land acquisition
      intended for recreation, which was subsequently misused/leased for farming instead
      of addressing infrastructure needs.

      * The article establishes that sewer infrastructure had been ignored by the
      Council for over two decades until staff and Mayor Wilson intervened.


      THE PIVOT

