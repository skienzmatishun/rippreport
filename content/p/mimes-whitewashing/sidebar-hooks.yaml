      *   The council approved $2.65 million for recreation land that garnered no
      public support, forcing a budget adjustment. They also supported giving away
      the Triangle property valued at $13 million to taxpayers.


      THE PIVOT

      *   Article 2 (Widget) establishes the developer-backed influence and personal
