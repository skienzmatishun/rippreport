      $15,000 in legal services from Satterwhite & Associates (starting June 9, 2017).

      *   Council members vowed revenge for an ethics complaint filed by the Mayor
      against Jack.

      *   The council approved over $500,000 for agenda items.

      *   A $100,000 lawsuit against the city was settled quickly to "bury it."


      THE DISCOVERY:

      *   Fairhope has opened Pandora''s box due to an HR director''s $100,000 lawsuit
      against the city.

      *   Sherry Sullivan and Jennifer Fidler were fired without explanation; Fidler
      is a witness for the HR director.

      *   An airport scandal involving Jack Burrell exists, supported by Airport Authority
      Chairman Joe McEnermy who supported Jack''s lies.

      *   Conflict of interest exists involving Jack Burrell, Boone’s LLC, and past
      administration deeds.


      THE PIVOT:

      *   Article 2 reveals that the "whitewashing" (Article 1) is enabled by uncovering
      damaging hidden consequences ("Pandora''s Box") related to HR firings, lawsuits,
      and an airport conspiracy involving Jack Burrell.

      *   The evidence in Pandora''s Box directly implicates Jack Burrell in corruption
      that the Council is trying to hide through procedural obstruction.


      KEY ENTITIES:

      *   Burrell (Jack)

      *   Wilson (Mayor Karin)

      *   Brown (Councilman)

      *   Brown and Boone’s LLC

      *   Satterwhite & Associates

      *   Sullivan

      *   Fidler

      *   McEnermy (Airport Authority Chairman)

      *   Fairhope City Council

      *   Fairhope Airport'
