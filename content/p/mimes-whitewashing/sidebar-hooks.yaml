  good-ole-boys-alive-and-well:
    brief: '**THE CONFLICT:**

      *   In the last council meeting, Fairhope City Council unanimously denied Mayor
      Karin Wilson a request of $15,000 from Satterwhite & Associates for professional
      legal services regarding her work (starting June 9, 2017) and mediation.

      *   Councilman Brown stated that an ethics complaint filed by the mayor against
      Jack Burrell had been "ruled baseless," but this claim is disputed as investigations
      are underway.

      *   City Council members Boone and Councilman Brown have blocked transparency
      regarding a $100,000 lawsuit brought against the city (presumably concerning
      employee allegations against the mayor).

      *   The council has obstructed the mayor''s duties by refusing to audit major
      issues, leading Ripp Report to win two lawsuits costing the city over $300,000
      due to council interference.

      *   Jack Burrell served as Council President (2019-05-17) and is identified
      in both articles as having a conflict of interest regarding airport authority
      appointments and his role as liaison/bid committee member.


      **THE DISCOVERY:**

      *   In 2017, while the City Council was under Mayor Karin Wilson''s successor
      (Mayor Kant), Burrell and Boone were present at a meeting where the city accepted
      an "Exhibit A" deed of property from Angelo A. Corte via Resolution 2606-16,
      without proper maps attached to show it was part of the storm water runoff/wetlands
      parcel.

      *   Angelo A. Corte provided the property (three plus acres of wetlands) which
      also received stormwater runoff from a Publix site and contained an outfall
      pipe for a retention pond; this encompassed far more than just the city’s sewer
      lift station footprint.

      *   The City Attorney, Marion Wynne, was uncharacteristically aggressive when
      she noted the resolution''s discrepancy, but Burrell proceeded with the resolution
      despite her knowledge of the recorded property details and maps.

      *   Current Economic and Community Development position holder Sherry-Lea Bloodworth-Botop
      (who moved from Washington D.C.) saw funding for this position cut by Burrell
      and Brown during a budget session.


      **THE PIVOT:**

      *   The 2017 event proves that Council members Burrell and Boone, acting under
      the "Good Ole Boys" framework, knowingly accepted a fraudulent property transfer
      (the wetlands gift from Angelo A. Corte) for private gain while holding public
      office in Fairhope. This establishes their pattern of self-dealing through legislative
      action to benefit developers like Angelo A. Corte at the expense of taxpayers/city
      integrity.

      *   This historical precedent directly explains the current "whitewashing" and
      obstruction tactics (denying legal fees, settling lawsuits, blocking airport
      transparency) employed by Burrell and Brown against Mayor Karin Wilson—it demonstrates
      they prioritize developer interests over executive accountability and city governance.


      **KEY ENTITIES:**

      *   Mayor Karin Wilson / City Attorney Marion Wynne

      *   Councilman Jack Burrell / Council President Jack (various roles: 2019-05-17,
      2018-03-30, Current)

      *   Councilman Brown (including "self imposed finance committee")

      *   Angelo A. Corte (Property Donor/Developer)

      *   Sherry-Lea Bloodworth-Botop / ECD position

      *   Boone

      *   Tim Kant (Previous administration context for 2017 events)

      *   Fairhope City Council

      *   Satterwhite & Associates

      *   CATALYST'
