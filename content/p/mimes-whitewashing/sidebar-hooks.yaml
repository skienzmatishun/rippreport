      involving external, high-level officials (Pittman/BP connection), implying corruption
      rather than just political opposition.


      **KEY ENTITIES:**

      *   Karin Wilson (Mayor)

      *   Jack Burrell (Council President / Councilman)

      *   Sen Tripp Pittman (Former State Senator)

      *   Chuckee / Chucky (Journalist / Editor of The Fairhope Courier)

      *   Councilman Brown

      *   Boone (Council Member)

      *   Satterwhite & Associates (Professional Legal Services)

      *   BP (Company implicated in scandal)'
