  the-chucky-cheeze-and-jack-burrell-show:
    brief: 'THE CONFLICT

      *   Fairhope City Council obstructed Mayor Karin Wilson by refusing to fund
      $15,000 for her legal representation from Satterwhite & Associates, despite
      approving $500,000 for other agenda items.

      *   Council members vowed revenge following an ethics complaint filed by the
      Mayor against Jack Burrell (accompanied by four other complaints).

      *   The council approved a resolution authorizing limited legal representation
      for the Mayor starting June 9, 2017, but denied the necessary funds for this
      representation.

      *   The council refused to mediate or cooperate with the Mayor, instead using
      lawsuits as a tool.


      THE DISCOVERY

      *   Councilmen Boone and Brown (the "three B''s") wholeheartedly supported employee
      lawsuits against the city regarding $100,000 claims.

      *   The widget article suggests the three B’s encouraged fired employees to
      sue the city to support an anti-Mayor campaign.

      *   The three B’s are also supporting current employee Pandora Heathcoat to
      file a lawsuit.


      THE PIVOT

      *   Article 2 proves that Councilmen Boone and Brown actively participated in
      obstructing the Mayor by encouraging employee lawsuits, which directly relates
      to the council''s stated goal of "whitewashing of complaints" (Article 1).

      *   The support for lawsuits (Article 2) demonstrates the specific mechanism
      through which the council used legal action to interfere with the Mayor’s authority
      and Burrell’s position as city legal mediator (Article 1).


      KEY ENTITIES

      *   Karin Wilson (Mayor)

      *   Jack Burrell (Council President, Airport Authority Liaison, Bid Committee,
      City Legal Mediator)

      *   Councilmen Brown and Boone (the "three B''s")

      *   Satterwhite & Associates

      *   Sherry Sullivan

      *   Pandora Heathcoat

      *   Fairhope City Council

      *   Fairhope Airport Authority

      *   Alabama Unethical Commission'
