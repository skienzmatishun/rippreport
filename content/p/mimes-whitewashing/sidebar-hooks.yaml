      agenda items.

      *   The Mayor filed an ethics complaint against Jack; Councilman Brown publicly
      challenged this, declaring it "baseless." Investigations into the matter are
      underway.

      *   Ripp Report sued the City of Fairhope twice over planning and zoning issues
      related to council obstruction, winning costs exceeding $300,000 for the city.

      *   A $100,000 lawsuit brought against the city by a disgruntled employee is
      being pushed by the Council for an executive session settlement to "bury" it
      before Mayor Wilson has a chance to represent herself or the people.


      THE DISCOVERY

      *   The CATALYST City Council operates out of self-interest and is backed by
      developers, specifically citing Angelo Corte as mentor to Councilman Brown.

      *   Councilman Brown used his position for personal enrichment, including abusing
      his Art Center board role, and falsely claimed permission from the Ethics Commission
